body:
  text: 唐宋八大家文鈔巻一百三十九明茅坤撰東坡文鈔二十三序傳范文正公文集序此作本以率意而書者而於中識度自逺慶厯三年軾始總角入鄉挍士有自京師來者以魯人石守道所作慶厯聖德詩示鄉先生軾從旁竊觀則能誦習其詞問先生以所頌十一人者何人也先生曰童子何用知之軾曰此天人也耶則不敢知若亦人耳何為其不可先生竒軾言盡以告之且曰韓范富歐陽此四人者人傑也時雖未盡了則已私識之矣嘉祐二年始舉進士至京師則范公没既葬而墓碑出讀之至流涕曰吾得其為人盖十有五年而不一見其面豈非命也歟是歳登第始見知於歐陽公因公以識韓富皆以國士待軾曰恨子不識范文正公其後三年過許始識公之仲子今丞相堯夫又六年始見其叔彞叟京師又十一年遂與其季德孺同僚於徐皆一見如舊且以公遺藁見屬為序又十一年乃克為之嗚呼公之功徳葢不待文而顯其文亦不待序而傳然不敢辭者自以八嵗知敬愛公今四十七年矣彼三傑者皆得從之游而公獨不識以為平生之恨若獲挂名其文字中以自託於門下士之末豈非疇昔之願也哉古之君子如伊尹太公管仲樂毅之流其王伯之略皆定於畎畝中非仕而後學者也淮隂侯見髙帝於漢中論劉項短長畫取三秦如指諸掌及佐帝定天下漢中之言無一不酬者諸葛孔明卧草廬中與先主論曹操孫權規取劉璋因蜀之資以爭天下終身不易其言此豈口傳耳授嘗試為之而僥倖其或成者哉公在天聖中居太夫人憂則巳有憂天下致太平之意故為萬言書以遺宰相天下傳誦至用為將擢為執政考其平生所為無出此書者今其集二十巻為詩賦二百六十八為文一百六十五其於仁義禮樂忠信孝悌葢如饑渇之於飲食欲須㬰忘而不可得如火之熱如水之溼葢其天性有不得不然者雖弄翰戲語率然而作必歸於此故天下信其誠爭師尊之孔子曰有徳者必有言非有言也徳之發於口者也又曰我戰則克祭則受福非能戰也徳之見於怒者也六一居士集序蘇長公乃歐文忠公極得意門生此序却亦不負歐公夫言有大而非誇達者信之衆人疑焉孔子曰天之將喪斯文也後死者不得與於斯文也孟子曰禹抑洪水孔子作春秋而予距楊墨葢以是配禹也文章之得喪何與於天而禹之功與天地並孔子孟子以空言配之不巳誇乎自春秋作而亂臣賊子懼孟子之言行而楊墨之道廢天下以是為固然而不知其功孟子既沒有申商韓非之學違道而趨利殘民以厚生其説至陋也而士以是罔其上上之人僥倖一切之功靡然從之而世無大人先生如孔子孟子者推其本末權其禍福之輕重以救其惑故其學遂行秦以是喪天下陵夷至於勝廣劉項之禍死者十八九天下蕭然洪水之患葢不至此也方秦之未得志也使復有一孟子則申韓為空言作於其心害於其事作於其事害於其政者必不至若是烈也使楊墨得志於天下其禍豈减於申韓哉由此言之雖以孟子配禹可也太史公曰葢公言黄老賈誼晁錯明申韓錯不足道也而誼亦為之子以是知邪説之移人雖豪傑之士有不免者況衆人乎自漢以來道術不出於孔氏而亂天下者多矣晉以老莊亡梁以佛亡莫或正之五百餘年而後得韓愈學者以愈配孟子葢庶幾焉愈之後三百有餘年而後得歐陽子其學推韓愈孟子以達於孔氏著禮樂仁義之實以合於大道其言簡而明信而通引物連類折之於至理以服人心故天下翕然師尊之自歐陽子之存世之不説者譁而攻之能折困其身而不能屈其言士無賢不肖不謀而同曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景祐極矣而斯文終有愧於古士亦因陋守舊論卑而氣弱自歐陽子出天下爭自濯磨以通經學古為髙以救時行道為賢以犯顔納諫為忠長育成就至嘉祐末號稱多士歐陽子之功為多嗚呼此豈人力也哉非天其孰能使之歐陽子没十有餘年士始為新學以佛老之似亂周孔之真識者憂之頼天子明聖詔修取士法風厲學者専治孔氏黜異端然後風俗一變考論師友淵源所自復知誦習歐陽子之書予得其詩文七百六十六篇於其子棐乃次而論之曰歐陽子論大道似韓愈論事似陸贄記事似司馬遷詩賦似李白此非予言也天下之言也歐陽子諱修字永叔既老自謂六一居士云唐荆川曰體大而思精議論如走盤之珠文之絶佳者也田表聖奏議序不為巉刻之言而文自逹故諫議大夫贈司徒田公表聖奏議十篇嗚呼田公古之遺直也其盡言不諱葢自敵以下受之有不能堪者而况於人主乎吾是以知二宗之聖也自太平興國以來至於咸平可謂天下大治千載一時矣而田公之言常若有不測之憂近在朝夕者何哉古之君子必憂治世而危明主明主有絶人之資而治世無可畏之防夫有絶人之資必輕其臣無可畏之防必易其民此君子之所甚懼也方漢文時刑措不用兵革不試而賈誼之言曰天下有可長太息者有可流涕者有可痛哭者後世不以是少漢文亦不以是甚賈誼由此觀之君子之遇治世而事明主法當如是也誼雖不遇而其所言略已施行不幸早世功烈不著於時然誼常建言使諸侯王子孫各以次受分地文帝未及用厯孝景至武帝而主父偃舉行之漢室以安今公之言十未用五六也安知來世不有若偃者舉而行之歟願廣其書於世必有與公合者此亦忠臣孝子之志也鳬繹先生詩集序非公著意文却亦澹宕而有深思云孔子曰吾猶及史之闕文也有馬者借人乗之今亡矣夫史之不闕文與馬之不借人也豈有損益於世者哉然且識之以為世之君子長者日以逺矣後生不復見其流風遺俗是以日趨於智巧便佞而莫之止是二者雖不足以損益而君子長者之澤在焉則孔子識之而況其足以損益於世者乎昔吾先君適京師與卿士大夫遊歸以語軾曰自今以徃文章其日工而道將散矣士慕逺而忽近貴華而賤實吾巳見其兆矣以魯人鳬繹先生之詩文十餘篇示軾曰小子識之後數十年天下無復為斯文者也先生之詩文皆有為而作精悍確苦言必中當世之過鑿鑿乎如五榖必可以療饑斷斷乎如藥石必可以伐病其遊談以為髙枝詞以為觀美者先生無一言焉其後二十餘年先君既没而其言存世之為文者莫不超然出於形器之表微言髙論既巳鄙陋漢唐而其反覆論難正言不諱如先生之文者世莫之貴矣軾是以悲於孔子之言而懐先君之遺訓益求先生之文而得之於其子復乃錄而藏之先生諱大初字醇之姓顔氏先師兖公之四十七世孫云樂全先生文集序公與張方平最相知故序其文亦相知之深中種種當理孔北海志大而論髙功烈不見於世然英偉豪傑之氣自為一時所宗其論盛孝章郗鴻豫書慨然有烈丈夫之風諸葛孔明不以文章自名而開物成務之資綜練名實之意自見於言語至出師表簡而盡直而不肆大哉言乎與伊訓説命相表裏非秦漢以來以事君為悦者所能至也常恨二人之文不見其全今吾樂全先生張公安道其庶幾乎嗚呼士不以天下之重自任久矣言語非不工也政事文學非不敏且博也然至於臨大事鮮不忘其故失其守者其器小也公為布衣則頎然巳有公輔之望自少出仕至老而歸未嘗以言狥物以色假人雖對人主必審而後言毁譽不動得喪若一真孔子所謂大臣以道事君者世逺道散雖志士仁人或少貶以求用公獨以邁徃之氣行正大之言曰用之則行舎之則藏上不求合於人主故雖貴而不用用而不盡下不求合於士大夫故悦公者寡不悦公者衆然至言天下偉人則必以公為首公盡性知命體乎自然而行乎不得巳非蘄以文字名世者也然自慶厯以來訖元豐四十餘年所與人主論天下事見於章疏者多矣或用或不用而皆本於禮義合於人情是非有考於前而成敗有驗於後及其他詩文皆清逺雄麗讀者可以想見其為人信乎其有似於孔北海諸葛孔明也軾年二十以諸生見公成都公一見待以國士今三十餘年所以開發成就之者至矣而軾終無所效尺寸於公者獨求其文集手挍而家藏之且論其大略以待後世之君子昔曾魯公嘗為軾言公在人主前論大事他人終日反覆不能盡者公必數言而决粲然成文皆可書而誦也言雖不盡用然慶厯以來名臣為人主所敬莫如公者公今年八十一杜門却掃終日危坐將與造物者遊於無何有之鄉言且不可得聞而况其文乎凡為文若干巻詩若干首王定國詩集序蘇長公文不著意結搆者多太史公論詩以為國風好色而不淫小雅怨誹而不亂以余觀之是特識變風變雅耳烏覩詩之正乎昔先王之澤衰然後變風發乎情雖衰而未竭是以猶止於禮義以為賢於無所止者而巳若夫發於情止於忠孝者其詩豈可同日而語哉古今詩人衆矣而杜子美為首豈非以其流落飢寒終身不用而一飯未嘗忘君也歟今定國以余故得罪貶海上三年一子死貶所一子死于家定國亦病幾死余意其怨我甚不敢以書相聞而定國歸至江西以其嶺外所作詩數百首寄余皆清平豐融藹然有治世之音其言與志得道行者無異幽憂憤歎之作葢亦有之矣特恐死嶺外而天子之恩不及報以忝其父祖耳孔子曰不怨天不尤人定國且不我怨而肯怨天乎余然後廢巻而嘆自恨其人之淺也又念昔者定國過余於彭城留十日徃返作詩幾百篇余苦其多畏其敏而服其工也一日定國與顔復長道游泗水登桓山吹笛飲酒乗月而歸余亦置酒黄樓上以待之曰李太白死世無此樂三百年矣今余老不復作詩又以病止酒閉門不出門外數歩即大江經月不至江上眊眊焉真一老農夫也而定國詩益工飲酒不衰所至窮山水之勝不以厄窮衰老改其度今而後余之所畏服於定國者不獨其詩也錢塘勤上人詩集序勤上人之詩必不足傳而長公却於歐公之交上作一烟波議論昔翟公罷廷尉賔客無一人至者其後復用賔客欲徃翟公大書其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見世以為口實然予嘗薄其為人以為客則陋矣而公之所以待客者獨不為小哉故太子太師歐陽公好士為天下第一士有一言中於道不逺千里而求之甚於士之求公以故盡致天下豪傑自庸衆人以顯於世者固多矣士之負公者亦時有之葢嘗慨然太息以人之難知為好士者之戒意公之於士自是少倦而其退老於潁水之上予徃見之則猶論士之賢者惟恐其不聞於世也至於負已者則曰是罪在我非其過翟公之客負之於死生貴賤之間而公之士叛公於瞬息俄頃之際翟公罪客而公罪已與士益厚賢於古人逺矣公不喜佛老其徒有治詩書學仁義之説者必引而進之佛者惠勤從公遊三十餘年公嘗稱之為聰明才智有學問者尤長於詩公薨於汝隂予哭之于其室其後見之語及於公未嘗不涕泣也勤固無求於世而公又非有徳於勤者其所以涕泣不忘豈為利也哉予然後益知勤之賢使其得列於士大夫之間而從事於功名其不負公也審矣熈寧七年余自錢塘將赴髙宻勤出其詩若干巻求予文以傳於世予以為詩非待文而傳者也若其為人之大略則非斯文莫之傳也送水丘秀才序所思逺而文亦遒俊水丘仙夫治六經百家説為歌詩與揚州豪俊交游頭骨磽然有古丈夫風其出詞吐氣亦徃徃驚世俗予知其必有用也仙夫其自惜哉今之讀書取官者皆屈折拳曲以合規繩曾不得自伸其喙仙夫恥不得為將厯瑯琊之㑹稽浮沅湘遡瞿塘登髙以望逺揺槳以泳深以自適其適也過予而語行予謂古之君子有絶俗而髙有擇地而泰者顧其心常足而巳坐於廟堂君臣賡歌與夫據槁梧擊朽枝而聲犁然不知其心之樂奚以異也其在窮也能知舎其在通也能知用予以是卜仙夫之還也仙夫勉矣哉若夫習而不試徃即而獨後則仙夫之屐可以南矣方山子傳竒頗跌宕似司馬子長方山子光黄間隠人也少時慕朱家郭解為人閭里之俠皆宗之稍壯折節讀書欲以此馳騁當世然終不遇晩乃遯於光黄間曰岐亭庵居蔬食不與世相聞棄車馬毁冠服徒歩徃來山中人莫識也見其所著㡌方屋而髙曰此豈古方山冠之遺像乎因謂之方山子余謫居子黄過岐亭適見焉曰嗚呼此吾故人陳慥季常也何為而在此方山子亦矍然問余所以至此者余告之故俯而不答仰而笑呼余宿其家環堵蕭然而妻子奴婢皆有自得之意余既聳然異之獨念方山子少時使酒好劍用財如糞土前十有九年余在岐山見方山子從兩騎挾二矢游西山鵲起於前使騎逐而射之不獲方山子怒馬獨出一發得之因與余馬上論用兵及古今成敗自謂一世豪士今幾日耳精悍之色猶見於眉間而豈山中之人哉然方山子世有勳閥當得官使從事於其間今已顯聞而其家在洛陽園宅壯麗與公侯等河北有田嵗得帛千匹亦足以富樂皆棄不取獨來窮山中此豈無得而然哉余聞光黄間多異人徃徃陽狂垢汚不可得而見方山子儻見之與此篇三蘇文粹不載余特愛其烟波生色處徃徃能令人涕洟故錄入之陳公弼傳子瞻嘗自謂平生不為行狀墓碑大較叙事文其所短也此傳亦摹史漢而得其什之二三者公諱希亮字公弼姓陳氏眉之青神人其先京兆人也唐廣明中始遷於眉曾祖延禄祖瓊父顯忠皆不仕公㓜孤好學年十六將從師其兄難之使治息錢三十餘萬公悉召取錢者焚其劵而去學成乃召其兄之子庸諭使學遂與俱中天聖八年進士第里人表其閭曰三雋坊始為長沙縣浮屠有海印國師者交通權貴人肆為姦利人莫敢正視公捕寘諸法一縣大聳去為雩都老吏曾腆侮法粥獄以公少年易之公視事之日首得其重罪腆叩頭出血願自新公戒而捨之㑹公築縣學腆以家財助官悉遣子弟入學卒為善吏而子弟有登進士第者巫覡嵗歛民財祭鬼謂之春齋否則有火災民訛言有緋衣三老人行火公禁之民不敢犯火亦不作毁淫祠數百區勒巫為農者七十餘家及罷去父老送之出境遣去不可皆泣曰公捨我去緋衣老人復出矣以母老乞歸蜀得劍州臨津以母憂去官服除為開封府司錄福勝塔火官欲更造度用錢三萬萬公言陜西方用兵願以此餽軍詔罷之先趙元昊未反青州民趙禹上書論事且言元昊必反宰相以禹為狂言徙建州而元昊果反禹自建州逃還京師上書自理宰相怒下禹開封府獄公言禹可賞不可罪與宰相爭不巳上卒用公言以禹為徐州推官且欲以公為御史㑹外戚沈氏子以姦盗殺人事下獄未服公一問得其情驚仆立死沈氏訴之詔御史劾公及諸掾史公曰殺此賊者獨我耳遂自引罪坐廢朞年盜起京西殺守令富丞相薦公可用起知房州州素無兵備民凛凛欲亡去公以牢城卒雜山河戸得數百人日夜部勒聲振山南民恃以安盗不敢入境而殿侍雷甲以兵百餘人逐盗至竹山甲不能戢士所至為暴或告有大盜入境且及門公自勒兵阻水拒之身居前行命士持滿無得發士皆植立如偶人甲射之不動乃下馬拜請死曰初不知公官軍也吏士請斬甲以徇公不可獨治為暴者十餘人勞其餘而遣之使甲以捕盜自贖時劇賊党軍子方張轉運使使供奉官崔徳贇捕之徳贇既失党軍子則以兵圍竹山民賊所嘗舎者曰向氏殺其父子三人梟首南陽市曰此党軍子也公察其寃下徳贇獄未服而党軍子獲於商州詔賜向氏帛復其家流徳贇通州或言華隂人張元走夏州為元昊謀臣詔徙其族百餘口於房譏察出入饑寒且死公曰元事虚實不可知使誠有之為國者終不顧家徒堅其為賊耳此又皆其疎屬無罪乃宻以聞詔釋之老㓜哭庭下曰今當還故鄉然奈何去父母乎至今張氏畫像祠焉代還執政欲以為大理少卿公曰法吏守文非所願願得一郡以自效乃以為宿州州跨汴為橋水與橋爭率常壊舟公始作飛橋無柱至今沿汴皆飛橋移滑州奏事殿上仁宗皇帝勞之曰知卿疾惡無懲沈氏子事未行詔提舉河北便糴都轉運使魏瓘劾奏公擅增損物價已而瓘除龍圖閣學士知開封府公乞廷辯既對上直公奪瓘職知越州且欲用公公言臣與轉運使不和不得為無罪力請還滑㑹河溢魚池埽且决公發禁兵捍之廬於所當决吏民涕泣更諫公堅卧不動水亦漸去人比之王尊是嵗盗起宛句執濮州通判井淵上以為憂問執政誰可用者未及對上曰吾得之矣乃以公為曹州不逾月悉禽其黨淮南饑安撫轉運使皆言夀春守王正民不任職正民坐免詔公乗傳徃代之轉運使調里胥米而蠲其役凡十三萬石謂之折役米米翔貴民益饑公至則除之且表其事旁郡皆得除又言正民無罪職事辦治詔復以正民為鄂州徙知廬州虎翼軍士屯夀春者以謀反誅而遷其餘不反者數百人於廬士方自疑不安一日有竊入府舎將為不利者公笑曰此必醉耳貸而流之盡以其餘給左右使令且以守倉庫人為公懼公益親信之士皆指心誓為公死提㸃刑獄江東又移河北入為開封府判官改判三司户部勾院又兼開折司榮州煮鹽凡十八井嵗久漸竭而有司責課如初民破産籍没者三百一十五家公為言還其所籍嵗蠲三十餘萬斤三司簿書不治其滯留者自天禧以來朱帳六百有四明道以來生事二百一十二萬公日夜課吏凡九月而去其三之二㑹接伴契丹使還自請補外乃以為京西轉運使石塘河役兵叛其首周元自稱周大王震動汝洛間公聞之即日輕騎出按吏請以兵從公不許賊見公輕出意色閑和不能測則相與列訴道周公徐問其所苦命一老兵押之曰以是付葉縣聽吾命既至令曰汝已自首皆無罪然必有首謀者衆不敢隠乃斬元以狥而流軍挍一人其餘悉遣赴役如初遷京東轉運使維州參軍王康赴官道博平博平大猾有號截道虎者毆康及其女幾死吏不敢聞博平𨽻河北公移捕甚急卒流之海島而劾吏故縱坐免者數人山東群盜為是屏息徐州守陳昭素以酷聞民不堪命他使者不敢按公發其事徐人至今徳之移知鳳翔倉粟支十二年主者以腐敗為憂嵗饑公發十二萬石以貸有司憂恐公以身任之是嵗大熟以新易陳官民皆便之于闐使者入朝過秦州經略使以客禮享之使者驕甚留月餘壊傳舎什物無數其徒入市掠飲食人戸晝閉公聞之謂其僚曰吾嘗主契丹使得其情契丹初不敢暴横皆譯者教之吾痛繩以法譯者懼契丹不敢動矣况此小國乎乃使教練使持符告譯者曰入吾境有秋毫不如法吾且斬若取軍令狀以還使者亦素聞公威名至則羅拜庭下公命坐兩廊飲食之䕶出諸境無一人譁者始州郡以酒相餉例皆私有之而法不可公以遺士之貧者既而曰此亦私也以家財償之且上書自劾求去不巳坐是分司西京未幾致仕卒享年六十四仕至太常少卿贈工部侍郎娶程氏子四人忱今為度支郎中恪卒於滑州推官恂今為大理寺丞慥未仕公善著書尤長於易有集十巻制器尚象論十二篇辨鉤隠圓五十四篇為人清勁寡欲長不逾中人面痩黑目光如氷平生不假人以色自王公貴人皆嚴憚之見義勇發不計禍福必極其志而後巳所至姦民猾吏易心改行不改者必誅然實出於仁恕故嚴而不殘以教學養士為急輕財好施篤於恩義少與蜀人宋輔游輔卒於京師母老子㓜公養其母終身而以女妻其孤端平使與諸子游學卒與忱同登進士第當䕃補子弟輙先其族人卒不及其子慥公與軾之先君子為丈人行而軾官於鳳翔實從公二年方是時年少氣盛愚不更事屢與公爭議至形於言色巳而悔之竊嘗以為古之遺直而恨其不甚用無大功名獨當時士大夫能言其所為公没十有四年故人長老日以衰少恐遂就湮沒欲私記其行事而恨不能詳得范景仁所為公墓誌又以所聞見補之為公傳軾平生不為行狀墓碑而獨為此文後有君子得以考覽焉贊曰聞之諸公長者陳公弼面目嚴冷語言確訒好面折人士大夫相與燕游聞公弼至則語笑寡味飲酒不樂坐人稍稍引去其天資如此然所立有絶人者諫大夫鄭昌有言山有猛獸藜藿為之不採淮南王謀反論公孫丞相若發蒙耳所憚獨汲黯使公弼端委立於朝其威折衝於千里之外矣唐宋八大家文鈔巻一百三十九
