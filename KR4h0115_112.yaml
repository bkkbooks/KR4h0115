body:
  text: 唐宋八大家文鈔卷一百四明茅坤撰南豐文鈔八記徐孺子祠堂記推漢之以亡為存歸功於孺子輩論有本末漢元興以後政出宦者小人挾其威福相煽為惡中材顧望不知所為漢既失其操柄紀綱大壞然在位公卿大夫多豪傑特起之士相與發憤同心直道正言分别是非白黑不少屈其意至於不容而織羅鉤黨之獄起其執彌堅而其行彌勵志雖不就而忠有餘故及其既殁而漢亦以亡當是之時天下聞其風慕其義者人人感慨奮激至於解印綬棄家族骨肉相勉赴死而不避百餘年間擅強大覬非望者相屬皆逡巡而不敢發漢能以亡為存蓋其力也孺子於時豫章太守陳蕃太尉黃瓊辟皆不就舉有道拜太原太守安車備禮召皆不至蓋忘巳以為人與獨善於隱約其操雖殊其志於仁一也在位士大夫抗其節於亂世不以死生動其心異於懷祿之臣逺矣然而不屑去者義在於濟物故也孺子嘗謂郭林宗曰大木將顛非一繩所維何為棲棲不皇寧處此其意亦非自足於丘壑遺世而不顧者也孔子稱顔回用之則行舍之則藏惟我與爾有是夫孟子亦稱孔子可以進則進可以止則止乃所願則學孔子而易於君子小人消長進退擇所宜處未嘗不惟其時則見其不可而止此孺子之所以未能以此而易彼也孺子姓徐名稚孺子其字也豫章南昌人按圖記章水北經南昌城西歷白社其西有孺子墓又北歷南塘其東為東湖湖南小洲上有孺子宅號孺子臺吳嘉禾中太守徐熙於孺子墓隧種松太守謝景於墓側立碑晉永安中太守夏侯嵩於碑旁立思賢亭世世修治至拓跋魏時謂之聘君亭今亭尚存而湖南小洲世不知其嘗為孺子宅又嘗為臺也豫為太守之明年始即其處結茆為堂圖孺子像祠以中牢率州之賓屬拜焉漢至今且千歲富貴堙滅者不可勝數孺子不出閭巷獨稱思至今則世之欲以智力取勝者非惑歟孺子墓失其地而臺幸可考而知祠之所以示邦人以尚德故并采其出處之意為記焉唐荆川曰此篇三假第一假敘黨錮諸賢及孺子事第二假比論二事第三假敘作亭閬州張矦廟記覽前大半篇曾公似薄張矦有不必祀之意其所按經典以相折衷處雖有本領而豫之意竊以張矦方其與關壽亭佐昭烈百戰以立帝業於蜀祭法所謂以勞定國則祀之者也恐須按此言為正姑録而存之以見子固自是一家言處事常蔽於其智之不周而辨常過於所惑智足以周於事而辨至於不惑則理之微妙皆足以盡之今夫推䇿灼龜審於夢寐其為事至淺世常尊而用之未之有改也坊庸道路馬蠶貓虎之靈其為類至細世常嚴而事之未之有廢也水旱之災日月之變與夫兵師疾癘昆蟲鼠豕之害凡一慝之作世常有祈有報未之有止也金縢之書雲漢之詩其意可謂至而其辭可謂盡矣夫精神之極其叩之無端其測之甚難而尊而信之如此其備者皆聖人之法何也彼有接於物者存乎自然世既不得而無則聖人固不得而廢之亦理之自然也聖人者豈用其聰明哉善因於理之自然而巳其智足以周於事而其辨足以不惑則理之微妙皆足以盡之也故古之有為於天下者盡巳之智而聽於人盡人之智而聽於神未有能廢其一也書曰朕志先定詢謀僉同鬼神其依龜筮協從所謂盡巳之智而聽於人盡人之智而聽於神也繇是觀之則荀卿之言以謂雩筮救日小人以為神者以疾夫世之不盡在乎巳者而聽於人不盡在乎人者而聽於神其可也謂神之為理者信然則過矣蔽生於其智之不周而過生於其所惑也閬州於蜀為巴西郡蜀車騎將軍領司𨽻挍尉西鄉張矦名飛字益德常守是州州之東有張矦之冢至今千有餘年而廟祀不廢每歲大旱禱雨輒應嘉祐中比數歲連熟閬人以謂張矦之賜也乃相與率錢治其廟舍大而新之矦以智勇為將號萬人敵當蜀之初與魏將張郃相距於此能破郃軍以安此土可謂功施於人矣其殁也又能澤而賜之則其食於閬人不得而廢也豈非宜哉知州事尚書職方員外郎李君獻卿字材叔以書來曰為我書之材叔好古君子也乃為之書而以豫之所聞于古者告之撫州顔魯公祠堂記魯公之臨大節而不可奪處凡四五而曾公之文亦足以畫一而點綴之令人讀之而泫然涕洟不能自巳贈司徒魯郡顔公諱真卿事唐為太子太師與其從父兄杲卿皆有大節以死至今雖小夫婦人皆知公之為烈也初公以忤楊國忠斥為平原太守策安祿山必反為之備祿山既舉兵與常山太守杲卿伐其後賊之不能直窺潼關以公與杲卿撓其勢也在肅宗時數正言宰相不悅斥去之又為御史唐旻所搆連輒斥李輔國遷太上皇居西宮公首率百官請問起居又輒斥代宗時與元載爭論是非載欲有所壅蔽公極論之又輒斥楊炎盧杞既相德宗益惡公所為連斥之猶不滿意李希烈陷汝州杞即以公使希烈希烈初慙其言後卒縊公以死是時公年七十有七矣天寶之際久不見兵祿山既反天下莫不震動公獨以區區平原遂折其鋒四方聞之爭奮而起唐卒以振者公為之倡也當公之開土門同日歸公者十七郡得兵二十餘萬繇此觀之苟順且誠天下從之矣自此至公殁垂三十年小人繼續任政天下日入於弊大盜繼起天子輒出避之唐之在朝臣多畏怯觀望能居其間一忤於世失所而不自悔者寡矣至於再三忤於世失所而不自悔者蓋未有也若至於起且仆以至於七八遂死而不自悔者則天下一人而巳若公是也公之學問文章往往雜於神仙浮屠之説不皆合於理及其奮然自立能至於此者蓋天性然也故公之能處其死不足以觀公之大何則及至於勢窮義有不得不死雖中人可勉焉況公之自信也歟維歷忤大姦顛跌撼頓至於七八而終始不以死生禍福為秋毫顧慮非篤於道者不能如此此足以觀公之大也夫世之治亂不同而士之去就亦異若伯夷之清伊尹之任孔子之時彼各有義夫既自比於古之任者矣乃欲眷顧回隱以市於世其可乎故孔子惡鄙夫不可以事君而多殺身以成仁者若公非孔子所謂仁者歟今天子至和三年尚書都官郎中知撫州聶君某尚書屯田員外郎通判撫州林君某相與慕公之烈以公之嘗為此邦也遂為堂而祠之既成二君過豫之家而告之曰願有述夫公之赫赫不可盡者固不繫於祠之有無蓋人之嚮往之不足者非祠則無以致其志也聞其烈足以感人況拜其祠而親炙之者歟今州縣之政非法令所及者世不復議二君獨能追公之節尊而事之以風示當世為法令之所不及是可謂有志者也唐荆川曰此文三假第一假敘第二假議論第三假敘立祠之事敘事議論處皆以捍賊忤姦分作兩項而混成一片絶無痕迹此是可法處又曰歐陽公於王彥章之忠則略之而獨言其善出奇曾子固於顔魯公之捍賊則略之而獨言忤姦而不悔此是文之微顯闡幽處尹公亭記藴思鑄辭動中經緯君子之於己自得而巳矣非有待於外也然而曰疾沒世而名不稱焉者所以與人同其行也人之於君子潛心而巳矣非有待於外也然而有表其閭名其鄉欲其風聲氣烈暴於世之耳目而無窮者所以與人同其好也內有以得諸巳外有以與人同其好此所以為先王之道而異乎百家之説也隨為州去京師遠其地僻絶慶厯之間起居舍人直龍圖閣河南尹公洙以不為在勢者所容謫是州居於城東五里開元佛寺之金燈院尹公有行義文學長於辨論一時與之遊者皆世之聞人而人人自以為不能及於是時尹公之名震天下而其所學蓋不以貧富貴賤死生動其心故其居於隨日考圖書通古今為事而不知其官之為謫也嘗於其居之北阜竹柏之間結茅為亭以茇為嬉歲餘乃去既去而人不忍廢壞輒理之因名之曰尹公之亭州從事謝景平刻石記其事至治平四年司農少卿贊皇李公禹卿為是州始因其故基增庳益狹斬材以易之陶瓦以覆之既成而寬深亢爽環隨之山皆在几席又以其舊亭峙之於北於是隨人皆喜慰其思而又獲遊觀之美其冬李公以圖走京師屬豫記之蓋尹公之行見於事言見於書者固巳赫然動人而李公於是又侈而大之者豈獨慰隨人之思於一時而與之共其樂哉亦將使夫荒遐僻絶之境至於後人見聞之所不及而傳其名覽其迹者莫不低回俯仰想尹公之風聲氣烈至於愈逺而彌新是可謂與人同其好也則李公之傳於世亦豈有巳乎故豫為之書時熙寧元年正月日也墨池記看他小小題而結搆却逺而正臨川之城東有地隱然而高以臨于溪曰新城新城之上有池窪然而方以長曰王羲之之墨池者荀伯子臨川記云也羲之嘗慕張芝臨池學書池水盡黑此為其故迹豈信然邪方羲之之不可強以仕而嘗極東方出滄海以娛其意於山水之間豈有徜徉肆恣而又嘗自休於此邪羲之之書晚乃善則其所能蓋亦以精力自致者非天成也然後世未有能及者豈其學不如彼耶則學固豈可以少哉況欲深造道德者耶墨池之上今為州學舍教授王君盛恐其不章也書晉王右軍墨池之六字於楹間以揭之又告於鞏曰願有記惟王君之心豈愛人之善雖一能不以廢而因以及乎其迹邪其亦欲推其事以勉其學者邪夫人之有一能而使後人尚之如此況仁人莊士之遺風餘思被於來世者如何哉飲歸亭記渾雄中并見典刑金溪尉汪君名遘為尉之三月斥其四垣為射亭既成教士於其間而名之曰飲歸之亭以書走臨川請記於豫請數反不止豫之言何足取汪君徒深望豫也既不得辭乃記之曰射之用事巳逺其先之以禮樂以辨德記之所謂賔燕鄉飲大射之射是也其貴力而尚技以立武記之所謂四時教士貫革之射是也古者海內洽和則先禮射而弓矢以立武亦不廢於有司及三代衰王政缺禮樂之事相屬而盡壞揖讓之射滋亦熄至其後天下嘗集國家嘗間暇矣先王之禮其節文皆在其行之不難然自秦漢以來千有餘歲衰微絀塞空見於六藝之文而莫有從事者由世之苟簡者勝也爭奪興而戰禽攻取之黨奮則強弓疾矢巧技之出不得而廢其不以勢哉今尉之挍射不比乎禮樂而貴乎技力其衆雖小然其旗旄鐲鼓五兵之器便習之利與夫行止步趨遲速之節皆宜有法則其所教亦非獨射也其幸而在乎無事之時則得以自休守境而填衛百姓其不幸殺越剽攻駭驚閭巷而並逐於大山長谷之間則將犯晨夜蒙霧露陷厄馳危不避矢石之患湯火之難出入千里而與之有事則士其可以不素教哉今亭之作所以教士汪君又謂古者師還必飲至於廟以紀軍實今廟廢不設亦欲士勝而歸則飲之於此遂以名其亭汪君之志與其識可謂協矣或謂汪君儒生尉文吏以禮義禁盜宜可止顧乃習鬬而喜勝其是歟夫治固不可以不兼文武而施澤於堂廡之上服冕搢笏使士民化姦宄息者固亦在彼而不在此也然而天下之事能大者固可以兼小未有小不治而能大也故汪君之汲汲於斯不忽乎任小而非所謂有志者耶廣德軍重修鼓角樓記幅尺自好熙寧元年冬廣德軍作新門鼓角樓成太守合文武賔屬以落之既而以書走京師屬鞏曰為我記之鞏辭不能書反覆至五六辭不獲乃為其文曰蓋廣德居吳之西疆故鄣之墟境大壤沃食貨富穰人力有餘而獄訟赴訴財貢輸入以縣附宣道路回阻衆不便利歷世久之太宗皇帝在位四年乃按地圖因縣立軍使得奏事專決體如大邦自是以來田里辨爭歲時稅調始不勤遠人用宜之而門閣隘庫樓觀弗飾於以納天子之命出令行化朝夕吏民交通四方覽示賓客弊在簡陋不中度程治平四年尚書兵部員外郎知制誥錢公輔守是邦始因豐年聚材積土將改而新之會尚書駕部郎中朱公壽昌來繼其任明年政成封內無事乃擇能吏揆時庀徒以畚以築以繩以削門阿是經觀闕是營不督不期役者自勸自冬十月甲子始事至十二月甲子卒功崇墉崛興復宇相瞰壯不及僣麗不及奢憲度政理於是出納士吏賓客於是馳走尊施一邦不失宜稱至於伐鼓鳴角以警昏昕下漏數刻以節晝夜則又新是四器列而棲之邦人士女易其聽觀莫不悅喜推美誦勤夫禮有必隆不得而殺政有必舉不得而廢二公於是兼而得之宜刻金石以書美實使是邦之人百世之下於二公之德尚有考也歸老橋記文有古者詩人風刺之義録之武陵柳侯圖其青陵之居屬豫而敘以書曰武陵之西北有湖屬于梁山者白馬湖也梁山之西南有田屬于湖上者吾之先人青陵之田也吾築廬於是而將老焉青陵之西二百步有泉出於兩崖之間而東注于湖者曰采陵之澗吾為橋於其上而為屋以覆之武陵之往來有事於吾廬者與吾異日得老而歸皆出於此也故題之曰歸老之橋維吾先人遺吾此土者宅有桑麻田有粳稌而渚有蒲蓮弋于高而追鳬雁之下上緡于深而逐鱣鮪之潛泳吾所以衣食其力而無愧於心也息有喬木之繁隂藉有豐草之幽香登山而凌雲覽天地之奇變弄泉而乘月遺氛埃之溷濁此吾所以處其怠倦而樂於自遂也吾少而安焉及壯而從事于四方纍乎萬物之自外至者未嘗不思休于此也今又獲位于朝而榮於寵祿以為觀遊于此而吾亦將老矣得無志於歸哉又曰世之老於官者或不樂於歸幸而有樂之者或無以為歸今吾有是以成吾樂也其為我記之使吾後人之有考以承吾志也余以謂先王之養老者備矣士大夫之致其位者曰不敢煩以政蓋尊之也而士亦皆明於進退之節無留祿之人可謂兩得之也後世養老之具既不備士大夫之老於位者或擯而去之也然士猶有冒而不知止者可謂兩失之也今柳侯年六十齒髮未衰方為天子致其材力以惠澤元元之時雖欲遺章綬之榮從湖山之樂余知未能遂其好也然其志於退也如此聞其風者亦可以興起矣乃為之記越州趙公救災記趙公之救災絲理髮櫛無一遺漏而曾公之記其事亦絲理髮櫛而無一不入於機杼及其髻總救災者熟讀此文則於地方之流亡如掌股間矣熙寧八年夏吳越大旱九月資政殿大學士右諫議大夫知越州趙公前民之未飢為書問屬縣災所被者幾鄉民能自食者有幾當廪於官者幾人溝防構築可僦民使治之者幾所庫錢倉粟可發者幾何富人可募出粟者幾家僧道士食之羡粟書於籍者其幾具存使各書以對而謹其備州縣吏録民之孤老疾弱不能自食者二萬一千九百餘人以告故事歲廪窮人當給粟三千石而止公斂富人所輸及僧道士食之羡者得粟四萬八千餘石佐其費使自十月朔人受粟日一升幼小半之憂其衆相蹂也使受粟者男女異日而人受二日之食憂其且流亡也於城市郊野為給粟之所凡五十有七使各以便受之而告以去其家者勿給計官為不足用也取吏之不在職而寓於境者給其食而任以事不能自食者有是具也能自食者為之告富人無得閉糶又為之出官粟得五萬二千餘石平其價豫民為糶粟之所凡十有八使糴者自便如受粟又僦民完城四千一百丈為工三萬八千計其傭與錢又與粟再倍之民取息錢者告富人縱豫之而待熟官為責其償棄男女者使人得收養之明年春大疫為病坊處疾病之無歸者募僧二人屬以視醫藥飲食令無失所時凡死者使在處隨收瘞之法廪窮人盡三月當止是歲盡五月止而事有非便文者公一以自任不以煩其屬有上請者或便宜多輒行公於此時蚤夜憊心力不少懈事巨細必躬親給病者藥食多出私錢民不幸罹旱疫得免於轉死雖死得無失斂埋皆公力也是時旱疫被於吳越民飢饉疾癘死者殆半災未有巨於此也天子東向憂勞州縣推布上恩人人盡其力公所拊循民尤以為得其依歸所以經營綏輯先後始終之際委曲纎悉無不備者其施雖在越其仁足以示天下其事雖行于一時其法足以傳後世蓋災沴之行治世不能使之無而能為之備民病而後圖之與夫先事而為計者則有間矣不習而有為與夫素得之者則有間矣豫故采於越得公所推行樂為之識其詳豈獨以慰越人之思將使吏之有志於民者不幸而遇歲之災推公之所巳試其科條可不待頃而具則公之澤豈小且近乎公元豐二年以大學士加太子少保致仕家于衢其直道正行在於朝廷豈弟之實在於身者此不著著其荒政可師者以為越州趙公救災記云唐宋八大家文鈔卷一百四
