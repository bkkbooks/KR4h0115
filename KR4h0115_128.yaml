body:
  text: 東坡本傳蘇軾字子瞻眉山人軾㓜穎悟有識比冠博通經史好賈誼陸贄莊子書嘉祐二年試禮部歐陽修寘第二復以春秋對義居第一殿試中乙科後以書見修修語梅聖俞曰吾當避此人岀一頭地五年調福昌主簿復對制策入三等自宋以來制策入三等惟呉育與軾耳除大理評事簽書鳯翔府判官治平二年入判登聞鼔院英宗自藩邸聞其名欲以唐故事召入翰林知制誥宰相韓琦曰軾遠大器也他日自當爲天下用要在朝廷培養之今驟用之則天下之士未必以爲然適足以累之也且請召試及試二論復入三等得直史館軾聞琦語曰公可謂愛人以德矣父䘮除還朝適王安石執政素惡其異已以判官告院旣而安石欲變科舉興學校詔兩制三館議軾議上神宗卽日召對軾曰陛下天縱文武不患不明不患不勤不患不斷但患求治太急聽言太廣進人太銳願鎭以安靜待物之來然後應之帝悚然曰朕當熟思之安石不悅命權開封府推官將困之以事軾決㫁精敏聲聞益遠時安石創新法軾上書論之軾見安石贊帝以獨㫁專任因試進士發策以晉武平呉獨斷而克苻堅伐晉獨㫁而亡齊桓專任管仲而霸燕噲專任子之而敗事同而功異爲問安石滋怒使御史謝景温論奏其過窮治無所得軾遂請外通判杭州徙知宻州又徙徐州河決曹村泛溢匯城下漲不時洩城將敗軾詣武衞營呼卒長爲盡力卒長曰太守猶不避塗潦吾儕小人當效命率其徒持畚鍤以出遂築東南長堤雨日夜不止城不沈者三版復請於朝增築故城為木岸以虞水之再至徙知湖州御史李定舒亶何正言摭謝表語并媒蘖託諷詩以爲訕謗逮赴臺獄欲寘之死帝獨憐之以黃州團練副使安置軾築室於東坡自號東坡居士帝嘗語宰相王珪蔡確命蘇軾成國史珪有難色帝曰軾不可姑用曾鞏鞏進太祖總論帝意不允手札移軾汝州軾未至汝上書自言饑寒有田在常願居之朝奏夕報可道過金陵見王安石曰大兵大獄漢唐滅亡之兆今西方連年用兵東南數起大獄公獨無一言以救乎安石曰二事皆惠卿啓之安石在外安敢言安石又曰人須知行一不義殺一不辜得天下弗爲乃可軾戲曰今之君子爭減半年磨勘雖殺人亦爲之哲宗立連擢起居舍人元祐元年遷中書舍人朝廷以范純仁言復散青苗錢司馬光請申嚴抑配之禁軾繳奏光是軾議請對遂止初祖宗行差役充役者多不習又虐使之有終嵗不得息者安石改爲免役使戶差高下岀錢雇役行法者過取爲民病光欲復差役軾曰差役免役各有利害光曰於君何如軾曰法相因則事易成事有漸則民不驚三代之法兵農爲一至秦始分爲二及唐中葉變府兵爲長征之卒自是農岀穀帛以養兵兵岀性命以衞農雖聖人復起不能易也今免役實大類此公欲驟罷免役行差役正如罷長征復民兵葢未易也光不以爲然軾又陳於政事堂光忿然軾曰昔韓魏公刺陜西義勇公爲諫官爭甚力韓公不樂公亦不顧豈今日作相不許軾盡言耶尋除翰林學士二年兼侍讀嘗讀祖宗寶訓因及時事軾歴言今賞罰不明善惡無所勸沮又黄河勢方北流而彊之使東夏人入鎭戎殺掠數萬人帥臣不以聞每事如此恐寖成衰亂之漸軾嘗鎖宿禁中召對便殿宣仁后曰卿官遽至此乃先帝意也先帝每誦卿文章必歎曰奇才奇才但未及進用卿耳軾不覺哭失聲宣仁后與哲宗亦泣左右皆感涕巳而命坐賜茶徹御前金蓮燭送歸院四年軾度不爲當軸者所容遂請外拜龍圖閣學士知杭州未行諫官論前蔡確非大臣議遷之嶺南軾宻疏朝廷不宜深罪爲仁政累宣仁后心善其言而不能用旣至杭大旱饑疫並作軾請減本路上供米又減價糶常平米多作饘粥藥劑活者甚衆杭本近海地泉鹹苦居民稀少唐刺史李泌始引西湖水作六井白居易又浚西湖水入漕河漑田千頃民以殷富湖水多葑宋廢不治葑積爲田水無㡬矣漕河失利六井亦幾廢軾見茅山一河專受江潮鹽橋一河專受湖水遂浚二河以通漕復造堰牐以爲蓄洩之限以餘力復完六井又取葑田積湖中南北徑三十里爲長堤以通行者堤成植芙蓉楊柳其上望之如畫圖杭人名爲蘇公堤浙江潮自海門東來勢如雷霆而浮山峙於江中與漁浦諸山犬牙相錯洄洑激射嵗敗公私船不可勝計軾議自江上流地名石門鑿漕河自慈浦北折扺小嶺浚古河以避浮山之險復言三呉之水瀦爲太湖太湖之水溢爲松江以入海慶厯以來松江築挽路扼塞故今三呉多水欲鑿挽路爲十橋以迅江勢俱不果用人以爲恨軾再莅杭有德於民家有畫像飲食必祝作生祠云六年召爲吏部尚書未至以弟轍除右丞改翰林承㫖數月復以讒請外乃以龍圖閣學士知潁州七年徙揚州未閱嵗召爲兵部尚書兼侍讀郊祀爲鹵簿使皇后及大長公主乘犢車不避儀仗軾劾奏之駕囘詔皇后而下毋迎謁遷禮部尚書兼端明殿翰林侍讀兩學士高麗遣使請書朝廷以故事許之軾曰漢東平王請諸子及太史公書猶不肯予今高麗所請有甚于此其可予乎不聽八年宣仁后崩哲宗親政軾乞補外以兩學士知定州時國事將變軾不得入辭旣行上書云云定州軍政壞弛會春大閲軾命舉舊典帥常服岀帳中將吏戎服執事無敢慢者定人言自韓琦後不見此禮至今矣初宣仁在時侍御史賈易監察御史董敦逸黄慶基先後論軾及弟轍所作文詞譏斥先朝三人者皆坐黜及紹聖初御史復以爲言謫軾知英州未至貶寧遠軍節度副使惠州安置居三年又貶瓊州别駕居昌化昌化故儋耳地非人所居藥餌皆無有初僦官屋有司猶謂不可軾遂買地築室儋人運甓畚土助之獨與㓜子過處著書爲樂徽宗立連徙永州更三大赦還提舉玉局觀復朝奉郎軾自元祐以來未嘗以嵗課乞遷故官止於此未㡬卒于常州年六十六軾與轍爲文章俱師其父弱冠父子兄弟至京師一日而聲名赫然動於四方軾嘗自謂作文如行雲流水初無定質但當行於所當行止於所不可不止雖嬉笑怒罵之辭皆可書而誦之其體渾涵光芒雄視百代有文章以來葢亦鮮矣洵晚作易傳未究命軾述其志軾成易傳復作論語說後居海南作書傳又有東坡等集奏議内外制和陶詩一時文人如黄庭堅晁補之秦觀張耒陳師道舉世未之識軾待之如朋儔未嘗以師資自予也自爲舉子至出入侍從必以愛君爲本挺挺大節每爲小人忌惡身後猶編名元祐黨毁文集刋行者高宗即位贈資政殿學士以其孫符爲禮部尚書又以其文寘左右讀之忘倦親製集贊賜曾孫嶠遂崇贈太師諡文忠三子邁迨過俱善爲文
