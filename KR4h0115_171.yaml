body:
  text: 唐宋八大家文鈔巻一百五十七明茅坤撰潁濱文鈔十三策君術策一君術五篇亦是一篇大畧欲人君知所以御天下之術而行文甚紆徐百折當熟看波瀾處天下之事非宰相不可盡行非諫官不可盡言天下之人誰能必至於諫官宰臣者惟其少而學之長而欲行之終其身而不當其位不可以侵官而求盡其意是故士大夫之間猶有不能自盡其才於天子者也今臣幸而生於天下無事之時每一間歳天子常詔兩制大臣使舉天下之士上自登朝之吏而下至於山林之匹夫咸得竭其所懷以盡天下之利害非天子出納耳目之官而得以言萬民之情偽非天子黜陟賞罰之臣而得以論百官之長短非天子武力將帥之士而得以議兵革之强弱非天子錢糓大農之吏而得以搉財用之多少葢天下之人非必為宰相諫官而後可盡行而盡言者使之一旦得以詳數而悉説之此有以見天子之意所以待之者甚重而不輕也而臣何敢以無説而處於此臣常以為天下之事雖其甚大而難辦者天下必有能辦之人葢當今之所謂大患者不過曰四夷强盛而兵革不振百姓凋弊而官吏不飭重賦厚歛而用度不足嚴法峻令而姦宄不止此四患者所以使天子坐不安席中夜太息而不寐者也然臣皆以為不足憂何者天下必有能為天子出力而為之者而臣之所憂在乎天下之所不能如之何者也臣聞善治天下者必明於天下之情而後得御天下之術術者所謂道也得其道而以智加焉是故謂之術古之聖人惟其知天下之情而以術制之也故萬物皆可得而役其生皆可得而制其死牛服於箱馬服於轅鷹隼服於韝牛不可以有所觸馬不可以有所踶鷹隼不可以有所擊此三者喜怒好惡之情發於其外而見於人也是以因其所忌而授之以其術至於終身制於人而不去且治天下何異於治馬也馬之性剛狠而難制急之則弊而不勝緩之則惰而不進王良造父為之先後而制其遲速驅之有方而掣之有時則終日躞躞而不知止此術之至也古之聖人驅天下之人而盡用之仁者使效其仁勇者使效其勇智者使效其智力者使效其力天下之人雖雜然皆列於前安得仁人君子而後任之且雖有天下之善人與之處而不知其情御之而不中其病則雖有好善之心而不獲好善之利何者彼不徒為吾用也而况乎天下之英雄欲收其功而不制其心哉昔者秦漢之際姦宄猛悍之人所在而為冦髙祖發於豐沛之間行而收之黥布彭越之倫皆撫而納諸其中其所以制之者甚備也玉帛子女牛羊犬馬以極其豪侈之心輕財好施敦厚長者以服其趦趄之懷倨肆傲岸輕侮凌辱以折其强狠之氣其視天下之英雄不啻若匹夫孺子然皆得其歡心而用其死力至於元成之世天下久於太平士大夫生於其間無復英雄難制之風天下之士皆書生好儒其才氣勇力無足畏者俛首下氣求為之用而不暇元成哀平亦欲得天下之賢才而用之然而不知其情不獲其術賢人君子避讒畏譏逺引而去而小人宦豎縱横放肆而制其事此甚可憫也夫人之平居朋友之間僕妾之際莫不有術以制其變葢非有深逺難見之事也欲其用命而見其所害欲其樂從而見其所利欲其喜而致其所悦欲其懼而致其所忌欲其開心見誠而示之以無所恐欲其守死不去而示之以無所往此天下之人皆能知之而至於治天下則不能用且此過矣天下以為天子之尊無所事術也而不知天下之事惟其英雄而後能有大功而世之英雄常苦豪横太過而難制由是觀之治天下愈不可以無術也子由借高帝駕御英雄一節作議論行文雖善而不切當世情事君術策二分兩扇總叙子由欲感悟主上察臣下之情以收其御臣下之術然通篇論古處透而影今處不切此其所以不及歐陽子也將求御天下之術必先明於天下之情不先明於天下之情則與無術何異夫天下之術臣固巳畧言之矣而又將竊言其情今使天子皆得賢人而任之雖可以無憂乎其為姦然猶有情焉而不可以不知葢臣聞之人有好為名髙者臨財推之以讓其親見位去之以讓其下進而天子禮焉則以為歡進而不禮焉則雖逼之而不食其祿方為亷恥之節以髙天下若是而天子不知焉而豢之以厚利則其心赧然有所不平人有好為厚利者見祿而就之以優其身見利而取之以豐其家良田大屋惟其與之則可以致其才如是而天子不知焉而强之以名高則其心缺然有所不悅於其中人惟無好自勝也好自勝而不少柔之則忿鬭而不和人惟無所相惡也有所相惡而不為少避之則事其私怒而不求成功素剛則無折之也素畏則無强之也强之則將不勝而折之則將不振凡此數者皆所以求用其才而不傷其心也然猶非所以馭天下之姦雄葢臣聞之天下之姦雄其為心也甚深而其為迹也甚微將營其東而形之於西將取其右而擊之於左古之人有欲得其君之權者不求之其君也優游翺翔而聽其君之所欲為使之得其所欲而油然自放以釋天下之權天下之權既去其君而無所歸然後徐起而收之故能取其權而其君不之知古之人有為之者李林甫是也夫人既獲此權也則思專而有之專而有之則常恐天下之人從而傾之夫人惟能自固其身而後可以謀人自固之不暇而欲謀人也實難故古之權臣常合天下之爭天下且相與爭而不解則其勢無暇及我是故可以久居而不可去古之人有為之者亦李林甫是也世之人君茍無好善之心幸而有好善之心則天下之小人皆將賣之以為姦何者有好善之名而不察為善之實天下之善固有可以謂之惡而天下之惡固有可以謂之善者彼知吾之欲為善也則或先之以善而終之以惡或有指天下之惡而飾之以善古之人有為之者石顯是也人之將欲為此釁也將欲建此事也必先得於其君欲成事而君有所不悦則事不可以成故古之姦雄刼之以其所必不能其所必不能者不可為也則將反而從吾之所欲為古之人有為之者驪姬之説獻公使之老而避禍是也此數者天下之至情故聖人見其初而求其終聞其聲而推其形葢惟能察人於無故之中故天下莫能欺何者無故者必有其故也古者明王在上天下之小人伏而不見夫小人者豈其能無意於天下也舉而見其情發而中其病是以愧恥退縮而不敢進臣欲天子明知君子之情以養當世之賢公名卿而深察小人之病以絶其自進之漸此亦天下之至明也君術策三蘇氏父子往往勸主上先刑罰本出申韓之餘似非人臣告君之正特對宋仁宗似屬對病之藥天下之道可以理得而不可以名推其於天下不取其形而獨取其意其道可以為善而亦可以為不善何者其道無常其道無常者不善之所從生也夫天下之人惟知不忍殺人之為仁也是故不忍殺人以自取不仁之名惟知果於殺人之為義也是故不敢不殺以自取不義之名是二名者其所以為仁者有形而其所以為義者有狀其進也有所執其規而其退也有所蹈其矩故其為人也不失為天下之善人而終不至於君子有所甚而不堪有所蔽而不見此其為人是鄉黨自全之人也今夫君子有所殺人以為仁而有所不殺以為義義不在殺人而仁不在於不殺其進也無所據依而其退也無所底麗故其成也天下將皆安之而其不成也將使天下至於大亂是以天下惡其難明而畏其難就人臣以是戒其君而人君者亦以自戒曰姑為無殺人以為仁而姑為果於殺人以為義是其仁可以全身而其義可以無謗於天下斯足以為無過也巳矣孟子有言曰責難於君謂之恭陳善閉邪謂之有禮而謂吾君不能者謂之賊且夫為人臣而詔其君不曰必為大人之仁義而曰姑為其易者以茍避天下之謗此非恐其君之不能之故歟葢臣聞之聖人之道惟其不可以名稱而迹求者其為道也甚深而難成而其成也亦不若小道之淺而無功所御甚廣而所處甚約握之甚微而播之無極故孔子曰吾非多學而識之吾一以貫之夫一者何也知天下萬物之理而制其所當處是為一矣而能得吾一者甚難故夫天下之畏之者亦不足怪也古之聖人已能知之則行之而無疑已不能知之則不敢以己之私意而破天下之公義使己而好殺人則天下安可盡殺以成義之名使己而不好殺人則天下安可盡無殺以成仁之形葢必有大臣救其已甚而補其不足使義不在於殺人而仁不在於不殺方今天下之治所不足者非仁也吏聞有以入人之罪抵重罰而未聞有以失人之罪抵深法者民聞有以赦除其罪而未聞有以不義得罪於法之外者此亦足以見天子之用心矣古者君臣之間和而不同上有寛厚之君則下有守法之臣上有急切之君則下有推恩之臣凡以交濟其所不足而彌縫其闕今也君臣之風上下如一而無以相濟是以天下苦於寛緩怠惰而不能自振此豈左右之大臣務以順從上意為悦而豈亦天子自信以為好仁之美而不喜臣下之有所矯拂哉方今之制易於行賞而重於用罰天下之以獄上者凡與死比則皆蹙頞而不悦此其為意夫豈不善然天下之姦人無以深懲而切戒之者此無乃為仁而至於不仁歟臣愚以為輔君之善而補其不足此誠大臣之事苟天子自信以為善欲以一人之私好而破天下之公義則夫大臣者猶不可為也惟知天子之仁義而無務其迹以成匹夫之節使大臣得叅於其間而救其所短此不亦近於天子之道歟唐荆川曰仁宗寛仁之過故當時有識之論每如此老泉上富公書亦如此君術策四熙寧元豐時其患在於急功利故於御臣下不得其道而子由習聞父兄所當仁廟時患其用仁過而法不行故以厲法禁之意繼之而通篇又以君臣相猜處為感慨議論古者君臣之間相信如父子相愛如兄弟朝廷之中優游悦懌歡然相得而無間知無所不言言無所不盡開心平意表裏洞達終身而不見其隙當此之時天下之人出身以事君委命於上而無所憂懼安神定氣以觀天下之政蕩然肆志有所欲為而上不見忌其所據者甚堅而無疑是以士大夫皆敢進而擅天下之大功至於後世君臣相虞皆有猜防之憂君不敢以其誠心致諸其臣而臣亦不敢直己以行事二者相與齟齬而不相信上下相顧鰓鰓然而不能以自安而尚何暇及於天下之利害故天下之事每每擾敗而無所成就臣竊傷之而以為其弊在於防禁之太深而督責之太急夫古之聖人至嚴而有所至寛至易而有所至險使天下有所易信而有所不可測用之各當其處而不失節是以天下畏其嚴而樂其寛至於後世之君徒知天下之不可以甚寛也而用之其君臣之際使其公卿大臣終日憂懼不得安意肆志以自盡於其上而以為畏威徒知天下之不可甚嚴也而用之其法律之事使其天下之官吏欺其長上得以茍免取容不畏天子之法而以為行惠葢其所以用之之術甚悖而不順者至於如此夫天下之人上自百官而下至於庶民其為姦安可窮盡而天子者以其一身寄乎其中論其衆寡之勢則天下至衆而天子至寡論其智詐巧偽之術則天下之衆固必有過於天子者吾欲臨之以天子之威則彼有畏憚而不敢言多為之隄防以御其變詐則彼之智將有以出於隄防之所不能及是以古之聖人推之以至誠而御之以無威容之以至寛而待之以至易以君子長者之心待天下之士而不防其為詐談笑議論無所不及以開其歡心故天下士大夫皆欣然而入於其中有所愧恥而不忍為欺詐之行力行果斷而無憂懼不敢之意其所任用雖其兄弟朋友之親而不顧狥私之名其所誅戮雖其仇怨眦睚之人而不恤報怨之嫌何者君臣相信之篤此所謂至嚴而有所至寛者也然至大吏縱横放肆犯法而無忌天下之所指目律令之所當取則雖天子有所不可輒釋使之一入而不可解而後天下知有所畏此所謂至易而有所至險二者其事不同而相與為用夫是以至寛而天下無頽惰靡迤之風至險而君臣無猜防逼廹之慮夫惟能通其君臣之歡而盡行其刑法之所禁而後可以及此也唐荆川曰古今説兩遍君術策五通篇行文如怒馬奔濤於千里之間馳驟澎𣲖而不可羇制者事有若緩而其變甚急者天下之勢是也天下之人幼而習之長而成之相咻而成風相比而成俗縱横顛倒紛紛而不知以自定當此之時其上之人刑之則懼驅之則聽其勢若無能為者然及其為變常至於破壞而不可禦故夫天子者觀天下之勢而制其所向以定其所歸者也夫天下之人弛而縱之拱手而視其所為則其勢無所不至其狀如長江大河日夜渾渾趨於下而不能止抵曲則激激而無所洩則咆勃潰亂蕩然而四出壞隄防包陵谷汗漫而無所制故善治水者因其所入而𨗳之則其勢不至於激怒坌湧而不可收既激矣又能徐徐而洩之則其勢不至於破決蕩溢而不可止然天下之人常狎其安流無事之不足畏也而不為去其所激觀其激作相慼潰亂未發之際而以為不至於大懼不能徐洩其怒是以遂至横流於中原而不可卒治昔者天下既安其人皆欲安坐而守之循循以為敦厚黙黙以為忠信忠臣義士之氣憤悶而不得發豪俊之士不忍其鬱鬱之心起而振之而世之士大夫好勇而輕進喜氣而不懾者皆樂從而羣和之直言忤世而不顧直行犯君而不忌今之君子累累而從事於此矣然天下猶有所不從其餘風故俗猶衆而未去相與抗拒而勝負之數未有所定邪正相搏曲直相犯二者潰潰而不知其所終極葢天下之勢已少激矣而上之人不從而遂決其壅臣恐天下之賢人不勝其忿而自決之也夫惟天子之尊有所欲為而天下從之今不為決之於上而聽其自決則天下之不同者將悻然而不服而天下之豪俊亦將奮踊不顧而力決之發而不中故大者傷小者死横潰而不可救譬如東漢之士李膺杜宻范滂張儉之黨慷慨議論本以矯拂世俗之弊而當時之君不為分别天下之邪正以決其氣而使天下之士發憤而自決之而天下遂以大亂由此觀之則夫英雄之士不可以不少遂其意也是以治水者惟能使之日夜流注而不息則雖有蛟龍鯨鯢之患亦將順流奔走奮迅豫悦而不暇及於為變茍其瀦畜渾亂壅閉而不決則水之百怪皆將勃然放肆求以自快其意而不可禦故夫天下亦不可不為少決以順適其意也唐荆川曰因風俗之所趨而決之子由此文真如長江大河唐宋八大家文鈔巻一百五十七
