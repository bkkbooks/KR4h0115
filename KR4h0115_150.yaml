body:
  text: 唐宋八大家文鈔卷一百三十八明茅坤撰東坡文鈔二十二策倡勇敢氣之一字極中兵情而通篇行文如虬龍之駕風雲而撼山谷而杳不可測戰以勇為主以氣為決天子無皆勇之將而將軍無皆勇之士是故致勇有術致勇莫先乎倡倡莫善乎私此二者兵之微權英雄豪傑之士所以隂用而不言於人而人亦莫之識也臣請得以備言之夫倡者何也氣之先也有人人之勇怯有三軍之勇怯人人而較之則勇怯之相去若莛與楹至於三軍之勇怯則一也不出於反覆之間而出於毫釐之際故權在將與君人固有暴猛獸而不操兵出入於白刃之中而色不變者有見虺蜴而却走聞鐘鼓之聲而戰栗者是勇怯之不齊至於如此彼閭閻之小民爭鬬戲笑卒然之間而或至於殺人當其發也其心翻然其色勃然若不可以已者雖天下之勇夫無以過之及其退而思其身顧其妻子未始不惻然悔也此非必勇者也氣之所乘則奪其性而忘其身故古之善用兵者用其翻然勃然於未悔之間而其不善者沮其翻然勃然之心而開其自悔之意則是不戰而先自敗也故曰致勇有術致勇莫先乎倡均是人也皆食其食皆任其事天下有急而有一人焉奮而爭先而致其死則翻然者衆矣弓矢相及劍楯相交勝負之勢未有所決而三軍之士屬目於一夫之先登則勃然者相繼矣天下之大可以名劫也三軍之衆可以氣使也諺曰一人善射百夫決拾茍有以發之及其翻然勃然之間而用其鋒是之謂倡倡莫善乎私天下之人怯者居其百勇者居其一是勇者難得也捐其妻子棄其身以蹈白刃是勇者難能也以難得之人行難能之事此必有難報之恩者矣天子必有所私之將將軍必有所私之士視其勇者而隂厚之人之有異材者雖未有功而其心莫不自異自異而上不異之則緩急不可以望其為倡故凡緩急而肯為倡者必其上之所異也昔漢武帝欲觀兵於四夷以逞其無厭之求不愛通侯之賞以招勇士風告天下以求奮擊之人然卒無有應者於是嚴刑峻法致之死地而聽其以深入贖罪使勉強不得已之人馳驟於死亡之地是故其將降而兵破敗而天下幾至於不測何者先無所異之人而望其為倡不已難乎私者天下之所惡也然而為己而私之則私不可用為其賢於人而私之則非私無以濟蓋有無功而可賞有罪而可赦者凡所以愧其心而責其為倡也天下之禍莫大於上作而下不應上作而下不應則上亦將窮而自止方西戎之叛也天子非不欲赫然誅之而將帥之臣謹守封略外視內顧莫有一人先奮而致命而士卒亦循循焉莫肯盡力不得已而出爭先而歸故西戎得以肆其猖狂而吾無以應則其勢不得不重賂而求和其患起於天子無同憂患之臣而將軍無同腹心之士西師之休十有餘年矣用法益密而進人益難賢者不益異勇者不見私天下務為奉法循令要以如式而止臣不知其緩急將誰為之倡哉唐荆川曰此篇體方而意圓定軍制經國之言自三代之衰井田廢兵農異處兵不得休而為民民不得息肩而無事於兵者千有餘年而未有如今日之極者也三代之制不可復追矣至於漢唐猶有可得而言者夫兵無事而食則不可使聚聚則不可使無事而食此二者相勝而不可並行其勢然也今夫有百頃之間田則足以牧馬千駟而不知其費聚千駟之馬而輸百頃之芻則其費百倍此易曉也昔漢之制有踐更之卒而無營田之兵雖皆出於農夫而方其為兵也不知農夫之事是故郡縣無常屯之兵而京師亦不過有南北軍期門羽林而已邉境有事諸侯有變皆以虎符調發郡國之兵至於事已而兵休則渙然各復其故是以其兵雖不知農而天下不至於弊者未嘗聚也唐有天下置十六衛府兵天下之府八百餘所而屯於關中者至有五百然皆無事則力耕而積榖不唯以自贍養而又有以廣縣官之儲是以其兵雖聚於京師而天下亦不至於弊者未嘗無事而食也今天下之兵不耕而聚於京畿三輔者以數十萬計皆仰給於縣官有漢唐之患而無漢唐之利擇其偏而兼用之是以兼受其弊而莫之分也天下之財近自淮甸而逺至乎吳蜀凡舟車所至人力所及莫不盡取以歸於京師晏然無事而賦斂之厚至於不可復加而三司之用猶苦其不給其弊皆起於不耕之兵聚於內而食四方之貢賦非特如此而已又有循環往來屯戍於郡縣者昔建國之初所在分裂擁兵而不服太祖太宗躬環甲胄力戰而取之既降其君而籍其疆土矣然其故基餘孽猶有存者上之人見天下之難合而恐其復發也於是出禁兵以戍之大自藩府而小至於縣鎮往往皆有京師之兵由此觀之則是天下之地一尺一寸皆天子自為守也而可以長久而不變乎費莫大於養兵養兵之費莫大於征行今出禁兵而戍郡縣逺者或數千里其月廪嵗給之外又日供其芻糧三嵗而一遷往者紛紛來者纍纍雖不過數百為輩而要其歸無以異於數十萬之兵三嵗而一出征也農夫之力安得不竭餽運之卒安得不疲且今天下未嘗有戰鬬之事武夫悍卒非有勞伐可以邀其上之人然皆不得為休息間居無用之兵者其意以為為天子出戍也是故美衣豐食開府庫輦金帛若有所負一逆其意則欲羣起而噪呼此何為者也天下一家且數十百年矣民之戴君至於海隅無有異於畿甸亦不必舉疑四方之兵而專信禁兵也曩者蜀之有妖賊與近嵗貝州之亂未必非禁兵致之臣愚以為郡縣之土兵可以漸訓而隂奪其權則禁兵可以漸省而無用天下武健豈有常所哉山川之所習風氣之所咻四方之民一也昔者戰國嘗用之矣蜀人之怯懦吳人之短小皆嘗以抗衡於上國又安得禁兵而用之今之土兵所以鈍弊力弱而不振者彼見郡縣皆有禁兵而待之異等是以自棄於賤𨽻役夫之間而將吏亦莫之訓也茍禁兵可以漸省而以其資糧益優郡縣之土兵則彼固以歡欣踴躍出於意外戴上之恩而願效其力又何遽不如禁兵耶夫土兵日以多禁兵日以少天子扈從捍城之外無所復用如此則內無屯聚仰給之費而外無遷徙供餽之勞費之省者又已過半矣戍禁兵不如募土兵今歲戍延綏之兵以衛薊遼無䇿之甚者教戰守宋之嘉祐間海內狃於晏安而恥言兵故子瞻特發此論夫當今生民之患果安在哉在於知安而不知危能逸而不能勞此其患不見於今而將見於他日今不為之計其後將有所不可救者昔者先王知兵之不可去也是故天下雖平不敢忘戰秋冬之隙致民田獵以講武教之以進退坐作之方使其耳目習於鐘鼓旌旗之間而不亂使其心志安於斬刈殺伐之際而不懾是以雖有盜賊之變而民不至於驚潰及至後世用迂儒之議以去兵為王者之盛節天下既定則卷甲而藏之數十年之後甲兵頓弊而人民日以安於佚樂卒有盜賊之警則相與恐懼訛言不戰而走開元天寶之際天下豈不大治惟其民安於太平之樂豢於遊戲酒食之間其剛心勇氣消耗鈍眊痿蹶而不復振是以區區之祿山一出而乘之四方之民獸奔鳥竄乞為囚虜之不暇天下分裂而唐室因以微矣蓋嘗試論之天下之勢譬如一身王公貴人所以養其身者豈不至哉而其平居常苦於多疾至於農夫小民終嵗勤苦而未嘗告病此其故何也夫風雨霜露寒暑之變此疾之所由生也農夫小民盛夏力作而窮冬暴露其筋骸之所衝犯肌膚之所浸漬輕霜露而狎風雨是故寒暑不能為之毒今王公貴人處於重屋之下出則乘輿風則襲裘雨則御蓋凡所以慮患之具莫不備至畏之太甚而養之太過小不如意則寒暑入之矣是故善養身者使之能逸而能勞步趨動作使其四體狃於寒暑之變然後可以剛健強力涉險而不傷夫民亦然今者治平之日久天下之人驕惰脆弱如婦人孺子不出於閨門論戰鬬之事則縮頸而股栗聞盜賊之名則掩耳而不願聽而士大夫亦未嘗言兵以為生事擾民漸不可長此不亦畏之太甚而養之太過歟且夫天下固有意外之患也愚者見四方之無事則以為變故無自而有此亦不然矣今國家所以奉西北之寇者嵗以百萬計奉之者有限而求之者無厭此其勢必至於戰戰者必然之勢也不先於我則先於彼不出於西則出於北所不可知者有遲速逺近而要以不能免也天下茍不免於用兵而用之不以漸使民於安樂無事之中一旦出身而蹈死地則其為患必有所不測故曰天下之民知安而不知危能逸而不能勞此臣所謂大患也臣欲使士大夫尊尚武勇講習兵法庶人之在官者教以行陳之節役民之司盜者授以擊刺之術每嵗終則聚於郡府如古都試之法有勝負有賞罰而行之既久則又以軍法從事然議者必以為無故而動民又撓以軍法則民將不安而臣以為此所以安民也天下果未能去兵則其一旦將以不教之民而驅之戰夫無故而動民雖有小怨然孰與夫一旦之危哉今天下屯聚之兵驕奢而多怨陵壓百姓而邀其上者何故此其心以為天下之知戰者惟我而已如使平民皆習於兵彼知有所敵則固以破其姦謀而折其驕氣利害之際豈不亦甚明歟䇿斷上順敘西北為中國患至深逺也天下謀臣猛將豪傑之士欲有所逞於西北者久矣聞之兵法曰先為不可勝以待敵之可勝嚮者臣愚以為西北雖有可勝之形而中國未有不可勝之備故竊嘗以為可特設一官使獨任其責而執政之臣得以専治內事茍天下之弊莫不盡去紀綱修明食足而兵強百姓樂業知愛其君卓然有不可勝之備如此則臣固將備論而極言之夫天下將興其積必有源天下將亡其發必有門聖人者唯知其門而塞之古之亡天下者四而天子無道不與焉蓋有以諸侯強逼而至於亡者周唐是也有以匹夫橫行而至於亡者秦是也有以大臣執權而至於亡者漢魏是也有以蠻夷內侵而至於亡者二晉是也使此七代之君皆能逆知其所由亡之門而塞之則至於今可以不廢惟其諱亡而不為之備或備之而不得其門故禍發而不救夫天子之勢蟠於天下而結於民心者甚厚故其亡也必有大隙焉而日潰之其窺之甚難其取之甚密曠日持久然後可得而間蓋非有一日卒然不救之患也是故聖人必於其全盛之時而塞其所由亡之門蓋臣以為當今之患外之可畏者西北二邊而內之可畏者天子之民也西北二邊不足以為中國之大憂而其動也有以召內之禍內之民實執存亡之權而不能獨起其發也必將待外之變先之以邊患而繼之以吾民臣之所謂可畏者在此而已昔者敵國之患起於多求而不供供者有倦而求者無厭以有倦待無厭而能久安於無事天下未嘗有也故夫西北之患特有逺近耳而要以必至於戰敢問今之所以戰者何也其無乃出於倉卒而備於一時乎且夫兵不素定而出於一時當其危疑擾攘之間而吾不能自必則權在敵國權在敵國則吾欲戰不能欲休不可進不能戰而退不能休則其計將出於求和求和而自我則其所以為媾者必重軍旅之後而繼之以重媾則國用不足國用不足則加賦於民加賦而不已則凡暴取豪奪之法不得不施於今之世矣天下一動變生無方國之大憂將必在此蓋嘗聞之用兵有權權之所在其國乃勝是故國無小大兵無強弱有小國弱兵而見畏於天下者權在焉耳千鈞之牛制於三尺之童弭耳而下之曽不如狙猿之奮擲於山林此其故何也權在人也我欲則戰不欲則守戰則天下莫能支守則天下莫能窺昔者秦嘗用此矣開關出征以攻諸侯則諸侯莫不願割地而求和諸侯割地而求和於秦秦人未嘗急於割地之利若不得已而後應故諸侯常欲和而秦常欲戰如此則權固在秦矣且秦非能強於天下之諸侯秦惟能自必而諸侯不能是以天下百變而卒歸於秦諸侯之利固在從橫也朝聞陳軫之説而合為從暮聞張儀之計而散為橫秦則不然橫人之欲為橫從人之欲為從皆使其自擇而審處之諸侯相顧而終莫能自必則權之在秦不亦宜乎嚮者寶元慶厯之間河西之役可以見矣其始也不得已而後戰其終也逆探其意而與之和又從而厚餽之惟恐其一日復戰也如此則賊常欲戰而我常欲和賊非能常戰也特恃其欲戰之形以乘吾欲和之勢屢用而屢得志是中國之大而權不在焉欲天下之安則莫若使權在中國欲權之在中國則莫若先發而後罷示之以不憚形之以好戰而後天下之權有所歸矣今夫庸人之論則曰勿為禍始古之英雄之君豈其樂禍而好殺唐太宗既平天下而又歲嵗出師以從事於外裔蓋晚而不倦暴露於千里之外親擊髙麗者再焉凡此者皆所以爭先而處強也當時群臣不能深明其意以為敵國無釁而我則發之夫為國者使人備已則權在我而使已備人則權在人當太宗之時四夷狼顧以備中國故中國之權重茍不先之則彼或以執其權矣而我又鰓鰓焉惡戰而樂罷使敵國知吾之所忌而以是取必於吾如此則雖有天下吾安得而為之唐之衰也惟其厭兵而畏戰有一敗衄則兢兢焉縮首而去之是故姦臣執其權以要天子及至憲宗奮而不顧雖小挫而不為之沮當此之時天下之權在於朝廷伐之則足以為威舍之則足以為恩臣故曰先發而後罷則權在我矣策斷中此文論大小情事刺骨用兵有可以逆為數十年之計者有朝不可以謀夕者攻守之方戰鬬之術一日百變猶以為拙若此者朝不可以謀夕者也古之欲謀人之國者必有一定之計勾踐之取吳秦之取諸侯髙祖之取項籍皆得其至計而固執之是故有利有不利有進有退百變而不同而其一定之計未始易也勾踐之取吳是驕之而已秦之取諸侯是散其從而已髙祖之取項籍是間疏其君臣而已此其至計不可易者雖百年可知也今天下晏然未有用兵之形而臣以為必至於戰則其攻守之方戰鬬之術固未可以豫論而臆斷也然至於用兵之大計所以固執而不變者臣請得以豫言之夫西戎北蕃皆為中國之患而西戎之患小北蕃之患大此天下之所明知也管仲曰攻堅則瑕者堅攻瑕則堅者瑕故二者皆所以為憂而臣以為兵之所加宜先於西故先論所以制御西戎之大略今夫鄒與魯戰則天下莫不以為魯勝大小之勢異也然而勢有所激則大者失其所以為大而小者忘其所以為小故有以鄒勝魯者矣夫大有所短小有所長地廣而備多備多而力分小國聚而大國分則強弱之勢將有所反大國之人譬如千金之子自重而多疑小國之人計窮而無所恃則致死而不顧是以小國常勇而大國常怯恃大而不戒則輕戰而屢敗知小而自畏則深謀而必克此又其理然也夫民之所以守戰至死而不去者以其君臣上下歡欣相得之際也國大則君尊而上下不文將軍貴而吏士不親法令繁而民無所措其手足若夫小國之民截然其若一家也有憂則相恤有急則相赴凡此數者是小國之所長而大國之所短也大國而不用其所長使小國常出於其所短雖百戰而百屈豈足怪哉且夫大國則固有所長矣長於戰而不長於守夫守者出於不足而已譬之於物大而不用則易以腐敗故凡擊摶進取所以用大也孫武之法十則圍之五則攻之倍則分之敵則能戰之少則能逃之不若則能避之自敵以上者未嘗有不戰也自敵以上而不戰則是以有餘而用不足之計固已失其所長矣凡大國之所恃吾能分兵而彼不能分吾能數出而彼不能應譬如千金之家日出其財以罔市利而販夫小民終莫能與之競者非知不若其財少也是故販夫小民雖有桀黠之才過人之智而其勢不得不折而入於千金之家何則其所長者不可以與較也西戎之於中國可謂小國矣嚮者惟不用其所長是以聚兵連年而終莫能服今欲用吾之所長則莫若數出數出莫若分兵臣之所謂分兵者非分屯之謂也分其居者與行者而已今河西之戍卒惟患其多而莫之適用故其便莫若分兵使其十一而行則一嵗可以十出十二而行則一嵗可以五出十一而十出十二而五出則是一人而嵗一出也吾一嵗而一出彼一嵗而十被兵焉則衆寡之不侔勞逸之不敵亦已明矣夫用兵必出於敵人之所不能我大而敵小是故我能分而彼不能此吳之所以肄楚而隋之所以狃陳歟夫御戍之術不可以逆知其詳而其大略臣未見有過此者也䇿斷下蘇氏父子之論敵情一一深中古者胸奴之衆不過漢一大縣然所以能敵之者其國無君臣上下朝覲會同之節其民無穀米絲麻耕作織絍之勞其法令以言語為約故無文書符傳之繁其居處以逐水草為常故無城郭邑居聚落守望之助其旃裘肉酪足以為養生送死之具故戰則人人自鬬敗則驅牛羊逺徙不可得而破蓋非獨古聖人法度之所不加亦其天性之所安者猶狙猿之不可使冠帶虎豹之不可被以羈紲也故中行説教單于無愛漢物所得繒絮皆以馳草棘中使衣袴弊裂以示不如旃裘之堅善也得漢食物皆去之以示不如重酪之便美也由此觀之中國以法勝而胸奴以無法勝聖人知其然是故精修其法而謹守之築為城郭塹為溝池大倉廩實府庫明烽燧逺斥堠使民知金鼓進退坐作之節勝不相先敗不相棄此其所以謹守其法而不敢失也一失其法則不如無法之為便也故夫各輔其性而安其生則中國與胡本不能相犯惟其不然是故皆有以相制胸奴之不可從中國之法猶中國之不可從胸奴之無法也今夫佩玉服紱冕而垂旒者此宗廟之服所以登降揖讓折旋俯仰為容者也而不可以騎射今夫蠻夷而用中國之法豈能盡如中國哉茍不能盡如中國而雜用其法則是佩玉服韍冕而垂旒而欲以騎射也昔吳之先斷髮文身與魚鱉龍蛇居者數十世而諸侯不敢窺也其後楚申公巫臣始教以乘車射御使出兵侵楚而闔廬夫差又逞其無厭之求開溝通水與齊晉爭強黃池之會強自冠帶吳人不勝其弊卒入於越夫吳之所以強者乃其所以亡也何者以蠻夷之資而貪中國之美宜其可得而圖之哉西晉之亡也胸奴鮮卑氐羌之類紛紜於中國而其豪傑間起為之君長如劉元海符堅石勒慕容雋之儔皆以絶異之姿驅駕一時之賢俊其強者至有天下大半然終於覆亡相繼逺者不過一傳再傳而滅何也其心固安於無法也而束縳於中國之法中國之人固安於法也而苦其無法君臣相戾上下相厭是以雖建都邑立宗廟而其心岌岌然常若寄居於其間而安能久乎且人而棄其所得於天之分未有不亡者也契丹自五代南侵乘石晉之亂奄至京師覩中原之富麗廟社宫闕之壯而悅之知不可以留也故歸而竊習焉山前諸郡既為所并則中國士大夫有立其廟者矣故其朝廷之儀百官之號文武選舉之法都邑郡縣之制以至於衣服飲食皆雜取中國之象然其父子聚居貴壯而賤老貪得而忘失勝不相讓敗不相救者猶在也其中未能革其桀驁不馴之性而外牽於華人之法此其所以自投於陷穽網羅之中而中國之人猶曰今之胸奴非古也其措制規畫皆不復蠻夷之心以為不可得而圖之亦過計矣且夫天下固有沉謀隂計之士也昔先王欲圖大事立竒功則非斯人莫之與共秦之尉繚漢之陳平皆以樽爼之間而制敵國之命此亦王者之心期以紓天下之禍而已彼契丹者有可乘之勢三而中國未之思焉則亦足惜矣臣觀其朝廷百官之衆而中國士大夫交錯於其間固亦有賢俊慷慨不屈之士而詬辱及於公卿鞭朴行於殿陛貴為將相而不免囚徒之恥宜其有惋憤鬱結而思變者特未有路耳凡此皆可以致其心雖不為吾用亦以間疏其君臣此由余之所以入秦也幽燕之地自古號多雄傑名於圖史者往往而是自宋之典所在賢俊雲合響應無有逺邇皆欲洗濯磨淬以觀上國之光而此一方獨陷於非類昔太宗皇帝親征幽州未克而班師聞之諜者曰幽州士民謀欲執其帥以城降者聞乘輿之還無不泣下且北人以為諸郡之民非其族類故厚斂而虐使之則其思內附之心豈待深計哉此又足為之謀也使其上下相猜君民相疑然後可攻也語有之曰鼠不容穴銜窶藪也彼僣立四都分置守宰倉廪府庫莫不具備有一旦之急適足以自纍守之不能棄之不忍華夷雜居易以生變如此則中國之長足以有所施矣然非特如此而已也中國不能謹守其法彼慕中國之法而不能純用是以勝負相持而未有決也夫蠻夷者以力攻以力守以力戰顧力不能則逃中國則不然其守以形其攻以勢其戰以氣故百戰而力有餘形者有所不守而敵人莫不忌也勢者有所不攻而敵人莫不憊也氣者有所不戰而敵人莫不懾也茍去此三者而角之於力則中國故不敵矣尚何云乎伏惟國家留意其大者而為之計其小者臣未敢言焉荆川曰此文極其變化橫發而不可羈制唐宋八大家文鈔卷一百三十八
