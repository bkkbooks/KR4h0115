body:
  text: 唐宋八大家文鈔卷七十八明茅坤撰廬陵史鈔十八世家嗚呼自唐失其政天下乘時黥髠盜販衮冕峩巍吳暨南唐姦豪竊攘蜀險而富漢險而貧貧能自强富者先亡閩陋荆蹙楚開蠻服剝剽弗堪吳越其尤牢牲視人嶺蛋遭劉百年之間並起爭雄山川亦絶風氣不通語曰清風興羣隂伏日月出爝火息故真人作而天下同作十國世家楊行密世家傳行密始末如畫不减史漢楊行密字化源廬州合肥人也為人長大有力能手舉百斤唐乾符中江淮羣盜起行密以為盜見獲刺史鄭棨奇其狀貌釋縛縱之後應募為州兵戍朔方遷隊長嵗滿戍還而軍吏惡之復使出戍行密將行過軍吏舍軍吏陽為好言問行密行何所欲行密奮然曰惟少公頭爾即斬其首攜之而出因起兵為亂自號八營都知兵馬使刺史郎幼復棄城走行密遂據廬州中和三年唐即拜行密廬州刺史淮南節度使高駢為畢師鐸所攻駢表行密行軍司馬行密率兵數千赴之行至天長師鐸已囚駢召宣州秦彥入揚州行密不得入屯于蜀岡師鐸率衆數萬出擊行密行密陽敗棄營走師鐸兵飢乘勝爭入營收軍實行密反兵擊之師鐸大敗單騎走入城遂殺髙駢行密聞駢死縞軍向城哭三日攻其西門彥及師鐸奔于東塘行密遂入揚州是時城中倉廩空虛飢民相殺而食其夫婦父子自相牽就屠賣之屠者刲剔如羊豕行密不能守欲走而蔡州秦宗權遣其弟宗衡掠地淮南彥及師鐸還自東塘與宗衡合行密閉城不敢出已而宗衡為偏將孫儒所殺儒攻髙郵破之行密益懼其客袁襲曰吾以新集之衆守空城而諸將多駢舊將非有厚恩素信力制而心服之也今儒兵方盛所攻必克此諸將持兩端因彊弱擇向背之時也海陵鎮使髙霸駢之舊將必不為吾用行密乃以軍令召霸霸率其兵入廣陵行密欲使霸守天長襲曰吾以疑霸而召之其可復用乎且吾能勝儒無所用霸不幸不勝天長豈吾有哉不如殺之以并其衆行密因犒軍擒霸族之得其兵數千已而孫儒殺秦彥畢師鐸并其兵以攻行密行密欲走海陵襲曰海陵難守而廬州吾舊治也城廩完實可為後圖行密乃走廬州久之未知所向問襲曰吾欲卷甲倍道西取洪州可乎襲曰鍾傳新得江西勢未可圖而秦彥之入廣陵也召池州刺史趙鍠委以宣州今彥且死鍠失所恃而守宣州非其本志且其為人非公敵此可取也行密乃引兵攻鍠戰于曷山大敗之進圍宣州鍠棄城走追及殺之行密遂入宣州龍紀元年唐拜行密宣州觀察使行密遣田頵安仁義李神福等攻浙西取蘇常潤州二年取滁和州景福元年取楚州孫儒自逐行密入廣陵久之亦不能守乃焚其城殺民老疾以餉軍驅其衆渡江號五十萬以攻行密諸將田頵劉威等遇之輒敗行密欲走銅官其客戴友規曰儒來氣鋭而兵多蓋其鋒不可當而可以挫其衆不可敵而可久以敝之若避而走是就擒也劉威亦曰背城堅柵可以不戰疲之行密以為然久之儒兵飢又大疫行密悉兵擊之儒敗被擒將死仰顧見威曰聞公為此䇿以敗我使我有將如公者其可敗耶行密收儒餘兵數千以皂衣䝉甲號黑雲都常以為親軍是嵗復入揚州唐拜行密淮南節度使乾寧二年加檢校太傅同中書門下平章事行密以田頵守宣州安仁義守潤州升州刺史馮宏鐸來附分遣頵等攻掠自淮以南江以東諸州皆下之進攻蘇州擒其刺史成及四年兖州朱瑾奔于行密初瑾為梁所攻求救于晉晉遣李承嗣將徑騎數千助瑾瑾敗因與俱奔行密行密兵皆江淮人淮人輕弱得瑾徑騎而兵益振是嵗梁太祖遣葛從周龎師古攻行密壽州行密擊敗梁兵清口殺師古而從周收兵走追至渒河又大敗之五年錢鏐攻蘇州及周本戰于白方湖本敗蘇州復入于越天復元年遣李神福攻越戰臨安大敗之擒其將顧全武以歸二年馮宏鐸叛襲宣州及田頵戰于曷山宏鐸敗將入于海行密自至東塘邀之使人謂宏鐸曰勝敗用兵常事也一戰之衄何苦自棄下海島吾府雖小猶足容君𢎞鐸感泣行密從十餘騎馳入其軍以𢎞鐸歸為節度副使以李神福代宏鐸為升州刺史是嵗唐昭宗在岐遣江淮宣諭使李儼拜行密東面諸道行營都統檢校太師中書令封吳王三年以李神福為鄂嶽招討使以攻杜洪荆南成汭救洪神福敗之于君山梁兵攻青州王師範來求救遣王茂章救之大敗梁兵殺朱友寧友寧梁太祖子也太祖大怒自將以擊茂章兵號二十萬復為茂章所敗田頵叛襲升州執李神福妻子歸于宣州行密召神福以討頵頵遣其將王壇逆之又遺神福書以其妻子招之神福曰吾以一卒從吳王起事今為大將忍背德而顧妻子乎立斬其使以自絶軍士聞之皆感奮行至吉陽磯頵執神福子承鼎以招之神福叱左右射之遂敗壇兵于吉陽行密别遣臺濛擊頵頵敗死初頵及安仁義朱延壽等皆從行密起微賤及江淮甫定思漸休息而三人者皆猛悍難制頗欲除之未有以發天復二年錢鏐為其將許再思等叛而圍之再思召頵攻鏐杭州垂克而行密納鏐賂命頵解兵頵恨之頵嘗計事廣陵行密諸將多就頵求賂而獄吏亦有所求頵怒曰吏欲我下獄耶歸而遂謀反仁義聞之亦反焚東塘以襲常州常州刺史李遇出戰望見仁義大罵之仁義止其軍曰李遇乃敢辱我如此其必有伏兵乃引軍却而伏兵果發追至夾岡仁義解甲植幟而食遇兵不敢追仁義復入潤州行密遣王茂章李德誠米志誠等圍之吳之軍中推朱瑾善槊志誠善射皆為第一而仁義常以射自負曰志誠之弓十不當瑾槊之一瑾槊之十不當仁義弓之一每與茂章等戰必命中而後發以此吳兵畏之不敢近行密亦欲招降之仁義猶豫未決茂章乘其怠穴地道而入執仁義斬于廣陵延壽者行密夫人朱氏之弟也頵及仁義之將叛也行密疑之乃陽為目疾每接延壽使者必錯亂其所見以示之嘗行故觸柱而仆朱夫人扶之良久乃蘇泣曰吾業成而喪其目是天廢我也吾兒子皆不足以任事得延壽付之吾無恨矣夫人喜急召延壽延壽至行密迎之寢門刺殺之出朱夫人以嫁之天祐二年遣劉存攻鄂州焚其城城中兵突圍而出諸將請急擊之存曰擊之復入則城愈固聽其去城可取也是日城破執杜洪斬于廣陵九月梁兵攻破襄州趙匡凝奔于行密十一月行密卒年五十四諡曰忠武子渥立溥僭號追尊行密為太祖武皇帝陵曰興陵嗚呼盜亦有道信哉行密之書稱行密為人寬仁雅信能得士心其將蔡儔叛于廬州悉毁行密墳墓及儔敗而諸將皆請毁其墓以報之行密嘆曰儔以此為惡吾豈復為耶嘗使從者張洪負劍而侍洪拔劍擊行密不中洪死復用洪所善陳紹負劍不疑又嘗罵其將劉信信忿奔孫儒行密戒左右勿追曰信豈負我者耶其醉而去醒必復來明日果來行密起于盜賊其下皆驍武雄暴而樂為之用者以此也故二世四主垂五十年及渥已下政在徐溫於此之時天下大亂中國之禍篡弒相尋而徐氏父子區區詐力裴回三主不敢輕取之何也豈其恩威亦有在人者歟李煜世家煜本末不足觀而歐公序次其驕侈削弱處可涕煜字重光初名從嘉景第六子也煜為人仁孝善屬文工書畫而豐額駢齒一目重瞳子自太子冀已上五子皆早卒煜以次封吳王建隆二年景遷南都立煜為太子留監國景卒煜嗣立於金陵母鍾氏父名泰章煜尊母曰聖尊后立妃周氏為國后封弟從善韓王從益鄭王從謙宜春王從度昭平郡公從信文陽郡公大赦境內遣中書侍郎馮延魯修貢于朝廷令諸司四品以下無職事者日二員待制於內殿三年泉州留從效卒景之稱臣於周也從效亦奉表貢獻于京師世宗以景故不納從效聞景遷洪州懼以為襲已遣其子紹基納貢于金陵而從效病卒泉人因并送其族于金陵推立副使張漢思漢思老不任事州人陳洪進逐之自稱留後煜即以洪進為節度使乾德二年始用鐵錢民間多藏匿舊錢舊錢益少商賈多以十鐵錢易一銅錢出境官不可禁煜因下令以一當十拜韓熙載中書侍郎勤政殿學士封長子仲遇清源公次子仲儀宣城公五年命兩省侍郎給事中中書舍人集賢勤政殿學士分夕於光政殿宿直煜引與談論煜嘗以熙載盡忠能直言欲用為相而熙載後房妓妾數十人多出外舍私侍賓客煜以此難之左授煕載右庶子分司南都熙載盡斥諸妓單車上道煜喜留之復其位已而諸妓稍稍復還煜曰吾無如之何矣是嵗煕載卒煜嘆曰吾終不得煕載為相也欲以平章事贈之問前世有此比否羣臣對曰昔劉穆之贈開府儀同三司遂贈熙載平章事熙載北海將家子也初與李穀相善明宗時熙載南奔吳穀送至正陽酒酣臨訣熙載謂穀曰江左用吾為相當長驅以定中原穀曰中國用吾為相取江南如探囊中物爾及周師之征淮也命穀為將以取淮南而熙載不能有所為也開寶四年煜遣其弟韓王從善朝京師遂留不遣煜手疏求從善還國太祖皇帝不許煜嘗怏怏以國蹙為憂日與臣下酣晏愁思悲歌不已五年煜下令貶損制度下書稱教改中書門下省為左右內史府尚書省為司㑹府御史臺為司憲府翰林為文館樞密院為光政院諸王皆為國公以尊朝廷煜性驕侈好聲色又喜浮圖高談不恤政事六年內史舍人潘佑上書極諫煜收下獄佑自縊死七年太祖皇帝遣使召煜赴闕煜稱疾不行王師南征煜遣徐鉉周惟簡等奉表朝廷求緩師不答八年十二月王師克金陵九年煜俘至京師太祖赦之封煜違命侯拜左千牛衛將軍其後事具國史豫世家江南其故老多能言李氏時事云太祖皇帝之出師南征也煜遣其臣徐鉉朝于京師鉉居江南以名臣自負其來也欲以口舌馳說存其國其日夜計謀思慮言語應對之際詳矣及其將見也大臣亦先入請言鉉博學有材辨宜有以待之太祖笑曰第去非爾所知也明日鉉朝于廷仰而言曰李煜無罪陛下師出無名太祖徐召之升使畢其說鉉曰煜以小事大如子事父未有過失奈何見伐其說纍數百言太祖曰爾謂父子者為兩家可乎鉉無以對而退嗚呼大哉何其言之簡也蓋王者之興天下必歸于一統其可來者來之不可者伐之僭僞假竊期于掃蕩一平而後已豫讀周世宗征淮詔怪其區區􅫵托前事務較曲直以為辭何其小也然世宗之英武有足喜者豈為其辭者之過歟王衍世家衍字化源建十一子曰衛王宗仁簡王元膺趙王宗紀豳王宗輅韓王宗智莒王宗特信王宗傑魯王宗鼎興王宗澤薛王宗平而鄭王宗衍最幼其母徐賢妃也以母寵得立為皇太子開崇賢府置官屬後更曰天䇿府衍為人方頤大口垂手過膝顧目見耳頗知學問能為浮艷之詞元膺死建以豳王宗輅貌類已信王宗傑於諸子最材賢欲於兩人擇立之而徐妃専寵建老昏耄妃與宦者唐文扆教相士言衍相最貴又諷宰相張格贊成之衍由是得為太子建卒衍立諡建曰神武聖文孝德明惠皇帝廟號髙祖陵曰永陵建正室周氏號昭聖皇后後建數日而卒衍因尊其母徐氏為皇太后后妹淑妃為皇太妃太后太妃以教令賣官自刺史以下每一官闕必數人並爭而入錢多者得之通都大邑起邸店以奪民利衍年少荒淫委其政於宦者宋光嗣光葆景潤澄王承休歐陽晃田魯儔等而以韓昭潘在迎顧在洵嚴旭等為狎客起宣華苑苑有重光太清延昌㑹真之殿清和迎仙之宫降真蓬萊丹霞之亭飛鸞之閣瑞獸之門又作怡神亭與諸狎客婦人日夜酣飲其中嘗以九日宴宣華苑嘉王宗壽以社稷為言言發流涕韓昭等曰嘉王酒悲爾諸狎客共以慢言謔嘲之坐上喧然衍不能省也蜀人富而喜遨當王氏晚年俗競為小帽僅覆其頂俯首即墮謂之危腦帽衍以為不祥禁之而衍好戴大帽每微服出游民間民間以大帽識之因令國中皆戴大帽又好褁尖巾其狀如錐而後宫皆戴金蓮花冠衣道士服酒酣免冠其髻髽然更施朱粉號醉粧國中之人皆效之嘗與太后太妃游青城山宫人衣服皆畫雲霞飄然望之若仙衍自作甘州曲述其仙狀上下山谷衍常自歌而使宫人皆和之衍立之明年改元乾德乾德元年正月祀天南郊大赦加尊號為聖德明孝皇帝二年冬北巡至于西縣旌旗戈甲連亘百餘里其還也自閬州浮江而上龍舟畫舸照耀江水所在供億人不堪命三年正月還成都五年起上清宫塑王子晉像尊以為聖祖至道玉宸皇帝又塑建及衍像侍立於其左右又於正殿塑𤣥元皇帝及唐諸帝備法駕而朝之六年以王承休為天雄軍節度使天雄軍秦州也承休以宦者得幸為宣徽使承休妻嚴氏有絶色衍通之是時唐莊宗滅梁蜀人皆懼莊宗遣李嚴聘蜀衍與俱朝上清而蜀都士庶簾帷珠翠夾道不絶嚴見其人物富盛而衍驕淫歸乃獻䇿伐蜀明年唐魏王繼岌郭崇韜伐蜀是嵗衍改元曰咸康衍自立嵗常獵于子來山是嵗又幸彭州陽平化漢州三學山以王承休妻嚴氏故十月幸秦州羣臣切諌衍不聽行至梓童大風發屋拔木太史曰此貪狼風也當有敗軍殺將者衍不省衍至綿谷而唐師入其境衍懼遽還唐師所至州縣皆迎降衍留王宗弼守綿谷遣王宗勳宗儼宗昱率兵以拒唐師宗勳等至三泉望風退走衍詔宗弼誅宗勳等宗弼反與宗勳等合謀送欵於唐師衍自綿谷還至成都百官及後宫迎謁七里亭衍雜宫人作回鶻隊以入明日御文明殿與其羣臣相對涕泣而宗弼亦自綿谷馳歸登大𤣥門收成都尹韓昭宦者宋光嗣景潤澄歐陽晃等殺之函首送于繼岌衍即上表乞降宗弼遷衍于天啓宫魏王繼岌至成都衍君臣面縛輿櫬出降于七里亭莊宗召衍入洛賜衍詔曰固當列土而封必不薄人于險三辰在上一言不欺衍捧詔欣然就道率其宗族及僞宰相王鍇張格庾傳素許寂翰林學士李昊等及諸將佐家族數千人以東同光四年四月行至秦川驛莊宗用伶人景進計遣宦者向延嗣誅其族衍母徐氏臨刑呼曰吾兒以一國迎降反以為戮信義俱棄吾知其禍不旋踵矣衍妾劉氏鬒髮如雲而有色行刑者將免之劉氏曰家國喪亡義不受辱遂就死宗弼本姓魏名𢎞夫建録為養子建攻顧彥暉宗弼常以建語泄之彥暉者彥暉敗建待之如初建病且卒宗弼守太師兼中書令判六軍輔政衍已降宗弼以蜀珍寶奉魏王及郭崇韜求為西川節度使魏王曰此我家物也何用獻為居數日為崇韜所殺宗壽許州民家子也建以同姓録之為子宗壽好學工琴奕為人恬退喜道家之術事建時為鎮江軍節度使衍既立宗壽為太子太保奉朝請以煉丹養氣自娛衍為淫亂獨宗壽常切諫之後為武信軍節度使唐師伐蜀所在迎降魏王常以書招之獨宗壽不降聞衍已銜璧大慟從衍東遷至岐陽以賄賂守者得入見衍衍泣下霑襟曰早從王言豈有今日衍死宗壽至澠池聞莊宗遇弒亡入熊耳山天成二年出詣京師上書求衍宗族葬之明宗嘉其忠以為保義軍行軍司馬封衍順正公許以諸侯禮葬宗壽得王氏十八喪葬之長安南三趙村嗚呼自秦漢以來學者多言祥瑞雖有善辨之士不能袪其惑也豫讀蜀書至於龜龍麟鳯騶虞之類世所謂王者之嘉瑞莫不畢出於其國異哉然考王氏之所以興亡成敗者可以知之矣或以為一王氏不足以當之則視時天下治亂可以知之矣龍之為物也以不見為神以升雲行天為得志今偃然暴露其形是不神也不上於天而下見於水中是失職也然其一何多歟可以為妖矣鳯皇鳥之逺人者也昔舜治天下政成而民悅命䕫作樂樂聲和鳥獸聞之皆鼓舞當是之時鳯皇適至舜之史因并記以為美後世因以鳯來為有道之應其後鳯皇數至或出於庸君繆政之時或出於危亡大亂之際是果為瑞哉麟獸之逺人者也昔魯哀公出獵得之而不識蓋索而獲之非其自出也故孔子書於春秋曰西狩獲麟者譏之也西狩非其逺也獲麟惡其盡取也狩必書地而哀公馳騁所涉地多不可遍以名舉故書西以包衆地謂其舉國之西皆至也麟人罕識之獸也以見公之窮山竭澤而盡取至於不識之獸皆搜索而獲之故曰譏之也聖人已沒而異端之說興乃以麟為王者之瑞而附以符命䜟緯詭怪之言鳯嘗出於舜以為瑞猶有說也及其後出於亂世則可以知其非瑞矣若麟者前有治世如堯舜禹湯文武周公之世未嘗一出其一出而當亂世然則孰知其為瑞哉龜𤣥物也汚泥川澤不可勝數其死而貴於卜官者用適有宜爾而戴氏禮以其在宫沼為王者難致之瑞戴禮雜出於諸家其失亦以多矣騶虞吾不知其何物也詩曰吁嗟乎騶虞賈誼以為騶者文王之囿虞虞官也當誼之時其說如此然則以之為獸者其出於近世之說乎夫破人之惑者難與爭於篤信之時待其有所疑焉然後從而攻之可也麟鳯龜龍王者之瑞而出於五代之際又皆萃於蜀此雖好為祥瑞之說者亦可疑也因其可疑而攻之庶幾惑者有以思焉唐宋八大家文鈔卷七十入
