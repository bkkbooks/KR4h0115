body:
  text: 唐宋八大家文鈔巻十七明茅坤撰柳州文鈔一書予覽子厚書由貶謫永州柳州以後大較並從司馬遷答任少卿及楊惲報孫㑹宗書中來故其為書多悲愴嗚咽之㫖而其辭氣環詭跌宕譬之聽胡笳聞塞曲令人斷腸者也至其中所論文章處必本之乎道當與昌黎並驅故録其可誦者二十九首與李翰林建書杓直足下州傳遽至得足下書又於夢得處得足下前次一書意皆勤厚莊周言逃蓬藋者聞人足音則跫然喜僕在蠻夷中比得足下二書及致藥餌喜復何言僕自去年八月來痞疾稍已往時間一二日作今一月乃二三作用南人㯽榔餘甘破決壅隔大過隂邪雖敗已傷正氣行則膝顫坐則髀痺所欲者補氣豐血强筋骨輔心力有與此宜者更致數物忽得良方偕至益善永州於楚為最南狀與越相類僕悶即出遊遊復多恐涉野則有蝮虺大蜂仰空視地寸步勞倦近水即畏射工沙虱含怒竊發中人形影動成瘡痏時到幽樹好石暫得一笑已復不樂何者譬如囚拘圜土一遇和景負牆搔摩伸展支體當此之時亦以為適然顧地窺天不過尋丈終不得出豈復能久為舒暢哉明時百姓皆獲歡樂僕士人頗識古今理道獨愴愴如此誠不足為理世下執事至比愚夫愚婦又不可得竊自悼也僕曩時所犯足下適在禁中備觀本末不復一一言之今僕癃殘頑鄙不死幸甚茍為堯人不必立事程功唯欲為量移官差輕罪累即便耕田蓻麻取老農女為妻生男育孫以供力役時時作文以詠太平摧傷之餘氣力可想假令病盡已身復壯悠悠人世不過為三十年客耳前過三十七年與瞬息無異復所得者其不足把翫亦已審矣杓直以為誠然乎僕近求得經史諸子數百巻常候戰悸稍定時即伏讀頗見聖人用心賢士君子立志之分著書亦數十篇心病言少次第不足遠寄但用自釋貧者士之常今僕雖羸餒亦甘如飴矣足下言已白常州煦僕僕豈敢衆人待常州耶若衆人即不復煦僕矣然常州未甞有書遺僕僕安敢先焉裴應叔蕭思謙僕各有書足下求取觀之相戒勿示人敦詩在近地簡人事今不能致書足下黙以此書見之勉盡志慮輔成一王之法以宥罪戾不悉某白寄許京兆孟容書子厚最失意時最得意書可與太史公與任安書相參而氣似嗚咽蕭颯矣予覽蘇子瞻安置海外時詩文及復故人書殊自曠逹盖由子瞻晩年深悟禪宗故獨超脱較子厚相隔數倍宗元再拜五丈座前伏䝉賜書誨諭微悉重厚欣躍恍惚疑若夢寐捧書叩頭悸不自定伏念得罪來五年未甞有故舊大臣肯以書見及者何則罪謗交積羣疑當道誠可怪而畏也以是兀兀㤀行尤負重憂殘骸餘魂百病所集痞結伏積不食自飽或時寒熱水火互至内消肌骨非獨瘴癘為也忽奉教命乃知幸為大君子所宥欲使膏盲沉沒復起為人夫何素望敢以及此宗元早嵗與負罪者親善始竒其能謂可以共立仁義禆教化過不自料懃懃勉勵唯以中正信義為志以興堯舜孔子之道利安元元為務不知愚陋不可力彊其素意如此也末路厄塞臲􅑶事既壅隔狠忤貴近狂踈繆戾蹈不測之辜羣言沸騰鬼神交怒加以素卑賤暴起領事人所不信射利求進者塡門排户百不一得一旦快意更造怨讟以此大罪之外詆訶萬端旁午搆扇盡為敵讐恊心同攻外連彊暴失職者以致其事此皆丈人所聞見不敢為他人道説懐不能已復載簡牘此人雖萬被誅戮不足塞責而豈有賞哉今其黨與幸獲寛貸各得善地無公事坐食俸禄明徳至渥也尚何敢更俟除棄廢痼以希望外之澤哉年少氣鋭不識幾微不知當否但欲一心直遂果䧟刑法皆自所求取得之又何怪也宗元於衆黨人中罪狀最甚神理降罰又不能即死猶對人言語求食自活迷不知恥日復一日然亦有大故自以得姓來二千五百年代為冡嗣今抱非常之罪居夷獠之鄉卑濕昏霧恐一旦塡委溝壑曠墜先緒以是怛然痛恨心骨沸熱煢煢孤立未有子息荒陬中少士人女子無與為婚世亦不肯與罪人親昵以是嗣續之重不絶如縷每常春秋時饗孑立捧奠顧眄無後繼者懔懔然欷歔惴惕恐此事便已摧心傷骨若受鋒刃此誠丈人所共憫惜也先墓在城南無異子弟為主獨託村隣自譴逐來消息存亾不一至鄉閭主守者固以益怠晝夜哀憤懼便毁傷松栢芻牧不禁以成大戾近世禮重拜掃今已闕者四年矣每遇寒食則北向長號以首頓地想田野道路士女遍满皂𨽻庸丐皆得上父母丘墓馬醫夏畦之鬼無不受子孫追飬者然此已息望又何以云哉城西有數頃田樹果數百株多先人手自封植今已荒穢恐便斬伐無復愛惜家有賜書三千巻尚在善和里舊宅宅今已三易主書存亡不可知皆付受所重常繋心腑然無可為者立身一敗萬事瓦裂身殘家破為世大僇復何敢更望大君子撫慰収卹尚置人數中耶是以當食不知辛醎節適洗沐盥漱動逾歲時一搔皮膚塵垢满爪誠憂恐悲傷無所告愬以至此也自古賢人才士秉志遵分被謗議不能自明者僅以百數故有無兄盗嫂娶孤女云撾婦翁者然賴當世豪傑分明辨别卒光史籍管仲遇盗升為功臣匡章被不孝之名孟子禮之今已無古人之實為而有其詬欲望世人之明已不可得也直不疑買金以償同舍劉寛下車歸牛鄉人此誠知疑似之不可辯非口舌所能勝也鄭詹束縳於晉終以無死鍾儀南音卒獲返國叔向囚虜自期必免范座騎危以生易死蒯通據鼎耳為齊上客張蒼韓信伏斧躓終取將相鄒陽獄中以書自活賈生斥逐復召宣室倪寛擯死後至御史大夫董仲舒劉向下獄當誅為漢儒宗此皆瓌偉博辯竒壯之士能自解脱今以恇怯淟涊下才末伎又嬰恐懼痼病雖欲慷慨攘臂自同昔人愈踈濶矣賢者不得志於今必取貴於後古之著書者皆是也宗元近欲務此然力薄才劣無異能解雖欲秉筆覼縷神志荒耗前後遺㤀終不能成章往時讀書自以不至觝滯今皆頑然無復省録每讀古人一傳數紙已後則再三伸巻復觀姓氏旋又廢失假令萬一除刑部囚籍復為士列亦不堪當世用矣伏惟興哀於無用之地垂德於不報之所但以存通家宗祀為念有可動心者操之勿失雖不敢望歸掃塋域退託先人之廬以盡餘齒姑遂少北益輕瘴癘就婚娶求𦙍嗣有可付託即㝠然長辭如得甘寢無復恨矣書辭繁委無以自道然即文以求其志君子固得其肺肝焉無任懇戀之至不宣與楊京兆憑書文不如前書而中所自為嗚咽涕洟略相似故併錄之月日宗元再拜獻書丈人座前役人胡要返命奉教誨壯厲感發鋪陳廣大上言推延賢雋之道難於今之世次及文章末以愚䝉剝喪頓悴無以守宗族復田畝為念憂憫備極不惟其親密故舊是與復有公言顯賞許其素尚而激其忠誠者用是踊躍敬懼類嚮時所被簡牘萬萬有加焉故敢悉其愚以獻左右大凡薦舉之道古人之所謂難者其難非茍一而已也知之難言之難聽信之難夫人有有之而恥言之者有有之而樂言之者有無之而工言之者有無之而不言似有之者有之而恥言之者上也雖舜猶難於知之孔子亦曰失之子羽下斯而言知而不失者妄矣有之而言之者次也德如漢光武馮衍不用才如王景略以尹緯為令史是皆終日號鳴大吒而卒莫之省無之而工言者賊也趙括得以代廉頗馬謖得以惑孔明也今之若此類者不乏於世將相大臣聞其言而必能辨之者亦妄矣無之而不言者土水類也周仁以重臣為二千石許靖以人譽而致位三公近世尤好此類以為長者最得薦寵夫言朴愚無害者其於田野鄉閭為匹夫雖稱為長者可也自抱闗撃柝以往則必敬其事愈上則及物者愈大何事無用之朴哉今之言曰某子長者可以為大官類非古之所謂長者也則必土木而已矣夫捧土揭木而致之巖廊之上䝉以紱冕翼以徒𨽻而趨走其左右豈有補於萬民之勞苦哉聖人之道不益於世用凡以此也故曰知之難孔子曰仁者其言也訒孟子病未同而言然則彼未吾信而吾告之以士必有三間是將曰彼誠知士歟知文歟疑之而未重一間也又曰彼無乃私好歟交以利歟二間也又曰彼不足我而惎我哉兹咈吾事三間也畏是而不言故曰言之難言而有是患故曰聽信之難唯明者為能得其所以薦得其所以言得其所以聽一不至則不可冀矣然而君子不以言聽之難而不務取士士理之本也茍有司之不吾信吾知之而不捨其必有信吾者矣茍知之雖無有司而士可以顯則吾一旦操用人之柄其必有施矣故公卿之大任莫若索士士不預備而熟講之卒然君有問焉宰相有咨焉有司有求焉其無所以應之則大臣之道或闕故不可憚煩今之世言士者先文章文章士之末也然立言存乎其中即末而操其本可十七八未易忽也自古文士之多莫如今今之後生為文希屈馬者可得數人希王褒劉向之徒者又可得十人至陸機潘岳之比累累相望若皆為之不巳則文章之大盛古未有也後代乃可知之今之俗耳庸目無所取信傑然特異者乃見此耳丈人以文律通流當世叔仲鼎列天下號為文章家今又生敬之敬之希屈馬者之一也天下方理平今之文士咸能先理理不一斷於古書老生直趣堯舜大道孔氏之志明而出之又古之所難有也然則文章未必為士之末獨采取何如耳宗元自小學為文章中間幸聨得甲乙科第至尚書郎專百官章奏然未能究知為文之道自貶官來無事讀百家書上下馳騁乃少得知文章利病去年吳武陵來美其齒少才氣壯健可以興西漢之文章日與之言因為之出數十篇書庻幾鏗鏘陶冶時時得見古人情狀然彼古人亦人耳夫何遠哉凡人可以言古不可以言今桓譚亦云親見揚子雲容貎不能動人安肯傳其書誠使博如莊周哀如屈原奥如孟軻壯如李斯峻如馬遷富如相如明如賈誼專如揚雄猶為今之人則世之高者至少矣由此觀之古之人未必不薄於當世而榮於後世也若吳子之文非丈人無以知之獨恐世人之才高者不肯久學無以盡訓詁風雅之道以為一世甚盛若宗元者才力缺敗不能遠騁高厲與諸生摩九霄撫四海夸耀於後之人矣何也凡為文以神志為主自遭責逐繼以大故荒亂耗竭又常積憂恐神志少矣所讀書隨又遺㤀一二年來痞氣尤甚加以衆疾動作不常眊眊然騷擾内生霾霧塡擁慘沮雖有意窮文章而病奪其志矣每聞人大言則蹶氣震怖撫心按膽不能自止又永州多火災五年之間四為大火所廹徒跣走出壊牆穴牖僅免燔灼書籍散亂毁裂不知所往一遇火恐累日茫洋不能出言又安能盡意於筆硯矻矻自苦以危傷敗之魂哉中心之悃愊鬱結具載所獻許京兆丈人書不能重煩於陳列凡人之黜棄皆望望思得効用而宗元獨以無有是念自以罪大不可解才質無所入茍焉以叙憂慄為幸敢有他志伏以先君禀孝德秉直道高於天下仕再登朝至六品官宗元無似亦甞再登朝至六品矣何以堪此且栁氏號為大族五六從以來無為朝士者豈愚䝉獨出數百人右哉以是自忖官已過矣寵已厚矣夫知足與知止異宗元知足矣若便止不受禄位亦所未能今復得好官猶不辭讓何也以人望人尚足自進如其不至則故無憾進取之志息矣身世孑然無可以為家雖甚崇寵之孰與為榮獨恨不幸獲託姻好而早凋落寡居十餘年甞有一男子然無一日之命至今無以託嗣續恨痛常在心目孟子稱不孝有三無後為大今之汲汲於世者唯懼此而已矣天若不棄先君之徳所有世嗣或者猶望延壽命以及大宥得歸鄉閭立家室則子道畢矣過是而猶競於寵利者天厭之天厭之丈人旦夕歸朝廷復為大僚伏惟以此為念流涕頓顙布之座右不任感激之至與蕭翰林俛書一悲一笑令人破涕思謙兄足下昨祁縣王師範過永州為僕言得張左司書道思謙蹇然有當官之心乃誠助太平者也僕聞之喜甚然微王生之説僕豈不素知耶所喜者耳與心叶果於不謬焉爾僕不幸嚮者進當臲􅑶不安之勢平居閉門口舌無數况又有久與游者乃岌岌而操其間其求進而退者皆聚為仇怨造作粉飾蔓延益肆非的然昭晰自斷於内則孰能了僕於㝠㝠之間哉然僕當時年三十三甚少自御史裏行得禮部員外郎超取顯秩欲免世之求進者怪怒娟嫉其可得乎凡人皆欲自逹僕先得顯處才不能踰同列名不能壓當世世之怒僕宜也與罪人交十年官又以是進辱在附㑹聖朝𢎞大貶黜甚薄不能塞衆人之怒謗語轉移囂囂嗷嗷漸成怪民飾智求仕者更詈僕以悅讐人之心日為新竒務相喜可自以速援引之路而僕軰坐益困辱萬罪横生不知其端伏自思念過大恩甚乃以致此悲夫人生少得六七十者今已三十七矣長來覺日月益促歲歲更甚大都不過數十寒暑則無此身矣是非榮辱又何足道云云不已祗益為罪兄知之勿為他人言也居蠻夷中久慣習炎毒昏眊重膇意以為常忽遇北風晨起薄寒中體則肌革瘮懔毛髪蕭條瞿然注視怵惕以為異候意緒殆非中國人楚越間聲音特異鴂舌啅譟今聽之怡然不怪已與為類矣家生小童皆自然嘵嘵晝夜满耳聞北人言則啼呼走匿雖病夫亦怛然駭之出門見適州閭市井者其十有八九杖而後興自料居此尚復幾何豈可更不知止言説長短重為一世非笑哉讀周易困卦至有言不信尚口乃窮也往復益喜曰嗟乎余雖家置一喙以自稱道詬益甚耳用是更樂瘖黙思與木石為徒不復致意今天子興教化定邪正海内皆欣欣怡愉而僕與四五子者獨淪陷如此豈非命歟命乃天也非云云者所制余又何恨獨喜思謙之徒遭時言道道之行物得其利僕誠有罪然豈不在一物之數耶身被之目覩之足矣何必攘袂用力而矜自我出耶果矜之又非道也事誠如此然居理平之世終身為頑人之類猶有少耻未能盡㤀儻因賊平慶賞之際得以見白使受天澤餘潤雖朽枿腐敗不能生植猶足蒸出芝菌以為瑞物一釋廢錮移數縣之地則世必曰罪稍解矣然後収召魂魄買土一㕓為耕甿朝夕歌謡使成文章庻木鐸者采取獻之法宫増聖唐大雅之什雖不得位亦不虚為太平之人矣此在望外然終欲為兄一言焉宗元再拜與顧十郎書其書似非對座主之言然亦愰朗四月五日門生守永州司馬員外置同正員栁宗元謹致書十郎凡號門生而不知恩之所自者非人也纓冠束袵而趨以進者咸曰我知恩知恩則惡乎辨然而辨之亦非難也大抵當隆赫柄用而蜂附蟻合喣喣趄趄便僻匍匐以非乎人而售乎已若是者一旦勢異則電滅颷逝不為門下用矣其或少知耻懼恐世人之非已也則矯於中以貎於外其實亦莫能至焉然則當其時而確固自守蓄力秉志不為嚮者之態則於勢之異也固有望焉大凡以文出門下由庻士而登司徒者七十有九人執事試追狀其態則果能効用者出矣然而中間招衆口飛語譁然譸張者豈他人耶夫固出自門下賴中山劉禹錫等遑遑惕憂無日不在信臣之門以務白大徳順宗時顯贈榮諡揚于天官敷于天下以為親戚門生光寵不意璅璅者復以病執事此誠私心痛之堙鬱洶湧不知所發常以自憾在朝不能有竒節宏議以立於當世卒就廢逐居窮扼又不能著書斷往古明聖法以致無窮之名進退無以異於衆人不克顯明門下得士之大今抱徳厚蓄憤悱思有以効於前者則既乖謬於時離散擯抑而無所施用長為孤囚不能自明恐執事終以不知其始偃蹇退匿者將以有為也猶流於嚮時求進者之言而下情無以通盛徳無以酬用為大恨固常不欲言之今懼老死瘴土而他人無以辨其志故為執事一出之古之人恥躬之不逮儻或萬萬有一可兾復得處人間則斯言幾乎踐矣因言感激浪然出涕書不能既宗元謹再拜與裴塤書亦自悲楚應叔十四兄足下比得書示勤勤不以僕罪過為大故有動止相憫者僕望已矣世所共棄唯應叔輩一二公獨未耳僕之罪在年少好事進而不能止儔輩恨怒以先得官又不幸早嘗與游者居權衡之地十薦賢幸乃一售不得者譸張排根僕可出而辯之哉性又倨野不能摧折以故名益惡勢益險有喙有耳者相郵傳作醜語不知其卒云何中心之愆尤若此而已既受禁錮而不能即死者以為久當自明今亦久矣而嗔罵者尚不肯已堅然相白者無數人聖上日興太平之理不貢不王者悉以誅討而制度大立長使僕輩為匪人耶其終無以見明而不得擊壤鼓腹樂堯舜之道耶且天下熙熙而獨呻吟者四五人何其優裕者博而局束者寡其為不一徵也何哉大和蒸物燕谷不被其煦一鄒子尚能恥之今若應叔輩知我豈下鄒子哉然而不恥者何也河北之師當已平奚虜聞吉語矣然若僕者承大慶之後必有殊澤流言飛文之罪或者其可以已乎幸致數百里之北使天下之人不謂僕為明時異物死不恨矣金州考績已久獨薎然不遷者何耶十二兄宜當更轉右職十四兄嘗得數書無恙兄顧惟僕之窮途得無意乎北當大寒人愈平和惟楚南極海𤣥㝠所不統炎昏多疾氣力益劣昧昧然人事百不記一捨憂慄則怠而睡耳偶書如此不宣唐宋八大家文鈔巻十七
