body:
  text: 唐宋八大家文鈔卷九十六明茅坤撰臨川文鈔十六墓表祭文太常博士鄭君墓表荆公卒無一言許可其間極有分寸處德安鄭湜書其父太常博士諱詒字正臣之行治伐閲世次因其妹壻廣陵朱介之以來請曰鄭氏故家滎陽有善果者卒於唐江州刺史而子孫為德安人自善果至胵七世生裔為樂清縣令君之大父也裔生東君之父也以詩書教授鄉里而終不仕君以景祐四年進士為洪州都昌縣主簿於是令老矣事皆決於君而都昌至今稱以為能又為廬州合肥縣尉盜發輒得故其後無敢為盜者又為同州朝邑縣令當陜西兵事起案簿書度民力所堪以均賦役而人不困又掌集慶軍書記嵗旱轉運使不欲除民租以屬其守而使君出視君以實除民租如法又遷祕書省著作佐郎知南康軍南康縣移知梧州方是時儂智高為亂吏多避匿即不往君獨亟往治城塹集吏民以守而州無事經略使舉君以知賓州再遷至太常博士而歸為陵臺令召見言事稱㫖賜緋衣銀魚未赴以嘉祐三年三月二十四日卒年六十君前夫人張氏後夫人吳氏子男三人其長則湜也次㳂次深女四人其三人已嫁矣董振何贄朱介之其壻也君為人孝友諒直得人一善若已出能振窮急而自養尤儉約自賓州歸所齎無南方一物其平生所為如此今既以某年某月某日葬君德安之永泰鄉谷步里而未有以碣諸墓也敢因介之以告介之於余為外姻而其妻能道君之實將懼泯沒而無聞數涕泣屬其夫求得余之一言以表之墓上蓋余嘗奉使江東泝九江上廬山愛其山川而問其州人士大夫之賢而可與游者莫能言也今湜能言其父之賢如此問其州人與之游仕於此者乃以為良然嗟乎鄭君誠如此豈特一鄉之善士歟而其子男與女子又能如此故為序次其說使表之墓上寶文閣待制常公墓表通篇無一實事特㸃綴虛景百數十言當屬一别調右正言寶文閣待制特贈右諫議大夫汝隂常公以熙寧十年二月己酉卒以五月壬申葬臨川王某志其墓曰公學不期言也正其行而已行不期聞也信其義而已所不取也可使貪者矜焉而非雕斫以為廉所不為也可使弱者立焉而非矯抗以為勇官之而不事召之而不赴或曰必退者也終此而已矣及為今天子所禮則出而應焉於是天子悅其至虛已而問焉使蒞諫職以觀其迪已也使董學政以觀其造士也公所言乎上者無傳然皆知其忠而不阿所施乎下者無助然皆見其正而不茍詩曰胡不萬年惜乎既病而歸死也自周道隱觀學者所取舍大抵時所好也違俗而適已獨行而特起嗚呼公賢逺矣傳載公久莫如以石石可磨也亦可泐也謂公且朽不可得也建昌王君墓表荆公表女兄弟之舅而所次文章政事無一言㸃綴並本其子之言其子又似無指實特空言為案君建昌南城人姓王氏諱某字君玉少則貧窶事親盡力未嘗佚遊慢戲以棄一日亦未嘗屈志變節以辱於一人故雖食蔬水飲而父母有歡愈之心徒步藍縷而鄉人有畏難之色及其有子則盡其方以教子於是鄉人之子弟皆歸之君隨少長所能以教又盡其力蓋娶邑里周氏女有賢行能助君所為生四子無忌無咎無隱無悔皆進士無忌早卒而無咎獨中第為揚州江都縣尉率君之教博學能文篤行不怠然人以為君能長者以有是子而非特其教之力也君亦嘗舉進士不中某年年六十五以某月日卒於江都其子之官舍明年三月二十四日葬所居縣裏屯之原葬久矣無咎始求豫文以表君墓當時無咎弃台州天台縣令教授於常州其學彌勤其行彌厲其志蓋非有求於兹世而止能使君顯聞於後世庶其在此以豫不肖而言之不美也安能有所重以稱君之孝子耶亦論次之如此貴池主簿沈君墓表通篇亦無一實事俱虛語相㸃綴荆公所自為本色在此荆公所自為可喜處亦在此古名家之於傳記碑碣所載其不茍如此豫先君女子三人其季嫁沈子也他日有問豫先君之壻而豫告以沈子其知沈子之家者必曰是其父能文學他日從沈子於銅陵而遊觀其縣縣人得沈子必曰是其父能政事已而豫求其父所為書於沈子沈子曰先君卒於逆旅其書悉為人取去無在者又問其政事曰吾嘗聞於祖母矣先君為池州貴池縣主簿令不能而縣大治者先君之力也嘗攝銅陵縣事縣人有兄弟爭財者先君能為辨其曲直而卒使之感寤讓財相與同居其去也兩縣人追送涕泣逺焉而後去其施設之方則吾不得其詳也沈子遂言曰先君事生嚴喪死哀自族人至於婚友無所不盡其心終身好書未嘗一日不讀而於酣樂嫚戲未嘗豫也循道守官以不諂其上而幾至於殆者數矣故其仕嘗有去志而無留心唯不得壽考富貴以卒其學問究其施設故其文章不多見而獨為士友所知其行義不博聞而獨為親黨所稱其政事不大傳而獨為邑人所記日月行矣不即論次懼將卒於無傳也吾願以此屬子矣豫應曰然子之先君固賢而又有賢子其後世將必大不可使無考也於是為之論次曰君諱某字某再世家於杭州之錢塘而其先湖州之武康人也武康之族顯久矣至唐有既濟者為尚書禮部員外郎生傳師為尚書吏部侍郎贈吏部尚書尚書生詢為潞州刺史昭義軍節度使自昭義以上三世皆有名迹列於國史昭義生丹為舒州團練判官舒州生牢江南李氏時為饒州刺史饒州生廷蘋為濠州軍事推官濠州生承誨大宋為明州定海縣主簿纍贈光祿卿光祿生玉尚書屯田郎中知真州軍州事君真州之子天聖二年以進士起家楚州司法參軍再調為池州貴池縣主簿年三十六疾卒於京師之逆旅夫人元氏生男子伯莊季長叔通皆為進士而季長則余先君之壻也君以某年某月某甲子葬真州城北之原蓋其行義文學政事皆如其子之言云處士征君墓表表征君并及其杜與徐變調也淮之南有善士三人皆居於真州之揚子杜君者寓於醫無貧富貴賤請之輒往與之財非義輒謝而不受時時窮空幾不能以自存而未嘗有不足之色蓋善言性命之理而其心曠然無纍於物而豫嘗與之語久之而不厭也徐君忠信篤實遇人至謹雖疾病召筮不正衣巾不見寓於筮日得百數十錢則止不更筮也能為詩亦好屬文有集若干卷兩人者以醫筮故多為賢士大夫所知而征君獨不聞於世征君者諱某字某事其母夫人至孝居鄉里恂恂恭謹樂振人之窮急而未嘗與人挍曲直好蓄書能為詩有子五人而教其三人為進士某今為某官某今為某官某亦再貢於鄉征君與兩人者相為友至歡而莫逆也兩人者皆先征君以死而征君以某年某月某甲子終於家年七十七噫古者一鄉之善士必有以貴於一鄉一國之善士必有以貴於一國此道亡也久矣余獨私愛夫三人者而樂為好事者道之而征君之子又以請於是書以遺之使之鑱諸墓上杜君諱嬰字大和徐君諱仲堅字某鄱陽李夫人墓表蜻蜓㸃水法鄱陽處士贈大理評事黃君諱某之妻太平縣君鄱陽李氏者今太常博士巽之母也年若干以嘉祐五年十一月乙酉終而以後年十一月丙子從其夫葬鄱陽長順里之西原葬若干年而太君之子所與游者臨川王某表其墓曰太君之為女子以善事父母聞於鄉里及嫁移所以事父於舅而致其禮有加焉凡在舅黨者無不禮也移所以事母於姑而致其愛無損焉凡在姑黨者無不愛也相其夫以正而順誨其子以義而慈處士君嘗娶而有子矣蓋視遇之無異於已子其後太君之子以進士起為聞人而州之士大夫皆曰是母非獨能教亦其為善也宜有子初其子為尉於宣州之太平又參䖍州録事皆欲迎太君以往太君曰吾助汝父享祠春秋於此義終不得獨往及為南劒州順昌縣令知洪州新建縣事而處士君已不幸乃曰吾老矣今而後可以從子故其終在新建其子之官寢太君生一男二女男即博士女皆已嫁其幼蚤卒其長者少喪其配事姑以孝聞而不嫁州之士大夫又皆曰是母能教非獨施於其一男而已蓋其女子亦母之力也嗚呼豈不賢哉祭范潁州文仲淹荆公為人多氣岸不妄交所交者皆天下名賢故於其殁而祭也其文多奇崛之氣悲愴之思令人讀之不能以不掩卷而涕洟凡得十首范公為一代殊絶人物而荆公祭文亦極力摹寫涕洟嗚咽可為兩絶矣嗚呼我公一世之師由初迄終名節無疵明肅之盛身危志殖瑶華失位又隨以斥治功亟聞尹帝之都閉姦興良稚子歌呼赫赫之家萬首俯趨獨繩其私以走江湖士爭留公蹈禍不栗有危其辭謁與俱出風俗之衰駭正怡邪蹇蹇我初人以疑嗟力行不回慕者興起儒先酋酋以節相侈公之在貶愈勇為忠稽前引古誼不營躬外更三州施有餘澤如釃河江以灌尋尺宿贓自解不以刑加猾盜涵仁終老無邪講藝絃歌慕來千里溝川障澤田桑有喜戎孽猘狂敢齮我疆鑄印刻符公屏一方取將於伍後常名顯收士至佐維邦之彥聲之所加冦不敢瀕以其餘威走敵完鄰昔也始至瘡痍滿道藥之養之內外完好既其無為飲酒笑歌百城晏眠吏士委蛇上嘉曰材以副樞密稽首辭讓至于六七遂參宰相釐我典常扶賢贊傑亂冗除荒官更於朝士變於鄉百治具修偷墮勉強彼閼不遂歸侍帝側卒屏于外身屯道塞謂宜耉老尚有以為神乎孰忍使至於斯蓋公之才猶不盡試肆其經綸功孰與計自公之貴廄庫逾空和其色辭傲訐以容化于婦妾不靡珠玉翼翼公子弊綈惡粟閔死憐窮惟是之奢孤女以嫁男成厥家孰堙于深孰鍥乎厚其傳其詳以法永久碩人今亡邦國之憂矧鄙不肖辱公知尤承凶萬里不往而留涕洟馳辭以贊醪羞祭周幾道文文多淘洗字字琳琅初我見君皆童而幘意氣豪悍崩山決澤弱冠相視隱憂困窮貌則侔年心頽如翁俯仰悲歡超然一世皓髮黧馘分當先弊孰知君子赴我稱孤發封涕洟舉屋驚呼行與世乖惟君繾綣弔禍問疾書猶在眼序銘於石以報德音設辭雖褊義不愧心君實愛我祭其知歆祭曽博士易占文悲戚嗚呼公以罪廢實以不幸卒困以夭亦惟其命命與才違人實知之名之不幸知者為誰公之閭里宗親黨友知公之名於實無有嗚呼公初公志如何孰云不諧而厄孔多地大天穹有時而毁星日脫敗山傾谷圮人居其間萬物一偏固有窮通世數之然至其夀夭尚何憂喜要之百年一蛻以死方其生時窘若囚拘其死以歸混合空虛以生易死死者不祈惟其不見生者之悲公今有子能隆公後惟彼生者可無甚悼嗟理則然其情難忘哭泣馳辭往侑奠觴祭李省副文夀朋有逸調有雋思嗚呼君謂死者必先氣索而神零孰謂君氣足以薄雲漢兮神昭晣乎日星而忽隕背乎不能保百年之康寧惟君别我往祠太乙笑言從容愈於平日既至即事升降孔秩歸鞍在塗不返其室訃聞士夫環視太息矧我於君情何可極具兹醪羞以告哀惻祭高師雄主簿文奇崛之文我始寄此與君往還於時康定慶厯之間愛我勤我急我所難日月一世疾於跳丸南北幾時相見悲歡去嵗憂除追尋陳迹淮水之上冶城之側握手笑語有如一昔屈指數日待君歸舲安知彌年乃見哭庭維君家行可謂修飭如其智能亦豈多得垂老一命終於逺域豈惟故人所為歎惜撫棺一奠以告心惻祭丁元珍學士文情之痛而吐辭之激昻我初閉門屈首書詩一出涉世茫無所知援挈覆護免於阽危雍培浸灌使有華滋微吾元珍我始弗殖如何棄我隕命一昔以忠出恕以信行仁至於白首困厄窮屯又從躋之使以躓死豈伊人尤天實為此有槃彼石可志於丘雖不屬我我其徂求請著君德銘之九幽以馳我哀不在醪羞祭歐陽文忠公文歐陽公祭文當以此為第一夫事有人力之可致猶不可期况乎天理之溟溟又安可得而推惟公生有聞於當時死有傳於後世茍能如此足矣而亦又何悲如公器質之深厚智識之高逺而輔學術之精微故充於文章見於議論豪健俊偉怪巧瑰琦其積於中者浩如江河之停蓄其發於外者爛如日星之光輝其清音幽韻凄如飄風急雨之驟至其雄辭閎辨快如輕車駿馬之奔馳世之學者無問乎識與不識而讀其文則其人可知嗚呼自公仕宦四十年上下往復感世路之崎嶇雖屯邅困躓竄斥流離而終不可掩者以其公議之是非既壓復起遂顯于世果敢之氣剛正之節至晚而不衰方仁宗皇帝臨朝之末年顧念後事謂如公者可寄以社稷之安危及夫發謀决䇿從容指顧立定大計謂千載而一時功名成就不居而去其出處進退又庶乎英魄靈氣不隨異物腐散而長在乎箕山之側與潁水之湄然天下之無賢不肖且猶為涕泣而歔欷而况朝士大夫平昔游從又豫心之所嚮慕而瞻依嗚呼盛衰興廢之理自古如此而臨風想望不能忘情者念公之不可復見而其誰與歸祭張安國撿正文嗚呼善之不必福其已久矣豈今於君始悼歎其如此自君喪除知必顧豫怪久不至豈其病歟今也君弟哭而來赴天不姑釋一士以為豫助何生之艱而死之遽君始從我與吾兒游言動視聽正而不偷樂於饑寒惟道之謀既掾司法議爭讞失中書大理再為君屈遂升宰屬能撓彊倔辨正獄訟又常精出豈君刑名為獨窮深直諒明清靡所不任人恌莫知乃惻我心君仁至矣勇施而忘已君孝至矣孺慕以至死能人所難可謂君子嗚呼吾兒逝矣君又隨之我留在世其與幾時酒食之哀侑以言辭祭束向原道文中多奇氣嗚呼束君其信然邪奚仇友朋奚怨室家堂堂去之我始疑嗟惟昔見君田子之自我欲疾走哭諸田氏吾縻不赴田疾不知今乃獨哭誰同我悲始君求仕士莫敢匹洪洪其聲碩碩其實霜落之林豪鷹雋鸇萬鳥避逃直摩蒼天躓焉僅仕后愈以困洗藏銷塞動輒失分如羈駿馬以駕柴車側身墮首與蹇同芻命又不祥不能中夀百不一出孰知其有能知君者世孰豫多學則同游仕則同科出作揚官君實其鄉傾心倒肝迹斥形忘君於夀食我飲鄞水豈無此朋念不去彼既來自東乃臨君喪閟閟隂宫梗野榛荒東門之行不幾日月孰云于今萬世之别嗟屯怨窮閔命不長世人皆然君子則亡豫其何言君尚有知具此酒食以陳我悲祭王回深甫文交深而言戚可裂肺肝嗟嗟深甫真棄我而先乎孰謂深甫之壯以死而吾可以長年乎雖吾昔日執子之手歸言子之所為實受命於吾母曰如此人乃與為友吾母知子過於豫初終子成德多吾不如嗚呼天乎既喪吾母又奪吾友雖不即死吾何能久搏胸一慟心摧志朽泣涕為文以薦食酒嗟嗟深甫子尚知否唐宋八大家文鈔卷九十六
