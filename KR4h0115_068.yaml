body:
  text: 唐宋八大家文鈔卷六十四明茅坤撰廬陵史鈔四梁臣傳五代臣傳總論歐陽公作五代臣傳吾於梁首録敬翔次之以葛從周康懷英劉鄩牛存節楊師厚王景仁於唐首郭崇韜而次之以安重誨周德威符存審史建瑭王建及元行欽烏震張延朗李嚴劉延朗康義誠豆盧革任圜張憲等傳此皆關係國家所以存亡得失之大者晉漢以下諸臣皆碌碌庸人耳獨晉桑維翰景延廣周王朴三人稍有可觀豫故録之嗚呼孟子謂春秋無義戰豫亦以謂五代無全臣無者非無一人蓋僅有之耳余得死節之士三人焉其仕不及于二代者各以其國繫之作梁唐晉漢周臣傳其餘仕非一代不可以國繫之者作雜傳夫入於雜誠君子之所羞而一代之臣未必皆可貴也覽者詳其善惡焉敬翔傳覽歐公序次本末昭宗當時未必有除全忠之心而中外流傳不無如是所以全忠非惟不敢赴召并敬翔亦麾之使去所以上下積猜釀成篡弒之亂悲夫敬翔字子振同州馮翊人也自言唐平陽王暉之後少好學工書檄乾符中舉進士不中乃客大梁翔同里人王發為汴州觀察支使遂往依焉久之發無所薦引翔客益窘為人作箋刺傳之軍中太祖素不知書翔所作皆俚俗語太祖愛之謂發曰聞君有故人可與俱來翔見太祖太祖問曰聞子讀春秋春秋所記何等事翔曰諸侯爭戰之事耳太祖曰其用兵之法可以為吾用乎翔曰兵者應變出竒以取勝春秋古法不可用於今太祖大喜補以軍職非其所好乃以為館驛巡官太祖與蔡人戰汴郊翔時時為太祖謀畫多中太祖欣然以謂得翔之晚動靜輒以問之太祖奉昭宗自岐還長安昭宗召翔與李振升延喜樓勞之拜翔太府卿初太祖常侍殿上昭宗意衛兵有能擒之者乃佯為鞋結解以顧太祖太祖跪而結之而左右無敢動者太祖流汗洽背由此稀復進見昭宗遷洛陽宴崇勳殿酒半起使人召太祖入內殿將有所託太祖益懼辭以疾昭宗曰卿不欲來可使敬翔來太祖遽麾翔出翔亦佯醉去太祖已破趙匡凝取荆襄遂攻淮南翔切諌以謂新勝之兵宜持重以養威太祖不聽兵出光州遭大雨幾不得進進攻夀州不克而多所亡失太祖始大悔恨歸而忿躁殺唐大臣幾盡然益以翔為可信任梁之篡弒翔之謀為多太祖即位以唐樞密院故用宦者乃改為崇政院以翔為使遷兵部尚書金鑾殿大學士翔為人深沈有大略從太祖用兵三十餘年細大之務必關之翔亦盡心勤勞晝夜不寐自言惟馬上乃得休息而太祖剛暴難近有所不可翔亦未嘗顯言微開其端太祖意悟多為之改易太祖破徐州得時溥寵姬劉氏愛幸之劉氏故尚讓妻也乃以妻翔翔巳貴劉氏猶侍太祖出入卧內如平時翔頗患之劉氏誚翔曰爾以我嘗失身於賊乎尚讓黃家宰相時溥國之忠臣以卿門地猶為辱我請從此訣矣翔以太祖故謝而止之劉氏車服驕侈别置典謁交結藩鎮權貴往往附之寵信言事不下於翔當時貴家往往效之太祖崩友圭立以翔先帝謀臣懼其圖巳不欲翔居內職乃以李振代翔為崇政使拜翔中書侍郎同中書門下平章事翔以友圭畏巳多稱疾未嘗省事末帝即位趙巖等用事頗離間舊臣翔愈鬱鬱不得志其後梁盡失河北與晉相距楊劉翔曰故時河朔半在以先帝之武御貔虎之臣猶不得志於晉今晉日益彊梁日益削陛下處深宫之中所與計事者非其近習則皆親戚之私而望成事乎臣聞晉攻楊劉李亞子負薪渡水為士卒先陛下委蛇守文以儒雅自喜而遣賀環為將豈足當彼之餘鋒乎臣雖憊矣受國恩深若其乏材願得自效巖等以翔為怨言遂不用其後王彥章敗于中都末帝懼召段凝於河上是時梁精兵悉在凝軍凝有異志顧望不來末帝遽呼翔曰朕居常忽卿言今急矣勿以為懟卿其教我當安歸翔曰臣從先帝三十餘年今雖為相實朱氏老奴爾事陛下如郎君以臣之心敢有所隱陛下初用段凝臣巳爭之今凝不來敵勢巳迫欲為陛下謀則小人間之必不見聽請先死不忍見宗廟之亡君臣相向慟哭翔與李振俱為太祖所信任莊宗入汴詔赦梁羣臣李振喜謂翔曰有詔洗滌將朝新君邀翔欲俱入見翔夜止髙頭車坊將旦左右報曰崇政李公入朝矣翔歎曰李振謬為丈夫矣復何面目入梁建國門乎乃自經而卒葛從周傳葛從周事梁為大將百戰不失可謂兵之善者巳葛從周字通美濮州甄城人也少從黃巢巢敗降梁從太祖攻蔡州太祖墜馬從周扶太祖復騎與敵步鬬傷面身被數瘡偏將張延夀從旁擊之從周得與太祖俱去太祖盡黜諸將獨用從周延夀為大將秦宗權掠地潁亳及梁兵戰于焦夷從周獲其將王涓一人從朱珍收兵淄青遇東兵輒戰珍得兵歸從周功為多張全義襲李罕之於河陽罕之奔晉召晉兵以攻全義全義乞兵於梁太祖遣從周丁㑹等救之敗晉兵於沇河潞州馮霸殺晉守將李克修以降梁太祖遣從周入潞州晉兵攻之從周不能守走河陽太祖攻魏從周與丁㑹先下黎陽臨河㑹太祖於內黃敗魏兵於永定橋從丁㑹攻宿州以水浸其城遂破之太祖攻朱瑾于兖州未下留從周圍之瑾閉壁不出從周詐言救兵至陽避之髙吳夜半潛還城下瑾以謂從周巳去乃出兵收外壕從周掩擊之殺千餘人晉攻魏魏人求救太祖遣侯言救魏言築壘于洹水太祖怒言不出戰遣從周代言從周至軍益閉壘不出而鑿三暗門以待晉兵攻之從周以精兵自暗門出擊敗晉兵晉王怒自將擊從周從周雖大敗而梁兵擒其子落落送于魏斬之遂從攻鄆州擒朱宣於中都又攻兖州走朱瑾太祖表從周兖州留後以兖鄆兵攻淮南出安豐㑹龎師古于清口從周行至濠州聞師古死遽還至渒河將渡而淮兵追之從周亦大敗是時晉兵出山東攻相衛太祖遣從周略地山東下洺州斬其刺史邢善益又下邢州走其刺史馬師素又下磁州殺其刺史袁奉滔五日而下三州太祖乃表從周兼邢州留後劉仁恭攻魏巳屠貝州羅紹威求救于梁從周㑹太祖救魏入于魏州燕兵攻館陶門從周以五百騎出戰曰大敵在前何可返顧使閉門而後戰破其八栅燕兵走追至于臨清擁之御河溺死者甚衆太祖以從周為宣義行軍司馬太祖遣從周攻劉守文于滄州以蔣暉監其軍守文求救于其父仁恭仁恭以燕兵救之暉語諸將曰吾王以我監諸將今燕兵來不可迎戰宜縱其入城聚食倉廪使兩困而後取之諸將頗以為然從周怒曰兵在上將豈監軍所得言且暉之言乃常談爾勝敗之機在吾心暉豈足以知之乃勒兵逆仁恭于乾寧戰于老鴉堤仁恭大敗斬首三萬餘級獲其將馬慎交等百餘人馬三千匹是時守文亦求救于晉晉為攻邢洺以牽之從周遽還敗晉兵于青山遂從太祖攻鎮州下臨城王鎔乞盟太祖表從周泰寧軍節度使從氏叔琮攻晉太原不克梁兵西攻鳯翔青州王師範遣其將劉鄩襲兖州從周家屬為鄩所得厚遇之而不殺太祖還自鳯翔乃遣從周攻鄩從周卒招降鄩太祖即位拜左金吾衛上將軍以疾致仕拜右衛上將軍居于偃師末帝即位拜昭義軍節度使封陳留郡王食其俸于家卒贈太尉康懷英傳康懷英兖州人也事朱瑾為牙將梁兵攻瑾瑾出略食豐沛問留懷英守城懷英即以城降梁瑾遂奔于吳太祖得懷英大喜後從氏叔琮攻趙匡凝下鄧州梁兵攻李茂貞于岐以懷英為先鋒至武功擊殺岐兵萬餘人太祖喜曰邑名武功真武功也以名馬賜之是時李周彛以鄜坊兵救岐屯于三原懷英擊走之因取其翟州而還岐兵屯奉天懷英柵其東北夜半岐兵攻之懷英以為夜中不欲驚它軍獨以三千人出戰遲明岐兵解去身被十餘瘡李茂貞與梁和昭宗還京師賜懷英迎鑾毅勇功臣楊行密攻宿州太祖遣懷英擊走之表宿州刺史遷保義軍節度使丁㑹以潞州叛梁降晉太祖命懷英為招討使將行太祖戒之語甚切懷英惶恐以謂潞州期必得乃築夾城圍之晉遣周德威屯于亂柳數攻夾城懷英不敢出戰太祖乃以李思安代懷英將降懷英為都虞候久之思安亦無功太祖大怒罷思安以同州劉知俊為招討使知俊未至軍太祖自至澤州為懷英等軍援且督之巳而晉王李克用卒莊宗召周德威還太原太祖聞晉有喪德威去亦歸洛陽而諸將亦少弛莊宗謂德威曰晉之所以能敵梁而彼所憚者先王也今聞吾王之喪謂我新立未能出兵其意必怠宜出其不意以擊之非徒解圍亦足以定霸也乃與德威等疾馳六日至北黃碾㑹天大昏霧伏兵三垂岡直趨夾城攻破之懷英大敗亡大將三百人懷英以百騎遁歸詣闕請死太祖曰去嵗興兵太隂虧食占者以為不利吾獨違之而致敗非爾過也釋之以為右衛上將軍劉知俊叛奔于岐以懷英為保義軍節度使西路副招討使知俊以岐兵圍靈武太祖遣懷英攻邠寧以牽之懷英取寧慶衍三州還至升平知俊掩擊之懷英大敗徙鎮感化其後朱友謙叛附于晉以懷英討之與晉人戰白徑嶺懷英又大敗徙鎮永平卒于鎮劉鄩傳中所次兵略可睹劉鄩密州安丘人也少事青州王敬武敬武卒子師範立棣州刺史張蟾叛師範遣指揮使盧洪討蟾洪亦叛師範僞為好辭召洪洪至迎於郊外命鄩斬之坐上因使鄩攻張蟾破之師範表鄩登州刺史以為行軍司馬梁太祖西攻鳯翔師範乘梁虗因遣人分襲梁諸州縣他遣者謀多漏泄事不成獨鄩素好兵書有機略是時梁巳破朱瑾等悉有兖鄆以葛從周為兖州節度使從周將兵在外鄩乃使人負油鬻城中悉視城中虗實出入之所油者得羅城下水竇可入鄩乃以步兵五百從水竇入襲破之徙從周家屬外第親拜其母撫之甚有恩禮太祖巳出昭宗于鳯翔引兵東還遣朱友寧攻師範從周攻鄩鄩以版輿置從周母城上母呼從周曰劉將軍待我甚厚無異於汝人臣各為其主汝可察之從周為之緩攻鄩乃悉簡婦人及民之老疾不足當敵者出之獨與少壯者同辛苦分衣食堅守以待外援久之外援不至人心頗離副使王彥溫踰城而奔守陴者多逸鄩乃遣人陽語彥溫曰副使勿多以人出非吾素遣者皆勿以行又下令城中曰吾遣從副使者得出否者皆族城中皆惑奔者乃止巳而梁兵聞之果疑彥溫非實降者乃斬之城下由是城守益堅師範兵巳屈從周以禍福諭鄩鄩報曰俟吾主降即以城還梁師範敗降梁鄩乃亦降從周為具齎裝送鄩歸梁鄩曰降將蒙梁恩不誅幸矣敢乘馬而衣裘乎乃素服乘驢歸梁太祖賜之冠帶飲之以酒鄩辭以量小太祖曰取兖州量何大乎以為元從都押衙是時太祖巳領四鎮四鎮將吏皆功臣舊人鄩一旦以降將居其上及諸將見鄩皆用軍禮鄩居自如太祖益竒之太祖即位纍遷左龍武統軍劉知俊叛陷長安太祖遣鄩與牛存節討之知俊走鳯翔太祖乃以長安為永平軍拜鄩節度使末帝即位領鎮南軍節度使為開封尹楊師厚卒分相魏為兩鎮末帝恐魏兵亂遣鄩以兵屯于魏縣魏兵果亂劫賀德倫降晉莊宗入魏鄩以謂晉兵悉從莊宗赴魏而太原可襲乃結草為人執以旗幟以驢負之往來城上而潛軍出黃澤關襲太原晉兵望梁壘旗幟往來不知其去也以故不追鄩至樂平遇雨不克進而旋急趨臨清爭魏積粟而周德威巳先至鄩乃屯于莘縣築甬道及河以饋軍久之末帝以書責鄩曰閫外之事全付將軍河朔諸州一旦淪沒今倉儲巳竭飛挽不充將軍與國同心宜思良畫鄩報曰晉兵甚鋭未可擊宜待之末帝復遣問鄩必勝之䇿鄩曰臣無竒術請人給米十斛米盡則敵破矣末帝大怒誚鄩曰將軍蓄米將療饑乎將破敵乎乃遣使者監督其軍鄩召諸將謀曰主上深居禁中與白面兒謀必敗人事今敵盛未可輕動諸君以為如何諸將皆欲戰鄩乃悉召諸將坐之軍門人以河水一杯飲之諸將莫測或飲或辭鄩曰一杯之難猶若此滔滔河流可盡乎諸將皆失色是時莊宗在魏數以徑兵壓鄩營鄩不肯出而末帝又數促鄩使出戰莊宗與諸將謀曰劉鄩學六韜喜以機變用兵本欲示弱以襲我今其見迫必求速戰乃聲言歸太原命符存審守魏陽為西歸而潛兵貝州鄩果報末帝曰晉王西歸魏無備可擊乃以兵萬人攻魏城東莊宗自貝州返趨擊之鄩忽見晉軍驚曰晉王在此邪兵稍却追至故元城莊宗與符存審為兩方陳夾之鄩為圓陳以禦晉人兵再合鄩大敗南奔自黎陽濟河保滑州末帝以為義成軍節度使明年河朔皆入于晉降鄩亳州團練使兖州張萬進反拜鄩兖州安撫制置使萬進敗死乃拜鄩泰寧軍節度使朱友謙叛陷同州末帝以鄩為河東道招討使行次陜州鄩為書以招友謙友謙不報留月餘待之尹皓段凝等素惡鄩乃譖之以為鄩與友謙親家故其逗留以養賊巳而鄩兵數敗乃罷鄩歸洛陽鴆殺之年六十四贈中書令牛存節傳牛存節字贊正青州博昌人也初名禮事諸葛爽於河陽爽卒存節顧其徒曰天下洶洶當得英雄事之乃率其徒十餘人歸梁太祖存節為人木彊忠謹太祖愛之賜之名字以為小挍張晊攻汴存節破其二寨梁攻濮州戰南劉橋范縣存節功多李罕之圍張全義於河陽全義乞兵於梁太祖以存節故事河陽知其間道使以兵為前鋒是時嵗饑兵行乏食存節以金帛就民易乾椹以食軍擊走罕之太祖攻魏存節下魏黎陽臨河殺魏萬二千人與太祖㑹內黃遷滑州牢城遏後指揮使梁兵攻鄆存節使都將王言藏船鄆西北隅濠中期以日午渡兵踰濠急攻之㑹營中火起鄆人登城望火言伏不敢動與存節失期存節獨破鄆西甕城門奪其濠橋梁兵得俱進遂破朱宣從葛從周攻淮南從周敗渒河存節收其散卒八千以歸拜亳宿二州刺史朱瑾走吳召吳兵攻徐宿存節謀曰淮兵必不先攻宿然宿溝壘素固可以禦敵乃夜以兵急趣徐州北傅徐城下瑾兵方至望其塵起驚曰梁兵巳來何其速也不能攻而去已而太祖使者至授存節軍機悉與存節意合由是諸將益服其能遷潞州都指揮使太祖攻鳯翔使召存節存節為將法令嚴整而善得士心潞人送者皆號泣纍拜邢州團練使元帥府左都押衙太祖即位拜右千牛衛上將軍從康懷英攻潞州為行營排陳使晉兵巳破夾城存節等以餘兵歸行至天井關聞晉兵攻澤州存節顧諸將曰吾行雖不受命然澤州要害不可失也諸將皆不欲救之存節戒士卒熟息巳而謂曰事急不赴豈曰勇乎舉䇿而先士卒隨之比至澤州州人已焚外城將降晉聞存節至乃稍定存節入城助澤人守晉人穴地道以攻之存節選勇士數十亦穴地以應之戰于隧中敵不得入晉人解去遷左龍虎統軍六軍都指揮使絳州刺史遷鄜州留後同州劉知俊叛奔鳯翔乃遷存節匡國軍節度使友圭立朱友謙叛附于晉西連鳯翔存節東西受敵同州水鹹而無井知俊叛梁以渴不能守而走故友謙與岐兵合圍持久欲以渴疲之存節禱而擇地鑿井八十水皆甘可食友謙卒不能下末帝立加同中書門下平章事徙鎮天平蔣殷反徐州遣存節攻破之以功加太尉梁晉相距於河上存節病痟而梁晉方苦戰存節忠憤彌激治軍督士未嘗言病病革召歸京師將卒語其子知業曰忠孝吾子也不及其他贈太師楊師厚傳楊師厚本梁一驍將而歐公傳之得其神故録而出之楊師厚潁州斤溝人也少事河陽李罕之罕之降晉選其麾下徑卒百人獻于晉王師厚在籍中師厚在晉無所知名後以罪奔于梁梁太祖以為宣武軍押衙曹州刺史梁攻王師範師厚戰臨朐擒其偏將八十餘人取棣州以功拜齊州刺史太祖攻趙匡凝於襄陽遣師厚為先鋒師厚取榖城西童山木為浮橋渡漢水擊匡凝敗之匡凝棄城走師厚進攻荆南又走匡凝弟匡明功為多拜山南東道節度使同中書門下平章事劉知俊反攻陷長安劉鄩牛存節等攻之久不克師厚以竒兵傍南山入其西門降其守者遂克之晉周德威攻晉州以應知俊師厚敗之于蒙坑以功遷保義軍節度使徙鎮宣義是時梁兵攻趙久無功太祖病卧洛陽少間乃自將北擊趙師厚從太祖至洹水夜行迷失道明旦次魏縣聞敵將至梁兵潰亂不可止久之無敵乃定已而太祖疾作乃還明年少間而晉軍攻燕燕王劉守光求援於梁太祖為之擊趙以牽晉屯于龍花遣師厚攻棗彊三日不能下太祖怒自往督戰乃破屠之進圍蓚縣晉史建瑭以輕兵夜擊梁軍梁軍大擾太祖與師厚皆棄輜重南走太祖還東都師厚留屯魏州明年太祖遇弒友圭自立師厚乘間殺魏牙將潘晏臧延範等逐出節度使羅周翰友圭因以師厚為天雄軍節度使自太祖與晉戰河北師厚嘗為招討使悉領梁之徑兵太祖崩師厚遂逐其帥而稍矜倨難制故時魏恃牙兵其帥得以倔彊羅紹威時牙兵盡死魏勢孤始為梁所制師厚已得志乃復置銀槍效節軍友圭隂欲圖之召師厚入計事其吏田溫等勸師厚勿行師厚曰吾二十年不負朱家今若不行則見疑而生事然吾知上為人雖往無如我何也乃以徑兵二萬朝京師留其兵城外以十餘人自從入見友圭友圭益恐懼賜與巨萬而還已而末帝謀討友圭問於趙巖巖曰此事成敗在招討楊公爾得其一言諭禁軍吾事立辦末帝乃遣馬慎交隂見師厚布腹心師厚猶豫未決謂其下曰方郢王弒逆時吾不能即討今君臣之分巳定無故改圖人謂我何其下或曰友圭弒父與君乃天下之惡均王仗大義以誅賊其事易成彼若一朝破賊公將何以自處師厚大悟乃遣其將王舜賢至洛陽見袁象先計事使朱漢賔以兵屯滑州為應末帝卒與象先殺友圭末帝即位封師厚鄴王詔書不名事無巨細皆以咨之然心益忌而畏之巳而師厚瘍發卒末帝為之受賀於宫中由是始分相魏為兩鎮魏軍亂以魏博降晉梁失河北自此始王景仁傳王景仁廬州合肥人也初名茂章少從楊行密起淮南景仁為將驍勇剛悍質略無威儀臨敵務以身先士卒行密壯之梁太祖遣子友寧攻王師範于青州師範乞兵於行密行密遣景仁以步騎七千救師範師範以兵背城為兩柵友寧夜擊其一柵柵中告急趣景仁出戰景仁按兵不動友寧已破一柵連戰不已遲明景仁度友寧兵已困乃出戰大敗之遂斬友寧以其首報行密是時梁太祖方攻鄆州聞子友寧死以兵二十萬倍道而至景仁閉壘示怯伺梁兵怠毁柵而出驅馳疾戰戰酣退坐召諸將飲酒已而復戰太祖登髙望見之得青州降人問飲酒者為誰曰王茂章也太祖歎曰使吾得此人為將天下不足平也梁兵又敗景仁軍還梁兵急追之景仁度不可走遣禆將李䖍裕以衆一旅設覆於山下以待之留軍不行解鞍而寢䖍裕疾呼曰迫兵至矣宜速走䖍裕以死遏之景仁曰吾亦戰於此也䖍裕三請景仁乃行而䖍裕卒戰死梁兵以故不能及而景仁得全軍以歸景仁事行密為潤州團練使行密死子渥自宣州入立以景仁代守宣州渥已立反求宣州故時物景仁惜不與渥怒以兵攻之景仁奔于錢鏐鏐表景仁領宣州節度使梁太祖素識景仁乃遣人召之景仁間道歸梁仍以為寧國軍節度使加同中書門下平章事久之未有以用使參宰相班奉朝請而已開平四年以景仁為北面招討使將韓勍李思安等兵伐趙行至魏州司天監言太隂虧不利行師太祖亟召景仁等還已而復遣之景仁已去太祖思術者言馳使者止景仁於魏以待景仁巳過邢洺使者及之景仁不奉詔進營於柏鄉乾化元年正月庚寅日有食之崇政使敬翔白太祖曰兵可憂矣太祖為之旰食是日景仁及晉人戰大敗於柏鄉景仁歸訴於太祖太祖曰吾亦知之蓋韓勍李思安輕汝為客而不從節度爾乃罷景仁就第後數月悉復其官爵末帝立以景仁為淮南招討使使攻廬夀軍過獨山山有楊行密祠景仁再拜號泣而去戰于霍山梁兵敗走景仁殿而力戰以故梁兵不甚敗景仁歸京師病疽卒贈太尉唐宋八大家文鈔卷六十四
