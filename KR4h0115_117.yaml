body:
  text: 唐宋八大家文鈔卷一百七明茅坤撰老泉文鈔一上書狀上仁宗皇帝書此書反覆數千言如抽藕中之絲段段有情緒可愛而中間指陳時政處又往往深中宋嘉祐間事宜老泉一生文章政事略見於此矣前月五日蒙本州録到中書劄子連牒臣以兩制議上翰林學士歐陽修奏臣所著權書衡論幾策二十篇乞賜甄録陛下過聽召臣試䇿論舍人院仍令本州發遣臣赴闕臣本田野匹夫名姓不登於州閭今一旦卒然被召實不知其所以自通於朝廷承命悸恐不知所為以陛下躬至聖之資又有羣公卿之賢與天下士大夫之衆如臣等輩固宜不少有臣無臣不加損益臣不幸有負薪之疾不能奔走道路以副陛下搜揚之心憂惶負罪無所容處臣本凡才無路自進當少年時亦嘗欲僥幸於陛下之科舉有司以為不肖輒以擯落蓋退而處者十有餘年矣今雖欲勉强扶病勠力亦自知其踈拙終不能合有司之意恐重得罪以辱明詔且陛下所為千里而召臣者其意以臣為能有所發明以庶幾有補於聖政之萬一而臣之所以自結髮讀書至於今兹犬馬之齒幾已五十而猶未敢廢者其意亦欲效尺寸於當時以快平生之志耳今雖未能奔伏闕下以纍有司而猶不忍默默卒無一言而巳也天下之事其深逺切至者臣自惟踈賤未敢遽言而其近而易行淺而易見者謹條為十通以塞明詔其一曰臣聞利之所在天下趨之是故千金之子欲有所為則百家之市無寧居者古之聖人執其大利之權以奔走天下意有所向則天下爭先為之今陛下有奔走天下之權而不能用何則古者賞一人而天下勸今陛下增秩拜官動以千計其人皆以為巳所自致而不知勠力以報上之恩至於臨事誰當效用此由陛下輕用其爵祿使天下之士積日持久而得之譬如傭力之人計工而受直雖與之千萬豈知德其主哉是以雖有能者亦無所施以為謹守繩墨足以自致髙位官吏繁多溢于局外使陛下皇皇汲汲求以處之而不暇擇其賢不肖以病陛下之民而耗竭大司農之錢穀此議者所欲去而未得也臣竊思之蓋今制天下之吏自州縣令録幕職而改京官者皆未得其術是以若此紛紛也今雖多其舉官而逺其考重其舉官之罪此適足以隔賢者而容不肖且天下無事雖庸人皆足以無過一旦改官無所不為彼其舉者曰此廉吏此能吏朝廷不知其所以為廉與能也幸而未有敗事則長為廉與能矣雖重其罪未見有益上下相蒙請託公行涖官六七考求舉主五六人此誰不能者臣愚以為舉人者當使明著其迹曰某人廉吏也嘗有某事以知其廉某人能吏也嘗有某事以知其能雖不必有非常之功而皆有可紀之狀其特曰廉能而已者不聽如此則夫庸人雖無罪而不足稱者不得入其間老於州縣不足甚惜而天下之吏必皆務為可稱之功與民興利除害惟恐不出諸已此古之聖人所以驅天下之人而使爭為善也有功而賞有罪而罰其實一也今降官罷任者必奏曰某人有某罪其罪當然然後朝廷舉而行之今若不著其所犯之由而特曰此不才貪吏也則朝廷安肯以空言而加之罪今又何獨至於改官而聼其空言哉是不思之甚也或者以為如此則天下之吏務為可稱用意過當生事以為己功漸不可長臣以為不然蓋聖人必觀天下之勢而為之法方天下初定民厭勞役則聖人務為因循之政與之休息及其久安而無變則必有不振之禍是以聖人破其苟且之心而作其怠惰之氣漢之元成惟不知此以至於亂今天下少惰矣宜有以激發其心使踴躍於功名以變其俗况乎冗官紛紜如此不知所以節之而又何疑於此乎且陛下與天下之士相期於功名而毋茍得此待之至深也若其宏才大略不樂於小官而無聞焉者使兩制得以非常舉之此天下亦不過幾人而已吏之有過而不得遷者亦使得以功贖如此亦以示陛下之有所推恩而不惟艱之也其二曰臣聞古者之制爵祿必皆孝悌忠信修潔博習聞於鄉黨而達於朝廷以得之及其後世不然曲藝小數皆可以進然其得之也猶有以取之其弊不若今之甚也今之用人最無謂者其所謂任子乎因其父兄之資以得大官而又任其子弟子將復任其孫孫又任其子是不學而得者常無窮也夫得之也易則其失之也不甚惜以不學之人而居不甚惜之官其視民如草芥也固宜朝廷自近年始有意於裁節然皆知損之而未得其所損此所謂制其末而不窮其源見其粗而未識其精僥幸之風少衰而猶在也夫聖人之舉事不唯曰利而已必將有以大服天下之心今欲有所去也必使天下知其所以去之之說故雖盡去而無疑何者恃其說明也夫所謂任子者亦猶曰信其父兄而用其子弟云爾彼其父兄固學而得之也學者任人不學者任於人此易曉也今之制苟幸而其官至於可任者舉使任之不問其始之何從而得之也且彼任於人不暇又安能任人此猶借資之人而欲從之丐貸不已難乎臣愚以為父兄之所任而得官者雖至正郎宜皆不聼任子弟唯其能自修飾而越録躐次以至于清顯者乃聽如此則天下之冗官必大衰少而公卿之後皆奮志為學不待父兄之資其任而得官者知後不得復任其子弟亦當勉强不肯終老自棄於庸人此其為益豈特一二而巳其三曰臣聞自設官以來皆有考績之法周室既亡其法廢絶自京房建考課之議其後終不能行夫有官必有課有課必有賞罰有官而無課是無官也有課而無賞罰是無課也無官無課而欲求天下之大治臣不識也然更歷千載而終莫之行行之則益以紛亂而終不可考其故何也天下之吏不可以勝考今欲人人而課之必使入於九等之中此宜其顛倒錯繆而不若無之為便也臣觀自昔行考課者皆不得其術蓋天下之官皆有所屬之長有功有罪其長皆得以舉刺如必人人而課之於朝廷則其長為將安用惟其大吏無所屬而莫為之長也則課之所宜加何者其位尊故課一人而其下皆可以整齊其數少故可以盡其能否而不謬今天下所以不大治者守令丞尉賢不肖混淆而莫之辨也夫守令丞尉賢不肖之不辨其咎在職司之不明職司之不明其咎在無所屬而莫為之長陛下以無所屬之官而寄之以一路其賢不肖當使誰察之古之考績者皆從司㑹而至於天子古之司㑹即今之尚書尚書既廢唯御史可以總察中外之官臣愚以為可使朝臣議定職司考課之法而於御史臺别立考課之司中丞舉其大綱而屬官之中選强明者一人以專治其事以舉刺多者為上以舉刺少者為中以無舉刺者為下因其罷歸而奏其治要使朝廷有以為之賞罰其非常之功不可掩之罪又當特有以償之使職司知有所懲勸則其下守令丞尉不容復有所依違而其所課者又不過數十人足以求得其實此所謂用力少而成功多法無便於此者矣今天下號為太平其實逺方之民窮困巳甚其咎皆在職司臣不敢盡言陛下試加採訪乃知臣言之不妄其四曰臣聞古者諸侯臣妾其境內而卿大夫之家亦各有臣陪臣之事其君如其君之事天子此無他其一境之內所以生殺豫奪富貴貧賤者皆自我制之此固有以臣妾之也其後諸侯雖廢而自漢至唐猶有相君之勢何者其署置辟舉之權猶足以臣之也是故太守刺史坐於堂上州縣之吏拜於堂下雖奔走頓伏其誰曰不然自太祖受命收天下之尊歸之京師一命以上皆上所自署而大司農衣食之自宰相至於州縣吏雖貴賤相去甚逺而其實皆所與比肩而事主耳是以百餘年間天下不知有權臣之威而太守刺史猶用漢唐之制使州縣之吏事之如事君之禮皆受天子之爵皆食天子之祿不知其何以臣之也小吏之於大官不憂其有所不從唯恐其從之過耳今天下以貴相髙以賤相諂奈何使州縣之吏趨走於太守之庭不啻若僕妾唯唯不給故大吏常恣行不忌其下而小吏不能正以至於曲隨諂事助以為虐其能中立而不撓者固已難矣此不足怪其勢固使然也犬州縣之吏位卑而祿薄去於民最近而易以為姦朝廷所恃以制之者特以厲其廉隅全其節槩而養其氣使知有所恥也且必有異材焉後將以為公卿而安可薄哉其尤不可者令以縣令從州縣之禮夫縣令官雖卑其所負一縣之責與京朝官知縣等耳其吏胥人民習知其官長之拜伏於太守之庭如是之不威也故輕之輕之故易為姦此縣令之所以為難也臣愚以為州縣之吏事太守可恭遜卑抑不敢抗而已不至於通名贊拜趨走其下風所以全士大夫之節且以警大吏之不法者其五曰臣聞為天下者必有所不可窺是以天下有急不求其素所不用之人使天下不能幸其倉卒而取其祿位唯聖人為能然何則其素所用者緩急足以使也臨事而取者亦不足用矣傳曰寬則寵名譽之人急則用介胄之士今者所用非所養所養非所用國家用兵之時購方略設武舉使天下屠沽健武皆能徒手攫取陛下之官而兵休之日雖有超世之才而惜斗升之祿臣恐天下有以窺朝廷也今之任為將帥卒有急難而可使者誰也陛下之老將曩之所謂戰勝而善守者今亡矣臣愚以為可復武舉而為之新制以革其舊弊且昔之所謂武舉者蓋踈矣其以弓馬得者不過挽强引重市井之粗材而以䇿試中者亦皆記録章句區區無用之學又其取人太多天下之知兵者不宜如此之衆而待之又甚輕其第下者不免於𨽻役故其所得皆貪汙無行之徒豪傑之士恥不忍就宜因貢士之歲使兩制各舉其所聞有司試其可者而陛下親䇿之權略之外便於弓馬可以出入險阻勇而有謀者不過取一二人待以不次之位試以守邊之任文有制科武有武舉陛下欲得將相於此乎取之十人之中豈無一二斯亦足以濟矣其六曰臣聞法不足以制天下以法而制天下法之所不及天下斯欺之矣且法必有所不及也先王知其有所不及是故存其大略而濟之以至誠使天下之所以不吾欺者未必皆吾法之所能禁亦其中有所不忍而巳人君御其大臣不可以用法如其左右大臣而必待法而後能御也則其踈逺小吏當復何以哉以天下之大而無可信之人則國不足以為國矣臣觀今兩制以上非無賢俊之士然皆奉法供職無過而已莫肯於繩墨之外為陛下深思逺慮有所建明何者陛下待之於繩墨之內也臣請得舉其一二以言之夫兩府與兩制宜使日夜交於門以講論當世之務且以習知其為人臨事授任以不失其才今法不可以相往來意將以杜其告謁之私也君臣之道不同人臣惟自防人君惟無防之是以歡欣相接而無間以兩府兩制為可信耶當無所請屬以為不可信耶彼何患無所致其私意安在其相往來耶今兩制知舉不免用封彌謄録既奏而下御史親往涖之凛凛如鞫大獄使不知誰人之辭又何其甚也臣愚以為如此之類一切撤去彼稍有知宜不忍負若其猶有所欺也則亦天下之不才無恥者矣陛下赫然震威誅一二人可以使天下姦吏重足而立想聞朝廷之風亦必有倜儻非常之才為陛下用也其七曰臣聞為天下者可以名器授人而不可以名器許人人之不可以一日而知也久矣國家以科舉取人四方之來者如市一旦使有司第之此固非真知其才之髙下大小也特以為始收之而巳將試之為政而觀其悠久則必有大異不然者今進士三人之中釋褐之日天下望為卿相不及十年未有不為兩制者且彼以其一日之長而擅終身之富貴舉而歸之如有所負如此則雖天下之美材亦或怠而不修其率意恣行者人亦望風畏之不敢按此何為者也且又有甚不便者先王制其天下尊尊相髙貴貴相承使天下仰視朝廷之尊如泰山喬嶽非扳援所能及茍非有大功與出羣之才則不可以輕得其髙位是故天下知有所忌而不敢覬覦今五尺童子斐然皆有意於公卿得之則不知愧不得則怨何則彼習知其一旦之可以僥幸而無難也如此則匹夫輕朝廷臣愚以為三人之中茍優與一官足以報其一日之長館閣臺省非舉不入彼果不才者也其安以入為彼果才者也其何患無所舉此非獨以愛惜名器將以重朝廷耳其八曰臣聞古者敵國相觀不觀於其山川之險士馬之衆相觀於人而已髙山大江必有猛獸怪物時見其威故人不敢褻夫不必戰勝而後服也使之常有所忌而不敢發使吾常有所恃而無所怯耳今以中國之大使夷狄視之不畏甚者敢有煩言以瀆亂吾聼此其心不有所窺其安能如此之無畏也敵國有事相待以將無事相觀以使今之所謂使者亦輕矣曰此人也為此官也則以為此使也今歲以某來歲當以某又來歲當以某如縣令署役必均而已矣人之才固有所短而不可强其專對捷給勇敢又非可以學致也今必使强之彼有倉皇失次為夷狄笑而巳古者大夫出疆有可以安國家利社稷則專之今法令太密使小吏執簡記其旁一搖足輒隨而書之雖有竒才辨士亦安所效用彼夷狄觀之以為樽俎談燕之間尚不能辦軍旅之際固宜其無人也如此將何以破其姦謀而折其驕氣哉臣愚以為奉使宜有常人唯其可者而不必均彼其不能者陛下責之以文學政事不必强之於言語之間以敗吾事而亦稍寬其法使得有所施且今世之患以奉使為艱危故必均而後可陛下平時使人而皆得以辭免後有緩急使之出入死地將皆逃耶此臣又非獨為出使而言也其九曰臣聞刑之有赦其來逺矣周制八議有可赦之人而無可赦之時自三代之衰始聞有肆赦之令然皆因天下有非常之事凶荒流離之後盜賊垢汙之餘於是有以沛然洗濯於天下而猶不若今之因郊而赦使天下之凶民可以逆知而僥幸也平時小民畏法不敢趦趄當郊之歲盜賊公行罪人滿獄為天下者將何利於此而又糜散帑廪以賞無用冗雜之兵一經大禮費以萬億賦斂之不輕民之不聊生皆此之故也以陛下節用愛民非不欲去此矣顧以為所從來久逺恐一旦去之天下必以為少恩而凶豪無賴之兵或因以為辭而生亂此其所以重改也蓋事有不可改而遂不改者其憂必深改之則其禍必速惟其不失推恩而有以救天下之弊者臣愚以為先郊之歲可因事為辭特發大號如郊之赦與軍士之賜且告之曰吾於天下非有惜乎推恩也惟是凶殘之民知吾當赦輒以犯法以賊害吾良民今而後赦不於郊之歲以為常制天下之人喜乎非郊之歲而得郊之賞也何暇慮其後其後四五年而行之七八年而行之又從而盡去之天下晏然不知而日以逺矣且此出於五代之後兵荒之間所以姑息天下而安反側耳後之人相承而不能去以至於今法令明具四方無虞何畏而不改今不為之計使姦人猾吏養為盜賊而後取租賦以啖驕兵乘之以飢饉鮮不及矣當此之時欲為之計其猶有極乎其十曰臣聞古者所以採庶人之議為其踈賤而無嫌也不知爵祿之可愛故其言公不知君威之可畏故其言直今臣幸而末立于陛下之朝無所愛惜顧念於其心者是以天下之事陛下之諸臣所不敢盡言者臣請得以僣言之陛下擢用俊賢思致太平今幾年矣事垂立而輒廢功未成而旋去陛下知其所由乎陛下知其所由則今之在位者皆足以有立若猶未也雖得賢臣千萬天下終不可為何者小人之根未去也陛下遇士大夫有禮凡在位者不敢用褻狎戲嫚以求親媚於陛下而讒言邪謀之所由至於朝廷者天下之人皆以為陛下不踈逺宦官之過陛下特以為耳目玩弄之臣而不知其隂賊險詐為害最大天下之小人無由至於陛下之前故皆通於宦官珠玉錦繡所以為賂者絡繹於道以間關齟齬賢人之謀陛下縱不聽用而大臣常有所顧忌以不得盡其心臣故曰小人之根未去也竊聞之道路陛下將有意去而踈之也若如所言則天下之福然臣方以為憂而未敢賀也古之小人有為君子之所抑而反激為天下之禍者臣每痛傷之蓋東漢之衰宦官用事陽球為司𨽻校尉發憤誅王甫等數人磔其尸于道中常侍曹節過而見之遂奏誅陽球而宦官之用事過於王甫之未誅其後竇武何進又欲去之而反以遇害故漢之衰至於掃地而不可救夫君子之去小人惟能盡去乃無後患惟陛下思宗廟社稷之重與天下之可畏既去之又去之既踈之又踈之刀鋸之餘必無忠良縱有區區之小節不過闈闥掃灑之勤無益於事惟能務絶其權使朝廷清明而忠言嘉謨易以入則天下無事矣惟陛下無使為臣之所料而後世以臣為知言不勝大願曩臣所著二十二篇略言當世之要陛下雖以此召臣然臣觀朝廷之意特以其文采詞致稍有可嘉而未必其言之可用也天下無事臣每每狂言以迂濶為世笑然臣以為必將有時而不迂濶也賈誼之䇿不用於孝文之時而使主父偃之徒得其餘論而施之於孝武之世夫施之於孝武之世固不如用之於孝文之時之易也臣雖不及古人惟陛下不以一布衣之言而忽之不勝越次憂國之心效其所見且非陛下召臣臣言無以至於朝廷今老矣恐後無由復言故云云之多至於此也惟陛下寬之按此書十條內如革任子擇使罷赦令為最確而嚴考課之法舉武健之士其議雖未審亦當時所急至所言重縣令之體假兩制之權與髙第者不當按名叙用似無大關係首條欲州縣幕職上舉主必按其廉能其議未暢而未謂宦官一節恐非宋朝時事之亟者然於今日則可謂血脉腸胃間之疾也已修禮書狀情事明亦合經典右洵先奉敕編禮書後聞臣寮上言以為祖宗所行不能無過差不經之事欲盡芟去無使存録洵竊見議者之說與敕意大異何者前所授敕其意曰纂集故事而使後世無忘之耳非曰制為典禮而使後世遵而行之也然則洵等所編者是史書之類也遇事而記之不擇善惡詳其曲折而使後世得知而善惡自著者是史之體也若夫存其善者而去其不善則是制作之事而非職之所及也而議者以責洵等不已過乎且又有所不可者今朝廷之禮雖為詳備然大抵往往亦有不安之處非特一二事而已而欲有所去焉不識其所去者果何事也既欲去之則其勢不得不盡去盡去則禮缺而不備苟獨去其一而不去其二則適足以為抵牾齟齬而不可齊一且議者之意不過欲以掩惡諱過以存臣子之義如是而已矣昔孔子作春秋惟其惻怛而不忍言者而後有隱諱蓋桓公薨子般卒沒而不書其實以為是不可書也至於成宋亂及齊狩躋僖公作丘甲用田賦丹桓宫楹刻桓宫桷若此之類皆書而不諱其意以為雖不善而尚可書也今先世之所行雖小有不善者猶與春秋之所書者甚逺而悉使洵等隱諱而不書如此將使後世不知其淺深徒見當時之臣子至於隱諱而不言以為有所大不可言者則無乃欲益而反損歟公羊之說滅紀滅項皆所以為賢者諱然其所謂諱者非不書也書而迂曲其文耳然則其實猶不沒也其實猶不沒者非以彰其過也以見其過之止於此也今無故乃取先世之事而沒之後世將不知而大疑之此大不便者也班固作漢志凡漢之事悉載而無所擇今欲如之則先世之小有過差者不足以害其大明而可以使後世無疑之之意且使洵等為得其所職而不至於侵官者謹具狀唐宋八大家文鈔卷一百七
