body:
  text: 唐宋八大家文鈔卷一百十六明茅坤撰老泉文鈔十記説引敘彭州圎覺禪院記翻案格議論有一段風致人之居乎此也其必有樂乎此也居斯樂不樂不居也居而不樂不樂而不去為自欺且為欺天蓋君子恥食其食而無其功恥服其服而不知其事故居而不樂吾有吐食脫服以逃天下之譏而巳耳天之畀我以形而使我以心馭也今日欲適秦明日欲適越天下誰我禦故居而不樂不樂而不去是以心且不能馭其形而況能以馭他人哉自唐以來天下士大夫爭以排釋老為言故其徒之欲求知於吾士大夫之間者往往自叛其師以求容於吾而吾士大夫亦喜其來而接之以禮靈師文暢之徒飲酒食肉以自絶於其教嗚呼歸爾父子復爾室家而後吾許爾以叛爾師父子之不歸室家之不復而師之叛是不可以一日立于天下傳曰人臣無外交故季布之忠於楚也雖不如蕭韓之先覺而比丁公之二則為愈豫在京師彭州僧保聰來求識豫甚勤及至蜀聞其自京師歸布衣蔬食以為其徒先凡若干年而所居圓覺院大治一日為豫道其先師平潤事與其院之所以得名者請豫為記豫嘉聰之不以叛其師悅豫也故為之記曰彭州龍興寺僧平潤講圎覺經有竒因以名院院始弊不葺潤之來始得隙地以作堂宇凡更二僧而至於保聰聰又合其鄰之僧屋若干於其院以成是為記張益州畫像記詞氣嚴重極有法度益州常稱老蘇似司馬子長此記自子長之後殆不多得至和元年秋蜀人傳言有寇至邉軍夜呼野無居人妖言流聞京師震驚方命擇帥天子曰毋養亂毋助變衆言朋興朕志自定外亂不作變且中起不可以文令又不可以武競惟朕一二大吏孰能為處之文武之間其命往撫朕師乃惟曰張公方平其人天子曰然公以親辭不可遂行冬十一月至蜀至之日歸屯軍撤守備使謂郡縣寇來在吾無爾勞苦明年正月朔旦蜀人相慶如他日遂以無事又明年正月相告留公像於淨衆寺公不能禁睂陽蘇洵言於衆曰未亂易治也既亂易治也有亂之萌無亂之形是謂將亂將亂難治不可以有亂急亦不可以無亂弛是惟元年之秋如器之欹未墜於地惟爾張公安坐於其旁顔色不變徐起而正之既正油然而退無矜容為天子牧小民不倦惟爾張公爾繫以生惟爾父母且公嘗為我言民無常性惟上所待人皆曰蜀人多變於是待之以待盜賊之意而繩之以繩盜賊之法重足屏息之民而以砧斧令於是民始忍以其父母妻子之所仰賴之身而棄之於盜賊故每每大亂夫約之以禮驅之以法惟蜀人為易至於急之而生變雖齊魯亦然吾以齊魯待蜀人而蜀人亦自以齊魯之人待其身若夫肆意於法律之外以威劫齊民吾不忍為也嗚呼愛蜀人之深待蜀人之厚自公而前吾未始見也皆再拜稽首曰然蘇洵又曰公之恩在爾心爾死在爾子孫其功業在史官無以像為也且公意不欲如何皆曰公則何事於斯雖然於我心有不釋焉今夫平居聞一善必問其人之姓名與其鄉里之所在以至於其長短大小美惡之狀甚者或詰其平生所嗜好以想見其為人而史官亦書之於其傳意使天下之人思之於心則存之於目存之於目故其思之於心也固由此觀之像亦不為無助蘇洵無以詰遂為之記公南京人為人慷慨有大節以度量雄天下天下有大事公可屬系之以詩曰天子在阼歲在甲午西人傳言有寇在垣庭有武臣謀夫如雲天子曰嘻命我張公公來自東旗纛舒舒西人聚觀于巷于塗謂公暨暨公來于于公謂西人安爾室家無敢或訛訛言不祥往即爾常春爾條桑秋爾滌場西人稽首公我父兄公在西囿草木駢駢公宴其僚伐鼓淵淵西人來觀祝公萬年有女娟娟閨闥間間有童哇哇亦既能言昔公未來期汝棄捐禾麻芃芃倉庾崇崇嗟我婦子樂此歲豐公在朝廷天子股肱天子曰歸公敢不承作堂嚴嚴有廡有庭公像在中朝服冠纓西人相告無敢逸荒公歸京師公像在堂唐荆川曰此文二段二項敘事二項議論木假山記即木假山看出許多幸不幸來有感慨有態度文凡六轉入山末又一轉有百尺竿頭之意木之生或蘖而殤或拱而夭幸而至於任為棟梁則伐不幸而為風之所拔水之所漂或破折或腐幸而得不破折不腐則為人之所材而有斧斤之患其最幸者漂沉汨沒於湍沙之間不知其幾百年而其激射齧食之餘或髣佛於山者則為好事者取去強之以為山然後可以脫泥沙而逺斧斤而荒江之濆如此者幾何不為好事者所見而為樵夫野人所薪者何可勝數則其最幸者之中又有不幸者焉豫家有三峯豫每思之則疑其有數存乎其間且其蘖而不殤拱而不夭任為棟梁而不伐風拔水漂而不破折不腐不破折不腐而不為人所材以及於斧斤出於湍沙之間而不為樵夫野人之所薪而後得至乎此則其理似不偶然也然豫之愛之則非徒愛其似山而又有所感焉非徒愛之而又有所敬焉豫見中峰魁岸踞肆意氣端重若有以服其旁之二峯二峯者莊栗刻峭凜乎不可犯雖其勢服於中峰而岌然無阿附意吁其可敬也夫其可以有所感也夫蘇氏族譜亭記此是老蘇借譜亭諷里人并族子處匹夫而化鄉人者吾聞其語矣國有君邑有大夫而爭訟者訴於其門鄉有庠里有學而學道者赴於其家鄉人有為不善於室者父兄輒相與恐曰吾夫子無乃聞之嗚呼彼獨何修而得此哉意者其積之有本末而施之有次第邪今吾族人猶有服者不過百人而歲時蠟社不能相與盡其歡欣愛洽稍逺者至不相往來是無以示吾鄉黨鄰里也乃作蘇氏族譜立亭於髙祖墓塋之西南而刻石焉既而告之曰凡在此者死必赴冠娶妻必告少而孤則老者字之貧而無歸則富者收之而不然者族人之所共誚讓也歲正月相與拜奠於墓下既奠列坐於亭其老者顧少者而歎曰是不及見吾鄉鄰風俗之美矣自吾少時見有為不義者則衆相與疾之如見怪物焉栗然而不寧其後少衰也猶相與笑之今也則相與安之耳是起於某人也夫某人者是鄉之望人也而大亂吾俗焉是故其誘人也速其為害也深自斯人之逐其兄之遺孤子而不恤也而骨肉之恩薄自斯人之多取其先人之資田而欺其諸孤子也而孝悌之行缺自斯人之為其諸孤子之所訟也而禮義之節廢自斯人之以妾加其妻也而嫡庶之别混自斯人之篤於聲色而父子雜處歡譁不嚴也而閨門之政亂自斯人之瀆財無厭惟富者之為賢也而廉恥之路塞此六行者吾往時所謂大慙而不容者也令無知之人皆曰某人何人也猶且為之其輿馬赫奕婢妾倩麗足以蕩惑里巷之小人其官爵貨力足以搖動府縣其矯詐修飾言語足以欺罔君子是州里之大盜也吾不敢以告鄉人而私以告族人焉髣佛於斯人之一節者願無過吾門也豫聞之懼而請書焉老人曰書其事而闕其姓名使他人觀之則不知其為誰而夫人之觀之則面熱內慙汗出而食不下也且無名之庶其有悔乎豫曰然乃記之名二子説字僅百而無限宛轉無限情思輪輻蓋軫皆有職乎車而軾獨若無所為者雖然去軾則吾未見其為完車也軾乎吾懼汝之不外飾也天下之車莫不由轍而言車之功轍不與焉雖然車仆馬斃而患不及轍是轍者禍福之間轍乎吾知免矣按此老泉所以逆探兩公之終身也卒也長公再以斥廢僅而能免而少公終得以遺老自解脫悠悠卒歲亦竒矣仲兄文甫説風水之形人皆見之老泉便描出許多變態來令人目眩洵讀易至渙之六四曰渙其羣元吉曰嗟夫羣者聖人之所欲渙以混一天下者也蓋余仲兄名渙而字公羣則是以聖人之所欲解散滌蕩者以自命也而可乎他日以告兄曰子可無為我易之洵曰唯既而曰請以文甫易之如何且兄嘗見夫水之與風乎油然而行淵然而留渟洄汪洋滿而上浮者是水也而風實起之蓬蓬然而發乎太空不終日而行乎四方蕩乎其無形飄乎其逺來既往而不知其迹之所存者是風也而水實形之今夫風水之相遭乎大澤之陂也紆餘委蛇蜿蜒淪漣安而相推怒而相凌舒而如雲蹙而如鱗疾而如馳徐而如緬揖讓旋辟相顧而不前其繁如縠其亂如霧紛紜鬱擾百里若一汨乎順流至乎滄海之濱磅礴洶涌號怒相軋交橫綢繆放乎空虛掉乎無垠橫流逆折濆旋傾側宛轉膠戾回者如輪縈者如帶直者如燧奔者如焰跳者如鷺躍者鯉殊狀異態而風水之極觀備矣故曰風行水上渙此亦天下之至文也然而此二物者豈有求乎文哉無意乎相求不期而相遭而文生焉是其為文也非水之文也非風之文也二物者非能為文而不能不為文也物之相使而文出於其間也故此天下之至文也今夫玉非不溫然美矣而不得以為文刻鏤組繡非不文矣而不可以論乎自然故夫天下之無營而文生之者唯水與風而已昔者君子之處於世不求有功不得巳而功成則天下以為賢不求有言不得已而言出則天下以為口實嗚呼此不可與他人道之唯吾兄可也送石昌言為北使引文有生色直當與韓昌黎送殷員外等序相伯仲昌言舉進士時吾始數歲未學也憶與羣兒戲先府君側昌言從旁取棗栗啖我家居相近又以親戚故甚狎昌言舉進士日有名吾後漸長亦稍知讀書學句讀屬對聲律未成而廢昌言聞吾廢學雖不言察其意甚恨後十餘年昌言及第第四人守官四方不相聞吾日以壯大乃能感悟摧折復學又數年遊京師見昌言長安相與勞問如平生歡出文十數首昌言甚喜稱善吾晚學無師雖日為文中心自慙及聞昌言説乃頗自喜今十餘年又來京師而昌言官兩制乃為天子出使萬里之外強悍不屈之虜庭建大斾從騎數百送車千乘出都門意氣慨然自思為兒時見昌言先府君旁安知其至此富貴不足怪吾於昌言獨自有感也大丈夫生不為將得為使折衝口舌之間足矣往年彭任從富公使還為我言曰既出境宿驛亭聞介馬數萬騎馳過劒槊相摩終夜有聲從者怛然失色及明視道上馬迹尚心掉不得禁凡敵所以誇耀中國者多此類也中國之人不測也故或至於震懼而失辭以為夷狄笑嗚呼何其不思之甚也昔者奉春君使冒頓壯士健馬皆匿不見是以有平城之役今之胸奴吾知其無能為也孟子曰説大人則藐之况於夷狄請以為贈族譜引議論簡嚴情事曲折其氣格大略從公榖來蘇氏族譜譜蘇氏之族也蘇氏出於髙陽而蔓延於天下唐神堯初長史味道刺眉州卒於官一子留于眉眉之有蘇氏自此始而譜不及者親盡也親盡則曷為不及譜為親作也凡子得書而孫不得書者何也以著代也自吾之父以至吾之髙祖仕不仕娶某氏享年幾某日卒皆書而他不書者何也詳吾之所自出也自吾之父以至吾之髙祖皆曰諱某而他則遂名之何也尊吾之所自出也譜為蘇氏作而獨吾之所自出得詳與尊何也譜吾作也嗚呼觀吾之譜者孝悌之心可以油然而生矣情見於親親見於服服始于衰而至於緦麻而至於無服無服則親盡親盡則情盡情盡則喜不慶憂不弔喜不慶憂不弔則塗人也吾所與相視如塗人者其初兄弟也兄弟其初一人之身也悲夫一人之身分而至於塗人吾譜之所以作也其意曰分至於塗人者勢也勢吾無如之何也幸其未至於塗人也使其無至於忽忘焉可也嗚呼觀吾之譜者孝悌之心可以油然而生矣系之以詩曰吾父之子今為吾兄吾疾在身兄呻不寧數世之後不知何人彼死而生不為戚欣兄弟之情如足于手其能幾何彼不相能彼獨何心族譜後録敘事文字法度恰好大略本史遷自敘中來蘇氏之先出於髙陽髙陽之子曰稱稱之子曰老童老童生重黎及吳回重黎為帝嚳火正曰祝融以罪誅其後為司馬氏而其弟吳回復為火正吳回生陸終陸終生子六人長曰樊為昆吾次曰惠連為參胡次曰籛為彭祖次曰來言為會人次曰安為曹姓季曰季連為芈姓六人者皆有後其後各分為數姓昆吾始姓已氏其後為蘇顧溫董當夏之時昆吾為諸侯伯歷商而昆吾之後無聞至周有忿生為司寇能平刑以教百姓周公稱之蓋書所謂司寇蘇公者也司寇蘇公與檀伯達皆封於河世世仕周家於其封故河南河內皆有蘇氏六國之際秦及代厲其苗裔也至漢興而蘇氏始徙入秦或曰髙祖徙天下豪傑以實關中而蘇氏遷焉其後曰建家於長安杜陵武帝時為將以擊丐奴有功封平陵侯其後世遂家於其封建生三子長曰嘉次曰武次曰賢嘉為奉車都尉其六世孫純為南陽太守生子曰章當順帝時為冀州刺史又遷為并州有功於其人其子孫遂家於趙州其後至唐武后之世有味道焉味道聖歷初為鳳閣侍郎以貶為眉州刺史遷為益州長史未行而卒有子一人不能歸遂家焉自是眉始有蘇氏故眉之蘇皆宗益州長史味道趙郡之蘇皆宗并州刺史章扶風之蘇皆宗平陵侯建河南河內之蘇皆宗司寇忿生而凡蘇氏皆宗昆吾樊昆吾樊宗祝融吳回蓋自昆吾樊至司冦忿生自司冦忿生至平陵侯建自平陵侯建至并州刺史章自并州刺史章至益州刺史味道自益州長史味道至吾之髙祖其間世次皆不可紀而洵始為族譜以紀其族屬譜之所記上至於吾之髙祖下至於吾之昆弟昆弟死而及昆弟之子曰嗚呼髙祖之上不可詳矣自吾之前而吾莫之知焉巳矣自吾之後而莫之知焉則從吾譜而益廣之可以至於無窮蓋髙祖之子孫家授一譜而藏之其法曰凡嫡子而後得為譜為譜者皆存其髙祖而遷其髙祖之父世世存其先人之譜無廢也而其不及髙祖者自其得為譜者之父始而存其所宗之譜皆以吾譜冠焉其説曰此古之小宗也古者有大宗有小宗傳曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也别子者公子及士之始為大夫者也别子不得禰其父而自使其嫡子後之則為大宗故曰繼别為宗族人宗之雖百世而大宗死則為之齊衰三月其母妻亡亦然死而無子則支子以其昭穆後之此所謂百世不遷之宗也别子之庶子又不得禰别子而自使其嫡子為後則為小宗故曰繼禰者為小宗小宗五世之外則易宗其繼禰者親兄弟宗之其繼祖者從兄弟宗之其繼曾祖者再從兄弟宗之其繼髙祖者三從兄弟宗之死而無子則支子亦以其昭穆後之此所謂五世則遷之宗也凡今天下之人惟天子之子與始為大夫者而後可以為大宗其餘則否獨小宗之法猶可施於天下故為族譜其法皆從小宗凡吾之宗其繼髙祖者髙祖之嫡子祈祈死無子天下之宗法不立族人莫克以其子為之後是以繼髙祖之宗亡而虛存焉其繼曾祖者曾祖之嫡子宗善宗善之嫡子昭圖昭圖之嫡子惟益惟益之嫡子允元其繼祖者祖之嫡子諱序序之嫡子淡淡之嫡子位其繼禰者禰之嫡子淡淡之嫡子位曰嗚呼始可以詳之矣百世之後凡吾髙祖之子孫得其家之譜而觀之則為小宗得吾髙祖之子孫之譜而合之而以吾譜考焉則至於無窮而不可亂也是為譜之志云爾唐宋八大家文鈔卷一百十六
