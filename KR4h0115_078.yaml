body:
  text: 唐宋八大家文鈔卷七十四明茅坤撰廬陵史鈔十四雜傳康延孝傳康延孝自梁歸唐期以八日滅梁又及定蜀莊宗不能用之而卒以猜忌叛孝雖誅死而唐之不足以一天下可概見矣康延孝代北人也為太原軍卒有罪亡命于梁末帝遣段凝軍于河上以延孝為左右先鋒指揮使延孝見梁末帝任用羣小知其必亡乃以百騎奔于唐見莊宗於朝城莊宗解御衣金帶以賜之拜延孝博州刺史捧日軍使兼南面招討指揮使莊宗屏人問延孝梁事延孝具言末帝懦弱趙巖壻也張漢傑婦家皆用事段凝姦邪以入金多為大將自其父時故將皆出其下王彥章驍將也遣漢傑監其軍而制之小人進任而忠臣勇士皆見疏斥此其必亡之勢也莊宗又問梁計如何曰臣在梁時竊聞其議期以仲冬大舉遣董璋以陜虢澤潞之衆出石㑹以攻太原霍彥威以關西汝洛之兵掠邢洺以趨鎮定王彥章以京師禁衛擊鄆州段凝以河上之軍當陛下莊宗初聞延孝言梁必亡喜及聞其大舉也懼曰其將何以禦之延孝曰梁兵雖衆分則無餘臣請待其既分以鐵騎五千自鄆趨汴出其不意搗其空虛不旬日天下定矣莊宗甚壯其言後董璋等雖不出兵而梁兵悉屬段凝於河上京師無備莊宗卒用延孝䇿自鄆入汴凡八日而滅梁以功拜鄭州防禦使賜姓名曰李紹琛二年遷保義軍節度使三年征蜀以延孝為先鋒排陳斬斫使破鳳州取固鎮降興州與王衍戰三泉衍敗走斷吉柏江浮橋延孝造舟以渡進取綿州衍復斷綿江浮橋延孝謂招撫使李嚴曰吾逺軍千里入人之國利在速戰乘衍破膽之時但得百騎過鹿頭關彼將迎降不暇若修繕橋梁必留數日使衍得閉關為備則勝負未可知也因與嚴乘馬浮江軍士隨之濟者千餘人遂入鹿頭關下漢州居三月後軍始至衍弟宗弼果以蜀降延孝屯漢州以俟魏王繼岌蜀平延孝功為多左廂馬步軍都指揮使董璋位在延孝下然特見重於郭崇韜崇韜有軍事獨召璋與計議而不問延孝延孝大怒責璋曰吾有平蜀之功公等僕遬相從反俯首郭公之門吾為都將獨不能以軍法斬公邪璋訴於崇韜崇韜解璋軍職表為東川節度使延孝愈怒曰吾冒白刃犯險阻以定兩川璋有何功而得旄節因見崇韜言其不可崇韜曰紹琛反邪敢違吾節度延孝懼而退明年崇韜死延孝謂璋曰公復俯首何門邪璋求哀以免繼岌班師命延孝以萬二千人為殿行至武連聞朱友謙無罪見殺友謙有子令德在遂州莊宗遣使者詔繼岌即誅之繼岌不遣延孝而遣董璋延孝已自疑及璋過延孝軍又不謁延孝大怒謂其下曰南平梁西取蜀其謀畫出於郭公而汗馬之勞攻城破敵者我也今郭公已死我豈得存而友謙與我俱背梁以歸唐者友謙之禍次及我矣延孝部下皆友謙舊將知友謙被族皆號泣訴于軍門曰朱公無罪二百口被誅舊將往往從死我等死必矣延孝遂擁其衆自劍州返入蜀自稱西川節度三州制置等使馳檄蜀人數日之間衆至五萬繼岌遣任圜以七千騎追之及于漢州㑹孟知祥夾攻之延孝戰敗被擒載以檻車圜置酒軍中引檻車至坐上知祥酌大巵從車中飲之而謂曰公自梁朝脫身歸命遂擁節旄今平蜀之功何患富貴而入此檻車邪延孝曰郭崇韜佐命之臣功在第一兵不血刃而取兩川一旦無罪闔門受戮顧如延孝何保首領以此不敢歸朝耳任圜東還延孝檻車至鳳翔莊宗遣宦者殺之房知溫傳中魏州叛兵一節係唐及梁之禍根因録之房知溫字伯玉兖州瑕丘人也少以勇力為赤甲都官健後𨽻魏州馬鬬軍稍遷親隨軍指揮使莊宗取魏博得知溫賜姓李氏名曰紹英以為澶州刺史歷曹貝二州刺史戍瓦橋關明宗自魏反兵南向知溫首馳赴之天成元年拜泰寧軍節度使明年為北面招討使屯於盧臺明宗遣烏震往代知溫還鎮其戍卒效節軍將龍晊等攻震殺之效節魏州軍也魏州自羅紹威誅衙軍楊師厚為節度使復置銀槍效節軍當梁末帝時師厚幾為梁患師厚卒以賀德倫代之末帝患魏軍強難制與趙巖等謀分相魏為兩鎮魏軍由此作亂劫德倫叛梁而降晉梁遂失河北莊宗自得魏軍與梁戰河上數有功許其軍以滅梁而厚賞及梁亡魏軍雖數賜與而驕縱無厭常懷怨望皇甫暉之亂劫趙在禮入魏皆此軍也明宗入立在禮鎮天雄軍以魏軍素驕常懼禍不遑居隂遣人訴于明宗求解去明宗乃以皇子從榮代在禮而遣魏效節九指揮北戍盧臺軍發之日不給兵甲惟以長竿繫旗幟以表隊伍軍士頗自疑惑明年明宗遣烏震代知溫戍而知溫意尤不樂盧臺戍軍夾水東西為兩寨震初至與知溫㑹東寨方博效節軍亂噪於門外知溫即乘馬而出亂軍擊殺震執轡留知溫知溫紿曰騎兵皆在西寨今獨步軍恐無能為也知溫即躍馬登舟渡河入西寨以騎軍盡殺亂者明宗下詔悉誅其家屬於魏州凡九指揮三千餘家數萬口驅至漳水上殺之漳水為之變色魏之驕兵於是而盡明宗知變自知溫起釋而不問徙鎮武寧加兼侍中歷鎮天平平盧初明宗為北面招討使而知溫為副使廢帝時以裨將事知溫甚謹後因杯酒失意及廢帝起兵鳳翔愍帝出奔知溫乘間有窺覦之意謂其司馬李冲曰吾有錢數屋養兵數千因時建義功必有成冲曰今天子孱弱上下離心潞王兵威甚盛事未可知冲請懷表而西以覘之及冲至京師廢帝己入立冲即奉表稱賀還勸知溫入朝廢帝慰勞之甚厚知溫還鎮封東平王太常上言冊拜王公皇帝臨軒遣冊其在外者正衙命使而鹵簿鼓吹輅車法物不出都城考之故事無明文今北平王德鈞東平王知溫受封遣冊請下兵部太常太僕給鹵簿鼓吹輅車法物赴本道禮畢還有司知溫在鎮常厚斂其民積資巨萬治第青州南城出入以聲妓游嬉不恤政事天福元年卒于官贈太尉知溫卒後其子彥儒獻其父錢三萬緡絹布三萬匹金百兩銀千兩茶千五百斤絲十萬兩拜沂州刺史其將吏分其餘資者皆為富家云王晏球傳晏球多兵略而歐公㸃次有生色王晏球字瑩之洛陽人也少遇亂為盜所掠汴州富人杜氏得之養以為子冒姓杜氏梁太祖鎮宣武選富家子之材武者置之帳下號㕔子都晏球為人倜儻有大節為㕔子都指揮使太祖即位為右千牛衛將軍友圭立龍驤戍卒反自懷州趣京師遣晏球擊敗之于河陽以功遷龍驤第一指揮使末帝即位遷龍驤四軍都指揮使梁遣捉生軍將李霸將千人戍楊劉霸夜作亂自水門入縱火大譟以長竿縳布沃油仰燒建國門晏球聞亂不俟命率龍驤五百騎擊之賊勢稍却末帝登樓見之呼曰此非吾龍驤軍邪晏球奏曰亂者李霸一部爾陛下嚴守宫城而責臣破賊遲明盡殺之以功拜澶州刺史梁晉軍河上以晏球為行營馬步軍都指揮使莊宗入汴晏球以兵追之行至封丘聞末帝已崩即解甲降唐莊宗賜姓名曰李紹䖍拜齊州防禦使戍瓦橋關明宗兵變自鄴而南遣人招晏球晏球從至洛陽拜歸德軍節度使定州王都反以晏球為招討使與宣徽南院使張延朗等討之都遣人北招契丹契丹遣秃餒將萬騎救都晏球聞秃餒等兵且來留張延朗屯新樂自迎於望都而契丹從他道入定州與都出不意擊延朗軍延朗大敗收餘兵㑹晏球趨曲陽都乘勝追之晏球先至水次方坐胡床指揮而都衆掩至晏球與左右十餘人連矢射之都衆稍却而後軍亦至晏球立髙岡號令諸將皆槖弓矢用短兵回顧者斬符彥卿以左軍攻其左髙行圭以右軍攻其右中軍騎士抱馬項馳入都軍都遂大敗自曲陽至定州橫尸棄甲六十餘里都與秃餒入城不敢復出契丹又遣愓隱以七千騎益都晏球遇之唐河追擊至滿城斬首二千級獲馬千匹契丹自中國多故強於北方北方諸夷無大小皆畏伏而中國之兵遭契丹者未嘗少得志自晏球擊敗秃餒又走愓隱其餘衆奔潰投村落村落之人以鋤耰白梃所在擊殺之無復遺類愓隱與數十騎走至幽州西為趙德鈞擒送京師明宗下詔責誚契丹契丹後數遣使至中國求歸愓隱等辭甚卑遜輒斬其使以絶之於是時中國之威幾於大震而契丹少衰伏矣自晏球始也晏球攻定州久不克明宗數遣人促其破賊晏球以謂未可急攻其偏將朱宏昭張䖍釗等宣言曰晏球怯耳乃驅兵以進兵果敗殺傷三千餘人由是諸將不敢復言攻晏球乃休養士卒食其三州之賦悉以俸祿所入具牛酒日與諸將髙㑹久之都城中食盡先出其民萬餘人數與秃餒謀决圍以走不果都將馬讓能以城降都自焚死晏球為將有機略善撫士卒其擊秃餒既因敗以為功而諸將皆欲乘勝取都晏球反獨不動卒以持久弊之自天成三年四月都反明年二月始克之軍中未嘗戮一人以破都功拜天平軍節度使又徙平盧纍官至兼中書令是嵗卒年六十二贈太尉郭延魯傳通篇俱虛語㸃綴無一實事郭延魯沁州綿上人也父饒以驍勇事晉數立軍功為沁州刺史者九年為政有惠愛州人思之延魯以善槊為將纍遷神武都知兵馬使朱守殷反從攻汴州以先登功為汴州馬步軍都指揮使纍遷復州刺史延魯嘆曰吾先君為沁州者九年民到于今思之吾今幸得為刺史其敢忘吾先君之志由是益以亷平自勵民甚賴之秩滿州人乞留不許皆遮道攀號天福中拜單州刺史卒于官當是時刺史皆以軍功拜言事者多以為言以謂今天下多事民力困敝之時不宜以刺史任武夫恃功縱下為害不細而延魯父子特以善政著聞焉嗚呼五代之民其何以堪之哉上輸兵賦之急下困剝斂之苛自莊宗以來方鎮進獻之事稍作至於晉而不可勝紀矣其添都助國之物動以千數計至於來朝奉使買宴贖罪莫不出於進獻而功臣大將不幸而死則其子孫率以家資求刺史其物多者得大州善地蓋自天子皆以賄賂為事矣則為民者其何以堪之哉於此之時循亷之吏如延魯之徒者誠難得而可貴也哉按延魯父子俱以循良為政誠五代時所難得者歐公既知之而特勒入雜傳殊不可曉張希崇傳此傳亦整潔可誦張希崇字德峰幽州薊人也少好學通左氏春秋劉守光不喜儒士希崇因事軍中為偏將將兵戍平州其後契丹攻陷平州得希崇知其儒者也以為盧龍軍行軍司馬明宗時盧文進自平州亡歸契丹因以希崇代文進為平州節度使遣其親將以三百騎監之居嵗餘虜將喜其為人監兵稍怠希崇因與其麾下謀走南歸其麾下皆言兵多不可俱亡懼不得脫因勸希崇獨去希崇曰虜兵守我者三百騎爾烹其將其兵必散走且平州去虜帳千餘里使其聞亂而呼兵則吾與汝等在漢界矣衆皆曰善乃先為穽填以石灰明日虜將謁希崇希崇飲之以酒殺之穽中兵皆潰去希崇率其麾下得生口二萬南歸明帝嘉之拜汝州防禦使遷靈武節度使靈州地接邊垂戍兵餉道常苦抄掠希崇乃開屯田教士耕種軍以足食而省轉饋明宗下詔褒美希崇撫養士卒招輯夷落自回鶻瓜沙皆遣使入貢居四嵗上書求還內地徒鎮邠寧晉髙祖入立復拜靈武節度使希崇嘆曰吾當老死邊徼豈非命邪希崇事母至孝朝夕母食必侍立左右徹饌乃敢退為將不喜聲色好讀書頗知星厯天福三年月掩畢口大星希崇歎曰畢口大星邊將也我其當之乎明年正月卒贈太師有子仁謙皇甫遇傳皇甫遇絶吭而死更屬可憐恐與敬翔不同皇甫遇常山真定人也為人有勇力虬髯善射少從唐明宗征伐事唐為武勝軍節度使所至苛暴以誅斂為務賓佐多解官逃去以避其禍晉髙祖時歷義武昭義建雄河陽四鎮罷為神武統軍契丹入寇陷貝州出帝以髙行周為北面行營都部署遇為馬軍右廂排陳使是時青州楊光逺據城反出帝乃遣李守貞及遇分兵守鄆州遇等至馬家渡契丹方將渡河助光逺遇等擊敗之以功拜義成軍節度使馬軍都指揮使開運二年契丹寇西山遣先鋒趙延夀圍鎮州杜重威不敢出戰延夀分兵大掠攻破欒城柏鄉等九縣南至邢州是時嵗除出帝與近臣飲酒過量得疾不能出征乃遣北面行營都監張從恩㑹馬全節安審琦及遇等禦之從恩等至相州陳安陽河南遣遇與慕容彥超率數千騎前視虜遇渡漳河逢虜數萬騎戰十餘里至榆林為虜所圍遇馬中箭而踣得其僕杜知敏馬乘之以戰知敏為虜所擒遇謂彥超曰知敏義士也豈可失之即與彥超躍馬入虜取之而還虜兵與遇戰自午至未解而復合益出生兵勢甚盛遇戒彥超曰今日之勢戰與走爾戰尚或生走則死也等死死戰猶足以報國張從恩與諸將怪遇視虜無報皆謂遇已陷虜矣已而有馳騎報遇被圍安審琦率兵將赴之從恩疑報者詐不欲往審琦曰成敗天也當與公共之雖虜不南來吾屬失皇甫遇復何面目見天子即引騎渡河諸軍皆從而北距虜十餘里虜望見救兵來即解去遇與審琦等收軍而南契丹亦皆北去是時契丹兵己深入人馬俱乏其還也諸將不能追而從恩率遇等退保黎陽虜因得解去三年冬以杜重威為都招討使遇為馬軍右廂都指揮使屯於中渡重威已隂送欵契丹伏兵幕中悉召諸將列坐告以降虜遇與諸將愕然不能對重威出降表遇等俯首以次自書其名即麾兵解甲出降契丹遣遇與張彥澤先入京師遇行至平棘絶吭而死嗚呼梁亡而敬翔死不得為死節晉亡而皇甫遇死不得為死事吾豈無意哉梁之篡唐用翔之謀為多猶子佐其父而弒其祖可乎其不戮於斧鉞為幸免矣方晉兵之降虜也士卒初不知及使解甲哭聲震天則降豈其欲哉使遇奮然攘臂而起殺重威於坐中雖不幸不克而見害猶為得其死矣其義烈豈不凛然哉既俯首聽命相與亡人之國矣雖死不能贖也豈足貴哉君子之於人或推以恕或責以備恕故遷善自新之路廣備則難得難得故可貴焉然知其所可恕與其所可貴豈不又難哉髙行周傳髙行周起亡囚中前後本末事情㸃綴多玲瓏髙行周字尚質媯州人也世為懷戎戍將父思繼思繼兄弟皆以武勇雄於北邊為幽州節度使李匡威戍將匡威為其弟匡儔所篡晉王將討其亂謀曰髙思繼兄弟在孔嶺關有兵三千此後患也不如遣人招之思繼為吾用則事無不成克用遣人招思繼兄弟燕俗重氣義思繼等聞晉兵為匡威報仇乃欣然從之為晉兵前鋒匡儔聞思繼兄弟皆叛乃棄城走克用以劉仁恭守幽州以其兄某為先鋒都指揮使思繼為中軍都指揮使弟某為後軍都指揮使髙氏兄弟分掌燕兵克用臨訣謂仁恭曰思繼兄弟勢傾一方為燕患者必髙氏也宜善為防克用留晉兵千人為仁恭衛而晉兵多犯法思繼等數誅殺之克用以責仁恭仁恭以髙氏為訴由是晉盡誅思繼兄弟仁恭以其兄某之子行圭為牙將而思繼子行周年十餘嵗亦收之帳下稍長補以軍職仁恭被囚守光立以行圭為武州刺史其後守光背晉晉兵攻之守光將元行欽牧馬山後聞守光且見圍即率所牧馬赴援而麾下兵叛于道推行欽為幽州留後行欽曰吾所憚者行圭也乃遣人之懷戎得行圭子縶之兵過武州招行圭曰守光可取而代也當從我行不然且殺公子行圭謝曰與君俱劉公將而忍叛之吾當為劉氏也尚何顧吾子邪行欽即以兵圍行圭月餘行圭城中食盡召其州人告曰吾非不為父老守也今劉公救兵不至奈何可殺吾以降晉父老皆泣願以死守是時行周適從行圭在武州即夜縋行周馳入晉見莊宗莊宗因遣明宗救武州比至行欽已解去行圭乃降晉莊宗時歷朔欣嵐三州刺史大同軍節度使明宗入立徙鎮威勝安逺行圭性貪鄙所為多不法副使范延䇿為人剛直數規諫之行圭不聽銜之已而戍兵有謀叛者行圭先覺之因潛徙庫兵于他所戍兵叛趨庫劫兵無所得乃潰去行圭追而殺之因誣奏延策同反并其子皆見殺天下寃之行圭卒于鎮贈太尉當行圭之降晉也行周𨽻明宗帳下初為禆將趙德鈞識之謂明宗曰此子貌厚而小心他日必大貴宜善待之梁晉軍河上莊宗遣明宗東襲鄆州行周將前軍夜遇雨軍中皆欲止不進行周曰此天贊我也鄆人恃雨不備吾來宜出其不意即夜馳涉濟入其城鄆人方覺遂取之莊宗滅梁以功領端州刺史遷綘州明宗時從平朱守殷克王都遷潁州團練使振武軍節度使歷鎮彰武昭義晉髙祖時為西京留守徙鎮天雄安從進叛以行周為襄州行營都部署討平之徙鎮歸德出帝時代景延廣為侍衛親軍都指揮使是時李彥韜馮玉等用事乃求歸鎮契丹滅晉留蕭翰守汴又棄去召唐故許王從益入汴而漢髙祖起太原從益遣人召行周將以拒漢行周嘆曰衰世難輔况兒戲乎乃不從漢髙祖入京師加行周守中書令徙鎮天平封臨清王周太祖入立封齊王卒贈尚書令追封秦王有子懷德唐宋八大家文鈔卷七十四
