body:
  text: 唐宋八大家文鈔卷一百四十一明茅坤撰東坡文鈔二十五記蓋公堂記以醫為喻起盡議論却將正意一證始吾居鄉有病寒而咳者問諸醫醫以為蠱不治且殺人取其百金而治之飲以蠱藥攻伐其腎腸燒灼其體膚禁切其飲食之美者期月而百疾作內熱惡寒而咳不已纍然真蠱者也又求於醫醫以為熱授之以寒藥旦朝吐之暮夜下之於是始不能食懼而反之則鍾乳烏喙雜然並進而漂疽癰疥眩瞀之狀無所不至三易醫而疾愈甚里老父教之曰是醫之罪藥之過也子何疾之有人之生也以氣為主食為輔今子終日藥不釋口臭味亂於外而百毒戰于內勞其主隔其輔是以病也子退而休之謝醫却藥而進所嗜氣完而食美矣則夫藥之良者可以一飲而效從之期月而病良已昔之為國者亦然吾觀夫秦自孝公已來至於始皇立法更制以鐫磨煆鍊其民可謂極矣蕭何曹參親見其斫喪之禍而收其民於百戰之餘知其厭苦憔悴無聊而不可與有為也是以一切與之休息而天下安始參為齊相召長老諸先生問所以安集百姓而齊故諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黃老言使人請之蓋公為言治道貴清靜而民自定推此類具言之參於是避正堂以舍蓋公用其言而齊大治其後以其所以治齊者治天下天下至今稱賢焉吾為膠西守知公之為邦人也求其墳墓子孫而不可得慨然懷之師其言想見其為人庶幾復見如公者治新寢於黃堂之北易其敝陋達其蔽塞重門洞開盡城之南北相望如引繩名之曰蓋公堂時從賓客僚吏遊息其間而不敢居以待如公者焉夫曹參為漢宗臣而蓋公為之師可謂盛矣而史不記其所終豈非古之至人得道而不死者歟膠西東並海南放于九仙北屬之牢山其中多隱君子可聞而不可見可見而不可致安知蓋公不往來其間乎吾何足以見之莊子祠堂記長公好讀莊子而得其髓故能設為奇瑰之論如此莊子蒙人也嘗為蒙漆園吏沒千餘嵗而蒙未有祀之者縣令祕書丞王兢始作祠堂求文以為記謹按史記莊子與梁惠王齊宣王同時其學無所不窺然要本歸於老子之言故其著書十餘萬言大抵率寓言也作漁父盜跖胠篋以詆訾孔子之徒以眀老子之術此知莊子之粗者余以為莊子蓋助孔子者要不可以為法耳楚公子微服出亡而門者難之其僕操箠而罵曰𨽻也不力門者出之事固有倒行而逆施者以僕為不愛公子則不可以為事公子之法亦不可故莊子之言皆實豫而文不豫陽擠而隂助之其正言蓋無幾至於詆訾孔子未嘗不微見其意其論天下道術自墨翟禽滑釐彭蒙慎到田駢關尹老聃之徒以至於其身皆以為一家而孔子不與其尊之也至矣然余嘗疑盜跖漁父則若真詆孔子者至於讓王説劒皆淺陋不入於道反復觀之得其寓言之意終曰陽子居西遊於秦遇老子老子曰而睢睢而盱盱而誰與居太白若辱盛德若不足陽子居蹴然變容其往也舍者將迎其家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣去其讓王説劒漁父盜跖四篇以合於列禦冦之篇曰列禦冦之齊中道而反曰吾驚焉吾食於十漿而五漿先餽然後悟而笑曰是固一章也莊子之言未終而昧者勦之以入其言余不可以不辨凡分章名篇皆出於世俗非莊子之本意李太白碑隂記古來豪雋所被橫口之汚衊者多長公此一番洗刷絶是李太白狂士也又嘗失節於永王璘此豈濟世之人哉而畢文簡公以王佐期之不亦過乎曰士固有大言而無實虛名不適於用者然不可以此料天下之士士以氣為主方高力士用事公卿大夫爭事之而太白使脫靴殿上固已氣蓋天下矣使之得志必不肯附權幸以取容其肯從君於昏乎夏侯湛贊東方生云開濟明豁包含宏大陵轢卿相朝哂豪傑籠罩靡前跆籍貴勢出不休顯賤不憂戚戲萬乘若僚友視儔列如草芥雄節邁倫高氣蓋世可謂拔乎其萃遊方之外者也吾於太白亦云太白之從永王璘當由迫脅不然璘之狂肆寢陋雖庸人知其必敗也太白識郭子儀之為人傑而不能知璘之無成此理之必不然者也吾不可以不辨眉州逺景樓記遷客思故鄉風致婉然吾州之俗有近古者三其士大夫貴經術而重氏族其民尊吏而畏法其農夫合耦以相助蓋有三代漢唐之遺風而他郡之所莫及也始朝廷以聲律取士而天聖以前學者猶襲五代文弊獨吾州之士通經學古以西漢文詞為宗師方是時四方指以為迂濶至於郡縣胥吏皆挾經載筆應對進退有足觀者而大家顯人以門族相上推次甲乙皆有定品謂之江鄉非此族也雖貴且富不通婚姻其民事太守縣令如古君臣既去輒畫像事之而其賢者則記録其行事以為口實至四五十年不忘商賈小民常儲善物而别異之以待官吏之求家藏律令往往通念而不以為非雖薄刑小罪終身有不敢犯者嵗二月農事始作四月初吉穀稚而草壯耘者畢出數十百人為曹立表下漏鳴鼓以致衆擇其徒為衆所畏信者二人一人掌鼓一人掌漏進退作止惟二人之聽鼓之而不至至而不力皆有罰量田計功終事而會之田多而丁少則出錢以償衆七月既望穀艾而草衰則仆鼓決漏取罰金與償衆之錢買羊豕酒醴以祀田祖作樂飲食醉飽而去嵗以為常其風俗蓋如此故其民皆聰明才智務本而力作易治而難服守令始至視其言語動作輒了其為人其明且能者不復以事試終日寂然茍不以其道則陳義秉法以譏切之故不知者以為難治今太守黎侯希聲軾先君子之友人也簡而文剛而仁明而不苛衆以為易事既滿將代不忍其去相率而留之上不奪其請既留三年民益信遂以無事因守居之北墉而增築之作逺景樓日與賓客僚吏遊處其上軾方為徐州吾州之人以書相往來未嘗不道黎侯之善而求文以為記嗟夫軾之去鄉久矣所謂逺景樓者雖想見其處而不能道其詳矣然州人之所以樂斯樓之成而欲記焉者豈非上有易事之長而下有易治之俗也哉孔子曰吾猶及史之闕文也有馬者借人乘之今亡已夫是二者於道未有大損益也然且録之今吾州近古之俗獨能纍世而不遷蓋耆老昔人豈弟之澤而賢守令撫循教誨不倦之力也可不録乎若夫登臨覽觀之樂山川風物之美軾將歸老於故丘布衣幅巾從邦君於其上酒酣樂作援筆而賦之以頌黎侯之遺愛尚未晚也唐荆川曰此文造意亦奇更不在作樓與逺景上説喜雨亭記公之文好為滑稽亭以雨名志喜也古者有喜則以名物示不忘也周公得禾以名其書漢武得鼎以名其年叔孫勝狄以名其豫其喜之大小不齊其示不忘一也余至扶風之明年始治官舍為亭於堂之北而鑿池其南引流種樹以為休息之所是嵗之春雨麥於岐山之陽其占為有年既而彌月不雨民方以為憂越三月乙卯乃雨甲子又雨民以為未足丁卯大雨三日乃止官吏相與慶於庭商賈相與歌於市農夫相與抃於野憂者以樂病者以愈而吾亭適成於是舉酒於亭上以屬客而告之曰五日不雨可乎曰五日不雨則無麥十日不雨可乎曰十日不雨則無禾無麥無禾嵗且荐飢獄訟繁興而盜賊滋熾則吾與二三子雖欲優遊以樂於此亭其可得耶今天不遺斯民始旱而賜之以雨使吾與二三子得相與優遊而樂於此亭者皆雨之賜也其又可忘耶既以名亭又從而歌之曰使天而雨珠寒者不得以為襦使天而雨玉飢者不得以為粟一雨三日繄誰之力民曰太守太守不有歸之天子天子曰不然歸之造物造物不自以為功歸之太空太空冥冥不可得而名吾以名吾亭凌虛臺記蘇公往往有此一假曠達處却於陳太守少回護臺因於南山之下宜若起居飲食與山接也四方之山莫髙於終南而都邑之麗山者莫近於扶風以至近求最髙其勢必得而太守之居未嘗知有山焉雖非事之所以損益而物理有不當然者此凌虛之所為築也方其未築也太守陳公杖履逍遙於其下見山之出於林木之上者纍纍如人之旅行於牆外而見其髻也曰是必有異使工鑿其前為方池以其土築臺髙出於屋之簷而止然後人之至於其上者恍然不知臺之高而以為山之踊躍奮迅而出也公曰是宜名凌虛以告其從事蘇軾而求文以為記軾復於公曰物之廢興成毁不可得而知也昔者荒草野田霜露之所蒙翳狐虺之所竄伏方是時豈知有凌虛臺耶廢興成毁相尋於無窮則臺之復為荒草野田皆不可知也嘗試與公登臺而望其東則秦穆之祈年槖泉也其南則漢武之長楊五柞而其北則隋之仁夀唐之九成也計其一時之盛宏傑詭麗堅固而不可動者豈特百倍於臺而已哉然而數世之後欲求其髣佛而破屋頽垣無復存者既已化為禾黍荆棘丘墟隴畝矣而况於此臺歟夫臺猶不足恃以長久而况於人事之得喪忽往而忽來者歟而或者欲以夸世而自足則過矣蓋世有足恃者而不在乎臺之存亡也既以言於公退而為之記超然臺記子瞻本色與凌虛臺記並本之莊生凡物皆有可觀茍有可觀皆有可樂非必怪竒偉麗者也餔糟啜醨皆可以醉果蔬草木皆可以飽推此類也吾安往而不樂夫所謂求福而辭禍者以福可喜而禍可悲也人之所欲無窮而物之可以足吾欲者有盡美惡之辨戰乎中而去取之擇交乎前則可樂者常少而可悲者常多是謂求禍而辭禍夫求禍而辭福豈人之情也哉物有以蓋之矣彼遊於物之內而不逰於物之外物非有大小也自其內而觀之未有不高且大者也彼挾其髙大以臨我則我常眩亂反覆如隙中之觀鬪又烏知勝負之所在是以美惡橫生而憂樂出焉可不大哀乎余自錢塘移守膠西釋舟楫之安而服車馬之勞去雕牆之美而蔽采椽之居背湖山之觀而行桑麻之野始至之日嵗比不登盜賊滿野獄訟充斥而齋厨索然日食杞菊人固疑余之不樂也處之期年而貌加豐髮之白者日以反黑余既樂其風俗之淳而其吏民亦安余之拙也於是治其園圃潔其庭宇伐安丘髙密之木以修補破敗為茍完之計而園之北因城以為臺者舊矣稍葺而新之時相與登覽放意肆志焉南望馬耳常山出沒隱見若近若逺庶幾有隱君子乎而其東則盧山秦人盧敖之所從遁也西望穆陵隱然如城郭師尚父齊桓公之遺烈猶有存者北俯濰水慨然太息思淮隂之功而弔其不終臺高而安深而明夏涼而冬溫雨雪之朝風月之夕余未嘗不在客未嘗不從擷園蔬取池魚釀秫酒瀹脫粟而食之曰樂哉遊乎方是時余弟子由適在濟南聞而賦之且名其臺曰超然以見余之無所往而不樂者蓋遊於物之外也唐荆川曰前發超然之意後假敘事解意兼敘事格遊桓山記曠達元豐二年正月已亥晦春服既成從二三子遊於泗之上登桓山入石室使道士戴日祥鼓雷氏之琴操履霜之遺音曰噫嘻悲夫此宋司馬桓魋之墓也或曰鼓琴於墓禮歟曰禮也季武子之喪曽點倚其門而歌仲尼日月也而魋以為可得而毁也且死為石椁三年不成古之愚人也余將弔其藏而其骨毛爪齒既已化為飛塵蕩為冷風矣而况於椁乎况於從死之臣妾飯含之貝玉乎使魋而無知也余雖鼓琴而歌可也使魋而有知也聞余鼓琴而歌知哀樂之不可常物化之無日也其愚豈不少瘳乎二三子喟然而歎乃歌曰桓山之上維石嵯峨兮司馬之惡與石不磨兮桓山之下濰水瀰瀰兮司馬之藏與水皆逝兮歌闋而去從遊者八人畢仲孫舒焕冦昌朝王適王遹王肄軾之子邁焕之子彥舉石鐘山記風旨亦自水經來然多竒峭之興水經云彭蠡之口有石鐘山焉酈元以為下臨深潭微風鼓浪水石相搏聲如洪鐘是説也人常疑之今以鐘磬置水中雖大風浪不能鳴也而况石乎至唐李渤始訪其遺蹤得雙石於潭上扣而聆之南聲函胡北音清越枹止響騰餘韻徐歇自以為得之矣然是説也余尤疑之石之鏗然有聲者所在皆是也而此獨以鐘名何哉元豐七年六月丁丑余自齊安舟行適臨汝而長子邁將赴饒之德興尉送之至湖口因得觀所謂石鐘者寺僧使小童持斧於亂石間擇其一二扣之硿硿焉余固笑而不信也至其夜月眀獨與邁乘小舟至絶壁下大石側立千尺如猛獸竒鬼森然欲搏人而山上栖鶻聞人聲亦驚起磔磔雲霄間又有若老人咳且笑於山谷中者或曰此鸛鶴也余方心動欲還而大聲發於水上噌吰如鐘鼓不絶舟人大恐徐而察之則山下皆石穴罅不知其淺深微波入焉涵淡澎湃而為此也舟回至兩山間將入港口有大石當中流可坐百人空中而多竅與風水相吞吐有窽坎鏜鞳之聲與向之噌吰者相應如樂作焉因笑謂邁曰汝識之乎噌吰者周景王之無射也窽坎鏜鞳者魏獻子之歌鐘也古之人不余欺也事不目見耳聞而臆斷其有無可乎酈元之所見聞殆與余同而言之不詳士大夫終不肯以小舟夜泊絶壁之下故莫能知而漁工水師雖知而不能言此世所以不傳也而陋者乃以斧斤考擊而求之自以為得其實余是以記之蓋歎酈元之簡而笑李渤之陋也大悲閣記禪旨彼所謂信手拈來頭頭是道矣大悲者觀世音之變也觀世音由聞而覺始於聞而能無所聞始於無所聞而能無所不聞能無所聞雖無身可也能無所不聞雖千萬億身可也而况於手與目乎雖然非無身無以舉千萬億身之衆非千萬億身無以示無身之至故散而為千萬億身聚而為八萬四千母陀羅臂八萬四千清淨寶目其道一爾昔吾嘗觀於此吾頭髮不可勝數而身毛孔亦不可勝數牽一髮而頭為之動拔一毛而身為之變然則髮皆吾頭而毛孔皆吾身也彼皆吾頭而不能為頭之用彼皆吾身而不能具身之智則物有以亂之矣吾將使世人左手運斤而右手執削目數飛雁而耳節鳴鼓首肯旁人而足識梯級雖有智者有所不暇矣而况千手異執而千目各視乎及吾燕坐寂然心念凝默湛然如大明鏡人鬼鳥獸雜陳乎吾前色聲香味交遘乎吾體心雖不起而物無不接接必有道即千手之出千目之運雖未可得見而理則具矣彼佛菩薩亦然雖一身不成二佛而一佛能遍河沙諸國非有他也觸而不亂至而能應理有必至而何獨疑於大悲乎成都西南大都會也佛事最勝而大悲之像未睹其傑有法師敏行者能讀內外教博通其義欲以如幻三昧為一方首乃以大旃檀作菩薩像端嚴妙麗具慈愍性手臂錯出開合捧執指彈摩拊千態具備手各有目無妄舉者復作大閣以覆菩薩雄偉壯峙工與像稱都人作禮因敬生悟余遊於四方二十餘年矣雖未得歸而想見其處敏行使其徒法震乞文為道其所以然者且頌之曰吾觀世間人兩目兩手臂物至不能應狂惑失所措其有欲應者顛倒作思慮思慮非真實無異無手目菩薩千手目與一手目同物至心亦至曽不作思慮隨其所當應無不得其當引弓挾白羽劒盾諸械器經卷及香華盂水青楊枝珊瑚大寶炬白拂朱藤杖所遇無不執所執無有疑緣何得無疑以我無心故若猶有心者千手當千心一人而千心內自相攫攘何暇能應物千手無一心手手得其處稽首大悲尊願度一切衆皆證無心法皆具千手目唐荆川曰此翁素精於佛家之言蘇長公於禪宗本屬妙悟而其為記銘頌偈種種出世人豫故録而存之安國寺大悲閣記無論學禪學聖賢均從篤行上立腳羊豕以為羞五味以為和秫稻以為酒麴糵以作之天下之所同也其材同其水火之齊均其寒暖燥溼之候一也而二人為之則美惡不齊豈其所以美者不可以數取歟然古之為方者未嘗遺數也能者即數以得妙不能者循數以得其略其出一也有能有不能而精粗見焉人見其二也則求精於數外而棄迹以逐妙曰我知酒食之所以美也而略其分齊捨其度數以為不在是也而一以意造則其不為人之所嘔棄者寡矣今吾學者之病亦然天文地理音樂律厯宫廟服器冠昏喪紀之法春秋之所去取禮之所可刑之所禁厯代之所以廢興與其人之賢不肖此學者之所宜盡力也曰是皆不足學學其不可載於書而傳於口者子夏曰日知其所亡月無忘其所能可謂好學也已古之學者其所亡與其所能皆可以一二數而日月見也如今世之學其所亡者果何物而所能者果何事歟孔子曰吾嘗終日不食終夜不寢以思無益不如學也由是觀之廢學而徒思者孔子之所禁而今世之所尚也豈惟吾學者至於為佛者亦然齋戒持律講誦其書而崇飾塔廟此佛之所以日夜教人者也而其徒或者以為齋戒持律不如無心講誦其書不如無言崇飾塔廟不如無為其中無心其口無言其身無為則飽食而嬉而已是為大以欺佛者也杭州鹽官安國寺僧居則自九嵗出家十年而得惡疾且死自誓於佛願持律終身且造千手眼觀世音像而誦其名千萬遍病已而力不給則縮衣節口三十餘年銖積寸纍以迄於成其髙九仞為大屋四重以居之而求文以為記余嘗以斯語告東南之士矣蓋僅有從者獨喜則之勤苦從事於有為篤志守節老而不衰異夫為大以欺佛者故為記之且以風吾黨之士云四菩薩閣記長公愛道子畫為障而對惟簡語甚達始吾先君於物無所好燕居如齋言笑有時顧嘗嗜畫弟子門人無以恱之則爭致其所嗜庶幾一解其顔故雖為布衣而致畫與公卿等長安有故藏經龕唐明皇帝所建其門四達八版皆吳道子畫陽為菩薩隂為天王凡十有六軀廣明之亂為賊所焚有僧忘其名於兵火中拔其四版以逃既重不可負又迫於賊恐不能皆全遂竅其兩版以受荷西奔於岐而寄死於烏牙之僧舍板留於是百八十年矣客有以錢十萬得之以示軾者軾歸其直而取之以獻諸先君先君之所嗜百有餘品一旦以是四板為甲治平四年先君沒於京師軾自汴入淮泝於江載是四版以歸既免喪所嘗與往來浮屠人惟簡誦其師之言教軾為先君捨施必所甚愛與所不忍捨者軾用其説思先君之所甚愛軾之所不忍捨者莫若是版故遂以與之且告之曰此眀皇帝之所不能守而焚於賊者也而况於余乎余視天下之蓄此者多矣有能及三世者乎其始求之若不及既得惟恐失之而其子孫不以易衣食者鮮矣余惟自度不能長守此也是以與子子將何以守之簡曰吾以身守之吾眼可霍吾足可斫吾畫不可奪若是足以守之歟軾曰未也足以終子之世而已簡又曰吾盟於佛而以鬼守之凡取是者與凡以是豫人者其罪如律若是足以守之歟軾曰未也世有無佛而蔑鬼者然則何以守之曰軾之以是豫子者凡以為先君捨也天下豈有無父之人歟其誰忍取之若其聞是而不悛不惟一觀而已將必取之然後為快則其人之賢愚與廣明之焚此者一也全其子孫難矣而况能久有此乎且夫不可取者存乎子取不取者存乎人子勉之矣為子之不可取者而已又何知焉既以豫簡簡以錢百萬度為大閣以藏之且畫先君像其上軾助錢二十之一期以明年冬閣成熙寧元年十月二十六日記衆妙堂記公非由南海後亦不能為此文眉山道士張易簡教小學常百人豫幼時亦與焉居天慶觀北極院豫蓋從之三年謫居海南一日夢至其處見張道士如平昔汛治庭宇若有所待者曰老先生且至其徒有誦老豫者曰玄之又玄衆妙之門豫曰妙一而已容有衆乎道士笑曰一已陋矣何妙之有若審妙也雖衆可也因指灑水剃草者曰是各一妙也豫復視之則二人者手若風雨而步中規矩蓋焕然霧除霍然雲消豫驚歎曰妙蓋至此乎庖丁之理解郢人之鼻斫信矣二人者釋技而上曰子未覩真妙庖郢非其人也是技與道相半習與空相會非無狹而徑造者也子亦見夫蜩與雞乎夫蜩登木而號不知止也夫雞俯首而啄不知仰也其固也如此然至蛻與伏也則無視無聽無飢無渴默化於荒忽之中候伺於毫髮之間雖聖知不及也是豈技與習之助乎二人者出道士曰少安須老先生至而問焉二人者顧曰老先生未必知也子往見蜩與雞而問之可以養生可以長年廣州道士崇道大師何德順作堂榜曰衆妙以書來海南求文以記之豫不暇作也獨書夢中語以示之戊寅三月十五日清風閣記奇曠文慧大師應符居成都玉溪上為閣曰清風以書來求文為記五返而益勤余不能巳戲為浮屠語以問之曰符而所謂身者汝之所寄也而所謂閣者汝之所以寄所寄也身與閣汝不得有而名烏乎施名將無所施而安用記乎雖然吾為汝放心遺形而強言之汝亦放心遺形而強聽之木生於山水流於淵山與淵且不得有而人以為已有不亦惑歟天地之相磨虛空與有物之相推而風於是焉生執之而不可得也逐之而不可及也汝為居室而以名之吾又為汝記之不亦大惑歟雖然世之所謂己有而不惑者其與是奚辨若是而可以為有邪則雖汝之有是風可也雖為居室而以名之吾又為汝記之可也非惑也風起於蒼茫之間倣徨乎山澤激越乎城郭道路虛徐演漾以泛汝之軒窗欄楯幔帷而不去也汝隱几而觀之其亦有得乎力生於所激而不自為力故不勞形生於所遇而不自為形故不窮嘗試以是觀之唐宋八大家文鈔卷一百四十一
