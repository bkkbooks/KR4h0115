body:
  text: 唐宋八大家文鈔巻九十九明茅坤撰南豐文鈔三書上杜相公書以書為質其說宰相之體處亦自典刑鞏聞夫宰相者以巳之材為天下用則用天下而不足以天下之材為天下用則用天下而有餘古之稱良宰相者無異焉知此而巳矣舜嘗為宰相矣稱其功則曰舉八元八凱稱其徳則曰無為而治者其舜也與卒之為宰相者無與舜為比也則宰相之體其亦可知也巳或曰舜大聖人也或曰舜遠矣不可尚也請言近近可言者莫若漢與唐漢之相曰陳平對文帝曰陛下即問決獄責廷尉問錢榖責治粟内史對周勃曰且陛下問長安盜賊數又可强對耶問平之所以為宰相者則曰使卿大夫各得在其職也觀平之所自任者如此而漢之治莫盛於平為相時則其所守者可謂當矣降而至於唐唐之相曰房杜當房杜之時所與共事則長孫無忌岑文本主諫諍則魏鄭公王珪振綱維則戴胄劉洎持憲法則張元素孫伏伽用兵征伐則李勣李靖長民守土則李大亮其餘為卿大夫各任其事則馬周温彦博杜正倫張行成李綱虞世南禇遂良之徒不可勝數夫諫諍其君與正綱維持憲法用兵征伐長民守土皆天下之大務也而盡付之人又與人共宰相之任又有他卿大夫各任其事則房杜者何為者邪考於其傳不過曰聞人有善若巳有之不以求備取人不以巳長格物隨能收敘不隔卑賤而巳卒之稱良宰相者必先此二人然則著於近者宰相之體其亦可知也巳唐以降天下未嘗無宰相也稱良相者不過其一二大節可道語而有能以天下之材為天下用真知宰相體者其誰哉數歳之前閣下為宰相當是時人主方急於致天下治而當世之士豪傑魁礨者相繼而進雜遝於朝雖然邪者惡之庸者忌之亦甚矣獨閣下奮然自信樂海内之善人用於世爭出其力以唱而助之惟恐失其所自立使豪傑者皆若素繇門下以出於是與之佐人主立州縣學為累日之格以勵學者課農桑以損益之數為吏陞黜之法重名敎以矯衰弊之俗變苟且以起百官衆職之墜革任子之濫明賞罰之信一切欲整齊法度以立天下之本而庶幾三代之事雖然紛而疑且排其議者亦衆矣閣下復毅然堅金石之斷周旋上下扶持樹植欲使其有成也及不合矣則引身而退與之俱否嗚呼能以天下之材為天下用真知宰相體者非閣下其誰哉使充其所樹立功徳可勝道哉雖不充其志豈媿於二帝三代漢唐之為宰相者哉若鞏者誠鄙且賤然常從事於書而得聞古聖賢之道每觀今賢傑之士角立並出與三代漢唐相侔則未嘗不歎其盛也觀閣下與之反復議而更張庶事之意知後有聖人作救萬事之弊不易此矣則未嘗不愛其明也觀其不合而散逐消藏則未嘗不恨其道之難行也以歎其盛愛其明恨其道之難行之心豈須臾忘其人哉地之相去也千里世之相後也千載尚慕而欲見之況同其時過其門墻之下也歟今也過閣下之門又當閣下釋衮冕而歸非干名蹈利者所趨走之日故敢道其所以然而并書雜文一編以為進拜之資蒙賜之一覽焉則其願得矣噫賢閣下之心非繫於見否也而復汲汲如是者葢其忻慕之志而巳耳伏惟幸察不宣與杜相公書此子固所不可及處在不失巳上鞏啓鞏多難而貧且賤學與衆違而言行少合於世公卿大臣之門無可藉以進而亦不敢輒有意於求聞閣下致位天子而歸始獨得望舄履於門下閣下以舊相之重元老之尊而猥自抑損加禮於草茆之中孤㷀之際然去門下以來九歳於此初不敢為書以進比至近歳歳不過得以一書之問薦於左右以伺侍御者之作止又輒拜敎之辱是以滋不敢有意以干省察以煩貺施而自以得不韙之誅顧未嘗一日而忘拜賜也伏以閣下朴厚清明讜直之行樂善好義逺大之心施於朝廷而博見於天下銳於强力而不懈於耄期當今内自京師外至巖野宿師碩士傑立相望必將憊精疲思寫之冊書磊磊明明宣布萬世固非淺陋小生所能道說而有益毫髮也鞏年齒益長血氣益衰疾病人事不得以休然用心於載籍之文以求古人之緒言餘㫖以自樂於環堵之内而不亂於貧賤之中雖不足希盛徳之萬一亦庶幾不負其意非自以謂能也懷區區之心於數千里因尺書之好而惟所以報大君子之誼不知所以裁而恐欲知其趣故輒及之也春暄不審尊候如何伏惟以時善保尊重不勝鄙劣之望不宣與孫司封書憫孔宗旦先儂智高之反而言而猥與不為禦賊者同戮而無聞其為書反覆千餘言句句字字嗚咽涕洟可與傳記相表裏運使司封閣下竊聞儂智高未反時巳奪邕邑地而有之為吏者不能禦因不以告皇祐三年邕有白氣起廷中江水横溢司戸孔宗旦以為兵象策智高必反以書告其將陳拱拱不聽宗旦言不巳拱怒詆之曰司戸狂邪四年智高出横山略其寨人因其倉庫而大賑之宗旦又告曰事急矣不可以不戒拱又不從凡宗旦之於拱以書告者七以口告者多至不可數度拱終不可得意即載其家走桂州曰吾有官守不得去吾親母為與死此既行之二日智高果反城中皆應之宗旦猶力守南門為書召鄰兵欲拒之城亡智高得宗旦喜欲用之宗旦怒曰賊汝今立死吾豈可汚邪罵不絶口智高度終不可下乃殺之當其初使宗旦言不廢則邕之禍必不發發而吾有以待之則必無事使獨有此一善固不可不旌況其死節堂堂如是而其事未白於天下比見朝廷所寵贈南兵以來仗節死難之臣宗旦乃獨不與此非所謂曲突徙薪無恩澤焦頭爛額為上客邪使宗旦初無一言但賊至而能死不去固不可以無賞葢先事以為備全城而保民者宜責之陳拱非宗旦事也今猥令與陳拱同戮既遺其言又負其節為天下者賞善而罰惡為君子者樂道人之善樂成人之美豈當如是耶凡南方之事卒至於破十餘州覆軍殺將䘮元元之命竭山海之財者非其變發於隱伏而起於倉卒也内外上下有職事者初莫不知或隱而不言或忽而不備苟且偷託以至於不可禦耳有一人先能言者又為世所侵蔽令與罪人同罰則天下之事其誰復言耶聞宗旦非獨以書告陳拱當時為使者於廣東西者宗旦皆歴告之今彼既不能用懼重為巳累必不肯復言宗旦嘗告我也為天下者使萬事巳理天下巳安猶須力開言者之路以防未至之患況天下之事其可憂者甚衆而當世之患莫大於人不能言與不肯言而甚者或不敢言也則宗旦之事豈可不汲汲載之天下視聽顯揚褒大其人以警動當世耶宗旦喜學易所為注有可采者家不能有書而人或質問以易則貫穿馳騁至數十家皆能言其意事祖母盡心貧幾不能自存好議論喜功名鞏嘗與之接故頗知之則其所立亦非一時偶然發也世多非其在京東時不能自重至為世所指目此固一眚今其所立亦可贖矣鞏初聞其死之事未敢決然信也前後得言者甚衆又得其弟自言而聞祖袁州在廣東亦為之言然後知其事使雖有小差要其大槩不誣也況陳拱以下皆覆其家而宗旦獨先以其親遁則其有先知之效可知也以其性之喜事則其有先言之效亦可知也以閣下好古力學志樂天下之善又方使南方以賞罰善惡為職故敢以告其亦何惜須臾之聽尺紙之議博問而極陳之使其事白固有補於天下不獨一時為宗旦發也伏惟少留意焉如有未合願賜還答不宣與撫州知州書子固有一叚自别於衆人處之意而又有所難言故其文迂蹇不甚精爽非其佳者士有與一時之士相叅錯而居其衣服食飲語默止作之節無異也及其心有所獨得者放之天地而有餘歛之秋毫之端而不遺望之不見其前躡之不見其後巋乎其高浩乎其深煜乎其光明非四時而信非風雨雷電霜雪而吹嘘澤潤聲鳴嚴威列之乎公卿徹官而不為泰無匹夫之勢而不為不足天下吾賴萬世吾師而不為大天下吾違萬世吾異而不為貶也其然也豈翦翦然而為潔婞婞然而為諒哉豈沾沾者所能動其意哉其與一時之士相叅錯而居豈惟衣服飲食語默止作之節無異也凡與人相追接相恩愛之道一而巳矣若夫食於人之境而出入於其里進焉而見其邦之大人亦人之所同也安得而不同哉不然則立異矣翦翦然而巳矣婞婞然而巳矣豈其所汲汲為哉鞏方愼此以自得也於執事之至而始也自疑于其進焉既而釋然故具道其本末而為進見之資伏惟少賜省察不宣與王介甫第二書介甫本剛慢自用之人此書特為忠告甚篤葢亦人所難及者但其砭劑多而諷諫少恐亦不相入鞏頓首介父足下比辱書以謂時時小有案舉而謗議巳紛然矣足下無怪其如此也夫我之得行其志而有為於世則必先之以敎化而待之以久然後乃可以為治此不易之道也葢先之以敎化則人不知其所以然而至於遷善而遠罪雖有不肖不能違也待之以久則人之功罪善惡之實自見雖有幽隠不能掩也故有漸磨陶冶之易而無按致操切之難有愷悌忠篤之純而無偏聽摘抉之苛巳之用力也簡而人之從化也博雖有不從而俟之以刑者固少矣古之人有行此者人皆悅而恐不得歸之其政巳熄而人皆思而恨不得見之而豈至於謗且怒哉今為吏於此欲遵古人之治守不易之道先之以敎化而待之以久誠有所不得為也以吾之無所於歸而不得不有負冒於此則姑汲汲乎於其厚者徐徐乎於其薄者其亦庶幾乎其可也顧反不然不先之以敎化而遽欲責善於人不待之於久而遽欲人之功罪善惡之必見故按致操切之法用而怨忿違倍之情生偏聽摘抉之勢行而譛訴吿訐之害集巳之用力也愈煩而人之違巳也愈甚況今之士非有素厲之行而為吏者又非素擇之材也一日卒然除去遂欲齊之以法豈非左右者之誤而不為無害也哉則謗怒之來誠有以召之故曰足下無怪其如此也雖然致此者豈有他哉思之不審而巳矣顧吾之職而急於奉法則志在於去惡務於達人言而廣視聽以謂為治者當如此故事至於巳察曾不思夫志於去惡者俟之之道巳盡矣則為惡者不得不去也務於達人言而廣視聽者巳之治亂得失則吾將於此而觀之人之短長之私則吾無所任意於此也故曰思之不審而巳矣足下於今最能取於人以為善而比聞有相曉者足下皆不受之必其理未有以奪足下之見也鞏比懶作書既離南康相見尚遠故因書及此足下為何如寄歐陽舍人書此書紆徐百折而感慨嗚咽之氣博大幽深之識溢於言外較之蘇長公所謝張公為其父墓銘書特勝鞏頓首載拜舍人先生去秋人還蒙賜書及所譔先大父墓碑銘反覆觀誦感與慚并夫銘誌之著于世義近於史而亦有與史異者葢史之於善惡無所不書而銘者葢古之人有功徳材行志義之美者懼後世之不知則必銘而見之或納于廟或存于墓一也苟其人之惡則於銘乎何有此其所以與史異也其辭之作所以使死者無有所憾生者得致其嚴而善人喜於見傳則勇於自立惡人無有所紀則以媿而懼至於通材達識義烈節士嘉言善狀皆見於篇則足為後法警勸之道非近乎史其將安近及世之衰為人之子孫者一欲褒揚其親而不本乎理故雖惡人皆務勒銘以誇後世立言者既莫之拒而不為又以其子孫之所請也書其惡焉則人情之所不得於是乎銘始不實後之作銘者當觀其人苟託之非人則書之非公與是則不足以行世而傳後故千百年來公卿大夫至于里巷之士莫不有銘而傳者葢少其故非他託之非人書之非公與是故也然則孰為其人而能盡公與是歟非畜道徳而能文章者無以為也葢有道徳者之於惡人則不受而銘之於衆人則能辨焉而人之行有情善而迹非有意奸而外淑有善惡相懸而不可以實指有實大於名有名侈於實猶之用人非畜道徳者惡能辨之不惑議之不狥不惑不狥則公且是矣而其辭之不工則世猶不傳於是又在其文章兼勝焉故曰非畜道徳而能文章者無以為也豈非然哉然畜道徳而能文章者雖或並世而有亦或數十年或一二百年而有之其傳之難如此其遇之難又如此若先生之道徳文章固所謂數百年而有者也先祖之言行卓卓幸遇而得銘其公與是其傳世行後無疑也而世之學者每觀傳記所書古人之事至其所可感則往往䀌然不知涕之流落也況其子孫也哉況鞏也哉其追晞祖徳而思所以傳之之繇則知先生推一賜於鞏而及其三世其感與報宜若何而圖之抑又思若鞏之淺薄滯拙而先生進之先祖之屯蹷否塞以死而先生顯之則世之魁閎豪傑不世出之士其誰不願進於門潛遁幽抑之士其誰不有望於世善誰不為而惡誰不愧以懼為人之父祖者孰不欲敎其子孫為人之子孫者孰不欲寵榮其父祖此數美者一歸於先生既拜賜之辱且敢進其所以然所諭世族之次敢不承敎而加詳焉愧甚不宣答范資政書頌而不謟伉而不驕鞏啓王寺丞至蒙賜手書及絹等伏以閣下賢徳之盛而所施為在於天下鞏雖不熟於門然於閣下之事或可以知若鞏之鄙竊伏草茅閣下於羈旅之中一見而巳今鞏有所自得者尚未可以致閣下之知況鞏學不足以明先聖之意識古今之變材不足以任中人之事行不足以無媿悔於心而流落寄寓無田疇屋廬匹夫之業有奉養嫁送百事之役非可責思慮之精詔道徳之進也是皆無以致閣下之知者而拜别朞年之間相去數千里之遠不意閣下猶記其人而不為年輩爵徳之間有以存之此葢閣下樂得天下之英材異於世俗之常見而如鞏者亦不欲弃之故以及此幸甚幸甚夫古之人以王公之勢而下貧賤之士者葢惟其常而今之布衣之交及其窮達毫髮之殊然相弃者有之則士之愚且賤無積素之義而為當世有大賢徳大名位君子先之以禮是豈不于衰薄之中為有激于天下哉則其感服固宜如何仰望門下不任區區之至答王深甫論揚雄書此書所議甚舛姑錄而質之有識者蒙疏示鞏謂揚雄處王莽之際合於箕子之明夷常夷甫以謂紂為繼世箕子乃同姓之臣事與雄不同又謂美新之文恐箕子不為也又謂雄非有求於莽特於義命有所未盡鞏思之恐皆不然方紂之亂㣲子箕子比干三子者葢皆諫而不從則相與謀以謂去之可也任其難可也各以其所守自獻於先王不必同也此見於書三子之志也三子之志或去或任其難乃人臣不易之大義非同姓獨然者也於是微子去之比干諫而死箕子諫不從至辱於囚奴夫任其難者箕子之志也其諫而不從至辱於囚奴葢盡其志矣不如比干之死所謂各以其所守自獻於先王不必同也當其辱於囚奴而就之乃所謂明夷也然而不去非懷祿也不死非畏死也辱於囚奴而就之非無恥也在我者固彼之所不能易也故曰内難而能正其志又曰箕子之正明不可息也此箕子之事見於書易論語其說不同而其終始可考者如此也雄遭王莽之際有所不得去又不必死辱於仕莽而就之固所謂明夷也然雄之言著於書行著於史者可得而考不去非懷祿也不死非畏死也辱於仕莽而就之非無恥也在我者亦彼之所不能易也故吾以謂與箕子合吾之所謂與箕子合者如此非謂合其事紂之初也至於美新之文則非可巳而不巳者也若可巳而不巳則鄉里自好者不為況若雄者乎且較其輕重辱於仕莽為重矣雄不得而巳則於其輕者其得巳哉箕子者至辱於囚奴而就之則於美新安知其不為而為之亦豈有累哉不曰堅乎磨而不磷不曰白乎湼而不緇顧在我者如何耳若此者孔子所不能免故於南子非所欲見也於陽虎非所欲敬也見所不見敬所不敬此法言所謂詘身所以伸道者也然則非雄所以自見者歟孟子有言曰天下有道小徳役大徳小賢役大賢天下無道小役大弱役强二者皆天也順天者存逆天者亡而孔子之見南子亦曰予所否者天厭之天厭之則雄於義命豈有不盡哉又云介甫以謂雄之仕合於孔子無不可之義夷甫以謂無不可者聖人微妙之處神而不可知也雄徳不逮聖人强學力行而於義命有所未盡故於仕莽之際不能無差又謂以美新考之則投閣之事不可謂之無也夫孔子所謂無不可者則孟子所謂聖之時也而孟子歴敘伯夷以降終曰乃所願則學孔子雄亦為太𤣥賦稱夷齊之徒而不曰我異於是執太𤣥兮蕩然肆志不拘攣兮以二子之志足以自知而任巳者如此則無不可者非二子之所不可學也在我者不及二子則宜有可有不可以學孔子之無可無不可然後為善學孔子此言有以寤學者然不得施於雄也前世之傳者以謂伊尹以割烹要湯孔子主癰疽瘠環孟子皆斷以為非伊尹孔子之事葢以理考之知其不然也觀雄之所自立故介甫以謂世傳其投閣者妄豈不猶孟子之意哉鞏自度學毎有所進則於雄書毎有所得介甫亦以為然則雄之言不幾於測之而愈深窮之而愈遠者乎故於雄之事有所不通必且求其意況若雄處莽之際考之於經而不繆質之於聖人而無疑固不待議論而後明者也為告夷甫或以為未盡願更疏示以仕莽擬箕子之囚奴抑巳過矣況美新乎以子固而猶為附和其說甚矣君子之權衡天下出處必至聖人而後折衷也愚獨謂揚雄當不逮楚兩龔答孫都官書書㫖多蒼然之色幽然之思提刑都官閣下伏承賜書及示盛製六編凡三千首盛矣哉文之多工之深且專以久也其於君臣父子兄弟夫婦朋友天地三辰鬼神山川地理四夷中國風俗萬物治亂善惡通塞離合憂歡怨懟無不畢載而其語則博而精麗而不浮其歸要不離於道視昔以文名於天下者夫豈易至於是耶鞏之愚且懶且為事物疾病所侵以不專而且未久於學也使之觀若於海不見其涯涘於深山長谷不見其形勢之所極而敢議其大小高下耶而閣下不以所深且專以久者勵鞏博而精麗而不浮其歸本於道者教鞏乃告之曰其詳擇而去其非是者焉鞏誠怪閣下自處之過而為以賜鞏者乃所以怠且蔽之也凡鞏之學葢將以學乎為身以至於可以為人也方愚且懶且不專以久之病也惟閣下之仁豈欲怠且蔽之也其欲使知閣下之貴而長其業之富而成而猶不止如是能下於後輩如是是所以教之也孟子曰吾不屑之敎誨是亦敎誨之而已矣敢不拜賜也盛編尚且借觀而先以此謝皇恐不宣唐宋八大家文抄巻九十九
