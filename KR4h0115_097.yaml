body:
  text: 唐宋八大家文鈔巻九十一明茅坤撰臨川文鈔十一碑狀歐陽公最長於墓誌表以其序事䖏往往多太史公逸調唐以來學士大夫所不及者而王荆公獨自出機軸多巉畫曲折之言其尤長者往往於序事中一面㸃綴著色雋永逺出令人覽之如走駿馬於千山萬壑之中而層巒疊嶂應接不暇序事中之劒㦸也翰林侍讀學士知許州軍州事梅公神道碑通篇以銘序始終亦變調也宋翰林侍讀學士正奉大夫行給事中知許州軍州事兼管内堤堰橋道勸農事上柱國南昌郡開國公食邑二千三百户食實封六百户賜紫金魚袋梅公之墓在宣州宣城縣長安鄉西山里公有五子鼎臣徳臣寶臣輔臣清臣清臣今獨在為尚書司門郎中以公行狀及樂安歐陽公之銘來請文以刻墓碑時熈寜元年八月四日也銘曰公先梅伯後氏其國彌周渉秦不見史䇿有鋗有福著漢名籍公福之孫詢字昌言三世弗仕陵陽之里公第廷中判官利豐再嵗而擢以丞将作以宰仁和人譽用多主推御史侍考進士一見天子以為知己詔曰試哉遂試中書館之集賢賜服緋魚於時繼遷兵我西鄙老弱餽守丁彊多死靈州告危帝視不怡公請擇人使潘羅支兵法所謂以夷攻夷帝曰誰可無如臣者曰予汝嘉閉陷奈何公拜且跪颺言而起茍紓西師臣不愛死出書授之往訖爾謀至疆勑還㑹棄靈州帝察公藝可書帝制相或止之留佐三司其後羅支果窘西賊論将料敵皆如所策或從或違或擠或推牾合阻夷神者公尸黜之倅州用獄一眚去杭而蘇列國東屏漕輸淛河就付将領三年吿功僅得故省又以譴投守彼淮州有僚許公相得於此與之欣然樂以忘徙使於湖北遷自濠梁又奪一官往裨於襄坐發驛馬給奔喪者於鄂於蘇剖将之符握節闗中使總其輸煌煌金章厥賜特殊謀復靈武度兵葫蘆秦有将瑋諾公與俱㑹瑋召還公復淪胥有反咸陽能名氏朱始雖弗察後捕而誅自懐徂池再副戎車真宗新陟罪垢皆滌為郎度支以将廣徳外更四州楚夀陜荆乃還待制中紏獄刑有巋龍圗其唐殖殖就以學士専其閣直輟之銓衡乘傳臨并超遷郎秩進直樞密趣歸封駮考國中失申命選事得權進絀加職侍讀改司羣牧移之審官審是在服伐閱積遷給事於中告疾出許鼓歌從容方公少壮志立人上談辭慨然帝恱而嚮及後晩出皆為将相公則老矣将歸田里康定辛巳六月十日公七十八以其官卒公開南昌勲爵第一夫人曰劉不及郡封封君彭城其卒先公公卒明年季秋挾日於州山西卜祔而吉公有四子伯為進士丞於殿中與仲前死仲賜科名叔也皆丞将作殿中或廢或興有顯惟季時丞衛尉今為郎中論序初終實來求詩刻示無窮司農卿分司南京陳公神道碑法度如兵伍司農卿分司南京陳公既以嘉祐七年九月某甲子塟開封府之祥符縣西韓村皇考魏公之塋至十二月公子世範等乃來求銘以作公碑葢公昆弟皆從先人游而某又嘗得識公父子故為序其實而繫以銘序曰公諱某字良器以贈太師尚書令兼中書令衛國公諱嵩者為曾祖以贈太師尚書令兼中書令燕國公諱光嗣者為祖而尚書左丞集賢院學士諱恕之子也左丞當真宗時參知政事後以其子岐公之貴而贈至太師尚書令兼中書令魏國公公岐公之弟也而於魏公為少子年六十八以嘉祐七年六月得疾分司而以乙已棄世於陳州階至朝散大夫勲至上柱國爵至潁川郡開國子食邑至六百户賜紫金魚袋官終於司農卿而所更者祕書省正字太常寺太祝大理評事光禄大理寺丞太子中舍殿中丞國子博士尚書虞部比部駕部員外郎郎中司農光禄少卿少府監任終於知陳州而所厯者監楚州衡州酒稅知衢州江山縣知南恩州通判江揚洪廬潭州知衡州監江寜府糧料院知興化軍知均州判登聞鼓院知曹州判殿中省知郢州鄭州其通判揚州廬州皆有所避不赴知郢州則未赴而徙凡仕四十三年葢其行事可記者衆矣而公子所能記者在江州人大饑且疫公為具饘粥醫藥不足則取廬山諸佛寺餘財以續之所活以萬數有盜刈人之禾而傷其主者當死公曰古之荒政所以恤人者盡矣然尚緩刑况今哉即奏貸其死洪州大水城之不滅者十五水得城竇以入舉城惶擾不知所為公豫具薪藁不終日以塞州人徳之曰無陳公吾屬如何矣衡州之南山廣袤百餘里與夷接境大木蒙宻中國人逋逃其中冒稱夷人數出冦常寜諸邑其酋有挾左道者人傳以為能致風雨官軍尤憚之公誘以恩信則率衆數百來自占已而與其甥亡去又将為冦州人皆恐公設方畧以一日捕得殺之天子賜詔書奨諭公因圖上山川形勢攻取之策以為賊今不除黨附日衆夷人謂中國無能為必出助之可須農隙發千人使操斧斤隨以强弩斬木除道則賊失所恃不攻而自窮又出其材可以佐經用奏未報轉運使害其事劾公擅擊斷不聴用佐吏又嘗稱病不自祭炎帝公坐此罷州人乞留不得而賊果侵尋不制朝廷出使發兵撃之數年然後定興化多進士就鄉舉者常八九百人而學舍弊小無文籍公至則新而大之為之購書而國子之所有者皆具均州漢上舟子數溺商旅取貨財而以險為解公捕案寘法因取近灘數家除其徭使表水險涉者因此得不死曹州多盜亡命之尤凶强者七十餘人公集重購得之幾盡又修律令五家為保之法故盜往往逃去之他境葢公施於政者能如此公嘗為書十二篇上之曰國政要事其説多聴用而中書欲遷職事以奨之公乃自言外祖王氏塟揚州無主後願除淮南所當得之一官以往視其丘墓而已岐公之塟也天子自曹州召公歸襄事特詔許公升殿公謝岐公遭遇始終恩禮之厚因乞御篆岐公之碑首上為動容賜其首曰襃忠之碑而公終無一言自及既分司無田園僦官屋以居自為棺斂塟埋之制趣於儉而已少長好書以至於老於篆籀尤善有集二十巻其文能世其家者也夫人馮氏江南李氏時宰相延已之孫子男五人世範前商州洛南縣尉世安前廣州新㑹縣令世修大理寺丞世永将作監主簿世奕太常寺太祝女四人長適大理評事栁安期次適右班殿直王允懿次尚幼也陳氏漢太丘長諱寔之後故其望在潁川而世居洪州之南昌縣當唐末五代之亂無仕者魏公布衣起閭巷明敏諒直稱天下仍父子執國柄而至岐公尤盛公於仕嘗齟齬然尚至九卿以榮禄自終葢太丘之仁隠阨於一時而紀諶羣泰貴顯者數世豈魏公之先遭世不治亦有潛徳晦行如太丘者乎不然何其後世之興如此是故不可以無銘也銘曰虞賓夏商其後為陳屢絶復封以承聖人至漢太丘棄時就徳詒禄魏晉子孫世食既又困窮乃生魏公魏公之出魁名碩實有公有卿饋祀其室公則盛矣天子所思繩繩維卿亦顯於時治官牧民入出具宜胡公之虚太丘之里兩有州國紹榮本始歸塟浚郊皇考在前峙此銘詩為告新阡虞部郎中贈衛尉卿李公神道碑中多節奏嘉祐八年六月某甲子制曰朕初即位大賚羣臣陞朝者及其父母具官某父具官某率徳蹈義不躬榮禄能教厥子並為才臣加賜名命序諸卿位所以勸天下之為人父者豈特以慰孝子之心哉可特贈衛尉卿翌日某甲子中書下其書告第又副其書賜寛等以待墓焚寛等受書焚其副墓上乃撰次衛尉官世行治始卒來請曰先人賴天子慶施賜之官三品矣而墓碑未刻惟徳善可以有辭於後世者夫子實聞知某曰然衛尉公墓隧宜得銘久矣於是為序而銘焉序曰公姓李氏故隴西人七世祖諱某始遷於光山五世祖諱某以其郡人王閩從之始為建安人曾祖諱某皆不仕考諱某嘗仕江南李氏稍顯矣江南國除又舉進士中等以殿中丞致仕有學行名能知人贈其父大理評事而已亦以子貴贈至吏部尚書遊豫章樂其湖山曰吾必終於此於是又始為豫章人尚書之子伯曰虚已官至尚書工部侍郎以材能聞天下其季則公也公諱某字公濟少篤學讀書兼晝夜不息一以進士舉不中即以兄䕃為郊社齋郎再選福州閩清洪州靖安縣尉有能名遷饒州餘干縣令至於毁淫祠取其材以為孔子廟率縣人之秀者興於學豪宗大姓斂手不敢犯法州将部使者奏乞與京官移之劇縣不報而坐不覺獄卒殺人以免當是時侍郎方以分司就第公曰吾兄老矣我得朝夕從之游以灑掃先人廬冡尚何求而仕遂止不復言仕侍郎之卒也天子以公試祕書省挍書郎知江州徳安縣事辭不就後嘗一至京師大臣交口勸説欲官之終以其不可强也而晏元獻公為公請乃除太子洗馬致仕初尚書未老棄其官以歸至侍郎及公之退也亦皆未老自尚書至公再世皆有子而皆以嚴治其家如吏治江西士大夫慕其世徳稱其家法葢近世士多外自藩飾為聲名而内實罕能治其家及老往往顧利冒恥不知休息公獨父子兄弟能如此嗚呼其可謂賢於人也已公事親孝比遭大喪廬墓六年然後已事兄與其寡姊衣食藥物必躬親之及公老矣二子就養如公之為子弟也寛嘗為江浙等路提㸃鑄錢坑冶又嘗提㸃江南西路刑獄定亦再為洪州官不去左右者十二年皆以才能為世聞人以恩遷公官至尚書虞部郎中階至朝奉郎勲至䕶軍以嘉祐四年七月某甲子卒於豫章之第室年八十九夫人長夀縣君趙氏先公卒八年既塟矣五年某月某甲子以公塟於夫人之墓左曰雷岡在新建縣之桃花鄉新里夫人故衢州人某官湘之女湘有文行尚書與為友故為公娶其女子三人寛定實實守祕書省正字早世於公之塟也寛為尚書司勲員外郎定為尚書庫部員外郎女子二人已嫁孫二十有一人曾孫十有五人皆率公教無違者公既塟而二子以恩贈公衛尉卿云銘曰李世大家隴西其先於唐之季再世光山移遯於閩嶺海之間乃生尚書節行有偉始來江南考室章水繩繩二子隠顯兼榮孰多厚禄其季維卿幼壯躬孝唯君之踐能不盡用止於一縣退以徳義釐身於家外内肅雝人不疵嗟亦有二子維天子使父曰往矣致而臣身子曰歸哉以寜吾親以率其婦左右恂恂以官就侍天子之仁既具祉福考終大耄追榮於幽乃賜卿號伐石西山作為螭龜營之墓上勒此銘詩廣西轉運使孫君墓碑按次㸃綴君少學問勤苦寄食浮屠山中步行借書數百里升樓誦之而去其階葢數年而具衆經後遂博極天下之書屬文操筆布紙謂為方思而數百千言已就以天聖五年同學究出身補滁州來安縣主簿洪州右司理再舉進士甲科遷大理寺丞知常州晉陵縣移知潯州潯當是時人未趣學乃改作廟學召吏民子弟之秀者親為據案講説誘勸以文藝居未幾旁州士皆來學學者由此遂多以選通判耀州兵士有訟財而不直者安撫使以為直君爭之不得乃奏決於大理大理以君所爭為是而用君議編於勑慶厯二年擢為監察御史裏行於是彈奏狄武襄公不當沮敗劉滬永洛城事又因日食言隂盛以後宫為戒仁宗大獵於城南衛士不及整而歸以夜明日将復出有雉隕於殿中君奏疏即是夜有詔止獵蠻唐和冦湖南以君安撫奏事有所不合因自劾乃知復州又通判金州知漢陽軍吉州稍遷至尚書都官員外郎提㸃江南西路刑獄有言常平嵗凶當稍貴其粟以利糴本者詔從之君言此非常平本意也詔又從之儂智髙反君即出兵二千於嶺以助英韶㑹除廣西轉運使馳至所部而智髙方煽天子出大臣部諸将兵數萬擊之君驅散亡殘敗之吏民轉芻米於惶擾卒急之間又以餘力督守吏治城塹修器械屬州多完而師飽以有功君勞居多以勞遷尚書司封員外郎初君請斬大将之北者發騎軍以討賊及後賊所以破滅皆如君計䇿軍罷而人重困方恃君綏撫君乘險阻冒瘴毒經理出入啓居無時以皇祐三年三月初七日卒於治所年五十四官至尚書工部郎中散官至朝奉郎勲至上騎都尉君所為州整齊其大體濶畧其細故與賓客談説弦歌飲酒往往終日而能聴用佐屬盡其力事以不廢在御史言事計曲直利害如何不顧望大臣以此無助所為文自少及終以類集之至百巻天徳地業人事之治掇拾貫穿無所不言而詩為多君諱抗字和叔姓孫氏得姓於衛得望於富春其在黟縣自君之髙祖棄廣陵以避孫儒之亂而至君曾大父諱師睦善治生以致富嵗饑賤出米穀以斗升付糴者得驩心於鄉里大父諱旦始盡棄其産而能招士以教子父諱遂良當終時君始十餘嵗後以君故贈尚書職方員外郎君初娶張氏又娶吳氏又娶舒氏封太康縣君五男子適邈迪适遘適嘗從予逰年十四論議著書足以驚人終永州軍事推官邈今潞州上黨縣令亦好學能文狀君行以求銘者邈也君之卒也天子以适試祕書省挍書郎二女子一嫁太廟齋郎李簡夫一嫁進士鄭安平君以其卒之年十二月二十五日塟黟縣懐逺鄉上林村歙之為州在山嶺澗谷﨑嶇之中自去五代之亂百年名士大夫亦往往而出然不能多也黟尤僻陋中州能人賢士之所罕至君孤童子徒步宦學終以就立為朝廷顯用論次終始作為銘詩豈特以顯孫氏而慰其子孫乃亦以詒其鄉里銘曰在仁宗世蠻跳不制餽師牧民實有膚使踐艱乘危條變畫竒瘭毒既除膏熨以治方遷既隕哀暨山夷維此膚使文優以仕禄則不殖其書滿笥書藏于家銘在墓前以告黟人孫氏之阡伍子胥廟銘隻眼之論足破千古之疑予觀子胥出死亡逋竄之中以客寄之一身卒以說吳折不測之楚仇報恥雪名振天下豈不壯哉及其危疑之際能自慷慨不顧萬死畢諫於所事此其志與夫自恕以偷一時之利者異也孔子論古之士大夫若管夷吾臧武仲之屬茍志于善而有補于當世者咸不廢也然則子胥之義又曷可少耶康定二年予過所謂胥山者周行廟庭嘆吳亡千有餘年事之興壊廢革者不可勝數獨子胥之祠不徙不絶何其盛也豈獨神之事吳之所興葢亦子胥之節有以動後世而愛尤在於吳也後九年樂安蒋公為杭使其州人力而新之余與為銘也烈烈子胥發節窮逋遂為册臣奮不圖軀諫合謀行隆隆之吳厥廢不遂邑都俄墟以智死昬忠則有餘胥山之顔殿屋渠渠千載之祠如祠之初孰作新之民勸而趨維忠肆懐維孝肆孚我銘祠庭示後不誣兵部知制誥謝公行狀勝歐公誌銘公諱絳字希深其先陳郡陽夏人以試祕書省挍書郎起家中進士甲科守太常寺奉禮郎七遷至尚書兵部員外郎以卒嘗知汝之潁隂縣挍理祕書直集賢院通判常州河南府為開封府三司度支判官與修真宗史知制誥判吏部流内銓最後以請知鄧州遂塟於鄧年四十六其卒以寳元二年公以文章貴朝廷藏於家凡八十巻其制誥世所謂常楊元白不足多也而又有政事材遇事尤劇尤若簡而有餘所至輒大興學舍荘懿明肅太后起二陵於河南不取一物於民而足皆公力也後河南聞公喪有出涕者諸生至今祠公像於學鄧州有僧某誘民男女數百人以昬夜聚為妖積六七年不發公至立殺其首弛其餘不問又欲破美陽堰廢職田復召信臣故渠以水與民而罷其嵗役以卒故不就於吏部所施置為後法其在朝大事或諫小事或以其職言郭皇后失位稱詩白華以諷爭者貶公又救之嘗上書論四民失業獻大寶箴議昭武皇帝不宜配上帝請罷内作諸竒巧因災異推天所以譴吿之意言時政又論方士不宜入宫請追所賜詔又以為詔令不宜偏出數易請繇中書宻院然後下其所嘗言甚衆不可悉數及知制誥自以其近臣上一有所不聞其責今豫我愈慷慨欲以論諫為已事故其葬也廬陵歐陽公銘其墓尤嘆其不夀用不極其材云卒之日歐陽公入哭其堂椸無新衣出視其家庫無餘財葢食者數十人三從孤弟妷皆在而治衣櫛纔二婢平居寛然貌不自持至其敢言自守矯然壯者也謝氏本姓任自受氏至漢魏無顯者而盛於晉宋之間至公再世有名爵於朝而四人皆以才稱於世先人與公皆祥符八年進士而公子景初等以厯官行事來曰願有述也将獻之太史謹撰次如右謹狀今人每先状而後誌謝希深之誌歐公為之久矣而王公以補其狀如此彰武軍節度使侍中曹穆公行状瑋多兵略公序亦有生色公諱瑋字寶臣真定府靈夀縣人少以䕃為天平武寜二軍牙内都虞候至道中李繼遷盜據河西銀夏等州後又撃諸部并其衆李繼隆范廷召等數出無功而朝廷終棄靈武繼遷遂强屢入邊州為冦當是時公為東頭供奉官閤門祗候年十九太宗問大臣誰可使當繼遷者武惠王以公應詔太宗以知渭州而欲除諸司使以遣之武惠王為公固讓乃以本官知渭州真宗即位改内殿崇班閤門通事舍人西上閤門副使移知鎮戎軍當是時繼遷虐使其衆人多怨者公即移書言朝廷恩信撫納之厚以動之羌人得書往往感泣於是康奴諸族皆内附咸平六年繼遷死其子徳明求保塞公上書言繼遷擅中國要害地終身旅拒使謀臣狼顧而憂方其國危子弱不即捕滅後更盛强無以息民當是時朝廷欲以恩致徳明寝其書不用而河西大族延家妙等遂拔其部人來歸諸将猶豫未知所以應公曰徳明野心去就尚疑今不急折其羽翮而長養就之其飛必矣即自将騎士入天都山取之内徙徳明由此遂弱而至死不敢窺邊大中祥符元年召還除西上閤門使邠寜環慶路兵馬都鈐轄兼知邠州東封遷東上閤門使髙州刺史再移真定府定州路都鈐轄已而又以為涇原路都鈐轄兼知渭州公乃圖涇原環慶兩路山川城郭戰守之要以獻真宗留其一樞密院而以其一付本路使諸将出兵皆按圖議事祀汾隂遷四方館使初章理驕於武延鹹泊撥臧掘强於平涼公皆誅之而汧渭之間遂無一羌犯塞八年遷英州團練使知秦州秦西南羌唃厮囉宗哥立遵始大遵獻方物求稱賛普公上書言夷狄無厭足其求必輕中國大臣方疑其事㑹得公書遂不許而猶以為保順軍節度使公曰我狃遵矣又将為冦吾治兵以俟爾遵使其舅賞様丹招熟户郭厮敦為鄉導公即誘様丹捕厮敦而許以一州様丹終殺厮敦公遂奏以為潁州刺史而様丹亦舉南市城以獻先是張吉知秦州生事熟户多去為遵耳目及公誅様丹即皆惶恐避逃公許之入贖自首還故地而至者數千人後遂帖服皆為用至明年囉遵果悉衆號十萬冦三都公帥三将破之追北至沙州所俘斬以萬計事聞除客省使康州防禦使其後又破滅馬波叱臘鬼留等諸羌囉遵遂以窮孤逃入磧中而公斥境隴上置弓門威逺凡十寨自是秦人無事矣天禧三年召還除華州觀察使以西人之恃公也復以為鄜延路馬步軍都部署四年遂除宣徽北院使鎮國軍節度觀察留後簽署樞宻院事丁晉公用事稍除不附已者既貶寇萊公即指公為黨改宣徽南院使出為環慶路都署又降容州觀察使知萊州晉公貶乃以公為華州觀察使知青州天聖三年除彰化軍節度觀察留後知天雄軍又移知永興軍而詔使來朝至則除昭武軍節度使而復還之天聖五年以疾病求知孟州得之㑹言事者以公宿将有威名不當置之閒處乃以為真定路馬步軍都部署知定州七年換彰武軍節度使八年正月薨于位年五十八皇帝為罷朝兩日贈侍中諡曰武穆公為将幾四十年用兵未嘗敗衂尤有功於西方舊羌殺中國人得以羊馬贖死如羌法公以謂如此非所尊中國而愛吾人奏請不許其贖又請補内附羌百族以為上軍主假以勲階爵秩如王官至今皆為成法陜西嵗取邊人為弓箭手而無所給公以塞上廢地募人為之若干畝出一卒若干畝出一馬至其税斂發兵戍守至今邊賴以實所募皆為精兵在渭州取隴外籠干川築城置兵以守曰後當有用此者及李元昊叛兵數出卒以籠干川為徳順将軍而自隴以西公所措置人悉以為便也自三都之戰威震四海唃厮囉聞公姓名即以手加顙在天雄契丹使過魏地輒隂勒其從人無得髙語疾驅至多憚公不敢仰視契丹既請盟真宗於兵事尤重慎節有邊手詔詰難至十餘反而公每守一議終無以奪真宗後愈聴信有論邊事者往往密以付公可否好讀書所如必載書數兩兼通春秋公羊糓梁左氏傳而尤熟于左氏始娶潘氏馮翊郡夫人忠武軍節度使同中書門下平章事韓國公美之子後娶沈氏安國太夫人故相左僕射倫之孫光禄少卿繼宗之子子男四人僖禮賓使知儀州當元昊叛時以策説大将不能用反罪之遷韶州以死倚終内殿崇班俁供備庫副使拒元昊于瓦亭戰死贈寜州刺史倩右侍禁一女子適四方館使榮州刺史王徳基孫五人諒諷東頭供奉官誼右侍禁閤門祗候諝三班奉職諮右班殿直魯國公贈太尉中書令王公行狀當與歐公墓碑㕘看而歐為勝公諱徳用字元輔其先真定人也世以財雄北邊而蒋公邢公皆倜儻喜赴人急嵗饑所活以千計武康公當太宗時貴寵任事以殿前都指揮使受遺詔輔真宗塟其先公河南密縣縣後分屬鄭州管城故今為管城人焉公先喪其母韓國夫人朱氏事繼母魯國太夫人張氏以孝聞至道二年太宗五路出師以討李繼遷之叛而武康公出夏州當是時公為西頭供奉官而在武康之側年十七自䕶兵當前所俘斬及得馬羊功為多及歸公又請殿将至隘公以為歸之至隘而爭先必亂亂而繼遷薄我必敗於是又請以所䕶兵馳前至隘而陣武康為公令於軍曰至陣而亂行者斬公亦令曰至吾陣而亂行者吾亦如公令至陣士則帖然以此行而武康公亦為之按轡繼遷兵相隨屬左右望公莫敢近於是武康公嘆曰王氏有兒矣及論功武康公曰吾為大将不可使子弟與諸将分功絀公不列三年遷東頭供奉官咸平三年遷内殿崇班三年換御前忠佐馬軍副都頭景徳二年為馬軍都頭大中祥符元年為邢洺磁相廵檢提舉捉賊男子張鴻霸聚黨界中為盜朝廷以名捕久之不得公以氊車載壯士偽服為婦人誘之於野於是鴻霸與其黨三十二人皆得朝廷以為能移陜西東路提舉捉賊自陜以東為盜者聞公擒鴻霸事皆惴恐逃去五年為環慶路指揮使奏事上前忤㫖責授鄆州馬步軍都指揮使是嵗武康公薨天子命公乘驛䕶喪歸京師已而還其舊職七年遷散虞候散都頭八年遷散員内殿直都虞候天禧四年為殿前左班都虞候栁州刺史乾興元年為捧日左廂都指揮使英州圑練使天聖三年改博州團練使知康信軍城壊公使禁軍為築築者久之而無敢竊言望公使已以非其事者城成天子賜書奨諭五年移冀州兼馬步軍都部署是嵗除康州防禦使龍神衛四廂都指揮使又除捧日四廂都指揮使六年除侍衛親軍步軍都虞候歸就職又除環慶路副都部署不行八年除并代州馬步軍副都部署又除殿前都虞候十年除桂州觀察使侍衛親軍步軍副都指揮使權馬軍都指揮使諸将皆遷與士之請馬者皆不求有司而得故事取糞錢於軍以給公使自公始罷之使各置庫以待其軍用明道元年除福州觀察使軍人挾内詔求為軍吏公爭曰軍人敢挾詔以干軍制後不可復治且軍吏不可使求而得得則軍人必大受其侵明肅太后固使與之公固不奉詔已而太后亦寤卒聴公及太后崩有司請衛士皆坐甲公又不奉詔曰故事無為太后喪坐甲也於是天子心賢公以為可用及閱太后官得爭軍吏事遂以公撿挍太保簽署樞宻院事公固辭武人不學不足以當大任天子使中貴人趣公入院公於朝廷臨義慷慨言無所顧計至於親戚故舊待之亦皆當理而有恩故人為人求官於公公問其得謝幾何故人辭窮以實對公亦不拒也歸而使家人以銀與之曰爾所求者在此矣官非吾有不可得居頃之除樞密副使三年除明州奉國軍節度觀察留後同知樞宻院事四年除安徳軍節度使五年撿挍太尉充宣徽南院使寳元元年李元昊叛公嘗請将以扞邊天子不許曰吾以公謀可也卒所以鎮撫扞治者亦多公計策始人或以公威名聞天下而狀貌竒偉疑非人臣之相御史中丞孔道輔因以為人言如此公不宜典機密在上左右天子不得已以公為武寜軍節度使徐州大都督府長史赴本鎮賜手詔慰遣而言曰皆尚論公未止也又以公為右千牛衛上将軍知隨州人為公懼恬然唯不接賓客而已移曹州或聞孔道輔死以吿曰是嘗害公者今死矣公愀然曰孔中丞豈害某者乎彼其心所以事君當如此也惜乎朝廷無一忠臣言者服公以謂有徳而終身自愧其言曹人喜鬬多盜他日獄未嘗空也公在曹嘗無一人囚者數矣慶厯二年除撿挍司空保靜軍節度使天子以手詔賜公曰賜卿重地勉視事毋以人言為憂有傷卿者朕不聴契丹使劉六符過澶州喜曰六符聞公久矣遇於此豈非幸也今此州嵗大熟豈非公仁政之効也公謝曰明天子在上固常多豐年此豈吾力也今朝廷多賢士大夫可畏者吾老矣備位於此不足以累公稱數是嵗移真定府等路駐泊馬步軍都部署求奏事京師天子使中貴人諭公入覲除宣徽南院使判成徳軍固辭不得未行以契丹使使求周世宗所取三關故地聚兵幽薊為若侵邊者乃移公判定州兼三路都部署聴以便宜従事而以楊崇勲知成徳軍崇勲使客問公所以戰公曰吾患不仁不患不威患不知不患無功葢見敵而後勝可制吾所戰豈可以豫言也公至定州則明賞罰以教戰契丹使人來覘或以告勸公執殺公置之不問曰吾視士卒皆樂戰可用矣使彼得歸以告其主是伏人之兵以不戰也明日大閱于郊公提桴鼓誓師進退坐作終日不戮一人而畢乃下令具糗糧聴鼓於中軍将盡以汝行唯吾其所鄉契丹聞之震恐已而天子宻詔問公方略公上書論近世用兵之失與今所以料敵制勝之方甚備㑹兵罷徙公知陳州過都天子使中貴人勞賜問公欲見否公辭謝備邊無功幸蒙上恩赦誅徙内郡非有公事當對者不敢見三年移孟州召還署宣徽院事已而出判相州六年除同中書門下平章事判澶州七年移鄭州封祁國公八年還除㑹靈觀使又除撿挍太師判鄭州過都天子召見慰勞皇祐二年除集慶軍節度使進封冀國公三年以年老求致仕詔以太子太師致仕大朝㑹綴中書門下班公威名雖老矣尚為四夷所憚而天子亦賢公以為可屬大事也四年復强起公以為河陽三城節度使同中書門下平章事判鄭州六年遂以為樞宻使契丹使至公伴射使曰南朝以公使樞密而相富公可謂得人矣天子聞之賜公御弓一矢五十以寵焉嘉祐九年進封魯國公以年老求去位至六七天子為之不得已猶以為忠武軍節度使景靈宫使又以為同羣牧制直使有詔五日一㑹朝給扶者以一子若孫一人是嵗公年七十八矣明年二月辛未公以疾薨天子至其第為之罷朝一日又為之素服發哀苑中而以太尉中書令告其第又賜以黄金水銀龍腦等物出内人撫其諸子公忠實樂易與人不疑不詰小過望之毅然有不可犯之色及就之温如也平生少玩好不以名位驕人而所得禄賜多施之親黨善治軍旅寛仁愛士卒士卒樂為之盡與士大夫逰士大夫亦多服其度以為莫能窺也夫人宋氏武勝軍節度使延渥之女也累封安定郡夫人先公卒後以子追封榮國夫人孝慈恭儉有助於公男子咸熈東頭供奉官早卒以子故累贈至右千牛衛将軍次咸融西京左藏庫使果州圑練使次咸庶内殿崇班早卒次咸英供備庫副使次咸康内殿承制女四人長嫁尚書駕部郎中張叔詹其次嫁太常博士程嗣恭國子博士冦諲皆早卒孫七人澤淵皆内殿崇班閤門祗候淑左侍禁淇左班殿直潭右班殿直沅瀛左侍禁温未仕淑淇皆早卒曾孫二人任右侍禁价未仕公子卜以五月甲申塟管城之先塋而國夫人祔謹具公厯官行事状請牒考功太常議諡并史館唐宋八大家文鈔巻九十一
