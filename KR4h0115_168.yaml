body:
  text: 唐宋八大家文鈔卷一百五十四明茅坤撰潁濱文鈔十歷代論知罃趙武論即五伯之議論齊桓公存三亡國以屬諸侯其義多於晉文然桓公殁而齊亂其後不能復伯文公子孫世為盟主二百餘年與春秋相終始其故何也雖襄公悼公之賢齊所無有然其所以保伯業而不失者則有在也伯者之盛非能用兵以服諸侯之難而能不用兵以服諸侯之為難耳文公之後前有知罃後有趙武皆能不用兵以服諸侯此晉之所以不失伯也悼公與楚爭鄭三合諸侯之師其勢足以舉鄭而郤楚晉之羣臣中行偃欒黶之徒欲一戰以服楚者衆矣惟知罃為中軍將知用兵之難勝負之不可必三與楚遇皆遷延稽故不與之戰卒以敝楚而服鄭此則知罃不用兵之功也悼公死平公立平公非悼公比也然能屬任趙武武嘗與楚屈建合諸侯之大夫于宋以求弭兵趙武於此有仁人之心二焉方其未盟也屈建衷甲將以襲武武與叔向謀之叔向曰以信召人而以僭濟之人誰與之安能害我武從其言卒事而楚不敢動將盟晉楚爭先叔向又曰諸侯歸晉之德爾非歸其尸盟也子務德無爭先武亦從而先之此二者非仁人不能何也人將衷甲以襲我我亦衷甲以待之此勢之所必至也不幸不勝無可言者雖幸而勝晉楚之禍必自是始晉為盟主常先諸侯矣晉未失諸侯而楚求先之若與之爭楚必不聽晉楚之禍亦必自是始然此二者皆人情之所不能忍也忍之近於弱不忍近於彊而武能忍之晉楚不爭而諸侯賴之故吾以為武有仁人之心二焉凡晉之所以不失諸侯而趙氏之所以卒興於晉者由此故也春秋書宋之盟實先晉而後楚孔子亦許之歟鄧禹論或曰兵聞拙速未睹巧之久也禹與赤眉相持久而不決故遺之馮異代將而功成鄧禹初以兵入關乘勝獨克關輔響震是時赤眉方入長安諸將豪傑皆勸禹徑乘其亂禹曰吾衆雖多能戰者少前無可仰之積後無轉饋之資赤眉新拔長安財富兵鋭未易當也盜賊羣居無終日之計財榖雖多變故萬端非能堅守者也上郡北地安定三郡土廣人稀饒榖多畜吾且休兵北道就糧養士以觀其變乃可圖也於是引兵北屯栒邑光武聞之敕禹以時進討禹固執前意盤桓不進明年赤眉西走扶風禹乃入長安謁祠髙廟收十一帝神主然卒不能定關中無功而歸蓋赤眉之亂光武欲急攻之禹欲緩取之議者見禹之敗因以禹為失計吾以為不然赤眉方彊急之實難緩之為得逮其自敗西走扶風而禹乘之猶能還兵敗禹而況其未走也哉如光武之計蓋不知赤眉方彊而禹兵力不足若審知如此聽禹堅守北道時出撓之而使别將挾持其東東西蹙之磨以歲月而赤眉成擒矣禹之敗而西歸也與馮異相遇要異共攻赤眉異曰異與賊相遇且數十日雖屢獲雄將餘衆尚多可稍以恩信傾誘難卒用兵破也上今使諸將屯澠池要其東而異擊其西一舉取之此萬全計也禹又不從而敗由此觀之禹本計不失而帝不能用禹亦迫於君命不能自固耳賈詡論子瞻以魏重於取蜀子由則以不取蜀為操之老於兵曹公入荆州降劉琮欲順江東下以取孫氏賈詡言於公曰公昔破袁氏今收江南威名逺聞兵勢盛矣若因舊楚之饒以饗吏士撫安百姓江東可以不勞衆而定也公不用其計以兵入吳境遂敗於赤壁夫詡之所以說曹公則李左車之所以說淮隂侯使乘破趙之勢傳檄以下燕者也方是時孫氏之據江東已三世矣國險而民附賢才為用諸葛孔明以為可與為援而不可圖而曹公以劉琮待之欲一舉而下之難哉使公誠用詡言端坐荆州使辨士持尺書結好於吳吳知公無并吞之心雖未即降而其不以干戈相向者可必也方是時劉𤣥德方以窮客借兵於吳吳既修好於公其勢必不助劉而𤣥德固可蹙矣惜乎謀之不善荆州既不能守而孫劉皆奮孰謂曹公之智而不如淮隂侯哉其後公既降張魯下漢中劉曄勸公乘勝取蜀曰劉備人傑也有度而遲得蜀日淺蜀人未附也今舉漢中蜀人震駭因其震而壓之無不克也若稍緩之諸葛亮善治國而為相雲長益德勇冠三軍而為將蜀人既定馮險守要不可犯也公不從而反天下皆惜曄計之不用夫𤣥德之賢過於仲謀賈詡欲以文告懷仲謀而曄欲以虛聲下𤣥德其愚智蓋已逺矣彼曹公不用曄計豈非以詡言為戒也哉春秋之際楚子重伐鄭晉欒武子救之遇於繞角楚師還晉師遂侵蔡楚人以申息之師救蔡晉羣帥皆欲戰智莊子范文子韓獻子謂武子曰吾來救鄭楚師不戰吾遂至於此既遷戮矣戮而不已又怒楚師戰必不克雖克不令若不能克為辱已甚不如還也遂全師而歸夫兵久於外狃於一勝而輕與敵遇我怠彼奮敗常十九古之習於兵者蓋知之矣羊祜論子由謂祜之滅吳不如范文子之釋楚以為外懼愚竊謂范文子處春秋列國之間可為深慮也晉與吳為兩大之國非此亡彼則彼必圖此吳主皓方以妖童淫虐其國晉不以此時下之是所謂圈虎而遺之患也及吳滅之後祜已先晉武帝而死矣君子欲以其身沒二十餘年之後而議功為罪不亦過乎豫獨愛其言足為後世人主持盈者之戒故録而識之善為國者必度其君可與共患難可與同安樂而後有為故功成而無後憂晉厲公與楚共王爭鄭晉人知楚有可乘之隙欒武子為政欲出兵擊之曰不可以當吾世而失諸侯范文子不欲請釋楚以為外懼武子不能用夫文子非茍自安者也厲公侈而多嬖寵諸大夫富而凌上國有大功則君臣不相安亂之所自生也既謀之不從出而遇楚猶欲避楚而歸既勝反國曰亂將作矣吾不可以俟使其祝宗祈死逾年而厲公殺三郤立胥童欒書殺胥童弒厲公文子雖死而免於大難子孫與晉國相終始范蠡事越王勾踐反自㑹稽撫人民厲甲兵七年而殺吳王夫差歸未及國知越王之難與同安樂也扁舟去之卒免文種之戮若二子者可謂有先見之明矣范文子至於自殺范蠡至於逃亡而不顧何則所全者大也晉武帝既受魏禪中原富彊羣臣用命吳孫皓以淫虐失衆有亡國之釁晉人習於長江之險以為未可取也羊祜為襄陽守知其不能久陳可取之計武帝納之祜又進王濬杜預以成滅吳之功後世皆稱其賢吾嘗論祜巧於策吳而拙於謀晉何以言之武帝之為人好善而不擇人茍安而無逺慮雖賢人滿朝而賈充荀朂之流以為腹心使吳尚在相持而不敢肆雖為賢君可也吳亡之後荒於女色蔽於庸子疏賢臣近小人去武備崇藩國所以兆亡國之禍者不可勝數此則滅吳之所從致也孟子曰入則無法家拂士出則無敵國外患者國常亡故人常生於憂患而死於安樂祜不慮此而鋭於滅吳其不若范文子逺矣或曰吳滅而晉亂此天命非人事也而羊祜何罪焉吾應之曰為國當論人事使祜不為滅吳之計孫皓窮凶而死吳更立君則長江未可越也吳既不亡則晉之君臣厲精不懈是吳不滅而晉不亂也不猶愈於吳滅而晉亂乎祜之將死也武帝欲使臥護諸將祜曰滅吳不須臣自行但吳平之後當勞聖慮耳推祜此言蓋亦憂在平吳矣憂在平吳而勇於滅吳其不若范文子逺矣王衍論其罪王衍甚確而其論東晉以來迄于唐似猶影響聖人之所以御物者三道一也禮二也刑三也易曰形而上者謂之道形而下者謂之器禮與刑皆器也孔子生於周末內與門弟子言外與諸侯大夫言言及於道者蓋寡也非不能言謂道之不可以輕授人也蓋嘗言之矣曰參乎吾道一以貫之夫道以無為體而入於羣有在仁而非仁在義而非義在禮而非禮在智而非智惟其非形器也故目不可以視而見耳不可以聽而知惟君子得之於心以之御物應變無方而不失其政則所謂時中也小人不知而竊其名與物相遇輒捐理而徇欲則所謂無忌憚也故孔子不以道語人其所以語人者必以禮禮者器也而孔子必以教人非吝之也蓋曰君子上達小人下達君子由禮以達其道而小人由禮以達其器由禮以達道則自得而不眩由禮以達器則有守而不狂此孔子之所以寡言道而言禮也若其下者視之以禮而不格然後待之以刑辟三者具而聖人之所以御物者盡矣三代已逺漢之儒者雖不聞道而猶能守禮故在朝廷則危言在鄉黨則危行皆不失其正至魏武始好法術而天下貴刑名魏文始慕通達而天下賤守節相乘不已而虛無放蕩之論盈於朝野何晏鄧揚𨗳其源阮籍父子漲其流而王衍兄弟卒以亂天下要其終皆以濟邪佞成淫欲惡禮法之繩其姦也故蔑棄禮法而以道自命天下小人便之君臣奢縱於上男女淫泆於下風俗大壞至於中原為墟而不悟王𨗳謝安江東之賢臣也王𨗳無禮於成帝而不知懼謝安作樂於期喪而不受教則廢禮慕道之俗然矣東晉以來天下學者分而為南北南方簡約得其精華北方深蕪窮其枝葉至唐始以義疏通南北之異雖未聞聖人之大道而形器之說備矣上至郊廟朝廷之義下至冠婚喪祭之法何所不取於此然以其不言道也故學者小之於是捨之而求道冥冥而不可得也則至於禮樂度數之間字書形聲之際無不指以為道之極然反而察其所以施於世者內則讒諛以求進外則聚斂以求售廢端良聚茍合杜忠言之門闢邪說之路而皆以詩書文飾其僞要之與王衍無異嗚呼世無孔孟使楊墨塞路而莫之闢吾則罪人爾矣唐荆川曰有識見論處亦透王導論西晉之士借通達以濟淫欲風俗既敗夷狄乘之遂喪中國相隨渡江而此風不改賢者知厭之矣而不勝其衆俗亂於下政弊於上而莫能正也東晉之不競由此故耳是時王𨗳為相達於為國之體性本寬厚容衆衆人安之然生於衍澄之間不能免習俗之纍喜通而疾介能彌縫一時之闕而無百年長久之計也更二大變幾至亡國元帝之世王敦擁兵上流有無君之心劉隗刁協剛介狷淺見信於帝專以法繩公卿而深疾王氏恣橫敦遂起兵以誅君側為詞兵再犯闕幸而敦死元明既沒成帝幼弱庾亮輔政任法以裁物復失人心蘇峻擅兵歷陽多納亡命專用威刑亮知峻必為亂以大司農召之衆人皆知不可而亮不聽遂與祖約連兵內向塗炭京邑此二釁者皆𨗳之所不欲而隗亮不忍以速其變以隗亮為是耶敦峻之禍發不旋踵以導為是耶使人主終身含垢何以為國魯自宣公政在季氏更三世至昭公不能忍將攻之子家羈曰捨民數世求以克事不可必也公不從而出隗亮之敗則昭公之舉也齊景公以貪暴失民田氏以寬惠得衆公問於晏嬰求所以救之嬰曰惟禮可以已之在禮家施不及國民不遷農不移工賈不變士不濫官不諂大夫不收公利公歎曰善哉吾今而後知禮之可以為國嬰曰禮之可以為國也久矣與天地並晏子知之而景公不能用田氏遂代吕氏蓋大家世族為患於其國常若心腹之疾必與人命相持為一攻之以毒藥劫之以針石病若不去命輒隨盡非良醫賢臣未易處也子産為鄭國小而逼族大多寵子産患之有事伯石賂以其邑子太叔曰國皆其國也奚獨賂焉子産曰無欲實難皆得其欲以從其事而要其成非我有成其在人乎何愛於邑邑將焉往子太叔曰若四國何子産曰非相違也而相從也四國何尤焉鄭書有之曰安定國家必大焉先姑先安大以待其所歸既伯石懼而歸邑卒以豫之又使為卿以次已位鄭乃少安及其久而政成大人之忠儉者從而豫之泰侈者因而斃之逐豐卷戮子晢鄭乃大治如𨗳所為知賂伯石以全其始矣未知豫忠儉斃泰侈以成其終也以為賢於隗亮則可以論晏子子産則逺矣狄仁傑論文不著意而篇中以緩得之四字誠名言也母后臨朝據人君之地而私其親有志之士將欲正之常患不克漢吕后欲王諸吕王陵以髙帝舊約爭之曰非劉氏而王天下共擊之背之不可言雖直不見省陵幸而不死亦廢不用唐武后廢廬陵王立豫王豫王雖在位未嘗省天下事徐敬業為之起兵於外裴炎爭之於內皆不旋踵為戮何者位尊權重臣下無所奈何勢必至此也惠帝之亡也陳平聽張辟彊計封王諸吕吕后安之故平與周勃得執將相之柄以伺其間後復聽陸賈交歡周勃將相之權不分故周勃得入北軍左袒一呼而吕氏以亡豫王既立武后革命稱帝追尊祖考封王子弟戕殺天下豪俊志得氣滿以為武氏有泰山之安矣狄仁傑雖為宰相而未嘗一言及后欲以三思為太子訪之大臣仁傑乃曰臣觀天人未厭唐德頃胸奴犯邊陛下使三思募士逾月不及千人及使廬陵王不浹旬得五萬人今欲立嗣非廬陵不可后怒罷議久之復召問曰朕數夢雙陸不勝何也對曰雙陸不勝無子也意者天以此警陛下耶文皇帝身蹈鋒刃百戰以有天下傳之子孫先帝寢疾詔陛下監國陛下掩神器而取之十餘年矣又欲以三思為後且母子與姑姪孰親陛下立廬陵王則千秋萬歲血食於太廟三思立廟無袝姑之禮后感悟即日遣徐彥伯迎廬陵王於房州而立之蓋王陵裴炎迎禍亂之鋒欲以一言折之故不廢則死陳平狄仁傑待其已衰而徐正之故身與國俱全惟吕后無子親止於姪故沒身而後變武后有子母子之愛人情之所同故老而自復由此觀之陳狄之所以成功者皆以緩得之也然廬陵既立而張易之昌宗未去仁傑猶置之不問復授之張柬之俟其惡稔而後取豈以禍亂之根生於母子之間不如是則必至於毁傷故耶老氏有言將欲歙之必固張之將欲弱之必固彊之將欲廢之必固興之將欲奪之必固與之是謂微明柔勝剛弱勝强魚不可以脫於淵國之利器不可以示人二公得之矣姚崇論崇雖稱名相而其順適𤣥宗之欲以開末年驕侈之漸幾致亡國崇所不能辭唐史官稱姚崇善應變以成天下之務宋璟善守文以持天下之正斯言固二人之所長也然應變者要不失正而後可孟子有言所惡於智者為其鑿也如智者若禹之行水則無惡於智矣禹之行水也行其所無事也如智者亦行其所無事則智亦大矣唐𤣥宗豪俊之君也而崇復以豪俊事之方其君臣遇合天下事迎刃而解若無足為者雖然以水濟水後將有不可食者開元四年天下大蝗民祭且拜之坐視食苗而不敢捕崇奏遣御史為捕蝗使分道殺蝗羣臣多不以為然帝亦疑之而崇行之愈力蝗亦為息捕蝗雖古之遺法然遇災而懼修德以答天變古之正道也崇置之不言而專以捕為事巳可疑矣既而崇所親吏趙誨以賕死崇懼還政時帝將幸東都而太廟屋壞宰相宋璟蘇頲皆言三年喪未終不可巡幸壞壓之變天戒也請罷東巡修德以答至譴帝以問崇崇曰此符堅故殿也山有朽壤而崩木蠧而折理無足怪但壞與行㑹非緣行而壞也今關中無年饋餉勞弊出幸東都所以為人非為己也百司已戒供擬已具請車駕即東而遷神主太極殿更作新廟此大孝也帝用其言崇由此復相開元末帝在東都欲還長安裴耀卿等皆言農人場圃未畢須冬可還李林甫獨曰二都本東西宫耳車駕往來何用待時假令妨農獨赦所過租賦可也帝大悅即駕而西崇建東幸之計林甫獻西還之議其意同耳孰謂崇獨賢乎從崇之議使人君上不畏天戒中不敬宗廟下不恤人言三者皆忠臣之所諱而崇居之不疑何哉其後崇璟既沒𤣥宗愈老愈輕蔑羣臣方任張九齡而廢太子瑛用牛仙客則聽李林甫方嬖楊國忠而縱安祿山則用輔璆琳專以適已為悅類崇有以啓之也故吾謂開元之治雖出於崇而天寶之亂亦崇之所自致此人臣之至戒也牛李論僧孺外托鎮靜而於持危濟變處非其所能德裕內持果敢而藏器待時處亦其所暗要之均不知大臣之道者唐自憲宗以來士大夫黨附牛李好惡不本於義而從人以喜愠雖一時公卿將相未有傑然自立者也牛黨出於僧孺李黨出於德裕二人雖黨人之首然其實則當世之偉人也蓋僧孺以德量髙而德裕以才氣勝德與才不同雖古人鮮能兼之者使二人各任其所長而不為黨則唐末之賢相也僧孺相文宗幽州楊志誠逐其將李載義帝召問計䇿僧孺曰是不足為朝廷憂也范陽自安史後不復係國家休戚前日劉聰納土朝廷麋費且百萬終不能得斗粟尺布以實天府俄復失之今志誠猶向載義也第付以節使捍奚契丹彼且自力不足以逆順治也帝曰吾初不計此公言是也因遣使慰撫之及武宗世陳行泰殺史元忠張綘復殺行泰以求帥德裕以為河朔命帥失在太速使姦臣得計遷延久之擢用張仲武而絳自斃僧孺以無事為安而德裕以制勝為德此固二人之所以異較之德裕則優矣德裕節度劒南西川吐蕃將悉怛謀以維州降維州西南要地也是時方與吐蕃和親僧孺不可曰吐蕃綿地萬里失一維州不害其强方今議和好而自違之中國禦戎守信為上應變次之彼若來責失信贊普牧馬蔚茄川東襲汧隴不三日至咸陽雖得百維州何益帝從之使德裕反降者吐蕃族誅之德裕深以為恨雖議者亦不直僧孺然吐蕃自是不為邊患幾終唐世則僧孺之言非為私也帝力用李訓鄭注欲求竒功一日延英謂宰相公等亦有意於太平乎何道致之僧孺曰臣待罪宰相不能康濟天下然太平亦無象今四夷不內侵百姓安生業私室無强家上不壅蔽下不怨讟雖未及全盛亦足為治矣更求太平非臣所及也退謂諸宰相上責成如此吾可久處此邪既罷未久李訓為甘露之事幾至亡國帝初欲以訓為諌官德裕固爭言訓小人咎惡巳著決不可用德裕亦以此罷去二人所趣不同及其臨訓注事所守若出於一人吾以是知其皆偉人也然德裕代僧孺於淮南訴其乾沒府錢四十萬緡質之非實及在朱崖作窮愁志論周秦行紀言僧孺有僭逆意悻然小丈夫之心老而不衰也始僧孺南遷於循老而獲歸二子蔚藂後皆為名卿德裕沒於朱崖子孫無聞後世深悲其窮豈德不足而才有餘固天之所不豫邪陸贄論贄之事德宗本末甚詳昔吾先君博觀古今議論而以陸贄為賢吾幼而讀其書其賢比漢賈誼而詳練過之贄始以從官事唐德宗老而為宰相從之出奔而與之反國彌縫其闕而濟其危亡比其老也功業定矣而卒斃於裴延齡之手其故何也孔子曰南人有言曰人而無恆不可以作巫醫善夫不常其德或承之羞贄以有常之德而事德宗之無常以巫醫之明而治無常之疾是以承其羞耳帝即位之初好名而貪功河朔三叛父子相襲三十年矣帝將以天下之力勝之田悅驚疑而起朱滔王武俊和之帝使馬燧李抱真李芃三將往迎其鋒勝負之勢未决也帝急於成功復使李晟出禁衛之兵李懷光舉朔方之衆五將萃於魏郊而淮西李希烈乘間而起兵連禍結常賦所不能贍於是為之抽貫算間假貸商賈空內以事外關中已亂而帝不知也贄曰今兩河淮西為禍亂之首者獨四五凶人而已臣料其間必有旁遭詿誤內畜危疑而計不能止者未必能處心積慮果於僭逆也而况脅從之黨乎陛下若能招懷以禮悔禍以誠使來者必安安者必久人知獲免則誰願復為惡者縱有野心難馴臣知從化者必過半矣帝猶意西師可以必克忽其言不用未幾而涇原叛卒之變起倉皇避冦半年而歸帝亦老而厭兵矣於是行一切之政專以姑息涵養藩鎮凡節度使死將佐之得士心者皆就命留後雖以篡奪請命者亦如之宣武劉士寧以暴慢失衆其將李萬榮因其出畋閉門逐之帝將命以其位贄曰如士寧之惡萬榮棄而違之可也討而逐之可也惟伺隙而篡取其位則不可何者方鎮之臣事多專制欲加之罪誰無辭者若使傾奪之徒輒得其處則四方諸將無復安者矣且萬榮搆亂之口諸郡守將固非其同謀也一城士衆亦未必皆其黨也方成敗逆順之勢交戰於中其肯捐軀與之同惡乎今若選命賢將降詔軍中奬萬榮撫定之功别加寵任褒將士輯睦之義例賜恩賞使衆知保安則誰肯復助其亂萬榮縱欲跋扈勢亦無所至矣帝方茍安無事竟亦不許由此觀之帝常持無常之心故前勇而後怯贄常持有常之心故勇怯各得其當然其君臣之間異同至此雖欲上下相保不可得矣㑹昌中盧龍諸將連害帥臣最後張絳殺陳行泰宰相李德裕以為河朔請帥皆報下太速故軍得以安若稍緩之必且有變既而回鶻烏介可汗擾天德塞軍使張仲武請以本軍擊之德裕問知仲武可用言之武宗舉以為帥張絳既為其下所殺而仲武遂以功名終德裕之謀則贄之故智也然帝之出也以陳京趙贊而贄之逐也以程异裴延齡其禍皆出於聚斂之臣贄之賢非不知也帝歸自興元贄因事言曰齊桓公自莒入齊伯業既成而管仲以不忘在莒為戒衛獻公自齊還衛諸大夫逆諸境者執其手而與之言逆於門者頷之而巳戒心之易忘而驕心之易生齊衛之君陛下之蓍龜也贄言雖切而帝終不改吾以為使贄反國而為鴟夷子皮浮舟而去則其君臣之間超然無後患然後可以言智也哉郭崇韜論所言亦有見國無釁而後可以伐人冒釁以伐人敵無釁則已受其災敵有釁則我與敵皆斃楚靈王殘民以逞舉思亂之民以伐吳吳不可動而棄疾攻之若升虛邑靈王遂死於外齊湣王貪而好勝知桀宋之可攻而忘齊國之既病燕師乘之遂以失國自古冒釁以攻人其禍如此矣唐莊宗勇而善戰與梁人夾河相攻十戰九勝涉河取鄆不十日而克梁威震諸國五代用兵未有神速若此者也然其克敵之後幸一日之安沉湎聲色之虞宦官伶人交亂其政府庫之積罄於耳目之奉民怨兵怒國有土崩之勢而不知也一時功臣皆武夫倔起未有識安危之幾者惟樞密使郭崇韜智勇兼人知其不可力言而不見聽求去而不見許中外佞幸視之仄目崇韜深病之矣時方欲伐蜀崇韜欲立大功為自安之計議以魏王繼岌為元帥而已為之副將兵六萬以出兵不逾時而克成都降王衍料敵制勝之功可謂盛矣然崇韜知蜀之易與而不知唐之已亂挈其良將徑兵西行數千里雖立大功而不免讒死于蜀征蜀之兵未還而趙在禮為亂河朔明宗北征遂與在禮皆反帥兵南向克汴入洛遂無一人能禦之者向使西師不出蜀雖未下而京師有重兵崇韜不死河朔叛臣心有所畏不敢妄動則莊宗不亡崇韜不死禍福未可知也嗟乎崇韜冒釁以伐人蹈齊湣之禍而以為安惜其有智而未始學也唐宋八大家文鈔卷一百五十四
