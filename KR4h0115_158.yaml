body:
  text: 潁濱本傳蘇轍字子由年十九與兄軾同登進士科又同䇿制舉仁宗春秋髙轍慮倦勤因極言得失而於禁庭之事尤切考臣胡宿以為不遜請黜之仁宗曰以直言召人而以直言去之天下其謂我何宰相不得已置之下等授商州軍事推官徙大名神宗立之二年轍適除喪上書言事得召對時王安石與陳升之領三司條例命轍為之屬吕惠卿附安石轍與論多相牾安石出青苖書使轍熟議轍曰錢入民手雖良民不免妄用及其納錢雖富民不免踰限如此則恐鞭箠必用州縣之事不勝煩矣唐劉晏掌國計未嘗有所假貸有賤必糴有貴必糶以是四方無甚貴甚賤之病此常平舊法公誠舉而行之晏之功可立俟也安石曰當徐思之既逾月河北轉運判官王廣兼奏乞度僧牒於陜西漕司私行青苗法與安石意合於是青苗法遂行轍以書抵安石力陳不可觸其怒徙他職後坐兄軾以詩得罪謫監筠州鹽酒稅五年不得調移知績溪縣哲宗即位召入元祐元年為右司諫蔡確韓縝章惇轍皆論去之而吕惠卿亦被論從竄典司馬光欲復差役轍言行之徐緩乃得審詳光又欲改安石新義試士格轍言進士來年秋試日月無幾徐議元祐五年以後格式未晚光皆不能從初神宗以夏國內亂用兵攻討乃於熙河增蘭州於延安增安疆米脂等五寨二年夏遣使相繼來朝廷知其有請蘭州五寨意大臣議棄守未決轍言一失此機必為後悔於是朝廷許之夏人遂服遷起居郎中書舍人朝廷議回河故道轍為公著言河決而北自先帝不能回今乃欲取而回之是謂智勇勢力過先帝也進戶部侍郎轍因轉對言曰財賦之原出於四方而委於中都善為國者藏之於民其次藏之州郡熙寧以來言利之臣不知本未內帑别藏雖積如丘山而委為朽壤無益於算也尋又言數十年以來利權分而用度無藝願罷外水監丞舉北河事及諸路都作院河皆歸轉運司至於都水軍器將作三監皆兼𨽻户部從之惟都水仍舊朝議以元豐吏額冗濫命轍量事裁減轍曰此羣吏身計所係乃具以白宰執請據實立額缺者勿補不過十年羡額當盡矣代軾為翰林學士尋權吏部尚書使契丹還為御史中丞時元豐舊黨多起邪說以搖撼在位吕太防劉摯患之欲稍引用以平夙怨謂之調停宣仁后疑不決轍面斥其非復上疏云云宣仁后命宰執讀於簾前曰轍疑吾君臣兼用邪正其言極中理諸臣從而和之調停之說遂已轍又奏言大臣宜正已平心無生事要功因弊修法以安民靖國六年拜尚書右丞進門下侍郎初夏人相繼求和朝廷許約地界久之不決夏人乃於疆事多方侵求熙河將佐范育种誼等遂背約西邊騷然轍乞罷育誼别擇老將宣仁后以為然大臣竟主育誼不從轍又面奏云云㑹熙河奏夏人十萬騎壓境殺人三日而退乞因其退急移近裏堡寨於界乘利而往不須復守誠信下大臣議轍與吕大防劉摯極辦用兵曲直復上奏曰此非西人之罪皆朝廷不直之故臣欲詰責帥臣生事耳後屢因邊兵深入夏地宣仁后遂從轍議時三省除李清臣吏部尚書給事中范祖禹封還詔書三省復除蒲宗孟兵部尚書轍奏前除清臣給諫紛然爭之未定今又用宗孟此與去年用鄧溫伯無異恐朝廷自是不安靜矣議遂止紹聖初哲宗起李清臣為中書舍人鄧潤甫為尚書左丞二人久在外不得志稍復言熙豐事以激怒哲宗㑹廷試進士清臣撰䇿題即為邪說轍諫謂事有失當何世無之父作之於前子救之於後前後相濟聖人之孝也且及漢昭變武帝法度事哲宗以為引漢武方先朝不恱落職知汝州再責知袁州未至降秩試少府監分司南京筠州居住三年又責化州别駕雷州安置移循州徽宗即位徙永州嶽州巳而復太中大夫奉祠蔡京當國又降秩罷祠居許州再復太中大夫致仕築室于許號潁濱遺老自作傳萬餘言不復與人相見終日默坐如是者幾十年卒年七十四追復端明殿學士淳熙中諡文定轍性沉靜簡潔為文汪洋淡泊似其為人髙處殆與軾軋其使契丹也館客能誦其茯苓賦及洵軾文云所著詩傳春秋傳古史老子解居許時乃成編又有欒城文集並行于世既入黨籍詔毁三蘇文三子遲適遜族孫元老
