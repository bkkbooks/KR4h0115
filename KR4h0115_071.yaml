body:
  text: 唐宋八大家文鈔卷六十七明茅坤撰廬陵史鈔七唐臣傳烏震傳烏震冀州信都人也少事趙王王鎔為軍卒以功遷禆校𨽻符習軍習從莊宗于河上而鎔為張文禮所弒震從習討文禮而家在趙文禮執震母妻及子十餘人以招震震不顧文禮乃皆斷其手鼻割而不殊縱至習軍軍中皆不忍正視震一慟而止憤激自勵身先士卒晉軍破鎮州震以功拜刺史歷深趙二州震為人純質少好學通左氏春秋喜作詩善書及為刺史以廉平為政有聲遷冀州刺史兼北面水陸轉運使明宗聞其名擢拜河北道副招討使領寧國軍節度使代房知溫戍于盧臺軍始至而戍兵龍晊等作亂見殺贈太師嗚呼忠孝以義則兩得吾既已言之矣若烏震者可謂忠乎甚矣震之不思也夫食人之祿而任人之事事有任専其責而其國之利害由已之為不為為之雖利於國而有害於其親者猶將辭其祿而去之矧其事衆人所皆可為而不在専已又其為與不為國之利害不繫焉者如是而不顧其親雖不以為利猶曰不孝况因而利之乎夫能事其親以孝然後能事其君以忠若烏震者可謂大不孝矣尚何有于忠哉張延朗傳張延朗汴州開封人也事梁以租庸使為鄆州糧料使明宗克鄆州得延朗復以為糧料使後徙鎮宣武成德以為元從孔目官明宗即位為莊宅使宣徽北院使忠武軍節度使長興元年拜三司使唐制户部度支以本司郎中侍郎判其事而有鹽鐵轉運使其後用兵以國計為重遂以宰相領其職乾符以後天下喪亂國用愈空始置租庸使用兵無常隨時調斂兵罷則止梁興始置租庸使領天下錢穀廢度支户部鹽鐵之官莊宗滅梁因而不改明宗入立誅租庸使孔謙而廢其使職以大臣一人判户部度支鹽鐵號曰判三司延朗因請置三司使事下中書中書用唐故事拜延朗特進工部尚書充諸道鹽鐵轉運等使兼判户部度支事詔以延朗充三司使班在宣徽使下三司置使自此始延朗號為有心計以三司為己任而天下錢穀亦無所建明明宗常出遊幸召延朗共食延朗不至附使者報曰三司事忙無暇聞者笑之歷泰寧雄武軍節度使廢帝以為吏部尚書兼中書門下平章事判三司晉髙祖有異志三司財貨在太原者延朗悉調取之髙祖深以為恨晉兵起廢帝欲親征而心畏髙祖遲疑不決延朗與劉延朗等勸帝必行延朗籍諸道民為丁及括其馬丁馬未至晉兵入京師髙祖得延朗殺之李嚴傳李嚴幽州人也初名讓坤事劉守光為刺史後事莊宗為客省使嚴為人明敏多藝能習騎射頗知書而辨同光三年使于蜀為王衍陳唐興復功德之盛音辭清亮蜀人聽之皆悚動衍樞密使宋光嗣召嚴置酒從容問中國事嚴對曰前年天子建大號于鄴宮自鄆趨汴定天下不旬日而梁之降兵猶三十萬東漸于海西極甘涼北懾幽陵南踰閩嶺四方萬里莫不臣妾而淮南楊氏承纍世之彊鳯翔李公恃先朝之舊皆遣子入侍稽首稱藩至于荆湖吳越修貢賦效珍竒願自北于列郡者至無虛月天子方懷之以德而震之以威天下之勢不得不一也光嗣曰荆湖吳越非豫所知若鳯翔則蜀之姻親也其人反覆其可信乎又聞契丹日益彊盛大國其可無慮乎嚴曰契丹之彊孰與僞梁光嗣曰比梁差劣耳嚴曰唐滅梁如拉朽况其不及乎唐兵布天下發一鎮之衆可以滅冦使無類然而天生四夷不在九州之內自前古王者皆存而不論蓋不欲窮兵黷武也蜀人聞嚴應對愈益竒之是時蜀之君臣皆庸暗而恃險自安窮極奢僭嚴自蜀還具言可取之狀初莊宗遣嚴以名馬入蜀市珍竒以充後宮而蜀法嚴禁以竒貨出劍門其非竒物而出者名曰入草物由是嚴無所得而還惟得金二百兩地衣毛布之類莊宗聞之大怒曰物歸中國謂之入草物王衍其能免為入草人乎於是決議伐蜀冬魏王繼岌西伐以嚴為三川招討使與康延孝以兵五千先行所過州縣皆迎降延孝至漢州王衍告曰得李嚴來即降衆皆謂伐蜀之謀自嚴始而衍怨嚴深不宜往嚴聞之喜即馳騎入益州衍見嚴以妻母為託即日以蜀降嚴還明宗以為泗州防禦使客省使如故其後孟知祥倔彊於蜀安重誨稍裁抑之思有以制知祥者嚴乃求為西川兵馬都監將行其母曰汝前啓破蜀之謀今行其以死報蜀人矣嚴不聽初嚴與知祥同事莊宗時知祥為中門使嚴嘗有過莊宗怒甚命斬之知祥戒行刑者少緩入白莊宗曰嚴小過不宜以喜怒殺人恐失士大夫心莊宗怒稍解命知祥監笞嚴二十而釋之知祥雖與嚴有舊恩而惡其來蜀人聞嚴來亦皆惡之嚴至知祥置酒從容問嚴曰朝廷以公來邪公意自欲來邪嚴曰君命也知祥發怒曰天下藩鎮皆無監軍安得爾獨來此此乃孺子熒惑朝廷爾即擒斬之明宗不能詰也知祥由此遂反劉延朗傳劉延朗等五人擁廢帝為亂已而遂及與廢帝俱亡中所托張濛事神一節尤為昏騃歐公序次其事明爽可為鑒戒豫故録而出之劉延朗宋州虞城人也初廢帝起於鳯翔與共事者五人節度判官韓昭𦙍掌書記李専美牙將宋審䖍客將房皓而延朗為孔目官初愍帝即位徙廢帝為北京留守不降制書遣供奉官趙處願促帝上道帝疑惑召昭𦙍等計議昭𦙍等皆勸帝反由是事無大小皆此五人謀之而皓又喜鬼神巫祝之說有瞽者張濛自言事太白山神神魏崔浩也其言吉凶無不中皓素信之嘗引濛見帝聞其語聲驚曰此非人臣也皓使濛問於神神傳語曰三珠併一珠驢馬沒人驅嵗月甲庚午中興戊已土皓不曉其義使問濛濛曰神言如此我能傳之不能解也帝即以濛為館驛巡官帝將反而兵少又乏食由此甚懼使皓問濛濛傳神語曰王當有天下可無憂於是決反使専美作檄書言朱宏昭馮贇幸明宗病殺秦王而立愍帝帝年少小人用事離間骨肉將問罪於朝遣使者馳告諸鎮皆不應獨隴州防禦使相里金遣其判官薛文遇計事帝得文遇大喜而延朗調率城中民財以給軍王思同率諸鎮兵圍鳯翔廢帝懼又遣皓問神神曰王兵少東兵來所以迎王也巳而東兵果叛降于帝帝入京師即位之日受冊明宗柩前冊曰維應順元年嵗次甲午四月庚午朔帝回顧皓曰張濛神言豈不驗哉由是皓益見親宿而専以巫祝用事帝既立以昭𦙍為左諫議大夫端明殿學士専美為比部郎中樞密院直學士審䖍為皇城使皓為宣徽北院使延朗為莊宅使久之以昭𦙍皓為樞密使延朗為副使審䖍為侍衛步軍都指揮使而薛文遇亦為職方郎中樞密院直學士由是審䖍將兵専美文遇主謀議而昭𦙍皓及延朗掌機密初帝與晉髙祖俱事明宗而心不相悅帝既入立髙祖不得已來朝而心頗自疑欲求歸鎮且難言之乃陽為羸疾灸灼滿身冀帝憐而遣之延朗等多言敬塘可留京師昭𦙍専美曰敬塘與趙延夀皆尚唐公主不可獨留乃復授髙祖河東而遣之是時契丹數寇北邉以髙祖為大同振武威塞彰國等軍蕃漢馬步軍都總管屯于欣州而屯兵忽變擁髙祖呼萬嵗髙祖懼斬三十餘人而後止於是帝益疑之是時髙祖悉握精兵在北饋運芻糧逺近勞弊帝與延朗等日夕謀議而専美文遇迭宿中興殿廬召見訪問常至夜分而罷是時髙祖弟重𦙍為皇城副使而石氏公主母曹太后居中因得伺帝動靜言語以報髙祖髙祖益自危懼每帝遣使者勞軍即陽為羸疾不自堪因數求解總管以探帝心是時帝母魏氏追封宣憲皇太后而墓在太原有司議立寢宮髙祖建言陵與民家墓相雜不可立宮帝疑髙祖欲毁民墓為國取怨帝由此發怒罷髙祖總管徙鎮鄆州延朗等多言不可而司天趙延義亦言天象失度宜安靜以弭災其事遂止後月餘文遇獨直帝夜召之語罷敬塘事文遇曰臣聞作舍道邉三年不成國家之事斷在陛下且敬塘徙亦反不徙亦反遲速爾不如先事圖之帝大喜曰術者言朕今年當得一賢佐以定天下卿其是邪乃令文遇手書除目夜半下學士院草制明日宣制文武兩班皆失色居五六日敬塘以反聞敬塘上書言帝非明宗子而許王從益次當立帝得書大怒手壞而投之召學士馬𦙍孫為答詔曰宜以惡語詆之延朗等請帝親征帝心憂懼常惡言敬塘事每戒人曰爾無說石郎令我心膽墮地由此不欲行而延朗等屢迫之乃行至懷州帝夜召李嵩問以計䇿文遇不知而繼至帝見之色變嵩躡其足文遇乃出帝曰我見文遇肉顫遽欲抽刀刺之嵩曰文遇小人致誤大事刺之益醜乃已是時契丹已立敬塘為天子以兵而南帝惶惑不知所之遣審䖍將千騎至白司馬坡踏戰地審䖍曰何地不堪戰雖有其地何人肯立于此不如還也帝遂還自焚髙祖入京師延朗等六人皆除名為民初延朗與皓並掌機密延朗専任事諸將當得州者不以功次為先後納賂多者得善州少及無賂者得惡州或久而不得由是人人皆怨皓心惡之而不能爭也但日飽食髙枕而已每延朗議事則垂頭陽睡不省及晉兵入延朗以一騎走南山過其家指而嘆曰吾積錢三十萬于此不知何人取之遂為追兵所殺晉髙祖聞皓常不與延朗事哀之後復以為將嵗餘卒専美事晉為大理卿開運中卒當晉之將起廢帝以昭𦙍為中書侍郎同中書門下平章事出為河陽節度使與審䖍文遇皆不知所終嗚呼禍福成敗之理可不戒哉張濛神言驗矣然焉知其不為禍也豫之所記大抵如此覽者可以深思焉廢帝之起所與圖議者此五六人而巳考其逆順之理雖有智者為之謀未必能不敗况如此五六人者哉故并述以附延朗見其終始之際云康義誠傳康義誠字信臣代北三部落人也以騎射事晉王莊宗時為突騎指揮使從明宗討趙在禮至魏而軍變義誠前陳莊宗過失勸明宗南嚮明宗即位遷捧聖指揮使領汾州刺史從破朱守殷遷侍衛親軍馬步軍都指揮使領河陽三城節度使出為山南東道節度使復為親軍都指揮使領河陽加同中書門下平章事秦王從榮素驕自為河南尹典六軍拜大元帥唐諸大臣皆懼禍及思自脫獨義誠心結之遣其子事秦王府明宗病從榮謀以兵入宮唐大臣朱宏昭馮贇等皆以為不可而義誠獨持兩端從榮已舉兵至天津橋宏昭等入以反白明宗涕泣召義誠使自處置而義誠卒不出兵馬軍指揮使朱宏實以兵擊從榮從榮敗走見殺三司使孫嶽嘗為馮贇言從榮必敗之狀義誠聞而不悅及從榮死義誠始引兵入河南府召嶽檢閲從榮家資嶽至義誠乘亂使人射之嶽走至通利坊見殺明宗不能詰義誠已殺嶽又以從榮故與宏實有隙愍帝即位宏實常以誅從榮功自負義誠心益不平潞王從珂反鳯翔王思同率諸鎮兵圍之興元張䖍釗兵叛降從珂思同走諸鎮兵皆潰愍帝大怒謂朱宏昭等曰朕新即位天下事皆出諸公然於事兄未有失節諸公以大計見迫不能獨違事一至此何方轉禍吾當率左右往迎吾兄遜以位苟不吾信死其所也宏昭等惶恐不能對義誠前曰西帥驚潰主將怯耳今京帥兵尚多臣請盡將以西扼關而守招集亡散以為後圖愍帝以為然幸左藏庫親給將士人絹二十匹錢五千是時明宗山陵未畢帑藏空虛軍士負物揚言曰到鳯翔更請一分朱宏實見軍士無鬬志而義誠盡將以西疑其有二心謂義誠曰今西帥小衄而無一騎東者人心可知不如以見兵守京師以自固彼雖幸勝特得䖍釗一軍耳諸鎮之兵在後其敢徑來邪義誠怒曰如此言宏實反矣宏實曰公謂誰欲反邪其聲厲而聞愍帝召兩人訊之兩人爭於前帝不能決遂斬宏實以義誠為招討使悉將禁軍以西愍帝奔衛州義誠行至新安降于從珂清泰元年四月斬于典教門外夷其族嗚呼五代為國興亡以兵而其軍制後世無足稱焉惟侍衛親軍之號今猶因之而甚重此五代之遺制也然原其始起微矣及其至也可謂盛哉當唐之末方鎮之兵多矣凡一軍有指揮使一人而合一州之諸軍又有馬步軍都指揮使一人蓋其卒伍之長也自梁以宣武軍建國因其舊制有在京馬步軍都指揮使後唐因之至明宗時始更為侍衛親軍馬步軍都指揮使當是時天子自有六軍諸衛之職六軍有統軍諸衛有將軍而又以大臣宗室一人判六軍諸衛事此朝廷大將天子國兵之舊制也而侍衛親軍者天子自將之私兵也推其名號可知矣天子自為將則都指揮使乃其卒伍之都長耳然自漢周以來其職益重漢有侍衛司獄凡朝廷大事皆決侍衛獄是時史宏肇為都指揮使與宰相樞密使並執國政而宏肇尤専任以至於亡語曰涓涓不絶流為江河熒熒不滅炎炎奈何可不戒哉然是時方鎮各自有兵天子親軍猶不過京師之兵而已今方鎮名存而實亡六軍諸衛又益以廢朝廷無大將之職而舉天下內外之兵皆屬侍衛司矣則為都指揮使者其權豈不益重哉親軍之號始於明宗其後又有殿前都指揮使亦親軍也皆不見其更置之始今天下之兵皆分屬此兩司矣唐宋八大家文鈔卷六十七
