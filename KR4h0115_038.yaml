body:
  text: 唐宋八大家文鈔巻三十五明茅坤撰廬陵文鈔七狀論修河第一狀此等奏疏利害最深切文字最圓暢西漢而下不多見者右臣竊見朝廷近因臣寮建議欲塞商胡開横壠回大河於故道已下三司候今秋興役見令京東計度物料次臣伏以國家興大役動大衆必先順天時量人力謀於其始而審然後必行計其所利者多乃能無悔伏見比年以來興役動衆勞民費財不精謀慮於厥初輕信利害之偏說舉事之始既已倉惶羣議一揺尋復悔罷臣不敢逺引他事上煩聖聰只如往年河決商胡是時執政之臣不慎計慮遽謀修塞科配一千八百萬稍芟騷動六路一百有餘州官吏催驅急若星火民庶愁苦盈於道塗或物已輸官或人方在路未及興役遽已罷修虚費民財為國斂怨舉事輕脫為害若斯雖既往之失難追而可鑒之蹤未逺今者又聞復有修河之役聚三十萬人之衆開一千餘里之長河計其所用物力數倍往年當此天災嵗旱之時民困國貧之際不量人力不順天時臣知其有大不可者五蓋自去秋以及今春半天下苦旱而京東尤甚河北次之國家常務安静賑䘏之猶恐饑民起而為盗何况於此兩路聚大衆興大役此其必不可者一也河北自恩州用兵之後繼以凶年人户流亡十失八九數年以來稍稍歸復然死亡之餘所存無幾瘡痍未斂物力未完今又遭此旱嵗京東自去冬無雨雪麥不生苗以及暮春粟未布種不惟目下乏食兼亦向去無望而欲於此兩路興三十萬人之役若别路差夫則逺處難為赴役就河便近則此兩路力所不任此其必不可者二也臣伏見往年河決滑州曾議修塞當時公私事力未如今日貧虚然猶收聚物料誘率民財數年之間方能興役況今國用方乏民力方疲且合商胡塞大決之洪流此自是一大役也鑿横壠開久廢之故道此又一大役也自横壠至海一千餘里埽岸久已廢壊頓須修緝此又一大役也往年公私有力之時興一大役尚須數年今併三大役倉卒興為於災旱貧虚之際此其必不可者三也就令商胡可塞故道可回猶宜重察天時人力之難為何況商胡未必可塞故道未必可回者哉臣聞鯀障洪水九年無功禹得洪範五行之書知水趨下之性乃因水之流疏決就下而水患乃息然則以大禹之神功不能障塞其流但能因而疏決爾今欲逆水之性障而塞之奪洪河之正流斡以人力而回注此大禹之所不能此其必不可者四也横壠湮塞已二十年商胡決流又亦數嵗故道已塞而難鑿安流已久而難回昨聞朝廷曾遣故樞宻直學士張奎計度功料極大近者再行檢計減得功料全少功料少則所開淺狹淺狹則水勢難回此其必不可者五也臣伏見國家累嵗災譴甚多其於京東變異尤大地貴安静動而有聲巨嵎山摧海水揺蕩如此不止僅乎十年天地警戒必不虚發臣謂變異所起之方尤宜加意防懼今乃欲於凶旱之年聚三十萬之大衆於變異最大之方臣恐地動山揺災禍自此而始方今京東赤地千里饑饉之民正苦天災又聞河役將動往往伐桑拆屋無復生計流亡盗賊之患不可不虞欲望聖慈特降徳音速罷其事當此凶嵗務安人心徐詔有司審詳利害縱令河道可復乞候豐年餘力漸次興為臣實庸愚本無逺見得於外論不敢不言謹具狀奏聞論修河第二狀指言利害明切臣伏見學士院集兩省臺諫官議修河事未有一定之論蓋由賈昌朝欲復故道李仲昌請開六塔互執一說莫知孰是以臣愚見皆謂不然言故道者未詳利害之原述六塔者近乎欺罔之繆何以言之今謂故道可復者但見河北水患而欲還之京東然不思天禧以來河水屢決之因所以未知故道有不可復之勢此臣故謂未詳利害之原也若言六塔之利者則不攻而自破矣且開六塔既云減得大河水勢然今恩冀之患何縁尚告危急此則減水之利虚妄可知開六塔者又云可以全回大河使復横壠故道見今六塔只是分減之水下流無歸已為濵棣徳博之患若全回大河以入六塔則其害如何此臣故謂近乎欺罔之繆也臣聞河本泥沙無不淤之理淤澱之勢常先下流下流淤髙水行不快乃自上流低下處決此其常勢也然避髙就下水之本性故河流已棄之道自是難復臣不敢逺引書史廣述河源只以今所欲復之故道言天禧以來屢決之因初天禧中河出京東水行於今所謂故道者水既淤澁乃於滑州天臺埽決尋而修塞水復故道未幾又於滑州南鐵狗廟決今所謂龍門埽者也其後數年又議修塞水令復故道已而又於王楚埽決所決差小與故道分流然而故道之水終以壅淤故又於横壠大決是則決河非不能力塞故道非不能力復不久終必決於上流者由故道淤髙水不能行故也及横壠既決水流就下所以十餘年間河未為患至慶厯三四年横壠之水又自下流先淤是時臣為河北轉運使海口已淤一百四十餘里其後遊金赤三河相次又淤下流既梗乃又於上流商胡口決然則京東横壠兩河故道皆是下流淤塞河水巳棄之髙地京東故道屢復屢決理不可復其驗甚明則六塔所開故道之不可復不待言而易知臣聞議者計度京東故道功料止云銅城已上地高不知大抵東去皆髙而銅城已上乃特髙耳其東比銅城已上則似低比商胡已上則實髙也若云銅城已東地勢斗下則當日水流宜決銅城已上何縁而頓淤横壠之口亦何縁而大決也然則兩河故道既皆不可為則河北水患何為而可去臣聞智者之於事有不能必則較其利害之輕重擇其害少者而為之猶勝害多而利少何况有害而無利此三者可較而擇也臣見往年商胡初決之時議欲修塞計用一千八百萬稍芟科配六路一百有餘州軍今欲塞者乃往年之商胡必須用往年之物數至於開鑿故道張奎元計功料極大後來李參等減得全少猶用三十萬人然欲以五十步之狹容大河之水此可笑也又欲增一夫所開三尺之方倍為六尺且濶厚三尺而長六尺已是一倍之功在於人力已為勞苦若云六尺之方以開方法筭之乃八倍之功此豈人力之所勝是則前功浩大而難興後功雖小而不實大抵塞商胡開故道凡二大役皆困國而勞人所舉如此而欲開難復屢决己驗之故道使其虚費而商胡不可塞故道不可復此所謂有害而無利者也就使幸而暫塞暫復以紓目前之患而終於上流必決如龍門横壠之比重以困國勞人此所謂利少而害多也若六塔者於大河有減水之名而無減水之實今下流所散為患已多若全回大河以注之則濵棣徳博河北所仰之州不勝其患而又故道淤澁上流必有他洪之虞此直有害而無利耳是智者之不為也今若因水所注增治隄防疏其不流浚以入海則可無決溢散漫之虞今河所厯數州之地誠為患矣隄防嵗用之夫誠為勞矣與其虚費天下之財虚舉大衆之役而不能成功終不免為數州之患勞嵗用之夫則此所謂害少者乃智者之所擇也大抵今河之勢負三決之虞復故道上流必決開六塔上流亦洪今河下流若不浚使入海則上流亦決臣請選知水利之臣就其下流求其入海之路而浚之不然下流梗澁則終虞上決為患無涯臣非知水者但以今事目可驗者而較之耳言狂計愚不足以備聖君博訪之求此大事也伏乞下臣之議廣謀於衆而裁擇之謹具狀奏聞伏候勑㫖論修河第三狀較前二狀更勝亦與前二狀相發明右臣伏見朝廷定議開修六塔河口回水入横壠故道此大事也中外之臣皆知不便而未有肯為國家極言其利害者何哉蓋其說有三一曰畏大臣二曰畏小人三曰無竒策今執政之臣用心於河事亦勞矣初欲試十萬人之役以開故道既又捨故道而修六塔未及興役遽又罷之已而終為言利者所勝今又復修然則其勢難於復止也夫以執政大臣銳意主其事而又有不可復止之勢固非一人口舌可回此所以雖知不便而罕肯言也李仲昌小人利口偽言衆所共惡今執政之臣既用其議必主其人且自古未有無患之河今河浸恩冀目下之患雖小然其患已形回入六塔將來之害必大而其害未至夫以利口小人為大臣所主欲與之爭未形之害勢必難奪就使能奪其議則言者猶須獨任恩冀為患之責使仲昌得以為辭大臣得以歸罪此所以雖知不便而罕敢言也今執政之臣用心太過不思自古無不患之河直欲使河不為患若得河不為患雖竭人力猶當為之况聞仲昌利口詭辯謂費物少而用功不多不得不信為竒策於是決意用之今言者為故道既不可復六塔又不可修詰其如何則又無竒策以取勝此所以雖知不便而罕肯言也衆人所不敢言而臣今獨敢言者臣謂大臣非有私仲昌之心也直欲興利除害爾若果知其為患愈大則豈有不回者哉至於顧小人之後患則非臣之所慮也且事欲知利害權重輕有不得已則擇其害少而患輕者為之此非明智之士不能也况治水本無竒策相地勢謹隄防順水性之所趨爾雖大禹不過此也夫所謂竒策者不大利則大害若循常之計雖無大利亦不至大害此明智之士善擇利者之所為也今言修六塔者竒策也然終不可成而為害愈大言順水治堤者常談也然無大利亦無大害不知為國計者欲何所擇哉若謂利害不可必但聚大衆興大役勞民困國以試竒策而僥倖於有成者臣謂雖執政之臣亦未必肯為也臣前已具言河利害甚詳而未䝉採聽今復畧陳其大要惟陛下詔計議之臣擇之臣謂河水未始不為患今順已決之流治隄防於恩冀者其患一而遲塞商胡復故道者其患二而速開六塔以回今河者其患三而為害無涯自河決横壠以來大名金堤埽嵗歲增治及商胡再決而金堤益大加功獨恩冀之間自商胡決後議者貪建塞河之策未嘗留意於隄防是以今河水勢浸溢今若專意併力於恩冀之間謹治隄防則河患可禦不至大害所謂其患一者十數年間今河下流淤塞則上流必有決處此一患而遲者也今欲塞商胡口使水歸故道治堤修埽功料浩大勞人費物困弊公私此一患也幸而商胡可塞故道復歸髙淤難行不過一二年間上流必決此二患而速者也今六塔河口雖云已有上下約然全塞大河正流為功不小又開六塔河道治二千餘里隄防移一縣兩鎮計其功費又大於塞商胡數倍其為困弊公私不可勝計此一患也幸而可塞水入六塔而東横流散溢濵棣徳博與齊州之界咸被其害此五州者素號富饒河北一路財用所仰今引水注之不惟五州之民破壊田産河北一路坐見貧虚此二患也三五年間五州凋弊河流注溢久又淤髙流行梗澁則上流必決此三患也所謂為害而無涯者也今為國誤計者本欲除一患而反就三患此臣所不諭也至如六塔不能容大河横壠故道本以髙淤難行而商胡決今復驅而注之必横流而散溢自澶至海二千餘里堤埽不可卒修修之雖成又不能捍水如此等事甚多士無愚智皆所共知不待臣言而後悉也臣前未奉使契丹時已嘗具言故道六塔皆不可為惟治堤順水為得計及奉使往來河北詢於知水者其說皆然雖恩冀之人今被水患者亦知六塔不便皆願且治恩冀隄防為是下情如此誰為上通臣既知其詳豈敢自黙伏乞聖慈特諭宰臣使更審利害速罷六塔之役差替李仲昌等不用選一二精幹之臣與河北轉運使副及恩冀州官吏相度隄防併力修治則今河之水必不至為大患且河水天災非人力可回惟當順導防捍之而已不必求竒策立難必之功以為小人僥兾恩賞之資也况功必不成後悔無及者乎臣言狂計愚惟陛下裁擇再論水災狀因水災議及用賢亦探本之論右臣伏覩近降手詔以水災為變上軫聖憂既一人形罪已之言宜百辟無遑安之意而應詔言事者猶少亦未聞有所施行豈言者不足採歟將遂無人言也豈有言不能用歟然則上有詔而下不言下有言而上不用皆空言也臣聞語曰應天以實不以文動民以行不以言臣近有實封應詔竊謂水入國門大臣犇走渰浸社稷破壞都城此天地之大變也恐非小有所為可以消弭因為陛下陳一二大計而言狂計愚不足以感動聽覽臣日夜思惟方今之弊紀綱之壞非一日政事之失非一端水災至大天譴至深亦非一事之所致災譴如此而禍患所應于後者又非一言而可測是則已住而當救之弊甚衆將來而可憂之患無涯亦非獨責二三大臣所能取濟況自古天下之治必與衆賢共之也詩曰濟濟多士文王以寧書載堯舜之朝一時同列者䕫龍稷契之徒二十餘人此特其大者爾其百工在位莫不皆賢也今欲救大弊弭大患如臣前所陳一二大計既未果為而又不思衆賢以濟庶務則天變何以塞人事何以修故臣復敢進用賢之說也臣材識愚暗不能知人然衆人所知者臣亦知之伏見龍圖閣直學士知池州包拯清節美行著自貧賤讜言正論聞於朝廷自列侍從良多補益方今天災人事非賢罔乂之時拯以小故棄之遐逺此議者之所惜也祠部員外郎直史館知襄州張瓌靜黙端直外柔内剛學問通達似不能言者至其見義必為可謂仁者之勇此朝廷之臣非州郡之才也祠部員外郎崇文院檢討吕公著故相夷簡之子清靜寡欲生長富貴而淡於榮利識慮深逺文學優長皆可過人而喜自晦黙此左右顧問之臣也太常博士羣牧判官王安石學問文章知名當世守道不茍自重其身論議通明兼有時才之用所謂無施不可者凡此四臣者難得之士也拯以小過弃之其三人者進退與衆人無異此皆為世所知者猶如此臣故知天下之廣賢材淪沒於無聞者不少也此四臣者名迹己著伏乞更廣詢採亟加進擢置之左右必有裨補凡臣所言者乃願陛下聽其言用其才以濟時艱爾非為其人私計也若量霑恩澤稍陞差遣之類適足以為其人累耳亦非臣薦賢報國之本心也臣伏見近年變異非止水災譴告丁寧無所不有董仲舒曰國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至斯言極矣伏惟陛下切詔大臣深圖治亂廣引賢俊與共謀議未有衆賢並進而天下不治者此亦救災弭患一端之大者臣又竊見京東京西皆有大水並當存䘏而獨河北遣使安撫兩路遂不差人或云就委轉運使此則但虚為行遣爾兩路運司只見河北遣使便認朝廷之意有所重輕以謂不遣使路分非朝廷憂恤之急者兼又放稅賑救皆耗運司錢物於彼不便兼又運使未必皆得人其才未必能救災䘏患又其一司自有常行職事亦豈能專意撫綏故臣以為虚作行遣爾伏乞各差一使於此兩路安撫雖未能大段有物賑濟至於興利除害臨時措置更易官吏詢求疾苦事既專一必有所得與就委運司其利百倍也又聞兩浙大旱赤地千里國家運米仰在東南今年災傷若不賑濟則來年不惟民饑國家之物亦自闕供此不可不留心也竊聞三司今嵗京師糧米已有二年備凖外猶有三百五十萬餘未漕之物今年東南既旱則來年少納上供此未漕之米誠不可不惜然少輟以濟急時亦未有所闕欲下三司勘會若實如臣所聞則乞量輟五七十萬石物與兩浙一路令及時賑救一十三州只作借貸他時米熟不妨還官然所利甚博也此非弭災之術亦救災之一端也臣愚狂妄伏望聖慈特賜裁擇唐宋八大家文鈔巻三十五
