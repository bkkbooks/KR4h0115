body:
  text: 唐宋八大家文鈔巻一百十一明茅坤撰老泉文鈔五史論序老泉史論三篇頗得史家之髓故竝存之三篇當合看史之難其人乆矣魏晉宋齊梁隋間觀其文則亦固當然也所可怪者唐三百年文章非三代兩漢無敵史之才宜有如丘明遷固輩而卒無一人可與范曄陳夀比肩巢子之書世稱其詳且博然多俚辭俳狀使之紀事將復甚乎其嘗所譏誚者唯子餗例為差愈吁其難而然哉夫知其難故思之深思之深故有得因作史論三篇史論上經史竝言是對客論主史何為而作乎其有憂也何憂乎憂小人也何由知之以其名知之楚之史曰檮杌檮杌四凶之一也君子不待褒而勸不待貶而懲然則史之所懲勸者獨小人耳仲尼之志大故其憂愈大憂愈大故其作愈大是以因史修經卒之論其效者必曰亂臣賊子懼由是知史與經皆憂小人而作其義一也其義一其體二故曰史焉曰經焉大凡文之用四事以實之辭以章之道以通之法以撿之此經史所兼而有之者也雖然經以道法勝史以事辭勝經不得史無以證其褒貶史不得經無以酌其輕重經非一代之實錄史非萬世之常法體不相沿而用實相資焉夫易禮樂詩書言聖人之道與法詳矣然弗驗之行事仲尼懼後世以是為聖人之私言故因赴告䇿書以修春秋旌善而懲惡此經之道也猶懼後世以為己之臆斷故本周禮以為凡此經之法也至於事則舉其畧辭則務於簡吾故曰經以道法勝史則不然事既曲詳辭亦夸耀所謂褒貶論賛之外無幾吾故曰史以事辭勝使後人不知史而觀經則所褒莫見其善狀所貶弗聞其惡實吾故曰經不得史無以證其褒貶使後人不通經而專史則稱讃不知所法懲勸不知所沮吾故曰史不得經無以酌其輕重經或從偽赴而書或隱諱而不書若此者衆皆適於敎而已吾故曰經非一代之實錄史之一紀一世家一傳其間美惡得失固不可以一二數則其論賛數十百言之中安能事為之貶褒使天下之人動有所法如春秋哉吾故曰史非萬世之常法夫規矩凖繩所以制器器所待而正者也然而不得器則規無所效其圓矩無所用其方凖無所施其平繩無所措其直史待經而正不得史則經晦吾故曰體不相沿而用實相資焉噫一規一矩一凖一繩足以制萬器後之人其務希遷固實錄可也愼無若王通陸長源輩囂囂然冗且僣則善矣史論中分段議論體古人讀史刻畫如此遷固史雖以事辭勝然亦兼道與法而有之故時得仲尼遺意焉吾今擇其書有不可以文曉而可以意達者四悉顯白之其一曰隱而彰其二曰直而寛其三曰簡而明其四曰微而切遷之傳亷頗也議捄閼與之失不載焉見之趙奢傳傳酈食其也謀撓楚權之謬不載焉見之留侯傳固之傳周勃也汗出洽背之恥不載焉見之王陵傳傳董仲舒也議和親之疏不載焉見之匈奴傳夫頗食其勃仲舒皆功十而過一者也苟列一以疵十後之庸人必曰智如亷頗辯如酈食其忠如周勃賢如董仲舒而十功不能贖一過則將苦其難而怠矣是故本傳晦之而他傳發之則其與善也不亦隱而彰乎遷論蘇秦稱其智過人不使獨䝉惡聲論北宮伯子多其愛人長者固賛張湯與其推賢揚善賛酷吏人有所褒不獨暴其惡夫秦伯子湯酷吏皆過十而功一者也茍舉十以廢一後之凶人必曰蘇秦北宮伯子張湯酷吏雖有善不錄矣吾復何望哉是窒其自新之路而堅其肆惡之志者也故於傳詳之於論於賛復明之則其懲惡也不亦直而寛乎遷表十二諸侯首魯訖吳實十三國而越不與焉夫以十二名篇而載國十三何也不數吳也皆諸侯耳獨不數吳何也用夷禮也不數而載之何也周裔而霸盟上國也春秋書哀七年公㑹吳于鄫書十二年公㑹吳于槖臯書十三年公㑹晉侯及吳子于黃池此其所以雖不數而猶獲載也若越區區於南夷豺狼狐貍之與居不與中國㑹盟以觀蕐風而用夷俗之名以赴故君子卽其自稱以罪之春秋書定五年於越入吳書十四年於越敗吳于㰎李書哀十三年於越入吳此春秋所以夷狄畜之也茍遷舉而措之諸侯之末則西戎獫狁亦或庻乎其間是以絶而棄之將使後之人君觀之曰不知中國禮樂雖勾踐之賢猶不免乎絶與棄則其賤夷也不亦簡而明乎固之表八而王侯六書其人也必曰某土某王若侯某或功臣外戚則加其姓而首目之曰號謚姓名此異姓列侯之例也諸侯王其目止號謚豈以其尊故不曰名之耶不曰名之而實名之豈以不名則不著耶此同姓諸侯王之例也王子侯其目爲二上則曰號謚名名之而曰名之殺一等矣此同姓列侯之例也及其下則曰號謚姓名夫以同姓列侯而加之異姓之例何哉察其故蓋元始之間王莽僞褒宗室而封之者也非天子親親而封之者也宗室天子不能封而使王莽封之故從異姓例亦示天子不能有其同姓也將使後之人君觀之曰權之歸於臣雖同姓不能有名器誠不可假人矣則其防僣也不亦微而切乎噫隱而彰則後人樂得為善之利直而寛則後人知有悔過之漸簡而明則人君知中國禮義之為貴微而切則人君知彊臣專制之為患用力寡而成功博其能為春秋繼而使後之史無及焉者以是夫史論下評隲諸家如酷吏斷獄或問予之論史釣抉仲尼遷固潜法隠義善矣仲尼則非吾所可評吾惟意遷固非聖人其能如仲尼無一可指之失乎曰遷喜雜說不顧道所可否固貴諛偽賤死義大者此旣陳議矣又欲寸量銖稱以摘其失則煩不可舉今姑告爾其尤大彰明者焉遷之辭淳健簡直足稱一家而乃裂取六經傳記雜於其間以破碎汩亂其體五帝三代紀多尚書之文齊魯晉楚宋衛陳鄭吳越世家多左傳國語之文孔子世家仲尼弟子傳多論語之文夫尚書左傳國語論語之文非不善也雜之則不善也今夫繡繪錦縠衣服之窮美者也尺寸而割之錯而紉之以爲服則綈繒之不若遷之書無乃類是乎其自序曰談為太史公又曰太史公遭李陵之禍是與父無異稱也先儒反謂固没彪之名不若遷讓美於談吾不知遷於紀於表於書於世家於列傳所謂太史公者果其父耶抑其身耶此遷之失也固賛漢自創業至麟趾之間襲蹈遷論以足其書者過半且褒賢貶不肖誠巳意也盡巳意而巳今又剽他人之言以足之彼旣言矣申言之何益及其傳遷楊雄皆取其自敘屑屑然曲記其世系固於他載豈若是之備哉彼遷雄自序可也已因之非也此固之失也或曰遷固之失旣爾遷固之後為史者多矣范曄陳壽實巨擘焉然亦有失乎曰烏免哉曄之史之傳若酷吏宦者列女獨行多失其人間尤甚者董宣以忠毅槩之酷吏鄭衆呂强以㢘明直諒槩之宦者蔡琰以忍恥妻胡槩之列女李善王忳以深仁厚義槩之獨行與夫前書張湯不載於酷吏史記姚杜仇趙之徒不載於游俠遠矣又其是非頗與聖人異論竇武何進則戒以宋襄之違天論西域則惜張騫班勇之遺佛書是欲將相茍免以爲順天乎中國叛聖人以奉戎神乎此曄之失也壽之志三國也紀魏而傳吳蜀夫三國鼎立稱帝魏之不能有吳蜀猶吳蜀之不能有魏也壽獨以帝當魏而以臣視吳蜀吳蜀於魏何有而然哉此壽之失也噫固譏遷失而固亦未為得曄譏固失而曄益甚至壽復爾史之才誠難矣後之史宜以是為監無徒譏之也諫上賢君不時有忠臣不時得故作諫論進諫千古絶調荆川謂此等文字摹荀卿良是古今論諫常與諷而少直其説蓋出於仲尼吾以為諷直一也顧用之之術何如耳伍舉進隱語楚王淫益甚茅焦解衣危論秦帝立悟諷固不可盡與直亦未易少之吾故曰顧用之之術何如耳然則仲尼之説非乎曰仲尼之説純乎經者也吾之説參乎權而歸乎經者也如得其術則人君有少不為桀紂者吾百諫而百聽矣況虚已者乎不得其術則人君有少不若堯舜者吾百諫而百不聽矣況逆忠者乎然則奚術而可曰機智勇辨如古游説之士而已夫游説之士以機智勇辨濟其詐吾欲諫者以機智勇辨濟其忠請備論其效周衰游説熾於列國自是世有其人吾獨怪夫諫而從者百一説而從者十九諫而死者皆是説而死者未嘗聞然而抵觸忌諱説或甚於諫由是知不必乎諷諫而必乎術也説之術可為諫法者五理諭之勢禁之利誘之激怒之隱諷之之謂也觸龍以趙后愛女賢於愛子未旋踵而長安君出質甘羅以杜郵之死詰張唐而相燕之行有日趙卒以兩賢王之意語燕而立歸武臣此理而諭之也子貢以内憂敎田常而齊不得伐魯武公以麋鹿脅頃襄而楚不敢圖周魯連以烹醢懼垣衍而魏不果帝秦此勢而禁之也田生以萬户侯啓張卿而劉澤封朱建以富貴餌閎孺而辟陽赦鄒陽以愛幸悦長君而梁王釋此利而誘之也蘇秦以牛後羞韓而惠王按劒太息范睢以無王恥秦而昭王長跪請敎酈生以助秦凌漢而沛公輟洗聽計此激而怒之也蘇代以土偶笑田文楚人以弓繳感襄王蒯通以娶婦悟齊相此隱而諷之也五者相傾險詖之論雖然施之忠臣足以成功何則理而諭之主雖昏必悟勢而禁之主雖驕必懼利而誘之主雖怠必奮激而怒之主雖懦必立隱而諷之主雖暴必容悟則明懼則恭奮則勤立則勇容則寛致君之道盡於此矣吾觀昔之臣言必從理必濟莫若唐魏鄭公其初實學縱橫之説此所謂得其術者歟噫龍逢比干不獲稱良臣無蘇秦張儀之術也蘇秦張儀不免為游説無龍逄比干之心也是以龍逄比干吾取其心不取其術蘇秦張儀吾取其術不取其心以為諫法諫下勸諫行文亦自痛快夫臣能諫不能使君必納諫非真能諌之臣君能納諫不能使臣必諫非真能納諫之君欲君必納乎嚮之論僃矣欲臣必諫乎吾其言之夫君之大天也其尊神也其威雷霆也人之不能抗天觸神忤雷霆亦明矣聖人知其然故立賞以勸之傳曰興王賞諫臣是也猶懼其選耎阿諛使一日不得聞其過故制刑以威之書曰臣下不匡其刑墨是也人之情非病風喪心未有避賞而就刑者何苦而不諫哉賞與刑不設則人之情又何苦而抗天觸神忤雷霆哉自非性忠義不悦賞不畏罪誰欲以言博死者人君又安能盡得性忠義者而任之今有三人焉一人勇一人勇怯半一人怯有與之臨乎淵谷者且告之曰能跳而越此謂之勇不然為怯彼勇者恥怯必跳而越焉其勇怯半者與怯者則不能也又告之曰跳而越者與千金不然則否彼勇怯半者奔利必跳而越焉其怯者猶未能也須臾顧見猛虎暴然向逼則怯者不待告跳而越之如康莊矣然則人豈有勇怯哉要在以勢驅之耳君之難犯猶淵谷之難越也所謂性忠義不悦賞不畏罪者勇者也故無不諫焉悦賞者勇怯半者也故賞而後諫焉畏罪者怯者也故刑而後諌焉先王知勇者不可常得故以賞為千金以刑為猛虎使其前有所趨後有所避其勢不得不極言規失此三代所以興也末世不然遷其賞於不諫遷其刑於諫宜乎臣之噤口卷舌而亂亡隨之也間或賢君欲聞其過亦不過賞之而已嗚呼不有猛虎彼怯者肯越淵谷乎此無他墨刑之廢耳三代之後如霍光誅昌邑不諫之臣者不亦鮮哉今之諫賞時或有之不諫之刑缺然無矣茍增其所有有其所無則諛者直佞者忠况忠直者乎誠如是欲聞讜言而不獲吾不信也明論此是老泉本色學問宋迂齋謂其意脉自戰國䇿來良是天下有大知有小知人之智慮有所及有所不及聖人以其大知而兼其小知之功賢人以其所及而濟其所不及愚者不知大知而以其所不及喪其所及故聖人之治天下也以常而賢人之治天下也以時既不能常又不能時悲夫殆哉夫惟大知而後可以常以其所及濟其所不及而後可以時常也者無治而不治者也時也者無亂而不治者也日月經乎中天大可以被四國而小或不能入一室之下彼固無用此區區小明也故天下視日月之光儼然其若君父之威故自有天地而有日月以至于今而未常可以一日無焉天下嘗有言曰叛父母䙝神明則雷霆下擊之雷霆固不能為天下盡擊此等輩也而天下之所以兢兢然不敢犯者有時而不測也使雷霆日轟轟焉遶天下以求夫叛父母䙝神明之人而擊之則其人未必能盡而雷霆之威無乃褻乎故夫知日月雷霆之分者可以用其明矣聖人之明吾不得而知也吾獨愛夫賢者之用其心約而成功博也吾獨怪夫愚者之用其心勞而功不成也是無他也專於其所及而及之則其及必精兼於其所不及而及之則其及必粗及之而精人將曰是惟無及及則精矣不然吾恐姦雄之竊笑也齊威王即位大亂三載威王一奮而諸侯震懼二十年是何修何營耶夫齊國之賢者非獨一即墨大夫明矣亂齊國者非獨一阿大夫與左右譽阿而毁即墨者幾人亦明矣一即墨大夫易知也一阿大夫易知也左右譽阿而毁即墨者幾人易知也從其易知而精之故用心甚約而成功博也天下之事譬如有物十焉吾舉其一而人不知吾之不知其九也歴數之至於九而不知其一不如舉一之不可測也而况乎不至於九也蘇子之明明之小者也伯者之所操切也聖人之明則以無心而虚虚故能照照則能普萬物而不蔽釋氏之所謂寂生照莊子之所謂㤗宇定而天光發皆此意也辨姦論荆川嘗論韓非子八姦篇謂是一面照妖鏡余於老泉此論亦云張文定公撰老蘇先生墓表云嘉祐初王安石名始盛黨友傾一時其命相制曰生民已來數人而巳造作語言至以為幾於聖人歐陽修亦善之勸先生與之游而安石亦願交於先生先生曰吾知其人矣是不近人情者鮮不為天下患安石之母死士大夫皆弔先生獨不往作辨姦一篇其文曰事有必至理有固然惟天下之静者乃能見微而知著月暈而風礎潤而雨人人知之人事之推移理勢之相因其踈闊而難知變化而不可測者孰與天地隂陽之事而賢者有不知其故何也好惡亂其中而利害奪其外也昔者田巨源見王衍曰誤天下蒼生者必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣自今而言之其理固有可見者以吾觀之王衍之為人容貎言語固有以欺世而盗名者然不忮不求與物浮沉使晉無惠帝僅得中主雖衍百千何從而亂天下乎盧杞之姦固足以敗國然而不學無文容貎不足以動人言語不足以眩世非德宗之鄙暗亦何從而用之由是言之二公之料二子亦容有未必然也今有人口誦孔老之言身履夷齊之行收召好名之士不得志之人相與造作言語私立名字以為顏淵孟軻復出而隂賊險狠與人異趣是王衍盧杞合而為一人也其禍豈可勝言哉夫面垢不忘洗衣垢不忘澣此人之至情也今也不然衣巨虜之衣食犬彘之食囚首喪面而談詩書此豈其情也哉凡事之不近人情者鮮不為大姦慝豎刁易牙開方是也以蓋世之名而濟其未形之患雖有願治之主好賢之相猶將舉而用之則其為天下患必然而無疑者非特二子之比也孫子曰善用兵者無赫赫之功使斯人而不用也則吾言為過而斯人有不遇之嘆孰知禍之至於此哉不然天下將被其禍而吾獲知言之名悲夫唐宋八大家文鈔巻一百十一
