body:
  text: 唐宋八大家文鈔巻五十九明茅坤撰廬陵文鈔三十一祭文行狀祭謝希深文韻語中長短錯綜而寫情可涕維年月日具官修謹以明日祗役于滑謹用清酌庶羞之奠致祭于故副閣舍人謝公之靈嗚呼謝公性明於誠履蹈其方其於死生固己自達而天下之士所以嘆息而不已者惜時之良況於吾徒師友之分情親義篤其何可忘景祐之初修走于峽而公在江東寓書真州哀其親老而勉以自强其後二年再遷漢上風波霧毒凡萬二千里而㑹公南陽初來謁公迎我而笑與我别久憐其貌若故而氣揚清風之館覽秀之涼坐竹林之修䕃泛水芰之清香及告還邑得官靈昌走書來報喜詠于章罷縣無歸來客公邦歡言未幾遽問于牀不見五日而入哭其堂嗚呼謝公年不得中壽而位止于郎惟其殁也哭者為之哀不識者為之相弔或賻其家或力其喪嗟夫為善之效得此而已庸何傷富貴偶也壽天數也奚較其少多而短長若公之有言著于文行著于事材著于用既久而愈彰此吾徒可以無大恨而君子謂公為不亡滑人來迎修馬當北而不即去者以公而徬徨始修將行期公餞我今其去也來奠公觴兹言悲矣公其聞乎抑不聞也徒有淚而浪浪尚享祭吳尚書文交似疎而感獨深用也字為韻貫到篇末嗚呼公乎余將老也閱世久也見時之事可喜者少而可悲者多也士少勤其身以干禄仕取名聲初若可愛慕者衆也既而得其所欲而怠與迫於利害而遷求全其節以保其終者十不一二也其人康强飲食平居笑言以相歡樂察其志意可謂偉然而或離或合不見幾時遂至於衰病與其俯仰旦暮之間忽焉以死者十常八九也嗚呼公乎所謂善人君子者其難得既如彼而易失又如此也故每失一人未嘗不咨嗟殞泣至於失聲而長號也惟公材謀足以居大臣文學足以名後世宜在朝廷以講國論而久留于外宜享壽考以為人望而遽云長逝此搢紳大夫所以聚弔于家而交朋故舊莫不走哭于位豈惟老病之人獨易感而多涕也尚享祭資政范公文范公與公同治同難故痛獨深嗚呼公乎學古居今持方入員丘軻之艱其道則然公曰彼惡謂公好訐公曰彼善謂公樹朋公所勇為謂公躁進公有退讓謂公近名讒人之言其何可聽先事而斥羣議衆排有事而思讐仇謂材毁不吾傷譽不吾喜進退有儀夷行險止嗚呼公乎舉世之善誰非公徒讒人豈多公志不舒善不勝惡豈其然乎成難毁易理又然歟嗚呼公乎欲壞其棟先摧桷榱傾巢破鷇披折傍枝害一損百人誰不罹誰為讜論是不仁哉嗚呼公乎易名謚行君子之榮生也何毁歿也何稱好死惡生殆非人情豈其生有所嫉而死無所爭自公云亡謗不待辯愈久愈明由今可見始屈終伸公其無恨寫懷平生寓此薄奠祭尹師魯文嗟乎師魯辯足以窮萬物而不能當一獄吏志可以狹四海而無所措其一身窮山之崖野水之濱猿猱之窟麋鹿之羣猶不容於其間兮遂即萬鬼而為隣嗟乎師魯世之惡子之多未必若愛子者之衆而其窮而至此兮得非命在乎天而不在乎人方其奔顛斥逐困厄艱屯舉世皆寃而語言未嘗以自及以窮至死而妻子不見其悲忻用舍進退屈伸語黙夫何能然乃學之力至其握手為訣隠几待終顔色不變笑言從容死生之間既已能通於性命憂患之至宜其不累於心胸自子云逝善人宜哀子能自達予又何悲惟其師友之益平生之舊情之難忘言不可究嗟乎師魯自古有死皆歸無物惟聖與賢雖埋不沒尤於文章焯若星日子之所為後世師法雖嗣子尚幼未足以付子而世人藏之庶可無於墜失子於衆人最愛予文寓辭千里侑此一樽冀以慰子聞乎不聞尚享祭蘇子美文哀哀子美命止斯耶小人之幸君子之嗟子之心胸蟠屈龍虵風雲變化雨雹交加忽然揮斧霹靂轟車人有遭之心驚膽落震仆如麻須臾霽止而四顧百里山川草木開發萌芽子於文章雄豪放肆有如此者吁可怪耶嗟乎世人知此而已貪悦其外不窺其内欲知子心窮達之際金石雖堅尚可破壞子於窮達始終仁義惟人不知乃窮至此藴而不見遂以沒地獨留文章照耀後世嗟世之愚掩抑毁傷譬如磨鑑不滅愈光一世之短萬世之長其間得失不待較量哀哀子美來舉予觴尚享祭梅聖俞文悲愴刺骨昔始見子伊川之上余仕方初子年亦壯讀書飲酒握手相歡譚辯鋒出賢豪滿前謂言仕宦所至皆然但當行樂何以憂患子去河南余貶山峽三十年間乖離㑹合晩被選擢濫官朝廷薦子學舍吟哦六經余才過分可愧非榮子雖窮厄日有聲名余狷而剛中遭多難氣血先耗髮鬚早變子心寛易在險如夷年實加我其顔不衰謂子仁人自宜多壽余譬膏火煎熬豈久事今反此理固難知況於富貴又可必期念昔河南同時一輩零落之餘惟予子在子又去我余存兀然凡今之游皆莫余先紀行琢辭子宜余責送終䘏孤則有衆力惟聲與淚獨出余臆祭石曼卿文凄清逸韻嗚呼曼卿生而為英死而為靈其同乎萬物生死而復歸於無物者暫聚之形不與萬物共盡而卓然其不朽者後世之名此自古聖賢莫不皆然而著在簡冊者昭如日星嗚呼曼卿吾不見子久矣猶能髣髴子之平生其軒昻磊落突兀崢嶸而埋藏於地下者意其不化為朽壞而為金玉之精不然生長松之千尺産靈芝而九莖奈何荒烟野蔓荆棘縱横風凄露下走燐飛螢但見牧童樵叟歌吟而上下與夫驚禽駭獸悲鳴躑躅而咿嚶今固如此更千秋而萬嵗兮安知其不穴藏狐貉與鼯鼪此自古聖賢亦皆然兮獨不見夫纍纍乎曠野與荒城嗚呼曼卿盛衰之理吾固知其如此而感念疇昔悲涼悽愴不覺臨風而隕涕者有媿乎太上之忘情尚享祭丁學士文悲痛慷慨嗚呼元珍善惡之殊如火與水不能相容其勢然爾是故鄉人皆好孔子不然惡於不善然後為賢子之美才懿行純德誰稱諸朝當世有識子之憔悴遂以湮淪問孰惡子可知其人毁善之言譬若蠅矢㸃彼白玉濯之而已小人得志蹔快一時要其得失後世方知受侮被謗無如仲尼巍然袞冕不祀桓魋孟軻之道愈久彌光名尊四子不數臧倉是以君子修身而俟擾擾姦愚經營一世迨榮華之銷歇嗟冺沒其誰記是皆生則狐䑕死為狗彘惟一賢之不幸厯千載而猶傷自古孰不有死至今獨弔乎沅湘彼靈均之事業初未見於南邦使不遭罹於放斥未必功顯而名彰然則彼讒人之致力乃借譽而揄揚嗚呼元珍道之通塞有命在天其如予何孔孟亦然何以慰子聊為此言寄哀一奠有涕漣漣祭程相公文韻味自佳嗚呼公於時人氣剛難合予實後進晩而相接一笑之樂淋漓酒巵十年再見公老予衰公遽如此予存幾時人生富貴朝露之光及其零落秖益悲傷惟可喜者令名不忘士窮閭巷念不逢時公位將相韜能不施公居廟堂有言諤諤白首于外愉愉其樂酒酣氣振猶見鋒鍔惜也雖老神清志完手書未復訃已在門昔者樽酒歌歡笑謔今而一觴涕淚霑落死生忽焉自古常然撫棺為訣夫復何言尚書戸部侍郎贈兵部尚書蔡公行狀蔡公寛重正直處摹冩有生色公諱齊字子思其先洛陽人皇祖以下始著籍於膠東公幼依外舅劉氏能自力為學初作詩已有動人語今相國李公見之大驚謂公之皇考曰兒有大志宜善視之州舉進士第一以書薦其里人史防而居其次祥符八年真宗皇帝采賈誼置器之説試禮部所奏士讀至公賦有安天下意歎曰此宰相器也凡貢士當賜第者攷定必召其高第數人並見又參擇其材質可者然後賜第一及公召見衣冠偉然進對有法天子為無能過者亟以第一賜之初拜將仕郎將作監丞通判兗州太守王臻治政嚴急喜以察盡為明公務為裁損濟之以寛獄訟為之不寃逾年通判濰州民有告某氏刻偽稅印為姦利者已逾十年蹤跡連蔓至數百人公嘆曰盡利於民民無所逃此所謂法出而姦生者邪是為政者之過也為緩其獄得減死者十餘人餘皆釋而不問濰人皆曰公德於我使我自新為善人由是風化大行天禧二年還京師當召試時大臣有用事者意不悦公居數月不得召久而天子記其姓名趣使召試拜著作佐郎直集賢院階再加為宣德郎勲騎都尉主判三司開拆司賜緋衣銀魚遷右正言階朝奉郎勲上騎都尉今天子即位遷右司諫真宗新棄天下天子諒隂不言丁晉公用事專權欲邀致公許以知制誥公拒不往益堅已而寇萊公王文康公皆以不附已連黜公歸歎曰吾受先帝之知而至於此豈宜為權臣所脇得罪非吾懼也既而晉公敗士嘗為其用者皆恐懼獨公終無所屈未幾同修起居注又拜尚書禮部員外郎兼侍御史知雜事判流内銓賜服金紫改三司戸部度支二副使轉勲輕車都尉借給事中奉使契丹天聖八年拜起居舍人知制誥同知審官院㑹靈宫判官充翰林學士加侍讀學士賜爵汝南縣開國子食邑五百戸太后修景德寺成詔公為記而宦者羅崇勲主營寺事使人隂謂公曰善為記當得叅知政事公故遲之頗久使者數趣終不以進崇勲怒䜛之太后遷禮部郎中改龍圖閣直學士出為西京留守是時魯肅簡公方叅知政事爭之太后前卒不能留以親便求改密州遭嵗旱除其公田之租數千石又請悉除京東民租弛其鹽禁使民得賈海易食以救其饑東人至今賴之皆曰使吾人百萬口活而不饑者蔡公也徙南京留守進爵侯増邑戸五百為一千階朝散大夫召還拜右諫議大夫權御史中丞判吏部流内銓遷給事中勲䕶軍増邑五百為千五百户莊獻明肅皇太后崩議尊楊太妃為太后垂簾聽政議決召百官賀公曰天子明聖奉太后十餘年今始躬親萬事以慰天下之心豈宜女后相繼稱制且自古無有固止不追斑太妃卒不預政止稱太后於宫中復為龍圖閣直學士權三司使京師有指荆王為飛語者内侍省得三司小吏鞫之連及數百人上聞之大怒詔公窮治迹其所來無端而上督責愈急有司不知所為京師為之恐動公以謂謬妄之説起於小人不足窮治且無以慰安荆王危疑之心奏疏論之一夕三上上大悟乃可其奏止笞數人而已中外之情乃安拜樞密副使進爵公增邑戸五百為二千南海蠻酋虐其部人部人款宜州自歸者八百餘人議者以為叛蠻不可納宜還其部公獨以為蠻去殘酷而歸有德且以求生宜内之荆湖賜以閒田使自營今縱却之必不復還其部茍散入山谷當為後患爭之不能得其後數年蠻果為亂殺將吏十餘人宜桂以西皆警朝廷頗以為憂景祐元年遷禮部侍郎叅知政事二年賜號推忠佐理功臣進階正奉大夫勲柱國郭皇后廢京師富人陳氏女有色選入宫為后公爭之以為不可自辰至已辯論不已上意稍悟遂還其家河決横壠改而北流議者以為當塞公曰水性下而河北地卑順其所趣以導之可無澶滑壅潰之患而貝博數州得在河南於國家便但理堤䕶魏州而已從之澶滑果無患契丹祭天於幽州以兵屯界上界上驚騷議者欲發大軍以備邊公獨料其必不動後卒無事公在大位臨事不回無所牽畏而恭謹謙退未嘗自伐天下推之為正人搢紳之士倚以為朝廷重三年頻表求解職不許明年遂罷以戸部侍郎歸斑改賜推誠保德功臣勲上柱國久之出知潁州寶元二年四月四日以疾卒于官公在潁州聞西方用兵惻然有憂國心自以待罪外邦不得盡其所懷使其弟稟言西事甚詳公之卒故吏朱寀至潁潁之吏民見寀號泣拜於馬前指公嘗所更厯施為曰此公之迹也其為政有仁恩所至如此平生喜薦士如楊偕郭勸劉隨龎籍段少連比比為當世名臣公為人神色明秀鬚眉如畫精學博聞寛大沉黙一言之出終身可復其蒞官行已出處始終之大節可考不誣如此謹按贈兵部尚書於今為三品其法當謚敢告有司謹狀司封員外郎許公行狀叙事中矩矱君諱逖字景山世家歙州少仕偽唐為監察御史李氏國除以族北遷獻其文若干篇得召試為汲縣尉冠氏主簿凡主簿二嵗縣民七百人詣京師願得君為令遷祕書省挍書郎知縣事數上書論北邊事是時趙普為相四方奏疏不可其意者悉投二甕中甕滿輒出而焚之未嘗有所肻可獨稱君為能曰其言與我多合又二嵗徙江華令未行轉運使樊知古薦其材拜太僕寺丞磨勘錢帛糧草監永城和糴知海陵監三嵗用監最遷大理寺丞賜緋衣銀魚監泗州排岸司遷贊善大夫監永興軍𣙜貨務遷太常丞知鼎州州雜蠻蜑喜以攻刧為生少年百餘人私自署為名號常伺夜出掠居人居人惡之莫敢指君至而歎曰夫政民之庇也威不先去其惡則惠亦不能及人君政既行盗皆亡入他境約君去乃還遷國子博士奉使兩浙江南言茶鹽利害省州縣之役皆稱㫖出知興元府大修山河堰堰水舊溉民田四萬餘頃世傳漢蕭何所為君行壞堰顧其屬曰酇侯方佐漢取天下乃暇為此以溉其農古之聖賢有以利人無不為也今吾豈宜憚一時之勞而廢古人萬世之利乃率工徒躬治木石石墜傷其左足君益不懈堰成嵗穀大豐得嘉禾十二莖以獻遷尚書主客員外郎京西轉運使徙荆湖南路荆湖南接溪洞諸蠻嵗出為州縣患君曰鳥獸可馴況蠻亦人乎乃召其酋豪諭以禍福諸蠻皆以君言為可信訖三嵗不以蠻事聞朝廷君罷來朝真宗面稱其能㑹有司言荆南久不治真宗拜君度支員外郎知府事荆南鈐轄北路兵馬於荆湖為大府故常用重人至君特選以材用員外郎自君而始明年遷司封員外郎賜金紫徙知揚州州居南方之㑹世之仕宦於南與其死而無歸者皆寓其家於揚州故其子弟雜居民間往往倚權貴恃法得贖出入里巷為不法至或破亡其家君捕其甚者笞之曰此非吏法乃吾代汝父兄教也子弟羞媿自悔稍就學問為善人風俗大化嵗滿在道得疾卒于高郵君少孤事其母兄以孝謹閒常戒其妻事嫂如姑而未嘗敢先其兄食衣雖弊兄不易衣不敢易初違命侯遣其弟朝京師君之故友全惟嶽當從以其家屬託君惟嶽果留不返君善撫其家為嫁其女數人李氏國亡君載其家北歸京師以還惟嶽厯官四十年不問家事好學尤喜孫吳兵法初在偽唐數上書言事得挍書郎遂遷御史王師圍金陵李氏大將李雄擁兵數萬留上江隂持兩端李氏患之以謂非君不能召雄君走上江以語動雄雄即聽命已而李氏以蠟書止雄於溧水君曰此非柵兵之地留之必敗乃戒雄曰兵來慎無動待我一夕吾當入白可與公兵俱入城君去王師挑之雄輙出戰果敗死君至收其敗卒千人而去君少慷慨卒能自立於時其孝謹聞於其族其信義著於其友其材能稱於其官是皆可書以傳謹狀唐宋八大家文鈔巻五十九
