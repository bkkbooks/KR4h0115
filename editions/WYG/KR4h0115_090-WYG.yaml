body:
  text: 唐宋八大家文鈔巻八十四明茅坤撰臨川文鈔四書荆公之書多深思逺識要之於古之道而其行文處往往遒以婉鑱以刻譬之入幽谷邃壑令人神解而興不窮中有歐蘇輩所不及處上相府書時荆公托為擇便地以養母其書之情㫖深厚婉曲某聞古者極治之時君臣施道以業天下之民匹夫匹婦有不與其澤者為之焦然耻而憂之瞽聾侏儒亦各得以其材食之有司其誠心之所化至於牛羊之踐不忍不仁於草木今行葦之詩是也况於所得士大夫也哉此其所以上下輯睦而稱極治之時也伏惟閣下方以古之道施天下而某之不肖幸以此時竊官於朝受命佐州宜竭罷駑之力畢思慮治百姓以副吾君吾相於設官任材休息元元之意不宜以私慁上而自近於不敏之誅抑其勢有可言則亦閣下之所宜憐者某少失先人今大母春秋髙宜就養於家之日乆矣徒以内外數十口無田園以託一日之命而取食不腆之禄以至於今不能也今去而野處念自廢於茍賤不亷之地然後有以共裘葛具魚菽而免於事親之憂則恐内傷先人之明而外以累君子養完人材之徳濡忍以不去又義之所不敢出也故輒上書闕下願殯先人之丘冢自託於筦庫以終犬馬之養焉伏惟閣下觀古之所以材瞽聾侏儒之道覽行葦之仁憐士有好修之意者不窮之於無所據以傷其操使老者得養而養者雖愚無能無報盛徳於以廣仁孝之政而曲成士大夫為子孫之誼是亦君子不宜得巳者也黷冒威尊不任惶恐之至上執政書公不知時何官其所欲辭京師千里之縣却欲擇南州以便禄養竊以方今仁聖在上四海九州冠帶之屬望其施為以福天下者皆聚於朝廷而某得以此時備使畿内交遊親戚知能才識之士莫不為某願此亦區區者思自竭之時也事顧有不然者某無適時才用其始仕也茍以得禄養親為事耳日月推徙遂非其據今親闈老矣日夜惟諸子壯大未能以有室家而某之兄嫂尚皆客殯而不塟也其心有不樂於此及今愈思自置江湖之上以便昆弟親戚在還之勢而成㛰姻塟送之謀故某在廷二年所求郡以十數非獨為食貧而口衆也亦其所懐如此非獨以此也某又不幸今兹天被之疾好學而苦眩稍加以憂思則往往昬瞶不知所為以京師千里之縣吏兵之衆民物之稠所當悉心力耳目以稱上之恩施者葢不可勝數以某之不肖雖平居無他尚懼不給又况所以亂其心如此而又為疾病所侵乎歸印有司自請於天子以待放絀而歸田里此人臣之明義而某之所當守也顧親老矣而無所養勢不能為也偷假嵗月饕禄賜以徼一日之幸而不忖事之可否又義之所不敢為竊自恕而求其猶可以冒者自非哀憐東南寛閒之區幽僻之濵與之一官使得因吏事之力少施其所學以庚禄賜之入則進無所迯其辠退無所託其身不惟親之欲有之而巳葢聞古者致治之世自瞽矇昬瞶侏儒籧篨戚施之人上所以使之皆各得盡其才鳥獸魚鼈昆蟲草木所以養之皆各得盡其性而不失也於是裳裳者華魚藻之詩作於時而曰左之左之君子宜之右之右之君子有之惟其有之是以似之言古之君子於士之宜左者左之宜右者右之各因其才而有之是以人人得似其先人又曰魚在在藻依于其蒲王在在鎬有那其居魚者潛逃深𣺌之物皆得其所安而樂王是以能那其居也方今寬裕廣大有古之道大臣之在内有不便於京而求出小臣之在外有不便於身而求歸朝廷未嘗不可而士亦未有以此非之者也至於所以賜某者亦可謂周矣為其貧也使之有屋廬而多禄廪為其求在外而欲其内也置之京師而如其在外之求顧某之私不得盡聞於上是以所懐齟齬而有不得也今敢盡以聞於朝廷而又私布於執事矣伏惟執事察其身之疾而從之盡其才憐其親之欲而養之盡其性以完朝廷寛裕廣大之政而無使裳裳者華魚藻之詩作於時則非獨於某為幸甚上曾參政書與昌黎晨入夜歸書㕘而其所占地步殊自逺大某聞古之君子立而相天下必因其材力之所宜形勢之所安而役使之故人得盡其材而樂出乎其時今也某材不足以任劇而又多病不敢自蔽而數以聞執事矣而閣下必欲使之察一道之吏而寄之以刑獄之事非所謂因其材力之所宜也某親老矣有上氣之疾日乆比年加之風眩勢不可以去左右閣下必欲使之奔走跋涉不常乎親之側非所謂因其形勢之所安也伏惟閣下由君子之道以相天下故某得布其私焉論者或以為事君使之左則左使之右則右害有至於死而不敢避勞有至於病而不敢辭者人臣之義也某竊以為不然上之使人也既因其材力之所宜形勢之所安則使之左而左使之右而右可也上之使人也不因其材力之所宜形勢之所安上將無以報吾君下将無以慰吾親然且左右惟所使則是無義無命而茍恱之為可也害有至於死而不敢避者義無所避之也勞有至於病而不敢辭者義無所辭之也今天下之吏其材可以備一道之使而無不可為之勢其志又欲得此以有為者葢不可勝數則某之事非所謂不可辭之地而不可避之時也論者又以為人臣之事其君與人子之事其親其勢不可得而兼也其材不足以任事而勢不可以去親之左右則致為臣而養可也某又竊以為不然古之民也有常産矣然而事親者猶将輕其志重其禄所以為養今也仕則有常禄而居則無常産而特将輕去其所以為養非所謂為人子事親之義也且某之材固不足以任使事矣然尚有可任者在吾君與吾相處之而巳爾固不可以去親之左右矣然任豈有不便於養者乎在吾君與吾相處之而巳爾然以某之賤未嘗得比於門牆之側而慨然以鄙樸之辭自通於閣下之前欲得其所求自常人觀之宜其終齟齬而無所合也自君子觀之由君子之道以相天下則宜不為逺近易慮而不以親踈改施如天之無不燾而施之各以其命之所宜如地之無不載而生之各以其性之所有彼常人之情區區好忮而自私不恕巳以及物者豈足以量之邪伏惟閣下垂聴而念焉使天下士無復思古之君子而樂出乎閣下之時而又使常人之觀閣下者不能量也豈非君子所願而樂者乎冒黷威尊不任惶恐之至上杜學士書語意遒勁竊聞受命改使河北伏惟慶慰國家東西南北地各萬里統而維之止十八道道數千里而轉運使獨一二人其在部中吏無崇卑皆得按舉雖將相大臣氣勢烜赫上所尊寵文書指麾勢不得恣一有罪過糺詰按治遂行不請政令有大施舍常咨而後定生民有大利害得以罷而行之金錢粟帛倉庾庫府舟車漕引凡上之人皆須我主出信乎是任之重也而河北又天下之重處左河右山强國之與鄰列而為藩者皆将相大臣所屯無非天下之勁兵悍卒以惠則恣以威則揺幸時無事廟堂之上猶北顧而不敢忽有事雖天子其憂未嘗不在河北也今執事按臨東南無幾何時浙河東西十有五州之吏士民未盡受察便宜當行而害之可除去者猶未畢也而卒然舉河北以付執事豈主上與一二股肱之臣不惟付予必乆而後可要以效哉且以為世之士大夫無足寄以重獨執事為能當之耳伏惟執事名行於天下而材信於朝廷而處之宜必有補於當世故雖某䝉恩徳最厚一日失所依據而釋然於心不敢恨望唯公義之存而忘所私焉上杜學士言開河書行文婉而曲論利害處簡而悉十月十日謹再拜奉書運使學士閣下某愚不更事物之變備官節下以身得察於左右事可施設不敢因循茍簡以孤大君子推引之意亦其職宜也鄞之地邑跨負江海水有所去故人無水憂而深山長谷之水四面而出溝渠澮川十百相通長老言錢氏時置營田吏卒嵗浚治之人無旱憂恃以豐足營田之廢六七十年吏者因循而民力不能自并向之渠川稍稍淺寒山谷之水轉以入海而無所瀦幸而雨澤時至田猶不足於水方夏歴旬不雨則衆川之涸可立而須故今之邑民最獨畏旱而旱輙連年是皆人力不至而非嵗之咎也某為縣於此幸嵗大穰以為宜乗人之有餘及其暇時大浚治川渠使有所瀦可以無不足水之患而無老壯稚少亦皆懲旱之數而幸今之有餘力聞之翕然皆勸趨之無敢愛力夫小人可與樂成難與慮始誠有大利猶将强之况其所願欲哉竊以為此亦執事之所欲聞也伏惟執事聰明辨智天下之事悉巳講而明之矣而又導利去害汲汲若不足夫此最長民之吏當致意者故輒具以聞州州既具以聞執事矣顧其厝事之詳尚不得徹輒復條件以聞唯執事少留聰明有所未安教而勿誅幸甚上郎侍郎書一通問書自不可及某啟昔者幸以先人之故得望步趨伏䝉撫存教道如親子姪而去離門牆凡五六年一介之使一書之問不徹於𨽻人之聴誠以苛禮不足報盛徳空言不能輸欲報之實顧不知執事察不察也去年得邑海上塗當出越而問聴之繆謂執事在焉比至越而後知車馬在杭行自念父黨之尊而徳施之隆去五六年而一書之不進又望門不造雖其心之勤企而欲報者猶在而執事之見察其可必也且悔且恐不知所云輙試陳不敏之罪於左右顧猶不敢必左右之察也不圖執事遽然貶損手教重之蜀牋兖墨之賜文辭反復意指勤過然後知大人君子仁恩溥博度量之廓大如此小人無状不善隠度妄自悔恐而不知所以裁之也一官自綴勢不得去欲趨而前其路無由唯其思報心尚不怠上田正言書直而不阿義形於辭正言執事某五月還家八月抵官每欲介西北之郵布一書道區區之懐輒以事廢揚東南之吭也舟輿至自汴者日十百數因得問汴事與執事息耗甚詳其間薦紳道執事介然立朝無所跛倚甚盛甚盛顧猶有疑執事者雖某亦然某之學也執事誨之進也執事奨之執事知某不為淺矣有疑焉不以聞何以償執事之知哉初執事坐殿廡下對方正策指斥天下利害奮不諱忌且曰願陛下行之無使天下謂制科為進取一塗耳方此時窺執事意豈若今所謂舉方正者獵取名位而巳哉葢曰行其志云爾今聨諫官朝夕耳目天子行事即一切是非無不可言者欲行其志宜莫若此時國之疵民之病亦多矣執事亦抵職之日乆矣向之所謂疵者今或痤然若不可治矣向之所謂病者今或痼然若不可起矣曾未聞執事建一言寤主上也何向者指斥之切而今之䟽也豈向之利於言而今之言不利耶豈不免若今之所謂舉方正者獵取名位而巳邪人之疑執事者以此為執事解者或造辟而言詭辭而出䟽賤之人奚遽知其㣲哉是不然矣傳所謂造辟而言者廼其言則不可得而聞也其言之效則天下斯見之矣今國之疵民之病有滋而無損焉烏所謂言之效邪復有為執事解者曰葢造辟而言之矣如不用何是又不然臣之事君三諫不從則去之禮也執事對策時常用是著于篇今言之而不從亦當不翅三矣雖惓惓之義未能自去孟子不云乎有言責者不得其言則去盍亦辭其言責邪執事不能自免於疑也必矣雖堅强之辯不能為執事解也廼如某之愚則願執事不矜寵利不憚誅責一為天下昌言以寤主上起民之病治國之疵蹇蹇一心如對策時則人之疑不解自判矣惟執事念之如其不然願賜教答不宣荆川曰歐公上范司諫書婉而切荆公與田正言書直而勁上田正言第二書某聞公卿大夫才名與寵兼盛於世必有大功以宜之否則君子撝之執事姿畧頴然出常士之表應進士中甲科舉方正為第一将朝車通舉刺史事又陳善䇿得璽書召名與寵不巳兼盛於世邪所未較著者功爾本朝太祖武靖天下真宗文持之今上接祖宗之成兵不釋翳者葢數十年近世無有也所當設張之具猶若闕然重以羌酋梗邊主上方覽衆策以濟之天下舉首戴目屬心執事者難以一二計為執事議者曰朝廷藉不吾以宜且自贊以植顯效醻天下屬已之意矧上惓惓然命之乎此固䇿大功之㑹也抑聞之嶢嶢者易缺皦皦者易汗執事才名與寵可謂易汗易缺者必若䇿大功適足宜之而已可無茂邪恭惟旦暮輔佐天子秉國事脩所當設張之具復邊人於安稱主上所以命之之意使天下舉首戴目者盈其願而退則後世之書可勝傳哉董仲舒有是才名顧不獲此寵公孫季有此寵不成此功有此寵而成此功者宜在執事不宜在它草鄙之人不達大誼辱奬訓之厚敢不盡愚上運使孫司諫書以一縣吏而能直民之利害於運使如此伏見閣下令吏民出錢購人捕鹽竊以為過矣海旁之鹽雖日殺人而禁之勢不止也今重誘之使相捕告則州縣之獄必蕃而民之陷刑者将衆無頼姦人将乗此勢於海旁漁業之地搔動艚户使不得成其業艚户失業則必有合而為盜賊殺以相仇者此不可不以為慮也鄞於州為大邑某為縣於此兩年見所謂大户者其田多不過百畝少者至不滿百畝百畝之直為錢百千其尤良田乃直二百千而巳大抵數口之家養生送死皆自田出州縣百須又出於其家方今田桑之家尤不可時得者錢也今責購而不可得則其間必有鬻田以應責者夫使良民鬻田以賞無頼告訐之人非所以為政也又其間必有扞州縣之令而不時出錢者州縣不得不鞭械以督之鞭械吏民使之出錢以應捕鹽之購又非所以為政也且吏治宜何所師法也必曰古之君子重告訐之利以敗俗廣誅求之害急較固之法以失百姓之心因國家不得巳之禁而又重之古之君子葢未有然者也犯者不休告者不止糶鹽之額不復於舊則購之勢未見其止也購将安出哉出於吏之家而巳吏固多貧而無有也出於大户之家而巳大家将有由此而破産失職者安有仁人在上而令下有失職之民乎在上之仁人有所為則世輒指以為師故不可不慎也使世之在上者指閣下之為此而師之獨不害閣下之義乎上好是物下必有甚者閣下之為方爾而有司或以謂将請於閣下求增購賞以勵告者故某竊以謂閣下之欲有為不可不慎也天下之吏不由先王之道而主於利其所謂利者又非所以為利也非一日之積也公家日以窘而民日以窮而怨常恐天下之勢積而不巳以至於此雖力排之巳若無奈何又從而為之辭其與抱薪救火何異竊獨為閣下惜此也在閣下之勢必欲變今之法今如古之為固未能也非不能也勢不可也循今之法而無所變有何不可而必欲重之乎伏惟閣下常立天子之側而論古今所以存亡治亂将大有為於世而復之乎二帝三代之隆顧欲為而不得者也如此等事豈待講說而明今退而當財利責葢迫於公家用調之不足其勢不得不權事勢而為此以紓一切之急也雖然閣下亦過矣非所以得財利而救一切之道閣下於古書無所不觀觀之於書以古巳然之事驗之其易知較然不待某辭説也枉尺直尋而利古人尚不肯為安有此而可為者乎今之時士之在下者浸漬成俗茍以順從為得而上之人亦往往憎人之言言有忤巳者輒怒而不聴之故下情不得自言於上而上不得聞其過恣所欲為上可以使下之人自言者惟閣下其職不得不自言者某也伏惟留思而幸聴之文書雖巳施行追而改之若猶愈於遂行而不反也干犯云云凌屯田書代人作類昌黎書俞跗疾毉之良者也其足之所經耳目之所接有人於此狼疾焉而不治則必欿然以為巳病也雖人也不以病俞跗焉則少矣隠而虞俞跗之心其族婣舊故有狼疾焉則何如也末如之何其巳未有可以治焉而忽者也今有人於此弱而孤壯而屯蹷困塞先大父棄館舍于前而先人從之兩世之柩窶而不能葬也嘗觀傳記至春秋過時而不葬與子思所論未葬不變服則戚然不知涕之流落也竊悲夫古之孝子慈孫嚴親之終如此其甚也今也乃獨以窶故犯春秋之義拂子思之説鬱其為子孫之心而不得伸猶人之狼疾也奚有間哉伏惟執事性仁而躬義憫艱而悼厄窮人之俞跗也而又有先人一日之雅某之疾庻幾可以治焉者也是敢不謀於龜不介於人跋千里之途犯不測之川而造執事之門自以為得所歸也執事其忽之歟上人書嘗謂文者禮教治政云爾其書諸策而傳之人大體巋然而巳而曰言之不文行之不逺云者徒謂辭之不可以巳也非聖人作文之本意也自孔子之死乆韓子作望聖人於百千年中卓然也獨子厚名與韓並子厚非韓比也然其文卒配韓以傳亦豪傑可畏者也韓子嘗語人以文矣曰云云子厚亦曰云云疑二子者徒語人以其辭耳作文之本意不如是其巳也孟子曰君子欲其自得之也自得之則居之安居之安則資之深資之深則取諸左右逢其原孟子之云爾非直施於文而巳然亦可託以為作文之本意且所謂文者務為有補於世而巳矣所謂辭者猶器之有刻鏤繪畫也誠使巧且華不必適用誠使適用亦不必巧且華要之以適用為本以刻鏤繪畫為之容而巳不適用非所以為器也不為之容其亦若是乎否也然容亦未可巳也勿先之其可也某學文乆數挾此說以自治始欲書之策而傳之人其試於事者則有待矣其為是非邪未能自定也執事正人也不阿其所好者書雜文十篇獻左右願賜之教使之是非有定焉荆川曰半山文字其長在遒𦂳與㕘政王禹玉書以公受主上之深知猶慄慄戰懼若此某啟繼䝉賜臨傳喻聖訓徬徨踧踖無所容措某羇孤無助遭值大聖獨排衆毁付以宰事茍利於國豈辭糜殞顧自念行不足以悅衆而怨怒實積於親貴之尤智不足以知人而險詖常出於交游之厚且據勢重而任事乆有盈滿之憂意氣衰而精力弊有曠失之懼歴觀前世大臣如此而不知自弛乃能終不累國者葢未有也此某所以不敢逃逋慢之誅欲及辠戾未積得優游里間為聖時知止不殆之臣庻幾天下後世於上拔擢任使無所譏議伏惟明公方佐佑大政上為朝廷公論下及僚友私計謂宜少垂念慮特賜敷陳某既不獲通章表所恃在明公一言而巳心之精㣲書不能傳惟加憫察幸甚不宣與馬運判書論理財是荆公本色運判閣下比奉書即䝉寵答以感以怍且承訪以所聞何閣下逮下之周也嘗以謂方今之所以窮空不獨費出之無節又失所以生財之道故也富其家者資之國富其國者資之天下欲富天下則資之天地葢為家者不為其子生財有父之嚴而子富焉則何求而不得今闔門而與其子市而門之外莫入焉雖盡得子之財猶不富也葢近世之言利雖善矣皆有國者資天下之術耳直相視於門之内而巳此其所以困與在閣下之明宜巳盡知當患不得為耳不得為則尚何頼於不肖者之言耶今嵗東南饑饉如此汴水又絶其經畫固勞心私竊度之京師兵食宜窘新蒭百穀之價亦必踴以謂宜料畿兵之駑怯者就食諸郡可以舒漕輓之急古人論天下之兵以為猶人之血脉不及則枯聚則疽分使就食亦血脉流通之勢也儻可上聞行之否與王子醇書此荆公指揮王韶措處西羌處某啟得書喻以禦冦之方上固欲公毋涉難冒險以百全取勝如所喻甚善甚善方今熈河所急在脩守備嚴戒諸将勿輕舉動武人多欲以討殺取功為事誠如此而不禁則一方憂未艾也竊謂公厚以恩信撫屬羌察其材者收之為用今多以錢粟養戍卒乃適足備屬羌為變而未有以事秉常董氊也誠能使屬羌為我用則非特無内患亦宜頼其力以乗外冦矣自古以好坑殺人致畔以能撫養收其用皆公所覽見且王師以仁義為本豈宜以多殺歛怨耶喻及青唐既與諸族作怨後無復合理固然也然則近董氊諸族事定之後以兵威臨之而宥其罪使討賊自贖隨加厚賞彼亦宜遂為我用無復與賊合矣與討而驅之使堅附賊為我患利害不侔也事固有攻彼而取此者服誠能挫董氊則諸羌自服安所事討哉又聞屬羌經討者既亡蓄積又廢耕作後無以自存安得不屯聚為冦以梗啇旅往來如募之力役及伐材之類因以活之宜有可為幸留意念恤邊事難遥度想公自有定計意所及嘗試言之春暄為國自愛不宣上邵學士書仲詳足下數日前辱示樂安公詩石本及足下所撰復鑑湖記啟封緩讀心目開滌詞簡而精義深而明不候按圖而盡越絶之形勝不候入國而熟賢牧之愛民非夫誠發乎文文貫乎道仁思義色表裏相濟者其孰能至於此哉因環列書室且欣且慶非有厚也公義之然也某嘗患近世之文辭弗顧於理理弗顧於事以襞積故實為有學以雕繪語句為精新譬之擷竒花之英積而玩之雖光華馨采鮮縟可愛求其根柢濟用則蔑如也某幸觀樂安足下之所著譬由笙磬之音圭璋之器有節奏焉有法度焉雖庸耳必知雅正之可貴温潤之可寳也仲尼曰有徳必有言徳不孤必有鄰其斯之謂乎昔昌黎為唐儒宗得子壻李漢然後其文益振其道益大今樂安公懿文茂行起越朝右復得足下以宏識清議相須光潤茍力而不巳使後之議者必曰樂安公聖宋之儒宗也猶唐之昌黎而勲業過之又曰邵公樂安公之壻也猶昌黎之李漢而器畧過之則韓李蒋邵之名各齊驅並驟與此金石之刻不朽矣所以且欣且慶者在於兹焉郡庠拘率偶足下有西笑之謀未獲親交談議聊因手書以道欽謝之意且賀樂安公之得人也唐宋八大家文鈔巻八十四
