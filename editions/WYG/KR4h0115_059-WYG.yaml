body:
  text: 唐宋八大家文鈔巻五十六明茅坤撰廬陵文鈔二十八墓誌銘尚書主客郎中劉君墓誌銘整君諱立之字斯立姓劉氏吉州臨江人也曾祖諱逵祖諱琠當五代時避亂皆不仕父諱式官至尚書工部員外郎掌三司磨勘十餘年能其職世以其官名其家君少孤能自立舉進士為福州連江尉睦州青溪主簿宣州南陵令改大理寺丞知婺州金華縣太子中舎知梓州中江縣通判瀘州瀘州接西南夷常用武人為守而夷數怨叛議者以謂武人不習夷情以生患宜得能吏通判州事君始以材選至則為明約束止侵欺曰必使信自我始夷人安之凡君之所更立至今用以為法而夷亦至今不叛通判常州知高郵軍累遷殿中丞國子博士尚書虞部比部員外郎知潤州皆有能政以能選為提㸃福建路刑獄察獄之寃死者奏黜知泉州蘇夀與其通判張太冲福建七州皆震悚御史考其課為天下第一遷司勲員外郎開封府判官荆湖北路轉運使坐舉官免杜衍李若谷范仲淹等皆言方今天下多事如劉某者不宜久居于家乃復起為比部員外郎知漣水軍言事者以謂自元昊反一方用兵而天下之民弊財絀於上而盜起於下然州縣吏猶習故態茍簡弛壊如無事時於是大選轉運使以按察諸路君以選為荆湖北路轉運使他路繩吏或過急而被按劾者多不服君所舉察簡而賢否無不當是時廣西湖南䕫峽諸蠻皆叛亂君所部下溪辰州彭氏蠻亦折誓柱招集亡命移書州縣州縣使人往者輒囚辱侮慢辰鼎澧三州守吏皆言蠻叛有迹請加兵詔書問君君曰蠻道辰溪落鶴水悍激可下不可上其必不敢輒出而辰州土丁勝兵者三萬人宜積粟利兵為備而已因言蠻類雖人宜鳥獸畜其小嘲啾􅀈觸驅而逺之耳若必擾伏制從至戾其性則噪呼跑虣駭起而奔突乃欲力追而捕之則散漫山林我弊而彼逸凡湖廣之患皆如此也天子以其言然下三州母得妄動一聽君所為而蠻亦卒無事復為司勲員外郎判三司度支勾院改鹽鐵判官假太常少卿接伴契丹使者遂送之明年遂使于契丹還言澶魏築河堤非其時必難成雖成必決不如因其所趣而導之利後河果決商胡君仕宦四十年不營産業自復為司勲員外郎遂不復求磨勘凡三遷皆為知者所薦為人沉敏少言笑與人寡合而喜薦士士由君薦者多為聞人天章閣待制杜杞田瑜是也轉運鹽鐵皆掌財賦而君常以民為先其調率有可免免之其不得已必為處畫使吏不能因緣而民不重費其守官不為勢牽不為利奪為青溪主簿時知州事李階通判朱正辭者皆號强吏喜負其能以折辱下士士皆承望奔走不暇獨君數以事爭而二人者常輒屈其始皆怒後卒歎服共薦之其通判瀘州州有鹽井蜀大姓王䝉正請嵗倍輸以自占䝉正與荘獻明肅太后連姻轉運使等皆不敢與奪君曰倍輸於國家猶秋毫耳奈何使貧民失業遂執不與鄂州官嵗市茶五十萬斤君為轉運使時三司請益市一百萬君上言曰鄂人利茶以為生今官市之多反以茶為病縱不能減奈何增之天子為君許寛一年君曰事茍可行何必一年如其不可雖寛十年不可也爭之不已後卒為君罷之君在鹽鐵次當舉官掌某事三司使欲用其私人以空名状請君署君不肯署而求舉者姓名三司使不悦卒命他判官舉之其後三司使竟坐所舉罷慶厯八年五月遷主客郎中益州路轉運使其年十一月七日卒于官享年六十有四夫人臨沂縣君王氏贈尚書右僕射礪之女先君若干年卒五子元卿真卿亦早亡敞今為大理評事攽鳳翔府推官皆賢而有文章放太廟齋郎尚㓜四女三適人一尚㓜以某年某月某日𦵏于某縣某鄉某原銘曰劉氏顯晦以時亂治有聲王朝自君再世惟徳之貽是将乆大曷知其然君實有子大理寺丞狄君墓誌銘逸調距長沙縣西三十里新陽鄉梅溪村有墓曰狄君之墓者廼予所記榖城孔子廟碑所謂狄君栗者也始君居榖城有善政嘗已見於予文及其亡也其子遵誼泣而請曰願卒其詳而銘之以終先君死生之賜嗚呼予哀狄君者其夀止於五十有六其官止於一卿丞葢其生也以不知於世而止於是若其殁而又無傳則後世遂将泯没而為善者何以勸焉此予之所欲銘也君字仲荘世為長沙人㓜孤事母鄉里稱其孝好學自立年四十始用其兄棐廕補英州真陽主簿再調安州應城尉能使其縣終君之去無一人為盜薦者稱其材任治民乃遷穀城令漢旁之民惟鄧穀為冨縣尚書銓吏常邀厚賂以售貪令故省中私語以一二數之惜為竒貨而二邑之民未嘗得廉吏其豪猾習以賕賄汚令而為自恣至君一切以法繩之姦民大吏不便君之政者往往訴於其上雖按覆率不能奪君所為其州所下文符有不如理必輒封還州吏亦切齒求君過失不可得君益不為之屈其後民有訟田而君誤斷者訴之君坐被劾已而縣籍强壮為兵有告訟田之民隱丁以規避者君笑曰是嘗訴我者彼寃民能自伸此令之所欲也吾豈挾此而報以罪邪因置之不問縣民繇是知君為愛我是嵗西北初用兵州縣既大籍强壮而訛言相驚云當驅以備邊縣民數萬聚邑中會秋大雨霖米踊貴絶粒君發常平倉賑之有司劾君擅發倉廪君即具伏事聞朝廷亦原之又為其民正其税籍之失而使得嵗免破產之患逾年政大洽乃修孔子廟作禮器與其邑人春秋釋奠而興于學時予為乾徳令嘗至其縣與其民言皆曰吾邑不幸有生而未識廉吏者而長老之民所記纔一人而繼之者今君也問其一人者曰張及也推及之嵗至于君葢三十餘年是謂一世矣嗚呼使民更一世而始得一良令吏其可不慎擇乎君其可不惜其殁乎其政之善者可遺而不録乎君用穀城之績遷大理寺丞知新州至則丁母夫人鄭氏憂服除赴京師道病卒于宿州實慶厯五年七月二十四日也曾祖諱崇謙連州桂陽令祖諱文蔚全州清湘令父諱杞不仕君娶滎陽鄭氏生子男二人遵誼遵微皆舉進士女四人長適進士胡純臣其三尚㓜銘曰彊而仕古之道終中夀不為夭善在人宜有後銘于石著不朽太常博士尹君墓誌銘君諱源字子漸姓尹氏與其弟洙師魯俱有名於當世其論議文章博學强記皆有以過人而師魯好辯果於有為子漸為人剛簡不矜飾能自晦藏與人居久而莫知至其一有所發則人必驚伏其視世事若不干其意巳而㩁其情偽計其成敗後多如其言其性不能容常人而善與人交久而益篤自天聖明道之間予與其兄弟交其得於子漸者如此其曾祖諱誼贈光禄少卿祖諱文化官至都官郎中贈刑部侍郎父諱仲宣官至虞部員外郎贈工部郎中子漸初以祖廕補三班借職稍遷左班殿直天聖八年舉進士及第為奉禮郎累遷太常博士歴知芮城河陽二縣僉署孟州判官事又知新鄭縣通判涇州慶州知懐州以慶厯五年三月十四日卒于官趙元昊寇邊圍定川堡大将葛懐敏發涇原兵救之君遺懐敏書曰賊舉其國而來其利不在城堡而兵法有不得而救者且吾軍畏法見敵必赴而不計利害此其所以數敗也宜駐兵瓦亭見利而後動懐敏不能用其言遂以敗死劉渙知滄州杖一卒不服渙命斬之以聞坐專殺降知宻州君上書為渙論直得復知滄州范文正公常薦君材可以居館閣召試不用遂知懐州至期月大治是時天子用范文正公與今觀文殿學士富公武康軍節度使韓公欲更置天下事而權倖小人不便三公皆罷去而師魯與時賢士多被誣枉得罪君歎息憂悲發憤以謂生可厭而死可樂也往往被酒哀歌泣下朋友皆竊怪之已而以疾卒享年五十至和元年十有二月十三日其子材塟君于河南府夀安縣甘泉鄉龍洲里其平時所為文章六十篇皆行于世男四人曰材植機杼嗚呼師魯常勞其智於事物而卒蹈憂患以窮死若子漸者曠然不有累其心而無所屈其志然其夀考近以不長豈其所謂短長得失者皆非此之謂歟其所以然者不可得而知歟銘曰有韞于中不以施一憤樂死其如歸豈其志之将衰不然世果可嫉其如斯湖州長史蘇君墓誌銘悲咽故湖州長史蘇君有賢妻杜氏自君之喪布衣蔬食居數嵗提君之孤子斂其平生文章走南京號泣于其父曰吾夫屈于生猶可伸于死其父太子太師以告於予予為集次其文而序之以著君之大節與其所以屈伸得失以深誚世之君子當為國家樂育賢材者且悲君之不幸其妻卜以嘉祐元年十月某日塟君于潤州丹徒縣義里鄉檀山里石門村又號泣於其父曰吾夫屈于人間猶可伸于地下於是杜公及君之子泌皆以書來乞銘以𦵏君諱舜欽字子美其上世居蜀後徙開封為開封人自君之祖諱易簡以文章有名太宗時承㫖翰林為學士㕘知政事官至禮部侍郎父諱耆官至工部郎中直集賢院君少以父廕補太廟齋郎調滎陽尉非所好也已而鎖其㕔去舉進士中第改光禄寺主簿知䝉城縣丁父憂服除知長垣縣遷大理評事監在京樓店務君状貎竒偉慷慨有大志少好古工為文章所至皆有善政官于京師位雖卑數上疏論朝廷大事敢道人之所難言范文正公薦君召試得集賢挍理自元昊反兵出無功而天下殆於乆安尤困兵事天子奮然用三四大臣欲盡革衆弊以紓民於是時范文正公與今富丞相多所設施而小人不便頋人主方信用思有以撼動未得其根以君文正公之所薦而宰相杜公壻也乃以事中君坐監進奏院祠神奏用市故紙錢會客為自盜除名君名重天下所會客皆一時賢俊悉坐貶逐然後中君者喜曰吾一舉網盡之矣其後三四大臣繼罷去天下事卒不復施為君携妻子居蘇州買水石作滄浪亭日益讀書大􅇽肆於六經而時發其憤懣於歌詩至其所激往往驚絶又喜行草書皆可愛故其雖短章醉墨落筆爭為人所傳天下之士聞其名而慕見其所傳而喜往揖其貎而竦聽其論而驚以服久與其居而不能捨以去也居數年復得湖州長史慶厯八年十二月某日以疾卒于蘇州享年四十有一君先娶鄭氏後娶杜氏三子長曰泌将作監主簿次曰液曰激二女長適前進士趙紘次尚㓜初君得罪時以奏用錢為盜無敢辯其冤者自君卒後天子感悟凡所被逐之臣復召用皆顯列于朝而至今無復為君言者宜其欲求伸於地下也宜予述其得罪以死之詳而使後世知其有以也既又長言以為之辭庶㡬并寫予之所以哀君者其辭曰謂為無力兮孰擊而去之謂為有力兮胡不反子之歸豈彼能兮此不為善百譽而不進兮一毁終世以顛擠荒孰問兮杳難知嗟子之中兮有韞而無施文章發耀兮星日光輝雖㝠㝠以掩恨兮宜昭昭其永垂徂徠石先生墓誌銘徂徠先生姓石氏名介字守道兖州奉符人也徂徠魯東山而先生非隱者也其仕嘗位于朝矣魯之人不稱其官而稱其徳以為徂徠魯之望先生魯人之所尊故因其所居山以配其有徳之稱曰徂徠先生者魯人之志也先生貎厚而氣完學篤而志大雖在畎畆不忘天下之憂以謂時無不可為為之無不至不在其位則行其言吾言用功利施於天下不必出乎已吾言不用雖獲禍咎至死而不悔其遇事發憤作為文章極陳古今治亂成敗以指切當世賢愚善惡是是非非無所諱忌世俗頗駭其言由是謗議喧然而小人尤嫉惡之相與出力必擠之死先生安然不惑不變曰吾道固如是吾勇過孟軻矣不幸遇疾以卒既卒而姦人有欲以竒禍中傷大臣者猶指先生以起事謂其詐死而北走契丹矣請發棺以驗賴天子仁聖察其誣得不發棺而保全其妻子先生世為農家父諱丙始以仕進官至太常博士先生年二十六舉進士甲科為鄆州觀察推官南京留守推官御史臺辟主簿未至以上書論赦罷不召秩滿遷某軍節度掌書記代其父官于蜀為嘉州軍事判官丁内外艱去官垢面跣足躬耕徂徠之下塟其五世未𦵏者七十喪服除召入國子監直講是時兵討元昊乆無功海内重困天子奮然思欲振起威徳而進退二三大臣增置諫官御史所以求治之意甚鋭先生躍然喜曰此盛事也雅頌吾職其可已乎乃作慶厯聖徳詩以褒貶大臣分别邪正累數百言詩出太山孫明復曰子禍始於此矣明復先生之師友也其後所謂姦人作竒禍者乃詩之所斥也先生自閒居徂徠後官于南京嘗以經術教授及在大學益以師道自居門人弟子從之者甚衆太學之興自先生始其所為文章曰某集者若干巻其斥佛老時文則有怪説中國論曰去此三者然後可以有為其戒姦臣宦女則有唐鑑曰吾非為一世監也其餘喜怒哀樂必見於文其辭博辯雄偉而憂思深逺其為言曰學者學為仁義也惟忠能忘其身信篤於自信者乃可以力行也以是行於已亦以是教於人所謂堯舜禹湯文武周公孔子孟軻揚雄韓愈氏者未嘗一日不誦於口思與天下之士皆為周孔之徒以致其君為堯舜之君民為堯舜之民亦未嘗一日少忘於心至其違世驚衆人或笑之則曰吾非狂癡者也是以君子察其行而信其言推其用心而哀其志先生直講嵗餘杜祁公薦之天子拜太子中允今丞相韓公又薦之乃直集賢院又嵗餘始去太學通判濮州方待次于徂徠以慶厯五年七月某日卒于家享年四十有一友人廬陵歐陽修哭之以詩以謂待彼謗熖熄然後先生之道明矣先生既沒妻子凍餒不自勝今丞相韓公與河陽富公分俸買田以活之後二十一年其家始克𦵏先生于某所将葬其子師訥與其門人姜潜杜黙徐遁等來告曰謗焰熄矣可以發先生之光矣敢請銘某曰吾詩不云乎子道自能久也何必吾銘遁等曰雖然魯人之欲也乃為之銘曰徂徠之巖巖與子之徳兮魯人之所瞻汶水之湯湯與子之道兮逾逺而彌長道之難行兮孔孟亦云遑遑一世之屯兮萬世之光曰吾不有命兮安在夫桓魋與臧倉自古聖賢皆然兮噫子雖毁其何傷唐荆川曰此文極其變化故覇州文安縣主簿蘇君墓誌銘有蜀君子曰蘇君諱洵字明允眉州眉山人也君之行義修于家信於鄉里聞於蜀之人久矣當至和嘉祐之間與其二子軾轍偕至京師翰林學士歐陽修得其所著書二十二篇獻諸朝書既出而公卿士大夫爭傳之其二子舉進士皆在高等亦以文學稱于時眉山在西南數千里外一日父子隱然名動京師而蘇氏文章遂擅天下君之文博辯宏偉讀者悚然想見其人既見而温温似不能言及即之與居愈久而愈可愛間而出其所有愈叩而愈無窮嗚呼可謂純明篤實之君子也曾祖諱祐祖諱杲父諱序贈尚書職方員外郎三世皆不顯職方君三子曰澹曰渙皆以文學舉進士而君少獨不喜學年已壮猶不知書職方君縱而不問鄉閭親族皆怪之或問其故職方君笑而不答君亦自如也年二十七始大發憤謝其素所往來少年閉户讀書為文辭嵗餘舉進士再不中又舉茂才異等不中退而歎曰此不足為吾學也悉取所為文數百篇焚之益閉户讀書絶筆不為文辭者五六年乃大究六經百家之説以考質古今治亂成敗聖賢窮達出處之際得其粹精涵畜充溢抑而不發乆之慨然曰可矣由是下筆頃刻數千言其縱横上下出入馳驟必造於深微而後止葢其禀也厚故發之遲志也慤故得之精自來京師一時後生學者皆尊其賢學其文以為師法以其父子俱知名故號老蘇以别之初修為上其書召試紫微閣辭不至遂除試秘書省挍書郎會太常修纂建隆以來禮書乃以為霸州文安縣主簿使食其禄與陳州項城縣令姚闢同修禮書為太常因革禮一百巻書成方奏未報而君以疾卒實治平三年四月戊申也享年五十有八天子聞而哀之特贈光禄寺丞敇有司具舟載其喪歸於蜀君娶程氏大理寺丞文應之女生三子曰景先早卒軾今為殿中丞直史館轍權大名府推官三女皆早卒孫曰邁曰遲有文集二十巻諡法三巻君善與人交急人患難死則䘏養其孤鄉人多徳之葢晩而好易曰易之道深矣汨而不明者諸儒以附會之説亂之也去之則聖人之㫖見矣作易傳未成而卒治平四年十月壬申塟于彭山之安鎮鄉可龍里君生於逺方而學文晩成常歎曰知我者惟吾父與歐陽公也然則非余誰宜銘銘曰蘇顯唐世實欒城人以宦留眉蕃蕃子孫自其高曾鄉里稱仁偉歟明允大發於文亦既有文而又有子其存不朽其嗣彌昌嗚呼明允可謂不亡蔡君山墓誌銘情詞嗚咽予友蔡君謨之弟曰君山為開封府太康主簿時予與君謨皆為館閣挍勘居京師君山數往來其兄家見其以縣事決於其府府尹吳遵路素剛好以嚴憚下吏君山年少位卑能不懾屈而得盡其事之詳吳公獨喜以君山為能予始知君山敏於為吏而未知其他也明年君謨南歸拜其親夏京師大疫君山以疾卒于縣其妻程氏一男二女皆㓜縣之人哀其貧以錢二百千為其賻程氏泣曰吾家素以廉為吏不可以此汚吾夫拒而不受於是又知君山能以恵愛其縣人而以廉化其妻妾也君山閒嘗語予曰天子以六科策天下士而學者以記問應對為事非古取士之意也吾獨不然乃晝夜自苦為學及其亡也君謨發其遺藁得十數萬言皆當世之務其後踰年天子與大臣講天下利害為條目其所改更於君山之藁十得其五六於是又知君山果天下之竒才也君山景祐中舉進士初為長谿縣尉縣媪二子漁於海而亡媪指某氏為仇告縣捕賊縣吏難之皆曰海有風波豈知其不水死乎且雖果為仇所殺若屍不得則於法不可理君山獨曰媪色有寃吾不可不為理乃陰察仇家得其迹與媪約曰吾與汝宿海上期十日不得屍則為媪受捕賊之責凡宿七日海水潮二屍浮而至驗之皆殺也乃捕仇家伏法民有夫婦偕出而盜殺其守舎子者君山亟召里民畢會環坐而熟視之指一人曰此殺人者也訊之果伏衆莫知其以何術得也長谿人至今喜道君山事多如此曰前史所載能吏號如神明不過此也自天子與大臣條天下事而屢下舉吏之法尤欲官無小大必得其材方求天下能吏而君山死矣此可為痛惜者也君山諱高享年二十有八以某年某月某日卒今年君謨又歸迎其親自太康取其柩以歸将以某年某月某日葬於某所且謂予曰吾兄弟始去其親而來京師欲以仕宦為親榮今幸還家吾弟獨以柩歸甚矣老者之愛其子也何以塞吾親之悲子能為我銘君山乎乃為之銘曰嗚呼吾聞仁義之行于天下也可使父不哭子老不哭㓜嗟夫君山不得其夀父母七十扶行送柩退之有言死孰謂夭子墓予銘其傳不朽庶㡬以此慰其父母梅聖俞墓誌銘通篇以詩為案嘉祐五年京師大疫四月乙亥聖俞得疾卧城東汴陽坊明日朝之賢士大夫往問疾者騶呼屬路不絶城東之人市者廢行者不得往來咸驚頋相語曰兹坊所居大人誰邪何致客之多也居八日癸未聖俞卒於是賢士大夫又走弔哭如前日益多而其尤親且舊者相與聚而謀其後事自丞相以下皆有以賻䘏其家粤六月甲申其孤增載其柩南歸以明年正月丁丑塟于宣州陽城鎮雙歸山聖俞字也其名堯臣姓梅氏宣州宣城人也自其家世頗能詩而從父詢以仕顯至聖俞遂以詩聞自武夫貴戚童兒野叟皆能道其名字雖妄愚人不能知詩義者直曰此世所貴也吾能得之用以自矜故求者日踵門而聖俞詩遂行天下其初喜為清麗閒肆平淡乆則涵演深逺間亦琢刻以出怪巧然氣完力餘益老以勁其應於人者多故辭非一體至於他文章皆可喜非如唐諸子號詩人者僻固而狹陋也聖俞為人仁厚樂易未嘗忤於物至其窮愁感憤有所罵譏笑謔一發於詩然用以為驩而不怨懟可謂君子者也初在河南王文康公見其文嘆曰二百年無此作矣其後大臣屢薦宜在館閣嘗一召試賜進士出身餘輒不報嘉祐元年翰林學士趙槩等十餘人列言于朝曰梅某經行修明願得留與國子諸生講論道徳作為雅頌以歌詠聖化乃得國子監直講三年冬祫于太廟御史中丞韓絳言天子且親祠當更制樂章以薦祖考惟梅某為宜亦不報聖俞初以從父廕補太廟齋郎歴桐城河南河陽三縣主簿以徳興縣令知建徳縣又知襄城縣監湖州鹽税簽署忠武鎮安兩軍節度判官監永濟倉國子監直講累官至尚書都官員外郎嘗奏其所撰唐載二十六巻多補正舊史闕繆乃命編修唐書書成未奏而卒享年五十有九曾祖諱逺祖諱邈皆不仕父諱讓太子中舎致仕贈職方郎中母曰仙遊縣太君束氏又曰清河縣太君張氏初娶謝氏封南陽縣君再娶刁氏封某縣君子男五人曰增曰墀曰垌曰龜兒一早卒女二人長適太廟齋郎薛通次尚㓜聖俞學長于毛氏詩為小傳二十巻其文集四十巻注孫子十三篇余嘗論其詩曰世謂詩人少達而多窮葢非詩能窮人殆窮者而後工也聖俞以為知言銘曰不戚其窮不困其鳴不躓于艱不履于傾養其和平以發厥聲震越渾鍠衆聴以驚以揚其清以播其英以成其名以告諸㝠唐荆川曰一準貞曜誌唐宋八大家文鈔巻五十六
