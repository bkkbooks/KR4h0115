body:
  text: 唐宋八大家文鈔卷七十五明茅坤撰廬陵史鈔十五雜傳皇甫暉傳皇甫暉本驍悍反覆而歐公㸃次殊覺風神獨鬯令人覽其傳則怒目裂眦起矣皇甫暉魏州人也為魏軍卒戍瓦橋關嵗滿當代歸而留屯貝州是時唐莊宗已失政天下離心暉為人驍勇無賴夜博軍中不勝乃與其徒謀為亂刼其都將楊仁晟曰唐能破梁而得天下者以先得魏而盡有河北之兵也魏軍甲不去體馬不解鞍者十餘年今天下已定而天子不念魏軍久戍之勞去家咫尺不得相見今將士思歸不可遏公當與我俱行不幸天子怒吾軍則坐據一州足以起事仁晟曰公等何計之過也今英主在上天下一家精甲鋭兵不下數十萬公等各有家屬何故出此不祥之言軍士知不可強遂斬之推一小挍為主不從又斬之乃攜二首以詣禆將趙在禮在禮從之乃夜焚貝州以入于魏在禮以暉為馬步軍都指揮使暉擁甲士數百騎大掠城中至一民家問其姓曰姓國暉曰吾當破國遂盡殺之又至一家問其姓曰姓萬暉曰吾殺萬家足矣又盡殺之及明宗入魏遂與在禮合謀莊宗之禍自暉始明宗即位暉自軍卒擢拜陳州刺史終唐世常為刺史晉天福中以衛將軍居京師在禮已秉旄節罷鎮来朝暉徃候之曰與公俱起甘陵卒成大事然由我發也公今富貴能䘏我乎不然禍起坐中在禮懼遽出器幣數千與之而飲以酒暉飲自若不謝而去久之為密州刺史契丹犯闕暉率其州人奔於江南李景以為歙州刺史奉化軍節度使鎮江州周師征淮景以暉為北面行營應援使屯清流關為周師所敗并其都監姚鳯皆被擒世宗召見暉金瘡被體哀之賜以金帶鞍馬後數日卒拜鳯左屯衛將軍王進傳王進幽州良鄉人也為人勇悍走及奔馬少聚徒為盜鄉里患之符彦超遣人以賂招置麾下彦超鎮安逺軍軍中有變遣進馳奏京師明宗怪其来速嘉其足力以隷寧衛指揮漢高祖為侍衛親軍指揮使以進為軍校高祖鎮河東因以之從每有急遣進馳至京師徃返不過五六日由是愈親愛之累遷奉國軍都指揮使從周太祖起魏遷虎捷右廂都指揮使歴汝鄭二州防禦使彰徳軍節度使顯徳初以疾卒贈太師嗚呼予述舊史至於王進之事未嘗不廢書而歎曰甚哉五代之君皆武人崛起其所與皆勇夫悍卒各裂土地封侯王何異豺狼之牧斯人也雖其附託遭遇出於一時之幸然猶必皆横身陣敵非有百夫之勇則必一日之勞至如進者徒以疾足善走而秉旄節何其甚歟豈非名器之用隨世而輕重者歟世治則君子居之而重世亂則小人易得而輕歟抑因縁僥倖未始不有而尤多於亂世既其極也遂至於是歟豈其尤有甚於是者歟當此之時為國長者不過十餘年短者三四年至一二年天下之人視其上易君代國如更戍長無異蓋其輕如此况其下者乎如進等者豈足道哉易否泰消長君子小人常相上下視在上者如進等則其在下者可知矣予書進事所以哀斯人之亂而見當時賢人君子之在下者可勝道哉可勝道哉范延光傳范延光為人多方略所厯生平亦多反覆歐陽公㸃次如畫而二千餘言如一句范延光字子瓌相州臨漳人也唐明宗為節度使置延光麾下而未之奇也明宗破鄆州梁兵方扼楊劉其先鋒將康延孝隂送款於明宗明宗求可以通延孝款於莊宗者延光輒自請行乃懐延孝蠟丸書西見莊宗致之且曰今延孝雖有降意而梁兵扼楊劉者甚盛未可圖也不如築壘馬家口以通汶陽莊宗以為然壘成梁遣王彦章急攻新壘明宗使延光間行求兵夜至河上為梁兵所得送京師下延光獄搒掠數百脅以白刃延光終不肯言晉事繫之數月稍為獄吏所䕶莊宗入汴獄吏去其桎梏拜而出之莊宗見延光喜拜檢挍工部尚書明宗時為宣徽南院使明宗行幸汴州至滎陽朱守殷反延光曰守殷反迹始見若緩之使得為計則城堅而難近故乗人之未備者莫若急攻臣請騎兵五百馳至城下以神速駭之乃以騎兵五百自暮疾馳至半夜行二百里戰于城下遲明明宗亦馳至汴兵望見天子乗輿乃開門而延光先入猶巷戰殺傷甚衆守殷死汴州平明年遷樞密使出為成徳軍節度使安重誨死復召延光與趙延壽並為樞密使明宗問延光馬數幾何對曰騎軍三萬五千明宗撫髀嘆曰吾居兵間四十年自太祖在太原時馬數不過七千莊宗取河北與梁家戰河上馬纔萬匹今有馬三萬五千匹而不能一天下吾老矣馬多奈何延光因曰臣嘗計一馬之費可養步卒五人三萬五千疋馬十五萬兵之食也明宗曰肥戰馬而瘠吾人此吾所愧也夏州李仁福卒其子彜超自立而邀旄節明宗遣安重進代之彛超不受代以兵攻之久不克隰州刺史劉遂凝馳驛入見獻䇿言綏銀二州之人皆有内嚮之意請除二刺史以招降之延光曰王師問罪本在彜超夏州已破綏銀豈足顧哉若不破夏州雖得綏銀不能守也遂凝又請自馳入説彜超使出降延光曰一遂凝萬一失之不足惜所惜者朝廷大體也是時王淑妃用事遂凝兄弟與淑妃有舊方倚以䝉恩寵所言無不聽而大臣以妃故多不敢爭獨延光從容沮止之明宗有疾不能視朝京師之人詾詾異議藏竄山谷或寄匿於軍營有司不能禁或勸延光以嚴法制之延光曰制動當以靜宜少待之已而明宗疾少間京師乃定是時秦王握兵驕甚宋王弱而且在外議者多屬意於潞王延光懼禍之及也乃求罷去延壽隂察延光有避禍意亦遽求罷明宗再三留之二人辭益懇至繼之以泣明宗不得已乃皆罷之延光復鎮成徳軍用朱宏昭馮贇為樞密使已而秦王舉兵見誅明宗崩潞王反弑愍帝唐室大亂宏昭贇皆及禍以死末帝復召延光為樞密使拜宣武軍節度使天雄軍亂逐節度使劉延晧遣延光討平之即以為天雄軍節度使延光嘗夢大蛇自臍入其腹半入而掣去之以問門下術士張生張生贊曰蛇龍類也龍入腹中王者之兆也張生自延光㣲時言其必貴延光素神之常置門下言事輒中遂以其言為然由是頗畜異志當晉高祖起太原末帝遣延光以兵二萬屯遼州與趙延壽犄角既而延壽先降延光獨不降高祖即位延光賀表又頗後諸侯至又其女為末帝子重美妃以此遂懐反側高祖封延光臨清王以慰其心有平山人祕瓊者為成徳軍節度使董温其衙内指揮使後温其為契丹所虜瓊乃悉殺温其家族瘞之一穴而取其家貲鉅萬計晉高祖入立以瓊為齊州防禦使橐其貲裝道出于魏延光隂遣人以書招之瓊不納延光怒選精兵伏境上伺瓊過殺之于夏津悉取其貲以戍邏者悮殺聞由是高祖疑其必為亂乃幸汴州天福二年六月延光遂反遣其牙將孫鋭澶州刺史馮暉以兵二萬距黎陽掠滑衛高祖以楊光逺為招討使引兵自滑州渡胡梁攻之鋭輕脱無謀兵行以娼女十餘自隨張蓋操扇酣歌飲食自若軍士苦大熱皆不為用光逺得其諜者詢得其謀誘鋭等渡河半濟而擊之兵多溺死鋭暉退走入魏閉壁不復出初延光反意未決而得暴疾不能興鋭乃隂召暉入城迫延光反延光惶惑遂從之高祖聞延光用鋭等以反笑曰吾雖不武然嘗從明宗取天下攻堅破彊多矣如延光已非我敵况鋭等兒戲耶行取孺子爾乃決意討之延光初無必反意及鋭等敗延光遣牙將王知新齎表自歸高祖不見以知新屬武徳司延光又附楊光逺表請降不報延光遂堅守晉以箭書二百射城中悉赦魏人募能斬延光者然魏城堅難下攻之逾年不克師老糧匱宗正丞石昂上書極諫請赦延光願以單車入説而降之髙祖亦悔悟三年九月使謁者入魏赦延光延光乃降冊封東平郡王天平軍節度使賜鐵券居數月来朝因慙請老以太子太師致仕初髙祖赦降延光語使者謂之曰許卿不死矣若降而殺之何以享國延光謀於副使李式式曰主上敦信明義許之不死則不死矣乃降及致仕居京師歳時晏見髙祖待之與羣臣無間然心終不欲使在京師歳餘使宣徽使劉處讓載酒夜過延光謂曰上遣處讓来時適有契丹使至北朝皇帝問晉魏博叛臣何在恐晉不能制當鎖以来免為中國後患延光聞之泣下莫知所為處讓曰當且之洛陽以避契丹使者延光曰楊光逺留守河南吾之仇也吾有田宅在河陽可以徃乎處讓曰可也乃挈其帑歸河陽其行輜重盈路光逺利其貲果圖之因奏曰延光反覆姦臣若不圖之非北走胡則南走吴越請拘之洛陽髙祖猶豫未決光逺兼鎮河陽其子承勲知州事乃遣承勲以兵脅之使自裁延光曰天子賜我鐵券許之不死何得及此乃以壯士驅之上馬行至浮橋推墮水溺死以延光自投水死聞因盡取其貲髙祖以適㑹其意不問為之輟朝贈太師水運軍使曹千獲其流尸于繆家灘詔許歸葬相州已葬墓輒崩破其棺槨頭顱皆碎初秘瓊殺董温其取其貲延光又殺瓊而取之而終以貲為光逺所殺而光逺亦不能免也當延光反時有李彦珣者為河陽行軍司馬張從賓反河陽彦珣附之從賓敗彦珣奔于魏延光以為步軍都監使之守城招討使楊光逺知彦珣邢州人也其母尚在乃遣人之邢州取其母至城下示彦珣以招之彦珣望見自射殺之及延光出降晉髙祖拜彦珣房州刺史大臣言彦珣殺母當誅髙祖以謂赦令已行不可失信後以坐贓誅嗚呼甚哉人性之慎於習也故聖人之於仁義深矣其為教也勤而不怠緩而不迫欲民漸習而自趨之至於乆而安以成俗也然民之無知習見善則安於為善習見惡則安於為惡五代之亂其来逺矣自唐之衰干戈饑饉父不得育其子子不得養其親其始也骨肉不能相保蓋出於不幸因之禮義日以廢恩愛日以薄其習久而遂以大壊至於父子之間自相賊害五代之際其禍亂不可勝道也夫人情莫不共知愛其親莫不共知惡於不孝然彦珣彎弓射其母髙祖從而赦之非徒彦珣不自知為大惡而髙祖亦安馬不以為怪也豈非積習之久而至於是歟語曰性相近習相逺至其極也使人心不若禽獸可不哀哉若彦珣之惡而恬然不以為怪則晉出帝之絶其父宜其舉世不知為非也安重榮傳序次縱横節奏一一中彀安重榮小字鐵胡朔州人也祖從義利州刺史父全勝州刺史振武馬步軍都指揮使重滎有力善騎射為振武巡邊指揮使晉髙祖起太原使張頴隂招重榮其母與兄皆以為不可而重榮業以許頴母兄謀共殺穎以止之重榮曰未可吾當為母卜之乃立一箭百步而射之曰石公為天子則中一發輒中又立一箭而射之曰吾為節度使則中一發又中其母兄乃許重榮以巡邊千騎叛入太原髙祖即位拜重榮成徳軍節度使重榮雖武夫而曉吏事其下不能欺有夫婦訟其子不孝者重榮拔劍授其父使自殺之其父泣曰不忍也其母從傍詬罵奪其劍而逐之問之乃繼母也重榮叱其母出從後射殺之重榮起於軍卒暴至富貴而見唐廢帝晉高祖皆以藩侯得國嘗謂人曰天子寧有種耶兵强馬壯者為之爾雖懐異志而未有以發也是時髙祖與契丹約為父子契丹驕甚髙祖奉之愈謹重榮憤然以謂詘中國以尊夷狄困已弊之民而充無厭之欲此晉萬世恥也數以此非誚髙祖契丹使者徃来過鎮州重榮箕踞慢罵不為之禮或執殺之是時吐渾白氏役屬契丹苦其暴虐重榮誘之入塞契丹數遣使責髙祖并求使者髙祖對使者鞠躬俯首受責愈謹多為好辭以自解而姑息重榮不能詰乃遣供奉官張澄以兵二千搜索并鎮忻代山谷中吐渾悉驅出塞吐渾去而復来重榮卒納之因招集亡命課民種稗食馬萬匹所為益驕因怒殺指揮使賈章誣之以反章女尚幼欲捨之女曰吾家三十口皆死於兵存者特吾與父爾今父死吾何忍獨生願就死遂殺之鎮人於是髙賈女之烈而知重榮之必敗也重榮既僣侈以為金魚袋不足貴刻玉為魚佩之娶二妻髙祖因之並加封爵天福六年夏契丹使者拽剌過鎮重榮侵辱之拽剌言不遜重榮怒執拽剌以輕騎掠幽州南境之民處之博野乃上表曰臣昨據熟吐渾白承福赫連功徳等領本族三萬餘帳自應州来奔又據生吐渾渾契苾兩􅊳厥三部南北將沙陀安慶九府等各領其族牛羊車帳甲馬七八路来奔其言契丹殘虐掠取生口羊馬自今年二月已後號令諸蕃㸃閲强壯辦具軍裝期以上秋南向諸蕃部誠恐上天不祐敗滅家族願先自歸其諸部勝兵衆可十萬又據㳂河党項山前後逸越利諸族首領皆遣人送契丹所授告身職牒旗幟來歸欵皆號泣告勞願治兵甲以報怨又據朔州節度副使趙崇殺節度使劉山以城来降竊以諸蕃不招呼而自至朔州不攻伐而自歸雖繫人情盡由天意又念陷蕃諸將等本自勲勞久居富貴喪身虜塞酷虐不勝企足朝廷思歸可諒茍聞傳檄必盡倒戈其表數千言又為書以遺朝廷大臣四方藩鎮皆以契丹可取為言髙祖患之為之幸鄴報重榮曰前世與虜和親皆所以為天下計今吾以天下臣之爾以一鎮抗之大小不等無自辱焉重榮謂晉無如我何反意乃決重榮雖以契丹為言反隂遣人與幽州節度使劉晞相結契丹亦利晉多事幸重榮之亂期兩敝之欲因以窺中國故不加怒於重榮重榮將反也其母又以為不可重榮曰請為母卜之指其堂下旛竿龍口仰射之曰吾有天下則中之一發而中其母乃許饒陽令劉巖獻水鳥五色重榮曰此鳯也畜之後潭又使人為大鐵鞭以獻誑其民曰鞭有神指人人輒死號鐵鞭郎君出則以為前驅鎮之城門抱關鐵胡人無故頭自落鐵胡重榮小字雖甚惡之然不悟也其冬安從進反襄陽重榮聞之乃亦舉兵是嵗鎮州大旱蝗重榮聚飢民數萬驅以嚮鄴聲言入覲行至宗城破家堤髙祖遣杜重威逆之兵已交其將趙彦之與重榮有隙臨陣巻旗以奔晉軍其鎧甲鞍轡皆裝以銀晉軍不知其来降争殺而分之重榮聞彦之降晉大懼退入于輜重中其兵二萬皆潰去是冬大寒潰兵飢凍及見殺無孑遺重榮獨與十餘騎奔還以牛馬革為甲驅州人守城以待重威兵至城下重榮禆將自城東水碾門引官軍以入殺守城二萬餘人重榮以吐渾數百騎守牙城重威使人擒之斬首以獻髙祖御樓受馘命漆其首送于契丹改成徳軍為順徳鎮州曰恒州常山曰恒山云李守貞傳李守貞河陽人也晉髙祖鎮河陽以為客將其後常從髙祖髙祖即位拜客省使監馬全節軍破李金全於安州以功拜宣徽使出帝即位楊光逺反召契丹入寇守貞領義成軍節度使為侍衛親軍都虞侯從出帝幸澶州麻答以奇兵入鄆州渡馬家口柵於河東守貞馳徃破之契丹兵多溺死獲馬數百匹禆將七十餘人徙領泰寧軍節度使以兵二萬討之光逺降其故吏宋顔悉取光逺寳貨名姬善馬獻之守貞守貞徳之隂置顔麾下是時凡出師破賊必有徳音赦其餘類而光逺黨與十餘人皆亡命捕之甚急樞密使桑維翰緩其制書久而不下言事者告顔匿守貞所詔取顔殺之守貞大怒乃與維翰有隙賊平行賞守貞悉以黦茶染木給之軍中大怒以帛褁之為人首梟於木間曰守貞首也守貞以功拜同平章事賜以光逺舊第守貞取旁官民舍大治之為京師之甲出帝臨幸燕錫恩禮出於諸將契丹入寇出帝再幸澶州杜重威為北面招討使守貞為都監晉兵素驕而守貞重威為將皆無節制行營所至居民豢圉一空至於草木皆盡其始發軍也有賜賚曰掛甲錢及班師又加賞勞曰卸甲錢出入之費常不下三十萬由此晉之公私重困守貞與重威等攻下秦州破滿城殺二千餘人還為侍衛親軍都指揮使領天平軍節度使又領歸徳是時出帝遣人以書招趙延壽使歸國延壽詐言思歸願得晉兵為應而契丹髙牟翰亦詐以瀛州降出帝以為然命杜重威等將兵應之初晉大臣皆言重威不忠有怨望之心不可用乃用守貞是時重威鎮魏州守貞嘗將兵徃来過魏重威待之甚厚多以戈甲金帛奉之出帝嘗謂守貞曰卿嘗以家財散士卒可謂忠於國者乎守貞謝曰皆重威與臣者因請與重威俱北於是卒以重威為招討使守貞為都監屯於武疆契丹寇鎮定守貞等軍于中渡遂與重威降于契丹契丹以守貞為司徒契丹犯京師拜守貞天平軍節度使漢髙祖入京師守貞来朝拜太保河中節度使髙祖崩杜重威死守貞懼不自安以謂漢室新造隠帝初立天下易以圖而門下僧總倫以方術隂干守貞為言有非常之相守貞乃決計反而趙思綰先以京兆反遣人以赭黄衣遺守貞守貞大喜以為天人皆應乃發兵西據潼關招誘草寇所在竊發漢遣白文珂常思等出軍擊之已而王景崇又以鳯翔反景崇與思綰遣人推守貞為秦王守貞拜景崇等官爵又遣人間以蠟丸書遺吳蜀契丹使出兵以牽漢文珂等攻景崇思綰久無功隠帝乃遣樞密使郭威率禁兵將文珂等督攻之諸將皆請先擊思綰景崇威計未知所向行至華州節度使扈彦珂謂威曰三叛連衡以守貞為主守貞先敗則思綰景崇可傳聲而破矣若捨近圗逺使守貞出兵于後思綰景崇拒戰于前則漢兵屈矣威以為然遂先擊守貞是時馮道罷相居河陽威初出兵過道家問䇿道曰君知博乎威少無賴好蒱博以為道譏之艴然而怒道曰凡博者錢多則多勝錢少則多敗非其不善博所以敗者勢也今合諸將之兵以攻一城較其多少勝敗可知威意大悟謀以遲久困之乃與諸將分為三柵柵其城三面而闕其南發五縣丁夫築長城以連三柵守貞出兵壊長城威輒補其所壊守貞輒出爭之守貞兵常失十三四如此逾年守貞城中兵無幾而食又盡殺人而食威曰可矣乃為期日督兵四面攻而破之初守貞召總倫問以濟否總倫曰王當自有天下然分野方災俟殺人垂盡則王事濟矣守貞以為然嘗㑹將吏大飲守貞指畫虎圖曰吾有天命者中其掌引弓一發中之將吏皆拜賀守貞益以自負及城破守貞與妻子自焚漢軍入城於煙燼中斬其首傳送京師梟於南市其餘黨皆磔之唐宋八大家文鈔巻七十五
