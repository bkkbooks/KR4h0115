body:
  text: 唐宋八大家文鈔巻一百二十三明茅坤撰東坡文鈔七狀諫買浙燈狀長公當時特借買燈一事以探神宗之心已而亦深相知特為荆公所擠耳臣嚮蒙召對便殿親奉德音以為凡在館閣皆當為深思治亂指陳得失無有所隠者自是以來臣毎見同列未嘗不為道陛下此語非獨以稱頌盛德亦欲朝廷之間如臣等輩皆知陛下不以疎賤間廢其言共獻所聞以輔成太平之功業然竊謂空言率人不如有實而人自勸欲知陛下能受其言之實莫如以臣試之故臣願以身先天下試其小者上以補助聖明之萬一下以為賢者卜其可否雖以此獲罪萬死無悔臣伏見中使傳宣下府市司買浙燈四千餘盞有司具實直以聞陛下又令減價收買見以盡數拘收禁止私買以須上令臣始聞之驚愕不信咨嗟累日何者竊謂陛下惜此舉動也臣雖至愚亦知陛下㳺心經術動法堯舜窮天下之嗜慾不足以易其樂盡天下之玩好不足以觧其憂而豈以燈為悅者哉此不過以奉二宫之歡而極天下之養耳然大孝在乎養志百姓不可戶曉皆謂陛下以耳目不急之玩而奪其口體必用之資賣燈之民例非豪民舉債出息畜之彌年衣食之計望此旬日陛下為民父母唯可添價貴買豈可減價賤酬此事至小體則甚大凡陛下所以減價者非欲以與此小民爭此豪末豈以其無用而厚費也如知其無用何必更索惡其厚費則如勿買且内庭故事毎遇放燈不過令内東門雜物務臨時收買數目既少又無拘收督迫之嚴費用不多民亦無憾故臣願追還前命凡悉如舊京城百姓不慣侵擾恩德已厚怨讟易生可不慎歟可不畏歟近日小人妄造非語士人有展年科塲之說商賈有京城𣙜酒之議吏憂減俸兵憂減廩雖此數事朝廷所決無而此紛紛亦有以見陛下勤恤之德未信于下而有司聚歛之意或形于民方當責已自求以消讒慝之口而臺官又勸陛下以嚴刑悍吏捕而戮之虧損聖德莫大于此而又重以買燈之事使得因縁以為口實臣實惜之方今百冗未除物力凋弊陛下縱出内帑財物不用大司農錢而内帑所儲孰非民力與其平時耗于不急之用曷若留貯以待乏絶之供故臣願陛下將來放燈與凡㳺觀苑囿宴好賜予之類皆飭有司務從儉約頃者詔㫖裁減皇族恩例此實陛下至明至斷所以深計逺慮割愛為民然竊揆其間不能無少望于陛下惟當痛自刻損以身先之使知人主且猶若此而况于吾徒哉非惟省費亦且弭怨昔唐太宗遣使往涼州諷李大亮獻其名鷹大亮不可太宗深嘉之詔曰有臣若此朕復何憂明皇遣使江南採鵁鶄汴州刺史倪若水論之為反其使又令益州織半臂背子琵琶捍撥鏤牙合子等蘇許公不奉詔李德裕在浙西詔造銀盝子粧具二十事織綾二千疋德裕上疏極論亦為罷之使陛下内之臺諫有如此數人者則買燈之事必須力言外之有司有如此數人者則買燈之事必不奉詔陛下聰明睿聖追迹堯舜而羣臣不以唐太宗明皇事陛下竊嘗深咎之臣沗備府寮親見其事若又不言臣罪大矣陛下若赦之不誅則臣又有非職之言大于此者忍不為陛下盡之若不赦亦臣之分也謹録奏聞伏候勑㫖奏浙西災傷第一狀古之救災須喫𦂳先事而慮如此臣聞事豫則立不豫則廢此古今不刋之語也至于救災恤患尤當在早若災傷之民救之於未饑則用物約而所及廣不過寛減上供糶賣常平官無大失而人人受賜今歲之事是也若救之于已饑則用物博而所及㣲至於耗散省倉虧損課利官為一困而已饑之民終於死亡熙寧之事是也熙寧之災傷本縁天旱米貴而沈起張靚之流不先事奏聞但務立賞閉糶富民皆争藏谷小民無所得食流殍既作然後朝廷知之始勑運江西及截本路上供米一百二十三萬石濟之巡門俵米攔街散粥終不能救饑饉既成繼之以疾疫本路死者五十餘萬人城郭蕭條田野丘墟兩稅課利皆失其舊勘㑹熙寧八年本路放稅米一百三十萬石酒課虧滅六十七萬餘貫略計所失共計二百二十餘萬貫石其餘耗散不可悉數至今轉運司貧乏不能舉手此無他不先事處置之過也去年浙西數郡先水後旱災傷不減熙寧然二聖仁智聰明于去年十一月中首發德音截撥本路上供斛㪷二十萬石販濟又于十二月中寛減轉運司元祐四年上供額斛三分之一為米五十餘萬斛盡用其錢買銀絹上供了無一毫虧損縣官而命下之日所在歡呼官既住糶米價自落又自正月開倉糶常平米仍免數路稅務所收五穀力勝錢且賜度牒三百道以助賑濟本路帖然遂無一人餓殍者此無他先事處置之力也由此觀之事豫則立不豫則廢其禍福相絶如此恭惟二聖天地父母之心見民疾苦匍匐救之本不計較費用多少而臣愚魯無識但知權利害之輕重計得䘮之大小以謂譬如民庶之家置庄田招佃客本望租課非行仁義然猶至水旱之歲必須放免欠負借貸種糧者其心誠恐客散而田荒後日之失必倍于今故也而况有天下子萬姓而不計其後乎臣自去歲以來區區獻言屢瀆天聽者實恐陛下客散而田荒也去歲杭州米價毎㪷至八九十自今歲正月以來日漸減落至五六月間浙西數郡大雨不止太湖泛溢所在害稼六月初間米價復長至七月初㪷及百錢足陌見今新米已出而常平官米不敢往糶災傷之勢恐甚于去年何者去年之災如人初病今歲之災如病再發病狀雖同氣力衰耗恐難支持又縁春夏之交雨水調匀浙人喜于豐歲家家典賣舉債出息以事田作車水築圩髙下殆遍計本已重指日待熟而淫雨風濤一舉害之民之窮苦實倍去歲近者將官劉季孫往蘇州按教臣密令季孫沿路體訪季孫還為臣言此數州不獨淫雨為害又多大風駕起朝浪堤堰圩垾率皆破損湖州水入城中民家皆尺餘此去歲所無有也而轉運判官張璹自常潤還所言略同云親見吳江平望八尺聞有舉家田苗没在深水底父子聚哭以船栰撈摝云半米猶堪炒喫青穟且以喂牛正使自今雨止已非豐歲而况止不止又未可知則來歲之憂非復今年之比矣何以言之去年杭州管常平米二十三萬石今年已糶過十五萬石雖餘八萬石而糶賣未巳又縁去年災傷放稅及和糴不行省倉闕數所有上件常平米八萬石只了兌撥充軍糧更無見在惟有糶常平水錢近八萬貫而錢非救饑之物苦來年米益貴錢益輕雖積錢如山終無所用熙寧中兩浙市易出錢百萬緡民無貧富皆得取用而米不可得故曳羅紈帯金玉横尸道上者不可勝計今來浙東西大抵皆糶過常平米見在絶數少熙寧之憂凜凜在人眼中矣臣材力短淺加之衰病而一路生齒憂責在臣受恩既深不敢别乞閑郡日夜思慮求來年救饑之術别無長䇿惟有秋冬之間不惜髙價多糴常平米以備來年出糶今來浙西數州米既不熟而轉運司又管上供年額斛㪷一百五十餘萬石若兩司爭糴米必大貴饑饉愈迫和糴不行來年青黄不交之際常平有錢無米官吏拱手坐視人死而山海之間接連甌閩盜賊結集或生意外之患則誅殛臣等何補于敗以此須至具實聞奏伏望聖慈備録臣奏行下戶部及本路轉運提刑兩路鈐轄司疾早相度來年合與不合凖備常平斛㪷出糶救饑如合凖備即具逐州合用數目臣已約度杭州合用二十萬石仍委逐司擘畫合如何措置令米價不至大段翔湧收糶得足如逐司以謂不須凖備出糶救濟即令各具保明來年委得不至饑殍流亡結罪聞奏縁今來已是入秋去和糴月日無幾比及相度往復取㫖深慮不及于事伏乞詳察速賜指揮臣屢犯天威無任戰慄待罪之至謹録奏聞伏候勑㫖論積欠六事并乞撿㑹應詔四事一處行下狀民困吏弊指畫如掌今之郡縣不可不榜之堂而旦夕誦之臣聞之孔子曰善人教民七年亦可以即戎矣夫民既富而教然後可以即戎古之所謂善人者其不及聖人逺甚今二聖臨御八年于茲仁孝慈儉可謂至矣而帑廩日益困農民日益貧商賈不行水旱相繼以上聖之資而無善人之效臣竊痛之所至訪問耆老有識之士隂求其所以皆曰方今民荷寛政無他疾苦但為積欠所壓如負千鈞而行免于僵仆則幸矣何暇舉首奮臂以營求于一飽之外哉今大姓富家昔日號為無比戶者皆為市易所破十無一二矣其餘自小民已上大率皆有積欠監司督守令守令督吏卒文符日至其門鞭笞日加其身雖有白圭猗頓亦化為蓽門圭竇矣自祖宗已來每有赦令必曰凡欠官物無侵欺盜用及雖有侵盜而本家及伍保人無家業者並與除放祖宗非不知官物失䧟姦民幸免之弊特以民既乏竭無以為生雖加鞭撻終無所得緩之則為姦吏之所蠶食急之則為盜賊之所慿藉故舉而放之則天下恱服雖有水旱盜賊民不思亂此為捐虚名而收實利也自二聖臨御以來每以施舍已責為先務登極赦令毎次郊赦或隨事指揮皆從寛厚凡今所催欠負十有六七皆聖恩所貸矣而官吏刻薄與聖意異舞文巧詆使不該放監司以催欠為職業守令上為監司之所迫下為胥吏之所使大率縣有監催千百家則縣中胥徒舉欣欣然日有所得若一旦除放則此等皆寂寥無獲矣自非有力之家納賂請賕誰肯舉行恩貸而積欠之人皆隣于寒餓何賂之有其間貧困掃地無可蠶食者則縣胥教令通指平人或云衷私擅買抵當物業或雖非衷私而云買不當價似此之類蔓延追擾自甲及乙自乙及丙無有窮已毎限皆空身到官或三五限得一二百錢謂之破限官之所得至㣲而胥徒所取盖無虚日俗謂此等為縣胥食邑戶嗟乎聖人在上使民不得為陛下赤子而皆為姦吏食邑戶此何道也商賈販賣例無現錢若用現錢則無利息須今年索去年所賣明年索今年所賖然後計算得行彼此通濟今富戶先已殘破中民又有積欠誰敢賖賣物貨則商賈自然不行此酒稅課利所以日虧城市房廊所以日空也諸路連年水旱上下共知而轉運司窘于財用例不肯放稅縱放亦不盡實雖無明文指揮而以喜怒風曉官吏孰敢違者所以逐縣例皆拖欠兩稅較其所欠與依實撿放無異于官了無所益而民有追擾鞭撻之苦近者詔㫖凡積欠皆分為十料催納通計五年而足聖恩隆厚何以加此而有司以謂有㫖倚閣者方得依十料指揮餘皆併催縱使盡依十料吏卒乞覔必不肯分料少取人戶既未納足則追擾常在縱分百料與一料同臣頃知杭州又知潁州今知揚州親見兩浙京西淮南三路之民皆為積欠所壓日就窮蹙死亡過半而欠籍不除以至虧欠兩稅走陷課利農末皆病公私並困以此推之天下大率皆然矣臣自潁移揚舟過濠夀楚泗等州所至麻麥如雲臣毎屏去吏卒親入村落訪問父老皆有憂色云豐年不如凶年天災流行民雖乏食縮衣節口猶可以生若豐年舉催積欠胥徒在門枷棒在身則人戶求死不得言訖淚下臣亦不覺流涕又所至城邑多有流民官吏皆云以夏麥既熟舉催積欠故流民不敢歸鄉臣聞之孔子曰苛政猛於虎昔常不信其言以今觀之殆有甚者水旱殺人百倍于虎而人畏催欠乃甚于水旱臣竊度之毎州催欠吏卒不下五百人以天下言之是常有二十餘萬虎狼散在民間百姓何由安生朝廷仁政何由得成乎臣自到任以來日以撿察本州積欠為事内已有條貫除放而官吏不肯舉行者臣即指揮本州一面除放去訖其于理合放而于條未有明文者即且令本州權住催理聽候指揮其于理合放而于條有礙者臣亦未敢住催各具利害奏取聖㫖乞開杭州西湖狀公之兩守錢塘其功業于今猶有存者而其當時所畫一利害毎毎指悉如此臣聞天下所在陂湖河渠之利廢興成毁皆若有數惟聖人在上則興利除害易成而難廢昔西漢之末翟方進為丞相始決壞汝南鴻隙陂父老怨之歌曰壞陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰言者兩黄鵠盖民心之所欲而託之天以為有神下告我也孫皓時吳郡上言臨平湖自漢末草穢壅塞今忽開通長老相傳此湖開天下平皓以為己瑞已而晉武帝平吳由此觀之陂湖河渠之類久廢復開事闗興運雖天地難知而民心所欲天必從之杭州之有西湖如人之有眉目盖不可廢也唐長慶中白居易為刺史方是時湖溉田千餘頃及錢氏有國置撩湖兵士千人日夜開浚自國初以來稍廢不治水涸草生漸成葑田熙寧中臣通判本州則湖之葑合盖十二三耳至今纔十六七年之間遂堙塞其半父老皆言十年以來水淺葑横如雲翳空倐忽便滿更二十年無西湖矣使杭州而無西湖如人去其眉目豈復為人乎臣愚無知竊謂西湖有不可廢者五天禧中故相王欽若始奏以西湖為放生池禁捕魚鳥為人主祈福自是以來毎歲四月八日郡人數萬㑹于湖上所活羽毛鱗介以百萬數皆西北向稽首仰祝千萬歲夀若一旦堙塞使蛟龍魚鼈同為涸轍之鮒臣子坐觀亦何心哉此西湖之不可廢者一也杭之為州本江海故地水泉鹹苦居民零落自唐李泌始引湖水作六井然後民足于水井邑日富百萬生聚待此而後食今湖狹水淺六井漸壞若二十年之後盡為葑田則舉城之人復飲鹹苦其勢必自耗散此西湖之不可廢者二也白居易作西湖石函記云放水溉田毎減一寸可溉十五頃毎一伏時可溉五十頃若蓄洩及時則瀕河千頃可無凶歲今歲不及千頃而下湖數十里間茭菱穀米所獲不貲此西湖之不可廢者三也西湖深濶則運河可以取足于湖水若湖水不足則必取足于江潮潮之所過泥沙渾濁一石五斗不出三歲輒調兵夫十餘萬功開浚而河行市井中盖十餘里吏卒搔擾泥水狼藉為居民莫大之患此西湖之不可廢者四也天下酒稅之盛未有如杭者也歲課二十餘萬緡而水泉之用仰給于湖若湖漸淺狹水不應溝則當勞人逺取山泉歲不下二十萬功此西湖之不可廢者五也臣以侍從出膺寵寄日覩西湖有必廢之漸有五不可廢之憂豈有茍安歲月不任其責輒已差官打量湖上葑田計二十五萬餘丈度用夫二十餘萬功近者伏蒙皇帝陛下太皇太后陛下以本路饑饉特寛轉運司上供額斛五十餘萬石出糶常平米亦數十萬石約勑諸路不取五穀力勝稅錢東南之民所活不可勝計今又特賜本路度牒三百而杭獨得百道臣謹以聖意増價召入中米減價出賣以濟饑民而増減耗折之餘尚得錢米約共一萬餘貫石臣輒以此錢米募民開湖度可得十萬功自今月二十八日興功農民父老縱觀太息以謂二聖既捐利與民活此一方而又以其餘棄興久廢無窮之利使數千人得食其力以度此凶歲盖有泣下者臣伏見民情如此而錢米有限所募未廣葑合之地尚存大半若來者不嗣則前功復棄深可痛惜若更得度牒百道則一舉募民除去浄盡不復遺患矣伏望皇帝陛下太皇太后陛下少賜詳覽察臣所論西湖五不可廢之狀利害較然特出聖斷别賜臣度牒五十道仍勑轉運提刑司于前來所賜諸州度牒二百道内契勘賑濟支用不盡者更撥五十道價錢與臣通成一百道使臣得盡力畢志半年之間目見西湖復唐之舊環三十里際山為岸則農民父老與羽毛鱗介同詠聖澤無有窮已臣不勝大願謹録奏聞伏候勑㫖乞相度開石門河狀此一事予未嘗躬為相度覽睹當時所遺利害而其言自有次若指掌臣謹按史記秦始皇三十六年東游至錢塘臨浙江水波惡乃西去二十里從狹中渡始皇帝以天下之力狥其意意之所欲出赭山橋海無難而獨畏浙江水波惡不敢徑度以此知錢塘江天下之嶮無出其右者臣昔通守此邦今又忝郡寄二十年間親見覆溺無數自溫台明越往來者皆由西興徑度不渉浮山之嶮時有覆舟然尚希少自衢睦處婺宣歙饒信及福建路八州往來者皆出入龍山㳂泝此江江水灘淺必乘潮而行潮自海門東來勢若雷霆而浮山峙于江中與魚捕諸山相望犬牙錯入以亂潮水洄洑激射其怒自倍沙磧轉移狀如鬼神往往于淵潭中湧出陵阜十數里旦夕之間又復失去雖舟師没人不能前知其深淺以故公私坐視覆溺無如之何老弱呌號求救于湍沙之間聲未及終已為潮水巻去行路為之流涕而已縱有勇悍敢往之人又多是盜賊利其財物或因而擠之能自全者百無一二性命之外公私亡失不知一歲凡幾千萬而衢睦等州人衆地狹所産五穀不足于食歲常漕蘇秀米至桐廬散入諸郡錢塘億萬生齒待上江薪炭而活以浮山之嶮覆溺留凝之故此數州薪米常貴又衢婺睦歙等州及杭之富陽新城二邑公私所食鹽取足于杭秀諸場以浮山之嶮覆溺留礙之故官給脚錢甚厚其所亡失與依託風水以侵盜者不可勝數此最其大者其餘公私利害未可以一二遽數臣伏見宣德郎前權知信州軍州事侯臨因葬所生母于杭州之南蕩往來江濱相視地形訪問父老參之舟人反覆講求具得其實建議自浙江上流地名石門並山而東或因斥鹵棄地鑿為運河引浙江及谿谷諸水凡二十二里有竒以達于江又並江為岸度潮水所向則用石所不向則用竹大凡八里有竒以達于龍山之大慈浦自大慈浦北折抵小嶺下鑿嶺六十五丈以達于嶺東之古河因古河稍加浚治東南行四里有竒以達于今龍山之運河以避浮山之嶮度用錢十五萬貫用捍江兵及諸郡廂軍三千人二年而成臣與前轉運使葉溫叟轉運判官張璹躬往按視皆如臨言凡福建兩浙士民聞臣與臨欲奏開此河萬口同聲以為莫大無窮之利臣縱欲不言已為衆論所迫勢不得黙已臣聞之父老章獻皇后臨朝日以江水有皇天蕩之嶮内出錢數十萬貫築長蘆起僧舍以拯溺者又見先帝以長淮之嶮賜錢十萬貫米十萬石起夫九萬二千人以開龜山河今浮山之嶮非特長蘆龜山之比而二聖仁慈視民如傷必將捐十五萬緡以平此積嶮也謹昧死上臨所陳開石門河利害事狀一本及臣所差觀察推官董華用臨之說約度功料及合用錢物料狀一本并地圖一面伏乞降付三省看詳或召臨赴省面加質問仍乞下本路監司或更特差官同共相視若臣與臨言不妄乞自朝廷擘畫支賜錢物施行臣觀古今之事非知之難言之亦易難在成之而已臨之才幹衆所共知臣謂此河非臨不成伏望聖慈特賜訪問左右近臣必有知臨者乞專差臨監督此役不惟救活無窮之性命完惜不貲之財物又使數州薪米流通田野市井詠歌聖澤子孫不忘臣不勝大願謹録奏聞伏候勑㫖杭州召還乞郡狀長公一生坎􅇄備于此狀不可不知臣近奉詔書及聖㫖劄子不允臣辭免翰林學士承㫖恩命及乞郡事臣已第三次奏乞除臣揚越陳蔡一郡去訖竊慮區區之誠未能遽囘天意須至盡露本心重干聖聽惶恐死罪惶恐死罪臣昔于治平中自鳯翔職官得替入朝首被英宗皇帝知遇欲驟用臣當時宰相韓琦以臣年少資淺未經試用故且與館職亦㑹臣丁父憂去官及服闋入覲便蒙神宗皇帝召對面賜奬激許臣職外言事自惟羇旅之臣未應得此豈非以英宗皇帝知臣有素故耶是時王安石新得政變易法度臣若少加附㑹進用可必自惟逺人蒙二帝非常之知不忍欺天負心欲具論安石所為不可施行狀以裨萬一然未測聖意待臣深淺因上元有㫖買燈四千椀有司無狀虧減市價臣即上書論奏先帝大喜即時施行臣以此卜知先帝聖明能受盡言上疏六千餘言極論新法不便後復因考試進士擬對御試䇿進上并言安石不知人不可大用先帝雖未聽從然亦嘉臣愚直初不譴問而安石大怒其黨無不切齒爭欲傾臣御史知雜謝景溫首出死力彈奏臣丁憂歸鄉日舟中曾販私鹽遂下諸路體量追捕當時梢工篙手等考掠取證但以實無其事故鍛鍊不成而止臣縁此懼禍乞出連三任外補而先帝眷臣不衰時因賀謝表章即對左右稱道黨人疑臣復用而李定何正臣舒亶三人構造飛言醖釀百端必欲致臣于死先帝初亦不聽而此三人執奏不已故臣得罪下獄定等選差悍吏皇遵將帯吏卒就湖州追攝如捕寇賊臣即與妻子訣别留書與弟轍處置後事自期必死過揚子江便欲自投江中而吏卒監守不果到獄即欲不食求死而先帝遣使就獄有所約敕故獄吏不敢别加非横臣亦覺知先帝無意殺臣故復留殘喘得至今日及竄責黄州毎有表疏先帝復對左右稱道哀憐奬激意欲復用而左右固争以為不可臣雖在逺亦具聞之古人有言聚蚊成雷積羽沉舟言寡不勝衆也以先帝知臣特達如此而臣終不免于患難者以左右疾臣者衆也及陛下即位起臣于貶所不及一年備位禁林遭遇之異古今無比臣毎自惟昆蟲草木之㣲無以仰報天地生成之德惟有獨立不倚知無不言可以少報萬一始衙前差雇利害與孫永傅堯俞韓維争議因亦與司馬光異論光初不以此怒臣而臺諌諸人逆探光意遂與臣為仇臣又素疾程頥之姦未嘗假以色詞故頥之黨人無不側目自朝廷廢黜大姦數人而其餘黨猶在要近隂為之地特未發爾小臣周穜乃敢上疏乞用王安石配享以嘗試朝廷料穜草芥之㣲敢建此議必有隂主其事者是以上書逆折其姦鋒乞重賜行遣以破小人之謀因此黨人尤加忿疾其後又與經筵極論黄河不可囘奪利害且上疏争之遂大失執政意積此數事恐别致患禍又縁臂痛目昏所以累章力求補外竊伏思念自忝禁近三年之間臺前言臣者數四只因發䇿草麻羅織語言以為謗訕本無疑似白加誣執其間曖昧譖愬陛下察其無實而不降出者又不知其幾何矣若非二聖仁明洞照肝鬲則臣為黨人所傾首領不保豈敢望如先帝之赦臣乎自出知杭州二年粗免人言中間法外刺配顔章顔益二人盖攻積弊事不獲已陛下亦已赦臣而言者不赦論奏不已其意豈為顔章等哉以此知黨人之意未嘗一日不在傾臣洗垢求瑕止得此事今者忽蒙聖恩召還擢用又除臣弟轍為執政此二事皆非大臣本意竊計黨人必大猜忌磨厲以須勢必如此聞命悸恐以福為災即日上章辭免乞郡行至中路果聞弟轍為臺諫所攻般出廨宇待罪又蒙陛下委曲照見情狀方獲保全臣之剛褊衆所共知黨人嫌忌甚于弟轍豈敢以衰病之餘復犯其鋒雖自知無罪可言而今之言者豈問是非曲直竊謂人主之待臣子不過公道以相知黨人之報怨嫌必為巧發而隂中臣豈敢恃二聖公道之知而傲黨人隂中之禍所以不避煩瀆自陳入仕以來進退本末欲陛下知臣危言危行獨立不囘以犯衆怒者所從來逺矣又欲陛下知臣平生冒渉患難危嶮如此今餘年無幾不免有逺禍全身之意再三辭遜實非矯節栁下惠有言直道而事人焉往而不三黜臣若貪得患失隨世俛仰改其常度則陛下亦安所用臣若守其初心始終不變則羣小側目必無安理雖蒙二聖深知亦恐終不勝衆所以反覆計慮莫若求去非不懷戀天地父母之恩而衰老之餘恥復與羣小計較短長曲直為世間髙人長者所笑伏望聖慈察臣至誠特賜指揮執政撿㑹累奏只作親嫌囘避早除一郡所有今來奏狀乞留中不出以保全臣子臣不勝大願若朝廷不以臣不才猶欲驅使或除一重難邉郡臣不敢辭避報國之心死而後已惟不願在禁近使黨人猜疑别加隂中也干犯天威謹俟斧質唐宋八大家文鈔巻一百二十三
