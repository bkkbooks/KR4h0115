body:
  text: 唐宋八大家文鈔巻六十一明茅坤撰廬陵史鈔一本紀梁太祖唐之衰也天子不能誅宦官而崔𦙍等為之外倚彊藩彊藩入宦官誅而唐亦以亡歐陽公次梁紀其所摹寫殆盡而與李克用兩争處尤工予故録之以見公之史才云太祖神武元聖孝皇帝姓朱氏宋州碭山午溝里人也其父誠以五經教授鄉里生三子曰全昱存溫誠卒三子貧不能為生與其母傭食蕭縣人劉崇家全昱無他材能然為人頗長者存溫勇有力而溫尤兇悍唐僖宗乾符四年黄巢起曹濮存溫亡入賊中巢攻嶺南存戰死巢陷京師以溫為東南面行營先鋒使攻陷同州以為同州防禦使是時天子在蜀諸鎮㑹兵討賊溫數為河中王重榮所敗屢請益兵於巢巢中尉孟楷抑而不通溫客謝瞳説溫曰黄家起於草莽幸唐衰亂直投其隙而取之爾非有功徳興王之業也此豈足與共成事哉今天子在蜀諸鎮之兵日集以謀興復是唐徳未厭於人也且將軍力戰於外而庸人制之於内此章邯所以背秦而歸楚也溫以為然乃殺其監軍嚴實自歸于河中因王重榮以降都統王鐸承制拜溫左金吾衛大將軍河中行營招討副使天子賜溫名全忠中和三年三月拜全忠汴州刺史宣武軍節度使四月諸鎮兵破巢復京師巢走藍田七月丁夘全忠歸于宣武是嵗黄巢出藍田關陷蔡州節度使秦宗權叛附于巢遂圍陳州徐州時溥為東南面行營兵馬都統㑹東諸鎮兵以救陳陳州刺史趙犨亦乞兵于全忠溥雖為都統而不親兵四年全忠乃自將救犨率諸鎮兵擊敗巢將黄鄴尚讓等犨以全忠為徳始附屬焉是時河東李克用下兵太行渡河出洛陽與東兵㑹擊巢巢已敗去全忠及克用追敗之于郾城巢走中牟又敗之于王滿巢走封丘又大敗之巢挺身東走至泰山狼虎谷為時溥追兵所殺九月天子以全忠為檢校司徒同中書門下平章事封沛郡侯光啓二年三月進爵王義成軍亂逐其節度使安師儒推牙將張驍為留後師儒來奔殺之遣朱珍李唐賔陷滑州以胡真為留後十二月徙封吳興郡王自黄巢死秦宗權稱帝陷陜洛懐孟唐許汝鄭州遣其將秦賢盧瑭張晊攻汴賢軍板橋晊軍北郊瑭軍萬勝環汴為三十六柵王顧兵少不敢出乃遣朱珍募兵於東方而求救於兖鄆三年春珍得兵萬人馬數百匹以歸乃擊賢板橋拔其四柵又擊瑭萬勝瑭敗投水死宗權聞瑭等敗乃自將精兵數千柵北郊五月兖州朱瑾鄆州朱宣來赴援王置酒軍中中席王陽起如厠以輕兵出北門襲晊而樂聲不輟晊不意兵之至也兖鄆之兵又從而合擊遂大敗之斬首二萬餘級宗權與晊夜走過鄭屠其城而去宗權至蔡復遣張晊攻汴王聞晊復來登封禪寺後岡望晊兵過遣朱珍躡之戒曰晊見吾兵必止望其止當速返母與之鬬也已而晊見珍在後果止珍即馳還王令珍引兵蔽大林而自率精騎出其東伏大冢間晊止而食食畢拔旗幟馳擊珍珍兵小却王引伏兵横出斷晊軍為三而擊之晊大敗脱身走宗權怒斬晊而河陽陜洛之兵為宗權守者聞蔡精兵皆已殱於汴因各潰去故諸葛爽將李罕之取河陽張全義取洛陽以来附十月天子使来賜王紀功碑朱宣朱瑾兵助汴已破宗權東歸王移檄兖鄆誣其誘汴亡卒以東乃發兵攻之取其曹州濮州遂遣朱珍攻鄆州大敗而還十二月天子使來賜王鐡劵及徳政碑淮南節度使髙駢死楊行宻入揚州天子以王兼淮南節度使王乃表行宻為副使以行軍司馬李璠為留後璠之揚州行宻不納文徳元年正月王如淮南至宋州而還是時秦宗權陷襄州以趙徳諲為節度使徳諲叛于宗權以來附天子因以王為蔡州四面行營都統以徳諲為副三月癸夘僖宗崩天雄軍亂囚其節度樂彦真其子相州刺史從訓攻魏来乞兵遣朱珍助從訓攻魏而魏軍殺彦真從訓戰死魏人立羅宏信珍乃還張全義取河陽逐李罕之罕之奔于河東李克用遣兵圍河陽全義來求救遣丁㑹牛存節救之擊敗河東兵于沇河五月行營討蔡州圍之百餘日不克是時時溥已為東南面都統又以王統行營而溥猶稱都統王乃上書論溥討蔡無功而不落都統且欲激怒溥以起兵端初髙駢死淮南亂楚州刺史劉瓚來奔納之及王兵攻蔡不克還欲攻徐乃遣朱珍將兵數千以東聲言送瓚還楚州溥怒論已又聞珍以兵来果出兵拒之珍戰于吳康大敗之取其豐蕭二縣遂攻宿州下之珍屯蕭縣别遣龎師古攻徐州龍紀元年正月師古敗溥于吕梁淮西牙將申叢執秦宗權折其足將檻送京師别將郭璠殺叢簒宗權以來獻王遣行軍司馬李璠獻俘于京師表郭璠淮西留後三月天子封王為東平王七月朱珍殺李唐賔王如蕭縣執珍殺之遂攻徐州冬大雨水不能屯軍而旋初秦宗權遣其弟宗衡掠地淮南是嵗宗衡為其將孫儒所殺儒攻楊行宻于揚州淮南大亂行宻走宣州儒入揚州大順元年春遣龎師古攻孫儒於淮南大敗而還四月宿州將張筠以宿州復歸於時溥王自將攻之不克初黄巢敗走李克用追之至于寃朐不及而旋過汴駐軍于北郊王邀克用置酒上源驛夜以兵攻之克用踰城而免訟其事于京師天子知曲在汴而和解之至是宰相張濬私與汴交王厚之以賂濬為汴請伐河東唐諸大臣皆以為不可興師濬挾汴力請益堅天子不得已而許之五月以濬為太原四面行營都統王為東南面招討使然王不親兵以兵三千屬濬而已濬屯于隂地河東叛將馮覇殺潞州守將李克恭來降遣葛從周入潞州李克用遣康君立攻之從周走河陽九月王如河陽十月天子以王兼宣義軍節度使遂如滑州假道于魏以攻河東且責其軍須亦所以怒魏為兵端也魏人果以謂非兵所當出而辭以糧乏皆不許於是攻魏十一月張濬之師大敗于隂地二年正月王及魏人戰于内黄大敗之屠故元城羅宏信來送欵十月克宿州十一月曹州將郭紹賔殺其刺史郭饒來降十二月丁㑹敗朱瑾于金鄉景福元年二月攻鄆州前軍朱友裕敗于斗門王軍後至又敗而還冬友裕取濮州遂攻徐州二年四月龎師古克徐州殺時溥王如徐州以師古為留後遂攻兖鄆乾寧元年二月王及朱宣戰于漁山大敗之二年八月又敗宣于梁山十二月又敗之于鉅野兖鄆求救于河東李克用發兵救之假道于魏既而魏人擊之克用怒大舉攻魏羅宏信來求救遣葛從周救魏是嵗李克用封晉王三年五月戰于洹水擒克用子落落送于魏殺之七月鳯翔李茂貞犯京師天子出居于華州王請以兵赴難天子優詔止之又請遷都洛陽不許四年正月龎師古克鄆州王如鄆州以朱友裕為留後遂攻兖州朱瑾奔于淮南以葛從周為兖州留後九月攻淮南龎師古出清口葛從周出安豐王軍屯于宿州楊行宻遣瑾先擊清口師古敗死從周亟返兵至于渒河瑾又敗之王懼馳歸光化元年三月天子以王兼天平軍節度使四月遣葛從周攻晉之山東取邢洺磁三州襄州趙匡凝自其父徳諲時來附匡凝又與楊行宻李克用通而其事泄七月遣氏叔琮康懐英攻匡凝取其泌隨鄧三州匡凝請和乃止十二月李罕之以潞州來降二年幽州劉仁恭攻魏羅紹威來求救王救魏敗仁恭于内黄四月遣氏叔琮攻晉太原不克七月李克用取澤潞十一月保義軍亂殺其節度使王珙推其牙將李璠為留後其將朱簡殺璠來降以簡為保義軍節度使三年四月遣從周攻劉仁恭之滄州取其徳州及仁恭戰于老鵶堤大敗之八月晉取洺州王如洺州復取之是時鎮定皆附于晉遂攻鎮州破臨城王鎔來送欵進攻定州王郜奔于晉其將王處直以定州降唐宦者劉季述作亂天子幽于東宫天復元年正月䕶駕都頭孫徳昭誅季述天子復立封王為梁王遣張存敬攻王珂于河中出含山下晉絳二州王珂求救于晉晉不能救乃來降三月大舉攻晉氏叔琮出太行取澤潞葛從周張存敬侯言張歸厚及鎮定之兵皆㑹于太原圍之不克遇雨而退五月天子以王兼河中尹䕶國軍節度使六月晉取慈隰自劉季述等已誅宰相崔𦙍外與梁交欲假梁兵盡誅宦者而鳯翔李茂貞邠寧王行瑜等皆遣子弟以精兵宿衛天子宦者韓全誨等亦因恃以為助天子與𦙍計事宦者屬耳頗聞之乃選美女内之宫中隂令伺察其實乆之果得𦙍奏謀所以誅宦者之説全誨等大懼日夜相與涕泣思圖𦙍以求全𦙍知謀泄事急即矯為制召梁兵入誅宦者十月王以宣武宣義天平䕶國兵七萬至于河中取同州遂攻華州韓建出降全誨等聞梁王兵且至即以岐邠宿衛兵刼天子奔于鳯翔王乃上書言𦙍所以召之之意天子怒罷𦙍相責授工部尚書詔梁兵還鎮王引兵去攻邠州屯于三原邠州節度使楊崇本以邠寧慶衍四州降崔𦙍奔于華州二年春王退軍于河中晉攻晉絳遣朱友寧擊敗晉軍于蒲縣取汾慈隰遂圍太原不克而還汾慈隰復入于晉四月友寧引兵西至興平及李茂貞戰于武功大敗之王兵犯鳯翔茂貞數出戰輒敗遂圍之十一月鄜坊李周彛以兵救鳯翔王遣孔勍襲鄜州虜周彛之族徙于河中周彛乃降是時岐兵屢敗而圍乆城中食盡自天子至後宫皆凍餒三年正月茂貞殺韓全誨等二十人囊其首示梁軍約出天子以為解甲天子出幸梁軍遣使者馳召崔𦙍𦙍托疾不至王使人戲𦙍曰吾未識天子懼其非是子來為我辨之天子還至興平𦙍率百官奉迎王自為天子執轡且泣且行行十餘里止之人見者咸以為忠巳巳天子至自鳯翔素服哭于太廟而後入殺宦者七百餘人二月甲戌天子賜王回天再造竭忠守正功臣以輝王祚為諸道兵馬元帥王為副元帥王乃留子友倫為䕶駕指揮使以為天子衛引兵東歸天子餞于延喜樓賜楊栁枝五曲初梁兵已西青州王師範遣其將劉鄩襲據梁兖州王已還梁四月如鄆州遣朱友寧攻青州師範敗之于石樓友寧死九月楊師厚敗青人于臨朐取其棣州師範以青州降而鄩亦降友倫擊鞠墮馬死王怒以為崔𦙍殺之遣朱友謙殺𦙍于京師其與友倫擊鞠者皆殺之自天子奔華州王請遷都洛陽雖不許而王命河南張全義修洛陽宫以待天祐元年正月王如河中遣牙將㓂彦卿如京師請遷都洛陽并徙長安居人以東天子行至陜州王朝于行在先如東都是時六軍諸衛兵巳散亡其從以東者小黄門十數人打毬供奉内園小兒等二百餘人行至榖水王教醫官許昭逺告其謀亂悉殺而代之然後以聞由是天子左右皆梁人矣四月甲辰天子至自西都是時晉王李克用岐王李茂貞楚王趙匡凝蜀王王建吴王楊行宻聞梁遷天子洛陽皆欲舉兵討梁王大懼六月楊崇本復附于岐王乃以兵如河中聲言攻崇本遣朱友恭氏叔琮蔣𤣥暉等行弑昭宗崩十月王朝于京師殺朱友恭氏叔琮十一月攻淮南取其光州攻夀州不克而旋二年二月遣蔣𤣥暉殺徳王裕等九王于九曲池六月殺司空裴贄等百餘人七月天子復使來賜王迎鑾紀功碑王欲代唐使人諭諸鎮襄州趙匡凝以為不可遣楊師厚攻之取其唐鄧復郢隨均房七州王如襄州軍于漢北九月師厚破襄州匡凝奔于淮南師厚取荆南荆南留後趙匡明奔于蜀遂岀光州以攻夀州不克天子卜祀天于南郊王怒以為蒋𤣥暉等欲祈天以延唐天子懼改卜郊十一月辛巳天子封王為魏王相國總百揆以宣武宣義天平䕶國天雄武順佑國河陽義武昭義武寜保義忠義武昭武定㤗寜平盧匡國鎮國荆南忠武二十一軍為魏國備九錫王怒不受十二月天子以王為天下兵馬元帥王益怒遣人告樞宻使蒋𤣥暉與何太后私通殺𤣥暉而焚之遂弑太后于積善宫又殺宰相栁璨太常卿張延範車裂以殉天子下詔以太后故停郊三年春魏州羅紹威謀殺其牙軍來假兵以虞變王為發兵北攻劉仁恭之滄州兵過魏而紹威巳殺牙軍其兵之在外者果皆叛據貝衛澶博州王以兵悉殺之遂攻滄州軍于長蘆劉仁恭求救于晉晉人取潞州王乃旋軍開平元年春正月壬寅天子使御史大夫薛貽矩來勞軍宰相張文蔚率百官來勸進夏四月壬戌更名晃甲子皇帝卽位戊辰大赦改元國號梁嗚呼天下之惡梁乆矣自後唐以來皆以為偽也至予論次五代獨不偽梁議者或譏予大失春秋之㫖以謂梁負大惡當加誅絶而反進之是奬簒也非春秋之志也予應之曰是春秋之志爾魯桓公弑隐公而自立者宣公弑子赤而自立者鄭厲公逐世子忽而自立者衛公孫剽逐其君衎而自立者聖人於春秋皆不絶其為君此予所以不偽梁者用春秋之法也然則春秋亦奬簒乎曰惟不絶四者之為君於此見春秋之意也聖人之於春秋用意深故能勸戒切為言信然後善惡明夫欲著其罪於後世在乎不沒其實其實嘗為君矣書其為君其實簒也書其簒各傳其實而使後世信之則四君之罪不可得而掩爾使為君者不得掩其惡然後人知惡名不可逃則為惡者庶乎其息矣是謂用意深而勸戒切為言信而善惡明也桀紂不待貶其王而萬世所共惡者也春秋於大惡之君不誅絶之者不害其褒善貶惡之㫖也惟不沒其實以著其罪而信乎後世與其為君而不得掩其惡以息人之為惡能知春秋之此意然後知予不偽梁之㫖也唐宋八大家文鈔巻六十一
