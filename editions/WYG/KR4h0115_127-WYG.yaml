body:
  text: 唐宋八大家文鈔東坡文鈔引予少謂蘇子瞻之於文李白之於詩韓信之於兵天各縱之以神僊軼世之才而非世之問學所及者及詳覽其所上神宗皇帝及代張方平滕甫諫兵事等書又如論徐州京東盜賊事宜并西羌鬼章等劄子要之於漢賈誼唐陸贄不知其為何如者朱晦菴嘗病其文不脱縱横氣習盖特其少時沾沾自喜或不免耳入哲宗朝召為兩制及謫海南以後殆古之曠達遊方之外者已然其以忠獲罪卒不能安於朝廷之上豈其才之罪哉予錄其制策二首上書七首劄子十四首狀十二首表啟二十七首與執政及友人書二十二首論七十首策二十五首序傳十首記二十六首碑六首銘贊頌十五首説賦祭文雜著十五首釐為二十八巻歸安鹿門茅坤題
  hash: sha256:c3d8a3854a5ecec9f4ba893f52859bcb1ff444074eaf6fbcec6a6491bd5a988c
