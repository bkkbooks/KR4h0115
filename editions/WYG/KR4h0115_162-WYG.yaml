body:
  text: 唐宋八大家文鈔巻一百四十八明茅坤撰潁濱文鈔四狀論臺諫封事留中不行狀即前輩請罷斜封墨勅之見右臣伏見皇帝陛下以至孝純仁承綂踐祚太皇太后陛下以聰明睿智親攬庻政二聖協德以幸天下曾未朞歲而敝事稍去寛政復行元元之民免於流離之患䝉更生之福海内釋然無意外之憂不勝幸甚伏惟陛下恭儉祗畏發於天性猶復選於羣臣增廣諌員求直言以自助天下之士聞風相慶臣實何人得於今日備位於此然臣聞帝王之治必先正風俗風俗既正中人以下皆自勉以為善風俗一敗中人以上皆自棄而為惡中人自勉於善則人主耳目衆多易與為治中人自棄於惡則臣下朋黨蕃殖易以為非葢邪正盛衰之源未有不始於此者也昔真宗皇帝臨馭羣下奬用正人一時賢儁爭自託於明王孫奭戚綸田錫王禹偁之徒既以諫諍顯名則忠良之士相繼而起其後耄期厭事丁謂乘間將竊國命而風俗已成朝多正士謂雖懐姦慝而無與同惡謀未及發旋即流放仁宗皇帝仁厚淵嘿不自可否是非之論一付臺諫孔道輔范仲淹歐陽修余靖之流以言事相高此風既行士耻以鉗口失職當時執政人臣豈皆盡賢然畏忌人言不敢妄作一有不善言者即至隨輙屏去故雖人主寛厚而朝廷之間無大過失及先帝嗣位執政大臣變易祖宗法度下至小民皆知其非而卿士大夫從風而靡則風俗之變於此見矣是時惟有吕誨范鎮等明言其失二人既已得罪臺諫有一一言及之者皆紛然逐去由是風俗大敗無一人復正言者天佑皇室啓廸聖德臨政未㡬而以言路為急天下竦然思見祖宗遺俗然臣自至闕廷聞臺諫封事一切留中不出玩不施行又不黜責臣不勝憂疑夫朝廷所以待臺諌者不過二事言當則行不當則黜其所上封事除事干㡬密人主所當獨聞須至留中外並湏降出行遣上所以正朝廷之紀綱使無廢職業下所以全人臣之名節使無負然儀若當而不行不當而不黜則上下茍且亷耻道廢風俗衰陋國將從之臣願陛下永惟邪正盛衰之漸始於臺諫修其官則聽其言言有不當隨事行遣大者可黜小者可罷使風俗一定忠言日至陛下垂拱於上羣臣肅雍於下則太平之治可立而待也惟陛下留神省察天下幸甚制置三司條例司論事狀通達治體之言轍頃者誤䝉聖恩得備官屬受命以來於今五月雖勉强從事而才力寡薄無所建明至於措置大方多所未諭每獻狂瞽輙成異同退加考詳未免疑惑是以不虞僭冐聊復一言竊見本司近日奏遣使者八人分行天下按求農田水利與徭役利害以為方今職司守令無可信用欲有興作當别遣使愚陋不逹竊以為國家養材如林治民之官棋布海内興利除害豈待他人今始有事輒特遣使使者一出人人不安能者嫌使者之侵其官不能者畏使者之議其短客主相忌情有不通利害相加事多失實使者既知朝廷方欲造事必謂功效可以立成人懐此心誰肯徒返為國生事漸不可知徒使官有送迎供饋之煩民受更張勞擾之弊得不補失將安用之朝廷必欲興事以利民轍以為職司守令足矣葢勢有所便衆有所安今以職司治民雖其賢不肖不可知而衆所素服於勢為順稍加選擇足以有為是以古之賢君聞選用職司以責成功未聞遣使以代職司治事者也葢自近世政失其舊均税寛䘏每事遣使冠葢相望而卒無絲毫之益謗者至今未息不知今日之使何以異此至於遣使條目亦所未安何者勸課農桑墾闢田野人存則舉非有成法誠使職司得人守令各舉其事罷非時無益之役去猝暴不急之賦不奪其力不傷其財使人知農之可樂則將不勸而自勵今不治其本而遂遣使將使使者何從施之議者皆謂方今農事不修故經界可興農官可置某觀職司以下勸農之號何異於農官嘉祐以來方田之令何異於經界行之歴年未聞有益此農田之説轍所以未諭也天下水利雖有未興然而民之勞佚不同國之貧富不等因民之佚而用國之富以興水利則其利可待因民之勞而乘國之貧以興水利則其害先見茍誠知生民之勞佚與國用之貧富則水利之廢興可以一言定矣而况事起無漸人不素講未知水利之所在而先遣使使者所至必將求之官吏官吏有不知者有知而不告者有實無可告者不得於官吏必求於民不得於民其勢將求於中野興事至此葢巳甚勞此水利之説轍所以未諭也徭役之事議者甚多或欲使鄉戸助錢而官自雇人或欲使城郭等第之民與鄉戸均役或欲使品官之家與齊民並事此三者皆見其利不見其害者也役人之不可不用鄉戸猶官吏之不可不用士人也有田以為生故無逃亡之憂朴魯而少詐故無欺謾之患今乃捨此不用而用浮浪不根之人轍恐掌財者必有盗用之姦捕盗者必有竄逸之弊今國家設捕盗之吏有廵撿有縣尉然較其所獲縣尉常密廵檢常踈非廵撿則愚縣尉則智葢弓手鄉戸之人與屯駐客軍異耳今將使雇人捕盗則與獨任廵撿不殊盗賊縱橫必自此始轍觀近歲雖使鄉戸頗得雇人然至於所雇逃亡鄉戸猶任其責今遂欲於兩稅之外别立一科謂之庸錢以備官雇鄉户舊法革去無餘雇人之責官所自任且自唐楊炎廢租庸調以為兩税收大厯十四年應于賦斂之數以定兩税之額則是租調與庸兩税既兼之矣今兩税如舊奈何復欲取庸葢天下郡縣上户常少下户常多少者徭役頻多者徭役簡是以中下之户毎得休閒今不問戸之高低例使出錢助役上戸則便下戸實難顚倒失宜未見其可然議者皆謂助役之法要使農夫專力於耕轍觀三代之間務農最切而戰陣田獵皆出於農茍以徭役較之則輕重可見矣城郭人戸雖號兼并然而緩急之際郡縣所賴饑饉之歲將勸之分以助民盗賊之歲將借其力以捍敵故財之在城郭者與在官府無異也方今雖天下無事而三路芻粟之費多取京師銀絹之餘配賣之民皆在城郭茍復充役將何以濟故不如稍加寛假使得休息此誠國家之利非民之利也品官之家復役巳久議者不究本末徒聞漢世宰相之子不免戍邊遂欲使衣冠之人與編戸齊役夫一歲之更不過三日三日之雇不過三百今世三大户之役自公卿以下無得免者以三大户之役而較之三日之更則今世既巳重矣安可復加哉葢自古太平之世國子俊造將用其才者皆復其身胥吏賤吏既用其力者皆復其家聖人舊法良有深意以為責之以學而奪其力用之於公而病其私人所難兼是以不取奈何至於官户而又將役之且州縣差役之法皆以丁口為之髙下今己去鄉從官則丁口登降其勢難詳將使差役之際以何為據必用丁則州縣有不能知必不用丁則官戸之役比民為重今朝廷所以條約官户如租佃田宅斷買坊場廢舉貨財與衆爭利比於平民皆有常禁茍使之與民皆役則昔之所禁皆當廢罷罷之則其弊必甚不罷則不如為民此徭役之說轍所以未諭也轍又聞發運之職今將改為均輸常平之法今將變為青苗愚鄙之人亦所未逹昔漢武外事四夷内興宫室財用匱竭力不能支用賈人桑宏羊之説買賤賣貴謂之均輸雖曰民不加賦而國用饒足然而法術不正吏縁為姦掊克日深民受其病孝昭既立學者爭排其說霍光順民所欲從而與之天下歸心遂以無事不意今世此論復興衆口紛然皆謂其患必甚於漢何者方今聚斂之臣才智方畧未見桑羊之比而朝廷破壊規矩解縱繩墨使得馳騁自由惟利是嗜以轍觀之其害必有不可勝言者矣今立法之初其説甚美徒言徙貴就賤用近易逺茍誠止於此則似亦可為然而假以財貨許置官吏事體既大人皆疑之以為雖不明言販賣然既許之以變易矣變易既行而不與商賈爭利者未之聞也夫商賈等事曲折難行其買也先期而與錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得然至往往敗折亦不可期今官買是物必先設官置吏簿書禄廩為費巳厚然後使民各輸其所有非良不售非賄不行是以官買之價比民必貴及其賣也弊復如前然則商賈之利何縁可得徒使謗議騰沸商旅不行議者不知慮此至欲捐數百萬緡以為均輸之法但恐此錢一出不可復還且今欲用忠實之人則患其拘滯不通欲用巧智之士則患其出没難考委任之際尤難得人此均輸之說轍所以未諭也常平條勅纖悉且存患在不行非法之弊必欲修明舊制不過以時斂之以利農以時散之以利末斂散既得物價自平貴賤之間官亦有利今乃改其成法雜以青苗逐路置官號為提舉别立賞罰以督増虧法度紛紜何至如此而况錢布于外凶荒水旱有不可知斂之則結怨於民捨之則官將何頼此青苗之說轍所以未諭也凡此數事皆議者之所詳論明公之所深究而轍以才性朴拙學問空疎用意不同動成違忤雖欲勉勵自効其勢無由茍明公見寛諒其不逮特賜敷奏使轍得外任一官茍免罪戾而明公選賢舉能以備僚佐兩獲所欲幸孰厚焉論西事狀此狀情事本末及制勝處元祐第一奏疏右臣伏見西夏頃自秉常之禍人心離貳梁氏與人多二族分據東西廂兵馬勢力相敵疑阻日深入冦之謀自此衰息朝廷畧加招納隨即伏從使介相尋臣禮甚至只自今年春末夏初以來始有桀心出兵數萬掩襲涇原殺虜弓箭手數千人復歸巢穴朝廷方事安衆難於用武接以君臣之禮加以册命之恩時遣使人厚賜金幣戎狄獸心敢為侮慢轍以地界為詞不復入謝至於坤成賀使亦遂不遣中外臣子聞者無不憤怒思食其肉臣忝補侍從主憂臣辱義不辭勞臣擢自小官列于禁近議論㡬事既具本職感激思報宜異常人是以冐昧獻言不避罪戾庶㡬聖意由此感悟雖被譴逐臣不恨也臣竊惟當今之務以為必先知致冦之端由審行事之得失然後料虜情之所在定制敵之長筭誠使四者畢陳于前羌戎小醜勢亦無能為也董氊本與西夏世為仇讐元昊之亂仁宗頼其牽制梁氏之簒神宗藉其征討世効忠力非諸番之比乃者董氊老病其相阿里骨擅其國事與其妻契丹公主殺其二妻心牟氏其大將鬼章及温溪心等皆心懷不服阿里骨欺罔朝廷自稱董氊嗣子朝廷不察情偽不原逆順即以節鉞付之謀之不臧患自此起阿里骨既知失衆虐用威刑衆心日離而鬼章自謂與阿里骨比肩一體顧居其下心常不悦夏人乘此間隙折節下之先與阿里骨解仇結懽令轉説鬼章舉兵入冦復誘脇人多保忠令於涇原竊發黨與既立羽翼既成是以敢肆狂言以動朝聴向若阿里骨以董氊之死來告立嗣朝廷因其所請遍問鬼章温溪心等以誰實當立若衆以阿里骨為可立則既立之後衆必為詞若以為不可則分董氊之舊科以三使額授此三人阿里骨無僥倖之命鬼章無怨望之意則夏人無與為援安能動揺加以數年以來朝廷本厭兵事羌中測知此意亦以自安頃者忽命熈河㸃集人馬大城西關仍云來年當築龕谷聲實既暴敵心不寧舉兵自强釁亦由此此所謂致冦之端由也先帝昔因梁氏簒逆之禍舉兵誅討侵攘地界為怨至深羌虜之性重于復讐計其思報之心未嘗一日忘也徒以䘮亂相繼兵力凋殘陛下臨御之初意切懐納是以連年入貢以休息其民雖有恭順之言葢亦非其本意矣假令犯順固猶有詞今朝廷因其承襲之後賜之册命捐金錢二十餘萬緡以為之禮彼既與我有君臣之分然後可責以忠順之節朝廷此舉于義甚長而羌人無謀遂肆桀傲内則其國中士民自知其不直必不為用外則中國兵將皆有鬭志易以立功曲直之㡬於此始定雖棄捐金幣以封殖冦讐小人謂之失策而分别曲直以激厲將士智者謂之得計此所謂行事之得失也元昊本懷大志長於用兵亮祚天付凶狂輕用其衆頃為邉患皆厯歲年然而國小力㣲終以困斃今梁氏專國素與人多不協内自多難而欲外侮中原料其姦謀葢非元昊亮祚之比矣意謂二聖在位恭黙守成仁澤之深遠近所悉既無用武之意可肆無厭之求蘭㑹諸城鄜延五寨好請不獲勢脅必從以為狂言一聞求無不得今朝廷既巳漸為邊備益兵練將則羌人之心巳乖本計不過秋冬寒凉之後小小跳梁以嘗試朝廷而已若朝廷執意不揺守邊無失則欵塞請盟本無愧耻若朝廷用心不一惟務求和則求請百端漸不可忍此所謂敵請之所在也凡欲應敵必先正名夏人初起邪謀必有二説其一以為慢詞既達則地界可得無窮之請因以滋彰其二以為雖不得地實亦無損猖狂力屈稍復求和中國厭兵勢無不許方其不遜則張皇事勢夸示諸戎及其柔伏則畧為恭順使中國黽勉而聽今朝廷遣兵積粟地界之請固己不從然而號令未明逆順未著臣恐夏人未知朝廷不憚用兵之意無以折其姦心又恐將來姦窮力屈畧修臣禮使與講和要約不堅必難持久昔趙欲與秦為購其謀臣虞卿以為從秦為購不若從齊為購于是東結齊人而秦人自至區區之趙尚知出此而况堂堂中國畏避畜縮媮于無事不一分别曲直而反聽命于羌人哉臣願陛下明降詔書榜沿邊諸郡其大意畧曰夏國頃自亮祚䘮亡先帝舉兵弔伐既絶歲賜復禁和市羌中窮困一絹之値至十餘千又命㳂邊諸將吏迭行攻討橫山一帶皆棄不敢耕窮守沙漠衣食併竭老少窮餓不能自存朕綂御四海均覆無外閔此一方窮而無告遂勅諸道帥臣禁止侵掠自是近塞之田始復耕墾既通和市復許入貢使者一至賜予不貲販易而歸獲利無筭傳聞羌中得此厚利父子兄弟始有生理朕猶念孤童㓜弱部族携貳若非本朝賜之策命假以寵靈則何以威伏酋豪保有疆土是時朝士大夫咸謂夏人反覆心未可知使者將行言猶未巳朕有存亡繼絶之志欲修祖宗爵命諸侯之典以為寧人負我斷而不疑故遣使出疆授以禮命金錢幣帛相屬于道邊人父老觀者太息以為仁義之厚古所未有而狼子野心飽而背德不遣謝使不賀坤成朕以君道拊之而不以臣禮報朕天地所疾將相咸怒朕惟狂謀逆節止其一二姦臣國人何辜當被殺戮是以弭兵安衆未議攻討然而逆順之理不可不明其令㳂邊諸將飭勵兵馬廣為儲峙敢有犯塞即殺無赦彼既背逆天理不有人禍必有鬼誅姑修吾疆以待其變臣料此命一出羌人愧畏雖未即欵伏而姦計沮屈無以號令其下諸路兵民知彼曲我直人思致死勇氣一發邊聲自倍此必然之勢也今朝廷日夕備邊常若冦至而但曲加隱忍不降此命使敵衆一旦犯境終亦不免交鋒若聽臣此言要之亦不出兵坐而待敵初無有異而使士氣感忿以思戰敵情知難而自屈求和之請其至必速此所謂制敵之長筭也臣竊聞朝廷近已添屯兵將増廣邊儲議絶和市使熈河帥臣招來阿里骨鬼章温溪心人多保忠等此兵法所謂上兵伐謀不戰而屈人者陛下若能饒之以金錢而寛其繩墨使將帥得盡其心間謀得盡其力則事無不成而敵漸可制矣然有一事似非臣所得言者但以䝉國厚恩不敢不盡昔熈寧元豐之間所行政令雖未必便民然先帝操之以法濟之以威是以令無不從而事無不舉頃者朝廷削去苛法施行仁政可謂善矣然而刑政不明多行姑息中外觀望靡然有縱弛怠惰之風平居無事姑以媮安可耳今虜方不順勝負之變葢未可知緩急之際威令無素何以使衆臣謂宜因事正法以明示天下臣前所言去歲大臣承用阿里骨欺罔之奏授以節制致令鬼章懷憤入冦夏人乘釁違命此則當時宰相樞密使副茍簡無謀之罪也近者涇原賊騎至者數萬殺掠數千斥候不明備禦不及熈河賊退經今累月而殺傷焚蕩之奏至今未止此則將帥弛慢不畏朝廷之罪也陛下恬不為怪畧無責問政之不修孰大於此中外相視以為疑怪朝廷方將使人蹈白刃赴湯火臣有以知其不能矣昔公孫宏為相諸侯有逆謀請歸侯印以塞責諸葛亮為相任馬謖不當請自貶三等以右將軍領事葢大臣體國不惜身自降黜為衆行法今陛下何不取去歲册命阿里骨與議大臣不論去位在位皆奪一官至於兩路將帥雖寄任不改而法不可廢皆使隨罪行罰以此號令四方庶㡬知所長憚政修于朝廷之上而敵人恐懼於千里之外勢之所至不足怪也今陛下未能正羣臣而望西羌之畏威不可得矣臣聞范仲淹守慶州因葛懷敏之敗請以任將非人因兩府遜謝損其勲爵而復其位以激勵諸將感慰邊兵時雖不用而范仲淹之言至今惜之臣雖不敏究觀往事以為可施于今不敢黙也小臣狂僭鉞斧之誅無所逃避惟陛下裁察取進止論蘭州等地狀宋事與今國家事不同難以遽斷大較文定公亦只因主㓜而當時兵將未得其禦夷之便故為此棄之之説恐非至計也右臣竊見先帝因夏國内亂用兵攻討於熈河路増置蘭州於鄜延路増置安疆米脂等五寨議者講求利害久而不决其一曰蘭州五寨所在嶮逺饋運不便若竭力固守坐困中國羌人得以養勇窺伺間隙要之久遠不得不棄危而後棄不如方今無事舉而與之猶足以示國恩惠其二曰此地皆西邉要害朝廷用兵費財僅而得之聚兵積粟為金湯之固蘭州下臨黃河當西戎咽喉之地土多衍沃畧置堡鄣可以招募弓箭手為耕戰之備自開拓以來平治徑路皆通行大兵若舉而棄之熈河必有晝閉之警所謂借冦兵資盜糧其勢必為後患此二議者臣聞之久矣然以夏戎背畔雖屢有信使而未修臣職未請侵地則棄守之議朝廷無因自發今聞遣使來賀登極歸未出境而使者復至講和請地必在兹舉雖廟堂議論巳得詳熟而小臣憂國不能嘿巳輒嘗覈實其事以為前件棄守之議皆非妄言然而朝廷當決從一議欲決此議當論時之可否理之曲直筭之多寡誠使三者得失皆見於前則棄守之議可一言而決也何謂時之可否方今皇帝陛下富於春秋諒闇不言恭黙思道太皇太后陛下覽政簾幃之中舉天下事屬之輔相當此之時安靖則有餘舉動則不足利在綏撫不利征伐今若固守不與西戎必至於爭甲兵一起呼吸生變緩急之際何所咨決况陜西河東兩路比遭用兵之厄民力困匱瘡痍未復一聞兵事無不狼顧若使外患不解内變必相因而起此所謂時可棄而不可守一也何謂理之曲直西戎近歲於朝廷本無大罪雖梁氏廢放其子而荒裔外臣本不須治以中國之法先朝必欲弔伐但誅其罪人存立孤弱則雖犬羊之羣猶將伏以聽命今乃割其土地作為城池以自封殖雖吾中國之人猶知其為利而不知其義也曲直之辨不言可見葢古之論兵者以直為壯以曲為老昔仁祖之世尤昊叛命連年入冦邊臣失律敗亡相繼然而四方士民裹糧奔命唯恐在後雖捐骨中野不以為怨兵民競勸邊守卒固而中國徐亦自定無土崩之勢何者知曲在元昊而用兵之禍朝廷之所不得巳也頃自出師西討雖一勝一負而計其所亡失未若康定寳元之多也然而邊人憤怨天下咨嗟土崩之憂企足可待何者知曲在朝廷非不得巳之兵也今若固守侵地惜而不與負不直之謗而使闗右子弟肝腦塗地臣恐邊人自此有怨叛之志此所謂理可棄而不可守二也何謂筭之多寡棄守之議朝廷若舉而行之其勢必有幸有不幸然臣今所論於守則言其幸於棄則言其不幸以効利害之實今夫固守蘭州增築堡寨招置土兵方其未成而西戎不順求助北敵並出為冦屯戍日益飛輓不繼賊兵乘勝師䘮國蹙蘭州不守熈河危急此守之不幸者也割棄蘭州專守熈河倉庾有素兵馬有備戎人懷惠不復作過此棄之幸者也二者臣皆不復言何者利害不待言而決也若夫固守蘭州増築堡寨招置土兵且耕且戰西戎懷怨未能忘爭特出虜畧勝負相半耕者不安餽運難繼耗蠧中國民不得休息此守之幸者也割棄蘭州專守熈河西戎據蘭州之堅城道熈河之夷路我師不利復以秦鳳為境修完廢壘復置烽候人力既勞費亦不小此棄之不幸者也夫守之雖幸然兵難一交仇怨不解屯兵饋糧無有休日熈河因此物價翔貴見今守而不戰歲費巳三百餘萬貫矣戰若不止戍兵必倍糧草衣賜隨亦増廣民力不支則土崩之禍或不可測也棄之雖不幸然所棄本界外無用之城秦鳳之間兵民習熟近而易守轉輸所至如枕席之上比之熈蘭難易十倍有守邊之勞而無腹心之患與平日無異也夫以守之幸較棄之不幸利害如此而况守未必幸而棄未必不幸乎且朝廷以天地之量赦其罪惡歸其侵疆復其歲賜通其和市雖豺狼野心能不愧耻縱使酋豪内懷不順而國恩深厚無以激怒其民臣料一二年間其勢必未能舉動萬一不然而使中國之士知朝廷棄巳得之地舍垢為民西戎背恩彼曲我直人懷此心勇氣自倍以攻則取以守則固天地且猶順之而况於人乎故臣願朝廷決計棄此然後慎擇名將以守熈河厚養屬國多置弓箭手於熈蘭往還要路為一大城度可屯二三千人以塞其入冦之道於秦鳳以來多置畨休之兵以為熈河緩急救應之備明敕將佐繕完守備常若冦至先為不可勝以待敵之至庶㡬可以無後患也臣自聞西使復來謹采衆議以三事參較利害反覆詳究理無可疑是以輙獻在言惟陛下裁擇幸甚再論蘭州等地狀老成持重典刑之言右臣近於六月二十八日奏以西使入界恐必有請和請地之議乞因此時舉蘭州及安疆米脂等五寨地弃而與之安邊息民為社稷之計見今西使巳到竊聞執政大臣弃守之論尚未堅決臣竊見皇帝陛下登極以來夏國雖屢遣使而疆場之事初不自言度其狡心葢知朝廷厭兵是以確然不請欲使此議發自朝廷得以為重朝廷深覺其意忍而不與情得勢窮始來請命今若又不許遣其來使徒手而歸一失此機必為後悔彼若㸃集兵馬屯聚境上許之則畏兵而與不復為恩不許則邊釁一開禍難無巳間不容髪正在此時不可失也臣又聞昔日取蘭州及五寨地本非先帝聖意先帝始議取靈武内臣李憲畏懦不敢前去遂以兵取蘭州先帝始議取橫山帥臣沈括种諤之徒不能遵奉聖畧遂以兵取五寨此二者皆由將吏不職意欲邀功免罪而先帝之意本則不然其後元豐六年夏國遣使請罪先帝嘉其恭順為敕邊吏禁止侵掠既又遣使謝恩請復疆土先帝仍為指揮保安軍與宥州議立疆界因循未定而先帝奄弃萬國遂以至今由此言之蘭州五寨取之則非先帝本心弃之則出先帝遺意今議者不深究本末妄立堅守之議茍避弃地之名不度民力不為國計其意止欲私已自便非社稷之利也臣又聞議者或謂弃守皆不免用兵弃則用兵必遲守則用兵必速遲速之問利害不遠若遂以地與之恐非得計臣聞聖人應變之機正在遲速之際但使事變稍緩則吾得算已多昔漢文景之世呉王濞内懐不軌稱病不朝積財養士謀亂天下文帝専務含養置而不問加賜几杖恩禮日隆濞雖包藏禍心而仁澤浸漬終不能發及景帝用鼂錯之謀欲因其有罪削其郡縣以為削之亦反不削亦反削之則反疾而禍小不削則反遲而禍大削書一下七國盡反至使景帝發天下之兵遣三十六將僅而破之議者若不究利害之淺深較禍福之輕重則文帝隱忍不決近於柔仁景帝剛斷必行近於疆毅然而如文帝之計禍發既遲可以徐為備禦稍經歲月變故自生以漸制之勢無不可雖有十濞了何能為如景帝之計禍發既速未及旋踵巳至交兵鋒刃既接勝負難保社稷之命決於一日雖食鼂錯之肉何益於事今者欲弃之策與文帝同而欲守之謀與景帝類臣乞宣諭執政欲弃者理直而禍緩欲守者理曲而禍速曲直遲速孰為利害况今日之事主上妙年母后聽斷將帥吏士恩情未接兵交之日誰使效命若其羽書沓至勝負紛然臨機決斷誰任其責惟乞聖慈以此反覆深慮早賜裁斷無使西戎别致猖狂弃守之議皆不得其便則天下幸甚乞招河北保甲充役以消盜賊狀子瞻嘗請於徐州籍勇悍之夫督捕盜賊即此意右臣聞薄賦斂散蓄聚若以致貧而民安其生盜賊不作縣官食租衣稅廪有餘粟帑有餘布久而不勝其富也厚賦斂奪民利若以致富而所入有限所害無窮大者亡國小者致冦冦盜一起盡所得之利不償所費之十一久而不勝其貧也臣未敢逺引陳勝呉廣龎涓黃巢之類只如淳化中李順慶厯中張海等熈寧中廖恩此數火盜賊計其燔燒官寺刼畧倉庫以至發兵命將轉輸糧食耗失兵械募士賞功之費大率不下數百萬貫但得事了豈敢言費然方其未發有能建言乞捐數十萬貫以消其變則上下爭執如惜支體不肯割截此天下之大迷古今之通患也故臣願於元豐庫或内藏庫乞錢三十萬貫上以為先帝收恩於既徃下以為社稷消患於未萌伏願陛下權福禍之重輕較得䘮之多少斷而行之毋使有司吝於出納以害大計河北之民喜為剽刼所從來尚矣近歲創為保甲驅之使離南畆教之使習凶器一夫在官一家資送窮苦無聊靡所不至椎埋為姦十人而九號為保甲莫敢誰何若更一年不罷則勝廣之事可立而待也今雖已罷而弓刀之手不可以復執鋤酒肉之口不可以復茹蔬既無所歸勢必為盜今河北冦賊成羣訪聞皆是保甲餘黨若因之以饑饉則變故之作不可復知近歲富弼知青州是時河北流民百萬轉徙京東弼既設方畧振活其老㓜而招其壯悍者為軍不待朝㫖皆刺指揮二字其後皆為勁兵百萬之衆無一人為盜者弼人臣便宜行事猶能若此况陛下富有四海而元豐及内庫錢物山積莫可計數只如近日内降睿思殿金銀一色令别庫收貯者自約及百餘萬貫皆是先帝多方收拾以備緩急支用不取於民聖筭深遠非凡所及若積而不用則與東漢西園殘唐之瓊林大盈二庫何異於先帝聖德不為無損故臣願乞三十萬貫為招軍例物選用武臣僚有才幹者一二人分往河北逐路於保甲中招其强勇精悍者為禁軍隨其人才以定軍分本州無闕則自近及遠或押上京不過一二萬人則河北豪傑畧盡矣其間武藝絶倫舊日以補班行者押赴闕試驗有實即以補内六班之闕或以補本貫及鄰近闕額軍員但當嚴賜指揮候了日當遣人覆按有不如法重坐官吏臣聞先帝本謂保甲可用故欲隱兵於農以漸消正兵是以禁軍多有闕額今保甲既罷正使無事猶闕如前所陳者惟陛下深察果斷而力行之今闕大旱二麥不熟事勢如此恐不可緩謹録奏聞伏候勅㫖唐宋八大家文鈔巻一百四十八
