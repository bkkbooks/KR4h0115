body:
  text: 唐宋八大家文鈔巻八十明茅坤撰廬陵史鈔二十四夷附録歐公次契丹本末如畫録而識之較之史記匈奴傳特相伯仲嗚呼四夷居處飲食隨水草寒暑徙遷有君長部號而無世族文字記别至於弦弓毒矢彊弱相并國地大小興滅不常是皆烏足以考述哉惟其服叛去来能為中國利害者此不可以不知也自古夷狄之於中國有道未必服無道未必不来蓋自因其衰盛雖常置之治外而覉縻制馭恩威之際不可失也其得之未必為利失之有足為患可不慎哉作四夷附録尼嚕古穆稜穆稜四夷種號多矣其大者自以名通中國其次小逺者附見又其次㣲不足録者不可勝數其地環列九州之外而西北常彊為中國患三代獫狁見於詩書秦漢以来匈奴著矣隋唐之間突厥為大其後有吐蕃回鶻之彊五代之際以名見中國者十七八而契丹最盛契丹自後魏以来名見中國或曰與庫莫奚同類而異種其居曰尼嚕古穆稜穆稜者河也是謂黄水之南黄龍之北得鮮卑之故地故又以為鮮卑之遺種當唐之世其地北接室韋東隣髙麗西界奚國而南至營州其部族之大者曰達呼哩氏後分為八部其一曰達爾扎部二曰伊斯琿部三曰舎琿部四曰諾爾威部五曰頗摩部六曰訥古齊部七曰濟勒勤部入曰實衮部部之長號大人而常推一大人建旗鼓以統八部至其嵗久或其國有災疾而畜牧衰則八部聚議以旗鼓立其次而代之被代者以為約本如此不敢爭某部大人約尼次立時劉仁恭據有幽州數出兵摘星嶺攻之每嵗秋霜落則燒其野草契丹馬多饑死即以良馬賂仁恭求市牧地請聽盟約甚謹八部之人以為約尼不任事選於其衆以安巴堅代之安巴堅亦不知何部人也為人多智勇而善騎射是時劉守光暴虐幽涿之人多亡入契丹安巴堅乗間入塞攻䧟城邑俘其人民依唐州縣置城以居之漢人教安巴堅曰中國之王無代立者由是安巴堅益以威制諸部而不肯代其立九年諸部以其久不代共責誚之安巴堅不得已傳其旗鼓而謂諸部曰吾立九年所得漢人多矣吾欲自為一部以治漢城可乎諸部許之漢城在炭山東南欒河上有鹽鐵之利乃後魏滑鹽縣也其地可植五穀安巴堅率漢人耕種為治城郭邑屋㕓市如幽州制度漢人安之不復思歸安巴堅知衆可用用其妻舒嚕䇿使人告諸部大人曰我有鹽池諸部所食然諸部知食鹽之利而不知鹽有主人可乎當来犒我諸部以為然共以牛酒㑹鹽池安巴堅伏兵其旁酒酣伏發盡殺諸部大人遂立不復代梁將簒唐晉王李克用使人聘于契丹安巴堅以兵三十萬㑹克用于雲州東城置酒酒酣握手約為兄弟克用贈以金帛甚厚期共舉兵擊梁安巴堅遺晉馬千匹既歸而背約遣使者袍笏美楞聘梁梁遣太府卿髙頃軍將郎公逺等報聘逾年頃還安巴堅遣使者嘉哩隨頃以良馬貂裘朝霞錦聘梁奉表稱臣以求封冊梁復遣公逺及司農卿渾特以詔書報勞别以記事賜之約共舉兵滅晉然後封冊為甥舅之國又使以子弟三百騎入衛京師克用聞之大恨是嵗克用病臨卒以一箭屬莊宗期必滅契丹渾特等至契丹安巴堅不能如約梁亦未嘗封冊而終梁之世契丹使者四至莊宗天祐十三年安巴堅攻晉蔚州執其振武節度使李嗣本是時莊宗已得魏博方南向與梁爭天下遣李存矩發山北兵存矩至祈溝關兵叛擁偏將盧文進擊殺存矩亡入契丹契丹攻破新州以文進部將劉殷守之莊宗遣周徳威擊殷而文進引契丹數十萬大至徳威懼引軍去為契丹追及大敗之徳威走幽州契丹圍之幽薊之間敵騎遍滿山谷所得漢人以長繩連頭繫之於木漢人夜多自解逃去文進又教契丹為水車地道起土山以攻城城中鎔銅鐵汁揮之中者輒爛墮徳威拒守百餘日莊宗遣李嗣源閻寳李存審等救之契丹數為李嗣源所敗乃解去契丹比佗部族尤頑傲父母死以不哭為勇載其尸深山置大木上後三嵗徃取其骨焚之酹而呪曰夏時向陽食冬時向隂食使我射獵猪鹿多得其風俗與奚靺􅞘頗同至安巴堅稍并服旁諸小國而多用漢人漢人教之以隷書之半増損之作文字數千以代刻木之約又制婚嫁置官號乃僭稱皇帝自號天皇王以其所居横帳地名為姓曰錫里錫里譯者謂之耶律名年曰天贊以其所居為上京起樓其間號西樓又於其東千里起東樓北三百里起北樓南木葉山起南樓徃来射獵四樓之間契丹好鬼而貴日每月朔旦東向而拜日其大㑹聚視國事皆以東向為尊四樓門屋皆東向莊宗討張文禮圍鎮州定州王處直懼鎮且亡晉兵必并擊已遣其子郁説契丹使入塞以牽晉兵郁謂安巴堅曰臣父處直使布愚欵曰故趙王王鎔王趙六世鎮州金城湯池金帛山積燕姬趙女羅綺盈廷張文禮得之而為晉所攻懼死不暇故皆留以待皇帝安巴堅大喜其妻舒嚕不肯曰我有羊馬之富西樓足以娱樂今捨此而逺赴人之急我聞晉兵彊天下且戰有勝敗後悔何追安巴堅躍然曰張文禮有金玉百萬留待皇后可共取之於是空國入寇郁之召契丹也定人皆以為契丹必為患不可召而處直不聽郁已去處直為其子都所廢安巴堅攻幽州不克又攻涿州䧟之聞處直廢而都立遂攻中山渡沙河郁告急於莊宗莊宗自將鐵騎五千遇契丹前鋒於新城晉兵自桑林馳出人馬精甲光明燭日契丹愕然稍却晉軍乗之敵遂散走而沙河冰薄敵皆䧟沒安巴堅退保望都㑹天大雪契丹人馬饑寒多死安巴堅顧盧文進以手指天曰天未使我至此乃引兵去莊宗躡其後見其宿處環結在地方隅整然雖去而不亂嘆曰彼法令嚴蓋如此也契丹雖無所得而歸然自此頗有窺中國之志患渤海等重兵在其後欲擊渤海懼中國乗其虛乃遣使聘唐以通好同光之間使者再至莊宗崩明宗遣供奉官姚坤告哀於契丹坤至西樓而安巴堅方東攻渤海坤追至慎州見之安巴堅錦袍大帶垂後與其妻對坐穹廬中延坤入謁安巴堅問曰聞爾河南北有兩天子信乎坤曰天子以魏州軍亂命總管令公將兵討之而變起洛陽凶問今至矣總管返兵河北赴難京師為衆所推已副人望安巴堅仰天大哭曰晉王與我約為兄弟河南天子即吾兒也昨聞中國禍亂欲以甲馬五萬徃助吾兒而渤海未除志願不遂又曰我兒既沒理當取我商量新天子安得自立坤曰新天子將兵二十年位至大總管所領精兵三十萬天時人事其可得違其子托雲在側曰使者無多言蹊田奪牛豈不為過坤曰應天順人豈比匹夫之事至如天皇王得國而不代豈彊取之耶安巴堅即慰勞坤曰理正當如是爾又曰吾聞此兒有宫婢二千人樂官千人放鷹走狗嗜酒好色任用不肖不惜人民此其所以敗也我自聞其禍即舉家㫁酒解放鷹犬罷散樂官我亦有諸部樂官千人非公宴不用我若所為類吾兒則亦安能長久又謂坤曰吾能漢語然絶口不道於部人懼其効漢而怯弱也因戒坤曰爾當先歸吾以甲馬三萬㑹新天子幽鎮之間共為盟約與我幽州則不復侵汝矣安巴堅攻渤海取其扶餘一城以為東丹國以其長子人皇王托雲為東丹王已而安巴堅病死舒嚕䕶其喪歸西樓立其次子元帥太子耀庫濟坤從至西樓而還當安巴堅時有韓延徽者幽州人也為劉守光參軍守光遣延徽聘于契丹延徽見安巴堅不拜安巴堅怒留之不遣使牧羊馬久之知其材召與語奇之遂用以為謀主安巴堅攻党項室韋服諸小國皆延徽謀也延徽後逃歸事莊宗莊宗客將王緘譖之延徽懼求歸幽州省其母行過常山匿王徳明家居數月徳明問其所向延徽曰吾欲復走契丹徳明以為不可延徽曰安巴堅失我如喪兩目而折手足今復得我必喜乃復走契丹安巴堅見之果大喜以謂自天而下安巴堅僭號以延徽為相號政事令契丹謂之崇文令公後卒契丹耀庫濟後更名徳光葬安巴堅木葉山諡曰大聖皇帝後更其名曰億徳光立三年改元曰天顯遣使者以名馬聘唐并求碑石為安巴堅刻銘明宗厚禮之遣飛勝指揮使安念徳報聘定州王都反唐遣王晏球討之都以蠟丸書走契丹求援徳光遣托諾䇿稜等以騎五千救都都及托諾擊晏球於曲陽為晏球所敗徳光又遣特哩衮和敏益托諾以騎七千晏球又敗之于唐河和敏與數騎返走至幽州為趙徳鈞所執而晏球攻破定州擒托諾䇿稜皆送京師明宗斬托諾等而赦和敏選其壯健者五十餘人為契丹直初安巴堅死長子東丹王托雲當立其母舒嚕遣其幼子安圖少君之扶餘代之將立以為嗣然舒嚕尤愛徳光徳光有智勇素已服其諸部安圖已去而諸部希舒嚕意共立徳光托雲不得立長興元年自扶餘泛海奔于唐明宗因賜其姓為東丹而更其名曰慕華以其来自遼東乃以瑞州為懐化軍拜慕華懐化軍節度瑞慎等州觀察處置等使其部曲五人皆賜姓名罕扎曰罕友通瑪古曰穆順義薩喇曰羅賓徳伊緜曰易師仁哈里曰蓋来賓以為歸化歸徳將軍郎將又賜前所獲和敏姓名曰狄懐惠聶哷曰列知恩策稜曰原知感福郎曰服懐造伊聶濟曰乙懐宥其餘為契丹直者皆賜姓名二年更賜托雲姓李更其名曰贊華三年以贊華為義威軍節度使契丹自安巴堅時侵滅諸國稱雄北方及救王都為王晏球所敗喪其萬騎又失和敏等皆名將而舒嚕尤思念托雲自是卑辭厚幣數遣使聘中國因求歸和敏策稜等唐輒斬其使而不報當此之時中國之威幾振距幽州北十百里有榆關關東臨海北有兎耳覆舟山山皆斗絶並海東北有路狹僅通車其旁地可耕種唐時置東西狹石淥疇米磚長揚黄花紫䝉白狼等戍以扼契丹於此戍兵常自耕食惟衣絮嵗給幽州久之皆有田宅養子孫以堅守為己利自唐末幽薊割據戍兵廢散契丹因得出陷平營而幽薊之人嵗苦寇鈔自涿州至幽州百里人跡斷絶轉餉常以兵䕶送契丹多伏兵於鹽溝以擊奪之莊宗之末趙徳鈞鎮幽州於鹽溝置良鄉縣又於幽州東五十里築城皆戍以兵及破和敏等又於其東置三河縣由是幽薊之人始得耕牧而輸餉可通徳光乃西徙横帳居庫哩泊出寇雲朔之間明宗患之以石敬塘鎮河東總大同彰國振武威塞等軍禦之應順清泰之間調發饋餉逺近勞敝徳光事其母甚謹常侍立其側國事必告而後行石敬塘反唐遣張敬達等討之敬塘遣使求救於徳光徳光白其母曰吾嘗夢石郎召我而使者果至豈非天耶母召胡巫問吉凶巫言吉乃許是嵗九月契丹出雁門車騎連亘數十里將至太原遣人謂敬塘曰吾為爾今日破敵可乎敬塘報曰皇帝赴難要在成功不在速大軍逺来而唐軍甚盛願少待之使者未至而兵已交敬達大敗敬塘夜出北門見徳光約為父子問曰大兵逺来戰速而勝者何也徳光曰吾謂唐兵能守雁門而扼諸險要則事未可知今兵長驅深入而無阻吾知大事必濟且吾兵多難久宜以神速破之此其所以勝也敬達敗退保晉安寨徳光圍之唐遣趙徳鈞延壽救敬達而徳鈞父子按兵圑柏谷不救徳光謂敬塘曰吾三千里赴義義當徹頭乃築壇晉城南立敬塘為皇帝自解衣冠被之册曰咨爾子晉王予視爾猶子爾視予猶父已而楊光逺殺敬達降晉晉髙祖自太原入洛陽徳光送至潞州趙徳鈞延壽出降徳光謂晉髙祖曰大事已成吾命大相溫從爾渡河吾亦留此俟爾入洛而後北臨訣執手嘘欷脱白貂裘以衣髙祖遺以良馬二十匹戰馬千二百匹戒曰子子孫孫無相忘時天顯九年也髙祖已入洛徳光乃北執趙徳鈞延壽以歸徳鈞幽州人也事劉守光守文為軍挍莊宗伐燕得之賜姓名曰李紹斌其子延壽本姓劉氏常山人也其父刓為蓨縣令劉守文攻破蓨縣徳鈞得延壽并其母种氏而納之因以延壽為子延壽為人資質妍柔稍涉書史明宗以女妻之號興平公主莊明之世徳鈞鎮幽州十餘年以延壽故尤見信任延壽明宗時為樞密使罷至廢帝立復以為樞密使晉髙祖起太原廢帝遣延壽將兵討之而徳鈞亦請以鎮兵討賊廢帝察其有異志使自飛狐出擊其後而徳鈞南出吳兒㑹延壽於西唐延壽因以兵屬之廢帝以徳鈞為諸道行營都統延壽為太原南面招討使徳鈞為延壽求鎮州節度使廢帝怒曰徳鈞父子握彊兵求大鎮茍能敗契丹而破太原雖代予亦可若玩寇要君但恐犬兎俱斃因遣使者趣徳鈞等進軍徳鈞隂遣人聘徳光求立已為帝徳光指穹廬前巨石謂徳鈞使者曰吾已許石郎矣石爛可改也徳光至潞州鎖徳鈞父子而去徳光母舒嚕見之問曰汝父子自求為天子何耶徳鈞慙不能對悉以田宅之籍獻之舒嚕問何在曰在幽州舒嚕曰幽州屬我矣何獻之為明年徳鈞死徳光以延壽為幽州節度使封燕王契丹當莊宗明宗時攻陷營平二州及已立晉又得雁門以北幽州節度管内合一十六州乃以幽州為燕京改天顯十一年為㑹同元年更其國號大遼置百官皆依中國參用中國之人晉髙祖每遣使聘問奉表稱臣嵗輸絹三十萬匹其餘寳玉珍異下至中國飲食諸物使者相屬於道無虚日徳光約髙祖不稱臣更表為書稱兒皇帝如家人禮徳光遣中書令韓熲奉冊髙祖為英武明義皇帝髙祖復遣趙瑩馮道等以太常鹵薄奉冊徳光及其母尊號終其世奉之甚謹髙祖崩出帝即位徳光怒其不先以告而又不奉表不稱臣而稱孫數遣使者責晉晉大臣皆恐而景延廣對契丹使者語獨不遜徳光益怒楊光逺反青州招之開運元年春徳光傾國南寇分其衆為三西出鴈門攻并代劉知逺擊敗之于秀容東至于河陷博州以應光逺徳光與趙延壽南攻陷貝州徳光屯元城兵及黎陽晉出帝親征遣李守貞等東馳馬家渡擊敗契丹而徳光與晉相距于河月餘聞馬家渡兵敗乃引衆擊晉戰于戚城徳光臨陣望見晉軍旗幟光明而士馬嚴整有懼色謂其左右曰楊光逺言晉家兵馬半已餓死何其盛也兵既交殺傷相半陣間斷箭遺鏃布厚寸餘日暮徳光引去分其兵為二一出滄州一出深州以歸二年正月徳光復傾國入寇圍鎮州分兵攻下鼓城等九縣杜重威守鎮州閉壁不敢出契丹南掠邢洺磁至于安陽河千里之内焚剽殆盡契丹見大桑木罵曰吾知紫披襖出自汝身吾豈容汝活耶束薪於木而焚之是時出帝病不能出征遣張從恩安審琦皇甫遇等禦之遇前渡漳水遇契丹戰于榆林幾為所獲審琦從後救之契丹望見塵起謂救兵至引去而從恩畏怯不敢追亦引兵南走黎陽契丹已北而出帝疾少間乃下詔親征軍于澶州遣杜重威等北伐契丹歸至古北聞晉軍且至即復引而南及重威戰于陽城衛村晉軍饑渴鑿井輒壊絞泥汁而飲徳光坐奚車中呼其衆曰晉軍盡在此矣可生擒之然後平定天下㑹天大風晉軍奮死擊之契丹大敗徳光喪車騎一白槖駞而走至幽州其首領大將各笞數百獨趙延壽免焉是時天下旱蝗晉人苦兵乃遣開封府軍將張暉假供奉官聘于契丹奉表稱臣以脩和好徳光語不遜然契丹亦自厭兵徳光母舒嚕嘗謂晉人曰南朝漢兒爭得一向卧耶自古聞漢来和蕃不聞蕃去和漢若漢兒實有回心則我亦何惜通好晉亦不復遣使然數以書招趙延壽延壽見晉衰而天下亂嘗有意窺中國而徳光亦嘗許延壽滅晉而立之延壽得晉書偽為好辭報晉言身陷敵思歸約晉發兵為應而徳光將髙牟翰亦詐以瀛州降晉晉君臣皆喜三年七月遣杜重威李守貞張彦澤等出兵為延壽應兵趨瀛州牟翰空城而去晉軍至城下見城門皆啓疑有伏兵不敢入遣梁漢璋追牟翰及之漢璋戰死重威等軍屯武彊徳光聞晉兵出乃入寇鎮州重威西屯中渡與徳光夾水而軍徳光分兵並西山出晉軍後攻破欒城縣縣有騎軍千人皆降於敵徳光每獲晉人刺其面文曰奉勅不殺縱以南歸重威等被圍糧絶遂舉軍降徳光喜謂趙延壽曰所得漢兒皆與爾因以龍鳯赭袍賜之使衣以撫晉軍亦以赭袍賜重威遣傅往兒監張彦澤將騎二千先入京師晉出帝與太后為降表自陳過咎徳光遣嘉哩以手詔賜帝曰孫兒但勿憂管取一喫飯處徳光將至京師有司請以法駕奉迎徳光曰吾躬擐甲胄以定中原太常之儀不暇顧也止而不用出帝與太后出郊奉迎徳光辭不見曰豈有兩天子相見於道路耶四年正月丁亥朔旦晉文武百官班于都城北望帝拜辭素服紗帽以待徳光被甲衣貂裘貂帽立馬于髙岡百官俯伏待罪徳光入自封丘門登城樓遣通事宣言諭衆曰我亦人也可無懼我本無心至此漢兵引我来爾遂入晉宫宫中嬪妓迎謁皆不顧夕出宿于赤岡封出帝負義侯遷于黄龍府癸已入居晉宫以契丹守諸門門廡殿庭皆磔犬掛皮以為厭勝甲午徳光本服視朝于廣政殿乙未被中國冠服百官常參起居如晉儀而氊裘左袵胡馬奚車羅列堦陛晉人俛首不敢仰視二月丁巳朔金吾六軍殿中省仗太常樂舞陳于廷徳光冠通天冠服絳紗袍執大珪以視朝大赦改晉國為大遼國開運四年為㑹同十年徳光嘗許趙延壽滅晉而立以為帝故契丹擊晉延壽嘗為先鋒虜掠所得悉以奉徳光及其母舒嚕徳光巳滅晉而無立延壽意延壽不敢自言因李崧以求為皇太子徳光曰吾於燕王無所愛惜雖我皮肉可為燕王用者吾可割也吾聞皇太子是天子之子燕王豈得為之乃命與之遷秩翰林學士張礪進擬延壽中京留守大丞相録尚書事都督中外諸軍事徳光索筆塗其録尚書事都督中外諸軍事止以為中京留守大丞相而延壽前為樞密使封燕王皆如故又以礪為右僕射兼門下侍郎同中書門下平章事與晉故相和凝並為宰相礪明宗時翰林學士晉髙祖起太原唐廢帝遣礪督趙延壽進軍於圑柏谷已而延壽為徳光所鎖并礪遷于契丹徳光重其文學仍以為翰林學士礪嘗思歸逃至境上為追者所得徳光責之礪曰臣本漢人衣服飲食言語不同今思歸不得生不如死徳光顧其通事唐髙英曰吾戒爾輩善待此人致其逃去過在爾也因笞唐英一百而待礪如故其愛之如此徳光將視朝有司給延壽貂蟬冠礪三品冠服延壽與礪皆不肯服而延壽别為王者冠以自異礪曰吾在上國時晉遣馮道奉冊北朝道賫二貂冠其一宰相韓延徽冠之其一命我冠之今其可降服耶卒冠貂蟬以朝三月丙戌朔徳光服靴袍御崇元殿百官入閣徳光大悦顧其左右曰漢家儀物其盛如此我得於此殿坐豈非真天子耶其母舒嚕遣人賫書及安巴堅明殿書賜徳光明殿若中國陵寢下宫之制其國君死葬則於其墓側起屋謂之明殿置官屬職司嵗時奉表起居如事生置明殿學士一人掌答書詔每國有大慶弔學士以先君之命為書以賜國君其書常曰報兒皇帝云徳光已滅晉遣其部族酋豪及其通事為諸州鎮刺史節度使括借天下錢帛以賞軍胡兵人馬不給糧草日遣數十騎分出四野刼掠人民號為打草穀東西二三千里之間民被其毒逺近怨嗟漢髙祖起太原所在州鎮多殺契丹守將歸漢徳光大懼又時已熱乃以蕭翰為宣武軍節度使翰契丹之大族其號阿巴翰之妹亦嫁徳光而阿巴本無姓氏契丹呼為國舅及將以為節度使李崧為製姓名曰蕭翰於是始姓蕭徳光已留翰守汴乃北歸以晉内諸司伎術宫女諸軍將卒數千人從自黎陽渡河行至湯隂登愁死岡謂其宣徽司髙勲曰我在上國以打圍食肉為樂自入中國心常不快若得復吾本土死亦無恨勲退而謂人曰是將死矣相州梁暉殺契丹守將閉城距守徳光引兵攻破之城中男子無少長皆屠之婦女悉驅以北後漢以王繼宏鎮相州得髑髏千數萬枚為大塜葬之徳光至臨洺見其井邑荒殘笑謂晉人曰致中國至此皆燕王為罪首又顧張礪曰爾亦有力焉徳光行至欒城得疾卒于殺虎林契丹破其腹去其腸胃實之以鹽載而北晉人謂之帝羓焉永康王烏雲立諡徳光為嗣聖皇帝號安巴堅為太祖徳光為太宗唐宋八大家文鈔巻八十
