body:
  text: 唐宋八大家文鈔巻二十明茅坤撰柳州文鈔四書啟上李夷簡相公書日月使持節栁州諸軍事守栁州刺史栁宗元謹獻書于相公閣下宗元聞有行三塗之艱而墜千仞之下者仰望於道號以求出過之者日千百人皆去而不顧就令哀而顧之者不過攀木俯首深矉太息良久而去耳其卒無可奈何然其人猶望而不止也俄而有若烏獲者持長綆千尋徐而過焉其力足為也其器足施也號之而不顧顧而曰不能力則其人知必死於大壑矣何也是時不可遇而幸遇焉而又不逮乎巳然後知命之窮勢之極其卒呼憤自斃不復望於上矣宗元曩者齒少心銳徑行髙歩不知道之艱以陷乎大阨窮躓殞墜廢為孤囚日號而望者十四年矣其不顧而去與顧而深矉者俱不之焉然猶仰首伸吭張目而視曰庶幾乎其有異俗之心非常之力當路而垂仁者耶今閣下以仁義正直入居相位宗元實竊拊心自慶以為獲其所望故敢致其詞以聲其哀若又捨而不顧則知沈埋踣斃無復振矣伏惟動心焉宗元得罪之由致謗之自以閣下之明其知之久矣繁言蔓詞秪益為黷伏惟念墜者之至窮錫烏獲之餘力舒千尋之綆垂千仞之艱致其不可遇之遇以卒成其幸庶號而望者得畢其誠無使呼憤自斃沒有餘恨則士之死於門下者宜無先焉生之通塞决在此舉無任戰汗隕越之至子厚困阨之久故其書呼號哀籲若此錄而存之以見其始末云答元饒州論政理書纖悉奉書辱示以政理之説及劉夢得書往復甚善類非今之長人者之志不惟充賦税養禄秩足巳而巳獨以庶富且敎為大任甚盛甚盛孔子曰吾與回言終日不違如愚然則䝉者固難曉必勞申諭乃得悦服用是尚有一疑焉兄所言免貧病者而不益富者税此誠當也乘理政之後固非若此不可不幸乘弊政之後其可爾耶夫弊政之大莫若賄賂行而征賦亂苟然則貧者無貲以求於吏所謂有貧之實而不得貧之名富者操其贏以市於吏則無富之名而有富之實貧者愈困餓死亡而莫之省富者愈恣横侈秦而無所忌兄若所遇如是則將信其故乎是不可懼撓人而終不問也固必問其實問其實則貧者固免而富者固增賦矣安得持一定之論哉若曰止免貧者而富者不問則僥倖者衆皆挾重利以邀貧者猶若不免焉若曰檢富者懼不得實而不可增焉則貧者亦不得實不可免矣若皆得實而故縱以為不均何哉孔子曰不患寡而患不均不患貧而患不安今富者税益少貧者不免於捃拾以輸縣官其為不均大矣非唯此而巳必将服役而奴使之多與之田而取其半或乃取其一而收其二三主上思人之勞苦或減除其税則富者以戸獨免而貧者以受役卒輸其二三與半焉是澤不下流而人無所告訴其為不安亦大矣夫如是不一定經界覈名實而姑重改作其可理矣乎富室貧之母也誠不可破壞然使其大倖而役於下則又不可兄云懼富人流為工商浮窳蓋甚急而不均則有此耳若富者雖益賦而其實輸當其十一猶足安其堵雖驅之不肯易也檢之逾精則下逾巧誠如兄之言管子亦不欲以民産為征故有殺畜伐木之説今若非市井之征則捨其産而唯丁田之問推以誠質示以恩惠嚴責吏以法如所陳一社一村之制逓以信相考安有不得其實不得其實則一社一村之制亦不可行矣是故乗弊政必湏一定制而後兄之説乃得行焉䝉之所見及此而已永州以僻隅少知人事元之所代者誰耶理歟弊歟理則其説行矣若其弊也䝉之説其在可用之數乎因南人來重曉之其他皆善愚不足以議願同夢得之云者兄通春秋取聖人大中之法以為理饒之理小也不足費其慮無所論刺故獨舉均賦之事以求往復而除其惑焉不習吏職而強言之宜為長者所笑弄然不如是則無以來至當之言蓋明而敎之君子所以開後學也又聞兄之莅政三日舉韓宣英以代巳宣英逹識多聞而習於事宜當賢者類舉今負罪屏棄凡人不敢稱道其善又况聞於大君以二千石薦之哉是乃希世㧞俗果於直道斯古人之所難而兄行之宗元與宣英同罪皆世所背馳者也兄一舉而德皆及焉祁大夫不見叔向今而預知斯舉下走之大過矣書雖多言不足導意故止於此不宣與吕恭書中亦有佳處荆川云學左氏外傳宗元白元生至得弟書甚善諸所稱道具之元生又持部中廬墓父者所得石書模其文示余云若將聞於上余故恐而疑焉僕蚤好觀古書家所蓄晉魏時尺牘甚具又二十年來徧觀長安貴人好事者所蓄殆無遺焉以是善知書雖未嘗見名氏亦望而識其時也又文章之形狀古今特異弟之精敏通逹夫豈不究於此今視石文署其年曰永嘉其書則今田野人所作也雖支離其字尤不能近古為其永字等頗效王氏變法皆永嘉所未有辭尤鄙近若今所謂律詩者晉時蓋未嘗為此聲大謬妄矣又言植松烏擢之怪而掘其土得石尤不經難信或者得無姦為之乎且古之言塟者藏也壤樹之而君子以為議况廬而居者其足尚之哉聖人有制度有法令過則為辟故立大中者不尚異敎人者欲其誠是故惡夫飾且偽也過制而不除喪宜廬於庭而矯於墓者大中之罪人也况又出怪物詭神道以奸大法而因以為利乎夫偽孝以奸利誠仁者不忍擿過恐傷於敎也然使偽可為而利可冒則敎益壤若然者勿與知焉可也伏而不出之可也以大夫之政良而吾子賛焉固無闕遺矣作東郛改市􅆵去比竹茨草之室而垍土大木陶甄梓匠之工備孽火不得作化惰窳之俗絶偷浮之源而條桑浴種深耕易耨之力用寛徭嗇貨均賦之政起其道美矣於斯也慮善善之過而莫之省誠慤之道少損故敢私言之夫以淮濟之清有玷焉若秋豪固不為病然而萬一離婁子眇然睨之不若無者之快也想黙巳其事無出所置書幸甚宗元白賀進士王参元失火書深識之言逼古之文得楊八書知足下遇火災家無餘儲僕始聞而駭中而疑終乃大喜蓋將吊而更以賀也道遠言略猶未能究知其狀若果蕩焉泯焉而悉無有乃吾所以尤賀者也足下勤奉養樂朝夕惟恬安無事是望也今乃有焚煬赫烈之虞以震駭左右而脂膏滫瀡之具或以不給吾是以始而駭也凡人之言皆曰盈虚倚伏去來之不可常或將大有為也乃始厄困震悸於是有水火之孽有羣小之慍勞苦變動而後能光明古之人皆然斯道遼闊誕漫雖聖人不能以是必信是故中而疑也以足下讀古人書為文章善小學其為多能若是而進不能出羣士之上以取顯貴者蓋無他焉京城人多言足下家有積貨士之好廉名者皆畏忌不敢道足下之善獨自得之心蓄之銜忍而不出諸口以公道之難明而世之多嫌也一出口則嗤嗤者以為得重賂僕自貞元十五年見足下之文章蓄之者蓋六七年未嘗言是僕私一身而負公道久矣非特負足下也及為御史尚書郎自以幸為天子近臣得奮其舌思以發明足下之鬰塞然時稱道於行列猶有顧視而竊笑者僕良恨修已之不亮素譽之不立而為世嫌之所加常與孟幾道言而痛之乃今幸為天火之所盪滌凡衆之疑慮舉為灰埃黔其廬赭其垣以示其無有而足下之才能乃可以顯白而不汚其實出矣是祝融回禄之相吾子也則僕與幾道十年之相知不若兹火一夕之為足下譽也宥而彰之使夫蓄於心者咸得開其喙發䇿決科者授子而不慄雖欲如嚮之蓄縮受侮其可得乎於兹吾有望於子是以終乃大喜也古者列國有災同位者皆相吊許不吊災君子惡之今吾之所陳若是有以異乎古故將吊而更以賀也顔曾之養其為樂也大矣又何闕焉足下前要僕文章古書極不忘候得數十幅乃併往耳吳二十一武陵來言足下為醉賦及對問大善可寄一本僕近亦好作文與在京城時頗異思與足下輩言之桎梏甚固未可得也因人南來致書訪死生不悉宗元白上西川武元衡相公謝撫問啟子厚諸啓非為四六而已中多奇峭沉鬱之㫖予不能盡錄錄凡四首某啟某愚陋狂簡不知周防失於夷途陷在大罪伏匿嶺下于今七年追念往愆寒心飛􅅎幸䝉在宥得自循省豈敢徹聞于廊廟之上見志於樽俎之際以求心於萬一者哉相公以含𢎞光大之徳廣博淵泉之量不遺垢汚先賜榮示奉讀流涕以懼以悲屏營舞躍不敢寧處是將收孟明於三敗責曹沬於一舉俾折脅臏脚之倫得自拂飾以期效命於鞭䇿之下此誠大君子并容廣覽棄瑕録用之道也自顧孱鈍無以克堪祗受大賜豈任負戴精誠之至炯然如日拜伏無路不勝惶惕輕冒威重戰汗交深賀趙江陵宗儒辟符載啟某啟伏聞以武都符載為記室天下立志之士雜然相顧繼以歎息知為善者得其歸嚮流言者有所間執直道之所行義風之所揚堂堂焉實在荆山之南矣幸甚幸甚夫以符君之藝術志氣為時聞人才位未㑹盤桓固久中間因緣陷在危邦與時偃仰不廢其道而為見忌嫉者横致唇吻房給事以高節特立聞之於朝王吏部以清議自任辨之於外然猶小人浮議困在交戟凡諸侯之欲得符君者城聯壤接而惑於騰沸環視相讓莫敢先舉及受署之日則皆開口垂臂悵望悼悔譬之求珠於海而徑寸先得則衆皆怏然罷去知竒寳之有所歸也嗚呼巧言難明下流多謗自非大君子出世之氣則何望焉贍望清風若在天外無任感激欣躍之至輕瀆陳賀不勝戰越不宣上襄陽李僕射愬獻唐雅詩啟佳什宗元啟昔周宣中興得賢臣召虎師出江漢以平淮夷故其詩曰江漢之滸王命召虎其卒章曰于周受命自召祖命以明虎者召公之孫克承其先也今天子中興而得閣下亦出江漢以平淮夷克承于先西平王其事正類然而未有嗣大雅之説以布天下以施後代豈聖唐之文雅獨後於周室哉宗元身雖陷敗而其論著往往不為世屈意者殆不可自薄自匿以墜斯時苟有輔萬分之一雖死無憾謹撰平淮夷雅二篇齋沐上獻誠醜言淫聲不足以當金石庶繼代洪烈稗官里人得採而歌之不勝憤踊之至輕瀆威重戰越交深謹啟上權德與補闕溫巻啟補闕執事宗元聞之重遠輕邇賤視貴聽所由古矣切以宗元幼不知恥少又躁進拜揖長者自于幼年是以簉俊造之末跡厠牒計之下列賈藝求售闃無善價載文筆而都儒林者匪親乃舊率皆擕撫相示談笑見眤喔咿逡巡為逹者嗤無乃覩其樸者鄙其成狎其幼者薄其長耶將行不拔異操不砥礪學不該廣文不炳燿實可鄙而薄耶今鴛鷺充朝而獨于執事者特以顧下念舊收接儒素異乎他人耳敢問厥由庶幾告之俾識去就幸甚幸甚今將慷慨激昂奮攘布衣縱談作者之筵曵裾名卿之門抵掌峩弁厚自潤澤進越無恧汙逹者之視聽狂狷愚妄固不可為也復欲俛黙惕息疊足榻翼拜祈公侯之閽跪邀賢逹之車竦魂慄股兢恪危懼榮者倦之彌忿厥心又不可為也若慎守其常確執厥中固其所矣則又色平氣柔言訥性魯無特逹之節無推擇之行𤨏𤨏碌碌一孺子耳孰謂其可進孰謂其可退抑又聞之不鼔踴無以超泥塗不曲促無以由險艱不守常無以處明分不執中無以趍夷軌今則鼓踴乎曲促乎守其常而執厥中乎浩不知其宜矣進退無倚宵不遑寐乃訪于故人而咨度之其人曰補闕權君著名踰紀行為人高言為人信力學掞文時儕稱雄子亟拜之足以發揚對曰衷燕石而履𤣥圃帯魚目而游漲海秪取誚耳曷予補乎其人曰跡之勤者情必生焉心之恭者禮必報焉况子之文不甚鄙薄者乎苟或勤以奉之恭以下之則必朂厲爾行煇燿爾能言為建瓴晨發夕被聲馳而響溢風振而草靡可使尺澤之鯢奮鱗而縱海密網之鳥舉羽而翔霄子之一名何足就矣庶為終身之遇乎曷不舉馳聲之資挈成名之基授之權君然後退行守常執中之道斯可也愚不敏以為信然是以有前日之拜又以為色取象恭大賢所飫朝造夕謁大賢所倦性頗疎野竊又不能是以有今兹之問仰惟覽其鄙心而去就之潔誠齋慮不勝至願謹再拜上大理崔大卿應制舉啟古之知已者不待來求而後施德舉能而巳其受德者不待成身而後拜賜感知而巳故不叩而響不介而合則其舉必至而其感亦甚斯道遁去遼闊千祀何為乎今之世哉若宗元者智不能經大務斷大事非有恢傑之才學不能探奥義窮章句為腐爛之儒雖或寘力於文章勤勤懇懇于嵗時然而未能極聖人之規矩恢作者之聞見勞費翰墨徒爾拖逢掖曵大帶游於朋齒且有愧色豈有能乎哉閣下何見待之厚也始者自謂抱無用之文戴不肖之容雖振身泥塵仰睎雲霄何由而能哉遂用收視内顧頫首絶望甘以沒沒也今者果不自意他日𤨏𤨏之著述幸得流於衽席接在視聽閣下乃謂可以蹈逺大之途及制作之門決然而不疑介然而獨德是何收採之特逹而顧念之勤備乎且閣下知其為人何如哉其貎之美陋質之細大心之賢不肖閣下固未知也而一遇文字志在濟拔斯蓋古之知巳者已故曰古之知己者不待來求而役施德者也然則亟來而求者誠下科也宗元向以應愽學宏詞之舉㑹閣下辱臨考第司其升降當此之時意謂運合事并適丁厥時其私心日以自負也無何閣下以鯤鱗之勢不容尺澤悠爾而自放廓然而高邁其不我知者遂排逐而委之委之誠當也使古之知己猶在豈若是求多乎哉夫仕進之路昔者竊聞于師矣太上有專逹之能乘時得君不由乎表著之列而取將相行其政焉其次有文行之美積能累勞不由乎舉甲乙歴科第登乎表著之列顯其名焉又其次則曰吾未嘗舉甲乙也未嘗歴科第也彼朝廷之位吾何修而可以登之乎必求舉是科也然後得而登之其下不能知其利又不能務其往則曰舉天下而好之吾何為獨不然由是觀之有愛錐刀者以舉是科為悦者也有爭尋常者以登乎朝廷為悦者也有慕權貴之位者以將相為悦者也有樂行其政者以理天下為悦者也然則舉甲乙歴科第固為末而已矣得之不加榮喪之不加憂苟成其名於逺大者何補焉然而至於感知之道則細大一矣成敗亦一矣故曰其受德者不待成身而後拜賜然則幸成其身者固末節也蓋不知來求之下者不足以收特逹之士而不知成身之末者不足以承賢逹之遇審矣伏以閣下德足以儀世才足以輔聖文足以當宗師之位學足以冠儒述之首誠為賢逹之表也顧視下輩豈容易而收哉而宗元樸野昧劣進不知退不可以言乎德不能植志於義而必以文字求逹不可以言乎才秉翰執簡敗北而歸不可以言乎文登場應對剌繆經㫖不可以言乎學固非特逹之器也忖省陋質豈容易而承之哉叨冒大遇穢累高鑒喜懼交爭不克寧居竊感荀罃如實出巳之德敢希豫讓國士遇我之報伏候門屏敢俟招納謹奉啟以代投刺之禮伏惟以知己之道終撫薦焉不宣宗元謹啟唐宋八大家文鈔巻二十
