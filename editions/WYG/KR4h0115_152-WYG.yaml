body:
  text: 唐宋八大家文鈔巻一百四十明茅坤撰東坡文鈔三十四記仁宗皇帝飛白御書記澹宕不收之音問世之治亂必觀其人問人之賢不肖必以世考之孟子曰誦其詩讀其書不知其人可乎是以論其世也合抱之木不生於歩仞之丘千金之子不出於三家之市臣嘗逮事仁宗皇帝其愚不足以測知聖德之所至獨私竊覽觀四十餘年之間左右前後之人其大者固已光明儁偉深厚雄傑不可窺較而其小者猶能敦朴愷悌靖恭持重號稱長者當是之時天人和同上下懽心才智不用而道德有餘功業難明而福禄無窮升遐以來十有二年若臣若子罔有内外下至深山窮谷老媍稚子外薄四海裔夷君長見當時之人聞當時之事未有不流涕稽首者也此豈獨上之澤歟凡在庭者與有力焉太子少傅安簡王公諱舉正臣不及見其人矣而識其為人其流風遺俗可得而稱者以世考之也熈寧六年冬以事至姑蘇其子誨出慶厯中所賜公端敏字二飛白筆一以示臣且謂臣記之將刻石而傳諸世臣官在太常職在太史於法得書且以為抱烏號之弓不若藏此筆保曲阜之履不若傳此書考追蠡以論音聲不若推點畫以究觀其所用之意存昌歜以追嗜好不若因褒貶以想見其所與之人或藏於名山或流於四方凡所見者皆當聳然而作如望旄頭之塵而聽屬車之音相與勉為忠厚而耻為浮薄或由此也夫唐荆川曰小題從大處起議論南安軍學記此等文軸多澹宕不可為法考年譜乃安置儋州時所作古之為國者四井田也肉刑也封建也學校也今亡矣獨學校僅存耳古之為學者四其大則取士論政其小則弦誦也今亡矣直誦而已舜之言曰庻頑讒説若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而颺之格則承之庸之否則威之格之言改也論語曰有耻且格承之言薦也春秋傳曰奉承齊犧庶頑讒説不率是教者舜皆有以待之夫化惡莫若進善故擇其可進者以射侯之禮舉之其不率教甚者則撻之小則書以記之非疾之也欲與之並生而同憂樂也此士之有罪而尚未可棄者故使樂工採其謳謡諷議之言而颺之以觀其心其改過者則薦之且用之不悛者則威之屏之僰之寄之之類是也此舜之學政也射之中否何與於善惡而侯以明之何也曰射所以致衆而論士也衆一而後論定孔子射於矍相之圃盖觀者如堵使弟子揚觶而序黜者三則僅有存者由此觀之以射致衆衆集而後論士盖所從來逺矣詩曰在泮獻囚又曰在泮獻馘禮曰受成於學鄭人游于鄉校以議執政或謂子産毁鄉校何如子産曰不可善者吾行之不善者吾改之是吾師也孔子聞之謂子産仁人古之取士論政者必於學有學而不取士不論政猶無學也學莫盛於東漢士數萬人嘘枯吹生自三公九卿皆折節下之三府辟召常出其口其取士論政可謂近古然卒為黨錮之禍何也曰此王政也王者不作而士自以私意行之於下其禍敗固宜朝廷自慶厯熈寧紹聖以來三致意於學矣雖荒服郡縣必有學况南安江西之南境儒術之富與閩蜀等而太守朝奉郎曹侯登以治郡顯聞所至必建學故南安之學甲於江西侯仁人也而勇於義其建是學也以身任其責不擇劇易期於必成士以此感奮不勸而力費於官者為錢九萬三千而助者不貲為屋百二十間禮殿講堂視夫邦君之居凡學之用莫不嚴具又以其餘增置廪給食數百人始於紹聖二年之冬而成於四年之春學成而侯去今為潮州軾自海南還過南安見聞其事為詳士既徳侯不已乃具列本末贏糧而從軾者三百餘里願紀其實夫學王者事也故首以舜之學政告之然舜逺矣不可以庶幾有賢太守猶可以為鄭子産也學者勉之無愧於古人而巳唐荆川曰蘇文本尚馳騁而此作尤渙散不肯受約束然惟長公可耳歐曾集内無此也醉白堂記魏公勲名本勝樂天故文不譽而思特逺故魏國忠獻韓公作堂於私第之池上名之曰醉白取樂天池上之詩以為醉白堂之歌意若有羨於樂天而不及者天下之士聞而疑之以為公既巳無愧於伊周矣而猶有羨於樂天何哉軾聞而笑曰公豈獨有羨於樂天而已乎方且願為尋常無聞之人而不可得者天之生是人也將使任天下之重則寒者求衣饑者求食凡不獲者求得茍有以與之將不勝其求是以終身處乎憂患之域而行乎利害之塗豈其所欲哉夫忠獻公既已相三帝安天下矣浩然將歸老於家而天下共挽而留之莫釋也當是時其有羨於樂天無足怪者然以樂天之平生而求之於公較其所得之厚薄淺深孰有孰無則後世之論有不可欺者矣文致太平武定亂略謀安宗廟而不自以為功急賢才輕爵禄而士不知其恩殺伐果敢而六軍安之四夷八蠻想聞其風采而天下以其身為安危此公之所有而樂天之所無也乞身於强健之時退居十有五年日與其朋友賦詩飲酒盡山水園池之樂府有餘帛廩有餘粟而家有聲伎之奉此樂天之所有而公之所無也忠言嘉謀効於當時而文采表於後世死生窮達不易其操而道徳髙於古人此公與樂天之所同也公既不以其所有自多亦不以其所無自少將推其同者而自託焉方其寓形於一醉也齊得喪忘禍福混貴賤等賢愚同乎萬物而與造物者遊非獨自比於樂天而已古之君子其處已也厚其取名也廉是以實浮於名而世誦其美不厭以孔子之聖而自比於老彭自同於丘明自以為不如顔淵後之君子實則不至而皆有侈心焉臧武仲自以為聖白圭自以為禹司馬長鄉自以為相如揚雄自以為孟軻崔浩自以為子房然世終莫之許也由此觀之忠獻公之賢於人也逺矣昔公嘗告其子忠彦將求文於軾以為記而未果既塟忠彦以告軾以為義不得辭也乃泣而書之墨妙亭記却有一種風雅熈寧四年十一月髙郵孫莘老自廣徳移守吳興其明年二月作墨妙亭於府第之北逍遥堂之東取凡境内自漢以來古文遺刻以實之吳興自東晉為善地號為山水清逺其民足於魚稻蒲蓮之利寡求而不争賓客非特有事於其地者不至焉故凡守郡者率以風流嘯咏投壺飲酒為事自莘老之至而歲適大水土田皆不登湖人大饑將相率亡去莘老大振廩勸分躬自撫循勞來出於至誠富有餘者皆爭出穀以佐官所活至不可勝計當是時朝廷方更化立法使者旁午以為莘老當日夜治文書赴期㑹不能復雍容自得如故事而莘老益喜賔客賦詩飲酒為樂又以其餘暇罔羅遺逸得前人賦詠數百篇為吳興新集其刻畫尚存而僵仆斷缺於荒陂野草之間者又皆集於此亭是嵗十二月余以事至湖周覽嘆息而莘老求文為記或以謂余凡有物必歸於盡而恃形以為固者尤不可長雖金石之堅俄而變壊至於功名文章其傳世垂後猶為差久今乃以此託於彼是久存者反求助於速壊此既昔人之惑而莘老又將深簷大屋以錮留之推是意也其無乃幾於不知命也夫余以為知命者必盡人事然後理足而無憾物之有成必有壊譬如人之有生必有死而國之有興必有亡也雖知其然而君子之養生也凡可以久生而緩死者無不用其治國也凡可以存存而救亡者無不為至於不可奈何而後已此之謂知命是亭之作否無足爭者而其理則不可以不辨故具載其説而列其名物於左云墨君堂記東坡滑稽之文篇終却少歸之於正凡人相與號呼者貴之則曰公賢之則曰君自其下則爾汝之雖公卿之貴天下貌畏而心不服則進而君公退而爾汝者多矣獨王子猷謂竹君天下從而君之無異辭今與可又能以墨象君之形容作堂以居君而屬余為文以頌君徳則與可之於君信厚矣與可之為人也端静而文明哲而忠士之修潔博習朝夕磨治洗濯以求交於與可者非一人也而獨厚君如此君又疎簡抗勁無聲色臭味可以娛悦人之耳目鼻口則與可之厚君也其必有以賢君矣世之能寒燠人者其氣燄亦未至若雪霜風雨之切於肌膚也而士鮮不以為欣戚喪其所守自植物而言之四時之變亦大矣而君獨不顧雖微與可天下其孰不賢之然與可獨能得君之深而知君之所以賢雍容談笑揮灑奮迅而盡君之徳稚壯枯老之容披折偃仰之勢風雪凌厲以觀其操崖石犖确以致其節得志遂茂而不驕不得志瘁瘠而不辱羣居不倚獨立不懼與可之於君可謂得其情而盡其性矣余雖不足以知君願從與可求君之昆弟子孫族屬朋友之象而藏於吾室以為君之别館云靈壁張氏園亭記無他超逺卓􅀈之識而風神亦自典刑道京師而東水浮濁流陸走黄塵陂田蒼莽行者勌厭凡八百里始得靈壁張氏之園於汴之陽其外修竹森然以高喬木蓊然以深其中因汴之餘浸以為陂池取山之怪石以為巖阜蒲葦蓮芡有江湖之思椅桐檜栢有山林之氣竒花美草有京洛之態華堂厦屋有吳蜀之巧其深可以隱其富可以養果蔬可以飽鄰里魚鼈筍茹可以餽四方之賔客余自彭城移守吳興由宋登舟三宿而至其下肩輿叩門見張氏之子碩碩求余文以記之維張氏世有顯人自其伯父殿中君與其先人通判府君始家靈壁而為此園作蘭臯之亭以養其親其後出仕於朝名聞一時推其餘力日增治之於今五十餘年矣其木皆十圍岸谷隱然凡園之百物無一不可人意者信其用力之多且久也古之君子不必仕不必不仕必仕則忘其身必不仕則忘其君譬之飲食適於飢飽而巳然士罕能蹈其義赴其節處者安於故而難出出者狃於利而忘返於是有違親絶俗之譏懐禄茍安之弊今張氏之先君所以為其子孫之計慮者逺且周是故築室蓺園於汴泗之間舟車冠盖之衝凡朝夕之奉燕遊之樂不求而足使其子孫開門而出仕則跬步市朝之上閉門而歸隱則俯仰山林之下於以養生治性行義求志無適而不可故其子孫仕者皆有循吏良能之稱處者皆有節士廉退之行盖其先君子之澤也余為彭城二年樂其土風將去不忍而彭城之父老亦莫余厭也將買田於泗水之上而老焉南望靈壁雞犬之聲相聞幅巾杖屨歳時往來於張氏之園以與其子孫遊將必有日矣王君寳繪堂記有一種達人風㫖然地位不如荆公多矣君子可以寓意於物而不可以留意於物寓意於物雖微物足以為樂雖尤物不足以為病留意於物雖微物足以為病雖尤物不足以為樂老子曰五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂然聖人未嘗廢此四者亦聊以寓意耳劉備之雄才也而好結髦稽康之達也而好鍜鍊阮孚之放也而好蠟屐此豈有聲色臭味也哉而樂之終身不厭凡物之可喜足以悦人而不足以移人者莫若書與畫然至其留意而不釋則其禍有不可勝言者鍾繇至以此嘔血發塜宋孝武王僧䖍至以此相忌桓𤣥之走舸王涯之複壁皆以兒戲害其國凶其身此留意之禍也始吾少時嘗好此二者家之所有惟恐其失之人之所有惟恐其不吾予也既而自笑曰吾薄富貴而厚於書輕死生而重於畫豈不顛倒錯繆失其本心也哉自是不復好見可喜者雖時復蓄之然為人取去亦不復惜也譬之煙雲之過眼百鳥之感耳豈不欣然接之去而不復念也於是乎二物者常為吾樂而不能為吾病駙馬都尉王君晉鄉雖在戚里而其被服禮義學問詩書常與寒士角平居攘去膏粱屏逺聲色而從事於書畫作寳繪堂於私第之東以蓄其所有而求文以為記恐其不幸而類吾少時之所好故以是告之庶幾全其樂而逺其病也熈寧十年七月二十日記唐荆川曰墨寳堂與此二篇皆小題從大處起議論有箴規之意焉李氏藏書房記題本小而文㫖特放而逺之纔不鮮腆象犀珠玉怪珍之物有悦於人之耳目而不適於用金石草木絲麻五穀六材有適於用而用之則弊取之則竭悦於人之耳目而適於用用之而不弊取之而不竭賢不肖之所得各因其才仁智之所見各隨其分才分不同而求無不獲者惟書乎自孔子聖人其學必始於觀書當是時惟周之柱下史老􅆅為多書韓宣子適魯然後見易象與魯春秋季札聘於上國然後得聞詩之風雅頌而楚獨有左史倚相能讀三墳五典八索九丘士之生於是時得見六經者盖無幾其學可謂難矣而皆習於禮樂深於道徳非後世君子所及自秦漢以來作者益衆紙與字畫日趨於簡便而書益多世莫不有然學者益以茍簡何哉予猶及見老儒先生自言其少時欲求史記漢書而不可得幸而得之皆手自書日夜誦讀惟恐不及近歳市人轉相摹刻諸子百家之書日傳萬紙學者之於書多且易致如此其文詞學術當倍蓰於昔人而後生科舉之士皆束書不觀遊談無根此又何也予友李公擇少時讀書於廬山五老峰下白石菴之僧舍公擇既去而山中之人思之指其所居為李氏山房藏書凡九千餘巻公擇既已渉其流探其源採剥其華實而咀噍其膏味以為已有發於文詞見於行事以聞名於當世矣而書固自如也未嘗少損將以遺來者供其無窮之求而各足其才分之所當得是以不藏於家而藏於其故所居之僧舍此仁者之心也予既衰且病無所用於世惟得數年之間盡讀其所未見之書而廬山固所願遊而不得者盖將老焉盡發公擇之藏拾其餘棄以自補庶有益乎而公擇求予文以為記乃為一言使來者知昔之君子見書之難而今之學者有書而不讀為可惜也張君墨寶堂記世人之所共嗜者美飲食華衣服好聲色而已有人焉自以為高而笑之彈琴奕棋蓄古書法圖畫客至出而誇觀之自以為至矣則又有笑之者曰古之人所以自表見於後世者以有言語文章也是惡足好而豪傑之士又相與笑之以為士當以功名聞於世若乃施之空言而不見於行事此不得已者之所為也而其所謂功名者自知效一官等而上之至於伊呂稷契之所營劉項湯武之所爭極矣而或者猶不免乎笑曰是區區者曽何足言而許由辭之以為難孔丘知之以為博由此言之世之相笑豈有既乎士方志於其所欲得雖小物有捐軀忘親而馳之者故有好書而不得其法則拊心嘔血幾死而僅存至於剖塚斵棺而求之是豈有聲色臭味足以移人方其樂之也雖其口不能自言而况他人乎人特以已之不好笑人之好則過矣毘陵人張君希元家世好書所蓄古今人遺跡至多盡刻諸石築室而藏之屬予為記子蜀人也蜀人喭曰學書者紙費學醫者人費此言雖小可以喻大世有好功名者以其未試之學而驟出之於政其費人豈特醫者之比乎今張君以兼人之能而位不稱其才優㳺終嵗無所役其心智則以書自娛然以予觀之君豈久閒者蓄極而通必將大發之於政君知政之費人也甚於醫則願以予之所言者為鑒唐荆川曰此文前後各自為議論暗相照映甚宻放鶴亭記疎曠爽然特少沉深之思熈寧十年秋彭城大水雲龍山人張君之草堂水及其半扉明年春水落遷於故居之東東山之麓升高而望得異境焉作亭於其上彭城之山岡嶺四合隱然如大環獨缺其西一面而山人之亭適當其缺春夏之交草木際天秋冬雪月千里一色風雨晦明之間俯仰百變山人有二鶴甚馴而善飛旦則望西山之缺而放焉縱其所如或立於陂田或翔於雲表莫則傃東山而歸故名之曰放鶴亭郡守蘇軾時從賓客僚吏往見山人飲酒於斯亭而樂之揖山人而告之曰子知隱居之樂乎雖南靣之君未可與易也易曰鳴鶴在隂其子和之詩曰鶴鳴於九臯聲聞於天盖其為物清逺閒放超然於塵垢之外故易詩人以比賢人君子隱徳之士狎而玩之宜若有益而無損者然衛懿公好鶴則亡其國周公作酒誥衛武公作抑戒以為荒惑敗亂無若酒者而劉伶阮籍之徒以此全其真而名後世嗟夫南面之君雖清逺閒放如鶴者猶不得好好之則亡其國而山林遁世之士雖荒惑敗亂如酒者猶不能為害而况於鶴乎由此觀之其為樂未可以同日而語也山人欣然而笑曰有是哉乃作放鶴招鶴之歌曰鶴飛去兮西山之缺高翔而下覽兮擇所適翻然歛翼婉將集兮忽何所見矯然而復擊獨終日於澗谷之間兮啄蒼苔而履白石鶴歸來兮東山之隂其下有人兮黄冠草屨葛衣而鼓琴躬耕而食兮其餘以汝飽歸來歸來兮西山不可以久留文與可畫篔簹谷偃竹記中多詼諧之言而論畫竹入解竹之始生一寸之萌耳而節葉具焉自蜩腹􅉬蚹以至於劍㧞十尋者生而有之也今畫者乃節節而為之葉葉而累之豈復有竹乎故畫竹必先得成竹於胸中執筆熟視乃見其所欲畫者急起從之振筆直遂以追其所見如兎起鶻落少縱則逝矣與可之教予如此予不能然也而心識其所以然夫既心識其所以然而不能者内外不一心手不相應不學之過也故凡有見於中而操之不熟者平居自視了然而臨事忽焉喪之豈獨竹乎子由為墨竹賦以遺與可曰庖丁解牛者也而養生者取之輪扁斵輪者也而讀書者與之今夫夫子之託於斯竹也而予以為有道者則非邪子由未嘗畫也故得其意而巳若予者豈獨得其意并得其法與可畫竹初不自貴重四方之人持練素而請者足相躡於其門與可厭之投諸地而罵曰吾將以為韈士大夫傳之以為口實及與可自洋州還而余為徐州與可以書遺余曰近語士大夫吾墨竹一𣲖近在彭城可往求之韈材當萃於子矣書尾復寫一詩其略曰擬將一段鵝谿絹掃取寒梢萬尺長予謂與可竹長萬尺當用絹二百五十匹知公倦於筆硯願得此絹而已與可無以答則曰吾言妄矣世豈有萬尺竹哉余因而實之答其詩曰世間亦有千尋竹月落庭空影許長與可笑曰蘇子辯則辯矣然二百五十匹吾將買田而歸老焉因以所畫篔簹谷偃竹遺予曰此竹數尺耳而有萬尺之勢篔簹谷在洋州與可嘗令予作洋州三十詠篔簹谷其一也予詩曰漢川修竹賤如蓬斤斧何曾赦籜龍料得清貧饞太守渭濱千畝在胸中與可是日與其妻遊谷中燒筍晩食發函得詩失笑噴飯滿案元豐二年正月二十日與可殁於陳州是歳七月七日予在湖州曝書畫見此竹廢巻而哭失聲昔曹孟徳祭橋公文有車過腹痛之語而予亦載與可疇昔戲笑之言者以見與可於予親厚無間如此也石氏畫苑記中多以文為戲然亦自是佳品石康伯字幼安蜀之眉山人故紫微舍人昌言之幼子也舉進士不第即棄去當以䕃得官亦不就讀書作詩以自娛而已不求人知獨好法書名畫古器異物遇有所見脱衣輟食求之不問有無居京師四十年出入閭巷未嘗騎馬在稠人中耳目謖謖然專求其所好長七尺黒而髯如世所畫道人劍客而徒步塵埃中若有所營不知者以為異人也又善滑稽巧發微中旁人抵掌絶倒而幼安淡然不變色與人游知其急難甚於為已有客於京師而病者輒舁置其家親飲食之死則棺歛之無難色凡識幼安者皆知其如此而余獨深知之幼安識慮甚逺獨口不言耳今年六十一狀貌如四十許人鬚三尺郁然無一莖白者此豈徒然者哉為亳州職官與富鄭公俱得罪者其子夷庚也其家書畫數百軸取其毫末雜碎者以冊編之謂之石氏畫苑幼安與文與可游如兄弟故得其畫為多而余亦善畫古木叢竹因以遺之使置之苑中子由嘗言所貴於畫者為其似也似猶可貴况其真者吾行都邑田野所見人物皆吾畫笥也所不見者獨鬼神耳當賴畫而識然人亦何用見鬼此言真有理今幼安好畫乃其一病無足録者獨著其為人之大略云爾唐宋八大家文鈔巻一百四十
