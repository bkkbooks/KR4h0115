body:
  text: 唐宋八大家文鈔巻二十一明茅坤撰栁州文鈔五序栁宗直西漢文類序覧子厚之所以序西漢而文章之㫖亦可概見矣左右史混久矣言事駁亂尚書春秋之㫖不立自左丘明傳孔氏太史公述歴古今合而為史記迄于今交錯相糺莫能離其説獨左氏國語紀言不叅於事戰國䇿春秋後語頗本右史尚書之制然無古聖人蔚然之道大抵促數耗矣而後之文者寵之文之近古而尤壯麗莫若漢之西京班固書傳之吾嘗病其畔散不屬無以考其變欲采比義㑹年長疾作駑墮愈日甚未能勝也幸吾弟宗直愛古書樂而成之捜討磔裂攟摭融結離而同之與類推移不易時月而咸得從其條貫森然炳然若開羣玉之府指揮聨累圭璋琮璜之狀各有列位不失其叙雖第其價可也以文觀之則賦頌詩歌書奏詔䇿辯論之辭畢具以語觀之則右史紀言尚書戰國䇿成敗興壞之説大備無不苞也噫是可以為學者之端耶始吾少時有路子者自賛為是書吾嘉而叙其意而其書終莫能具卒俟宗直也故删取其叙繫于左以為西漢文類首紀殷周之前其文簡而野魏晉以降則盪而靡得其中者漢氏漢氏之東則既衰矣當文帝時始得賈生明儒術武帝尤好焉而公孫𢎞董仲舒司馬遷相如之徒作風雅益盛敷施天下自天子至公卿大夫士庶人咸通焉於是宣於詔䇿逹於奏議諷於辭賦傳於歌謡由高帝訖于哀平王莽之誅四方之文章葢爛然矣史臣班孟堅修其書㧞其尤者充于簡册則二百三十年間列辟之逹道名臣之大範賢能之志業黔黎之風美列焉若乃合其英精離其變通論次其叙位必俟學古者興行之唐興用文理貞元間文章特盛本之三代浹于漢氏與之相準於是有能者取孟堅書類其文次其先後為四十巻楊評事文集後序覧此序亦可見古之欲兼詩與文而並盛者亦世所難而況吾曹乎贊曰文之用辭令褒貶導揚諷諭而已雖其言鄙野足以備於用然而闕其文采固不足以竦動時聽夸示後學立言而朽君子不由也故作者抱其根源而必由是假道焉作於聖故曰經述於才故曰文文有二道辭令褒貶本乎著述者也導揚諷諭本乎比興者也著述者流蓋出於書之謨訓易之象系春秋之筆削其要在於高壯廣厚詞正而理備謂宜藏於簡册也比興者流葢出於虞夏之詠歌殷周之風雅其要在於麗則清越言暢而意美謂宜流於謡誦也兹二者考其㫖義乖離不合故秉筆之士恒徧勝獨得而罕有兼者焉厥有能而專美命之曰藝成雖古文雅之盛世不能並肩而生唐興以來稱是選而不怍者梓潼陳拾遺其後燕文貞以著述之餘攻比興而莫能極張曲江以比興之隟窮著述而不克備其餘各探一隅相與背馳於道者其去彌遠文之難兼斯亦甚矣若楊君者少以篇什著聲於時其炳耀尤異之詞諷誦于文人盈滿于江湖逹于京師晚節徧悟文體尤邃叙述學富識遠才涌未巳其雄傑老成之風與時增加既獲是不數年而夭其季年所作尤善其為鄂州新城頌諸葛武侯傳論餞送梓潼陳衆甫汝南周愿河東裴泰武都符義府泰山羊士諤隴西李鍊凡六序廬山禪居記辭李常侍啓遠游賦七夕賦皆人文之選巳用是陪陳君之後其可謂具體者歟嗚呼公既悟文而疾既即功而廢廢不逾年大病及之卒不得窮其工竟其才遺文未克流于世休聲未克充於時凡我從事於文者所宜追惜而悼慕也宗元以通家修好幼獲省謁故得奉公元兄命論次篇簡遂述其制作之所詣以繫于後予嘗謂子厚詩過昌黎而文特讓一格矣大略千鈞之弩難以再發也濮陽吳君文集序文自有法度博陵崔成務嘗為信州從事為余言邑有聞人濮陽吳君弱齡長鬛而廣顙好學而善文居鄉黨未嘗不以信義交於物敎子弟未嘗不以忠孝端其本以是卿相賢士率與亢禮余嘗聞而志乎心㑹其子偘更名武陵升進士得罪來永州因奉其先人文集十巻再拜請余以文冠其首余得徧觀焉其為辭賦有戒茍冒陵僣之志其為詩歌有交王公大人之義其為誄誌弔祭有孝㳟慈仁之誠而多舉六經聖人之大㫖發言成章有可觀者古之司徒必求秀士由鄉而升之天官古之太史必求人風陳詩以獻于法宫然後材不遺而志可見近世之居位者或未能盡用古道故吳君之行不昭而其辭不薦雖一命于王而終伏其志嗚呼有可惜哉武陵又論次誌傳三巻繼于末其官氏及他才行甚具云愚溪詩序子厚集中最佳處灌水之陽有溪焉東流入于瀟水或曰冉氏嘗居也故姓是溪曰冉溪或曰可以染也名之以其能故謂之染溪余以愚觸罪謫瀟水上愛是溪入二三里得其尤絶者家焉古有愚公谷今余家是溪而名莫能定士之居者猶齗齗然不可以不更也故更之為愚溪愚溪之上買小丘為愚丘自愚丘東北行六十歩得泉焉又買居之為愚泉愚泉凡六穴皆出山下平地葢上出也合流屈曲而南為愚溝遂負上累石塞其隘為愚池愚池之東為愚堂其南為愚亭池之中為愚島嘉木異石錯置皆山水之竒者以余故咸以愚辱焉夫水智者樂也今是溪獨見辱於愚何哉蓋其流甚下不可以灌溉又峻急多坻石大舟不可入也幽邃淺狹蛟龍不屑不能興雲雨無以利世而適類於余然則雖辱而愚之可也寗武子邦無道則愚智而為愚者也顔子終日不違如愚睿而為愚者也皆不得為真愚今余遭有道而違於理悖於事故凡為愚者莫我若也夫然則天下莫能爭是溪余得專而名焉溪雖莫利於世而善鑒萬類清瑩秀徹鏘鳴金石能使愚者喜笑眷慕樂而不能去也余雖不合於俗亦頗以文墨自慰潄滌萬物牢籠百態而無所避之以愚辭歌愚溪則茫然而不違昏然而同歸超鴻䝉混希夷寂寥而莫我知也於是作八愚詩紀於溪石上古來無此調􅈝然創為之指次如畫陪永州崔使君遊讌南池序文瀟灑跌宕惜也篇末猶多抑鬱之思云零陵城南環以羣山延以林麓其崖谷之委會則泓然為池灣然為溪其上多楓柟竹箭哀鳴之禽其下多芡芰蒲蕖騰波之魚韜涵太虚澹灔里閭誠游觀之佳麗者已崔公既來其政寛以肆其風和以廉既樂其人又樂其身于暮之春徵賢合姻登舟于兹水之津連山倒垂萬象在下浮空泛景蕩若無外横碧落以中貫陵太虚而徑度羽觴飛翔匏竹激越熈然而歌婆然而舞持頥而笑瞪目而倨不知日之將暮則於向之物者可謂無負矣昔之人知樂之不可常㑹之不可必也當歡而悲者有之况公之理行宜去受厚錫而席之賢者率皆在官䝉澤方將脱鱗介生羽翮夫豈趦趄湘中為顦顇客耶余既委廢於世恒得與是山水為伍而悼兹㑹不可再也故為文志之送薛存義之任序昔人多録此文然其義亦淺河東薛存義將行栁子載肉于俎崇酒于觴追而送之江滸飲食之且告曰凡吏于土者若知其職乎葢民之役非以役民而巳也凡民之食于土者出其十一傭乎吏使司平於我也今我受其直怠其事者天下皆然豈惟怠之又從而盗之向使傭一夫於家受若直怠若事又盗若貨器則必甚怒而黜罰之矣以今天下多類此而民莫敢肆其怒與黜罰何哉勢不同也勢不同而理同如吾民何有逹于理者得不恐而畏乎存義假令零陵二年矣蚤作而夜思勤力而勞心訟者平賦者均老弱無懷詐暴憎其為不虚取直也的矣其知恐而畏也審矣吾賤且辱不得與考績幽明之説於其往也故賞以酒肉而重之以辭送徐從事北逰序宕讀詩禮春秋莫能言説其容貎充充然而聲名不聞傳於世豈天下廣大多儒而使然歟將晦其説諱其讀不使世得聞傳其名歟抑處於遠仕於遠不與通都大邑豪傑角其伎而至於是歟不然無顯者為之倡以振動其聲歟今之世不能多儒可以蓋生者觀生亦非晦諱其説讀者然則餘二者為之决矣生北遊必至通都大邑通都大邑必有顯者由是其果聞傳於世歟茍聞傳必得位得位而以詩禮春秋之道施於事及於物思不負孔子之筆舌能如是然後可以為儒儒可以説讀為哉送李渭赴京師序文似悲颯過洞庭上湘江非有罪左遷者罕至又况踰臨源嶺下灕水出荔浦名不在刑部而來吏者其加少也固宜前余逐居永州李君至固怪其棄美仕就醜地無所束縳自取瘴癘後余斥刺栁州至于桂君又在焉方屑屑為吏噫何自苦如是耶明時宗室屬子當尉畿縣令王師連征不貢二府方汲汲求士李君讀書為詩有幹局久逰燕魏趙代間知人情識地利能言其故以是入都干丞相益國事不求獲乎已而巳以有獲予嫉其不為是久矣今而曰將行請余以言行哉行哉言止是而巳送琛上人南遊序不如昌黎所贈師暢者之㫖而見亦觧佛之跡去乎世久矣其留而存者佛之言也言之著者為經翼而成之者為論其流而來者百不能一焉然而其道則備矣法之至莫尚乎般若經之大莫極乎湼槃世之上士将欲由是以入者非取乎經論則悖矣而今之言禪者有流盪舛誤迭相師用妄取空語而脱畧方便顚倒眞實以䧟乎巳而又䧟乎人乂有能言體而不及用者不知二者之不可斯湏離也離之外矣是世之所大患也吾琛則不然觀經得般若之義讀論悦三觀之理晝夜服習而身行之有來求者則為講説從而化者皆知佛之為大法之為廣菩薩大士之為雄修而行之者為空蕩而無之者為礙夫然則與夫增上慢者異矣異乎是而免斯名者吾無有也将以廣其道而被於遠故好遊自京師而來又南出乎桂林未知其極也吾病世之傲逸者嗜乎彼而不求此故為之言送元十八山人南逰序逸調太史公嘗言世之學孔氏者則黜老子學老子者則黜孔氏道不同不相為謀余觀老子亦孔氏之異流也不得以相抗又况楊墨申商刑名縱橫之説其迭相訾毁牴牾而不合者可勝言耶然皆有以佐世太史公没其後有釋氏固學者之所怪駭舛逆其尤者也今有河南元生者其人閎矌而質直物無以挫其志其為學恢博而貫統數無以躓其道悉取向之所以異者通而同之搜擇融液與道大適咸伸具所長而黜其竒衺要之與孔子同道皆有以㑹其趨而其器足以守之其氣足以行之不以其道求合於世常有意乎古之守雌者及至是邦以余道窮多憂而嘗好斯文留三旬有六日陳其大方勤以為諭余始得其為人今又將去余而南歴營道觀九疑下灕水窮南越以臨大海則吾未知其還也黄鶴一去青㝠無極安得不馮豐隆愬蜚廉以寄聲於寥廓耶送僧浩初序亦澹宕儒者韓退之與余善嘗病余嗜浮圖言訾余與浮圖遊近隴西李生礎自東都來退之又寓書罪余且曰見送元生序不斥浮圖浮圖誠有不可斥者往往與易論語合誠樂之其於性惰奭然不與孔子異道退之好儒未能過楊子楊子之書於荘墨申韓皆有取焉浮圖者反不及莊墨申韓之怪僻險賊耶曰以其夷也果不信道而斥焉以夷則將友惡來盜跖而賤季札由余乎非所謂去名求實者矣吾之所取者與易論語合雖聖人復生不可得而斥也退之所罪者其跡也曰髠而緇無夫婦父子不為耕農蠶桑而活乎人若是雖吾亦不樂也退之忿其外而遺具中是知石而不知韞玉也吾之所以嗜浮圖之言以此與其人游者非必能通其言也且凡為其道者不愛官不爭能樂山水而嗜閑安者為多吾病世之逐逐然唯印組為務以相軋也則舍是其焉從吾之好與浮圖游以此今浩初閑其性安其情讀其書通易論語唯山水之樂有文而文之又父子咸為其道以養而居泊焉而無求則其賢於為莊墨申韓之言而逐逐然唯印組為務以相軋者其亦遠矣李生礎與浩初又善今之往也以吾言示之因北人寓退之視何如也序飲買小丘一日鋤理二日洗滌遂置酒溪石上嚮之為記所謂牛馬之飲者離坐其背實觴而流之接取以飲乃置監史而令曰當飲者舉籌之十寸者三逆而投之能不洄于洑不止于坻不沉于底者過不飲而洄而止而況者飲如籌之數既或投之則旋眩滑汨若舞若躍速者遲者去者留者衆皆據石注視歡忭以助其勢突然而逝乃得無事於是或一飲或再飲客有婁生圖南者其投之也一洄一止一沉獨三飲衆乃大笑驩甚余病痞不能食酒至是醉焉遂損益其令以窮日夜而不知歸吾聞昔之飲酒者有揖讓酬酢百拜以為禮者有呌號屢舞如沸如羮以為極者有裸裎袒裼以為逹者有資絲竹金石之樂以為和者有以促數糺逖而為密者今則舉異是焉故捨百拜而禮無呌號而極不袒裼而逹非金石而和去糺逖而密簡而同肆而㳟衎衎而從容於以合山水之樂成君子之心宜也作序飲以貽後之人序棊此序與序飲並澹宕可讀房生直溫與予二弟遊皆好學予病其確也思所以休息之者得木局隆其中而規焉其下方以直置棊二十有四貴者半賤者半貴曰上賤曰下咸自第一至十二下者二乃敵一用朱墨以别焉房於是取二毫如其第書之既而抵戲者二人則視其賤者而賤之貴者而貴之其使之擊觸也必先賤者不得已而使貴者則皆慄焉惛焉亦鮮克以中其獲也得朱焉則若有餘得墨焉則若不足余諦睨之以思其始則皆類也房子一書之而輕重若是適近其手而先焉非能擇其善而朱之否而墨之也然而上焉而上下焉而下貴焉而貴賤焉而賤其易彼而敬此遂以遠焉然則若世之所以貴賤人者有異房之貴賤兹棊者歟無亦近而先之耳有果能擇其善否者歟其敬而易者亦從而動心矣有敢議其善否者歟其得於貴者有不氣揚而志蕩者歟其得於賤者有不貎慢而心肆者歟其所謂貴者有敢輕而使之者歟所謂賤者有敢避其使之擊觸者歟彼朱而墨者相去千萬不啻有敢以二敵其一者歟余墨者徒也觀其始與末有似棊者故叙唐荆川曰推究物理精巧之文種樹郭槖駞傳守官者當深體此文郭槖駞不知始何名病僂隆然伏行有類槖駞者故鄉人號之駞駞聞之曰甚善名我固當因捨其名亦自謂槖駞云其鄉曰豐樂鄉在長安西駞業種樹凡長安豪富人為觀游及賣果者皆爭迎取養視駞所種樹或移徙無不活且碩茂蚤實以蕃他植者雖窺伺傚慕莫能如也有問之對曰槖駞非能使木夀且孳也能順木之天以致其性焉爾凡植木之性其本欲舒其培欲平其土欲故其築欲密既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣故吾不害其長而已非有能碩茂之也不抑耗其實而巳非有能蚤而蕃之也他植者則不然根拳而土易其培之也若不過焉則不及茍有能反是者則又愛之太恩憂之太勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯揺其本以觀其疎宻而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讐之故不我若也吾又何能為哉問者曰以子之道移之官理可乎駞曰我知種樹而已理非吾業也然吾居鄉見長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼曰官命促爾耕朂爾植督爾穫蚤繰而緒蚤織而縷字而幼孩遂而雞豚鳴鼔而聚之擊木而召之吾小人輟飱饔以勞吏者且不得暇又何以蕃吾生而安吾性耶故病且怠若是則與吾業者其亦有類乎問者嘻曰不亦善夫吾問養樹得養人術傳其事以為官戒也梓人傳序次摹冩井井入彀裴封叔之弟在光德里有梓人欵其門願傭隟宇而處焉所職尋引規矩䋲墨家不居礱斵之器問其能曰吾善度材視棟宇之制高深圓方短長之宜吾指使而羣工役焉捨我衆莫能就一字故食於官府吾受禄三倍作於私家吾收其直大半焉他日入其室其牀闕足而不能理曰將求他工余甚笑之謂其無能而貪禄嗜貨者其後京兆尹將飾官署余往過焉委羣材㑹衆工或執斧斤或執刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斵刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢愠焉畫宫於堵盈尺而曲盡其制計其毫釐而構大厦無進退焉既成書於上棟曰某年某月某日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣繼而歎曰彼將捨其手藝專其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣物莫近乎此也彼為天下者本於人其執役者為徒𨽻為鄉師里胥其上為下士又其上為中士為上士又其上為大夫為卿為公離而為六職判而為百役外薄四海有方伯連率郡有守邑有宰皆有佐政其下有胥吏又其下皆有嗇夫版尹以就役焉猶衆工之各有執伎以食力也彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩䋲墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其遠邇細大可手據其圖而究焉猶梓人畫宫於堵而績于成也能者進而由之使無所德不能者退而休之亦莫敢愠不衒能不矜名不親小勞不侵衆官日與天下之英才討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之工也後之人循跡而慕曰彼相之才也士或談殷周之理者曰伊傅周召其百執事之勤勞而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣其不知體要者反此以恪勤為公以簿書為尊衒能矜名親小勞侵衆官竊取六職百役之事欣欣於府庭而遺其大者遠者焉所謂不通是道者也猶梓人而不知䋲墨之曲直規矩之方圓尋引之短長姑奪衆工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟或曰彼主為室者倘或發其私智牽制梓人之慮奪其世守而道謀是用雖不能成功豈其罪耶亦在任之而已余曰不然夫䋲墨誠陳規矩誠設高者不可抑而下也狹者不可張而廣也由我則固不由我則圯彼將樂去固而就圯也則巻其術黙其智悠爾而去不屈吾道是誠良梓人耳其或嗜其貨利忍而不能捨也喪其制量屈而不能守也棟橈屋壞則曰非我罪也可乎哉可乎哉余謂梓人之道類於相故書而藏之梓人蓋古之審曲面勢者今謂之都料匠云余所遇者楊氏濳其名唐荆川曰此文體方不如圬者傳圓轉然亦文之佳者宋清傳亦風刺之言宋清長安西部藥市人也居善藥有自山澤來者必歸宋清氏清優主之長安醫工得清藥輔其方輙易讐咸譽清疾病疕瘍者亦皆樂就清求藥冀速巳清皆樂然響應雖不持錢者皆與善藥積券如山未嘗詣取直或不識遥與券清不為辭嵗終度不能報輙焚劵終不復言市人以其異皆笑之曰清蚩妄人也或曰清其有道者歟清聞之曰清逐利以活妻子耳非有道也然謂我蚩妄者亦謬清居藥四十年所焚劵者百數十人或至大官或連數州受俸博其餽遺清者相屬於戸雖不能立報而以賖死者千百不害清之為富也清之取利遠遠故大豈若小市人哉一不得直則怫然怒再則罵而仇耳彼之為利不亦翦翦乎吾見蚩之有在也清誠以是得大利又不為妄執其道不廢卒以富求者益衆其應益廣或斥棄沉廢親與交視之落然者清不以怠遇其人必與善藥如故一旦復柄用益厚報清其遠取利皆類此吾觀今之交乎人者炎而附寒而棄鮮有能類清之為者世之言徒曰市道交嗚呼清市人也今之交有能望報如清之遠者乎幸而庶幾則天下之窮困廢辱得不死亡者衆矣市道交豈可少耶或曰清非市道人也栁先生曰清居市不為市之道然而居朝廷居官府居庠塾鄉黨以士大夫自名者反爭為之不巳悲夫然則清非獨異於市人也童區寄傳事亦奇栁先生曰越人少恩生男女必貨視之自毁齒巳上父兄鬻賣以覬其利不足則盗取他室束縳鉗梏之至有鬚鬛者力不勝皆屈為僮當道相賊殺以為俗幸得壮大則縳取么弱者漢官因為巳利茍得僮恣所為不問以是越中戸口滋耗少得自脱惟童區寄以十一嵗勝斯亦竒矣桂部從事杜周士為余言之童寄者郴州蕘牧兒也行牧且蕘二豪賊劫持反接布囊其口去逾四十里之虚所賣之寄偽兒啼恐慄為兒恒狀賊易之對飲酒醉一人去為市一人臥植刃道上童微伺其睡以縛背刃力下上得絶因取刃殺之逃未及遠市者還得僮大駭將殺童遽曰為兩郎僮孰若為一郎僮耶彼不我恩也郎誠見完與恩無所不可市者良久計曰與其殺是僮孰若賣之與其賣而分孰若吾得專焉幸而殺彼甚善即藏其尸持僮抵主人所愈束縛牢甚夜半童自轉以縳即爐火燒絶之雖瘡手勿憚復取刃殺市者因大號一虚皆驚童曰我區氏兒也不當為僮賊二人得我我幸皆殺之矣願以聞於官虚吏白州州白大府大府召視兒㓜愿耳刺吏顔証竒之留為小吏不肯與衣裳吏䕶還之鄉鄉之行劫縳者側目莫敢過其門皆曰是兒少秦武陽二歳而討殺二豪豈可近耶唐宋八大家文鈔巻二十一
