body:
  text: 唐宋八大家文鈔巻六十三明茅坤撰廬陵史鈔三家人傳總論嗚呼梁之惡極矣自其起盗賊至於亡唐其遺毒流于天下天下豪傑四面並起孰不欲戡刃於其胸然卒不能少挫其鋒以得志梁之無敵於天下可謂虎狼之强矣及其敗也困于一二女子之娛至於洞胸流腸刲若羊豕禍生父子之間乃知女色之能敗人矣自古女禍大者亡天下其次亡家其次亡身身茍免矣猶及其子孫雖遲速不同未有無禍者也然原其本末未始不起於忽微易坤之初六曰履霜堅冰至家人之初九曰閑有家悔亡其言至矣可不戒哉梁之家事詩所謂不可道者也至於唐晉以後親疎嫡庶亂矣作家人傳唐劉后傳劉皇后起自側微擅寵黷貨因而濁亂宫中軍士分崩以至君上身弑國亡摹寫種種生色不讓太史公吕后紀及外戚諸傳莊宗神閔敬皇后劉氏魏州成安人也莊宗正室曰衛國夫人韓氏其次燕國夫人伊氏其次后也初封魏國夫人后父劉叟黄鬚善醫卜自號劉山人后生五六嵗晉王攻魏掠成安禆將袁建豐得后納之晉宫貞簡太后教以吹笙歌舞旣笄甚有色莊宗見而悦之莊宗巳為晉王太后幸其宫置酒為夀自起歌舞太后歡甚命劉氏吹笙佐酒酒罷去留劉氏以賜莊宗先時莊宗攻梁軍於夾城得符道昭妻矦氏寵專諸宫宫中謂之夾寨夫人莊宗出兵四方常以侯氏從軍其後劉氏生子繼岌莊宗以為類巳愛之由是劉氏寵益專自下魏博戰河上十餘年獨以劉氏從劉氏多智善迎意承㫖其他嬪御莫得進見其父聞劉氏巳貴詣魏宫上謁莊宗召袁建豐問之建豐曰臣始得劉氏於城安北塢時有黄鬚丈人䕶之乃出劉叟示建豐建豐曰是也然劉氏方與諸夫人爭寵以門望相髙因大怒曰妾去鄉時略可記憶妾父不幸死於亂兵妾時環尸慟哭而去此田舍翁安得至此因命笞劉叟于宫門莊宗巳即皇帝位欲立劉氏為皇后而韓夫人正室也伊夫人位次在劉氏上以故難其事而未發宰相豆盧革樞宻使郭崇韜希㫖上章言劉氏當立莊宗大悦同光二年四月己卯皇帝御文明殿遣使冊劉氏為皇后皇后受冊乘重翟車鹵簿鼓吹見於太廟韓夫人等皆不平之乃封韓氏為淑妃伊氏為徳妃莊宗自滅梁志意驕怠宦官伶人亂政后特用事於中自以出於賤微踰次得立以為佛力又好聚歛分遣人為商賈至於市肆之間薪芻果茹皆稱中宫所賣四方貢獻必分為二一以上天子一以入中宫宫中貨賄山積惟冩佛書饋賂僧尼而莊宗由此亦佞佛有胡僧自于闐來莊宗率皇后及諸子迎拜之僧遊五臺山遣中使供頓所至傾動城邑又有僧誠惠自言能降龍嘗過鎮州王鎔不為之禮誠惠怒曰吾有毒龍五百當遣一龍揭片石常山之人皆魚鼈也㑹明年滹沱河大水壊鎮州關城人皆以為神莊宗及后率諸子諸妃拜之誠惠端坐不起由是士無貴賤皆拜之獨郭崇韜不拜也是時皇太后及皇后交通藩鎮太后稱誥令皇后稱教命兩宫使者旁午於道許州節度使溫韜以后佞佛因請以私第為佛寺為后薦福莊宗數幸郭崇韜元行欽等私第常與后俱其後幸張全義第酒酣命后拜全義為養父全義日遣姬妾出入中宫問遺不絶莊宗有愛姬甚有色而生子后心患之莊宗燕居宫中元行欽侍側莊宗問曰爾新喪婦其復娶乎吾助爾聘后指愛姬請曰帝憐行欽何不賜之莊宗不得巳佯諾之后趣行欽拜謝行欽再拜起顧愛姬肩輿巳出宫矣莊宗不樂稱疾不食者累日同光三年秋大水兩河之民流徙道路京師賦調不充六軍之士往往殍踣乃預借明年夏秋租税百姓愁苦號泣于路莊宗方與后荒于畋遊十二月己卯臘畋于白沙后率皇子後宫畢從歷伊闕宿龕澗癸未乃還是時大雪軍士寒凍金槍衛兵萬騎所至責民供給壊什器徹廬舍而焚之縣吏畏懼亡竄山谷明年三月客星犯天庫有星流于天棓占星者言御前當有急兵宜散積聚以禳之宰相請出庫物以給軍莊宗許之后不肯曰吾夫婦得天下雖因武功盖亦有天命命旣在天人如我何宰相論于延英后於屏間耳屬之因取粧奩及皇㓜子滿喜置帝前曰諸侯所貢給賜巳盡宫中所有惟此耳請鬻以給軍宰相惶恐而退及趙在禮作亂出兵討魏始出物以賚軍軍士負而詬曰吾妻子巳餓死得此何為莊宗東幸汴州從駕兵二萬五千及至萬勝不得進而還軍士離散所失大半至罌子谷道路隘狹莊宗見從官執兵仗者皆以好言勞之曰適報魏王平蜀得蜀金銀五十萬當悉給爾等對曰陛下與之太晩得者亦不感恩莊宗泣下因顧内庫使張容哥索袍帯以賜之容哥對曰盡矣軍士叱容哥曰致吾君至此皆由爾輩因抽刀逐之左右救之而免容哥曰皇后惜物不以給軍而歸罪于我事若不測吾身萬段矣乃投水而死郭從謙反莊宗中流矢傷甚卧絳霄殿廊下渇欲得飲后令宦者進飱酪不自省視莊宗崩后與李存渥等焚嘉慶殿擁百騎出師子門后於馬上以囊盛金器寳帯欲於太原造寺為尼在道因與存渥姦及至太原乃削髪為尼明宗入立遣人賜后死晉天福五年追諡曰神閔敬皇后唐繼岌傳莊宗嬖於色立劉后劉后險側為中官左右所詿誤而强其子繼岌以賊殺大將郭崇韜於蜀嗟乎使崇韜尚在明宗未必反即反而明宗據天下崇韜猶可以全蜀擁從岌社稷之存亡猶可半也歐公摹寫明鬯殊為嗚咽可為後世人主寵倖后宫濁亂朝政者之戒莊宗五子長曰繼岌其次繼潼繼嵩繼蟾繼嶢繼岌母曰劉皇后其四皆不著其母名號莊宗即位繼岌為北都留守判六軍諸衛事遷檢挍太尉同中書門下平章事豆盧革為相建言唐故事皇子皆為宫使因以鄴宫為興聖宫以繼岌為使同光三年封魏王是嵗伐蜀以繼岌為西南面行營都統郭崇韜為都招討使工部尚書任圜翰林學士李愚皆叅軍事九月戊申將兵六萬自鳯翔入大散關軍無十日之糧而所至州鎮皆迎降遂食其粟至興州蜀將程奉璉以五百騎降因以其兵修閣道以過唐軍王衍將兵萬人屯利州分其半逆戰于三泉為先鋒康延孝所敗衍懼斷吉栢江浮橋奔歸成都唐軍自文州間道以入十月巳酉繼岌至綿州衍上牋請降丙辰入成都王衍乘竹輿至昇仙橋素衣牽羊草索繫首肉袒衘璧輿襯羣臣衰絰徒跣以降繼岌下而取璧崇韜解縛焚襯自出師至降衍凡七十五日兵不血刃自古用兵之易未有如此然繼岌雖為都統而軍政號令一出崇韜初莊宗遣宦者供奉官李從襲監中軍髙品李廷安吕知柔為典謁從襲等素惡崇韜又見崇韜專任軍事益不平之及破蜀蜀之貴臣大將自王宗弼以下皆爭以蜀寳貨妓樂奉崇韜父子而魏王所得匹馬束帛唾壺麈柄而巳崇韜日决軍事將吏賓客趨走盈庭而都統府惟大將晨謁牙門閴然由是從襲等不勝其憤巳而宗弼率蜀人見繼岌請留崇韜鎮蜀從襲等因言崇韜有異志勸繼岌為備繼岌謂崇韜曰陛下倚侍中如衡華尊之廟堂之上期以一天下而制四夷必不棄元老於蠻夷之地此事非予敢知也莊宗聞崇韜欲留蜀亦不悦遣宦者向延嗣趣繼岌班師延嗣至成都崇韜不出迎及見禮益慢延嗣怒從襲等因告延嗣崇韜有異志恐危魏王延嗣還具言之劉皇后涕泣請保全繼岌莊宗遣宦官馬彦珪往視崇韜去就是時兩川新定孟知祥未至所在盗賊亡聚山林崇韜方遣任圜等分出招集恐後生變故師未即還而彦珪將行見劉皇后曰臣見延嗣言蜀中事勢巳不可禍機之作間不容髪安能三千里往復禀命乎劉皇后以彦珪語告莊宗莊宗曰傳言未審豈可便令果決皇后以不得請因自為教與繼岌使殺崇韜明年正月崇韜留任圜守蜀以待知祥之至崇韜期班師有日彦珪至蜀出皇后教示繼岌繼岌曰今大軍將發未有釁端豈可作此負心事從襲等泣曰今有宻敕王茍不行使崇韜知之則吾屬無類矣繼岌曰上無詔書徒以皇后手教安能殺招討使從襲等力爭繼岌不得巳而從之詰旦從襲以都統命召崇韜繼岌登樓以避之崇韜入昇階繼岌從者李環撾碎其首繼岌遂班師二月軍至泥溪先鋒康延孝叛據漢州繼岌遣任圜討平之四月辛卯至興平聞明宗反兵入京師繼岌欲退保鳯翔至武功李從襲勸繼岌馳趣京師以救内難行至渭河西都留守張籛斷浮橋繼岌不得渡乃循河而東至渭南左右皆潰從襲謂繼岌曰大事巳去福不可再王宜自圖繼岌徘徊泣下謂李環曰吾道盡途窮子當殺我環遲疑乆之謂繼岌乳母曰吾不忍見王王若無路求生當踣面以俟繼岌面榻而卧環縊殺之任圜從後至塟繼岌于華州之西南繼岌少病閹無子明宗巳即位圜率征蜀之師二萬至京師明宗撫慰乆之問圜繼岌何在圜具言繼岌死狀同光三年詔以皇子繼嵩繼潼繼蟾繼嶢皆為光禄大夫撿挍司徒盖其皆㓜故不封當莊宗遇弑時太祖子孫在者十有一人明宗入立其四人見殺其餘皆不知所終太祖之後遂絶按傳本末崇韜初未嘗有留蜀之志特以其身為大將而蜀中兵士多附之且都統繼岌在上而崇韜不能以成功巳居其下所以外為蜀人所擁附而流言於路内為宦官及從岌部曲所忌而因以行䜛于朝卒之莊宗亦惑而劉后矯詔令其子繼岌誅之國遂以亡悲夫唐從璟傳明宗四子曰從璟從榮從厚從益從璟初名從審為人驍勇善戰而謙退謹勅從莊宗戰數有功為金槍指揮使明宗軍變于魏莊宗謂從璟曰爾父於國有大功忠孝之心朕自明信今為亂軍所逼爾宜自往宣朕意母使自疑從璟馳至衛州為元行欽所執將殺之從璟呼曰我父為亂軍所逼公等不亮其心我亦不能至魏願歸衛天子行欽釋之莊宗憐其言賜名璟以為巳子從莊宗如汴州將士多亡於道獨從璟不去左右或勸其逃禍從璟不聽莊宗聞明宗巳渡黎陽復欲遣從璟通問行欽以為不可遂殺之明宗即位贈太保嗚呼無父烏生無君烏以為生而世之言曰為忠孝者不兩全夫豈然哉君父人倫之大本忠孝臣子之大節豈其不相為用而又相害者乎抑私與義而巳耳盖以其私則兩害以其義則兩得其父以兵攻其君為其子者從父乎從君乎曰身從其居志從其義可也身居君所則從君居父所則從父其從於君者必辭其君曰子不可以射父願無與兵焉則又號泣而呼其父曰盍捨兵而歸吾君乎君敗則死之父敗則終喪而事君其從於父者必告之曰君不可以射也盍捨兵而歸吾君乎君敗則死之父敗則待罪於君君赦巳則終喪而事之古之知孝者莫如舜知義者莫如孔孟其於君臣父子之際詳矣使其不幸而遭焉其亦如是而已矣從璟之於莊宗知所從而得其死矣哀哉唐秦王從榮傳予覽歐陽公㸃次從榮簒弑明宗處固多風神然較之太史公所序平勃誅諸吕及班固所序霍光廢昌邑王處猶隔一層史漢尚指顧從容所以情事如覩而歐公不免譸張須細細玩索當自得之秦王從榮天成元年以檢校司徒兼御史大夫拜天雄軍節度使同中書門下平章事三年徙鎮河東長興元年拜河南尹兼判六軍諸衛事從璟死從榮於諸皇子次最長又握兵柄然其為人輕雋而鷹視頗喜儒學為歌詩多招文學之士賦詩飲酒故後生浮薄之徒日進諛佞以驕其心自將相大臣皆患之明宗頗知其非而不能裁制從榮嘗侍側明宗問曰爾軍政之餘習何事對曰有暇讀書與諸儒講論經義爾明宗曰經有君臣父子之道然須碩儒端士乃可親之吾見先帝好作歌詩甚無謂也汝將家子文章非素習必不能工傳於人口徒取笑也吾老矣於經義雖不能曉然尚喜屢聞之其餘不足學也是嵗秋封從榮秦王故事諸王受封不朝廟而有司希㫖欲重其禮乃建議曰古者因禘嘗而發爵禄所以示不敢專今受大封而不告廟非敬順之道也於是從榮朝服乗輅車具鹵簿至朝堂受册出載冊以車朝於太廟京師之人皆以為榮三年加兼中書令有司又言故事親王班宰相下今秦王位髙而班下不稱於是與宰相分班而居右四年加尚書令食邑萬户太僕少卿何澤上書請立從榮為皇太子是時明宗巳病得澤書不悦顧左右曰羣臣欲立太子吾當養老於河東乃召大臣議立太子事大臣皆莫敢可否從榮入白曰臣聞姦人言欲立臣為太子臣實不願也明宗曰此羣臣之欲爾從榮出見范延光趙延夀等曰諸公議欲立吾為太子是欲奪吾兵柄而幽之東宫耳延光等患之乃加從榮天下兵馬大元帥有司又言元帥或統諸道或專一面自前世無天下大元帥之名其禮無所考按請自節度使以下凡領兵職者皆具櫜鞬以軍禮庭叅其兼同中書門下平章事者初見亦如之其後許如客禮凡元帥府文符行天下皆用帖文升班在宰相上從榮大宴元帥府諸將皆有頒給控鶴奉聖嚴衛指揮使人馬一匹絹十匹其諸軍指揮使人絹十匹都頭以下七匹至三匹又請嚴衛捧聖千人為牙兵每入朝以數百騎先後張弓挾矢馳走道上見者皆震懾從榮又命其寮屬及四方遊士試作征淮檄陳已所以平一天下之意言事者請為諸王擇師傅以加訓導宰相難其事因請從榮自擇從榮乃請翰林學士崔棁刑部侍郎任贊為元帥判官明宗曰學士代予言不可也從榮出而恚曰任以元帥而不得請屬寮非吾所喻也將相大臣見從榮權位益隆而輕脱如此皆知其禍而莫敢言者惟延光延夀隂有避禍意數見明宗涕泣求解樞宻二人皆引去而從榮之難作十一月戊子雪明宗幸宫西士和亭得傷寒疾巳丑從榮與樞密使朱宏昭馮贇入問起居於廣夀殿帝不能知人王淑妃告曰從榮在此又曰昭等在此皆不應從榮等去乃遷於雍和殿宫中皆慟哭至夜半後帝蹶然自興於榻而侍疾者皆去顧殿上守漏宫女曰夜漏㡬何對曰四更矣帝即唾肉如肺者數片溺涎液斗餘守漏者曰大家省事乎曰吾不知也有頃六宫皆至曰大家還魂矣因進粥一器至旦疾少愈而從榮稱疾不朝初從榮常忌宋王從厚賢於已而懼不得為嗣其平居驕矜自得及聞人道宋王之善則愀然有不足之色其入問疾也見帝巳不知人既去而聞宫中哭聲以謂帝巳崩矣乃謀以兵入宫使其押衙馬處鈞告宏昭等欲以牙兵入宿衛問何所可以居者宏昭等對曰宫中皆王所可居王自擇之因私謂處鈞曰聖上萬福王宜竭力忠孝不可草草處鈞具以告從榮從榮還遣處鈞語宏昭等曰爾輩不念家族乎宏昭贇及宣徽使孟漢瓊等入告王淑妃以謀之曰此事須得侍衛兵為助乃召侍衛指揮使康義誠謀於竹林之下義誠有子在秦王府未敢決其謀謂昭曰僕為將挍惟公所使爾昭大懼明日從榮遣馬處鈞告馮贇曰吾今日入居興聖宫又告義誠義誠許諾贇即馳入内見義誠及昭漢瓊等坐中興殿閣議事贇責義誠曰主上所以蓄養吾徒者為今日爾今安危之機間不容髮奈何以子故懐顧望使秦王得至此門主上安所歸乎吾輩復有種乎漢瓊曰賤命不足惜吾自率兵拒之即入見曰從榮反兵巳攻端門宫人相顧號泣明宗問昭等曰實有之乎對曰有之明宗以手指天泣下良乆曰義誠自處置毋令震動京師潞王子重吉在側明宗曰吾與爾父起微賤至取天下數救我於危窘從榮得何氣力而作此惡事爾亟以兵守諸門重吉即以控鶴兵守宫門是日從榮自河南府擁兵千人以出從榮寮屬甚衆而正直之士多見惡其尤所惡者劉贊王居敏而所昵者劉陟髙輦從榮兵出與陟輦並轡耳語行至天津橋南指日景謂輦曰明日而今誅王居敏矣因陣兵橋北下據胡牀而坐使人召康義誠而端門巳閉叩左掖門亦閉而於門隙中見捧聖指揮使朱實率騎兵從北来即馳告從榮從榮驚懼索鐡厭心自調弓矢皇城使安從益率騎兵三百衝之從榮兵射之從益稍却實騎兵五百自左掖門出方渡河而後軍來者甚衆從榮乃走歸河南府其判官任贊巳下皆走出定鼎門牙兵劫嘉善坊而潰從榮夫妻匿牀下從益殺之明宗聞從榮巳死悲咽㡬墮於榻絶而蘇者再馮道率百寮入見明宗曰吾家事若此慙見羣臣君臣相顧泣下沾襟從榮二子尚㓜皆從死後六日而明宗崩漢湘隂公贇傳髙祖二弟三子弟曰崇曰信子曰承訓承祐承勲崇子曰贇髙祖愛之以為巳子乾祐元年拜贇徐州節度使承訓早卒追封魏王承祐次立是謂隐帝承勲為開封尹周太祖巳敗漢兵于北郊隐帝遇弑太祖入京師以謂漢大臣必相推戴及見宰相馮道等道殊無意太祖不得巳見道猶下拜道受太祖拜如平時徐勞之曰公行良苦太祖意色皆沮以謂漢大臣未有推立巳意又難於自立因白漢太后擇立漢嗣而宗室河東節度使崇等在者四人乃為太后誥曰河東節度使崇許州節度使信皆髙祖之弟徐州節度使贇開封尹承勲皆髙祖之子文武百辟其擇嗣君以承天統於是周太祖與王峻入見太后言開封尹承勲髙祖皇帝之子宜立太后以承勲乆病不任為嗣太祖與羣臣請見承勲視起居太后命以卧榻舁承勲出見羣臣羣臣視之信然乃共奏曰徐州節度使贇髙祖愛以為子宜立為嗣乃遣太師馮道率羣臣迎贇道揣周太祖意不在贇謂太祖曰公此舉由衷乎太祖指天為誓道既行謂人曰吾平生不為謬語人今謬語矣道見贇傳太后意名之贇行至宋州太祖自澶州為兵士擁還京師王峻慮贇左右生變遣侍衛馬軍指揮使郭崇以兵七百騎衛贇崇至宋州贇登樓問崇所以來之意崇曰澶州軍變懼未察之遣崇䕶衛非惡意也贇召崇崇不敢進馮道出與崇語崇乃登樓見贇巳而奪贇部下兵太祖以書召道先歸留其副趙上交王度奉贇入朝太后道乃先還贇謂道曰寡人此來所恃者以公三十年舊相是以不疑道黙然贇客將賈正等數目道欲圖之贇曰勿草草事豈出於公邪道巳去郭崇幽贇于外館殺賈正及判官董裔牙内都虞候劉福孔目官夏昭度等太祖巳監國太后乃下詔曰比者樞密使郭威志安宗社議立長君以徐州節度使贇髙祖近親立為漢嗣乃自藩鎮召赴京師雖誥命巳行而軍情不附天道在北人心靡東適當改卜之初俾膺分土之命贇可降授開府儀同三司檢挍太師上柱國封湘隂公贇以幽死初贇自徐州入也以都押牙鞏庭美教練使揚溫守徐州庭美等聞贇不得立乃閉城拒命太祖拜王彦超徐州節度使下詔諭庭美等許以刺史并詔贇赦庭美等廣順元年三月彦超克徐州庭美等皆見殺承勲廣順元年以疾卒追封陳王嗚呼予既悲湘隂公贇之事又嘉鞏庭美楊溫之所為贇於漢非嫡長特以周氏移國畏天下而難之故假贇以伺間爾當是之時天下皆知贇之必不立也然庭美溫區區為贇守孤城以死其始終之迹何媿於死節之士哉然予考於實録二人之死狀不明夫二人之事固知其無所成其所重者死爾然史氏不著不知其何以死也當王彦超之攻徐州也周嘗遣人招庭美等予得其詔書四皆言庭美等嘗已送欵於周後懼罪而復叛然庭美等欵狀亦不見是皆不可知也夫史之闕文可不慎哉其疑以傳疑則信者信矣予固嘉二人之忠而悲其志然不得列於死節之士者惜哉唐宋八大家文鈔巻六十三
