body:
  text: 唐宋八大家文鈔巻十明茅坤撰昌黎文鈔十辯解説頌雜著諱辯古今以來如此文不可多得愈與李賀書勸賀舉進士賀舉進士有名與賀争名者毁之曰賀父名晉肅賀不舉進士為是勸之舉者為非聽者不察也和而唱之同然一辭皇甫湜曰若不明白子與賀且得罪愈曰然律曰二名不偏諱釋之者曰謂若言徴不稱在言在不稱徴是也律曰不諱嫌名釋之者曰謂若禹與雨丘與蓲之類是也今賀父名晉肅賀舉進士為犯二名律乎為犯嫌名律乎父名晉肅子不得舉進士若父名仁子不得為人乎夫諱始於何時作法制以教天下者非周公孔子歟周公作詩不諱孔子不偏諱二名春秋不譏不諱嫌名康王釗之孫實為昭王曾參之父名晢曾子不諱昔周之時有騏期漢之時有杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱吕后名雉為野雞不聞又諱治天下之治為某字也今上章及詔不聞諱滸勢秉機也惟宦官宫妾乃不敢言諭及機以為觸犯士君子言語行事宜何所法守也今考之於經質之於律稽之以國家之典賀舉進士為可邪為不可邪凡事父母得如曾參可以無譏矣作人得如周公孔子亦可以止矣今世之士不務行曾參周公孔子之行而諱親之名則務勝於曾參周公孔子亦見其惑也夫周公孔子曾參卒不可勝勝周公孔子曾參乃比於宦官宫妾則是宦官宫妾之孝於其親賢於周公孔子曾參者耶此文反覆竒險令人眩掉實自顯快前分律經典三叚後尾抱前辨難只因三叚中時有逰兵㸃綴便足迷人進學解此韓公正正之旗堂堂之陣也其主意專在宰相蓋大才小用不能無憾而以怨懟無聊之辭托之人自咎自責之辭托之已最得體國子先生晨入太學招諸生立館下誨之曰業精于勤荒于嬉行成于思毁于隨方今聖賢相逢治具畢張㧞去兇邪登崇畯良占小善者率以録名一藝者無不庸爬羅剔抉刮垢磨光葢有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明行患不能成無患有司之不公言未既有笑于列者曰先生欺予哉弟子事先生于兹有年矣先生口不絶吟于六藝之文手不停披于百家之編記事者必提其要纂言者必鈎其𤣥貪多務得細大不捐焚膏油以繼晷恒兀兀以窮年先生之業可謂勤矣觝排異端攘斥佛老補苴罅漏張皇幽𦕈尋墜緒之茫茫獨旁捜而逺紹障百川而東之迴狂瀾於既倒先生之於儒可謂有勞矣沈浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易奇而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣少始知學勇於敢為長通於方左右具宜先生之於為人可謂成矣然而公不見信於人私不見助於友跋前躓後動輙得咎暫為御史遂竄南夷三年博士冗不見治命與仇謀取敗幾時冬暖而兒號寒年豐而妻啼饑頭童齒豁竟死何禆不知慮此而反教人為先生曰吁子來前夫大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其宜施以成室者匠氏之工也玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑較短量長惟器是適者宰相之方也昔者孟軻好辨孔道以明轍環天下卒老于行荀卿守正大論是𢎞逃讒于楚廢死蘭陵是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇於世何如也今先生學雖勤而不繇其統言雖多而不要其中文雖竒而不濟於用行雖修而不顯於衆猶且月費俸錢嵗縻廩粟子不知耕婦不知織乘馬從徒安坐而食踵當途之促促窺陳編以盗竊然而聖主不加誅宰臣不見斥兹非其幸歟動而得謗名亦隨之投閑置散乃分之宜若夫商財賄之有亡計班資之崇庳忘己量之所稱指前人之瑕疵是所謂詰匠氏之不以杙為楹而訾醫師以昌陽引年欲進其豨苓也獲麟解文凡四轉而結思圓轉如㳺龍如轆轤愈變化而愈勁厲此奇兵也麟之為靈昭昭也詠於詩書於春秋雜出於傳記百家之書雖婦人小子皆知其為祥也然麟之為物不畜於家不恒有於天下其為形也不類非若馬牛犬豕豺狼麋鹿然然則雖有麟不可知其為麟也角者吾知其為牛鬛者吾知其為馬犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿惟麟也不可知不可知則其謂之不祥也亦宜雖然麟之出必有聖人在乎位麟為聖人出也聖人者必知麟麟之果不為不祥也又曰麟之所以為麟者以徳不以形若麟之出不待聖人則謂之不祥也亦宜唐荆川曰以祥不祥二字作眼目擇言解其思深其調逸火洩於密而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災矣水發於深而為用且逺能不違於道可浮可載可飲可灌以濟乎生物及其導而不防反為患矣言起於微而為用且博能不違於道可化可令可告可訓以推於生物及其縱而不慎反為禍矣火既我災有水而可伏其熖能使不陷於灰燼矣水既我患有土而可遏其流能使不仆於波濤矣言既我禍即無以掩其辭能不罹於過者亦鮮矣所以知理者又焉得不擇其言歟其為慎而甚於水火師説昌黎當時抗師道以號召後輩故為此以倡赤幟云古之學者必有師師者所以傳道授業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎是故無貴無賤無長無少道之所存師之所存也嗟乎師道之不傳也乆矣欲人之無惑也難矣古之聖人其出人也逺矣猶且從師而問焉今之衆人其下聖人也亦逺矣而恥學於師是故聖益聖愚益愚聖人之所以為聖愚人之所以為愚其皆出於此乎愛其子擇師而教之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者非吾所謂傳其道解其惑者也句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近諛嗚呼師道之不復可知矣巫醫樂師百工之人君子不齒今其智乃反不能及其可怪也歟聖人無常師孔子師郯子萇𢎞師襄老􅆅郯子之徒其賢不及孔子孔子三人行則必有我師是故弟子不必不如師師不必賢於弟子聞道有先後術業有專攻如是而巳李氏子蟠年十七好古文六藝經傳皆通習之不拘於時學於余余嘉其能行古道作師説以貽之雜説雜説四首並變幻奇詭不可端倪龍嘘氣成雲雲固弗靈於龍也然龍乘是氣茫洋窮乎𤣥間薄日月伏光景感震電神變化水下土汨陵谷雲亦靈怪矣哉雲龍之所能使為靈也若龍之靈則非雲之所能使為靈也然龍弗得雲無以神其靈矣失其所憑依信不可歟異哉其所憑依乃其所自為也易曰雲從龍既曰龍雲從之矣善醫者不視人之瘠肥察其脉之病否而巳矣善計天下者不視天下之安危察其紀綱之理亂而巳矣天下者人也安危者肥瘠也紀綱者脉也脉不病雖瘠不害脉病而肥者死矣通於此説者其知所以為天下乎夏殷周之衰也諸侯作而戰伐日行矣傳數十王而天下不傾者紀綱存焉耳秦之王天下也無分勢於諸侯聚兵而焚之傳二世而天下傾者紀綱亡馬耳是故四支雖無故不足恃也脉而巳矣四海雖無事不足矜也紀綱而巳矣憂其所可恃懼其所可矜善醫善計者謂之天扶與之易曰視履考祥善醫善計者為之談生之為崔山君傳稱鶴言者豈不怪哉然吾觀於人其能盡吾性而不類於禽獸異物者希矣將憤世嫉邪長往而不來者之所為乎昔之聖者其首有若牛者其形有若蛇者其喙有若鳥者其貌有若䝉倛者彼皆貌似而心不同焉可謂之非人邪即有平脅曼膚顔如渥丹美而狠者貌則人其心則禽獸又惡可謂之人邪然則觀貌之是非不若論其心與其行事之可否為不失也怪神之事孔子之徒不言余將特取其憤世嫉邪而作之故題之云爾世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祇辱於奴𨽻人之手駢死於槽櫪之間不以千里稱也馬之千里者一食或盡粟一石食馬者不知其能千里而食也是馬也雖有千里之能食不飽力不足才美不外見且欲與常馬等不可得安求其能千里也䇿之不以其道食之不能盡其材鳴之而不能通其意執䇿而臨之曰天下無馬嗚呼其真無馬邪其真不知馬也子産不毁鄉校頌子産之識逺故不毁鄉校退之之思深故為頌我思古人伊鄭之僑以禮相國人未安其教逰于鄉之校衆口囂囂或謂子産毁鄉校則止曰何患焉可以成美夫豈多言亦各其志善也吾行不善吾避維善維否我於此視川不可防言不可弭下塞上聾邦其傾矣既鄉校不毁而鄭國以理在周之興養老乞言及其已衰謗者使監成敗之迹昭哉可觀維是子産執政之式維其不遇化止一國誠率是道相天下君交暢旁達施及無垠於虖四海所以不理有君無臣誰其嗣之我思古人伯夷頌昔人稱太史公傳酷吏刺客等文各肖其人今以此文頌伯夷亦爾然不如史遷本傳士之特立獨行適於義而已不顧人之是非皆豪傑之士信道篤而自知明者也一家非之力行而不惑者寡矣至於一國一州非之力行而不惑者蓋天下一人而已矣若至於舉世非之力行而不惑者則千百年乃一人而已耳若伯夷者窮天地亘萬世而不顧者也昭乎日月不足為明崒乎泰山不足為髙巍乎天地不足為容也當殷之亡周之興微子賢也抱祭器而去之武王周公聖也從天下之賢士與天下之諸侯而往攻之未嘗聞有非之者也彼伯夷叔齊者乃獨以為不可殷既滅矣天下宗周彼二子乃獨耻食其粟餓死而不顧繇是而言夫豈有求而為哉信道篤而自知明也今世之所謂士者一凡人譽之則自以為有餘一凡人沮之則自以為不足彼獨非聖人而自是如此夫聖人乃萬世之標凖也余故曰若伯夷者特立獨行窮天地亘萬世而不顧者也雖然微二子亂臣賊子接迹于後世矣荆川曰昌黎此文分明自孟子中脱出來張中丞傳後敘通篇句字氣皆太史公髓非昌黎本色今書畫家亦有效人而得其解者此正見其無不可處元和二年四月十三日夜愈與吳郡張籍閲家中舊書得李翰所為張巡傳翰以文章自名為此傳頗詳密然尚恨有闕者不為許逺立傳又不載雷萬春事首尾逺雖材若不及巡者開門納巡位本在巡上授之柄而處其下無所疑忌竟與巡俱守死成功名城䧟而虜與巡死先後異耳兩家子弟材智下不能通知二父志以為巡死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳而賊語以國亡主滅逺見救援不至而賊來益衆必以其言為信外無待而猶死守人相食且盡雖愚人亦能數日而知死處矣逺之不畏死亦明矣烏有城壊其徒俱死獨䝉媿恥求活雖至愚者不忍為嗚呼而謂逺之賢而為之邪説者又謂逺與巡分城而守城之陷自逺所分始以此詬逺此又與兒童之見無異人之將死其臓腑必有先受其病者引䋲而絶之其絶必有處觀者見其然從而尤之其亦不達於理矣小人之好議論不樂成人之美如是哉如巡逺之所成就如此卓卓猶不得免其他則又何説當二公之初守也寧能知人之卒不救棄城而逆遁茍此不能守雖避之他處何益及其無救而且窮也將其創殘餓羸之餘雖欲去必不達二公之賢其講之精矣守一城捍天下以千百就盡之卒戰百萬日滋之師蔽遮江淮沮遏其勢天下之不亡其誰之功也當是時棄城而圖存者不可一二數擅强兵坐而觀者相環也不追議此而責二公以死守亦見其自比於逆亂設滛辭而助之攻也愈嘗從事於汴徐二府屢道於兩府間親祭於其所謂雙廟者其老人往往説巡逺時事云南霽雲之乞救於賀蘭也賀蘭嫉巡逺之聲威功績出已上不肯出師救愛霽雲之勇且壯不聽其語强留之具食與樂延霽雲坐霽雲慷慨語曰雲來時睢陽之人不食月餘日矣雲雖欲獨食義不忍雖食且不下咽因㧞所佩刀斷一指血淋漓以示賀蘭一座大驚皆感激為雲泣下雲知賀蘭終無為雲出師意即馳去將出城抽矢射佛寺浮圖矢著其上甎半箭曰吾歸破賊必滅賀蘭此矢所以志也愈貞元中過泗州船上人猶指以相語城陷賊以刃脅降巡巡不屈即牽去將斬之又降霽雲雲未應巡呼雲曰南入男兒死耳不可為不義屈雲笑曰欲將以有為也公有言雲敢不死即不屈張籍曰有于嵩者少依於巡及巡起事嵩常在圍中籍大厯中於和州烏江縣見嵩嵩時年六十餘矣以巡初嘗得臨渙縣尉好學無所不讀籍時尚小粗問巡逺事不能細也云巡長七尺餘鬚髯若神嘗見嵩讀漢書謂嵩曰何為乆讀此嵩曰未熟也巡曰吾於書讀不過三徧終身不忘也因誦嵩所讀書盡巻不錯一字嵩驚以為巡偶熟此巻因亂抽他帙以試無不盡然嵩又取架上諸書試以問巡巡應口誦無疑嵩從巡乆亦不見巡常讀書也為文章操紙筆立書未嘗起草初守睢陽時士卒僅萬人城中居人户亦且數萬巡因一見問姓名其後無不識者巡怒鬚髯輙張及城陷賊縛巡等數十人坐且將戮巡起旋其衆見巡起或起或泣巡曰汝勿怖死命也衆泣不能仰視巡就戮時顔色不亂陽陽如平常逺寛厚長者貌如其心與巡同年生月日後於巡呼巡為兄死時年四十九嵩貞元初死於亳宋間或傳嵩有田在亳宋間武人奪而有之嵩將詣州訟理為所殺嵩無子張籍云讀荀子昌黎病荀不醇而末引孔子一轉却安頓自家方好始吾讀孟軻書然後知孔子之道尊聖人之道易行王易王霸易霸也以為孔子之徒沒尊聖人者孟氏而已晩得楊雄書益尊信孟氏因雄書而孟氏益尊則雄者亦聖人之徒歟聖人之道不傳於世周之衰好事者各以其説干時君紛紛籍籍相亂六經與百家之説錯雜然老師大儒猶在火于秦黄老于漢其存而醇者孟軻氏而止耳楊雄氏而止耳及得荀氏書於是又知有荀氏者也考其辭時若不粹要其歸與孔子異者鮮矣抑猶在軻雄之間乎孔子刪詩書筆削春秋合於道者著之離於道者黜去之故詩書春秋無疵余欲削荀氏之不合者附於聖人之籍亦孔子之志歟孟氏醇乎醇者也荀與楊大醇而小疵讀儀禮余嘗苦儀禮難讀又其行于今者葢寡㳂襲不同復之無由考于今誠無所用之然成王周公之法制粗在於是孔子曰吾從周謂其文章之盛也古書之存者希矣百氏雜家尚有可取况聖人之制度邪於是掇其大要奇辭奥㫖著于篇學者可觀焉惜乎吾不及其時進退揖讓于其間嗚呼盛哉讀墨子混儒墨而無辨此昌黎汨其文辭而忘其本也儒譏墨以上同兼愛上賢明鬼而孔子畏大人居是邦不非其大夫春秋譏專臣不上同哉孔子泛愛親仁以博施濟衆為聖不兼愛哉孔子賢賢以四科進褒弟子疾歿世而名不稱不上賢哉孔子祭如在譏祭如不祭者曰我祭則受福不明鬼哉儒墨同是堯舜同非桀紂同修身正心以治天下國家奚不相悦如是哉余以為辨生於末學各務售其師之説非二師之道本然也孔子必用墨子墨子必用孔子不相用不足為孔墨送窮文元和六年正月乙丑晦主人使奴星結栁作車縛草為船載糗輿粻牛繫軛下引帆上檣三揖窮鬼而告之曰聞子行有日矣鄙人不敢問所塗竊具船與車備載糗粻日吉時良利行四方子飯一盂子啜一觴擕朋挈儔去故就新駕塵彍風與電争先子無底滯之尤我有資送之恩子等有意於行乎屏息潛聽如聞音聲若嘯若啼砉欻嚘嚶毛髪盡竪竦肩束頸疑有而無乆乃可明若有言者曰吾與子居四十年餘子在孩提吾不子愚子學子耕求官與名惟子是從不變于初門神户靈我叱我呵包羞詭隨志不在他子遷南荒熱爍濕蒸我非其鄉百鬼欺陵太學四年朝虀暮鹽惟我保汝人皆汝嫌自初及終未始背汝心無異謀口絶行語於何聽聞云我當去是必夫子信讒有間於予也我鬼非人安用車船鼻齅臭香糗粻可捐單獨一身誰為朋儔子茍備知可數已不子能盡言可謂聖智情狀既露敢不迴避主人應之曰子以吾為真不知也耶子之朋儔非六非四在十去五滿七除二各有主張私立名字捩手覆羮轉喉觸諱凡所以使吾面目可憎語言無味者皆子之志也其名曰智窮矯矯亢亢惡圓喜方羞為姦欺不忍害傷其次名曰學窮傲數與名摘抉杳微髙挹羣言執神之機又其次曰文窮不專一能怪怪奇奇不可時施秖以自嬉又其次曰命窮影與形殊面醜心妍利居衆後責在人先又其次曰交窮磨肌戞骨吐出心肝企足以待寘我讐寃凡此五鬼為吾五患饑我寒我興訛造訕能使我迷人莫能閒朝悔其行暮巳復然蠅營狗茍驅去復還言未畢五鬼相與張眼吐舌跳踉偃仆抵掌頓脚失笑相顧徐謂主人曰子知我名凡我所為驅我令去小黠大癡人生一世其乆幾何吾立子名百世不磨小人君子其心不同惟乖於時乃與天通擕持琬琰易一羊皮飫於肥甘慕彼糠糜天下知子誰過於予雖遭斥逐不忍子疏謂予不信請質詩書主人於是垂頭䘮氣上手稱謝燒車與船延之上座釋言篇中憂讒始則述傳與者之言再則托已之自為解三則不能無憂四則又自為解五則又入李翰林之並相未復自為解元和元年六月十日愈自江陵法曹詔拜國子博士始進見今相國鄭公公賜之坐且曰吾見子某詩吾時在翰林職親而地禁不敢相聞今為我寫子詩書為一通以來愈再拜謝退録詩書若干篇擇日時以獻於後之數月有來謂愈者曰子獻相國詩書乎曰然曰有為讒於相國之座者曰韓愈曰相國徴余文余不敢匿相國豈知我哉子其慎之愈應之曰愈為御史得罪徳宗朝同遷于南者凡三人獨愈為先收用相國之賜大矣百官之進見相國者或立語以退而愈辱賜坐語相國之禮過矣四海九州之人自百官以下欲以其業徹相國左右者多矣皆憚而莫之敢獨愈辱先索相國之知至矣賜之大禮之過知之至是三者於敵以下受之宜以何報况在天子之宰乎人莫不自知凡適於用之謂才堪其事之謂力愈於二者雖日勉焉而不迨束帶執笏立士大夫之行不見斥以不肖幸矣其何敢敖於言乎夫敖雖凶徳必有恃而敢行愈之族親鮮少無扳聨之勢於今不善交人無相先相死之友於朝無宿資蓄貨以釣聲勢弱於才而腐於力不能奔走乘機扺巇以要權利夫何恃而敖若夫狂惑䘮心之人蹈河而入火妄言而罵詈者則有之矣而愈人知其無是疾也雖有讒者百人相國將不信之矣愈何懼而慎歟既累月又有來謂愈曰有讒子於翰林舍人李公與裴公者子其慎歟愈曰二公者吾君朝夕訪焉以為政於天下而階太平之治居則與天子為心膂出則與天子為股肱四海九州之人自百官以下其孰不願忠而望賜愈也不狂不愚不蹈河而入火病風而妄罵不當有如讒者之説也雖有讒者百人二公將不信之矣愈何懼而慎既以語應客夜歸私自尤曰咄市有虎而曾參殺人讒者之效也詩曰取彼讒人投畀豺虎豺虎不食投畀有北有北不受投畀有昊傷於讒疾而甚之之辭也又曰亂之初生僭始既涵亂之又生君子信讒始疑而終信之之謂也孔子曰逺佞人夫佞人不能逺則有時而信之矣今我恃直而不戒禍其至哉徐又自解之曰市有虎聽者庸也曾參殺人以愛惑聰也巷伯之傷亂世是逢也今三賢方與天子謀所以施政於天下而階太平之治聽聰而視明公正而敦大夫聰明則聽視不惑公正則不邇讒邪敦大則有以容而思彼讒人者孰敢進而為讒哉雖進而為之亦莫之聽矣我何懼而慎既累月上命李公相客謂愈曰子前被言於一相今李公又相子其危哉愈曰前之謗我於宰相者翰林不知也後之謗我於翰林者宰相不知也今二公合處而㑹言若及愈必曰韓愈亦人耳彼敖宰相又敖翰林其將何求必不然吾乃今知免矣既而讒言果不行貓相乳以事之小者而議論關係大體司徒北平王家貓有生子同日者其一死焉有二子飲於死母母且死其鳴咿咿其一方乳其子若聞之起而若聽之走而若救之銜其一置于其棲又往如之反而乳之若其子然噫亦異之大者也夫貓人畜也非性於仁義者也其感於所畜者乎哉北平王牧民以康伐罪以平理隂陽以得其宜國事既畢家道乃行父父子子兄兄弟弟雍雍如也愉愉如也視外猶視中一家猶一人夫如是其所感應召致其亦可知矣易曰信及豚魚非此類也夫愈時獲幸於北平王客有問王之徳者愈以是對客曰夫祿位貴富人之所大欲也得之之難未若持之之難也得之於功或失於徳得之於身或失於子孫今夫功徳如是祥祉如是其善持之也可知己既已因叙之為貓相乳説云守戒通篇極論正意只收一句作結是一體却自過秦論來其文平直通顯反近蘇氏亦非公本色詩曰大邦維翰書曰以蕃王室諸侯之於天子不惟守土地奉職貢而已固將有以翰蕃之也今人有宅於山者知猛獸之為害則必髙其柴楥而外施窞穽以待之宅於都者知穿窬之為盗則必峻其垣墻而内固扄鐍以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介然於屈强之間而不知為之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈材力為有不足歟蓋以為不足為而不為耳天下之禍莫大於不足為材力不足者次之不足為者敵至而不知材力不足者先事而思則其於禍也有間矣彼之屈强者帶甲荷戈不知其多少其緜地則千里而與我壤地相錯無有丘陵江河洞庭孟門之關其間又自知其不得與天下齒朝夕舉踵引頸冀天下之有事以乘吾之便此其暴於禽獸穿窬也甚矣嗚呼胡知而不為之備乎哉賁育之不戒童子之不抗魯雞之不期蜀雞之不支今夫鹿之於豹非不巍然大矣然而卒為之禽者爪牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人對禹問通篇以客形主相為發明或問曰堯舜傳諸賢禹傳諸子信乎曰然然則禹之賢不及於堯與舜也歟曰不然堯舜之傳賢也欲天下之得其所也禹之傳子也憂後世争之之亂也堯舜之利民也大禹之慮民也深曰然則堯舜何以不憂後世曰舜如堯堯傳之禹如舜舜傳之得其人而傳之堯舜也無其人慮其患而不傳者禹也舜不能以傳禹堯為不知人禹不能以傳子舜為不知人堯以傳舜為憂後世禹以傳子為憂後世曰禹之慮也則深矣傳之子而當不淑則奈何曰時益以難理傳之人則争未前定也傳之子則不争前定也前定雖不當賢猶可以守法不前定而不過賢則争且亂天之生大聖也不數其生大惡也亦不數傳諸人得大聖然後人莫敢争傳諸子得大惡然後人受其亂禹之後四百年然後得桀亦四百年然後得湯與伊尹湯與伊尹不可待而傳也與其傳不得聖人而争且亂孰若傳諸子雖不得賢猶可守法曰孟子之所謂天與賢則與賢天與子則與子者何也曰孟子之心以為聖人不茍私於其子以害天下求其説而不得從而為之辭通解今之人以一善為行而恥為之慕達節而稱夫通才者多矣然而脂韋汨沒以至於老死者相繼亦未見他之稱其豈非亂教賊名之術乎且五常之教與天地皆生然而天下之人不得其師終不能自知而行之矣故堯之前千萬年天下之人促促然不知其讓之為美也於是許由哀天下之愚且以争為能迺脱屣其九州髙揖而辭堯由是後之人竦然而言曰雖天下猶有薄而不售者况其小者乎故讓之教行於天下許由為之師也自桀之前千萬年天下之人循循然不知忠易其死也故龍逢哀天下之不仁觀君父百姓入水火而不救於是進盡其言退就割烹故後之臣竦然而言曰雖萬死猶有忠而不懼者况其小者乎故忠之教行于天下由龍逢為之師也自周之前千萬年渾渾然不知義之可以換其生也故伯夷哀天下之偷且以彊則服食其葛嶶逃山而死故後之人竦然而言曰雖餓死猶有義而不懼者况其小者乎故義之教行於天下由伯夷為之師也是三人俱以一身立教而為師於百千萬年間其身亡而其教存扶持天地功亦厚矣嚮令三師恥獨行慕通達則堯之日必曰得位而濟道安用讓為夏之日必曰長進而否退安用死為周之日必曰和光而同塵安用餓為若然者天下之人促促然而争循循然而佞渾渾然而偷其何懼而不為哉是則三師生於今必謂偏而不通者矣其可不謂之大賢人者哉嗚呼今之人其慕通達之為弊也且古聖人言通者葢百行衆藝備於身而行之者也今恒人之言通者葢百行衆藝闕於身而求合者也是則古之言通者通於道義今之言通者通於私曲其亦異矣將欲齊之者其不猶矜糞丸而擬質隋珠者乎且令今父兄教其子弟者曰爾當通於行如仲尼雖愚者亦知其不能也曰爾尚力一行如古之一賢雖中人亦希其能矣豈不由聖可慕而不可齊邪賢可及而可齊也今之人行未能及乎賢而欲齊乎聖者亦見其病矣夫古人之進修或幾乎聖人今之人行不出乎中行而恥乎力一行為獨行且曰我通同如聖人彼其欺心邪吾不知矣彼其欺人而賊名邪吾不知矣余懼其説之將深為通解行難假行難以鳴已志文極奇詭或問行孰難曰捨我之矜從爾之稱孰能之曰陸先生參何如曰先生之賢聞天下是是而非非貞元中自越州徴拜祠部員外郎京師之人日造焉閉門而拒之滿街愈嘗往間客席先生矜語其客曰某胥也某商也其生某任之其死某誄之某與某可人也任與誄也非罪歟皆曰然愈曰某之胥某之商其得任與誄也有由乎抑有罪不足任而誄之邪先生曰否吾惡其初不然任與誄也何尤愈曰茍如是先生之言過矣昔者管敬子取盗二人為大夫於公趙文子舉管庫之士七十有餘家夫惡求其初先生曰不然彼之取者賢也愈曰先生之所謂賢者大賢歟抑賢於人之賢歟齊也晉也且有二與七十而可謂今之天下無其人邪先生之選人也已詳先生曰然愈曰聖人不世出賢人不時出千百嵗之間倘有焉不幸而有出於胥商之族者先生之説傳吾不忍赤子之不得乳於其母也先生曰然他日又往坐焉先生曰今之用人也不詳位乎朝者吾取某與某而已在下者多于朝凡吾與者若干人愈曰先生之與者盡於此乎其皆賢乎抑猶有舉其多而缺其少乎先生曰固然吾敢求其全愈曰由宰相至百執事凡幾位由一方至一州凡幾位先生之得者無乃不足充其位邪不早圖之一朝而舉焉今雖詳其後用也必麤先生曰然子之言孟軻不如唐宋八大家文鈔巻十
