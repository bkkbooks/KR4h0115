body:
  text: 唐宋八大家文鈔巻四十二明茅坤撰廬陵文鈔十四論春秋論上辯事有不幸出於久逺而傳乎二説則奚從曰從其一之可信者然則安知可信者而從之曰從其人而信之可也衆人之説如彼君子之説如此則捨衆人而從君子君子博學而多聞矣然其傳不能無失也君子之説如彼聖人之説如此則捨君子而從聖人此舉世之人皆知其然而學春秋者獨異乎是孔子聖人也萬世取信一人而已若公羊髙榖梁赤左丘明三子者博學而多聞矣其傳不能無失者也孔子之於經三子之於傳有所不同則學者寧捨經而從傳不信孔子而信三子甚哉其惑也經於魯隠公之事書曰公及邾儀父盟于蔑其卒也書曰公薨孔子始終謂之公三子者曰非公也是攝也學者不從孔子謂之公而從三子謂之攝其於晉靈公之事孔子書曰趙盾弑其君夷臯三子者曰非趙盾也是趙穿也學者不從孔子信為趙盾而從三子信為趙穿其於許悼公之事孔子書曰許世子止弑其君買三子者曰非弑之也買病死而止不嘗藥耳學者不從孔子信為弑君而從三子信為不嘗藥其捨經而從傳者何哉經簡而直傳新而奇簡直無悦耳之言新奇多可喜之論是以學者樂聞而易惑也予非敢曰不惑然信於孔子而篤者也經之所書予所信也經所不言予不知也難者曰子之言有激而云爾夫三子者皆學乎聖人而傳所以述經也經文隠而意深三子者從而發之故經有不言傳得而詳爾非為二説也予曰經所不書三子者何從而知其然也曰推其前後而知之且其有所傳而得也國君必即位而隠不書即位此傳得知其攝也弑君者不復見經而盾復見經此傳得知弑君非盾也君弑賊不討則不書葬而許悼公書葬此傳得知世子止之非實弑也經文隠矣傳曲而暢之學者以謂三子之説聖人之深意也是以從之耳非謂捨孔子而信三子也予曰然則妄意聖人而惑學者三子之過而已使學者必信乎三子予不能奪使其惟是之求則予不得不為之辨春秋論中發首篇所未盡更明透孔子何為而修春秋正名以定分求情而責實别是非明善惡此春秋之所以作也自周衰以來臣弑君子弑父諸侯之國相屠戮而爭為君者天下皆是也當是之時有一人焉能好㢘而知讓立乎争國之亂世而懐讓國之髙節孔子得之於經宜如何而别白之宜如何而褒顯之其肯没其攝位之實而雷同衆君誣以為公乎所謂攝者臣行君事之名也伊尹周公共和之臣嘗攝矣不聞商周之人謂之王也使息姑實攝而稱號無異於正君則名分不正而是非不别夫攝者心不欲為君而身假行君事雖行君事而其實非君也今書曰公則是息姑心不欲之實不為之而孔子加之失其本心誣以虛名而没其實善夫不求其情不責其實而善惡不明如此則孔子之意疎而春秋繆矣春秋辭有同異尤謹嚴而簡約所以别嫌明微慎重而取信其於是非善惡難明之際聖人所盡心也息姑之攝也㑹盟征伐賞刑祭祀皆出於己舉魯之人皆聽命於己其不為正君者幾何惟不有其名耳使其名實皆在己則何從而知其攝也故息姑之攝與不攝惟在為公與不為公别嫌明㣲繫此而已且其有讓桓之志未及行而見殺其生也志不克伸其死也被虛名而違本意則息姑之恨何申於後世乎其甚髙之節難明之善亦何望於春秋乎今説春秋者皆以名字氏族予奪為輕重故曰一字為褒貶且公之為字豈不重於名字氏族乎孔子於名字氏族不妄以加人其肯以公妄加於人而没其實乎以此而言隠實為攝則孔子決不書曰公孔子書為公則隠決非攝難者曰然則何為不書即位曰惠公之終不見其事則隠之始立亦不可知孔子從二百年後得其遺書而修之闕其所不知所以傳信也難者又曰謂為攝者左氏耳公羊榖梁皆以為假立以待桓也故得以假稱公予曰凡魯之事出於己舉魯之人聽於己生稱曰公死書曰薨何從而知其假春秋論下又發次篇所未盡更洗發辨析弑逆大惡也其為罪也莫贖其為人也不容其在法也無赦法施於人雖小必慎况舉大法而加大惡乎既輙加之又輙赦之則自侮其法而人不畏春秋用法不如是之輕易也三子説春秋書趙盾以不討賊故加之大惡既而以盾非實弑則又復見於經以明盾之無罪是輙加之而輙赦之爾以盾為無弑心乎其可輕以大惡加之以盾不討賊情可責而宜加之乎則其後頑然未嘗討賊既不改過以自贖何為遽赦使同無罪之人其於進退皆不可此非春秋意也趙穿弑君大惡也盾不討賊不能為君復讐而失刑於下二者輕重不較可知就使盾為可責然穿焉得免也今免首罪為善人使無辜者受大惡此決知其不然也春秋之法使為惡者不得幸免疑似者有所辨明所謂是非之公也據三子之説初靈公欲殺盾盾走而免穿盾族也遂弑而盾不討其迹涉於與弑矣此疑似難明之事聖人尤當求情責實以明白之使盾果有弑心乎則自然罪在盾矣不得曰為法受惡而稱其賢也使果無弑心乎則當為之辯明必先正穿之惡使罪有所歸然後責盾縱賊則穿之大惡不可幸而免盾之疑似之迹獲辯而不討之責亦不得辭如此則是非善惡明矣今為惡者獲免而疑似之人陷於大惡此決知其不然也若曰盾不討賊有幸弑之心與自弑同故寧舍穿而罪盾此乃逆詐用情之吏矯激之為爾非孔子忠恕春秋以王道治人之法也孔子患舊史是非錯亂而善惡不明所以修春秋就令舊史如此其肯從而不正之乎其肯從而稱美又教人以越境逃惡乎此可知其繆傳也問者曰然則夷皋孰弑之曰孔子所書是矣趙盾弑其君也今有一人焉父病躬進藥而不嘗又有一人焉父病而不躬進藥而二父皆死又有一人焉操刃而殺其父使吏治之是三人者其罪同乎曰雖庸吏猶知其不可同也躬藥而不知嘗者有愛父之孝心而不習於禮是可哀也無罪之人爾不躬藥者誠不孝矣雖無愛親之心然未有殺父之意使善治獄者猶當與操刃殊科况以躬藥之孝反與操刃同其罪乎此庸吏之不為也然則許世子止實不嘗藥則孔子決不書曰弑君孔子書為弑君則止決非不嘗藥難者曰聖人借止以垂教爾對曰不然夫所謂借止以垂教者不過欲人之知嘗藥耳聖人一言明以告人則萬世法也何必加孝子以大惡之名而嘗藥之事卒不見於文使後世但知止為弑君而莫知藥之當嘗也教未可垂而已陷人於大惡矣聖人垂教不如是之迂也果曰責止不如是之刻也難者曰然則盾曷為復見於經許悼公曷為書葬曰弑君之臣不見經此自三子説爾果聖人法乎悼公之葬且安知其不討賊而書葬也自止以弑見經後四年吳敗許師又十有八年當定公之四年許男始見於經而不名許之書於經者略矣止之事迹不可得而知也難者曰三子之説非其臆出也其得於所傳如此然則所傳者皆不可信乎曰傳聞何可盡信公羊榖梁以尹氏卒為正卿左氏以尹氏卒為隠母一以為男子一以為婦人得於所傳者葢如是是可盡信乎春秋或問識好或問春秋何為始於隠公而終於獲麟曰吾不知也問者曰此學者之所盡心焉不知何也曰春秋之起止吾所知也子所問者始終之義吾不知也吾無所用心乎此也昔者孔子仕於魯不用去之諸侯又不用困而歸且老始著書得詩自闗雎至於魯頌得書自堯典至於費誓得魯史記自隐公至於獲麟遂刪修之其前逺矣聖人著書足以法世而已不窮逺之難明也故據其所得而修之孔子非史官不常職乎史故盡其所得修之而止耳魯之史記則未嘗止也今左氏經可以見矣曰然則始終無義乎曰義在春秋不在起止春秋謹一言而信萬世者也予厭衆説之亂春秋者也或問予於隠攝盾止之弑據經而廢傳經簡矣待傳而詳可廢乎曰吾豈盡廢之乎夫傳之於經勤矣其述經之事時有賴其詳焉至其失傳則不勝其戾也其述經之意亦時有得焉及其失也欲大聖人而反小之欲尊經而反卑之取其詳而得者廢其失者可也嘉其尊大之心可也信其卑小之説不可也問者曰傳有所廢則經有所不通奈何曰經不待傳而通者十七八因傳而惑者十五六日月萬物皆仰然不為盲者明而有物蔽之者亦不得見也聖人之意皎然乎經惟明者見之不為他説蔽者見之也泰誓論反覆剖晳書稱商始咎周以乗黎乗黎者西伯也西伯以征伐諸侯為職事其伐黎而勝也商人已疑其難制而惡之使西伯赫然見其不臣之狀與商並立而稱王如此十年商人反晏然不以為怪其父師老臣如祖伊㣲子之徒亦黙然相與熟視而無一言此豈近於人情邪由是言之謂西伯受命稱王十年者妄説也以紂之雄猜暴虐嘗醢九侯而脯鄂侯矣西伯聞之竊歎遂執而囚之幾不免死至其叛己不臣而自王乃反優容而不問者十年此豈近於人情邪由是言之謂西伯受命稱王十年者妄説也孔子曰三分天下有其二以服事商使西伯不稱臣而稱王安能服事於商乎且謂西伯稱王者起於何説而孔子之言萬世之信也由是言之謂西伯受命稱王十年者妄説也伯夷叔齊古之知義之士也方其讓國而去顧天下皆莫可歸聞西伯之賢共徃歸之當是時紂雖無道天子也天子在上諸侯不稱臣而稱王是僣叛之國也然二子不以為非依之久而不去至武王伐紂始以為非而棄去彼二子者始顧天下莫可歸卒依僣叛之國而不去不非其父而非其子此豈近於人情邪由是言之謂西伯受命稱王十年者妄説也書之泰誓稱十有一年説者因以謂自文王受命九年及武王居喪二年并數之爾是以西伯聽虞芮之訟謂之受命以為元年此又妄説也古者人君即位必稱元年常事爾不以為重也後世曲學之士説春秋始以改元為重事然則果常事歟固不足道也果重事歟西伯即位已改元矣中間不宜改元而又改元至武王即位宜改元而反不改元乃上冐先君之元年并其居喪稱十一年及其滅商而得天下其事大於聽訟逺矣又不改元由是言之謂西伯以受命之年為元年者妄説也後之學者知西伯生不稱王而中間不再改元則詩書所載文武之事粲然明白而不誣矣或曰然則武王畢喪伐紂而泰誓曷謂稱十有一年對曰畢喪伐紂出於諸家之小説而泰誓六經之明文也昔者孔子當衰周之際患衆説紛紜以惑亂當世於是退而修六經以為後世法及孔子既殁去聖稍逺而衆説復興與六經相亂自漢以來莫能辯正今有卓然之士一取信乎六經則泰誓者武王之事也十有一年者武王即位之十有一年爾復何疑哉司馬遷作周本紀雖曰武王即位九年祭於文王之墓然後治兵於盟津至作伯夷列傳則又載父死不葬之説皆不可為信是以吾無取焉取信於書可矣朋黨論在諌院進破千古人君之疑臣聞朋黨之説自古有之惟幸人君辯其君子小人而已大凡君子與君子以同道為朋小人與小人以同利為朋此自然之理也然臣謂小人無朋惟君子則有之其故何哉小人所好者禄利也所貪者財貨也當其同利之時暫相黨引以為朋者偽也及其見利而爭先或利盡而交疎則反相賦害雖其兄弟親戚不能相保故臣謂小人無朋其暫為朋者偽也君子則不然所守者道義所行者忠信所惜者名節以之修身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故為人君者但當退小人之偽朋用君子之真朋則天下治矣堯之時小人共工讙兜等四人為一朋君子八元八凱十六人為一朋舜佐堯退四凶小人之朋而進元凱君子之朋堯之天下大治及舜自為天子而臯䕫稷契等二十二人並列於朝更相稱美更相推讓凡二十二人為一朋而舜皆用之天下亦大治書曰紂有臣億萬惟億萬心周有臣三千惟一心紂之時億萬人各異心可謂不為朋矣然紂以亡國周武王之臣三千人為一大朋而周用以興後漢獻帝時盡取天下名士囚禁之目為黨人及黄巾賊起漢室大亂後方悔悟盡解黨人而釋之然已無救矣唐之晩年漸起朋黨之論及昭宗時盡殺朝之名士咸投之黄河曰此輩清流可投濁流而唐遂亡矣夫前世之主能使人人異心不為朋莫如紂能禁絶善人為朋莫如漢獻帝能誅戮清流之朋莫如唐昭宗之世然皆亂亡其國更相稱美推讓而不自疑莫如舜之二十二臣舜亦不疑而皆用之然而後世不誚舜為二十二人朋黨所欺而稱舜為聰明之聖者以能辯君子與小人也周武之世舉其國之臣三千人共為一朋自古為朋之多且大莫如周然周用此以興者善人雖多而不厭也夫興亡治亂之迹為人君者可以鑒矣縱囚論曲盡人情信義行於君子而刑戮施於小人刑入於死者乃罪大惡極此又小人之尤甚者也寧以義死不茍幸生而視死如歸此又君子之尤難者也方唐太宗之六年録大辟囚三百餘人縱使還家約其自歸以就死是以君子之難能期小人之尤者以必能也其囚及期而卒自歸無後者是君子之所難而小人之所易也此豈近於人情或曰罪大惡極誠小人矣及施恩徳以臨之可使變而為君子盖恩徳入人之深而移人之速有如是者矣曰太宗之為此所以求此名也然安知夫縱之去也不意其必來以冀免所以縱之乎又安知夫被縱而去也不意其自歸而必獲免所以復來乎夫意其必來而縱之是上賊下之情也意其必免而復來是下賊上之心也吾見上下交相賊以成此名也烏有所謂施恩徳與夫知信義者哉不然太宗施徳於天下於兹六年矣不能使小人不為極惡大罪而一日之恩能使視死如歸而存信義此又不通之論也然則何為而可曰縱而來歸殺之無赦而又縱之而又來則可知為恩徳之致爾然此必無之事也若夫縱而來歸而赦之可偶一為之爾若屢為之則殺人者皆不死是可為天下之常法乎不可為常者其聖人之法乎是以堯舜三王之治必本於人情不立異以為髙不逆情以干譽唐宋八大家文鈔巻四十二
