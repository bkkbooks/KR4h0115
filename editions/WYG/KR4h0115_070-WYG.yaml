body:
  text: 唐宋八大家文鈔巻六十六明茅坤撰廬陵史鈔六唐臣傳周德威傳德威善戰將而歐陽公善序事可謂兩絶周德威字鎮逺朔州馬邑人也為人勇而多智能望塵以知敵數其狀貌雄偉笑不改容人見之凛如也事晉王為騎將稍遷鐵林軍使從破王行瑜以功遷内衙指揮使其小字陽五當梁晉之際周陽五之勇聞天下梁軍圍晉太原下令軍中曰能生得周陽五者為刺史有驍將陳章者號陳野义常乗白馬被朱甲以自異出入陣中求周陽五欲必生致之晉王戒德威曰陳野义欲得汝以求刺史見白馬朱甲者宜善備之德威笑曰陳章好大言耳安知刺史非臣作邪因戒其部兵曰見白馬朱甲者當佯走以避之兩軍皆陣德威微服雜卒伍中陳章出挑戰兵始交德威部下見白馬朱甲者因退走章果奮矟急追之德威伺章己過揮鐵鎚擊之中章墮馬遂生擒之梁攻燕晉遣徳威將五萬人為燕攻梁取潞州遷代州刺史内外蕃漢馬步軍都指揮使梁軍捨燕攻潞圍以夾城潞州守將李嗣昭閉城距守而徳威與梁軍相持於外踰年嗣昭與徳威素有隙晉王病且革語莊宗曰梁軍圍潞而徳威與嗣昭有隙吾甚憂之王喪在嬪莊宗新立殺其叔父克寧國中未定而晉之重兵悉屬徳威于外晉人皆恐莊宗使人以喪及克寧之難告徳威且召其軍徳威聞命即日還軍太原留其兵城外徒步而入伏梓宮前慟哭㡬絶晉人乃安遂從莊宗復擊梁軍破夾城與李嗣昭歡如初以破夾城功拜振武節度使同中書門下平章事天祐七年秋梁遣王景仁將魏滑汴宋等兵七萬人擊趙趙王王鎔乞師于晉晉遣徳威先屯趙州冬梁軍至于柏鄉趙人告急莊宗自將出贊皇㑹徳威于石橋進距柏鄉五里營于野河北晉兵少而景仁所將神威龍驤拱宸等軍皆梁精兵人馬鎧甲飾以組繡金銀其光耀日晉軍望之色動徳威勉其衆曰此汴宋傭販兒徒飾其外耳其中不足懼也其一甲之直數十千得之適足為吾資無徒望而愛之當勉以往取之退而告于莊宗曰梁兵甚鋭未可與争宜少退以待之莊宗曰吾提孤軍出千里其利速戰今不乘勢急擊之使敵知吾之衆寡則吾無所施矣徳威曰不然趙人能城守而不能野戰吾之取勝利在騎兵平川廣野騎兵之所長也今吾軍于河上迫賊營門非吾用長之地也莊宗不悦退卧帳中諸將無敢入見徳威謂監軍張承業曰王怒老兵不速戰者非怯也且吾兵少而臨賊營門所恃者一水隔耳使梁得舟栰渡河吾無類矣不如退軍鄗邑誘敵出營擾而勞之可以䇿勝也承業入言曰徳威老將知兵願無忽其言莊宗遽起曰吾方思之耳已而徳威獲梁游兵問景仁何為曰治舟數百將以為浮梁徳威引與俱見莊宗笑曰果如公所料乃退軍鄗邑徳威晨遣三百騎叩梁營挑戰自以勁兵三千繼之景仁怒悉其軍以出與徳威轉鬬數十里至于鄗南兩軍皆陣梁軍横亘六七里汴宋之軍居西魏滑之軍居東莊宗䇿馬登髙望而喜曰平原淺草可前可却真吾之勝地也乃使人告徳威曰吾當為公先公可繼進徳威持馬諫曰梁軍輕出而逺来與吾轉戰其来必不暇齎糧糗縱其能齎亦不暇食不及日午人馬俱饑因其將退而擊之勝諸將亦皆以為然至未申時梁軍東偏塵起徳威皷譟而進麾其西偏曰魏滑軍走矣又麾其東偏曰梁軍走矣梁陣動不可復整乃皆走遂大敗自鄗追至柏鄉横尸數十里景仁以十餘騎僅而免自梁與晉爭凡數十戰其大敗未嘗如此劉守光僣號於燕晉遣徳威將兵三萬出飛狐以擊之徳威入祁溝闗取涿州遂圍守光于幽州破其外城守光閉門距守而晉軍盡下燕諸州縣獨幽州不下圍之踰年乃破之以功拜盧龍軍節度使徳威雖為大將而常身與士卒馳騁於矢石之間守光驍將單廷珪望見徳威於陣曰此周陽五也乃挺槍馳騎追之徳威佯走度廷珪垂及側身少却廷珪馬方馳不可止縱其少過奮撾擊之廷珪墜馬遂見擒莊宗與劉鄩相持于魏鄩夜潜軍出黄澤闗以襲太原徳威自幽州以千騎入土門以躡之鄩至樂平遇雨不得進而還徳威與鄩俱東爭趨臨清臨清有積粟且晉軍餉道也徳威先馳據之以故莊宗卒能困鄩軍而敗之莊宗勇而好戰尤鋭於見敵徳威老將常務持重以挫人之鋒故其用兵常伺敵之隙以取勝十五年徳威將燕兵三萬人與鎮定等軍從莊宗于河上自麻家渡進軍臨濮以趨汴州軍宿胡栁陂黎明候騎報曰梁軍至矣莊宗問戰於徳威徳威對曰此去汴州信宿而近梁軍父母妻子皆在其中而梁人家國繫此一舉吾以深入之兵當其必死之戰可以計勝而難與力爭也且吾軍先至此糧爨具而營柵完是謂以逸待勞之師也王宜按軍無動而臣請以騎軍擾之使其營柵不得成樵爨不暇給因其勞乏而乘之可以勝也莊宗曰吾軍河上終日俟敵今見敵不擊復何為乎顧李存審曰公以輜重先吾為公殿遽督軍而出徳威謂其子曰吾不知死所矣前遇梁軍而陣王軍居中鎮定之軍居左徳威之軍居右而輜重次右之西兵已接莊宗率銀槍軍馳入梁陣梁軍小敗犯晉輜重輜重見梁朱旗皆驚走入徳威軍徳威軍亂梁軍乗之徳威父子皆戰死莊宗與諸將相持而哭曰吾不聴老將之言而使其父子至此莊宗即位贈徳威太師明宗時加贈太尉配享莊宗廟晉髙祖追封徳威燕王子光輔官至刺史晉之輜重見梁兵之敗而入也而即望見梁朱旗而走遂及於敗此事與韓信之拔趙幟立漢赤幟同故曰兵貴嚴重始不可敗符存審傳符存審字徳詳陳州宛丘人也初名存少微賤嘗犯法當死臨刑指旁壞垣顧主者曰願就死于彼冀得垣土覆尸主者哀而許之為徙垣下而主將方飲酒顧其愛妓思得善歌者佐酒妓言有符存常為妾歌甚善主將馳騎召存審而存審以徙垣下故未加刑因往就召使歌而悦之存審因得不死其後事李罕之從罕之歸晉晉王以為義兒軍使賜姓李氏名存審從晉王擊李匡儔為前鋒破居庸闗又從撃王行瑜破龍泉寨以功遷檢校左僕射從李嗣昭攻汾州執李瑭遷左右廂步軍都指揮使又從嗣昭攻潞州降丁㑹從周徳威破梁夾城遷忻州刺史蕃漢馬步軍都指揮使晉趙攻燕梁救燕撃趙深州圍蓨縣存審與史建瑭軍下博擊走梁軍遷領邢州團練使魏博叛梁降晉存審為前鋒屯臨清莊宗入魏存審殿軍魏縣與劉鄩相距於莘西從莊宗敗鄩於故元城閻寳以邢州降乃以存審為安國軍節度使毛璋以滄州降徙存審横海加同中書門下平章事契丹圍幽州是時晉與梁相持河上欲發兵兵少欲勿救懼失之莊宗疑以問諸將而存審獨以為當救曰願假臣騎兵五千足矣乃遣存審分兵救之卒擊走契丹從戰胡栁陂晉軍晨敗亡周徳威存審與其子彦圖力戰暮復敗梁軍于土山遂取徳勝築河南北為兩城晉人謂之夾寨遷内外蕃漢馬步軍總管梁朱友謙以河中同州降晉梁遣劉鄩攻同州友謙求救乃遣存審與李嗣昭救之河申兵少而弱梁人素易之且不虞晉軍之速至也存審選精騎二百雜河中兵出擊鄩壘陽敗而走鄩兵追之晉騎反擊獲其騎兵五十梁人知其晉軍也皆大驚然河中糧少而新降人心頗持兩端晉軍屯朝邑諸將皆欲速戰存審曰使梁軍知吾利於速戰則將夾渭而營㫁我餉道以持久困我則我進退不可敗之道也不若緩師示弱伺隙出竒可以取勝乃按軍不動居旬日望氣者言有黒氣狀如鬬雞存審曰可以一戰矣乃進軍擊鄩大敗之鄩閉壁不復出存審曰鄩兵巳敗不如逸之乃休士卒遣禆將王建及牧馬于沙苑鄩以謂晉軍且懈乃夜遯去存審追擊于渭河又大敗之張文禮殺趙王王鎔晉遣閻寳李嗣昭等攻之至輒戰死最後遣存審破之存審為將有機略大小百餘戰未嘗敗衂與周徳威齊名徳威死晉之舊將獨存審在契丹攻遮虜乃以存審為盧龍軍節度使時存審已病辭不肯行莊宗使人慰諭彊遣之莊宗滅梁入洛存審自以身為大將不得與破梁之功怏怏疾益甚因請朝京師是時郭崇韜權位己重然其名望素出存審下不樂其来而加已上因沮其事存審妻郭氏泣訴于崇韜曰吾夫於國有功而與公鄉里之舊奈何忍令死棄窮野崇韜愈怒存審章累上輒不許存審伏枕嘆曰老夫事二主四十年今日天下一家四夷逺俗至於亡國之將射鈎斬袪之人皆得親見天子奉觴為夀而獨予棄死於此豈非命哉崇韜度存審病已亟乃請許其来朝徙存審宣武軍節度使卒于幽州臨終戒其子曰吾少提一劍去鄉里四十年間取將相然履鋒冒刃出死入生而得至此也因出其平生身所中矢鏃百餘而示之曰爾其勉哉存審三子彦超彦饒彦卿史建瑭傳史建瑭鴈門人也晉王為鴈門節度使其父敬思為九府都督從晉王入闗破黄巢復京師擊秦宗權于陳州常將騎兵為先鋒晉王東追黄巢于寃胊還過梁軍其城北梁王置酒上源驛獨敬思與薛鐵山賀回鶻等十餘人侍晉王醉留宿梁驛梁兵夜圍而攻之敬思登驛樓射殺梁兵十餘人㑹天大雨晉王得與從者俱去縋尉氏門以出而敬思為梁追兵所得見殺建瑭少事軍中為禆校自晉降丁㑹與梁相距於潞州建瑭已為晉兵先鋒梁兵數為建瑭所殺相戒常避史先鋒梁遣王景仁攻趙晉軍救趙建瑭以先鋒兵出井陘戰于柏鄉梁軍為方陣分其兵為二汴宋之軍居左魏滑之軍居右周徳威擊其左建瑭擊其右梁軍皆走遂大敗之以功加檢校左僕射天祐九年晉攻燕燕王劉守光乞師于梁梁太祖自將擊趙圍棗彊蓨縣是時晉精兵皆北攻燕獨符存審與建瑭以三千騎屯趙州梁軍巳破棗彊存審扼下溥橋建瑭分其麾下五百騎為五隊一之衡水一之南宮一之信都一之阜城而自將其一約各取梁芻牧者十人㑹下博至暮擒梁兵數十皆殺之各留其一人縱使逸去告之曰晉王軍且大至明日建瑭率百騎為梁旗幟雜其芻牧者暮叩梁營殺其守門卒縱火大呼斬擊數十百人而梁芻牧者所出各遇晉兵有所亡失其縱而不殺者歸而皆言晉軍且至梁太祖夜拔營去蓨縣人追撃之梁軍棄其輜重鎧甲不可勝計梁太祖方病由是増劇而晉軍以故得并力以收燕者二人之力也後從莊宗入魏博敗劉鄩於故元城累以功歴貝相二州刺史十八年晉軍討張文禮於鎮州建瑭以先鋒兵下趙州執其刺史王鋋兵傳鎮州建瑭攻其城門中流矢卒年四十三建瑭分五百騎為五隊散入五縣於以各獲梁之芻收人者什殺其九而各縱其一以歸而亂梁之軍於以拔梁之營而追擊之吾不意五代時有戰將若此而歐陽公所當叙事處亦不下太史公之敘李廣傳也可愛可愛王建及傳篇中叙用兵處可喜王建及許州人也少事李罕之從罕之奔晉為匡衛指揮使梁晉戰柏鄉相距鄗邑野河上鎮定兵扼河橋梁兵急擊之莊宗登髙望見鎮定兵將敗顧建及曰橋為梁奪則吾軍危矣奈何建及選二百人馳擊梁兵梁兵敗解去從戰莘縣故元城皆先登陷陣以功累拜遼州刺史將銀槍效節軍晉攻楊劉建及躬自負葭葦堙塹先登拔之從戰胡栁晉兵已敗與梁爭土山梁兵先至登山而陣莊宗至山下望梁陣堅而整呼其軍曰今日之戰得山者勝因馳騎犯之建及以銀槍軍繼進梁兵下走陣山西晉兵遂得土山諸將皆言潰兵未集且暮不可戰閻寳曰彼陣山上吾在其下尚能擊之况以髙而撃下不可失也建及以為然因白莊宗曰請登髙望臣破敵即呼其衆曰今日所失輜重皆在山西盍往取之即馳犯梁陣梁兵大敗晉遂軍徳勝為南北城于河上梁將賀瓌攻其南城以竹笮維戰艦于河晉兵不得渡南城危甚莊宗積金帛於軍門募能破梁戰艦者至於吐火禁以莫不皆有建及重鎧執稍呼曰梁晉一水間耳何必巧為吾今破之矣即以大甕積薪自上流縱火焚梁戰艦建及以二舟載甲士随之斧其竹笮梁兵皆走晉軍乃得渡救南城瓌圍解去自莊宗得魏博建及將銀槍效節軍建及為將喜以家資散士卒莊宗遣宦官韋令圖監其軍令圖言建及得士心懼有異志不可令典牙兵即以為代州刺史建及怏怏而卒年五十七元行欽傳看行欽與莊宗君臣兩相慷慨兩相悲歌處生色可睹元行欽幽州人也為劉守光禆將守光簒其父仁恭使行欽以兵攻仁恭於大安山而囚之又使行欽害諸兄弟其後晉攻幽州守光使行欽募兵雲朔間是時明宗掠地山北與行欽相拒廣邉軍凡八戰明宗亡射中行欽行欽拔矢而戰亦射明宗中股行欽屢敗乃降明宗撫其背而餘以酒曰壯士也因養以為子常從明宗戰數立功莊宗已下魏益選驍將自衛聞行欽驍勇取之以為散員都部署賜姓名曰李紹榮莊宗好戰而輕敵與梁軍戰潘張軍敗而潰莊宗得三四騎馳去梁兵數百追及攢矟圍之行欽望其旗而識之馳一騎奮劍㫁其二矛斬首一級梁兵解去莊宗還營持行欽泣曰富貴與卿共之由是寵絶諸將拜忻州刺史遷武寧軍節度使莊宗宴羣臣於内殿酒酣樂作道平生戰陣事以為笑樂而怪行欽不在因左右顧視曰紹榮安在所司奏曰奉勑宴使相紹榮散官不得與也莊宗罷㑹不樂明日即拜行欽同中書門下平章事自此不召羣臣入内殿但宴武臣而已趙在禮反於魏莊宗方選大將撃之劉皇后曰此小事可趣紹榮指揮乃以行欽為鄴都行營招撫使將二千人討之行欽攻鄴南門以詔書招在禮在禮遂羊酒犒軍登城謂行欽曰將士經年離去父母不取敕㫖奔歸上貽聖憂追悔何及若公善為之辭尚能改過自新行欽曰天子以汝等有社稷之功小過必當赦宥在禮再拜以詔書示諸軍皇甫暉從旁奪詔書壞之軍士大譟行欽具以聞莊宗大怒勑行欽破城之日無遺種乃益召諸鎮兵皆屬行欽行欽屯澶州分諸鎮兵為五道毁民車輪門扉屋椽為筏渡長慶河攻冠氏門不克是時邢洺諸州相繼皆叛而行欽攻鄴無功莊宗欲自將以往羣臣皆諫止乃遣明宗討之明宗至魏軍城西行欽軍城南而明宗軍變入于魏與在禮合行欽聞之退屯衛州以明宗反聞莊宗遣金槍指揮使李從璟馳詔明宗計事從璟明宗子也行至衛州而明宗已反行欽乃縶從璟將殺之從璟請還京師乃許之明宗自魏縣引兵南行欽率兵趨還京師從莊宗幸汴州行至榮澤聞明宗已渡黎陽莊宗復遣從璟通問于明宗行欽以為不可因撃殺從璟明宗入汴州莊宗至萬勝鎮不得進與行欽登道旁冢置酒相顧泣下有野人獻雉問其冢名野人曰愁臺也莊宗益不悦因罷酒去西至石橋置酒野次莊宗謂行欽曰卿等從我久富貴急難無不同也今兹危蹙而黙黙無言坐視成敗我至榮澤欲單騎渡河自求總管卿等各陳利害今日俾我至此卿等何如行欽泣而對曰臣本小人䝉陛下撫養位至將相危難之時不能報國雖死無以塞責因與諸將百餘人皆解髻㫁髮置之于地誓以死報君臣相持慟哭莊宗還洛陽數日復幸汜水郭從謙反莊宗崩行欽出奔行至平陸為野人所執送虢州刺史石潭折其兩足載以檻車送京師明宗見之罵曰我兒何負於爾行欽瞋目直視曰先皇帝何負於爾乃斬于洛陽市市人皆為之流涕嗚呼死之所以可貴者以其義不苟生爾故曰主在與在主亡與亡者社稷之臣也方明宗之兵變于魏諸將未知去就而行欽獨以反聞又殺其子從璟至于㫁髮自誓其誠節有足嘉矣及莊宗之崩不能自決而反逃死以求生終於被執而見殺其言雖不屈而死非其志也烏足貴哉唐宋八大家文鈔巻六十六
