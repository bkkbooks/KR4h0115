body:
  text: 南豐本傳曾鞏字子固南豐人㓜警敏能文甫冠名聞四方登嘉佑二年進士第歴集賢挍理為實錄撿討官出通判越州知齊襄洪三州皆有異政加直龍圖閣知福州福無職田歳鬻園蔬自入常三四十萬鞏謂太守不宜與民爭利罷之後至者亦不復取也徙明亳滄三州鞏久外徙世頗謂偃蹇不偶一時後生輩鋒出鞏視之泊如也過闕神宗召見勞問甚寵留判三班院疏議經費以節用為理財之要帝稱善帝欲合累朝國史為一書加鞏史館修撰專典不以大臣監總既而不克成㑹官制行拜中書舍人尋掌延安郡王牋奏居母憂卒年六十五鞏性孝友父亡奉繼母益至撫四弟九妹於委廢單弱中宦學婚嫁一出其力為文章上下馳騁本原六經斟酌於司馬遷韓愈時鮮能過也少與王安石游安石聲譽未振鞏導之於歐陽修及安石得志遂與之異神宗嘗問安石何如人對曰安石文學行義不減揚雄以吝故不及帝曰安石輕富貴何吝也曰勇於有為吝於改過耳呂公著嘗告神宗以鞏行義不如政事政事不如文章故不大用云
