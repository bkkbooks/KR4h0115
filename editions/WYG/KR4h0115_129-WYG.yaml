body:
  text: 唐宋八大家文鈔巻一百十七明茅坤撰東坡文鈔一制策御試制科策一道皇帝若曰朕承祖宗之大統先帝之休烈深惟寡昧未燭於理志勤道逺治不加進夙興夜寐于兹三紀朕徳有所未至教有所未孚闕政尚多和氣或盭田野雖闢民多亡聊邊境雖安兵不得撤利入已浚浮費彌廣軍宂而未練官宂而未澄庠序比興禮樂未具戸罕可封之俗士忽胥讓之節此所以訟未息於虞芮刑未措於成康意在位者不以教化為心治民者多以文法為拘禁防繁多民不知避叙法寛濫吏不知懼纍繫者衆愁嘆者多仍歲以來災異數見六月壬子日食于朔淫雨過節煗氣不效江河潰決百川騰溢永思厥咎深切在予變不虛生縁政而起五事之失六沴之作劉向所傳呂氏所紀五行何修而得其性四時何行而順其令非正陽之月伐鼓捄變其合於經乎方盛夏之時論囚報重其考於古乎京師諸夏之根本王教之淵源百工淫巧無禁豪右僭差不度治當先内或曰何以爲京師政在擿姦或曰不可撓獄市推尋前世孝文尚老子而天下富殖孝武用儒術而海内虚耗道非有弊治奚不同王政所由形于詩道周公豳詩王業也而係之國風宣王北伐大事也而載之小雅周以冢宰制國用唐以宰相兼度支錢穀大計也兵師大衆也何陳平之對謂當責之内史韋賢之言不宜兼於宰相錢貨之制輕重之相權命秩之差虚實之相養水旱蓄積之備邊陲守禦之方圜法有九府之名樂語有五均之義富人强國尊君重朝弭災致祥改薄從厚此皆前世之急政而當今之要務子大夫其悉意以陳母悼後害臣謹對曰臣聞天下無事則公卿之言輕於鴻毛天下有事則匹夫之言重於泰山非智有所不能而明有所不察緩急之勢異也方其無事也雖齊桓之深信其臣管仲之深得其君以握手丁寧之間將死深悲之言而不能去其區區之三豎及其有事且急也雖唐代宗之庸程元振之用事柳伉之賤且踈而一言以入之不終朝而去其腹心之疾夫言之於無事之世者足以有所改爲而常患於不信言之於有事之世者易以見信而常患於不及改爲此忠臣志士之所以深悲天下之所以亂亡相尋而世主之所以不悟也今陛下處積安之時乘不抜之勢拱手垂裳而天下嚮風動容變色而海内震恐雖有一事之失常一物之不獲固未足以憂陛下也所謂親策賢良之士者以應故事而巳豈以臣言爲眞足以有感於陛下耶雖然君以名求之臣以實應之陛下爲是名也臣敢不爲是實也伏惟制策有念祖宗先帝大業之重而自處於寡昧以爲志勤道遠治不加進臣竊以爲陛下即位以來嵗歷三紀更於事變審於情僞不爲不熟矣而治不加進雖臣亦疑之然以爲志勤道遠則雖臣至愚亦未敢以明詔爲然也夫志有不勤而道無遠陛下茍知勤矣則天下之事粲然無不畢舉又安以訪臣爲哉今也猶以道遠爲歎則是陛下未知勤也臣請言勤之說夫天以日運故健日月以日行故明水以日流故不竭人之四肢以日動故無疾器以日用故不蠧天下者大物也乆置而不用則委靡廢放日趨於弊而巳矣陛下深居法宮之中其憂勤而不息耶臣不得而知也其宴安而無爲耶臣不得而知也然所以知道遠之歎由陛下之不勤者誠見陛下以天下之大欲輕賦稅則財不足欲威四夷則兵不彊欲興利除害則無其人欲敦世厲俗則無其具大臣不過遵用故事小臣不過謹守簿書上下相安以茍嵗月此臣所以妄論陛下之不勤也臣又竊聞之自頃嵗以來大臣奏事陛下無所詰問直可之而巳臣始聞而大懼以爲不信及退而觀其效見則臣亦不敢謂不信也何則人君之言與士庶不同言脫於口而四方傳之捷於風雨故太祖太宗之世天下皆諷誦其言語以爲聳動之具今陛下之所震怒而賜譴者何人也合於聖意誘而進之者何人也所與朝夕論議深言者何人也越次躐等召而問訊之者何人也四者臣皆未之聞焉此臣所以妄論陛下之不勤也臣願陛下條天下之事其大者有幾可用之人有幾某事未治某人未用雞鳴而起曰吾今日爲某事用某人他日又曰吾所爲某事其果濟矣乎所用某人其果才矣乎如是孜孜焉不違於心屏去聲色放遠善柔親近賢達遠覽古今凡此者勤之實也而道何遠乎伏惟制策有夙興夜寐于今三紀德有所未至教有所未孚闕政尚多和氣或盭田野雖闢民多亡聊邊境雖安兵不得撤利入巳浚浮費彌廣軍宂而未練官宂而未澄庠序比興禮樂未具戸罕可封之俗士忽胥讓之節此所以訟未息於虞芮刑未措於成康意在位者不以教化爲心治民者多以文法爲拘禁防繁多民不知避敘法寛濫吏不知懼纍繋者衆愁歎者多凡此陛下之所憂數十條者臣皆能爲陛下歴數而備言之然而未敢爲陛下道也何者陛下誠得御臣之術而固執之則嚮之所憂數十條者皆可以捐之大臣而巳不與今陛下區區以嚮之數十條爲己憂者則是陛下未得御臣之術也天下所謂賢者陛下旣得而用之矣方其未用也常若有餘而其旣用也則不足是豈其才之有變乎古之用人者日夜提䇿之武王用太公其相與問荅百餘萬言今之六韜是也桓公用管仲其相與問荅亦百餘萬言今之管子是也古之人君其所以反覆窮究其臣者若此今陛下黙黙而聽其所爲則夫嚮之所憂數十條者無時而舉矣古之忠臣其受任也必先自度曰吾能辦是矣乎度能辦是也則又曰吾君能忘巳而任我乎能無以小人間我乎度其能忘巳而任我也能無以小人間我也然後受之旣巳受之矣則以身任天下之責而不辭享天下之利而不愧今也内不度巳外不度君而輕受之受之而衆不與也則引身而求去陛下又爲美辭而遣之加之重禄而慰之夫引身而求退者非果㢘節而有讓也是邀君以自固也是自明其非我之欲留以逃謗也是不能辦其事而以其患遺後人也陛下奈何聽之臣故曰陛下未得御臣之術也若夫德有所未至教有所未孚者此實不至也德之必有以著其德之之形教之必有以顯其教之之狀德之之形莫著於輕賦教之之狀莫顯於去殺此二者今皆未能焉故曰實不至也夫以選舉之重而不取才行官吏之衆而不行考課農末之相傾而平糴之法不立貧富之相役而占田之數無限天下之闕政則莫大乎此而和氣安得不盭乎田野闢者民之所以富足之道也其所以無聊則吏政之過也然臣聞天下之民常偏聚而不均呉蜀有可耕之人而無其地荆襄有可耕之地而無其人由此觀之則田野亦未可謂盡闢也夫以呉蜀荆襄之相形而飢寒之民終不能去狹而就寛者世以爲懷土而重遷非也行者無以相羣則不能行居者無以相友則不能居若輩徙饑寒之民則無有不聽矣邊境巳安而兵不得撤者有安之名而無安之實也臣欲小言之則自以爲愧大言之則世俗以爲笑臣請略言之古之制北狄者未始不通西域今之所以不能通者是夏人爲之障也朝廷置靈武於度外㡬百年矣議者以爲絶域異方曾不敢近而況於取之乎然臣以爲事勢有不可不取者不取靈武則無以通西域西域不通則契丹之强未有艾也然靈武之所以不可取者非以數郡之能抗吾中國中國自困而不能舉也其所以自困而不能舉者以不生不息之財養不耕不戰之兵塊然如巨人之病膇非不枵然大矣而手足不能以自舉欲去是疾也則莫若捐秦以委之使秦人斷然如戰國之世不待中國之援而中國亦若未始有秦者有戰國之全利而無戰國之患則夏人舉矣其便莫如稍徙緣邊之民不能戰守者於空閒之地而以其地益募爲屯田屯田之兵稍益則向之戍卒可以稍減使數嵗之後緣邊之民盡爲耕戰之夫然後數出兵以苦之要以使之厭戰而不能支則折而歸吾矣如此而北狄始有可制之漸中國始有息肩之所不然將濟師之不暇而又何撤乎所謂利入巳浚而浮費彌廣者臣竊以爲外有不得巳之二冦内有得巳而不巳之後宮後宮之費不下一敵國金玉錦繡之工日作而不息朝成夕毁務以相新主帑之吏日夜儲其精金良帛而别異之以待倉卒之命其爲費豈可勝計哉今不務去此等而欲廣求利之門臣知所得之不如所喪也軍宂而未練者臣嘗論之曰此將不足恃之過也然以其不足恃之故而擁之以多兵不蒐去其無用則多兵適所以爲敗也官宂而未澄者臣嘗論之曰此審官吏部與職司無法之過也夫審官吏部是古者考績黜陟之所也而特以日月爲斷今縱未能復古可略分其郡縣不以遠近爲差而以難易爲等第其人之所堪而别異之才者常爲其難而不才者常爲其易及其當遷也難者常速而易者常久然而爲此者固有待也内之審官吏部與外之職司常相關通而爲職司者不惟舉有罪察有功而巳必使盡第其屬吏之所堪以詔審官吏部審官吏部常從内等其任使之難易職司常從外第其人之優劣才者常用不才者常閒則宂官可澄矣庠序興而禮樂未具者臣葢以爲庠序者禮樂旣興之所用非所以興禮樂也今禮樂鄙野而未完則庠序不知所以爲教又何以興禮樂乎如此而求其可封責其皆讓將以息訟而措刑者是却行而求前也夫上之所嚮者下之所趨也而況從而賞之乎上之所背者下之所去也而況從而罰之乎今陛下責在位者不務教化而治民者多拘文法臣不知朝廷所以為賞罰者何也無乃或以教化得罪而多以文法受賞歟夫禁防未至於繁多而民不知避者吏以爲市也敘法不爲寛濫而吏不知懼者不論其能否而論其久近也纍繫者衆愁歎者多凡以此也伏惟制策有仍嵗以來災異數見乃六月壬子日食于朔淫雨過節煗氣不效江河潰決百川騰溢永思厥咎深切在予變不虛生緣政而起此豈非陛下厭聞諸儒牽合之論而欲聞其自然之說乎臣不敢復取洪範傳五行志以爲對直以意推之夫日食者是陽氣不能履險也何謂陽氣不能履險臣聞五月二十三分月之二十是爲一交交當朔則食交者是行道之險者也然而或食或不食則陽氣之有强弱也今有二人並行而犯霧露其疾者必其弱者其不疾者必其强者也道之險一也而陽氣之强弱異故夫日之食非食之日而後爲食其虧也久矣特遇險而見焉陛下勿以其未食也爲無災而其旣食而復也爲免咎臣以爲未也特出於險耳夫淫雨大水者是陽氣融液汗漫而不能收也諸儒或以爲隂盛臣請得以理折之夫陽動而外其於人也爲嘘嘘之氣温然而爲濕隂動而内其於人也爲噏噏之氣冷然而爲燥以一人推天地天地可見故春夏者其一噓也秋冬者其一噏也夏則川澤洋溢冬則水泉收縮此燥濕之效也是故陽氣汗漫融液而不能収則常爲淫雨大水猶人之噓而不能吸也今陛下以至仁柔天下兵驕而益厚其賜戎狄桀傲而益加其禮蕩然與天下爲咻呴温煖之政萬事墮壞而終無威刑以堅凝之亦如人之嘘而不能噏此淫雨大水之所由作也天地告戒之意隂陽消復之理殆無以易此矣而制策又有五事之失六沴之作劉向所傳吕氏所紀五行何修而得其性四時何行而順其令非正陽之月伐鼔捄變其合於經乎方盛夏之時論囚報童其考於古乎此陛下畏天恐懼求端之過而流入於迂儒之說此皆愚臣之所學於師而不取者也夫五行之相沴本不至於六六沴者起於諸儒欲以六極分配五行於是始以皇極附益而爲六夫皇極者五事皆得不極者五事皆失非所以與五事並列而别爲一者也是故有眊而又有䝉有極而無福曰五福皆應此亦自知其踈也吕氏之時令則柳宗元之論備矣以爲有可行者有不可行者其可行者皆天事也其不可行者皆人事也若夫禜社伐鼓本非有益於救災特致其尊陽之意而巳書曰乃季秋月朔辰弗集於房瞽奏皷嗇夫馳庶人走由此言之則亦何必正陽之月而後伐鼓捄變如左氏之說乎盛夏報囚先儒固巳論之以爲仲尼誅齊優之月固君子之所無疑也伏惟制策有京師諸夏之根本王教之淵源百工淫巧無禁豪右僭差不度此在陛下身率之耳後宮有大練之飾則天下以羅紈爲羞大臣有脫粟之節則四方以膏粱爲汙雖無禁令又何憂乎伏惟制策有治當先内或曰何以爲京師政在擿姦或曰不可撓獄市此皆一偏之說不可以不察也夫見其一偏而輒舉以爲說則天下之說不可以勝舉矣自通人而言之則曰治内所以爲京師也不撓獄市所以爲擿姦也如使不撓獄市而害其爲擿姦則夫曹㕘者是爲逋逃主也伏惟制策有推尋前世深觀治迹孝文尚老子而天下富殖孝武用儒術而海内虚耗道非有弊治奚不同臣竊以爲不然孝文之所以爲得者是儒術畧用也其所以得而未盡者是用儒之未純也而其所以爲失者則是用老也何以言之孝文得賈誼之說然後待大臣有禮御諸侯有術而至於興禮樂係單于則曰未暇故曰儒術畧用而未純也若夫用老之失則有之矣始以區區之仁壞一代之肉刑而易之以髠笞髠笞不足以懲其罪則又從而殺之用老之失豈不過甚矣哉且夫孝武亦可謂用儒之主也博延方士而多興妖祠大興宮室而甘心遠畧此豈儒者教之今夫有國者徒知狥其名而不考其實見孝文之富殖而以爲老子之功見孝武之虛耗而以爲儒者之罪則過矣此唐明皇之所以溺於宴安撤去禁防而爲天寶之亂也伏惟制策有王政所由形于詩道周公豳詩王業也而係之國風宣王北伐大事也而載之小雅臣聞豳詩言后稷公劉所以致王業之艱難者也其後累世而至文王之時則王業旣已大成矣而其詩爲二南二南之詩猶列於國風而至于豳獨何怪乎昔季札觀周樂以爲大雅曲而有直體小雅思而不貳怨而不言夫曲而有直體者寛而不流也思而不貳怨而不言者狹而不迫也由此觀之則大雅小雅之所以異者取其辭之廣狹非取其事之小大也伏惟制策有周以冢宰制國用唐以宰相兼度支錢穀大計也兵師大衆也何陳平之對謂當責之内史韋賢之言不宜兼於宰相臣以爲宰相雖不親細務至於錢穀兵師固當制其贏虚利害陳平所謂責之内史者特以宰相不當治其簿書多少之數耳昔唐之初以郎官領度支而職事以治及兵興之後始立使額㕘佐旣衆簿書益繁百弊之源自此而始其後裴延齡皇甫鎛皆以剝下媚上至於希世用事以宰相兼之誠得防姦之要而韋賢之義特以其權過重歟故李德裕以爲賤臣不當議令臣常以爲有宰相之風矣伏惟制策有錢貨之制輕重之相權命秩之差虚實之相養水旱蓄積之備邊陲守禦之方圜法有九府之名樂語有五均之義此六者亦方今之所當論也昔召穆公曰民患輕則多作重以行之若不堪重則多作輕以行之亦不廢重輕可改而重不可廢不幸而過寧失於重此制錢之本意也命者人君之所擅出於口而無窮秩者民力之所供取於府而有限以無窮養有限此虚實之相養也水旱蓄積之備則莫若復隋唐之義倉邊陲守禦之方則莫若依秦漢之更卒周官有太府天府泉府玉府内府外府職内職金職幣是謂九府太公之所行以致富古者天子取諸侯之士以爲國均則市不二價四民常均是謂五均獻王之所致以爲法皆所以均民而富國也凡陛下之所以䇿臣者大畧如此而於其末復策之曰富人強國尊君重朝弭災致祥改薄從厚此皆前世之急政而當今之要務此臣有以知陛下之聖意以爲向之所以策臣者各指其事恐臣不得盡其辭是以復舉其大體而槩問焉又恐其不能切至也故又詔之曰悉意以陳而無悼後害臣是以敢復進其猖狂之說夫天下者非君有也天下使君主之耳陛下念祖宗之重思百姓之可畏欲進一人當同天下之所欲進欲退一人當同天下之所欲退今者每進一人則人相與誹曰是進於某也是某之所欲也每退一人則又相與誹曰是出於某也是某之所惡也臣非敢以此為舉信也然而致此言者則必有由矣今無知之人相與謗於道曰聖人在上而天下之所以不盡被其澤者便嬖小人附於左右而女謁盛於内也爲此言者固妄矣然而天下或以爲信者何也徒見諫官御史之言矻矻乎難入以爲必有間之者也徒見蜀之美錦越之竒器不由方貢而入於官也如此而向之所謂急政要務者陛下何暇行之臣不勝憤懣謹復列之於末惟陛下寛其萬死幸甚幸甚制科策亦隨問條荅在長公亦未盡所欲言而中間持議大較多通達國體非經生所及擬進士對御試策一道并引狀皇帝若曰朕德不類託於士民之上所與待天下之治者惟萬方黎獻之求詳延于廷諏以世務豈特考子大夫之所學且以博朕之所聞盖聖王之御天下也百官得其職萬事得其序有所不爲爲之而無不成有所不革革之而無不服田疇闢溝洫治草木暢茂鳥獸魚鼈無不得其性其富足以備禮其和足以廣樂其治足以致刑子大夫以謂何施而可以臻此方今之弊可謂衆矣救之之術必有本末施之之宜必有先後子大夫之所宜知也生民以來所謂至治必曰唐虞成周之時詩書所稱其迹可見以至後世賢明之君忠智之臣相與憂勤以營一代之業雖未盡善要其所以成就亦必有可言者其詳著之朕將親覽焉右臣准宣命差赴集英殿編排舉人試巻竊見陛下始革舊制以策試多士厭聞詩賦無益之語將求山林朴直之論聖德廣大中外歡悅而所試舉人不能推原上意皆以得失爲慮不敢指陳闕政而阿諛順㫖者又率據上第陛下之所以求於人至深切矣而下之報上者如此臣竊悲之夫科場之文風俗所繫所収者天下莫不以爲法所棄者天下莫不以爲戒昔祖宗之朝崇尚辭律則詩賦之工曲盡其巧自嘉祐以來以古文爲貴則䇿論盛行於世而詩賦㡬至於熄何者利之所在人無不化今始以策取士而士之在甲科者多以諂諛得之天下觀望誰敢不然臣恐自今巳往相師成風雖直言之科亦無敢以直言進者風俗一變不可復返正人衰微則國隨之非復詩賦策論迭興迭廢之比也是以不勝憤懣退而擬進士對御試策一道學術淺陋不能盡知當世之切務直載所聞上將以推廣聖言庶有補於萬一下將以開示四方使知陛下本不諱惡切直之言風俗雖壞猶可以少救其所撰策謹繕寫投進干冒天威臣無任戰恐待罪之至臣伏見陛下發德音下明詔以天下安危之至計謀及於布衣之士其求之不可謂不切其好之不可謂不篤矣然臣私有所憂者不知陛下有以受之歟禮曰甘受和白受采故臣願陛下先治其心使虛一而靜然後忠言至計可得而入也今臣竊恐陛下先入之言巳實其中邪正之黨巳貳其聽功利之說巳動其欲則雖有臯陶益稷爲之謀亦無自入矣而況於疎遠愚陋者乎此臣之所以大懼也若乃盡言以招過觸諱以亡軀則非臣之所恤也聖策曰聖王之御天下也百官得其職萬事得其序臣以爲陛下未知此也是以所爲顛倒失序如此茍誠知之曷不尊其所聞而行其所知歟百官之所以得其職者豈聖王人人而督責之歟萬事之所以得其序者豈聖王事事而整齊之歟亦因能以任職因職以任事而巳官有常守謂之職施有先後謂之序今陛下使兩府大臣侵三司財利之權常平使者亂職司守令之治刑獄舊法不以付有司而取決於執政之意邊鄙大慮不以責帥臣而聽計於小吏之口百官可謂失其職矣王者之所宜先者德也所宜後者刑也所宜先者義也所宜後者利也而陛下易之萬事可謂失其序矣然此猶其小者其大者則中書失其政也宰相之職古者所以論道經邦今陛下但使奉行條例司文書而已昔邴吉爲丞相蕭望之爲御史大夫望之言隂陽不和咎在臣等而宣帝以爲意輕丞相終身薄之今政事堂忿爭相詰流傳都邑以爲口實使天下何觀焉故臣願陛下首還中書之政則百官之職萬事之序以次得矣聖策曰有所不爲爲之而無不成有所不革革之而無不服陛下之及此言是天下之福也今日之患正在於未成而爲之未服而革之耳夫成事在理不在勢服人以誠不以言理之所在以爲則成以禁則止以賞則勸以言則信古之人所以鼓舞天下綏之斯來動之斯和者葢循理而巳今爲政不務循理而欲以人主之勢賞罰之威刼而成之夫以斧析薪可謂必克矣然不循其理則斧可缺薪不可破是以不論尊卑不計強弱理之所在則成理之所不在則不成可必也今陛下使農民舉息與商賈爭利豈理也哉而何怪其不成乎禮曰微之顯誠之不可揜也如此夫陛下茍誠乎爲民則雖或謗之而人不信茍誠乎爲利則雖自解釋而人不服且事有決不可欺者吏受賄枉法人必謂之贓非其有而取之人必謂之盜茍有其實不敢辭其名今青苗有二分之息而不謂之放債取利可乎凡人爲善不自譽而人譽之爲惡不自毁而人毁之如使爲善者必須自言而後信則堯舜周孔亦勞矣今天下以爲利陛下以爲義天下以爲貪陛下以爲廉不勝其紛紜也則使二三臣者極其巧辯以解荅千萬人之口附會經典造爲文書以曉告四方四方之人豈如嬰兒鳥獸而可以美言小數眩惑之哉且夫未成而爲之則其弊必至於不敢爲未服而革之則其弊必至於不敢革葢世有好走馬者一爲墜傷則終身徒行何者愼重則必成輕發則多敗此理之必然也陛下若出於愼重則屢作屢成不惟人信之陛下亦自信而日以勇矣若出於輕發則每舉每敗不惟人不信陛下亦不自信而日以怯矣文宗始用訓注其志豈淺也哉而一經大變則憂沮喪氣不能復振文宗亦非有失德徒以好作而寡謀也愼重者始若怯終必勇輕發者始若勇終必怯廼者横山之人未嘗一日而忘漢雖五尺之童子知其可取然自慶厯以來莫之敢發誠未有以善其後也近者邊臣不計其後而遽發之一發不中則内帑之費以數百萬計而關輔之民困於飛輓者三年而未巳雖天下之勇者敢復爲之歟爲之固不可敢復言之歟由此觀之則横山之功是邊臣欲速而壞之也近者青苗之政助役之法均輸之策併軍蒐卒之令卒然輕發又甚於前日矣雖陛下不恤人言持之益堅而勢窮事礙終亦必變他日雖有良法美政陛下能復自信乎人君之患在於樂因循而重改作今陛下春秋鼎盛天錫勇智此萬世一時也而羣臣不能濟之以愼重養之以敦朴譬如乘輕車馭駿馬冒險夜行而僕夫又從其後而鞭之豈不殆哉臣願陛下解轡秣馬以須東方之明而徐行於九軌之道甚未晩也聖策曰田疇闢溝洫治草木暢茂鳥獸魚鼈莫不各得其性者此百工有司之事也曾何足以累陛下陛下操其要治其本恭巳無爲而物莫不盡其理以生以死若夫百工有司之事自宰相不屑爲之而況於陛下乎聖策曰其富足以備禮其和足以廣樂其治足以致刑何施而可以臻此孔子曰百姓足君孰與不足兎首瓠葉可以行禮掃地而祭可以事天禮之不備非貧之罪也管子曰倉廩實而知禮節臣不知陛下所謂富者富民歟抑富國歟陸賈曰將相和則士豫附劉向曰衆賢和於朝則萬物和於野今朝廷可謂不和矣其咎安在陛下不返求其本而欲以力勝之力之不能勝衆也久矣古者刀鋸在前鼎鑊在後而士猶犯之今陛下躬蹈堯舜未嘗誅一無罪欲弭衆言不過斥逐異議之臣而更用人耳必不忍行亡秦偶語之禁起東漢黨錮之獄多士何畏而不言哉臣恐逐者不巳而爭者益多煩言交攻愈甚於今日矣欲望致和而廣樂豈不疎哉古之求治者將以措刑也今陛下求治則欲致刑此又羣臣誤陛下也臣知其說矣是岀於荀卿荀卿者喜爲異論至以人性爲惡則其言治世刑重亦宜矣說者又以爲書稱唐虞之隆刑故無小而周之盛時羣飲者殺臣請有以詰之夏禹之時大辟二百周公之時大辟五百豈可謂周治而禹亂耶秦爲法及三族漢除肉刑豈可謂秦治而漢亂耶致之言極也天下幸而未治使一日治安陛下將變今之刑而用其極歟天下㡬何其不叛也徒聞其語而懼者巳衆矣臣不意異端邪說惑悞陛下至於如此宥過無大刑故無小此用刑之常理也至於今守之豈獨唐虞之隆而周之盛時哉所以誅羣飲者意其非獨羣飲而巳如今之法所謂夜聚曉散者使後世不知其詳而徒聞其語則凡夜相過者皆執而殺之可乎夫人相與飲酒而輒殺之雖桀紂之暴不至於此而謂周公行之歟聖策曰方今之弊可謂衆矣捄之之術必有本末施之之宜必有先後臣請論其本與其所宜先者而陛下擇焉方今捄弊之道必先立事立事之本在於知人則所施之宜當先觀大臣之知人與否耳古之欲立非常之功者必有知人之明茍無知人之明則循規矩蹈繩墨以求寡過二者皆審於自知而安於才分者也道可以講習而知德可以勉強而能惟知人之明不可學必出於天資如蕭何之識韓信此豈有法而可傳者哉以諸葛孔明之賢而知人之明則其所短是以失之於馬謖而孔明亦審於自知是以終身不敢用魏延我仁祖之在位也事無大小一付之於法人無賢不肖一付之於公議事巳效而後行人巳試而後用終不求非常之功者誠以當時大臣不足與於知人之明也古之爲醫者聆音察色洞視五臟則其治疾也有剖胸決脾洗濯胃腎之變茍無其術不敢行其事今無知人之明而欲立非常之功解縱繩墨以慕古人則是未能察脉而欲試華佗之方其異於操刀而殺人者㡬希矣房琯之稱劉秩關播之用李元平是也至今以爲笑矣陛下觀今之大臣爲知人歟爲不知人歟乃者擢用衆才皆其造室握手之人要結審固而後敢用葢以爲其人可與戮力同心共致太平曾未安席而交口攻之者如蝟毛而起陛下以此驗之其不知人也亦審矣幸今天下無事異同之論不過瀆亂聖聽而已若邊隅有警盜賊竊發俯仰成敗呼吸變動而所用之人皆如今日乍合乍散臨事解體不可復知則無乃誤社稷歟華佗不世岀天下未嘗廢醫蕭何不世岀天下未嘗廢治陛下必欲立非常之功請待知人之佐若猶未也則亦詔左右之臣安分守法而巳聖策曰生民以來稱至治者必曰唐虞成周之世詩書所稱其迹可見以至後世賢明之君忠智之臣相與憂勤以營一代之業雖未盡善然要其所成就亦必有可言者其詳著之臣以爲此不可勝言也其施設之方各隨其時而不可知其所可知者必畏天必從衆必法祖宗故其言曰戒之戒之天惟顯思命不易哉又曰稽於衆舍巳從人又曰丕顯哉文王謨丕承哉武王烈詩書所稱大畧如此未嘗言天命不足畏衆言不足從祖宗之法不足用也苻堅用王猛而樊世仇滕席寶不悅魏鄭公勸太宗以仁義而封倫不信凡今之人欲陛下違衆而自用者必以此藉口而陛下所謂賢明忠智者豈非意在於此等歟臣願考二人之所行而求之於今王猛豈嘗設官而牟利魏鄭公豈嘗貸錢而取息歟且其不悅者不過數人固不害天下之信且服也今天下有心者怨有口者謗古之君臣相與憂勤以營一代之業者似不如此古語曰百人之聚未有不公而說況天下乎今天下非之而陛下不囘臣不知所税駕矣詩曰譬彼舟流不知所届心之憂矣不遑假寐區區之忠惟陛下察之臣謹昧死上對借擬士對以諷諫當時之政而擘畫處更勝前首東坡病當時狃於青苗條例諸法及横山用兵等事故特擬策以發其直言敢諫之氣不知當日曾及聞神廟否然據愚見此作亦不過條其事而言之耳未有一段精光意是開悟人君令其實落做手處其不逮賈誼治安策多矣唐宋八大家文鈔卷一百十七
