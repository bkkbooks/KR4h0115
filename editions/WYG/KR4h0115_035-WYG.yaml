body:
  text: 唐宋八大家文鈔巻三十二明茅坤撰廬陵文鈔四劄子乞補館職劄子是大體要處臣竊以治天下者用人非止一端故取士不以一路若夫知錢穀曉刑獄熟民事精吏幹勤勞夙夜以辦集為功者謂之材能之士明於仁義禮樂通於古今治亂其文章論議與之謀慮天下之事可以决疑定策論道經邦者謂之儒學之臣善用人者必使有材者竭其力有職者竭其謀故以材能之士布列中外分治百職使各辦其事以儒學之臣置之左右與之日夕謀議講求其要而行之而又於儒學之中擇其尤者置之廊廟而付以大政使總治羣材衆職進退而賞罰之此用人之大畧也由是言之儒學之士可謂貴矣豈在材臣之後也是以前世英主明君未有不以崇儒嚮學為先而名臣賢輔出於儒學者十常八九也臣竊見方今取士之失患在先材能而後儒學貴吏事而賤文章自近年以來朝廷患百職不修務奬材臣故錢穀刑獄之吏稍有寸長片善為人所稱者皆已擢用之矣夫材能之士固當擢用然專以材能為急而遂忽儒學為不足用使下有遺賢之嗟上有乏材之患此甚不可也臣謂方今材能之士不患有遺固不足上煩聖慮惟儒學之臣難進而多棄滯此不可不思也臣以庸繆過䝉任使俾陪宰輔之後然平日論議不能無異同雖日奉天威又不得從容曲盡拙訥今臣有館閣取士愚見具陳如别劄欲望聖慈因宴閒之餘一迂睿覽或有可采乞常賜留意今取進止按宋制館閣取士以三路進士髙科一路也大臣薦舉一路也歳月疇勞一路也而其外又有制科召試以待非常之士而今獨有髙第與庶􅁻士兩項而已餘則並不可得論乞令百官議事劄子開誠布公之見漢唐以來所少者世宗庚戌年冦犯京邑來通馬市亦下百官羣議亦同此惜也次日又將出頭建議者並坐禍譴臣伏見祖宗時猶用漢唐之法凡有軍國大事及大刑獄皆集百官叅議蓋聖人慎於臨事不敢專任獨見欲採天下公論擇其所長以助不逮之意也方今朝廷議事之體與祖宗之意相背每有大事袐不使人知之惟小事可以自決者却送兩制定議兩制知非急務故忽畧拖延動經年歳其中時有一兩事體大者亦與小事一例忽之至於大事祕而不宣此尤不便當處事之始雖侍從之例皆不與聞已行之後事須彰布縱有乖誤却欲論列則追之不及況外廷百官踈逺者雖欲有言陛下豈得而用哉所以兵興數年西北二方累有事宜處置多繆者皆由大臣自無謀慮而杜塞衆見也臣今欲乞凡有軍國大事度外廷須知而不可祕宻者如北敵去年有請合從與不合從西戎今歳求和當許與不當許凡如此事之類皆下百官廷議隨其所見同異各令署狀而陛下擇其長者而行之不惟慎重大事廣採衆見兼又於庶官寒賤踈逺人中時因議論可見其高材敏識者國家得以用之若百官都無所長則自用廟堂之議至於小事並乞只令兩府自定其錢穀合要見本末則召三司官吏至兩府討尋供析而使大臣自擇至於禮法亦可召禮官法官詢問如此則事之大小各得其體如允臣所請且乞將西戎請和一事先集百官廷議取進止論諫院宜知外事劄了忠悃之識臣竊聞近日為軍賊王倫事江淮州軍頻有奏報朝廷不欲人知召進奏官等於樞宻院責狀不令漏泄指揮甚嚴不知此事出於聖㫖或只是兩府大臣意欲如此以臣料之為近日言賦事者多朝廷欲人不知以塞言路耳臣謂方今多事之際雖有獨見之明尚須博採善謀以求衆助豈可聾瞽羣聽杜塞人口况朝廷處事未必盡能合宜臣下獻忠未必全無可採至如王倫驅殺士民攻刼州縣江淮之上千里驚搔事已若斯何由掩蓋當今列辟之士極有憂國之人欲為人主獻言常患聞事不的況臺諌之官元是本職凡有論列貴在事初善則開端惡則杜漸言於未發庶易囘改今事無大小常患後時或號令已行或事迹巳布縱欲論救多不能及若更祕宻不使聞知則言事之臣何由獻説臣今欲乞指揮進奏院凡有事非實封者不須祕宻臣因此更有起請事件畫一如後一竊見御史臺見有進奏官遂日專供報狀欲乞依御史臺例選差進奏官一人凡有外方奏事及朝廷詔令除改並限當日内報諌院一竊見唐制諌臣為供奉之官常在天子仗内朝廷宻議皆得聞之今雖未曾恢復舊制欲乞凡遇朝廷有大處置四方奏報事非常程及諌官風聞事未得實者並許詣兩府請問庶知審實得以論列右件二事如允臣所請乞降指揮施行取進止乞添上殿班劄子臣伏見陛下自今春服藥已來羣臣不得進見今聖體康裕日御前後殿視朝決事中外臣庶無不感悦然侍從臺諌省府臣寮皆未曾得上殿奏事今雖邉鄙寜靜時歳豐稔民無疾厲盜賊不作天下庶務粗循常規皆不足上煩聖慮陛下可以遊心清閑頥養聖體然侍從臺諌省府臣寮皆是陛下朝夕左右論思獻納委任之臣豈可曠隔時月不得進見於前不惟亦有天下大務理當論述者至於臣子之於君父動經年歳不得進對豈能自安今欲望聖慈每遇前後殿坐日中書樞宻院退後如審官三班銓司不引人則許臣寮一班上殿假以頃刻進瞻天威不勝臣子區區之願也如允臣所請乞下閣門施行仍約束上殿臣寮不得將干求恩澤訴理功過及細碎閑慢等事上煩聖聰或乞約定上殿時刻所貴不煩久坐伏候勅㫖論任人之體不可疑劄子的確臣近見淮南按察使卲飾奏為體量知潤州席平為政不治及不教閲兵士等朝廷以飾為未足信又下提刑司再行體量臣竊以轉運提刑俱領按察然朝廷寄任重者為轉運其次乃提刑爾今寄任重者言事反不信又質於其次者而決疑臣不知邵飾果是才與不才可信與否如不才不可信則一路數十州事豈宜委之若果才而可信又何疑焉又不知為提刑者其才與飾優劣如何若才過於飾尚可取信萬一不才於飾見事相背却言席平為才邵飾合有罔上之罪矣若反以罪飾臣料朝廷必不肯行若捨飾與席平俱不問則善惡不辨是非不分況席平曾作臺官立朝無狀只令制勘亦不能了尋為御史中丞以不才奏罷朝廷兩府而下誰不識平其才與不才人人盡知何必更令提刑體量然後為定今外議皆言執政大臣託以審慎為名其實不肯主事而當怨須待言事者再三陳述使被黜者知大臣迫於言者不得已而行只圖怨不歸已茍誠如此豈有念民疾若澄清官吏之意哉若無此意只是好疑不決則尤是朝廷任人之失自去年以為轉運使不察官吏特出詔書加以使名責其按察今按察使依禀詔書舉其本職又却疑而不聽今後朝廷命令誰肯信之凡任人之道要在不疑寜可艱於擇人不可輕任而不信若無賢不肖一例疑之則人各心䦨誰肯辦事今邵飾言一不才顯者所貴朝廷肯行然後部下振竦官吏畏服今反為朝廷不信却委别人則飾之使威誰肯信服飾亦慙見其下今後見事不若不為不獨邵飾一人臣竊聞諸處多有按察官吏皆為朝廷不行人各嗟慙以謂任以事權反加沮惑朝廷之意不可諭也伏望聖慈取邵飾所奏特與施行又令今後按察使奏人如不才老病灼然不疑者不必更委别官示以不信所貴不失任人之道而令臣下盡心取進止論軍中選將劄子軍卒中選將亦是一策臣伏見國家自西鄙用兵累經敗失京師勁卒多在征行禁衛諸軍全然寡少又無將帥以備爪牙方今為國計者但務外憂夷狄專意邊陲殊不思根本内虛朝廷勢弱萬一有事無以支吾今軍帥暗懦非其人禁兵驕惰不可用此朝廷自以為患不待臣言而可知也臣亦厯考前世有國之君多於無事之際恃安忘危備患不謹使禍起倉卒而至敗亡者有矣然未有於用兵之時而反忘武備如今日者兵法曰將者民之司命國家安危之主也今外以李昭亮王克基輩當契丹内以曹琮李用和等衛天子如當今之事勢而以民之司命國之安危繫此數人安得不取笑四夷遭其輕侮臣謂去歳北敵忽興狂悖今年元昊妄有請求若使朝廷有一二人中材之將叩頭効死奮身請戰誓雪君耻少増國威則戎狄未敢侵陵朝廷未至屈辱奈何自中及外都無一人既無可恃以力爭遂至甘心於自弱夫天下至廣遂無一人者非真無人也但求之不勤不至耳臣伏思自用兵以來朝廷求將之法不過命近臣舉朝士換武官及選試班行方畧等人而已近臣所舉不過俗吏材幹之士班行所選乃是弓馬一夫之勇至於方畧之人尤為乖濫試中者僅堪借職縣尉參軍齋挽而已於此求將而欲捍當今之患此所以困天下而取侮夷狄者也臣不知朝廷以此數事為求將之術果是乎果非乎以為是則所得何人知其非則盍思改革又不知朝廷以將為易得乎為難得乎為易得則數歳未見一人知其難得則當多方用意早思求擇俟其臨患何可得乎伏望陛下特詔兩府大臣别議求將之法盡去循常之格以求非常之人茍非不次以用人難弭當今之大患臣亦嘗有愚見久欲條陳若必講求庶可參用臣伏見唐及五代至乎國朝征伐四方立功行陣其間名將多出軍卒只如西鄙用兵以來武將稍可稱者徃徃出於軍中臣故謂只於軍中自可求將試畧言求將之法謹條如左凡求將之法先取近下禁軍至廂軍中年少有力者不拘等級因其技同者每百人團為一隊而教之較其技精而最勇者百人之中必有一人矣得之以為隊將此一人技勇實能服其百人矣以為百人之將可也合十隊將而又教之較其技精而最勇者十人之中必有一人矣得之以為禆將此一人之技勇實能服其千人矣以為千人之將可也合十禆將而又教之夫技勇出千人之上而難為勝矣則當擇其有識見知變通者十人之中必有一人矣得之以為大將此一人之技勇乃萬人之選而又粗知變通因擇智謀之佐以輔之以為萬人之將可也幸而有技勇不足而材識出乎萬人之外者此不世之竒將非常格之所求也臣所謂只於軍中自可求將者此也誠能如此得五七萬兵隨而又得萬人之將五七人下至千人百人之將皆自足然後别立軍名而為階級之制每萬人為一軍以備宿衛有事則行師出征無事則坐威天下比夫以豐衣厚禄養驕惰無用之卒而遞遷次補至於挍帥皆是凡愚暗懦之人得失相萬矣若臣之説果可施行俟成一軍則代舊禁兵萬人散出之使就食于外新置之兵便制其始稍増舊給不使太優常役其力不令驕惰比及新兵成立舊兵出盡則京師減冗費得精兵此之為利又逺矣右臣所陳只是選勇將訓衛兵之一法耳如捍邊破賊竒才異畧之人不可謂無伏乞早賜留意精求謹具奏聞伏候勑㫖論逐路取人劄子剖析處最痛快可誦臣伏見近有臣僚上言乞將南省考試舉人各以路分糊名於遂路每十人解一人等事雖已奉聖㫖送兩制詳定臣亦有愚見合具敷陳竊以國家取士之制比於前世最號至公蓋累聖留心講求曲盡以謂王者無外天下一家故不問東西南北之人盡聚諸路貢士混合為一而惟材是擇又糊名謄録而考之使主司莫知為何方之人誰氏之子不得有所憎愛薄厚於其間故議者謂國家科塲之制雖未復古法而便於今世其無情如造化至公如權衡祖宗以來不可易之制也傳曰無作聰明亂舊章又曰利不百者不變法今言事之臣偶見一端即議更改此臣所區區欲為陛下守祖宗之法也臣所謂偶見一端者蓋言事之人但見每次科塲東南進士得多而西北進士得少故欲改法使多取西北進士爾殊不知天下至廣四方風俗異宜而人性各有利鈍東南之俗好文故進士多而經學少西北之人尚質故進士少而經學多所以科塲取士東南多取進士西北多取經學者各因其材性所長而各隨其多少取之今以進士經學合而較之則其數均若必論進士則多少不等此臣所謂偏見之一端其不可者一也國家方以官濫為患取士數必難増若欲多取西北之人則却須多減東南之數今東南州軍進士取解者二三千人處只解二三十人是百人取一人蓋已痛裁抑之矣西北州軍取解至多處不過百人而所解至十餘人是十人取一人比之東南十倍假借之矣若至南省又減東南而増西北是已裁抑者又裁抑之已假借者又假借之此其不可者二也東南之士於千人中解十人其初選已精矣故至南省所試合格者多西北之士學業不及東南當發解時又十倍優假之蓋其初選已濫矣故至南省所試不合格者多今若一例以十人取一人則東南之人合格而落者多矣西北之人不合格而得者多矣至於他路理不可齊偶有一路合格人多亦限以十一落之偶有一路合格人少亦須充足十一之數使合落者得合得者落取舎顛倒能否混淆其不可者三也且朝廷專以較藝取人而使有藝者屈落無藝者濫得不問繆濫只要諸路數停此其不可者四也且言事者本欲多取諸路土著之人若此法一行則寄應者爭趨而徃今開封府寄應之弊可騐矣此所謂法出而姦生其不可者五也今廣南東西路進士例各絶無舉業諸州但據數解發其人亦自知無藝只來一就省試而歸冀作攝官爾朝廷以嶺外烟瘴北人不便須藉攝官亦許其如此今若一例與諸路十人取一人此為繆濫又非西北之比此其不可者六也凡此六者乃大槩爾若舊法一壊新議必行弊濫隨生何可勝數故臣以謂且遵舊制但務擇人推朝廷至公待四方如一惟能是選人自無言此乃當今可行之法爾若謂士習浮華當先考行就如新議亦須只考程試安能必取行實之人議者又謂西北近敵士要牢籠此甚不然之論也使不逞之人不能為患則已茍可為患則何方無之前世賊亂之臣起於東南者甚衆其大者如項羽蕭銑之徒是已至如黄巢王仙芝之輩又皆起亂中州者爾不逞之人豈專西北矧貢舉所設本待材賢牢籠不逞當别有術不在科塲也惟事久不能無弊有當留意者然不須更改法制止在振舉綱條爾近年以來舉人盛行懷挾排門大譟免冠突入虧損士風傷敗善類此由舉人旣多而君子小人雜聚所司力不能制雖朝廷素有禁約條制甚嚴而上下因循不復申舉惟此一事為科塲大患而言事者獨不及之願下有司議革其弊此當今科塲之患也臣忝貳宰司預聞國論茍不能為陛下守祖宗之法而言又不足取信於人主則厚顔尸禄豈敢偷安而久處乎故猶此彊言乞賜裁擇言青苖錢第一劄子蘇氏兄弟所論次青苗不便處最詳悉而歐公此䟽尤似有分剖臣伏見朝廷新制俵散青苖錢以來中外之議皆稱不便多乞寢罷至今未䝉省察臣以老病昬忘雖不能究述利害茍有所見其敢不言臣今有起請事件謹具畫一如後一臣竊見議者言青苗錢取利於民為非而朝廷深惡其説至煩聖聽命有司具述本末委曲申諭中外以朝廷本為惠民之意然告諭之後搢紳之士論議益多至於田野之民蠢然固不知周官泉府為何物但見官中放債每錢一百文要二十文利爾是以申告雖煩而莫能諭也臣亦以謂等是取利不許取三分而許取二分此孟子所謂以五十歩笑百歩者以臣愚見必欲使天下曉然知取利非朝廷本意則乞除去二分之息但令只納元數本錢如此始是不取利矣盖二分之息以為所得多耶固不可多取于民所得不多耶則小利又何足顧何必以此上累聖政一臣檢詳元降指擇如災傷及五分已上則夏料青苗錢令于秋料送納秋料於次年夏料送納臣竊謂年歳豐凶固不可定其間豐年常少而凶歳常多今所降指揮盖只言偶然一料災傷爾若連遇三兩料水旱則青苗錢積壓拖欠數多若纔遇豐熟却須一併催納則農民永無豐歳矣至於中小熟之年不該得災傷分數合於本料送納者或人户無力或頑猾拖延本料尚未送納了當若令又請次料合俵錢數則積壓轉多必難催索臣今欲乞人户遇災傷本料未曾送納者及人户無力或頑猾拖延不納者並更不支俵與次料錢如此則人户免積壓拖欠州縣免鞭朴催驅官錢免積久失䧟一臣竊聞議者多以抑配人户為患所以朝廷屢降指揮丁寧約束州縣官吏不得抑配百姓然諸路各有提舉管勾等官往來催促必須盡錢俵散而後止由是言之朝廷雖指揮州縣不得抑逼百姓請錢而提舉等官又却催促盡數散俵故提舉等官以不能催促盡數散俵為失職州縣之吏亦以俵錢不盡為弛慢不才上下不得不遞相督責者勢使之然各不獲已也由是言之理難獨責州縣抑配矣以臣愚見欲乞先罷提舉勾管等官不令催督然後可以責州縣不得抑配其所俵錢取民情願專委州縣隨多少散之不得須要盡數亦不必須要闔縣之民户户盡請如此則自然無抑配之患矣右謹具如前臣以衰年昬病不能深議逺慮所見目前止於如此然而青苖之議久已喧然中外羣臣乞行寢罷者不可勝數其所陳久逺利害必已詳盡而無遺矣一日陛下赫然開悟悉採羣議追還新制一切罷之以便公私天下之幸也若中外所言雖多猶未能感動天聽則見行不便法中有此三事尤繫目下利害如臣畫一所陳伏望聖慈特賜裁擇今取進止請耕禁地劄子經國至計與蘇子由所上乞禁邉臣爭界劄子互看臣昨奉使河東相度㳂邊經久利害臣竊見河東之患患在盡禁㳂邊之地不許人耕而私糴北界斛斗以為邊儲其大害有四以臣相度今若募人耕植禁地則去四大害而有四大利河東地形山險輦運不通邊地既禁則㳂邊乏食每歳仰河東一路賦税和糴入中和博斛斗支徃㳂邊人户既阻險逺不能輦運遂賫金銀絹銅錢等物就㳂邊貴價私糴北界斛斗北界禁民以粟馬南入我境其法至死今邊民冒禁私相交易時引爭鬬輒相斫射萬一興訟遂搆事端其引惹之患一也今吾有地不自耕植而偷糴隣界之物以仰給若敵常歳豐及緩法不察而米過吾界則尚有可望萬一彼歳不豐或其與我有隙頓嚴邊界禁約而閉糴不通則我軍遂至乏食是我師饑飽繫在敵人其患二也代州岢嵐寜化火山四州軍㳂邊地旣不耕荒無定主敵人得以侵占往時代州陽武寨為蘇直等爭界訟久不決卒侵却二三十里見今寜化軍天地之側杜思榮等又來爭侵經年未決岢嵐軍爭掘界壕賴米光濬多方力拒而定是自空其地引惹北人歳歳爭界其害三也禁膏腴之地不耕而困民之力以逺輸其害四也臣謂禁地若耕則一二歳間北界斛㪷可以不糴則邊民無爭糴引惹之害我軍無饑飽在敵之害㳂邊地有定主無爭界之害邊州自有粟則内地之民無逺輸之害是謂去四大害而有四大利今四州軍地可二三萬頃若盡耕之則其利歳可得三五百萬石伏望聖慈特下兩府商議如可施行則召募耕種税入之法各有事目容臣續具條陳取進止唐宋八大家文鈔巻三十二
