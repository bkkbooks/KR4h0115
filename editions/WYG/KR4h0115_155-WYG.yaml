body:
  text: 唐宋八大家文鈔卷一百四十三明茅坤撰東坡文鈔二十七銘贊頌三槐堂銘并序中多名言天可必乎賢者不必貴仁者不必夀天不可必乎仁者必有後二者將安取衷哉吾聞之申包胥曰人衆者勝天天定亦能勝人世之論天者皆不待其定而求之故以天為茫茫善者以怠惡者以肆盗跖之夀孔顔之厄此皆天之未定者也松栢生於山其始也困於蓬蒿厄於牛羊而其終也貫四時閱千歲而不改者其天定也善惡之報至於子孫而其定也久矣吾以所見所聞所傳聞考之而其可必也審矣國之將興必有世徳之臣厚施而不食其報然後其子孫能與守文太平之主共天下之福故兵部侍郎晉國王公顯於漢周之際厯事太祖太宗文武忠孝天下望以為相而公卒以直道不容於時盖嘗手植三槐於庭曰吾子孫必有為三公者已而其子魏國文正公相真宗皇帝於景徳祥符之間朝廷清明天下無事之時享其福禄榮名者十有八年今夫寓物於人明日而取之有得有否而晉公修徳於身責報於天取必於數十年之後如持左契交手相付吾是以知天之果可必也吾不及見魏公而見其子懿敏公以直諫事仁宗皇帝出入侍從將帥三十餘年位不滿其徳天將復興王氏也歟何其子孫之多賢也世有以晉公比李栖筠者其雄才直氣不相上下而栖筠之子吉甫其孫徳裕功名富貴畧與王氏等而忠信仁厚不及魏公父子由此觀之王氏之福盖未艾也懿敏公之子鞏與吾遊好徳而文以世其家吾以是録之銘曰嗚呼休哉魏公之業與槐俱萌封植之勤必世乃成既相真宗四方砥平歸視其家槐隂滿庭吾儕小人朝不及夕相時射利皇䘏厥徳庶幾僥倖不種而獲不有君子其何能國王城之東晉公所廬鬱鬱三槐惟徳之符嗚呼休哉徳威堂銘并序前引皆博大所謂為潞公而作者元祐之初詔起太師潞公於洛命以重事公惟仁宗英宗神考三聖眷倚之重不敢以既老為辭杖而入朝期年乃求去詔曰昔西伯善養老而太公自至魯穆公無人子思之側則長者去之公自為謀則善矣獨不為朝廷惜乎又曰唐太宗以干戈之事尚能起李靖於既老而穆宗文宗以燕安之際不能用裴度於未病治亂之效於斯可見公讀詔聳然不敢言去葢復畱四年天下無事朝廷奠安乃力請而歸公之在朝也契丹使耶律永昌劉霄來聘軾奉詔館客與使者入覲望見公殿門外却立改容曰此潞公也耶所謂以徳服人者問其年曰何壯也軾曰使者見其容未聞其語其綜理庶務酬酢事物雖精練少年有不如貫穿古今洽聞强記雖専門名家有不逮使者拱手曰天下異人也公既歸洛西羌首領有温溪心者請於邊吏願獻良馬於公邉吏以聞詔聴之公心服天下至于四夷書曰徳威惟畏徳明惟明世所以守伯夷之典用臯陶之法者以其徳也若夫非徳之威雖猛而人不畏非徳之明雖察而人不服公修徳於几席之上而其威折衝於萬里之外退居於家而人望之如在廊廟可不謂徳威乎公之子及為河陽守公將往臨之吏民喜甚自洛至三城歡呼之聲相屬及作堂以待公而請銘於軾乃榜之曰德威而銘之曰德威惟畏德明惟明惟師潞公展也大成公在洛師崧洛有光駕言三城河流不揚願公百年子孫千億家于兩河日見顔色西戎來朝祗慄公門豈惟西人四方其訓之九成臺銘銘之變體韶陽太守狄咸新作九成臺玉局散吏蘇軾為之銘曰自秦并天下滅禮樂韶之不作盖千三百二十有三年其器存其人亡則韶既已隱矣而况於人器兩亡而不傳雖然韶則亡矣而有不亡者存盖嘗與日月寒暑晦明風雨並行於天地之間世無南郭子綦則耳未嘗聞地籟也而况得聞天籟使耳聞天籟則凡有形有聲者皆吾羽旄干戚管磬匏絃嘗試與子登夫韶石之上舜峯之下望蒼梧之渺莽九疑之聮緜覽觀江山之吐吞草木之俯仰鳥獸之鳴號衆族之呼吸往來唱和非有度數而均節自成者非韶之大全乎上方立極以安天下人和而氣應氣應而樂作則夫所謂簫韶九成來鳳鳥而舞百獸者既已燦然畢陳於前矣擇勝亭銘即古之幔亭而文多曠達矣維古潁城因潁為隍倚舟于門美哉洋洋如淮之甘如漢之蒼如洛之温如浚之凉可侑我客可流我觴我欲即之為館為堂近水而構夏潦所襄逺水而築邈焉相望乃作斯亭筵楹欒梁鑿枘交設合散靡常赤油仰承青幄四張我所欲往十夫可將與水升降除地布牀可使杜蕢洗觶而揚可使莊周觀魚而忘可使逸少祓禊而祥可使太白咏月而狂既薺我荼亦醪我漿既濯我纓亦浣我裳豈獨臨水無適不臧春朝花郊秋夕月塲無脛而趨無翼而翔敝以改為其費易償榜曰擇勝名實允當維古聖人不㽞一方虚白為室無何為鄉神馬凥輿孰為輪箱流行坎止雖獨不傷居之無盗中靡所藏去之無戀如所宿桑豈如世人生短慮長尺宅不治寸田是荒錫瓦銅雀石門阿房俯變仰滅與生俱亡我銘斯亭以砭世盲漢鼎銘并序其憂深其思逺禹鑄九鼎用器也初不以為寳象物以飾之亦非所以使民逺不若也武王遷之洛邑葢己見笑於伯夷叔齊矣方周之盛也鼎為宗廟之觀美而已及其衰也為周之患有不可勝言者匹夫無罪懐璧其罪周之衰也與匹夫何異嗟夫孰知九鼎之為周之角齒也哉自春秋時楚莊王以問其輕重大小而戰國之際秦與齊楚皆欲之周人惴惴焉視三虎之垂涎而睨己也絶周之祀不足以致冦裂周之地不足以肥國然三國之君未嘗一日而忘周者以寳在焉故也三國爭之周人莫知所適與得鼎者未必能存周而不得者必碎之此九鼎之所以亡也周顯王之四十二年宋太丘社亡而鼎淪沒於泗水此周人毁鼎以緩禍而假之神妖以為之說也秦始皇漢武帝乃始萬方以出鼎此與兒童之見無異善夫吾丘夀王之說也曰汾隂之鼎漢鼎也非周鼎夫周有鼎漢亦有鼎此易所謂正位凝命者豈三趾兩耳之謂哉恨夀王小子方以諛進不能究其義予故作漢鼎銘以遺後世君子其詞曰惟五帝三代及秦漢以來受命之君靡不有兹鼎鼎存而昌鼎亡而亡葢鼎必先壊而國隨之豈有易姓而猶傳者乎不寳此器而拳拳於一物孺子之智婦人之仁嗚呼悲夫徐州蓮華漏銘并序借漏以發明道術吾所以謂蘇長公仙於文者也故龍圖閣直學士禮部侍郎燕公肅以創物之智聞於天下作蓮華漏世服其精凡公所臨必為之今州郡往往而在雖有巧者莫敢損益而徐州獨用瞽人衛朴所造廢法而任意有壺而無箭自以無目而廢天下之視使守者伺其滿則决之而更注人莫不笑之國子博士傅君楊公之外曾孫得其法為詳其通守是邦也實始改作而請銘於軾銘曰人之所信者手足耳目也目識多寡手知重輕然人未有以手量而目計者必付之於度量與權衡豈不自信而信物葢以為無意無我然後得萬物之情故天地之寒暑日月之晦明昆侖旁薄於三十八萬七千里之外而不能逃於三尺之箭五斗之缾雖疾雷霾風雨雪晝晦而遲速有度不加虧贏使凡為吏者如缾之受水不過其量如水之浮箭不失其平如箭之升降也視時之上下降不為辱升不為榮則民將靡然而心服而寄我以死生矣按婁迂齋曰坡翁最長於物理上推到義理精微處妙於形容而引歸吏身上尤佳夢齋銘并序妙詮至人無夢或曰高宗武王孔子皆夢佛亦夢夢不異覺覺不異夢夢即是覺覺即是夢此其所以為無夢也歟衛玠問夢於樂廣廣對以想曰形神不接而夢此豈想哉對曰因也或問因之說東坡居士曰世人之心依塵而有未嘗獨立也塵之生㓕無一念住夢覺之間塵塵相授數傳之後失其本矣則以為形神不接豈非因乎人有牧羊而寢者因羊而念馬因馬而念車因車而念盖遂夢曲盖鼔吹身為王公夫牧羊之與王公亦逺矣想之所因豈足怪乎居士始與芝相識於夢中且以所夢求而得之今二十四年矣而五見之每見則相視而笑不知是處之為何方今日之為何日我爾之為何人也題其所寓室曰夢齋而子由為之銘曰法身充滿處處皆一幻身虚妄所至非實我觀世人生非實中以寤為正以寐為夢忽寐所遇執寤所遭積執成堅如丘山高若見法身寤寐皆非知其皆非寤寐無虧遨遊四方齋則不遷南北東西法身本然文與可飛白贊文有神解嗚呼哀哉與可豈其多好好竒也歟抑其不試故藝也始予見其詩與文又得見其行草篆𨽻也以為止此矣既沒一年而復見其飛白美哉多乎其盡萬物之態也霏霏乎其若輕雲之蔽月飜飜乎其若長風之卷斾也猗猗乎其若遊絲之縈栁絮褭褭乎其若流水之舞荇帶也離離乎其逺而相屬縮縮乎其近而不隘也其工至於如此而余乃今知之則余之知與可者固無幾而其所不知者盖不可勝計也嗚呼哀哉延州來季子贊并序子瞻據季子救陳在哀公十年故以為其救陳也去吴之亡僅十三年爾季子知吴之亡何以不諫予獨謂闔廬既己殺王僚而自立逃而去終身焉不入吴之市葢季子己絶人世也久矣左傳所稱季子云云妄也大較左傳多浮誇焉知其非以訛傳訛也子瞻求其説而不得謂季子且不死則又過矣魯襄公十二年吳子夀夢卒延州來季子其少子也以讓國聞於諸侯則非童子矣至哀公十年冬楚子期伐陳季子救陳謂子期曰二君不務徳而力爭諸侯民何罪焉我請退以為子名務徳而安民乃還時去夀夢卒盖七十七年矣而能干里將兵季子何其夀而康也然其卒不書於春秋哀公之元年吴王夫差敗越於夫椒勾踐使大夫種因太宰嚭以行成於吴吴王許之子胥諫不聴則吴之亡形成矣季子觀樂於魯知列國之廢興於百年之前方其救陳也去吴之亡十三年耳而謂季子不知可乎闔廬之自立也曰季子雖至不吾廢也是季子徳信於吴人而言行於其國也且帥師救陳不戰而去之以為敵國名則季子之於吴葢亦少専矣救陳之明年而子胥死季子知國之必亡而終無一言於夫差知言之無益也夫子胥以闔廬霸而夫差殺之如皂𨽻豈獨難於季子乎嗚乎悲夫吾是以知夫差之不道至於使季子不敢言也蘇子曰延州來季子張子房皆不死者也江左諸人好談子房季札之賢有以也夫此可與知者論難與俗人言也作延州來季子賛曰泰伯之徳鍾於先生棄國如遺委蜕而行坐閲春秋幾五之二古之真人有化無死王元之畫像賛并序感慨激烈過多傳曰不有君子其能國乎予嘗三復斯言未嘗不流涕太息也如漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑皆以身徇義招之不來麾之不去正色而立于朝則豺狼狐狸自相吞噬故能消禍於未形救危於將亡使皆如公孫丞相張禹胡廣雖累干百緩急豈可望哉故翰林王公元之以雄文直道獨立當世足以追配此六君子者方是時朝廷清明無大奸慝然公猶不容於中耿然如秋霜夏日不可狎玩至於三黜以死有如不幸而處於衆邪之間安危之際則公之所為必將驚世絶俗使斗筲穿窬之流心破膽裂豈特如此而已乎始予過蘇州虎丘寺見公之畫像想其遺風餘烈願為執鞭而不可得其後為徐州而公之曽孫汾為兖州以公墓碑示余乃追為之賛以附其家傳云維昔聖賢患莫已知公遇太宗允也其時帝欲用公公不少貶三黜窮山之死靡憾咸平以來獨為名臣一時之屈萬世之信紛紛鄙夫亦拜公像何以占之有泚其顙公能泚之不能已之茫茫九原愛莫起之王仲儀真賛并序先於小序中㸃次故賛文特爽孟子曰所謂故國者非謂有喬木之謂也有世臣之謂也又曰為政不難不得罪於巨室巨室之所慕一國慕之一國之所慕天下慕之夫所謂世臣者豈特世禄之人而巨室者豈特侈富之家也哉盖功烈已著於時徳望己信於人譬之喬木封殖愛養自拱把以至於合抱者非一日之故也平居無事商功利課殿最誠不如新進之士至於緩急之際決大䇿安大衆呼之則來麾之則散者惟世臣巨室為能余嘉祐中始識懿敏王公於成都其後從事於岐而公自許州移鎮平凉方是時冦大舉犯邊轉運使攝帥事與副總管議不合軍無紀律邊人大恐聲揺三輔及聞公來吏士踊躍傳呼旗幟精明鼔角讙亮冦即日解去公至燕勞將佐而已余然後知老臣宿將其功用葢如此使新進之士當之雖有韓白之勇良平之竒豈能坐勝黙成如此之㨗乎熙寧四年秋余將往錢塘見公於私第佚老堂飲酒至暮論及當世事曰吾老矣恐不復見子厚自愛無忘吾言既去二年而公薨又六年乃作公之真賛以遺其子鞏詞曰堂堂魏公配命召祖顯允懿敏惟周之虎魏公在朝百度維貞懿敏在外有間無聲高明廣大宜公宜相如木百圍宜宫宜堂天既厚之又貴富之如山如河維安有之彼窶人子既陋且寒終勞永憂莫知其賢曷不觀此佩玉劍履晉公之孫魏公之子韓幹畫馬賛游神言外㸃綴淋漓韓幹之馬四其一在陸驤首奮鬛若有所望頓足而長鳴其一欲涉尻髙首下擇所由濟跼蹐而未成其二在水前者反顧若以鼻語後者不應欲飲而留行以為廏馬也則前無覊絡後無箠䇿以為野馬也則隅目聳耳豐臆細尾皆中度程蕭然如賢大夫貴公子相與解帶脱㡌臨水而濯纓遂欲髙舉逺引友麋鹿而終天年則不可得矣葢優哉游哉聊以卒嵗而無營三馬圖賛賛名馬而其意全在本朝廷却名馬上元祐初上方閉玉門闗謝遣諸將太師文彦博宰相吕大防范純仁建遣諸生㳺師雄行邊勅武備師雄至熙河蕃官包順請以所部熟户除邊患師雄許之遂擒猾羌大首領鬼章青宜結以獻百官皆賀遣使吿永裕陵時西域貢馬首髙八尺龍顱而鳳膺虎脊而豹章出東華門入天駟監振鬛長鳴萬馬皆瘖父老縱觀以為未始見也上方恭黙思道八駿在廷未嘗一顧其後圉人起居不以時馬有斃者上亦不問明年羌温溪心有良馬不敢進請於邊吏願以餽太師潞國公詔許之蔣之竒為熙河帥西蕃有貢駿馬汗血者有司以非入貢嵗月留其使與馬於邊之竒為請乞不以時入事下禮部軾時為宗伯判狀云朝廷方却走馬以糞正復汗血亦何所用事遂寢于時兵革不用海内小康馬則不遇矣而人少安軾嘗私請於承議郎李公麟畫當時三駿馬之狀而使鬼章青宜結挍之藏於家紹聖四年三月十四日軾在恵州謫居無事閲舊書畫追思一時之事而歎三馬之神駿乃為之賛曰吁鬼章世悍驕奔貳師走嫖姚今在廷服虎貂效天驥立内朝八尺龍神超遥若將西燕昆瑶帝念民乃下招薾歸雲逝房妖磨衲賛并序箇中人語往往令人解頥長老佛印大師了元逰京師天子聞其名以髙麗所貢磨衲賜之客有見而歎曰嗚呼善哉未曽有也嘗試與子攝其齋袵循其鉤絡舉而振之則東盡嵎夷西及昧谷南放交趾北屬幽都紛然在吾箴孔綫蹊之中矣佛印听然而笑曰甚矣子言之陋也吾以法眼視之一一箴孔有無量世界滿中衆生所有毛竅所衣之衣箴孔綫蹊悉為世界如是展轉經八十反吾佛光明之所照與吾君聖徳之所被如以大海注一毛竅如以大地塞一箴孔曽何嵎夷昧谷交趾幽都之足云乎當知此衲非大非小非短非長非重非輕非薄非厚非色非空一切世間折膠墮指此衲不寒礫石流金此衲不熱五濁流浪此衲不垢刼火洞然此衲不壊云何以有思惟心生下劣想於是蜀人蘇軾聞而賛之曰匣而藏之見衲而不見師衣而不匣見師而不見衲惟師與衲非一非兩眇而視之蟣蝨龍象十八大阿羅漢頌此等文字韓歐所不欲為此等見解韓歐所不能及由蘇公公少悟禪宗及過南海後遍厯刼幻以此心性超朗乃至於此可謂絶世之文矣蜀金水張氏畫十八大阿羅漢軾謫居儋耳得之民間海南荒陋不類人世此畫何自至哉久逃空谷如見師友乃命過躬易其裝標設燈塗香果以禮之張氏以畫羅漢有名唐末盖世擅其藝今成都僧敏行其𤣥孫也梵相竒古學術淵博蜀人皆曰此羅漢化生其家也軾外祖父程公少時㳺京師還遇蜀亂絶糧不能歸困卧旅舍有僧十六人往見之曰我公之邑人也各以錢二百貸之公以是得歸竟不知僧所在公曰此阿羅漢也歲設大供四公年九十凡設二百餘供今軾雖不親覩其人而困厄九死之餘鳥言卉服之間乃獲此竒勝豈非希闊之遇也哉乃各即其體像而窮其思致以為之頌第一尊者結跏正坐蠻奴側立有鬼使者稽顙于前侍者取其書通之頌曰月明星稀孰在孰亡煌煌東方惟有啓明咨爾上座及阿闍黎代佛出世惟大弟子第二尊者合掌趺坐蠻奴捧櫝於前老人發之中有琉璃缾貯舍利十數頌曰佛無滅生通塞在人牆壁瓦礫誰非法身尊者歛手不起于坐示有敬耳起心則那第三尊者扶烏木養和正坐下有白沐猴獻果侍者執盤受之頌曰我非標人人莫吾識是雪衣者豈具眼隻方食知獻何愧於猿為語栁子勿憎王孫第四尊者側坐屈三指答胡人之問下有蠻奴捧函童子戲捕龜者頌曰彼問云何計數以對為三為七莫有知者雷動風行屈信指間汝觀明月在我指端第五尊者臨淵濤抱膝而坐神女出水中蠻奴受其書頌曰形與道一道無不在天宫鬼符奚往而礙婉彼竒女躍于濤瀧神馬凥輿攝衣從之第六尊者右手支頥左手拊穉師子顧視侍者擇𤓰而剖之頌曰手拊雛猊目視𤓰獻甘芳之意若達于面六塵並入心亦徧知即此知者為大摩尼第七尊者臨水側坐有龍出焉吐珠其手中胡人持短錫杖蠻奴捧鉢而立頌曰我以道眼為傳法宗爾以願力為䕶法龍道成願滿見佛不怍盡取玉函以畀思邈第八尊者並膝而坐加肘其上侍者汲水過前有神人涌出於地捧盤獻寳頌曰爾以捨來我以慈受各獲其心寳則誰有視我如爾取與則同我爾福徳如四方空第九尊者食已撲鉢持數珠誦呪而坐下有童子構火具茶又有埋筒注水蓮池中者頌曰飯食己畢撲鉢而坐童子茗供吹籥發火我作佛事淵乎妙哉空山無人流水花開第十尊者執經正坐有仙人侍女焚香於前頌曰飛仙玉潔侍女雲眇稽手炷香敢問致道我道大同有覺無修豈不長生非我所求第十一尊者趺坐焚香侍者拱手胡人捧函而立頌曰前聖後聖相喻以言口如布榖而意莫傳鼻觀寂如諸根自例孰知此香一炷千偈第十二尊者正坐入定枯木中其神騰出於上有大蟒出其下頌曰黙坐者形空飛者神二俱非是孰為此身佛子何為懐毒不已願解此相問誰縛爾第十三尊者倚杖垂足側坐侍者捧函而立有虎過前有童子怖匿而竊窺之頌曰是與我同不噬其妃一念之差墮此髬髵導師悲愍為爾顰數以爾猛烈復性不難第十四尊者持鈴杵正坐誦呪侍者整衣于右胡人横短錫跪坐于左有虵一角若仰訴者頌曰彼髯而虬長跪自言特角亦來身移怨存以無言音誦無説法風止火滅無相仇者第十五尊者鬚眉皆白袖手趺坐胡人拜伏于前蠻奴手持拄杖侍者合掌而立頌曰聞法最先事佛亦久髦然衆中是亦長老薪水井臼老矣不能摧伏魔軍不戰而勝第十六尊者横如意趺坐下有童子發香篆侍者注水花盆中頌曰盆花浮紅篆烟繚青無問無答如意自横㸃瑟既希昭琴不鼔此間有曲可歌可舞第十七尊者臨水側坐仰觀飛鶴其一既下集矣侍者以手拊之有童子提竹籃取果實投水中頌曰引之浩茫與鶴皆翔藏之幽深與魚皆沉大阿羅漢入佛三昧俯仰之間再拊海外第十八尊者植拂支頤瞪目而坐下有二童子破石榴以獻頌曰植拂支頤寂然跏趺尊者所㳺物之初耶聞之于佛及吾子思名不用處是未發時佛滅度後閻浮提衆生剛狠自用莫肯信入故諸賢聖皆隱不見獨以像設遺言提引未悟而峩眉五臺廬山天台猶出光景變異使人了然見之軾家藏十六羅漢像每設茶供則化為白乳或凝為雪花桃李芍藥僅可指名或云羅漢慈悲深重急於接物故多現神變儻其然乎今於海南得此十八羅漢像以授子由弟使以時修敬遇夫婦生日輒設供以祈年集福并以前所作頌寄之子由以二月二十日生其婦徳陽郡夫人史氏以十一月十七日生是嵗中元日題唐宋八大家文鈔卷一百四十三
