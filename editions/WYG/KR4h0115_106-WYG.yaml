body:
  text: 唐宋八大家文鈔巻九十八明茅坤撰南豐文鈔二書上范資政書按此書曾公既自幸為范文正公所知竊欲出其門又恐文正公或賤其人故為紆徐曲折之言以自通于其門而行文不免蒼莽沉晦如揚帆者之入大海而茫乎其無畔巳若韓昌黎所投執政書其言多悲慨歐公所投執政書其言多婉曲蘇氏父子投執政書其言多曠達而激昻較之子固醒人眼目特倍精爽資政給事夫學者之於道非處其大要之難也至其晦明消長弛張用舍之際而事之有委曲幾微欲其取之於心而無疑發之於行而無擇推而通之則萬變而不窮合而言之則一致而巳是難也難如是故古之人有斷其志雖各合於義極其分以謂備聖人之道則未可者自伊尹伯夷展禽之徒所不免如此而孔子之稱其門人曰徳行文學政事言語亦各殊科彼其材於天下之選可謂盛矣然獨至於顔氏之子乃曰用之則行舍之則藏唯我與爾有是夫是所謂難者乆矣故聖人之所敎人者其晦明消長弛張用舍之際極大之為無窮極小之為至隱雖他經靡不同其意然尤委曲其變於易而重復顯著其義於卦爻彖象繫辭之文欲人之可得諸心而惟所用之也然有易以來自孔子之時以至於今得此者顔氏而巳爾孟氏而巳爾二氏而下孰為得之者歟甚矣其難也若鞏之鄙有志於學常懼乎其明之不遠其力之不强而事之有不得者既自求之又欲交天下之賢以輔而進繇其磨礱灌溉以持其志養其氣者有矣其臨事而忘其自返而綏者豈得已哉則又懼乎䧟溺其心以至於老而無所庶幾也嘗間而論天下之士豪傑不世出之材數百年之間未有盛於斯時也而造於道尤可謂宏且深更天下之事尤可謂詳且博者未有過閣下也故閣下嘗履天下之任矣事之有天下非之君子非之而閣下獨曰是者天下是之君子是之而閣下獨曰非者及其既也君子皆自以為不及天下亦曰范公之守是也則閣下之於道何如哉當其至於事之幾微而講之以易之變化其豈有不盡者耶夫賢乎天下者天下之所慕也況若鞏者哉故願聞議論之詳而觀所以應於萬事者之無窮庶幾自寤以得其所難得者此鞏之心也然閣下之位可謂貴矣士之願附者可謂衆矣使鞏也不自别於其間豈獨非鞏之志哉亦閣下之所賤也故鞏不敢為之不意閣下欲收之而敎焉而辱召之鞏雖自守豈敢固於一耶故進於門下而因自敘其所願與所志以獻左右伏惟賜省察焉上歐陽學士第二書子固感歐公之知又欲歐公併覽睹其所自期待處藴思綴語種種斟酌學士先生執事伏以執事好賢樂善孜孜於道徳以輔時及物為事方今海内未有倫比其文章智謀材力之雄偉挺特信韓文公以來一人而巳某之獲幸於左右非有一日之素賔客之談卒然自進於門下而執事不以衆人待之坐而與之言未嘗不以前古聖人之至徳要道可行於當今之世者使鞏薫蒸漸漬忽不自知其益而及於中庸之門戸受賜甚大且感且喜重念鞏無似見弃於有司環視其中所有頗識涯分故報罷之初釋然不自動豈好大哉誠其材資召取之如此故也道中來見行有操瓢囊負任輓車挈攜老弱而東者曰某土之民避旱暵饑饉與征賦徭役之事將徙占他郡覬得水漿藜糗竊活旦暮行且戚戚懼不克如願晝則奔走在道夜則無所容寄焉若是者所見殆不減百千人因竊自感幸生長四方無事時與此民均被朝廷徳澤涵養而獨不識襏襫耡耒辛苦之事旦暮有衣食之給及一日有文移發召之警則又承藉世徳不蒙矢石備戰守馭車僕馬數千里饋餉自少至于長業乃以詩書文史其蚤暮思念皆道徳之事前世當今之得失誠不能盡解亦庶幾識其一二遠者大者焉今雖羣進於有司與衆人偕下名字不列於薦書不得比數於下士以望主上之休光而尚獲收齒於大賢之門道中來又有鞍馬僕使代其勞以執事於道路至則可力求簞食瓢飲以支旦暮之饑餓比此民綽綽有餘裕是亦足以自慰矣此事屑屑不足為長者言然辱愛幸之深不敢自外於門下故復陳說覬執事知鞏居之何如所深念者執事每曰過吾門者百千人獨於得生為喜及行之日又贈序引不以規而以賞識其愚又嘆嗟其去此鞏得之於衆人尚宜感知已之深懇惻不忘況大賢長者海内所師表其言一出四方以卜其人之輕重某乃得是是宜感戴欣幸倍萬於尋常可知也然此實皆聖賢之志業非自知其材能與力能當之者不宜受此此鞏既夤緣幸知少之所學有分寸合於聖賢之道既而又敢不自力於進修哉日夜克苦不敢有媿於古人之道是亦為報之心也然恨資性短缺學出巳意無有師法覬南方之行李時枉筆墨特賜敎誨不惟增疎賤之光明抑實得以刻心思銘肌骨而佩服矜式焉想惟循誘之力無所不至曲借恩力使終成人材無所愛惜窮陋之迹故不敢望於衆人而獨注心於大賢也徒恨身奉甘㫖不得旦夕於几杖之側禀敎誨竢講畫不勝馳戀懷想之至不宣上蔡學士書從歐陽公與兩司諫書中脫化來慶厯四年五月日南豐曾鞏謹再拜上書諫院學士執事朝廷自更兩府諫官來言事者皆為天下賀得人而已賀之誠當也顧不賀則不可乎鞏嘗靜思天下之事矣以天子而行聖人之道不古聖賢然者否也然而古今難之者盖無異焉邪人以不已利也則怨庸人以巳不及也則忌怨且忌則造飾以行其間人主不寤其然則賢者必疏而殆矣故聖賢之道往往而不行也東漢之末是巳今主上至聖雖有庸人邪人將不入其間然今日兩府諫官之所陳上巳盡白而信邪抑未然邪其巳盡白而信也尚懼其造之未深臨事而差也其未盡白而信也則當屢進而陳之待其盡白而信造之深臨事而不差而後巳也成此美者其不在於諫官乎古之制善矣夫天子之所尊而聽者宰相也然接之有時不得數且久矣惟諫官隨宰相入奏事奏巳宰相退歸中書葢常然矣至於諫官出入言動相綴接早暮相親未聞其當退也如此則事之失得早思之不待暮而以言可也暮思之不待越宿而以言可也不諭則極辨之可也屢進而陳之宜莫若此之詳且實也雖有邪人庸人不得而間焉故曰成此美者其不在於諫官乎今諫官之見也有間矣其不能朝夕上下議亦明矣禁中之與居女婦而巳爾捨是則寺人而巳爾庸人邪人而巳爾其於冥冥之間議論之際豈不易行其間哉如此則鞏見今日兩府諫官之危而未見國家天下之安也度執事亦巳念之矣苟念之則在使諫官侍臣復其職而巳安有不得其職而在其位者歟噫自漢降戾後世士之盛未有若唐太宗也自唐降戾後世士之盛亦未有若今也唐太宗有士之盛而能成治功今有士之盛能行其道則前數百年之弊無不除也否則後數百年之患將又興也可不為深念乎鞏生於遠阨於無衣食以事親今又將集於鄉學當聖賢之時不得抵京師而一言故敢布於執事并書所作通論雜文一編以獻伏惟執事莊士也不拒人之言者也願賜觀覽以其意少施焉鞏之友王安石者文甚古行稱其文雖巳得科名然居今知安石者尚少也彼誠自重不願知於人然如此人古今不常有如今時所急雖無常人千萬不害也顧如安石此不可失也執事倘進之於朝廷其有補於天下亦書其所為文一編進左右庶知鞏之非妄也上歐蔡書委婉周匝可誦公文之佳者鞏少讀唐書及貞觀政要見魏鄭公王珪之徒在太宗左右事之大小無不議論諫諍當時邪人庸人相參者少雖有如封倫李義府輩太宗又能識而疎之故其言無不信聽卒能成貞觀太平刑置不以居成康上未嘗不反復欣慕繼以嗟唶以謂三代君臣不知曾有如此周旋議論否雖臯陶禹稷與唐舜上下謀謨載於書者亦未有若此委曲備具頗意三代唐舜去時遠其時雖有謀議如貞觀間或尚過之而其史不盡存故于今無所聞見是不可知所不敢臆定繇漢以降至于陳隋復繇高宗以降至于五代其史甚完其君臣無如此謀議決也故其治皆出貞觀下理勢然爾竊自恨不幸不生于其時親見其事歌頌推說以飽足其心又恨不得陞降進退於其間與之往復議也自長以來則好問當世事所見聞士大夫不少人人惟一以苟且畏愼陰拱默處為故未嘗有一人見當世事僅計謀有未可立效者其誰肯奮然迎為之慮而巳當之邪則又謂所欣慕者巳矣類千百年間不可復及昨者天子赫然獨見於萬世之表既更兩府復引二公為諫官見所條下及四方人所傳道知二公在上左右為上論治亂得失羣臣忠邪小大無所隱不為錙銖計惜以避怨忌毁罵讒搆之患竊又奮起以謂從古以來有言責者自任其事未知有如此周詳悃至議論未知有如此之多者否雖鄭公王珪又能過是耶今雖事不合亦足暴之萬世而使邪者懼懦者有所樹矣況合乎否未可必也不知所謂數百千年巳矣不可復有者今幸遇而見之其心歡喜震動不可比說日夜庶幾雖有邪人庸人如封李者上必斥而遠之惟二公之聽致今日之治居貞觀之上令鞏小者得歌頌推說以飽足其心大者得出於其間吐片言半辭以託名於千萬世是所望於古者不負且令後世聞今之盛疑唐舜三代不及遠甚與今之疑唐太宗時無異雖然亦未嘗不憂一日有於冥冥之中議論之際而行謗者使二公之道未盡用故前以書獻二公先舉是為言巳而果然二公相次出兩府亦更改而怨忌毁罵讒搆之患一日俱發翕翕萬狀至於乘女子之隙造非常之謗而欲加之天下之大賢不顧四方人議論不畏天地鬼神之臨巳公然欺誣駭天下之耳目令人感憤痛切廢食與寢不知所為噫二公之不幸實疾􅈡蹙額之民之不幸也雖然君子之於道也既得諸巳汲汲焉而務施之於外汲汲焉務施之於外在我者也務施之外而有可有不可在彼者也在我者姑肆力焉至於其極而後巳也在彼者則不可必得吾志焉然君子不以必得之難而廢其肆力者故孔子之所說而聘者七十國而孟子亦區區於梁齊滕邾之間為孔子者聘六十九國尚未巳而孟子亦之梁之齊二大國不可則猶俯而與邾滕之君謀其去齊也遲遲而後出晝其言曰王庶幾改之則必召予如用予則豈惟齊民安天下之民舉安觀其心若是豈以一不合而止哉誠不若是亦無以為孔孟今二公固一不合者也其心豈不曰天子庶幾召我而用之如孟子之所云乎肆力焉於其所在我者而任其所在彼者不以必得之難而巳莫大斯時矣況今天子仁恕聰明求治之心未嘗怠天下一歸四方諸矦承號令奔走之不暇二公之言如朝得於上則夕被於四海夕得於上則不越宿而被於四海豈與聘七十國遊梁齊邾滕之區區艱難比邪姑有待而巳矣非獨鞏之望乃天下之望而二公所宜自任者也豈不謂然乎感憤之不巳謹成憶昨詩一篇雅說三篇麤道其意後二篇並他事因亦寫寄此皆人所厭聞不宜為二公道然欲啓告覺悟天下之可告者使明知二公志次亦使邪者庸者見之知世有斷然自守者不從巳於邪則又庶幾於天子視聽有所開益使二公之道行則天下之嗷嗷者舉被其賜是亦為天下計不獨於二公發也則二公之道何如哉嘗竊思更貢舉法責之累日於學使學者不待乎按天下之籍而盛須土著以待舉行悖者不待籍以進此歴代之思慮所未及善乎莫與為善也故詩中善學尤具伏惟賜省察焉唐荆川云敘論紆徐有味福州上執政書子固以宦遊閩徼不得養母本風雅以為陳情之案而其反覆詠歎藹然盛世之音此子固之文所以上擬劉向而非近代所及也鞏頓􅈡再拜上書某官竊以先王之迹去今逺矣其可槩見者尚存於詩詩存先王養士之法所以撫循待遇之者恩意可謂備矣故其長育天下之材使之成就則如蘿蒿之在大陵無有不遂其賔而接之出於懇誠則如鹿鳴之相呼召其聲音非自外至也其燕之則有飲食之具樂之則有琴瑟之音將其厚意則有幣帛筐篚之贈要其大旨則未嘗不在於得其歡心其人材既衆列于庶位則如棫樸之盛得而薪之其以為使臣則寵其徃也必以禮樂使其光華皇皇於遠近勞其來也則既知其功又本其情而敘其勤其以為將率則於其行也既送遣之又識薇蕨之始生而恐其歸時之晩及其還也既休息之又追念其悄悄之憂而及於僕夫之瘁當此之時后妃之於内助又知臣下之勤勞其憂思之深至於山脊石砠僕馬之間而志意之一至於雖采巻耳而心不在焉葢先王之世待天下士其勤且詳如此故稱周之士也貴又稱周之士也肆而天保亦稱君能下下以成其政臣能歸美以報其上其君臣上下相與之際如此可謂至矣所謂必本其情而敘其勤者在四牡之三章曰王事靡盬不遑將父四章曰王事靡盬不遑將母而其卒章則曰豈不懷歸是用作謌將母來諗釋者以謂諗告也君勞使臣叙述其情曰豈不誠思歸乎故作此詩之謌以養父母之志來告其君也既休息之而又追敘其情如此繇是觀之上之所以接下未嘗不恐失其養父母之心下之所以事上有養父母之心未嘗不以告也其勞使臣之辭則然而推至於戍役之人亦勞之以王事靡盬憂我父母則先王之政即人之心莫大於此也及其後世或任使不均或苦於征役而不得養其父母則有北山之感鴇羽之嗟或行役不巳而父母兄弟離散則有陟岵之思詩人皆推其意見於國風所謂發乎情止乎禮義者也伏惟吾君有出於數千載之大志方興先王之治以上繼三代吾相於時皆同徳合謀則所以待天下之士者豈易於古士之出於是時者豈有不得盡其志邪鞏獨何人幸遇兹日鞏少之時尚不敢飾其固陋之質以干當世之用今齒髪日衰聰明日耗令其至愚固不敢有徼進之心況其少有知邪轉走五郡葢十年矣未嘗敢有半言片辭求去邦域之任而冀陪朝廷之儀此鞏之所以自處竊計巳在聽察之日久矣今輒以其區區之腹心敢布於下執事者誠以鞏年六十老母年八十有八老母寓食京師而鞏守閩越仲弟守南越二越者天下之遠處也於著令有一人仕於此二邦者同居之親當遠仕者皆得不行鞏固不敢為不肖之身求自比於是也顧以道里之阻既不可御老母而南則非獨省晨昏承顔色不得効其犬馬之愚至於書問徃還葢以萬里非累月踰時不通此白首之母子所以義不可以苟安恩不可以苟止者也方去歲之春有此邦之命鞏敢以情告於朝而詔報不許屬閩有盗賊之事因不敢繼請及去秋到職閩之餘盜或數十百為曹伍者徃徃蟻聚於山谷桀黠能動衆為魁首者又以十數相望於州縣閩之室閭莫能寧而遠近聞者亦莫不疑且駭也州屬邑又有出於饑旱之後鞏於此時又不敢以私計自陳其於宼孽屬前日之屢敗士氣既奪而吏亦無可屬者其於經營既不敢以輕動迫之又不敢以少縱玩之一則諭以招納一則戒以剪除既而其悔悟者自相執拘以歸其不變者亦為士吏之所係獲其魁首則或縻而致之或殱而去之自冬至春遠近皆定亭無枹皷之警里有室家之樂士氣始奮而人和始洽至於風雨時若田出自倍今野行海渉不待朋儔市粟而來價減什七此皆吾君吾相至仁元澤覆冒所及故宼旱之餘曾未朞歳既安且富至於如此鞏與斯民與䝉其幸方地數千里既無一事繫官於此又巳彌年則可以將母之心告於吾君吾相未有易於此時也伏惟推古之所以待士之詳思勞歸之詩本士大夫之情而反於其親逮之以即乎人心之政或還之闕下或處以閑曹或引之近畿屬以一郡使得諧其就養之心慰其高年之母則仁治之行豈獨昏愚得蒙賜於今日其流風餘法傳之永久後世之士且將賴此其無北山之怨鴇羽之譏陟岵之歎葢行之甚易為徳於士類者甚廣惟留意而察之不宣唐荆川曰南豐之文純出於道古故雖作書亦然葢其體裁如此也謝杜相公書感慨深湛雍容典則有道者之文也豈淺儇者所及伏念昔者方鞏之得禍罸於河濵去其家四千里之遠南嚮而望迅河大淮埭堰湖江天下之險為其阻阨而以孤獨之身抱不測之疾㷀㷀路隅無攀緣之親一見之舊以為之託又無至行上之可以感人利勢下之可以動俗惟先人之醫藥與凡䘮之所急不知所以為頼而旅襯之重大懼無以歸者明公獨於此時閔閔勤勤營救䕶視親屈車騎臨於河上使其方先人之病得一意於左右而醫藥之有與謀至其既孤無外事之奪其哀而毫髮之私無有不如其欲莫大之䘮得以卒致而南其為存全之恩過越之義如此竊惟明公相天下之道唫訟推說者窮萬世非如曲士汲汲一節之善而位之極年之高天子不敢煩以政豈鄉閭新學危苦之情藂細之事宜以徹於視聽而蒙省察然明公存先人之故而所以盡於鞏之徳如此葢明公雖不可起而寄天下之政而愛育天下之人材不忍一夫失其所之道出於自然推而行之不以進退而鞏獨幸遇明公於此時也在䘮之日不敢以世俗淺意越禮進謝䘮除又惟大恩之不可名空言之不足陳徘徊迄今一書之未進顧其慚生於心無須臾廢也伏惟明公終賜亮察夫明公存天下之義而無有所私則鞏之所以報於明公者亦惟天下之義而巳誓心則然未敢謂能也唐宋八大家文抄巻九十八
