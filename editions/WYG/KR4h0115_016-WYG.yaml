body:
  text: 唐宋八大家文鈔巻十六明茅坤撰昌黎文鈔十六哀辭祭文行狀獨孤申叔哀辭悲痛特甚詩之可以怨者也衆萬之生誰非天耶明昭昏䝉誰使然耶行何為而怒居何故而憐耶胡喜厚其所可薄而恒不足於賢耶將下民之好惡與彼蒼懸耶抑蒼茫無端而蹔寓其間耶死者無知吾為子慟而已矣如有知也子其自知之矣濯濯其英曄曄其光如聞其聲如見其容烏虖逺矣何日而㤀歐陽生哀辭小序極工多悽愴嗚咽之㫖而哀辭特爾雅歐陽詹世居閩越自詹已上皆為閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上初故宰相常衮為福建諸州觀察使治其地衮以文辭進有名於時又作大官臨蒞其民鄉縣小民有能誦書作文辭者衮親與之為客主之禮觀游宴饗必召與之時未㡬皆化翕然詹于時獨秀出衮加敬愛諸生皆推服閩越之人舉進士由詹始建中貞元間余就食江南未接人事往往聞詹名閭巷間詹之稱於江南也乆貞元三年余始至京師舉進士聞詹名尤甚八年春遂與詹文辭同考試登第始相識自後詹歸閩中余或在京師他處不見詹乆者惟詹歸閩中時為然其他時與詹離率不厯歳移時則必合合必兩㤀其所趨乆然後去故余與詹相知為深詹事父母盡孝道仁於妻子於朋友義以誠氣醇以方容貌嶷嶷然其燕私善謔以和其文章切深喜往復善自道讀其書知其於慈孝最隆也十五年冬余以徐州從事朝正於京師詹為國子監四門助教將率其徒伏闕下舉余為博士㑹監有獄不果上觀其心有益於余將㤀其身之賤而為之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得于是而歸為父母榮也雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟詹雖未得位其名聲流于人人其徳行信于朋友雖詹與其父母皆可無憾也詹之事業文章李翺既為之傳故作哀辭以舒余哀以傳於後以遺其父母而解其悲哀以卒詹志云求仕與友兮逺違其鄉父母之命兮子奉以行友則既獲兮禄實不豐以志為養兮何有牛羊事實既修兮名譽又光父母忻忻兮常若在旁命雖云短兮其存者長終要必死兮願不永傷友朋親視兮藥物甚良飲食孔時兮所欲無妨夀命不齊兮人道之常在側與逺兮非有不同山川阻深兮魂魄流行祀祭則及兮勿謂不通哭泣無益兮抑哀自强推生知死兮以慰孝誠嗚呼哀哉兮是亦難忘愈性不喜書自為此文惟自書兩通其一通遺清河崔羣羣與余皆歐陽生友也哀生之不得位而死哭之過時而悲其一通今書以遺彭城劉君伉君喜古文以吾所為合於古詣吾廬而來請者入九至而其色不怨志益堅凡愈之為此文盖哀歐陽生之不顯榮於前又懼其泯滅於後也今劉君之請未必知歐陽生其志在古文耳雖然愈之為古文豈獨取其句讀不類於今者耶思古人而不得見學古道則欲兼通其辭通其辭者本志乎古道者也古之道不茍譽毁于人劉君好其辭則其知歐陽生也無惑焉祭田横墓文借田横發自己一生悲感之意貞元十一年九月愈如東京道出田横墓下感横義髙能得士因取酒以祭為文而弔之其辭曰事有曠百世而相感者余不自知其何心非今世之所稀孰為使余歔欷而不可禁余既博觀乎天下曷有庻㡬乎夫子之所為死者不復生嗟余去此其從誰當秦氏之敗亂得一士而可王何五百人之擾擾而不能脱夫子於劍鋩抑所寳之非賢亦天命之有常昔闕里之多士孔聖亦云其遑遑茍余行之不迷雖顛沛其何傷自古死者非一夫子至今有耿光跽陳辭而薦酒魂髣髴而來享祭鱷魚文詞嚴義正看之便足動鬼神維年月日潮州刺史韓愈使軍事衙推秦濟以羊一猪一投惡溪之潭水以與鱷魚食而告之曰昔先王既有天下列山澤罔繩擉刄以除蟲蛇惡物為民害者驅而出之四海之外及後王德薄不能逺有則江漢之間尚皆棄之以與蠻夷楚越况潮嶺海之間去京師萬里哉鱷魚之涵淹卵育於此亦固其所今天子嗣唐位神聖慈武四海之外六合之内皆撫而有之况禹跡所揜揚州之近地刺史縣令之所治出貢賦以供天地宗廟百神之祀之壤者哉鱷魚其不可與刺史雜處此土也刺史受天子命守此土治此民而鱷魚睅然不安溪潭㨿處食民畜熊豕鹿麞以肥其身以種其子孫與刺史亢拒争為長雄刺史雖駑弱亦安肯為鱷魚低首下心伈伈睍睍為民吏羞以偷活於此耶且承天子命以來為吏固其勢不得不與鱷魚辯鱷魚有知其聴刺史言潮之州大海在其南鯨鵬之大蝦蟹之細無不容歸以生以食鱷魚朝發而夕至也今與鱷魚約盡三日其率醜類南徙於海以避天子之命吏三日不能至五日五日不能至七日七日不能是終不肯徙也是不有刺史聴從其言也不然則是鱷魚㝠頑不靈刺史雖有言不聞不知也夫傲天子之命吏不聴其言不徙以避之與冥頑不靈而為民物害者皆可殺刺史則選材技吏民操强弓毒矢以與鱷魚從事必盡殺乃止其無悔祭栁子厚文昌黎誌子厚墓相知之誼似不如祭文維年月日韓愈謹以清酌庻羞之奠祭於亡友栁子厚之靈嗟嗟子厚而至然耶自古莫不然我又何嗟人之生世如夢一覺其間利害竟亦何校當其夢時有樂有悲及其既覺豈足追惟凡物之生不願為材犧罇青黄乃木之災子之中棄天脱馽羈玊珮瓊琚大放厥辭冨貴無能磨滅誰記子之自著表表愈偉不善為斵血指汗顏巧匠旁觀縮手袖閒子之文章而不用世乃令吾徒掌帝之制子之視人自以無前一斥不復羣飛刺天嗟嗟子厚今也則亡臨絶之音一何琅琅徧告諸友以寄厥子不鄙謂余亦託以死凡今之交觀勢厚薄余豈可保能承子託非我知子子實命我猶有鬼神寧敢遺墮念子永歸無復來期設祭棺前矢心以辭嗚呼哀哉尚饗祭河南張員外文公之奇崛戰鬬神鬼處令人神眩維年月日彰義軍行軍司馬守太子右庻子兼御史中丞韓愈謹遣某乙以庻羞清酌之奠祭於亡友故河南縣令張十二員外之靈貞元十九君為御史余以無能同詔並跱君徳渾剛標髙揭已有不吾如唾猶泥滓余戇而狂年未三紀乗氣加人無挾自恃彼婉孌者實憚吾曹側肩帖耳有舌如刀我落陽山以尹鼯猱君飄臨武山林之牢歳弊寒凶雪虐風饕顛於馬下我泗君咷夜息南山同卧一席守𨽻防夫觝頂交跖洞庭漫汗粘天無壁風濤相豗中作霹靂追程盲進颿船箭激南上湘水屈氏所沈二妃行迷淚蹤染林山哀浦思鳥獸呌音余唱君和百篇在唫君止于縣我又南踰把􅊦相飲後期有無期宿界上一又相語自别㡬時遽變寒暑枕臂欹眠加余以股僕來告言虎入廐處無敢驚逐以我􅐒去君云是物不駿於乗虎取而往來寅其徴我預在此與君俱膺猛獸果信惡禱而凴余出嶺中君竢州下偕掾江陵非余望者郴山奇變其水清寫泊沙倚石有遌無捨衡陽放酒熊咆虎嗥不存令章罰籌蝟毛委舟湘流往觀南嶽雲壁潭潭穹林攸擢避風太湖七日鹿角鈎登大鮎怒頰豕豞臠盤炙酒羣奴餘啄走官階下首下凥髙下馬伏塗從事是遭予徴博士君以使已相見京師過願之始分教東生君掾雍首兩都相望於别何有解手背靣遂十一年君出我入如相避然生濶死休吞不復宣刑官屬郎引章訐奪權臣不愛南昌是斡明條謹獄氓獠户歌用遷灃浦為人受瘥還家東都起令河南屈拜後生憤所不堪屢以正免身伸事蹇竟死不昇孰勸為善丞相南討余辱司馬議兵大梁走出洛下哭不凴棺奠不親斚不撫其子𦵏不送野望君傷懐有隕如瀉銘君之績納石壤中爰及祖考紀徳事功外著後世鬼神與通君其奚憾不余鑒衷嗚呼哀哉尚饗祭十二郎文通篇情意刺骨無限悽切祭文中千年絶調年月日季父愈聞汝喪之七日乃能銜哀致誠使建中逺具時羞之奠告汝十二郎之靈嗚呼吾少孤及長不省所怙惟兄嫂是依中年兄没南方吾與汝俱幼從嫂歸𦵏河陽既又與汝就食江南零丁孤苦未嘗一日相離也吾上有三兄皆不幸早世承先人後者在孫惟汝在子惟吾兩世一身形單影隻嫂常撫汝指吾而言曰韓氏兩世惟此而已汝時尤小當不復記憶吾時雖能記憶亦未知其言之悲也吾年十九始來京城其後四年而歸視汝又四年吾往河陽省墳墓遇汝從嫂喪來𦵏又二年吾佐董丞相於汴州汝來省吾止一歳請歸取其孥明年丞相薨吾去汴州汝不果來是年吾佐戎徐州使取汝者始行吾又罷去汝又不果來吾念汝從於東東亦客也不可以乆圖乆逺者莫如西歸將成家而致汝嗚呼孰謂汝遽去吾而没乎吾與汝俱少年以為雖暫相别終當乆相與處故捨汝而旅食京師以求斗斛之禄誠知其如此雖萬乗之公相吾不以一日輟汝而就也去年孟東野往吾書與汝曰吾年未四十而視茫茫而髪蒼蒼而齒牙動搖念諸父與諸兄皆康强而早世如吾之衰者其能乆存乎吾不可去汝不肯來恐旦暮死而汝抱無涯之戚也孰謂少者没而長者存强者夭而病者全乎嗚呼其信然耶其夢耶其傳之非其真耶信也吾兄之盛徳而夭其嗣乎汝之純明而不克䝉其澤乎少者强者而夭没長者衰者而存全乎未可以為信也夢也傳之非其真也東野之書耿蘭之報何為而在吾側也嗚呼其信然矣吾兄之盛徳而夭其嗣矣汝之純明冝業其家者不克䝉其澤矣所謂天者誠難測而神者誠難明矣所謂理者不可推而夀者不可知矣雖然吾自今年來蒼蒼者或化而為白矣動搖者或脱而落矣毛血日益衰志氣日益㣲㡬何不從汝而死也死而有知其幾何離其無知悲不㡬時而不悲者無窮期矣汝之子始十歳吾之子始五歳少而强者不可保如此孩提者又可冀其成立耶嗚呼哀哉嗚呼哀哉汝去年書云比得軟脚病往往而劇吾曰是疾也江南之人常常有之未始以為憂也嗚呼其竟以此而殞其生乎抑别有疾而至斯乎汝之書六月十七日也東野云汝殁以六月二日耿蘭之報無月日盖東野之使者不知問家人以月日如耿蘭之報不知當言月日東野與吾書乃問使者使者妄稱以應之耳其然乎其不然乎今吾使建中祭汝弔汝之孤與汝之乳母彼有食可守以待終喪則待終喪而取以來如不能守以終喪則遂取以來其餘奴婢並令守汝喪吾力能改𦵏終𦵏汝於先人之兆然後惟其所願嗚呼汝病吾不知時汝殁吾不知日生不能相養以共居殁不得撫汝以盡哀歛不凴其棺窆不臨其穴吾行負神明而使汝夭不孝不慈而不得與汝相養以生相守以死一在天之涯一在地之角生而影不與吾形相依死而魂不與吾夢相接吾實為之其又何尤彼蒼者天曷其有極自今以往吾其無意於人世矣當求數頃之田於伊潁之上以待餘年教吾子與汝子幸其成長吾女與汝女待其嫁如此而已嗚呼言有窮而情不可終汝其知也耶其不知也耶嗚呼哀哉尚饗贈太傅董公行狀㸃次情事如畫而語亦壯公諱晉字混成河中虞鄉萬歳里人少以明經上第宣皇帝居原州公在原州宰相以公善為文任翰林之選聞召見拜祕書省校書郎入翰林為學士三年出入左右天子以為謹愿賜緋魚袋累陞為衛尉寺丞出翰林以疾辭拜汾州司馬崔圓為揚州詔以公為圓節度判官攝殿中侍御史以軍事如京師朝天子識之拜殿中侍御史内供奉由殿中為侍御史入尚書省為主客員外郎由主客為祠部郎中先皇帝時兵部侍郎李涵如囘紇立可敦詔公兼侍御史賜紫金魚袋為涵判官囘紇之人來曰唐之復土疆取囘紇力焉約我為市馬既入而歸我賄不足我於使人乎取之涵懼不敢對視公公與之言曰我之復土疆爾信有力焉吾非無馬而與爾為市為賜不既多乎爾之馬歳至吾數皮而歸資邊吏請致詰也天子念爾有勞故下詔禁侵犯諸戎畏我大國之爾與也莫敢校焉爾之父子寧而畜馬蕃者非我誰使之於是其衆皆環公拜既又相率南靣序拜皆兩舉手曰不敢復有意大國自囘紇歸拜司勲郎中未嘗言囘紇之事遷祕書少監厯太府太常二寺亞卿為左金吾衛將軍今上即位以大行皇帝山陵出財賦拜太府卿由太府為左散騎常侍兼御史中丞知臺事三司使選擢材俊有威風始公為金吾未盡一月拜太府九日又為中丞朝夕入議事於是宰相請以公為華州刺史拜華州刺史潼關防禦鎮國軍使朱泚之亂加御史大夫詔至于上所又拜國子祭酒兼御史大夫宣慰恒州於是朱滔自范陽以囘紇之師助亂人大恐公既至恒州恒州即日奉詔出兵與滔戰大破走之還至河中李懐光反上如梁州懐光所率皆朔方兵公知其謀與朱泚合也患之造懐光言曰公之功天下無與敵公之過未有聞於人某至上所言公之情上寛明將無不赦宥焉乃能為朱泚臣乎彼為臣而背其君茍得志於公何有且公既為太尉矣彼雖寵公何以加此彼不能事君能以臣事公乎公能事彼而有不能事君乎彼知天下之怒朝夕戮死者也故求其同罪而與之比公何所利焉公之敵彼有餘力不如明告之絶而起兵襲取之清宫而迎天子庻人服而請罪有司雖有大過猶將揜焉如公則誰敢議語已懐光拜曰天賜公活懐光之命喜且泣公亦泣則又語其將卒如語懐光者將卒呼曰天賜公活吾三軍之命拜且泣公亦泣故懐光卒不與朱泚當是時懐光㡬不反公氣仁語若不能出口及當事乃更踈亮捷給其詞忠其容貌温然故有言於人無不信明年上復京師拜左金吾衛大將軍由大金吾為尚書左丞又為太常卿由太常拜門下侍郎平章事在宰相位凡五年所奏於上前者皆二帝三王之道由秦漢以降未嘗言退歸未嘗言所言於上者於人子弟有私問者公曰宰相所職係天下天下安危宰相之能與否可見欲知宰相之能與否如此視之其可凡所謀議於上前者不足道也故其事卒不聞以疾病辭於上前者不記退以表辭者八方許之拜禮部尚書制曰事上盡大臣之節又曰一心奉公於是天下知公之有言於上也初公為宰相時五月朔㑹朝天子在位公卿百執事在廷侍中贊百僚賀中書侍郎平章事竇叅攝中書令當傳詔疾作不能事凡將大朝㑹當事者既受命皆先日習儀于時未有詔公卿相顧公逡巡進北靣言曰攝中書令臣某病不能事臣請代某事於是南靣宣致詔詞事已復位進退甚詳為禮部四年拜兵部尚書入謝上語問日晏復有入謝者上喜曰董某疾且損矣出語人曰董公且復相既二日拜東都留守判東都尚書省事充東都畿汝州都防禦使兼御史大夫仍為兵部尚書由留守未盡五月拜檢校尚書左僕射同中書門下平章事汴州刺史宣武軍節度副大使知節度事管内支度營田汴宋亳潁等州觀察處置等使汴州自大厯來多兵事劉𤣥佐益其師至十萬𤣥佐死子士寧代之畋遊無度其將李萬榮乗其畋也遂之萬榮為節度一年其將韓惟清張彦林作亂求殺萬榮不剋三年萬榮病風昬不知事其子乃復欲為士寧之故監軍使俱文珍與其將鄧惟恭執之歸京師而萬榮死詔未至惟恭權軍事公既受命遂行劉宗經韋𢎞景韓愈實從不以兵衛及鄭州逆者不至鄭州人為公懼或勸公止以待有自汴州出者言於公曰不可入公不對遂行宿圃田明日食中牟逆者至宿八角明日惟恭及諸將至遂逆以入及郛三軍緣道讙聲庻人壯者呼老者泣婦人啼遂入以居初𤣥佐死吳湊代之及鞏聞亂歸士寧萬榮皆自為而後命軍士將以為常故惟恭亦有志以公之速也不及謀遂出逆既而私其人觀公之所為以告曰公無為惟恭喜知公之無害已也委心焉進見公者退皆曰公仁人也聞公言者皆曰公仁人也環以相告故大和初𤣥佐遇軍士厚士寧懼復加厚焉至萬榮如士寧志及韓張亂又加厚以懐之至于惟恭每加厚焉故士卒驕不能禦則置腹心之士幕于公庭廡下挾弓執劍以須日出而入前者去日入而出後者至寒暑時至則加勞賜酒肉公至之明日皆罷之貞元十二年七月也八月上命汝州刺史陸長源為御史大夫行軍司馬楊凝自左司郎中為檢校吏部郎中觀察判官杜倫自前殿中侍御史為檢校工部員外郎節度判官孟叔度自殿中侍御史為檢校金部員外郎支度營田判官職事脩人俗化嘉禾生白鵲集蒼烏來巢嘉𤓰同蔕聨實四方至者歸以告其帥小大威懐有所疑輙使來問有交惡者公與平之累請朝不許及有疾又請之且曰人心易動軍旅多虞及臣之生計不先定至於他日事或難期猶不許十五年二月三日薨于位上三日罷朝贈太傳使吏部員外郎楊於陵來祭弔其子贈布帛米有加公之將薨也命其子三日歛既歛而行於行之四日汴州亂故君子以公為知人公之薨也汴州人歌之曰濁流洋洋有闢其郛闐道讙呼公來之初今公之歸公在喪車又歌曰公既來止東人以完今公没矣人誰與安始公為華州亦有惠愛人思之公居處恭無妾媵不飲酒不謟笑好惡無所偏與人交泊如也未嘗言兵有問者曰吾志於教化享年七十六階累陞為金紫光禄大夫勲累陞為上柱國爵累陞為隴西郡開國公娶南陽張氏夫人後娶京兆韋氏夫人皆先公終四子全道溪全素澥全道全素皆上所賜名全道為秘書省著作郎溪為秘書省秘書郎全素為大理評事澥為太常寺太祝皆善士有學行謹具厯官行事狀伏請牒考功并牒太常議所諡牒史館請垂編錄謹狀唐荆川曰此文叙事全是學左氏然董公文頓挫權公文調匀各一體唐宋八大家文鈔巻十六
