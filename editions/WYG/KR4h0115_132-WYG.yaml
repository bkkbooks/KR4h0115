body:
  text: 唐宋八大家文鈔巻一百二十明茅坤撰東坡文鈔四劄子議學校貢舉劄子縂欲今法得所行之實不必别變而論自明確准敕講求學挍貢舉利害令臣等各具議狀聞奏者右臣伏以得人之道在於知人知人之法在於責實使君相有知人之才朝廷有責實之政則胥史皂𨽻未嘗無人而况於學挍貢舉乎雖因今之法臣以爲有餘使君相無知人之才朝廷無責實之政則公卿侍從猶患無人况學挍貢舉乎雖復古之制臣以爲不足矣夫時有可否物有廢興方其所安雖暴君不能廢及其既厭雖聖人不能復故風俗之變法制隨之譬如江河之徙移順其所欲行而治之則易爲功彊其所不欲而復之則難爲力使三代聖人復生於今其選舉養才亦必有道矣何必由學且天下固嘗立學矣慶厯之間以爲太平可待至於今日惟有空名僅存今陛下必欲求德行道藝之士責九年大成之業則將變今之禮易今之俗又當發民力以治宮室歛民財以養游士百里之内置官立師獄訟聽於是軍旅謀于是又當以時簡不率教者屏之逺方終身不齒則無乃徒爲紛亂以患苦天下耶若乃無大變改而望有益於時則與慶厯之際何異故臣以謂今之學者特可因循舊制使先王之舊物不廢於吾世足矣至於貢舉之法行之百年治亂盛衰初不由此陛下視祖宗之世貢舉之法與今孰爲精言語文章與今孰爲優所得文武長才與今孰爲多天下之士與今孰爲辯較此四者而短長之議決矣今議者所變改不過數端或曰鄉舉徳行而畧文章或曰專取䇿論而罷詩賦或欲舉唐室故事兼採譽望而罷封彌或欲罷經生朴學不用貼墨而考大義此數者皆知其一不知其二者也臣請歴言之夫欲興德行在於君人者修身以格物審好惡以表俗孟子所謂君仁莫不仁君義莫不義君之所向天下趨焉若欲設科立名以取之則是教天下相率而爲僞也上以孝取人則勇者割股怯者廬墓上以㢘取人則弊車羸馬惡衣菲食凡可以中上意無所不至矣德行之弊一至於此乎自文章而言之則䇿論爲有用詩賦爲無益自政事言之則詩賦䇿論均爲無用矣雖知其無用然自祖宗以來莫之廢者以爲設法取士不過如此也豈獨吾祖宗自古堯舜亦然書曰敷奏以言明試以功自古堯舜以來進人何嘗不以言試人何嘗不以功乎議者必欲以䇿論定賢愚能否臣請有以質之近世士大夫文章華靡者莫如楊億使楊億尚在則忠清鯁亮之士也豈得以華靡少之通經學古莫如孫復石介使孫復石介尚在則迂濶矯誕之士也又可施之於政事之間乎自唐至今以詩賦爲名臣者不可勝數何負於天下而必欲廢之近世士人纂類經史綴緝時務謂之䇿括待問條目捜抉略盡臨時剽竊竄易首尾以眩有司有司莫能辨也且其爲文也無規矩凖繩故學之易成無聲病對偶故考之難精以易學之士付難考之吏其弊有甚於詩賦者矣唐之通牓故是弊法雖有以名取人厭伏衆論之美亦有賄賂公行權要請託之害一使恩去王室權歸私門降及中葉結爲朋黨之論通牓取人又豈足尚哉諸科舉人多出三路能文者既巳變而爲進士曉義者又皆去以爲明經其餘皆朴魯不化者也至於人才則有定分施之有政能否自彰今進士日夜治經傳子史貫穿馳騖可謂博矣至於臨政曷嘗用其一二顧視舊學巳爲虚器而欲使此等分别注疏粗識大義而望其才能增長亦巳疎矣臣故曰此數者皆知其一而不知其二也特願陛下留意其逺者大者必欲登俊良黜庸囬總覧衆才經略世務則在陛下與二三大臣下至諸路職司與良二千石耳區區之法何預焉然臣竊有私憂過計者敢不以告昔王衍好老莊天下皆師之風俗陵夷以至南渡王縉好佛捨人事而脩異教大厯之政至今爲笑故孔子罕言命則爲知者少也子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫性命之説自子貢不得聞而今之學者耻不言性命此可信也哉今士大夫至以佛老爲聖人粥書於市者非莊老之書不售也讀其文浩然無當而不可窮觀其貌超然無著而不可挹此豈真能然哉盖中人之性安於放而樂於誕耳使天下之士能如莊周齊生死一毁譽輕富貴安貧賤則人主之名器爵禄所以礪世磨鈍者廢矣陛下亦安用之而况其實不能而竊取其言以欺世者哉臣願陛下明敕有司試之以法言取之以實學博通經術者雖朴不廢稍渉浮議者雖工必黜則風俗稍厚學術近正庶㡬得忠實之士不至蹈衰季之風則天下幸甚論邊將隱匿敗亡憲司體量不實劄子借進讀寳訓陳西戎失事不以實聞忠直多矣臣近以目昏臂痛堅乞一郡盖亦自知受性剛褊黒白太明難以處衆伏䝉聖慈降詔不許兩遣使者存問慰安天恩深厚淪入骨髓臣謂此恩當以死報不當更計身之安危故復起就職而職事清閒未知死所每因進讀之間事有切於今日者輒復進言庶補萬一昨日所讀寳訓有云淳化二年上謂侍臣諸州牧監馬多痩死盖養飼失時枉致病斃近令取十數槽寘殿庭下視其芻秣教之養療庶革此弊臣因進言馬所以病盖將吏不職致圉人盗減芻粟且不䘏其饑飽勞逸故也馬不能言無由申訴故太宗至仁深哀憐之寘之殿庭親加督視民之於馬輕重不同若官吏不得其人人雖能言上下隔絶不能自訴無異於馬馬之饑痩勞苦則有斃踣奔逸之憂民之困窮無聊則有溝壑盗賊之患然而四海之衆非如養馬可以寘之殿庭惟當廣任忠賢以爲耳目若忠賢疎逺謟佞在傍則民之疾苦無由上達秦二世時陳勝呉廣巳屠三州殺李由而二世不知陳後主時隋兵巳渡江而後主不知此皆昏主不足道如唐明皇親致太平可謂明主而張九齡死李林甫楊國忠用事鮮于仲通以二十萬人没于雲南不奏一人反更告㨗明皇不問以至上下相䝉禄山之亂兵巳過河而明皇不知也今朝廷雖無此事然臣聞去歳夏賊犯鎮戎所殺掠不可勝數或云至萬餘人而邊將乃奏云野無所掠其後朝廷訪聞委提刑司體量而提刑孫路止奏十餘人乞朝廷先賜放罪然後體量實數至今遷延二年終未結絶聞奏凡死事之家官所當䘏若隱而不奏則生死銜寃何以使人此豈小事而路爲耳目之司既不隨事奏聞朝廷既行䝉蔽又乞放罪遷延侮玩一至于此臣謂此風漸不可長馴致其患何所不有此臣之所深憂也臣非不知陛下必巳厭臣之多言左右必巳厭臣之多事然受恩深重不敢自同衆人若以此獲罪亦無所憾取進止論髙麗買書利害劄子深憂逺識之言臣伏見髙麗人使每一次入貢朝廷及淮浙兩路賜予餽送燕勞之費約十餘萬貫而修飾亭館騷動行市調發人船之費不在焉除官吏得少餽遺外了無絲毫之利而有五害所得貢獻皆是玩好無用之物而所費皆是帑廪之實民之膏血此一害也所至差借人馬什物攪撓行市修飾亭館民力暗有賠填此二害也髙麗所得賜予若不分遺契丹則契丹安肯聽其來貢顯是借寇兵而資盗糧此三害也髙麗名爲慕義來朝其實爲利度其本心終必爲北蕃用何也彼足以制其死命而我不能故也今使者所至圖畫山川形勝窺測虚實豈復有善意哉此四害也慶厯中契丹欲渝盟先以増置塘泊爲中國之曲今万招來其與國使頻歳入貢其曲甚於塘泊幸今契丹恭順不敢生事萬一異日有桀黠之勢以此藉口不知朝廷何以答之此五害也臣心知此五害所以熈寧中通判杭州日因其餽送書中不稱本朝正朔郤退其物待其改書稱用年號然後受之仍催促進發不令住滯及近歲出知杭州却其所進金塔不爲奏聞及畫一處置沿途接待事件不令過當仍奏乞編配狡啇猾僧并乞依祖宗編敕杭明州並不許發船徃髙麗違者徒二年没入財貨充賞并乞刪除元豐八年九月内創立許舶客專擅附帶外夷入貢及啇販一條巳上事並䝉朝廷一一施行皆是臣素意欲稍稍裁節其事庶㡬漸次不來爲朝廷消久逺之害今既備員禮曹乃是職事近者因見館伴中書舍人陳軒等申乞盡數差勒相國寺行鋪入館鋪設以待人使買賣不惟移市動衆奉小國之陪臣有損國體兼亦抑勒在京行鋪以資吏人廣行乞取弊害不小所以具申都省乞不施行其乖方作弊官吏並不䝉都省畧取問今來只因陳軒等不待申請直牒國子監收買諸般文字内有策府元龜歴代史及敕式國子監知其不便申禀都省送下禮部看詳臣謹按漢書東平王宇來朝上疏求諸子及太史公書當時大臣以爲諸侯朝聘考文章正法度非理不言今東平王幸得來朝不思制節謹度以防遺失而求諸書非朝聘之義也諸子書或反經術非聖人或明鬼神信物怪太史公書有戰國縱横權譎之謀漢興之初謀臣竒䇿天官災異地形阨塞皆不宜在諸侯王不可予詔從之臣竊以爲東平王骨肉至親特以備位藩臣猶不得賜而况海外之裔夷契丹之與國乎臣聞河北𣙜場禁出文書其法甚嚴徒以契丹故也今髙麗與契丹何異若髙麗可與即𣙜場之法亦可廢兼竊聞昔年髙麗使乞賜太平御覧先帝詔令館伴以東平王故事爲詞却之近日復乞詔又以先帝遺㫖不與今歴代史䇿府元龜及北史竊以謂前次本不當與若便以爲例即上乖先帝遺㫖下與今來不賜御覧聖㫖異同深爲不便故申都省止是乞賜詳酌指揮未爲過當使䝉行遣吏人上簿書罪臣竊謂無罪可書雖上簿簿責至爲末事於臣又無絲毫之損臣非爲此奏論所惜者無厭之虜事事曲從官吏能循其意雖動衆害物不以爲罪稍有裁節之意便行詰責今後無人敢逆其請使意得志滿其來愈數其患愈深所以須至極論因擒鬼章論西羌夏人事宜劄子此疏處分與歐陽公之議西事並關朝廷之大者可謂經國手臣竊見近者熈河路奏生擒鬼章百官稱賀中外同慶臣愚無知竊謂安危之機正在今日若應之有道處之有術則安邊息民必自是始不然將驕卒惰以勝爲灾亦不足怪故臣區區欲乞陳前後致寇之由次論當今待敵之要雖狂愚無取亦臣子之常分昔先帝用兵累年雖中國靡弊然夏人困折亦㡬於亡横山之地沿邊七八百里不敢耕者至二百餘里歲賜既罷和市亦絶虜中匹帛至五十餘千其餘老弱轉徙牛羊墮壊所失盖不可勝數饑羸之餘乃始欵塞當時執政大臣謀之不深因中國厭兵遂納其使每一使賜予貿易無慮得絹五萬餘匹歸鬻之其民匹五六千民大悦一使所獲率不下二十萬緡使五六至而累年所罷歳賜可以坐復既使敵因吾資以德其民且飽而思奮又使其窺我厭兵欲和之意以爲欲戰欲和權皆在我以故輕犯邊陲利則進否則復求和無不可者若當時大臣因敵之請受其詞不納其使且詔邊臣與之徃返商議所獲新疆取舍在我俟其詞意屈服約束堅明然後納之則敵雖背恩反覆亦不至如今日之速也敵雖有易我意然不得西蕃解仇結好亦未敢動夫阿里骨董氊之賊臣也挾契丹公主以殺其君之二妻董氊死匿䘮不發逾年衆定乃詐稱嗣子僞書鬼章温溪心等名以請於朝當時執政若且令邊臣審問鬼章等以阿里骨當立不當立若朝廷從汝請遂授節鉞阿里骨真汝主矣汝能臣之如董氊乎若此等無詞則是諸羌心服既立之後必能綂一都部吾又何求若其不服則釁端自彼爵命未下曲不在吾彼既一國三公則吾分其恩禮各以一近上使額命之鬼章等各得所欲宜亦無患當時執政不深慮此專以省事爲安因其妄請便授節鉞阿里骨自知不當立而憂鬼章之討也故欲借力於西夏以自重於是始有解仇結好之謀而鬼章亦不平朝廷之以賊臣君我也故怒而盗邊夏人知諸羌之叛也故起而和之此臣所謂前後致寇之由明主不可不知者也雖既徃不咎然可以爲方來之鍳元昊本懐大志長於用兵亮祚天付兇狂輕用其衆故其爲邊患皆歴年而後定今梁氏專國素與人多不協方内自相圖其能以創殘呻吟之餘久與中國敵乎料其姦謀盖非元昊亮祚之此矣意謂二聖在位恭黙守成仁恕之心著於逺邇必無用武之意可肆無厭之求蘭㑹諸城鄜延五寨好請不獲勢脅必從猖狂之後求無不獲計不過此耳今者竊聞朝廷降詔諸路勅勵戰守深明逆順曲直之理此固當今之急務而詔書之中亦許夏人之自新臣竊以謂開之太急納之太速曾未一戰而厭兵欲和之意巳見乎外此復蹈前日之失矣臣甚惜之今既聞鬼章之㨗或漸有欵塞之謀必將爲恭狠相半之詞而繼之以無厭之請若朝廷復納其使則是欲戰欲和權皆在虜有求必獲不獲必叛雖媮一時之安必起無窮之釁故臣願明主斷之於中深詔大臣宻敕諸將若夏人欵塞當受其詞而却其使然後明敕邊臣以夏人受恩不貲無故犯順今雖欵塞反覆難保若實改心向化當且與邊臣啇議苟詞意未甚屈服約束未甚堅明則且却之以示吾雖不逆其善意亦不汲汲求和也彼若心服而來吾雖未納其使必不於徃返啇議之間遽復盗邊若非心服則吾雖蕩然開懐待之如舊能必其不叛乎今歲涇原之入豈吾待之不至邪但使吾兵練士飽斥候精明虜無大獲不過數年必自折困今雖小勞後必堅定此臣所謂當今待敵之要亦明主不可以不知者也今朝廷意在息民不憚屈巳而臣獻言乃欲艱難其請不急於和似與聖意異者然古之聖賢欲行其意必有以曲成之未嘗直情而徑行也將欲翕之必固張之將欲取之必固予之夫直情而徑行未有獲其意者也若權其利害䆒其所至則臣之愚計於安邊息民必久而固與聖意初無小異然臣竊度朝廷之間似欲以畏事爲無事者臣竊以爲過矣夫爲國不可以生事亦不可以畏事畏事之弊與生事均譬如無病而服藥與有病而不服藥皆可以殺人夫生事者無病而服藥也畏事者有病而不服藥也乃者阿里骨之請人人知其不當予而朝廷予之以求無事然事之起乃至於此不幾於有病而不服藥乎今又欲遽納夏人之使則是病未除而藥先止其與幾何臣於侍從之中受恩至深其於委曲保全與衆獨異故敢出位先事而言不勝恐悚待罪之至取進止乞詔邊吏無進取及論鬼章事宜劄子此乃文忠公搏虎手處惜乎世不能用臣聞善用兵者先服其心次屈其力則兵易解而功易成若不服其心惟力是恃則戰勝而寇愈深况不勝乎功成而兵不解况不成乎頃者西方用兵累年先帝之意全在弔伐而貪功生事之臣惟務殺人爭地得尺寸之土不問利害先築城堡置州縣使四夷憎畏中國以謂朝廷專欲得地非盡滅我族類不止是以併力致死莫有服者今雖朝廷好生惡殺不務逺畧而此心未信憎畏未衰心既不服惟有闘力力屈情見勝負未可知也今日新獲鬼章威震戎狄邊臣賈勇爭欲立功以爲河南之地指顧可得正使得之不免築城堡屯兵置吏積粟而守之則中國何時息肩乎乃者王韶取熈河全師獨克使韶有逺慮誅其叛者易以忠順即用其豪酋而巳則今復何事其所以兵連禍結罷弊中國者以郡縣其地故也徃者既不可悔而來者又不以爲戒今又欲取講武城曰此要害地不可不取方唐盛時安西都䕶去長安萬里若論要害自此以西無不可取者使諸羌知中國有進取不巳之意則寇愈深而兵不解其禍豈可量哉臣願陛下深詔邊吏叛則討之服則安之自今以徃無取尺寸之地無焚廬舍無殺老弱未及朞年諸羗可傳檄而定然朝廷至意亦自難喻將帥未必從也雖日行文書終恐無益宜驛召陜西轉運使一員赴闕面敕戒之使歸以喻將帥而察其不如詔者臣又竊聞朝論謂鬼章犯順罪當誅死然譬之鳥獸不足深責其子孫部族猶足以陸梁於邊全其首領以累其心以爲重質庶獲其用此實當今之良䇿然臣竊料鬼章兇豪素貴老病垂死必不能甘於困辱爲久生之計自知生存終不得歸徒使其臣子首䑕顧忌不敢復讐必將不食求死以發其衆之怒就使不然老病愁憤自非久生之道鬼章若死則其臣子專意復讐必與阿里骨合而北交於夏人此正胡越同舟遇順風之勢其交必堅而温溪心介於阿里骨夏人之間地狹力弱其勢必危若見并而吾不能救使二寇合三面以窺熈河則其患未可以一二數也如臣愚計可詔邊臣與鬼章約若能使其部族討阿里骨而納趙純忠者當放汝生還質之天地示以必信鬼章若從則稍富貴之使其信臣而喻至意焉鬼章既有生還之望不爲求死之計其衆必從以鬼章之衆與温溪心合而討阿里骨其勢必克既克而納純忠雖放還鬼章可以無患此必然之勢也西羌本與夏人世仇而鬼章本與阿里骨不協若許以生還其衆必相攻縱未能誅阿里骨亦足以使二盗相疑而不合也昔太史慈與孫䇿戰幾殺䇿䇿後得慈釋不誅放還豫章卒立竒功李愬得呉元濟將李祐解縛用之與同卧起卒擒元濟非豪傑名將不能行此度外事也議者或謂鬼章之獲兼用近界酋豪力戰而得之仇怨巳深若放生還此等必無全理臣以謂不然若鬼章死於中國其衆讐此等必深若其生還其讐之亦淺此等依中國爲援足以自全自古西羌之患惟恐解仇結盟若所在爲讐敵正中國之利無可疑者臣出位言事不勝恐悚待罪之至取進止乞約鬼章討阿里骨劄子與前二劄併看臣近者竊見劉舜卿賀表具言阿里骨罪狀又竊聞舜卿乞削阿里骨官爵又竊聞阿里骨上章請命議者或欲許其自新以臣愚慮二者之説皆未爲得何者阿里骨兇狡反覆必無革面洗心之理今聞其女巳嫁梁乞逋之子度其久遠必湏協力致死共爲邊患今來上章請命盖是部族新破衆叛親離恐吾乗勝致討力未能支故匿情忍詬以就大事若得休息數年蓄力養鋭假吾爵命以威脇諸羌誅不附巳者羽翼既成西北相應必爲中原之憂非獨一方之病也且夏賊逆天犯順本因輕料朝廷以爲必不能討巳今若便從阿里骨之請則其所料良不爲過西蕃小醜朝爲叛逆暮許通和則夏國之請理無不許二寇滔天自若欲戰欲和無不可者則西方之憂無時而止矣然遂從舜卿之請削奪官爵即湏發兵深入致討彼新䘮大首領舉國戒懼我師深入苟無他竒恐難以得志臣愚以請當使邊將發厚幣遣辯士以離其腹心壊其羽翼今聞温溪心等諸族巳爲所質勢未能動而心侔歛氊在其肘腋迹同而心異若用臣前計使邊臣與鬼章約若能使其部族與温溪心歛氊等合而討阿里骨納趙純忠即許以生還此正所謂以夷狄攻夷狄計無出此者若朝廷便許阿里骨通和即湏推示赤心待之如舊不可復用計謀以圖此賊數年之後必自飛揚此所謂養虎自遺患者也故臣願朝廷既不納其通和之請又不削奪其官爵存而勿論置之度外隂使邊臣以計圖之似爲得䇿臣屢凟天聽罪當誅死取進止唐宋八大家文鈔巻一百二十
