body:
  text: 臨川本傳王安石字介甫臨川人父益都官員外郎安石少好讀書一過目終身不忘屬文動筆如飛見者皆服其精妙友生曾鞏攜以示歐陽脩脩為延譽登進士上第簽書淮南判官舊制秩滿許獻文求試館職安石獨否再調知鄞縣起堤堰决陂塘為水陸之利貸榖與民立息以償俾新陳相易邑人便之通判舒州文彦博為相薦其恬退尋召試館職不就脩薦為諫官以祖母年髙辭脩以其須祿養言於朝用為羣牧判官請知常州移提㸃江東刑獄入為度支判官時嘉祐三年也安石果於自用慨然有矯世變俗之志乃上萬言書後安石當國其所注措大抵皆祖此書俄直集賢院先是安石屢辭館閣之命士大夫謂其無意於世恨不識其靣朝廷每欲畀以美官惟患其不就也明年同脩起居注疏辭至八九乃受遂知制誥糾察在京刑獄自是不復辭官矣有少年得鬬鶉其儕求之不與恃與之昵輒持去少年追殺之開封當此人死安石駮曰不與而持去是盜也追而殺之是捕盜也遂劾府司失入事下審刑大理皆以府斷為是詔放安石罪安石不謝御史舉奏之帝亦不問以母憂去終英宗世召不起安石本楚士未知名于中朝以韓吕二族為巨室欲藉以取重乃深與韓絳絳弟維及吕公著交三人更稱揚之名始盛神宗在潁邸維為記室每講說見稱輒曰此維之友王安石之說也及為太子庶子又薦自代帝由是想見其人甫即位命知江寧府數月召為翰林學士兼侍講熈寧元年造朝帝問為治所先對曰擇術為先帝曰唐太宗何如曰陛下當法堯舜何以太宗為帝曰卿可謂責難於君一日講席羣臣退帝留安石坐曰有欲與卿從容論議者因言唐太宗必得魏徵劉備必得諸葛亮然後可以有為二子誠不世出之人也安石曰陛下誠能為堯舜則必有臯䕫稷禹誠能為髙宗則必有傅說彼二子者何足道哉二年拜參知政事帝謂曰人皆不能知卿以為但知經術不曉世務安石對曰經術正所以經世務爾帝問卿施設何先安石曰變風俗立法度最方今所急也於是設制置三司條例司命與樞宻陳升之同領之安石令其黨吕惠卿任其事而農田水利青苗均輸保甲免役市易保馬方田諸役相繼並興號為新法遣提舉官四十餘輩頒行天下青苖法者以常平糴本散與人戸出息二分春散秋歛均輸法者以發運之職改為均輸假以錢貨凡上供之物皆得徙貴就賤用近易逺預知在京倉庫所當辦者得以便宜蓄買保甲之法籍民二丁取一十家為保保丁授以弓弩教之戰陣免役之法據家貲髙下出錢雇役單丁女户原無役者一概輸錢謂之助役市易之法聽人賖貸縣官財貨出息二分過期不輸者加罰錢保馬之法凡五路義保願養馬者戸一匹以監牧見馬給之或官與其直使自市嵗一閲其肥瘠死病者補償方田之法以東西南北若干步為一方嵗計量其地驗其肥瘠定其色號分五等以定稅數又有免行錢者約京師百物諸行利入厚薄皆令納錢與免行户祗應自是四方争言農田水利古陂廢堰悉務興復又令民封狀増價以買坊塲又增茶鹽之額又設措置河北糴便司廣積糧穀于臨流州縣以備饋運由是賦歛愈重天下騷然云云帝亦疑之遂罷為觀文殿大學士知江寧府自禮部侍郎超九轉為吏部尚書始吕惠卿遭喪去安石未知所托得曽布信任之亞于惠卿及惠卿服闋安石朝夕汲引至是白為參知政事安石之再相也屢謝病求去及雱死尤悲傷不堪請益力帝益厭之罷為鎮南軍節度使同平章事判江寧府明年改集禧觀使封舒國公元豐三年復拜左僕射觀文殿大學士換特進改封荆哲宗立加司空未幾卒年六十八贈太傅紹聖中謚曰文配享神宗崇寧中配食孔廟列顔孟之次追封舒王楊時言於欽宗降從祀髙宗復停宗廟配享削王封理宗復停孔廟從祀
