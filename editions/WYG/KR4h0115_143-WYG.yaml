body:
  text: 唐宋八大家文鈔巻一百三十一明茅坤撰東坡文鈔十五論孔子論孔子之所以聖不盡於用魯而子瞻於孔子之用魯已見得分明魯定公十三年孔子言於公曰臣無藏甲大夫無百雉之城使仲由為季氏宰將墮三都於是叔孫氏先墮郈季氏將墮費公山弗狃叔孫輒率費人襲公公與三子入于季氏之宫孔子命申句須樂頎下伐之費人北二子奔齊遂墮費將墮成公歛處父以成叛公圍成弗克或曰殆哉孔子之為政也亦危而難成矣孔融曰古者王畿千里寰内不以封建諸侯曹操疑其論建漸廣遂殺融融特言之耳安能為哉操以為天子有千里之畿將不利已故殺之不旋踵季氏親逐昭公公死于外從公者皆不敢入雖子家羈亦亡季氏之忌克忮害如此雖地勢不及曹氏然君臣相猜葢不減操也孔子安能以是時墮其名都而出其藏甲也哉考於春秋方是時三桓雖若不悦然莫能違孔子也以為孔子用事於魯得政與民而三桓畏之歟則季桓子之受女樂也孔子不能却之矣彼婦之口可以出走是孔子畏季氏季氏不畏孔子也夫孔子盍姑修其政刑以俟三桓之隙也哉蘇子曰此孔子之所以聖也葢田氏六卿不服則齊晉無不亡之道三桓不臣則魯無可治之理孔子之用於世其政無急於此者矣彼晏嬰者亦知之曰田氏之僭惟禮可以已之在禮家施不及國大夫不收公利齊景公曰善哉吾今而後知禮之可以為國也嬰能知之而莫能為之嬰非不賢也其浩然之氣以直養而無害塞乎天地之間者不及孔孟也孔子以覊旅之臣得政期月而能舉治世之禮以律亡國之臣墮名都出藏甲而三桓不疑其害已此必有不言而信不怒而威者矣孔子之聖見於行事至此為無疑也嬰之用於齊也乆於孔子景公之信其臣也愈於定公而田氏之禍不少衰吾是以知孔子之難也孔子以哀公十六年卒十四年陳恒弑其君孔子沐浴而朝告于哀公請討之吾是以知孔子之欲治列國之君臣使如春秋之法者至於老且死而不忘也或曰孔子知哀公與三子之必不從而以禮告也歟曰否孔于實欲伐齊孔子既告公公曰魯為齊弱乆矣子之伐之将若之何對曰陳恒弑其君民之不予者半以魯之衆加齊之半可克也此豈禮告而已哉哀公患三桓之偪常欲以越伐魯而去之夫以蠻夷伐國民不予也臯如出公之事斷可見矣豈若從孔子而伐齊乎若從孔子而伐齊則凡所以勝齊之道孔子任之有餘矣既克田氏則魯之公室自張三桓不治而自服也此孔子之志也子思論雖非知思孟之學者而其文自圓昔者夫子之文章非有意於文是以未嘗立論也所可得而言者唯其歸於至當斯以為聖人而已矣夫子之道可由而不可知可言而不可議此其不爭為區區之論以開是非之端是以獨得不廢以與天下後世為仁義禮樂之主夫子既沒諸子之欲為書以傳於後世者其意皆存乎為文汲汲乎惟恐其汨沒而莫吾知也是故皆喜立論論立而爭起自孟子之後至于荀卿掦雄皆務為相攻之説其餘不足數者紛紜於天下嗟夫夫子之道不幸而有老聃荘周楊朱墨翟田駢慎到申不害韓非之徒各持其私説以攻乎其外天下方将惑之而未知其所適從奈何其弟子門人又内自相攻而不決千載之後學者愈衆而夫子之道益晦而不明者由此之故歟昔三子之爭起於孟子孟子曰人之性善是以荀子曰人之性惡而楊子又曰人之性善惡混孟子既已據其善是故荀子不得不出於惡人之性有善惡而已二子既已據之是以楊子亦不得不出於善惡混也為論不求其精而務以為異於人則紛紛之説未可以知其所止且夫夫子未嘗言性也葢亦嘗言之矣而未有必然之論也孟子之所謂性善者皆出於其師子思之書子思之書皆聖人之㣲言篤論孟子得之而不善用之能言其道而不知其所以為言之名舉天下之大而必之以性善之論昭昭乎自以為的於天下使天下之過者莫不欲援弓而射之故夫二子之為異論者皆孟子之過也若夫子思之論則不然曰夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉聖人之道造端乎夫婦之所能行而極乎聖人之所不能知造端乎夫婦之所能行是以天下無不可學而極乎聖人之所不能知是以學者不知其所窮夫如是則惻隱足以為仁而仁不止於惻隱羞惡足以為義而義不止於羞惡此不亦孟子之所以為性善之論歟子思論聖人之道出於天下之所能行而孟子論天下之人皆可以行聖人之道此無以異者而子思取必於聖人之道孟子取必於天下之人故夫後世之異議皆出於孟子而子思之論天下同是而莫或非焉然後知子思之善為論也唐荆川曰借客形主轉丸於千仞之上孟軻論此作似未盡長公平生昔者仲尼自衛反魯網羅三代之舊聞葢經禮三百曲禮三千終年不能究其説夫子謂子貢曰賜爾以吾為多學而識之者與非也予一以貫之天下苦其難而莫之能用也不知夫子之有以貫之也是故堯舜禹湯文武周公之法度禮樂刑政與當世之賢人君子百家之書百工之技藝九州之内四海之外九夷八蠻之事荒忽誕謾而不可考者雜然皆列于胸中而有卓然不可亂者此固有以一之也是以博學而不亂深思而不惑非天下之至精其孰能與於此葢嘗求之於六經至於詩與春秋之際而後知聖人之道始終本末各有條理夫王化之本始於天下之易行天下固知有父子也父子不相賊而足以為孝矣天下固知有兄弟也兄弟不相奪而足以為悌矣孝悌足而王道備此固非有深遠而難見勤苦而難行者也故詩之為敎也使人歌舞佚樂無所不至要在於不失正焉而已矣雖然聖人固有所甚畏也一失容者禮之所由廢也一失言者義之所由亡也君臣之相攘上下之相殘天下大亂未嘗不始於此道是故春秋力爭於毫釐之間而深明乎疑似之際截然其有所必不可為也不觀於詩無以見王道之易不觀於春秋無以知王政之難自孔子沒諸子各以所聞著書而皆不得其源流故其言無有綂要若孟子可謂深於詩而長於春秋者矣其道始於至粗而極於至精充乎天地放乎四海而毫釐有所必計至寛而不可犯至密而可樂者此其中必有所守而後世或未之見也且孟子嘗有言矣人能充其無欲害人之心而仁不可勝用也人能充其無欲為穿窬之心而義不可勝用也士未可以言而言是以言餂之也可以言而不言是以不言餂之也是皆穿窬之類也唯其不為穿窬也而義至於不可勝用唯其未可以言而言可以言而不言也而其罪遂至於穿窬故曰其道始於至粗而極於至精充乎天地放乎四海而毫釐有所必計嗚呼此其所以為孟子歟後之觀孟子者無觀之他亦觀諸此而已矣蘇氏父子於聖學及老氏之學並未能逹故其議論多渺茫然而行文處特圓矣唐荆川曰此篇縱恣不羈荀卿論以其所傳攻其所蔽荀卿當深服嘗讀孔子世家觀其言語文章循循莫不有規矩不敢放言髙論言必稱先王然後知聖人憂天下之深也茫乎不知其畔岸而非遠也浩乎不知其津涯而非深也其所言者匹夫匹婦之所共知而所行者聖人有所不能盡也嗚呼是亦足矣使後世有能盡吾説者雖為聖人無難而不能者不失為寡過而已矣子路之勇子貢之辨冉有之智此三者皆天下之所謂難能而可貴者也然三子者毎不為夫子之所悦顔淵黙然不見其所能若無以異於衆人者而夫子亟稱之且夫學聖人者豈必其言之云爾哉亦觀其意之所嚮而已夫子以為後世必有不足行其説者矣必有竊其説而為不義者矣是故其言平易正直而不敢為非常可喜之論要在於不可易也昔者常怪李斯事荀卿既而焚滅其書大變古先聖王之法於其師之道不啻若冦讐及今觀荀卿之書然後知李斯之所以事秦者皆出於荀卿而不足怪也荀卿者喜為異説而不讓敢為髙論而不顧者也其言愚人之所驚小人之所喜也子思孟軻世之所謂賢人君子也荀卿獨曰亂天下者子思孟軻也天下之人如此其衆也仁人義士如此其多也荀卿獨曰人性惡桀紂性也堯舜偽也由是觀之意其為人必也剛愎不遜而自許太過彼李斯者又特甚者耳今夫小人之為不善猶必有所顧忌是以夏商之亡桀紂之殘暴而先王之法度禮樂刑政猶未至於絶滅而不可考者是桀紂猶有所存而不敢盡廢也彼李斯者獨能奮而不顧焚燒夫子之六經烹滅三代之諸侯破壊周公之井田此亦必有所恃者矣彼見其師歴詆天下之賢人自是其愚以為古先聖王皆無足法者不知荀卿特以快一時之論而荀卿亦不知其禍之至於此也其父殺人報仇其子必且行刼荀卿明王道述禮樂而李斯以其學亂天下其髙談異論有以激之也孔孟之論未嘗異也而天下卒無有及者茍天下果無有及者則尚安以求異為哉王遵岩曰以異説髙論四字立案煞是荀卿頂門一針而謂李斯焚書破壊先王之法皆出於荀卿此尤是長公深文手段韓非論韓非於老氏若不相及而太史遷獨以為申韓並原於道徳之意東坡亦識得此意聖人之所為惡夫異端盡力而排之者非異端之能亂天下而天下之亂所由出也昔周之衰有老􅆅荘周列禦冦之徒更為虛無淡泊之言而治其猖狂浮游之説紛紜顛倒而卒歸於無有由其道者蕩然莫得其當是以忘乎富貴之樂而齊乎死生之分此不得志於天下髙世遠舉之人所以放心而無憂雖非聖人之道而其用意固亦無惡於天下自老􅆅之死百餘年有商鞅韓非著書言治天下無若刑名之賢及秦用之終於勝廣之亂敎化不足而法有餘秦以不祀而天下被其毒後世之學者知申韓之罪而不知老􅆅荘周之使然何者仁義之道起於夫婦父子兄弟相愛之間而禮法刑政之原出於君臣上下相忌之際相愛則有所不忍相忌則有所不敢不敢與不忍之心合而後聖人之道得存乎其中今老􅆅荘周論君臣父子之間汎汎乎若萍游於江湖而適相值也夫是以父不足愛而君不足忌不忌其君不愛其父則仁不足以懐義不足以勸禮樂不足以化此四者皆不足用而欲置天下於無有夫無有豈誠足以治天下哉商鞅韓非求為其説而不得得其所以輕天下而齊萬物之術是以敢為殘忍而無疑今夫不忍殺人而不足以為仁而仁亦不足以治民則是殺人不足以為不仁而不仁亦不足以亂天下如此則舉天下唯吾之所為刀鋸斧鉞何施而不可昔者夫子未嘗一日易其言雖天下之小物亦莫不有所畏今其視天下𦕈然若不足為者此其所以輕殺人歟太史遷曰申子畀畀施於名實韓子引繩墨切事情明是非其極慘覈少恩皆原於道徳之意嘗讀而思之事固有不相謀而相感者荘老之後其禍為申韓由三代之衰至於今凡所以亂聖人之道者其弊固已多矣而未知其所終奈何其不為之所也揚雄論性道自宋儒濓洛以後纔説得分明而蘇家論性道處不免癡人説夢矣然通篇因主論客因客見主自是文家一法門昔之為性論者多矣而不能定于一始孟子以為善而荀子以為惡掦子以為善惡混而韓愈者又取夫三子之説而折之以孔子之論離性以為三品曰中人可以上下而上智與下愚不移以為三子者皆出乎其中而遺其上下而天下之所是者於愈之説多焉嗟夫是未知乎所謂性者而以夫才者言之夫性與才相近而不同其别不啻若黒白之異也聖人之所與小人共之而皆不能逃焉是真所謂性也而其才固将有所不同今夫木得土而後生雨露風氣之所養暢然而遂茂者是木之所同也性也而至於堅者為轂柔者為輪大者為楹小者為桷桷之不可以為楹輪之不可以為轂是豈其性之罪耶天下之言性者皆雜乎才而言之是以紛紛而不能一也孔子所謂中人可以上下而上智與下愚不移者是論其才也而至於言性則未嘗斷其善惡曰性相近也習相遠也而已韓愈之説則又有甚者離性以為情而合才以為性是故其論終莫能通彼以為性者果泊然而無為耶則不當復有善惡之説苟性而有善惡也則夫所謂情者乃吾所謂性也人生而莫不有饑寒之患牝牡之欲今告乎人曰饑而食渇而飲男女之欲不出於人之性也可乎是天下知其不可也聖人無是無由以為聖而小人無是無由以為惡聖人以其喜怒哀懼愛惡欲七者御之而之乎善小人以是七者御之而之乎惡由此觀之則夫善惡者性之所能之而非性之所能有也且夫言性者安以其善惡為哉雖然掦雄之論則固已近之曰人之性善惡混修其善則為善人修其惡則為惡人此其所以為異者唯其不知性之不能以有夫善惡而以為善惡之皆出乎性也而已夫太古之初本非有善惡之論唯天下之所同安者聖人指以為善而一人之所獨樂者則名以為惡天下之人固将即其所樂而行之孰知夫聖人唯其一人之獨樂不能勝天下之所同安是以有善惡之辨而諸子之意将以善惡為聖人之私説不以疎乎而韓愈又欲以書傳之所聞一人之事迹而折夫三子之論區區乎以后稷之岐嶷文王之不勤瞽鯀管蔡之迹而明之聖人之論性也将以盡萬物之理與衆人之所共知者以折天下之疑而韓愈欲以一人之才定天下之性且其言曰今之言性者皆雜乎佛老愈之説以為性之無與乎情而喜怒哀樂皆非性者是愈流入於佛老而不自知也唐荆川曰題是掦雄而事辨韓愈亦一體也韓愈論前後數叚各自為説而綱目整然聖人之道有趨其名而好之者有安其實而樂之者珠璣象犀天下莫不好奔走出力爭鬬奪取其好之不可謂不至也然不知其所以好之之實至於粟米蔬肉桑麻布帛天下之人内之於口而知其所以為羙被之於身而知其所以為安此非有所役乎其名也韓愈之於聖人之道葢亦知好其名矣而未能樂其實何者其為論甚髙其待孔子孟軻甚尊而拒楊墨佛老甚嚴此其用力亦不可謂不至也然其論至於理而不精支離蕩佚往往自叛其説而不知昔者宰我子貢有若更稱其師以為生民以來未有如夫子之盛雖堯舜之賢亦所不及其尊道好學亦已至矣然而君子不以為貴曰宰我子貢有若智足以知聖人之汙而已矣若夫顔淵豈亦云爾哉葢亦曰夫子循循焉善誘人由此觀之聖人之道果不在於張而大之也韓愈者知好其名而未能樂其實者也愈之原人曰天者日月星辰之主也地者山川草木之主也人者殊俗禽獸之主也主而暴之不得其為主之道矣是故聖人一視而同仁篤近而舉遠夫聖人之所以為異乎墨者以其有别焉耳今愈之言曰一視而同仁則是以待吾人之道待殊俗侍殊俗之道待禽獸也而可乎敎之使有能化之使有知是待人之仁也薄其禮而致其情不責其去而厚其來是待殊俗之仁也殺之有時而用之有節是待禽獸之仁也若之何其一之儒墨之相戾不啻若胡越而其疑似之間相去不能以髪宜乎愈之以為一也孔子曰汎愛衆而親仁仁者之為親則是孔子不兼愛也祭如在祭神如神在神不可知而祭者之心以為如其存焉則是孔子不明鬼也儒者之患患在於論性以為喜怒哀樂皆出於情而非性之所有夫有喜有怒而後有仁義有哀有樂而後有禮樂以為仁義禮樂皆出於情而非性則是相率而叛聖人之敎也老子曰能嬰兒乎喜怒哀樂茍不出乎性而出乎情則是相率而為老子之嬰兒也儒者或曰老易夫易豈老子之徒歟而儒者至有以老子説易則是離性以為情者其弊固至此也嗟夫君子之為學知其人之所長而不知其弊豈可謂善學耶唐荆川曰此文截然四叚而綱整目亂細觀此文體乃絶是摸擬原道為之坡翁之滑稽若此予竊以愈之闢佛老也特其門戸之間而東坡所論亦猶不得乎其門而為之言唐宋八大家文鈔巻一百三十一
