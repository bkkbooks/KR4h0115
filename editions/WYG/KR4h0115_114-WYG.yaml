body:
  text: 唐宋八大家文鈔巻一百六明茅坤撰南豐文鈔十論議雜著唐論文格似弱而其議則正當成康殁而民生不見先王之治日入於亂以至於秦盡除前聖數千載之法天下既攻秦而亡之以歸於漢漢之為漢更二十四君東西再有天下垂四百年然大抵多用秦法其改更秦事亦多附巳意非放先王之法而有天下之志也有天下之志者文帝而巳然而天下之材不足故仁聞雖美矣而當世之法度亦不能放於三代漢之亡而强者遂分天下之地晉與隋雖能合天下於一然而合之未久而巳亡其為不足議也代隋者唐更十八君垂三百年而其治莫盛於太宗之為君也詘巳從諫仁心愛人可謂有天下之志以租庸任民以府衞任兵以職事任官以材能任職以興義任俗以尊本任衆賦役有定制兵農有定業官無虚名職無廢事人習於善行離於末作使之操於上者要而不煩取於下者寡而易供民有農之實而兵之備存有兵之名而農之利在事之分有歸而祿之出不浮材之品不遺而治之體相承其廉恥日以篤其田野日以闢以其法修則安且治廢則危且亂可謂有天下之材行之數歳粟米之賤斗至數錢居者有餘蓄行者有餘資人人自厚幾致刑措可謂有治天下之效夫有天下之志有天下之材又有治天下之效然而不得與先王並者法度之行擬之先王未備也禮樂之具田疇之制庠序之敎擬之先王未備也躬親行陣之間戰必勝攻必克天下莫不以為武而非先王之所尚也四夷萬里古所未及以政者莫不服從天下莫不以為盛而非先王之所務也太宗之為政於天下者得失如此由唐虞之治五百餘年而有湯之治由湯之治五百餘年而有文武之治由文武之治千有餘年而始有太宗之為君有天下之志有天下之材又有治天下之效然而又以其未備也不得與先王並而稱極治之時是則人生於文武之前者率五百餘年而一遇治世生於文武之後者千有餘年而未遇極治之時也非獨民之生於是時者之不幸也士之生於文武之前者如舜禹之於唐八元八凱之於舜伊尹之於湯太公之於文武率五百餘年而一遇生於文武之後千有餘年雖孔子之聖孟軻之賢而不遇雖太宗之為君而未可以必得志於其時也是亦士民之生於是時者之不幸也故述其是非得失之迹非獨為人君者可以考焉士之有志於道而欲仕於上者可以鑒矣講官議嚴𦂳而峻必因當時伊川爭坐講故有此議孔子之語敎人曰不憤悱不啓發舉一隅不以三隅反則不告也孟子之語敎人曰有答問者荀子之語敎人曰不問而告謂之傲問一而告二謂之傲非也非也君子如響故禮無往敎而有待問則師之道有問而告之者爾世之挾書而講者終日言而非有問之者也迺不自知其强聒而欲以師自任何其妄也古之敎世子之法太傅審父子君臣之道以示之少傅奉世子以觀太傅之徳行而審喻之則示之以道者以審喻之為淺故不為也況於師者何為也哉正巳而使觀之者化爾故得其行者或不得其所以行得其言者或不得其所以言也仰之而彌高鑽之而彌堅徳如是然後師之道盡故天子不得而召也諸侯不得而友也又況得而臣之乎此伊尹太公子思孟子之徒所以忘人之勢而唐虞三代大有為之君所以忘其勢也世之挾書而講於禁中者官以侍為名則其任故可知矣迺自以謂吾師道也宜坐而講以為請於上其為說曰必如是然後合於古之所謂坐而論道者也夫坐而論道謂之三公作而行之謂之卿大夫語其任之無為與有為非以是為尊師之道也且禮於朝王及羣臣皆立無獨坐者於燕皆坐無獨立者故坐未嘗以為尊師之禮也昔晉平公之於亥唐坐云則坐曾子之侍仲尼子曰參復坐則坐云者葢師之所以命學者未果有師道也顧僕僕然以坐自請者也則世之為此者非妄歟故為此議以解其惑王遵岩曰此文根據經訓以為掊擊之地而措詞嚴健復存委曲是絶好文字公族議亦合經典天子之適子繼世以為天子其别子皆為諸侯諸侯之適子繼世以為諸侯其别子各為其國之卿大夫皆有采地别子之適子繼世以食其采地其族人百世宗之此之謂大宗其别子亦各仕於其國為卿大夫其適子兄弟宗之五世而止此之謂小宗葢天子之適子繼世以為天子其别子世為諸侯諸侯之適子繼世以為諸侯其别子各為其國之卿大夫世世食采地皆傳於無窮夫豈有服盡而絶其祿位衣食嫁娶使之自謀者乎非特如此也昔周公兼制天下立七十一國姬姓居五十三人葢兄弟之國者十有五人姬姓之國者四十人其可見者則管蔡郕霍魯衛毛􅆅郜雍曹滕畢原酆郇邘晉應韓凡蔣邢茅胙祭之屬是也其稱兄弟之國者十有五人則周之近屬其稱姬姓之國者四十人則周之同姓而巳其爵命之使傳國至於無窮夫豈以服為斷乎至於宗廟之數天子七諸侯五而祭法虞夏商周禘郊祖宗逺或至於數十世之上亦皆未嘗以服為斷也其推而上之報本於祖宗至不可為數推而下之廣骨肉之恩至於無窮葢其積厚者其流澤遠有天下之功者受天下之報其理勢次序固然也是豈可拘於常見議於錙銖之内乎故服盡而戚單者所以節人之常情而為大宗小宗之數安可以論帝者之功徳而為廣親親之法乎昔武王克商未及下車而封黄帝唐虞之後下車而封夏商之後其在異代尚特顯之其急如此況受重於祖宗推原功徳之所自出其可以天下之大而儉於骨肉之恩以不滿足海内之望乎孟子曰仁人之於兄弟也親愛之而巳矣親之欲其貴也愛之欲其富也先王推是心以及於同姓之間故有土分之有民分之有寶玉分之有寶器分之成王康王之言曰吾無專享文武之功是皆無所不盡其厚未有從夫略者也葢詩裳裳者華刺時棄賢者之類絶功臣之世而傳欒郤胥原狐續慶伯陪臣之族耳其降在皂𨽻叔向亦以為晉國之憂況於帝者之功徳與天地等而可使七八世之子孫夷於閭巷之凡民乎後世公族無封國采地之制而有列於朝有賜於府是亦親而貴之愛而富之之意也其名書於宗籍者繁衍盛大實國家慶有司雖費非多於天下之國七十有一而姬姓獨居者五十三人其亦求中以節之而巳矣顧令袒免以外毋與官衣食嫁娶使之自謀是亦不考於古矣何其野於禮也以世莫能辨故作公族議使好學者得詳焉為人後議引據最嚴密葢以濮園之後故有此議禮大宗無子則族人以支子為之後為之後者為所後服斬衰三年而降其父母期禮之所以如此者何也以謂人之所知者近則知親愛其父母而巳所知者逺則知有嚴父之義知有嚴父之義則知尊祖知尊祖則知大宗者上以繼祖下以收族不可以絶故有以支子為之後者為之後者以受重於斯人故不得不以尊服服之以尊服服之而不為之降巳親之服則猶恐未足以明所後者之重也以尊服服之又為之降巳親之服然後以謂可以明所後者之重而繼祖之道盡此聖人制禮之意也夫所謂收族者記稱與族人合食序以昭穆别以禮義之類是特諸矦别子之大宗而嚴之如此況如禮所稱天子及其始祖之所自出者此天子之大宗是為天地宗廟百神祭祀之主族人萬世之所依歸而可以不明其至尊至重哉故前世人主有以支子繼立而崇其本親加以號位立廟奉祀者皆見非於古今誠由所知者近不能割棄私愛節之以禮故失所以奉承正統尊無二上之意也若於所後者以尊服服之又為之降巳親之服而退於巳親號位不敢以非禮有加也廟祀不敢以非禮有奉也則為至恩大義固巳備矣而或謂又當易其父母之名從所後者為屬是未知考於禮也禮為人後者為所後者之祖父母妻妻之父母昆弟昆弟之子若子者此其服為所後者而非其為巳也為其父母期為其昆弟大功為其姊妹適人者小功皆降本服一等者此其服為巳而非為所後者也使於其父母服則為巳名為所後者是則名與實相違服與恩相戾矣聖人制禮不如是之舛也且自古為人後者不必皆親昆弟之子族人之同宗者皆可為之則有以大功小功昆弟之子而為之者矣有以緦麻袒免無服昆弟之子而為之者矣若當從所後者為属則亦當從所後者為服從所後者為服則於其父母有宜為大功為小功為緦麻為袒免為無服者矣而聖人制禮皆為其父母期使足以明所後者重而巳非遂以謂當變其親也親非變則名固不得而易矣戴徳王肅喪記曰為人後者為其父母降一等服齊衰期其服之節居倚廬言語飲食與父在為母同其異者不祥不禫雖除服心喪三年故至於今著於服令未之有改也豈有制服之重如此而其名遂可以絶乎又崔凱喪服駮曰本親有自然之恩降一等則足以明所後者為重無緣迺絶之矣夫未嘗以謂可以絶其親而輒謂可以絶其名是亦惑矣且支子所以後大宗者為推其嚴父之心以尊祖也顧以尊祖之故而不父其父豈本其恩之所由生而先王敎天下之意哉又禮適子不可為人後者以其傳重也支子可以為人後者以非傳重也使傳重者後巳宗非傳重者後大宗其意可謂即乎人心而使之兩義俱安也今若使為人後者以降其父母之服一等而遂變革其名不以為父母則非使之兩義俱安而不即乎人心莫大乎如是也夫人道之於大宗至尊至重不可以絶尊尊也人子之於父母亦至尊至重不可以絶親親也尊尊親親其義一也未有可廢其一者故為人之後者為降其父母之服禮則有之矣為之絶其父母之名則禮未之有也或以謂欲絶其名者葢惡其為二而欲使之為一所以使為人後者之道盡也夫迹其實則有謂之所後有謂之所生制其服則有為巳而非為所後者有為所後而非為巳者皆知不可以惡其為二而强使之為一也至於名者葢生於實也迺不知其不可以惡其為二而欲强使之為一是亦過矣藉使其名可以强使之為一而迹其實之非一制其服之非一者終不可以易則惡在乎欲絶其名也故古之聖人知不可以惡其為二而强使之為一而能使其屬之疎者相與為重親之厚者相與為輕則以禮義而巳矣何則使為人後者於其所後非巳親也而為之服斬衰三年為其祭主是以義引之也於其所生實巳親也而降服齊衰期不得與其祭是以禮厭之也以義引之則屬之疎者相與為重以禮厭之則親之厚者相與為輕而為人後之道盡矣然則欲為人後之道盡者在以禮義明其内而不在於惡其為二而强易其名於外也故禮喪服齊衰不杖期章曰為人後者為其父母報此見於經為人後者於其本親稱父母之明文也漢祭義以謂宣帝親諡宜曰悼魏相以為宜稱尊號曰皇考立廟後世議者皆以其稱皇立廟為非至於稱親稱考則未嘗有以為非者也其後魏明帝尤惡為人後者厚其本親故非漢宣加悼考以皇號又謂後嗣有由諸矦入繼正統者皆不得謂考為皇稱妣為后葢亦但禁其猥加非正之號而未嘗廢其考妣之稱此見於前世議論為人後者於其本親稱考妣之明文也又晉王坦之喪服議曰罔極之重非制敎之所裁昔日之名非一朝之所去此出後之身所以有服本親也又曰情不可奪名不可廢崇本敘恩所以為降則知為人後者未有去其所出父母之名此古今之常理故坦之引以為制服之證此又見於前世議論為人後者於其本親稱父母之明文也是則為人後者之親見於經見於前世議論謂之父母謂之考妣者其大義如此明文如此至見於他書及史官之記亦謂之父母謂之考妣謂之私考妣謂之本親謂之親者則不可一二數而以為世父叔父者則不特禮未之有載籍巳來固未之有也今欲使從所後者為屬而革變其父母之名此非常異義也不從經文與前世數千載之議論亦非常異義也而無所考據以持其說將何以示天下乎且中國之所以為貴者以有父子之道又有六經與前世數千載之議論以治之故也今忽欲棄之而伸其無所考據之說豈非誤哉或謂為人後者於其本親稱父母則為兩統二父其可乎夫兩統二父者謂加考以皇號立廟奉祀是不一於正統懷貳於所後所以著其非而非謂不變革其父母之名也然則加考以皇號與禮及古之稱皇考者有異乎曰皇考一名而為說有三禮曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟是則以皇考為曾祖之廟號也魏相謂漢宣帝父宜稱尊號曰皇考既非禮之曾祖之稱又有尊號之文故魏明帝非其加悼考以皇號至於光武亦於南頓君稱皇考廟義出於此是以加皇號為事考之尊稱也屈原稱朕皇考曰伯庸又晉司馬機為燕王告禰廟文稱敢昭告於皇考清惠亭矦是又達於羣下以皇考為父殁之通稱也以為曾祖之廟號者於古用之以為事考之尊稱者於漢用之以為父殁之通稱者至今用之然則稱之亦有可有不可者乎曰以加皇號為事考之尊稱者施於為人後之義是干正統此求之於禮而不可者也達於羣下以皇考為父殁之通稱者施於為人後之義非干正統此求之於禮而可者也然則以為父殁之通稱者其不可如何曰若漢哀帝之親稱尊號曰恭皇安帝之親稱尊號曰孝徳皇是又求之於禮而不可者也且禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也前世失禮之君崇本親以位號者豈獨失為人後奉祀正統尊無二上之意哉是以子爵父以卑命尊亦非所以尊厚其親也前世崇飾非正之號者其失如此而後世又謂宜如期親故事增官廣國亦可謂皆不合於禮矣夫考者父殁之稱然施於禮者有朝廷典册之文有宗廟祝祭之辭而巳若不加位號則無典册之文不立廟奉祀則無祝祭之辭則雖正其名豈有施於事者顧言之不可不順而巳此前世未嘗以為可疑者以禮甚明也今世議者紛紛至於曠日累時不知所決者葢由不考於禮而率其私見也故采於經列其㫖意庶得以商確焉救災議子固大議其剖析利害處最分明河北地震水災隳城郭壞廬舍百姓暴露乏食主上憂憫下緩刑之令遣拊循之使恩甚厚也然百姓患於暴露非錢不可以立屋廬患於乏食非粟不可以飽二者不易之理也非得此二者雖主上憂勞於上使者旁午於下無以救其患塞其求也有司建言請發倉廪與之粟壯者人日二升幼者人日一升主上不旋日而許之賜之可謂大矣然有司之所言特常行之法非審計終始見於衆人之所未見也今河北地震水災所毁敗者甚衆可謂非常之變也遭非常之變者亦必有非常之恩然後可以振之今百姓暴露乏食巳廢其業矣使之相率日待二升之廪於上則其勢必不暇乎他焉是農不復得修其畎畆商不復得治其貨賄工不復得利其器用閒民不復得轉移執事一切棄百事而專意於待升合之食以偷為性命之計是直以餓殍之養養之而巳非深思遠慮為百姓長計也以中戸計之戸為十人壯者六人月當受粟三石六斗幼者四人月當受粟一石二斗率一户月當受粟五石難可以久行也不久行則百姓何以贍其後久行之則被水之地既無秋成之望非至來歳麥熟賑之未可以罷自今至於來歳麥熟凡十月一戸當受粟五十石今被災者十餘州州以二萬戸計之中戸以上及非災害所被不仰食縣官者去其半則仰食縣官者為十萬戸食之不遍則為施不均而民猶有無告者也食之徧則當用粟五百萬石而後可以辦此又非深思遠慮為公家長計也至於給授之際有淹速有均否有真偽有會集之擾有辯察之煩厝置一差皆足致弊又羣而處之氣久蒸薄必生疾癘此皆必至之害也且此不過能使之得旦暮之食耳其於屋廬構築之費將安取哉屋廬構築之費既無所取而就食於州縣必相率而去其故居雖有頽牆壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可頼者必棄之而不暇顧甚則殺馬牛而去者有之伐桑棗而去之者有之其害又可謂甚也今秋氣巳半霜露方始而民露處不知所蔽葢流亡者亦巳衆矣如是不可止則將空近塞之地空近塞之地失戰鬭之民此衆士大夫之所慮而不可謂無患者也空近塞之地失耕桑之民此衆士大夫所未慮而患之尤甚者也何則失戰鬭之民異時有警邊戍不可以不增爾失耕桑之民異時無事邊糴不可以不貴矣二者皆可不深念歟萬一或出於無聊之計有竄倉庫盗一囊之粟一束之帛者彼知巳負有司之禁則必鳥駭䑕竄竊弄鋤挺於草茅之中以扞游徼之吏强者既囂而動則弱者必隨而聚矣不幸或連一二城之地有枹鼔之警國家胡能晏然而巳乎況夫外有邉陲之可慮内有郊社之將行安得不防之於未然銷之於未萌也然則為今之策下方紙之詔賜之以錢五十萬貫貸之以粟一百萬石而事足矣何則令被災之州為十萬戸如一戸得粟十石得錢五千下戸常産之貲平日未有及此者也彼得錢以完其居得粟以給其食則農得修其畎畝商得治其貨賄工得利其器用閒民得轉移執事一切得復其業而不失其常生之計與專意以待二升之廩於上而勢不暇乎他為豈不遠哉此可謂深思遠慮為百姓長計者也由有司之說則用十月之費為粟五百萬石由今之說則用兩月之費為粟一百萬石況貸之於今而收之於後足以賑其艱乏而終無損於儲峙之實所實費者錢五鉅萬貫而巳此可謂深思逺慮為公家長計者也又無給授之弊疾癘之憂民不必去其故居苟有頽牆壞屋之尚可完者故材舊瓦之尚可因者什器衆物之尚可賴者皆得而不失況於全牛馬保桑棗其利又可謂甚也雖寒氣方始而無暴露之患民安居足食則有樂生自重之心各復其業則勢不暇乎他為雖驅之不去誘之不為盜矣夫饑歳聚餓殍之民而與之升合之食無益於救災補敗之數此常行之弊法也今破去常行之弊法以錢與粟一舉而賑之足以救其患復其業河北之民聞詔令之出必皆喜上之足賴而自安於畎畝之中負錢與粟而歸與其父母妻子脫於流亡轉死之禍則戴上之施而懷欲報之心豈有巳哉天下之民聞國家厝置如此恩澤之厚其孰不震動感激欲主上之義於無窮乎如是而人和不可致天意不可悅者未之有也人和洽於下天意悅於上然後玉輅徐動就陽而郊荒夷殊陬奉幣來享疆内安輯里無囂聲豈不適變於可為之時消患於無形之内乎此所謂審計終始見於衆人之所未見也不早出此或至於一有枹鼔之警則雖欲為之將不及矣或謂方今錢粟恐不足以辦此夫王者之富藏之於民有餘則取不足則與此理之不易者也故曰百姓足君孰與不足百姓不足君孰與足葢百姓富實而國獨貧與百姓餓殍而上獨能保其富者自古及今未之有也故又曰不患貧而患不安此古今之至戒也是故古者二十七年耕有九年之蓄足以備水旱之災然後謂之王政之成唐水湯旱而民無捐瘠者以是故也今國家倉庫之積固不獨為公家之費而巳凡以為民也雖倉無餘粟庫無餘財至於救災補敗尚不可以巳況今倉庫之積尚可以用獨安可以過憂將來之不足而立視夫民之死乎古人有曰剪爪宜及膚割髮宜及體先王之於救災髮膚尚無所愛況外物乎且今河北州軍凡三十七災害所被十餘州軍而巳他州之田秋稼足望今有司於糴粟常價斗增一二十錢非獨足以利農其於增糴一百萬石易矣斗增一二十錢吾權一時之事有以為之耳以實錢給其常價以茶荈香藥之類佐其虚估不過捐茶荈香藥之類為錢數鉅萬貫而其費巳足茶荈香藥之類與百姓之命孰為可惜不待議而可知者也夫費錢五鉅萬貫又捐茶荈香藥之類為錢數鉅萬貫而足以救一時之患為天下之計利害輕重又非難明者也顧吾之有司能越拘攣之見破常行之法與否而巳此時事之急也故述斯議焉書魏鄭公傳借魏鄭公以諷世之焚藁者之非而議論甚圓暢可誦予觀太宗常屈巳以從羣臣之議而魏鄭公之徒喜遭其時感知巳之遇事之大小無不諫諍雖其忠誠自至亦得君以然也則思唐之所以治太宗之所以稱賢主而前世之君不及者其淵源皆出於此也能知其有此者以其書存也及觀鄭公以諫諍事付史官而太宗怒之薄其恩禮失終始之義則未嘗不反覆嗟惜恨其不思而益知鄭公之賢焉夫君之使臣與臣之事君者何大公至正之道而巳矣大公至正之道非滅人言以掩巳過取小亮以私其君此其不可者也又有甚不可者夫以諫諍為當掩是以諫諍為非美也則後世誰復當諫諍乎況前代之君有納諫之美而後世不見則非惟失一時之公又將使後世之君謂前代無諫諍之事是啓其怠且忌矣太宗末年羣下既知此意而不言漸不知天下之得失至於遼東之敗而始恨鄭公不在世未嘗知其悔之萌芽出於此也夫伊尹周公何如人也伊尹周公之諫切其君者其言至深而其事至迫存之於書未嘗掩焉至今稱太甲成王為賢君而伊尹周公為良相者以其書可見也令當時削而棄之成區區之小讓則後世何所據依而諫又何以知其賢且良與桀紂幽厲始皇之亡則其臣之諫詞無見焉非其史之遺乃天下不敢言而然也則諫諍之無傳乃此數君之所以益暴其惡於後世而巳矣或曰春秋之法為尊親賢者諱與此戾矣夫春秋之所以諱者惡也納諫諍豈惡乎然則焚藁者非歟曰焚藁者誰歟非伊尹周公為之也近世取區區之小亮者為之耳其事又未是也何則以焚其藁為掩君之過而使後世傳之則是使後世不見藁之是非而必其過常在於君美常在於巳也豈愛其君之謂歟孔光之去其藁之所言其在正邪未可知也而焚之而惑後世庸詎知非謀巳之奸計乎或曰造辟而言詭辭而出異乎此曰此非聖人之所曾言也今萬一有是理亦謂君臣之間議論之際不欲漏其言於一時之人耳豈杜其告萬世也噫以誠信待巳而事其君而不欺乎萬世者鄭公也益知其賢云豈非然哉豈非然哉蘇明允哀詞敘明允生平亦儘有生色可觀明允姓蘇氏諱洵眉州眉山人也始舉進士又舉茂才異等皆不中歸焚其所為文閉戸讀書居五六年所有既富矣乃始復為文葢少或百字多或千言其指事析理引物託諭侈能盡之約逺能見之近大能使之微小能使之著煩能不亂肆能不流其雄壯俊偉若决江河而下也其輝光明白若引星辰而上也其略如是亦余之所言於余之所不言可推而知也明允每於其窮達得喪憂歎哀樂念有所屬必發之於此於古今治亂興壞是非可否之際意有所擇亦必發之於此於應接酬酢萬事之變者雖錯出於外而用心於内者未嘗不在此也嘉祐初始與其二子軾轍復去蜀游京師今叅知政事歐陽公修為翰林學士得其文而異之以獻於上既而歐陽公為禮部又得其二子之文擢之高等於是三人之文章盛傳於世得而讀之者皆為之驚或歎不可及或慕而效之自京師至於海隅障徼學士大夫莫不人知其名家有其書既而明允召試舍人院不至特用為秘書省挍書郎頃之以為覇州文安縣主簿編纂太常禮書而軾轍又以賢良方正策入等於是三人者尤見於當時而其名益重於天下治平三年春明允上其禮書未報四月戊申以疾卒享年五十有八自天子輔臣至閭巷之士皆聞而哀之明允所為文集有二十巻行於世所集太常因革禮者一百巻更定諡法三巻藏於有司又為易傳未成讀其書者則其人之所存可知也明允為人聰明辨智過人氣和而色温而好為策謀務一出巳見不肯躡故迹頗喜言兵慨然有志於功名者也二子軾為殿中丞直史館轍為大名府推官其年以明允之䘮歸塟於蜀地既請歐陽公為其銘又請予為辭以哀之曰銘將納之於壙中而辭將刻之於冢上也余辭不得巳乃為其文曰嗟明允兮邦之良氣甚夷兮志則彊閱今古兮辨興亡驚一世兮擅文章御六馬兮馳無疆決大河兮嚙扶桑粲星斗兮射精光衆伏玩兮雕肺腸自京師兮洎幽荒矧二子兮與翺翔唱律吕兮和宫商羽峨峨兮勢方颺孰云命兮變不常奄忽逝兮汴之陽維自著兮暐煌煌在後人兮慶彌長嗟明允兮庸何傷唐宋八大家文鈔巻一百六
