body:
  text: 唐宋八大家文鈔巻十五明茅坤撰昌黎文鈔十五墓誌碣銘殿中少監馬君墓誌銘以生平故舊志墓最悲涼可涕君諱繼祖司徒贈太師北平莊武王之孫少府監贈太子少傅諱暢之子生四歳以門功拜太子舍人積三十四年五轉而至殿中少監年三十七以卒有男八人女二人始余初冠應進士貢在京師窮不自存以故人稚弟拜北平王於馬前王問而憐之因得見於安邑里第王軫其寒饑賜食與衣召二子使為之主其季遇我特厚少府監贈太子少傅者也姆抱幼子立側眉眼如畫髪漆黑肌肉玊雪可念殿中君也當是時見王於北亭猶髙山深林鉅谷龍虎變化不測傑魁人也退見少傅翠竹碧梧鸞鵠停峙能守其業者也幼子娟好静秀瑤環瑜珥蘭茁其芽稱其家兒也後四五年吾成進士去而東遊哭北平王於客舎後十五六年吾為尚書都官郎分司東都而分府少傅卒哭之又十餘年至今哭少監焉嗚呼吾未耄老自始至今未四十年而哭其祖子孫三世于人世何如也人欲乆不死而觀居此世者何也唐荆川曰此歐文黄夢升張應之諸作之祖殿中侍御史李君墓誌銘直叙殿中侍御史李君名虚中字常容其十一世祖沖貴顯拓拔世父惲河南温縣尉娶陳留太守薛江童女生六子君最後生愛於其父母年少長喜學學無所不通最深於五行書以人之始生年月日所直日辰支干相生勝衰死王相斟酌推人夀夭貴賤利不利輙先處其年時百不失一二其説汪洋奥美關節開解萬端千緒參錯重出學者就傳其法初若可取卒然失之星官歴翁莫能與其挍得失進士及第試書判入等補袐書正字母喪去官卒喪選補太子挍書河南尹奏疏授伊闕尉佐水陸運事故宰相鄭公餘慶繼尹河南以公為運佐如初宰相武公元衡之出劔南奏奪為觀察推官授監察御史未㡬御史臺疏言行能髙不冝用外府即詔為真御史半歳分部東都臺遷殿中侍御史元和八年四月詔徴既至宰相欲白以為起居舍人經一月疽發背六月乙酉卒年五十二其年十月戊申𦵏河南洛陽縣距其祖澠池令府君僑墓十里君昆弟六人先君而没者四人其一人嘗為鄭之滎澤尉信道士長生不死之説既去官絶不營人事故四門之寡妻孤孩與滎澤之妻子衣食百須皆由君出自初為伊闕尉佐河南水陸運使換兩使經七年不去所以為供給教養者及由蜀來輩類御史皆樂在朝廷進取君獨念寡稚求分司東出嗚呼其仁哉君亦好道士説於蜀得秘方能以水銀為黄金服之冀果不死將疾謂其友衛中行大受韓愈退之曰吾夢大山裂流出赤黄物如金左人曰是所謂大還者今三矣君既没愈追占其夢曰山者艮艮為背裂而流赤黄疽象也大還者大歸也其告之矣妻范陽盧氏鄭滑節度使兼御史大夫羣之女與君合徳親戚無一退言男三人長曰初恊律次曰彪其幼曰還適三歳女子九人銘曰不贏其躬以尚其後人太學博士李君墓誌銘公誌李君而獨撮其服泌藥一事以為世誡亦變調也太學博士頓丘李于余兄孫女婿也年四十八長慶三年正月五日卒其月二十六日穿其妻墓而合𦵏之在某縣某地子三人皆幼初于以進士為鄂岳從事遇方士栁泌從受藥法服之往徃下血比四年病益急乃死其法以鉛滿一鼎按中為空實以水銀盖封四際燒為丹砂云余不知服食説自何世起殺人不可計而世慕尚之益至此其惑也在文書所記及耳聞相傳者不説今直取目見親與之遊而以藥敗者六七公以為世誡工部尚書歸登殿中御史李虚中刑部尚書李遜遜弟刑部侍郎建襄陽節度使工部尚書孟簡東川節度御史大夫盧坦金吾將軍李道古此其人皆有名位世所共識工部既食水銀得病自説若有燒鐵杖自顛貫其下者摧而為火射節竅以出狂痛號呼乞絶其茵席常得水銀發且止吐血十數年以斃殿中疽發其背死刑部且死謂余曰我為藥誤其季建一旦無病死襄陽黜為吉州司馬余自袁州還京師襄陽乗舸邀我於蕭洲屏人曰我得袐藥不可獨不死今遺子一器可用棗肉為丸服之别一年而病其家人至訊之曰前所服藥誤方且下之下則平矣病二歳竟卒盧大夫死時溺出血肉痛不可忍乞死乃死金吾以栁泌得罪食泌藥五十死海上此可以為誡者也蘄不死乃速得死謂之智可不可也五穀三牲鹽醯果蔬人所常御人相厚勉必曰强食今惑者皆曰五穀令人夭不能無食當務減節鹽醯以濟百味豚魚雞三者古以養老反曰是皆殺人不可食一筵之饌禁忌十常不食二三不信常道而務鬼怪臨死乃悔後之好者又曰彼死者皆不得其道也我則不然始病曰藥動故病病去藥行乃不死矣及且死又悔嗚呼可哀也已可哀也已國子助教河東薛君墓誌銘譽而諷君諱公逹字大順薛姓曾祖曰希莊撫州刺史贈大理卿祖曰元暉果州流溪縣丞贈左散騎常侍父曰播尚書禮部侍郎侍郎命君後兄據據為尚書水部郎中贈給事中君少氣髙為文有氣力務出于奇以不同俗為主始舉進士不與先軰揖作胡馬及圓丘詩京師人未見其書皆口相傳以熟及擢第補家令主簿佐鳳翔軍軍帥武人君為作書奏讀不識句傳一幕以為笑不為變後九月九日大㑹射設標的髙出百數十尺令曰中酬錦與金若干一軍盡射莫能中君執弓腰二矢指一矢以興揖其帥曰請以為公歡遂適射所一座皆起隨之射三發連三中的壊不可復射中輙一軍大呼以笑連三大呼笑帥益不喜即自免去後佐河陽軍任事去害興利功為多拜恊律郎益棄奇與人為同今天子修太學官有公卿言詔拜國子助教分教東都生元和四年年四十七二月十四日疾暴卒君再娶初娶琅邪王氏後娶京兆韋氏凡産四男五女男生輙即死自給事至君後再絶皆有名遺言曰以公儀之子己巳後我其年閏三月卄一日弟試太子通事舍人公儀京兆府司錄公幹以君之喪歸以五月十五日𦵏于京兆府萬年縣少陵原合祔王夫人塋銘曰宦不遂歸譏于時身不得年又將尤誰世再絶而紹祭以不隳國子司業竇公墓誌銘中多虚語㸃綴精神國子司業竇公諱牟字某六代祖敬逺嘗封西河公大父同昌司馬比四代仍襲爵名同昌諱𦙍生皇考諱叔向官至左拾遺溧水令贈工部尚書尚書於大歴初名能為詩文及公為文亦最長於詩孝謹厚重舉進士登第佐六府五公八遷至檢校虞部郎中元和五年真拜尚書虞部郎中轉洛陽令都官郎中澤州刺史以至司業年七十四長慶二年二月丙寅以疾卒其年八月某日𦵏河南偃師先公尚書之兆次初公善事繼母家居未出學問於江東尚幼也名聲詞章行於京師人遲其至及公就進士且試其輩皆曰莫先竇生於時公舅袁髙為給事中方有重名愛且賢公然實未嘗以干有司公一舉成名而東遇其黨必曰非我之才維吾舅之私其佐昭義軍也遇其將死公權代領以定其危後將盧從史重公不遣奏進官職公視從史益驕不遜偽疾經年轝歸東都從史卒敗死公不以覺微避去為賢告人公始佐崔大夫縱留守東都後佐留守司徒餘慶歴六府五公文武細粗不同自始及終於公無所悔望有彼此言者六府從事幾且百人有愿姦易險賢不肖不同公一接以和與信卒莫與公有怨嫌者其為郎官令守慎法寛惠不刻教誨于國學也嚴以有禮扶善遏過益明上下之分以躬先之恂恂愷悌得師之道公一兄三弟常羣庠鞏常進士水部員外郎朗䕫江撫四州刺史羣以處士徴自吏部郎中拜御史中丞出帥黔容以卒庠三佐大府自奉先令為登州刺史鞏亦進士以御史佐淄青府皆有材名公子三人長曰周餘好善學文能謹謹致孝述父之志曲而不黷次曰某曰某皆以進士貢女子三人愈少公十九歳以童子得見於今四十年始以師視公而終以兄事焉公待我一以朋友不以幼壯先後致異公可謂篤厚文行君子矣其銘曰后緡竇逃閔腹子夏以再家竇為氏聖愕旋河犢引比相嬰撥漢納孔軌後去觀津而家平陵遙遥厥緒夫子是承我敬其人我懐其德作詩孔哀質于幽刻襄陽盧丞墓誌銘變調范陽盧行簡將𦵏其父母乞銘于職方員外郎韓愈曰吾先世世載族姓書吾胄於拓拔氏之𢎞農守守後四代吾祖也為沂錄事參軍五世而吾父也為襄陽丞始吾父自曹之南華尉歴萬年縣尉至襄陽丞以材任煩能持亷名去襄陽則署鹽鐵府出入十年常最其列貞元十三年終其家年六十七殯河南河隂吾母燉煌張氏也王父瓘為兖之金鄉令先君没而十三年夫人終年七十三從殯河隂生子男三人居簡金吾兵曹行簡則吾其次也大理主簿佐江西軍其幼可乆女子嫁浮梁尉崔叔寶將以今年十月自河隂啟𦵏汝之臨汝之汝原吾曰隂陽星歴近世儒莫學獨行簡以其力餘學能名一世舍而從事于人以材稱𦵏其父母乞銘以圖長存是真能子矣可銘也遂以銘𢎞農諱懐仁沂諱璬襄陽諱某今年實元和六年唐荆川曰一篇俱是求文者自言更不言一事河南令張君墓誌銘多劖刻之音君諱署字某河間人大父利貞有名𤣥宗世為御史中丞舉彈無所避由是出為陳留守領河南道採訪處置使數年卒官皇考諱郇以儒學進官至侍御史君方質有氣形貌魁碩長於文詞以進士舉博學宏詞為校書郎自京兆武功尉拜監察御史為幸臣所讒與同輩韓愈李方叔三人俱為縣令南方二年逢恩俱徙掾江陵半歳邕管奏君為判官改殿中侍御史不行拜京兆府司錄諸曹白事不敢平靣視共食公堂抑首促促就哺歠揖起趨去無敢䦨語縣令丞尉畏如嚴京兆事以辦治京兆改鳳翔尹以節鎮京西請與君俱改禮部員外郎為觀察使判官帥它遷君不樂乆去京師謝歸用前能拜三原令歳餘遷尚書刑部員外郎守法争議棘棘不阿改䖍州刺史民俗相朋黨不訴殺牛牛以大耗又多捕生鳥雀魚鼈可食與不可食相買賣時節脱放期為福祥君視事一皆禁督立絶使通經吏與諸生之旁大郡學鄉飲酒喪㛰禮張施講説民吏觀聴從化大喜度支符州折民户租歳徴綿六千屯比郡承命惶怖立期日惟恐不及事被罪君獨疏言治廹嶺下民不識蠶桑月餘免符下民相扶攜守州門呌讙為賀改灃州刺史民税出雜産物與錢尚書有經數觀察使牒州徴民錢倍經君曰刺史可為法不可貪官害民留噤不肯從竟以代罷觀察使使劇吏案簿書十日不得毫毛罪改河南令而河南尹適君平生所不好者君年且老當日日拜走仰望堦下不得已就官數月大不適即以病辭免公卿欲其一至京師君以再不得意於守令恨曰義不可更辱又奚為於京師間竟閉門死年六十君娶河東栁氏女二子昇奴胡師將以某年某月某日𦵏某所其兄將作少監昔請銘于右庻子韓愈愈前與君為御史被讒俱為縣令南方者也最為知君銘曰誰之不如而不公卿奚養之違以不乆生惟其頏頏以世厥聲登封縣尉盧殷墓誌銘序詩一事相感欷簡而韻折元和五年十月日范陽盧殷以故登封縣尉卒登封年六十五君能為詩自少至老詩可錄傳者在紙凡千餘篇無書不讀然止用以資為詩與諫議大夫孟簡恊律孟郊監察御史馮宿好期相推挽卒以病不能為官在登封盡冩所為詩抵故宰相東都留守鄭公餘慶留守數以帛米周其家書薦宰相宰相不能用竟饑寒死登封將死自為書告留守與河南尹乞𦵏已又為詩與常所來往河南令韓愈曰為我具棺留守尹為具凡𦵏事韓愈與買棺又為作銘十一月某日𦵏嵩下鄭夫人墓中君始娶滎陽鄭氏後娶隴西李氏生男輒死卒無子女一人學浮屠法不嫁為比丘尼云唐故河南府王屋縣尉畢君墓誌銘奇畢氏出東平歴漢魏晉宋齊梁陳士大夫不絶入國朝有為司衛少卿貝邢廬許州刺史者曰憬憬之子構累官至吏部尚書卒贈黄門監是為景公景公生抗為廣平太守抗安禄山城陷覆其宗贈户部尚書尚書生坰家破時坰生始四歳與其弟増以俱小漏名籍得不誅為賞口賊中寶應二年河北平宗人宏以家財贖出之求増不得増長為河北從事兼官至御史中丞坰既至長安宏養於家敎讀書明經第宏死坰益壯始自别為畢氏歴尉臨渙安邑王屋年六十一以元和六年二月二日卒於官初罷臨渙徐州節度張建封慕廣平之節死聞君篤行能官請相見署諸從事攝符離令四年及尉王屋徐之從事有為河南尹者聞君當來喜謂人日河南庫歳入錢以千計者五六十萬須謹亷吏今畢侯來吾濟矣繼數尹諸署於府者無不變而畢侯固如初竟以其職死君睦親善事過客未嘗問有無既卒家無一錢凡棺與墓事皆同官與相識者事之娶清河張氏女生男四人曰鎬鉟銶鋭女子三人其長學浮屠法為比丘尼其季二人未嫁以其月二十五日從𦵏偃師之土婁銘曰上古愛民為官求人茍可以任位加其身其後喜權人自求官退而緩者身後人先故廣平死節而子不荷其澤王屋謹亷而神不福其謙嗚呼天與人茍無傷其穴與墳栁子厚墓誌銘昌黎稱許子厚處尺寸斤兩不放一歩子厚諱宗元七世祖慶為拓拔魏侍中封濟隂公曾伯祖奭為唐宰相與褚遂良韓瑗俱得罪武后死髙宗朝皇考諱鎮以事母棄太常博士求為縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號為剛直所與游皆當世名人子厚少精敏無不通逹逮其父時雖少年已自成人能取進士第嶄然見頭角衆謂栁氏有子矣其後以博學宏詞授集賢殿正字儁傑亷悍議論證據今古出入經史百子踔厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人争欲令出我門下交口薦譽之貞元十九年由藍田尉拜監察御史順宗即位拜禮部員外郎遇用事者得罪例出為刺史未至又例貶永州司馬居閒益自刻苦務記覽為詞章汎濫停蓄為深博無涯涘而自肆于山水間元和中嘗例召至京師又偕出為刺史而子厚得栁州既至歎曰是豈不足為政耶因其土俗為設教禁州人順賴其俗以男女質錢約不時贖子本相侔則没為奴婢子厚與設方計悉令贖歸其尤貧力不能者令書其傭足相當則使歸其質觀察使下其法于他州比一歳免而歸者且千人衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文詞者悉有法度可觀其召至京師而復為刺史也中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請于朝將拜疏願以栁易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕悦酒食游戲相徴逐詡詡强笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髪比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也此冝禽獸夷狄所不忍為而其人自視以為得計聞子厚之風亦可以少愧矣子厚前時少年勇於為人不自貴重顧藉謂功業可立就故坐廢退既退又無相知有氣力得位者推挽故卒死於窮裔材不為世用道不行于時也使子厚在臺省時自持其身已能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮然子厚斥不乆窮不極雖有出于人其文學詞章必不能自力以致必傳于後如今無疑也雖使子厚得所願為將相於一時以彼易此孰得孰失必有能辨之者子厚以元和十四年十一月八日卒年四十七以十五年七月十日歸𦵏萬年先人墓側子厚有子男二人長曰周六始四歲季曰周七子厚卒乃生女子二人皆㓜其得歸葬也費皆出觀察使河東裴君行立行立有節槩重然諾與子厚結交子厚亦為之盡竟賴其力葬子厚於萬年之墓者舅弟盧遵遵涿人性謹順學問不厭自子厚之斥遵從而家焉逮其死不去既往葬子厚又將經紀其家庶幾有始終者銘曰是惟子厚之室既固既安以利其嗣人施先生墓銘誌獨詳説經及官太學本末銘亦韻折貞元十八年十月十一日太學博士施先生士丐卒其寮太原郭伉買石誌其墓昌黎韓愈為之辭曰先生明毛鄭詩通春秋左氏傳善講説朝之賢士大夫從而執經考疑者繼於門太學生習毛鄭詩春秋左氏傳者皆其弟子貴游之子弟時先生之説二經來太學帖帖坐諸生下恐不卒得聞先生死二經生喪其師仕於學者亡其朋故自賢士大夫老師宿儒新進小生聞先生之死哭泣相弔歸衣服貨財先生年六十九在太學者十九年由四門助教為太學助教由助教為博士太學秩滿當去諸生輙拜疏乞留或留或遷凡十九年不離太學祖曰旭袁州冝春尉父曰婼豪州定逺丞妻曰太原王氏先先生卒子曰友直明州鄮縣主簿曰友諒太廟齋郎系曰先生之祖氏自施父其後施常事孔子以彰讐為博士延為太尉太尉之孫始為吳人曰然曰續亦載其跡先生之興公車是召纂序前聞於光有曜古聖人言其㫖宻微箋注紛羅顛倒是非聞先生講論如客得歸卑讓肫肫出言孔揚今其死矣誰嗣為宗縣曰萬年原曰神禾髙四尺者先生墓耶南陽樊紹述墓誌銘昌黎文多竒崛然亦多生割處樊紹述既卒且葬愈將銘之從其家求書得書號魁紀公者三十巻曰樊子者又三十巻春秋集傳十五巻表牋狀䇿書序傳記紀誌説論今文讚銘凡二百九十一篇道路所遇及器物門里雜銘二百二十賦十詩七百一十九曰多矣哉古未嘗有也然而必出於已不襲蹈前人一言一句又何其難也必出入仁義其富若生蓄萬物必具海含地負放恣横從無所統紀然而不煩於繩削而自合也嗚呼紹述於斯術其可謂至於斯極者矣生而其家貴富長而不有其藏一錢妻子告不足顧且笑曰我道盖是也皆應曰然無不意滿嘗以金部郎中告哀南方還言某師不治罷之以此出為綿州刺史一年徴拜左司郎中又出刺絳州綿絳之人至今皆曰於我有徳以為諫議大夫命且下遂病以卒年若干紹述諱宗師父諱澤嘗帥襄陽江陵官至右僕射贈某官祖某官諱泳自祖及紹述三世皆以軍謀堪將帥䇿上第以進紹述無所不學於辭於聲天得也在衆若無能者嘗與觀樂問曰何如曰後當然已而果然銘曰惟古於詞必已出降而不能乃剽賊後皆指前公相襲從漢迄今用一律寥寥乆哉莫覺屬神徂聖伏道絶塞既極乃通發紹述文從字順各識職有欲求之此其躅貞曜先生墓誌銘一篇交誼之情唐元和九年歳在甲午八月己亥貞曜先生孟氏卒無子其配鄭氏以告愈走位哭且召張籍㑹哭明日使以錢如東都供𦵏事諸嘗與往來者咸來哭弔韓氏遂以書告興元尹故相餘慶閏月樊宗師使來弔告𦵏期徴銘愈哭曰嗚呼吾尚忍銘吾友也夫興元人以幣如孟氏賻且來商家事樊子使來速銘曰不則無以掩諸幽乃序而銘之先生諱郊字東野父廷玢娶裴氏女而選為崑山尉生先生及二季酆郢而卒先生生六七年端序則見長而愈騫涵而揉之内外完好色夷氣清可畏而親及其為詩劌目鉥心刃迎縷解鉤章棘句搯擢胃腎神施鬼設間見層出惟其大翫於詞而與世抺摋人皆劫劫我獨有餘有以後時開先生者曰吾既擠而與之矣其猶足存耶年㡬五十始以尊夫人之命來集京師從進士試既得即去間四年又命來選為溧陽尉迎侍溧上去尉二年而故相鄭公尹河南奏為水陸運從事試協律郎親拜其母於門内母卒五年而鄭公以節領興元軍奏為其軍叅謀試大理評事挈其妻行之興元次於閿鄉暴疾卒年六十四買棺以歛以二人輿歸酆郢皆在江南十月庚申樊子合凡贈賻而𦵏之洛陽東其先人墓左以餘財附其家而供祀將𦵏張籍曰先生揭徳振華於古有光賢者故事有易名况士哉如曰貞曜先生則姓名字行有載不待講説而明皆曰然遂用之初先生所與俱學同姓簡於世次為叔父由給事中觀察浙東曰生吾不能舉死吾知恤其家銘曰於戲貞曜維執不猗維出不訾維卒不施以昌其詩按孟東野是昌黎生平極厚交而其志銘處亦不妄許一字女挐壙銘女挐無它行獨因隨昌黎赴貶所病死而昌黎摹冩其情悲惋可涕女挐韓愈退之第四女也恵而早死愈之為少秋官言佛夷鬼其法亂治梁武事之卒有侯景之敗可一掃刮絶去不冝使爛漫天子謂其言不祥斥之潮州漢南海揭陽之地愈既行有司以罪人家不可留京師廹遣之女挐年十二病在席既驚痛與其父訣又輿致走道撼頓失食飲節死于商南層峰驛即瘞道南山下五年愈為京兆始令子弟與其姆易棺衾歸女挐之骨于河南之河陽韓氏墓葬之女挐死當元和十四年二月二日其發而歸在長慶三年十月之四日其𦵏在十一月之十一日銘曰汝宗葬于是汝安歸之惟永寧唐河中府法曹張君墓碣銘本其妻夫人泣哀之言為誌歐公誌多摹此法有女奴抱嬰兒來致其主夫人之語曰妾張圓之妻劉也妾夫常語妾云吾常獲私于夫子且曰夫子天下之名能文辭者凡所言必傳世行後今妾不幸夫逢盜死途中將以日月𦵏妾重哀其生志不就恐死遂沉泯敢以其稚子汴見先生將賜之銘是其死不為辱而名永長存所以盖覆其遺𦙍子若孫且死萬一能有知將不悼其不幸于土中矣又曰妾夫在嶺南時嘗疾病泣語曰吾志非不如古人吾才豈不如今人而至於是而死於是耶若爾吾哀必求夫子銘是爾與吾不朽也愈既哭弔辭遂叙次其族世名字事始終而銘曰君字直之祖讙父孝新皆為官汴宋間君嘗讀書為文辭有氣有吏才嘗感激欲自奮拔樹功名以見世初舉進士再不第因去事宣武軍節度使得官至監察御史坐事貶嶺南再遷至河中府法曹參軍攝虞鄉令有能名進攝河東令又有名遂署河東從事絳州闕刺史攝絳州事能聞朝廷元和四年秋有事適東方既還八月壬辰死於汴城西雙丘年四十有七明年二月日𦵏河南偃師妻彭城人世有衣冠祖好順泗州刺史父泳卒蘄州别駕女四人男一人嬰兒汴也是為銘清河郡公房公墓碣銘直叙須看他句法字法淘洗鼓鑄處公諱啟字某河南人其大王父融王父琯仍父子為宰相融相天后事逺不大傳琯相𤣥宗肅宗處艱難中與道進退薨贈太尉流聲於兹父乗仕至祕書少監贈太子詹事公胚胎前光生長食息不離典訓之内目擩耳染不學以能始為鳳翔府參軍尚少人吏迎觀望見咸曰真房太尉家子孫也不敢弄以事轉同州澄城丞益自飾理同官憚伏衞晏使嶺南黜陟求佐得公擢摘良姦南土大喜還進昭應主簿裴胄領湖南表公為佐拜監察御史部無遺事胄遷江西又以節鎮江陵公一隨遷佐胄累功進至刑部員外郎賜五品服副胄使事為上介上聞其名徴拜虞部員外在省籍籍遷萬年令果辯憿絶貞元末王叔文用事材公之為舉以為容州經畧使拜御史中丞服佩視三品管有嶺外十三州之地林蠻洞蜒守條死要不相漁劫税節賦時公私有餘削衣貶食不立資遺以班親舊朋友為義在容九年遷領桂州封清河郡公食邑三千户中人使授命書應待失禮客主違言徴貳太僕未至貶䖍州長史而坐使者以疾卒官年五十九其子越能輯父事無失謹謹致孝既𦵏碣墓請銘銘曰房氏二相厥家以聞條葉被澤况公其孫公初為吏亦以門庇佐使于南乃始已致既辦萬年命屏容服功緒卓殊氓獠循業維不順隨失署亡資非公之怨銘以著之瘞硯銘瘞硯一段光景頗奇氣隴西李觀元賔始從進士貢在京師或貽之硯既四年悲歡窮泰未嘗廢其用凡與之試藝春官實二年登上第行于襃谷役者劉𦙍誤墜之地毁焉乃匣歸埋于京師里中昌黎韓愈其友人也贊且識云土乎質陶乎成器復其質非生死類全斯用毁不忍棄埋而識之仁之義硯乎硯乎與瓦礫異唐宋八大家文鈔巻十五
