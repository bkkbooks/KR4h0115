body:
  text: 柳州本傳柳宗元字子厚其先盖河東人從曽祖奭為中書令得罪武后死高宗時父鎭天寶末遇亂奉母隠王屋山常閒行求飬後徙於吳肅宗平賊鎭上書言事擢左衛率府兵曹參軍佐郭子儀朔方府三遷殿中侍御史以事觸竇參貶䕫州司馬還終侍御史宗元少精敏絶倫為文章卓偉精緻一時軰行推仰第進士博學宏詞科授校書郎調藍田尉貞元十九年為監察御史裏行善王叔文韋執誼二人者竒其才及得政引内禁近與計事擢禮部員外郎欲大進用俄而叔文敗貶邵州刺史不半道貶永州司馬既竄斥地又荒厲因自放山澤間其堙厄感鬰一寓諸文倣離騷數十篇讀者咸悲惻雅善蕭俛詒書言情又詒京兆尹許孟容然衆畏其才高懲刈復進故無用力者宗元久汨振其為文思益深甞著書一篇號貞符宗元不得召内閔悼悔念往咎作賦自儆曰懲咎元和十年徙栁州刺史時劉禹錫得播州宗元曰播非人所居而禹錫親在堂吾不忍其窮無辭以白其大人如不往便為母子永訣即具奏欲以栁州授禹錫而自往播會大臣亦為禹錫請因改連州栁人以男女質錢過期不贖子本均則沒為奴婢宗元設方計悉贖之尤貧者令書庸視直足相當還其質已沒者具已錢助贖南方為進士者走數千里從宗元游經指授者為文辭皆有法世號栁栁州十四年卒年四十七宗元少時嗜進謂功業可就既坐廢遂不振然其才實高名盖一時韓愈評其文曰雄深雅健似司馬子長崔蔡不足多也既沒栁州人懐之託言降栁州之堂人有慢者輒死廟於羅池愈因碑以實之云
