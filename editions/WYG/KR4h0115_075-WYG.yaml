body:
  text: 唐宋八大家文鈔巻七十一明茅坤撰廬陵史鈔十一伶官傳此等文章千年絶調嗚呼盛衰之理雖曰天命豈非人事哉原莊宗之所以得天下與其所以失之者可以知之矣世言晉王之將終也以三矢賜莊宗而告之曰梁吾仇也燕王吾所立契丹與吾約為兄弟而皆背晉以歸梁此三者吾遺恨也與爾三矢爾其無忘乃父之志莊宗受而藏之於廟其後用兵則遣從事以一少牢告廟請其矢盛以錦囊負而前驅及凱旋而納之方其係燕父子以組函梁君臣之首入於太廟還矢先王而告以成功其意氣之盛可謂壯哉及仇讐己滅天下己定一夫夜呼亂者四應倉皇東出未及見賊而士卒離散君臣相顧不知所歸至於誓天斷髪泣下沾襟何其衰也豈得之難而失之易歟抑本其成敗之迹而皆自於人歟書曰滿招損謙得益憂勞可以興國逸豫可以忘身自然之理也故方其盛也舉天下之豪傑莫能與之爭及其衰也數十伶人困之而身死國滅為天下笑夫禍患常積於忽微而智勇多困於所溺豈獨伶人也哉作伶官傳莊宗既好俳優又知音能度曲至今汾晉之俗往往能歌其聲謂之御製者皆是也其小字亞子當時人或謂之亞次又别為優名以自目曰李天下自其為王至於為天子常身與俳優雜戲於庭伶人由此用事遂至於亡皇后劉氏素微其父劉叟賣藥善卜號劉山人劉氏性悍方與諸姬爭寵常自恥其世家而特諱其事莊宗乃為劉叟衣服自負蓍囊藥篋使其子繼岌提破帽而隨之造其卧内曰劉山人來省女劉氏大怒笞繼岌而逐之宫中以此為笑樂其戰於胡柳也嬖伶周匝為梁人所得其後滅梁入汴周匝謁於馬前莊宗得之喜甚賜以金帛勞其良苦周匝對曰身䧟仇人而得不死以生者教坊使陳俊内園栽接使儲德源之力也願乞二州以報此兩人莊宗皆許以為刺史郭崇韜諫曰陛下所與共取天下者皆英豪忠勇之士今大功始就封賞未及於一人而先以伶人為刺史恐失天下心不可因格其命踰年而伶人屢以為言莊宗謂崇韜曰吾已許周匝矣使吾慙見此三人公言雖正然當為我屈意行之卒以俊為景州刺史德源為憲州刺史莊宗好畋獵獵於中牟踐民田中牟縣令當馬切諫為民請莊宗怒叱縣令去將殺之伶人敬新磨知其不可乃率諸伶走追縣令擒至馬前責之曰汝為縣令獨不知吾天子好獵耶奈何縱民稼穡以供稅賦何不饑汝縣民而空此地以備吾天子之馳騁汝罪當死因前請亟行刑諸伶共唱和之莊宗大笑縣令乃得免去莊宗嘗與羣優戲於庭四顧而呼曰李天下李天下何在新磨遽前以手批其頰莊宗失色左右皆恐羣伶亦大驚駭共持新磨詰曰汝奈何批天子頰新磨對曰李天下者一人而已復誰呼邪於是左右皆笑莊宗大喜賜與新磨甚厚新磨嘗奏事殿中殿中多惡犬新磨去一犬起逐之新磨倚柱而呼曰陛下毋縱兒女囓人莊宗家世沙陀沙陀之人諱狗故新磨以此譏之莊宗大怒彎弓注矢將射之新磨急呼曰陛下無殺臣臣與陛下為一體殺之不祥莊宗大驚問其故對曰陛下開國改元同光天下皆謂陛下同光帝且同銅也若殺敬新磨則同無光矣莊宗大笑乃釋之然時諸伶獨新磨尤善俳其語最著而不聞其佗過惡其敗政亂國者有景進史彦瓊郭門髙三人為最是時諸伶人出入宫掖侮弄縉紳羣臣憤嫉莫敢出氣或反相附託以希恩倖四方藩鎮貨賂交行而景進最居中用事莊宗遣進等出訪民間事無大小皆以聞毎進奏事殿中左右皆屏退軍機國政皆與參决三司使孔謙兄事之呼為八哥莊宗初入洛居唐故宫室而嬪御未備閹宦希㫖多言宫中夜見鬼物相驚恐莊宗問所以禳之者因曰故唐時後宫萬入今空宫多怪當實以人乃息莊宗欣然其後幸鄴乃遣進等採鄴美女千人以充後宫而進等縁以為姦軍士妻女因而逃逸者數千人莊宗還洛進載鄴女千人以從道路相屬男女無别魏王繼岌已破蜀劉皇后聽宦者讒言遣繼岌賊殺郭崇韜崇韜素嫉伶人常裁抑之伶人由此皆樂其死皇弟存乂崇韜之壻也進讒於莊宗曰存乂且反為婦翁報仇乃囚而殺之朱友謙以梁河中降晉者及莊宗入洛伶人皆求賂於友謙友謙不能給而辭焉進乃讒友謙曰崇韜且誅友謙不自安必反宜并誅之於是及其將五六人皆族滅之天下不勝其寃進官至銀青光禄大夫檢校左散騎常侍兼御史大夫上柱國史彦瓊者為武德使居鄴都而魏博六州之政皆决彦瓊自留守王正言而下皆俛首承事之是時郭崇韜以無罪見殺於蜀天下未知其死也第見京師殺其諸子因相傳曰崇韜殺魏王繼岌而自王於蜀矣以故族其家鄴人聞之方疑惑已而朱友謙又見殺友謙子建徽為澶州刺史有詔彦瓊使殺之彦瓊秘其事夜半馳出城鄴人見彦瓊無故夜馳出因驚傳曰劉皇后怒崇韜之殺繼岌也已弑帝而自立急召彦瓊計事鄴都大恐貝州人有來鄴者傳此語以歸戍卒皇甫暉聞之由此刼趙在禮作亂在禮已至館陶鄴都巡檢使孫鐸見彦瓊求兵禦賊彦瓊不肯與曰賊未至至而給兵豈晚耶已而賊至彦瓊以兵登北門聞賊呼聲大恐棄其兵而走單騎歸於京師在禮由是得入於鄴以成其叛亂者由彦瓊啟而縱之也郭門髙者名從謙門髙其優名也雖以優進而嘗有軍功故以為從馬直指揮使從馬直蓋親軍也從謙以姓郭拜崇韜為叔父而皇弟存乂又以從謙為養子崇韜死存乂見囚從謙置酒軍中憤然流涕稱此二人之寃是時從馬直軍士王温宿衛禁中夜謀亂事覺被誅莊宗戲從謙曰汝黨存乂崇韜負我又教王温反復欲何為乎從謙恐退而激其軍士曰罄爾之貲食肉而飲酒無為後日計也軍士問其故從謙因曰上以王温故俟破鄴盡阬爾曹軍士信之皆欲為亂李嗣源兵反嚮京師莊宗東幸汴州而嗣源先入莊宗至萬勝不得進而還軍士離散尚有二萬餘人居數日莊宗復東幸汜水謀扼闗以為拒四月丁亥朔朝羣臣於中興殿宰相對三刻罷從駕黃甲馬軍陣於宣仁門步軍陣於五鳳門以俟莊宗入食内殿從謙自營中露刃注矢馳攻興教門與黃甲軍相射莊宗聞亂率諸王衛士擊亂兵出門亂兵縱火焚門縁城而入莊宗擊殺數十百人亂兵從樓上射帝帝傷重踣於絳霄殿廊下自皇后諸王左右皆奔走至午時帝崩五坊人善友聚樂器而焚之嗣源入洛得其骨葬新安之雍陵以從謙為景州刺史已而殺之傳曰君以此始必以此終莊宗好伶而弑於門髙焚以樂器可不信哉可不戒哉伶人始則怨崇韜之沮抑之也而讒之劉后使其子繼岌賊殺之於蜀再則仇友謙之不與賂也而併殺友謙三則因而人情詾詾中外訛言遂激軍士成趙在禮之亂四則郭從謙又以莊宗嘗誡之并激軍士助嗣源之變而莊宗被弑一一如畫宦者傳歐陽撰五代史於宦者傳獨卓犖千古為後代之戒嗚呼自古宦女之禍深矣明者未形而知懼暗者患及而猶安焉至於亂亡而不可悔也雖然不可以不戒作宦者傳張承業字繼元唐僖宗時宦者也本姓康幼閹為内常侍張泰養子晉王兵擊王行瑜承業數往來兵間晉王喜其為人及昭宗為李茂貞所迫將出奔太原乃先遣承業使晉以道意因以為河東監軍其後崔𦙍誅宦官宦官在外者悉詔所在殺之晉王憐承業不忍殺匿之斛律寺昭宗崩乃出承業復為監軍晉王病且莗以莊宗屬承業曰以亞子累公等莊宗常兄事承業嵗時升堂拜母甚親重之莊宗在魏與梁戰河上十餘年軍國之事皆委承業承業亦盡心不懈凡所以畜積金粟收市兵馬勸課農桑而成莊宗之業者承業之功為多自貞簡太后韓德妃伊淑妃及諸公子在晉陽者承業一切以法繩之權貴皆歛手畏承業莊宗嵗時自魏歸省親須錢蒲博賞賜伶人而承業主藏錢不可得莊宗乃置酒庫中酒酣使子繼岌為承業起舞舞罷承業出寳帶幣馬為贈莊宗指錢積呼繼岌小字以語承業曰和哥乏錢可與錢一積何用帶馬為也承業謝曰國家錢非臣所得私也莊宗以語侵之承業怒曰臣老勑使非為子孫計惜此庫錢佐王成霸業爾若欲用之何必問臣財盡兵散豈獨臣受禍也莊宗顧元行欽曰取劍來承業起持莊宗衣而泣曰臣受先王顧托之命誓雪家國之讐今日為王惜庫物而死死不愧於先王矣閻寳從旁解承業手令去承業奮拳毆寳踣罵曰閻寳朱温之賊䝉晉厚恩不能有一言之忠而反謟諛自容邪太后聞之使召莊宗莊宗性至孝聞太后召甚懼乃酌兩巵謝承業曰吾杯酒之失且得罪太后願公飲此為吾分過承業不肯飲莊宗入内太后使人謝承業曰小兒忤公已笞之矣明日太后與莊宗俱過承業第慰勞之盧質嗜酒傲忽自莊宗及諸公子多見侮慢莊宗深嫉之承業乘間請曰盧質嗜酒無禮臣請為王殺之莊宗曰吾方招納賢才以就功業公何言之過也承業起賀曰王能如此天下不足平也質因此獲免天祐十八年莊宗已諾諸將即皇帝位承業方卧病聞之自太原肩輿至魏諫曰大王父子與梁血戰三十年本欲雪家國之讐而復唐之社稷今元兇未滅而遽以尊名自居非王父子之初心且失天下望不可莊宗謝曰此諸將之所欲也承業曰不然梁唐晉之讐賊而天下所共惡也今王誠能為天下去大惡復列聖之深讐然後求唐後而立之使唐之子孫在孰敢當之使唐無子孫天下之士誰可與王爭者臣唐家一老奴耳誠願見大王之成功然後退身田里使百官送出洛東門而令路人指而歎曰此本朝勑使先王時監軍也豈不臣主俱榮哉莊宗不聽承業知不可諫乃仰天大哭曰吾王自取之悞老奴矣肩輿歸太原不食而卒年七十七同光元年贈左武衛上將軍諡曰正憲張居翰字德卿故唐掖廷令張從玫之養子昭宗時為范陽監軍與節度使劉仁恭相善天復中大誅宦者仁恭匿居翰大安山之北谿以免其後梁兵攻仁恭仁恭遣居翰從晉王攻梁潞州以牽其兵晉遂取潞州以居翰為昭義監軍莊宗即位與郭崇韜並為樞宻使莊宗滅梁而驕宦官因以用事郭崇韜又専任政居翰黙黙茍免而已魏王破蜀王衍朝京師行至秦川而明宗軍變於魏莊宗東征慮衍有變遣人馳詔魏王殺之詔書已印畫而居翰發視之詔書言誅衍一行居翰以謂殺降不祥乃以詔傳柱揩去行字改為一家時蜀降人與衍俱東者千餘人皆獲免莊宗遇弑居翰見明宗於至德宫求歸田里天成三年卒於長安年七十一五代文章陋矣而史官之職廢於䘮亂傳記小說多失其傳故其事迹終始不完而雜以訛繆至於英豪奮起戰爭勝敗國家興廢之際豈無謀臣之略辯士之談而文字不足以發之遂使泯然無傳於後世然獨張承業事卓卓在人耳目至今故老猶能道之其論議可謂偉然歟殆非宦者之言也自古宦者亂人之國其源深於女禍女色而已宦者之害非一端也蓋其用事也近而習其為心也専而忍能以小善中人之意小信固人之心使人主必信而親之待其已信然後懼以禍福而把持之雖有忠臣碩士列於朝廷而人主以為去已疎逺不若起居飲食前後左右之親為可恃也故前後左右者日益親則忠臣碩士日益疎而人主之勢日益孤勢孤則懼禍之心日益切而把持者日益牢安危出其喜怒禍患伏於帷闥則嚮之所謂可恃者乃所以為患也患已深而覺之欲與疎逺之臣圖左右之親近緩之則養禍而益深急之則挾人主以為質雖有聖智不能與謀謀之而不可為為之而不可成至其甚則俱傷而兩敗故其大者亡國其次亡身而使姦豪得借以為資而起至抉其種類盡殺以快天下之心而後已此前史所載宦者之禍常如此者非一世也夫為人主者非欲養禍於内而疎忠臣碩士於外蓋其漸積而勢使之然也夫女色之惑不幸而不悟則禍斯及矣使其一悟捽而去之可也宦者之為禍雖欲悔悟而勢有不得而去也唐昭宗之事是已故曰深於女禍者謂此也可不戒哉昭宗信狎宦者由是有東宫之幽既出而與崔𦙍圖之𦙍為宰相顧力不足為乃召兵於梁梁兵且至而宦者挾天子走之岐梁兵圍之三年昭宗既出而唐亡矣初昭宗之出也梁王悉誅唐宦者第五可範等七百餘人其在外者悉詔天下捕殺之而宦者多為諸鎮所藏匿而不殺是時方鎮僣擬悉以宦官給事而吳越最多及莊宗立詔天下訪求故唐時宦者悉送京師得數百人宦者遂復用事以至於亡此何異求已覆之車躬駕而履其轍也可為悲夫莊宗未滅梁時承業已死其後居翰雖為樞宻使而不用事有宣徽使馬紹宏者嘗賜姓李頗見信用然誣殺大臣黷貨賂専威福以取怨於天下者左右狎暱黃門内養之徒也是時明宗自鎮州入覲奉朝請於京師莊宗頗疑其有異志隂遣紹宏伺其動靜紹宏反以情告明宗明宗自魏而反天下皆知禍起於魏孰知其啟明宗之二心者自紹宏始也郭崇韜已破蜀莊宗信宦者言而疑之然崇韜之死莊宗不知皆宦者為之也當此之時舉唐之精兵皆在蜀使崇韜不死明宗入洛豈無西顧之患其能晏然取唐而代之邪及明宗入立又詔天下悉捕宦者而殺之宦者亡竄山谷多削髪為浮屠其亡至太原者七十餘人悉捕而殺之都亭驛流血盈庭明宗晚而多病王淑妃専内以干政宦者孟漢瓊因以用事秦王入視明宗疾已革既出而聞哭聲以謂帝崩矣乃謀以兵入宫者懼不得立也大臣朱宏昭等方圖其事議未决漢瓊遽入見明宗言秦王反即以兵誅之䧟秦王大惡而明宗以此飲恨而終後愍帝奔於衛州漢瓊西迎廢帝於潞廢帝惡而殺之嗚呼人情處安樂自非聖哲不能久而無驕怠宦女之禍非一日必伺人之驕怠而浸入之明宗非佚君而猶若此者蓋其在位差久也其餘多武人崛起及其嗣續世數短而年不永故宦者莫暇施為然其為大害者略可見矣獨承業之論偉然可愛而居翰更一字以活千人君子之於人也茍有善焉無所不取吾於斯二人者有所取焉取其善而戒其惡所謂愛而知其惡憎而知其善也故并述其禍敗之所以然者著於篇唐宋八大家文鈔巻七十一
