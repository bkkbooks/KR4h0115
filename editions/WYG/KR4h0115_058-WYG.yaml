body:
  text: 唐宋八大家文鈔卷五十五明茅坤撰廬陵文鈔二十七墓誌銘兵部員外郎天章閣待制杜公墓誌銘崛杜公以兵畧顯故誌中獨詳而少所歴它官皆畧矣慶厯三年盜起京西掠商鄧均房叛兵燒光化軍逐守吏吏不能捕天子患之問宰相誰可任者宰相言度支判官尚書虞部員外郎杜某名家子好學通知古今宜可用乃以君為京西轉運按察使居數月賊平叛兵誅死明年廣西區希範誘白崖山蠻䝉趕襲破環州陷鎮寜帶溪普義有衆數千以攻桂管宰相又言前時杜某守横州言蠻事可聴宜知蠻利害天子驛召君見便殿所對合意即除君刑部員外郎直集賢院廣南西路轉運按察安撫等使君至宜州得州人吴香及獄囚歐世宏脱其械使入賊峒説其酋豪君乗其怠急擊之破其五峒斬首數百級復取環州因盡焚其山林積聚希範窮迫走荔波洞䝉趕率偽将相數十人以其衆降君與将佐謀曰夫蠻習險恃阻如捕猩猱而吾兵以苦暑難乆是進退遲速皆不可為故常務捐厚利以招之葢威不足以制則恩不能以懐此其所以數叛也今吾兵雖幸勝然蠻特敗而來耳豈真降者邪啖之以利後必復動乃慨然歎曰蠻知利而不知威久矣吾将先威而後信庶幾信可立也乃擊牛為酒大會環州戮其坐中者六百餘人而釋其尫病脅從與其非因敗而降者百餘人後三日兵破荔波擒希範至并戮而醢之以醢賜諸溪峒於是叛蠻無噍類而君威震南海言事者論君殺降為國失信於蠻貊天子置之不問詔書諭君賜以金帛君即上書引咎六年徙為兩浙轉運使築錢塘堤自官浦至沙陛以除海患明年又徙河北轉運使召見奏事移刻天子益知其材賜金紫服以遣之是嵗夏拜天章閣待制充環慶路兵馬都部署經略安撫使知慶州君言殺降臣也宜得罪将吏惟臣所使其勞未録不敢先受命天子為君悉録将吏賞之乃受命自元昊稱臣聴誓而數犯約撓邊邊吏避生事縱不敢爭君始至其酋孟香率千餘人内附事聞詔君如約君言如約當還而孟香得罪夏人勢無還理遣之必反為邊患議未決夏人以兵入界求孟香孟香散走自匿夏兵驅殺邊户掠奪牛馬而求孟香益急朝議責君亟索而還之君言夏人違誓舉兵孟香不可與因移檄夏人不償所掠則孟香不可得夏人不肯償所掠君亦不與孟香夏人後亦不敢復動君治邊二嵗有威愛皇祐二年五月甲子疾卒于官享年四十有六天子震悼賻恤其家以其子炤為秘書省挍書郎君以廕補将作監主簿累官至尚書兵部員外郎階朝奉郎勲䕶軍嘗以太子中舍知建陽縣除民無名租嵗以萬計閩俗貪嗇有老而生子者父兄多不舉曰是将分吾貲君上書請立伍保俾民相察寘之法由是生子得免閩人久之以君為徳多以君姓字名其子曰生汝者杜君也君諱杞字偉長世為金陵人其曾伯祖昌業仕江南李氏為江州節度使江南國滅杜氏北遷今為開封府開封人也曾祖諱某贈給事中祖諱鎬官至龍圖閣學士尚書禮部侍郎父諱某贈尚書工部侍郎君初娶蒋氏封某縣君後娶徐氏封東海縣君女六人其二適人四尚㓜子男一人炤也杜氏自君皇祖侍郎以博學為世儒宗故其子孫皆守儒學而多聞人君尤博覽强記其為文章多論當世利害甚辯有文集十巻奏議集十二巻其居官以精敏明幹所至有聲君學問之餘兼喜陰陽數術之説常自推其數曰吾年四十六死矣其親戚朋友莫不聞其説至其嵗果然嗚呼可謂異矣所謂命者果有數邪其果可以自知邪皇祐六年某月日其兄駕部員外郎植與其孤𦵏君于某縣某鄉某原銘曰其敏以達其果以決其守不奪其摧不折其終一節兹謂不没尚書工部郎中歐陽公墓誌銘誌族父如此歐陽氏世為廬陵人廬陵於五代時屬偽吳故歐陽氏在五代無聞者淳化三年修仲父府君始以進士中乙科其後為御史有能名真宗嘗自擇御史府君以秘書丞召見見者數人皆進自稱薦惟恐不用府君獨立墀下無所説明日拜監察御史中丞王嗣宗指曰是獨立墀下者真御史也會絳州守齊化基犯法制劾其事化基嗣宗素所惡者諷之欲使蔓其獄府君曰如詔而巳嗣宗怒及獄上奏用他吏覆之索其家得銅器十數府君坐鞫獄不盡免官明年復得御史監蘄州税又明年遷殿中侍御史左巡使居二嵗奏事殿中真宗識之勞曰御史乆矣亦勞乎問何所欲府君謝不任職而已後數日真宗語宰相與轉運使宰相疑其有求而不先白巳對以員無闕復使與一大郡宰相召至中書問御史家何在欲郡孰為便對曰無不便宰相怒與海州又移睦州天禧元年入遷侍御史三年出知泗州先是京師嵗旱有浮圖人斷臂禱雨官為起寺於龜山自京師王公大臣皆禮下之其勢傾動四方又誘民男女投淮水死曰佛之法用此得大利而愚民嵗死淮水者㡬百人至其臨溺時用其徒倡呼前後擁之以入至有自悔欲走者呌號不得免府君聞之驚曰害有大於此邪盡捕其徒詰其姦民誅數人遣還鄉里者數百人遂毁其寺入轉尚書司封員外郎三司户部判官六年為廣南東路轉運使前為使者以市舶物代俸錢其利三倍府君歎曰利豈吾欲邪使直以錢為俸今上即位就轉二部郎中秩滿以一弊舟還無一海上物歸朝賜金紫為兩浙路轉運使以足疾求知江州天聖四年又求分司未得命以其年二月某日卒於江州之廨享年六十有八以某年某月某日𦵏某所曾祖諱某祖諱某偽唐吉州軍事判官父諱某偽唐屯田員外郎娶朱氏封金壇縣君先府君以卒嗣子鍳為右侍禁武昌巡撿女二人長適某次未嫁府君諱載字則之性方直嚴謹治身儉薄簡言語為政務清淨平居斂色而坐如對大賔終日不少懈弛人用憚之薦舉下吏人未嘗知後有知者來謝皆拒不納所至官舎未嘗窺園圃至果爛墮地家人無敢取者其清如此銘曰唐隳盜猖土裂四方鍾氏於洪八州自王傳死子時敗陳于楊自梁迄周廬陵偽邦歐陽是家世以不章違命之侯廬陵王土歐陽有聞始我仲父以貢中科來者繼武仲父之材御史其能廉清儉恭直躬以行銘以藏之子孫之承尚書職方郎中分司南京歐陽公墓誌銘中多摹史遷處公諱頴字孝叔咸平三年舉進士中第初仕峽州軍事判官有能名即州拜秘書省著作佐郎知建寜縣未半嵗峽路轉運使薛顔巡部至萬州逐其守之不治者以謂繼不治非尤善治者不能因奏自建寜縣往代之以治聞由萬州相次九領州而治之一再至曰鄂州二辭不行初彭州以母夫人老不果行最後嘉州以老告不行實治七州州大者繁廣小者俗惡而姦皆世指為難治者其尤甚曰歙州民習律令性喜訟家家自為簿書凡聞人之陰私毫髪坐起語言日時皆記之有訟則取以證其視入狴牢就桎梏猶冠帶偃簀恬如也盜有殺其民董氏於市三年捕不獲府君至則得之以抵法又富家有盜夜入啓其藏者有司百計捕之甚急且又大購之皆不獲有司苦之公曰勿捕與購獨召富家二子械付獄鞫之州之吏民皆曰是素良子也大怪之更疑互諫公堅不囘鞫愈急二子服然吏民猶疑其不勝而自誣及取其所盜某物於某所皆是然後讙曰公神明也其治尤難者若是其易可知也公剛果有氣外嚴内明不可犯以是施於政亦以是持其身初皇考侍郎為許田令時丁晉公尚少客其縣皇考識之曰貴人也使與之遊待之極厚及公佐峽州晉公薦之遂拜著作其後晉公居大位用事天下之士往往因而登榮顯而公屏不與之接故其仕也自著作佐郎秘書丞太常博士尚書屯田都官職方三員外郎郎中皆以嵗月考課次第陞知萬峽鄂歙彭鄂閬饒嘉州皆所當得及晉公敗士多不免惟公不及明道二年以老乞分司有田荆南遂歸焉以景祐元年正月二十六日終于家年七十有三祖諱某贈某官皇妣李氏贈某縣君夫人曾氏某縣君先亡公平生彊力少疾病居家忽晨起作遺戒數紙以示其嗣子景昱曰吾将終矣後三日乃終而嗣子景昱能守其家如其戒歐氏出於禹禹之後有越王勾踐勾踐之後有無疆者為楚威王所滅無疆之子皆受楚封封之烏程歐陽亭者為歐陽氏漢世有仕為涿郡守者子孫遂北有居冀州之渤海有居青州之千乗而歐陽仕漢世為博士所謂歐陽尚書者也渤海之歐陽有仕晉者曰建所謂渤海赫赫歐陽堅石者也建遇趙王倫之亂其兄子質南奔長沙自質十二世生詢詢生通仕於唐皆為長沙之歐陽而猶以渤海為封通又三世而生琮琮為吉州刺史子孫家焉自琮八世生萬萬生雅雅生髙祖諱效髙祖生曾祖諱託曾祖生皇祖武昌令諱郴皇祖生公之父贈户部侍郎諱倣皆家吉州又為吉州之歐陽及公遂遷荆南且𦵏焉又為荆南之歐陽嗚呼公於修叔父也銘其叔父宜於其世尤詳銘曰夀孰與之七十而老祿則自取於取猶少扶身以方亦以從公不變其初以及其終尚書比部員外郎陳君墓誌銘誌錯落可誦故尚書比部員外郎陳君卜以至和二年正月某日𦵏于京兆府萬年縣洪固鄉神禾原其素所知秘書丞李詡與其孤安期謀将乞銘於廬陵歐陽修安期曰吾不敢詡曰我能得之乃相與具書弊遣君之客賈繹自長安走京師以請葢君以至和元年五月某日卒于長安享年四十有六其仕未達而所為未有大見于時也然詡節義可信之士以詡能報君而君能知詡則君之為人可知也已君諱漢卿字師黯世居閬中其先博州人因事偽蜀為縣令遂留家焉其曾叔祖省華官至諫議大夫生堯叟堯佐堯咨先後為将相而君自曾祖而下三世不顯曾祖諱省恭不仕祖諱堯封舉進士為虢縣主簿王均亂蜀詣闕上書獻破賊策不報遂退老于嵩山父諱淵亦舉進士官至大理寺丞與其兄漸所謂金龜子者皆以文學知名君生一嵗而孤年十三與其母入蜀過鳳翔謁其府尹而吏少若不為之通君直入伏庭下曰陳某請見因責尹慢士戒吏不謹尹慙笞吏以謝君君用叔祖堯咨廕補将作監主簿累遷大理寺丞監沙苑監權知渭南縣民有兄弟爭田者吏常直其兄而弟訟不巳君為往視其田辨其劵書而以田與弟其兄謝曰我悔欲歸弟以田者數矣直懼笞而不敢耳弟曰我田故多然耻以不直訟兄今我直矣願以田與兄兄弟相持慟哭拜而去由是縣民有事多相持詣君得一言以決曲直又知登封縣縣有惡盜十人已謀未發而尉方以事出君募少年選手力夜往捕獲之明日召尉歸以賊與之曰得是可以論賞賞未及下而尉卒尉河南儒者魏景山也老而且貧君為主其喪事買田宅于汝州以活其妻子通判嘉州治田訟三十年不決者一日決之秩滿嘉人詣轉運使乞留不得時文丞相守成都薦其材而薦者十有五人通判河中府府有妖獄二百餘人君方以公事之他州提㸃刑獄司疑獄有寃召君還視之獨留其一人餘皆釋之累遷尚書虞部員外郎天子享明堂推恩遂遷比部通判寜州決疑獄活一家五人君好學重氣節嘗有負其錢數千萬輒毁其劵棄之與人交久而益篤喜為歌詩至於射藝書法醫藥皆精妙尤好竒畫古書每傾貲購之嘗自為録藏于家其材能好尚皆可嘉也母曰仁夀縣太君王氏初娶王氏生一子安期也後娶又曰王氏銘曰在蜀偽時處昏不迷惟陳最微蜀亡而東高明顯融莫如陳宗惟陳有聲自其高曾君世不興惟興與伏有俟而畜其周必復實始自君昌其子孫考銘有文尚書工部郎中充天章閣待制許公墓誌銘序事亦鬯公諱元字子春姓許氏宣州宣城人也許氏世以孝謹稱鄉里其父亡一子當官兄弟相譲久之曰吾弟材後必庇吾宗乃以公補郊社齋郎徙居海陵力耕以養其母調明州定海劔州順昌縣尉泰州軍事推官戍兵千人自海上亡歸州守聞變不知所為公為詰其所以來二三人出前對公叱左右執之曰惑衆者此爾其餘何罪勞其徒而遣之遷鎮東軍節度推官知潤州丹陽縣縣有練湖決水一寸為漕渠一尺故法盜決湖者罪比殺人會嵗大旱公請借湖水溉民田不待報決之州守遣吏按問公曰便民罪令可也竟不能詰由是溉民田萬餘頃嵗乃大豐再遷太子中舎監揚州博鹽和糴倉知泰州如臯縣所至民愛思之公為吏喜修廢壊其術長於治財自元昊叛河西兵出久無功而天下勞弊三司使言公材以主𣙜貨公言先時賈人入粟塞下京師錢不足以償故錢償愈不足則粟入愈少而價愈高是謂内外俱困請高塞粟之價下南鹽以償之使東南去積滯而西北之粟盈曰此輕重之術也行之果便是時京師粟少而江淮嵗漕不給三司使懼大臣以為憂㕘知政事范仲淹謂公獨可辦乃以公為江淮兩浙荆湖發運判官公曰以六路七十二州之粟不能足京師者吾不信也至則治千艘浮江而上所過州縣留三月食其餘悉發而州縣之廪遠近以次相補由是不數月京師足食既而歎曰此可為於乏時然嵗漕不給者有司之職廢也乃考故事明約信令發斂轉徙至於風波逺近遲速賞罰皆有法凡江湖數千里外談笑治之不擾不勞而用以足公初以殿中丞為判官已而為副為使每嵗終會計來朝天子必加恩禮特賜進士出身官至工部郎中天章閣待制凡在職十有三年已而曰臣憊矣願乞臣一州天子頋代公者難其人其請至八九乆之察其實病且老矣乃以知揚州居嵗餘徙知越州公益病又徙泰州至州未視事以嘉祐二年四月某日卒于家享年六十有九曾祖諱稠池州錄事㕘軍祖諱規贈大理評事父諱逖尚書司封員外郎贈工部侍郎公娶馮氏封崇徳縣君先公卒子男二人長曰宗旦真州揚子縣主簿次曰宗孟守将作監主簿女一人適太常寺太祝滕希雅先是江淮嵗漕京師者常六百萬石其後十餘嵗嵗益不充至公為之嵗必六百萬而常餘百萬以備非常方其去職有勸公進為羨餘者公曰吾豈聚斂者哉敢用此以希寵公為人善談論與人交乆而益篤於其家尤孝悌所得俸禄分給宗族無親疎之異其孤宗旦等以某年某月某日𦵏公於真州揚子縣甘露鄉之某原其所與遊廬陵歐陽修誌於其墓曰嗚呼為天下者固當養材於無事之時葢必有事然後材臣出自寳元慶厯以來兵動一方奔走從事於其間者皆號稱天下豪傑其智者出謀材者獻力訖不得少如其志而公遭此時用其所長且久於其官故得卒就其業而成此名此其可以書矣乃為之銘曰材難矣有藴而不得其時時逢矣有用而不盡其施功難成而易毁雖明哲或不能以自知公材之敏兮用適其宜志方甚壮兮力則先衰行著于家而勞施于國永幽其閟兮銘以哀之尚書都官員外郎歐陽公墓誌銘公銘叔父墓固如此公諱曄字日華於撿挍工部尚書諱託彭城縣君劉氏之室為曾孫武昌縣令諱郴蘭陵夫人蕭氏之室為孫贈太僕少卿諱偃追封潘原縣太君李氏之室為第三子於修為叔父修不幸㓜孤依于叔父而長焉嘗奉太夫人之教曰爾欲識爾父乎視爾叔父其状貎起居言笑皆爾父也修雖㓜已能知太夫人言為悲而叔父之為親也歐陽氏世居江南偽唐李氏時為廬陵大族李氏亡先君昆弟同時而仕者四人獨先君早世其後三人皆登于朝以殁公咸平三年舉進士甲科歴南雄州判官隨閬二州推官江陵府掌書記拜太子中允太常丞博士尚書屯田都官二員外郎享年七十有九最後終于家以慶厯四年三月十日𦵏于安州應城縣髙風鄉彭樂村於其𦵏也其素所養兄之子修泣而書曰嗚呼叔父之亡吾先君之昆弟無復在者矣其長養教育之恩既不可報而至於状貎起居言笑之可思慕者皆不得而見焉矣惟勉而紀吾叔父之可傳於世者庶以盡修之志焉公以太子中允監興國軍鹽酒税太常丞知漢州雒縣博士知端州桂陽監屯田員外郎知黄州遷都官知永州皆有能政坐舉人奪官復以屯田通判歙州以本官分司西京許家于隨復遷都官于家遂致仕景祐四年四月九日卒公為人嚴明方質尤以潔廉自持自為布衣非其義不輒受人之遺少而所與親舊後或甚貴終身不造其門其莅官臨事長於決斷初為隨州推官治獄之難決者三十六大洪山竒峯寺聚僧數百人轉運使疑其積物多而僧為姦利命公往籍之僧以白金千兩餽公公笑曰吾安用此然汝能聴我言乎今嵗大凶汝有積穀六七萬石能盡以輸官而賑民則吾不籍汝僧喜曰諾饑民賴以全活陳堯咨以豪貴自驕官屬莫敢仰視在江陵用私錢詐為官市黄金府吏持帖强僚佐署公呵吏曰官市金當有文符獨不肯署堯咨雖憚而止然諷轉運使出公不使居府中鄂州崇陽素號難治乃徙公治之至則決滯獄百餘事縣民王明與其同母兄李通爭産累嵗明不能自理至貧為人賃舂公折之一言通則具伏盡取其産鉅萬歸于明通退而無怨言桂陽民有爭舟而相毆至死者獄乆不決公自臨其獄出囚坐庭中去其桎梏而飲食之食訖悉勞而還于獄獨留一人于庭留者色動惶頋公曰殺人者汝也囚不知所以然公曰吾視食者皆以右手持匕而汝獨以左今死者傷在右肋此汝殺之明也囚即涕泣曰我殺也不敢以累他人公之臨事明辯有古良吏決獄之術多如此所居人皆愛思之公娶范氏封福昌縣君子男四人長曰宗顔次曰宗閔其二早亡女一人適張氏亦早亡銘曰公之明足以決於事愛足以思於人仁足以施其族清足以潔其身而銘之以此足以遺其子孫唐宋八大家文鈔巻五十五
