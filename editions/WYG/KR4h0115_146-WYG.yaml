body:
  text: 唐宋八大家文鈔巻一百三十四明茅坤撰東坡文鈔十八論解鄭伯克段于鄢隠元年曲而鬯春秋之所深譏聖人之所哀傷而不忍言者三晉趙鞅帥師納衛世子蒯瞶于戚齊國夏衛石曼姑帥師圍戚而父子之恩絶公與夫人姜氏遂如齊而夫婦之道喪鄭伯克段于鄢而兄弟之義亡此三者天下之大戚也夫子傷之而思其所以至此之由故其言尤為深且逺也且夫蒯瞶之得罪於靈公逐之可也逐之而立其子是召亂之道也使輒上之不得從王父之言下之不得從父之令者靈公也故書曰晉趙鞅帥師納衛世子蒯瞶于戚蒯瞶之不去世子者是靈公不得乎逐之之道靈公何以不得乎逐之之道逐之而立其子也魯桓公千乗之君而陷於一婦人之手夫子以為文姜之不足譏而傷乎桓公制之不以漸也故書曰公與夫人姜氏遂如齊言其禍自公作也叚之禍生於愛鄭莊公之愛其弟也足以殺之耳孟子曰舜封象於有庳使之源源而來不及以政孰知夫舜之愛其弟之深而鄭莊公賊之也當太叔之據京城取廩延以為已邑雖舜復生不能全兄弟之好故書曰鄭伯克叚于鄢而不曰鄭伯殺其弟叚以為當斯時雖聖人亦殺之而已矣夫婦父子兄弟之親天下之至情也而相殘之禍至如此夫豈一日之故哉榖梁曰克能也能殺也不言殺見叚之有徒衆也段不稱弟不稱公子賤叚而甚鄭伯也鄢逺也猶曰取之其母之懷中而殺之云爾甚之也然則為鄭伯宜奈何緩追逸賊親親之道也嗚呼以兄弟之親至交兵而戰固親親之道絶已乆矣雖緩追逸賊而其存者幾何故曰於斯時也雖聖人亦殺之而巳矣然而聖人固不使至此也公羊傳曰母欲立之已殺之如勿與而已矣而又區區於當國内外之言是何思之不遠也左氏以為叚不弟故不稱弟如二君故曰克稱鄭伯譏失敎求聖人之意若左氏可以有取焉用郊成十七年先儒之論或曰魯郊僣也春秋譏焉非也魯郊僭也而春秋之所譏者當其罪也賜魯以天子之禮樂者成王也受天子之禮樂者伯禽也春秋之譏魯郊也上則譏成王次則譏伯禽成王伯禽不見於春秋而夫子無所致其譏也無所致其譏而不譏者春秋之所以求信於天下也夫以魯而僭天子之郊其罪惡如此之著也夫子以為無所致其譏而不譏焉則其譏之者固天下之所用而信之也郊之書於春秋者其類有三書卜郊不從乃免牲者譏卜常祀而不譏郊也鼷䑕食郊牛角郊牛之口傷改卜牛者譏養牲之不謹而不譏郊也書四月五月九月郊者譏郊之不時而不譏郊也非卜常祀非養牲之不謹非郊之不時則不書不書則不譏也禘于太廟者為致夫人而書也有事于太廟者為仲遂卒而書也春秋之書郊者猶此而已故曰不譏郊也郊祀者先王之大典而夫子不得見之於周也故因魯之所有天子之禮樂而記郊之變焉耳成十七年九月辛丑用郊公羊傳曰用者不宜用者也九月非所用郊也榖梁傳曰夏之始猶可以承春以秋之末承春之始葢不可矣且夫郊未有至九月者也曰用者著其不時之甚也杜預以為用郊從史文或說用然後郊者皆無取焉㑹于澶淵宋災故襄三十年春秋之時忠信之道闕大國無厭而小國屢叛朝戰而夕盟朝盟而夕㑹夫子葢厭之矣觀周之盛時大宗伯所制朝覲㑹同之禮各有逺近之差逺不至於疎而相忘近不至於數而相凟春秋之際何其亂也故曰春秋之盟無信盟也春秋之㑹無義㑹也雖然紛紛者天下皆是也夫子將譏之而以為不可以勝譏之也故擇其甚者而譏焉桓二年㑹于稷以成宋亂襄三十年㑹于澶淵宋災故皆以深譏而切責之也春秋之書㑹多矣書其所㑹而不書其所以㑹書其所以㑹桓之稷襄之澶淵而巳矣宋督之亂諸侯將討之桓公平之不義孰甚焉宋之災諸侯之大夫㑹以謀歸其財旣而無歸不信孰甚焉非不義不信之甚春秋之譏不至於此也左氏之論得其正矣皆諸侯之大夫而書曰某人某人㑹于澶淵宋災故尤之也不書魯大夫諱之也且夫見鄰國之災匍匐而救之者仁人君子之心也既言而忘之既約而背之委巷小人之事也故書其始之為君子仁人之心而後可以見後之為委巷小人之事春秋之意葢明白如此而公羊傳曰㑹未有言其所為者此言其所為何録伯姫也且春秋為女子之不得其所而死區區焉為人之死録之是何夫子之志不廣也榖梁曰不言災故則無以見其為善澶淵之㑹中國不侵夷狄夷狄不入中國無侵伐八年善之也晉趙武楚屈建之力也如榖梁之説宋之盟可謂善矣其不曰息兵故何也嗚呼左氏得其正矣黑肱以濫來奔昭三十一年諸侯之義守先君之封土而不敢有失也守天子之疆界而不敢有過也故夫以力而相奪以兵而相侵者春秋之所謂暴君也侵之雖不以兵奪之雖不以力而得之不義者春秋之所謂汙君也鄭伯以璧假許田晉侯使韓穿來言汶陽之田歸之于齊此諸侯之以不義而取魯田者也邾庶其以漆閭丘來奔莒牟夷以防兹來奔黒肱以濫來奔此魯之以不義而取諸侯之田者也諸侯以不義而取魯田魯以不義而取諸侯之田皆不容於春秋者也夫子之於庶其牟夷黑肱也責之薄而於魯也罪之深彼其竊邑叛君為穿窬之事市人屠沽且羞言之而安足以重辱君子之譏哉夫魯周公之後守天子之東藩招聚小國叛亡之臣與之為盗竊之事孔子悲傷而痛悼之故於三叛之人具文直書而無隠諱之詞盖其罪魯之深也先儒之説區區於叛人之過惡其論固巳狹矣且夫春秋豈為穿窬盗竊之人而作哉使天下之諸侯皆莫肯容夫如此之人而穿窬盗竊之事將不禁而自絶此春秋之所以用意於其本也左氏曰或求名而不得或欲盖而名彰書齊豹盗三叛人名而公羊之説最為疎謬以為叔術之後而通濫於天下故不繫黒肱於邾嗚呼誰謂孔子而賢叔術耶葢嘗論之黑肱之不繫邾也意其若欒盈之不繫於晉歟欒盈既奔齊而還入曲沃以叛故書曰欒盈入於晉黒肱或者既絶于邾而歸竊其邑以叛歟當時之簡牘既亡其詳不可得而聞矣然以類而求之或亦然歟榖梁曰不言邾别乎邾也不言濫子非天子之所封也此尤迂濶而不可用矣小雅周之衰襄二十九年議論的確而文亦雅詩之中唯周最備而周之興廢於詩為詳葢其道始于閨門父子之間而施及乎君臣之際以被冐乎天下者有乎二南后稷公劉文武創業之艱難而幽厲失道之漸存乎二雅成王纂承文武之烈而禮樂文章之備存乎頌其愈衰愈削而至夷于諸侯者在乎王黍離葢周道之盛衰可以備見於此矣小雅者言王政之小而兼陳乎其盛衰之際者也夫幽厲雖失道文武之業未墜而宣王又從而中興之故雖怨刺並興而未列于國風者以為猶有王政存焉故曰小雅者兼乎周之盛衰者也昔之言者皆得其偏而未備也季札觀周樂歌小雅曰思而不貳怨而不言其周之衰乎文中子曰小雅烏乎衰其周之盛乎季札之所謂衰者盖其當時親見周道之衰而不覩乎文武成康之盛也文中子之所謂盛者言文武之餘烈歴數百年而未忘雖其子孫之微而天下猶或宗周也故曰二子者皆得其偏而未備也太史公曰國風好色而不淫小雅怨誹而不亂當周之衰雖君子不能無怨要在不至於亂而已文中子以為周之全盛不已過乎故通乎二子之説而小雅之道備矣大夫無遂事荘十九年又僖三十年論甚確春秋之書遂一也而有善惡存焉君子觀其當時之實而已矣利害出於一時而制之於千里之外當此之時而不遂君子以為固上之不足以利國下之不足以利民可以復命而後請當此之時而遂君子以為専專者固所貶也而固者亦所譏也故曰春秋之書遂一也而有善惡存焉君子觀其當時之實而已矣公子結勝陳人之婦於鄄遂及齊矦宋公盟公羊傳曰媵不書此何以書以其有遂事書大夫無遂事此其言遂何大夫出疆有可以安國家利社稷則專之可也公子遂如京師遂如晉公羊亦曰大夫無遂事此其言遂何公不得為政也其書遂一也而善惡如此之相逺豈可以不察其實哉春秋者後世所以學為臣之法也謂遂之不譏則愚恐後之為臣者流而為專謂遂之皆譏則愚恐後之為臣者執而為固故曰觀乎當時之實而已矣西漢之法有矯制之罪而當時之名臣皆引此以為據若汲黯開倉以賑饑民陳湯發兵以誅郅支若此者專之可也不然獲罪於春秋矣定何以無正月定元年明辯始終授受之際春秋之所甚謹也無事而書首時事在二月而書王二月事在三月而書王三月者例也至於公之始年雖有二月三月之書而又特書正月隠元年春王正月三月公及邾儀父盟于蔑莊元年春王正月三月夫人孫于齊所以揭天子之正朔而正諸侯之始也公羊傳曰縁民臣之心不可一日無君縁始終之義一年不二君不可曠年無君故諸侯皆踰年即位而書正月定公元年書曰王三月晉人執宋仲㡬于京師先儒疑焉而未得其當也嘗試論之春秋十有二公其得終始之正而備即位之禮者四文公成公襄公哀公也攝而立不得備即位之禮者一隠公也先君不以其道終而已不得備即位之禮者六桓公莊公閔公僖公宣公昭公也先君不以其道終而又在外者二莊公定公也在外踰年而後至者一定公也且夫先君雖在外不以其道終而未嘗有踰年而後至者則是二百四十二年未嘗一日無君而定公之元年魯之統絶者自正月至于六月而後續也正月者正其君也昭公未至定公未立季氏當國而天子之正朔將誰正耶此定之所以無正月也公羊傳曰正月者正即位也定無正月者即位後也定哀多微辭而何休以為昭公出奔國當絶定公不得繼體奉正故諱為㣲辭嗚呼昭公絶而定公又不得立是魯遂無君矣榖梁以為昭無正終故定無正始觀莊公元年書正則不言而可知其妄矣猶三望文㫖踈鬯而韻度磬折先儒論書猶之義者可以己也愚以為不然春秋之所以書猶者二曰如此而猶如此者甚之之辭也公子遂如齊至黄乃復辛已有事於太廟仲遂卒于垂壬午猶繹萬入去籥是也曰不如此而猶如此者幸之之辭也閠月不告朔猶朝于廟不郊猶三望是也夫子傷周道之衰禮樂文章之壞而莫或救之也故區區焉掇拾其遺亡以為其全不可得而見矣得見一二斯可矣故閠月不告朔猶朝于廟者憫其不告朔而幸其猶朝于廟也不郊猶三望者傷其不郊而幸其猶三望也夫郊祀者先王之大典而夫子不得親見之於周也故因魯之所行郊祀之禮而備言之焉耳春秋之書三望者皆為不郊而書也或卜郊不從乃免牲猶三望或郊牛之口傷改卜牛牛死乃不郊猶三望或鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛不郊猶三望榖梁傳曰乃者亡乎人之辭也猶者可以己之辭也且夫魯雖不郊而猶有三望者存焉此夫子之所以存周之遺典也若曰可以己則是周之遺典絶矣或曰魯郊僭也而夫子何存焉曰魯郊僣也而夫子不譏夫子之所譏者當其罪也賜魯以天子之禮樂者成王也受天子之禮樂者伯禽也春秋而譏魯郊也上則譏成王次則譏伯禽成王伯禽不見於經而夫子何譏焉故曰猶三望者所以存周之遺典也范寗以三望為海岱淮公羊以為泰山河海而杜預之說最備曰分野之星及國中山川皆因郊而望祭之此説宜可用觀過斯知仁論亦是終不出蘇氏法門孔子曰人之過也各於其黨觀過斯知仁矣自孔安國以下解者未有得其本指者也禮曰與仁同功其仁未可知也與仁同過然後其仁可知也聞之於師曰此論語之義疏也請得以論其詳人之難知也江海不足以喻其深山谷不足以配其險浮雲不足以比其變揚雄有言有人則作之無人則輟之夫茍見其作而不見其輟雖盗跖為伯夷可也然古有名知人者其效如影響其信如蓍龜此何道也故彼其觀人也亦多術矣委之以利以觀其節乗之以猝以觀其量伺之以獨以觀其守懼之以敵以觀其氣故晉文公以壺飱得趙衰郭林宗以破甑得孟敏是豈一道也哉夫與仁同功而謂之仁則公孫之布被與子路之緼袍何異陳仲子之螬李與顔淵之簞瓢何辨何則功者人所趨也過者人所避也審其趨避而真偽見矣古人有言曰鉏麑違命也推其仁可以託國斯其為觀過知仁也歟君使臣以禮論亦正大君以利使臣則其臣皆小人也幸而得其人亦不過健於才而薄於徳者也君以禮使臣則其臣皆君子也不幸而非其人猶不失亷耻之士也其臣皆君子則事治而民安士有亷耻則臨難不失其守小人反是故先王謹於禮禮以欽為主宜若近於弱然而服暴者莫若禮也禮以文為飾宜若近於偽然而得情者莫若禮也定公問君使臣臣事君如之何孔子曰君使臣以禮臣事君以忠不有爵禄刑罸也乎何為其專以禮使臣也以爵禄而至者貪利之人也利盡則逝矣以刑罰而用之者畏威之人也威之所不及則觧矣故莫若以禮禮者君臣之大義也無時而巳也漢髙祖以神武取天下其得人可謂至矣然恣慢而侮人洗足箕踞溺冠跨項可謂無禮矣故陳平論其臣皆嗜利無耻者以是進取可也至於守成則殆矣髙帝晚節不用叔孫通陸賈其禍豈可勝言哉吕后之世平勃背約而王諸吕㡬危劉氏以亷耻不足故也武帝踞厠而見衛青不冠不見汲黯青雖富貴不改奴僕之姿而黯社稷臣也武帝能禮之而不能用可以太息矣唐宋八大家文鈔巻一百三十四
