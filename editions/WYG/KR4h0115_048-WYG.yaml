body:
  text: 唐宋八大家文鈔巻四十五明茅坤撰廬陵文鈔十七序帝王世次圖序史記帝王世系特按世本故其訛如此堯舜禹湯文武此六君子者可謂顯人矣而後世猶失其傳者豈非以其遠也哉是故君子之學不窮遠以為能而闕其不知慎所傳以惑世也方孔子時周衰學廢先王之道不明而異端之説並起孔子患之乃修正詩書史記以止紛亂之説而欲其傳之信也故略其遠而詳其近於書斷自唐虞以來著其大事可以為世法者而已至於三皇五帝君臣世次皆未嘗道者以其世遠而愼所不知也孔子既殁異端之説復興周室亦益衰亂接乎戰國秦遂焚書先王之道中絶漢興久之詩書稍出而不完當王道中絶之際奇書異説方充斥而盛行其言往往反自託於孔子之徒以取信於時學者既不備見詩書之詳而習傳盛行之異説世無聖人以為質而不自知其取捨真偽至有博學好奇之士務多聞以為勝者於是盡集諸説而論次初無所擇而惟恐遺之也如司馬遷之史記是矣以孔子之學上述前世止於堯舜著其大略而不道其前遷遠出孔子之後而乃上述皇帝以來又詳悉其世次其不量力而務勝宜其失之多也遷所作本紀出於大戴禮世本諸書今依其説圖而考之堯舜夏商周皆同出於黄帝堯之崩也下傳其四世孫舜舜之崩也復上傳其四世祖禹而舜禹皆夀百歲稷契於高辛為子乃同父異母之兄弟今以其世次而下之湯與王季同世湯下傳十六世而為紂王季下傳一世而為文王二世而為武王是文王以十五世祖臣事十五世孫紂而武王以十四世祖伐十四世孫而代之王何其繆哉嗚呼堯舜禹湯文武之道百王之取法也其盛德大業見於行事而後世所欲知者孔子皆已論著之矣其久遠難明之事後世不必知不知不害為君子者孔子皆不道也夫孔子所以為聖人者其智知所取捨皆如此外制集序公本知制誥時所遭逢處感慨序次有憂深言遠之思慶歴三年春丞相呂夷簡病不能朝上既更用大臣鋭意天下事始用諫官御史疏追還夏竦制書既而召韓琦范仲淹於陜西又除富弼樞宻副使弼仲淹琦皆惶恐頓首辭讓至五六不已手詔趣琦等就道甚急而弼方且入求對以辭不得見遣中貴人趣送閣門使即受命嗚呼觀琦等之所以讓上之所以用琦等者可謂聖賢相遭萬世一遇而君臣之際何其盛也於是時天下之士孰不願為材邪顧予何人亦與臺選夏四月召自滑堂入諫院冬十二月拜右正言知制誥是時夏人雖數請命而西師尚未解嚴京東累嵗盜賊最後王倫暴起沂州轉刼江淮之間而張海郭貌山等亦起商鄧以驚京西州縣之吏多不稱職而民弊矣天子方慨然勸農桑興學校破去前例以不次用人哀民之困而欲除其蠧吏知磨勘法久之弊而思别材不肖以進賢能患百職之不修而申行賞罰之信葢欲脩法度矣予時雖掌誥命猶在諫職常得奏事殿中從容盡聞天子所以更張庶事憂閔元元而勞心求治之意退得載于制書以諷曉訓勑在位者然予方與脩祖宗故事又脩起居注又修編勑日與同舍論議治文書所省不一而除目所下率不一二時已迫丞相出故不得專一思慮工文字以盡導天子難諭之意而復誥命於三代之文嗟夫學者文章見用於世鮮矣況得施于朝廷而又遭人主致治之盛若修之鄙使竭其材猶恐不稱而況不能專一其職此予所以常遺恨於斯文也明年秋予出為河北轉運使又明年春權知成德軍事事少間發嚮所作制草而閲之雖不能盡載明天子之意於其所述而得一二足以彰示後世葢王者之訓在焉豈以予文之鄙而廢也於是錄之為三巻予自直閣下儤直八十始滿不數日奉使河東還即以來河北故其所作纔一百五十餘篇云内制集序有老成人之言在昔錢思公嘗以謂朝廷之官雖宰相之重皆可雜以他才處之惟翰林學士非文章不可思公自言為此語頗取怒於達官然亦自負以為至論今學士所作文書多矣至於青詞齋文必用老子浮圖之説祈禳祕祝往往近於家人里巷之事而制詔取便於宣讀常拘以世俗所謂四六之文其類多如此然則果可謂之文章者歟予在翰林六年中間進拜二三大臣皆適不當值而天下無事四夷和好兵革不用凡朝廷之文所以指麾號令訓戒約束自非因事無以發明矧予中年早衰意思零落以非工之作又無所遇以發焉其屑屑應用拘牽常格卑弱不振宜可羞也然今文士尤以翰林為榮選予既罷職院吏取予直草以日次之得四百餘篇因不忍棄況其上自朝廷内及宮禁下暨蠻夷海外事無不載而時政記日厯與起居郎舍人有所畧而不記未必不有取於斯焉嗚呼予且老矣方買田淮潁之間若夫涼竹簟之暑風曝茅簷之冬日睡餘支枕念昔平生仕宦出處顧瞻玉堂如在天上因覽遺藳見其所載職官名氏以較其人盛衰先後孰在孰亡足以知榮寵為虛名而資笑談之一􅛐也亦因以誇於田夫野老而已薛簡肅公文集序大約本韓昌黎詩序中來君子之學或施之事業或見於文章而常患於難兼也蓋遭時之士功烈顯於朝廷名譽光於竹帛故其常視文章為末事而又有不暇與不能者焉至於失志之人窮居隠約苦心危慮而極於精思與其有所感激發憤惟無所施於世者皆一寓於文辭故曰窮者之言易工也如唐之劉栁無稱於事業而姚宋不見於文章彼四人者猶不能兩得況其下者乎惟簡肅公在真宗時以材能為名臣仁宗母后時以剛毅正直為賢輔其决大事定大議嘉謀讜論著在國史而遺風餘烈至今稱於士大夫公絳州正平人也自少以文行推於鄕里既舉進士獻其文百軸於有司由是名動京師其平生所為文至八百餘篇何其盛哉可謂兼於兩得也公之事業顯矣其於文章氣質純深而勁正葢發於其志故如其為人公有子宜孺早卒無後以其弟之子仲孺公期為後公之文既多而往往流散於人間公期能力收拾葢自公薨後三十年始克類次而集之為四十巻公期可謂能世其家者也嗚呼公為有後矣蘇氏文集序予讀此文往往欲流涕專以悲憫子美為世所擯死上立論予友蘇子美之亡後四年始得其平生文章遺稿於太子太傅杜公之家而集錄之以為十巻子美杜氏壻也遂以其集歸之而告于公曰斯文金玉也棄擲埋沒糞土不能銷蝕其見遺于一時必有收而寶之于後世者雖其埋沒而未出其精氣光怪已能常自發見而物亦不能揜也故方其擯斥摧挫流離窮厄之時文章已自行於天下雖其怨家仇人及嘗能出力而擠之死者至其文章則不能少毁而揜蔽之也凡人之情忽近而貴遠子美屈于今世猶若此其伸於後世宜如何也公其可無恨予嘗考前世文章政理之盛衰而怪唐太宗致治幾乎三王之盛而文章不能革五代之餘習後百有餘年韓李之徒出然後元和之文始復于古唐衰兵亂又百餘年而聖宋興天下一定晏然無事又幾百年而古文始盛于今自古治時少而亂時多幸時治矣文章或不能純粹或遲久而不相及何其難之若是歟豈非難得其人歟茍一有其人又幸而及出于治世世其可不為之貴重而愛惜之歟嗟吾子美以一酒食之過至廢為民而流落以死此其可以歎息流涕而為當世仁人君子之職位宜與國家樂育賢材者惜也子美之齒少於予而予學古文反在其後天聖之間予舉進士于有司見時學者務以言語聲偶摘裂號為時文以相誇尚而子美獨與其兄才翁及穆叅軍伯長作為古謌詩雜文時人頗共非笑之而子美不顧也其後天子患時文之弊下詔書諷勉學者以近古由是其風漸息而學者稍趨於古焉獨子美為於舉世不為之時其始終自守不牽世俗趨舍可謂特立之士也子美官至大理評事集賢挍理而廢後為湖州長史以卒享年四十有一其狀貌奇偉望之昂然而即之溫温久而愈可愛慕其材雖高而人亦不甚嫉忌其擊而去之者意不在子美也頼天子聰明仁聖凡當時所指名而排斥二三大臣而下欲以子美為根而累之者皆䝉保全今並列於榮寵雖與子美同時飲酒得罪之人多一時之豪俊亦被收采進顯于朝廷而子美獨不幸死矣豈非其命也悲夫廖氏文集序識見韻折總屬匠心自孔子殁而周衰接乎戰國秦遂焚書六經於是中絶漢興葢久而後出其散亂磨滅既失其傳然後諸儒因得措其異説於其間如河圖洛書怪妄之尤甚者余嘗哀夫學者知守經以篤信而不知偽説之亂經也屢為説以黜之而學者溺其久習之傳反駭然非予以一人之見決千嵗不可考之是非欲奪衆人之所好徒自守而世莫之從也余以謂自孔子没至今二千嵗之間有一歐陽脩者為是説矣又二千嵗焉知無一人焉與脩同其説也又二千嵗將復有一人焉然則同者至于三則後之人不待千嵗而有也同予説者既衆則衆人之所溺者可勝而奪也夫六經非一世之書其將與天地無終極而存也以無終極視數千嵗於其間頃刻爾是則余之有待於後者遠矣非汲汲有求於今世也衡山廖倚與余遊三十年已而出其兄偁之遺文百餘篇號朱陵編者其論洪範以為九疇聖人之法爾非有龜書出洛之事也余乃知不待千嵗而有與余同於今世者矣始余之待于後世也冀有因余言而同者爾若偁者未嘗聞余言葢其意有所合焉然則舉今之世固有不相求而同者矣亦何待於數千嵗乎廖氏家衡山世以能詩知名於湖南而偁尤好古能文章其德行聞于郷里一時賢士皆與之遊以其不達而早死故不顯于世嗚呼知所待者必有時而獲知所蓄者必有時而施茍有志焉不必有求而後合余嘉與偁不相求而兩得也於是乎書江鄰幾文集序江鄰幾文今不傳當非其文之至者而歐陽公序之只道其故舊凋落之意隱然可見余竊不自揆少習為銘章因得論次當世賢士大夫功行自明道景祐以來名卿鉅公往往見於余文矣至於朋友故舊平居握手言笑意氣偉然可謂一時之盛而方從其遊遽哭其死遂銘其藏者是可歎也蓋自尹師魯之亡逮今二十五年之間相繼而殁為之銘者至二十人又有余不及銘與雖銘而非交且舊者皆不與焉嗚呼何其多也不獨善人君子難得易失而交㳺零落如此反顧身世死生盛衰之際又可悲夫而其間又有不幸罹憂患觸網羅至困阨流離以死與夫仕宦連蹇志不獲伸而殁獨其文章尚見於世者則又可哀也歟然則雖其殘篇斷稿猶為可惜況其可以垂世而行遠也故余於聖俞子美之殁既已銘其壙又類集其文而序之其言尤感切而殷勤者以此也陳畱江君鄰幾常與聖俞子美遊而又與聖俞同時以卒余既誌而銘之後十有五年來守淮西又於其家得其文集而序之鄰幾毅然仁厚君子也雖知名於時仕宦久而不進晚而朝廷方將用之未及而卒其學問通博文辭雅正深粹而論議多所發明詩尢清澹閑肆可喜然其文已自行於世矣固不待余言以為輕重而余特區區於是者葢發於有感而云然仲氏文集序言近而㫖逺嗚呼語稱君子知命所謂命其果可知乎貴賤窮亨用舍進退得失成敗其有幸有不幸或當然而不然而皆不知其所以然者則推之於天曰有命夫君子所謂知命者知此而已葢小人知在我故常無所不為君子知有命故能無所屈凡士之有材而不用於世有善而不知於人至於老死困窮而不悔者皆推之有命而不求茍合者也余讀仲君之文而想見其人也君諱訥字樸翁其氣剛其學古其材敏其為文抑揚感激勁正豪邁似其為人少舉進士官至尚書屯田員外郎而止君生於有宋百年全盛之際儒學文章之士得用之時宜其馳騁上下發揮其所蓄振耀於當世而獨韜藏抑鬰久伏而不顯者葢其不茍屈以合世故世亦莫之知也豈非知命之君子歟余謂君非徒知命而不茍屈亦自負其所有者謂雖抑於一時必將伸於後世而不可揜也君之既殁富春孫莘老狀其行以告子史臨川王介甫銘之石以藏諸幽而余又序其集以行於世然則君之不茍屈於一時而有待於後世者其不在吾三人者邪噫余雖老且病而言不文其可不勉梅聖俞詩集序絶佳予聞世謂詩人少達而多窮夫豈然哉葢世所傳詩者多出於古窮人之辭也凡士之藴其所有而不得施於世者多喜自放於山巔水涯之外見蟲魚草木風雲鳥獸之狀類往往探其奇怪内有憂思感憤之鬰積其興於怨刺以道羇臣寡婦之所歎而寫人情之難言葢愈窮則愈工然則非詩之能窮人殆窮者而後工也予友梅聖俞少以䕃補為吏累舉進士輒抑於有司困於州縣凡十餘年年今五十猶從辟書為人之佐鬰其所蓄不得奮見於事業其家宛陵幼習於詩自為童子出語已驚其長老既長學乎六經仁義之説其為文章簡古純粹不求茍説於世世之人徒知其詩而已然時無賢愚語詩者必求之聖俞聖俞亦自以其不得志者樂於詩而發之故其平生所作於詩尤多世既知之矣而未有薦于上者昔王文康公嘗見而歎曰二百年無此作矣雖知之深亦不果薦也若使其幸得用於朝廷作為雅頌以歌詠大宋之功德薦之清廟而追商周魯頌之作者豈不偉歟柰何使其老不得志而為窮者之詩乃徒發於蟲魚物類覉愁感歎之言世徒喜其工不知其窮之久而將老也可不惜哉聖俞詩既多不自收拾其妻之兄子謝景初懼其多而易失也取其自洛陽至于吳興已來所作次為十巻予嘗嗜聖俞詩而患不能盡得之遽喜謝氏之能類次也輒序而藏之其後十五年聖俞以疾卒于京帥余旣哭而銘之因索于其家得其遺藁千餘篇并舊所藏掇其尤者六百七十七篇為一十五巻嗚呼吾於聖俞詩論之詳矣故不復云謝氏詩序為女氏序從兄之詩母之墓銘來得體天聖七年予始遊京師得吾友謝景山景山少以進士中甲科以善歌詩知名其後予於他所又得今舍人宋公所為景山母夫人之墓銘言夫人好學通經自教其子乃知景山出於甌閩數千里之外負其藝於大衆之中一賈而售遂以名知於人者繄其母之賢也今年予自夷陵至許昌景山出其女弟希孟所為詩百餘篇然後又知景山之母不獨成其子之名而又以其餘遺其女也景山嘗學杜甫杜牧之文以雄徤高逸自喜希孟之言尤隠約深厚守禮而不自放有古幽閒淑女之風非特婦人之能言者也然景山嘗從今世賢豪者遊故得聞於當時而希孟不幸為女子莫自章顯於世昔衛莊姜許穆夫人錄於仲尼而列之國風今有傑然巨人能輕重時人而取信後世者一為希孟重之其不冺沒矣予固力不足者復何為哉復何為哉希孟嫁進士陳安國卒時年二十四釋惟儼文集序此篇㸔他以客形主處亦自遠識及多轉調惟儼姓魏氏杭州人少遊京師三十餘年雖學于佛而通儒術喜為辭章與吾亡友曼卿交最善曼卿遇人無所擇必皆盡其忻懽惟儼非賢士不交有不可其意無貴賤一切閉拒絶去不少顧曼卿之兼愛惟儼之介所趨雖異而交合無所間曼卿嘗曰君子泛愛而親仁惟儼曰不然吾所以不交妄人故能得天下士若賢不肖混則賢者安肻顧我哉以此一時賢士多從其遊居相國浮圖不出其戸十五年士嘗遊其室者禮之惟恐不至及去為公卿貴人未始一往干之然嘗竊怪平生所交皆當世賢傑未見卓卓著功業如古人可記者因謂世所稱賢才若不笞兵走萬里立功海外則當佐天子號令賞罰於明堂茍皆不用則絶寵辱遺世俗自高而不屈尚安能酣豢於富貴而無為哉醉則以此誚其坐人人亦復之以謂遺世自守古人之所易若奮身逢時欲必就功業此雖聖賢難之周孔所以窮達異也今子老於浮圖不見用於世而幸不踐窮亨之塗乃以古事之已然而責今人之必然邪然惟儼雖傲乎退偃於一室天下之務當世之利病與其言終日不厭惜其將老也已曼卿死惟儼亦買地京師之東以謀其終乃斂平生所為文數百篇示予曰曼卿之死既已表其墓願為我序其文然及我之見也嗟夫惟儼既不用於世其材莫見於時若考其筆墨馳騁文章贍逸之能可以見其志矣釋袐演詩集序多慷慨嗚咽之㫖覽之如聞擊筑者盖祕演與曼卿遊而歐陽公於曼卿識祕演雖愛祕演又狎之以此篇中命意最曠而逸得司馬子長之神髓矣予少以進士遊京師因得盡交當世之賢豪然猶以謂國家臣一四海休兵革養息天下以無事者四十年而智謀雄偉非常之士無所用其能者往往伏而不出山林屠販必有老死而世莫見者欲從而求之不可得其後得吾亡友石曼卿曼卿為人廓然有大志時人不能用其材曼卿亦不屈以求合無所放其意則往往從布衣野老酣嬉淋漓顛倒而不厭予疑所謂伏而不見者庶幾狎而得之故嘗喜從曼卿遊欲因以陰求天下奇士浮屠袐演者與曼卿交最久亦能遺外世俗以氣節相高二人懽然無所間曼卿隠於酒袐演隠於浮屠皆奇男子也然喜為歌詩以自娛當其極飲大醉歌吟笑呼以適天下之樂何其壯也一時賢士皆願從其遊予亦時至其室十年之間袐演北渡河東之濟鄆無所合困而歸曼卿已死袐演亦老病嗟夫二人者予乃見其盛衰則余亦將老矣夫曼卿詩辭清絶尤稱袐演之作以為雅徤有詩人之意袐演狀貌雄傑其胸中浩然既習于佛無所用獨其詩可行于世而懶不自惜已老胠其槖尚得三四百篇皆可喜者曼卿死袐演漠然無所向聞東南多山水其巔崖崛峍江濤洶涌甚可壯也遂欲往遊焉足以知其老而志在也於其將行為叙其詩因道其盛時以悲其衰唐宋八大家文鈔卷四十五
