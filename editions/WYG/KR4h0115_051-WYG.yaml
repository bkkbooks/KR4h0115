body:
  text: 唐宋八大家文鈔卷四十八明茅坤撰廬陵文鈔二十記仁宗御飛白記文不用意處却有一片渾雄冲澹精神治平四年夏五月余将赴亳假道于汝隂因得閱書于子履之室而雲章爛然輝映日月爲之正冠肅容再拜而後敢仰視盖仁宗皇帝之御飛白也曰此寶文閣之所藏也胡爲于子之室乎子履曰曩者天子宴從臣於羣玉而賜以飛白余幸得與賜焉予窮於世久矣少不恱於時人流離竄斥十有餘年而得不老死江湖之上者盖以遭時清明天子嚮學樂育天下之材而不遺一介之賤使得與羣賢並遊于儒學之舘而天下無事嵗時豐登民物安樂天子優游清閑不邇聲色方與羣臣從容于翰墨之娯而余于斯時竊獲此賜非惟一介之臣之榮遇亦朝廷一時之盛事也子其爲我志之余曰仁宗之德澤涵濡于萬物者四十餘年雖田夫野老之無知猶能悲歌思慕于壠畝之間而況儒臣學士得望清光䝉㤙寵登金門而上玉堂者乎於是相與泫然流涕而書之夫玉韞石而珠藏淵其光氣常見于外也故山輝而白虹水變而五色者至寶之所在也今賜書之藏于子室也吾知将有望氣者言榮光起而燭天者必賜書之所在也御書閣記叙事類太史醴陵縣東二十里有宫曰登真其前有山世傳仙人王喬煉藥于此唐開元間神仙道家之說興天子爲書六大字賜而揭焉太宗皇帝時詔求天下前世名山異迹而尤好書法聞登真有開元時所賜字甚竒乃取至京師閲焉已而還之又賜御書飛白字使藏焉其後登真大火獨飛白書存康定元年道士彭知一探其私笈以市工材悉復宫之舊建樓若干尺以藏賜書予之故人處士任君爲予言其事來乞文以志凡十餘請而不懈予所領職方悉掌天下圖書考圖騐之醴陵老佛之居凡八十而所謂登真者其說皆然乃爲之記夫老與佛之學皆行于世久矣爲其徒者常相訾病若不相容于世二家之說皆見斥于吾儒宜其合勢并力以爲拒守而乃反自相攻惟恐不能相弱者何哉豈非死生性命所持之說相盭而然邪故其代爲興衰各繫于時之好惡雖善辨者不能合二說而一之至其好大宫室以矜世人則其爲事同焉然而佛能箝人情而鼓以禍福人之趣者常衆而熾老氏獨好言清静逺去靈仙飛化之術其事㝠深不可質究則常以淡泊無爲爲務故凡佛氏之動搖興作爲力甚易而道家非遭人主之好尚不能獨興其間能自力而不廢者豈不賢于其徒者哉知一是已慶厯二年八月八日廬陵歐陽修記相州晝錦堂記冶女之文令人恱眼而最得體處在安頓魏國公上以史遷之煙波行宋人之格調仕宦而至将相富貴而歸故鄉此人情之所榮而今昔之所同也盖士方窮時困阨閭里庸人孺子皆得易而侮之若季子不禮於其嫂買臣見棄於其妻一旦高車駟馬旗旄導前而騎卒擁後夾道之人相與駢肩累迹瞻望咨嗟而所謂庸夫愚婦者奔走駭汗羞愧俯伏以自悔罪于車塵馬足之間此一介之士得志于當時而意氣之盛昔人比之衣錦之榮者也惟大丞相魏國公則不然公相人也世有令德爲時名卿自公少時已擢高科登顯仕海内之士聞下風而望餘光者盖亦有年矣所謂将相而富貴皆公所宜素有非如窮阨之人僥倖得志于一時出于庸夫愚婦之不意以驚駭而夸耀之也然則高牙大纛不足爲公榮桓圭衮冕不足爲公貴惟德被生民而功施社稷勒之金石播之聲詩以耀後世而垂無窮此公之志而士亦以此望于公也豈止夸一時而榮一鄉哉公在至和中嘗以武康之節來治于相乃作晝錦之堂于後圃既又刻詩于石以遺相人其言以快㤙讐矜名譽爲可薄盖不以昔人所夸者爲榮而以爲戒于此見公之視富貴爲如何而其志豈易量哉故能出入将相勤勞王家而夷險一節至于臨大事決大議垂紳正笏不動聲色而措天下于㤗山之安可謂社稷之臣矣其豐功盛烈所以銘彛鼎而被絃歌者乃邦家之光非閭里之榮也余雖不獲登公之堂幸嘗竊誦公之詩樂公之志有成而喜爲天下道也于是乎書晝錦題本一俗見而歐陽公却于中尋出第一層議論發明古之文章家地歩如此荆川曰前一段依題説起後乃歸之于正此反題格也有美堂記胸次清曠洗絶古今嘉祐二年龍圖閣直學士尚書吏部郎中梅公出守于杭於其行也天子寵之以詩於是始作有美之堂盖取賜詩之首章而名之以爲杭人之榮然公之甚愛斯堂也雖去而不忘今年自金陵遣人走京師命予誌之其請至六七而不倦予乃爲之言曰夫舉天下之至美與其樂有不得而兼焉者多矣故窮山水登臨之美者必之乎寛閑之野寂寞之鄉而後得焉覽人物之盛麗夸都邑之雄富者必據乎四達之衝舟車之㑹而後足焉盖彼放心于物外而此娯意于繁華二者各有適焉然其爲樂不得而兼也今夫所謂羅浮天台衡岳廬阜洞庭之廣三峽之險號爲東南竒偉秀絶者乃皆在乎下州小邑僻陋之邦此幽潜之士窮愁放逐之臣之所樂也若乃四方之所聚百貨之所交物盛人衆爲一都㑹而又能兼有山水之美以資富貴之娯者惟金陵錢塘然二邦皆僣竊于亂世及聖宋受命海内爲一金陵以後服見誅今其江山雖在而頽垣廢址荒烟野草過而覽者莫不爲之躊躇而悽愴獨錢塘自五代時知尊中國効臣順及其亡也頓首請命不煩干戈今其民幸富完安樂又其俗習工巧邑屋華麗盖十餘萬家環以湖山左右映帶而閩商海賈風㠶浪舶出入于江濤浩渺烟雲杳靄之間可謂盛矣而臨是邦者必皆朝廷公卿大臣若天子之侍從又有四方遊士爲之賔客故喜占形勝治亭榭相與極遊覽之娯然其于所取有得于此者必有遺于彼獨所謂有美堂者山水登臨之美人物邑居之繁一寓目而盡得之葢錢塘兼有天下之美而斯堂者又盡得錢塘之美焉宜乎公之甚愛而難忘也梅公清慎好學君子也視其所好可以知其人焉荆川云如累九層之臺一層高一層真是竒絶峴山亭記風流感慨正是峴山亭文字與孟浩然峴山詩並絶今古峴山臨漢上望之隱然葢諸山之小者而其名特著于荆州者豈非以其人哉其人謂誰羊祐叔子杜預元凱是已方晉與呉以兵争常倚荆州以爲重而二子相繼于此遂以平呉而成晉業其功烈已葢于當世矣至于風流餘韻藹然被于江漢之間者至今人猶思之而于思叔子也尤深葢元凱以其功而叔子以其仁二子所爲雖不同然皆足以垂于不朽而頗疑其反自汲汲于後世之名者何哉傳言叔子嘗登兹山慨然語其屬以謂此山常在而前世之士皆巳湮滅于無聞因自顧而悲傷然獨不知兹山待已而名著也元凱銘功于二石一置兹山之上一投漢水之淵是知陵谷有變而不知石有時而磨滅也豈皆自喜其名之甚而過爲無窮之慮歟将自待者厚而所思者逺歟山故有亭世傳以爲叔子之所逰止也故其屢廢而復興者由後世慕其名而思其人者多也熈寧元年余友人史君中煇以光禄卿來守襄陽明年因亭之舊廣而新之既周以囬廊之壮又大其後軒使與亭相稱君知名當世所至有聲襄人安其政而樂從其遊也因以君之官名其後軒爲光禄堂又欲紀其事于石以與叔子元凱之名並傳于久逺君皆不能止也乃來以記屬于予予謂君知慕叔子之風而襲其遺迹則其爲人與其志之所存者可知矣襄人愛君而安樂之如此則君之爲政于襄者又可知矣此襄人之所欲書也若其左右山川之勝勢與夫草木雲烟之杳靄出沒于空曠有無之間而可以備詩人之登高寫離騷之極目者宜其覽者自得之至于亭屢廢興或自有記或不必究其詳者皆不復道也荆川云此篇與東園記同體皆引故事畧用自語㸃化李秀才東園亭記先本之以風土之瘠繼之以登遊之舊以感園之廢興脩友李公佐有亭在其居之東園今年春以書抵洛命修志之李氏世家隨隨春秋時稱漢東大國魯桓之後楚始盛隨近之常與爲鬭國相勝敗然怪其山川土地既無高深壮厚之勢封域之廣與鄖蓼相介纔一二百里非有古彊諸侯制度而爲大國何也其春秋世未嘗通中國盟㑹朝聘僖二十年方見于經以伐見書哀之元年始約列諸侯一㑹而罷其後乃希見僻居荆夷葢于蒲騷鄖蓼小國之間特大而已故于今雖名藩鎮而實下州山澤之産無美材土地之貢無上物朝廷達官大人自閩陬嶺徼出而顯者徃徃皆是而隨近在天子千里内㡬百年間未出一士豈其庳貧薄陋自古然也予少以江南就食居之能道其風土地既瘠枯民給生不舒愉雖豐年大族厚聚之家未嘗有樹林池沼之樂以爲嵗時休暇之嬉獨城南李氏爲著姓家多藏書訓子孫以學予爲童子與李氏諸兒戲其家見李氏方治東園佳木美草一一手植周視封樹日日去來園間甚勤李氏壽終公佐嗣家又搆亭其間益修先人之所爲予亦壮不復至其家已而去客漢沔遊京師久而乃歸復行城南公佐引予登亭上周尋童子時所見則樹之孽者抱昔之抱者枿草之茁者叢荄之甲者今果矣問其遊兒則有子如予童子之嵗矣相與逆數昔時則于今七閏矣然忽忽如前日事因歎嗟徘徊不能去噫予方仕宦奔走不知再至城南登此亭復㡬閏幸而再至則東園之物又㡬變也計亭之梁木其蠧瓦甓之澑石物其泐乎隨雖陋非予鄉然予之長也豈能忘情于隨哉公佐好學有行鄉里推之與予友善明道二年十月十二日也荆川曰此文直説下去入題處不用收拾為人作一園記直從郡國説起是何等布置泗州先春亭記記先春亭却本堤次之以賓客之館而後及亭以周單子之言論為案所謂以經飾吏治歐陽公之文亦然景祐三年秋清河張侯以殿中丞來守泗上既至問民之所素病而治其尤暴者曰暴莫大于淮越明年春作城之外堤因其舊而廣之度爲萬有九千二百尺用人之力八萬五千泗之民曰此吾利也而大役焉然人力出于州兵而石出乎南山作大役而民不知是爲政者之私我也不出一力而享大利不可相與出米一千三百石以食役者堤成高三十三尺土實石堅捍暴備災可久而不壊既曰泗四達之州也賔客之至者有禮于是因前蒋侯堂之亭新之爲勞餞之所曰思邵亭且推其美于前人而志邦人之思也又曰泗天下之水㑹也嵗漕必廪于此于是治常豐倉西門二夾室一以視出納曰某亭一以爲舟者之寓舍曰通漕亭然後曰吾亦有所休乎乃築州署之東城上爲先春亭以臨淮水而望西山是嵗秋予貶夷陵過泗上于是知張侯之善爲政也昔周單子聘楚而過陳見其道穢而川澤不陂梁客至不授館羇旅無所寓遂知其必亡葢城郭道路旅舍寄寓皆三代爲政之法而周官尤謹著之以爲禦備今張侯之作也先民之備灾而及于賔客徃來然後思自休焉故曰善爲政也先時嵗大水州㡬溺前司封貟外郎張侯夏守是州築堤以禦之今所謂因其舊者是也是役也堤爲大故余記其大者詳焉唐荆川曰此作雖亭記而記堤為詳重其大者也作亭既不詳故不解先春之意真州東園記有畫意真爲州當東南之水㑹故爲江淮兩浙荆湖發運使之治所龍圗閣直學士施君正臣侍御史許君子春之爲使也得監察御史裏行馬君仲塗爲其判官三人者樂其相得之歡而因其暇日得州之監軍廢營以作東園而日徃遊焉嵗秋八月子春以其職事走京師圖其所謂東園者來以示予曰園之廣百畝而流水横其前清池浸其右高臺起其北臺吾望以拂雲之亭池吾俯以澄虚之閣水吾泛以畫舫之舟敞其中以爲清讌之堂闢其後以爲射賔之圃芙渠芰荷之的歴幽蘭白芷之芬芳與夫佳花美木列植而交隂此前日之蒼烟白露而荆棘也高甍巨桷水光日景動搖而下上其寛閑深靚可以答逺響而生清風此前日之頹垣斷塹而荒墟也嘉時令節州人士女嘯歌而管絃此前之晦㝠風雨鼪鼯鳥獸之嘷音也吾于是信有力焉凡圖之所載葢其一二之畧也若乃升于高以望江山之逺近嬉于水而逐魚鳥之浮況其物象意趣登臨之樂覽者各自得焉凡工之所不能畫者吾亦不能言也其爲我書其大槩焉又曰真天下之衝也四方之賔客徃來者吾與之共樂于此豈獨私吾三人者哉然而池臺日益以新草樹日益以茂四方之士無日而不來而吾三人者有時而皆去也豈不眷眷于是哉不爲之記則後孰知其自吾三人者始也予以謂三君子之材賢足以相濟而又協于其職知所後先使上下給足而東南六路之人無辛苦愁怨之聲然後休其餘閒又與四方之賢士大夫共樂于此是皆可嘉也乃爲之書海陵許氏南園記為南園記而特本其世孝一節立論此其文章一地位可法處高陽許君子春治其海陵郊居之南爲小園作某亭某堂于其間許君爲江淛荆淮制置發運使其所領六路七十六州之廣凡賦斂之多少山川之逺近舟楫之徃來均節轉徙視江湖數千里之外如運諸掌能使人樂爲而事集當國家用兵之後修前人久廢之職補京師匱乏之供爲之六年厥績大著自國子博士遷主客貟外郎由判官爲副使夫理繁而得其要則簡簡則易行而不違惟簡與易然後其力不勞而有餘夫以制置七十六州之有餘治數畝之地爲園誠不足施其智而于君之事亦不足書君之美衆矣予特書其一節可以示海陵之人者君本歙人世有孝德其先君司封喪其父母事其兄如父戒其妻事其嫂如姑衣雖弊兄未易衣不敢易食雖具兄未食不敢先食司封之亡一子當得官其兄弟相讓久之諸兄卒以讓君君今遂顯于朝以大其門君撫兄弟諸子猶已子嵗當上計京師而弟之子病君留不忍去其子亦不忍捨君而留遂以俱行君素清貧罄其家貲走四方以求醫而藥必親調食飲必親視至其矢溲亦親候其時節顔色所疾如可理則喜或變動逆節則憂戚之色不自勝其子卒君哭泣悲哀行路之人皆嗟歎嗚呼予見許氏孝弟著于三世矣凡海陵之人過其園者望其竹樹登其臺榭思其宗族少長相從愉愉而樂于此也愛其人化其善自一家而刑一鄉由一鄉而推之無逺邇使許氏之子孫世久而愈篤則不獨化及其人将見其園間之草木有駢枝而連理也禽鳥之翔集于其間者不争巢而棲不擇子而哺也嗚呼事患不爲與夫怠而止爾惟力行而不怠以止然後知予言之可信也叢翠亭記九州皆有名山以爲鎮而洛陽天下中周營漢都自古常以王者制度臨四方宜其山川之勢雄深偉麗以壮萬邦之所瞻由都城而南以東山之近者闕塞萬安轘轅緱氏以連嵩少首尾盤屈踰百里從城中因高以望之衆山逶迤或見或否惟嵩最逺最獨出其嶄巖聳秀㧞立諸峰上而不可掩蔽葢其名在祀典與四嶽俱備天子廵狩望祭其秩甚尊則其高大殊傑當然城中可以望而見者若廵檢署之居洛北者爲尤高廵撿使内殿崇班李君始入其署即相其西南隅而增築之治亭于上敞其南北嚮以望焉見山之連者峰者岫者絡繹聫亘卑相附高相摩亭然起崪然止來而向去而背傾崖怪壑若奔若蹲若鬭若倚世所傳嵩陽三十六峰者皆可以坐而數之因取其蒼翠叢列之状遂以叢翠名其亭亭成李君與賔客以酒食登而落之其古所謂居高眀而逺眺望者歟既而欲紀其始造之嵗月因求修辭而刻之云菱溪石記事雖不甚𦂳要却自風致翛然菱溪之石有六其四爲人取去其一差小而尤竒亦藏民家其最大者偃然僵臥于溪側以其難徙故得獨存每嵗寒霜落水涸而石出谿傍人見其可怪徃徃祀以爲神菱溪按圗與經皆不載唐㑹昌中刺史李濆爲荇谿記云水出永陽嶺西經皇道山下以地求之今無所謂荇溪者詢于滁州人曰此谿是也楊行宻㨿淮南淮人爲諱其嫌名以荇爲菱理或然也谿傍若有遺址云故将劉金之宅石即劉氏之物也金僞呉時貴将與行宻俱起合淝號三十六英雄金其一也金本武夫悍卒而乃能知愛賞竒異爲兒女子之好豈非遭逢亂世功成志得驕于富貴之佚欲而然耶想其陂池臺榭竒木異草與此石稱亦一時之盛哉今劉氏之後散爲編氓尚有居谿旁者予感夫人物之廢興惜其可愛而反棄也乃以三牛曵置幽谷又索其小者得于白塔民朱氏遂立于亭之南北亭負城而近以爲滁人嵗時嬉遊之好夫物之竒者棄沒于幽逺則可惜置之耳目則愛者不免取之而去嗟夫劉金者雖不足道然亦可謂雄勇之士其生平志氣豈不偉哉及其後世荒烟零落至于子孫泯沒而無聞况欲長有此石乎用此可爲富貴者之戒而好竒之士聞此石者可以一賞而足何必取而去也哉唐荆川曰行文委曲幽妙零零碎碎作文歐陽公獨長浮槎山水記風韻翛然浮槎山在慎縣南三十五里或曰浮闍山或曰浮巢二山其事出于浮圖老子之徒荒怪誕幻之說其上有泉自前世論水者皆弗道余嘗讀茶經愛陸羽善言水後得張又新水記載劉伯芻李季卿所列水次第以爲得之于羽然以茶經考之皆不合又新妄狂險譎之士其言難信頗疑非羽之說及得浮槎山水然後益以羽爲知水者浮槎與龍池山皆在廬州界中較其水味不及浮槎逺甚而又新所記以龍池爲第十浮槎之水棄而不録以此知其所失多矣羽則不然其論曰山水上江次之井爲下山水乳泉石池澷流者上其言雖簡而於論水盡矣浮槎之水發自李侯嘉祐二年李侯以鎮東軍留後出守廬州因遊金陵登蒋山飲其水既又登浮槎至其山上有石池涓涓可愛葢羽所謂乳泉澷流者也飲之而甘乃考圖記問于故老得其事迹因以其水遺予于京師予報之曰李侯可謂賢矣夫窮天下之物無不得其欲者富貴者之樂也至于䕃長松藉豐草聽山溜之潺湲飲石泉之滴瀝此山林者之樂也而山林之士視天下之樂不一動其心或有欲于心顧力不可得而止者乃能退而獲樂于斯彼富貴者之能致物矣而其不可兼者惟山林之樂爾惟富貴者而不得兼然後貧賤之士有以自足而高世其不能兩得亦其理與勢之然歟今李侯生長富貴厭于耳目又知山林之爲樂至于攀緣上下幽隱窮絶人所不及者皆能得之其兼取于物者可謂多矣李侯折節好學喜交賢士敏于爲政所至有能名凡物不能自見而待人以彰者有矣其物未必可貴而因人以重者亦有矣故予爲志其事俾世知斯泉發自李侯始也游鯈亭記竒文禹之所治大水七岷山導江其一也江出荆州合沅湘合漢沔以輸之海其爲汪洋誕漫蛟龍水物之所憑風濤晦㝠之變怪壮哉是爲勇者之觀也吾兄晦叔爲人慷慨喜義勇而有大志能讀前史識其盛衰之迹聽其言豁如也困于位卑無所用以老然其胸中亦已壮矣夫壮者之樂非登崇高之丘臨萬里之流不足以爲適今吾兄家荆州臨大江捨汪洋誕漫壮哉勇者之所觀而方規地爲池方不數丈治亭其上反以爲樂何哉葢其擊壺而歌解衣而飲陶乎不以汪洋爲大不以方丈爲局則其心豈不浩然哉夫視富貴而不動處卑困而浩然其心者真勇者也然則水波之漣漪游魚之上下其爲適也與夫荘周所謂惠施游于濠梁之樂何以異烏用蛟魚變怪之爲壮哉故名其亭曰游鯈亭景祐五年四月二日舟中記伐樹記借莊周之言而參之以客對發其感慨署之東園久茀不治修至始闢之糞瘠溉枯爲蔬圃十數畦又植花果桐竹凡百本春陽既浮萌者将動園之守啟曰園有樗焉其根壮而葉大根壮則梗地脉耗陽氣而新植者不得滋葉大則隂翳䝉礙而新植者不得暢以茂又其材拳曲臃腫疎輕而不堅不足養是宜伐因盡薪之明日圃之守又曰圃之南有杏焉凡其根庇之廣可六七尺其下之地最壤腴以杏故特不得蔬是亦宜薪修曰噫今杏方春且華将待其實若獨不能損數畦之廣爲杏地耶因勿伐既而悟且歎曰吁荘周之說曰樗櫟以不材終其天年桂漆以有用而見傷夭今樗誠不材矣然一旦悉翦棄杏之體最堅宻美澤可用反見存豈才不才各遭其時之可否邪他日客有過脩者僕夫曵薪過堂下因指而語客以所疑客曰是何怪邪夫以無用處無用荘周之貴也以無用而賊有用烏能免哉彼杏之有華實也以有生之具而庇其根幸矣若桂漆之不能逃乎斤斧者葢有利之者在其死勢不得以生也與乎杏實異矣今樗之臃腫不材而以壮大害物其見伐誠宜爾與夫材者死不材者生之說又異矣凡物幸之與不幸視其處之而已客既去脩然其言而記之唐宋八大家文鈔巻四十八
