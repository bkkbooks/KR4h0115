body:
  text: 唐宋八大家文鈔卷四十三明茅坤撰廬陵文鈔十五史論歐陽公於叙事處往往得太史遷髓而其所為新唐書及五代史短論亦並有太史公風度予故撮錄凡二十一首唐書兵志論唐兵三變處如掌古之有天下國家者其興亡治亂未始不以德而自戰國秦漢以來鮮不以兵夫兵豈非重事哉然其因時制變以茍利趨便至於無所不為而考其法制雖可用於一時而不足施於後世者多矣惟唐立府兵之制頗有足稱焉葢古者兵法起於井田自周衰王制壊而不復至於府兵始一寓之於農其居處教養畜材待事動作休息皆有節目雖不能盡合古法葢得其大意焉此高祖太宗之所以盛也至其後世子孫驕弱不能謹守屢變其制夫置兵所以止亂及其弊也適足為亂又其甚也至困天下以養亂而遂至於亡焉葢唐有天下二百餘年而兵之大勢三變其始盛時有府兵府兵後廢而為彍騎彍騎又廢而方鎮之兵盛矣及其末也强臣悍將兵布天下而天子亦自置兵於京師曰禁軍其後天子弱方鎮彊而唐遂以亡滅者措置之勢使然也若乃將卒營陣車騎器械征防守衛凡兵之事不可以悉記記其廢置得失終始治亂興滅之迹以為後世戒云唐書禮樂志論古禮之亡久矣歐陽公於此亦無限悲慨由三代而上治出於一而禮樂達于天下由三代而下治出於二而禮樂為虛名古者宫室車輿以為居衣裳冕弁以為服尊爵俎豆以為器金石絲竹以為樂以適郊廟以臨朝廷以事神而治民其嵗時聚會以為朝覲聘問歡欣交接以為射鄕食饗合衆興事以為師田學挍下至里閭田畝吉凶哀樂凡民之事莫不一出於禮由之以教其民為孝慈友悌忠信仁義者常不出於居處動作衣服飲食之間葢其朝夕從事者無非乎此也此所謂治出於一而禮樂達于天下使天下安習而行之不知所以遷善遠罪而成俗也及三代已亡遭秦變古後之有天下者自天子百官名號位序國家制度宮車服器一切用秦舊間雖有欲治之主思所改作不能超然遠復三代之上而牽其時俗稍即以損益大抵安於茍簡而已其朝夕從事則以簿書獄訟兵食為急曰此為政也所以治民至於三代禮樂具其名物而藏於有司時出而用之郊廟朝廷曰此為禮也所以教民此所謂治出於二而禮樂為虚名故自漢以來史官所記事物名數降登揖讓拜俛伏興之節皆有司之事爾所謂禮之末節也然用之郊廟朝廷自搢紳大夫從事其間者皆莫能曉習而天下之人至於老死未嘗見也況欲識禮樂之盛曉然諭其意而被其教化以成俗乎嗚呼習其器而不知其意忘其本而存其末又不能備具所謂朝覲聘問射鄕食饗師田學校冠㛰喪葬之禮在者幾何自梁以來始以其當時所行傅於周官五禮之名各立一家之學唐初即用隋禮至太宗時中書令房𤣥齡秘書監魏徴與禮官學士等因隋之禮增以天子上陵朝廟養老大射講武讀時令納皇后皇太子入學太常行陵合朔陳兵大社等為吉禮六十一篇賔禮四篇軍禮二十篇嘉禮四十二篇凶禮十一篇是為貞觀禮高宗又詔太尉長孫無忌中書令杜正倫李義府中書侍郎李友益黄門侍郎劉祥道許圉師太子賔客許敬宗太常卿韋琨等增之為一百三十卷是為顯慶禮其文雜以式令而義府敬宗方得幸多希旨傳會事既施行議者皆以為非上元三年詔復用貞觀禮由是終高宗世貞觀顯慶二禮兼行而有司臨事遠引古義與二禮叅考增損之無復定制武氏中宗繼以亂敗無可言者博士掌禮備官而已𤣥宗開元十年以國子司業韋縚為禮儀使以掌五禮十四年通事舍人王嵒上疏請刪去禮記舊文而益以今事詔付集賢院議學士張説以為禮記不刋之書去聖久遠不可改易而唐貞觀顯慶禮儀注前後不同宜加折衷以為唐禮乃詔集賢院學士右散騎常侍徐堅左拾遺李銳及太常博士施敬本撰述歴年未就而銳卒蕭嵩代銳為學士奏起居舍人王仲丘撰定為一百五十巻是為大唐開元禮由是唐之五禮之文始備而後世用之雖時小有損益不能過也貞元中太常禮院修撰王涇考次歴代郊廟㳂革之制及其工歌祝號而圖其壇屋陟降之序為郊祀錄十卷元和十一年秘書郎修撰韋公肅又錄開元已後禮文損益為禮閣新儀三十卷十三年太常博士王彥威為曲臺新禮二十卷又採元和以來三公士民㛰祭喪葬之禮為續曲臺禮三十卷嗚呼考其文記可謂備矣以之施于貞觀開元之間亦可謂盛矣而不能至三代之隆者具其文而意不在焉此所謂禮樂為虚名也哉唐書食貨志論論悉文亦跌宕古之善治其國而愛養斯民者必立經常簡易之法使上愛物以養其下下勉力以事其上上足而下不困故量人之力而授之田量地之產而取以給公上量其入而出之以為用度之數是三者常相須以濟而不可失失其一則不能守其二及暴君庸主縱其佚欲而茍且之吏從之變制合時以取寵於其上故用於上者無節而取於下者無限民竭其力而不能供由是上愈不足而下愈困則財利之説興而聚斂之臣用記曰寧畜盜臣盜臣誠可惡然一人之害爾聚斂之臣用則經常之法壞而下不勝其弊焉唐之始時授人以口分世業田而取之以租庸調之法其用之也有節葢其畜兵以府衞之制故兵雖多而無所損設官有常員之數故官不濫而易祿雖不及三代之盛時然亦可以為經常之法也及其弊也兵冗官濫為之大蠧自天寶以來大盜屢起方鎮數叛兵革之興累世不息而用度之數不能節矣加以驕君昬主姦吏邪臣取濟一時屢更其制而經常之法蕩然盡矣由是財利之説興聚斂之臣進葢口分世業之田壞而為兼并租庸調之法壞而為兩税至於鹽鐡轉運屯田和糴鑄錢括苗㩁利借商進奉獻助無所不為矣葢愈煩而愈弊以至於亡焉唐書藝文志論序事中帶感慨悲吊以發議論其機軸本史遷來自六經焚於秦而復出於漢其師傳之道中絶而簡編脱亂訛缺學者莫得其本真於是諸儒章句之學興焉其後傳注箋觧義疏之流轉相講述而聖道粗明然其為説固已不勝其繁矣至於上古三皇五帝以來世次國家興滅終始僣竊偽亂史官備矣而傳記小説外暨方言地理職官氏族皆出於史官之流也自孔子在時方修明聖經以絀繆異而老子著書論道德接乎周衰戰國游談放蕩之士田駢慎到列莊之徒各極其辯而孟軻荀卿始專修孔氏以折異端然諸子之論各成一家自前世皆存而不絶也夫王迹熄而詩亡離騷作而文辭之士興歴代盛衰文章與時高下然其變態百出不可窮極何其多也自漢以來史官列其名氏篇第以為六藝九種七略至唐始分為四類曰經史子集而藏書之盛莫盛於開元其著錄者五萬三千九百一十五巻而唐之學者自為之書又二萬八千四百六十九巻嗚呼可謂盛矣六經之道簡嚴易直而天人備故其愈久而益明其餘作者衆矣質之聖人或離或合然其精深閎博各盡其術而怪奇偉麗往往震發於其間此所以使好奇愛博者不能忘也然凋零磨滅亦不可勝數豈其華文少實不足以行遠歟而俚言俗説猥有存者亦其有幸不幸歟今著于篇有其名而無其書者十葢五六也可不惜哉唐書五行志論千古五行災異之説最為辯悉可誦萬物盈於天地之間而其為物最大且多者有五一曰水二曰火三曰木四曰金五曰土其用於人也非此五物不能以為生而闕其一不可是以聖王重焉夫所謂五物者其見象於天也為五星分位於地也為五方行於四時也為五德禀於人也為五常播於音律為五聲發於文章為五色而總其精氣之用謂之五行自三代之後數術之士興而為災異之學者務極其説至舉天地萬物動植無大小皆推其類而附之於五物曰五行之屬以謂人禀五行之全氣以生故於物為最靈其餘動植之類各得其氣之偏者其發為英華美實氣臭滋味羽毛鱗介文采剛柔亦皆得其一氣之盛至其為變怪非常失其本性則推以事類吉凶影響其説尤為委曲繁密葢王者之有天下也順天地以治人而取材於萬物以足用若政得其道而取不過度則天地順成萬物茂盛而民以安樂謂之至治若政失其道用物傷夭民被其害而愁苦則天地之氣沴三光錯行陰陽寒暑失節以為水旱蝗螟風雹雷火山崩水溢泉竭雪霜不時雨非其物或發為氛霧虹霓光怪之類此天地災異之大者皆生於亂政而考其所發驗以人事往往近其所失而以類至然時有推之不能合者豈非天地之大固有不可知者邪若其諸物種類不可勝數下至細微家人里巷之占有考於人事而合者有漠然而無所應者皆不足道語曰迅雷風烈必變葢君子之畏天也見物有反常而為變者失其本性則思其有以致而為之戒懼雖微不敢忽而已至為災異之學者不然莫不指事以為應及其難合則旁引曲取而遷就其説葢自漢儒董仲舒劉向與其子歆之徒皆以春秋洪範為學而失聖人之本意至其不通也父子之言自相戾可勝歎哉昔者箕子為周武王陳禹所有洪範之書條其事為九類别其説為九章謂之九疇考其説初不相附屬而向為五行傳乃取其五事皇極庶徴附於五行以為人事皆屬五行歟則至於入政五紀三德稽疑福極之類又不能附至俾洪範之書失其倫理有以見所謂旁引曲取而遷就其説也然自漢以來未有非之者又其祥𤯝禍痾之説自其數術之學故略存之庶幾深識博聞之士有以考而擇焉五代史梁太祖論議論得大體而文殊圓轉澹宕嗚呼天下之惡梁久矣自後唐以來皆以為偽也至予論次五代獨不偽梁議者或譏予大失春秋之㫖以謂梁負大惡當加誅絶而反進之是奬篡也非春秋之志也予應之曰是春秋之志爾魯桓公弑隠公而自立者宣公弑子赤而自立者鄭厲公逐世子忽而自立者衛公孫剽逐其君衎而自立者聖人於春秋皆不絶其為君此予所以不偽梁者用春秋之法也然則春秋亦奬篡乎曰惟不絶四者之為君於此見春秋之意也聖人之於春秋用意深故能勸戒切為言信然後善惡明夫欲著其罪於後世在乎不沒其實其實嘗為君矣書其為君其實篡也書其篡各傳其實而使後世信之則四君之罪不可得而掩爾使為君者不得掩其惡然後人知惡名不可逃則為惡者庶乎其息矣是謂用意深而勸戒切為言信而善惡明也桀紂不待貶其王而萬世所共惡者也春秋於大惡之君不誅絶之者不害其褒善貶惡之旨也惟不沒其實以著其罪而信乎後世與其為君而不掩其惡以息人之為惡能知春秋之此意然後知予不偽梁之旨也五代史唐明宗論中多名言可為世戒嗚呼自古治世少而亂世多三代之王有天下者皆數百年其可道者數君而已況於後世邪況於五代邪予聞長老為予言明宗雖出夷狄而為人純質寛仁愛人於五代之君有足稱也嘗夜焚香仰天而祝曰臣本蕃人豈足治天下世亂久矣願天早生聖人自初即位减罷宮人伶官廢内藏庫四方所上物悉歸之有司廣夀殿火災有司理之請加丹雘喟然嘆曰天以火戒我豈宜增以侈邪嵗嘗旱已而雪暴坐庭中詔武德司宮中無得掃雪曰此天所以賜我也數問宰相馮道等民間疾苦聞道等言穀帛賤民無疾疫則欣然曰吾何以堪之當與公等作好事以報上天吏有犯贓輒寘之死曰此民之蠧也以詔書褒㢘吏孫岳等以風示天下其愛人恤物葢亦有意於治矣其即位時春秋已高不邇聲色不樂遊畋在位十年於五代之君最為長世兵革粗息年屢豐登生民實頼以休息然夷狄性果仁而不明屢以非辜誅殺臣下至於從榮父子之間不能慮患為防而變起倉卒卒陷之以大惡帝亦由此飲恨而終當是時大理少卿康澄上疏言時事其言曰為國家者有不足懼者五深可畏者六三辰失行不足懼天象變見不足懼小人訛言不足懼山崩川竭不足懼水旱蟲蝗不足懼也賢士藏匿深可畏四民遷業深可畏上下相狥深可畏亷恥道消深可畏毁譽亂真深可畏直言不聞深可畏也識者皆多澄言切中時病若從榮之變任圜安重誨等之死可謂上下相狥而毁譽亂真之敝矣然澄之言豈止一時之病凡為國者可不戒哉五代史晉家人傳論痛切嗚呼古之不幸無子而以其同宗之子為後者聖人許之著之禮經而不諱也而後世閭閻鄙俚之人則諱之諱則不勝其欺與偽也故其茍偷竊取嬰孩襁褓諱其父母而自欺以為我生之子曰不如此則不能得其一志盡愛於我而其心必二也而為其子者亦自諱其所生而絶其天性之親反視以為叔伯父以此欺其九族而亂其人鬼親踈之序凡物生而有知未有不愛其父母者使是子也能忍而真絶其天性歟曾禽獸之不若也使其不忍而外陽絶之是大偽也夫閭閻鄙俚之人之慮於事者亦已深矣然而茍竊欺偽不可以為法者小人之事也惟聖人則不然以謂人道莫大於繼絶此萬世之通制而天下之公行也何必諱哉所謂子者未有不由父母而生者也故為人後者必有所生之父有所後之父此理之自然也何必諱哉其簡易明白不茍不竊不欺不偽可以為通制而公行者聖人之法也又以謂為人後者所承重故加其服以斬而不絶其所生之親者天性之不可絶也然而恩有屈於義故降其服以朞服外物也可以降而父母之名不可改故著於經曰為人後者為其父母服自三代以來有天下國家者莫不用之而晉氏不用也出帝之於敬儒絶其父道臣而爵之非特以其義不當立不得已而絶之葢亦習見閭閻鄙俚之所為也五代干戈賊亂之世也禮樂崩壞三綱五常之道絶而先王之制度文章掃地而盡於是矣如寒食野祭而焚紙錢天子而為閭閻鄙俚之事者多矣而晉氏起於沙陀以篡逆而得天下高祖以耶律德光為父而出帝於德光則以為祖而稱孫於其所生父則臣而名之是豈可以人理責哉五代史周世宗論直叙嗚呼五代本紀備矣君臣之際可勝道哉梁之友珪反唐戕克寧而殺存乂從璨則父子骨肉之恩幾何其不絶矣太妃薨而輟朝立劉氏馮氏為皇后則夫婦之義幾何其不乖而不至於禽獸矣寒食野祭而焚紙錢居喪改元而用樂殺馬延及任圜則禮樂刑政幾何其不壞矣至於賽雷山傳箭而撲馬則中國幾何其不夷狄矣可謂亂世也歟而世宗區區五六年間取秦隴平淮右復三闗威武之聲震懾夷夏而方内延儒學文章之士考制度修通禮定正樂議刑綂其制作之法皆可施於後世其為人明達英果議論偉然即位之明年廢天下佛寺三千三百三十六是時中國乏錢乃詔悉毁天下銅佛像以鑄錢嘗曰吾聞佛説以身世為妄而以利人為急使其真身尚在茍利於世猶欲割截況此銅像豈有所惜哉由是羣臣皆不敢言嘗夜讀書見唐元楨均田圖慨然嘆曰此致治之本也王者之政自此始乃詔頒其圖法使吏民先習知之期以一嵗大均天下之田其規為志意豈小哉其伐南唐問宰相李穀以計策後克淮南出榖䟽使學士陶榖為賛而盛以錦囊嘗置之坐側其英武之材可謂雄傑及其虚心聽納用人不疑豈非所謂賢主哉其北取三闗兵不血刃而史家猶譏其輕社稷之重而僥倖一勝於倉卒殊不知其料彊弱較彼我而乗述律之殆得不可失之機此非明於決勝者孰能至哉誠非史氏之所及也唐宋入大家文鈔巻四十三
