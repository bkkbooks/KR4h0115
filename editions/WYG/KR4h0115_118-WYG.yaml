body:
  text: 唐宋八大家文鈔卷一百八明茅坤撰老泉文鈔二書上文丞相書論取士貴廣昭文相公執事天下之事制之在始始不可制制之在末是以君子愼始而無後憂救之於其末而其始不為無謀失諸其始而邀諸其終而天下無遺事是故古者之制其始也有百年之前而為之者也葢周公營乎東周數百年而待乎平王之東遷也然及其收天下之士而責其賢不肖之分則未嘗於其始焉而制其極葢常舉之於諸侯考之於太學引之於射宫而試之於弓矢如此其備矣然而管叔蔡叔文王之子而武王周公之弟也生而與之居處習知其性之所好惡與夫居之於太學而習之於射宫者宜愈詳矣然其不肖之實卒不見於此時及其出為諸侯監國臨大事而不克自定然後敗露以見其不肖之才且夫張弓而射之一不失容此不肖者或能焉而聖人豈以為此足以盡人之才葢將為此名以收天下之士而後觀其臨事而黜其不肖故曰始不可制制之在末於此有人求金於沙歛而揚之惟其揚之也精是以責金於揚而歛之則無擇焉不然金與沙礫皆不錄而已矣故欲求盡天下之賢俊莫若畧其始欲求責實於天下之官莫若精其終今者天下之官自相府而至於一縣之丞尉其為數實不可勝計然而大數巳定餘吏溢于官籍大臣建議減任子削進士以求便天下竊觀古者之制畧於始而精於終使賢者易進而不肖者易犯夫易犯故易退易進故賢者衆衆賢進而不肖者易退夫何患官冗今也艱之於其始竊恐夫賢者之難進與夫不肖者之無以異也方今進退天下士大夫之權内則御史外則轉運而士大夫之間潔然而無過可任以為吏者其實無幾且相公何不以意推之往年吳中復在犍為一月而發二吏中復去職而吏之以罪免者曠歲無有也雖然此特洵之所見耳天下之大則又可知矣國家法令甚嚴洵從蜀來見凡吏商者皆不征非追胥調發皆得役天子之夫是以知天下之吏犯法者甚衆從其犯而黜之十年之後將分職之不給此其權在御史轉運而御史轉運之權實在相公顧甚易為也今四方之士㑹於京師口語籍籍莫不為此然皆莫肯一言於其上誠以為近於私我也洵西蜀之人方不見用於當世幸又不復以科舉為意是以肆言於其間而可以無嫌伏惟相公慨然有憂天下之心征伐四國以安天子毅然立朝以威制天下名著功遂文武並濟此其享功業之重而居富貴之極於其平生之所望無復慊然者惟其獲天下之多士而與之皆樂乎此可以復動其志故遂以此告其左右惟相公亮之今國家患冗吏之壅而亦削進士之數甚非計盍亦用老蘇之説而精之於終也上富丞相書老泉欲富公和處其下以就其功名似疑富公於並相寮貳間有不相能者往年天子震怒出逐宰相選用舊臣堪付屬以天下者使在相府與天下更始而閣下之位實在第三方是之時天下咸喜相慶以為閣下惟不為宰相也故黙黙在此方今困而復起起而復為宰相而又適值乎此時也不為而何為且吾君之意待之如此其厚也不為而何以副吾望故咸曰後有下令而異於他日者必吾富公也朝夕而待之跂首而望之望望然而不獲見也戚戚然而疑嗚呼其弗獲聞也必其逺也進而及於京師亦無聞焉不敢以疑猶曰天下之人如此其衆也數十年之間如此其不變也皆曰賢人焉或曰彼其中則有説也而天下之人則未始見也然而不能無憂葢古之君子愛其人也則憂其無成且嘗聞之古之君子相是君也與是人也皆立於朝則使吾皆知其為人皆善者也而後無憂且一人之身而欲擅天下之事雖見信於當世而同列之人一言而疑之則事不可以成今夫政出於他人而不懼事不出於已而不忌是二者惟善人為能然猶欲得其心焉若夫衆人政出於他人而懼其害己事不出於已而忌其成功是以有不平之心生夫或居於吾前或立於吾後而皆有不平之心焉則身危故君子之出處於其間也不使之不平於我也周公立於明堂以聽天下而召公惑何者天下固惑乎大者也召公猶未能信乎吾之此心也周公定天下誅管蔡告召公以其志以安其身以及於成王故凡安其身者以安乎周也召公之於周公管蔡之於周公是二者亦皆有不平之心焉以為周之天下周公將遂取之也周公誅其不平而不可告語者告其可以告語者而和其不平之心然則非其必不可以告語者則君子未始不欲和其心天下之人從士而至於卿大夫宰相相集處其上將有所為何慮而不成不能忍其區區之小忿以成其不平之釁則害其大事是以君子忍其小忿以容其小過而杜其不平之心然後當大事而聽命焉且吾之小忿不足以易吾之大事也故寧小容焉使無蔕芥於其間古之君子與賢者並居而同樂故其責之也詳不幸而與不肖者偶不圖其大而治其細則闊逺於事情而無益於當世故天下無事而後可與爭此不然則否昔者諸吕用事陳平憂懼計無所出陸賈入見説之使交歡周勃平用其䇿卒得絳侯北軍之助以滅諸吕夫絳侯木彊之人也非陳平致之而誰也故賢者致其不賢者非夫不賢者之能致賢者也曩者今上即位之初冦萊公為相惟其側有小人不能誅又不能與之無忿故終以斥去及范文正公在相府又欲以歲月盡治天下事失於急與不忍小忿故羣小人亦急逐去之一去遂不復用以殁其身伏惟閣下以不世出之才立於天子之下百官之上此其深謀逺慮必有所處而天下之人猶未獲見洵西蜀人也竊有志於今世願一見於堂上伏惟閣下深思之無忽上韓樞密書老泉厭當時兵政之過弱故勸韓魏公以誅戮而其行文似西漢踈宕雄辨可觀太尉執事洵著書無他長及言兵事論古今形勢至自比賈誼所獻權書雖古人已往成敗之迹茍深曉其義施之於今無所不可昨因請見求進末議太尉許諾謹撰其説言語朴直非有驚世絶俗之談甚髙難行之論太尉取其大綱而無責其纎悉蓋古者非用兵决勝之為難而養兵不用之可畏今夫水激之山放之海決之為溝塍壅之為沼沚是天下之人能之委江河注淮泗滙為洪波瀦為太湖萬世而不溢者自禹之後未之見也夫兵者聚天下不義之徒授之以不仁之器而教之以殺人之事夫惟天下之未安盗賊之未殄然後有以施其不義之心用其不仁之器而試其殺人之事當是之時勇者無餘力智者無餘謀巧者無餘技故其不義之心變而為忠不仁之器加之於不仁而殺人之事施之於當殺及夫天下既平盗賊既殄不義之徒聚而不散勇者有餘力則思以為亂智者有餘謀則思以為奸巧者有餘技則思以為詐於是天下之患雜然出矣蓋虎豹終日而不殺則跳踉大呌以發其怒蝮蝎終日而不螫則噬齧草木以致其毒其理固然無足怪者昔者劉項奮臂於草莽之間秦楚無頼子弟千百為輩爭起而應者不可勝數轉鬬五六年天下厭兵項籍死而髙祖亦已老矣方是時分王諸將改定律令與天下休息而韓信黥布之徒相繼而起者七國髙祖死於介胄之間而莫能止也連延及於吕氏之禍訖孝文而後定是何起之易而收之難也劉項之勢初若決河順流而下誠有可喜及其崩潰四出放乎數百里之間拱手而莫能救也嗚呼不有聖人何以善其後太祖太宗躬擐甲胄跋涉險阻以斬刈四方之蓬蒿用兵數十年謀臣猛將滿天下一旦巻甲而休之傳四世而天下無變此何術也荆楚九江之地不分於諸將而韓信黥布之徒無以啓其心也雖然天下無變而兵乆不用則其不義之心蓄而無所發飽食優游求逞於良民觀其平居無事出怨言以邀其上一日有急是非人得千金不可使也往年詔天下繕完城池西川之事洵實親見凡郡縣之富民舉而籍其名得錢數百萬以為酒食饋餉之費杵聲未絶城輒隨壞如此者數年而後定卒事官吏相賀卒徒相矜若戰勝凱旋而圖賞者比來京師遊阡陌間其曹往往偶語無所諱忌聞之土人方春時尤不忍聞蓋時五六月矣㑹京師憂大水鋤耰畚築列於兩河之壖縣官日費千萬傳呼勞問之聲不絶者數十里猶且睊睊狼顧莫肯効用且夫内之如京師之所聞外之如西川之所親見天下之勢今何如也御將者天子之事也御兵者將之職也天子者養尊而處優樹恩而收名與天下為喜樂者也故其道不可以御兵人臣執法而不求情盡心而不求名出死力以捍社稷使天下之心繫於一人而已不與焉故御兵者人臣之事不可以累天子也今之所患大臣好名而懼謗好名則多樹私恩懼謗則執法不堅是以天下之兵豪縱至此而莫之或制也頃者狄公在樞府號為寛厚愛人狎眤士卒得其歡心而太尉適承其後彼狄公者知御外之術而不知治内之道此邊將材也古者兵在外愛將軍而忘天子在内愛天子而忘將軍愛將軍所以戰愛天子所以守狄公以其御外之心而施諸其内大尉不反其道而何以為治或者以為兵乆驕不治一旦繩以法恐因以生亂昔者郭子儀去河南李光弼實代之將至之日張用濟斬於轅門三軍股慄夫以臨淮之悍而代汾陽之長者三軍之士竦然如赤子之脱慈母之懷而立乎嚴師之側何亂之敢生且夫天子者天下之父母也將相者天下之師也師雖嚴赤子不敢以怨其父母將相雖厲天下不敢以咎其君其勢然也天子者可以生人可以殺人故天下望其生及其殺之也天下曰是天子殺之故天子不可以多殺人臣奉天子之法雖多殺天下無所歸怨此先王所以威懐天下之術也伏惟太尉思天下所以長乆之道而無幸一時之名盡至公之心而無䘏三軍之多言夫天子推深仁以結其心太尉厲威武以振其惰彼其思天子之深仁則畏而不至於怨思太尉之威武則愛而不至於驕君臣之體順而畏愛之道立非太尉吾誰望耶荆川曰前一叚論兵驕之弊後一叚處驕兵之䇿當是有用文字上田樞密書此文骨子原自于襄陽書中來而氣特雄天之所以與我者豈偶然哉堯不得以與丹朱舜不得以與商均而瞽瞍不得奪諸舜發於其心出於其言見於其事確乎其不可易也聖人不得以與人父不得奪諸其子於此見天之所以與我者不偶然也夫其所以與我者必有以用我也我知之不得行之不以告人天固用之我實置之其名曰棄天自卑以求幸其言自小以求用其道天之所以與我者何如而我如此也其名曰䙝天棄天我之罪也䙝天亦我之罪也不棄不䙝而人不我用不我用之罪也其名曰逆天然則棄天䙝天者其責在我逆天者其責在人在我者吾將盡吾力之所能為者以塞夫天之所以與我之意而求免夫天下後世之譏在人者吾何知焉吾求免夫一身之責之不暇而暇為人憂乎哉孔子孟軻之不遇老於道途而不倦不愠不怍不沮者夫固知夫責之所在也衞靈魯哀齊宣梁惠之徒不足相與以有為也我亦知之矣抑將盡吾心焉耳吾心之不盡吾恐天下後世無以責夫衞靈魯哀齊宣梁惠之徒而彼亦將有以辭其責也然則孔子孟軻之目將不瞑於地下矣夫聖人賢人之用心也固如此如此而生如此而死如此而貧賤如此而富貴升而為天沉而為淵流而為川止而為山彼不預吾事吾事畢矣切怪夫後之賢者不能自處其身也饑寒困窮之不勝而號于人嗚呼使吾誠死於饑寒困窮耶則天下後世之責將必有在彼其身之責不自任以為憂而吾取而加之吾身不亦過乎今洵之不肖何敢自列于聖賢然其心亦有所甚不自輕者何則天下之學者孰不欲一蹴而造聖人之域然及其不成也求一言之幾乎道而不可得也千金之子可以貧人可以富人非天之所與雖以貧人富人之權求一言之幾乎道不可得也天子之宰相可以生人可以殺人非天之所與雖以生人殺人之權求一言之幾乎道不可得也今洵用力于聖人賢人之術亦巳乆矣其言語其文章雖不識其果可以有用于今而傳於後與否獨怪夫得之之不勞方其致思于心也若或啓之得之心而書之紙也若或相之夫豈無一言之幾于道者乎千金之子天子之宰相求而不得者一旦在己故其心得以自負或者天其亦有以與我也曩者見執事于益州當時之文淺狹可笑饑寒困窮亂其心而聲律記問又從而破壞其體不足觀也已數年來退居山野自分永棄與世俗日踈闊得以大肆其力于文章詩人之優柔騷人之清深孟韓之温醇遷固之雄剛孫吳之簡切投之所向無不如意嘗試以為董生得聖人之經其失也流而為迂鼂錯得聖人之權其失也流而為詐有二子之才而不流者其惟賈生乎惜乎今之世愚未見其人也作䇿二道曰審勢審敵作書十篇曰權書洵有山田一頃非凶歲可以無饑力耕而節用亦足以自老不肖之身不足惜而天之所與者不忍棄且不敢䙝也執事之名滿天下天下之士用與不用在執事故敢以所謂䇿二道權書十篇為獻平生之文逺不可多致有洪範論史論十篇近以獻内翰歐陽公度執事與之朝夕相從議天下之事則斯文也其亦庻乎得陳於前矣若夫言之可用與奉身之可貴與否者執事事也執事責也於洵何有哉荆川曰此書本欲求知却説士當自重便不放倒架子而文字峻絶豪邁不覊上韓昭文論山陵書論葬禮甚透當與劉向昌陵䟽參㸔昭文相公執事洵本布衣書生才無所長相公不察而辱收之使與百執事之末平居思所以仰報盛德而不獲其所今者先帝新棄萬國天子始親政事當海内傾耳側目之秋而相公實為社稷柱石莫先之臣有百世不磨之功伏惟相公將何以處之古者天子即位天下之政必有所不及安席而先行之者葢漢昭即位休息百役與天下更始故其為天子曾未逾月而恩澤下布於海内竊惟當今之事天下之所謂最急而天子之所宜先行者輒敢以告於左右竊見先帝以儉德臨天下在位四十餘年而宫室游觀無所增加幃薄器皿弊陋而不易天下稱頌以為文景之所不若今一旦奄棄臣下而有司廼欲以末世葬送無益之費侵削先帝休息長養之民掇取厚葬之名而遺之以累其盛明故洵以為當今之議莫若薄葬竊聞頃者癸酉赦書既出郡縣無以賞兵例肯貸錢於民民之有錢者皆莫肯自輸於是有威之以刀劍驅之以笞箠為國結怨僅而得之者小民無知不知與國同憂方且狼顧而不寧而山陵一切配率之科又以復下計今不過秋冬之間海内必將騷然有不自聊頼之人竊惟先帝平昔之所以愛惜百姓者如此其深而其所以檢身節儉者如此其至也推其平生之心而計其既殁之意則其不欲以山陵重困天下亦巳明矣而臣下乃獨為此過當逾禮之費以拂戾其平生之意竊所不取也且使今府庫之中財用有餘一物不取於民盡公力而為之以稱遂臣子不忍之心猶且獲譏於聖人况夫空虚無有一金以上非取於民則不獲而冒行不顧以狥近世失中之禮亦已惑矣然議者必將以為古者君子不以天下儉其親以天下之大而不足於先帝之葬於人情有所不順洵亦以為不然使今儉葬而用墨子之説則是過也不廢先王之禮而去近世無益之費是不過矣子思曰三日而殯凡附於身者必誠必信勿之有悔焉耳矣三月而葬凡附於棺者必誠必信勿之有悔焉耳矣古之人所由以盡其誠信者不敢有畧也而外是者則畧之昔者華元厚葬其君君子以為不臣漢文葬於霸陵木不改列藏無金玉天下以為聖明而後世安於泰山故曰莫若建薄葬之議上以遂先帝恭儉之誠下以紓百姓目前之患内以解華元不臣之譏而萬世之後以固山陵不拔之安洵竊觀古者厚葬之由未有非其時君之不達欲以金玉厚其親於地下而其臣下不能禁止僶俛而從之者未有如今日之事太后至明天子至聖而有司信近世之禮而遂為之者是可深惜也且夫相公既巳立不世之功矣而何愛一時之勞而無所建明洵恐世之清議將有任其責者如曰詔敕巳行制度已定雖知不便而不可復改則此又過矣蓋唐太宗之葬髙祖也欲為九丈之墳而用漢氏長陵之制百事務從豐厚及羣臣建議以為不可於是改從光武之陵髙不過六丈而每事儉約夫君子之為政與其坐視百姓之艱難而重改令之非孰若改令以救百姓之急不勝區區之心敢輒以告惟恕其狂易之誅幸甚幸甚唐荆川曰一事反覆議論唐宋八大家文鈔巻一百八
