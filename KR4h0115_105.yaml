body:
  text: 唐宋八大家文抄卷九十七明茅坤撰南豐文鈔一疏劄狀熙寧轉對疏勸學二字公之所見正所志亦大而惜也才不足以副之故不得見用於時姑録而存之以見公之槩準御史臺告報臣寮朝辭日具轉對臣愚淺薄恐言不足采然臣竊觀唐太宗即位之初延羣臣與論天下之事而能絀封倫用魏鄭公之説所以成貞觀之治周世宗初即位亦延羣臣使陳當世之務而能知王朴之可用故顯德之政亦獨能變五代之因循夫當衆説之馳騁而以獨見之言陳未形之得失此聽者之所難也然二君能辨之於羣衆之中而用之以收一時之效此後世之士所以常感知言之少而頌二君之明也今陛下始承天序亦詔羣臣使以次對然且將歲餘未聞取一人得一言豈當世固乏人不足以當陛下之意與抑所以延問者特用纍世之故事而不必求其實歟臣愚竊計殆進言者未有以當陛下之意也陛下明智大略固將比迹於唐虞三代之盛如太宗世宗之所至恐不足以望陛下故臣之所言亦不敢效二臣之卑近伏惟陛下超然獨觀於世俗之表詳思臣言而擇其中則二君之明豈足道於後世而士之懷抱忠義者豈復感知言之少乎臣所言如左臣伏以陛下恭儉慈仁有能承祖宗之德聰明睿智有能任天下之材即位以來早朝晏罷廣問兼聽有更制變俗比迹唐虞之志此非羣臣之所能及也然而所遇之時在天則有日食星變之異在地則有震動陷裂水泉湧溢之災在人則有飢饉流亡訛言相驚之患三者皆非常之變也及從而察今之天下則風俗日以薄惡紀綱日以弛壞百司庶務一切文具而巳內外之任則不足於人材公私之計則不足於食貨近則不能不以盜賊為慮逺則不能不以夷狄為憂海內智謀之士常恐天下之勢不得以久安也以陛下之明而所遇之時如此陛下有更制變俗比迹唐虞之志則亦在正其本而巳矣易曰正其本萬事理臣以謂正其本者在陛下得之於心而巳臣觀洪範所以和同天人之際使之無間而要其所以為始者思也大學所以誠意正心修身治其國家天下而要其所以為始者致其知也故臣以謂正其本者在得之於心而巳得之於心者其術非他學焉而巳矣此致其知所以為大學之道也古之聖人舜禹成湯文武未有不由學而成而傅説周公之輔其君未嘗不勉之以學故孟子以謂學焉而後有為則湯以王齊桓公以霸皆不勞而能也蓋學所以成人主之功德如此誠能磨礱長養至於有以自得則天下之事在於理者未有不能盡也能盡天下之理則天下之事物接於我者無以纍其內天下之以言語接於我者無以蔽其外夫然則循理而巳矣邪情之所不能入也從善而巳矣邪説之所不能亂也如是而用之以持久資之以不息則積其小者必至於大積其微者必至於顯古之人自可欲之善而充之至於不可知之神自十五之學而積之至於從心之不踰矩豈他道哉由是而巳矣故曰念終始典于學又曰學然後知不足孔子亦曰吾學不厭蓋如此者孔子之所不能巳也人能使事物之接於我者不能纍其內所以治內也言語之接於我者不能蔽其外所以應外也有以治內此所以成德化也有以應外此所以成法度也德化法度既成所以發育萬物而和同天人之際也自周衰以來道術不明為人君者莫知學先王之道以明其心為人臣者莫知引其君以及先王之道也一切苟簡溺於流俗末世之卑淺以先王之道為迂遠而難遵人主雖有聰明敏達之質而無磨礱長養之具至於不能有以自得則天下之事在於理者有所不能盡也不能盡天下之理則天下之以事物接於我者足以纍其內天下之以言語接於我者足以蔽其外夫然故欲循理而邪情足以害之欲從善而邪説足以亂之如是而用之以持久則愈甚無補行之以不息則不能見效其弊則至於邪情勝而正理滅邪説長而正論消天下之所以不治而有至於亂者以是而巳矣此周衰以來人主之所以可傳於後世者少也可傳於後世者若漢之文帝宣帝唐之太宗皆可謂有美質矣由其學不能遠而所知者陋故足以賢於近世之庸主矣若夫議唐虞三代之盛德則彼烏足以云乎由其如此故自周衰以來千有餘年天下之言理者亦皆卑近淺陋以趨世主之所便而言先王之道者皆絀而不省故以孔子之聖孟子之賢而猶不遇也今去孔孟之時又遠矣臣之所言乃周衰以來千有餘年所謂迂遠而難遵者也然臣敢獻之於陛下者臣觀先王之所巳試其言最近而非遠其用最要而非迂故不敢不以告者此臣所以事陛下區區之志也伏惟陛下有自然之聖質而漸漬於道義之日又不為不久然臣以謂陛下有更制變俗比迹唐虞之志則在得之於心得之於心則在學焉而巳者臣愚以謂陛下宜觀洪範大學之所陳知治道之所本不在於他觀傅説周公之所戒知學者非明主之所宜巳也陛下有更制變俗比迹唐虞之志則當懇誠惻怛以講明舊學而推廣之務當於道德之體要不取乎口耳之小知不急乎朝夕之近效復之熟之使聖心之所存從容於自得之地則萬事之在於理者未有不能盡也能盡萬事之理則內不纍於天下之物外不纍於天下之言然後明先王之道而行之邪情之所不能入也合天下之正論而用之邪説之所不能亂也如是而用之以持久資之以不息則雖細必巨雖微必顯以陛下之聰明而充之以至於不可知之神以陛下之睿知而積之以至於從心所欲之不踰矩夫豈遠哉顧勉強如何耳夫然故內成德化外成法度以發育萬物而和同天人之際甚易也若夫移風俗之薄惡振紀綱之弛壞變百司庶務之文具屬天下之士使稱其位理天下之財使贍其用近者使之親附遠者使之服從海內之勢使之常安則惟陛下之所欲何求而不得何為而不成乎未有若是而福應不臻而變異不消者也如聖心之所存未及於此內未能無秋毫之纍外未能無纎芥之蔽則臣恐欲法先王之政而智慮有所未審欲用天下之智謀材諝之士而議論有所未一於國家天下愈甚無補而風俗綱紀愈以衰壞也非獨如此自古所以安危治亂之幾未嘗不出於此臣幸蒙降問言天下之細務而無益於得失之數者非臣所以事陛下區區之志也輒不自知其固陋而敢言國家之大體惟陛下審察而擇其宜天下幸甚王遵岩曰董仲舒劉向揚雄之文不過如此若論結構法則漢猶有所未備而其氣厚質醇曾遠不逮董劉矣惟揚雄才艱而又不能大變於當時之體比曾為不及耳移滄州過闕上殿疏曾公此劄欲附古作者雅頌之旨陳上功德宣之金石而其結束歸於勸戒臣聞基厚者勢崇力大者任重故功德之殊垂光錫祚舄奕繁衍久而彌昌者蓋天人之理必至之符然生民以來能濟登兹者未有如大宋之隆也夫禹之績大矣而其孫太康乃墜厥緒湯之烈盛矣而其孫太甲既立不明周自后稷十有五世至于文王而大統未集武王成王始收太平之功而康王之子昭王難於南狩昭王之子穆王殆於荒服暨于幽厲陵夷盡矣及秦以纍世之智并天下然二世而亡漢定其亂而諸呂七國之禍相尋以起建武中興然沖質以後世故多矣魏之患天下為三晉宋之患天下為南北隋文始一海內然傳子而失唐之治在於貞觀開元之際而女禍世出天寶以還綱紀微矣至于五代蓋五十有六年而更八姓十有四君其廢興之故甚矣宋興太祖皇帝為民去大殘致更生兵不再試而粵蜀吳楚五國之君生致闕下九州來同復禹之迹內輯師旅而齊以節制外卑藩服而納以繩墨所以安百姓禦四夷綱理萬事之具雖創始經營而彌綸巳悉莫貴於為天子莫富於有天下而舍子傳弟為萬世策造邦受命之勤為帝太祖功未有高焉者也太宗皇帝遹求厥寧既定晉疆錢俶自歸作則垂憲克紹克類保世靖民丕丕之烈為帝太宗德未有高焉者也真宗皇帝繼統遵業以涵煦生養蕃息齊民以并容遍覆擾服異類蓋自天寶之末宇內板蕩及真人出天下平而西北之兵猶間入窺邊至于景德二百五十餘年契丹始講和好德明亦受約束而天下銷鋒灌燧無雞鳴犬吠之警以迄于今故於是時遂封泰山禪社首薦告功德以明示萬世不祧之廟所以為帝者宗仁宗皇帝寬仁慈恕虛心納諫慎注措謹規矩早朝晏退無一日之懈在位日久明於羣臣之賢不肖忠邪選用政事之臣委任責成然公聽並觀以周知其情偽其用舍之際一稽於衆故任事者亦皆警懼否輒罷免世以謂得馭臣之體春秋未高援立有德傳付惟允故傳天下之日不陳一兵不宿一士以戒非常而上下晏然殆古所未有其豈弟之行足以附衆者非家施而人悅之也積之以誠心民皆有父之尊有母之親故棄羣臣之日天下聞之路祭巷哭人人感動歔欷其得人之深未有知其所繇然者故皇祖之廟為帝仁宗英宗皇帝聰明睿智言動以禮上帝眷相天命所集而稱疾遜避至于纍月自踐東朝淵默恭慎無所言議施為而天下傳頌稱説德號彰聞及正南面勤勞庶政每延見三事省決萬機必咨詢舊章考求古義聞者惕然皆知其志在有為雖早遺天下成功盛烈未及宣究而明識大略足以克配前人之休故皇考之廟為帝英宗陛下聖神文武可謂有不世出之姿仁孝恭儉可謂有君人之大德憫自晚周秦漢以來世主率皆不能獨見於衆人之表其政治所出大抵踵襲卑近因於世俗而巳於是慨然以上追唐虞三代荒絶之迹修列先王法度之政為其任在巳可謂有出於數千載之大志變易因循號令必信使海內觀聽莫不奮起羣下遵職以後為羞可謂有能行之效今斟酌損益革敝興壞制作法度之事日以大備非因陋就寡拘牽常見之世所能及也繼一祖四宗之緒推而大之可謂至矣蓋前世或不能附其民者刑與賦役之政暴也宋興以來所用者鞭朴之刑然猶詳審反覆至於緩故縱之誅重誤入之辟蓋未嘗用一暴刑也田或二十而稅一然歲時省察數議寬減之宜下蠲除之令蓋未嘗加一暴賦也民或老死不知力役然猶憂憐惻怛常謹復除之科急擅興之禁蓋未嘗興一暴役也所以附民者如此前世或失其操柄者天下之勢或在於外戚或在於近習或在於大臣宋興以來戚里宦臣曰將曰相未嘗得以擅事也所以謹其操柄者如此而况輯師旅於內天下不得私尺兵一卒之用卑藩服於外天下不得專尺土一民之力其自處之勢如此至於畏天事神仁民愛物之際未嘗有須臾懈也其憂勞者又如此蓋不能附其民而至於失其操柄又怠且忽此前世之所以危且亂也民附於下操柄謹於上處勢甚便而加之以憂勞此今之所以治安也故人主之尊意諭色授而六服震動言傳號渙而萬里奔走山巖窟冗之民不待期會而時輸歲送以供其職者惟恐在後航浮索引之國非有發召而籝齎槖負以致其贄者惟恐不及西北之戎投弓縱馬相與袨服而戲豫東南之夷正冠束衽相與挾册而吟誦至於六府順敘百嘉鬯遂凡在天地之內含氣之屬皆裕如也蓋遠莫懿於三代近莫盛於漢唐然或三四世或一二世而天下之變不可勝道也豈有若今五世六聖百有二十餘年自通邑大都至於荒陬海聚無變容動色之慮萌於其心無援枹擊柝之戒接於耳目臣故曰生民以來未有如大宋之隆也竊觀於詩其在風雅陳太王王季文王致王迹之所由與武之所以繼代而成之興則美有假樂鳬鷖戒有公劉泂酌其所言者蓋農夫女工築室治田師旅祭祀飲尸受福委曲之常務至於兔罝之武夫行修於隱牛羊之牧人愛及微物無不稱紀所以論功德者由小以及大其詳如此後嗣所以昭先人之功當世之臣子所以歸美其上非徒薦告鬼神覺寤黎庶而巳也書稱勸之以九歌俾勿壞蓋歌其善者所以興其嚮慕興起之意防其怠廢難久之情養之於聽而成之於心其於勸帝者之功美昭法戒於將來聖人之所以列之於經垂為世教也今大宋祖宗興造功業猶太王王季文王陛下承之以德猶武王成王而羣臣之於考次論撰列之簡册被之金石以通神明昭法戒者闕而不圖此學士大夫之過也蓋周之德盛於文武而雅頌之作皆在成王之世今以時考之則祖宗神靈固有待於陛下臣誠不自揆輒冒言其大體至於尋類取稱本隱以之顯使莫不究悉則今文學之臣充於列位惟陛下之所使至若周之積仁纍善至成王周公為最盛之時而泂酌言皇天親有德饗有道所以為成王之戒蓋履極盛之勢而動之以戒懼者明之至智之盡也如此者非周獨然唐虞至治之極也其君臣相飭曰兢兢業業一日二日萬幾則處至治之極而保之以祇愼唐虞之所同也今陛下履祖宗之基廣太平之祚而世世治安三代所不及則宋興以來全盛之時實在今日陛下仰探皇天所以親有德饗有道之意而奉之寅畏俯念一日二日萬幾之不可以不察而處之以兢兢使休光美實日新歲益閎遠崇侈循之無窮至千萬世永有法則此陛下之素所蓄積臣愚區區愛君之心誠不自揆欲以庶幾詩人之義也惟陛下之所擇王遵岩曰體意雖出於封禪美新諸家與韓柳進唐雅序等門戶中來然原本經訓别出機軸不為諛悅淺制而忠藎進戒之義昭然與先朝周雅比盛矣真作者之法也議經費劄子名言臣聞古者以三十年之通制國用使有九年之蓄而制國用者必於歲杪蓋量入而為出國之所不可儉者祭祀也然不過用數之仂則先王養財之意可知矣蓋用之有節則天下雖貧其富易致也漢唐之始天下之用嘗屈矣文帝太宗能用財有節故公私有餘所謂天下雖貧其富易致也用之無節則天下雖富其貧亦易致也漢唐之盛時天下之用常裕矣武帝明皇不能節以制度故公私耗竭所謂天下雖富其貧亦易致也宋興承五代之敝六聖相繼與民休息故生齒既庶而財用有餘且以景德皇祐治平挍之景德戶七百三十萬墾田一百七十萬頃皇祐戶一千九十萬墾田二百二十五萬頃治平戶一千二百九十萬墾田四百三十萬頃天下歲入皇祐治平皆一億萬以上歲費亦一億萬以上景德官一萬餘員皇祐二萬餘員治平并幕職州縣官三千三百餘員總二萬四千員景德郊費六百萬皇祐一千二百萬治平一千三百萬以二者挍之官之衆一倍於景德郊之費亦一倍於景德官之數不同如此則皇祐治平入官之門多於景德也則皇祐治平用財之端多於景德也誠詔有司按尋載籍而講求其故使官之數入者之多門可考而知郊之費用財之多端可考而知然後各議其可罷者罷之可損者損之使天下之入如皇祐治平之盛而天下之用官之數郊之費皆同於景德二者所省者蓋半矣則又以類而推之天下之費有約於舊而浮於今者有約於今而浮於舊者其浮者必求其所以浮之自而杜之其約者必本其所以約之由而從之如是而力行以歲入一億萬以上計之所省者十之一則歲有餘財一萬萬馴致不巳至於所省者十之三則歲有餘財三萬萬以三十年之通計之當有餘財九億萬可以為十五年之蓄自古國家之富未有及此也古者言九年之蓄者計每歲之入存十之三耳蓋約而言之也今臣之所陳亦約而言之今其數不能盡同然要其大致必不遠也前世於雕敝之時猶能易貧而為富今吾以全盛之勢用財有節其所省者一則吾之一也其所省者二則吾之二也前世之所難吾之所易可不論而知也伏惟陛下沖靜質約天性自然乘輿器服尚方所造未嘗用一奇巧嬪嬙左右掖庭之間位號多闕躬履節儉為天下先所以憂憫元元更張庶事之意誠至惻怛格于上下其於明法度以養天下之財又非陛下之所難也臣誠不自揆敢獻其區區之愚惟陛下裁擇請減五路城堡劄子似亦名言惜也篇末措注亦欠發明臣嘗議今之兵以謂西北之宜在擇將帥東南之僃在益戍兵臣之妄意蓋謂西北之兵巳多東南之兵不足也待罪三班修定陜西河東城堡之賞法因得考於載籍蓋秦鳳鄜延涇原環慶并代五路嘉祐之間城堡一百一十有二熙寧二百一十有二元豐二百七十有四熙寧較於嘉祐為一倍元豐較於嘉祐為再倍而熙河城堡又三十有一雖故有之城始籍在於三班者或在此數然以再倍言之新立之城固多矣夫將之於兵猶奕之於棊善奕者置棊雖疏取數必多得其要而巳故敵雖萬變塗雖百出而形勢足以相援攻守足以相赴所保者必其地也非特如此所應者又合其變故用力少而得算多也不善奕者置棊雖密取數必寡不得其要而巳故敵有他變塗有他出而形勢不得相援攻守不能相赴所保者非必其地也非特如此所應者又不能合其變故用力多而得算少也守邊之臣知其要者所保者必其地故立城不多則兵不分兵不分則用士少所應者又能合其變故用力少而得算多猶之善奕也不得其要者所保非必其地故立城必多立城多則兵分兵分則用士衆所應者又不能合其變故用力多而得算少猶之不善奕也昔張仁願度河築三受降城相去各四百餘里首尾相應繇是朔方以安減鎮兵數萬此則能得其要立城雖疏所保者必其地也仁願之建三城皆不為守僃曰寇至當併力出戰回顧望城猶須斬之何用守僃自是突厥遂不敢度山可謂所應者合其變也今五路新立之城十數歲中至於再倍則兵安得不分士安得不衆殆疆場之吏謀利害者不得其要也以奕棊况之則城不必多臣言不為無據也以他路况之則北邊之僃胡以遵誓約之故數十年間不增一城一堡而不患戍守之不足則立城不必多又巳事之明驗也臣以此竊意城多則兵分故謂西北之兵巳多而殆恐守邊之臣未有稱其任者守邊之臣遇陛下之明常受成算以從事又不敢不奉法令幸可僃驅策然出萬全之畫常諉於上人臣之於職苟簡而巳固非體理之所當然况繇其所保者未得其要所應者未合其變顧使西北之兵獨多而東南不足在陛下之時方欲事無不當其理官無不稱其任則因其舊而不變必非聖意之所取也夫公選天下之材而屬之以三軍之任以陛下之明聖慮之緒餘足以周此臣歷觀世主知人善任使未有如宋興太祖之用將英偉特出者也故能撥唐季五代數百年之亂使天下太定四夷軌道可謂千歲巳來不世出之盛美非常材之君拘牽常見者之所能及也以陛下之聰明睿聖有非常之大略同符太祖則能任天下之材以定亂莫如太祖能繼太祖之志以經武莫如陛下臣誠不自揆得太祖任將之一二竊嘗見於斯文敢繕寫以獻萬分之一或有以上當天心使西北守邊之臣用衆少而得算多不益兵而東南之僃足有助聖慮之纎芥以終臣前日之議惟陛下之所裁擇明州擬辭高麗送遺狀極為通逹國體之言竊以高麗於蠻夷中為通於文學頗有知識可以德懷難以力服也故以隋之全盛煬帝之世大兵三出天下騷然而不能朝其君及至唐室以太宗之英武李績之善將至於君臣皆東嚮以身督戰而不能拔其一城此臣之所謂難以力服也宋興自建隆以來其王王昭以降六王繼修貢職使者相望其中間厭於強敵自天聖以後始不能自通於中國陛下即阼聲教四塞其國聞風不敢寧息不忌強敵之難不虞大海之阻效其土實五歲三至如東西州唯恐在後其所以致之者不以兵威此臣之所謂可以德懷也陛下亦憐其萬里惓惓歸心有德收而撫之恩禮甚厚州郡當其道途所出迎勞燕餞所以宣達陛下寵錫待遇之意此守臣之職分也其使者所歷之州贄其所有以為好於邦域之臣陛下加恩皆許受之而資以官用為其酬幣其使一再至之間許其如此不為常制可也今其使數來邦域之臣受其贄遺著於科條以為常制則臣竊有疑焉蓋古者相聘贄有圭璋及其卒事則皆還之以明輕財重禮之義今蠻夷使來邦域之臣與之相接示之以輕財重禮之義使知中國之所以為貴此人事之所宜先則當還其贄如古之聘禮此誼之所不可巳也又古之以贄見君者國君於其臣則受之非其臣則還之今蠻夷嚮化來獻其方物以致其為臣之義天子受之以明天下一尊有臣而畜之之義此不易之制也邦域之臣與其使接以非其臣之義還其贄以明守禮而不敢踰亦不易之制也以此相厲以明天子之尊中國之貴所重者禮義所輕者貨財其於待遇蠻夷之道未有當先於此者也且彼贄其所有以明州一州計之知州通判所受為錢一二十萬受之者既於義未安其使自明而西以達京師歷者尚十餘州當皆有贄以彼之力度之蠻夷小國其於貨財恐未必有餘也使其有親附中國之心而或憂於貨財之不足臣竊恐有傷中國之義而非陛下所以畜之幸之之意也臣愚竊欲自今高麗使來贄其所有以為好於邦域之臣者許皆以詔旨還之其資於官用以為酬幣巳有故事者許皆以詔旨與之如故惟陛下詳擇之如可推行願更著於令蓋復其贄以及於恐其力之不足厚其與以及於察其來之不易所謂尚之以義綏之以仁中國之所以待蠻夷未有可以易此者也其國粗為有知歸相告語必皆心服誠悅慕義於無窮此不論而可知也臣愚非敢以是為廉誠以拊接蠻夷示之以輕財重禮之義不可不先庶幾萬分之一無纍於陛下以德懷遠人之體是以不敢不言惟陛下裁擇請令州縣特舉士劄子子固按古者三代及漢興令郡國各舉賢良者以聞甚屬古意世之君相未必舉行而不可不聞此議豫故録之臣聞三代之道鄉里有學士之秀者自鄉升諸司徒自司徒升諸學大樂正論其秀者升諸司馬司馬論其賢者以告于王論定然後官之任官然後爵之位定然後祿之論定然後官之者鄭康成云謂使試守任官然後爵之者蓋試守而能任其官然後命之以位也其取士詳如此然此特於王畿之內論其鄉之秀士耳故在周禮則稱鄉老獻賢能之書于王也至於諸矦貢士則有一適再適三適之賞黜爵削地之罰而其法之詳莫得而考此三代之事也漢興采董生之議始令郡國舉孝廉一人其後又以口為率口百二十萬至不滿十萬自一歲至三歲自六人至一人察舉各有差至用丞相公孫𢎞太常孔臧議則又置太常博士弟子員郡國縣官有好文學孝悌謹順出入無悖者所聞令相長丞上屬所二千石二千石謹察可者令詣太常受業如弟子一歲皆課試通一藝以上補文學掌故缺其髙第可為郎中者太常籍奏即有秀才異等輒以名聞又請以治禮掌故比二百石及百石吏選擇為左右內史大行下郡太守卒史皆各二人邊郡一人不足擇掌故以補中二千石屬文學掌故補郡屬僃員其郡國貢士太常試選之法詳矣此漢之事也今陛下隆至德昭大道參天地本人倫興學崇化以風天下唐虞用心何以加此然患今之學挍非先王教養之法今之科舉非先王選士之制聖意卓然自三代以後當塗之君未有能及此者也臣以謂三代學挍勸教之具漢氏郡國太常察舉之目揆今之宜理可參用今州郡京師有學同於三代而教養選舉非先王之法者豈不以其遣素勵之實行課無用之空文非陛下隆世教育人材之本意歟誠令州縣有好文學勵名節孝悌謹順出入無悖者所聞令佐升諸州學州謹察其可者上太學以州大小為歲及人數之差太學一歲謹察其可者上禮部禮部謹察其可者籍奏自州學至禮部皆取課試通一藝以上御試與否取自聖裁今既正三省諸寺之任其都事主事掌故之屬舊品不卑宜清其選更用士人以應古義遂取禮部所選之士中第或高第者以次使試守滿再歲或三歲選擇以為州屬及縣令丞即有秀才異等皆以名聞不拘此制如此者謂之特舉其課試不用糊名謄録之法使之通一藝以上者非獨采用漢制而巳周禮大司徒以鄉三物教萬民而賓興之亦以禮樂射御書數也如臣之議為可取者其教養選用之意願降明詔以諭之得人失士之效當信賞罰以厲之以陛下之所嚮孰敢不虔於奉承以陛下之至明孰敢不公於考擇行之以漸循之以久如是而俗化不美人材不盛官守不修政事不舉者未之聞也其舊制科舉以習者既久難一日廢之請且如故事惟貢舉疏數一以特舉為凖而入官試守選用之敘皆出特舉之中至夫教化巳洽風俗既成之後則一切罷之如聖意以謂可行其立法彌綸之詳願詔有司而定議焉取進止入時事以後措注須本古之所以得與今之所以失參錯論列使朝廷開明然後得按行之而子固於此往往亦似才識不稱其志云唐宋八大家文抄卷九十七
