華樓稿出以機調摹唐宋而唐宋又為窠臼故坤嘗以書與唐順之論文順之復書有尚以眉髪相山川而未以精神相山川之語又謂繩墨布置竒正轉摺雖有專門師法至于中間一叚精神命脉則非具今古隻眼者不足與此云云盖頗不以能為古文許之今觀是集大抵亦為舉業而設其所評論疏舛尤不可枚舉黃宗羲南雷文定有荅張自烈書謂其韓文内孔司勲誌不曉句讀貞曜先生誌所云來吊韓氏謂不知何人栁文内與顧十郎書悮疑十郎為宗元座主歐文内薛簡肅舉進士第一讓王嚴疑其何以得讓又以張谷墓表遷員外郎知陽武縣為當時特重令職孫之翰誌學究出身進士及第為再舉進士皆不明宋制而妄為之説又謂其圈㸃批抹亦多不得要領而詆為小小結果皆切中其病然八家集浩博學者徧讀為難書肆選本又漏畧過甚坤所選録尚得煩簡之中集中評語雖所見未深而亦足為初學之門徑一二百年以來家弦户誦固亦有由矣乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書唐宋八大家文鈔原叙孔子之繫易曰其㫖逺其辭文斯固所以教天下後世為文者之至也然而及門之士顔淵子貢以下並齊魯間之秀傑也或云身通六藝者七十餘人文學之科並不得與而所屬者僅子遊子夏兩人焉何哉盖天生賢哲各有獨稟譬則泉之温火之寒石之結緑金之指南人於其間以獨禀之氣而又必為之專一以致其至伶倫之於音禆竈之於占養由基之於射造父之於御扁鵲之於醫遼之於九秋之於奕彼皆以天縱之智加之以專一之學而獨得其解斯固以之擅當時而名後世而非他所得而相雄者孔子没而游夏輩各以其學授之諸侯之國已而散逸不傳而秦人燔經坑學士而六藝之㫖幾輟矣漢興招亡經求學士而鼂錯賈誼董仲舒司馬遷劉向揚雄班固輩始乃稍稍出而西京之文號為爾雅崔蔡以下非不矯然龍驤也然六藝之㫖漸流失魏晉宋齊梁陳隋唐之間文日以靡氣日以弱强弩之末且不及魯縞矣而况於穿札乎昌黎韓愈首出而振之柳柳州又從而和之於是始知非六經不以讀非先秦兩漢之書不以觀其所著書論敘記碑銘頌辯諸什故多所獨開門户然大較並尋六藝之遺略相上下而羽翼之者貞元以後唐且中墜沿及五代兵戈之際天下寥寥矣宋興百年文運天啟於是歐陽公修從隋州故家覆瓿中偶得韓愈書手讀而好之而天下之士始知通經博古為高而一時文人學士彬彬然附離而起蘇氏父子兄弟及曽鞏王安石之徒其間材㫖小大音響緩亟雖屬不同而要之於孔子所刪六藝之遺則共為家習而户眇之者也由今觀之譬則世之走騕褭騏驥於千里之間而中及二百里三百里而輟者有之矣謂塗之薊而轅之粤則非也世之操觚者徃徃謂文章與時相髙下而唐以後且薄不足為噫抑不知文特以道相盛衰時非所論也其間工不工則又係乎斯人者之稟與其専一之致否何如耳如所云則必太羮𤣥酒之尚茅茨土簋之陳而三代而下明堂玉帶雲罍犧樽之設皆駢枝也已孔子之所謂其㫖逺即不詭於道也其辭文即道之燦然若象緯者之曲而布也斯固庖犧以來人文不易之統也而豈世之云乎哉我明𢎞治正徳間李夢陽崛起北地豪雋輻輳已振詩聲復掲文軌而曰吾左吾史與漢矣已而又曰吾黄初建安矣以予觀之特所謂詞林之雄耳其於古六藝之遺豈不湛滛滌濫而互相剽裂己乎予於是手掇韓公愈桞公宗元歐陽公修蘇公洵軾轍曽公鞏王公安石之文而稍為批評之以為操觚者之劵題之曰八大家文鈔家各有引條疏如左嗟乎之八君子者不敢遽謂盡得古六藝之㫖而予所批評亦不敢自以得八君子者之深要之大義所掲指次㸃綴或於道不相盭己謹書之以質世之知我者時萬厯已卯仲春歸安鹿門茅坤撰唐宋八大家文鈔論例世之論韓文者共首稱碑誌予獨以韓公碑誌多竒崛險譎不得史漢序事法故於風神處或少遒逸予間亦鐫記其旁至於歐陽公碑誌之文可謂獨得史遷之髓矣王荆公則又别出一調當細繹之序記書則韓公崛起門户矣而論䇿以下當屬之蘇氏父子兄弟四六文字予初不欲録然歐陽公之婉麗蘇子瞻之悲慨王荆公之深刺於君臣上下之間似有感動處故録而存之予覽子厚之文其議論處多鑱畫其紀山水處多幽邃夷曠至於墓誌碑碣其為御史及禮部員外時所作多沿六朝之遺予不録録其貶永州司馬以後稍屬雋永者凡若干首以見其風概云然不如昌黎多矣宋諸賢敘事當以歐陽公為最何者以其調自史遷出一切結搆裁翦有法而中多感慨俊逸處予故往往心醉曽之大㫖近劉向然逸調少矣王之結搆裁翦極多鑱洗苦心處往往矜而嚴潔而則然較之曽特屬伯仲須讓歐一格至於蘇氏兄弟大畧兩公者文才疎爽豪蕩處多而結構裁翦四字非其所長諸神道碑多者八九千言少者亦不下四五千言所當詳畧斂散處殊不得史體何者鶴頸不得不長鳬頸不得不短兩公於䇿論千年以來絶調矣故於此或殺一格亦天限之也予覽歐蘇二家論不同歐次情事甚曲故其論多確而不嫌於複蘇氏兄弟則本戰國䇿縱横以來之㫖而為文故其論直而鬯而多疎逸遒宕之勢歐則譬引江河之水而穿林麓灌畎澮若蘇氏兄弟則譬之引江河之水而一瀉千里湍者縈逝者注杳不知其所止者已語曰同工而異曲學者須自得之蘇明允易詩書禮樂論未免雜之以曲見特其文遒勁子瞻大悲閣等記及贊羅漢等文似狃於佛氏之言然亦以其見解超朗其間又有文㫖不遠稍近舉子業者故並録之曽南豐之文大較本經術祖劉向其湛深之思嚴宻之法自足以與古作者相雄長而其光燄或不外爍也故於當時稍為蘇氏兄弟所掩獨朱晦菴亟稱之厯數百年而近年王道思始知讀而酷好之如渴者之飲金莖露也予嘗有文評曰屈宋以來渾渾噩噩如長川大谷探之不窮攬之不竭藴藉百家包括萬代者司馬子長之文也閎深典雅西京之中獨冠儒宗者劉向之文也斟酌經緯上摹子長下採劉向父子勒成一家之言者班固也吞吐騁頓若千里之駒而走赤電鞭疾風常者山立怪者霆擊韓愈之文也巉巖崱屴若游峻壑削壁而谷風凄雨四至者柳宗元之文也遒麗逸宕若携美人宴遊東山而風流文物照耀江左者歐陽子之文也行乎其所當行止乎其所不得不止浩浩洋洋赴千里之河而注之海者蘇長公也嗚呼七君子者可謂聖於文矣其餘若賈董相如揚雄諸君子可謂才問炳然西京矣而非其至者曽鞏王安石蘇洵轍至矣鞏尤為折衷於大道而不失其正然其才或疲薾而不能副焉吾聊次之如左俟知音者賞之八大家而下予於本朝獨愛王文成公論學諸書及記學記尊經閣等文程朱所欲為而不能者江西辭爵及撫田州等疏唐陸宣公宋李忠定公所不逮也即如浰頭桶岡軍功等疏條次兵情如指諸掌况其設伏出竒後先本未多合兵法人特以其稍屬矜功而往往口訾之耳嗟乎公固百世殊絶人物區區文章之工與否所不暇論予特附揭於此以見我本朝一代之人豪而後世之品文者當自有定議云欽定四庫全書唐宋八大家文鈔昌黎文鈔引魏晉以後宋齊梁陳迄于隋唐之際孔子六藝之遺不絶如帶矣昌黎韓退之崛起徳憲之間泝孟軻荀卿賈誼晁錯董仲舒司馬遷劉向揚雄及班掾父子之㫖而揣摩之於是時譽者半毁者半獨柳宗元李翺皇甫湜孟郊二三輩相與遊從深知而篤好之耳何則於舉世聾瞶中而欲獨以黄鍾大吕鏗鍧其間甚矣其難也又三百年而歐陽公修蘇公軾輩相繼出始表章之而天下之文復趨於古嗟乎隋唐之文其患在靡而弱而退之之出而振之固已難矣廼若近代之文其患在勦而膺有志者茍欲出而振之而其為力也不尤戞戞乎其難矣哉要之必本乎道而按古六藝者之遺斯之謂右作者之㫖云爾予故於漢西京而下八代之衰不及一人也首揭昌黎韓文公愈録其表狀九首書啟狀四十六首序三十三首記傳十二首原論議十首辯解説頌雜著二十二首碑及墓誌碣銘五十二首哀詞祭文行狀八首釐為十六巻昌黎之竒於碑誌尤為巉削予竊疑其於太史遷之㫖或屬一間以其盛氣搯抉幅尺峻而韻折少也書記序辯解及他雜著公所獨倡門户譬則達摩西來獨開禪宗矣歸安鹿門茅坤題昌黎本傳韓愈字退之鄧州南陽人七世祖茂有功於後魏封安定王父仲卿為武昌令有美政既去縣人刻石頌徳終秘書郎愈生三嵗而孤隨伯兄㑹貶官嶺表㑹卒嫂鄭鞠之愈自知讀書日記數千百言比長盡能通六經百家學擢進士第㑹董晉為宣武節度使表署觀察推官晉卒愈從䘮出不四日汴軍亂乃去依武寧節度使張建封建封辟府推官操行堅正鯁言無所忌調四門博士遷監察御史上疏極論宫市徳宗怒貶陽山令有愛在民民生子多以其姓字之改江陵法曹參軍元和初權知國子博士分司東都三嵗為真改都官員外郎即拜河南令還遷職方員外郎華隂令柳澗有辠前刺史劾之未報而刺史罷澗諷百姓遮索軍頓役直後刺史惡之按其獄貶澗房州司馬愈過華以為刺史隂相黨上疏治之既御史覆問得澗贓再貶封溪尉愈坐是復為博士既才高數黜官又下遷乃作進學解以自諭執政覽之竒其才改比部郎中史館修撰轉考功知制誥進中書舍人初憲宗將平蔡命御史中丞裴度使諸軍按視及還具言賊可滅與宰相議不合愈亦奏言淮西連年侵掠得不償費其敗可立而待然未可知者在陛下斷與不斷耳執政不喜㑹有人詆愈在江陵時為裴均所厚均子鍔素無狀愈為文章字命鍔謗語囂暴由是改太子右庶子及度以宰相節度彰義軍宣慰淮西奏愈行軍司馬愈請乘遽先入汴説韓𢎞使協力元濟平遷刑部侍郎憲宗遣使者往鳯翔迎佛骨入禁中三日乃送佛祠王公士庶奔走膜唄至為夷法灼體膚委珍貝騰沓係路愈聞惡之乃上表極諫帝大怒持示宰相將抵以死裴度崔羣曰愈言訐牾罪之誠宜然非内懷至忠安能及此願少寛假以來諫爭帝曰愈言我奉佛太過猶可容至謂東漢奉佛以後天子咸夭促言何乖剌耶愈人臣狂妄敢爾固不可赦於是中外駭懼雖戚里諸貴亦為愈言乃貶潮州刺史既至潮以表哀謝帝頗感悔欲復用之持示宰相曰愈前所論是大愛朕然不當言天子事佛乃年促耳皇甫鎛素忌愈直即奏言愈終狂疏可且内移乃改袁州刺史初愈至潮問民疾苦皆曰惡溪有鱷魚食民畜産且盡民以是窮數日愈自往視令其屬秦濟以一羊一豕投溪水而祝之是夕暴風震電起谿中數日水盡涸西徙六十里自是潮無鱷魚患袁人以男女為𨽻過期不贖則沒入之愈至悉計庸得贖所沒歸之父母七百餘人因與約禁其為𨽻召拜國子祭酒轉兵部侍郎鎮州亂殺田𢎞正而立王廷湊詔愈宣撫既行衆皆危之元稹言韓愈可惜穆宗亦悔詔愈度事從宜無必入愈曰安有受君命而滯留自顧遂疾驅入廷湊嚴兵迓之甲士陳庭既坐廷湊曰所以紛紛者乃此士卒也愈大聲曰天子以公為有將帥材故賜以節豈意同賊反耶語未終士前奮曰先太師為國擊朱滔血衣猶在此軍何負朝廷乃以為賊乎愈曰以為爾不記先太師也若猶記之固善且為逆與順利害不能遠引古事但以天寳來禍福為爾等明之安禄山史思明李希烈梁崇義朱滔朱泚呉元濟李思道有若子若孫在乎亦有居官者乎衆曰無愈曰田公以魏博六州歸朝廷官中書令父子受旗節劉悟李祐皆大鎮此爾軍所共聞也衆曰𢎞正刻故此軍不安愈曰然爾曹害田公又殘其家矣復何道衆乃讙曰侍郎語是廷湊恐衆心動遽麾使去因泣謂愈曰今欲廷湊何所為愈曰神策六軍之將如牛元翼比者不少但朝廷顧大體不可棄之公久圍之何也廷湊曰即出之愈曰若爾則無事矣㑹元翼亦潰圍出廷湊不追愈歸奏其語帝大悦轉吏部侍郎時宰相李逢吉惡李紳欲逐之遂以愈為京兆尹兼御史大夫特詔不臺參而除紳中丞紳果劾奏愈愈以詔自解其後文刺紛然宰相以臺府不協遂罷愈為兵部侍郎而出紳江西觀察使紳見帝得留愈亦復為吏部侍郎長慶四年卒年五十七贈禮部尚書諡曰文愈性明鋭不詭隨與人交終始不少變成就後進往往知名經愈指授皆稱韓門弟子愈官顯稍謝遣凡内外親若交友無後者為嫁遣孤女而䘏其家嫂鄭䘮為服期以報每言文章自漢司馬相如太史公劉向揚雄後作者不世出故愈深探本元卓然樹立成一家言其原道原性師説等數十篇皆奥衍閎深與孟軻揚雄相表裏而佐佑六經云至它文造端置辭要為不襲蹈前人者然惟愈為之沛然若有餘至其徒李翺李漢皇甫湜從而效之遽不及遠甚從愈游者若孟郊張籍亦皆自名於時
