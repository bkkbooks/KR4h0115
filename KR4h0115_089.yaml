body:
  text: 唐宋八大家文鈔卷八十三明茅坤撰臨川文鈔三表啓荆公結知神宗於表箋所上多鑱畫感動處豫故於集內多録凡三十五首除參知政事謝表承弼之任賢智所難顧惟缺然何以堪此仰膺成命弗獲固辭中謝竊以古先哲王考愼厥輔皆有一德用成衆功伏惟皇帝陛下含獨見之明踐久安之運甫終諒暗將大施為宜得偉人與圖庶政如臣者徒以承學粗知義方本無他長可備官使退安私室自絶榮塗既負采薪之憂因逃竊位之責大明繼燭正路宏開付以蕃宣還之侍從清閒之宴或賜開延淺陋所聞每䝉知奬以為奉令承教庶幾無尤至於當軸處中良非所稱寵光曲被震愧交懷此蓋伏遇皇帝陛下德懋旁求志存逺舉隆寬盡下故忠良有以輸心公聽並觀故讒慝不能肆志矧睿謀之天縱方聖敬之日躋思稱所䝉敢忘自竭逺猷經國雖或愧于前修直道事君期不負于素守除平章事監修國史謝表臣某言伏奉恩命特授金紫光祿大夫行尚書禮部侍郎同中書門下平章事監修國史上柱國進封開國公加食邑一千戶實封四百戶仍賜推忠協謀佐理功臣尋具表陳免䝉批答不允仍斷來章者揚于大庭寵以高位歸之翊戴之重諉之宰制之平聖心方慎於旁求小臣知難於上稱中謝臣聞人君代天而理物人臣資父以事君然而君臣之大義有方非若父子之至恩無間須倡而後和則誠意每患於難通不入而後量則忠力或嫌於自獻唯成湯之聽伊尹與傅說之遇高宗皆以疏逺而相求何其親厚之獨至蓋所趨非由於二道故所為若出於一身夫豈於越夷貉之異心是謂元首股肱之同體二臣既以此獲展事君之義兩君亦以此得成理物之功茍非其人孰與於此臣受材單寡逄運休明初涉獵於藝文稍扳緣於祿仕曩塵近侍積愧空餐悲遽隔於庭闈分長依於丘隴俄值纂承之慶繼叨收召之榮責以論經尚少知於訓詁使之與政曾莫助於猷為矧以拙直而見知遂為姦回之所忌伏遇皇帝陛下納之以天地之量照之以日月之明數加奬勵之恩每辨讒誣之巧重遭卜相申敕備官終遜避之無繇更兢慙於非據伏惟皇帝陛下樂古訓之獲而忘其勢惡邪辭之害而斷以心勿二於任賢務本以除惡使萬邦有共惟帝臣之志萬姓有一哉王心之言則進無求名之私退有補過之善臣之願也天實臨之觀文殿學士知江寧府謝上表文有典刑臣某言伏奉制命授臣觀文殿學士吏部尚書知江寧軍府事臣已於六月十五日到任訖久妨賢路上負聖時茍逃放殛之刑更濫褒揚之典逸其犬馬將盡之力寵以丘墓所寄之邦仰荷恩私皆踰分願中謝臣操行不足以悅衆學術不足以趣時獨知義命之安敢望功名之會值遭興運總領繁機惟睿廣之日躋顧卑凡而坐困秋水方至因知海若之難窮大明既升豈宜爝火之弗熄加以精力耗於事為之衆罪戾積於嵗月之多雖恃含垢之寬終懷覆餗之懼伏䝉陛下志存善貸為在曲成記其事國之微誠閔其籲天之至懇撓黜幽之常法示從欲之至仁經體贊元廢任莫追於既往承流宣化收功尚冀於方來除平章事昭文館大學士謝表荆公奮勵可掬臣某言伏奉制命特授臣同中書門下平章事昭文館大學士兼譯經潤文使加食邑一千户食實封四百户仍改賜推忠協謀同德佐理功臣尋具表陳免蒙降批答不允仍斷來章者承流宣化方虞失職之誅經體贊元更誤選賢之舉中謝臣竊惟人物之會通常寡實以君臣之遇合至難自匪同聲氣之求孰能偕功名之享伏惟皇帝陛下天縱大聖人與成能乘百年久安之機飭千嵗積壞之蠱士誠服矣而持祿養交之習未殄民允懷矣而樂事勸功之志未繩近或長厄而仁義之澤未流逺或虛僑而道德之威未立宜選於衆舉格于皇天之材使暨乃僚纘迪我高后之事冀勝所任以濟斯時而臣蚤見知於隱約之中久獨立於傾搖之上勳庸弗效恩禮更加託備外藩俯鄰朞嵗遂叨詔奬還冠宰司自視羈單所懷蹇淺方古耕築則有其陋為世聘求則無其賢然以投老之軀而遭難值之運茍貪嵗月趣就涓埃且上之施既光則下之報宜厚與之戮力仰承睿知之臨罔不同心俯賴忠良之協誓殫疏拙圖稱休明辭免使相判江寧府表得君之寵多危懼臣某言近具表辭免恩命伏䝉聖慈批答不允者寵私未憖更加褒勉之恩分義所存敢冒叨貪之恥中謝伏念臣江湖一介特荷聖知帷幄七年再陪國論久居亢滿所以深懼災危積致衰疲所以懇辭機要若猶尸將相之厚祿且復殿方面之大邦則是於惡盈之時欲富而弗止以宣力之地養疴而自營聖慈雖或優容官謗何由解免伏望皇帝陛下俯垂念聽特賜矜從使盛世無虛授之嫌孤臣有少安之幸朱炎傳聖㫖令視府事謝表臣某言三月二日提舉江南路太常丞朱炎傳聖㫖令臣便視府事者使指遄臻訓詞俯逮敢圖衰疾尚誤眷存中謝伏念臣曲荷搜揚久孤付屬有能必獻未嘗擇事而辭難無力可陳乃始籲天而求佚然方焦思有為之日以此懷恩未報之身茍營燕安豈免慙悸伏䝉陛下仁惟求舊義不忘遐乃因乘軺將命之臣更喻推轂授方之意踦履無用誠弗忍於弃捐朽株匪材尚奚勝於器使永惟奬勵徒誓糜捐差弟安上傳㫖令授敕命不須辭免謝表臣某言伏䝉聖恩差弟安上提㸃江南東路刑獄以臣衰疾就令照管仍傳聖㫖令臣便授敕命更不須辭免者江海衰殘雲天悠逺恩言狎至感涕交流中謝伏念臣積荷知憐初無報稱豈圖賤質上簡聖心數遣中人間因外使喻以眷懷之至意慰其憂苦之餘生惠焉既久而彌加告矣雖頑而未捨乃至召見同産馳賜十行之書使營私門就捐一路之寄訪逮纎悉矜及隱微追千載之遭逄殆無前比顧百身之糜殞安可仰酬唯當祇聖訓之鴻私豈敢固愚衷之小諒重念無傷於國體乃為不負於天慈欲以里居之安而尸官廩之厚固巳犯明義而纍食功之實況復干隆名而長昧利之風至於詞窮雖兢慙於屢黷可以理奪終冀幸於矜從賀南郊禮畢肆赦表臣某言伏覩今月初五日南郊禮畢大赦天下者精明條達神眷顧而依懷膏澤川流人歡呼而蹈厲中賀臣聞語孝之至莫大於配天議禮而輕不足以享帝能舉釐事實歸聖時恭惟皇帝陛下鴻化已昭康年屢應奔走籩豆有董正之治官潔豐粢盛有底慎之財賦禮成穀旦恩浹綿區雖洛誦之休明尚難譬稱豈兒寬之淺訥能盡揄揚臣夙荷慈憐方嬰衰瘵望九賓之紳笏獨逺旬傳狎百獸於山林猶知率舞賀正表馭正夏時更端周厯體一元而敷惠適與春浮斂諸福以代新方侔川至中賀恭惟皇帝陛下誕昭明德祇燕孫謀齊七政以當天順五辰而凝績用求協氣以阜嘉生閲千古之上儀肆三朝之盛會仰同星拱竦百辟以在庭追效嵩呼極萬年而薦夀臣桑榆晚景麋鹿並遊進莫與於臚傳退但知於率舞賜生日禮物謝表臣某言伏䝉聖慈特差入內內侍省內東頭供奉官馮宗道傳宣撫問及就府賜臣生日禮物金花銀器一百兩衣著一百匹衣一對金鍍銀鞍轡一副并纓復馬二匹湯藥一銀盒御封全者微勞不效僅逃三典之科厚禮有加尚躐九儀之等中謝臣外叨寄屬仰誤眷憐巳隳考翼之基重負母慈之教追劬勞於晚節方不自勝惟蕃庶之舊恩終無以稱伏蒙皇帝陛下更馳膚使曲喻至懷駔駿靈珍琛奇組麗豈下流之敢及皆前此之所無金厄淑旗多錫誠榮於既往鉛刀駑馬强扶難冀於將來雖天地弗責其謝生顧臣子敢忘於致死甘師顔傳宣撫問并賜藥謝表臣某言膚使寵辭載華原隰寶奩珍劑如賁丘園臣中謝伏念臣少出衡茅晚陪帷幄德輶寄重才淺知深但念里居長負丘山之責敢期宸眷尚留簮履之矜此蓋伏遇皇帝陛下天幬無疆海函不棄戴難忘之盛德豈特銘肌撫易盡之餘生唯當結草李舜舉賜詔書藥物謝表中多感動之意臣某言輟宫闈親近之臣臨湖海寬閒之野授之藥物撫以訓辭尸厚祿而無勞謂當誅絶捐大恩而不報彌所兢慙臣中謝伏念臣本出羈單自甘淪棄晚由材學上誤聖知智曽昧於保身忠每懷於許國讒誣甚巧切憂解免之難危拙更安特荷眷憐之至況逺迹久孤之地實邇言易間之時而離明昭晰於隱微解澤頻繁於疏逖此蓋伏遇皇帝陛下以上仁含垢以大智容愚弗使南箕得侈簸揚之狀更令北户坐蒙臨照之光薾然垂盡之病軀沱若橫流之感涕惟困窮無理猶致命於一餐顧冒昧不資敢忘懷於九死中使撫問謝表臣某言孤臣疲曳自阻進趨上主慈憐猶加撫諭中謝伏念臣晚陪休運特荷異恩橫草無功每恨棄軀之晚負薪有疾仍慙制祿之優豈謂陛下所總萬機不忘一物乃因輶軒之出俯逮踦屨之遺仰荷眷私唯知感涕中使宣醫謝表臣某言乘衰攖厲敢意浼聞軫舊垂矜曲加寵數即馳近御兼飭太醫錫以寶奩實之珍劑創殘再肉顚眴更蘇沓被慈憐不勝負荷臣叨恩缺報昧祿取災果崇降以疾殃至上煩於愍惻此蓋伏遇皇帝陛下屨簮念厚軒幄眷深天弗籲而亦臨雲甫瞻而既雨哀逾察父感劇孤臣論可報之涓埃難知稱效顧未填之溝壑徒誓糜捐撫涕汍瀾捫心躑躅請皇帝御正殿復常膳表臣等言奉聖㫖以祈雨未應避正殿減常膳者陽春生物偶霑澤之稍愆睿意恤民遽側身而自抑德巳修於銷變數或係於非常當復彞儀用安羣下中謝恭惟皇帝陛下天仁漙施神智曲成躬忘旰食之勞坐講日新之政四時協序萬物致和適當化養之辰宜得涵濡之澤少違常候深軫清衷退師氏之正朝約太官之盛饌仰窺謙德志在閔民然而殊俗來朝當即法宫之位誕辰入慶合陳燕俎之珍事有所先禮難偏廢伏願仰回淵聽俯徇輿情夙御九筵之居並羞十閣之具上以全於國體下以副於臣誠請皇帝御正殿復常膳表二臣某等言近上表請御正殿復常膳䝉降批答不允者時澤偶愆屢勤齊禱聖衷愈勵曲盡焦勞將損巳以召休因退次而貶食列陳剡奏尚闕嗣音在臣列之靡遑伏帝閽而再扣中謝恭惟皇帝陛下體居離正德稟乾剛期揉俗以致康嘗納隍而興念七載于此繼獲豐穰一春而來或罹愆亢皇慈深軫羣祀遍修恐狴犴乖則親慮其囚懼黼黻美則躬變其服仍損內饔之舉兼虛正寧之朝然而禮貴從宜事難泥古而況甫臨誕節交舉慶儀有列辟拜萬年之觴有殊俗修兩朝之好茍虧彝制難副羣情少屈淵衷特從誠懇天臨廣厦日御常珍親事法宫廓宣於政治惟辟玉食昭示於等威仰以慰兩宫之慈俯以安羣下之望乞罷政事表一臣某言竊以使陪國論惟亮天工必用强明乃能協濟豈容昏瞀可以叨居進冒聰明罄陳危悃中謝伏念臣逮侍先帝列官外朝晚以喪歸因為病廢伏遇皇帝陛下召還辭禁擢預經筵收於衆惡之中諏以萬機之事搆讒誣而並至輒賜辨明推孤拙以直前每䝉開納陛下所以遇臣者可謂厚矣臣之所以報國者終於缺然豈理勢之獨難抑才能之素薄方懼過尤之積乃罹疢疾之加比欲外乞州蕃冀以就營醫藥重念采薪之弗給尚何守土之敢謀輒緣不能者止之言庶免貪以敗官之悔伏望皇帝陛下曲垂仁惻俯記愚忠賜以分司一官許於江寧居止則天地之德實有施於餘年犬馬之勤冀或輸於異日乞罷政事表二臣某言近具奏乞罷政事分司伏奉手詔封還不允所乞者私懷懇至巳具布聞聖訓丁寧未䝉開納敢冒崇髙之聽再輸悃愊之情中謝臣聞任賢之方要其有用陳力之義止於不能苟弗集於事功且重罹於疢疾豈容叨據以纍明揚伏念臣猥以孤生親逢盛世昧於量已志欲補於休明失在信書事浸成於迂濶每煩衆論上慁聖聰久知素願之難諧繼以積疴而自困辭而去位庶逃竊食之誅勉以就工重荷包荒之德雖貪順命終懼妨功伏望皇帝陛下閎度并容大明俯燭特垂矜允俾遂退藏如此則孤進之身獲全生於末路具瞻之地得改命於時材臣無任乞出表一此必因病而乞者臣某言竊以丞相之職天子是毗方當圖政之憂勤難以養疴而昧冒輒輸情素仰丐恩憐中謝臣叨被鴻私誤尸榮祿堯仁天覆幸荒穢之兼包湯聖日躋顧卑凡而自絶尚惟許國姑誓忘軀豈意眩昏甫新年而寖劇更知駑蹇難重任之久堪伏惟皇帝陛下明燭隱微惠綏羈拙閔其積疢收還上宰之印章賜以餘年歸展先臣之丘壟生當擊壤以詠矜容之德死當結草以酬含育之恩乞出表二臣某言今月十一日輒輸情素仰丐恩憐實以抱疢之深難於竊位之久過䝉敦奬未賜矜從事有迫於懇誠理必祈於哀惻中謝臣信書自守與俗多違審容膝之易安因忘擇地知戴盆之難望遂廢占天豈圖憂患之餘更值清明之始寒之之日長而暴之之日短植之之人寡而拔之之人多尚誤聖知驟妨賢路摩頂放踵雖願效於微勞以蚊負山顧難勝於重任矧復瞀昏而曠事若猶冒昧以尸官是乃明憲之所不容豈特煩言之為可畏伏惟皇帝陛下天地覆載日月照臨賜以曲成容其少愒區區旅力或未憖於餘年斷斷小能冀尚施於異日乞退表一臣昨具表乞解機政伏奉手詔未賜俞允者明主訓辭之寵宜即奉承匹夫志守之愚敢覬矜允中謝竊以品制百為總裁萬務任怨蓋難於持久服勞安可以獨賢所以中外迭居是為祖宗故事況於疲曳加以瞀昏若由昧冒而無慙其必顛隮而不救臣過叨睿奬備進近司當循名責實之時故任怨特多於前輩兼蠲令改制之事故服勞尤在於一身雖蒙全度之恩僅免譴訶之域某於多故實以難支矧疾疢之交攻且事為之寖廢伏望陛下昭其悃愊假以優游使得休養於衰疲以示保全於孤拙乞退表二臣某言近具表乞解機務伏奉手詔未賜俞允者聖恩所及有隆天重地之施私義未安有深淵薄冰之懼中謝竊惟成湯高宗之世有若伊尹傅說之臣其道則格于帝而無疑其政則加乎民而有變后惟時乂相亦有終逮乎中世之陵夷非復古人之髣佛忠或不足以取信而事事至於自明義或不足以勝姦而人人與之為敵以此乘權而久處孰能持祿以少安此臣之慮危於居寵之時而昧死有均勞之乞況於抱病浸以瘝官伏惟陛下道與日躋德侔乾覆哀一夫之失所樂萬物之皆昌矧夫眷遇之優既巳勤劬之久宜䝉善貸使獲曲全賜其疲賤之身假以安閒之池則敝車無用猶可具於勞薪棄席未忘或再施於華幄乞退表三此首别加慷慨奮勵矣臣某言伏奉聖㫖令臣入見赴中書供職者螻蟻微誠屢關省覽天地大德未賜矜從中謝臣聞周之士也貴秦之士也賤周之士也肆秦之士也拘其縱之為貴其拘之為賤賤故尚勢利而忘善惡貴故尊行義而矜廉恥士知尊行義而矜廉恥宗廟社稷之安而天下自治也伏惟陛下言必稽堯舜動必憲文武故視遇天下之士欲其貴不欲其賤欲其肆不欲其拘臣以羇孤旁無佽助一言寤意特見甄收適遭欲治之盛時實預扶衰之大義事或乖於衆口而陛下力賜辨明言有逆於聖心而陛下常垂聽納此臣所以履艱虞而不忌服勤苦而不辭雖百度搶攘未就平成之叙然四年黽勉非無夙夜之勞今特以心氣之衰疲目力之昏耗哀祈外補冀幸小休而乾剛確然莫可回奪則是親值周家之忠厚獨為秦士之賤拘事與願違能無竊歎理當情恕豈免上煩實望聖慈俯昭愚款外賜優閒之地少安疾疢之身須其有瘳乃責外效臣生當捐軀以報德死當結草以酬恩乞宫觀表一臣某言疏榮特異敢忘圖報之忠陳力弗能當布可辭之義中謝伏念臣晚陪興運久汙近司戇愚弗逮於清光衰疾更成於瘝曠茍免大訶之責乃叨異數之加授以戎旃班之宰席松楸舊國實使鎮臨蒲柳殘年足為榮耀顧在宣化承流之地方當循名責實之時疲曳難支顛隮可畏仰祈睿眷俯徇愚衷并解將相之官外除宫觀之任託依田里瞻守丘墳倘慿休養之私終獲夷瘳之福敢忘策勵復誓糜捐乞宫觀表二臣某言近具奏乞以本官外除一宫觀差遣伏䝉聖慈特降中使賜臣詔書不允者天地至恩實知難報螻蟻微息尚竊有懷輒冒隆威更輸危悃伏念臣遭逢異甚稱效蔑如茍旅力之可陳豈餘生之足惜顧以憂傷而至弊重為疢疾之所攖偷假便州必負曠瘝之責過尸厚祿更懷叨昧之慙伏望陛下本末燭知始終護念俯徇籲天之懇俾無纍國之尤尚冀寧瘳誓終糜殞乞宫觀表三臣某言軺傳俯臨璽書狎至仰荷眷存之厚第懷感悸之深任有不勝勉非所及輒輸危懇再冒天威伏念臣久誤至恩難圖報稱過尸榮祿易取災危力憊矣而弗支氣喘焉而將蹶窮閻掃軌斯為待盡之時莫府建旄豈曰養疴之地所懼曠瘝之責敢辭逋慢之誅伏望陛下照以末光遂其微謂使壇陸之鳥無眩視之悲濠梁之魚有從容之樂庶蒙瘳復更誓糜捐手詔令視事謝表中多感悟主上之言臣某言伏䝉宣示言者所奏輒具劄子乞博延公議改用賢人伏奉詔奬勵令視事如故者謗議升聞已賴舜聰之豁達懇誠上訴更煩周誥之丁寧竊以作威者主之權待察者臣之禮蓋雖䝉非常之厚遇亦將避可畏之煩言臣志尚非高才能無異舊惟所學之迂濶難以趨時因欲自屏於寬閒庶幾求志惟聖人之時不可失而君子之義必有行故當陛下即政之初輒慕昔賢際可之仕越從鄉郡歸直禁林或因勸講而賜留或以論思而請對愚忠偶合即知素願之獲申睿聖日躋更懼淺聞之難副重叨殊奬忝秉洪鈞所宜引分以固辭乃敢冒恩而輕就實恃明主知臣之有素故以孤身許國而無疑人習玩於久安吏循緣於積弊窾言不忌詖行無慙論善俗之方始欲徐徐而變革思愛日之義又將汲汲於施為以物役巳則神志有交戰之勞以道徇衆則事功無必成之望恐上辜於眷屬誠竊幸於退藏猶貪仰附於末光亦冀粗成於薄效比聞獨斷謂合僉言但輸承命之忠遂觸招權之毁因請避衆賢之路庶以厭異議之人伏䝉皇帝陛下敦大兼容清明旁燭賜之神翰諭以至懷君臣之時嘗千載而難值天地之造豈一身之可酬敢不自忘形迹之嫌庶協神明之運詔以所居園屋為僧寺及賜寺額謝表公之捨廬為寺亦其鈎奇釣詭處臣某言基迹叢祠冀鴻延於萬夀錫名扁榜竊榮遇於一時臣生乏寸長世叨殊奬賤息奄先於犬馬頽齡俯迫於桑榆獨念親逢莫有涓埃之補報永惟宏願豈忘香火之因緣伏惟皇帝陛下俯徇祈誠特加美稱所懼封人之祝終以堯辭乃塵長者之園遽如舜許仰慿護念誓畢熏修依所乞私田充蔣山太平興國寺常住謝表臣某言緣恩昧冒方虞慁上之誅加意畀矜遂竊終天之幸伏念臣少嘗陻厄晚誤褒崇榮祿雖多不逮養親之日餘年向盡更為哭子之人追營香火之緣仰賴金繒之賜尚復祈恩而不已乃將徼福於無窮伏䝉陛下眷遇一於初終愛恤兼夫存沒特撓常法俯成私求雖老矣無能莫稱漏泉之施若死而未泯豈忘結草之酬百寮賀復熙河路表覽子瞻所代張方平諫用兵書則多涕洟覽荆公賀表又多矜奮臣某等言伏覩修復熙河洮泯疊宕等州幅員二千餘里斬獲不順蕃部一萬九千餘人招撫大小蕃族三十餘萬各降附者奮張天兵開斥王土旌㫋所指燕及氐羌樓櫓相望誕彌河隴中賀竊以三年鬼方之伐高宗所以濟時六月玁狁之征宣王所以復古政由人舉道與世升伏惟皇帝陛下溫恭而文睿知以武講周唐之百度拔方虎於一言我陵我阿既飭膺揚之旅實墉實壑遂平鳥竄之戎用夏變夷以今凖古是基新命厥邁往圖臣等均被明恩具膺榮祿接千嵗之統適遭㑹於斯時上萬年之觴敢愆忘於故事除雱正言待制謝表臣某言伏奉聖恩除臣男雱右正言天章閣待制兼侍講特降中使宣諭令便受告勑不須辭免者孚號明恩實由中出美官要職弗以次加知榮耀之及私顧僭差而纍國雲天在望冰炭交懷中謝臣出於羇窮好是拙直道常違俗宜芻狗之致妖才不逮人何藿蠋之能化皇帝陛下收之末路付以繁機距滔天之衆讒責經世之來效施及賤息度越稠人延登朝行使嗣講業方仰陪於膝席俄中廢於骭瘍雖進趨之禮久妨而問勞之恩狎至莫知報稱但負兢慙豈意眷憐更加超擢待制之為職以陪侍禁嚴正言之為官以諫救遺失承金華之舊學親玉色於燕朝併叨殊私甚駭羣聽此蓋伏遇皇帝陛下攬取同智無小大之遺搜揚衆材無久近之間茍或不肖概嘗有聞必垂甄收以示勸奬四方之訓于我無競維人多士之生斯時不顯亦世永惟遭值孰與等夷君臣以事道相求是惟希世父子以傳經見用鮮或同時雖愧皋陶濟美之材敢忘狐突教忠之義進字說表非表之四六常體而說字處特雋臣某言竊以書用於世久矣先王立學以教之設官以達之置使以喻之禁誅亂名豈茍然哉凡以同道德之歸一名法之守而巳道衰以隱官失學廢循而發之實在聖時豈臣愚憧敢逮斯事中謝蓋聞物生而有情情發而為聲聲以類合皆足相知人聲為言述以為字字雖人之所制本實出於自然鳳鳥有文河圖有畫非人為也人則效此故上下內外初終前後中偏左右自然之位也衡邪曲直耦重交折反缺倒仄自然之形也發斂呼吸抑揚合散虛實清濁自然之聲也可視而知可聽而思自然之義也以義自然故仙聖所宅雖殊方域言音乖離㸃畫不同譯而通之其義一也道有升降文物隨之時變事異書名或改原出要歸亦無二焉乃若知之所不能與思之所不能至則雖非即此而可證亦非捨此而能學蓋唯天下之至神為能究此伏惟皇帝陛下體元用妙該極象數稽古創法紹天覺民乃惟兹學隕缺弗嗣因任衆智微明顯隱蓋將以祈合乎神恉者布之海內衆妙所寄窮之實難而臣頃御燕閒親承訓敕抱疴負憂久無所成雖嘗有獻大懼冒浼退復自力用忘疾憊咨諏討論博盡所疑冀或涓塵有助深崇謹勒成字說二十四卷隨表上進除知制誥謝表臣某言今月初二日伏䝉聖恩賜臣誥勑除臣知制誥者高華之選欲報常艱固陋之身以榮為懼中謝竊以自昔招智能之士因使為侍從之官豈特賴其虛名謂能華國蓋將收其實用相與致君矧號令文章之為難而討論潤色之所寄茍失職不稱則為時起羞伏惟皇帝陛下躬上聖之姿撫久安之運趣時有救弊之急守器有持盈之難當得俊良使陪遺忘則典司明命出入禁門一有瘝官尤為纍上臣羈單賤士朴鄙常人仕初有志於養親學遂不專於為巳比更煩使稍竊謬恩內懷尸祿之慙仰負食功之意又䝉採擢以致超踰蓋君之視臣不使同犬馬之賤則下之報上亦欲致岡陵之崇況臣少習藝文粗知名教遭逢一旦度越衆人唯當盡節於明時豈敢尚懷於私計除翰林學士謝表內多散非表常格而中懷感動主上之言臣聞人臣之事主患在不知學術而居寵有昧冒之心人主之畜臣患在不察名實而聽言無惻怛之意此有天下國家者所以難於任使而有道德者亦所以難於進取也學士職親地要而以討論諷譏為官非夫逺足以知先王近足以見當世忠厚篤實廉恥之操足以咨諏而不疑草創潤色文章之才足以付託而無負則在此位為無以稱如臣不肖涉道未優初無犖犖過人之才徒有區區自守之善以至將順建明之大體則或疏闊淺陋而不知加以憂傷疾病久棄里閭辭命之習蕪廢積年黽勉一州已為忝冒禁林之選豈所堪任伏惟皇帝陛下躬聖德承聖緒於羣臣賢不肖巳知考慎而於言也又能虛巳以聽之故聰明睿智神武之實巳見於行事日月未久而天下翹首企踵以望唐虞成周之太平臣於此時實被收召所以許國義當如何敢不磨礪淬濯巳衰之心紬繹溫尋久廢之學上以備顧問之所及下以供職司之所守賀韓魏公咎典刑之言伏審判府司徒侍中寵辭上宰歸榮故鄉兼兩鎮之節麾備三公之典䇿貴極富溢而無充滿之纍名遂身退而有褒加之崇在於觀瞻孰不慶羡伏惟某官受天間氣為世元龜誠節表於當時德望冠乎近代典司密命總攬中權毁譽幾至於萬端夷險常持於一意故四海以公之用捨一時為國之安危越執鴻樞遂躋元輔以人才未用為大恥以國本不建為深憂言衆人之所未嘗任大臣之所不敢及臻變故果有成功英宗以哀疚荒迷慈聖以謙沖退託內揆百官之衆外當萬事之微國無危疑人以靜一周勃霍光之於漢能定䇿而終以致疑姚崇宋璟之於唐善政理而未嘗遭變記在舊史號為元功未有獨運廟堂再安社稷弼亮三世敉寧四方崛然在諸公之先煥乎如今日之懿若夫進退之當於義出處之適其時以彼相方又為特美某久叨庇賴實預甄收職在近臣欲致盡規之義世當大有更懷下比之嫌用自絶於高閎非敢忘於舊德逖聞新命竊仰遐風瞻望門䦨不任鄉往之至上杭州范資政啓某近遊浙壤久揖孤風當資斧之無容幸曳裾之有地粹玉之彩開眉宇以照人縟星之文借談端而飾物羈瑣方嗟於中露逢迎下問於翹材仍以安石之甥復見牢之之舅兹惟雅故少稔燕閒言旋桑梓之邦驟感神庥之詠寫吳綾之危思未盡攀瞻慿楚乙之孤風但傷閒闊恢台貫序虛白調神禱頌之私不任下懇唐宋八大家文鈔卷八十三
