body:
  text: 唐宋八大家文鈔卷四十七明茅坤撰廬陵文鈔十九序傳傳易圖序歐陽以繫與文言非孔子之文正坐此孟子曰盡信書不如無書夫孟子好學者豈獨忽於書哉蓋其自傷不得親見聖人之作而傳者失其真莫可考正而云也然豈獨無書之如此余讀經解至其引易曰差若毫釐謬以千里之説又讀今周易有何謂子曰者至其繫辭則又曰聖人設卦繫辭焉欲考其真而莫可得然後知孟子之歎蓋有激云爾説者言當秦焚書時易以卜筮得獨不焚其後漢興他書雖出皆多殘缺而易經以故獨完然而經解所引考於今易亡之豈今易亦有亡者邪是亦不得為完書也昔孔子門人追記其言作論語書其首必以子曰者所以别夫子與弟子之言又其言非一事其事非一時文聯屬而言難次第故每更一事必以子曰以起之若文言者夫子自作不應自稱子曰又其作於一時文有次第何假子曰以發之乃知今周易所載非孔子文言之全篇也蓋漢之易師擇取其文以解卦體至其有所不取則文斷而不屬故以子曰起之也其先言何謂而後言子曰者乃講師自為答問之言爾取卦體以為答也亦如公羊穀梁傳春秋先言何曷而後道其師之所傳以為傳也今上繫凡有子曰者亦皆講師之説也然則今易皆出乎講師臨時之説矣幸而講師所引者得載于篇不幸其不及引者其亡豈不多邪嗚呼歷弟子之相傳經講師之去取不徒存者不完而其偽謬之失其可究邪夫繫者有所繫之謂也故曰繫辭焉以斷其吉凶是故謂之爻言其為辭各聯屬其一爻者也是則孔子專指爻辭為繫辭而今乃以孔子贊易之文為上下繫辭者何其謬也卦爻之辭或以為文王作或以為周公作孔子言聖人設卦繫辭焉是斥文王周公之作為繫辭不必復自名其所作又為繫辭也況其文乃槩言易之大體雜論易之諸卦其辭非有所繫不得謂之繫辭也必然自漢諸儒已有此名不知從何而失之也漢去周最近不應有失然漢之所為繫辭者得非不為今之繫辭乎易需之辭曰需于血出自穴艮之辭曰艮其限列其夤暌之辭曰見豕負塗載鬼一車是皆險怪奇絶非世常言無為有訓故考證而學者出其臆見隨事為解果得聖人之旨邪文言繫辭有可考者其證如此而其非世常言無可考者又可知矣今徒從夫臆出之説果可盡信之邪此孟子所歎其不如亡者也易之傳注比他經為尤多然止於王弼其後雖有述者不必皆其授受但其傳之而已大抵易至漢分為三有田何之易焦贛之易費直之易田何之易傳自孔子有上下二篇又有彖象繫辭文言設卦等自為十篇而有章句凡學有章句者皆祖之田氏焦贛之易無所傳授自得乎隱者之學專於陰陽占察之術凡學陰陽占察者皆祖之焦氏費直之易亦無所授又無章句惟以彖象文言等十篇解上下經凡以彖象文言等參入卦中者皆祖之費氏田焦之學廢於漢末費氏獨興遞傳至鄭康成而王弼所注或用康成之説是弼即鄭本而為注今行世者惟有王弼易其源出于費氏也孔子之古經亡矣詩譜補亡後序公於詩譜補亡非獨見公之潛心六藝之學又可并見公之不沒鄭氏之善如此歐陽子曰昔者聖人已沒六經之道幾熄於戰國而焚棄於秦自漢已來收拾亡逸發明遺義而正其訛繆得以粗備傳于今者豈一人之力哉後之學者因迹前世之所傳而較其得失或有之矣若使徒抱焚餘殘脫之經倀倀於去聖千百年後不見先儒中間之説而欲特立一家之學者果有能哉吾未之信也然則先儒之論茍非詳其終始而抵牾質於聖人而悖理害經之甚有不得已而後改易者何必徒為異論以相訾也毛鄭於詩其學亦已博矣豫嘗依其箋傳考之於經而證以序譜惜其不合者頗多蓋詩述商周自生民玄鳥上陳稷契下迄陳靈公千五六百嵗之間旁及列國君臣世次國地山川封域圖牒鳥獸草木魚蟲之名與其風俗善惡方言訓詁盛衰治亂美刺之由無所不載然則孰能無失於其間哉豫疑毛鄭之失既多然不敢輕為改易者意其為説不止於箋傳而已恨不得盡見二家之書未能遍通其旨夫不盡見其書而欲折其是非猶不盡人之辭而欲斷其訟之曲直其能果於自決乎其能使之必服乎世言鄭氏詩譜最詳求之久矣不可得雖崇文總目袐書所藏亦無之慶厯四年奉使河東至于絳州偶得焉其文有注而不見名氏然首尾殘缺自周公致太平已上皆亡之其國譜旁行尤易為訛舛悉皆顛倒錯亂不可復考凡詩雅頌兼列商魯其正變之風十有四國而其次第莫詳其義惟封國變風之先後不可以不知周召王豳同出於周弼鄘先於衛檜魏無世家其可考者陳齊衛晉曹鄭秦此封國之先後也豳齊衛檜陳唐秦鄭魏曹此變風之先後也周南召南弼鄘衛王鄭齊豳秦魏唐陳曹此孔子未刪詩之前周太師樂歌之次第也周召弼鄘衛王檜鄭齊魏唐秦陳曹豳此鄭氏詩譜次第也黜檜後陳此今詩次第也初豫未見鄭譜嘗略考春秋史記本紀世家年表而合以毛鄭之説為詩圖十四篇今因取以補鄭譜之亡者足以見二家所説世次先後甚僃因據而求其得失較然矣而仍存其圖庶幾以見豫於鄭氏之學盡心焉耳夫盡其説而有所不通然後得以論正豫豈好為異論者哉凡補其譜十有五補其文字二百七增損塗乙改正者三百八十三而鄭氏之譜復完矣刪正黃庭經序無仙子者不知為何人也無姓名無爵里世莫得而名之其自號為無仙子者以警世人之學仙者也其為言曰自古有道無仙而後世之人知有道而不得其道不知無仙而妄學仙此我之所哀也道者自然之道也生而必死亦自然之理也以自然之道養自然之生不自戕賊夭閼而盡其天年此自吉聖智之所同也禹走天下乘四載治百川可謂勞其形矣而夀百年顏子蕭然卧於陋巷簞食瓢飲外不誘於物內不動於心可謂至樂矣而年不及三十斯二人者皆古之仁人也勞其形者長年安其樂者短命蓋命有長短稟之於天非人力之所能為也惟不自戕賊而各盡其天年則二人之所同也此所謂以自然之道養自然之生後世貪生之徒為養生之術者無所不至至茹草木服金石吸日月之精光又有以謂此外物不足恃而反求諸內者於是息慮絶欲鍊精氣勤吐納專於內守以養其神其術雖本於貪生及其至也尚或可以全形而却疾猶愈於肆欲稱情以害其生者是謂養內之術故上智任之自然其次養內以却疾最下妄意而貪生世傳黃庭經者魏晉間道士養生之書也其説專於養內多奇怪故其傳之久則易為訛舛今家家異本莫可考證無仙子既甚好古家多集録古書文字以為玩好之娛有黃庭經石本者乃永和十三年晉人所書其文頗簡以較今世俗所傳者獨為有理疑得其真於是喟然歎曰吾欲曉世以無仙而止人之學者吾力顧未能也吾視世人執奇怪訛舛之書欲求生而反害其生者可不哀哉矧以我玩好之餘拯世人之謬惑何惜而不為乃為刪正諸家之異一以永和石本為定其難曉之言略為注解庶幾不為訛謬之説惑世以害生是亦不為無益若大雅君子則豈取於此韻總序字學所係甚小歐陽公立意恰好出脫自家門靣倕工於為弓而不能射羿與逢蒙天下之善射者也奚仲工於為車而不能御王良造父天下之善御者也此荀卿子所謂藝之至者不兩能信哉儒者學乎聖人聖人之道直以簡然至其曲而暢之以通天下之理以究陰陽天地人鬼事物之變化君臣父子吉凶生死凡人之大倫則六經不能盡其説而七十子與孟軻荀楊之徒各極其辨而莫能殫焉夫以孔子之好學而其所道者自堯舜而後則詳之其前蓋略而弗道其亦有所不暇者歟儒之學者信哉遠且大而用功多則其有所不暇者宜也文字之為學儒者之所用也其為精也有聲形曲直毫釐之别音響清濁相生之類五方言語風俗之殊故儒者莫暇精之有其精者則往往不能乎其他是以學者莫肻捨其所事而盡心乎此所謂不兩能者也必待乎用心專者而或能之然後儒者有以取焉洛僧鑒聿為韻總五篇推子母輕重之法以定四聲考求前儒之失辨正五方之訛顧其用心之精可謂入於忽微若櫛者之於髮績者之於絲雖細且多而條理不亂儒之學者莫能難也鑒聿通於易能知大演之數又學乎陰陽地理黃帝岐伯之書其尤盡心者韻總也聿本儒家子少為浮圖入武當山往來江漢之旁十餘年不妄與人交有不可其意雖王公大人亦莫肻顧聞士有一藝雖千里必求之介然有古獨行之節所謂用心專者也宜其學必至焉耳浮圖之書行乎世者數百萬言其文字雜以夷夏讀者罕得其真往往就而正焉鑒聿之書非獨有取於吾儒亦欲傳於其徒也孫子後序序聖俞注孫子故其議如此世所傳孫武十三篇多用曹公杜牧陳皥注號三家孫子余頃與撰四庫書目所見孫子注者尤多武之書本於兵兵之術非一而以不窮為奇宜其説者之多也凡人之用智有短長其施設各異故或膠其説於偏見然無出所謂三家者三家之注皥最後其説時時攻牧之短牧亦慨然最喜論兵欲試而不得者其學能道春秋戰國時事甚博而詳然前世言善用兵稱曹公曹公嘗與董呂諸袁角其力而勝之遂與吳蜀分漢而王傳言魏之諸將出兵千里每坐計勝敗授其成算諸將用之十不失一一有違者兵輒敗北故魏世用兵悉以新書從事其精於兵也如此牧謂曹公於注孫子尤略蓋惜其所得自為一書是曹公悉得武之術也然武嘗以其書干吳王闔閭闔閭用之西破楚北服齊晉而霸諸侯夫使武自用其書止於強霸及曹公用之然亦終不能滅吳蜀豈武之術盡於此乎抑用之不極其能也後之學者徒見其書又各牽於已見是以注者雖多而少當也獨吾友聖俞不然嘗評武之書曰此戰國相傾之説也三代王者之師司馬九伐之法武不及也然亦愛其文略而意深其行師用兵料敵制勝亦皆有法其言甚有次序而注者汨之或失其意乃自為注凡膠於偏見者皆排去傅以己意而發之然後武之説不汨而明吾知此書當與三家並傳而後世取其説者往往於吾聖俞多焉聖俞為人謹質溫恭衣冠進趨眇然儒者也後世之視其書者與太史公疑張子房為壯夫何異續思潁詩序前輩風韻自在皇祐二年余方留守南都已約梅聖俞買田於潁上其詩曰優遊琴酒逐漁釣上下林壑相攀躋及身強健始為樂莫待衰病須扶擕此蓋余之本志也時年四十有四其後丁家艱服除還朝遂入翰林為學士忽忽七入年間歸潁之志雖未遑也然未嘗一日少忘焉故其詩曰乞身當及強健時顧我蹉跎已衰老蓋歎前言之未踐也時年五十有二自是誤被選擢叨塵二府遂歷三朝蓋自嘉祐治平之間國家多事固非臣子敢自言其私時也而非才竊位謗咎已盈賴天子仁聖聰明辨察誣罔始終保全其出處俯仰十有二年今其年六十有四蓋自有蹉跎之歎又復一紀矣中間在亳幸遇朝廷無事中外晏然而身又不當責任以謂臣子可退無嫌之時遂敢以其私言天子惻然閔其年猶未也謂尚可以勉故奏封十上而六被詔諭未賜允俞今者蒙上哀憐察其實病且衰矣既不責其避事又曲從其便私免并得蔡俾以偷安此君父廓大度之寬仁遂萬物之所欲覆載含容養育之恩也而復蔡潁連強因得以為歸老之漸冀少償其夙願兹又莫大之幸焉初陸子履以余自南都至在中書所作十有三篇為思潁詩以刻于石今又得在亳及青十有七篇以附之蓋自南都至在中書十有八年而得十三篇在亳及青三年而得十有七篇以見余之年益加老病益加衰其日漸短其心漸迫故其言愈多也庶幾覽者知余有志於強健之時而未償於衰老之後幸不譏其踐言之晚也禮部唱和詩序雖文之小者亦好興致嘉祐二年春豫幸得從五人者於尚書禮部考天下所貢士凡六千五百人蓋絶不通人者五十日乃於其間時相與作為古律長短歌詩雜言庶幾所謂羣居燕處言談之文亦所以宣其底滯而忘其倦怠也故其為言易而近擇而不精然綢繆反復若斷若續而時發於奇怪雜以詼嘲笑謔及其至也往往亦造於精微夫君子之博取於人者雖滑稽鄙俚猶或不遺而況於詩乎古者詩三百篇其言無所不有惟其肆而不放樂而不流以卒歸于正此所以為貴也於是次而録之得一百七十三篇以傳於六家嗚呼吾六人者志氣可謂盛矣然壯者有時而衰衰者有時而老其出處離合參差不齊則是詩也足以追惟平昔握手以為笑樂至於慨然掩卷而流涕噓嚱者亦將有之雖然豈徒如此而止也覽者其必有取焉集古録目序歐公之好言如此近覽王廷尉古書畫題跋亦煞有歐陽公風致然亦以有力而強故能如此耳物常聚於所好而常得於有力之強有力而不好好之而無力雖近且易有不能致之象犀虎豹蠻夷山海殺人之獸然其齒角皮革可聚而有也玉出崑崙流沙萬里之外經十餘譯乃至乎中國珠出南海常生深淵採者腰絙而入水形色非人往往不出則下飽蛟魚金礦于山鑿深而穴遠篝火餱糧而後進其崖崩窟塞則遂葬于其中者率常數十百人其遠且難而又多死禍常如此然而金玉珠璣世常兼聚而有也凡物好之而有力則無不至也湯盤孔鼎岐陽之鼓岱山鄒嶧會稽之刻石與夫漢魏已來聖君賢士桓碑彞器銘詩序記下至古文籕篆分𨽻諸家之字書皆三代以來至寶怪奇偉麗工妙可喜之物其去人不遠其取之無禍然而風霜兵火湮沒磨滅散棄於山崖墟莽之間未嘗收拾者由世之好者少也幸而有好之者又其力或不足故僅得其一二而不能使其聚也夫力莫如好好莫如一豫性顓而嗜古凡世人之所貪者皆無欲於其間故得一其所好於斯好之已篤則力雖未足猶能致之故上自周穆王以來下更秦漢隋唐五代外至四海九州名山大澤窮崖絶谷荒林破塜神仙鬼物詭怪所傳莫不皆有以為集古録以謂轉寫失真故因其石本軸而藏之有卷帙次第而無時世之先後蓋其取多而未已故隨其所得而録之又以謂聚多而終必散乃撮其大要别為録目因并載夫可與史傳正其闕謬者以傳後學庶益於多聞或譏豫曰物多則其勢難聚聚久而無不散何必區區於是哉豫對曰足吾所好玩而老焉可也象犀金玉之聚其能果不散乎豫固未能以此而易彼也桑懌傳此本摹擬史遷惜也懌之行事僅捕盜耳假令傳史記所載名賢豈止此耶桑懌開封雍丘人其兄慥本舉進士有名懌亦舉進士再不中去遊汝潁間得龍城廢田數頃退而力耕嵗凶汝旁諸縣多盜懌白令願為耆長往來里中察姦民因召里中少年戒曰盜不可為也吾在此不汝容也少年皆諾里老父子死未斂盜夜脫其衣里老父怯無他子不敢告縣裸其尸不能葬懌聞而悲之然疑少年王生者夜入其家探其篋不使之知覺明日遇之問曰爾諾我不為盜矣今又盜里父子尸者非爾邪少年色動即推仆地縳之詰共盜者王生指某少年懌呼壯丁守王生又自馳取少年者送縣皆伏法又嘗之郟城遇尉方出捕盜招懌飲酒遂與俱行至賊所藏尉怯陽為不知以過懌曰賊在此何之乎下馬獨格殺數人因盡縳之又聞襄城有盜十許人獨提一劒以往殺數人縳其餘汝旁縣為之無盜京西轉運使奏其事授郟城尉天聖中河南諸縣多盜轉運奏移澠池尉崤古險地多塗山而青灰山尤阻險為盜所恃惡盜王伯者藏此山時出為近縣害當此時王伯名聞朝廷為巡撿者皆授名以捕之既懌至巡撿者偽為宣頭以示懌將謀招出之懌信之不疑其偽也因諜知伯所在挺身入賊中招之與伯同臥起十餘日信之乃出巡撿者反以兵邀於山口懌幾不自免懌曰巡撿授名懼無功爾即以伯與巡撿使自為功不復自言巡撿俘獻京師朝廷知其實罪黜巡撿懌為尉嵗餘改授右班殿直永安縣巡撿明道景祐之交天下旱蝗盜賊稍稍起其間有惡賊二十三人不能捕樞密院以傳召懌至京授二十三人名使往捕懌謀曰盜畏吾名必已潰潰則難得矣宜先示之以怯至則閉柵戒軍吏無一人得輒出居數日軍吏不知所為數請出自效輒不許既而夜與數卒變為盜服以出迹盜所嘗行處入民家民皆走獨有一媪留為作飲食饋之如盜乃歸復閉柵三日又往則㩦其具就媪饌而以其餘遺媪媪待以為真盜矣乃稍就媪與語及羣盜輩媪曰彼聞桑懌來始畏之皆遁矣又聞懌閉營不出知其不足畏今皆還也某在某處某在某所矣懌盡鉤得之復三日又往厚遺之遂以實告曰我桑懌也煩媪為察其實而慎勿泄後三日我復來矣後又三日往媪察其實審矣明旦部分軍士用甲若干人於某所取某盜卒若干人於某處取某盜其尤強者在某所則自馳馬以往士卒不及從惟四騎追之遂與賊遇手殺三人凡二十三人者一日皆獲二十八日復命京師樞密吏謂曰與我銀為君致閣職懌曰用賂得官非我欲況貧無銀有固不可也吏怒匿其閥以免短使送三班三班用例與兵馬監押未行會交趾獠叛殺海上巡撿昭化諸州皆警往者數輩不能定因命懌往盡手殺之還乃授閣門祗侯懌曰是行也非獨吾功位有居吾上者吾乃其佐也分彼留而我還我賞厚而彼輕得不疑我蓋其功而自伐乎受之徒慚吾心將讓其賞歸已上者以奏藁示豫豫謂曰讓之必不聽徒以好名與詐取譏也懌歎曰亦思之然士顧其心何如爾當自信其心以行譏何纍也若欲避名則善皆不可為也已余慙其言卒讓之不聽懌雖舉進士而不甚知書然其所為皆合道理多此類始居雍丘遭大水有粟二廪將以舟載之見民走避溺者遂棄其粟以舟載之見民荒嵗聚其里人飼之粟盡乃止懌善劒及鐵簡力過數人而有謀略遇人常畏若不自足其為人不甚長大亦自修為威儀言語如不出其口卒然遇人不知其健且勇也廬陵歐陽修曰勇力人所有而能知用其勇者少矣若懌可謂義勇之士其學問不深而能者蓋天性也余固喜傳人事尤愛司馬遷善傳而其所書皆偉烈奇節士喜讀之欲學其作而怪今人如遷所書者何少也乃疑遷特雄文善壯其説而古人未必然也及得桑懌事乃知古之人有然焉遷書不誣也知今人固有而但不盡知也懌所為壯矣而不知豫文能如遷書使人讀而喜否姑次第之六一居士傳文旨曠逹歐陽公所自解脫在此六一居士初謫滁山自號醉翁既老而衰且病將退休於潁水之上則又更號六一居士客有問曰六一何謂也居士曰吾家藏書一萬卷集録三代以來金石遺文一千卷有琴一張有碁一局而常置酒一壺客曰是為五一爾奈何居士曰以吾一翁老於此五物之間是豈不為六一乎客笑曰子欲逃名者乎而屢易其號此莊生所謂畏影而走乎日中者也余將見子疾走大喘渴死而名不得逃也居士曰吾固知名之不可逃然亦知夫不必逃也吾為此名聊以志吾之樂爾客曰其樂如何居士曰吾之樂可勝道哉方其得意於五物也太山在前而不見疾雷破柱而不驚雖響九奏於洞庭之野閲大戰於涿鹿之原未足喻其樂且適也然常患不得極吾樂於其間者世事之為吾纍者衆也其大者有二焉軒裳圭組勞吾形于外憂患思慮勞吾心于內使吾形不病而已悴心未老而先衰尚何暇於五物哉雖然吾自乞其身於朝者三年矣一日天子惻然哀之賜其骸骨使得與此五物偕返於田廬庶幾償其夙願焉此吾之所以志也客復笑曰子知軒裳圭組之纍其形而不知五物之纍其心乎居士曰不然纍於彼者已勞矣又多憂纍於此者既佚矣幸無患吾其何擇哉於是與客俱起握手大笑曰置之區區不足較也已而歎曰夫士少而仕老而休蓋有不待七十者矣吾素慕之宜去一也吾嘗用於時矣而訖無稱焉宜去二也壯猶如此今既老且病矣乃以難強之筋骸貪過分之榮祿是將違其素志而自食其言宜去三也吾負三宜去雖無五物其去宜矣復何道哉熙寧三年九月七日六一居士自傳唐宋入大家文鈔卷四十七
