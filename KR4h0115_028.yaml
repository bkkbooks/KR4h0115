body:
  text: 唐宋八大家文鈔巻二十六明茅坤撰柳州文鈔十雜著予覽子厚所托物賦文甚多大較由遷謫僻徼日月且久簿書之暇情思所嚮輒鑄文以自娛云其㫖雖不逺而其調亦近於風騷矣予故錄而存之乞巧文文與昌黎之送窮相上下而所占地位下一格柳子夜歸自外庭有設祠者􅊡餌馨香蔬果交羅挿竹垂綏剖瓜犬牙且拜且祈怪而問焉女𨽻進曰今兹秋孟七夕天女之孫將嬪於河鼔邀而祠者幸而與之巧驅去蹇拙手目開利組絍縫製將無滯於心焉為是禱也柳子曰茍然歟吾亦有所大拙倘可因是以求去之乃纓弁束袵促武縮氣旁趨曲折傴僂將事再拜稽首稱臣而進曰下土之臣竊聞天孫專巧於天轇轕璇璣經緯星辰能成文章黼黻帝躬以臨下民欽聖靈仰光耀之日久矣今聞天孫不樂其獨得貞卜於𤣥龜將蹈石梁欵天津儷於神夫於漢之濱兩旗開張中星耀芒靈氣翕歘兹辰之良幸而弭節薄遊民間臨臣之庭曲聽臣言臣有大拙智所不化醫所不攻威不能遷寛不能容乾坤之量包含海岳臣身甚微無所投足蟻適於垤蝸休於殻龜黿螺蜯皆有所伏臣物之靈進退唯辱仿佯為狂局束為謟吁吁為詐坦坦為忝他人有身動必得宜周旋獲笑顚倒逢嘻已所尊昵人或怒之變情狥勢射利抵巇中心甚憎為彼所奇忍仇佯喜悅譽遷隨胡執臣心常使不移反人是已曾不懼疑貶名絶命不負所知抃嘲似傲貴者啓齒臣旁震驚彼且不耻叩稽匍匐言語譎詭令臣縮恧彼則大喜臣若效之瞋怒叢已彼誠大巧臣拙無比王侯之門狂吠狴犴臣到百步喉喘顚汗睢盱逆走魄遁神叛欣欣巧夫徐入縱誕毛羣掉尾百怒一散世途昏險擬步如漆左低右昻鬬冒衝突鬼神恐悸聖智危慄泯焉直透所至如一是獨何工縱横不恤非天所假彼智焉出獨嗇於臣恒使玷黜沓沓騫騫恣口所言迎知喜惡默測憎憐揺脣一發徑中心原膠加鉗夾誓死無遷探心扼膽踊躍拘牽彼雖佯退胡可得旃獨結臣舌喑抑銜寃擘眥流血一辭莫宣胡為賦授有此奇偏眩耀為文𤨏碎排偶抽黄對白啽哢飛走駢四儷六錦心繡口宫沉羽振笙簧觸手觀者舞悅誇談雷吼獨溺臣心使甘老醜嚚昏莽鹵樸鈍枯朽不期一時以俟悠久旁羅萬金不鬻弊帚跪呈豪傑投棄不有眉矉頞蹙喙唾胷歐大𧹞而歸填恨低首天孫司巧而窮臣若是卒不余畀獨何酷歟敢願聖靈悔禍矜臣獨艱付與姿媚易臣頑顔鑿臣方心規以大圓拔去呐舌納以工言文詞婉軟步武輕便齒牙饒美眉睫增妍突梯巻臠為世所賢公侯卿士五屬十連彼獨何人長享終天言訖又再拜稽首俯伏以俟至夜半不得命疲極而睡見有青褏朱裳手持絳節而來告曰天孫吿汝汝詞良苦凡汝之言吾所極知汝擇而行嫉彼不為汝之所欲汝自可期胡不為之而誑我為汝唯知耻謟貌淫辭寧辱不貴自適其宜中心已定胡妄而祈堅汝之心密汝所持得之為大失不汙卑凡吾所有不敢汝施致命而昇汝慎勿疑嗚呼天之所命不可中革泣拜欣受初悲後懌抱拙終身以死誰惕斬曲几文經曰曲而等聖人未嘗絶曲也子厚性獨剛直故以此得世謗嫉而斬之情見乎文后皇植物所貴乎直聖主取焉以建家國亘為棟楹齊為閫閾外隅平端中室謹飭度焉以几維量之則君子憑之以輔其徳末代淫巧不師古式斷兹揉木以限肘腋欹形詭狀曲程詐力制類奇邪用絶繩墨勾身陋狹危足僻側支不得舒脅不遑息余胡斯蓄以亂人極追咎厥始惟物之殘禀氣失中遭生不完託地墝垤反時燠寒欝悶結澁癃蹇艱難不可以遂遂虧其端離奇詰屈縮恧巑岏含蝎孕蠧外邪中乾或因先容以售其蟠病夫甘焉制器以安彼風毒敗形隂沴遷魄禍氣侵骨淫神化脉體仄筋倦榮乖衛逆乃喜兹物以為己適器之不祥莫是為敵烏可昵近以招禍癖且人道甚惡惟曲為先在心為賊在口為愆在肩為僂在膝為攣戚施踦跂匍匐拘拳古皆斥逺莫致於前問誰其類惡木盗泉朝歌迴車簡牘載焉昭王市骨樂毅歸燕今我斬此以希古賢謟諛宜惕正直宜宣道焉是逹法焉是專咨爾君子曷不乾乾既和且平獲祐於天去惡在微慎保其傳宥蝮蛇文并序柳子不殺蝮蛇胸次亦大家有僮善執蛇晨持一蛇來謁曰是謂蝮蛇犯於人死不治又善伺人聞人咳喘步驟輒不勝其毒㨗取巧噬肆其害然或慊不得於人則愈怒反齧草木草木立死後人來觸死莖猶墮指攣腕瘇足為廢病必殺之是不可留余曰汝惡得之曰得之榛中曰榛中若是者可既乎曰不可其類甚博余謂僮曰彼居榛中汝居宫内彼不汝即而汝即彼犯而鬭死以執而謁者汝實健且險以輕近是物然而殺之汝益暴矣彼耕穫者求薪蘇者皆土其鄉知防而入焉執耒操鞭持芟扑以逺其害汝今非有求於榛者也密汝居易汝庭不淩奥不步闇是惡能得而害汝且彼非樂為此態也造物者賦之形隂與陽命之氣形甚怪僻氣甚禍賊雖欲不為是不可得也是獨可悲憐者又孰能罪而加怒焉汝勿殺也余悲其不得已而所為若是叩其脊諭而宥之其辭曰吾悲乎天形汝軀絶翼去足無以自扶曲膂屈脅惟行之紆目兼蜂蠆色混泥塗其頸蹙恧其腹次且塞鼻鈎牙穴出榛居蓄怒而蟠銜毒而趨志蘄害物隂妬濳狙汝之禀受若是雖欲為鼃為螾焉可得已凡汝之為惡非樂乎此緣形役性不可自止草揺風動百毒齊起首拳脊努呥舌揺尾不逞其凶若病乎已世皆寒心我獨悲爾吾將薙吾庭葺吾楹窖吾垣嚴吾扄俾奥草不植而穴隟不萌與汝異途不相交爭雖汝之惡焉得而行嘻造物者胡甚不仁而巧成汝質既禀乎此能無危物賊害無辜惟汝之實隂陽為戾假汝忿疾余胡汝尤是戮是抶宥汝於野自求終吉彼樵豎持芟農夫執耒不幸而遇將除其害餘力一揮應手糜碎我雖汝活其恵實大他人異心誰釋汝罪形既不化終焉能悔嗚呼悲乎汝必死乎毒而不知反訟乎内今雖寛焉後則誰賚隂陽爾造化爾道烏乎在可不悲歟憎王孫文并序亦足風刺猨王孫居異山徳異性不能相容猨之徳静以恒類仁讓孝慈居相愛食相先行有列飲有序不幸乖離則其鳴哀有難則内其柔弱者不踐稼蔬木實未熟相與視之謹既熟嘯呼羣萃然後食衎衎焉山之小草木必環而行遂其植故猿之居山恒欝然王孫之徳躁以囂勃諍號呶唶唶疆疆雖羣不相善也食相噬齧行無列飲無序乖離而不思有難推其柔弱者以免好踐稼蔬所過狼藉披攘木實未熟輒齕齩投注竊取人食皆知自實其嗛山之小草木必凌挫折挽使之瘁然後已故王孫之居山恒蒿然以是猨羣衆則逐王孫王孫羣衆則齚猨猨棄去終不與抗然則物之甚可憎莫王孫若也余棄山間久見其趣如是作憎王孫云湘水之悠兮其上羣山胡兹欝而彼瘁兮善惡異居其間惡者王孫兮善者猨環行遂植兮止暴殘王孫兮甚可憎噫山之靈兮胡不賊旃跳踉呌囂兮衝目宣齗外以敗物兮内以爭羣排鬭善類兮譁駭披紛盗取民食兮私已不分充嗛果腹兮驕傲驩欣嘉禾美木兮碩而繁羣披競齧兮枯株根毁成敗實兮更怒喧居民厭苦兮號穹旻王孫兮甚可憎噫山之靈兮胡獨不聞猨之仁兮受逐不校退優游兮惟徳是傚廉來同兮聖囚禹稷合兮凶誅羣小逐兮君子違大人聚兮孽無餘善與惡不同鄉兮否康既兆其盈虛伊細大之固然兮乃禍福之攸趨王孫兮甚可憎噫山之靈兮胡逸而居弔屈原文文不如賈誼所弔屈原者之賦而詞亦矘朗後先生蓋千祀兮余再逐而浮湘求先生之汨羅兮擥蘅若以薦芳願荒忽之顧懐兮冀陳辭而有光先生之不從世兮惟道是就支離搶攘兮遭世孔疚華蟲薦壤兮進御羔褏牝雞咿嚘兮孤雄束咮哇咬環觀兮䝉耳大吕莖喙以為羞兮焚棄稷黍犴獄之不知避兮宫庭之不處䧟塗藉穢兮榮若繡黼榱折火烈兮娛娛笑舞讒巧之嘵嘵兮惑以為咸池便姢鞠恧兮美愈西施謂謨言之怪誣兮反寘瑱而逺違匿重痼以諱避兮進俞緩之不可為何先生之澟澟兮厲鍼石而從之但仲尼之去魯兮曰吾行之遲遲柳下恵之直道兮又焉往而可施今夫世之議夫子兮曰胡隱忍而懷斯惟逹人之卓軌兮固僻陋之所疑委故都以從利兮吾知先生之不忍立而視其覆墜兮又非先生之所志窮與達固不渝兮夫唯服道以守義矧先生之悃愊兮滔大故而不貳沉璜瘞佩兮孰幽而不光荃蕙蔽匿兮胡久而不芳先生之貌不可得兮猶髣髴其文章託遺編而歎喟兮渙余涕之盈眶呵星辰而驅詭怪兮夫孰救於崩亡何揮霍夫雷電兮茍為是之荒茫耀姱辭之矘朗兮世果以是之為狂哀余𠂻之坎坎兮獨蘊憤而增傷諒先生之不言兮後之人又何望忠誠之既内激兮抑衘忍而不長芈為屈之幾何兮胡獨焚其中腸吾哀今之為仕兮庸有慮時之否臧食君之祿畏不厚兮悼得位之不昌退自服以黙黙兮曰吾言之不行既媮風之不可去兮懐先生之可忘三戒并序吾恒惡世之人不知推已之本而乘物以逞或依勢以干非其類出技以怒强竊時以肆暴然卒迨於禍有客談麋驢鼠三物似其事作三戒臨江之麋臨江之人畋得麋麑畜之入門羣犬垂涎揚尾皆來其人怒怛之自是日抱就犬習示之使勿動稍使與之戲積久犬皆如人意麑稍大忘已之麋也以為犬良我友抵觸偃仆益狎犬畏主人與之俯仰甚善然時啖其舌三年麋出門外見外犬在道甚衆走欲與為戲外犬見而喜且怒共殺食之狼藉道上麋至死不悟黔之驢黔無驢有好事者船載以入至則無可用放之山下虎見之尨然大物也以為神蔽林間窺之稍出近之憖憖然莫相知他日驢一鳴虎大駭遠遁以為且噬已也甚恐然往來視之覺無異能者益習其聲又近出前後終不敢搏稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳因跳踉大口闞斷其喉盡其肉乃去噫形之尨也類有徳聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取今若是焉悲夫永某氏之鼠永有某氏者畏日拘忌異甚以為已生歳直子鼠子神也因愛䑕不畜貓犬禁僮勿擊鼠倉廩庖㕑悉以恣鼠不問由是鼠相吿皆來某氏飽食而無禍某氏室無完器椸無完衣飲食大率鼠之餘也晝累累與人兼行夜則竊齧鬬暴其聲萬狀不可以寢終不厭數嵗某氏徙居他州後人來居鼠為態如故其人曰是隂類惡物也盗暴尤甚且何以至是乎哉假五六貓闔門撤瓦灌穴購僮羅捕之殺鼠如丘棄之隠處臰數月乃己嗚呼彼以其飽食無禍為可恒也哉謗譽較之昌黎原毁文當退一格然亦多雋辭凡人之獲謗譽於人者亦各有道君子在下位則多謗在上位則多譽小人在下位則多譽在上位則多謗何也君子宜於上不宜於下小人宜於下不宜於上得其宜則譽至不得其宜則謗亦至此其凡也然而君子遭亂世不得巳而在於上位則道必咈於君而利必及於人由是謗行於上而不及於下故可殺可辱而人猶譽之小人遭亂世而後得居於上位則道必合於君而害必及於人由是譽行於上而不及於下故可寵可富而人猶謗之君子之譽非所謂譽也其善顯焉爾小人之謗非所謂謗也其不善彰焉爾然則在下而多謗者豈盡愚而狡也哉在上而多譽者豈盡仁而智也哉其謗且譽者豈盡明而善褒貶也哉然而世之人聞而大惑出一庸人之口則羣而郵之且置於遠邇莫不以為信也豈惟不能褒貶而巳則又蔽於好惡奪於利害吾又何從而得之耶孔子曰不如鄉人之善者好之其不善者惡之善人者之難見也則其謗君子者為不少矣其謗孔子者亦為不少矣傳之記者叔孫武叔時之顯貴者也其不可記者又不少矣是以在下而必困也及乎遭時得君而處乎人上功利及於天下天下之人皆歡而戴之向之謗之者今從而譽之矣是以在上而必彰也或曰然則聞謗譽於上者反而求之可乎曰是惡可無亦徵其所自而已矣其所自善人也則信之不善人也則勿信之矣茍吾不能分於善不善也則已耳如有謗譽乎人者吾必徵其所自未敢以其言之多而舉且信之也其有及乎我者未敢以其言之多而榮且懼也茍不知我而謂我盗跖吾又安取懼焉茍不知我而謂我仲尼吾又安取榮焉知我者之善不善非吾果能明之也要必自善而已矣對賀者解嘲釋謔諸文之遺柳子以罪貶永州有自京師來者既見曰余聞子坐事斥逐余適將唁子今余視子之貌浩浩然也能是達矣余無以唁矣敢更以為賀柳子曰子誠以貌乎則可也然吾豈若是而無志者耶姑以戚戚為無益於道故若是而己耳吾之罪大㑹主上方以寛理人用和天下故吾得在此凡吾之貶斥幸矣而又戚戚焉何哉夫為天子尚書郎謀畫無所陳而羣比以為名䝉耻遇僇以待不測之誅茍人爾有不汗栗危厲偲偲然者哉吾嘗静處以思獨行以求自以上不得自列於聖朝下無以奉宗祀近丘墓徒欲茍生幸存庶幾似續之不廢是以儻蕩其心倡佯其形茫乎若升高以望潰乎若乘海而無所往故其容貌如是子誠以浩浩而賀我其孰承之乎嘻笑之怒甚乎裂眥長歌之悲過乎慟哭庸詎知吾之浩浩非戚戚之尤者乎子休矣愚溪對柳子自嘲并以自矜栁子名愚溪而居五日溪之神夜見夢曰子何辱予使予為愚耶有其實者名固從之今予固若是耶予聞閩有水生毒霧厲氣中之者溫屯嘔泄藏石走瀨連艫糜解有魚焉鋸齒鋒尾而獸蹄是食人必斷而躍之乃仰噬焉故其名曰惡溪西海有水散渙而無力不能負芥投之則委靡墊没及底而後止故其名曰弱水秦有水掎汨泥淖撓混沙礫視之分寸眙若睨壁淺深險易昧昧不覿乃合涇渭以自彰穢跡故其名曰濁涇雍之西有水幽險若漆不知其所出故其名曰黑水夫惡弱六極也濁黑賤名也彼得之而不辭窮萬世而不變者有其實也今予甚清與美為子所喜而又功可以及圃畦力可以載方舟朝夕者濟焉子幸擇而居予而辱以無實之名以為愚卒不見徳而肆其誣豈終不可革耶栁子對曰汝誠無其實然以吾之愚而獨好汝汝惡得避是名耶且汝不見貪泉乎有飲而南者見交趾寶貨之多光溢於目思以兩手左右攫而懐之豈泉之實耶過而往貪焉猶以為名今汝獨招愚者居焉久留而不去雖欲革其名不可得矣夫明王之時智者用愚者伏用者宜邇伏者宜遠今汝之託也逺王都三千餘里仄僻迴隠蒸欝之與曹螺蜯之與居唯觸罪擯辱愚陋黜伏者日侵侵以遊汝闖闖以守汝汝欲為智乎胡不呼今之聰明皎厲握天子有司之柄以生育天下者使一經於汝而唯我獨處汝既不能得彼而見獲於我是則汝之實也當汝為愚而猶以為誣寧有說耶曰是則然矣敢問子之愚何如而可以及我柳子曰汝欲窮我之愚説耶雖極汝之所往不足以申吾喙涸汝之所流不足以濡吾翰姑示子其畧吾茫洋乎無知冰雪之交衆裘我絺溽暑之鑠衆從之風而我從之火吾盪而趨不知太行之異乎九衢以敗吾車吾放而遊不知吕梁之異乎安流以没吾舟吾足蹈坎井頭抵木石衝冒榛棘僵仆虺蜴而不知怵惕何䘮何得進不為盈退不為抑荒涼昬默卒不自克此其大凡者也願以是汙汝可乎於是溪神深思而歎曰嘻有餘矣是及我也因俯而羞仰而吁涕泣交流舉手而辭一晦一明覺而莫知所之遂書其對設漁者對智伯諷貪得而招敵者而文亦極力摹冩智氏既滅范中行志益大合韓魏圍趙水晉陽智伯瑶乘舟以臨趙且又往來觀水之所自務速取焉羣漁者有一人坐漁智伯怪之問焉曰若漁幾何曰臣始漁於河中今漁於海令主大兹水臣是以來曰若之漁何如曰臣幼而好漁始臣之漁於河有魦鱮鱣鰋者不能自食以好臣之餌日收者百焉臣以為小去而之龍門之下伺大鮪焉夫鮪之來也從魴鯉數萬垂涎流沫後者得食焉然其饑也亦返吞其後愈肆其力逆流而上慕為螭龍及夫抵大石亂飛濤折鰭秃翼顚倒頓踣順流而下宛委冒懵環坻溆而不能出嚮之從魚之大者幸而啄食之臣亦徒手得焉猶以為小聞古之漁有任公子者其得益大於是去而之海上北浮於碣石求大鯨焉臣之具未及施見大鯨驅羣蛟逐肥魚於渤澥之尾震動大海簸掉巨島一啜而食若舟者數十勇而未己貪而不能止北蹙於碣石槁焉嚮之以為食者反相與食之臣亦徒手得焉猶以為小聞古之漁有太公者其得益大釣而得文王於是舎而來智伯曰今若遇我也如何漁者曰嚮者臣巳言其端矣始晉之侈家若欒氏祁氏郤氏羊舌氏以十數不能自保以貪晉國之利而不見其害主之家與五卿嘗裂而食之矣是無異魦鱮鱣鰋也腦流骨腐於主之故鼎可以懲矣然而猶不肯寤又有大者焉若范氏中行氏貪人之土田侵人之勢力慕為諸侯而不見其害主與三卿又裂而食之矣脫其鱗鱠其肉刳其腸斷其首而棄之鯤鮞遺胤莫不備爼豆是無異夫大鮪也可以懲矣然而猶不肯寤又有大者焉吞范中行以益其肥猶以為不足力愈大而求食愈無饜驅韓魏以為羣鮫以逐趙之肥魚而不見其害貪肥之勢將不止於趙臣見韓魏懼其將及也亦幸主之蹙於晉陽其目動矣而主乃慠然以為咸在機俎之上方磨其舌抑臣有恐焉今輔果舎族而退不肯同禍叚規怨深而造謀主之不寤臣恐主為大鯨首解於邯鄲鬛摧於安邑胸披於上黨尾斷於中山之外而腸流於大陸為鱻薧以充三家子孫之腹臣所以大懼不然主之勇力强大於文王何有智伯不悦終以不寤於是韓魏與趙合滅智氏其地三分唐宋八大家文鈔巻二十六
