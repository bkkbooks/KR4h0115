body:
  text: 唐宋八大家文鈔卷十八明茅坤撰柳州文鈔二書與太學諸生喜詣闕留陽城司業書意氣淋漓二十六日集賢殿正字柳宗元敬致尺牘太學諸生足下始朝廷用諌議大夫陽公為司業諸生陶煦醇懿熙然大洽于兹四祀而已詔書出為道州僕時通籍光範門就職書府聞之悒然不喜非特為諸生戚戚也乃僕亦失其師表而莫有所矜式焉既而署吏有傳致詔草者僕得觀之蓋主上知陽公甚熟嘉美顯寵勤至備厚乃知欲煩陽公宣風裔土覃布美化于黎獻也遂寬然少喜如獲慰薦于天子休命然而退自感悼幸生明聖不諱之代不能布露所蓄論列大體聞於下執事冀少見採取而還陽公之南也翌日退自書府就車於司馬門外聞之於抱關掌管者道諸生愛慕陽公之德教不忍其去頓首西闕下懇悃至願乞留如故者百數十人輒用撫手喜甚震忭不寧不意古道復形於今僕嘗讀李元禮嵇叔夜傳觀其言太學生徒仰闕赴訴者僕謂訖千百年不可覩聞乃今日聞而覩之誠諸生見賜甚盛於戲始僕少時嘗有意遊太學受師說以植志持身焉當時說者咸曰太學生聚為朋曹侮老慢賢有墮窳敗業而利口食者有崇飾惡言而肆鬬訟者有凌傲長上而誶罵有司者其退然自克特殊於衆人者無幾耳僕聞之恟駭怛悸良痛其遊聖人之門而衆為是􅊱􅊱也遂退託鄉閭家孰考厲志業過太學之門而不敢局顧尚何能仰視其學徒者哉今乃奮志厲義出乎千百年之表何聞見之乖刺歟豈說者過也將亦時異人異無嚮時之桀害者耶其無乃陽公之漸漬導訓明效所致乎夫如是服聖人遺教居天子太學可無愧矣於戲陽公有博厚恢𢎞之德能容善僞來者不拒曩聞有狂惑小生依託門下或乃飛文陳愚醜行無賴而論者以為言謂陽公過於納汙無人師之道是大不然仲尼吾黨狂狷南郭獻譏曽參徒七十二人致禍負芻孟軻館齊從者竊屨彼一聖兩賢人繼為大儒然猶不免如之何其拒人也俞扁之門不拒病夫繩墨之側不拒枉材師儒之席不拒曲士理固然也且陽公之在於朝四方聞風仰而尊之貪冒茍進邪薄之夫庶得少沮其志不遂其惡雖微師尹之位而人實具瞻焉與其宣風一方覃化一州其功之遠近又可量哉諸生之言非獨為已也於國體實甚宜願諸生勿得私之想復再上故少佐筆端耳朂此良志俾為史者有以紀述也努力多賀栁宗元白與崔饒州論石鍾乳書全學李斯逐客書宗元白前以所致石鍾乳非良聞子敬所餌與此類又聞子敬時憒悶動作宜以為未得其粹美而為粗礦燥悍所中懼傷子敬醇懿仍習謬誤故勤勤以云也再獲書辭辱徴引地理證驗多過數百言以為土之所出乃良無不可者是將不然夫言土之出者固多良而少不可不謂其咸無不可也草木之生也依於土然即其類也而有居山之隂陽或近水或附石其性移焉又况鍾乳直産於石石之精粗疏密尋尺特異而穴之上下土之厚薄石之高下不可知則其依而産者固不一性然由其精密而出者則油然而清炯然而輝其竅滑以夷其肌亷以微食之使人榮華溫柔其氣宣流生胃通腸壽善康寧心平意舒其樂愈愈由其粗疏而下者則奔突結澀乍大乍小色如枯骨或類死灰淹悴不發叢齒積纇重濁頑璞食之使人偃蹇壅鬱泄火生風㦸喉癢肺幽關不聰心煩喜怒肝舉氣剛不能和平故君子愼焉取其色之美而不必唯土之信以求其至精凡為此也幸子敬餌之近不至於是故可止禦也必若土之出無不可者則東南之竹箭雖旁岐揉曲皆可以貫犀革北山之木雖離竒液瞞空中立枯者皆可以梁百尺之觀航千仞之淵冀之北土馬之所生凡其大耳短脰拘攣踠跌薄蹄而曵者皆可以勝百鈞馳千里雍之塊璞皆可以備砥礪徐之糞壤皆可以封大社荆之茅皆可以縮酒九江之元龜皆可以卜泗濵之石皆可以擊考若是而不大謬者少矣其在人也則魯之晨飲其羊關轂而輠輪者皆可以為師儒盧之沽名者皆可以為太醫西子之里惡而矉者皆可以當侯王山西之冒沒輕儳沓貪而忍者皆可以鑿凶門制閫外山東之稚騃朴鄙力農桑啖棗栗者皆可以謀謨於廟堂之上若是則反倫悖道甚矣何以異於是物哉是故經中言丹砂者以類芙蓉而有光言當歸者以類馬尾蠶首言人參者以人形黃芩以腐腸附子八角甘遂赤膚類不可悉數若果土宜乃善則云生某所不當又云某者良也又經注曰始興為上次乃廣連則不必服正為始興也今再三為言者唯欲得其英精以固子敬之壽非以知藥石角技能也若以服餌不必利已姑務勝人而夸辨博素不望此於子敬其不然明矣故畢其說宗元再拜唐荆川曰博喻文非不古然亦絶有蹊徑與李睦州服氣書文最工然篇末椎牛一段似漫溷子厚每每文到縱橫時便露此態二十六日宗元再拜前四五日與邑中可與遊者遊愚溪上池西小丘坐栁下酒行甚歡坐者咸望兄不能俱以為兄由服氣以來貌加老而心少歡愈不若前去年時是時既言皆沮然眄睞思有以已兄用斯術而未得路間一日濮陽吳武陵最輕健先作書道天地日月黃帝等下及列仙方士皆死狀出千餘字頗甚快辨伏覩兄貌笑口順而神不偕來及食時竊睨和糅燥濕與啖飲多寡猶自若是兄陽德其言而隂黜其志也若古之强大諸侯然負固恃力敵至則諾去則肆是不可變之尤者也攻之不得則宜濟師今吳子之師已遭諾而退矣愚敢厲鋭擐堅鳴鍾鼓以進决於城下唯兄明聽之凡服氣之大不可者吳子已悉陳矣悉陳而不變者無他以服氣書多美言以為得恆久大利則又安得棄吾美言大利而從他人之苦言哉今愚甚呐不能多言大凡服氣之可不死歟不可歟壽歟夭歟康寧歟疾病歟若是者愚皆不言但以世之兩事已所經見者類之以明兄所信書必無可用愚幼時嘗嗜音見有學操琴者不能得碩師而偶傳其譜讀其聲以布其爪指蚤起則嘐嘐譊譊以逮夜又增以脂燭燭不足則諷而鼓諸席如是十年以為極工出至大都邑操於衆人之座則皆得大笑曰嘻何清濁之亂而疾舒之乖歟卒大慚而歸及年少長則嗜書又見有學書者亦不能得碩師獨得國故書伏而攻之其勤若向之為琴者而年又倍焉出曰吾書之工能為若是知書者又大笑曰是形縱而理逆卒為天下棄又大慚而歸是二者皆極工而反棄者何哉無所師而徒狀其文也其所不可傳者卒不能得故雖窮日夜弊歲紀愈逺而不近也今兄之所以為服氣者果誰師耶始者獨見兄傳得氣書於盧遵所伏讀三兩日遂用之其次得氣訣於李計所又參取而大施行焉是書是訣遵與計皆不能知然則兄之所以學者無碩師矣是與向之兩事者無毫末差矣宋人有得遺契者密數其齒曰吾富可待矣兄之術或者其類是歟兄之不信今使號於天下曰孰為李睦州友者今欲已睦州氣術者左袒不欲者右袒則凡兄之友皆左袒矣則又號曰孰為李睦州客者今欲已睦州氣術者左袒不欲者右袒則凡兄之客皆左袒矣則又以是號於兄之宗族皆左袒矣號姻婭則左袒矣入而號之閨門之內子姓親昵則子姓親昵皆左袒矣下之號於臧獲僕妾則臧獲僕妾皆左袒矣出而號於素為將率胥吏者則將率胥吏皆左袒矣則又之天下號曰孰為李睦州讐者今欲已睦州氣術者左袒不欲者右袒則凡兄之讐者皆右袒矣然則利害之源不可知也友者欲久存其道客者欲久存其利宗族姻婭欲久存其戚閨門之內子姓親昵欲久存其恩臧獲僕妾欲久存其主將率胥吏欲久存其勢讐欲速去其害兄之為是術凡今天下欲兄久存者皆懼而欲兄速去者獨喜兄為而不已則是背親而與讐夫背親而與讐不及中人者皆知其為大戾而兄安焉固小子之所凛凛也兄其有意乎卓然自更使讐者失望而栗親者得欲而忭則愚願椎肥牛擊大豕刲羣羊以為兄餼窮隴西之麥殫江南之稻以為兄壽鹽東海之水以為鹹醯敖倉之粟以為酸極五味之適致五藏之安心恬而志逸貌美而身胖醉飽謳歌愈懌欣歡流聲譽於無窮垂功烈而不刋不亦㫖哉孰與去味以即淡去樂以即愁悴悴焉膚日皺肌日虛守無所師之術尊不可傳之書悲所愛而慶所憎徒曰我能堅壁拒境以為強大是豈所謂強而大也哉無任疑懼之甚謹再拜答周君巢書此子厚不好仙家者之言然大倨且君子以其術延年却病未必無可取者奉二月九日書所以撫教甚具無以加焉丈人用文雅從知己日以惇大府之政甚適東西來者皆曰海上多君子周為倡焉敢再拜稱賀宗元以罪大擯廢居小州與囚徒為朋行則若帶纆索處則若關桎梏彳亍而無所趨拳拘而不能肆槁焉若枿隤焉若璞其形固若是則其中者可得矣然由未嘗肯道鬼神等事今丈人乃盛譽山澤之臞者以為壽且神其道若與堯舜孔子似不相類焉何哉又曰餌藥可以久壽將分以見與固小子之所不欲得也嘗以君子之道處焉則外愚而內益智外訥而內益辨外柔而內益剛出焉則外內若一而時動以取其宜當而生人之性得以安聖人之道得以光獲是而中雖不至耉老其道壽矣今夫山澤之臞於我無有焉視世之亂若理視人之害若利視道之悖若義我壽而生彼夭而死固無能動其肺肝焉昧昧而趨屯屯而居浩然若有餘掘草烹石以私其筋骨而日以益愚他人莫利已獨以愈若是者愈千百年滋所謂夭也又何以為高明之圖哉宗元始者講道不篤以䝉世顯利動獲大僇用是奔竄禁錮為世之所詬病凡所設施皆以為戾從而吠者成羣已不能明而况人乎然茍守先聖之道由大中以出雖萬受擯棄不更乎其內大都類往時京城西與丈人言者愚不能改亦欲丈人固往時所執推而大之不為方士所惑仕雖未逹無忘生人之患則聖人之道幸甚其必有陳矣不宣與楊誨之疏解車義第二書首尾二千言如一線然强合乎道者張操來致足下四月十八日書始復去年十一月書言說車之說及親戚相知之道是二者吾於足下固具焉不疑又何逾歲時而乃克也徒親戚不過欲其勤讀書決科求仕不為大過如斯已矣告之而不更則憂憂則思復之復之而又不更則悲悲則憐之何也戚也安有以堯舜孔子所傳者而往責焉者哉徒相知則思責以堯舜孔子所傳者就其道施於物斯已矣告之而不更則疑疑則思復之復之而又不更則去之何也外也安有以憂悲且憐之之志而強役焉者哉吾於足下固具是二道雖百復之亦將不已况一二敢怠於言乎僕之言車也以內可以守外可以行其道今子之說曰柔外剛中子何取於車之疏耶果為車柔外剛中則未必不為弊車果為人柔外剛中則未必不為恆人夫剛柔無常位皆宜存乎中有召焉者在外則出應之應之咸宜謂之時中然後得名為君子必曰外恆柔則遭夾谷武子之臺及為蹇蹇匪躬以革君心之非莊以蒞乎人君子其不克歟中恆剛則當下氣怡色濟濟切切哀矜淑問之事君子其卒病歟吾以為剛柔同體應變若化然後能志乎道也今子之意近是也其號非也內可以守外可以行其道吾以為至矣而子不欲焉是吾所以惕惕然憂且疑也今將申告子以古聖人之道書之言堯曰允恭克讓言舜曰溫恭允塞禹聞善言則拜湯乃改過不吝高宗曰啓乃心沃朕心惟此文王小心翼翼日昃不暇食坐以待旦武王引天下誅紂而代之位其意宜肆而曰豫小子不敢荒寧周公踐天子之位捉髮吐哺孔子曰言忠信行篤敬其弟子言曰夫子溫良恭儉讓以得之今吾子曰自度不可能也然則自堯舜以下與子果異類耶樂放弛而愁檢局雖聖人與子同聖人能求諸中以厲乎已久則安樂之矣子則肆之其所以異乎聖者在是决也若果以聖與我異類則自堯舜以下皆宜縱目卬鼻四手八足鱗毛羽鬛飛走變化然後乃可茍不為是則亦人耳而子舉將外之耶若然者聖自聖賢自賢衆人自衆人咸任其意又何以作言語立道理千百年天下傳道之是皆無益於世獨遺好事者藻繢文字以矜世取譽聖人不足重也故曰中人以上可以語上唯上智與下愚不移吾以子近上智今其言曰自度不可能也則子果不能為中人以上耶吾之憂且疑者以此凡儒者之所取大莫尚孔子孔子七十而縱心彼其縱之也度不踰矩而後縱之今子年有幾自度果能不踰矩乎而遽樂於縱也傅說曰唯狂克念作聖今夫狙猴之處山呌呼跳梁其輕躁狠戻異甚然得而縶之未半日則定坐求食唯人之為制其或優人得之加鞭箠狎而擾焉跪起趨走咸能為人所為者未有一焉狂奔掣頓踣弊自絶故吾信夫狂之為聖也今子有賢人之資反不肯為狂之克念者而曰我不能捨子其孰能乎是孟子之所謂不為也非不能也凡吾之致書為說車皆聖道也今子曰我不能為車之說但當則法聖道而內無愧乃可長久嗚呼吾車之說果不為聖道耶吾以內可以守外可以行其道告子今子曰我不能翦翦拘拘以同世取榮吾豈教子為翦翦拘拘者哉子何考吾說車之不詳也吾之所云者其道自堯舜禹湯高宗文王武王周公孔子皆由之而子不謂聖道抑以吾為與世同波工為翦翦拘拘者以是教已固迷吾文而懸定吾意甚不然也聖人不以人廢言吾雖少時與世同波然未嘗翦翦拘拘也又子自言處衆中逼則擾攘欲棄去不敢猶勉強與之居茍能是何以不克為車之說耶忍汚雜囂譁尚可恭其體貌遜其言辭何故不可吾之說吾未嘗為佞且僞其㫖在於恭寬退讓以售聖人之道及乎人如斯而已矣堯舜之讓禹湯高宗之戒文王之小心武王之不敢荒寧周公之吐握孔子之六十九未嘗縱心彼七八聖人者所為若是豈恆愧於心乎慢其貌肆其志茫洋而後言偃蹇而後行道人是非不顧齒類人皆心非之曰是禮不足者甚且見罵如是而心反不愧耶聖人之禮讓其且為僞乎為佞乎今子又以行險為車之罪夫車之為道豈樂行於險耶度不得已而至乎險期勿敗而已耳夫君子亦然不求險而利也故曰危邦不入亂邦不居國無道其默足以容不幸而及於危亂期勿禍而已耳且子以及物行道為是耶非耶伊尹以生人為己任管仲釁浴以伯濟天下孔子仁之凡君子為道捨是宜無以為大者也今子書數千言皆未及此則學古道為古辭尨然而措於世其卒果何為乎是之不為而甘羅終軍以為慕棄大而録小賤本而貴末夸世而釣竒茍求知於後世以聖人之道為不若二子僕以為過矣彼甘羅者左右反覆得利棄信使秦背燕之親已而反與趙合以致危於燕天下是以益知秦無禮不信視函谷關若虎豹之窟羅之徒實使然也子而慕之非夸世歟彼終軍者誕譎險薄不能以道匡漢主好戰之志視天下之勞若觀蟻之移穴玩而不戚人之死於胡越者赫然千里不能諌而又聳踴之已則决起奮怒掉強越挾淫夫以媒老婦欲蠱奪人之國智不能斷而俱死焉是無異盧狗之遇嗾呀呀而走不顧險阻唯嗾者之從何無已之心也子而慕之非釣竒歟二小子之道吾不欲吾子言之孔子曰是聞也非達也使二小子及孔子氏曽不得與於琴張叔皮狂者之列是固不宜以為的也且吾子之要於世者處耶出耶主上以聖明進有道興大化枯槁伏匿縲錮之士皆思踴躍洗沐期輔堯舜萬一有所不及丈人方用德藝達於邦家為大官以立於天下吾子雖欲為處何可得也則固出而已矣將出於世而仕未二十而任其心吾為子不取也馮婦好搏虎卒為善士周處狂橫一旦改節皆老而自克今子素善士年又甚少血氣未定而忽欲為阮咸嵇康之所為守而不化不肯入堯舜之道此甚未可也吾意足下所以云云者惡佞之尤而不悅於恭耳觀過而知仁彌見吾子之方其中也其乏者獨外之圓耳屈子曰懲於羮者而吹虀吾子其類是歟佞之惡而恭反得罪聖人所貴乎中者能時其時也茍不適其道則肆與佞同山雖高水雖下其為險而害也要之不異足下當取吾說車申而復之非為佞而利於險也明矣吾子惡乎佞而恭且不欲今吾又以圓告子則圓之為號固子之所宜甚惡方於恭也又將千百焉然吾所謂圓者不如世之突梯茍冒以矜利乎已者也固若輪焉非特於可進也鋭而不滯亦將於可退也安而不挫欲如循環之無窮不欲如轉丸之走下也乾健而運離麗而行夫豈不以圓克乎而惡之也吾年十七求進士四年乃得舉二十四求博學宏詞科二年乃得仕其間與恆人為羣輩數十百人當時志氣類足下時遭訕罵詬辱不為之靣則為之背積八九年日思摧其形鋤其氣雖甚自折挫然已得號為狂踈人矣及為藍田尉留府庭旦暮走謁於大官堂下與卒伍無别居曹則俗吏滿前更說買賣商算贏縮又二年為此度不能去益學老子和其光同其塵雖自以為得然已得號為輕薄人矣及為御史郎官自以登朝廷利害益大愈恐懼思欲不失色於人雖戒礪加切然卒不免為連纍廢逐猶以前時遭狂踈輕薄之號既聞於人為恭讓未洽故罪至而無所明之到永州七年矣蚤夜遑遑追思咎過往來甚熟講堯舜孔子之道亦熟益知出於世者之難自任也今足下未為僕嚮所陳者宜乎欲任己之志此與僕少時何異然循吾嚮所陳者而由之然後知難耳今吾先盡陳者不欲足下如吾更訕辱被稱號已不信於世而後知慕中道費力而多害故勤勤焉云爾而不已也子其詳之熟之無徒為煩言往復幸甚又所言書意有不可者令僕專專為掩匿覆蓋之愼勿與不知者道此又非也凡吾與子往復皆為言道道固公物非可私而有假令子之言非是則子當自求暴揚之使人皆得刺列卒采其可者以正乎己然後道可顯達也今乃專欲覆蓋掩匿是固自任其志而不求益者之為也士傳言庶人謗於道子産之鄉校不毁獨何如哉君子之過如日月之蝕又何蓋乎是事吾不能奉子之教矣幸悉之足下所為書言文章極正其辭奧雅後來之馳於是道者吾子且為蒲梢駃騠何可當也其說韓愈處甚好其他但用莊子國語文字太多反纍正氣果能遺是則大善矣憂閔廢錮悼籍田之罷意思懇懇誠愛我厚者吾自度罪大敢以是為欣且戚耶但當把鋤荷鍤决溪泉為圃以給茹其隟則浚溝池藝樹木行歌坐釣望青天白雲以此為適亦足老死無戚戚者時時讀書不忘聖人之道已不能用有我信者則以告之朝廷更宰相來政事益修丈人日夕還北闕吾待子郭南亭上期口言不久矣至是當盡吾說今因道人行粗道大㫖如此宗元白唐宋八大家文鈔卷十八
