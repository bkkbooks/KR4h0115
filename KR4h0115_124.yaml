body:
  text: 唐宋八大家文鈔卷一百十四明茅坤撰老泉文鈔八衡論衡論序事有可以盡告人者有可告人以其端而不可盡者盡以告人其難在告告人以其端其難在用今夫衡之有刻也於此為銖於此為石求之而不得曰是非善衡焉可也曰權罪者非也始吾作權書以為其用可至於無窮而亦可至於無用於是又作衡論十篇嗚呼從吾説而不見其成乃可以罪我焉耳按此老泉經世之文也其議論多雜以申韓余第謂其與舉子業較近故並録之遠慮文如怒馬奔逸絶塵而不可羈制大略老蘇之文有此一段奇邁奮迅之氣故讀之往往令人心掉聖人之道有經有權有機是以有民有羣臣而又有腹心之臣曰經者天下之民舉知之可也曰權者民不得而知矣羣臣知之可也曰機者雖羣臣亦不得而知矣腹心之臣知之可也夫使聖人而無權則無以成天下之務無機則無以濟萬世之功然皆非天下之民所宜知而機者又羣臣所不得聞羣臣不得聞誰與議不議不濟然則所謂腹心之臣者不可一日無也後世見三代取天下以仁義而守之以禮樂也則曰聖人無機夫取天下與守天下無機不能顧三代聖人之機不若後世之詐故後世不得見耳有機也是以有腹心之臣禹有益湯有伊尹武王有太公望是三臣者聞天下之所不聞知羣臣之所不知禹與湯武倡其機於上而三臣者和之於下以成萬世之功下而至于桓文有管仲狐偃為之謀主闔廬有伍貟勾踐有范蠡大夫種髙祖之起也大將任韓信黥布彭越禆將任曹參樊噲滕公灌嬰遊説諸侯任酈生陸賈樅公至于竒機密謀羣臣所不與者唯留侯酇侯二人唐太宗之臣多竒材而委之深任之密者亦不過曰房杜夫君子為善之心與小人為惡之心一也君子有機以成其善小人有機以成其惡有機也雖惡亦或濟無機也雖善亦不克是故腹心之臣不可一日無也司馬氏魏之賊也有賈充之徒為之腹心之臣以濟陳勝吳廣秦民之湯武也無腹心之臣以不克何則無腹心之臣者無機也有機而泄也夫無機與有機而泄者譬如虎豹食人而不知設陷穽設陷穽而不知以物覆其上者也或曰機者創業之君所假以濟耳守成之世其奚事機而安用夫腹心之臣嗚呼守成之世能遂熙然如太古之世矣乎未也吾未見機之可去也且夫天下之變常伏於燕安田文所謂主少國危大臣未附如此等事何世無之當是之時而無腹心之臣可為寒心哉昔者髙祖之末天下既定矣而又以周勃遺孝惠孝文武帝之末天下既治矣而又以霍光遺孝昭孝宣蓋天下雖有泰山之勢而聖人常以纍卵為心故雖守成之世而腹心之臣不可去也傳曰百官總已以聽于冡宰彼冡宰者非腹心之臣天子安能舉天下之事委之三年而不置疑于其間耶又曰五載一巡狩彼無腹心之臣五載一出捐千里之畿而誰與守耶今夫一家之中必有宗老一介之士必有密友以開心胸以濟緩急奈何天子而無腹心之臣乎近世之君抗然於上而使宰相眇然於下上下不接而其志不通矣臣視君如天之遼然而不可親而君亦如天之視人泊然無愛之之心也是以社稷之憂彼不以為憂社稷之喜彼不以為喜君憂不辱君辱不死一人譽之則用之一人毁之則舍之宰相避嫌畏譏且不暇何暇盡心以憂社稷數遷數易視相府如傳舍百官泛泛於下而天子惸惸於上一旦有卒然之憂吾未見其不顛沛而殞越也聖人之任腹心之臣也尊之如父師愛之如兄弟握手入卧內同起居寢食知無不言言無不盡百人譽之不加密百人毁之不加疏尊其爵厚其祿重其權而後可與議天下之機慮天下之變太祖用趙中令也得其道矣近者寇萊公亦誠其人然與之權輕故終以見逐而天下幾有不測之變然則必使之可以生人殺人而後可也御將老蘇論御才將以智而引漢髙待韓彭一著似痛切矣獨不思宋祖御諸將更有處分智之一字決非至理人君御臣相易而將難將有二有賢將有才將而御才將尤難御相以禮御將以術御賢將之術以信御才將之術以智不以禮不以信是不為也不以術不以智是不能也故曰御將難而御才將尤難六畜其初皆獸也彼虎豹能搏能噬而馬亦能蹄牛亦能觸先王知能搏能噬者不可以人力制故殺之殺之不能驅之而後巳蹄者可馭以羈紲觸者可拘以楅衡故先王不忍棄其材而廢天下之用如曰是能蹄是能觸當與虎豹并殺而同驅則是天下無騏驥終無以服乘耶先王之選才也自非大姦劇惡如虎豹之不可以變其搏噬者未嘗不欲制之以術而全其才以適于用況為將者又不可責以廉隅細謹顧其才何如耳漢之衛霍趙兖國唐之李靖李績賢將也漢之韓信黥布彭越唐之薛萬徹侯君集盛彥師才將也賢將既不多有得才者而任之可也苟又曰是難御則是不肖者而後可也結以重恩示以赤心美田宅豐飲饌歌童舞女以極其口腹耳目之欲而折之以威此先王之所以御才將者也近之論者或曰將之所以畢志竭力犯霜露蹈白刃而不辭者冀賞耳為國家者不如勿先賞以邀其成功或曰賞所以使人不先賞人不為我用是皆一隅之説非通論也將之才固有小大傑然於庸將之中者才小者也傑然於才將之中者才大者也才小志亦小才大志亦大人君當觀其才之小大而為制御之術以稱其志一隅之説不可用也夫養騏驥者豐其芻粒潔其羈絡居之新間浴之清泉而後責之千里彼騏驥者其志常在千里也夫豈以一飽而廢其志哉至於養鷹則不然獲一雉飼以一雀獲一兔飼以一鼠彼知不盡力於擊搏則其勢無所得食故然後為我用才大者騏驥也不先賞之是養騏驥者飢之而責其千里不可得也才小者鷹也先賞之是養鷹者飽之而求其擊搏亦不可得也是故先賞之説可施之才大者不先賞之説可施之才小者兼而用之可也昔者漢髙帝一見韓信而授以上將解衣衣之推食哺之一見黥布而以為淮南王供具飲食如王者一見彭越而以為相國當是時三人者未有功于漢也厥後追項籍垓下與信越期而不至捐數千里之地以畀之如棄弊屣項氏未滅天下未定而三人者已極富貴矣何則髙帝知三人者之志大不極於富貴則不為我用雖極於富貴而不滅項氏不定天下則其志不巳也至於樊噲滕公灌嬰之徒則不然拔一城陷一陳而後增數級之爵否則終歲不遷也項氏巳滅天下已定樊噲滕公灌嬰之徒計百戰之功而後爵之通侯夫豈髙帝至此而嗇哉知其才小而志小雖不先賞不怨而先賞之則彼將泰然自滿而不復以立功為事故也噫方韓信之立於齊蒯通武涉之説未去也當是之時而奪之王漢其殆哉夫人豈不欲三分天下而自立者而彼則曰漢王不奪我齊也故齊不捐則韓信不懷韓信不懷則天下非漢之有嗚呼髙帝可謂知大計矣任相任相以禮古之善觀人之國者觀其相何如人而已議者常曰將與相均將特一大有司耳非相侔也國有征伐而後將權重有征伐無征伐相皆不可一日輕相賢耶則羣有司皆賢而將亦賢矣將賢耶相雖不賢將不可易也故曰將特一大有司耳非相侔也任相之道與任將不同為將者大槩多才而或頑鈍無恥非皆節廉好禮不可犯者也故不必優以禮貌而其有不羈不法之事則亦不可以常法御何則豪縱不趨約束者亦將之常態也武帝視大將軍往往踞厠而李廣利破大宛侵殺士卒之罪則寢而不問此任將之道也若夫相必節廉好禮者為也又非豪縱不趨約束者為也故接之以禮而重責之古者相見於天子天子為之離席起立在道為之下輿有病親問不幸而死親弔待之如此其厚然其有罪亦不私也天地大變天下大過而相以不起聞矣相不勝任䇿書至而布衣出府免矣相有他失而棧車牝馬歸以思過矣夫接之以禮然後可以重其責而使無怨言責之重然後接之以禮而不為過禮薄而責重彼將曰主上遇我以何禮而重我以此責也甚矣責輕而禮重彼將遂弛然不肯自飭故禮以維其心而重責以勉其怠而後為相者莫不盡忠於朝廷而不恤其私吾觀賈誼書至所謂長太息者常反覆讀不能巳以為誼生文帝時文帝遇將相大臣不為無禮獨周勃一下獄誼遂發此使誼生於近世見其所以遇宰相者則當復何如也夫湯武之德三尺豎子皆知其為聖人而猶有伊尹太公者為師友焉伊尹太公非賢於湯武也而二聖人者特不顧以師友之明有尊也噫近世之君姑勿責於此天子御坐見宰相而起者有之乎無矣在輿而下者有之乎亦無矣天子坐殿上宰相與百官趨走於下掌儀之官名而呼之若郡守召胥吏耳雖臣子為此亦不過然尊尊貴貴之道不若是褻也夫既不能待之以禮則其罪之也吾法將亦不得用何者不過於用禮而果於用刑則其心不服故法曰有某罪而加之以某刑及其免相也既曰有某罪而刑不加焉不過削之一官而出之大藩鎮此其弊皆始於不為之禮賈誼曰中罪而自弛大罪而自裁夫人不我誅而安忍棄其身此必有大愧於其君故人君者必有以愧其臣故其臣有所不為武帝嘗以不冠見平津侯故當天下多事朝廷憂懼之際使石慶得容於其間而無怪焉然則必其待之如禮而後可以責之如法也且吾聞之待以禮而彼不自效以報其上重其責而彼不自勉以全其身安其祿位成其功名者天下無有也彼人主傲然於上不禮宰相以自尊大者孰若使宰相自效以報其上之為利宰相利其君之不責而豐其私者孰若自勉以全其身安其祿位成其功名之為福吾又未見去利而就害逺福而求禍者也重遠並切今世情事録之以備舉子家經濟之一武王不泄邇不忘逺仁矣乎非仁也勢也天下之勢猶一身一身之中手足病於外則腹心為之深思靜慮於內而求其所以療之之術腹心病於內則手足為之奔掉於外而求其所以療之之物腹心手足之相救非待仁而後然吾故曰武王之不泄邇不忘逺非仁也勢也勢如此其急而古之君獨武王然者何也人皆知一身之勢而武王知天下之勢也夫不知一身之勢者一身危而不知天下之勢者天下不危乎哉秦之保關中自以為子孫萬世帝王之業而陳勝吳廣乃楚人也由此觀之天下之勢逺近如一然以吾言之近之可憂未若逺之可憂之深也近之官吏賢耶民譽之歌之不賢耶譏之謗之譽歌譏謗者衆則必傳傳則必達於朝廷是官吏之賢否易知也一夫不獲其所訴之刺史刺史不問則裏糧走京師緩不過旬月撾鼓呌號而有司不得不省矣是民有寃易訴也吏之賢否易知而民之寃易訴亂何從始耶逺方之民雖使盜跖為之郡守檮杌叨餮為之縣令郡縣之民羣嘲而聚罵者雖千百為輩朝廷不知也白日執人於市誣以殺人雖其兄弟妻子聞之亦不過訴之刺史不幸而刺史又抑之則死且無告矣彼見郡守縣令據案執筆吏卒旁列箠械滿前駭然而喪膽矣則其謂京師天子所居者當復如何而又行數千里費且百萬富者尚或難之而貧者又何能乎故其民常多怨而易動吾故曰近之可憂未若逺之可憂之深也國家分十七路河朔陜右廣南川峽實為要區河朔陜右二冦之防而中國之所恃以安廣南川峽貨財之源而河朔陜右之所恃以全其勢之輕重何如哉曩者北胡驕恣西寇悖叛河朔陜右尤所加恤一郡守一縣令未嘗不擇至於廣南川峽則例以為逺官審官差除取具臨時竄謫量移往往而至凡朝廷稍所優異者不復官之廣南川峽而其人亦以廣南川峽之官為失職庸人無所歸故常聚於此嗚呼知河朔陜右之可重而不知河朔陜右之所恃以全之地不可輕是欲富其倉而蕪其田倉不可得而富也矧其地控制南夷氐蠻最為要害土之所産又極富夥明珠大貝紈錦布帛皆極精好陸負水載出境而其利百倍然而關譏門征僦雇之費非百姓私力所能辦故貪官專其利而齊民受其病不招權不鬻獄者世俗遂指以為廉吏矣而招權鬻獄者又豈盡無嗚呼吏不能皆亷而廉者又止如此是斯民不得一日安也方今賦取日重科斂日煩罷弊之民不任官吏復有所規求於其間矣淳化中李順竊發於蜀州郡數十望風奔潰近者智髙亂廣南乘勝取九城如反掌國家設城池養士卒蓄器械儲米粟以為戰守備而凶豎一起若涉無人之境者吏不肖也今夫以一身任一方之責者莫若漕刑廣南川峽既為天下要區而其中之郡縣又有為廣南川峽之要區者其牧宰之賢否實一方所以安危幸而賢則巳其戕民黷貨的然有罪可誅者漕刑固亦得以舉劾若夫庸陋巽懦不才而無過者漕刑雖賢明其勢不得易置此猶弊車蹩馬而求僕夫之善御也郡縣有敗事不以責漕刑則不可責之則彼必曰敗事者某所治某所者某人也吾將何所歸罪故莫若使漕刑自舉其人而任之他日有敗事則謂之曰爾謂此人堪此職也今不堪此職是爾欺我也責有所在罪無所逃然而擇之不得其人者蓋寡矣其餘郡縣雖非一方之所以安危者亦當詔審官俾勿輕授贓吏冗流勿措其間則民雖在十里外無異於處畿甸中矣養才養竒傑之才而特挈出古者議能一節以感悟當世直是刺骨夫人之所為有可勉強者有不可勉強者煦煦然而為仁孑孑然而為義不食片言以為信不爭小利以為亷雖古之所謂仁與義信與亷者不止若是而天下之人亦不曰是非仁人是非義人是非信人是非亷人此則無諸巳而可勉強以到者也在朝廷而百官肅在邉鄙而四夷懼坐之於繁劇紛擾之中而不亂投之於羽檄奔走之地而不惑為吏而吏為將而將若是者豈非天之所與性之所有不可勉強而能也道與德可勉以進也才不可強揠以進也今有二人焉一人善揖讓一人善騎射則人未有不以揖讓賢於騎射矣然而揖讓者未必善騎射而騎射者捨其弓以揖讓於其間則未必失容何哉才難強而道易勉也吾觀世之用人好以可勉強之道與德而加之不可勉強之才之上而曰我貴賢賤能是以道與德未足以化人而才有遺焉然而為此者亦有由矣有才者而不能為衆人所勉強者耳何則竒傑之士常好自負疏俊傲誕不事繩撿往往冒法律觸刑禁呌號歡呼以發其一時之樂而不顧其禍嗜利酗酒使氣傲物志氣一發則倜然遠去不可羈束以禮法然及其一旦翻然而悟折節而不為此以留意於向所謂道與德可勉強者則何病不至奈何以朴􅈪小道加諸其上哉夫其不肯規規以事禮法而必自縱以為此者乃上之人之過也古之養竒傑也任之以權尊之以爵厚之以祿重之以恩責之以措置天下之務而易其平居自縱之心而聲色耳目之欲又已極於外故不待放恣而後為樂今則不然竒傑無尺寸之柄位一命之爵食斗升之祿者過半彼又安得不越法踰禮而自快耶我又安可急之以法使不得泰然自縱耶今我繩之以法亦巳急矣急之而後巳而隨之以刑彼有北走胡南走越耳噫無事之時既不能養及其不幸一旦有邉境之患繁亂難治之事而後優詔以召之豐爵重祿以結之則彼巳憾矣夫彼固非純忠者也又安肯默然於窮困無用之地而巳耶周公之時天下號為至治四夷巳臣服卿大夫士巳稱職當是時雖有竒傑無所復用而其禮法風俗尤復細密舉朝廷與四海之人無不遵蹈而其八議之中猶有曰議能者況當今天下未甚至治四夷未盡臣服卿大夫士未皆稱職禮法風俗又非細密如周之盛時而竒傑之士復有困於簿書米鹽間者則反可不議其能而恕之乎所宜哀其才而貰其過無使為刀筆吏所困則庶乎盡其才矣或曰竒傑之士有過得免則天下之人孰不自謂竒傑而欲免其過者是終亦潰法亂教耳曰是則然矣然而竒傑之所為必挺然出於衆人之上苟指其巳成之功以曉天下俾得以贖其過而其未有功者則委之以難治之事而責其成績則天下之人不敢自謂竒傑而真竒傑者出矣唐宋八大家文鈔卷一百十四
