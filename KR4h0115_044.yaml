body:
  text: 唐宋八大家文鈔巻四十一明茅坤撰廬陵文鈔十三論本論上歐公異日相畧亦概見於此矣當與王荆公萬言書㕘看天下之事有本末其為治者有先後堯舜之書略矣後世之治天下未嘗不取法於三代者以其推本末而知所先後也三王之為治也以理數均天下以爵地等邦國以井田域民以職事任官天下有定數邦國有定制民有定業官有定職使下之共上勤而不困上之治下簡而不勞財足於用而可以備天災也兵足以禦患而不至於為患也凡此具矣然後飾禮樂興仁義以教道之是以其政易行其民易使風俗淳厚而王道成矣雖有荒子孱孫繼之猶七八百嵗而後己夫三王之為治豈有異於人哉財必取於民官必養於禄禁暴必以兵防民必以刑與後世之治者大抵同也然後世常多亂敗而三王獨能安全者何也三王善推本末知所先後而為之有條理後之有天下者孰不欲安且治乎用心益勞而政益不就諰諰然常恐亂敗及之而輙以至焉者何也以其不推本末不知先後而於今之務衆矣所當先者五也其二者有司之所知其三者則未之思也足天下之用莫先乎財繫天下之安危莫先乎兵此有司之所知也然財豐矣取之無限而用之無度則下益屈而上益勞兵强矣而不知所以用之則兵驕而生禍所以節財用兵者莫先乎立制制己具備兵已可使財已足用所以共守之者莫先乎任人是故均財而節兵立法以制之任賢以守法尊名以厲賢此五者相為用有天下者之常務當今之世所先而執事者之所忽也今四海之内非有亂也上之政令非有暴也天時水旱非有大故也君臣上下非不和也以晏然至廣之天下無一間隙之端而南夷敢殺天子之命吏西夷敢有崛疆之王北夷敢有抗禮之帝者何也生齒之數日益衆土地之產日益廣公家之用日益急四夷不服中國不尊天下不實者何也以五者之不備故也請試言其一二方今農之趣耕可謂勞矣工商取利乎山澤可謂勤矣上之征賦𣙜易商利之臣可謂纖悉而無遺矣然一遇水旱如明道景祐之間則天下公私乏絶是無事之世民無一嵗之備而國無數年之儲也以此知財之不足也古之善用兵者可使之赴水火今廂禁之軍有司不敢役必不得已而暫用之則謂之借倩彼兵相謂曰官倩我而官之文符亦曰倩夫賞者所以酬勞也今以大禮之故不勞之賞三年而一徧所費八九百萬有司不敢緩月日之期兵之得賞不以無功知媿乃稱多量少比好嫌惡小不如意則羣聚而呼持梃欲擊天子之大吏無事之時其猶若此以此知兵驕也夫財用悉出而猶不足者以無定數也以兵之敢驕者以用之未得其術以此知制之不立也夫財匱兵驕法制未一而莫有奮然忘身許國者以此知不任人也不任人者非無人也彼或挾材藴知特以時方惡人之好名各藏畜收歛不敢奮露惟恐近於名以犯時人所惡是以人人變賢為愚愚者無所責賢者被議疾遂使天下之事將弛廢而莫敢出力以為之此不尚名之弊者天下之最大患也故曰五者之皆廢也前日五代之亂可謂極矣五十三年之間易五姓十三君而亡國被弑者八長者不過十餘嵗甚者三四嵗而亡夫五代之主豈皆愚者邪其心豈樂禍亂而不欲為久安之計乎顧其力有不能為者時也當是時也東有汾晉西有岐蜀北有强胡南有江淮閩廣吳越荆潭天下分為十三四四面環之以至狹之中國又有叛將强臣割而據之其君天下者類皆為國日淺威徳未洽强君武主力而為之僅以自守不幸孱子懦孫不過一再傳而復亂敗是以養兵如兒子之啖虎狼猶恐不為用尚何敢制以殘弊之民人贍無貲之征賦頭㑹箕歛猶恐不足尚何曰節財以富民天下之勢方苦弊廬補其奥則隅壊整其桷則棟傾枝撑扶持茍存而已尚何暇法象規圜矩方而為制度乎是以兵無制用無節國家無法度一切茍且而已今宋之為宋八十年矣外平僭亂無抗敵之國内削方鎮無强叛之臣天下為一海内晏然為國不為不久天下不為不廣也語曰長袖善舞多錢善賈言有資者其為易也方今承三聖之基業据萬乗之尊名以有四海一家之天下盡大禹貢賦之地莫不内輸惟上之所取不可謂乏財六尺之卒荷戈勝甲力彀五石之弩彎二石之弓者數百萬惟上制而令之不可謂乏兵中外之官居職者數千員官三班吏部常積者又數百三嵗一詔布衣而應詔者萬餘人試禮部者七八千惟上之擇不可謂乏賢民不見兵革於今幾四十年矣外振兵武捍邊圉内修法度輿徳化惟上之所為不可謂無暇以天子之慈聖仁儉得一二明智之臣相與而謀之天下積聚可如文景之富制禮作樂可如成周之盛奮發威烈以耀名譽可如漢武帝唐太宗之顯赫論道徳可興堯舜之治然而財不足用於上而下已弊兵不足威於外而敢驕於内制度不可為萬世法而日益叢雜一切茍且不異五代之時此甚可嘆也是所謂居得致之位當可致之時又有能致之資然誰憚而久不為乎本論中議論正大知見得大頭腦處佛法為中國患千餘嵗世之卓然不惑而有力者莫不欲去之已嘗去矣而復大集攻之暫破而愈堅撲之未滅而愈熾遂至於無可奈何是果不可去邪葢亦未知其方也夫醫者之於疾也必推其病之所自來而治其受病之處病之中人乗乎氣虛而入焉則善醫者不攻其疾而務養其氣氣實則病去此自然之効也故救天下之患者亦必推其患之所自來而治其受患之處佛為夷狄去中國最逺而有佛固已久矣堯舜三代之際王政修明禮義之教充於天下於此之時雖有佛無由而入及三代衰王政闕禮義廢後二百餘年而佛至乎中國由是言之佛所以為吾患者乗其闕廢之時而來此其受患之本也補其闕修其廢使王政明而禮義充則雖有佛無所施於吾民矣此亦自然之勢也昔堯舜三代之為政設為井田之法籍天下之人計其口而皆授之田凡人之力能勝耕者莫不有田而耕之歛以什一差其征賦以督其不勤使天下之人力皆盡於南畆而不暇乎其他然又懼其勞且怠而入於邪僻也於是為制牲牢酒醴以養其體弦匏俎豆以悦其耳目於其不耕休力之時而教之以禮故因其田獵而為蒐狩之禮因其嫁娶而為婚姻之禮因其死葬而為喪祭之禮因其飲食羣聚而為鄉射之禮非徒以防其亂又因而教之使知尊卑長幼凡人之大倫也故凡養生送死之道皆因其欲而為之制飾之物采而文焉所以悦之使其易趣也順其情性而節焉所以防之使其不過也然猶懼其未也又為立學以講明之故上自天子之郊下至鄉黨莫不有學擇民之聰明者而習焉使相告語而誘勸其愚惰嗚呼何其備也葢堯舜三代之為政如此其慮民之意甚精治民之具甚備防民之術甚周誘民之道甚篤行之以勤而彼於物者洽浸之以漸而入於人者深故民之生也不用力乎南畆則從事於禮樂之際不在其家則在乎庠序之間耳聞目見無非仁義樂而趣之不知其倦終身不見異物又奚暇夫外慕哉故曰雖有佛無由而入者謂有此具也及周之衰秦并天下盡去三代之法而王道中絶後之有天下者不能勉彊其為治之具不備防民之漸不周佛於此時乗間而出千有餘嵗之間佛之來者日益衆吾之所為者日益壊井田最先廢而兼并游惰之姦起其後所謂蒐狩婚姻喪祭鄉射之禮凡所以教民之具相次而盡廢然後民之姦者有暇而為他其良者冺然不見禮義之及己夫姦民有餘力則思為邪僻良民不見禮義則莫知所趣佛於此時乗其隙方鼓其雄誕之説而牽之則民不得不從而歸矣又况王公大人徃徃倡而敺之曰佛是真可歸依者然則吾民何疑而不歸焉幸而有一不惑者方艴然而怒曰佛何為者吾將操戈而逐之又曰吾將有説以排之夫千嵗之患徧於天下豈一人一日之可為民之沈酣入於骨髓非口舌之可勝然則將奈何曰莫若修其本以勝之昔戰國之時楊墨交亂孟子患之而專言仁義故仁義之説勝則楊墨之學廢漢之時百家並興董生患之而退修孔氏故孔氏之道明而百家息此所謂修其本以勝之之效也今八尺之夫被甲荷㦸勇葢三軍然而見佛則拜聞佛之説則有畏慕之誠者何也彼誠壯佼其中心茫然無所守而然也一介之士𦕈然柔懦進趨畏怯然而聞有道佛者則義形於色非徒不為之屈又欲驅而絶之者何也彼無他焉學問明而禮義熟中心有所守以勝之也然則禮義者勝佛之本也今一介之士知禮義者尚能不為之屈使天下皆知禮義則勝之矣此自然之勢也佛之所以能入為中國之赤幟者固由王道之衰而歐陽公所謂修其本以勝之是也然達磨以下彼固有一片直見本性之超卓處故能驅天下聰明穎悟之士而宗其教歐陽公於佛氏之㫖猶多糢糊而所謂修其本以勝之恐非區區禮文之習而行之之所能勝也聖人在上而斯道大明乎天下天下之士家喻而户曉於聖人之教然後佛之見解自息耳不然鮮不蹈程子之所謂淫聲美色也其何能以逺之乎本論下歐公本論較之韓子原道差勝一層昔荀卿子之説以為人性本惡著書一篇以持其論予始愛之及見世人之歸佛者然後知荀卿之説繆焉甚矣人之性善也彼為佛者棄其父子絶其夫婦於人之性甚戾又有蠶食蟲蠧之弊然而民皆相率而歸焉者以佛有為善之説故也嗚呼誠使吾民曉然知禮義之為善則安知不相率而從哉奈何教之諭之之不至也佛之説熟於人耳入乎其心久矣至於禮義之事則未嘗見聞今將號於衆曰禁汝之佛而為吾禮義則民將駭而走矣莫若為之以漸使其不知而趣焉可也葢鯀之治水也障之故其害益暴及禹之治水也導之則其患息葢患深勢盛則難與敵莫若馴致而去之易也今堯舜三代之政其説尚傳其具皆在誠能講而修之行之以勤而浸之以漸使民皆樂而趣焉則充行乎天下而佛無所施矣傳曰物莫能兩大自然之勢也奚必曰火其書而廬其居哉昔者戎狄蠻夷雜居九州之間所謂徐戎白狄荆蠻淮夷之類是也三代既衰若此之類並侵於中國故秦以西戎據宗周吳楚之國皆僭稱王春秋書用鄫子傳記被髪於伊川而仲尼亦以不左衽為幸當是之時佛雖不來中國幾何其不夷狄也以是而言王道不明而仁義廢則夷狄之患至矣及孔子作春秋尊中國而賤夷狄然後王道復明方今九州之民莫不右衽而冠帶其為患者特佛爾其所以勝之之道非有甚高難行之説也患乎忽而不為爾夫郊天祀地與乎宗廟社稷朝延之儀皆天子之大禮也今皆舉而行之至於所謂蒐狩婚姻喪祭鄉射之禮此郡縣有司之事也在乎講明而頒布之爾然非行之以勤浸之以漸則不能入於人而成化自古王者之政必世而後仁今之議者將曰佛來千餘嵗有力者尚無可奈何何用此迂緩之説為是則以一日之功不速就而棄必世之功不為也可不惜哉昔孔子歎為俑者不仁葢歎乎啓其漸而至於用殉也然則為佛者不猶甚於作俑乎當其始來未見其害引而内之今之為害著矣非待先覺之明而後見也然而恬然不以為怪者何哉夫物極則反數窮則變此理之常也今佛之盛久矣乗其窮極之時可以反而變之不難也昔三代之為政皆聖人之事業及其久也必有弊故三代之術皆變其質文而相救就使佛為聖人及其弊也猶將救之况其非聖者乎夫姦邪之士見信於人者彼雖小人必有所長以取信是以古之人君惑之至於亂亡而不悟今佛之法可謂姦且邪矣葢其為説亦有可以惑人者使世之君子雖見其弊而不思救豈又善惑者歟抑亦不得其救之之術也救之莫若修其本以勝之捨是而將有為雖賁育之勇孟軻之辯太公之隂謀吾見其力未及施言未及出計未及行而先已陷於禍敗矣何則患深勢盛難與敵非馴致而為之莫能也故曰修其本以勝之作本論原弊論中多切當時情弊亦今當事者所宜知孟子曰養生送死王道之本管子曰倉廪實而知禮節故農者天下之本也而王政所由起也古之為國者未嘗敢忽而今之為吏者不然簿書聽㫁而已矣聞有道農之事則相與笑之曰鄙夫知賦歛財用之為急不知務農為先者是未原為政之本末也知務農而不知節用以愛農是未盡務農之方也古之為政者上下相移用以濟下之用力者甚勤上之用物者有節民無遺力國不過費上愛其下下給其上使不相困三代之法皆如此而最備於周周之法曰井牧其田十而一之一夫之力督之必盡其所任一日之用節之必量其所入一嵗之耕供公與民食皆出其間而常有餘故三年而餘一年之備今乃不然耕者不復督其力用者不復計其出入一嵗之耕供公僅足而民食不過數月甚者場功甫畢簸糠麩而食秕禆或採橡實畜菜根以延冬春夫糠覈橡實孟子所謂狗彘之食也而卒嵗之民不免食之不幸一水旱則相枕為餓殍此甚可歎也夫三代之為國公卿士庶之禄廪兵甲車牛之材用山川宗廟鬼神之供給未嘗闕也是皆出於農而民之所耕不過今九州之地也嵗之凶荒亦時時而有與今無以異今固盡有嚮時之地而制度無過於三代者昔者用常有餘而今常不足何也其為術相反而然也昔者知務農又知節用今以不勤之農贍無節之用故也非徒不勤農又為衆弊以耗之非徒不量民力以為節又直不量天力之所任也何謂衆弊有誘民之弊有兼并之弊有力役之弊請詳言之今坐華屋享美食而無事者曰浮圖之民仰衣食而養妻子者曰兵戎之民此在三代時南畆之民也今之議者以浮圖並周孔之事曰三教不可以去兵戎曰國備不可以去浮圖不可並周孔不言而易知請試言之國家自景徳罷兵三十三嵗矣兵嘗經用者老死今盡而後來者未嘗聞金皷識戰陣也生於無事而飽於衣食也其勢不得不驕惰今衛兵入宿不自持被而使人持之禁兵給糧不自荷而雇人荷之其驕如此况肯冒辛苦以戰鬬乎前日西邊之吏如髙化軍齊宗舉兩用兵而輙敗此其効也夫就使兵耐辛苦而能鬬戰惟耗農民為之可也奈何有為兵之虛名而其實驕惰無用之人也古之凡民長大壯徤者皆在南畆農隙則教之以戰今乃大異一遇凶嵗則州郡吏以尺度量民之長大而試其壯徤者招之去為禁兵其次不及尺度而稍怯弱者籍之以為廂兵吏招人多者有賞而民方窮時爭投之故一經凶荒則所留在南畆者惟老弱也而吏方曰不收為兵則恐為盗噫茍知一時之不為盗而不知其終身驕惰而竊食也古之長大壯徤者任耕而老弱者游惰今之長大壯徤者游惰而老弱者留耕也何相反之甚邪然民盡力乎南畆者或不免乎狗彘之食而一去為僧兵則終身安佚而享豐腴則南畆之民不得不日減也故曰有誘民之弊者謂此也其耗之一端也古者計口而受田家給而人足井田既壊而兼并乃興今大率一戸之田及百頃者養客數十家其間用主牛而出己力者用己牛而事主田以分利者不過十餘戸其餘皆出產租而僑居者曰浮客而有畬田夫此數十家者素非富而畜積之家也其春秋神社婚姻死葬之具又不幸遇凶荒與公家之事當其乏時嘗舉債於主人而後償之息不兩倍則三倍及其成也出種與税而後分之償三倍之息盡其所得或不能足其場功朝畢而暮乏食則又舉之故冬春舉食則指麥於夏而償麥償盡矣夏秋則指禾於冬而償也似此數十家者常食三倍之物而一戸常盡取百頃之利也夫主百頃而出税賦者一戸盡力而輸一戸者數十家也就使國家有寛征薄賦之恩是徒益一家之幸而數十家者困苦常自如也故曰有兼并之弊者謂此也此亦耗之一端也民有幸而不役於人能有田而自耕者下自二頃至一頃皆以等書於籍而公役之多者為大役少者為小役至不勝則賤賣其田或逃而去故曰有力役之弊者謂此也此亦耗之一端也夫此三弊是其大端又有奇衺之民去為浮巧之工與夫兼并商賈之人為僭侈之費又有貪吏之誅求賦歛之無名其弊不可以盡舉也既不勸之使勤又為衆弊以耗之大抵天下中民之士富且貴者化麤糲為精鑿是一人常食五人之食也為兵者養父母妻子而計其饋運之費是一兵常食五農之食也為僧者養子弟而自豐食是一僧常食五農之食也貧民舉倍息而食者是一人常食二人三人之食也天下幾何其不乏也何謂不量民力以為節方今量國用而取之民未嘗量民力而制國用也古者冡宰制國用量入以為出一嵗之物三分之一以給公上一以給民食一以備凶荒今不先制乎國用而一切臨民而取之故有支移之賦有和糴之粟有入中之粟有和買之絹有雜料之物茶鹽山澤之利有𣙜有征制而不足則有司屢變其法以争毫末之利用心益勞而益不足者何也制不先定而取之無量也何謂不量天力之所任此不知水旱之謂也夫隂陽在天地間騰降而相推不能無愆伏如人身之有血氣不能無疾病也故善醫者不能使人無疾病療之而已善為政者不能使嵗無凶荒備之而已堯湯大聖不能使無水旱而能備之者也古者豐年補救之術三年耕必留一年之蓄是凡三嵗期一嵗以必災也此古之善知天者也今有司之調度用足一嵗而己是期天嵗嵗不水旱也故曰不量天力之所任是以前二三嵗連遭旱蝗而公私乏食是期天之無水旱卒而遇之無備故也夫井田什一之法不可復用於今為計者莫如就民而為之制要在下者盡力而無耗弊上者量民而用有節則民與國庶幾乎俱富矣今士大夫方共修太平之基頗推務本以興農故輙原其弊而列之以俟興利除害者採於有司也唐宋八大家文鈔巻四十一
