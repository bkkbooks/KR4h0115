body:
  text: 唐宋八大家文鈔卷六十八明茅坤撰廬陵史鈔八唐晉周臣傳豆盧革傳中多可觀處豆盧革父瓚唐舒州刺史豆盧為世名族唐末天下亂革避地之中山唐亡為王處直掌書記莊宗在魏議建唐國而故唐公卿之族遭亂喪亡且盡以革名家子召為行臺左丞相莊宗即帝位拜同中書門下平章事革雖唐名族而素不學問除拜官吏多失其序常為尚書郎蕭希甫駁正革頗患之莊宗已滅梁革乃薦韋説為相説唐末為殿中侍御史坐事貶南海後事梁為禮部侍郎革以説能知前朝故事故引以佐已而説亦無學術徒以流品自髙是時莊宗內畏劉皇后外惑宦官伶人郭崇韜雖盡忠於國而亦無學術革説俯仰默默無所為唯諾崇韜而己唐梁之際仕宦遭亂奔亡而吏部銓文書不完因緣以為姦利至有私鬻告勑亂易昭穆而季父母舅反拜姪甥者崇韜請論以法是時唐新滅梁朝廷紀網未立議者以為宜革以漸而崇韜嫉惡大甚果於必行説革心知其未可而不能有所建言是嵗冬選人吳延皓改亡叔告身行事事發延皓及選吏尹攻皆坐死尚書左丞判吏部銓崔沂等皆貶説革詣閣門待罪由是一以新法從事往往以偽濫駁放而斃踣羈旅號哭道路者不可勝數及崇韜死説乃教選人上書言其事而議者益以罪之是嵗大水四方地連震流民殍死者數萬人軍士妻子皆採稆以食莊宗日以責三司使孔謙謙不知所為樞密小吏段徊曰臣嘗見前朝故事國有大故則天子以朱書御札問宰相水旱宰相職也莊宗乃命學士草詔手自書之以問革説革説不能對第曰陛下威德著于四海今西兵破蜀所得珍寶億萬可以給軍水旱天之常道不足憂也革自為相遭天下多故而方服丹砂鍊氣以求長生嘗嘔血數日幾死二人各以其子為拾遺父子同省人以為非遽改他官而革以説子為𢎞文館學士説以革子為集賢院學士莊宗崩革為山陵使莊宗巳祔廟革以故事當出鎮乃還私第數日未得命而故人賓客趣使入朝樞密使安重誨詬之于朝曰山陵使名尚在不俟改命遽履新朝以我武人可欺邪諫官希旨上疏誣革縱田客殺人説坐與鄰人爭井遂俱罷革貶辰州刺史説溆州刺史所在馳驛發遣宰相鄭珏任圜三上章請毋行後命不報革復坐請俸私自入説賣官與選人責授革費州司户參軍説夷州司户參軍皆員外置同正員巳而竄革陵州説合州皆長流百姓初説嘗以罪竄之南海遇赦還寓江陵與髙季興相知及為相常以書幣相問遺唐兵伐蜀季興請以兵入三峽莊宗許之使季興自取夔忠萬歸峽等州為屬郡及破蜀季興無功而唐用他將取五州明宗初即位季興數請五州以為先帝所許朝廷不得已而與之及革説再貶因以其事歸罪二人天成二年夏詔陵合州刺史監賜自盡革子升説子濤皆官至尚書郎坐其父廢至晉天福初濤為尚書膳部員外郎卒任圜傳任圜京兆三原人也為人明敏善談辨見者愛其容止及聞其論議縱橫益皆悚動李嗣昭節度昭義辟圜觀察支使梁兵築夾城圍潞州踰年而晉王薨晉兵救潞者皆解去嗣昭危甚問圜去就之計圜勸嗣昭堅守以待不可有二心已而莊宗攻破梁夾城聞圜為嗣昭畫守計甚嘉之由是益知名其後嗣昭與莊宗有隙圜數奉使往來辨釋讒搆嗣昭卒免於禍圜之力也嗣昭從莊宗戰胡栁擊敗梁兵圜頗有功莊宗勞之曰儒士亦破體邪仁者之勇何其壯也張文禮弒王鎔莊宗遣嗣昭討之嗣昭戰殁圜代將其軍號令嚴肅既而文禮子處球等閉城堅守不可下圜數以禍福諭鎮人鎮人信之圜嘗擁兵至城下處球登城呼圜曰城中兵食俱盡而久抗王師若泥首自歸懼無以塞責幸公見哀指其生路圜告之曰以子先人固難容貸然罰不及嗣子可從輕其如拒守經年傷吾大將一朝困竭方布欵誠以此計之子亦難免然坐而待斃曷若伏而俟命處球流涕曰公言是也乃遣人送狀乞降人皆稱圜其言不欺既而他將攻破鎮州處球雖見殺而鎮之吏民以嘗乞降故得保其家族者甚衆其後以鎮州為北京拜圜工部尚書兼真定尹北京副留守知留守事為政有惠愛明年郭崇韜兼領成德軍節度使改圜行軍司馬仍知真定府事圜與崇韜素相善又為其司馬崇韜因以鎮州事託之而圜多所建異初圜推官張彭為人傾險貪黷圜不能察信任之多為其所賣及崇韜領鎮彭為圜謀隱其公廨錢後莊宗遣宦者選故趙王時宮人百餘人有許氏者尤有色彭賂守者匿之後事覺召彭詣京師將罪之彭懼悉以前所隱公錢簿書獻崇韜崇韜深德彭不殺由是與圜有隙同光三年圜罷司馬守工部尚書魏王繼岌暨崇韜伐蜀懼圜攻巳於後乃辟圜參魏王軍事蜀滅表圜黔南節度使圜懇辭不就繼岌殺崇韜以圜代將其軍而旋康延孝反繼岌遣圜將三千人會董璋孟知祥等兵擊敗延孝於漢州而魏王先至渭南自殺圜悉將其軍以東明宗嘉其功拜圜同中書門下平章事兼判三司是時明宗新誅孔謙圜選辟才俊抑絶僥幸公私給足天下便之是秋韋説豆盧革罷相圜與安重誨鄭珏孔循議擇當為相者圜意屬李琪而珏循雅不欲琪為相謂重誨曰李琪非無文藝但不廉耳宰相端方有器度者足以為之太常卿崔協可也重誨以為然他日明宗問誰可相者重誨即以協對圜前爭曰重誨未諳朝廷人物為人所賣天下皆知崔協不識文字而虛有儀表號為沒字碑臣以陛下誤加採擢無功幸進比不知書以臣一人取笑足矣相位有幾豈容更益笑端明宗曰宰相重位卿等更自詳審然吾在藩時識易州刺史韋肅世言肅名家子且待我甚厚置之此位可乎肅或未可則馮書記先朝判官稱為長者可以相矣馮書記者道也議未決重誨等退休於中興殿廊下孔循不揖拂衣而去行且罵曰天下事一則任圜二則任圜圜乃何人圜謂重誨曰李琪才藝可兼時輩百人而讒夫巧沮忌害其能若舍琪而相協如棄蘇合之丸而取蜣蜋之轉也重誨笑而止然重誨終以循言為信居月餘協與馮道皆拜相協在相位數年人多嗤其所為然圜與重誨交惡自協始故時使臣出四方皆自户部給劵重誨奏請自內出圜以故事爭之不能得遂與重誨辨於帝前圜聲色俱厲明宗罷朝後宮嬪御迎前問曰與重誨論事者誰明宗曰宰相也宮人奏曰妾在長安見宰相奏事未嘗如此蓋輕大家耳明宗由是不悅而使臣給劵卒自內出圜益憤沮重誨嘗過圜圜出妓善歌而有色重誨欲之圜不與由是二人益相惡而圜遽求罷職乃罷為太子少保圜不自安因請致仕退居于磁州朱守殷反于汴州重誨誣圜與守殷連謀遣人矯制殺之圜受命怡然聚族酣飲而死明宗知而不問為下詔坐圜與守殷通書而言涉怨望愍帝即位贈圜太傅張憲傳張憲字允中晉陽人也為人沈靜寡欲少好學能鼓琴飲酒莊宗素知其文辭以為天雄軍節度使掌書記莊宗即位拜工部侍郎租庸使遷刑部侍郎判吏部銓東都副留守憲精於吏事甚有能政莊宗幸東都定州王都來朝莊宗命憲治鞠場與都擊鞠初莊宗建號於東都以鞠場為即位壇於是憲言即位壇王者所以興也漢鄗南魏繁陽壇至今皆在不可毁乃别治宮西為鞠場場未成莊宗怒命兩虞候亟毁壇以為場憲退而歎曰此不祥之兆也初明宗北伐契丹取魏鎧仗以給軍有細鎧五百憲遂給之而不以聞莊宗至魏大怒責憲馳自取之左右諫之乃止又問憲庫錢幾何憲上庫簿有錢三萬緡莊宗益怒謂其嬖伶史彥瓊曰我與羣臣飲博須錢十餘萬而憲以故紙紿我我未渡河時庫錢常百萬緡今復何在彥瓊為憲解之乃巳郭崇韜伐蜀薦憲可任為相而宦官伶人不欲憲在朝廷樞密承旨段徊曰宰相在天子面前事有非是尚可改作一方之任苟非其人則為患不細憲材誠可用不如任以一方乃以為太原尹北京留守趙在禮作亂憲家在魏州在禮善待其家遣人以書招憲憲斬其使不發其書而上之莊宗遇弒明宗入京師太原猶未知而永王存霸奔于太原左右告憲曰今魏兵南嚮主上存亡未可知存霸之來無詔書而所乘馬斷其鞦豈非戰敗者乎宜拘之以俟命憲曰吾本書生無尺寸之功而人主遇我甚厚豈宜懷二心以幸變第可與之俱死爾憲宗事張昭逺教憲奉表明宗以勸進憲涕泣拒之巳而存霸削髮見北京巡檢符彥超願為僧以求生彥超麾下兵大譟殺存霸憲出奔欣州亦見殺嗚呼豫於死節之士得三人而失三人焉鞏廷美楊溫之死豫既已哀之至於張憲之事尤為之痛惜也豫於舊史考憲事實而永王存霸符彥超與憲傳所書始末皆不同莫得而考正蓋方其變故倉卒之時傳者失之耳然要其大節亦可以見也憲之志誠可謂忠矣當其不顧其家絶在禮而斬其使涕泣以拒昭逺之説其志甚明至其欲與存霸俱死及存霸被殺反棄太原而出奔然猶不知其心果欲何為也而舊史書憲坐棄城而賜死豫亦以為不然豫之於憲固欲成其美志而要在憲失其官守而其死不明故不得列干死節也晉臣桑維翰傳桑維翰字國僑河南人也為人醜怪身短而面長常臨鑑以自竒曰七尺之身不如一尺之面慨然有志於公輔初舉進士主司惡其姓以為桑喪同音人有勸其不必舉進士可以從他求仕者維翰慨然乃著日出扶桑賦以見志又鑄鐵硯以示人曰硯弊則改而他士卒以進士及第晉髙祖辟為河陽節度掌書記其後常以自從髙祖自太原徙天平不受命而有異謀以問將佐將佐皆恐懼不敢言獨維翰與劉知逺贊成之因使維翰為書求援於契丹耶律德光已許諾而趙德鈞亦以重賂啖德光求助己以篡唐髙祖懼事不果乃遣維翰往見德光為陳利害甚辨德光意乃決卒以滅唐而興晉維翰之力也髙祖即位以維翰為翰林學士禮部侍郎知樞密院事遷中書侍郎同中書門下平章事兼樞密使天福四年出為相州節度使嵗餘徙鎮泰寧吐渾白承福為契丹所迫附鎮州安重榮以歸晉重榮因請與契丹絶好用吐渾以攻之髙祖重違重榮意未決維翰上疏言契丹未可與爭者七髙祖召維翰使者至卧內謂曰北面之事方撓吾胸中得卿此疏決巳決矣可無憂也維翰又勸髙祖幸鄴都七年髙祖在鄴維翰來朝徙鎮晉昌出帝即位召拜侍中而景延廣用事與契丹絶盟維翰言不能入乃隂使人説帝曰制契丹而安天下非用維翰不可乃出延廣於河南拜維翰中書令復為樞密使封魏國公事無巨細一以委之數月之間百度寖理初李瀚為翰林學士好飲而多酒過髙祖以為浮薄天福五年九月詔廢翰林學士按唐六典歸其職於中書舍人而端明殿樞密院學士皆廢及維翰為樞密使復奏置學士而悉用親舊為之維翰權勢既盛四方賂遺嵗積巨萬內客省使李彥韜端明殿學士馮玉用事共讒之帝欲驟黜維翰大臣劉昫李嵩皆以為不可卒以王為樞密使既而以為相維翰日益見疏帝飲酒過度得疾維翰遣人隂白太后請為皇弟重睿置師傅帝疾愈知之怒乃罷維翰以為開封尹維翰遂稱足疾稀復朝見契丹屯中渡破欒城杜重威等大軍隔絶維翰曰事急矣乃見馮玉等計事而謀不合又求見帝帝方調鷹於苑中不暇見維翰退而嘆曰晉不血食矣自契丹與晉盟始成於維翰而終敗於景延廣故自兵興契丹凡所書檄未嘗不以此兩人為言耶律德光犯京師遣張彥澤遺太后書問此兩人在否可使先來而帝以維翰嘗議毋絶盟而巳違之也不欲使維翰見德光因諷彥澤圖之而彥澤亦利其資産維翰狀貌既異素以威嚴自持晉之老將大臣見者無不屈服彥澤以驍悍自矜每往候之雖冬月未嘗不流汗初彥澤入京師左右勸維翰避禍維翰曰吾為大臣國家至此安所逃死邪安坐府中不動彥澤以兵入府問維翰何在維翰厲聲曰吾晉大臣自當死國安得無禮耶彥澤股栗不敢仰視退而謂人曰吾不知桑維翰何如人今日見之猶使人恐懼如此其可再見乎乃以帝命召維翰維翰行遇李嵩立馬而語軍吏前白維翰請赴侍衛司獄維翰知不免顧嵩曰相公當國使維翰獨死嵩慙不能對是夜彥澤使人縊殺之以帛加頸告德光曰維翰自縊德光曰我本無心殺維翰維翰何必自致德光至京師使人驗其尸信為縊死乃以尸賜其家而資財悉為彥澤所掠出帝既牽於左右熒惑之言不能從維翰母絶盟於契丹者之議矣及契丹遺書召見維翰不過欲維翰以初議完故約耳於是時而能傾心維翰未必不可轉危為安也顧令張彥澤圖之其事頗與袁紹令殺田豐事相類悲夫然晉之藉契丹以篡唐維翰之力為多亦傳所謂以悖入者以悖出也晉之亟亡而維翰之及於難亦天道然爾晉臣景延廣傳景延廣字航川陜州人也父建善射嘗教延廣曰射不入鐵不如不發由是延廣以挽強見稱事梁邵王友誨友誨謀反被幽延廣亡去後從王彥章戰中都彥章敗延廣身被數創僅以身免明宗時朱守殷以汴州反晉髙祖為六軍副使主誅從守殷反者延廣為汴州軍校當誅髙祖惜其才隂縱之使亡後録以為客將髙祖即位以為侍衛步軍都指揮使領果州團練使徙領寧江軍節度使天福四年出鎮義成又徙保義復召為侍衛馬步軍都虞候徙領河陽三城遷馬步軍都指揮使領天平髙祖崩出帝立延廣有力頗伐其功初出帝立晉大臣議告契丹致表稱臣延廣獨不肯但致書稱孫而已大臣皆知其不可而不能奪契丹果怒數以責晉延廣謂契丹使者喬瑩曰先皇帝比朝所立今天子中國自册可以為孫而不可為臣且晉有橫磨大劍十萬口翁要戰則來他日不禁孫子取笑天下瑩知其言必起兩國之爭懼後無以取信也因請載于紙以備遺忘延廣勑吏具載以授瑩瑩藏其書衣領中以歸具以延廣語告契丹契丹益怒天福八年秋出帝幸大年莊還置酒延廣第延廣所進器服鞍馬茶牀椅榻皆裹金銀飾以龍鳯又進帛五千匹綿一千四百兩馬二十二匹玉鞍衣襲犀玉金帶等請賜從官自皇弟重睿下至伴食刺史重睿從者各有差帝亦賜延廣及其母妻從事押衙孔目官等稱是時天下旱蝗民餓死者嵗十數萬而君臣窮極奢侈以相誇尚如此明年春契丹入寇延廣從出帝北征為御營使相距澶魏之間先鋒石公霸遇敵於戚城髙行周符彥卿兵少不能救馳騎促延廣益兵延廣按兵不動三將被圍數重帝自御軍救之三將得出皆泣訴然延廣方握親兵恃功恣橫諸將皆由其節度帝亦不能制也契丹常呼晉人曰景延廣喚我來何不速戰是時諸將皆力戰而延廣未嘗見敵契丹巳去延廣獨閉壁不敢出自延廣一言而契丹與晉交惡凡號令征伐一出延廣晉大臣皆不得與故契丹凡所書檄未嘗不以延廣為言契丹去出帝還京師乃出延廣為河南尹留守西京明年出帝幸澶淵以延廣從皆無功延廣居洛陽鬱鬱不得志見晉日削度必不能支契丹乃為長夜之飲大治第宅園池妓樂惟意所為後帝亦追悔遣供奉官張暉奉表稱臣以求和德光報曰使桑維翰景延廣來而割鎮定與我乃可和晉知其不可乃止契丹至中渡延廣屯河陽聞杜重威降乃還德光犯京師行至相州遣騎兵數千雜晉軍渡河趨洛以取延廣戒曰延廣南奔吳西走蜀必追而取之而延廣顧慮其家未能引決虜騎奄至乃與從事閻丕馳騎見德光於封丘并丕見鎖延廣曰丕臣從事也以職相隨何罪而見鎖丕乃得釋德光責延廣曰南北失歡皆因爾也召喬瑩質其前言延廣初不服瑩從衣領中出所藏書延廣乃服因以十事責延廣每服一事授一牙籌授至八籌延廣以面伏地不能仰視遂叱而鎖之將送之北行至陳橋止民家夜分延廣伺守者怠引手扼吭而死時年五十六漢髙祖時贈侍中嗚呼自古禍福成敗之理未有如晉氏之明驗也其始以契丹而興終為契丹所滅然方其以逆抗順大事未集孤城被圍外無救援而徒將一介之命持片舌之強能使契丹空國興師應若符契出危解難遂成晉氏當是之時維翰之力為多及少主新立釁結兵連敗約起爭發自延廣然則晉氏之事維翰成之延廣壞之二人之用心者異而其受禍也同其故何哉蓋夫本末不順而與外蕃共事者常見其禍未見其福也可不戒哉可不戒哉周臣王朴傳王朴字文伯東平人也少舉進士為校書郎依漢樞密使楊邠邠與王章史宏肇等有隙朴見漢興日淺隱帝年少孱弱任用小人而邠為大臣與將相交惡知其必亂乃去邠東歸後李業等教隱帝誅權臣邠與章宏肇皆見殺三家之客多及而朴以故獨免周世宗鎮澶州朴為節度掌書記世宗為開封尹拜朴右拾遺為推官世宗即位遷比部郎中獻平邉䇿曰唐失道而失吳蜀晉失道而失幽并觀所以失之由知所以平之術當失之時君暗政亂兵驕民困近者姦於內逺者叛於外小不制而至于僣大不制而至于濫天下離心人不用命吳蜀乘其亂而竊其號幽并乘其間而據其地平之之術在乎反唐晉之失而巳必先進賢退不肖以清其時用能去不能以審其材恩信號令以結其心賞功罰罪以盡其力恭儉節用以豐其財徭役以時以阜其民俟其倉廩實器用備人可用而舉之彼方之民知我政化大行上下同心力強財足人安將和有必取之勢則知彼情狀者願為之間諜知彼山川者願為之先導彼民與此民之心同是與天意同與天意同則無不成之功攻取之道從易者始當今惟吳易圖東至海南至江可撓之地二千里從少備處先撓之備東則撓西備西則撓東彼必奔走以救其弊奔走之間可以知彼之虛實衆之強弱攻虛擊弱則所向無前矣勿大舉但以輕兵撓之彼人怯弱知我師入其地必大發以來應數大發則民困而國竭一不大發則我獲其利彼竭我利則江北諸州乃國家之所有也既得江北則用彼之民揚我之兵江之南亦不難平之也如此則用力少而收功多得吳則桂廣皆為內臣岷蜀可飛書而召之如不至則四面並進席卷而蜀平矣吳蜀平幽可望風而至唯廾必死之寇不可以恩信誘必須以強兵攻力巳竭氣巳喪不足以為邉患可為後圖方今兵力精練器用具備羣下知法諸將用命一稔之後可以平邉臣書生也不足以講大事至于不達大體不合機變惟陛下寬之遷左諫議大夫知開封府事嵗中遷左散騎常侍充端明殿學士是時世宗新即位鋭意征伐已撓羣議親敗劉旻於髙平歸而益治兵慨然有平一天下之志數顧大臣問治道選文學之士徐台符等二十人使作為君難為臣不易論及平邉䇿不在選中而當時文王皆不欲上急於用武以謂平定僣亂在修文德以為先惟翰林學士陶穀竇儀御史中丞楊昭儉與朴皆言用兵之䇿朴謂江淮為可先取世宗雅已知朴及見其議論偉然益以為竒引興計議天下事無不合遂決意用之顯德三年征淮以朴為東京副留守還拜户部侍郎樞密副使遷樞密使四年再征淮以朴留守京師世宗之時外事征伐而內修法度朴為人明敏多材智非獨當世之務至於隂陽律厯之法莫不通焉顯德二年詔朴校定大厯乃削去近世符天流俗不經之學設通經統三法以嵗軌離交朔望周變率䇿之數步日月五星為欽天厯六年又詔朴考正雅樂朴以謂十二律管互吹難得其真乃依京房為律準以九尺之絃十三依管長短寸分設柱用七聲為均樂成而和朴性剛果又見信於世宗凡其所為當時無敢難者然人亦莫能加也世宗征淮朴留京師廣新城通道路壯偉宏闊今京師之制多其所規為其所作樂至今用之不可變其陳用兵之略非特一時之䇿至言諸國興滅次第云淮南可最先取并必死之寇最後亡其後宋興平定四方惟并獨後服皆如朴言六年春世宗遣朴行視汴口作斗門還過故相李穀第疾作仆于坐上舁歸而卒年五十四世宗臨其喪以玉鉞叩地大慟者數四贈侍中嗚呼作器者無良材而有良匠治國者無能臣而有能君蓋材待匠而成臣待君而用故曰治國譬之於奕知其用而置得其處者勝不知其用而置非其處者敗敗者臨棊注目終日而勞心使善奕者視焉為之易置其處則勝矣勝者所用敗者之棊也興國所用亡國之臣也王朴之才誠可謂能矣不遇世宗何所施哉世宗之時外事征伐攻取戰勝內修制度議刑法定律厯講求禮樂之遺文所用者五代之士也豈皆愚怯於晉漢而材智於周哉惟知所用爾夫亂國之君常置愚不肖於上而強其不能以暴其短惡置賢智於下而泯沒其材能使君子小人皆失其所而身蹈危亡治國之君能置賢智於近而置愚不肖於逺使君子小人各適其分而身享安榮治亂相去雖逺甚而其所以致之者不多也反其所置而巳嗚呼自古治君少而亂君多况於五代士之遇不遇者可勝歎哉唐宋八大家文鈔卷六十八
