body:
  text: 唐宋八大家文鈔卷八十七明茅坤撰臨川文鈔七記虔州學記荆公文往往好為深逺之思遒婉之調然亦思或入於渺而調或入於詭須細詳得之䖍於江南地最曠大山長谷荒翳險阻交廣閩越銅鹽之販道所出入椎埋盜奪鼓鑄之姦視天下為多慶厯中嘗詔立學州縣䖍亦應詔而卑陋褊迫不足為美觀州人欲合私財遷而大之久矣然吏常力屈於聽獄而不暇顧此凡二十一年而後改築於州所治之東南以從州人之願蓋經始於治平元年二月提㸃刑獄宋城蔡侯行州事之時而考之以十月者知州事錢塘元侯也二侯皆天下所謂才吏故其就此不勞而齊祠講說候望宿息以至庖湢莫不有所又斥餘財市田及書以待學者內外完善矣於是州人相與樂二侯之適巳而來請文以記其成余聞之先王所謂道德者性命之理而巳其度數在乎爼豆鐘鼓管絃之間而常患乎難知故為之官師為之學以聚天下之士期命辨說誦歌絃舞使之深知其意夫士牧民者也牧知地之所在則彼不知者驅之爾然士學而不知知而不行行而不至則奈何先王於是乎有政矣夫政非為勸沮而巳也然亦所以為勸沮故舉其學之成者以為卿大夫其次雖未成而不害其能至者以為士此舜所謂庸之者也若夫道隆而德駿者又不止此雖天子北面而問焉而與之迭為賓主此舜所謂承之者也蔽陷畔逃不可與有言則撻之以誨其過書之以識其惡待之以嵗月之久而終不化則放棄殺戮之刑隨其後此舜所謂威之者也蓋其教法德則異之以智仁聖義忠和行則同之以孝友睦姻任恤藝則盡之以禮樂射御書數淫言詖行詭怪之術不足以輔世則無所容乎其時而諸侯之所以教一皆聽於天子天子命之矣然後興學命之厯數所以時其遲速命之權量所以節其豐殺命不在是則上之人不以教而為學者不道也士之奔走揖讓酬酢笑語升降出入乎此則無非教者高可以至於命其下亦不失為人用其流及乎既衰矣尚可以鼓舞羣衆使有以異於後世之人故當是時婦人之所能言童子之所可知有後世老師宿儒之所惑而不悟者也武夫之所道鄙人之所守有後世豪傑名士之所憚而愧之者也堯舜三代從容無為同四海於一堂之上而流風餘俗詠歎之不息凡以此也周道微不幸而有秦君臣莫知屈巳以學而樂於自用其所建立悖矣而惡夫非之者乃燒詩書殺學士掃除天下之庠序然後非之者愈多而終於不勝何哉先王之道德出於性命之理而性命之理出於人心詩書能循而達之非能奪其所有而豫之以其所無也經雖亡出於人心者猶在則亦安能使人舍巳之昭昭而從我於聾昏哉然是心非特秦也當孔子時既有欲毁鄉校者矣蓋上失其政人自為義不務出至善以勝之而患乎有為之難則是心非特秦也墨子區區不知失者在此而發尚同之論彼其為愚亦獨何異於秦嗚呼道之不一久矣揚子曰如將復駕其所說莫若使諸儒金口而木舌蓋有意乎辟雍學校之事善乎其言雖孔子出必從之矣今天子以盛德新即位庶幾能及此乎今之守吏實古之諸侯其異於古者不在乎施設之不專而在乎所受於朝廷未有先王之法度不在乎無所於教而在乎所以教未有以成士大夫仁義之材䖍雖地曠以逺得所以教則雖悍昏嚚凶扺禁觸法而不悔者亦將有以聰明其耳目而善其心又况乎學問之民故余為書二侯之績因道古今之變及所望乎上者使歸而刻石焉繁昌縣學記論學處亦最確奠先師先聖於學而無廟古也近世之法廟事孔子而無學古者自京師至於鄉邑皆有學屬其民人相與學道藝其中而不可使不知其學之所自於是乎有釋菜奠幣之禮所以著其不忘然則事先師先聖者以有學也今也無有學而徒廟事孔子吾不知其說也而或者以謂孔子百世師通天下州邑為之廟此其所以報且尊榮之夫聖人與天地同其德天地之大萬物無可稱德故其祀質而巳無文也通州邑廟事之而可以稱聖人之德乎則古之事先聖何為而不然也宋因近世之法而無能改至今天子始詔天下有州者皆得立學奠孔子其中如古之為而縣之學士滿二百人者亦得為之而繁昌小邑也其士少不能中律舊雖有孔子廟而庳下不完又其門人之像惟顔子一人而已今夏君希道太初至則修而作之具為子夏子路十人像而治其兩廡為生師之居以待縣之學者以書屬其故人臨川王某使記其成之始夫離上之法而苟欲為古之所為者無法流於今俗而思古者不聞教之所以本又義之所去也太初是無變今之法而不失古之實其不可以無傳也慈溪縣學記豫覽學記曾王二公為最非深於學不能記其學如此天下不可一日而無政教故學不可一日而亡於天下古者井天下之田而黨庠遂序國學之法立乎其中鄉射飲酒春秋合樂養老勞農尊賢使能考藝選言之政至於受成獻馘訊囚之事無不出於學於此養天下智仁聖義忠和之士以至一偏一伎一曲之學無所不養而又取士大夫之材行完潔而其施設已嘗試於位而去者以為之師釋奠釋菜以教不忘其學之所自遷徙逼逐以勉其怠而除其惡則士朝夕所見所聞無非所以治天下國家之道其服習必於仁義而所學必皆盡其材一日取以備公卿大夫百執事之選則其材行皆巳素定而士之備選者其施設亦皆素所見聞而巳不待閲習而後能者也古之在上者事不慮而盡功不為而足其要如此而巳此二帝三王所以治天下國家而立學之本意也後世無井田之法而學亦或存或廢大扺所以治天下國家者不復皆出於學而學之士羣居族處為師弟子之位者講章句課文字而巳至其陵夷之久則四方之學者廢而為廟以祀孔子於天下斫木摶土如浮屠道士法為王者象州縣吏春秋帥其屬釋奠於其堂而學士者或不預焉蓋廟之作出於學廢而近世之法然也今天子即位若干年頗修法度而革近世之不然者當此之時學稍稍立於天下矣猶曰州之士滿二百人乃得立學於是慈溪之士不得有學而為孔子廟如故廟又壞不治今劉君在中言於州使民出錢將修而作之未及為而去時慶厯某年也後林君肇至則曰古之所以為學者吾不得而見而法者吾不可以毋循也雖然吾之人民於此不可以無教即因民錢作孔子廟如今之所云而治其四旁為學舍講堂其中帥縣之子弟起先生杜君醇為之師而興於學噫林君其有道者耶夫吏者無變今之法而不失古之實此有道者之所能也林君之為其幾於此矣林君固賢令而慈溪小邑無珍産淫貨以來四方遊販之民田桑之美有以自足無水旱之憂也無遊販之民故其俗一而不雜有以自足故人慎刑而易治而吾所見其邑之士亦多美茂之材易成也杜君者越之隱君子其學行宜為人師者也夫以小邑得賢令又得宜為人師者為之師而以修醇一易治之俗而進美茂易成之材雖拘於法限於勢不得盡如古之所為吾固信其教化之將行而風俗之成也夫教化可以美風俗雖然必久而後至於善而今之吏其勢不能以久也吾雖喜且幸其將行而又憂夫來者之不吾繼也於是本其意以告來者度支副使㕔壁題名記何等識見何等筆力三司副使不書前人名姓嘉祐五年尚書户部員外郎吕君沖之始稽之衆史而自李絃巳上至查道得其名自楊偕巳上得其官自郭勸已下又得其在事之嵗時於是書石而鑱之東壁夫合天下之衆者財理天下之財者法守天下之法者吏也吏不良則有法而莫守法不善則有財而莫理有財而莫理則阡陌閭巷之賤人皆能私取豫之勢擅萬物之利以與人主爭黔首而放其無窮之欲非必貴强桀大而後能如是而天子猶為不失其民者蓋特號而已耳雖欲食蔬衣敝憔悴其身愁思其心以幸天下之給足而安吾政吾知其猶不得也然則善吾法而擇吏以守之以理天下之財雖上古堯舜猶不能毋以此為先急而况於後世之紛紛乎三司副使方今之大吏朝廷所以尊寵之甚備蓋今理財之法有不善者其勢皆得以議於上而改為之非特當守成法吝出入以從有司之事而巳其職事如此則其人之賢不肖利害施於天下如何也觀其人以其在事之嵗時以求其政事之見於今者而考其所以佐上理財之方則其人之賢不肖與世之治否吾可以坐而得矣此蓋呂君之志也撫州通判㕔見山閣記托通判與客相對之言而又托之書以為一篇文案通判撫州太常博士施侯為閣於其舍之西偏既成與客升以飲而為之名曰見山且言曰吾人脫於兵火洗沐仁聖之膏澤以休其父子者餘百年於今天子恭儉陂池苑囿臺榭之觀有堙毁而無改作其不欲有所騷動而思稱祖宗所以憫仁元元之意殊甚故人得私其智力以逐於利而窮其欲自雖蠻夷湖海山谷之聚大農富工豪賈之家往往能廣其宫室髙其樓觀以與通邑大都之有力者爭無窮之侈夫民之富溢矣吏獨不當因其有餘力有以自娛樂稱上施耶又况撫之為州山耕而水蒔牧牛馬用虎豹為地千里而民之男女以萬數者五六十地大人衆如此而通判與之為之父母則其人奚可不賢雖賢豈能無勞於為治獨無觀遊食饗之地以休其暇日殆非先王使小人以力養君子之意吾所以樂為之就此而忘勞者非以為吾之不肖能長有此顧不如是不足以待後之賢者爾且夫人之慕於賢者為其所樂與天下之志同而不失然後能有餘以與民而使皆得其所願而世之說者曰召公為政於周方春舍於蔽芾之棠聽男女之訟焉而不敢自休息於宫恐民之從我者勤而害其田作之時蓋其隱約窮苦而以自媚於民如此故其民愛思而詠歌之至於不忍伐其所舍之棠今甘棠之詩是也嗟乎此殆非召公之實事詩人之本指特墨子之餘言贅行吝細褊迫者之所好而吾之所不能為於是酒酣客皆歡相與從容譽施侯所為而稱其言之善又美大其閣而嘉其所以名之者曰閣之上流目而環之則邑屋草木川原阪隰之無蔽障者皆見施侯獨有見於山而以為之名何也豈以山之在吾左右前後若蟠若踞若伏若騖為獨能適吾目之所觀邪其亦吾心有得於是而樂之也施侯以客為知言而以書抵豫曰吾所以為閣而名之者如此子其為我記之數辭不得止則又因吾叔父之命以取焉遂為之記以示後之賢者使知夫施侯之所以為閣而名之者其言如此桂州新城記荆公學本經術故其記文多以經術為案儂智髙反南方出入十有二州十有二州之守吏或死或不死而無一人能守其州者豈其材皆不足歟蓋夫城郭之不設甲兵之不戒雖有智勇猶不能以勝一日之變也唯天子亦以為任其罪者不獨守吏故特推恩褒廣死節而一切貸其失職於是遂推選士大夫所論以為能者付之經略而今尚書户部侍郎余公靖當廣西焉冦平之明年蠻越接和乃大城桂州其方六里其木甓瓦石之材以枚數之至四百萬有竒用人之力以工數之至一十餘萬凡所以守之具無一求而有不給者焉以至和元年八月始作而以二年之六月成夫其為役亦大矣蓋公之信於民也久而費之欲以衛其材勞之欲以休其力以故為是有大費與大勞而人莫或以為勤也古者君臣父子夫婦兄弟朋友之禮失則夷狄橫而窺中國方是時中國非無城郭也卒於陵夷毁頓陷滅而不救然則城郭者先王有之而非所以恃而為存也及至喟然覺悟興起舊政則城郭之修也又嘗不敢以為後蓋有其患而圖之無其具有其具而守之非其人有其人而治之無其法能以久存而無敗者皆未之聞也故文王之興也有四夷之難則城于朔方而以南仲宣王之起也有諸侯之患則城于東方而以仲山甫此二臣之德協於其君於為國之本末與其所先後可謂知之矣慮之以悄悄之勞而發赫赫之名承之以翼翼之勤而續明明之功卒所以攘戎狄而中國以全安者蓋其君臣如此而守衛之有其具也今余公亦以文武之材當明天子承平日久欲補弊立廢之時鎮撫一方修扞其民其勤於今與周之有南仲仲山甫蓋等矣是宜有紀也故其將吏相與謀而來取文將刻之城隅而以告後之人焉至和二年九月丙辰羣牧判官太常博士王某記荆川曰但為築城作記而歸之根本上說此是大議論信州興造記思周匝而亦巉畫晉陵張公治信之明年皇祐二年也姦彊帖柔隱詘發舒既政大行得以寧息夏六月乙亥大水公徙囚於髙獄命百隸戒不共有常誅夜漏半水破城滅府寺苞民廬居公趨譙門坐其下敇吏士以桴收民鰥孤老癃與所徙之囚咸得不死丙子水降公從賓佐按行隱度符縣調富民水之所不至者夫錢户七百八十六收佛寺之積材一千一百三十有二不足則前此公所命富民出粟以賙貧民者二十三人自言曰食新矣賙可以巳願輸粟直以佐材費七月甲午募人城水之所入垣羣府之缺考監軍之室立司理之獄營州之西北亢爽之墟以宅屯駐之師除其故營以時教士刺伐坐作之法故所無也作驛曰饒陽作宅曰回車築二亭於南門之外左曰仁右曰智山水之所附也梁四十有二舟於兩亭之間以通車徒之道築一亭於州門之左曰宴月吉所以屬賔也凡為梁一為城垣九千尺為屋八以楹數之得五百五十二自七月九日卒九月七日為日五十八為夫一萬一千四百二十五中家以下見城郭室屋之完而不知材之所出見徒之合散而不見役使之及巳凡故之所有必具其所無也乃今有之故其經費卒不出縣官之給公所以救災補敗之政如此其賢於世吏逺矣今州縣之災相屬民未病災也且有治災之政出焉弛舍之不適裒取之不中元姦宿豪舞手以乘民而民始病病極矣吏乃始謷然自喜民相與誹且笑之而不知也吏而不知為政其重困民多如此此豫所以哀民而閔吏之不學也由是而言則為公之民不幸而遇害災其亦庶乎無憾矣十月二十日臨川王某記餘姚縣海塘記以謝景初所自言為領袖自雲柯而南至於某有隄若千尺截然令海水之潮汐不得冒其旁田者知縣事謝君為之也始隄之成謝君以書屬豫記其成之始曰使來者有考焉得卒任完之以不隳謝君者陽夏人也字師厚景初其名也其先以文學稱天下而連世為貴人至君遂以文學世其家其為縣不以材自負而忽其民之急方作隄時嵗丁亥十一月也能親以身當風霜氛霧之毒以勉民作而除其菑又能令其民翕然皆勸趨之而忘其役之勞遂不踰時以有成功其仁民之心效見於事如此亦可以已而猶自以為未也又思有以告後之人令嗣續而完之以永其存善夫仁人長慮却顧圖民之災如此其至其不可以無傳而後之君子考其傳得其所以為其亦不可以無思而異時豫嘗以事至餘姚而君過豫與豫從容言天下之事君曰道以閎大隱密聖人之所獨鼓萬物以然而皆莫知其所以然者蓋有所難知也其治政教令施為之詳凡與人共而尤丁寧以急者其易知較然者也通塗川治田桑為之隄防溝澮渠川以禦水旱之災而興學校屬其民人相與習禮樂其中以化服之此其尤丁寧以急而較然易知者也今世吏者其愚也固不知所為而其所謂能者務出竒為聲威以驚世震俗至或盡其力以事刀筆簿書之間而已而反以謂古所為尤丁寧以急者吾不暇以為吾曾為之而曾不足以為之萬有一人為之且不足以名於世而見謂材嘻其可歎也夫為天下國家且百年而勝殘去殺之效則猶未也其不出於當時豫良以其言為然既而聞君之為其縣至則為橋於江治學者以教養縣人之子弟既而又有隄之役於是又信其言之行而不豫欺也已為之書其隄事因并書其言終始而存之以告後之人慶厯八年七月日記通州海門興利記荆公之文本經術處多余讀豳詩以其婦子饁彼南畝田畯至喜嗟乎豳之人帥其家人戮力以聽吏吏推其意以相民何其至也夫喜者非自外至乃其中心固有以然也既嘆其吏之能民又思其君之所以待吏則亦欲善之心出於至誠而已蓋不獨法度有以驅之也以賞罰用天下而先王之俗廢有士於此能以豳之吏自為而不茍於其民豈非所謂有志者邪以余所聞吳興沈君興宗海門之政可謂有志矣既隄北海七十里以除水患遂大浚渠川釃取江南以灌義寧等數鄉之田方是時民之墊於海呻吟者相屬君至則寬禁緩求以集流亡少焉誘起之以就功莫不蹶蹶然奮其憊而來也由是觀之茍誠愛民而有以利之雖創殘窮敝之餘可勉而用也況於力足者乎興宗好學知方竟其學又將有大者焉此何足以盡吾沈君之才抑可以觀其志矣而論者或以一邑之善不足書之今天下之邑多矣其能有以遺其民而不愧於豳之吏者果多乎不多則豫不欲使其無傳也至和元年六月六日臨川王某記唐宋八大家文鈔卷八十七
