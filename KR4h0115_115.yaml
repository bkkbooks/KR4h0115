body:
  text: 唐宋八大家文鈔老泉文鈔引蘇文公崛起蜀徼其學本申韓而其行文雜出於荀卿孟軻及戰國策諸家不敢遽謂得古六藝者之遺然其鑱畫之議幽悄之思博大之識奇崛之氣非近代儒生所及要之韓歐而下與諸名家相為表裏及其二子繼響嘉祐之文西漢同風矣豫讀之録其書狀十四首論三十七首記四首説二首引二首序一首釐為十卷歸安鹿門茅坤題
