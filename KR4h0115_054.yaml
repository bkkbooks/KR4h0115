body:
  text: 唐宋八大家文鈔卷五十一明茅坤撰廬陵文鈔二十三碑銘觀文殿大學士行兵部尚書西京留守贈司空兼侍中晏公神道碑銘至和元年六月觀文殿太學士行兵部尚書西京留守臨淄公以疾歸于京師八月疾少間入見天子曰噫豫舊學之臣也乃留侍講邇英閣詔五日一朝前殿明年正月疾作不能朝敕太醫朝夕往視有司除道將幸其家公歎曰吾無狀乃以疾病憂吾君即馳奏曰臣疾少間行愈矣乃止其月丁亥以公薨聞天子震悼亟臨其喪以不即見公為恨贈公司空兼侍中諡曰元獻有司請輟視朝一日詔特輟二日以其年三月癸酉葬公于許州陽翟縣麥秀鄉之北原既葬賜其墓隧之碑首曰舊學之碑既又敕史臣修考次公事具書于碑下臣修伏讀國史見真宗皇帝時天下無事天子方推讓功德祠祀天地山川講禮樂以文頌聲而儒學文章俊賢偉異之人出公世家江西之臨川年始十四一日起田里進見天子時方親閲天下貢士會廷中者千餘人與夫宫臣衛官擁列圜視公不動聲氣操筆為文辭立成以獻天子嘉賞賜同進士出身遂登館閣掌書命以文章為天下所宗逮陛下養德東宫先帝選用臣屬即以公遺陛下由王官宫臣卒登宰相凡所以輔道聖德憂勤國家有舊有勞自始至卒五十餘年公既薨而先帝之名臣與陛下東宫之舊人皆無在者宜其褒寵優異比公甘盤臣修幸得執筆史官奉明詔謹昧死上臨淄公事曰公諱殊字同叔姓晏氏其世次晦顯徙遷不常自其高祖諱墉唐咸通中舉進士卒官江西始著籍于高安其後三世不顯曾祖諱延昌又徙其籍于臨川祖諱郜追封英國公考諱固追封秦國公自曾祖已下皆用公貴纍贈開府儀同三司太師中書令兼尚書令曾祖妣張氏陳國太夫人祖妣傅氏許國太夫人妣吳氏唐國太夫人公生七嵗知學問為文章鄉里號為神童故丞相張文節公安撫江西得公以聞真宗召見既賜出身後二日又召試詩賦論公徐啓曰臣嘗私習此賦不敢隱真宗益嗟異之因試以他題以為祕書省正字置之祕閣使得悉讀祕書命故僕射陳文僖公視其學明年獻其所為文召試中書遷太常寺奉禮郎封祀太山推恩遷光祿寺丞數月充集賢挍理明年遷著作佐郎丁父憂去官已而真宗思之即其家起復命淮南發運使具舟送至京師從祀太清宫賜緋衣銀魚同判太常禮院又丁母憂求去官服喪不許今天子始封升王公以選為府記室參軍再遷左正言直史館今天子為皇太子以户部貟外郎充太子舍人賜金紫知制誥判集賢院遷翰林學士充景靈宫判官太子左庶子兼判太常寺知禮儀院公既以道德文章佐佑東宫真宗有所咨訪多以方寸小紙細書問之由是參與機密有所對必以其藁進示不泄其後悉閲真宗閣中遺書得公所進藁類為八十卷藏之禁中人莫之見也初真宗遺詔章獻明肅太后權聽軍國事宰相丁謂樞密使曹利用各欲獨見奏事無敢決其議者公建言羣臣奏事太后者垂簾聽之皆毋得見議遂定乾興元年拜右諫議大夫兼侍讀學士遷給事中景靈宫副使判吏部流內銓以易侍講崇政殿遷禮部侍郎知審官院為樞密副使遷刑部侍郎上疏論張耆不可為樞密使由是忤太后旨坐以笏擊其僕誤折其齒罷留守南京大與學校以教諸生自五代以來天下學廢興自公始召拜御史中丞改兵部侍郎兼祕書監資政殿學士翰林侍讀學士知天聖八年禮部貢舉明年為三司使復為樞密副使未拜改參知政事遷尚書左丞太后謁太廟有請服衮冕者太后以問公公以周官后服對太后崩大臣執政者皆罷以公為禮部尚書知亳州徙知陳州遷刑部尚書復召為御史中丞又為三司使知樞密院事拜樞密使再加撿挍太尉同中書門下平章事慶厯三年三月遂以刑部尚書居相位充集賢殿大學士兼樞密使自公復召用而趙元昊反師出陜西天下弊於兵公數建利害請罷監軍兼以陳圗授諸將使得應敵為攻守及制財用出入之要皆有法天子悉為施行自宫禁先以率天下而財賦之職悉歸有司卒能以謀臣元昊使聽約束乃還其王號公為人剛簡遇人必以誠雖處富貴如寒士樽酒相對歡如也得一善稱之如巳出當世知名之士如范仲淹孔道輔等皆出其門及為相益務進賢材當公居相府時范仲淹韓琦富弼皆進用至於臺閣多一時之賢天子既厭西兵憫天下困弊奮然有意遂欲因羣材以更治數詔大臣條天下事方施行而小人權幸皆不便明年秋會公以事罷而仲淹等相次亦皆去事遂已公既罷以工部尚書知潁州徙知陳州又徙許州三遷户部尚書拜觀文殿大學士知永興軍充一路都部署安撫使徙知河南府兼西京留守纍進階至開府儀同三司勳上柱國爵臨淄公食邑萬二千户實封三千七百户公享年六十有五自少篤學至其病亟猶手不釋卷有文集二百四十卷嘗奉敕修上訓及真宗實録又集類古今文章為集選二百卷公為政敏而務以簡便其民其于家嚴子弟之見有時事寡姊孝謹未嘗為子弟求恩澤其在陳州上問宰相曰晏某居外未嘗有所請其亦有所欲邪宰相以告公公自為表問起居而已故其薨也天子尤哀悼之賜豫加等以其子承裕為崇文院撿討孫及甥之未官者九人皆命以官公初娶李氏工部侍郎虛已之女次孟氏屯田貟外郎虛舟之女封巨鹿郡夫人次王氏太師尚書令超之女封榮國夫人子八人長曰居厚大理評事早卒次承裕尚書屯田貟外郎宣禮贊善大夫崇讓著作佐郎明逺祗德皆大理評事幾道傳正皆太常寺太祝女六人長適户部侍郎同中書門下平章事富弼次適禮部侍郎三司使楊察其四尚幼孫十有三人公既樂善而稱為知人士之顯於朝者多公所薦達至擇其女之所從又得二人者如此可謂賢也巳銘曰有薑之裔齊為晏氏齊在春秋晏顯諸侯傳載桓子嬰稱於丘其後無聞不亡僅存有煒自公厥聲以振公之顯聲實相天子天子曰噫豫考真宗唯多名臣以臻盛隆汝初事我王官東宫以暨相豫始卒一躬輔我以德有勞於邦公疾在外來歸自洛天子曰留汝豫舊學凡今在庭莫如汝舊孰以畀豫惟豫聖考今既亡矣孰為豫老何以贈之司空侍中禮則有加豫思何窮有篆其文在其碑首天子之褒史臣有詔銘以述之永昭厥後資政殿學士戶部侍郎文正范公神道碑銘明法皇祐四年五月甲子資政殿學士尚書户部侍郎汝南文正公薨於徐州以其年十有二月壬申葬于河南尹樊里之萬安山下公諱仲淹字希文五代之際世家蘇州事吳越太宗皇帝時吳越獻其地公之皇考從錢俶朝京師後為武寧軍掌書記以卒公生二嵗而孤母夫人貧無依再適長山朱氏既長知其世家感泣去之南都入學舍掃一室晝夜講誦其起居飲食人所不堪而公自刻益苦居五年大通六經之旨為文章論説必本於仁義祥符八年舉進士禮部選第一遂中乙科為廣德軍司理參軍始歸迎其母以養及公既貴天子贈公曾祖蘇州糧科判官諱夢齡為太保祖祕書監諱贊時為太傅考諱墉為太師妣謝氏為吳國夫人公少有大節於富貴貧賤毁譽歡戚不一動其心而慨然有志於天下常自誦曰士當先天下之憂而憂後天下之樂而樂也其事上遇人一以自信不擇利害為趨舍其所有為必盡其方曰為之自我者當如是其成與否有不在我者雖聖賢不能必吾豈茍哉天聖中晏丞相薦公文學以大理寺丞為祕閣挍理以言事忤章獻太后旨通判河中府久之上記其忠召拜右司諫當太后臨朝聽政時以至日大會前殿上將率百官為壽有司巳具公上疏言天子無北面且開後世弱人主以強母后之漸其事遂巳又上書請還政天子不報及太后崩言事者希旨多求太后時事欲深治之公獨以謂太后受託先帝保佑聖躬始終十年未見過失宜掩其小故以全大德初太后有遺命立楊太妃代為太后公諫曰太后母號也自古無代立者由是罷其册命是嵗大旱蝗奉使安撫東南使還會郭皇后廢率諫官御史伏閣爭不能得貶知睦州又徙蘇州嵗餘即拜禮部貟外郎天章閣待制召還益論時政闕失而大臣權幸多忌惡之居數月以公知開封府開封素號難治公治有聲事日益簡暇則益取古今治亂安危為上開説又為百官圗以獻曰任人各以其材而百職修堯舜之治不過此也因指其遷進遲速次序曰如此而可以為公可以為私亦不可以不察由是呂丞相怒至交論上前公求對辨語切坐落職知饒州明年吕公亦罷公徙潤州又徙越州而趙元昊反河西上復召相吕公乃以公為陜西經略安撫副使遷龍圗閣直學士是時新失大將延州危公請自守鄜延捍賊乃知延州元昊遣人遺書以求和公以謂無事請和難信且書有僣號不可以聞乃自為書告以逆順成敗之説甚辨坐擅復書奪一官知耀州未逾月徙知慶州既而四路置帥以公為環慶路經略安撫招討使兵馬都部署纍遷諫議大夫樞密直學士公為將務持重不急近功小利于延州築青澗城墾營田復承平永平廢寨熟羌歸業者數萬户於慶州城大順以據要害奪賊地而耕之又城細腰胡蘆於是明珠滅臧等大族皆去賊為中國用自邉制久隳至兵與將常不相識公始分延州兵為六將訓練齊整諸路皆用以為法公之所在賊不敢犯人或疑公見敵應變為如何至其城大順也一旦引兵出諸將不知所向軍至柔逺始號令告其地處使往築城至於版築之用大小畢具而軍中初不知賊以騎二萬來爭公戒諸將戰而賊走追勿過河已而賊果走追者不渡而河外果有伏賊失計乃引去於是諸將皆服公為不可及公待將吏必使畏法而愛已所得賜賚皆以上意分賜諸將使自為謝諸蕃質子縱其出入無一人逃者蕃酋來見召之臥內屏人徹衛與語不疑公居三嵗士勇邉實恩信大洽乃決策謀取橫山復靈武而元昊數遣使稱臣請和上亦召公歸矣初西人籍其鄉兵者十數萬既而黥以為軍惟公所部但刺其臂公去兵罷獨得復為民其於兩路既得熟羌為用使以守邉因徙屯兵就食內地而紓西人饋挽之勞其所設施去而人德之與守其法不敢變者至今尤多自公坐吕公貶羣士大夫各持二公曲直吕公患之凡直公者皆指為黨或坐竄逐及吕公復相公亦再起被用於是二公歡然相約戮力平賊天下之士皆以此多二公然朋黨之論遂起而不能止上既賢公可大用故卒置羣議而用之慶厯三年春召為樞密副使五讓不許乃就道既至數月以為參知政事每進見必以太平責之公歎曰上之用我者至矣然事有先後而革弊于久安非朝夕可也既而上再賜手詔趣使條天下事又開天章閣召見賜坐授以紙筆使疏于前公惶恐避席始退而條列時所宜先者十數事上之其詔天下興學取士先德行不専文辭革磨勘例遷以别能否減任子之數而除濫官用農桑考課守宰等事方施行而磨勘任子之法僥幸之人皆不便因相與騰口而嫉公者亦幸外有言喜為之佐佑會邉奏有警公即請行乃以公為河東陜西宣撫使至則上書願復守邉即拜資政殿學士知邠州兼陜西四路安撫使其知政事才一嵗而罷有司悉奏罷公前所施行而復其故言者遂以危事中之賴上察其忠不聽是時夏人已稱臣公因以疾請鄧州守鄧三嵗求知杭州又徙青州公益病又求知潁州肩舁至徐遂不起享年六十有四方公之病上賜藥存問既薨輟朝一日以其遺表無所請使就問其家所欲贈以兵部尚書所以哀恤之甚厚公為人外和內剛樂善泛愛喪其母時尚貧終身非賔客食不重肉臨財好施意豁如也及退而視其私妻子僅給衣食其為政所至民多立祠畫像其行巳臨事自縉紳處士里閭田野之人外至夷狄莫不知其名字而樂道其事者甚衆及其世次官爵志於墓譜於家藏于有司者皆不論著著其繫天下國家之大者亦公之志也歟銘曰范於吳越世實陪臣俶納山川及其士民范始來北中間幾息公奮自躬與時偕逢事有罪功言有違從豈公必能天子用公其艱其勞一其初終夏童跳邉乘吏怠安帝命公往問彼驕頑有不聽順鋤其穴根公居三年怯勇隳完兒憐獸擾卒俾來臣夏人在廷其事方議帝趣公來以就豫治公拜稽首兹惟艱哉初匪其難在其終之羣言營營卒壞于成匪惡其成惟公是傾不傾不危天子之明存有顯榮殁有贈諡藏其子孫寵及後世惟百有位可勸無怠歐陽公碑文正公僅千四百言而公之生平已盡蘇長公狀司馬溫公幾萬言而上似猶有餘旨蓋歐得史遷之髓故于敘事處裁節有法自不繁而體已完蘇則所長在策論縱橫于史家學或短此兩公互有短長不可不知贈刑部尚書余襄公神道碑銘始興襄公既葬於曲江之明年其子仲荀走於亳以來告曰余氏世為閩人五代之際逃亂于韶自曾高以來晦迹嘉遁至于博士府君始有祿仕而襄公繼之以大曲江僻在嶺表自始興張文獻公有聲於唐為賢相至公復出為宋名臣蓋余氏徙韶歷四世始有顯仕而曲江寂寥三百年然後再有聞人惟公位登天臺正秩三品遂有爵土開國鄉州以繼美前哲而為韶人榮至於褒恤贈諡始終之寵盛矣蓋褒有詔恤有物贈有告而諡行考功有議有狀合而志之以閟諸幽有銘可謂備矣惟是螭首龜趺揭於墓隧以表見于後世而昭示其子孫者宜有辭而闕焉敢以為請謹按余氏韶州曲江人曾祖諱某祖諱某皆不仕父諱某太常博士纍贈太常少卿公諱靖字安道官至朝散大夫守工部尚書集賢院學士知廣州軍州事兼廣南東路兵馬鈐轄經略安撫使柱國始興郡開國公食邑二千六百户食實封二百户治平元年自廣朝京師六月癸亥以疾薨于金陵天子惻然輟視朝一日賻以粟帛贈刑部尚書諡曰襄明年七月某甲子返葬于曲江之龍歸鄉成山之原公為人質重剛徑而言語恂恂不見喜怒自少博學強記至於歷代史記雜家小説隂陽律厯外暨浮圗老子之書無所不通天聖二年舉進士為贑縣尉書判拔萃改將作監丞知新建縣再遷祕書丞判挍三史充集賢挍理天章閣待制范公仲淹以言事觸宰相得罪諫官御史不敢言公疏論之坐貶監筠川酒稅稍徙泰州已而天子感悟亟復用范公而因之以被斥者皆召還惟公以便親乞知英州遷太常博士丁母憂服除遂還為集賢挍理同判太常禮院景祐慶厯之間天下怠於久安吏習因循多失職及趙元昊以夏叛師出久無功縣官財屈而民重困天子赫然思振頽弊以修百度既已更用二三大臣又增置諫官四貟使言天下事公其一人也即改右正言供職公感激奮勵遇事輒言無所回避姦諛權幸屏息畏之其補益多矣然亦不勝其怨嫉也慶厯四年元昊納誓請和將加封册而契丹以兵臨境上遣使言為中國討賊且告師期請止母與和朝延患之欲聽重絶夏人而兵不得息不聽生事北邉議未決公獨以謂中國厭兵久矣此契丹之所幸一日使吾息兵養勇非其利也故用此以撓我爾是不可聽朝廷雖是公言猶留夏册不遣而假公諫議大夫以報公從十餘騎馳出居庸關相見于九十九泉從容坐帳中辨折往復數十卒屈其議取其要領而還朝廷遂發夏册臣元昊西師既解嚴而北邉亦無事是嵗以本官知制誥史館修撰而契丹卒自攻元昊明年使來告捷又以公往報坐習夷語出知吉州怨家因之中以事左遷將作少監分司南京公怡然還鄉里闔門謝賔客絶人事凡六年天子每思之欲用者數矣大臣有不喜者第遷光祿少卿于家又以為某衛將軍壽州兵馬鈐轄辭不拜皇祐二年祀明堂覃恩遷衛尉卿明年知虔州丁父憂去官而蠻賊儂智高陷雍州連破嶺南州縣圍廣州乃即廬中起公為祕書監知潭州即日疾馳在道改知桂州廣南西路經略安撫使公奏曰賊在東而徙臣西非臣志也天子嘉之即詔公經制廣東西賊盜乃趨廣州而智高復西走雍州自智高初起交趾請出兵助討賊詔不許公以謂智高交趾叛者宜聽出兵毋沮其善意纍疏論之不報至是公曰雍州與交趾接境今不納必忿而反助智高乃以便宜趣交趾會兵又募儂黃諸姓酋豪皆縻以職與之誓約使聽節制或疑其不可用公曰使不與智高合足矣及智高入雍州遂無外援既而宣撫使狄青會公兵敗賊于歸仁智高走入海雍州平公請復終喪不許諸將班師以智高尚在請留公廣西委以後事遷給事中諫官御史列疏言公功多而賞薄再遷尚書工部侍郎公留廣西逾年撫緝完復嶺海肅然又遣人入特磨襲取智高母及其弟一人俘于京師斬之拜集賢院學士久之徙知潭州又徙青州再遷吏部侍郎嘉祐五年交趾冦雍州殺五巡撿天子以謂恩信著于嶺外而為交趾所畏者公也驛召以為廣西體量安撫使悉發荆湖兵以從公至則移檄交趾召其臣費嘉祐詰責之嘉祐皇恐對曰種落犯邉罪當死願歸取首惡以獻即械五人送欽州斬於界上公還雍人遮道留之不得明年以尚書左丞知廣州英宗即位拜工部尚書代還道病卒享年六十有五公經制五管前後十年凡治六州所至有惠愛雖在兵間手不釋卷有文集二十卷奏議五卷三史刋誤四十卷娶林氏封魯郡夫人子男三人伯莊殿中丞早卒仲荀今為屯田貟外郎叔英太常寺太祝女六人皆適士族孫男四人孫女五人銘曰余遷曲江仍世不顯奮自襄公有聲甚逺始興開國襲美于前兩賢相望三百年間偉歟襄公惟邦之直始登于朝官有言責左右獻納姦諛屏息慶厯之治實多補益逢時有事奔走南北功書史官名在夷狄出入艱勤險夷一德小人之讒公廢于里一方有警公起于家威行信結嶺海幽遐公之在焉帝不南顧胡召其還殞于中路返柩來歸韶人負土伐石刻辭立於墓門以貽來世匪止韶人尚書度支郎中天章閣待制王公神道碑銘中多嗚咽故轉語亟處多而情事悽然公諱質字子野其先大名莘人自唐同光初公之皇曾祖魯公舉進士第一顯名當時官至右拾遺歷晉漢周而皇祖晉公益以文章有大名逮事太祖太宗官至兵部侍郎當真宗時伯父文正公居中書二十餘年天下稱為賢宰相今天子慶厯三年公與其弟素皆待制天章閣自同光至慶厯蓋百有二十餘年王氏更四世世有顯人或以文章或以功德公生纍世富貴而操履甚於寒士性篤孝弟厚於朋友樂施與以賙人而妻子常不自給視榮利淡若無意平居苦疾病退然如不自勝及臨事介然有仁者之勇君子之剛樂人之善如自己出初范仲淹以言事貶饒州方治黨人甚急公獨扶病率子弟餞於東門留連數日大臣有以讓公曰長者亦為此乎何苦自陷朋黨公徐對曰范公天下賢者顧某何敢望之然若得為黨人公之賜某厚矣聞者為公縮頸其為待制之明年出守于陜又明年小人連搆大獄坐貶廢者十餘人皆公素所賢者聞之悲憤歎息或終日不食因數劇飲大醉公既素病益以酒遂卒公初以廕補太常寺太祝監都進奏院獻其文章召試賜進士及第挍勘館閣書籍遂為集賢挍理通判蘇州州守黃宗旦負材自喜頗以新進少公議事則曰少年乃與丈人爭事耶公曰受命佐君事有當爭職也宗旦雖屢屈折而政常得無失稍德公助巳為之加禮宗旦得盜鑄錢者百餘人以詫公公曰事發無迹何從得之曰吾以術鉤出之公愀然曰仁者之政以術鉤人置之死而又喜乎宗旦慚服悉緩出其獄始大稱公曰君子也判尚書刑部吏部南曹知蔡州始至發大姦吏一人去之繩諸豪猾以法與轉運使爭曲直事有下而不便者皆格不用既去其害政者然後崇學校一以仁恕臨下其政知寬猛必使吏畏而民愛其為他州州率大而難治必常有善政皆用此入為開封府推官已而其兄雍為三司判官公曰省府皆要職吾豈可兄弟居之求知壽州徙廬州盜有殺其徒而并其財者獲之置于法大理駁曰法當原公以謂盜殺其徒而自首者原之所以疑壞其黨而開其自新若殺而不首既獲而亦原則公行為盜而第殺一人既得兼其財又可以贖罪不獲則肆為盜獲則引以自原如此盜不可止非法意疏三上不能爭公歎曰吾不勝法吏矣乃上書自劾請不坐佐吏公坐貶監靈仙宫其後議者更定不首之罪卒用公言為是而公貶猶不召資政殿學士鄭戩翰林學士葉清臣訟公無罪始起知泰州遷荆湖北路轉運使當用兵西方急于用財之時獨不進羡餘其賦斂近寬平治以常法故他州不勝其弊而荆湖之人自若權知荆南府民有訟婚者訴曰貧無資故後期問其用幾何以俸錢與之使婚獲盜竊人衣者曰迫于飢寒而為之公為之哀憐取衣衣之遣去荆人比公為子産召為史館修撰遂拜天章閣待制判吏部流內銓號為稱職而於選法未嘗有所更易人或問之公曰選法具備如權衡在執者不欺其輕重耳何必屢更其法是嵗天子開天章閣召大臣問天下事以手詔責范公等而議事者爭言天下利害務欲更革諸事公獨無一言問之則曰吾病未能也公于榮利既薄臨禍福不為喜懼其視世事若無一可以動其心者惟以天下善人君子亨否為已休戚遂以此卒此其為志豈小哉豈以病而不能者哉公誠素病而任之以事所至必皆有為使其壽且不死而用其必有所為豈其不欲空言而已者哉嗚呼公享年四十有五官至度支郎中階朝奉大夫勳上護軍爵平晉男娶周氏某縣君生子某曾祖諱某祖諱某皆贈太師尚書中書令考諱某官至兵部郎中有賢行贈户部尚書公以某年某月某日卒于陜某年某月某日葬于某所先塋之次銘曰仕不為利以行其仁處豐自薄而清厥身其仁誰思不在吏民其清孰似以遺子孫銘以昭之以告後人尚書户部郎中贈右諫議大夫曾公神道碑銘公諱致堯字某撫州南豐人也少知名江南當李氏時不就鄉里之舉李氏亡太平興國八年舉進士及第為符離主簿纍遷光祿寺丞監越州酒稅數上書言事獻文章太宗竒之召拜著作佐郎直史館使行視汴河漕運稱旨遷祕書丞為兩浙轉運使諫議大夫魏庠知蘇州恃舊恩多不法吏莫敢近公劾其狀以聞太宗驚曰是敢治魏庠可畏也卒為公罷庠洛苑使楊允恭以言事見幸無不聽事有下公常厝不行允恭以訴太宗遣使問公公具言其不可公既繩其大而人所難者至其小易則務為寬簡嵗終其課為最徙知壽州壽近京師諸豪大商交結權貴號為難治公居嵗餘諸豪斂手莫敢犯公法人亦莫見其以何術而然也公于壽尤有惠愛既去壽人遮留數日以一騎從二卒逃去過他州壽人猶有追之者再遷主客貟外郎判三司鹽鐵勾院是時李繼捧以銀夏五州歸朝廷其弟繼遷亡入磧中為冦太宗遽遣繼捧往招之至則誘其兄以隂合卒復圗而囚之自陜以西既苦兵矣真宗初即位益欲來以恩德許還其地使聽約束公獨以為繼遷反覆不可豫繼遷已得五州後二年果叛圍靈武議者又欲豫之公益爭以為不可言雖不從真宗知其材將召以知制誥而大臣有不可者乃以出為京西轉運使王均伏誅奉使安撫西川誤留詔書于家其副潘惟嶽教公上言渡吉柏江舟破亡之可以自解公曰為臣而欺其君吾不能為也乃上書自劾釋不問其後惟嶽入見禁中道蜀事具言公所自劾者真宗嗟歎久之繼遷兵既久不解丞相張齊賢經略環慶以西署公判官以從公曰西兵十萬皆屬王超超材既不可專任而兵多勢重非易可指麾若不得節度諸將事必不集真宗難其言為詔陜西聽經略使得自發兵公度言終不合乃辭行會召賜金紫公謝曰臣嘗言丞相某事未效不敢受賜由是貶黃州團練副使公已貶而王超兵敗繼遷破清逺軍朝廷卒亦棄靈州公貶逾年復為户部貟外郎知泰州丁母憂服除拜吏部貟外郎知泉州徙知蘇州又徙知揚州上疏論事語斥大臣尤切當時皆不恱又徙知鄂州坐知揚州日誤入添支俸多一月雖嘗自言猶貶監江寧府酒稅用封禪恩纍遷户部郎中大中祥符五年五月某日卒于官享年六十有六遺戒無以佛汚我家人如其言公之曾祖諱某某官曾祖妣某氏某縣君祖諱某某官祖妣某氏某縣君考諱某某官妣某氏某縣君子男七人曰某女若干人用其子易占恩再遷右諫議大夫初葬南豐之東園水壞其墓某年月日改葬龍池鄉之原頭慶厯六年夏其孫鞏稱其父命以來請曰願有述遂為之述曰維曾氏始出於鄫鄫為姒姓之國微不知其始封春秋之際莒滅鄫而子孫散亡其在魯者自别為曾氏蓋自鄫逺出于禹歷商周千有餘嵗嘗微不顯及為曾氏而點參元西始有聞于後世而其後又晦復千有餘嵗而至于公夫晦顯常相反覆而世德之積者久則其發也宜非一二世而止矧公之有不得盡施而有以遺其後世乎是故不宜無銘者已公當太宗真宗時言事屢見聽用自言西事不合而出遂以卒于外然在外所言如在朝廷而任言責者至其難言則人有所不敢言者豫于其論議既不能盡載而亦有所不得載也取其初不見用久而益可思者特詳焉所以見公之志也銘曰公于事明由學而知先知逆決有若蓍龜告而不欺不顧從違初雖不信後必如之公所論議敢人之難古稱君子有德有言德蓄不施言猶可聞銘而不朽公也長存金部郎中贈兵部侍郎閻公神道碑銘并序惟閻氏世家于鄆其先曰太原王寶以武顯于梁晉之間實佐莊宗戰河上取常山功書史官爵有王土鄆之諸閻皆王後也周廣順二年以鄆州之巨野鄆城為濟州閻氏今為濟州巨野人也公生漢晉之間遭世多虞雖出將家而不喜戰鬬獨好學通三禮頗習子史為文辭是時巨野大賊有衆千餘人以公鄉里儒者掠致賊中問以謀略公毅然未嘗有所言而為人狀貌竒偉舉止嚴重有威儀賊皆憚之莫敢害賊平公還鄉里以三禮教授弟子大宋受命天下將平公乃出以三禮舉中建隆某年某科歷漢州之金堂虢州之湖城二縣尉遷濮州濮陽令皆有吏績太宗皇帝遣使者行視天下使者還言公可用召見奏事語音鬯然殿中皆聳動太宗竒之拜太子洗馬知嶽州吳趣忠懿王再朝京師籍其所有浙東西之地納之有司天子以為新附之邦乃以禁兵千人屬公安撫其人遂知蘇州五代之際江海之間分為五大者竊名號其次擅征伐故皆峻刑法急聚斂以制命于其民越雖名為臣屬之邦然閡于江淮與中國隔不相及者久矣公以齊魯之人悉能知越風俗而揉以善政或摩以漸或革以宜推凡上之所欲施寬凡民之所不堪恩涵澤濡民以蘇息政成召還以國子博士知濟州又知晉州入拜尚書水部貟外郎廣平郡王府翊善賜緋衣銀魚居六年廣平封陳王出閣公以司門貟外郎求知黃州陳王徙封許乃詔公還遷庫部貟外郎賜金紫侍講許王府王薨公出知棣州居嵗餘以淮陽近巨野乃求知淮陽軍公雖居許王府而真宗素知其賢數詔訪以經術謂之閻君子真宗即位問公何在左右具言所以然即時召之巳在道拜金部郎中知青州其後鄆州守臣某臨遣對殿上真宗問鄆去青逺近守臣對若干真宗曰為吾告之將召也已而見召行至巨野遇疾使者臨問慰賜滿百日賜告下濟州伺疾少間趨就道已而疾病以某年某月某日薨于濟州享年七十有七贈兵部侍郎葬于巨野大徐村公諱象字某曾祖諱某某官祖諱某某官考諱某某官公娶孫氏封富春縣君用子貴追封泗水縣太君子男三人長曰某某官次曰某某官次曰某某官女三人皆適士族孫五人一早亡次皆已仕曾孫十人仕者五人嗚呼士患不逢時時逢矣患人主之不知知矣而不及用者命也惟公履道純正生于多艱而卒遇太平以奮其身又遭人主之知嘗用矣而不暇于大用以殁殁而無章焉則其遂不見于後世乎景祐五年冬其子光祿君自光化罷還鄉閭乃謀刻其先德于墓之碑而以其辭屬修詞曰閻氏將家大纛高牙有封太原王公桓桓公不勇力而勇于學奮身逢時卒有成業不大其榮繼世而卿挺其後世多有孫曾有墓于里有碑其隧鄉人無傷鄉之君子唐宋八大家文鈔卷五十一
