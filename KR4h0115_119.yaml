body:
  text: 唐宋八大家文鈔卷一百九明茅坤撰老泉文鈔三書上王長安書運險峭之思以為鑱畫之文故其鋒鍔不可嚮邇天下無事天子甚尊公卿甚貴士甚賤從士而逆數之至於天子其積也甚厚其為變也甚難是故天子之尊至於不可指而士之卑至於可殺嗚呼見其安而不見其危如此而已矣衛懿公之死非其無人也以鶴辭而不與戰也方其未敗也天下之士望為其鶴而不可得也及其敗也思以千乘之國與匹夫共之而不可得也人知其卒之至於如此則天子之尊可以栗栗於上而士之卑可以肆志於下又焉敢以勢言哉故夫士之貴賤其勢在天子天子之存亡其權在士世衰道喪天下之士學之不明持之不堅於是始以天子存亡之權下而就一匹夫貴賤之勢甚矣夫天下之惑也持千金之璧以易一瓦缶幾何其不舉而棄諸溝也古之君子其道相為徒其徒相為用故一夫不用乎此則天下之士相率而去之使夫上之人有失天下士之憂而後有失一士之懼今之君子幸其徒之不用以苟容其身故其始也輕用之而其終也亦輕去之嗚呼其亦何便於此也當今之世非有賢公卿不能振其前非有賢士不能奮其後洵從蜀來明日將至長安見明公而東伏惟讀其書而察其心以輕重其禮幸甚幸甚唐荆川曰議論奇髙上余青州書論出處氣多竒崛處洵聞之楚人髙令尹子文之行曰三以為令尹而不喜三奪其令尹而不怒其為令尹也楚人為之喜而其去令尹也楚人為之怒巳不期為令尹而令尹自至夫令尹子文豈獨惡夫富貴哉知其不可以求得而安其自得是以喜怒不及其心而人為之囂囂嗟夫豈亦不足以見己大而人小耶脫然為棄於人而不知棄之為悲紛然為取於人而不知取之為樂人自為棄我取我而吾之所以為我者如一則亦不足以髙視天下而竊笑矣哉昔者明公之初自奮於南海之濵而為天下之名卿當其盛時激昂慷慨論得失定可否左摩西羌右揣契丹奉使千里彈壓强悍不屈之蕃其辨如決河流而東注諸海名聲四溢於中原而磅礴於外裔之國可謂至盛矣及至中廢而為海濵之匹夫蓋其間十有餘年明公無求於人而人亦無求於明公者其後適㑹南蠻縱橫放肆充斥萬里而莫之或救明公乃起于民伍之中折尺箠而笞之不旋踵而南方乂安夫明公豈有求而為之哉適㑹事變以成大功功成而爵祿至明公之於進退之事蓋亦綽綽乎有餘裕矣悲夫世俗之人紛紛於富貴之間而不知自止達者安於逸樂而習為髙岸之節顧視四海饑寒窮困之士莫不嚬蹙嘔噦而不樂窮者藜藿不飽布褐不暖習為貧賤之所摧折仰望貴人之輝光則為之顛倒而失措此二人者皆不可與語於輕富貴而安貧賤何者彼不知貧賤富貴之正味也夫惟天下之習於富貴之榮而狃於貧賤之辱者而後可與語此今夫天下之所以奔走於富貴者我知之矣而不敢以告人也富貴之極止於天子之相而天子之相果誰為之名豈天為之名耶其無乃亦人之自相名耶夫天下之官上自三公至於卿大夫而下至於士此四者皆人之所自為也而人亦自貴之天下以為此四者絶羣離類特立於天下而不可幾近則不亦大惑矣哉盍亦反其本而思之夫此四名者其初蓋出於天下之人出其私意以自相號呼者而巳矣夫此四名者果出於人之私意所以自相號呼也則夫世之所謂賢人君子者亦何以異此有才者為賢人而有德者為君子此二名者夫豈輕也哉而今世之士得為君子者一為世之所棄則以為不若一命士之貴而况以與三公爭哉且夫明公昔者之伏於南海與夫今者之為東諸侯也君子豈有間於其間而明公亦豈有以自輕而自重哉洵以為明公之習於富貴之榮而狃於貧賤之辱其嘗之也蓋以多矣是以極言至此而無所迂曲洵西蜀之匹夫嘗有志於當世因循不遇遂至於老然其常所欲見者天下之士蓋有五六人五六人者巳略見矣而獨明公之未嘗見每以為恨今明公來朝而洵適在此是以不得不見伏惟加察幸甚上歐陽內翰書此書凡三段一假歷敘諸君子之離合見巳慕望之切二段稱歐陽公之文見己知公之深三段自敘平生經歷欲歐陽公之知之也而情事婉曲周折何等意氣何等風神洵布衣窮居常竊自歎以為天下之人不能皆賢不能皆不肖故賢人君子之處於世合必離離必合往者天子方有意於治而范公在相府富公為樞密副使執事與余公蔡公為諌官尹公馳騁上下用力於兵革之地方是之時天下之人毛髮絲粟之才紛紛然而起合而為一而洵也自度其愚魯無用之身不足以自奮於其間退而養其心幸其道之將成而可以復見于當世之賢人君子不幸道未成而范公西富公北執事與余公蔡公分散四出而尹公亦失勢奔走於小官洵時在京師親見其事忽忽仰天歎息以為斯人之去而道雖成不復足以為榮也既復自思念往者衆君子之進於朝其始也必有善人焉推之今也亦必有小人焉間之今之世無復有善人也則已矣如其不然也吾何憂焉姑養其心使其道大有成而待之何傷退而處十年雖未敢自謂其道有成矣然浩浩乎其胸中若與曩者異而余公適亦有成功於南方執事與蔡公復相繼登於朝富公復自外入為宰相其勢將復合為一喜且自賀以為道既巳粗成而果將有以發之也既又反而思其向之所慕望愛悅之而不得見之者蓋有六人焉今將往見之矣而六人者已有范公尹公二人亡焉則又為之澘然出涕以悲嗚呼二人者不可復見矣而所恃以慰此心者猶有四人也則又以自解思其止于四人也則又汲汲欲一識其面以發其心之所欲言而富公又為天子之宰相逺方寒士未可遽以言通於其前而余公蔡公逺者又在萬里外獨執事在朝廷間而其位差不甚貴可以呌呼扳援而聞之以言而饑寒衰老之病又痼而留之使不克自至於執事之庭夫以慕望愛悅其人之心十年而不得見而其人已死如范公尹公二人者則四人者之中非其勢不可遽以言通者何可以不能自往而遽已也執事之文章天下之人莫不知之然竊自以為洵之知之特深愈於天下之人何者孟子之文語約而意盡不為巉刻斬絶之言而其鋒不可犯韓子之文如長江大河渾浩流轉魚黿蛟龍萬怪惶惑而抑遏蔽掩不使自露而人望見其淵然之光蒼然之色亦自畏避不敢迫視執事之文紆餘委備往復百折而條達疏暢無所間斷氣盡語極急言竭論而容與閒易無艱難勞苦之態此三者皆斷然自為一家之文也惟李翺之文其味黯然而長其光油然而幽俯仰揖讓有執事之態陸賈之文遣言措意切近的當有執事之實而執事之才又自有過人者蓋執事之文非孟子韓子之文而歐陽子之文也夫樂道人之善而不為諂者以其人誠足以當之也彼不知者則以為譽人以求其悅已也夫譽人以求其悅巳洵亦不為也而其所以道執事光明盛大之德而不自知止者亦欲執事之知其知我也雖然執事之名滿於天下雖不見其文而固巳知有歐陽子矣而洵也不幸墮在草野泥塗之中而其知道之心又近而粗成欲徒手奉咫尺之書自託於執事將使執事何從而知之何從而信之哉洵少年不學生二十五嵗始知讀書從士君子遊年既巳晚而又不遂刻意厲行以古人自期而視與己同列者皆不勝己則遂以為可矣其後困益甚然後取古人之文而讀之始覺其出言用意與巳大異時復內顧自思其才則又似夫不遂止於是而已者由是盡燒其曩時所為文數百篇取論語孟子韓子及其他聖人賢人之文而兀然端坐終日以讀之者七八年矣方其始也入其中而惶然博觀於其外而駭然以驚及其久也讀之益精而其胸中豁然以明若人之言固當然者然猶未敢自出其言也時既久胸中之言日益多不能自制試出而書之已而再三讀之渾渾乎覺其來之易矣然猶未敢以為是也近所為洪範論史論凡七篇執事觀其如何噫嘻區區而自言不知者又將以為自譽以求人之知巳也惟執事思其十年之心如是之不偶然也而察之再上歐陽內翰書文有起伏頓挫而其自任處亦卓然內翰諫議執事士之能以其姓名聞乎天下後世者夫豈偶然哉以今觀之乃可以見生而同鄉學而同道以某問某蓋有曰吾不聞者焉而况乎天下之廣後世之逺雖欲求髣佛豈易得哉古之以一能稱以一善書者愚未嘗敢忽也今夫羣羣焉而生逐逐焉而死者更千萬人不稱不書也彼之以一能稱以一善書者皆有以過乎千萬人者也自孔子沒百有餘年而孟子生孟子之後數十年而至荀卿子荀卿子後乃稍闊逺二百餘年而楊雄稱於世楊雄之死不得其繼千有餘年而後屬之韓愈氏韓愈氏沒三百年矣不知天下之將誰與也且以一能稱以一善書者皆不可忽則其多稱而屢書者其為人宜尤可貴重奈何數千年之間四人而無加此其人宜何如也天下病無斯人天下而有斯人也宜何以待之洵一窮布衣於今世最為無用思以一能稱以一善書而不可得者也况夫四子者之文章誠不敢冀其萬一頃者張益州見其文以為似司馬子長洵不悅辭焉夫以布衣而王公大人稱其文似司馬遷不悅而辭無乃為不近人情誠恐天下之人不信且懼張公之不能副其言重為世俗笑耳若執事天下所就而折衷者也不知其不肖稱之曰子之六經論荀卿子之文也平生為文求於千萬人中使其姓名髣佛於後世而不可得今也一旦而得齒於四人者之中天下烏有是哉意者其失於斯言也執事於文稱師魯於詩稱子美聖俞未聞其有此言也意者其戲也惟其愚而不顧日書其所為文惟執事之求而致之既而屢請而屢辭焉曰吾未暇讀也退而處不敢復見甚慙於朋友曰信矣其戲也雖然天下不知其為戲將有以議執事洵亦且得罪執事憐其平生之心茍以為可教亦足以慰其衰老唯無曰荀卿云者幸甚三上歐陽內翰書風㫖翛然內翰侍郎執事洵以無用之才久為天下之棄民行年五十未嘗見役於世執事獨以為可收而論之於天子再召之試而洵亦再辭獨執事之意丁寧而不肯已朝廷雖知其不肖不足以辱士大夫之列而重違執事之意譬之巫醫卜祝特捐一官以乞之自顧無分毫之功有益於世而王命至門不知辭讓不畏簡書朋友之譏而苟以為榮此所以深愧於執事久而不至於門也然君子之相從本非以求利蓋亦樂乎天下之不知其心而或者之深知之也執事之於洵未識其面也見其文而知其心既見也聞其言而信其平生洵不以身之進退出處之間有謁於執事而執事亦不以稱譽薦拔之故有德於洵再召而辭也執事不以為矯而知其恥於自求一命而受也執事不以為貪而知其不欲為異其去不追而其來不拒其大不榮而其小不辱此洵之所以自信於心者而執事舉知之故凡區區而至門者為是謝也禮曰仕而未有祿者君有餽焉曰獻使焉曰寡君違而君薨弗為服也古之君子重以其身臣人者蓋為是也哉子思孟軻之徒至於是國國君使人餽之其詞曰寡君使某有獻於從者布衣之尊而至於此惟不食其祿也今洵已有名於吏部執事其將以道取之耶則洵也猶得以賔客見不然其將與奔走之吏同趨於下風此洵所以深自憐也惟所裁擇上張侍郎第二書告知巳者之言情詞可涕省主侍郎執事洵始至京師時平生親舊往往在此不見者蓋十年矣惜其老而無成問所以來者既而皆曰子欲有求無事他人須張益州來乃濟且云公不惜數千里走表為子求官茍歸立便殿上與天子相唯諾顧不肯邪退自思公之所與我者蓋不為淺所不可知者唯其力不足而勢不便不然公於我無愛也聞之古人日中必熭操刀必割當此時也天子虛席而待公其言宜無不聽用洵也與公有如此之舊適在京師且未甚老而猶足以有為也此時而無成亦足以見他人之無足求而他日之無及也已昨聞車馬至此有日西出百餘里迎見雪後苦風晨至鄭州脣黑而烈僮僕無人色從逆旅主人得束薪縕火良久乃能以見出鄭州十里許有導騎從東來驚愕下馬立道周云宋端明且至從者數百人足聲如雷巳過乃敢上馬徐去私自傷至此伏惟明公所謂潔廉而有文可以比漢之司馬子長者蓋窮困如此豈不為之動心而待其多言耶上韓舍人書老蘇强項如此正與前篇詞㫖不同舍人執事方今天下雖號無事而政化未清獄訟未衰息賦斂日重府庫空竭而大者又有二敵之不臣天子震怒大臣憂恐自兩制以上宜皆苦心焦思日夜思念求所以解吾君之憂者洵自惟閒人於國家無絲毫之責得以優游終嵗咏歌先王之道以自樂時或作為文章亦不求人知以為天下方事事而王公大人豈暇見我哉是以踰年在京師而其平生所願見如君侯者未嘗一至其門有來告洵以所欲見之之意洵不敢不見然不知君侯見之而何也天子求治如此之急君侯為兩制大臣豈欲見一閒布衣與之論閒事耶此洵所以不敢遽見也自閒居十年人事荒廢漸不喜承迎將逢拜伏拳跽王公大人茍能無以此求之使得從容坐隅時出其所學或亦有足觀者今君侯辱先求之此其必有所異乎世俗者矣孟子曰段干木踰垣而避之泄栁閉門而不納是皆已甚迫斯可以見矣嗚呼吾豈斯人之徒歟欲見我而見之不欲見而徐去之何傷况如君侯平生所願見者又何辭焉不宣唐宋八大家文鈔卷一百九
