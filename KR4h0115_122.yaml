body:
  text: 唐宋八大家文鈔巻一百十二明茅坤撰老泉文鈔六論嚳妃論辯史記載帝嚳元妃曰姜嫄次妃曰簡狄簡狄行浴見燕墮其卵取吞之因生契為商始祖姜源出野見巨人跡忻然踐之因生稷為周始祖其祖商周信矣其妃之所以生者神竒妖濫不亦甚乎商周有天下七八百年是其享天之祿以能乆其社稷而其祖宗何如此之不祥也使聖人而有異於衆庶也吾以為天地必將儲隂陽之和積元氣之英以生之又焉用此二不祥之物哉燕墮卵於前取而吞之簡狄其喪心乎巨人之迹隱然在地走而避之且不暇忻然踐之何姜源之不自愛也又謂行浴出野而遇之是以簡狄姜源為滛泆無法度之甚者帝嚳之妃稷契之母不如是也雖然史遷之意必以詩有天命鳦鳥䧏而生商厥初生民時惟姜源生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時惟后稷而言之吁此又遷求詩之過也毛公之傳詩也以鳦鳥降為祀郊禖之候履帝武為從髙辛之行及鄭之箋而後有吞踐之事當毛之時未始有遷史也遷之說出於疑詩而鄭之說又出於信遷矣故天下皆曰聖人非人人不可及也甚矣遷之以不祥誣聖人也夏之衰二龍戯於庭藏其漦至周而發之化為黿以生褒姒以滅周使簡狄而吞卵姜源而踐跡則其生子當如褒姒以妖惑天下奈何其有稷契也或曰然則稷何以棄曰稷之生也無菑無害或者姜嫄疑而棄之乎鄭莊公寤生驚姜氏姜氏惡之事固有然者也吾非惡夫異也惡夫遷之以不祥誣聖人也棄之而牛羊避遷之而飛鳥覆吾豈惡之哉楚子文之生也虎乳之吾固不惡夫異也管仲論通篇只罪管仲不能臨没薦賢起起伏伏光景不窮管仲相桓公霸諸侯攘戎狄終其身齊國富强諸侯不叛管仲死竪刁易牙開方用桓公薨於亂五公子爭立其禍蔓延訖簡公齊無寧歲夫功之成非成於成之日蓋必有所由起禍之作不作於作之日亦必有所由兆則齊之治也吾不曰管仲而曰鮑叔及其亂也吾不曰竪刁易牙開方而曰管仲何則竪刁易牙開方三子彼固亂人國者顧其用之者桓公也夫有舜而後知放四凶有仲尼而後知去少正卯彼桓公何人也顧其使桓公得用三子者管仲也仲之疾也公問之相當是時也吾以仲且舉天下之賢者以對而其言乃不過曰竪刁易牙開方三子非人情不可近而已嗚呼仲以為桓公果能不用三子矣乎仲與桓公處幾年矣亦知桓公之為人矣乎桓公聲不絶乎耳色不絶乎目而非三子者則無以遂其欲彼其初之所以不用者徒以有仲焉耳一日無仲則三子者可以彈冠相慶矣仲以為將死之言可以縶桓公之手足耶夫齊國不患有三子而患無仲有仲則三子者三匹夫耳不然天下豈少三子之徒雖桓公幸而聽仲誅此三人而其餘者仲能悉數而去之耶嗚呼仲可謂不知本者矣因桓公之問舉天下之賢者以自代則仲雖死而齊國未為無仲也夫何患三子者不言可也五霸莫盛於桓文文公之才不過桓公其臣又皆不及仲靈公之虐不如孝公之寛厚文公死諸侯不敢叛晉晉襲文公之餘威得為諸侯之盟主者百有餘年何者其君雖不肖而尚有老成人焉桓公之薨也一亂塗地無惑也彼獨恃一管仲而仲則死矣夫天下未嘗無賢者蓋有有臣而無君者矣桓公在焉而曰天下不復有管仲者吾不信也仲之書有記其將死論鮑叔賔胥無之為人且各疏其短是其心以為是數子者皆不足以託國而又逆知其將死則其書誕謾不足信也吾觀史鰍以不能進蘧伯玉而退彌子瑕故有身後之諌蕭何且死舉曹參以自代大臣之用心固宜如此也夫國以一人興以一人亾賢者不悲其身之死而憂其國之衰故必復有賢者而後有以死彼管仲者何以死哉審勢論宋以忠厚立國似失之弱而蘇氏父子徃徃注議於此以矯當世看他回護轉換救首救尾之妙治天下者定所尚所尚一定至於千萬年而不變使民之耳目純于一而子孫有所守易以為治故三代聖人其後世逺者至七八百年夫豈惟其民之不㤀其功以至于是蓋其子孫得其祖宗之法而為依據可以永乆夏之尚忠商之尚質周之尚文視天下之所宜尚而固執之以此而始以此而終不朝文而暮質以自潰亂故聖人者出必先定一代之所尚周之世蓋有周公為之制禮而天下遂尚文後世有賈誼者說漢文帝亦欲先定制度而其說不果用今者天下幸方治安子孫萬世帝王之計不可不預定于此時然萬世帝王之計常先定所尚使其子孫可以安坐而守其舊至於政弊然後變其小節而其大體卒不可革易故享世長逺而民不苟簡今也考之于朝野之間以觀國家之所尚者而愚猶有惑也何則天下之勢有彊弱聖人審其勢而應之以權勢彊矣彊甚而不已則折勢弱矣弱甚而不巳則屈聖人權之而使其甚不至於折與屈者威與惠也夫彊甚者威竭而不振弱甚者惠䙝而下不以為德故處弱者利用威而處彊者利用惠乘彊之威以行惠則惠尊乘弱之惠以養威則威發而天下震慄故威與惠者所以裁節天下彊弱之勢也然而不知彊弱之勢者有殺人之威而下不懼有生人之惠而下不喜何者威竭而惠䙝故也故有天下者必先審知天下之勢而後可與言用威惠不先審知其勢而徒曰我能用威我能用惠者末也故有彊而益之以威弱而益之以惠以至於折與屈者是可悼也譬之人身將欲飲藥餌石以養其生必先審觀其性之為隂其性之為陽而投之以藥石藥石之陽而投之以隂藥石之隂而投之以陽故隂不至於涸而陽不至於亢苟不能先審觀己之為隂與己之為陽而以隂攻隂以陽攻陽則隂者固死於隂而陽者固死於陽不可救也是以善養身者先審其隂陽而善制天下者先審其彊弱以為之謀昔者周有天下諸侯大盛當其盛時大者已有地五百里而畿内反不過千里其勢為弱秦有天下散為郡縣聚為京師守令無大權柄伸縮進退無不在我其勢為彊然方其成康在上諸侯無小大莫不臣伏弱之勢未見於外及其後世失德而諸侯禽奔獸遯各固其國以相侵攘而其上之人卒不悟區區守姑息之道而望其能以制服彊國是謂以弱政濟弱勢故周之天下卒斃於弱秦自孝公其勢固已駸駸焉日趨於彊大及其子孫已并天下而亦不悟專任法制以斬撻平民是謂以彊政濟彊勢故秦之天下卒斃於彊周拘於惠而不知權秦勇於威而不知本二者皆不審天下之勢也吾宋制治有縣令有郡守有轉運使以大系小絲牽繩聮總合於上雖其地在萬里外方數千里擁兵百萬而天子一呼于殿陛間三尺豎子馳傳捧詔召而歸之京師則解印趨走惟恐不及如此之勢秦之所恃以彊之勢也勢彊矣然天下之病常病於弱噫有可彊之勢如秦而反陷於弱者何也習於惠而怯於威也惠太甚而威不勝也夫其所以習於惠而惠太甚者賞數而加於無功也怯於威而威不勝者刑弛而兵不振也由賞與刑與兵之不得其道是以有弱之實著於外焉何謂弱之實曰官吏曠惰職廢不舉而敗官之罰不加嚴也多贖數赦不問有罪而典刑之禁不能行也冗兵驕狂負力幸賞而維持姑息之恩不敢節也將帥覆軍匹馬不返而敗軍之責不加重也羌胡彊盛凌壓中國而邀金繒增幣帛之恥不為怒也若此類者太弱之實也乆而不治則又將有大於此而遂浸微浸消釋然而潰以至於不可救止者乘之矣然愚以為弱在於政不在於勢是謂以弱政敗彊勢今夫一輿薪之火衆人之所憚而不敢犯者也舉而投之河則何熱之能為是以負彊秦之勢而溺於弱周之弊而天下不知其彊焉者以此也雖然政之弱非若勢弱之難治也借如弱周之勢必變易其諸侯而後彊可能也天下之諸侯固未易變易此又非一日之故也若夫弱政則用威而已矣可以朝改而夕定也夫齊古之彊國也而威王又齊之賢王也當其卽位委政不治諸侯竝侵而人不知其國之為彊國也一旦發怒裂萬家封卽墨大夫召烹阿大夫與常譽阿大夫者而發兵擊趙魏趙魏盡走請和而齊國人人震懼不敢餙非者彼誠知其政之弱而能用其威以濟其弱也况今以天子之尊藉郡縣之勢言脫於口而四方響應其所以用威之資固以完具且有天下者患不為焉有為而不可者今誠能一留意於用威一賞罰一號令一舉動無不一切出於威嚴用刑法而不赦有罪力行果斷而不牽衆人之是非用不測之刑用不測之賞而使天下之人視之如風雨雷電遽然而至截然而下不知其所從發而不可逃遁朝廷如此然後平民益務撿愼而奸民猾吏亦常恐恐然懼刑法之及其身而歛其手足不敢輒犯法此之謂彊政政彊矣為之數年而天下之勢可以復彊愚故曰乘弱之惠以養威則威發而天下震慄然則以當今之勢求所謂萬世為帝王而其大體卒不可革易者其尚威而已矣或曰當今之勢事誠無便於尚威者然孰知夫萬世之間其政之不變而必日威耶愚應之曰威者君之所恃以為君也一日而無威是無君也乆而政弊變其小節而參之以惠使不至若秦之甚可也舉而棄之過矣或者又曰王者任德不任刑任刑霸者之事非所宜言此又非所謂知理者也夫湯武皆王也桓文皆霸也武王乘紂之暴出民於炮烙斬刖之地苟又遂多殺人多刑人以為治則民之心去矣故其治一出於禮義彼湯則不然桀之惡固無以異紂然其刑不若紂暴之甚也而天下之民化其風淫惰不事法度書曰有衆率怠弗協而又諸侯昆吾氏首為亂於是誅鋤其强梗怠惰不法之人以定紛亂故記曰商人先罰而後賞至於桓文之事則又非皆任刑也柦公用管仲管仲之書好言刑故桓公之治常任刑文公長者其佐狐趙先魏皆不說以刑法其治亦未嘗以刑為本而號亦為霸而謂湯非王而文非霸也得乎故用刑不必霸而用德不必王各觀其勢之何所宜用而已然則今之勢何為不可用刑用刑何為不曰王道彼不先審天下之勢而欲應天下之務難矣王遵岩曰老泉此論於宋煞是對病之藥惜乎當時之不能用也審敵論揣料匃奴脅制中國之狀極盡事理非當時熟覩而經筭者安能道此中國内也四夷外也憂在内者本也憂在外者末也夫天下無内憂必有外懼本旣固矣盍釋其末以息肩乎曰未也古者夷狄憂在外今者夷狄憂在内釋其末可也而愚不識方今夷狄之憂爲末也古者夷狄之勢大弱則臣小弱則遁大盛則侵小盛則掠吾兵良而食足將賢而士勇則患不在中原如是而曰外憂可也今之蠻夷姑無望其臣與遁求其志止於侵掠而不可得也北人驕恣為日乆矣歲邀金繒以數十萬計昔者幸吾有西羌之變出不遜語以撼中國天子不忍使邉民重困於鋒鏑是以敵日益驕而賄日益增迨今凡數十百萬而猶慊然未滿其欲視中國如外府然則其勢又何止數十百萬也夫賄益多則賦歛不得不重賦歛重則民不得不殘故雖名為息民而其實爱其死而殘其生也名為外憂而其實憂在内也外憂之不去聖人猶且恥之内憂而不為之計愚不知天下之所以乆安而無變也古者匈奴之彊不過冒頓當暴秦刻剝劉項戰奪之後中國溘然矣以今度之彼宜遂入踐中原如決大河潰蟻壤然卒不能越其疆以有吾尺寸之地何則中原之彊固皆百倍於匃奴雖積衰新造而猶足以制之也五代之際中原無君晉瑭苟一時之利以子行事匃奴割幽燕之地以資其彊大孺子繼立大臣外叛匃奴掃境來宼兵不血刃而京師不守天下被其禍匈奴自是始有輕中原之心以為可得而取矣及吾宋景德中大舉來寇章聖皇帝一戰而却之遂與之盟以和夫人之情勝則狃狃則敗敗則懲懲則勝匃奴狃石晉之勝而有景德之敗懲景德之敗而愚未知其所勝甚可懼也雖然數十年之間能以無大變者何也匃奴之謀必曰我百戰而勝人人雖屈而我亦勞馳一介入中國以形凌之以勢邀之歲得金錢數十百萬如此數十歲我益數百千萬而中國損數百千萬吾日以富中國日以貧然後足以有為也天生北狄嘗自謂天之驕子其見利而争者彼之常也今則不然邉境之上豈無可乘之釁使之來宼大足以奪一郡小亦足以殺掠數千人而彼不以動其心者此其志非小也將以蓄其銳而伺吾隙以伸其所大欲故不忍以小利而敗其遠謀古人有言曰為虺弗摧為虵奈何匃奴之勢日長炎炎今也柔而養之以冀其卒無大變其亦惑矣且今中國之所以竭生民之力以奉其所欲而猶恐恐焉懼一物之不稱其意者非謂中國之力不足以支其怒耶然以愚度之當今中國雖敝萬無有如石晉可乘之勢者匃奴之力雖足以犯邉然今十數年間吾可以必無犯邉之憂何也非畏吾也其志不止犯邉也其志不止犯邉而力又未足以成其所欲為則其心惟恐吾之一旦絶其好以失吾之厚賂也然而驕傲不肯少屈者何也其意曰邀之而後固也鷙鳥將擊必匿其形昔者冒頓欲以攻漢漢使至輒匿其壯士健馬故兵法曰辭卑者進也辭彊者退也今匈奴之君臣莫不張形勢以夸我此其志不欲戰明矣闔閭之入楚也因唐蔡勾踐之入吳也因齊晉匈奴誠欲與吾戰耶曩者陜西有元昊之叛河朔有王則之變嶺南有智髙之亂此亦可乘之勢矣然終以不動則其志之不欲戰又明矣吁彼不欲戰而我遂不與戰則彼旣得其志矣兵法曰用其所欲行其所能廢其所不能於敵反是今無乃與此異乎且匈奴之力旣未足以伸其所大欲而奪一郡殺掠數千人之利彼又不以動其心則我勿賂而已勿賂而彼以爲辭則對曰爾何功於吾歲欲吾賂吾有戰而已賂不可得也雖然天下之人必曰此愚人之計也天下孰不知賂之為害而勿賂之爲利顧勢不可耳愚以為不然當今邊塞之勢如漢七國之勢昔者髙祖急於滅項籍故舉數千里之地以王諸將項籍死天下定而諸將之地因遂不可削當是時非劉氏而王者八國髙祖懼其且為變故大封吳楚齊趙同姓之國以制之旣而信越布綰皆誅死而吳楚齊趙之彊反無以制當是時諸侯王雖名為臣而其實莫不有帝制之心膠東膠西濟南又從而和之於是擅爵人赦死罪戴黃屋刺客公行匕首交於京師罪至彰也勢至逼也然當時之人猶且徜徉容與若不足慮月不圗歲朝不計夕循循而摩之煦煦而吹之幸而無大變以及於孝景之世有謀臣曰鼂錯始議削諸侯地以損其權天下皆曰諸侯必且反錯曰固也削亦反不削亦反削之則反疾而禍小不削則反遲而禍大吾懼其不及今反也天下皆曰鼂錯愚吁七國之禍期於不免與其發於遠而禍大不若發於近而禍小以小禍易大禍雖三尺童子皆知其當然而其所以不與錯者彼皆不知其勢將有遠禍與知其勢將有遠禍而度巳不及見謂可以寄之後人以苟免吾身者也然則錯為一身謀則愚而為天下謀則智人君又安可捨天下之謀而用一身之謀哉今者匈奴之彊不減於七國而天下之人又用當時之議因循維持以至於今方且以為無事而愚以為天下之大計不如勿賂勿賂則變疾而禍小賂之則變遲而禍大畏其疾也不若畏其大樂其遲也不若樂其小天下之勢如坐敝船之中駸駸乎將入於深淵不及其尚淺也舎之而求所以自生之道而以濡足為解者是固夫覆溺之道也聖人除患於未萌然後能轉禍而為福今也不幸養之以至此而近憂小患又憚而不决則是遠憂大患終不可去也赤壁之戰惟周瑜呂䝉知其勝伐吳之役惟羊祜張蕐以為是然則宏遠深切之謀固不能合庸人之意此鼂錯所以為愚也雖然錯之謀猶有遺憾何者錯知七國必反而不為備反之計山東變起而關内騷動今者匈奴之禍又不若七國之難制七國反中原半為敵國匈奴叛中國以全制其後此又易為謀也然則謀之奈何曰匈奴之計不過三一曰聲二曰形三曰實匈奴謂中國怯乆矣以吾為終不敢與之抗且其心嘗欲固前好而得厚賂以養其力今也遽絶之彼必曰戰而勝不如坐而得賂之為利也蕐人怯吾可以先聲脅之彼將復賂我於是宣言於遠近我將以某日圍某所以某日攻某所如此謂之聲命邉郡休士卒偃旗鼓寂然若不聞其聲聲旣不能動則彼之計將出於形除道翦棘多為疑兵以臨吾城如此謂之形深溝固壘清野以待寂然若不見其形形又不能動則技止此矣將遂練兵秣馬以出於實實而與之戰破之易耳彼之計必先出於聲與形而後出於實者出於聲與形期我懼而以重賂請和也出於實不得已而與我戰以幸一時之勝也夫勇者可以施之於怯不可以施之於智今夫呌呼跳踉以氣先者世之所謂善鬬者也雖然蓄全力以待之則未始不勝彼呌呼者聲也跳踉者形也無以待之則聲與形者亦足以乘人於卒不然徒自弊其力於無用之地是以不能勝也韓許公節度宣武軍李師古忌公嚴整使來告曰吾將假道伐滑公曰爾能越吾界為盗耶有以相待無為虚言滑帥告急公使謂曰吾在此公安無恐或告除道翦棘兵且至矣公曰兵來不除道也師古詐窮遷延以遁愚故曰彼計出於聲與形而不能動則技止此矣與之戰破之易耳方今匈奴之君有内難新立意其必易與隣國之難霸王之資也且天與不取將受其弊賈誼曰大國之王㓜弱未壯漢之所置傅相方握其事數年之後大抵皆冠血氣方剛漢之傅相以病而賜罷當是之時而欲為安雖堯舜不能嗚呼是七國之勢也唐宋八大家文鈔卷一百十二
