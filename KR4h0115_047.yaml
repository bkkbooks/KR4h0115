body:
  text: 唐宋八大家文鈔卷四十四明茅坤撰廬陵文鈔十六史論五代史職方考論數十年之間易世者五其所當州郡分割畫次如掌太史公所欲為而不能者嗚呼三代以上莫不分土而治也後世鑒古矯失始郡縣天下而自秦漢以來為國孰與三代長短及其亡也未始不分至或無地以自存焉蓋得其要則雖萬國而治失其所守則雖一天下不能以容豈非一本於道德哉唐之盛時雖名天下為十道而其勢未分暨其衰也置軍節度號為方鎮鎮之大者連州十餘小者猶兼三四故其兵驕則逐帥帥彊則叛上土地為其世有干戈起而相侵天下之勢自兹而分然唐自中世多故矣其興衰救難常倚鎮兵扶持而侵凌亂亡亦終以此豈其利害之理然歟自僖昭以來日益割裂梁初天下别為十一南有吳浙荆湖閩漢西有岐蜀北有燕晉而朱氏所有七十八州以為梁莊宗初起并代取幽滄有州三十五其後又取梁魏博等十有六州合五十一州以滅梁岐王稱臣又得其州七同光破蜀已而復失惟得秦鳳階成四州而營平二州陷于契丹其增置之州一合一百二十三州以為唐石氏入立獻十有六州于契丹而得蜀金州又增置之州一合一百九州以為晉劉氏之初秦鳳階成復入于蜀隱帝時增置之州一合一百六州以為漢郭氏代漢十州入于劉旻世宗取秦鳳階成瀛莫及淮南十四州又增置之州五而廢者三合一百一十八州以為周宋興因之此中國之大略也其餘外屬者彊弱相并不常其得失至于周末閩已先亡而在者七國自江以下二十一州為南唐自劎以南及山南西道四十六州為蜀自湖南北十州為楚自浙東西十三州為吳越自嶺南北四十七州為南漢自太原以北十州為東漢而荆歸峽三州為南平合中國所有二百六十八州而軍不在焉唐之封疆遠矣前史備載而羈縻寄治虛名之州在其間五代亂世文字不完而時有廢省又或陷于夷狄不可考究其詳其可見者具之如譜自唐有方鎮而史官不録于地理之書以謂方鎮兵戎之事非職方所掌故也然而後世因習以軍目地而沒其州名又今置軍者徒以虛名升建為州府之重此不可以不書也州縣凡唐故而廢于五代若五代所置而見于今者及縣之割𨽻今因之者皆宜列以備職方之考其餘嘗置而復廢嘗改割而復舊者皆不足書山川物俗職方之掌也五代短世無所遷變故亦不復録而録其方鎮軍名以與前史互見之云五代史司天考論漢以來說災異者多並不如歐陽公之言為正昔孔子作春秋而天人備豫述本紀書人而不書天豫何敢異於聖人哉其文雖異其意一也自堯舜三代以來莫不稱天以舉事孔子刪詩書不去也蓋聖人不絶天於人亦不以天參人絶天於人則天道廢以天參人則人事惑故常存而不究也春秋雖書日食星變之類孔子未嘗道其所以然者故其弟子之徒莫得有所述於後世也然則天果與於人乎果不與於人乎曰天吾不知質諸聖人之言可也易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙此聖人極論天人之際最詳而明者也其於天地鬼神以不可知為言其可知者人而已夫日中則昃盛衰必復天吾不知吾見其虧益於物者矣草木之成者變而衰落之物之下者進而流行之地吾不知吾見其變流於物者矣人之貪滿者多禍其守約者多福鬼神吾不知吾見人之禍福者矣天地鬼神不可知其心則因其著於物者以測之故據其迹之可見者以為言曰虧益曰變流曰害福若人則可知者故直言其情曰好惡其知與不知異辭也參而會之與人無以異也其果與於人乎不與於人乎則所不知也以其不可知故常尊而遠之以其與人無所異也則修吾人事而已人事者天意也書曰天視自我民視天聽自我民聽未有人心悅於下而天意怒於上者未有人理逆於下而天道順於上者然則王者君天下子生民布德行政以順人心是之謂奉天至於三辰五星常動而不息不能無盈縮差忒之變而占之有中有不中不可以為常者有司之事也本紀所述人君行事詳矣其興亡治亂可以見至於三辰五星逆順變見有司之所占者故以其官志之以備司天之所考嗚呼聖人既沒而異端起自秦漢以下學者惑於災異矣天文五行之說不勝其繁也豫之所述不得不異乎春秋也考者可以知焉五代史前蜀王建世家論讀韓公獲麟解與此論世之言祥瑞者捫心退矣嗚呼自秦漢以來學者多言祥瑞雖有善辨之士不能祛其惑也豫讀蜀書至於龜龍麟鳳騶虞之類世所謂王者之嘉瑞莫不畢出於其國異哉然考王氏之所以興亡成敗者可以知之矣或以為一王氏不足以當之則是時天下治亂可以知之矣龍之為物也以不見為神以升雲行天為得志今偃然暴露其形是不神也不上於天而下見於水中是失職也然其一何多歟可以為妖矣鳳凰鳥之遠人者也昔舜治天下政成而民悅命䕫作樂樂聲和鳥獸聞之皆鼓舞當是之時鳳凰適至舜之史因并記以為美後世因以鳳來為有道之應其後鳳凰數至或出於庸君繆政之時或出於危亡大亂之際是果為瑞哉麟獸之遠人者也昔魯哀公出獵得之而不識蓋索而獲之非其自出也故孔子書於春秋曰西狩獲麟者譏之也西狩非其遠也獲麟惡其盡取也狩必書地而哀公馳騁所涉地多不可遍以名舉故書西以包衆地謂其舉國之西皆至也麟人罕識之獸也以見公之窮山竭澤而盡取至於不識之獸皆搜索而獲之故曰譏之也聖人已沒而異端之說興乃以麟為王者之瑞而附以符命䜟緯詭怪之言鳳嘗出於舜以為瑞猶有說也及其後出於亂世則可以知其非瑞矣若麟者前有治國如堯舜禹湯文武周公之世未嘗一出其一出而當亂世然則孰知其為瑞哉龜𤣥物也汚泥川澤不可勝數其死而貴于卜官者用適有宜爾而戴氏禮以其在宮沼為王者難致之瑞戴禮雜出於諸家其失亦已多矣騶虞吾不知其何物也詩曰吁嗟乎騶虞賈誼以為騶者文王之囿虞虞官也當誼之時其說如此然則以之為獸者其出於近世之說乎夫破人之惑者難與爭於篤信之時待其有所疑焉然後從而攻之可也麟鳳龜龍王者之瑞而出於五代之際又皆萃於蜀此雖好為祥瑞之說者亦可疑也因其可疑而攻之庶幾惑者有以思焉五代史周臣傳論名言嗚呼作器者無良材而有良匠治國者無能臣而有能君蓋材待匠而成臣待君而用故曰治國譬之於奕知其用而置得其處者勝不知其用而置非其處者敗敗者臨棊注目終日而勞心使善奕者視焉為之易置其處則勝矣勝者所用敗者之棊也興國所用亡國之臣也王朴之材誠可謂能矣不遇世宗何所施哉世宗之時外事征伐攻取戰勝內修制度議刑法定律厯講求禮樂之遺文所用者五代之士也豈皆愚怯於晉漢而材智於周哉惟知所用爾夫亂國之君常置愚不肖於上而彊其不能以暴其短惡置賢智於下而泯沒其材能使君子小人皆失其所而身蹈危亡治國之君能置賢知於近而置愚不肖於遠使君子小人各適其分而身享安榮治亂相去雖遠甚而其所以致之者不多也反其所置而已嗚呼自古治君少而亂君多況於五代士之遇不遇者可勝歎哉五代史唐六臣傳論一朋黨之禍至唐而極論朋黨之文至歐陽子而極甚哉白馬之禍悲夫可為流涕者矣然士之生死豈其一身之事哉初唐天祐三年梁王欲以嬖吏張廷範為太常卿唐宰相裴樞以謂太常卿唐常以清流為之廷範乃梁客將不可梁王由此大怒曰吾嘗謂裴樞純厚不陷浮薄今亦為此邪是嵗四月彗出西北掃文昌軒轅天市宰相桞璨希梁王旨歸其譴於大臣於是左僕射裴樞獨孤損右僕射崔遠守太保致仕趙崇兵部侍郎王贊工部尚書王溥吏部尚書陸扆皆以無罪貶同日賜死於白馬驛凡縉紳之士與唐而不與梁者皆誣以朋黨坐貶死者數百人而朝廷為之一空明年三月唐哀帝遜位於梁遣中書侍郎同中書門下平章事張文蔚為册禮使禮部尚書蘇循為副中書侍郎同中書門下平章事楊涉為押傳國寶使翰林學士中書舍人張䇿為副御史大夫薛貽矩為押金寶使尚書左丞趙光逢為副四月甲子文蔚等自上源驛奉册寶乘輅車導以金吾仗衛太常鹵簿朝梁於金祥殿梁王袞冕南靣臣文蔚臣循奉册升殿進讀己臣涉臣䇿奉傳國璽臣貽矩臣光逄奉金寶以次升進讀已降率文武百官北靣舞蹈再拜賀夫一太常卿與社稷孰為重使樞等不死尚惜一卿其肯以國與人乎雖樞等之力未必能存唐然必不亡唐而獨存也嗚呼唐之亡也賢人君子既與之共盡其餘在者皆庸懦不肖傾險獪猾趨利賣國之徒也不然安能䝉恥忍辱於梁庭如此哉作唐六臣傳五代史唐六臣傳論二文甚圓而所見世情特透嗚呼始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人哉豫嘗至繁城讀魏受禪碑見漢之羣臣稱魏功德而大書深刻自列其姓名以夸耀于世又讀梁實録見文蔚等所為如此未嘗不為之流涕也夫以國豫人而自夸耀及遂相之此非小人孰能為也漢唐之末舉其朝皆小人也而其君子者何在哉當漢之亡也先以朋黨禁錮天下賢人君子而立其朝者皆小人也然後漢從而亡及唐之亡也又先以朋黨盡殺朝廷之士而其餘存者皆庸懦不肖傾險之人也然後唐從而亡夫欲空人之國而去其君子者必進朋黨之說欲孤人主之勢而蔽其耳目者必進朋黨之說欲奪國而與人者必進朋黨之說夫為君子者固嘗寡過小人欲加之罪則有可誣者有不可誣者不能遍及也至欲舉天下之善求其類而盡去之惟指以為朋黨耳故親戚故舊謂之朋黨可也交游執友謂之朋黨可也宦學相同謂之朋黨可也門生故吏謂之朋黨可也是數者皆其類也皆善人也故曰欲空人之國而去其君子者惟以朋黨罪之則無免者矣夫善善之相樂以其類同此自然之理也故聞善者必相稱譽稱譽則謂之朋黨得善者必相薦引薦引則謂之朋黨使人聞善不敢稱譽人主之耳不聞有善于下矣見善不敢薦則人主之目不得見善人矣善人日遠而小人日近則為人主者倀倀然誰與之圖治安之計哉故曰欲孤人主之勢而蔽其耳目者必用朋黨之說也一君子存羣小人雖衆必有所忌而有所不敢為惟空國而無君子然後小人得肆志於無所不為則漢魏唐梁之際是也故曰可奪國而與人者由其國無君子空國而無君子由以朋黨而去之也嗚呼朋黨之說人主可不察哉傳曰一言可以喪邦者其是之謂歟五代史馮道傳論借婦人女子以感慨當世儒生有三歎遺音傳曰禮義廉恥國之四維四維不張國乃滅亡善乎管生之能言也禮義治人之大法廉恥立人之大節蓋不亷則無所不取不恥則無所不為人而如此則禍亂敗亡亦無所不至況為大臣而無所不取無所不為則天下其有不亂國家其有不亡者乎豫讀馮道長樂老叙見其自述以為榮其可謂無廉恥者矣則天下國家可從而知也豫於五代得全節之士三死事之臣十有五而怪士之被服儒者以學古自名而享人之祿任人之國者多矣然使忠義之節獨出於武夫戰卒豈於儒者果無其人哉豈非高節之士惡時之亂薄其世而不肯出歟抑君天下者不足顧而莫能致之歟孔子以謂十室之邑必有忠信豈虛言也哉豫嘗得五代時小說一篇載王凝妻李氏事以一婦人猶能如此則知世固常有其人而不得見也凝家青徐之間為虢州司戶參軍以疾卒於官凝家素貧一子尚幼李氏攜其子負其遺骸以歸東過開封止旅舍旅舍主人見其婦人獨攜一子而疑之不許其宿李氏顧天已暮不肻去主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執邪不可以一手并汚吾身即引斧自斷其臂路人見者環聚而嗟之或為之彈指或為之泣下開封尹聞之白其事於朝官為賜藥封瘡厚恤李氏而笞其主人者嗚呼士不自愛其身而忍恥以偷生者聞李氏之風宜少知愧哉五代史王進傳論進以疾足善走秉旄節五代名器之濫極矣歐公故憤惋而悲酸嗚呼豫述舊史至于王進之事未嘗不廢書而歎曰甚哉五代之君皆武人崛起其所與俱勇夫悍卒各裂土地封侯王何異豺狼之牧斯人也雖其附託遭遇出於一時之幸然猶必皆橫身陳敵非有百夫之勇則必一日之勞至如進者徒以疾足善走而秉旄節何其甚歟豈非名器之用隨世而輕重者歟世治則君子居之而重世亂則小人易得而輕歟抑因緣僥幸未始不有而尤多於亂世既其極也遂至於是歟豈其又有甚於是者歟當此之時為國長者不過十餘年短者三四年至一二年天下之人視其上易君代國如更戍長無異蓋其輕如此況其下者乎如進等者豈足道哉易否泰消長君子小人常相上下視在上者如進等則其在下可知矣豫書進事所以哀斯人之亂而見當時賢人君子之在下者可勝道哉可勝道哉五代史一行傳論此一段議論史漢以來所不到者嗚呼五代之亂極矣傳所謂天地閉賢人隱之時歟當此之時臣弒其君子弒其父而搢紳之士安其祿而立其朝充然無復廉恥之色者皆是也吾以謂自古忠臣義士多出於亂世而怪當時可道者何少也豈果無其人哉雖曰干戈興學校廢而禮義衰風俗隳壞至於如此然自古天下未嘗無人也吾意必有潔身自負之士嫉世遠去而不可見者自古材賢有韞於中而不見於外或窮居陋巷委身草莽雖顏子之行不遇仲尼而名不彰況世變多故而君子道消之時乎吾又以謂必有負材能修節義而沉淪於下泯沒而無聞者求之傳記而亂世崩離文字殘缺不可復得然僅得者四五人而已處乎山林而羣麋鹿雖不足以為中道然與其食人之祿俯首而包羞孰若無愧於心放身而自得吾得二人焉曰鄭遨張薦明勢利不屈其心去就不違其義吾得一人焉曰石昻茍利於君以忠獲罪何必自明有至死而不言者此古之義士也吾得一人焉曰程福贇五代之亂君不君臣不臣父不父子不子至於兄弟夫婦人倫之際無不大壞而天理幾乎其滅於此之時能以孝悌自修於一鄉而風行於天下者猶或有之然其事迹不著而無可紀次獨其名氏或因見於書者吾亦不敢沒而其略可録者吾得一人焉曰李自倫作一行傳五代史宦者傳論通篇如傾水銀於地而百孔千竅無所不入其機員而其情鬯自古宦者亂人之國其源深於女禍女色而已宦者之害非一端也蓋其用事也近而習其為心也專而忍能以小善中人之意小信固人之心使人主必信而親之待其已信然後懼以禍福而把持之雖有忠臣碩士列於朝廷而人主以為去已疏遠不若起居飲食前後左右之親為可恃也故前後左右者日益親則忠臣碩士日益疏而人主之勢日益孤勢孤則懼禍之心日益切而把持者日益牢安危出其喜怒禍患伏於帷闥則嚮之所謂可恃者乃所以為患也患已深而覺之欲與疏遠之臣圖左右之親近緩之則養禍而益深急之則挾人主以為質雖有聖智不能與謀謀之而不可為為之而不可成至其甚則俱傷而兩敗故其大者亡國其次亡身而使姦豪得借以為資而起至抉其種類盡殺以快天下之心而後已此前史所載宦者之禍常如此者非一世也夫為人主者非欲養禍於內而疏忠臣碩士於外蓋其漸積而勢使之然也夫女色之惑不幸而不悟則禍斯及矣使其一悟捽而去之可也宦者之為禍雖欲悔悟而勢有不得而去也唐昭宗之事是己故曰深於女禍者謂此也可不戒哉五代史伶官傳論莊宗雄心處與歐陽公之文可上下千古嗚呼盛衰之理雖曰天命豈非人事哉原莊宗之所以得天下與其所以失之者可以知之矣世言晉王之將終也以三矢賜莊宗而告之曰梁吾仇也燕王吾所立契丹與吾約為兄弟而背晉以歸梁此三者吾遺恨也與爾三矢爾其無忘乃父之志莊宗受而藏之於廟其後用兵則遣從事以一少牢告廟請其矢盛以錦囊負而前驅及凱旋而納之方其係燕父子以組函梁君臣之首入于太廟還矢先王而告以成功其意氣之盛可謂壯哉及仇讐已滅天下已定一夫夜呼亂者四應蒼皇東出未見賊而士卒離散君臣相顧不知所歸至於誓天斷髮泣下沾襟何其衰也豈得之難而失之易歟抑本其成敗之迹而皆自於人歟書曰滿招損謙受益憂勞可以興國逸豫可以亡身自然之理也故方其盛也舉天下之豪傑莫能與之爭及其衰也數十伶人困之而身死國滅為天下笑夫禍患常積於忽微而智勇多困於所溺豈獨伶人也哉唐宋八大家文鈔卷四十四
