body:
  text: 唐宋八大家文鈔巻一百六十三明茅坤撰潁濱文鈔十九記王氏清虗堂記淺然却澹宕王君定國為堂於其居室之西前有山石瓌竒琬琰之觀後有竹林隂森氷雪之植中置圖史百物而名之曰清虗日與其逰賢士大夫相從於其間嘯歌吟咏舉酒相屬油然不知日之既夕凡遊於其堂者蕭然如入於山林髙僧逸人之居而忘其京都塵土之鄉也或曰此其所以為清虚者耶客曰不然凡物自其濁者視之則清者為清自其實者視之則虛者為虚故清者以濁為汙而虚者以實為礙然而皆非物之正也葢物無不清亦無不虚者雖泥塗之渾而至清存焉雖山石之堅而至虚存焉夫惟清濁一觀而虚實同體然後與物無匹而至清且虚者出矣今夫王君生於世族棄其綺紈膏梁之習而跌宕於圖書翰墨之囿沉酣縱恣洒然與衆殊好至於鍾王虞褚顏張之逸迹顧陸呉盧王韓之遺墨雜然前陳贖之傾囊而不厭慨乎思見其人而不得則既與世俗逺矣然及其年日益壯學日益篤經涉世故出入禍患顧疇昔之好知其未離乎累也乃始發其箱箧出其玩好投以與人而不惜將曠焉黜去外累而獨求諸内意其有真清虚者在焉而未見之也王君浮沉京師多世外之交而又娶於梁張公氏張公超達逺騖體乎至道而順乎流俗君嘗試以吾言問之其必有得於是矣唐荆川曰此文亦有箴規言其所以為清虚者不足為清虚也議論亦本莊子南康直節堂記文亦淺然自是風人之㫖南康太守㕔事之東有堂曰直節朝請大夫徐君望聖之所作也庭有八杉長短鉅細若一直如引繩髙三尋而後枝葉附之岌然如掲太常之旗如建承露之莖凛然如公卿大夫髙冠長劒立於王庭有不可犯之色堂始為軍六曹吏所居杉之隂府史之所蹲伏而簿書之所填委莫知貴也君見而憐之作堂而以直節命焉夫物之生未有不直者也不幸而風雨撓之巖石軋之然後委曲隨物不能自保雖竹箭之良松栢之堅皆不免於此惟杉能遂其性不扶而直其生能傲氷雪而死能利棟宇者與竹栢同而以直過之求之於人葢所謂不待文王而興者耶徐君温良汎愛所居以循吏稱不為皦察之政而行不失於直觀其所説而其為人可得也詩曰惟其有之是以似之堂成君以客飲於堂上客醉而歌曰吾欲為曲為曲必屈曲可為乎吾欲為直為直必折直可為乎有如此杉特立不倚散柯布葉安而不危乎清風吹衣飛雪滿庭顔色不變君來燕嬉乎封植灌溉剪伐不至杉不自知而人是依乎廬山之民升堂見杉懐思其人其無巳乎歌闋而罷武昌九曲亭記情興心思俱入佳處子瞻遷於齊安廬於江上齊安無名山而江之南武昌諸山陂陁蔓延澗谷深密中有浮圖精舍西曰西山東曰寒谿依山臨壑隠蔽松櫪蕭然絶俗車馬之迹不至每風止日出江水伏息子瞻杖䇿載酒乗漁舟亂流而南山中有二三子好客而喜游聞子瞻至幅巾迎笑相攜徜徉而上窮山之深力極而息埽葉席草酌酒相勞意適忘反徃徃留宿於山上以此居齊安三年不知其久也然將適西山行於松栢之間羊腸九曲而獲少平遊者至此必息倚怪石䕃茂木俯視大江仰瞻陵阜旁矚溪谷風雲變化林麓向背皆效於左右有廢亭焉其遺址甚狹不足以席衆客其旁古木數十其大皆百圍千尺不可加以斤斧子瞻每至其下輒睥睨終日一旦大風雷雨拔去其一斤其所據亭得以廣子瞻與客入山視之笑曰兹欲以成吾亭耶遂相與營之亭成而西山之勝始具子瞻於是最樂昔余少年從子瞻遊有山可登有水可浮子瞻未始不褰裳先之有不得至為之悵然移日至其翩然獨徃逍遥泉石之上擷林卉拾澗實酌水而飲之見者以為僊也葢天下之樂無窮而以適意為悦方其得意萬物無以易之及其既厭未有不洒然自笑者也譬之飲食雜陳於前要之一飽而同委於臭腐夫孰知得失之所在惟其無愧於中無責於外而姑寓焉此子瞻之所以有樂於是也遺老齋記有老人之㫖庚辰之冬予䝉恩歸自南荒客於潁川思歸而不能諸子憂之曰父母老矣而居室未完吾儕之責也則相與卜築五年而有成其南修竹古栢蕭然如野人之家乃闢其四楹加明窻曲檻為燕居之齋齋成求所以名之予曰予潁濱遺老也盍以遺老名之汝曹志之予幼從事於詩書凡世人之所能茫然不知也年二十有三朝廷方求直言有以予應詔者予采道路之言論宫掖之秘自謂必以此獲罪而有司果以為不孫上獨不許曰吾以直言求士士以直言告我今而黜之天下其謂我何宰相不得己寘之下第自是流落凡二十餘年及宣后臨朝擢為右司諌凡有所言多聽納者不五年而與聞國政葢予之遭遇者再皆古人所希有然其間與世俗相從事之不如意者十常六七雖號為得志而實不然予聞之樂莫善於如意而憂莫慘於不如意今予退居一室之間杜門却掃不與物接心之所可未嘗不行心所不可未嘗不止行止未嘗少不如意則予平生之樂未有善於今日者也汝曹志之學道而求寡過如予今日之處遺老齋可也東軒記其恬曠之趣不如文忠公之超然臺記而亦自悽愴可誦余既以罪謫監筠州鹽酒税未至大雨筠水泛溢蔑南市登北岸敗刺史府門鹽酒税治舍俯江之漘水患尤甚既至敝不可處乃告於郡假部使者府以居郡憐其無歸也許之嵗十二月乃克支其欹斜補其圯缺闢聽事堂之東為軒種杉二本竹百箇以為宴休之所然鹽酒税舊以三吏共事余至其二人者適皆罷去事委于一晝則坐市區鬻鹽沽酒税豚魚與市人爭尋尺以自効莫歸筋力疲廢輒昏然就睡不知夜之既旦旦則復出營職終不能安於所謂東軒者每旦莫出入其旁顧之未嘗不啞然自笑也余昔少年讀書竊嘗怪以顔子簞食瓢飲居於陋巷人不堪其憂顏子不改其樂私以為雖不欲仕然抱關擊柝尚可自養而不害於學何至困辱貧窶自苦如此及來筠州勤勞鹽米之間無一日之休雖欲棄塵垢解羈縶自放於道徳之場而事每劫而留之然後知顔子之所以甘心貧賤不肯求斗升之祿以自給者良以其害於學故也嗟夫士方其未聞大道沉酣勢利以玉帛子女自厚自以為樂矣及其循理以求道落其華而收其實從容自得不知夫天地之為大與死生之為變而況其下者乎故其樂也足以易窮餓而不怨雖南面之王不能加之葢非有徳不能任也余方區區欲磨洗濁汙希聖賢之萬一自視缺然而欲庶㡬顏氏之福宜其不可得哉若夫孔子周行天下髙為魯司寇下為乗田委吏惟其所遇無所不可彼葢達者之事而非學者之所望也余既以譴來此雖知桎梏之害而勢不得去獨幸嵗月之乆世或哀而憐之使得歸復田里治先人之弊廬為環堵之室而居之然後追求顔氏之樂懐思東軒優游以忘其老然而非所敢望也待月軒記文不著意而援隠者之言論身與性似入解昔予遊廬山見隠者焉為予言性命之理曰性猶日也身猶月也予疑而詰之則曰人始有性而巳性之所寓為身天始有日而巳日之所寓為月日出於東方其出也萬物賴焉有目者以視有手者以執有足者以履至於山石草木亦非日不遂及其入也天下黯然無物不廢然日則未始有變也惟其所寓則有盈闕一盈一闕者月也惟性亦然出生入死出而生者未嘗増也入而死者未嘗耗也性一而巳惟其所寓則有生死一生一死者身也雖有生死然而此生彼未嘗息也身與月皆然古之治術者知之故日出於卯謂之命月之所在謂之身日入地中雖未嘗變而不為世用復出於東然後物無不覩非命而何月不自明由日以為明以日之逺近為月之盈闕非身而何此術也而合於道世之治術者知其説不知其所以説也予異其言而志之乆矣築室於斯闢其東南為小軒之前廓然無障㡬與天際每月之朢開户以須月之至月入吾軒則吾坐於軒上與之徘徊而不去一夕舉酒延客道隠者之語客漫不喻曰吾嘗治術矣初不聞是説也予為之反復其理客徐悟曰唯唯因志其言于壁洛陽李氏園池詩記文不著思而自風雅洛陽古帝都其人習於漢唐衣冠之遺俗居家治園池築臺榭植草木以為嵗時遊觀之好其山川風氣清明盛麗居之可樂平川廣衍東西數百里嵩髙少室天壇王屋岡巒靡迤四顧可挹伊洛瀍澗流出平地故其山林之勝泉流之潔雖其閭閻之人與其公侯共之一畝之宫上矚青山下聽流水竒花脩竹布列左右而其貴家巨室園囿亭觀之盛實甲天下若夫李侯之園洛陽之所以一二數者也李氏家世名將大父濟州於太祖皇帝為布衣之舊方用兵河東百戰百勝烈考寧州事章聖皇帝守雄州十有四年繕守備撫士卒精於用間其功烈尤竒李侯以將家子結髪從仕歴踐父祖舊職勤勞慎密老而不懈實能世其家既得謝居洛陽引水植竹求山谷之樂士大夫之在洛陽者皆喜從之遊葢非獨為其園也凡將以講聞濟寧之餘烈而究觀祖宗用兵任將之遺意其方略逺矣故自朝之公卿皆因其園而贈之以詩凡若干篇仰以嘉其先人而俯以善其子孫則雖洛陽之多大家世俗葢未易以園囿相髙也熈寧甲寅李侯之年既八十有三矣而視聴不衰筋力益强日増治其園而徃遊焉將列詩於石其子遵度官於濟南實從予遊以侯命求文以記予不得辭遂為之書熈寧七年十一月十七日記黄州快哉亭記入宋調而其風㫖自佳江出西陵始得平地其流奔放肆大南合湘沅北合漢沔其勢益張至於赤壁之下波流浸灌與海相若清河張君夢得謫居齊安即其廬之西南為亭以覽觀江流之勝而余兄子瞻名之曰快哉葢亭之所見南北百里東西一舍濤瀾洶湧風雲開闔晝則舟楫出没於其前夜則魚龍悲嘯於其下變化倐忽動心駭目不可乆視今乃得玩之几席之上舉目而足西望武昌諸山岡陵起伏草木行列烟消日出漁夫樵父之舍皆可指數此其所以為快哉者也至於長洲之濵故城之墟曹孟徳孫仲謀之所睥睨周瑜陸遜之所馳騖其流風遺迹亦足以稱快世俗昔楚襄王從宋玉景差於蘭臺之宫有風颯然至者王披襟當之曰快哉此風寡人所與庶人共者耶宋玉曰此獨大王之雄風耳庶人安得共之玉之言葢有諷焉夫風無雄雌之異而人有遇不遇之變楚王之所以為樂與庶人之所以為憂此則人之變也而風何與焉士生於世使其中不自得將何往而非病使其中坦然不以物傷性將何適而非快今張君不以謫為患收㑹計之餘功而自放山水之間此其中宜有以過人者將蓬户甕牖無所不快而況乎濯長江之清流挹西山之白雲窮耳目之勝以自適也哉不然連山絶壑長林古木振之以清風照之以明月此皆騷人思士之所以悲傷憔悴而不能勝者烏覩其為快也哉齊州閔子廟記按閔子所以不仕季氏為一篇柱子其言亦有見歴城之東五里有丘焉曰閔子之墓墳而不廟秩祀不至邦人不寧守土之吏有將舉焉而不克者熈寧七年天章閣待制右諌議大夫濮陽李公來守濟南越明年政修事治邦之耋老相與來告曰此邦之舊有如閔子而不廟食豈不大闕公唯不知茍知之其有不飭公曰噫信其可以緩於是鳩工為祠堂且使春秋修其常事堂成具三獻焉籩豆有列儐相有位百年之廢一日而舉學士大夫觀禮祠下咨嗟涕洟有言曰惟夫子生於亂世周流齊魯宋衛之間無所不仕其弟子之髙第亦咸仕於諸國宰我仕齊子貢冉有子游仕魯季路仕衛子夏仕魏弟子之仕者亦衆矣然其稱徳行者四人獨仲弓常為季氏宰其上三人皆未嘗仕季氏嘗欲以閔子為費宰閔子辭曰如有復我者則吾必在汶上矣且以夫子之賢猶不以仕為汙也而三子之不仕獨何歟言未卒有應者曰子獨不見夫適東海者乎望之茫洋不知其邊即之汗漫不測其深其舟如蔽天之山其㠶如浮空之雲然後履風濤而不僨觸蛟蜃而不讋若夫以江河之舟楫而跨東海之灘則亦十里而返百里而溺不足以經萬里之害矣方周之衰禮樂崩弛天下大壊而有欲救之譬如涉海有甚焉者今夫夫子之不顧而仕則其舟楫足恃也諸子之汲汲而㤀返葢亦有陋舟而將試焉則亦隨其力之所及而巳矣若夫三子願為夫子而未能下顧諸子而以為不足為也是以止而有待夫子嘗曰世之學栁下恵者未有若魯獨居之男子吾於三子亦云衆曰然退而書之遂刻于石上髙縣學記雅古者以學為政擇其鄉閭之俊而納之膠庠示之以詩書禮樂揉而熟之既成使歸更相告語以及其父子兄弟故三代之間養老饗賓聴訟受成獻馘無不由學習其耳目而和其志氣是以其政不煩其刑不瀆而民之化之也速然考其行事非獨於學然也郊社祖廟山川五祀凡禮樂之事皆所以為政而教民不犯者也故其稱曰政者君之所以藏身葢古之君子正顏色動容貎出詞氣從容禮樂之間未嘗以力加其民民觀而化之以不逆其上其所以藏身之固如此至於後世不然廢禮而任法以鞭扑刀鋸力勝其下有一不順常以身較之民於是始悍然不服而上之人親受其病而古之所以藏身之術亡矣子游為武城宰以弦歌為政曰吾聞之夫子君子學道則愛人小人學道則易使也夫使武城之人其君子愛人而不害其小人易使而不違則子游之政豈不綽然有餘裕哉上髙筠之小邑介於山林之間民不知學而縣亦無學以詔民縣令李君懐道始至思所以導民乃謀建學宮縣人知其令之將教之也亦相帥出力以繕其事不逾年而學以具奠享有堂講勸有位退習有齋膳浴有舍邑人執經而至者數十百人於是李君之政不苛而民肅賦役獄訟不諉其府李君喜學之成而樂民之不犯知其為學之力也求記其事告後以不廢予亦嘉李君之為邑有古之道其所以得於民者非復世俗之吏也故為書其實且以志上髙有學之始元豐五年三月二十日眉山蘇轍記京西北路轉運使題名記雅惟京西於諸路地大且近西舉鞏洛北兼鄭滑南收陳許蔡汝唐鄧申息胡沈浸淫秦楚之交翕引河汴縈阻淮漢出入數千里土廣而民淳鬬訟簡少盜賊希濶外無蠻夷疆場之虞内無兵屯饋饟之勞為吏者常閒暇無事然其壤地瘠薄多曠而不耕户口寡少多惰而不力故租賦之入於他路為最貧每嵗均南饋北短長相補以給軍吏之奉故轉運使之職於他路為最急雖然事止於自治而無外憂財止於自足而無外奉則雖貧而可以為富雖急而可以為佚也熈寧之初朝廷始新政令其細布在州縣而其要領轉運使無所不總政新則吏有不知事遽則人有不辦當是時也轉運使奔走於外咨度於内日不遑食由是京西始判而鄭滑并於畿内自某某若干州為南自某某若干州為北南治襄陽北治洛陽殿中丞陳君知儉自始更制而提舉常平既而為轉運判官復為副使以領北道始終勞瘁寘功最力將刻名於石以貽厥後而顧瞻前人冺焉未紀乃按典籍以求遺放自開寳以來得若干人而君之祖考伯父三人在焉嗚呼盛哉夫若干人者逺矣其詳不可得而知然其遺風餘澤故老猶有能道之者孟子有言誦其詩讀其書不知其人可乎是以論其世也若夫政之去取地之合離與其人之在是者後世將有考焉是以具載於此熈寧六年十月日記杭州龍井院訥齋記近禪㫖錢塘有大法師曰辨才初住上天竺山以天台法化呉越吴越人歸之如佛出世事之如養父母金帛之施不求而至居天竺十四年有利其富者迫而逐之師忻然捨去不以為恨吴越之人涕泣而從之者如歸市天竺之衆分散四去事聞於朝明年俾復其舊師黽俛而還如不得巳吴越之人爭出其力以成就廢缺衆復大集無㡬何師告其衆曰吾雖未嘗爭也不幸而立於爭地久居而不去使人以巳是非彼非沙門也天竺之南山山深而木茂泉甘而石峻汝舍我我將老於是言巳䇿杖而往以茅竹自覆聲動呉越人復致其所有鑱嶮堙圯築室而奉之不期年而荒榛巖石之間臺觀飛湧丹堊炳煥如天帝釋宫師自是謝事不復出入髙郵秦觀太虚名其所居曰訥齋道潛師參寥告予為記予聞之師始以法教人叩之必鳴如千石鐘來不失時如滄海潮故人以辯名之及其退居此山閉門燕坐寂嘿終日葉落根榮如冬枯木風止波定如古澗水故人以訥名之雖然此非師之大全也彼其全者不大不小不長不短不垢不淨不辯不訥而又何以名之雖然樂其出而髙其退喜其辯而貴其訥此衆人意也則其以名齋也亦宜系之以詞曰以辯見我既非見我以訥見我亦幾於妄有叩而應時止而止非辯非訥如如不動諸佛既然我亦如是唐宋八大家文鈔巻一百六十三
