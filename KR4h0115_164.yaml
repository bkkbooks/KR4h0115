body:
  text: 唐宋八大家文鈔卷一百五十明茅坤撰潁濱文鈔六論夏論文甚佳至於虞之所以宗堯夏之宗鯀亦古今典禮一大疑處聖人之道茍可以安天下不求為異也堯舜傳之賢而禹傳之子後世以為禹無聖人而傳之而後授之其子孫此以好異期聖人也夫聖人之於天下不從其所安而為之而求異夫天下之人何其用心之淺耶昔者湯有伊尹武王有周公而周公又武王之弟也湯之太甲武之成王皆可以為天下而湯不以豫其臣武王不以豫其弟誠以為其子之才不至於亂天下者則無事乎授之他人而以為異也而天下之人何獨疑夫禹哉今夫人之愛其子是天下之通義也有得焉而以豫其子孫人情之所皆然也聖人以是為不可易故因而聽之使之父子相繼而無相亂以至於堯堯舉天下而授之舜舜得堯之天下而又授之禹舉天下而授之人此聖人之所以大過人而天下後世之所不能也天下後世之所不能而聖人獨為之豈以為異哉天下之人不能皆賢而有異人焉為異而震之則天下皆將喜其名而失其真故夫堯舜之傳賢者是不得巳而然也使堯之丹朱舜之商均僅可以守天下而堯肯傳之舜舜肯傳之禹以為異而疑天下哉然則禹之不以天下授益非以益為不足受也使天下復有禹豫知禹之不以天下授之矣何者啓足以為天下故也啓為天下而益為之佐是益不失為伊尹周公其功猶可以及天下也聖人之不喜異也如此魯人之法贖人者受金於府子貢贖人而不受賞夫子嘆曰嗟夫使魯之不復贖人者賜也夫贖人而不以為功此君子之所以異於衆人者而其弊乃至於不贖是故聖人不喜夫異以其有時而窮也閔子終三年之喪見於夫子援琴而歌戚戚而不樂作而曰先王制禮弗敢過也子夏終三年之喪見於夫子取琴而鼓之其樂侃侃然作而曰先王制禮不敢不及也而夫子皆以為賢由此觀之禹益之事傳者之過也記有之曰有虞氏褅黃帝而郊嚳祖顓頊而宗堯夏后氏褅黃帝而郊鯀祖顓頊而宗禹舜禹皆有所從受天下者其所從受天下者不可忘也故舜宗堯而置瞽䏂此天下之大義也至禹不獨廢堯而且忘舜鯀雖得罪以父故得祭於郊從舜之義則禹為忘其君從禹之義則舜為忘其親二者皆聖人之所不為也豫聞之禮之所行義之所許也故禮雖先王未之有可以義起也舜禹之有天下則先王之所未有也故堯雖非父而其德載於後世不可以不宗瞽雖其親而無功於人不可以私享二者皆義也至夏后氏郊鯀而宗禹此禹之子孫之禮也孰謂禹之不宗舜哉柳下惠稱有虞氏郊堯而宗舜先儒以為此虞氏子孫之禮也以虞推禹則禹其有不宗舜乎雖然夏之子孫所以不宗舜者以有鯀也鯀雖得罪於舜而從事於水者九年非瞽䏂之比也故卒為夏郊而三代祀之三代猶以其功祀之而其子孫顧可以他人廢之乎故夫虞夏之祀皆義之所豫也商論此文如天馬行空而識見亦深到商之有天下者三十世而周之世三十有七商之既衰而復興者五王而周之既衰而復興者宣王一人而巳夫商之多賢君宜若其世之過於周周之賢君不如商之多而其久於商者乃數百歲其故何也蓋周公之治天下務以文章繁縟之禮和柔馴擾剛強之民故其道本於尊尊而親親貴老而慈幼使民之父子相愛兄弟相悅以無犯上難制之氣行其至柔之道以揉天下之戾心而去其剛毅果敢之志故其享天下至久而諸侯內侵京師不振卒於廢為至弱之國何者優柔和易可以為久而不可以為強也若夫商人之所以為天下者不可復見矣嘗試求之詩書詩之寬緩而和柔書之委曲而繁重者舉皆周也而商人之詩駿發而嚴厲其書簡潔而明肅以為商人之風俗蓋在乎此矣夫惟天下有剛強不屈之俗也故其後世有以自振於衰微然至其敗也一散而不可復止蓋物之強者易以折而柔忍者可以久存柔者可以久存而常困於不勝強者易以折而其末也乃可以有所立此商之所以不長而周之所以不振也嗚呼聖人之慮天下亦有所就而巳不能使之無弊也使之能久而不能強能以自振而不能以及遠此二者存乎其後世之賢與不賢矣太公封于齊尊賢而尚功周公曰後世必有篡弒之臣周公治魯親親而尊尊太公曰後世寢衰矣夫尊賢尚功則近于強親親尊尊則近于弱終之齊有田氏之禍而魯人困於盟主之令蓋商之政近於齊而周公之所以治周者其所以治魯也故齊強而魯弱魯未亡而齊亡也子由謂商之治尚嚴故其享國不及周之八百豫竊疑商書曰代虐以寬則商之政未必一於猛也按禮記雖有商人先刑罰而後爵祿之言要之多雜於漢儒附會之言而未必聖人之至者且周自平王以後一變而為春秋再變而為戰國而周天子特懸一名於上者五百餘年蓋其列國各擅土地甲兵而不能相一而其所不敢屠周者斯則文武禮教之遺澤在焉耳商之六百未嘗不以天子臨諸侯也故商之厯雖不及周而其實過之然以齊魯譬之其迹若近而其情不可考矣周論獨見之論傳曰夏之政尚忠商之政尚質周之政尚文而仲尼亦云周監於二代郁郁乎文哉吾從周豫讀詩書厯觀唐虞至於夏商以為自生民以來天下未嘗一日而不趨於文也文之為言猶曰萬物各得其理云爾父子君臣之間兄弟夫婦之際此文之所由起也昔者生民之初父子無義君臣無禮兄弟不相愛夫婦不相保天下紛然而淆亂忿鬭而相苦文理不著而人倫不明生不相養而死不相葬天下之人舉皆戚然不寧於中然後反而求其所安屬其父子而列其君臣聯其兄弟而正其夫婦至于虞夏之世乃益去其鄙野之制然猶以天子之尊飯土塯啜土鉶土階三尺茅茨不翦至於周而後大備其粗始於父子之際其精布於萬物其用甚廣而無窮蓋其當時莫不自謂文於前世而後之人乃更以為質也是故祭祀之禮陳其籩豆列其鼎俎備其醪醴俯伏以薦思其飲食醉飽之樂而不可見也於是灌用鬱鬯藉用白茅既沃而莫之見以為神之縮之也體魄降於地魂氣升於天恍惚誕謾而不知其所由處聲音氣臭之類恐不能得當也於是終祭於屋漏繹祭於祊以為人子之心無所不至也薦之以滋味重之以膾炙恐鬼神之不屑也薦之以血毛重之以體薦恐父祖之不吾安也於是先黍稷而飯稻梁先大羮而飽庶羞以為不敢忘禮亦不敢忘愛也丁寧反復優遊而不忍去以為可以盡人子之心而人子之心亦可以少安矣故凡世之所謂文者皆所以安夫人之所不安而人之所安者事之所當然也仲尼區區於衰周之末收先王之遺文而與曾子推論禮之所難處至於毫釐纎悉蓋以為王道之盛其文理當極於此焉耳及周之亡天下大壞強凌弱衆暴寡而後世乃以為用文之弊夫自唐虞以至於商漸而入於文至周而文極於天下當唐虞夏商之世蓋將求周之文而其勢有所未至非有所謂質與忠也自周而下天下習於文非文則無以安天下之所不足此其勢然也今夫冠婚喪祭而不為之禮墓祭而不廟室祭而無所仁人君子有所不安於其中而曰不文以從唐虞夏商之質夫唐虞夏商之質蓋將以求周之文而未至者非所以為法也愚竊謂忠質文三字以之名三代之治則可以之論三代之相救而又謂若循環然則不可當其風氣之日開而聖人以漸為之經緯其間至周而文始大備及周之衰而茍有王者起亦不過循文武成康之遺爾豈得又推文而之忠與質乎哉不然湯何以纘禹舊服而武王之克商也亦特曰政由舊故愚獨謂夏未嘗尚忠商未嘗尚質周亦未嘗尚文此皆後世之所以仰觀三王之典禮與其風俗之可見者而強名之爾孔子曰周監於二代郁郁乎文哉頌美之也假令如後世儒相救之説孔子於此必深言之矣何以獨遺此一段大議六國論識見大而行文亦妙嘗讀六國世家竊怪天下之諸侯以五倍之地十倍之衆發憤西向以攻山西千里之秦而不免於滅亡常為之深思遠慮以為必有可以自安之計蓋未嘗不咎其當時之士慮患之疏而見利之淺且不知天下之勢也夫秦之所與諸侯爭天下者不在齊楚燕趙也而在韓魏之郊諸侯之所與秦爭天下者不在齊楚燕趙也而在韓魏之野秦之有韓魏譬如人之有腹心之疾也韓魏塞秦之衝而蔽山東之諸侯故夫天下之所重者莫如韓魏也昔者范雎用於秦而收韓商鞅用於秦而收魏昭王未得韓魏之心而出兵以攻齊之剛壽而范雎以為憂然則秦之所忌者可以見矣秦之用兵於燕趙秦之危事也越韓過魏而攻人之國都燕趙拒之於前而韓魏乘之於後此危道也而秦之攻燕趙未嘗有韓魏之憂則韓魏之附秦故也夫韓魏諸侯之障而使秦人得出入於其間此豈知天下之勢邪委區區之韓魏以當強虎狼之秦彼安得不折而入於秦哉韓魏折而入於秦然後秦人得通其兵於東諸侯而使天下遍受其禍夫韓魏不能獨當秦而天下之諸侯藉之以蔽其西故莫如厚韓親魏以擯秦秦人不敢逾韓魏以窺齊楚燕趙之國而齊楚燕趙之國因得以自完於其間矣以四無事之國佐當冦之韓魏使韓魏無東顧之憂而為天下出身以當秦兵以二國委秦而四國休息於內以陰助其急若此可以應夫無窮彼秦者將何為哉不知出此而乃貪疆場尺寸之利背盟敗約以自相屠滅秦兵未出而天下諸侯巳自困矣至使秦人得伺其隙以取其國可不悲哉唐荆川曰此文甚得天下之勢秦論一此篇過秦失所以取天下秦人居諸侯之地而有萬乘之志侵辱六國斬伐天下不數十年之間而得志於海內至其後世再傳而遂亡劉季起於匹夫斬刈豪傑蹶秦誅楚以有天下而其傳子孫數十世而不絶蓋秦漢之事其所以起者不同而其所以取之者無以相遠也然劉項奮臂於閭閻之中率天下蜂起之兵西嚮以攻秦無一成之聚一夫之衆驅罷敝謫戍之人以求所非望得之則生失之則死以匹夫而圖天下其勢不得不疾戰以趨利是以冒萬死求一生而不顧今秦擁千里之地而乘纍世之業雖閉關而守之畜威養兵拊循士卒而諸侯誰敢謀秦觀天下之釁而後出兵以乘其弊天下夫誰敢抗而惠文武昭之君乃以萬乘之資而用匹夫所以圖天下之勢疾戰而不顧其後此宜其能以取天下而亦能以亡之也夫劉項之勢天下皆非吾有起於草莽之中因亂而爭之故雖驅天下之人以爭一旦之命而民猶有待於戡定以息肩於此故以疾戰定天下天下既安而下無背叛之志若夫六國之際諸侯各有分地而秦乃欲以力征強服四海不愛先王之遺黎以為子孫之謀而竭其力以爭鄰國之利六國雖滅而秦民之心巳散矣故秦之所以謀天下者匹夫特起之勢而非所以承祖宗之業以求其不失者也昔者嘗聞之周人之興數百年而後至於文武文武之際三分天下而有二然商之諸侯猶有所未服紂之衆未可以不擊而自解也故以文武之賢退而修德以待其自潰誠以為后稷公劉太王王季勤勞不懈而後能至於此故其發之不可輕而用之有時也嗟夫秦人舉纍世之資一用而不復惜其先王之澤巳竭於取天下而尚欲求以為國亦巳惑矣秦論二此篇正言秦之所以取天下當以此不以彼兩篇合一篇三代聖人以道御天下動容貌出辭氣逡巡廟堂之上而諸侯承德四夷向風何其盛哉至其後世稍衰桓文迭興而維持之要之以盟會齊之以征伐既巳畢矣然春秋之後吳越放恣繼之以田常三晉之亂天下遂為戰國君臣之間非詐不言非力不用相與為盜跖之行猶恐不勝雖桓文之事且不試矣而况於文武成康之舊歟秦起於西陲與西戎雜居本以強兵富國為上其先襄公最賢詩人稱之然其所以為國者亦猶是耳詩曰蒹葭蒼蒼白露為霜所謂伊人在水一方夫蒹葭之方盛也蒼蒼其強徑而不適於用至於白露凝戾為霜然後堅成可施於人今夫襄公以耕戰自力而不知以禮義終成之豈不蒼然盛哉然而君子以為未成故其後世狃於為利而不知義至於商君厲之以法風俗日惡鄙詐猛暴甚於六國卒以此勝天下秦之君臣以為非是無足以服人矣當是時諸侯大者連地數千里帶甲數十萬雖使齊威晉文假仁義挾天子以令之其勢將不能行惟得至誠之君子自修而不爭如商周之先君庶幾可以服之孟子遊於齊梁以此干其君皆不能信以為詐謀竒計之所不能下長戟徑弩之所不能克區區之仁義何足以致此然魏文侯當時之弱國也君王后齊之一婦人也魏文侯行仁義禮下賢者用卜子夏田子方段干木而秦人不敢加兵君王后用齊四十餘年事秦謹與諸侯信而齊亦未嘗受兵而况於力行仁義中心慘怛終身不懈而有不能勝者哉夫衣冠佩玉可以化強暴深居簡出可以却猛獸虛心寡欲可以懷鬼神孟子曰仁不可以為衆誠因秦之地用秦之民按兵自守修德以來天下彼將襁負其子而至而誰與共亡惜乎其明不足以知之竭力以勝敵敵勝之後二世而亡其數有以取之矣始皇論蘇氏兄弟論罷侯置守處並祖柳宗元之論而附益之而子由此論却亦跌宕可以補柳子之不足諸侯之興自生民始矣至始皇滅六國而五帝三代之諸侯掃地無復遺者非秦能滅諸侯而勢之隆汚極於此矣昔禹會諸侯於塗山執玉帛者萬國傳商及周文武之間止千七百餘國夫人之必爭強弱之必相吞滅此勢之必至者也彼非諸侯獨能自存聖賢之君時出而齊之是以強者不敢肆弱者有以自立蓋自禹五世而得少康自少康十二世而得湯自湯八世而得太戊自太戊十三世而得武丁自武丁八世而得周文武當是時雖有強暴諸侯不得以力加小弱然虞夏諸侯亡者已十八九矣自文武成康以來三十有三世獨一宣王能紀綱諸夏幽平以後諸侯放恣春秋之際存者百七十餘國而已雖齊威晉文迭興以會盟征伐持之而道德不足其身所攻滅蓋巳多矣陵遲至於六國獨有宋衛中山泗上諸侯在耳地大兵強皆務以詐力相傾雖使威文復生號令將有所不行非有盛德之君不足以懷之矣是以至於蕩滅無餘而後止秦雖欲復立諸侯豈可得哉而議者乃追咎李斯不師古始使秦孤立無援二世而亡蓋未之思歟夫商周之初雖封建功臣子弟而上古諸侯棊布天下植根深固是以新故相維勢如犬牙數世之後皆為故國不可復動今秦巳削平諸侯蕩然無復立錐之國雖使並建子弟而君民不親譬如措舟滄海之上大風一作漂卷而去與秦之郡縣何異且獨不見漢髙晉武之事乎割裂海內以封諸子大者連城數十舉無根之人寄之萬民之上十數年之間隨即散滅不獲其用豈非惑於其名而未察其勢也哉古之聖人立法以御天下必觀其勢勢之所去不可以強反今秦之郡縣豈非勢之自至也歟然秦得其勢而不免於滅亡蓋治天下在德不在勢誠能因勢以立法務德以扶勢未有不安且治者也使秦既一天下與民休息寬徭賦省刑罰黜奢淫崇儉約選任忠良放遠法吏而以郡縣治之雖與三代比隆可也三國論論三國而獨挈劉備亦堪輿家取窩之説天下皆怯而獨勇則勇者勝皆暗而獨智則智者勝勇而遇勇則勇者不足恃也智而遇智則智者不足用也夫唯智勇之不足以定天下是以天下之難蜂起而難平蓋嘗聞之古者英雄之君其遇智勇也以不智不勇而後真智大勇乃可得而見也悲夫世之英雄其處於世亦有幸不幸耶漢高祖唐太宗是以智勇獨過天下而得之者也曹公孫劉是以智勇相遇而失之者也以智攻智以勇擊勇此譬如兩虎相捽齒牙氣力無以相勝其勢足以相擾而不足以相斃當此之時惜乎無有以漢高帝之事制之者也昔者項籍乘百戰百勝之威而執諸侯之柄咄嗟叱吒奮其暴怒西向以逆高祖其勢飄忽震蕩如風雨之至天下之人以為遂無漢矣然高帝以其不智不勇之身橫塞其衝徘徊而不得進其頑鈍椎魯足以為笑於天下而卒能摧折項氏而待其死此其故何也夫人之勇力用而不已則必有所耗竭而其智慮久而無成則亦必有所倦怠而不舉彼欲用其所長以制我於一時而我閉門而拒之使之失其所求逡巡求去而不能去而項籍固巳憊矣今夫曹公孫權劉備此三人者皆知以其才相取而未知以不才取人也世之言者曰孫不如曹而劉不如孫劉備唯智短而勇不足故有所不若於二人者而不知因其所不足以求勝則亦巳惑矣蓋劉備之才近似於高祖而不知所以用之之術昔高祖之所以自用其才者其道有三焉耳先據勢勝之地以示天下之形廣收信越出竒之將以自輔其所不逮有果鋭剛猛之氣而不用以深折項籍猖狂之勢此三事者三國之君其才皆無有能行之者獨有一劉備近之而未至其中猶有翹然自喜之心欲為椎魯而不能純欲為果鋭而不能逹二者交戰於中而未有所定是故所為而不成所欲而不遂棄天下而入巴蜀則非地也用諸葛孔明治國之才而當紛紜征伐之衝則非將也不忍忿忿之心犯其所短而自將以攻人則是其氣不足尚也嗟夫方其奔走於二袁之間困於呂布而狼狽於荆州百敗而其志不折不可謂無高祖之風矣而終不知所以自用之方夫古之英雄唯漢高帝為不可及也夫晉論晉之士患在不習事故無以經略當世子由議之未當而行文自佳御天下有道休之以安動之以勞使之安居而能勤逸處而能憂其君子周旋揖讓不失其節而能耕田射御以自致其力平居習為勉強而去其惰傲厲精而日堅勞苦而日強冠冕佩玉之人而不憚執天下之大勞夫是以天下之事舉皆無足為者而天下之匹夫亦無以求勝其上何者天下之亂蓋常起於上之所憚而不敢為天下之小人知其上之有所憚而不敢為則有以乘其間而致其上之所難夫其上之所難者豈非死傷戰鬭之患匹夫之所輕而士大夫之所不忍以其身試之者耶彼以死傷戰鬭之患邀我而我不能應則無怪乎天下之至於亂也故夫君子之於天下不見其所畏求使其所畏之不見是故事有所不辭而勞苦有所不憚昔者晉室之敗非天下之無君子也其君子皆有好善之心高談揖讓泊然沖虛而無慷慨感激之操大言無當不適於用而畏兵革之事天下之英雄知其所忌而竊乘之是以顚沛隕越而不能以自存且夫劉聰石勒王敦祖約此其姦詐雄武亦一世之豪也譬如山林之人生於草木之間大風烈日之所咻而雪霜飢饉之所勞苦其筋力骨節之所嘗試者亦巳至矣而使王衍王導之倫清談而當其衝此譬如千金之家居於高堂之上食肉飲酒不習寒暑之勞而欲以之捍禦山林之勇夫而求其成功此固姦雄之所樂攻而無難者也是以雖有賢人君子之才而無益於世雖有盡忠致命之意而不救於患難此其病起於自處太高而不習天下之辱事故富而不能勞貴而不能治蓋古之君子其治天下為其甚勞而不失其高食其甚美而不棄其糲使匹夫小人不知所以用其勇而其上不失為君子至於後世為其甚勞而不知以自復而為秦之強食其甚美而無以自實而為晉之敗夫甚勞者固非所以為安而甚美者亦非所以自固此其所以喪天下之故也哉晉之亡患在大封同姓而假之以兵不戢則逆節生而中朝無以為居重馭輕之勢內以清虛相髙外以胡虜衡亂而天下之權無所歸矣故遂以不振而偏安江左以至於移祚悲夫唐宋八大家文鈔卷一百五十
