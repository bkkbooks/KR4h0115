body:
  text: 唐宋八大家文鈔卷一百二十五明茅坤撰東坡文鈔九書上富丞相書頌而不諂援而不卑軾聞之進説于人者必其人之有間而可入則其説易行戰國之人貪天下之士因其貪而説之危國之人懼天下之士因其懼而説之是故其説易行古之人一説而合至有立談之間而取公相者未嘗不始于戰國危國何則有間而可入也居今之世而欲進説于明公之前不得其間而求入焉則亦可謂天下之至愚無知者矣地方萬里而制于一姓極天下之尊而盡天下之富不可以有加矣而明公為之宰四夷不作兵革不試是明公無貪于得而無懼于失也方西戎之熾也敵人乘間以跨吾北中國之大不畏而畏明公之一辭是明公之勇冠于天下也明公居于山東而傾河朔之流人父棄其子夫棄其妻而自歸于明公者百餘萬明公人人而食之旦旦而撫之此百萬人者出于溝壑之中而免於烏鳶豺狼之患生得以養其父母而祭其祖考死得以使其子孫葬埋祭祀不失其故常是明公之仁及於百世也勇冠于天下而仁及于百世士之生于世如此亦足矣今也處于至足之勢則是明公無復有所羡慕于天下之功名也五帝三代之事百家之書莫不盡讀禮樂刑政之大小兵農財賦之盛衰四海之內地里之逺近山川之險易土物之所宜莫不盡知當世之賢人君子與夫姦偽險詐之徒莫不盡究至于曲學小數茫昧戃恍而不可知者皆獵其華而咀其英泛其流而涉其源雖自謂當世之辨不能傲之以其所不知則是明公無復有所畏憚于天下之博學也名為天下之賢人而貴為天子之宰無貪于得而無懼于失無羡于功名而無畏于博學是其果無間而可入也天下之士果不可以進説也軾也聞之楚左史倚相曰昔衛武公年九十有五猶日針警于國曰自卿以下至于官師茍在朝者無謂我老耄而舍我朝夕以交戒我猶以為未也而作詩以自戒其詩曰抑抑威儀惟德之隅夫魏武公惟居於至足而日以為不足故其沒也諡之曰睿聖武公嗟夫明公豈以其至足而無間以拒天下之士則士之進説者亦何必其間之入哉不然軾將誦其所聞而明公試觀之夫天下之小人所為奔走輻輳于大人之門而為之用者何也大人得其全小人得其偏大人得其全故能兼受而獨制小人得其偏是以聚而求合于大人之門古之聖人惟其聚天下之偏而各收其用以為非偏則莫肯聚也是故不以其全而責其偏夫惟全者之不可以多有也故天下之偏者惟全之求今以其全而責其偏夫彼若能全將亦為我而已矣又何求焉昔者夫子亷潔而不為異衆之行勇敢而不為過物之操孝而不徇其親忠而不犯其君凡此者是夫子之全也原憲亷而至于貧公良孺勇而至于鬬曽子孝而徇其親子路忠而犯其君凡此者是數子之偏也夫子居其全而收天下之偏是以若此巍巍也若夫明公其亦可謂天下之全矣亷而天下不以為介直而天下不以為訐剛健而不為強敦厚而不為弱此明公之所得之于天而天下之所不可望于明公者也明公居其全天下效其偏其誰曰不可異時士大夫皆喜為卓越之行而世亦貴狡悍之才自明公執政而朝廷之間習為中道而務循于規矩士之矯飾力行為異者衆必共笑之夫卓越之行非至行也而有取于世狡悍之才非真才也而有用于天下此古之全人所以坐而收其功也今天下卓越之行狡悍之才舉不敢至于明公之門懼以其不純而獲罪于門下軾之不肖竊以為天下之未大治兵之未振財之未豐天下之有望于明公而未獲者其或由此也歟昔范公收天下之士不考其素茍可用者莫不咸在雖其狂狷無行之徒亦自效于下風而范公亦躬為詭特之操以震之夫范公之取人者是也其自為者非也伏惟明公以天下之全而自居去其短而襲其長以收功于無窮軾也西南之匹夫求斗升之祿而至于京師翰林歐陽公不知其不肖使與于制舉之末而發其猖狂之論是以輒進説于左右以為明公必能容之所進䇿論五十篇貧不能盡寫而致其半觀其大略幸甚上曽丞相書子瞻上執政書其所自持處嶄然軾聞之將有求于人而其説不誠則難以望其有合矣世之竒特之士其處也莫不為異衆之行而其出也莫不為怪詭之詞比物引類以搖撼當世理不可化而欲以勢劫之將以術售其身古之君子有韓子者其為説曰王公大人不可以無貧賤之士居其下風而推其後大其聲名而久其傳雖其貴賤之濶絶而其相需之急不啻若左右手嗚呼果其用是説也則夫世之君子所為老死而不遇者無足怪矣今夫扣之者急則應之者疑其辭夸則其實必有所不副今吾以為王公大人不可以一日而無吾也彼將退而考其實則亦無乃未至於此耶昔者漢髙未嘗喜儒而不失為明君衛霍未嘗薦士而不失為賢公卿吾將以吾之説而彼將以彼之説彼是相拒而不得其歡心故貴賤之間終不可以合而道終不可以行何者其扣之急而其辭夸也鬻千金之璧者不之於肆而願觀者塞其門觀者歎息而主人無言焉非不能言知言之無加也今也不幸而坐于五達之衢又呶呶焉自以為希世之珍過者不顧執其裾而強觀之則其所鬻者可知矣王公大人其無意于天下後世者亦安以求為也茍其不然則士之過于其前而有動于其目者彼將褰裳疾行而摟取之故凡皇皇汲汲者舉非吾事也昔者嘗聞明公之風矣以大臣之子孫而取天下之髙第才足以過人而自視缺然常若不足安于小官而樂于恬淡方其在太學之中衣繒飯糗若將終身至于德發而不可掩名髙而不可抑貴為天子之少宰而其自視不加于其舊之錙銖其度量宏達至于如此此其尤不可以夸辭而急扣者也軾不佞自為學至今十有五年以為凡學之難者難于無私無私之難者難于通萬物之理故不通乎萬物之理雖欲無私不可得也已好則好之已惡則惡之以是自信則惑也是故幽居默處而觀萬物之變盡其自然之理而斷之于中其所不然者雖古之所謂賢人之説亦有所不取雖以此自信而亦以此自知其不恱于世也故其言語文章未嘗輒至于公相之門今也天子舉直諌之士而兩制過聽謬以其名聞竊以為與于此者皆有求於吾君吾相者也故亦敢獻其文凡十篇而書為之先惟所裁擇幸甚唐荆川曰此文與説富相公文同意皆欲以無意中之上劉侍讀書氣之一字為一篇命門軾聞天下之所少者非才也才滿于天下而事不立天下之所少者非才也氣也何謂氣曰是不可名者也若有鬼神焉而隂相之今夫事之利害計之得失天下之能者舉知之而不能辦能辦其小而不能辦其大則氣有所不足也夫氣之所加則已大而物小于是乎受其至大而不為之驚納其至繁而不為之亂任其至難而不為之憂享其至樂而不為之蕩是氣也受之于天得之于不可知之間傑然有以蓋天下之人而出萬物之上非有君長之位殺奪施豫之權而天下環向而歸之此必有所得者矣多才而敗者世之所謂不幸者也若無能焉而每以成者世之所謂天幸者也夫幸與不幸君子之論不施于成敗之間而施于窮達之際故凡所以成者其氣也其所以敗者其才也氣不能守其才則焉往而不敗世之所以多敗者皆知求其才而不知論其氣也若夫明公其亦有所得矣軾非敢以虛詞而曲説誠有所見焉耳夫天下有分得其分則安非其分而以一毫取于人則羣起而爭之天下有無窮之利自一命以上至于公相其利可愛其塗甚夷設為科條而待天下之擇取然天下之人翹足跂首而羣望之逡巡而不敢進者何也其分有所止也天下有無功而遷一級者則衆指之矣遷者不容于下遷之者不容于上而况其甚者乎明公起于徒步之中執五寸之翰書方尺之簡而列于士大夫之上橫翔捷出冠壓百吏而為之表猶以為未也而加之師友之職付之全秦之地地方千里則古之方伯連帥所不能有也東障崤澠北跨河渭南倚巴蜀西控戎夏則古之秦昭王商君白起之徒所以殣身殘民百戰而有之者也奮臂而取兩制不十餘年而天下不以為速非有汗馬之勞米鹽之能以擅富貴之美而天下不以為無功抗顔髙議自以無前而天下不以為無讓此其氣固有以大服于天下矣天下無大事也天下而有大事非其氣之過人者則誰實辦之軾逺方之鄙人遊于京師聞明公之風幸其未至于公相而猶可以誦其才氣之盛美而庶幾于知言惜其將遂西去而不得從也故請間于門下以願望見其風采不宣上韓太尉書軾生二十有二年矣自七八歲知讀書及壯大不能曉習時事獨好觀前世盛衰之迹與其一時風俗之變自三代以來頗能論著以為西漢之衰其大臣守尋常而不務大略東漢之末士大夫多竒節而不循正道元成之間天下無事公卿將相安其祿位顧其子孫各欲樹私恩買田宅為不可動之計低回畏避以茍歲月而皆依放儒術六經之言而取其近似者以為口實孔子曰惡居下流而訕上惡訐以為直而劉歆谷永之徒又相與彌縫其闕而緣飾之故其衰也靡然如蛟龍釋其風雲之勢而安于豢畜之樂終以不悟使其肩披股裂登于匹夫之爼豈不悲哉其後桓靈之君懲往昔之弊而欲樹人主之威權故頗用嚴刑以督責臣下忠臣義士不容于朝廷故羣起于草野相與力為險怪驚世之行使犬下豪傑奔走于其門得為之執鞭而其自喜不啻若卿相之榮于是天下之士囂然皆有無用之虛名而不適于實效故其亡也如人之病狂不知堂宇宫室之為安而號呼奔走以自顛仆昔者太公治齊舉賢而尚功周公曰後世必有篡弒之臣周公治魯親親而尊尊太公曰後世寖微矣漢之事迹誠大類此豈其當時公卿士大夫之行與其風俗之剛柔各有以致之耶古之君子剛毅正直而守之以寬忠恕仁厚而發之以義故其在朝廷則士大夫皆知洗濯磨淬戮力于王事而不敢為非常可怪之行此三代王政之所由興也曾子曰上失其道民散久矣天下之人幸而有不為阿附茍容之事者則務為倜儻矯異求如東漢之君子惟恐不及可悲也已軾自幼時聞富公與太尉皆號為寬厚長者然終不可犯以非義及來京師而二公同時在兩府愚不能知其心竊于道塗望其容貌寬然如有容見惡不怒見善不喜豈古所謂大臣者歟夫循循者固不能有所為而翹翹者又非聖人之中道是以願見太尉得聞一言足矣太尉與大人最厚而又嘗辱問其姓名此尤不可以不見今已後矣不宣上王兵部書竒氣荆州南北之交而士大夫往來之衝也執事以髙才盛名作牧于此蓋亦嘗有以相馬之説告于左右者乎聞之曰騏驥之一一日行千里而不殆其脊如不動其足如無所著升髙而不輊走下而不軒其伎藝卓絶而效見明著至于如此而天下莫有識者何也不知其相而責其技也夫馬者有昂目而豐臆方蹄而密睫捷乎若深山之虎曠乎若秋後之兔逺望目若視日而志不存乎芻粟若是者飄忽騰踔去而不知所止是故古之善相者立于五達之衢一目而眄之聞其一鳴顧而循其色馬之技盡矣何者其相溢于外而不可蔽也士之賢不肖見于面顔而發泄于辭氣卓然其有以存乎耳目之間而必日久居而後察則亦名相士者之過矣夫軾西川之鄙人而荆之過客也其足迹偶然而至于執事之門其平生之所治以求聞于後世者又無所挾持以至于左右蓋亦易踈而難合也然自蜀至于楚舟行六十日過郡十一縣三十有六取所見郡縣之吏數十百人莫不孜孜論執事之賢而教之以求通于下吏且執事何修而得此稱也軾非敢以求知而望其所以先後於仕進之門者亦徒以為執事立于五逹之衢而庶幾乎一目之眄或有以信其平生爾夫今之世豈惟王公擇士士亦有所擇軾將自楚遊魏自魏無所不遊恐他日以不見執事為恨也是以不敢不進不宣上梅直講書文瀟灑而入思少喫緊某官執事某每讀詩至鴟梟讀書至君奭常竊悲周公之不遇及觀史見孔子厄于陳蔡之間而絃歌之聲不絶顔淵仲由之徒相與問答夫子曰匪兕匪虎率彼曠野吾道非耶吾何為于此顔淵曰夫子之道至大故天下莫能容雖然不容何病不容然後見君子夫子油然而笑曰回使爾多財吾為爾宰夫天下雖不能容而其徒自足以相樂如此乃今知周公之富貴有不如夫子之貧賤夫以周公之賢以管蔡之親而不知其心則周公誰與樂其富貴而夫子之所與共貧賤者皆天下之賢才則亦足與樂乎此矣軾七八歲時始知讀書聞今天下有歐陽公者其為人如古孟軻韓愈之徒而又有梅公者從之遊而與之上下其議論其後益壯始能讀其文詞想見其為人意其飄然脫去世俗之樂而自樂其樂也方學為對偶聲律之文求斗升之祿自度無以進見于諸公之間來京師逾年未嘗窺其門今年春天下之士羣至于禮部執事與歐陽公實親試之誠不自意獲在第二既而聞之人執事愛其文以為有孟軻之風而歐陽公亦以其能不為世俗之文也而取焉是以在此非左右為之先容非親舊為之請屬而嚮之十餘年間聞其名而不得見者一朝為知己退而思之人不可以茍富貴亦不可以徒貧賤有大賢焉而為其徒則亦足恃矣茍其僥一時之幸從車騎數十人使閭巷小民聚觀而贊歎之亦何以易此樂也傳曰不怨天不尤人蓋優哉遊哉可以卒歲執事名滿天下而位不過五品其容色溫然而不怒其文章寬厚敦朴而無怨言此必有所樂乎斯道也軾願與聞焉黃州上文潞公書嗚咽然亦情悃灑然軾再拜孟夏漸熱恭惟留守太尉執事台候萬福承以元功正位兵府備物典册首冠三公雖曽孫之遇絶口不言而金縢之書因事自顯真古今之異事聖朝之光華也有自京師來轉示所賜書教一通行草爛然使破甑敝帚復增九鼎之重軾始得罪倉皇出獄死生未分六親不相保然私心所念不暇及他但顧平生所存名義至重不知今日所犯為已見絶于聖賢不得復為君子乎抑雖有罪不可赦而猶可改也伏念五六日至于旬時終莫能決輒復強顔忍恥飾鄙陋之詞道疇昔之眷以卜于左右遽辱還答恩禮有加豈非察其無他而恕其不及亦如聖天子所以貸而不殺之意乎伏讀灑然知其不肖之軀未死之間猶可以洗濯磨治復入於道德之場追申徒而謝子産也軾始就逮赴獄有一子稍長徒步相隨其餘守舍皆婦女幼稚至宿州御史符下就家取文書州郡望風遣吏發卒圍船搜取老幼幾怖死既去婦女恚罵曰是好著書書成何所得而怖我如此悉取燒之比事定重復尋理十亡其七八矣到黃州無所用心輒復覃思于易論語端居深念若有所得遂因先子之學作易傳九卷又自以意作論語説五卷窮苦多難夀命不可期恐此書一旦復淪沒不傳意欲寫數本留人間念新以文字得罪人必以為凶衰不祥之書莫肯收藏又自思非一代偉人不足託以必傳者莫若獻之明公而易傳文多未有力裝寫獨致論語説五卷公退間暇一為讀之就使無取亦足見其窮不忘道老而能學也軾在徐州時見諸郡盜賊為患而察其人多凶俠不遜因之以飢饉恐其憂不止于竊攘剽殺也輒草具其事上之會有旨移湖州而止家所藏書既多亡軼而此書本以為故紙糊籠篋獨得不燒籠破見之不覺惘然如夢中事輒録其本以獻軾廢逐至此豈敢復言天下事但惜此事粗有益于世既不復施行猶欲公知之此則宿昔之心掃除未盡者也公一讀訖即燒之而已黃州食物賤風土稍可安既未得去去亦無所歸必老于此拜見無期臨紙於邑惟冀以時為國自重與章子厚書公之捍患解亂之識如此子厚參政諫議執事春初辱書尋遞中裁謝不審得達否比日機務之暇起居萬福軾蒙恩如昨顧以罪廢之餘人所鄙惡雖公不見棄亦不欲頻通姓名今茲復陳區區誠義有不可已者軾在徐州日聞沂州丞縣界有賊何九郎者謀欲劫利國監又有闞溫泰平者皆猾賊往來沂兖間欲使人緝捕無可使者聞沂州葛墟村有程棐者家富有心膽其弟嶽坐與李逢往還配桂州牢城棐雖小人而篤于兄弟常欲為嶽洗雪而無由竊意其人可使因令本州支使孟易呼至郡喻使自效以刷門户垢汙茍有成績當為奏乞放免其弟棐願盡力因出帖付與不逾月軾移湖州棐相送出境云公更留兩月棐必有以自效今已去奈何軾語棐但盡力不可以軾去而廢也茍有所獲當速以相報不以逺近所在仍為奏乞如前約也是歲七月二十七日棐使人至湖州見報云已告捕獲妖賊郭先生等及得徐州孔目官以下狀申告捕妖賊事如棐言不謬軾方欲具始末奏陳棐所以盡力者為其弟也乞勘會其弟嶽所犯如只是與李逢往還本不與其謀者乞賜放免以勸有功草具未上而軾就逮赴詔獄遂不果發今者棐又遣人至黃州見報云郭先生等皆已鞫治得實行法久矣蒙恩授殿直且録其告捕始末以相示原棐之意所以孜孜于軾者凡為其弟以曩言見望也軾固不可以復有言矣然獨念愚夫小人以一言感發猶能奮身不顧以遂其言而軾乃以罪廢之故不為一言以負其初心獨不愧乎且其弟嶽亦豪健絶人者也徐沂間人鷙勇如棐嶽類甚衆若不收拾驅使令捕賊即作賊耳謂宜因事勸奬使皆歆艷捕告之利懲創為盜之禍庶幾少變其俗今棐必在京師參班公可自以意召問其始末特為一言放免其弟嶽或與一名目牙挍鎮將之類付京東監司驅使緝捕其才用當復過於棐也此事至微末公執政大臣豈復治此但棐于軾本非所部吏民而能自效者以軾為不食言也今既不可言于朝廷又不一言于公是終不言矣以此愧于心不能自已可否在公獨願祕其事毋使軾重得罪也徐州南北襟要自昔用武之地而利國監去州七十里土豪百餘家金帛山積三十六冶器械所産而兵衛微寡不幸有猾賊十許人一呼其間吏兵皆棄而走耳散其金帛以嘯召無賴烏合之衆可一日得也軾在郡時常令三十六冶每戶點集冶夫數十人持劫刃槍每月兩衙于知監之庭以示有備而已此地蓋常為京東豪猾之所擬公所宜知因程棐事輒復及之秋冷伏冀為國自重應制舉上兩制書論政用法好名二項亦切宋事軾聞古者有貴賤之際有聖賢之分二者相勝而不可以相參其勢然也治其貴賤之際則不知聖賢之為髙行其聖賢之分則不知貴賤之為差昔者子思孟軻之徒不見諸侯而耕于野比閭小吏一呼于其門則攝衣而從之至於齊魯千乘之君操幣執贄因門人以願交于下風則閉門而不納此非茍以為異而已將以明乎聖賢之分而不參于貴賤之際故其攝衣而從之也君子不以為畏而其閉門而拒之也君子不以為傲何則其分定也士之賢不肖固有之矣子思孟軻不可以人人而求之然而貴賤之際聖賢之分二者要不可以不知也世道衰喪不能深明于斯二者而錯行之施之不得其處故其道兩亡今夫軾朝生于草茅塵土之中而夕與于州縣之小吏其官爵勢力不足較于世亦明矣而諸公之貴至與人主揖讓周旋而無間大車駟馬至于門者逡巡而不敢入軾也非有公事而輒至于庭求以賓客之禮見于下執事固已獲罪于貴賤之際矣雖然當世之君子不以其愚陋而使與于制舉之末朝廷之上不以其疏賤而使奏其猖狂之論軾亦自忘其不肖而以為是兩漢之主所孜孜而求之親降色辭而問之政者也其才雖不足以庶幾于聖賢之間而學其道治其言則所守者其分也是故踽踽然而來仰不知明公之尊而俯不知其身之賤不由紹介不待辭讓而直言當世之故無所委曲者以為貴賤之際非所以施于此也軾聞治事不若治人治人不若治法治法不若治時時者國之所以存亡天下之所最重也周之衰也時人莫不茍偷而不立周雖欲其立而不可得也故周亡秦之衰也時人莫不貪利而不仁秦雖欲其仁而不可得也故秦亡西漢之衰也時人莫不柔懦而謹畏故君臣相蒙而至於危東漢之衰也時人莫不矯激而奮厲故賢不肖不相容以至于亂夫時者豈其所自為耶王公大人實為之軾將論其時之病而以為其權在諸公諸公之所好天下莫不好諸公之所惡天下莫不惡故軾敢以今之所患二者告于下執事其一曰用法太密而不求情其二曰好名太髙而不責實此二者時之大患也何謂用法太密而不求情昔者天下未平而法不立則人行其私意仁者遂其仁勇者致其勇君子小人莫不以其意從事而不困于繩墨之間故易以有功而亦易以亂及其治也天下莫不趨于法不敢用其私意而惟法之知故雖賢者所為要以如法而止不敢于法律之外有所措意夫人勝法則法為虛器法勝人則人為備位人與法並行而不相勝則天下安今自一命以上至于宰相皆以奉法循令為稱其職拱手而任法曰吾豈得自由哉法既大行故人為備位其成也其敗也其治也其亂也天下皆曰非我也法也法之弊豈不亦甚矣哉昔者漢髙之時留侯為太子少傅位于叔孫之後而周昌亦自御史大夫為諸侯相天下有緩急則功臣左遷而不怨此亦知其君臣之歡不以法而相持也今天下所以任法者何也任法生于自疑自疑生于多私惟天下之無私則能於法律之外有以效其智何則其自信明也夫唐永泰之間姦臣執政政以賄成德宗發憤而用常衮衮一切用法四方奏請莫有獲者然天下否塞賢愚不分君子不以為能也崔祐甫為相不至期年而除吏八百多其親舊或者以為譏祐甫曰不然非親與舊則安得而知之顧其所用如何爾君子以為善用法今天下泛泛焉莫有深思逺慮者皆任法之過也何謂好名太髙而不適實昔者聖人之為天下使人各致其能以相濟也不一則不專不專則不能自堯舜之時而伯夷后夔稷契之倫皆不過名一藝辦一職以盡其能至于子孫世守其業而不遷夔不敢自與于知禮而契不敢自任于播種至于三代之際亦各輸其才而安其習以不相犯躐凡書傳所載者自非聖人皆止于名一藝辦一職故其藝未嘗不精而其職未嘗不舉後世之所希望而不可及者由此故也下而至于漢其君子各務其所長以相左右故史之所記武宣之際自公孫魏邴以下皆不過以一能稱于當世夫人各有才才各有小大大者安其大而無忽于小小者樂其小而無慕于大是以各適其用而不喪其所長及至後世上失其道而天下之士皆有侈心恥以一藝自名而欲盡天下之能事是故喪其所長而至于無用今之士大夫其實病此也仕者莫不談王道述禮樂皆欲復三代追堯舜終于不可行而世務因以不舉學者莫不論天人推性命終於不可究而世教因以不明自許太髙而措意太廣太髙則無用太廣則無功是故賢人君子布于天下而事不立聽其言則侈大而可樂責其效則汗漫而無當此皆好名之過深惟古之聖賢建功立業興利捍患至于百工小民之事皆有可觀不若今世之因循鹵莽其故出于此二者歟伏惟明公才略之宏偉度量之寬厚學術之廣博聲名之煒赫冠于一時而振于百世百世之所望而正者意有所向則天下奔走而趨之則其愍時憂世之心或有取於斯言也軾將有深于此者而未敢言焉不宣唐宋八大家文鈔卷一百二十五
