body:
  text: 唐宋八大家文鈔卷五十七明茅坤撰廬陵文鈔二十九墓志銘江鄰幾墓志銘志多悲感故人之思君諱休復字鄰幾其為人外若簡曠而內行修飭不妄動於利欲其强學博覽無所不通而不以矜人至有問輒應雖好辨者不能窮也已則默若不能言者其為文章淳雅尤長於詩淡泊閒逺往往造人之不至善𨽻書喜琴奕飲酒與人交久而益篤孝於宗族事孀姑如母天聖中與尹師魯蘇子美遊知名當時舉進士及第調藍山尉騎驢赴官每據鞍讀書至迷失道家人求得之乃覺厯信潞二州司法參軍又舉書判拔萃改大理寺丞知長葛縣事通判閬州以母喪去職服除知天長縣事遷殿中丞又以父憂終喪獻其所著書召試充集賢挍理判尚書刑部當慶厯時小人不便大臣執政者欲纍以事去之君友蘇子美杜丞相壻也以祠神㑹飲得罪一時知名士皆被逐君坐落職監蔡州商稅久之知奉符縣事改太常博士通判睦州徙廬州復得集賢挍理判吏部南曹登聞鼓院為羣牧判官出知同州提㸃陜西路刑獄入判三司鹽鐵勾院修起居注纍遷刑部郎中君於治人則曰為政所以安民也無擾之而已故所至民樂其簡易至辨疑折獄則或權以術舉無不得而不常用亦不自以為能也君所著書號唐宜鑒十五卷春秋世論三十卷文集二十卷又作神告一篇言皇嗣事以為皇嗣國大事也臣子以為嫌而難言或言而不見納故假神告祖宗之意務為深切冀以感悟又嘗言昭憲太后杜氏子孫宜録用故翰林學士劉筠無後而官沒其資宜為立後還其資劉氏得不絶君之論議頗多凡與其遊者莫不稱其賢而在上位者久未之用也自其修起居注士大夫始相慶以為在上者知將用之矣而用君者亦方自以為得而君亡矣嗚呼豈非其命哉君以嘉祐五年四月乙亥以疾卒于京師即以其年六月庚申葬于陽夏鄉之原君享年五十有六方其亡恙時為理命數百言已而疾且革其子問所欲言曰吾已著之矣遂不復言曾祖諱濬殿中丞贈駕部員外郎妣李氏始平縣太君祖諱日新駕部員外郎贈太僕少卿妣孫氏富陽縣太君考諱中古太常博士贈工部侍郎妣張氏仁壽縣太君夫人夏侯氏永安縣君金部郎中彧之女先君數月卒子男三人長曰懋簡并州司戶參軍次曰懋相太廟齊郎次曰懋迪女三人長適祕書丞錢袞餘尚幼君姓江氏開封陳留人也自漢轑陽侯德居於陳留之圉城其後子孫分散而君世至今居圉城不去自高祖而上七世葬圉南夏岡由太父而下三世乃葬陽夏銘曰彼馳而我後彼取而我不豈用力者好先而知命者不茍嗟吾鄰幾兮卒以不偶舉世之隨兮君子之守衆人所亡兮君子之有其失一世兮其有不朽惟其自以為得兮吾將誰咎黃夢升墓志銘叙生平交游感慨為志豫友黃君夢升其先婺州金華人後徙洪州之分寧其曾祖諱元吉祖諱某父諱中雅皆不仕黃氏世為江南大族自其祖父以來樂以家資賑鄉里多聚書以招延四方之士夢升兄弟皆好學尤以文章意氣自豪豫少家隨州夢升從其兄茂宗官于隨豫為童子立諸兄側見夢升年十七八眉目明秀善飲酒談笑豫雖幼心已獨奇夢升後七年豫與夢升皆舉進士於京師夢升得丙科初任興國軍永興主簿怏怏不得志以疾去久之復調江陵府公安主簿時豫謫夷陵令遇之于江陵夢升顔色憔悴初不可識久而握手噓嚱相飲以酒夜醉起舞歌呼大􅛐豫益悲夢升志雖衰而少時意氣尚在也後二年豫徙乾德令夢升復調南陽主簿又遇之于鄧間常問其平生所為文章幾何夢升慨然歎曰吾已諱之矣窮達有命非世之人不知我我羞道于世人也求之不肻出遂飲之酒復大醉起舞歌呼因笑曰子知我者乃肯出其文讀之博辨雄偉意氣奔放若不可禦豫又益悲夢升志雖困而文章未衰也是時謝希深出守鄧州尤喜稱道天下士豫因手書夢升文一通欲以示希深未及而希深卒豫亦去鄧後之守鄧者皆俗吏不復知夢升夢升素剛不茍合負其所有常怏怏無所施卒以不得志死于南陽夢升諱注以寶元二年四月二十五日卒享年四十有二其平生所為文曰破碎集公安集南陽集凡三十卷娶潘氏生四男二女將以慶厯四年某月某日葬于董坊之先塋其弟渭泣而來告曰吾兄患世之莫吾知孰可為其銘豫素悲夢升者因為之銘曰豫嘗讀夢升之文至於哭其兄子庠之詞曰子之文章電激雷震雨雹忽止閴然滅泯未嘗不諷誦歎息而不已嗟夫夢升曾不及庠不震不驚鬱塞埋藏孰豫其有不使其施吾不知所歸咎徒為夢升而悲張子野墓志銘總寫交游之情而自任及樂善宛然言外吾友張子野既亡之二年其弟充以書來請曰吾兄之喪將以今年三月某日葬于開封不可以不銘銘之莫如子宜嗚呼豫雖不能銘然樂道天下之善以傳焉況若吾子野者非獨其善可銘又有平生之舊朋友之恩與其可哀者皆宜見於豫文宜其來請於豫也初天聖九年豫為西京留守推官是時陳郡謝希深南陽張堯夫與吾子野尚皆無恙於時一府之士皆魁傑賢豪日相往來飲酒歡呼上下角逐爭相先後以為笑樂而堯夫子野退然其間不動聲氣衆皆指為長者豫時尚少心壯志得以為洛陽東西之衝賢豪所聚者多為適然耳其後去洛來京師南走夷陵並江漢其行萬三四千里山砠水崖窮居獨遊思從曩人邈不可得然雖洛人至今皆以謂無如嚮時之盛然後知世之賢豪不常聚而交遊之難得為可惜也初在洛時已哭堯夫而銘之其後六年又哭希深而銘之今又哭吾子野而銘於是又知非徒相得之難而善人君子欲使幸而久在於世亦不可得嗚呼可哀也已子野之世曰贈太子太師諱某曾祖也宣徽北院使樞密副使纍贈尚書令諱遜皇祖也尚書比部郎中諱敏中皇考也曾祖妣李氏隴西郡夫人祖妣宋氏昭化郡夫人孝章皇后之妹也妣李氏永安縣太君子野家聯后姻世久貴仕而被服操履甚於寒儒好學自力善筆札天聖二年舉進士厯漢陽軍司理參軍開封府咸平主簿河南法曹參軍王文康公錢思公謝希深與今參知政事宋公咸薦其能改著作佐郎監鄭州酒稅知閬州閬中縣就拜祕書丞秩滿知亳州鹿邑縣寶元二年二月丁未以疾卒于官享年四十有八子伸郊社掌生次從次幼未名女五人一適人矣妻劉氏長安縣君子野為人外雖愈怡中自刻苦遇人渾渾不見圭角而志守端直臨事果決平居酒半脫冠垂頭童然秃且白矣豫固已悲其早衰而遂止於此豈其中亦有不自得者邪子野諱先其上世博州高堂人自曾祖已來家京師而葬開封今為開封人也銘曰嗟夫子野質厚材良孰屯其亨孰短其長豈其中有不自得而外物有以戕開封之原新里之鄉三世于此其歸其藏薛質夫墓志銘可為無後者之慰故大理寺丞薛君直儒字質夫資政殿學士贈禮部尚書簡肅公之子母曰金城郡夫人趙氏質夫生四嵗為殿直公為參知政事拜大理評事遷將作監丞景祐元年公薨天子推恩於其孤拜大理寺丞公以忠直剛毅顯于當世質夫為名臣子能純儉謹飭好學自立以世其家公葬綘州質夫自京師杖而行哭至于綘州行路之人皆哀嗟之質夫少多病後公六年以卒享年二十有四初娶向氏某人之孫某人之女再娶王氏某人之孫某人之女皆無子嗚呼簡肅公之世於是而絶孟子曰不孝有三無後為大此為舜娶妻而言耳非萬世之通論也不娶而無後罪之大者可也娶而無子與夫不幸短命未及有子而死以正者其人可以哀不可以為罪也故曰孟子之言非通論為舜而言可也質夫再娶皆無子不幸短命而疾病以死其可哀也非其罪也自古賢人君子未必皆有後其功德名譽垂世而不朽者非皆因其子孫而傳也伊尹周公孔子顔回之道著於萬世非其家世之能獨傳乃天下之所傳也有子莫如舜而瞽不得為善人卒為頑父是為惡者有後而無益為善雖無後而不朽然則為善者可以不懈為簡肅公者可以無憾也使簡肅公無憾質夫無罪全其身終其壽考以從其先君于地下復何道哉某娶簡肅公之女質夫之妹也常哀質夫之賢而不幸傷簡肅公之絶世閔金城夫人之老而孤故為斯言庶幾以慰其存亡者已悲夫銘曰死而有祀四世之間死而不朽萬世之傳簡肅之德質夫之賢雖其閟矣久也其存尹師魯墓志銘歐最得意友亦歐公最著意之文師魯河南人姓尹氏諱洙然天下之士識與不識皆稱之曰師魯蓋其名重當世而世之知師魯者或推其文學或高其議論或多其材能至其忠義之節處窮達臨禍福無愧於古君子則天下之稱師魯者未必盡知之師魯為文章簡而有法博學彊記通知古今長於春秋其與人言是是非非務窮盡道理乃已不為茍止而妄隨而人亦罕能過也遇事無難易而勇於敢為其所以見稱於世者亦所以取嫉于人故其卒窮以死師魯少舉進士及第為綘州正平縣主簿河南府戶曹參軍邵武軍判官舉書判拔萃遷山南東道掌書記知伊陽縣王文康公薦其才召試充館閣挍勘遷太子中允天章閣待制范公貶饒州諫官御史不肻言師魯上書言仲淹臣之師友願得俱貶貶監郢州酒稅又徙唐州遭父喪服除復得太子中允知河南縣趙元昊反陜西用兵大將葛懷敏奏起為經略判官師魯雖用懷敏辟而尤為經略使韓公所深知其後諸將敗於好水韓公降知秦州師魯亦徙通判濠州久之韓公奏得通判秦州遷知涇州又知渭州兼涇原路經略部署坐城水洛與邊將異議徙知晉州又知潞州為政有惠愛潞州人至今思之纍遷官至起居舍人直龍圖閣師魯當天下無事時獨喜論兵為叙燕息戍二篇行于世自西兵起凡五六嵗未嘗不在其間故其論議益精密而於西事尤習其詳其為兵制之說述戰守勝敗之要盡當今之利害又欲訓土兵代戍卒以減邊用為禦戎長久之䇿皆未及施為而元昊臣西兵解嚴師魯亦去而得罪矣然則天下之稱師魯者於其材能亦未必盡知之也初師魯在渭州將吏有違其節度者欲按軍法斬之而不果其後吏至京師上書訟師魯以公使錢貸部將貶崇信軍節度副使徙監均州酒稅得疾無醫藥舁至南陽求醫疾革憑几而坐顧稚子在前無甚憐之色與賓客言終不及其私享年四十有六以卒師魯娶張氏某縣君有兄源字子漸亦以文學知名前一嵗卒師魯凡十年間三貶官喪其父又喪其兄有子四人連喪其二女一適人亦卒而其身終以貶死一子三嵗四女未嫁家無餘資客其喪于南陽不能歸平生故人無逺邇皆往賻之然後妻子得以其柩歸河南以某年某月某日葬于先塋之次余與師魯兄弟交嘗銘其父之墓矣故不復次其世家焉銘曰藏之深固之密石可朽銘不滅孫明復先生墓志銘叙事甚錯綜可誦先生諱復字明復姓孫氏晉州平陽人也少舉進士不中退居泰山之陽學春秋著尊王發微魯多學者其尤賢而有道者石介自介而下皆以弟子事之先生年逾四十家貧不娶李丞相迪將以其弟之女妻之先生疑焉介與羣弟子進曰公卿不下士久矣今丞相不以先生貧賤而欲託以子是高先生之行義也先生宜因以成丞相之賢名於是乃許孔給事道輔為人剛直嚴重不妄與人聞先生之風就見之介執杖屨侍左右先生坐則立升降拜則扶之及其往謝也亦然魯人既素高此兩人由是始識師弟子之禮莫不歎嗟之而李丞相孔給事亦以此見稱於士大夫其後介為學官語于朝曰先生非隱者也欲仕而未得其方也慶厯二年樞密副使范仲淹資政殿學士富弼言其道德經術宜在朝廷召拜挍書郎國子監直講嘗召見邇英閣說詩將以為侍講而嫉之者言其講說多異先儒遂止七年徐州人孔直溫以狂謀捕治索其家得詩有先生姓名坐貶監處州商稅徙泗州又徙知河南府長水縣僉署應天府判官公事通判陵州翰林學士趙槩等十餘人上言孫某行為世法經為人師不宜弃之逺方乃復為國子監直講居三嵗以嘉祐二年七月二十四日以疾卒于家享年六十有六官至殿中丞先生在太學時為大理評事天子臨幸賜以緋衣銀魚及聞其喪惻然豫其家錢十萬而公卿大夫朋友太學之諸生相與弔哭賻治其喪於是以其年十月二十七日葬先生於鄆州須城縣盧泉鄉之北扈原先生治春秋不惑傳注不為曲說以亂經其言簡易明於諸侯大夫功罪以考時之盛衰而推見王道之治亂得於經之本義為多方其病時樞密使韓琦言之天子選書吏給紙筆命其門人祖無擇就其家得其書十有五篇録之藏于祕閣先生一子大年尚幼銘曰聖既殁經更載焚逃藏脫亂僅傳存衆說乘之汨其原怪迂百出雜僞真後生牽卑習前聞有欲患之寡攻羣往往止燎以膏薪有勇夫子闢浮雲刮磨蔽蝕相吐吞日月卒復光破昏博哉功利無窮垠有考其不在斯文荆川曰一生人事或捉在前或綴在後銘詞擬樊宗師銘南陽縣君謝氏墓志銘法度恰好豫友宛陵梅聖俞來自吳興出其哭內之詩而悲曰吾妻謝氏亡矣丐我以銘而葬焉豫語之未暇作居一嵗中書七八至未嘗不以謝氏銘為言且曰吾妻故太子賓客諱濤之女希深之妹也希深父子為時聞人而世顯榮謝氏生於盛族年二十以歸吾凡十七年而卒卒之夕斂以嫁時之衣甚矣吾貧可知也然謝氏怡然處之治其家有常法其飲食器皿雖不及豐侈而必精以㫖其衣無故新而浣濯縫紉必潔以完所至官舍雖卑陋而庭宇灑掃必肅以嚴其平居語言容止必從容以和吾窮於世久矣其出而幸與賢士大夫遊而樂入則見吾妻之怡怡而忘其憂使吾不以富貴貧賤纍其心者抑吾妻之助也吾嘗與士大夫語謝氏多從戶屏竊聽之間則盡能商𣙜其人才能賢否及時事之得失皆有條理吾官吳興或自外醉而歸必問曰今日孰與飲而樂乎聞其賢者也則悅否則歎曰君所交皆一時賢俊豈其屈已下之邪惟以道德焉故合者尤寡今與是人飲而歡邪是嵗南方旱仰見飛蝗而歎曰今西兵未解天下重困盜賊暴起於江淮而天旱且蝗如此我為婦人死而得君葬我幸矣其所以能安居貧而不困者其性識明而知道理多此類嗚呼其生也迫吾之貧而沒也又無以厚焉謂惟文字可以著其不朽且其平生尤知文章為可貴歿而得此庶幾以慰其魂且塞豫悲此吾所以請銘於子之勤也若此豫忍不銘夫人享年三十七用夫恩封南陽縣君二男一女以其年七月七日卒于高郵梅氏世葬宛陵以貧不能歸也某年某月某日葬于潤州之某縣某原銘曰高崖斷谷兮京口之原山蒼水深兮土厚而堅居之可樂兮卜者曰然骨肉歸土兮魂氣升天何必故鄉兮然後為安荆川曰叙女德簡叙書詞纎悉長壽縣太君李氏墓志銘叙事略而藴思數有法大中大夫尚書屯田郎中上國柱王公諱利之夫人曰李氏李氏世家湖南其父諱昭文官至國子博士贈工部侍郎夫人年二十二歸于王氏用夫封隆平縣君後以其子徙封長壽縣太君夫人為李氏女事後母以孝聞及為王氏婦以事父母者事其舅姑其舅姑嘗稱夫人以誡諸婦曰事我者當如此又以誡其諸女曰為人婦者當如此其為母也有三男三女及其老也鼎為職方員外郎震太子中舍復太常博士三子者皆有才行而復尤好古有文聞于當世女皆有歸孫男六人曰夷仲曰虞仲曰于仲曰南仲曰武仲曰延仲女五人一亦歸人矣餘尚幼夫人享年八十有六以慶厯七年十月十日終于京兆子復之官舍用明年二月十七日合葬于河南洛陽大樊原王公之墓夫人於王氏積行纍功其德備矣不可以遍書書其舅姑之所嘗稱者以見其為婦之道書其子之賢而有立以見其為母之方書其子孫之衆壽考之隆以見其勤于其家至于有成而終享其福之厚嗚呼於夫人無不足矣而其子若孫皆曰未也謂必有以示永久而不沒者庶幾以慰無窮之哀乃來請銘以葬其子之友廬陵歐陽修為之銘曰家成于勤德隆以壽歸安其藏以昌厥後渤海縣太君高氏墓碣中多摹韓公處故尚書兵部員外郎知制誥知鄧州軍州事陽夏公之夫人姓高氏宣州宣城人也父諱惠連官至兵部郎中母曰廣陵縣君勾氏陽夏公諱絳姓謝氏夫人有子曰景初景溫景平景回女一早卒次適上虞縣令王存次適大理寺丞李處厚次若干人未嫁寶元二年陽夏公卒于鄧州以其年八月某日葬于某所後若干年夫人隨其子某官于某州以某年某月某日卒于官舍遂以某年某月某日合葬于公之墓夫人初以夫封文安縣君後以其子封渤海縣太君謝氏世為名族而陽夏公尤顯聞于時初公與豫俱官于洛陽而公之父太子賓客諱濤尚無恙其子景初景溫方為童兒景平始生二三女子皆幼豫日至其家進拜賓客見其鬢髮垂白衣冠肅潔貌厚而氣清壽考君子也退而與陽夏公遊見其年壯志盛偉然方為一時名臣而諸兒女子戲嬉樽席之間者皆穎發而秀好於是時夫人以孝力事其舅為賢婦以柔順事其夫為賢妻以恭儉均一教育其子為賢母後二三年賓客薨于京師又五六年陽夏公卒于鄧又十餘年景初景溫景平皆以進士及第景初為某官景溫某官景平某官夫人于其舅與夫為婦之禮備於其子立家之道成享年若干以卒嗚呼豫始銘賓客又銘陽夏公今又書夫人之事于碣殆見謝氏更一世矣其為之書也宜得其詳北海郡君王氏墓志銘通篇以衆所稱許為志一變調太常丞致仕吳君之夫人曰北海郡君王氏濰州北海人也皇考諱汀舉明經不中後為本州助教夫人年二十三歸于吳氏天聖元年六月二日以疾卒享年三十有七夫人為人孝順儉勤自其幼時凡於女事其保傅皆曰教而不勞組紃織絍其諸女皆曰巧莫可及其歸於吳氏也其母曰自吾女適人吾之內事無所助而吳氏之姑曰自吾得此婦吾之內事不失時及其卒也太常君曰舉吾里中有賢女者莫如王氏於是娶其女弟以為繼室而今夫人戒其家曰凡吾吳氏之內事惟吾女兄之法是守至今而不敢失夫人有賢子曰奎字長文初舉明經為殿中丞後舉賢良方正直言極諫今為翰林學士尚書兵部員外郎知制誥夫人初用子恩追封福昌縣君其後長文貴顯以夫人為請天子曰近臣吾所寵也有請其可不從乃特追封夫人為北海郡君長文號泣頓首曰臣奎不幸竊享厚祿不得及其母而天子寵臣以此俾以報其親臣奎其何以報當是時朝廷之士大夫吳氏之鄉黨鄰里皆咨嗟歎息曰吳氏有子矣嘉祐四年冬長文請告于朝將以明年正月丁酉葬夫人于鄆州之魚山以書來乞銘夫人生三男曰奎奄胃今夫人生一男曰參女三人孫男女九人曾孫女二人銘曰奎顯矣奄早亡胃與參仕方强以一子榮一鄉生雖不及歿有光孫曾多有後愈昌荆川曰此銘與前作皆是善生發處此是作女人文字之法也唐宋八大家文鈔卷五十七
