body:
  text: 唐宋八大家文鈔卷九十明茅坤撰臨川文鈔十論原說解雜類諫官論恐不如歐陽公書及司馬溫公諫院記以賢治不肖以貴治賤古之道也所謂貴者何也公卿大夫是也所謂賤者何也士庶人是也同是人也或為公卿或為士何也為其不能公卿也故使之為士為其賢於士也故使之為公卿此所謂以賢治不肖以貴治賤也今之諫官者天子之所謂士也其貴則天子之三公也惟三公以安危治亂存亡之故無所不任其責至於一官之廢一事之不得無所不當言故其位在卿大夫之上所以貴之也其道德必稱其位所謂以賢也至士則不然修一官而百官之廢不可以預也守一事而百事之失可以毋言也稱其德副其材而命之以位也循其名傃其分以事其上而不敢過也此君臣之分也上下之道也今命之以士而責之以三公士之位而受三公之責非古之道也孔子曰必也正名乎正名也者所以正分也然且為之非所謂正名也身不能正名而可以正天下之名者未之有也蚳蛙為士師孟子曰似也為其可以言也蛙諫於王而不用致為臣而去孟子曰有言責者不得其言則去有官守者不得其職則去然則有官守者莫不有言責有言責者莫不有官守士師之諫於王是也其諫也蓋以其官而已矣是古之道也古者官師相規工執藝事以諌其或不能諫謂之不恭則有常刑蓋自公卿至於百工各以其職諫則君孰與為不善自公卿至於百工皆失其職以阿上之所好則諫官者乃天下之所謂士耳吾未見其能為也待之以輕而要之以重非所以使臣之道也其待已也輕而取重任焉非所以事君之道也不得已若唐之太宗庶乎其或可也雖然有道而知命者果以為可乎未之能處也唐太宗之時所謂諫官者與丞弼俱進於前故一言之謬一事之失可救之於將然不使其命已布於天下然後從而爭之也君不失其所以為君臣不失其所以為臣其亦庶乎其近古也今也上之所欲為丞弼所以言於上皆不得而知也及其命之已出然後從而爭之上聽之而改則是士制命而君聽也不聽而遂行則是臣不得其言而君恥過也臣不得其言士制命而君聽二者上下所以相悖而否亂之勢也然且為之其亦不知其道矣及其諄諄而不用然後知道之不行其亦辨之晚矣或曰周官之師氏保氏司徒之屬而大夫之秩也曰嘗聞周公為師而召公為保矣周公則未之學也材論語曰天下信未嘗無士即此意天下之患不患材之不衆患上之人不欲其衆不患士之不欲為患上之人不使其為也夫材之用國之棟梁也得之則安以榮失之則亡以辱然上之人不欲其衆不使其為者何也是有三蔽焉其尤蔽者以為吾之位可以去辱絶危終身無天下之患材之得失無補於治亂之數故偃然肆吾之志而卒入於敗亂危辱此一蔽也又或以謂吾之爵祿富貴足以誘天下之士榮辱憂戚在我吾可以坐驕天下之士將無不趨我者則亦卒入於敗亂危辱而已此亦一蔽也又或不求所以養育取用之道而諰諰然以為天下實無材則亦卒入於敗亂危辱而已此亦一蔽也此三蔽者其為患則同然而用心非不善而猶可以論其失者獨以天下為無材者耳蓋其心非不欲用天下之材特未知其故也且人之有材能者其形何以異於人哉惟其遇事而事治畫策而利害得治國而國安利此其所以異於人也上之人茍不能精察之審用之則雖抱臯䕫稷契之智且不能自異於衆况其下者乎世之蔽者方曰人之有異能於其身猶錐之在囊其末立見故未有有其實而不可見者也此徒有見於錐之在囊而固未覩夫馬之在廄也駑驥雜處飲水食芻嘶鳴蹄齧求其所以異者蔑矣及其引重車取夷路不屢策不煩御一頓其轡而千里已至矣當是之時使駑馬並驅則雖傾輪絶勒敗筋傷骨不舍晝夜而追之遼乎其不可以及也夫然後騏驥騕裊與駑駘别矣古之人君知其如此故不以天下為無材盡其道以求而試之試之之道在當其所能而已夫南越之修簳簇以百鍊之精金羽以秋鶚之徑翮加强弩之上而彍之千步之外雖有犀兕之捍無不立穿而死者此天下之利器而决勝覿武之所寶也然用以敲撲則無以異於朽槁之挺是知雖得天下之瑰材桀智而用之不得其方亦若此矣古之人君知其如此於是銖量其能而審處之使大者小者長者短者强者弱者無不適其任者焉如是則士之愚蒙鄙陋者皆能奮其所知以效小事况其賢能智力卓犖者乎嗚呼後之在位者蓋未嘗求其說而試之以實也而坐曰天下果無材亦未之思而已矣或曰古之人於材有以教育成就之而子獨言其求而用之者何也曰天下法度未立之後必先索天下之材而用之如能用天下之材則能復先王之法度能復先王之法度則天下之小事無不如先王時矣况教育成就人材之大者乎此吾所以獨言求而用之之道也噫今天下蓋嘗患無材吾聞之六國合從而辨說之材出劉項並世而籌畫戰鬬之徒起唐太宗欲治而謨謀諫諍之佐來此數輩者方此數君未出之時蓋未嘗有也人君茍欲之斯至矣天下之廣人物之衆而曰果無材可用者吾不信也原過文不踰三百字而轉折變化不窮天有過乎有之陵厯鬬蝕是也地有過乎有之崩弛竭塞是也天地舉有過卒不纍覆且載者何善復常也人介乎天地之間則固不能無過卒不害聖且賢者何亦善復常也故太甲思庸孔子曰勿憚改過楊雄貴遷善皆是術也豫之朋有過而能悔悔而能改人則曰是向之從事云爾今從事與向之從事弗類非其性也飾表以疑世也夫豈知言哉天播五行於萬靈人固備而有之有而不思則失思而不行則廢一日咎前之非沛然思而行之是失而復得廢而復舉也顧曰非其性是率天下而戕性也且如人有財見篡於盜已而得之曰非夫人之財向篡於盜矣可歟不可也財之在已固不若性之為已有也財失復得曰非其財且不可性失復得曰非其性可乎原教大類韓文善教者藏其用民化上而不知所以教之之源不善教者反此民知所以教之之源而不誠化上之意善教者之為教也致吾義忠而天下之君臣義且忠矣致吾孝慈而天下之父子孝且慈矣致吾恩於兄弟而天下之兄弟相為恩矣致吾禮於夫婦而天下之夫婦相為禮矣天下之君君臣臣父父子子兄兄弟弟夫夫婦婦皆吾教也民則曰我何賴於彼哉此謂化上而不知所以教之之源也不善教者之為教也不此之務而暴為之制煩為之防劬劬於法令誥戒之間藏於府憲於市屬民於鄙野必曰臣而臣君而君子而子父而父兄弟者無失其為兄弟也夫婦者無失其為夫婦也率是也有賞不然則罪鄉閭之師族鄼之長踈者時讀密者日告若是其悉矣顧不有服教而附于刑者於是嘉石以慙之圜土以苦之甚者棄之於市朝放之於裔末卒不可以已也此謂民知所以教之之源而不誠化上之意也善教者浹於民心而耳目無聞焉以道擾民者也不善教者施於民之耳目而求浹於心以道强民者也擾之為言猶山藪之擾毛羽川澤之擾鱗介也豈有制哉自然然耳强之為言其猶囿毛羽沼鱗介乎一失其制脫然逝矣噫古之所以為古無異焉由前而已矣今之所以不為古無異焉由後而已矣或曰法令誥戒不足以為教乎曰法令誥戒文也吾云爾者本也失其本而求之文吾不知其可也性說或曰荆公性說専闢韓子孔子曰性相近也習相逺也吾是以與孔子也韓子之言性也吾不有取焉然則孔子所謂中人以上可以語上中人以下不可以語上惟上智與下愚不移何說也曰習於善而已矣所謂上智者習於惡而已矣所謂下愚者一習於善一習於惡所謂中人者上智也下愚也中人也其卒也命之而已矣有人於此未始為不善也謂之上智可也其卒也去而為不善然後謂之中人可也有人於此未始為善也謂之下愚可也其卒也去而為善然後謂之中人可也惟其不移然後謂之上智惟其不移然後謂之下愚皆於其卒也命之夫非生而不可移也且韓子之言弗顧矣曰性之品三而其所以為性五夫仁義禮智信孰而可謂不善也又曰上焉者之於五主於一而行之四下焉者之於五反於一而悖於四是其於性也不一失焉而後謂之上焉者不一得焉而後謂之下焉者是果性善而不善者習也然則堯之朱舜之均瞽瞍之舜鯀之禹后稷越椒叔魚之事後所引者皆不可信邪曰堯之朱舜之均固吾所謂習於惡而已者瞽瞍之舜鯀之禹固吾所謂習於善而已者后稷之詩以異云而吾之所論者常也詩之言至以為人子而無父人子而無父猶可以推其質常乎夫言性亦常而已矣無以常乎則狂者蹈火而入河亦可以為性也越椒叔魚之事徒聞之左丘明丘明固不可信也以言取人孔子失之宰我以貌失之子羽此兩人者其成人也孔子朝夕與之居以言貌取之而失彼其始生也婦人以聲與貌定而卒得之婦人者獨有過孔子者耶進說古之時士之在下者無求於上上之人日汲汲惟恐一士之失也古者士之進有以德有以才有以言有以曲藝今徒不然自茂才等而下之至於明法其進退之皆有法度古之所謂德者才者無以為也古之所謂言者又未必應今之法度也誠有豪傑不世出之士不自進乎此上之人弗舉也誠進乎此而不應今之法度有司弗取也夫自進乎此皆所謂枉已者也孟子曰未有枉已能正人者也然而今之士不自進乎此者未見也豈皆不如古之士自重以有恥乎古者井天下之地而授之氓士之未命也則授一㕓而為氓其父母妻子裕如也自家達有孰有序有庠有學觀游止處師師友友絃歌堯舜之道自樂也磨礱鐫切沉浸灌養行完而才備則曰上之人其舍我哉上之人其亦莫之能舍也今也地不井國不學黨不庠遂不序家不孰士之未命也則或無以裕父母妻子無以處行完而才備上之人亦莫之舉也士安得而不自進嗚呼使今之士不若古非人則然勢也勢之異聖賢之所以不得同也孟子不見王公而孔子為季氏吏夫不以勢乎哉士之進退不惟其德與才而惟今之法度而有司之好惡未必今之法度也是士之進不惟今之法度而幾在有司之好惡耳今之有司非昔之有司也後之有司又非今之有司也有司之好惡豈常哉是士之進退果卒無所必而已矣噫以言取人未之失也取焉而又不得其所謂言是失之失也况又重以有司好惡之不可常哉古之道其卒不可以見乎士也有得已之勢其得不已乎得已而不已未見其為有道也楊叔明之兄弟以父任在京官其勢非吾所謂無以處無以裕父母妻子而有不得已焉者也自枉而為進士而又枉於有司而又若不釋然二君固常自任以道而且朋友我矣懼其猶未寤也為進說與之復讎解當與韓柳議參看或問復讎對曰非治世之道也明天子在上自方伯諸侯以至於有司各修其職其能殺不辜者少矣不幸而有焉則其子弟以告于有司有司不能聽以告于其君其君不能聽以告于方伯方伯不能聽以告于天子則天子誅其不能聽者而為之施刑於其讎亂世則天子諸侯方伯皆不可以告故書說紂曰凡有辜罪乃罔恆獲小民方興相為敵讎蓋讎之所以興以上之不可告辜罪之不常獲也方是時有父兄之讎而輒殺之者君子權其勢恕其情而與之可也故復讎之義見於春秋傳見於禮記為亂世之為子弟者言之也春秋傳以為父受誅子復讎不可也此言不敢以身之私而害天下之公又以為父不受誅子復讎可也此言不以有可絶之義廢不可絶之恩也周官之說曰凡復讎者書于士殺之無罪疑此非周公之法也凡所以有復讎者以天下之亂而士之不能聽也有士矣不能聽其殺人之罪以施行而使為人之子弟者讎之然則何取於士而祿之也古之於殺人其聽之可謂盡矣猶懼其未也曰與其殺不辜寧失不經今書于士則殺之無罪則所謂復讎者果所謂可讎者乎庸詎知其不獨有可言者乎就當聽其罪矣則不殺於士師而使讎者殺之何也故疑此非周公之法也或曰世亂而有復讎之禁則寧殺身以復讎乎將無復讎而以存人之祀乎曰可以復讎而不復非孝也復讎而殄祀亦非孝也以讎未復之恥居之終身焉蓋可也讎之不復者天也不忘復讎者已也克己以畏天心不忘其親不亦可矣同學一首别子固文嚴而格古江之南有賢人焉字子固非今所謂賢人者豫慕而友之淮之南有賢人焉字正之非今所謂賢人者豫慕而友之二賢人者足未嘗相過也口未嘗相語也辭幣未嘗相接也其師若友豈盡同哉豫考其言行其不相似者何其少也曰學聖人而已矣學聖人則其師若友必學聖人者聖人之言行豈有二哉其相似也適然豫在淮南為正之道子固子固不豫疑也還江南為子固道正之子固亦以為然豫又知所謂賢人者既相似又相信不疑也子固作懷友一首遺豫其大略欲相扳以至乎中庸而後已正之蓋亦嘗云爾夫安驅徐行轥中庸之庭而造於其堂舍二賢人者而誰哉豫昔非敢自必其有至也亦願從事於左右焉爾輔而進之其可也噫官有守私有繫㑹合不可以常也作同學一首别子固以相警且相慰云書李文公集後看王公文字須識得他筆力天縱處文公非董子作仕不遇賦惜其自待不厚以余觀之詩三百發憤於不遇者甚衆而孔子亦曰鳯鳥不至河不出圖吾已矣夫蓋嘆不遇也文公論髙如此及觀於史一不得職則詆宰相以自快今吾於人也聽其言而觀其行言不可獨信久矣雖然彼宰相名實固有辨彼誠小人也則文公之發為不忍於小人可也為史者獨安取其怒之以失職耶世之淺者固好以其利心量君子以為觸宰相以近禍非以其私則莫為也夫文公之好惡蓋所謂皆過其分者耳方其不信於天下更以推賢進善為急一士之不顯至寢食為之不甘蓋奔走有力成其名而後已士之廢興彼各有命身非王公大人之位取其任而私之又自以為賢僕僕然忘其身之勞也豈所謂知命者耶記曰道之不行賢者過之不肖者不及也夫文公之過也抑其所以為賢歟讀江南録行文宛曲其所議鉉厚誣潘佑處可謂刺骨之論故散騎常侍徐公鉉奉太宗命撰江南録至李氏亡國之際不言其君之過但以厯數存亡論之雖有愧於實録其於春秋之義箕子之說徐氏録為得焉然吾聞國之將亡必有大惡惡者無大於殺忠臣國君無道不殺忠臣雖不至於治亦不至於亡紂為君至暴矣武王觀兵於孟津諸侯請伐紂武王曰未可及聞其殺王子比干然後知其將亡也一舉而勝焉季梁在隋隋人雖亂楚人不敢加兵虞以不用宫之竒之言晉人始有納璧假道之謀然則忠臣國之與也存與之存亡與之亡豫自為兒童時已聞金陵臣潘佑以直言見殺當時京師因舉兵來伐數以殺忠臣之罪及得佑所上諌李氏表觀之詞意質直忠臣之言豫諸父中舊多為江南官者其言金陵事頗詳聞佑所以死則信然則李氏之亡不徒然也今觀徐氏録言佑死頗以妖妄與豫舊所聞者甚不類不止於佑其他所誅者皆以罪戾何也豫甚怪焉若以商紂及隋虞二君論之則李氏亡國之君必有濫誅吾知佑之死信為無罪是乃徐氏匿之耳何以知其然吾以情得之大凡毁生於嫉嫉生於不勝此人之情也吾聞鉉與佑皆李氏臣而俱稱有文學十餘年爭名於朝廷間當李氏之危也佑能切諫鉉獨無一說以佑見誅鉉又不能力諍卒使其君有殺忠臣之名踐亡國之禍皆鉉之由也鉉懼此過而又恥其善不及於佑故匿其忠而汙以他罪此人情之常也以佑觀之其他所誅者又可知矣噫若果有此吾謂鉉不唯厚誣忠臣其欺吾君不亦甚乎讀孔子世家荆公短文字轉折有絶似太史公處太史公敘帝王則曰本紀公侯傳國則曰世家公卿特起則曰列傳此其例也其列孔子為世家奚其進退無所據耶孔子旅人也棲棲衰季之世無尺土之柄此列之以傳宜矣曷為世家哉豈以仲尼躬將聖之資其教化之盛舄奕萬世故為之世家以抗之又非極摯之論也夫仲尼之才帝王可也何特公侯哉仲尼之道世天下可也何特世其家哉處之世家仲尼之道不從而大置之列傳仲尼之道不從而小而遷也自亂其例所謂多所抵牾者也讀孟嘗君傳世皆稱孟嘗君能得士士以故歸之而卒賴其力以脫於虎豹之秦嗟乎孟嘗君特雞鳴狗盜之雄耳豈足以言得士不然擅齊之强得一士焉宜可以南面而制秦尚何取雞鳴狗盜之力哉夫雞鳴狗盜之出其門此士之所以不至也讀刺客傳曹沫將而亡人之城又劫天下盟主管仲因勿倍以市信一時可也豫獨怪智伯國士豫讓豈顧不用其策耶讓誠國士也曾不能逆策三晉救智伯之亡一死區區尚足挍哉其亦不欺其意者也聶政售於嚴仲子荆軻豢於燕太子丹此兩人者汙隱困約之時自責其身不妄願知亦曰有待焉彼挾道德以待世者何如哉讀栁宗元傳余觀八司馬皆天下之竒材也一為叔文所誘遂陷於不義至今士大夫欲為君子者皆羞道而喜攻之然此八人者既困矣無所用於世往往能自强以求列於後世而其名卒不廢焉而所謂欲為君子者吾多見其初而已要其終能無與世俯仰以自别於小人者少耳復何議彼哉書洪範傳後看荆公自立地位處王某曰古之學者雖問以口而其傳以心雖聽以耳而其受以意故為師者不煩而學者有得也孔子曰不憤不啓不悱不發舉一隅不以三隅反則不復也夫孔子豈敢愛其道驁天下之學者而不使其蚤有知乎以謂其問之不切則其聽之不専其思之不深則其取之不固不専不固而可以入者口耳而已矣吾所以教者非將善其口耳也孔子沒道日以衰熄浸淫至於漢而傳注之家作為師則有講而無應為弟子則有讀而無問非不欲問也以經之意為盡於此矣吾可無問而得也豈特無問又將無思非不欲思也以經之意為盡於此矣吾可以無思而得也夫如此使其傳注者皆已善矣固足以善學者之口耳不足善其心况其有不善乎宜其厯年以千數而聖人之經卒於不明而學者莫能資其言以施於世也豫悲夫洪範者武王之所以虛心而問與箕子之所以悉意而言為傳注者汨之以至於今冥冥也於是為作傳以通其意嗚呼學者不知古之所以教而蔽於傳注之學也久矣當其時欲其思之深問之切而後復焉則吾將孰待而言邪孔子曰豫欲無言然未嘗無言也其言也蓋有不得已焉孟子則天下固以為好辨蓋邪說暴行作而孔子之道幾於熄焉孟子者不如是不足與有明也故孟子曰豫豈好辨哉豫不得已也夫豫豈樂反古之所以教而童為此譊譊哉其亦不得已焉者也唐宋八大家文鈔卷九十
