body:
  text: 唐宋八大家文鈔卷一百二十六明茅坤撰東坡文鈔十書上韓魏公論場務書公是時為鳳翔推官輒能首陳郡中民瘼若此軾再拜獻書昭文相公執事軾得從宦於西嘗以為當今制置西事其大者未便非痛整齊之其勢不足以久安未可以隨欹而拄隨壞而補也然而其事宏闊浩汗非可以倉卒輕言者今之所論特欲救一時之急解朝夕之患耳往者寶元以前秦人之富強可知也中户不可以畝計而計以頃上户不可以頃計而計以賦耕於野者不願為公侯藏於民家者多於府庫也然而一經元昊之變水災火燎十不存三四今之所謂富民者嚮之僕𨽻也今之所謂蓄聚者嚮之殘棄也然而不知昊賊之遺種其將永世而臣伏邪其亦有時而不臣也以向之民力堅完百倍而不能支以今之傷殘之餘而能辦者軾所不識也夫平安無事之時不務多方優裕其民使其氣力渾厚足以勝任縣官權時一切之政而欲一旦納之於患難軾恐外憂未去而內憂乘之也鳯翔京兆凡此兩郡者陜西之囊槖也今使有變則緣邉被兵之郡知戰守而已戰而無食則北守而無財則散使戰不北守不散其權固在此兩郡也軾官於鳯翔見民之所最畏者莫若衙前之役自其家之甕盎釜甑以上計之長役及十千鄉户及二十千皆占役一分所謂一分者名為糜錢十千可辦而其實皆十五六千至二十千而多者至不可勝計也科役之法雖始於上户然至於不足則遞取其次最下至於家資及二百千者於法皆可科自近嵗以來凡所科者鮮有能大過二百千者也夫為王民自甕盎釜甑以上計之而不能滿二百千則何以為民今也及二百千則不免焉民之窮困亦可知矣然而縣官之事嵗以二千四百分為計所謂優輕而可以償其勞者不能六百分而捕獲強惡者願入焉擲發贓弊者願入焉是二千四百分者衙前之所獨任而六百分者未能純被於衙前也民之窮困又可知矣今之最便惟重難日損優輕日增則民尚可以生此軾之所為區區議以官𣙜與民也其詳固已具於府之所録以聞者從軾之説而盡以豫民失錢之以貫計者軾嘗粗較之嵗不過二萬失之於酒課而償之以稅緡是二萬者未得為全失也就使為全失二萬均多補少要以共足此一轉運使之所辦也如使民日益困窮而無告異日無以待倉卒意外之患則雖復嵗得千萬無益於敗此賢將帥之所畏也軾以為陛下新御宇內方求所以為千萬年之計者必不肯以一轉運使之所能辦而易賢將帥之所畏況於相公才略冠世不牽於俗人之論乃者變易茶法至今以為不便者十人而九相公尚不顧行之益堅今此事至小一言可決去嵗赦書使官自買木關中之民始知有生意嚮非相公果斷而力行必且下三司三司固不許幸而許必且下本路本路下諸郡或以為可或以為不可然後監司類聚其説而參酌之比復於朝廷固已期嵗矣其行不行又未可知也如此而民何望乎方今山陵事起日費千金軾乃於此時議以官𣙜與民其為迂闊取笑可知矣然竊以為古人之所以大過人者惟能於擾攘急迫之中行寬大間暇久長之政此天下之所以不測而大服也朝廷自數十年以來取之無術用之無度是以民日困官日貧一旦有大故則政出一切不復有所擇此從來不革之過今日之所宜深懲而永慮也山陵之功不過嵗終一切之政當訖事而罷明年之春則陛下逾年即位改元之嵗必將首行王道以風天下及今使郡吏議之減定其數當復以聞則言之今其時矣伏惟相公留意上文侍中論𣙜鹽書宋朝不𣙜河北鹽不可曉子瞻宦山東故所云如此留守侍中執事當今天下勳德俱髙為主上所倚信華實兼隆為士民所責望受恩三世宜與社稷同憂皆無如明公者今雖在外事有關於安危而非職之所憂者猶當盡力爭之而況其事關本職而憂及生民者乎竊意明公必已言之而人不知若猶未也則願效其愚頃者三司使章惇建言乞𣙜河北京東鹽朝廷遣使按視召周革入覲已有成議矣惇之言曰河北與陜西皆為邊防而河北獨不𣙜鹽此祖宗一時之誤恩也軾以為陜西之鹽與京東河北不同解池廣袤不過數十里既不可捐以豫民而官亦易以籠取青鹽至自虜中有可禁止之道然猶法存而實不行城門之外公食青鹽今東北循海皆鹽也其欲籠而取之正與淮南兩浙無異軾在餘杭時見兩浙之民以犯鹽得罪者一嵗至萬七千人而莫能止姦民以兵仗護送吏士不敢近者常以數百人為輩特不為他盜故上下通知而不以聞耳東北之人悍於淮浙逺甚平居椎剽之姦常甲於他路一旦𣙜鹽則其禍未易以一二數也由此觀之祖宗以來獨不𣙜河北鹽者正事之適宜耳何名為誤哉且𣙜鹽雖有故事然要以為非王政也陜西淮浙既未能罷又欲使京東河北隨之此猶患風痺人曰吾左臂既病矣右臂何為獨完則以酒色伐之可乎今議者曰吾之法與淮浙不同淮浙之民所以不免於私販而竈户所以不免於私賣者以官之買價賤而賣價貴耳今吾賤買而賤賣借如每斤官以三錢得之則以四錢出之鹽商私買於竈户利其賤耳賤不能減三錢竈户均為得三錢也寧以豫官乎將以豫私商而犯法乎此必不犯之道也此無異於兒重之見東海皆鹽也茍民力之所及未有捨而不煎煎而不賣者也而近嵗官錢常若窘迫遇其急時百用橫生以有限之錢買無窮之鹽竈户有朝夕薪米之憂而官錢在期月之後則其利必歸於私販無疑也食之於鹽非若飢之於五穀也五穀之乏至於節口并日而況鹽乎故私販法重而官鹽貴則民之貧而懦者或不食鹽往在浙中見山谷之人有數月食無鹽者今將𣙜之東北之俗必不如往日之嗜鹹也而望官課之不虧踈矣且淮浙官鹽本輕而利重雖有積滯官未病也今以三錢為本一錢為利自祿利購賞修築廒庾之外所獲無幾矣一有積滯不行官之所喪可勝計哉失民而得財明者不為況民財兩失者乎且禍莫大於作始作俑之漸至於用人今兩路未有鹽禁也故變之難遣使會議經年而未果自古作事欲速而不取衆議未有如今日者也然猶遲久如此以明作始之難也今既已𣙜之矣則他日國用不足添價貴賣有司以為熟事行半紙文書而決矣且明公能必其不添乎非獨明公不能也今之執政能自必乎茍不可必則兩路之禍自今日始夫東北之蠶衣被天下蠶不可無鹽而議者輕欲奪之是病天下也明公可不深哀而速救之歟或者以為朝廷既有成議矣雖爭之必不從竊以為不然乃者手實造簿方赫然行法之際軾嘗論其不可以告今太原韓公公時在政府莫之行也而手實卒罷民賴以少安凡今執政所欲必行者青苖助役市昜保甲而已其他猶可以庶幾萬一或者又以為明公將老矣若猶有所爭則其請老也難此又軾之所不識也使明公之言幸而聽屈已少留以全兩路之民何所不可不幸而不聽是議不中意其於退也尤易矣願少留意軾一郡守也猶以為職之所當憂而冒聞於左右明公其得已乎干瀆威重俯伏待罪而已河北京東宋不𣙜鹽者必有説愚竊意契丹既獲燕雲十六州而河北之民特相唇齒一𣙜鹽則椎剽之民恐必無聊而入契丹故特踈此法網以為容姦之地云耳不知是否上蔡省主論放欠書必蔡確為省主軾於門下蹤迹絶踈然私自揆度亦似見知於明公者尋常無因緣固不敢造次致書今既有所欲言而又默默拘於流俗人之議以為迹踈不當干説則是謂明公亦如凡人拘於踈密之分者竊以為不然故輒有所言不顧惟少留聽軾於府中實掌理欠自今嵗麥熟以來日與小民結為嫌恨鞭笞鎖繫與縣官日得千百錢固不敢憚也彼實侵盜欺官而不以時償雖日撻無愧然其間有甚足悲者或管押竹木風水之所漂或主持糧斛嵗久之所壞或布帛惡弱估剝以為虧官或糟滓潰爛紐計以為實欠或未輸之贓責於當時主典之吏或敗折之課均於保任干繫之家官吏上下舉知其非辜而哀其不幸迫於條憲勢不得釋朝廷亦深知其無告也是以每赦必及焉凡今之所追呼鞭撻日夜不得休息者皆更數赦逺者六七赦矣問其所以不得釋之狀則皆曰吾無錢以與三司之曹吏以為不信而考諸舊籍則有事同而先釋者矣曰此有錢者也嗟夫天下之人以為言出而莫敢逆者莫若天子之詔書也今詔書且已許之而三司之曹吏獨不許是猶可忍邪伏惟明公在上必不容此輩故敢以告凡四十六條二百二十五人錢七萬四百五十九千粟米三千八百三十斛其餘炭鐵器用材木冗雜之物甚衆皆經監司選吏詳定灼然可放者軾已具列聞於本府府當以奏奏且下三司議者皆曰必不報雖報必無決然了絶之命軾以為不然往年韓中丞詳定放欠以為赦書所放必待其家業蕩盡以至於干繫保人亦無孑遺可償者又當計赦後月日以為放數如此則所及甚少不稱天子一切寬貸之意自今茍無所隱欺者一切除免不問其他以此知今之所奏者皆可放無疑也伏惟明公獨斷而力行之使此二百二十五家皆得歸安其藜糗養其老幼日晏而起吏不至門以歌詠明公之德亦使赦書不為空言而無信者干冒威重退增恐悚答畢仲舉書放逹軾啓奉别忽十餘年愚瞽頓仆不復自比於朋友不謂故人尚爾記録逺枉手教存問甚厚且審比來起居佳勝感慰不可言羅山素號善地不應有瘴癘豈嵗時適爾既無所失亡而有得於齊寵辱忘得喪者是天相子也僕既以任意直前不用長者所教以觸罪罟然禍福要不可推避初不論巧拙也黃州濱江帶山既適耳目之好而生事百須亦不難致早寢晚起又不知所謂禍福果安在哉偶讀戰國策見處士顔蠋之語晚食以當肉欣然而笑若蠋者可謂巧於居貧者也菜羹菽黍差飢而食其味與八珍等而既飽之餘芻豢滿前惟恐其不持去也美惡在我何與於物所云讀佛書及合藥救人二事以為間居之賜甚厚佛書舊亦嘗看但暗塞不能通其妙獨時取其粗淺假説以自洗濯若農夫之去草旋去旋生雖若無益然終愈於不去也若世之君子所謂超然玄悟者僕不識也往時陳述古好論禪自以為至矣而鄙僕所言為淺陋僕嘗語述古公之所談譬之飲食龍肉也而僕之所學豬肉也豬之與龍則有間矣然公終日説龍肉不如僕之食豬肉實美而真飽也不知君所得於佛書者果何耶為出生死超三乘遂作佛乎抑尚與僕輩俯仰也學佛老者本期於靜而逹靜似懶逹似放學者或未至其所期而先得其所似不為無害僕常以此自疑故亦以為獻來書云處世得安穩無病粗衣飽飯不造寃業乃為至足三復斯言感歎無窮世人所作舉足動念無非是業不必刑殺無罪取非其有然後為寃業也無緣靣論以當一笑而已答張文濳書豫與荆川嘗力稱子由之文自不易得而子瞻亦云如此頓首文濳縣丞張君足下久别思仰到京公私紛然未暇奉書忽辱手教且審起居佳勝至慰至慰惠示文編三復感歎甚矣君之似子由也子由之文實勝僕而世俗不知乃以為不如其為人深不願人知之其文如其為人故汪洋淡泊有一唱三嘆之聲而其秀傑之氣終不可沒作黃樓賦乃稍自振厲若欲以警發憒憒者而或者便謂僕代作此尤可笑是殆見吾善者機也文字之衰未有如今日者也其源實出於王氏王氏之文未必不善也而患在於好使人同已自孔子不能使人同顔淵之仁子路之勇不能以相移而王氏欲以其學同天下地之美者同於生物不同於所生惟荒瘠斥鹵之地彌望皆黃茅白葦此則王氏之同也近見章子厚言先帝晚年甚患文字之陋欲稍變取士法特未暇耳議者欲稍復詩賦立春秋學官甚美僕老矣使後生猶得見古人之大全者正賴黃魯直秦少遊朝無咎陳履常與君等數人耳如聞君作太學博士願益勉之德輶如毛民鮮克舉之我儀圗之愛莫助之此外千萬善愛偶飲卯酒醉來人求書不能覼縷謝張太保撰先人墓碣書軾頓首再拜伏蒙再示先人墓表特載辨姦一篇恭覽涕泗不知所云竊惟先人早嵗泊沒晚乃有聞雖當時學者知師尊之然於其言語文章猶不能盡而況其中之不可形者乎所謂知之盡而信其然者舉世惟公一人雖若不幸然知我者希正老氏之所貴辨姦之始作也自軾與舍弟皆有嘻其甚矣之諫不論他人獨明公一見以為與我意合公固已論之先朝載之史册今雖客有不知後世決不可沒而先人之言非公表而出之則人未必信信不信何足深計然使斯人用區區小數以斯天下天下莫覺莫知恐後世必有秦無人之嘆此墓表之所以作而軾之所以流涕再拜而謝也黃叔度淡然無作郭林宗一言至今以為顔子林宗於人材小大畢取所賢非一人而叔度之賢無一見於外者而後世猶信徒以林宗之重也今公之重不減林宗所賢惟先人而其心迹粗若可見其信於後世必矣多言何足為謝聊發一二答黃魯直書蘇黃兩相知處可掬軾始見足下詩文於孫莘老之坐上聳然異之以為非今世之人也莘老言此人人知之者尚少子可謂稱揚其名軾笑曰此人如精金美玉不即人而人即之將逃名而不可得何以我稱揚為然觀其文以求其為人必輕外物而自重者今之君子莫能用也其後過李公擇於濟南則見足下之詩文愈多而得其為人益詳意其超逸絶塵獨立萬物之表馭風騎氣以與造物者遊非獨今世之君子所不能用雖如軾之放浪自棄與世闊踈者亦莫得而友也今者辱書詞纍幅執禮恭甚如見所畏者何哉軾方以此求交於足下而懼其不可得豈意得此於足下乎喜愧之懷殆不可勝然自入夏以來家人輩更臥病匆匆至今裁答甚緩想未深訝也古風二首託物引類真得古詩人之風而軾非其人也聊復次韻以為一笑秋暑不審起居何如未由會見萬萬以時自重答秦太虛書此等書並長公隨手淋漓者却自瀟灑脫俗可愛軾啓五月末舍弟來得手書勞問甚厚日欲裁謝因循至今遞中復辱教感愧益甚比日履兹初寒起居何如軾寓居粗遣但舍弟初到筠州即喪一女子而軾亦喪一老乳母悼念未衰又得鄉信堂兄中舍九月中逝去異鄉衰病觸目悽感念人命脆弱如此又承見喻中間得疾不輕且喜復健吾儕漸衰不可復作少年調度當速用道書方士之言厚自養鍊謫居無事頗窺其一二已借得本州天慶觀道堂三間冬至後當入此室四十九日乃出自非廢放安得就此太虛他日一為仕宦所縻欲求四十九日間豈可復得耶當及今為之但擇平時所謂簡要易行者日夜為之寢食之外不治他事但滿此期根本立矣此後縱復出從人事事已則心返自不能廢矣此書到日恐已不及然亦不須用冬至也寄示詩文皆超然勝絶亹亹焉來逼人矣如我輩亦不勞逼也太虛未免求祿仕方應舉求之應舉不可必竊為君謀宜多著書如所示論兵及盜賊等數篇但似此得數十首皆卓然有可用之實者不須及時事也但旋作此書亦不可廢應舉此書若成聊復相示當有知君者想喻此意也公擇近過此相聚數日説太虛不離口莘老未嘗得書知未暇通問程公闢須其子履中哀詞軾本自求作今豈可食言但得罪以來不復作文字自持頗嚴若復一作則決壞藩墻今後仍復衮衮多言矣初到黃廪人既絶人口不少私甚憂之但痛自節儉日用不得過百五十每月朔便取四千五百錢斷為三十塊挂屋梁上平旦用畫義挑取一塊即藏去又仍以大竹箇别貯用不盡者以待賓客此賈耘老法也度囊中尚可支一嵗有餘至時别作經畫水到渠成不須預慮以此胸中都無一事所居對岸武昌山水佳絶有蜀人王生在邑中往往為風濤所隔不能即歸則王生能為殺雞炊黍至數日不厭又有潘生者作酒店樊口棹小舟徑至店下村酒亦自醇釅柑橘椑柿極多大芉長尺餘不減蜀中外縣米斗二十有水路可致羊肉如北方豬牛麞鹿如土魚蟹不論錢岐亭監酒胡定之載書萬卷隨行喜借人看黃州曹官數人皆家善庖饌喜作會太虛視此數事吾事豈不既濟矣乎欲與太虛言者無窮但紙盡耳展讀至此想見掀髯一笑也子駿固吾所畏其子亦可喜曾與相見否此中有黃岡少府張舜臣者其兄堯臣皆云與太虛相熟兒子每蒙批問適會葬老乳母今勾當作墳未暇拜書嵗晚苦寒惟萬萬自重李端叔一書託為逹之夜中微被酒書不成字不罪不罪不宣與李方叔書詞旨瀟灑可誦屢獲來教因循不一裁答悚息不已比日履兹秋暑起居佳勝録示子駿行狀及數詩辭意整暇有加於前得之極喜慰纍書見責以不相薦引讀之甚愧然其説不可不盡君子之知人務相勉於道不務相引於利也足下之文過人處不少如李氏墓表及子駿行狀之類筆勢翩翩有可以追古作者之道至若前所示兵鑑則讀之終篇莫知所謂意者足下未甚有得於中而張其外者不然則老病昏惑不識其趣也以此私意猶冀足下積學不倦落其華而成其實深願足下為禮義君子不願足下豐於財而亷於德也若進退之際不甚慎靜則於定命不能有毫髮增益而於道德有丘山之損矣古之君子貴賤相因先後相援固多矣軾非敢廢此道平生相知心所謂賢者則於稠人中譽之或因其言以考其實實至則名隨之名不可掩其自為世用理勢固然非力致也陳履常居都下逾年未嘗一至貴人之門章子厚欲一見終不可得中丞傅欽之侍郎孫莘老薦之軾亦挂名其間會朝廷多知履常者故得一官軾孤立言輕未嘗獨薦人也爵祿乃人主所專宰相猶不敢必而欲責於軾可乎東漢處士私相諡非古也殆似丘明為素臣當得罪於孔門矣孟生貞曜蓋亦蹈襲流弊不足法而況近相名字者乎甚不願足下此等也軾於足下非愛之深期之逺定不及此猶能察其意否近秦少遊有書來亦論足下近文益竒明主求人如不及豈有終泊沒之理足下但信道自守當不求自至若不深自重恐喪失所有言切而盡臨紙悚息未即會見千萬保愛近夜眼昏不一不一答謝舉亷書此書所論文然却是蘇長公文章本色軾受性剛簡學迂材下坐廢纍年不敢復齒縉紳自還海北見平生親舊惘然如隔世人況與左右無一日之雅而敢求交乎數賜見臨傾蓋如故幸甚過望不敢言也所示書教及詩賦雜文觀之熟矣大略如行雲流水初無定質但常行於所當行常止於不可不止文理自然姿熊橫生孔子曰言之不文行之不逺又曰辭逹而已矣夫言止於逹意則疑若不文是大不然求物之妙如繫風捕影能使是物了然於心者蓋千萬人而不一遇也而況能使了然於口與手者乎是之謂辭達辭至於能逹則文不可勝用矣楊雄好為艱深之詞以文淺易之説若正言之則人人知之矣此正所謂雕蟲篆刻者其太玄法言皆是物也而獨悔於賦何哉終身雕蟲而獨變其音節便謂之經可乎屈原作離騷經蓋風雅之再變者雖與日月爭光可也可以其似賦而謂之雕蟲乎使賈誼見孔子升堂有餘矣而乃以賦鄙之至與司馬相如同科雄之陋如此比者甚衆可與知者道難與俗人言也因論文偶及之耳歐陽文忠公言文章如精金美玉市有定價非人所能以口舌貴賤也紛紛多言豈能有益於左右愧悚不巳答劉沔書情致脫落蕭颯軾頓首都曹劉君足下蒙示書教及編録拙詩文二十卷軾平生以言語文字見知於世亦以此取疾於人得失相補不如不作之安也以此常欲焚棄筆硯為瘖默人而習氣宿業未能盡去亦謂隨手雲散烏沒矣不知足下默隨其後綴拾編掇略無遺者覽之慙汗可為多言之戒然世之蓄軾詩文者多矣率真偽相半又多為俗子所改竄讀之使人不平然亦不足怪識真者少蓋從古所病梁蕭統集文選世以為工以軾觀之拙於文而陋於識者莫統若也宋玉賦髙唐神女其初略陳所夢之因如子虛云是公相與問答皆賦矣而統謂之敘此與兒童之見何異李陵蘇武贈别長安而詩有江漢之語及陵與武書詞句儇淺正齊梁間小兒所擬作決非西漢文而統不悟劉子玄獨知之范曄作蔡琰傳載其二詩亦非是董早已死琰乃流落方卓之亂伯喈尚無恙也而其詩乃云以卓亂故流入於胡此豈真琰語哉其筆勢乃效建安七子者非東漢詩也李太白韓退之白樂天詩文皆為庸俗所亂可為太息今足下所示二十卷無一篇偽者又少謬誤及所示書詞清婉雅奧有作者風氣知足下致力於斯文久矣某窮困本坐文字蓋願刳形去皮而不可得者然幼子過文益竒在海外孤寂無寥過時出一篇見娛則為數日喜寢食有味以此知文章如金玉珠貝未易鄙棄也見足下詞學如此又喜吾同年兄龍圖之有後也故勉作報書匆匆不宣答李端叔書看此等書長公據几隨手寫出者却自踈宕而深眇軾聞足下名久矣又於相識處往往見所作詩文雖不多亦足以髣佛其為人矣尋常不通書問怠慢之罪猶可闊略及足下斬然在疚亦不能以一字奉慰舍弟子由至先蒙惠書又復懶不即答頑鈍廢禮一至於此而足下終不棄絶遞中再辱手書待遇益隆覽之靣熱汗下也足下才髙識明不應輕許與人得非用黃魯直秦太虛輩語真以為然耶不肖為人所憎而二子獨喜見譽如人嗜昌歜羊棗未易詰其所以然者以二子為妄則不可遂欲以移之衆口又大不可也軾少年時讀書作文專為應舉而已既及進士第貪得不已又舉制策其實何所有而其科號為直言極諫故每紛然誦説古今考論是非以應其名耳人若不自知既以此得因以為實能之故譊譊至今坐此得罪幾死所謂齊魯以口舌得官真可笑也然世人遂以軾為欲立異同則過矣妄論利害攙説得失此正制科人習氣譬之候蟲時鳥自鳴自已何足為損益軾每怪時人待軾過重而足下又復稱説如此愈非其實得罪以來深自閉塞扁舟草屨放浪山水間與樵漁雜處往往為醉人所推罵輒自喜漸不為人識平生親友無一字見及有書與之亦不答自幸庶幾免矣足下又復創相推與甚非所望木有癭石有暈犀有通以取妍於人皆物之病也謫居無事默自觀省回視三十年以來所為多其病者足下所見皆故我非今我也無乃聞其聲不考其情取其華而遺其實乎抑將又有取於此也此事非相見不能盡自得罪後不敢作文字此書雖非文然信筆書意不覺纍幅亦不須示人必喻此意答史諷書史諷所為易説必非深於道故長公拒之如此前日蒙訪及以易説一通且欲責某之一言以信之天下大非某智力之所能任也某於易嘗學之矣而未之有得故雖悅足下志意之髙辭説之明而不敢斷其義之是非則何能推其義以信之天下雖然足下屬我良重不可以無説蓋學者君子之務本而教者聖人之餘事故學則求之教則應之有餘則應不足則求蓋有餘而求之者有矣未有不足而能應者也蓋見求而不應者有矣未有不求而應之者也為足下計亦志於學而已學足乎已則不有知於上必有知於下不有傳於今必有傳於後不幸而不見知於上下而不傳於今又不傳於後古之人蓋猶不憾也知我者其天乎此乃易所謂知命也命者非獨貴賤死生爾萬物之廢興皆命也孟子曰君子行法以俟命而已矣且足下求以誨人者也道無求而誨之者求人而誨之則喪道喪道以求傳道則孰取以為道足下其試思之唐宋八大家文鈔卷一百二十六
