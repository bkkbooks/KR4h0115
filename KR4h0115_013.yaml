body:
  text: 唐宋八大家文鈔巻十三明茅坤撰昌黎文鈔十三墓誌銘尚書左僕射右龍武軍統軍劉公墓誌銘劉昌裔為人多倜儻澹宕而公之文亦稱公諱昌裔字光後本彭城人曾大父諱承慶朔州刺史大父巨敖好讀老子莊周書為太原晉陽令再世宦北方樂其土俗遂著籍太原之陽曲曰自我為此邑人可也何必彭城父訟贈右散騎常侍公少好學問始為兒時重遲不戲恒若有所思念計畫及壯自試以開吐蕃説干邉將不售入三蜀從道士遊久之蜀人苦楊琳寇掠公單船往説琳感欷雖不即降約其徒不得為虐琳降公常隨琳不去琳死脱身亡沉浮河朔之間建中中曲環招起之為環檄李納指摘切刻納悔恐動心恒魏皆疑惑氣懈環封奏其本德宗稱焉環之會下濮州戰白塔救寜陵襄邑擊李希烈陳州城下公常在軍間環領陳許軍公因為陳許從事以前後功勞累遷檢校兵部郎中御史中丞營田副使吳少誠乗環喪引兵叩城留後上官説咨公以城守所以能擒誅叛將為抗拒令敵人不得其便圍解拜陳州刺史韓全義敗引軍走陳州求入保公自城上揖謝全義曰公受命詣蔡何為來陳公無恐賊必不敢至我城下明日領歩騎十餘抵全義營全義驚喜迎拜歎息殊不敢以不見舍望公改授陳許軍司馬上官説死拜金紫光禄大夫檢校工部尚書代説為節度使命界上吏不得犯蔡州人曰俱天子人奚為相傷少誠吏有來犯者捕得縛送曰妄稱彼人公宜自治之少誠慚其軍亦禁界上暴者兩界耕桑交跡吏不何問封彭城郡開國公就拜尚書右僕射元和七年得疾視政不時八年五月涌水出他界過其地防穿不補沒邑屋流殺居人拜疏請去職即罪詔還京師即其日與使者俱西大熱旦暮馳不息疾大發左右手轡止之公不肯曰吾恐不得生謝天子上益遣使者勞問勅無亟行至則不得朝矣天子以為恭即其家拜檢校左僕射右龍武軍統軍知軍事十一月某甲子薨年六十二上為之一日不視朝贈潞州大都督命郎弔其家明年某月某甲子𦵏河南某縣某鄉某原公不好音聲不大為居宅於諸帥中獨然夫人邠國夫人武功蘇氏子四人嗣子光禄主簿縱學於樊宗師士大夫多稱之長子元一朴直忠厚便弓馬為淮南軍衙門將次子景陽景長皆舉進士𦵏得日相與選使者哭拜階上使來乞銘銘曰提將之符尸我一方配古侯公維徳不爽我銘不亡後人之慶鳳翔隴州節度使李公墓誌銘直叙持大體公諱惟簡字某司空平章事贈太傅之子太傅初姓張氏肅宗時舉恒趙深冀易定六州戰卒五萬人馬五千匹以歸聽命天子嘉之賜姓曰李更其名寶臣立其軍號之曰成德由是姓李氏太傅薨公兄弟讓嗣公竟棄其家自歸京師及兄死家覆有司設防守德宗如奉天守卒出公即馳歸與母韓國夫人鄭氏拜訣屬家徒隨走所幸道與賊遇七鬬乃至有功遷太子諭德加御史中丞從幸梁州天黒失道識焦中人聲得見德宗于盩厔西上曰卿有母可隨我耶曰臣以死從衛及幸還錄功封武安郡王號元從功臣圖其形御閣而以神威將軍居北軍衛久乃加御史大夫丁韓國憂去官累遷神威大將軍加工刑二曹尚書天威統軍又改户部尚書金吾大將軍有長上萬國俊者以軍勢奪興平人地吏憚莫敢治及公為金吾興平人曰久聞李將軍為人公平庶能直吾屈即齎縣牒來見公發視立杖國俊廢之以地還興平人聞者無不稱歎於是天子以公材果可任用治人將兵無所不宜元和六年即以公為鳳翔隴州節度使户部尚書兼鳳翔尹隴州地與吐蕃接舊常朝夕相伺更入攻抄人吏不得息公以為國家於夷狄當用長算邉將當承上旨謹條教蓄財榖完吏農力以俟不宜規小利起事盗恩禁不得妄入其地益市耕牛鑄鎛釤鉏斸以給農之不能自具者丁壯興勵歲増田數十萬畝連八歲五種俱熟公私有餘販者負入襃斜船循渭而下首尾相繼不絶十三年公與忠武軍節度使司空光顔邠寜節度使尚書釗俱來朝上為之燕三殿張百戲公卿侍臣咸與既事勅還公因進曰臣幸得宿衛四十餘年今年老斥外任不勝慕戀願得死輦下天子加慰遣焉還鎮告疾其夏五月戊子薨年五十五訃至上悼愴罷朝遣郎中臨弔贈尚書左僕射以其年十一月丙申葬萬年鳳棲原夫人博陵郡崔氏河陽尉鎬之孫大理評事可觀之女賢有法度公有四子長曰元孫三原尉次曰元質彭之濛陽尉曰元立興平尉曰元本河南參軍皆愿敏好善元立元本皆崔氏出葬得日嗣子元立與其昆弟四人請銘於韓氏曰先人嘗有託於夫子也愈曰太傳功在史氏記僕射以孤童囚覉京師卒能以忠為節自顯取爵位立名績使天下拭目觀父母與榮焉既忠又孝法宜銘銘曰太傅之顯自其躬興僕射童覉孰與之朋遭國之難以節自發致其勤艱以復考烈孝由忠立爵名隨之銘此𤣥石維昧之貽太原王公墓誌銘明法公諱仲舒字𢎞中少孤奉其母居江南游學有名貞元十年以賢良方正拜左拾遺改右補闕禮部考功吏部三員外郎貶連州司戸參軍改夔州司馬佐江陵使改祠部員外郎復除吏部員外郎遷職方郎中知制誥出為峽州刺史遷廬州未至丁母憂服闋改婺州蘇州刺史徵拜中書舍人既至謂人曰吾老不樂與少年治文書得一道有地六七郡為之三年貧可富亂可治身安功立無愧於國家可也日日語人丞相聞問語驗即除江南西道觀察使兼御史中丞至則奏罷𣙜酒錢九千萬以其利與民又罷軍吏官債五千萬悉焚簿文書又出庫錢二千萬以丐貧民遭旱不能供税者禁浮屠及老子為僧道士不得於吾界内因山野立浮屠老子象以其誑丐漁利奪編人之產在官四年數其蓄積錢餘於庫米餘於廩朝廷選公卿於外將徴以為左丞吏部已用薛尚書代之矣長慶三年十一月十七日未命而薨年六十二天子為之罷朝贈左散騎常侍遠近相弔以四年二月某日葬于河南某縣先塋之側公之為拾遺朝退天子謂宰相曰第幾人非王某邪是時公方與陽城更疏論裴延齡詐妄士大夫重之為考功吏部郎也下莫敢有欺犯之者非其人雖與同列未嘗比數収拾故遭讒而貶在制誥盡力直友人之屈不以權臣為意又被讒而出元和初婺州大旱人餓死户口亡十七八公居五年完富如初按劾羣吏奏其贓罪州部清整加賜金紫其在蘇州治稱第一公所至輙先求人利害廢置所宜閉閣草奏又具為科條與人吏約事僃一旦張下民無不抃呌喜悦或初若小煩旬歲皆稱其便公所為文章無世俗氣其所樹立殆不可學曾祖諱𤣥暕比部員外郎祖諱景肅丹陽太守考諱政襄鄧等州防禦使鄂州採訪使贈工部尚書公先妣渤海李氏贈渤海郡太君公娶其舅女有子男七人初哲貞𢎞泰復洄初進士及第哲文學俱善其餘幼也長女壻劉仁師高陵令次女壻李行脩尚書刑部員外郎銘曰氣鋭而堅又剛以嚴哲人之常愛人盡已不倦以止乃吏之方與其友處順若婦女何德之光墓之有石我最其迹萬世之藏唐故昭武校尉守左金吾衛將軍李公墓誌銘直叙然中有諷刺與稱美處不爽尺寸公諱道古字某曹成王子其先王明以太宗子王曹絶輒復封五世而至成王成王諱臯有功建中貞元間以多才能能行賞誅為名至今追數當時内外文武大臣成王必在其間公以進士舉及第獻文輿三十巻拜校書郎集賢學士四遷至宗正丞憲宗即位選擢宗室遷尚書司門員外郎以選為利隨唐睦州刺史遷少宗正元和九年以御史中丞持節鎭黔中十一年來朝遷鎮鄂州以鄂岳道兵會平淮西以功加御史大夫十三年徴拜宗正轉左金吾上即位以先朝時嘗信妄人柳泌能燒水銀為不死藥薦之泌以故起閭閻氓為刺史不效貶循州司馬其年九月三日以疾卒于貶所年五十三長慶元年詔曰左降而死者還其官以葬遂以其年某月日葬于東都某縣公三娶元配韋氏諱脩脩生子紘紘為進士學女貢嫁崔氏夫人隋雍州牧鄖公叔裕五世孫父士佺蓬山令次配崔氏諱葯生綽紹綰女會嫁鄭氏季毗夫人父昭嘗為京兆尹今夫人韋氏無子父光憲光禄卿其葬用古今禮以元配韋氏夫人祔而葬次配崔氏夫人於其域異墓公宗室子生而貴富能學問以中科取名善自傾下以交豪傑身死賣宅以葬銘曰太支於今其尚有封當公弟兄未續又亡其遷于南年及始衰誰黜不復而以喪歸海豐彌彌萬里于畿載其始終以哀表之唐故朝散大夫商州刺史除名徙封州董府君墓誌銘整㓗公諱溪字惟深丞相贈太師隴西恭惠公第二子十九歲明兩經獲第有司沈厚精敏未嘗有子弟之過賔接門下推舉人士侍側無虚口退而見其人淡若與之無情者太師賢而愛之父子間自為知已諸子雖賢莫敢望之太師累踐大官臻宰相致平治終始以禮號稱名臣晨昏之助盖有賴云太師之平汴州年考益高挈持維綱鋤削荒纇納之太和而已其囊篋細碎無所遺漏繄公之功上介尚書左僕射陸公長源齒差太師標望絶人聞其所為每稱舉以戒其子楊凝孟叔度以材德顯名朝廷及來佐幕府詣門請交屏所挾為太師薨始以祕書郎選參軍京兆府法曹日伏階下與大尹爭是非大尹屢黜已見歲中奏為司録參軍與一府政以能拜尚書度支員外郎遷倉部郎中萬年令兵誅恒州改度支郎中攝御史中丞為糧料使兵罷遷商州刺史糧料吏有忿爭相牽告者事及於公因徵下御史獄公不與吏辨一皆引伏受垢除名徙封州元和六年五月十二日死湘中年四十九明年立皇太子有赦令許歸葬其子居中始奉喪歸元和八年十一月甲寅葬於河南河南縣萬安山下太師墓左夫人鄭氏祔公凡再娶皆鄭氏女生六子四男二女長曰全正惠而早死次曰居中好學善為詩張籍稱之次曰從直曰居敬尚小長女嫁吳郡陸暢其季女後夫人之子公之母弟全素孝慈友弟公坐事棄同官令歸公殁比葬三年哭泣如始喪者大臣高其行白為太子舍人將葬舍人與其季弟澥問銘於太史氏韓愈愈則為之銘辭曰物以久弊或以轢毁考致要歸孰有彼此由我者吾不我者天斯而以然其誰使然唐故朝散大夫越州刺史薛公墓誌銘典實公諱戎字元夫其上祖懿為晉安西將軍實始居河東公之四世祖嗣汾隂公諱德儒為隋襄城郡書佐以卒襄城有子二人皆貴其後皆蕃以大而其季尤盛官至邠州刺史邠州諱寶𦙍有子九人皆有名位其最季諱縑為河南令以卒河南有子四人其長諱同卒官湖州長史贈刑部尚書尚書娶吳郡陸景融女有子五人皆有名蹟其逹者四人公於倫次為中子仁孝慈愛忠厚而好學不應徵舉沈浮閭巷間不以事自累為貴常州刺史李衡遷江西觀察使曰州客至多莫賢元夫吾得與之俱足矣即署公府中職公不辭讓年四十餘始脱褐衣為吏衡遷給事中齊映自桂州以故相代衡為江西公因留佐映治映卒湖南使李巽福建使柳冕交表奏公自佐詔以公與冕在冕府累遷殿中侍御史冕使公攝泉州冕文書所條下有不可者公輙正之冕惡其異於已懐之未發也遇馬總以鄭滑府佐忤中貴人貶為泉州别駕冕意欲除總附上意為事使公按置其罪公歎曰公乃以是待我我始不願仕者正為此耳不許冕遂大怒囚公於浮圖寺而致總獄事聞遠近值冕亦病且死不得已俱釋之冕死後使至奏公自副又副使事於浙東府轉侍御史元和四年徵拜尚書刑部員外郎遷河南令歴衢湖常三州刺史所至以廉貞寛大為稱朝廷嘉之某年拜越州刺史兼御史中丞浙東觀察使至則悉除去煩弊儉出薄入以致和富部刺史得自為治無所牽制四境之内竟歲無一事公篤於恩義盡用其禄以周親舊之急有餘頒施之内外親無疎遠皆家歸之疾病去官長慶元年九月庚申至於蘇州以卒春秋七十五奏至天子為之罷朝贈左散騎常侍使臨弔祭之士大夫多相弔者以其年十一月庚申葬于河南偃師先人之兆次以韋氏夫人祔公凡再娶先夫人京兆韋氏後夫人趙郡李氏皆先卒子男二人曰沂曰洽長生九歲而幼七歲矣女四人皆已嫁愈既與公諸昆弟善又嘗代公令河南公之葬也故公弟集賢殿學士尚書刑部侍郎放屬余以銘其文曰薛氏近世莫盛公門公倫五人咸有顯聞公之初志不以事累僶俛以隨亦貴於位無怨無惡中以自寶不能百年曷足為壽公宜有後有二稚子其祐成之公食廟祀唐故江西觀察使韋公墓誌銘碎而宻公諱丹字某姓韋氏六世祖孝寛仕周有功以公開號於鄖鄖公之子孫世為大官惟公之父政卒雒縣丞贈虢州刺史公既孤以甥孫從太師魯公真卿學太師愛之舉明經第選授峽州遠安令以讓其庶兄入紫閣山事從父熊通五經登科歴校書郎咸陽尉佐邠寜軍自監察御史為殿中侍御史徴拜太子舍人益有名遷起居郎吳少誠襲許州拜河陽行軍司馬未行少誠死改駕部員外郎新羅國君死公以司封郎中兼御史中丞紫衣金魚往弔立其嗣故事使外國者常賜州縣官十員使以名上以便其私號私覿官公將行曰吾天子吏使海外國不足於資宜上請安有賣官以受錢邪即具疏所以上以為賢命有司與其費至鄆州會新羅告所當立君死還拜容州刺史容管經畧招討使始城容州周十三里置屯田二十四所化大行詔加太中大夫順宗嗣位拜河南少尹行未至拜鄭滑行軍司馬始至襄陽詔拜諫議大夫既至日言事不阿權臣謇然有直名遂號為才臣劉闢反圍梓州詔以公為東川節度使御史大夫公行至漢中上疏言梓州在圍間守方盡力不可昜將徴還入議蜀事劉闢去梓州因以梓州讓高崇文拜晉慈隰等州觀察防禦使自扶風縣男進封武陽郡開國公食邑二千户將行上言臣所治三州非要害地不足張職為國家費不如屬之河東便上以為忠一歲拜洪州刺史江南西道觀察使以晉慈隰屬河東公既至則計口受俸錢委其餘於官罷八州無事之食者以聚其財始教人為瓦屋取材於山召陶工教人陶聚材瓦於場度其費以為估不取贏利凡取材瓦於官業定而受其償從令者免其賦之半逃未復者官與為之貧不能者畀之財載食與漿親往勸之為瓦屋萬三千七百為重屋四千七百民無火憂暑濕則乗其高别命置南北市營諸軍歲旱種不入土募人就功厚與之直而給其食業成人不病饑為長衢南北夾兩營東西七里人去渫汚氣益蘇復作南昌縣徙廐于高地因其廢倉大屋馬以不連死明年築堤扞江長十二里疏為斗門以走潦水公去位之明年江水平堤老幼泣而思曰無此堤吾屍其流入海矣灌陂塘五百九十八得田萬二千頃凡為民去害興利若嗜慾居三年於江西八州無遺便其大如是其細可畧也卒有違令當死者公不果於誅杖而遣之去上書告公所為不法若干條朝廷方勇於治且以為公名才能臣治功聞天下不辨則受垢詔罷官留江西待辨使未至月餘公以疾薨使至辨凡卒所告事若干條皆無絲毫實詔笞卒百流嶺南公能益明春秋五十八薨於元和五年八月六日公好施與家無剰財自校書郎至為觀察使擁吏卒前走七州刺史與賔客處如布衣時自持卑一不昜娶清河崔氏故支江令諷之女某官某之孫有子曰寘年十五明經及第嗣其家業後夫人蘭陵蕭氏中書令華之孫殿中侍御史恒之女皆先公終有女一人凡公男若干人女若干人明年七月壬寅從葬萬年縣少陵原將葬其從事東平吕宗禮與其子寘謀曰我公宜得直而不華者銘傳於後固不朽矣寘來請銘銘曰武陽受業始於太師以官讓兄自待不疑勤于紫閣取益以卑可謂有源卒用無疵慊慊為人矯矯為官爰及江西功德具完名聲之下獨處為難辯而益明仇者所歎碑于墓前維昭美故納銘墓中以識公墓唐宋八大家文鈔巻十三
