body:
  text: 唐宋八大家文鈔卷一百十明茅坤撰老泉文鈔四論易論文有烟波而以禮為明以易為幽謂聖人所以用其機權以持天下之心過矣聖人之道得禮而信得易而尊信之而不可廢尊之而不敢廢故聖人之道所以不廢者禮為之明而易為之幽也生民之初無貴賤無尊卑無長幼不耕而不饑不蠶而不寒故其民逸民之苦勞而樂逸也若水之走下而聖人者獨為之君臣而使天下貴役賤為之父子而使天下尊役卑為之兄弟而使天下長役幼蠶而後衣耕而後食率天下而勞之一聖人之力固非足以勝天下之民之衆而其所以能奪其樂而易之以其所苦而天下之民亦遂肯棄逸而即勞欣然戴之以為君師而遵蹈其法制者禮則使然也聖人之始作禮也其說曰天下無貴賤無尊卑無長幼是人之相殺無巳也不耕而食鳥獸之肉不蠶而衣鳥獸之皮是鳥獸與人相食無巳也有貴賤有尊卑有長幼則人不相殺食吾之所耕而衣吾之所蠶則鳥獸與人不相食人之好生也甚於逸而惡死也甚於勞聖人奪其逸死而與之勞生此雖三尺豎子知所趨避矣故其道之所以信於天下而不可廢者禮為之明也雖然明則易達易達則䙝䙝則易廢聖人懼其道之廢而天下復於亂也然後作易觀天地之象以為爻通隂陽之變以為卦考鬼神之情以為辭探之茫茫索之冥冥童而習之白首而不得其源故天下視聖人如神之幽如天之髙尊其人而其教亦隨而尊故其道之所以尊於天下而不敢廢者易為之幽也凡人之所以見信者以其中無所不可測者也人之所以獲尊者以其中有所不可窺者也是以禮無所不可測而易有所不可窺故天下之人信聖人之道而尊之不然則易者豈聖人務為新竒祕怪以夸後世邪聖人不因天下之至神則無所施其教卜筮者天下之至神也而卜者聽乎天而人不預焉者也筮者决之天而營之人者也龜漫而無理者也灼荆而鑽之方功義弓惟其所為而人何預焉聖人曰是純乎天技耳技何所施吾教於是取筮夫筮之所以或為陽或為隂者必自分而為二始掛一吾知其為一而掛之也揲之以四吾知其為四而揲之也歸竒於扐吾知其為一為二為三為四而歸之也人也分而為二吾不知其為幾而分之也天也聖人曰是天人參焉道也道有所施吾教矣於是因而作易以神天下之耳目而其道遂尊而不廢此聖人用其機權以持天下之心而濟其道於無窮也禮論老蘇以禮為强世之術即荀子性惡之遺文甚縱橫而議論頗僻矣夫人之情安於其所常為無故而變其俗則其勢必不從聖人之始作禮也不因其勢之可以危亡困辱之者以厭服其心而徒欲使之輕去其舊而樂就吾法不能也故無故而使之事君無故而使之事父無故而使之事兄彼其初非如今之人知君父兄之不事則不可也而遂翻然以從我者吾以恥厭服其心也彼為吾君彼為吾父彼為吾兄聖人曰彼為吾君父兄何以異於我於是坐其君與其父以及其兄而已立於其旁且俯首屈膝於其前以為禮而謂之拜率天下之人而使之拜其君父兄夫無故而使之拜其君無故而使之拜其父無故而使之拜其兄則天下之人將復嗤笑以為迂怪而不從而君父兄又不可以不得其臣子弟之拜而徒為其君父兄於是聖人者又有術焉以厭服其心而使之肯拜其君父兄然則聖人者果何術也恥之而已古之聖人將欲以禮治天下之民故先自治其身使天下皆信其言曰此人也其言如是是必不可不如是也故聖人曰天下有不拜其君父兄者吾不與之齒而天下之人亦曰彼將不與我齒也於是相率以拜其君父兄以求齒於聖人雖然彼聖人者必欲天下之拜其君父兄何也其微權也彼為吾君彼為吾父彼為吾兄聖人之拜不用於世吾與之皆坐於此皆立於此比肩而行於此無以異也吾一旦而怒奮手舉梃而搏逐之可也何則彼其心常以為吾儕也不見其異於吾也聖人知人之安於逸而苦於勞故使貴者逸而賤者勞且又知坐之為逸而立且拜者之為勞也故舉其君父兄坐之於上而使之立且拜於下明日彼將有怒作於心者徐而自思之必曰此吾嚮之所坐而拜之且立於其下者也聖人固使之逸而使我勞是賤於彼也奮手舉梃以搏逐之吾心不安焉刻木而為人朝夕而拜之他日柝之以為薪而猶且忌之彼其始木焉已拜之猶且不敢以為薪故聖人以其微權而使天下尊其君父兄而權者又不可以告人故先之以恥嗚呼其事如此然後君父兄得以安其尊而至于今今之匹夫匹婦莫不知拜其君父兄乃曰拜起坐立禮之末也不知聖人其始之教民拜起坐立如此之勞也此聖人之所慮而作易以神其教也樂論論樂之㫖非是而文情嫋娜百折無限烟波禮之始作也難而易行既行也易而難久天下未知君之為君父之為父兄之為兄而聖人為之君父兄天下未有以異其君父兄而聖人為之拜起坐立天下未肯靡然以從我拜起坐立而聖人身先之以恥嗚呼其亦難矣天下惡夫死也久矣聖人招之曰來吾生爾既而其法果可以生天下之人天下之人視其嚮也如此之危而今也如此之安則宜何從故當其時雖難而易行既行也天下之人視君父兄如頭足之不待别白而後識視拜起坐立如寢食之不待告語而後從事雖然百人從之一人不從則其勢不得遽至乎死天下之人不知其初之無禮而死而見其今之無禮而不至乎死也則曰聖人欺我故當其時雖易而難久嗚呼聖人之所恃以勝天下之勞逸者獨有死生之說耳死生之說不信於天下則勞逸之說將出而勝之勞逸之說勝則聖人之權去矣酒有鴆肉有堇然後人不敢飲食藥可以生死然後人不以苦口為諱去其鴆撤其堇則酒肉之權固勝於藥聖人之始作禮也其亦逆知其勢之將必如此也曰告人以誠而後人信之幸今之時吾之所以告人者其理誠然而其事亦然故人以為信吾知其理而天下之人知其事事有不必然者則吾之理不足以折天下之口此告語之所不及也告語之所不及必有以隂驅而潛率之於是觀之天地之間得其至神之機而竊之以為樂雨吾見其所以濕萬物也日吾見其所以燥萬物也風吾見其所以動萬物也隱隱谹谹而謂之雷者彼何用也隂凝而不散物蹙而不遂雨之所不能濕日之所不能燥風之所不能動雷一震焉而凝者散蹙者遂曰雨者曰日者曰風者以形用曰雷者以神用用莫神於聲故聖人因聲以為樂為之君臣父子兄弟者禮也禮之所不及而樂及焉正聲入乎耳而人皆有事君事父事兄之心則禮者固吾心之所有也而聖人之說又何從而不信乎蘇氏父子兄弟於經術甚疏故論六經處大都渺茫不根特其行文縱橫往往空中布景絶處逢生令人有凌雲御風之態詩論說詩處愈支而文自澎漾可觀人之嗜欲好之有甚於主而憤憾怨怒有不顧其死於是禮之權又窮禮之法曰好色不可為也為人臣為人子為人弟不可以有怨於其君父兄也使天下之人皆不好色皆不怨其君父兄夫豈不善使人之情皆泊然而無思和易而優柔以從事如此則天下固亦大治而人之情又不能皆然好色之心驅諸其中是非不平之氣攻諸其外炎炎而生不顧利害趨死而後己噫禮之權止於死生天下之事不至乎可以博生者則人不敢觸死以違吾法今也人之好色與人之是非不平之心勃然而發於中以為可以博生也而先以死自處其身則死生之機固已去矣死生之機去則禮為無權區區舉無權之禮以强人之所不能則亂益甚而禮益敗今吾告人曰必無好色必無怨而君父兄彼將遂從吾言而忘其中心所自有之情耶將不能也彼既已不能純用吾法將遂大棄而不顧吾法既已大棄而不顧則人之好色與怨其君父兄之心將遂蕩然無所隔限而易內竊妻之變與弒其君父兄之禍必反公行於天下聖人憂焉曰禁人之好色而至於淫禁人之怨其君父兄而至於叛患生於責人太詳好色之不絶而怨之不禁則彼將反不至於亂故聖人之道嚴於禮而通於詩禮曰必無好色必無怨而君父兄詩曰好色而不至於淫怨而君父兄而無至於叛嚴以待天下之賢人通以全天下之中人吾觀國風婉孌柔媚而卒守以正好色而不至於淫者也小雅悲傷詬讟而君臣之情卒不忍去怨而不至於叛者也故天下觀之曰聖人固許我以好色而不尤我之怨吾君父兄也許我以好色不淫可也不尤我之怨吾君父兄則彼雖以虐遇我我明譏而明怨之使天下明知之則吾之怨亦得當焉不叛可也夫背聖人之法而自棄於淫叛之地者非斷不能也斷之始生於不勝人不自勝其忿然後忍棄其身故詩之教不使人之情至於不勝也夫橋之所以為安於舟者以有橋而言也水潦大至橋必解而舟不至於必敗故舟者所以濟橋之所不及也吁禮之權窮於易達而有易焉窮於後世之不信而有樂焉窮於彊人而有詩焉吁聖人之慮事也蓋詳書論此篇識見好而行文法度亦勝風俗之變聖人為之也聖人因風俗之權而用其權聖人之權用於當世而風俗之變益甚以至於不可復反幸而又有聖人焉承其後而維之則天下可以復治不幸其後無聖人其變窮而無所復入則已矣昔者吾嘗欲觀古之變而不可得也於詩見商與周焉而不詳及今觀書然後見堯舜之時與三代之相變如此之亟也自堯而至於商其變也皆得聖人而承之故無憂至於周而天下之變窮矣忠之變而入於質質之變而入於文其勢便也及夫文之變而又欲反之於忠也是猶欲移江河而行之山也人之喜文而惡質與忠也猶水之不肯避下而就髙也彼其始未嘗文焉故忠質而不辭今吾日食之以太牢而欲使之復茹其菽哉嗚呼其後無聖人其變窮而無所復入則已矣周之後而無王焉固也其始之制其風俗也固不容為其後者計也而又適不值乎聖人固也後之無王者也當堯之時舉天下而授之舜舜得堯之天下而又授之禹方堯之未授天下於舜也天下未嘗聞有如此之事也度其當時之民莫不以為大怪也然而舜與禹也受而居之安然若天下固其所有而其祖宗既已為之纍數十世者未嘗與其民道其所以當得天下之故也又未嘗悅之以利而開之以丹朱商均之不肖也其意以為天下之民以我為當在此位也則亦不俟乎援天以神之譽已以固之也湯之伐桀也囂囂然數其罪而以告人如曰彼有罪我伐之宜也既又懼天下之民不巳悅也則又囂囂然以言柔之曰萬方有罪在豫一人豫一人有罪無以爾萬方如曰我如是而為爾之君爾可以許我焉耳吁亦既薄矣至於武王而又自言其先祖父偕有顯功既已受命而死其大業不克終今我奉承其志舉兵而東伐而東國之士女束帛以迎我紂之兵倒戈以納我吁又甚矣如曰吾家之當為天子久矣如此乎民之欲我速入商也伊尹之在商也如周公之在周也伊尹攝位三年而無一言以自解周公為之紛紛乎急於自疏其非篡也夫固由風俗之變而後用其權權用而風俗成吾安坐而鎮之夫孰知風俗之變而不復反也春秋論此文自謝枋得氏録之以為名筆而世之學者遂相傳以為千年絶論豫竊謂老蘇於論六經處竝以强詞軋正理故往往支離旁斥特其行文嫋娜百折似屬烟波耳賞罰者天下之公也是非者一人之私也位之所在則聖人以其權為天下之公而天下以懲以勸道之所在則聖人以其權為一人之私而天下以榮以辱周之衰也位不在夫子而道在焉夫子以其權是非天下可也而春秋賞人之功赦人之罪去人之族絶人之國貶人之爵諸侯而或書其名大夫而或書其字不惟其法惟其意不徒曰此是此非而賞罰加焉則夫子固曰我可以賞罰人矣賞罰人者天子諸侯事也夫子病天下之諸侯大夫僣天子諸侯之事而作春秋而已則為之其何以責天下位公也道私也私不勝公則道不勝位位之權得以賞罰而道之權不過於是非道在我矣而不得為有位者之事則天下皆曰位之不可僣也如此不然天下其誰不曰道在我則是道者位之賊也曰夫子豈誠賞罰之耶徒曰賞罰之耳庸何傷曰我非君也非吏也執塗之人而告之曰某為善某為惡可也繼之曰某為善吾賞之某為惡吾誅之則人有不笑我者乎夫子之賞罰何以異此然則何足以為夫子何足以為春秋曰夫子之作春秋也非曰孔氏之書也又非曰我作之也賞罰之權不以自與也曰此魯之書也魯作之也有善而賞之曰魯賞之也有惡而罰之曰魯罰之也何以知之曰夫子繫易謂之繫辭言孝謂之孝經皆自名之則夫子私之也而春秋者魯之所以名史而夫子託焉則夫子公之也公之以魯史之名則賞罰之權固在魯矣春秋之賞罰自魯而及于犬下天子之權也魯之賞罰不出境而以天子之權與之何也曰天子之權在周夫子不得已而以與魯也武王之崩也天子之位當在成王成王幼周公以為天下不可以無賞罰故不得已而攝天子之位以賞罰天下以存周室周之東遷也天子之權當在平王平王昏亂故夫子亦曰天下不可以無賞罰而魯周公之國也居魯之地者宜如周公不得已而假天子之權以賞罰天下以尊周室故以天子之權與之也然則假天子之權宜如何曰如齊桓晉文可也夫子欲魯如齊桓晉文而不遂以天子之權與齊晉者何也齊桓晉文陽為尊周而實欲富强其國故夫子與其事而不與其心周公心存王室雖其子孫不能繼而夫子思周公而許其假天子之權以賞罰天下其意曰有周公之心然後可以行桓文之事此其所以不與齊晉而與魯也夫子亦知魯君之才不足以行周公之事矣顧其心以為今之天下無周公故至此是故以天子之權與其子孫所以見思周公之意也吾觀春秋之法皆周公之法而又詳內而略外此其意欲魯法周公之所為且先自治而後治人也明矣夫子嘆禮樂征伐自諸侯出而田常弒其君則沐浴而請討然則天子之權夫子固明以與魯也子貢之徒不達夫子之意續經而書孔丘卒夫子既告老矣大夫告老而卒不書而夫子獨書夫子作春秋以公天下而豈私一孔丘哉嗚呼夫子以為魯國之書而子貢之徒以為孔氏之書也歟遷固之史有是非而無賞罰彼亦史臣之體宜爾也後之效夫子作春秋者吾惑焉春秋有天子之權天下有君則春秋不當作天下無君則天子之權吾不知其誰與天下之人烏有如周公之後之可與者與之而不得其人則亂不與人而自與則僣不與人不自與而無所與則散嗚呼後之春秋亂耶僣耶散耶荆川曰只是一事問答纒聨到底愚謂孔子非思周公而與魯以天子之權蓋當是時諸侯之國竝各有史孔子魯大夫也故得以遍觀魯之史因其編年紀事之文而繫之以賞罰功罪之權以補王政之缺垂教萬世耳使孔子而晉大夫謂晉之乘可也唐宋八大家文鈔卷一百十
