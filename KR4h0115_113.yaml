body:
  text: 唐宋八大家文鈔巻一百五明茅坤撰南豐文鈔九記傳清心亭記此記與醒心亭記所謂説理之文子固於諸家尤擅所長嘉祐六年尚書虞部員外郎梅君為徐之蕭縣改作其治所之東亭以為燕息之所而名之曰清心之亭是歳秋冬來請記於京師屬余有亡妹殤女之悲不果為明年春又來請屬予有悼亡之悲又不果為而其請猶不止至冬乃為之記曰夫人之所以神明其徳與天地同其變化者夫豈遠哉生於心而巳矣若夫極天下之知以窮天下之理於夫性之在我者能盡之命之在彼者能安之則萬物自外至者安能累我哉此君子之所以虚其心也萬物不能累我矣而應乎萬物與民同其吉㓙者亦未嘗廢也於是有法誠之設邪僻之防此君子之所以齊其心也虛其心者極乎精微所以入神也齊其心者由乎中庸所以致用也然則君子之欲修其身治其國家天下者可知矣今梅君之為是亭曰不敢以為遊觀之美葢所以推本為治之意而且將清心於此其所存者亦可謂能知其要矣乃為之記而道予之所聞者焉十一月五日南豐曾鞏記唐荆川曰程朱以前此等議論亦少醒心亭記未盡子固之長然亦有典刑處滁州之西南泉水之涯歐陽公作州之二年構亭曰豐樂自為記以見其名之意既又直豐樂之東幾百歩得山之高構亭曰醒心使鞏記之凡公與州賓客者遊焉則必即豐樂以飲或醉且勞矣則必即醒心而望以見夫羣山之相環雲煙之相滋曠野之無窮草樹衆而泉石嘉使目新乎其所覩耳新乎其所聞則其心灑然而醒更欲乆而忘歸也故即其所以然而為名取韓子退之北湖之詩云噫其可謂善取樂於山泉之間而名之以見其實又善者矣雖然公之樂吾能言之吾君優游而無為於上吾民給足而無憾於下天下學者皆為才且良夷狄鳥獸草木之生者皆得其宜公樂也一山之隅一泉之旁豈公樂哉乃公所以寄意於此也若公之賢韓子殁數百年而始有之今同遊之賓客尚未知公之難遇也後百千年有慕公之為人而覽公之迹思欲見之有不可及之嘆然後知公之難遇也則凡同遊於此者其可不喜且幸歟而鞏也又得以文詞託名於公文之次其又不喜且幸歟擬峴臺記此記大畧本柳宗元訾家洲歐陽公醉翁亭等記來尚書司門員外郎晉國裴君治撫之二年因城之東隅作臺以遊而命之曰擬峴臺謂其山谿之形擬乎峴山也數與其屬與州之寄客者遊而間獨求記於予初州之東其城因大丘其隍因大谿其隅因客土以出谿上其外連山高陵野林荒墟逺近高下壯大閎廓恠奇可喜之觀環撫之東南者可坐而見也然而雨隳潦毁葢藏棄委於榛藂茀草之間未有即而愛之者也君得之而喜增甓與土易其破缺去榛與草發其亢爽繚以横檻覆以高甍因而為臺以脫埃氛絶煩囂出雲氣而臨風雨然後谿之平沙漫流微風遠響與夫浪波洶湧破山㧞木之奔放至於高桅勁艣沙禽水獸下上而浮沉者皆出乎履舄之下山之蒼顔秀壁巔崖㧞出挾光景而薄星辰至於平岡長陸虎豹踞而龍蛇走與夫荒蹊聚落樹隂晻曖遊人行旅隱見而斷續者皆出乎袵席之内若夫雪煙開歛日光出没四時朝暮雨暘明晦變化不同則雖覽之不厭而雖有智者亦不能窮其狀也或飲者淋漓歌者激烈或靚觀微歩旁皇徙倚則得於耳目與得之於心者雖所寓之樂有殊而亦各適其適也撫非通道故貴人富賈之遊不至多良田故水旱螟螣之菑少其民樂於耕桑以自足故牛馬之牧於山谷者不收五榖之積於郊野者不垣而晏然不知枹皷之警發召之役也君既因其土俗而治簡靜故得以休其暇日而寓其樂於此州人士女樂其安且治而又得遊觀之美亦將同其樂也故予為之記王遵岩曰繁絃急管促節會音喧動嘈雜若不知其宮商之所存而度數齊自皦如使聽者激竦加以懽悅此文之謂矣道山亭記曾子固本色閩故𨽻周者也至秦開其地列於中國始并為閩中郡自粤之大末與吳之豫章為其通路其路在閩者陸出則阸於兩山之間山相屬無間斷累數驛廼一得平地小為縣大為州然其四顧亦山也其途或逆坂如緣絙或垂崖如一髮或側徑鈎出於不測之谿上皆石芒峭發擇然後可投歩負戴者雖其土人猶側足然後能進非其土人罕不躓也其谿行則水皆自高瀉下石錯出其間如林立如士騎滿野千里下上不見首尾水行其隙間或衡縮蟉糅或逆走旁射其狀若蚓結若蟲鏤其旋若輪其激若矢舟泝㳂者投便利失毫分輒破溺雖其土長川居之人非生而習水事者不敢以舟楫自任也其水陸之險如此漢嘗處其衆江淮之間而虚其地葢以其陿多阻豈虚也哉福州治候官於閩為土中所謂閩中也其地於閩為最平以廣四出之山皆遠而長江在其南大海在其東其城之内外皆涂旁有溝溝通潮汐舟載者晝夜屬于門庭麓多桀木而匠多良能人以屋室鉅麗相矜雖下貧必豐其居而佛老子之徒其宮又特盛城之中三山西曰閩山東曰九僊山北曰粤王山三山者鼎趾立其附山葢佛老子之宮以數十百其瓌詭殊絶之狀葢巳盡人力光祿卿直昭文館程公為是州得閩山嶔崟之際為亭於其處其山川之勝城邑之大宮室之榮不下簟席而盡於四矚程公以謂在江海之上為登覽之觀可比於道家所謂蓬萊方丈瀛洲之山故名之曰道山之亭閩以險且遠故仕者常憚往程公能因其地之善以寓其耳目之樂非獨忘其遠且險又將抗其思於埃壒之外其志壯哉程公於是州以治行聞既新其城又新其學而其餘功又及於此葢其歳滿就更廣州拜諫議大夫又拜給事中集賢殿修撰今為越州字公闢名師孟云學舍記予㓜則從先生受書然是時方樂與家人童子嬉戲上下未知好也十六七時闚六經之言與古今文章有過人者知好之則於是銳意欲與之並而是時家事亦滋出自斯以來西北則行陳蔡譙苦睢汴淮泗出于京師東方則絶江舟漕河之渠踰五湖並封禺會稽之山出于東海上南方則載大江臨夏口而望洞庭轉彭蠡上庾嶺繇真陽之瀧至南海上此予之所渉世而奔走也蛟魚洶涌湍石之川嶺崖莽林􅓔虺之聚與夫雨暘寒燠風波霧毒不測之危此予之所單遊遠寓而冒犯以勤也衣食藥物廬舍器用箕筥碎細之間此予之所經營以養也天傾地壞殊州獨哭數千里之遠抱喪而南積時之勞乃畢大事此予之所遘禍而憂艱也太夫人所志與夫弟婚妹嫁四時之祠屬人外親之問王事之輸此予之所皇皇而不足也予於是力疲意耗而又多疾言之所序葢其一二之指也得其閒時挾書以學於凡為身治人世用之損益考觀講解有不能至者故不得專力盡思琢彫文章以載私心難見之情而追古今之作者為並以足予之所好慕此予之所自視而嗟也今天子至和之初予之侵擾多事故益甚予之力無以為乃休於家而即其旁之草舍以學或疾其卑議其隘者予顧而笑曰是予之宜也予之勞心困形以役於事者有以為之矣予之卑巷窮廬宂衣礱飯芑莧之美隱約而安者固予之所以遂其志而有待也予之疾則有之可以進於道者學之有不至至於文章平生所好慕為之有不暇也若夫土堅木好高大之觀固世之聰明豪雋挾長而有恃者所得為若予之拙豈能易而志彼哉遂歴道其少長出處與夫好慕之心以為學舍記王遵岩曰此亦是先生獨出一體在韓歐未有然大意亦自醉翁亭真州東園二篇體中變出又自不同也南軒記子固所自為學具見篇中矣得鄰之茀地燔之樹竹木灌蔬於其間結茅以自休囂然而樂世固有處廊廟之貴抗萬乘之富吾不願易也人之性不同於是知伏閒隱隩吾性所最宜驅之就煩非其器所長况使之爭於勢利愛惡毁譽之間邪然吾親之養無以脩吾之昆弟飯菽藿羮之無以繼吾之役於物或田於食或野於宿不得常此處也其能無欿然於心邪少而思凡吾之拂性苦形而役於物者有以為之矣士固有所勤有所肆識其皆受之於天而順之則吾亦無處而非其樂獨何必休於是邪顧吾之所好者遠無與處於是也然而六藝百家史氏之籍箋疏之書與夫論美刺非感微託遠山鑱冡刻浮誇詭異之文章下至兵權歴法星官藥工山農野圃方言地記佛老所傳吾悉得於此皆伏羲巳來下更秦漢至今聖人賢者魁傑之材殫歳月憊精思日夜各推所長分辯萬事之說其於天地萬物小大之際修身理人國家天下治亂安危存亡之致無不畢載處與吾俱可當所謂益者之友非邪吾窺聖人指意所出以去疑解蔽賢人智者所稱事引類始終之槩以自廣養吾心以忠約守而恕行之其過也改趨之以勇而至之以不止此吾之所以求於内者得其時則行守深山長谷而不出者非也不得其時則止僕僕然求行其道者亦非也吾之不足於義或愛而譽之過也吾之足於義或惡而毁之者亦過也彼何與於我哉此吾之所任乎天與人者然則吾之所學者雖博而所守者可謂簡所言雖近而易知而所任者可謂重也書之南軒之壁間蚤夜覽觀焉以自進也王遵岩曰學舍南軒二記與筠州宜黄兩學記皆謂之大文字矣鵝湖院佛殿記公為記佛殿而却本佛殿之所以獨得刼民與國之財以自侈亦是不肯放倒自家面目處慶厯某年某月日信州鉛山縣鵝湖院佛殿成僧紹元來請記遂為之記曰自西方用兵天子宰相與士大夫勞於議謀材武之士勞於力農工商之民勞於賦歛而天子嘗減乘輿掖庭諸費大臣亦往往辭賜錢士大夫或暴露其身材武之士或秉義而死農工商之民或失其業惟學佛之人不勞於謀議不用其力不出賦歛食與寢自如也資其宫之侈非國則民力焉而天下皆以為當然予不知其何以然也今是殿之費十萬不巳必百萬也百萬不巳必千萬也或累累而千萬之不可知也其費如是廣欲勿記其日時其得邪而請予文者又紹元也故云耳僊都觀三門記曾公凡為佛老氏輩題文必為自家門第門之作取備豫而巳然天子諸侯大夫各有制度加于度則譏之見于易禮記春秋其旁三門門三塗惟王城為然老子之教行天下其宮視天子或過焉其門亦三之其備豫之意葢本於易其加于度則知禮者所不能損知春秋者所太息而巳甚矣其法之蕃昌也建昌軍南城縣麻姑山僊都觀世傳麻姑於此僊去故立祠在焉距城六七里由絶嶺而上至其處地反平寛衍沃可宮可田其穫之多與他壤倍水旱之所不能灾予嘗視而歎曰豈天遺此以安且食其衆使世之衎衎施施趨之者不巳歟不然安有是邪則其法之蕃昌人力固如之何哉其田入既饒則其宮從而侈也宜慶厯六年觀主道士凌齊曅相其室無不修而門獨庳曰是不足以稱吾法與吾力遂大之既成託予記予與齊曅里人也不能辭噫為里人而與之記人之情也以禮春秋之義告之天下之公也不以人之情易天下之公齊曅之取予文豈不得所欲也夫豈以予言為厲巳也夫分寧縣雲峰院記於雲峰院無渉而意甚奇分寧人勤生而嗇施薄義而喜爭其土俗然也自府來抵其縣五百里在山谷窮處其人修農桑之務率數口之家留一人守舍行饁其外盡在田田高下磽腴隨所宜雜植五榖無廢壤女婦蠶杼無懈人茶鹽蜜紙竹箭材葦之貨無有纎鉅治咸盡其身力其勤如此富者兼田千畝廪實藏錢至累歳不發然視捐一錢可以易死寧死無所捐其於施何如也其間利害不能以稊米父子兄弟夫婦相去若奕碁然於其親固然於義厚薄可知也長少族坐里閭相講語以法律意嚮小戾則相吿訐結黨詐張事關節以動視聴甚者畫刻金木為章印摹文書以紿吏立縣庭下變偽一日千出雖笞扑徒死交迹不以屬心其喜爭訟豈比他州縣哉民雖勤而習如是漸涵入骨髓故賢令長佐吏比肩常病其未易治教使移也雲峰院在縣極西界無籍圖不知自何時立景徳三年邑僧道常治其院而侈之門闥靚深殿寢言言棲客之廬齋庖庫庾序列兩旁浮圖所用鐃皷魚螺鐘磬之編百器僃完吾聞道常氣質偉然雖索其學其歸未能當於義然治生事不廢其勤亦稱其土俗至有餘輒斥散之不為黍累計惜樂淡泊無累則又若能勝其嗇施喜爭之心可喜也或曰使其人不汩溺其所學其歸一當於義則傑然眎邑人者必道常乎此予未敢必也慶厯三年九月與其徒謀曰吾排蓬藋治是院不自意成就如此今老矣恐泯泯無聲畀來人相與圖文字買石刻之使永永與是院俱傳可不可也咸曰然推其徒子思來請記遂來予不讓為申其可言者寵嘉之使刻示邑人其有激也萊園院佛殿記此篇無它結搆只是不為佛殿所困窘便是高處慶厯八年四月撫州萊園僧可栖得州之人高慶王明饒傑相與率民錢為殿於其院成以佛之像置其中而來乞予文以為記初萊園有籍於尚書有地於城南五里而草木生之牛羊踐之求屋室居人焉無有也可栖至則喜曰是天下之廢地也人不爭吾得之以老斯足矣遂以醫取資於人而即其處立寢廬講堂重門齋庖之房棲客之舍而合其徒入而居之獨殿之役最大自度其力不能為乃使慶明傑持簿乞民間有得輒記之微細無不受浸漸積累期月而用以足役以既自可栖之來居至於此葢十年矣吾觀佛之徒凡有所興作其人皆用力也勤刻意也專不肯苟成不求速效故善以小致大以難致易而其所為無一不如其志者豈獨其說足以動人哉其中亦有智然也若可栖之披攘經營攟摭纖悉忘十年之乆以及其志之成其所以自致者豈不近是哉噫佛之法固方重於天下而其學者又善殖之如此至於世儒習聖人之道既自以為至矣及其任天下之事則未嘗有勤行之意堅持之操少長相與語曰苟一時之利耳安能必世百年為教化之漸而待遲乆之功哉相薰以此再厯千餘載雖有賢者作未可以得志於其間也由是觀之反不及佛之學者遠矣則彼之所以盛不由此之所自守者衰歟與之記不獨以著其能亦媿吾道之不行也巳洪渥傳有深思有法度洪渥撫州臨川人為人和平與人游初不甚歡乆而有味家貧以進士從鄉舉有能賦名初進於有司連輒黜久之乃得官官不自馳騁又乆不進卒監黄州麻城之茶場以死死不能歸葬亦不能返其孥里中人聞渥死無賢愚皆恨失之予少與渥相識而不深知其為人渥死迺聞有兄年七十餘渥得官而兄巳老不可與俱行渥至官量口用俸掇其餘以歸買田百畝居其兄復去而之官則必安焉渥既死兄無子數使人至麻城撫其孥欲返之而居以其田其孥葢弱力不能自致其兄益巳老矣無可奈何則念輒悲之其經營之猶不巳忘其老也渥兄弟如此無愧矣渥平居若不可任以事及至赴人之急早夜不少懈其與人真有恩者也予觀古今豪傑士傳論人行義不列於史者往往務摭奇以動俗亦或事高而不可為繼或伸一人之善而誣天下以不及雖歸之輔教警世然考之中庸或過矣如渥所存葢人人所易到故載之云唐宋八大家文鈔巻一百五
