body:
  text: 唐宋八大家文鈔卷一百十三明茅坤撰老泉文鈔七權書權書序人有言曰儒者不言兵仁義之兵無術而自勝使仁義之兵無術而自勝也則武王何用乎太公而牧野之戰四伐五伐六伐七伐乃止齊焉又何用也權書兵書也而所以用仁濟義之術也吾疾夫世之人不究本末而妄以我為孫武之徒也夫孫氏之言兵為常言也而我以此書為不得已而言之之書也故仁義不得已而後吾權書用焉然則權者仁義之窮而作也按老泉此書皆孫吳之餘智也余不欲刪其文故並存之然學者於此參之以孫武十三篇則於兵事思過半矣心術此文中多名言但一段段自為文節蓋按古兵法與傳記而雜出之者非通篇起伏開闔之文也為將之道當先治心泰山崩於前而色不變麋鹿興於左而目不瞬然後可以制利害可以待敵凡兵上義不義雖利勿動非一動之為利害而他日將有所不可措手足也夫惟義可以怒士士以義怒可與百戰凡戰之道未戰養其財將戰養其力既戰養其氣既勝養其心謹烽燧嚴斥堠使耕者無所顧忌所以養其財豐犒而優游之所以養其力小勝益急小挫益厲所以養其氣用人不盡其所欲為所以養其心故士常蓄其怒懷其欲而不盡怒不盡則有餘勇欲不盡則有餘貪故雖并天下而士不厭兵此黃帝之所以七十戰而兵不殆也不養其心一戰而勝不可用矣凡將欲智而嚴凡士欲愚智則不可測嚴則不可犯故士皆委已而聽命夫安得不愚夫惟士愚而後可與之皆死凡兵之動知敵之主知敵之將而後可以動於險鄧艾縋兵于蜀中非劉禪之庸則百萬之師可以坐縛彼固有所侮而動也故古之賢將能以兵嘗敵而又以敵自嘗故去就可以決凡主將之道知理而後可以舉兵知勢而後可以加兵知節而後可以用兵知理則不屈知勢則不沮知節則不窮見小利不動見小患不避小利小患不足以辱吾技也夫然後有以支大利大患夫惟養技而自愛者無敵於天下故一忍可以支百勇一靜可以制百動兵有長短敵我一也敢問吾之所長吾出而用之彼將不與吾較吾之所短吾蔽而置之彼將彊與吾角奈何曰吾之所短吾抗而暴之使之疑而却吾之所長吾隂而養之使之狎而墮其中此用長短之術也善用兵者使之無所顧有所恃無所顧則知死之不足惜有所恃則知不至於必敗尺箠當猛虎奮呼而操擊徒手遇蜥蜴變色而却步人之情也知此者可以將矣袒裼而按劒則烏獲不敢逼冠胄衣甲據兵而寢則童子彎弓而殺之矣故善用兵者以形固夫能以形固則力有餘矣法制與前篇並孫武之餘智老泉之兵略亦可槩見矣將戰必審知其將之賢愚與賢將戰則持之與愚將戰則乘之持之則容有所伺而為之謀乘之則一舉而奪其氣雖然非愚將勿乘乘之不動其禍在我分兵而迭進所以持之也并力而一戰所以乘之也古之善軍者以刑使人以賞使人以怒使人而其中必有以義附者焉不以戰不以掠而以備急難故越有君子六千人韓之戰秦之鬬士倍於晉而出穆公於淖者赦食馬者也兵或寡而易危或衆而易叛莫難於用衆莫危於用寡治衆者法欲繁繁則士難以動治寡者法欲簡簡則士易以察不然則士不任戰矣惟衆而繁雖勞不害為强以衆入險阻必分軍而踈行夫險阻必有伏伏必有約軍分則伏不知所擊而其約擕矣險阻懼蹙踈行以紓士氣兵莫危於攻莫難於守客主之勢然也故城有二不可守兵少不足以實城城小不足以容兵夫惟賢將能以寡為衆以小為大當敵之衝人莫不守我以疑兵彼愕不進雖告之曰此無人彼不信也度彼所襲濳兵以備彼不我測謂我有餘夫何患兵少偃旗仆鼓寂若無氣嚴戢兵士敢譁者斬時令老弱登埤示怯乘懈突擊其衆可走夫何患城小背城而戰陳欲方欲踞欲密欲緩夫方而踞密而緩則士心固固則不懾背城而戰欲其不懾面城而戰陳欲直欲鋭欲踈欲速夫直而鋭踈而速則士心危危則致死面城而戰欲其致死夫能靜而自觀者可以用人矣吾何為則怒吾何為則喜吾何為則勇吾何為則怯夫人豈異於我天下之人孰不能自觀其一身是以知於理者塗之人皆可以將平居與人言一語不循故猶且愕而忌敵以形形我恬而不怪亦已固矣是故智者視敵有無故之形必謹察之勿動疑形二可疑於心則疑而為之謀心固得其實也可疑於目勿疑彼敵疑我也是故心疑以謀應目疑以靜應彼誠欲有所為耶不使吾得之目矣彊弱通篇將古人行事立言而經緯成文知有所甚愛知有所不足愛可以用兵矣故夫善將者以其所不足愛者養其所甚愛者士之不能皆鋭馬之不能皆良器械之不能皆利固也處之而已矣兵之有上中下也是兵之有三權也孫臏有言曰以君下駟與彼上駟取君上駟與彼中駟取君中駟與彼下駟此兵說也非馬說也下之不足以與其上也吾既知之矣吾既棄之矣中之不足以與吾上下之不足以與吾中吾不既再勝矣乎得之多於棄也吾斯從之矣彼其上之不得其中下之援也乃能獨完耶故曰兵之有上中下也是兵之有三權也三權也者以一致三者也管仲曰攻堅則瑕者堅攻瑕則堅者瑕嗚呼不從其瑕而攻之天下皆彊敵也漢高帝之憂在項籍耳雖然親以其兵而與之角者蓋無幾也隋何取九江韓信取魏取代取趙取齊然後高帝起而取項籍夫不汲汲於其憂之所在而倣徨乎其不足恤之地彼蓋所以孤項氏也秦之憂在六國蜀最僻最小最先取楚最彊最後取非其憂在蜀也諸葛孔明一出其兵乃與魏氏角其亡宜也取天下取一國取一陳皆如是也范蠡曰凡陳之道益左以為牡設右以為牝春秋時楚伐隋季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃擕蓋一陳之間必有牡牝左右要當以吾彊攻其弱耳唐太宗曰吾自興兵習觀行陳形勢每戰視敵彊其左吾亦彊吾左弱其右吾亦弱吾右使弱常遇彊彊常遇弱敵犯吾弱追奔不過數十百步吾擊敵弱常突出自背反攻之以是必勝後之庸將既不能處其彊弱以敗而又曰吾兵有老弱雜其間非舉軍精鋭以故不能勝不知老弱之兵兵家固亦不可無無之是無以耗敵之彊兵而全吾之鋭鋒敗可俟矣故智者輕棄吾弱而使敵輕用其彊忘其小喪而志於大得夫固要其終而已矣大略祖孫武子三駟中議論三駟者射千金之法非大將謀國之全也攻守按古傳記論竒道伏道處古今名言也古之善攻者不盡兵以攻堅城善守者不盡兵以守敵衝夫盡兵以攻堅城則鈍兵費糧而緩於成功盡兵以守敵衝則兵不分而彼間行襲我無備故攻敵所不守守敵所不攻攻者有三道焉守者有三道焉三道一曰正二曰竒三曰伏坦坦之路車轂擊人肩摩出亦此入亦此我所必攻彼所必守者曰正道大兵攻其南鋭兵出其北大兵攻其東鋭兵出其西者曰竒道大山峻谷中盤絶徑濳師其間不鳴金不撾鼓突出乎平川以衝敵人腹心者曰伏道故兵出於正道勝敗未可知也出於竒道十出而五勝矣出於伏道十出而十勝矣何則正道之城堅城也正道之兵精兵也竒道之城不必堅也竒道之兵不必精也伏道則無城也無兵也攻正道而不知竒道與伏道焉者其將木偶人是也守正道而不知竒道與伏道焉者其將亦木偶人是也今夫盜之於人抉門斬關而入者有焉他户之不扄鍵而入者有焉乘壞垣坎墻趾而入者有焉抉門斬關而主人不之察幾希矣他户之不扄鍵而主人不之察大半矣乘壞垣坎墻趾而主人不之察皆是矣為主人者宜無曰門之固而他户墻隙之不恤焉夫正道之兵抉門之盜也竒道之兵他户之盜也伏道之兵乘垣之盜也所謂正道者若秦之函谷吳之長江蜀之劒閣是也昔者六國嘗攻函谷矣而秦將敗之曹操嘗攻長江矣而周瑜走之鍾會嘗攻劒閣矣而姜維拒之何則其為之守備者素也劉濞反攻大梁田祿伯請以五萬人别循江淮收淮南長沙以與濞會武關岑彭攻公孫述自江州泝都江破侯丹兵徑拔武陽繞出延岑軍後疾以精騎赴廣都距成都不數十里李訴攻蔡蔡悉精卒以抗李光顔而不備訴訴自文成破張柴疾馳二百里夜半到蔡黎明擒元濟此用竒道也漢武攻南越唐蒙請發夜郎兵浮船牂牁江道番禺城下以出越人不意鄧艾攻蜀自隂平由景谷攀木緣磴魚貫而進至油江而降馬邈至綿竹而斬諸葛瞻遂降劉禪田令孜守潼關關之左有谷曰禁而不之備林言尚讓入之夾攻關而關兵潰此用伏道也吾觀古之善用兵者一陳之間尚猶有正兵竒兵伏兵三者以取勝况守一國攻一國而社稷之安危係焉者其可以不知此三道而欲使之將耶用間論三敗處刺骨孫武既言五間則又有曰商之興也伊摯在夏周之興也呂牙在商故明君賢將能以上智為間者必成大功此兵之要三軍所恃而動也按書伊尹適夏醜夏歸亳史太公嘗事紂去之歸周所謂在夏在商誠矣然以為間何也湯文王固使人間夏商耶伊呂固與人為間耶桀紂固待間而後可伐耶是雖甚庸亦知不然矣然則吾意天下存亡寄於一人伊尹之在夏也湯必曰桀雖暴一旦用伊尹則民心復安吾何病焉及其歸亳也湯必曰桀得伊尹不能用必亡矣吾不可以安視民病遂與天下共亡之呂牙之在商也文王必曰紂雖虐一旦用呂牙則天祿必復吾何憂焉及其歸周也文王必曰紂得呂牙不能用必亡矣吾不可以久遏天命遂命武王與天下共亡之然則夏商之存亡待伊呂用否而決今夫問將之賢者必曰能逆知敵國之勝敗問其所以知之之道必曰不愛千金故能使人為之出萬死以間敵國或曰能因敵國之使而探其隂計嗚呼其亦勞矣伊呂一歸而夏商之國為決亡使湯武無用間之名與用間之勞而得用間之實此非上智其誰能之夫兵雖詭道而本於正者終亦必勝今五間之用其歸於詐成則為利敗則為禍且與人為詐人亦將且詐我故能以間勝者亦或以間敗吾間不忠反為敵用一敗也不得敵之實而得敵之所僞示者以為信二敗也受吾財而不能得敵之隂計懼而以僞告我三敗也夫用心於正一振而羣綱舉用心於詐百補而千穴敗智於此不足恃也故五間者非明君賢將之所上明君賢將之所上者上智之間也是以淮隂曲逆義不事楚而髙祖擒籍之計定左車周叔不用於趙魏而淮隂進兵之謀決嗚呼是亦間也孫武通篇按武成敗之事而責之而文多煙波生色處求之而不窮者天下竒才也天下之士與之言兵而曰我不能者幾人求之於言而不窮者幾人言不窮矣求之於用而不窮者幾人嗚呼至於用而不窮者吾未之見也孫武十三篇兵家舉以為師然以吾評之其言兵之雄乎今其書論竒權密機出入神鬼自古以兵著書者罕所及以是而揣其為人必謂有應敵無窮之才不知武用兵乃不能必克與書所言遠甚吳王闔廬之入郢也武為將軍及秦楚交敗其兵越王入踐其國外禍內患一旦迭發吳王奔走自救不暇武殊無一謀以弭斯亂若按武之書以責武之失凡有三焉九地曰威加於敵則交不得合而武使秦得聽包胥之言出兵救楚無忌吳之心斯不威之甚其失一也作戰曰久暴師則鈍兵挫鋭屈力殫貨則諸侯第其弊而起且武以九年冬伐楚至十年秋始還可謂久暴矣越人能無乘間入國乎其失二也又曰殺敵者怒也今武縱子胥伯嚭鞭平王尸復一夫之私忿以激怒敵此司馬戍子西子期所以必死讐吳也勾踐不頽舊塜而吳服田單譎燕掘墓而齊奮知謀與武遠矣武不逹此其失三也然始吳能以入郢乃因胥嚭唐蔡之怒及乘楚瓦之不仁武之功蓋亦鮮矣夫以武自為書尚不能自用以取敗北况區區祖其故智餘論者而能將乎且吳起與武一體之人也皆著書言兵世稱之曰孫吳然而吳起之言兵也輕法制草略無所統紀不若武之書詞約而意盡天下之兵說皆歸其中然吳起始用於魯破齊及入魏又能制秦兵入楚楚復霸而武之所為反如是書之不足信也固矣今夫外御一𨽻內治一妾是賤文夫亦能夫豈必有人而教之及夫御三軍之衆闔營而自固或且有亂然則是三軍之衆惑之也故善將者視三軍之衆與視一𨽻一妾無加焉故其心常若有餘夫以一人之心當三軍之衆而其中恢恢然猶有餘地此韓信之所以多多而益辦也故夫用兵豈有異術哉能勿視其衆而巳矣子貢子貢之亂齊滅吳存魯出於戰國傾危之習決非子貢事而老泉此論却足以補子貢之所不及君子之道智信難信者所以正其智也而智常至於不正智者所以通其信也而信常至於不通是故君子愼之也世之儒者曰徒智可以成也人見乎徒智之可以成也則舉而棄乎信吾則曰徒智可以成也而不可以繼也子貢之以亂齊滅吳存魯也吾悲之彼子貢者遊說之士苟以邀一時之功而不以可繼為事故不見其禍使夫王公大人而計出於此則吾未見其不旋踵而敗也吾聞之王者之兵計萬世而動霸者之兵計子孫而舉彊國之兵計終身而發求可繼也子貢之兵是明日不可用也故子貢之出也吾以為魯可存也而齊可無亂吳可無滅何也田常之將篡也憚髙國鮑晏故使移兵伐魯為賜計者莫若抵高國鮑晏弔之彼必愕而問焉則對曰田常遣子之兵伐魯吾竊哀子之將亡也彼必詰其故則對曰齊之有田氏猶人之養虎也子之於齊猶肘股之於身也田氏之欲肉齊久矣然未敢逞志者懼肘股之捍也今子出伐魯肘股去矣田氏孰懼哉吾見身將磔裂而肘股隨之所以弔也彼必懼而咨計於我因教之曰子悉甲趨魯壓境而止吾請為子濳約魯侯以待田氏之變帥其兵從子入討之為齊人計之彼懼田氏之禍其勢不得不聽歸以約魯侯魯侯懼齊伐其勢亦不得不聽因使練兵搜乘以俟齊釁誅亂臣而定新主齊必德魯數世之利也吾觀仲尼以為齊人不與田常者半故請哀公討之今誠以魯之衆從高國鮑晏之師加齊之半可以轘田常於都市其勢甚便其成功甚大惜乎賜之不出於此也齊哀王舉兵誅呂氏呂氏以灌嬰為將拒之至滎陽嬰使使諭齊及諸侯連和以待呂氏變共誅之今田氏之勢何以異此有魯以為齊有高國鮑晏以為灌嬰惜乎賜之不出於此也蘇氏父子之學出於戰國縱橫者多故此䇿大略亦竊陳軫蘇秦之餘而為計甚工六國一篇議論由戰國䇿縱人之說來却能與戰國䇿相伯仲當與子由六國論並看六國破滅非兵不利戰不善弊在賂秦賂秦而力虧破滅之道也或曰六國互喪率賂秦耶曰不賂者以賂者喪蓋失疆援不能獨完故曰弊在賂秦也秦以攻取之外小則獲邑大則得城較秦之所得與戰勝而得者其實百倍諸侯之所亡與戰敗而亡者其實亦百倍則秦之所大欲諸侯所大患固不在戰矣思厥先祖父暴霜露斬荆棘以有尺寸之地子孫視之不甚惜舉以與人如棄草芥今日割五城明日割十城然後得一夕安寢起視四境而秦兵又至矣然則諸侯之地有限暴秦之欲無厭奉之彌繁侵之愈急故不戰而强弱勝負已判矣至於顚覆理固宜然古人云以地事秦猶抱薪救火薪不盡火不滅此言得之齊人未嘗賂秦終繼五國遷滅何哉與嬴而不助五國也五國既喪齊亦不免矣燕趙之君始有遠略能守其土義不賂秦是故燕雖小國而後亡斯用兵之效也至丹以荆卿為計始速禍焉趙嘗五戰于秦二敗而三勝後秦擊趙者再李牧連却之洎牧以讒誅邯鄲為郡惜其用武而不終也且燕趙處秦革滅殆盡之際可謂智力孤危戰敗而亡誠不得已向使三國各愛其地齊人勿附于秦刺客不行良將猶在則勝負之數存亡之理當與秦相較或未易量嗚呼以賂秦之地封天下之謀臣以事秦之心禮天下之竒才并力西嚮則吾恐秦人食之不得下咽也悲夫有如此之勢而為秦人積威之所却日削月割以趨於亡為國者無使為積威之所劫哉夫六國與秦皆諸侯其勢弱於秦而猶有可以不賂而勝之之勢苟以天下之大而從六國破亡之故事是又在六國下矣髙帝雖非當漢成敗確論而行文却自縱橫可愛漢髙帝挾數用術以制一時之利害不如陳平揣摩天下之勢舉指搖目以劫制項羽不如張良微此二人則天下不歸漢而髙帝乃木彊之人而止耳然天下已定後世子孫之計陳平張良智之所不及則髙帝常先為之規畫處置以中後世之所為曉然如目見其事而為之者蓋髙帝之智明於大而暗於小至於此而後見也帝嘗語呂后曰周勃重厚少文然安劉氏必勃也可令為太尉方是時劉氏既安矣勃又將誰安耶故吾之意曰髙帝之以太尉屬勃也知有呂氏之禍也雖然其不去呂后何也勢不可也昔者武王沒成王幼而三監叛帝意百歲後將相大臣及諸侯王有武庚祿父者而無有以制之也獨計以為家有主母而豪奴悍婢不敢與弱子抗呂氏佐帝定天下為大臣素所畏服獨此可以鎮壓其邪心以待嗣子之壯故不去呂后者為惠帝計也呂后既不可去故削其黨以損其權使雖有變而天下不搖是故以樊噲之功一旦遂欲斬之而無疑嗚呼彼豈獨於噲不仁耶且噲與帝偕起拔城陷陳功不為少矣方亞父嗾項莊時微噲誚讓羽則漢之為漢未可知也一旦人有惡噲欲滅戚氏者時噲出伐燕立命平勃即軍中斬之夫噲之罪未形也惡之者誠僞未必也且髙帝之不以一女子斬天下之功臣亦明矣彼其娶於呂氏呂氏之族若産祿輩皆庸才不足恤獨噲豪健諸將所不能制後世之患無大於此矣夫髙帝之視呂后也猶醫者之視堇也使其毒可以治病而無至於殺人而巳矣樊噲死則呂后之毒將不至於殺人髙帝以為是足以死而無憂矣彼平勃者遺其憂者也噲之死於惠之六年也天也彼其尚在則呂祿不可紿太尉不得入北軍矣或謂噲於帝最親使之尚在未必與産祿叛夫韓信黥布盧綰皆南面稱孤而綰又最為親幸然及髙帝之未崩也皆相繼以逆誅誰謂百歲之後椎埋屠狗之人見其親戚乘勢為帝王而不欣然從之耶吾故曰彼平勃者遺其憂者也愚謂髙帝死而吕后獨任陳平未必不由不斬噲一著且噲不死其助祿産之叛亦未必觀其譙羽鴻門與排闥而諌噲亦似有氣岸而能守正者豈可以屠狗之雄而遽逆其詐哉蘇氏父子兄弟往往以事後成敗托拾人得失類如此項籍蘇氏父子往往按事後成敗立說而非其至然其文特雄近戰國䇿吾嘗論項籍有取天下之才而無取天下之慮曹操有取天下之慮而無取天下之量劉備有取天下之量而無取天下之才故三人終其身無成焉且夫不有所棄不可以得天下之勢不有所忍不可以盡天下之利是故地有所不取城有所不攻勝有所不就敗有所不避其來不喜其去不怒肆天下之所為而徐制其後乃克有濟嗚呼項籍有百戰百勝之才而死于垓下無惑也吾於其戰巨鹿也見其慮之不長量之不大未嘗不怪其死於垓下之晚也方籍之渡河沛公始整兵嚮關籍於此時若急引軍趨秦及其鋒而用之可以據咸陽制天下不知出此而區區與秦將爭一旦之命既全巨鹿而猶徘徊河南新安間至函谷則沛公入咸陽數月矣夫秦人既巳安沛公而讐籍則其勢不得强而臣故籍雖遷沛公漢中而卒都彭城使沛公得還定三秦則天下之勢在漢不在楚楚雖百戰百勝尚何益哉故曰兆垓下之死者巨鹿之戰也或曰雖然籍必能入秦乎曰項梁死章邯謂楚不足慮故移兵伐趙有輕楚心而良將徑兵盡于巨鹿籍誠能以必死之士擊其輕敵寡弱之師入之易耳且亡秦之守關與沛公之守善否可知也沛公之攻關與籍之攻善否又可知也以秦之守而沛公攻入之沛公之守而籍攻入之然則亡秦之守籍不能入哉或曰秦可入矣如救趙何曰虎方捕鹿羆據其穴搏其子虎安得不置鹿而返返則碎於羆明矣軍志所謂攻其必救也使籍入關王離涉間必釋趙自救籍據關逆擊其前趙與諸侯救者十餘壁躡其後覆之必矣是籍一舉解趙之圍而收功於秦也戰國時魏伐趙齊救之田忌引兵疾走大梁因存趙而破魏彼宋義號知兵殊不達此屯安陽不進而曰待秦敝吾恐秦未敝而沛公先據關矣籍與義俱失焉是故古之取天下者常先圗所守諸葛孔明棄荆州而就西蜀吾知其無能為也且彼未嘗見大險也彼以為劍門者可以不亡也吾嘗觀蜀之險其守不可出其出不可繼兢兢而自守猶且不給而何足以制中原哉若夫秦漢之故都沃土千里洪河大山真可以控天下又烏事夫不可以措足如劍門者而後曰險哉今夫富人必居四通五達之都使其財布出於天下然後可以收天下之利在小丈夫者得一金櫝而藏諸家拒户而守之嗚呼是求不失也非求富也大盜至劫而取之又焉知其果不失也唐宋八大家文鈔卷一百十三
