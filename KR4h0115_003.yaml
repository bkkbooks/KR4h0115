body:
  text: 唐宋八大家文鈔卷三明茅坤撰昌黎文鈔三書上考功崔虞部書昌黎公遇而不遇其書如此愈不肖行能誠無可取行已頗僻與時俗異態抱愚守迷固不識仕進之門乃與羣士爭名競得失行人之所甚鄙求人之所甚利其為不可雖童昏實知之如執事者不以是為念援之幽窮之中推之髙顯之上是知其文之或可而不知其人之莫可也知其人之或可而不知其時之莫可也既以自咎又歎執事者所守異於人人之廢耳任目華實不兼故有所進故有所退且執事始考文之明日浮囂之徒巳相與稱曰某得矣某得矣問其所從來必言其有自一日之間九變其說凡進士之應此選者三十有二人其所不言者數人而已而愈在焉及執事既上名之後三人之中其二人者固所傳聞矣華實兼者也果竟得之而又升焉其一人者則莫之聞矣實與華違行與時乖果竟退之如是則可見時之所與者時之所不與者之相逺矣然愚之所守竟非偶然故不可變凡在京師八九年矣足不跡公卿之門名不譽於大夫士之口始者謬為今相國所第此時惟念以為得失固有天命不在趨時而偃仰一室嘯歌古人今則復疑矣未知夫天竟如何命竟如何由人乎哉不由人乎哉欲事干謁則患不能小書困於投刺欲學為佞則患言訥詞直卒事不成徒使其躬儳焉而不終日是以勞思長懷中夜起坐度時揣已廢然而返雖欲從之末由也巳又常念古之人日已進今之人日巳退夫古之人四十而仕其行道為學既已大成而又之死不倦故其事業功德老而益明死而益光故詩曰雖無老成人尚有典刑言老成之可尚也又曰樂只君子德音不巳謂死而不亡也夫今之人務利而遺道其學其問以之取名致官而巳得一名獲一位則棄其業而役役於持權者之門故其事業功德日以忘月以削老而益昏死而遂亡愈今二十有六矣距古人始仕之年尚十四年豈為晚哉行之以不息要之以至死不有得於今必有得於古不有得於身必有得於後用此自遣且以為知已者之報執事以為何如哉其信然否也今所病者在於窮約無僦屋賃僕之資無緼袍糲食之給驅馬出門不知所之斯道未喪天命不欺豈遂殆哉豈遂困哉竊惟執事之於愈也無師友之交無久故之事無顔色言語之情卒然振而發之者必有以見知爾故盡暴其所志不敢以默又懼執事多在省非公事不敢以至是則拜見之不可期獲侍之無時也是以進其說如此庶執事察之也與孟尚書書翻覆變幻昌黎書當以此為第一愈白行官自南回過吉州得吾兄二十四日手書數番欣悚兼至未審入秋來眠食何似伏惟萬福來示云有人傳愈近少信奉釋氏此傳者之妄也潮州時有一老僧號大顛頗聰明識道理逺地無可與語者故自山召至州郭留十數日實能外形骸以理自勝不為事物侵亂與之語雖不盡解要自胸中無滯礙以為難得因與來往及祭神至海上遂造其廬及來袁州留衣服為別乃人之情非崇信其法求福田利益也孔子云丘之禱久矣凡君子行巳立身自有法度聖賢事業具在方冊可效可師仰不愧天俯不愧人內不愧心積善積惡殃慶自各以其類至何有去聖人之道舍先王之法而從夷狄之教以求福利也詩不云乎愷悌君子求福不回傳又曰不為威惕不為利疚假如釋氏能與人為禍祟非守道君子之所懼也況萬萬無此理且彼佛者果何人哉其行事類君子邪小人邪若君子也必不妄加禍於守道之人如小人也其身已死其鬼不靈天地神祇昭布森列非可誣也又肯令其鬼行胸臆作威福於其間哉進退無所據而信奉之亦且惑矣且愈不助釋氏而排之者其亦有說孟子云今天下不之楊則之墨楊墨文亂而聖賢之道不明則三綱淪而九法斁禮樂崩而夷狄橫幾何其不為禽獸也故曰能言距楊墨者皆聖人之徒也揚子雲云古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢且將數百年以至於秦卒滅先王之法燒除其經坑殺學士天下遂大亂及秦滅漢興且百年尚未知修明先王之道其後始除挾書之律稍求亡書招學士經雖少得尚皆殘缺十亡二三故學士多老死新者不見全經不能盡知先王之事各以所見為守分離乖隔不合不公二帝三王羣聖人之道於是大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何補然賴其言而今學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞亂而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆服左袵而言侏離矣故愈嘗推尊孟氏以為功不在禹下者為此也漢氏巳來羣儒區區修補百孔千瘡隨亂隨失其危如一髮引千鈞綿綿延延寖以微滅於是時也而唱釋老於其間鼓天下之衆而從之嗚呼其亦不仁甚矣釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於已壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在傍又安得因一摧折自毁其道以從於邪也籍湜輩雖屢指教不知果能不叛去否辱吾兄眷厚而不獲承命惟增慙懼死罪死罪愈再拜古來書自司馬子長答任少卿後獨韓昌黎為工而此書尤昌黎佳處與鳳翔刑部尚書書與于襄陽書同意愈再拜布衣之士身居窮約不借勢於王公大人則無以成其志王公大人功業顯著不借譽於布衣之士則無以廣其名是故布衣之士雖甚賤而不諂王公大人雖甚貴而不驕其事勢相須其先後相資也今閣下為王爪牙為國藩垣威行如秋仁行如春戎狄棄兵而逺遁朝廷髙枕而不虞是豈負大丈夫平生之志願哉豈負明天子非常之顧遇哉赫赫乎洸洸乎功業逐日以新名聲隨風而流宜乎歡呼海隅髙談之士奔走天下慕義之人使或願馳一傳或願操一戈納君於唐虞收地於河湟然而未至乎是者蓋亦有說云豈非待士之道未甚厚遇士之禮未甚優請粗言其事閣下試詳而聽之夫士之來也必有求於閣下夫以貧賤而求於富貴正其宜也閣下之財不可以遍施于天下在擇其人之賢愚而厚薄等級之可也假如賢者至閣下乃一見之愚者至不得見焉則賢者莫不至而愚者日逺矣假如愚者至閣下以千金與之賢者至亦以千金與之則愚者莫不至而賢者日逺矣欲求得士之道盡於此而已欲求士之賢愚在於精鑒博采之而已精鑒於已固已得其十七八矣又博采於人百無一二遺者焉若果能是道愈見天下之竹帛不足書閣下之功德天下之金石不足頌閣下之形容矣愈也布衣之士也生七歲而讀書十三而能文二十五而擢第於春官以文名於四方前古之興亡未嘗不經於心也當世之得失未嘗不留於意也常以天下之安危在邊故六月于邁來觀其師及至此都徘徊而不能去者誠悅閣下之義願少立於階墀之際望見君子之威儀也居十日而不敢進者誠以左右無先為容懼閣下以衆人視之則殺身不足以滅恥徒悔恨於無窮故先此書序其所以來之意閣下其無以為狂而以禮進退之幸甚幸甚應科目時與人書空中樓閣其自擬處奇而其文亦奇月日愈再拜天池之濱大江之濆曰有怪物焉蓋非常鱗凡介之品彚匹儔也其得水變化風雨上下于天不難也其不及水蓋尋常尺寸之間耳無髙山大陵曠途絶險為之關隔也然其窮涸不能自致乎水為獱獺之笑者蓋十八九矣如有力者哀其窮而運轉之蓋一舉手一投足之勞也然是物也負其異於衆也且曰爛死於沙泥吾寧樂之若俯首帖耳搖尾而乞憐者非我之志也是以有力者遇之熟視之若無覩也其死其生固不可知也今又有有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎其哀之命也其不哀之命也知其在命而且鳴號之者亦命也愈今者實有類於是是以忘其疏愚之罪而有是說焉閣下其亦憐察之與陳給事書洗刷工而調句佳甚有益於初進者愈再拜愈之獲見於閣下有年矣始者亦嘗辱一言之譽貧賤也衣食於奔走不得朝夕繼見其後閣下位益尊伺候於門牆者日益進夫位益尊則賤者日隔伺候於門牆者日益進則愛博而情不專愈也道不加修而文日益有名夫道不加修則賢者不與文日益有名則同進者忌始之以日隔之疏加之以不專之望以不與者之心而聽忌者之說由是閣下之庭無愈之迹矣去年春亦嘗一進謁於左右矣溫乎其容若加其新也屬乎其言若閔其窮也退而喜也以告於人其後如東京取妻子又不得朝夕繼見及其還也亦嘗一進謁於左右矣邈乎其容若不察其愚也悄乎其言若不接其情也退而懼也不敢復進今則釋然悟翻然悔曰其邈也乃所以怒其來之不繼也其悄也乃所以示其意也不敏之誅無所逃避不敢遂進輒自疏其所以并獻舊所為復志賦已下十首為一卷卷有標軸送孟郊序一首生紙寫不加裝飾皆有楷字注字處急於自解而謝不能俟更寫閣下取其意而略其禮可也與于襄陽書前半瑰瑋遊泳後半婉孌凄切七月三日將仕郎守國子四門博士韓愈謹奉書尚書閣下士之能享大名顯當世者莫不有先達之士負天下之望者為之前焉士之能垂休光照後世者亦莫不有後進之士負天下之望者為之後焉莫為之前雖美而不彰莫為之後雖盛而不傳是二人者未始不相須也然而千百載乃一相遇焉豈上之人無可援下之人無可推歟何其相須之殷而相遇之疏也其故在下之人負其能不肯諂其上上之人負其位不肯顧其下故髙材多戚戚之窮盛位無赫赫之光是二人者之所為皆過也未嘗干之不可謂上無其人未嘗求之不可謂下無其人愈之誦此言久矣未嘗敢以聞於人側聞閣下抱不世之材特立而獨行道方而事實卷舒不隨乎時文武惟其所用豈愈所謂其人哉抑未聞後進之士有遇知於左右獲禮於門下者豈求之而未得耶將志存乎立功而事專乎報主雖遇其人未暇禮耶何其宜聞而久不聞也愈雖不才其自處不肯後於恆人閣下將求之而未得歟古人有言請自隗始愈今者惟朝夕芻米僕賃之資是急不過費閣下一朝之享而足也如曰吾志存乎立功而事專乎報主雖遇其人未暇禮焉則非愈之所敢知也世之齪齪者既不足以語之磊落奇偉之人又不能聽焉則信乎命之窮也謹獻舊所為文一十八首如賜覽觀亦足以知其志之所存與祠部陸員外書唐時主司取士於試文外又擇行誼采聞望故昌黎之為書如此執事好賢樂善孜孜以薦進良士明白是非為已任方今天下一人而已愈之獲幸於左右其足跡接於門牆之間升乎堂而望乎室者亦將一年於今矣念慮所及輒欲不自疑外竭其愚而道其志況在執事之所孜孜為己任者得不少助而張之乎誠不自識其言之可采與否其事則小人之事君子盡心之道也天下之事不可遽數又執事之志或有待而為未敢一二言也今但言其最近而切者爾執事之與司貢士者相知誠深矣彼之所望於執事執事之所以待乎彼者可謂至而無間疑矣彼之職在乎得人執事之志在乎進賢如得其人而授之所謂兩得其求順乎其必從也執事之知人其亦博矣夫子之言曰舉爾所知然則愈之知者亦可言已文章之尤者有侯喜者侯雲長者喜之家在開元中衣冠而朝者兄弟五六人及喜之父仕而不達棄官而歸喜率兄弟操耒耜而耕于野地薄而賦多不足以養其親則以其耕之暇讀書而為文以干於有位者而取足焉喜之文章學西京而為也舉進士十五六年矣雲長之文執事所自知其為人淳重方實可任以事其文與喜相上下有劉述古者其文長於為詩文麗而思深當今舉於禮部者其詩無與為比而又工於應主司之試其為人溫良誠信無邪佞詐妄之心彊志而婉容和平而有立其趨事靜以敏著美名而負屈稱者其日已久矣有韋羣玉者京兆之從子其文有可取者其進而未止者也其為人賢而有材志剛而氣和樂於薦賢為善其在家無子弟之過居京兆之側遇事輒爭不從其令而從其義求子弟之賢而能業其家者羣玉是也凡此四子皆可以當執事首薦而極論者主司疑焉則以辨之問焉則以告之未知焉則殷勤而語之期乎有成而後止可也有沈杞者張苰者尉遲汾者李紳者張後餘者李翊者或文或行皆出羣之才也凡此數子與之足以收人望得才實主司疑焉則與解之問焉則以對之廣求焉則以告之可也往者陸相公司貢士考文章甚詳愈時亦幸在得中而未知陸之得人也其後一二年所與及第者皆赫然有聲原其所以亦由梁補闕肅王郎中礎佐之梁舉八人無有失者其餘則王皆與謀焉陸相之考文章甚詳也待梁與王如此不疑也梁與王舉人如此之當也至今以為美談自後主司不能信人人亦無足信者故蔑蔑無聞今執事之與司貢士者有相信之資謀行之道惜乎其不可失也方今在朝廷者多以遊宴娛樂為事獨執事眇然髙舉有深思長慮為國家樹根本之道宜乎小子之以此言聞于左右也為人求薦書善喻却是昌黎本色某聞木在山馬在肆遇之而不顧者雖日纍千萬人未為不材與下乘也及至匠石過之而不睨伯樂遇之而不顧然後知其非棟梁之材超逸之足也以某在公之宇下非一日而又辱居姻婭之後是生于匠石之園長于伯樂之廄者也於是而不得知假有見知者千萬人亦何足云今幸賴天子每歲詔公卿大夫貢士若某等比咸得以薦聞是以冒進其說以纍於執事亦不自量已然執事其知某如何哉昔人有鬻馬不售於市者知伯樂之善相也從而求之伯樂一顧價增三倍某與其事頗相類是以終始言之耳代張籍與李浙東書獨以目盲一節感慨悲憤月日前某官某謹東向再拜寓書浙東觀察使中丞李公閣下籍聞議論者皆云方今居古方伯連帥之職坐一方得專制於其境內者惟閣下心事犖犖與俗輩不同籍固以藏之胸中矣近者閣下從事李協律翶到京師籍於李君友也不見六七年聞其至馳往省之問無恙外不暇出一言且先賀其得賢主人李君曰子豈盡知之乎吾將盡言之數日籍益聞所不聞籍私獨喜常以為自今已後不復有如古人者於今忽有之退自悲不幸兩目不見物無用於天下胸中雖有知識家無錢財寸步不能自致今去李中丞五千里何由致其身於其人之側開口一吐出胸中之奇乎因飲泣不能語既數日復自奮曰無所能人乃宜以盲廢有所能人雖盲當廢於俗輩不當廢於行古人之道者浙水東七州户不下數十萬不盲者何限李中丞取人固當問其賢不賢不當計其盲與不盲也當今盲于心者皆是若籍自謂獨盲於目爾其心則能別是非若賜之坐而問之其口固能言也幸未死實欲一吐出心中平生所知見閣下能信而致之於門邪籍又善於古詩使其心不以憂衣食亂閣下無事時一致之座側使跪進其所有閣下憑几而聽之未必不如聽吹竹彈絲敲金擊石也夫盲者業專於藝必精故樂工皆盲籍儻可與此輩比竝乎使籍誠不以蓄妻子憂饑寒亂心有錢財以濟醫藥其盲未甚庶幾其復見天地日月因得不廢則自今至死之年皆閣下之賜閣下濟之以已絶之年賜之以既盲之視其恩輕重大小籍宜如何報也閣下裁之度之唐宋八大家文鈔卷三
