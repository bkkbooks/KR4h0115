body:
  text: 唐宋八大家文鈔巻一百明茅坤撰南豐文鈔四序戰國策目錄序大㫖與新序相近有根本有法度劉向所定戰國策三十三篇崇文總目稱十一篇者闕臣訪之士大夫家始盡得其書正其誤謬而疑其不可考者然後戰國策三十三篇復完敘曰向敘此書言周之先明敎化修法度所以大治及其後謀詐用而仁義之路塞所以大亂其說既美矣卒以謂此書戰國之謀士度時君之所能行不得不然則可謂惑於流俗而不篤於自信者也夫孔孟之時去周之初巳數百歳其舊法巳亡舊俗巳熄久矣二子乃獨明先王之道以謂不可改者豈將强天下之主以後世之不可為哉亦將因其所遇之時所遭之變而為當世之法使不失乎先王之意而巳二帝三王之治其變固殊其法固異而其為國家天下之意本末先後未嘗不同也二子之道如是而巳葢法者所以適變也不必盡同道者所以立本也不可不一此理之不易者也故二子者守此豈好為異論哉能勿苟而巳矣可謂不惑乎流俗而篤於自信者也戰國之遊士則不然不知道之可信而樂於說之易合其設心注意偷為一切之計而巳故論詐之便而諱其敗言戰之善而蔽其患其相率而為之者莫不有利焉而不勝其害也有得焉而不勝其失也卒至蘇秦商鞅孫臏吳起李斯之徒以亡其身而諸侯及秦用之者亦滅其國其為世之大禍明矣而俗猶莫之寤也惟先王之道因時適變為法不同而考之無疵用之無弊故古之聖賢未有以此而易彼也或曰邪說之害正也宜放而絶之則此書之不泯其可乎對曰君子之禁邪說也固將明其說於天下使當世之人皆知其說之不可從然後以禁則齊使後世之人皆知其說之不可為然後以戒則明豈必滅其籍哉放而絶之莫善於是是以孟子之書有為神農之言者有為墨子之言者皆著而非之至於此書之作則上繼春秋下至楚漢之起二百四十五年之間載其行事固不可得而廢也此書有高誘注者二十一篇或曰二十二篇崇文總目存者八篇今存者十篇王遵岩曰此序與新序序相類而此篇為英爽軼宕南齊書目錄序論史家得失處如掌南齊書八紀十一志四十列傳合五十九篇梁蕭子顯撰始江淹巳為十志沈約又為齊紀而子顯自表武帝别為此書臣等因挍正其訛謬而序其篇目曰將以是非得失興壞理亂之故而為法戒則必得其所託而後能傳於久此史之所以作也然而所託不得其人則或失其意或亂其實或析理之不通或設辭之不善故雖有殊功韙徳非常之跡將闇而不章鬱而不發而檮杌嵬瑣奸回凶慝之形可幸而掩也嘗試論之古之所謂良史者其明必足以周萬事之理其道必足以適天下之用其智必足以通難知之意其文必足以發難顯之情然後其任可得而稱也何以知其然耶昔者唐虞有神明之性有微妙之徳使由之者不能知知之者不能名以為治天下之本號令之所布法度之所設其言至約其體至備以為治天下之具而為二典者推而明之所記者豈獨其迹耶并與其深微之意而傳之小大精麤無不盡也本末先後無不白也使誦其說者如出乎其時求其㫖者如即乎其人是可不謂明足以周萬事之理道足以適天下之用智足以通難知之意文足以發難顯之情者乎則方是時豈特任政者皆天下之士哉葢執簡操筆而隨者亦皆聖人之徒也兩漢以來為史者去之逺矣司馬遷從五帝三王既没數千載之後秦火之餘因散絶殘脫之經以及傳記百家之説區區掇拾以集著其善惡之迹興廢之端又創巳意以為本紀世家八書列傳之文斯亦可謂奇矣然而蔽害天下之聖法是非顛倒而採摭謬亂者亦豈少哉是豈可不謂明不足以周萬事之理道不足以適天下之用智不足以通難知之意文不足以發難顯之情者乎夫自三代以後為史者如遷之文亦不可不謂雋偉㧞出之才非常之士也然顧以謂明不足以周萬事之理道不足以適天下之用智不足以通難知之意文不足以發難顯之情者何哉葢聖賢之高致遷固有不能純達其情而見之於後者矣故不得而與之也遷之得失如此況其他耶至於宋齊梁陳後魏後周之書葢無以議為也子顯之於斯文喜自馳騁其更改破析刻雕藻繢之變尤多而其文益下豈夫材固不可以强而有邪數世之史既然故其事迹曖昧雖有隨世以就功名之君相與合謀之臣未有赫然得傾動天下之耳目播天下之口者也而一時偷奪傾危悖理反義之人亦幸而不暴著於世豈非所託不得其人故邪可不惜哉葢史者所以明夫治天下之道也故為之者亦必天下之材然後其任可得而稱也豈可忽哉豈可忽哉梁書目錄序以内字論佛之㫖頗非是葢佛原非以吾儒之外而彼自識其内也彼只見自家本來原無一物故欲了當本性耳欲見本性故將一切聲色臭味香法多為丢去耳而非以狥内故也梁書六本紀五十列傳合五十六篇唐貞觀三年詔右散騎常侍姚思廉撰思廉者梁史官察之子推其父意又頗采諸儒謝吳等所記以成此書臣等既挍正其文字又集次為目錄一篇而敘之曰自先王之道不明百家並起佛最晩出為中國之患而在梁為尤甚故不得而不論也葢佛之徒自以謂吾之所得者内而世之論佛者皆外也故不可詘雖然彼惡覩聖人之内哉書曰思曰睿睿作聖葢思者所以致其知也能致其知者察三才之道辯萬物之理小大精粗無不盡也此之謂窮理知之至也知至矣則在我者之足貴在彼者之不足玩未有不能明之者也有知之之明而不能好之未可也故加之誠心以好之有好之之心而不能樂之未可也故加之至意以樂之能樂之則能安之矣如是則萬物之自外至者安能累我哉萬物之所不能累故吾之所以盡其性也能盡其性則誠矣誠者成也不惑也既成矣必充之使可大焉既大矣必推之使可化焉能化矣則含智之民肖翹之物有待於我者莫不由之以至其性遂其宜而吾之用與天地參矣徳如此其至也而應乎外者未嘗不與人同此吾之道所以為天下之達道也故與之為衣冠飲食冠昏喪祭之具而由之以敎其為君臣父子兄弟夫婦者莫不一出乎人情與之同其吉凶而防其憂患者莫不一出乎人理故與之處而安且治之所集也危且亂之所去也與之處者其具如此使之化者其徳如彼可不謂聖矣乎既聖矣則無思也其至者循理而巳無為也其動者應物而巳是以覆露乎萬物鼓舞乎羣衆而未有能測之者也可不謂神矣乎神也者至妙而不息者也此聖人之内也聖人者道之極也佛之說其有以易此也求其有以易此者固其所以為失也夫得於内者未有不可行於外也有不可行於外者斯不得於内矣易曰智周乎萬物而道濟乎天下故不過此聖人所以兩得之也智足以知一偏而不足以盡萬事之理道足以為一方而不足以適天下之用此百家之所以兩失之也佛之失其不以此乎則佛之徒自以謂得諸内者亦可謂妄矣夫學史者將以明一代之得失也臣等故因梁之事而為著聖人之所以得及佛之所以失以傳之者使知君子之所以距佛者非外而有志於内者庶不以此而易彼也唐荆川曰通篇俱說聖人之内而所以攻佛者不過數句王遵岩曰原道文字雄健傑特亘古無倫矣然說佛之失處不能如是其稱吾道大㫖亦不能如是精也陳書目錄序文屬典刑不為風波而自可賞俯陳書六本紀三十列傳凡三十六篇唐散騎常侍姚思廉譔始思廉父察梁陳之史官也錄二代之事未就而陳亡隋文帝見察甚重之每就察訪梁陳故事察因以所論載每一篇成輒奏之而文帝亦遣虞世基就察求其書又未就而察死察之將死屬思廉以繼其業唐興武徳五年高祖以自魏以來二百餘歳世統數更史事放逸乃詔論次而思廉遂受詔為陳書久之猶不就貞觀三年遂詔論譔於秘書内省十年正月壬子始上之觀察等之為此書歴三世傳父子更數十歳而後乃成葢其難如此然及其既成與宋魏梁等書世亦傳之者少故學者於其行事之迹亦罕得而詳之也其書亦以罕傳則自秘府所藏往往脫誤嘉祐六年八月始詔挍讐使可鏤版行之天下而臣等言梁陳等書缺獨館閣所藏恐不足以定著願詔京師及州縣藏書之家使悉上之先皇帝為下其事至七年冬稍稍始集臣等以相挍至八年七月陳書三十六篇者始挍定可傳之學者其疑者亦不敢稍損益特各疏于篇末其書舊無目列傳名氏多闕謬因别為目錄一篇使覽者得詳焉夫陳之為陳葢偷為一切之計非有先王經紀禮義風俗之美制治之法可章示後世然而兼權尚計明於任使恭儉愛人則其始之所以興惑於邪臣溺於嬖妾忘患縱欲則其終之所以亡興亡之端莫非自巳致者至於有所因造以為號令威刑職官州郡之制雖其事巳淺然亦各施於一時皆學者之所不可不考也而當時之士爭奪詐偽苟得偷合之徒尚不得不列以為世戒而況於壞亂之中倉皇之際士之安貧樂義取舍去就不為患禍勢利動其心者亦不絶於其間若此人乎可謂篤於善矣葢古人之所思見而不可得風雨之詩所謂作者也安可使之泯泯不少槩見於天下哉則陳之史其可廢乎葢此書成之既難其後又久不顯及宋興巳百年古文遺事靡不畢講而始得盛行於天下列於學者其傳之之難又如此豈非遭遇固自有時也哉太祖皇帝總序曾子獨見其論宋太祖與漢高兩相折衷處如截鐵葢唐之敝自天寶巳後紀綱寖壞不能自振以至於失天下五代興起五十餘年之間更八姓十有四君危亡之變數矣其尤甚也契丹遂入中國擅立名號當是時天地五行人事之理反易繆亂不同夷狄者無幾耳太祖為天下所戴踐尊位以生民為任故勸農桑薄賦歛緩刑罰除舊政之不便民者詔令勉覈相屬推其心無一日不在百姓也知方鎭之病民也故設通判之員使歛以繩墨憂吏之不良也故數使在位舉其所知患吏或受賕或不奉法也故罪至死徙一無所貸原其意葢以謂遭世大衰不如是吏不知禁不能救民於焚溺之中也征伐既下諸國必先巳逋欠滌煩苛賙乏絶雪寃滯惠農民㧞人材申命郡邑反復不倦或遇水旱輒蔬食請禱欲移災於巳其於羣臣有恩舊有勞能待之各盡其分以位貴之以財富之有男使尚主有女使嫁宗室其予人之周也如此即材可用雖讐不廢不可用雖光顯矣不處以勢其有罪多縱貸之或賜之使自媿及至堅明約束以整齊天下者亦使之不能踰也强僣之國皆接以恩禮商賈往來不禁有出境犯其令者迺為之置市邊邑使兩利有所乏少常賑助之征伐所加必其罪暴著師出未嘗不以義也其君長巳降及就俘執道路勞問迎致使者相望既至罪不數辱之優假秩祿及其宗親吏屬賜以田宅使子孫世守擁䕶保全皆得以壽考終自晉既覆滅契丹寖大中國惴畏不敢當太祖㧞用材武䕶西北邊寵以非常之恩任屬專聽信明常遣戍卒戒之曰我猶赦汝郭進殺汝矣有訟進者謂曰進軍政嚴此必犯進法送進使殺之關市租賦諸將得恣用不問出入以其故士附鬬者盡力諜者盡情邊臣可諉者皆十餘年不易其任然位不過巡撿使衆不過三五千人葢任專則勢便位不極則士勵兵少則用約御將亦多術矣總其所長能兼用之故能省費息民振新集之衆屈憑陵之冦也葢太祖篤於孝友有天下之行聰明智勇有天下之材仁心愛人有天下之志包含徧覆有天下之量守之以勤儉恭慎虚心納諫鑒於粤蜀以奢侈為戒思天下之重不復遊畋封拜諸子務自約損不盡循故典收納學士大夫用之不求其備或守難進之節亦不奪也晩喜讀書勸諸將以學曰欲使之知治道也兼覆夷夏從容以徳江南平覽捷書而泣曰師征不義而顧令吾民死兵彼何負哉秦州巳入尚波于之地却而不受錢俶來朝復歸之越契丹願聽盟約逡巡退抑不自矜伐天下大勢連數十城之鎮割其故地以小其力易動難畜之兵歛置懷服以消其難至於舉賢良崇孝弟綴禮樂明考課雖宇内初輯然庶政大體彌綸備具遺文故事施於後世皆可為法民於是時從死更生室家相保士農工賈各還其職鳥獸草木亦莫不遂前世舊臣備將相處腹心爪牙之任者一旦回心奉令北向如素委質天下廣都通邑兼地千里徳懷二三之臣負衆自用令之不從召之不至者尚數十皆束袵來庭代易奔走如水凑下粤蜀吳楚甌閩之君分天下為八九曰帝與王傳子若孫更數十歳者編名外域並聚闕下四海之内混齊為一海東之國高麗極南交趾西戎吐蕃回紇北狄契丹皆請吏奉貢天地所養通途之屬莫不内附當是時更立天下與民為始天地五行人事之理亂而復正葢太祖之於受命非如前世之君圖衆以智圖柄以力其處心積慮非一夕一日在於取天下也其在天者厯數在人者羣臣萬民三軍之士不歸周歸太祖未有知其所以然者所謂天也及其傳天下也舍子屬弟是則太祖之受天下與舜受之堯禹受之舜其揆一也其傳天下與堯傳之舜舜傳之禹其揆一也受天下及傳天下視天與人而巳非其心未嘗有天下豈能如是哉世以為太祖不世出之主與漢高祖同葢太祖為人有大度意豁如也知人善任使與漢高祖同固然也太祖承自天寶以後更五代二百餘年極敝之天下漢祖承全盛之秦二世之末天下始亂所因之勢既殊太祖開建帝業作則垂憲後常可行漢祖初定海内而巳不及一太祖立折杖法脫民搒笞死禍定著常刑一本寛大漢祖雖約法三章然肉刑三族之誅至孝文始去不及二太祖功臣皆故等夷及位定上下相安始終一意漢祖疑間諸將夷滅其家不及三太祖削大弱强藩臣遵職漢祖封國過制反者更起累世乃定不及四太祖征伐必克漢祖數戰輒北不及五太祖文武自出羣臣莫及漢祖非得三傑之助不得無失不及六開寶之初南海先下趙佗分越而帝漢祖不能禁不及七太祖不用兵革契丹自附漢祖折厄白登身僅免禍不及八太祖後宮二百問願歸者復去四之一漢祖溷於衽席女禍及宗不及九太祖明於大計以屬天下漢祖擇嗣不審幾墜厥世不及十也漢祖所不能及其大者如此是自三代以來撥亂之主未有及太祖也三代盛矣然禹之孫太康失國湯之孫太甲放廢文武之後世三四傳昭王不返於楚繇漢以下變故之宻葢不可勝道也太祖經始大基流風餘澤所被者逺五聖遵業至今百有二十餘年上下和樂無變容動色之慮接於耳目治安久長自三代以來所未有也維太祖創始傳後比迹堯舜綱理天下軼於漢祖太平之業施於無窮三代所不及成功盛徳其至矣哉葢唐天寶十四年天下戸八百九十一萬太祖元年戸九十六萬末年天下既定戸三百九萬今上元豐二年戸一千三百九十一萬六聖之徳澤覆露生養斯其所以盛也本原事實其所繇致此有自也哉唐荆川曰此等大文字當看其布置處南豐有滄州上殿劄子皆與此意同并可與歐公仁宗御集序參之新序目錄序見極正大文有典刑劉向所集次新序三十篇目錄一篇隋唐之世尚為全書今可見者十篇而巳臣既考正其文字因為其序論曰古之治天下者一道徳同風俗葢九州之廣萬民之衆千歳之逺其敎巳明其習巳成之後所守者一道所傳者一說而巳故詩書之文歴世數十作者非一而其言未嘗不相為終始化之如此其至也當是之時異行者有誅異言者有禁防之又如此其備也故二帝三王之際及其中間嘗更衰亂而餘澤未熄之時百家衆說未有能出於其間者也及周之末世先王之敎化法度既廢餘澤既熄世之治方術者各得其一偏故人奮其私智家尚其私學者蠭起於中國皆明其所長而昧其短矜其所得而諱其失天下之士各自為方而不能相通世之人不復知夫學之有統道之有歸也先王之遺文雖在皆絀而不講況至於秦為世之所大禁哉漢興六藝皆得於斷絶殘脫之餘世復無明先王之道以一之者諸儒苟見傳記百家之言皆悅而嚮之故先王之道為衆說之所蔽闇而不明鬱而不發而怪奇可喜之論各師異見皆自名家者誕漫於中國一切不異於周之末世其弊至於今尚在也自斯以來天下學者知折衷於聖人而能純於道徳之美者揚雄氏而止耳如向之徒皆不免乎為衆說之所蔽而不知有所折衷者也孟子曰待文王而興者凡民也豪傑之士雖無文王猶興漢之士豈特無明先王之道以一之者哉亦其出於是時者豪傑之士少故不能特起於流俗之中絶學之後也葢向之序此書於今為最近古雖不能無失然逺至舜禹而次及於周秦以來古人之嘉言善行亦往往而在也要在慎取之而巳故臣既惜其不可見者而校其可見者特詳焉亦足以知臣之攻其失豈好辯哉臣之所不得巳也王遵岩曰南豐文字於原本經訓處多用董仲舒劉向也列女傳目錄序子固諸序並各自為一段大議論非諸家所及而此篇尤深入近程朱之㫖矣劉向所敘列女傳凡八篇事具漢書向列傳而隋書及崇文總目皆稱向列女傳十五篇曹大家注以頌義考之葢大家所注離其七篇為十四與頌義凡十五篇而益以陳嬰母及東漢以來凡十六事非向書本然也葢向舊書之亡久矣嘉祐中集賢挍理蘇頌始以頌義為篇次復定其書為八篇與十五篇者並藏於館閤而隋以頌義為劉歆作與向列傳不合今驗頌義之文葢向之自敘又藝文志有向列女傳頌圖明非歆作也自唐之亂古書之在者少矣而唐志錄列女傳凡十六家至大家注十五篇者亦無錄然其書今在則古書之或有錄而亡或無錄而在者亦衆矣非可惜哉今挍讐其八篇及十五篇者巳定可繕寫初漢承秦之敝風俗巳大壞矣而成帝後宮趙衞之屬尤自放向以謂王政必自内始故列古女善惡所以致興亡者以戒天子此向述作之大意也其言太任之娠文王也目不視惡色耳不聴淫聲口不出敖言又以謂古之人胎教者皆如此夫能正其視聴言動者此大人之事而有道者之所畏也顧令天下之女子能之何其盛也以臣所聞葢為之師傳保姆之助詩書圖史之戒珩璜琚瑀之節威儀動作之度其敎之者雖有此具然古之君子未嘗不以身化也故家人之義歸於反身二南之業本於文王夫豈自外至哉世皆知文王之所以興能得内助而不知其所以然者葢本於文王之躬化故内則后妃有關雎之行外則羣臣有二南之美與之相成其推而及逺則商辛之昏浴江漢之小國兎罝之野人莫不好善而不自知此所謂身修故家國天下治者也後世自學問之士多狥於外物而不安其守其室家既不見可法故競於邪侈豈獨無相成之道哉士之苟於自恕顧利冒耻而不知反巳者往往以家自累故也故曰身不行道不行於妻子信哉如此人者非素處顯也然去二南之風亦巳逺矣況於南鄉天下之主哉向之所述勸戒之意可謂篤矣然向號博極羣書而此傳稱詩芣苢栢舟大車之類與今序詩者之說尤乖異葢不可考至於式微之一篇又以謂二人之作豈其所取者博故不能無失歟其曰象計謀殺舜及舜所以自脫者頗合於孟子然此傳或有之而孟子所不道者葢亦不足道也凡後世諸儒之言經傳者固多如此覽者采其有補而擇其是非可也故為之序論以發其端云王遵岩曰宋人敘古人集及古人所著書往往有此家數然多以考訂次第為一篇之文而巳不能如先生更有一叚大議論以成其篇也如後敘鮑容李白集亦不免用其體葢小集自不足以發大議論又適當然耳說苑目錄序此篇精神融液處不如新序戰國策諸篇劉向所著說苑二十篇崇文總目云今存者五篇餘皆亡臣從士大夫間得之者十有三篇與舊為十有八篇正其脫謬疑者闕之而敘其篇目曰向采傳記百家所載行事之迹以為此書奏之欲以為法戒然其所取往往有不當於理故不得而不論也夫學者之於道非知其大略之難也知其精微之際固難矣孔子之徒三千其顯者七十二人皆高世之材也然獨稱顔氏之子其殆庶幾乎及回死又以謂無好學者而回亦稱夫子曰仰之彌高鑚之彌堅子貢又以謂夫子之言性與天道不可得而聞也則其精微之際固難知久矣是以取舍不能無失於其間也故曰學然後知不足豈虚言哉向之學博矣其著書及建言尤欲有為於世至其枉已而為之者有矣何其狥物者多而自為者少也葢古之聖賢非不欲有為也然而曰求之有道得之有命故孔子所至之邦必聞其政而子貢以謂非夫子之求之也豈不求之有道哉子曰道之將行也與命也道之將廢也與命也豈不得之有命哉令向知出此安於行止以彼其志能擇其所學以盡乎精微則其所至未可量也是以孔子稱古之學者為已孟子稱君子欲其自得之則取之左右逢其原豈汲汲於外哉向之得失如此亦學者之戒也故見之敘論令讀其書者知考而擇之也然向數困於讒而不改其操與夫患失之者異矣可謂有志者也徐幹中論目錄序子固於建安七子之中獨取徐幹得之而序文亦屬典刑臣始見館閣及世所有徐幹中論二十篇以謂盡於此及觀貞觀政要怪太宗稱嘗見幹中論復三年喪篇而今書此篇缺因考之魏志見文帝稱幹著中論二十餘篇於是知館閣及世所有幹中論二十篇者非全書也幹字偉長北海人生於漢魏之間魏文帝稱幹懷文抱質恬淡寡欲有箕山之志而先賢行狀亦稱幹篤行體道不耽世榮魏太祖特旌命之辭疾不就後以為上艾長又以疾不行葢漢承周衰及秦滅學之餘百氏雜家與聖人之道並傳學者罕能獨觀於道徳之要而不牽於俗儒之說至於治心養性去就語默之際能不悖於理者固希矣況至於魏之濁世哉幹獨能考六藝推仲尼孟軻之㫖述而論之求其辭時若有小失者要其歸不合於道者少矣其所得於内者又能信而充之逡巡濁世有去就顯晦之大節臣始讀其書察其意而賢之因其書以求其為人又知其行之可賢也惜其有補於世而識之者少葢迹其言行之所至而以世俗好惡觀之彼惡足以知其意哉顧臣之力豈足以重其書使學者尊而信之因挍其脫謬而序其大略葢所以致臣之意焉唐宋八大家文抄巻一百
