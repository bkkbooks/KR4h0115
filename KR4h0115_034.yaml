body:
  text: 唐宋八大家文鈔卷三十一明茅坤撰廬陵文鈔三劄子論乞主張范仲淹富弼等行事劄子歐陽公此時亦必聞范富所條之事恐仁宗一時不肯遽行又怕羣小內攻故先為頂門一針語所謂拿雲手是也臣伏聞范仲淹富弼等自被手詔之後已有條陳事件必須裁擇施行臣聞自古帝王致治須待同心叶力之人而君臣相得謂之千載一遇之難今仲淹等遇陛下聖明可謂難逢之會陛下有仲淹等亦可謂難得之臣陛下既已傾心待之仲淹等亦又各盡心思報上下如此臣謂事無不濟但顧行之如何伏况仲淹弼是陛下特出聖意自選之人初用之時天下已皆相賀然猶竊謂陛下既能選之未知用之如何耳及見近日特開天章從容訪問親寫手詔督責丁寧然後中外喧然既驚且喜此二盛事固已朝報京師暮傳四海皆謂自來未曾如此責任大臣天下之人延首拭目以看陛下欲作何事此二人所報陛下果有何能是陛下得失在此一舉生民休戚繫此一時以此而言則仲淹等不可不盡心展效陛下不宜不力主而行使上不玷知人之明下不失四海之望臣非不知陛下專心鋭志必不自怠而中外大臣且憂國同心必不相忌而沮難然臣所慮者仲淹等所言必須先絶僥幸因循姑息之事方能救數世之積弊如此等事皆外招小人之怨怒不免浮議之紛紜而姦邪未去之人亦須時有讒沮若稍聽之則事不成矣臣謂當此事初尤須上下叶力凡小人怨怒仲淹等自以身當浮議姦讒陛下亦須力拒待其久而漸定自可日見成功伏望聖慈留意終始成之則社稷之福天下之幸也取進止論賈昌朝除樞密使劄子貓之捕鼠須咬頸公之彈劾昌朝却本所薦引之路攻之仁廟焉得不動心臣伏見近降制書除賈昌朝為樞密使旬日以來中外人情莫不疑懼搢紳公議漸以沸騰蓋緣昌朝稟性回邪執心傾險頗知經術能文飾姦言好為陰謀以陷害良士小人朋附者衆皆樂為其用前在相位纍害善人所以聞其再來望風恐畏陛下聰明仁聖勤儉憂勞每於用人尤所審慎然而自古毁譽之言未嘗不並進於前而聽納之際人主之所難也臣以謂能知聽察之要則不失之矣何謂其要在先察毁譽之人若所譽者君子所毁者小人則不害其進用矣若君子非之小人譽之則可知其人不可用矣今有毅然立於朝危言讜論不阿人主不附權臣其直節忠誠為中外素所稱信者君子也如此等人皆以昌朝為非矣宦官宫女左右使令之人往往小人也如此等人皆以昌朝為是矣陛下察此則昌朝為人可知矣今陛下之用昌朝與執政大臣謀而用之乎與立朝忠正之士謀而用之乎與宦官左右之臣謀而用之乎或不謀於臣下斷自聖心而用之乎昨聞昌朝陰結宦豎構造事端謀動大臣以圖進用若陛下與執政大臣謀之則大臣勢在嫌疑必難啓口若立朝忠正之士則無不以為非矣其稱譽昌朝以為可用者不過宦官左右之人爾陛下用昌朝為天下而用之乎為左右之人而用之乎臣伏思陛下必不為左右之人而用之也然左右之人謂之近習朝夕出入進見無時其所讒諛能使人主不覺其漸昌朝善結宦官人人喜為稱譽朝一人進一言暮一人進一説無不稱昌朝之善者陛下視聽漸熟遂簡在于聖心及將用之時則不必與謀也蓋稱薦有漸久已熟于聖聰矣是則陛下雖斷自聖心不謀臣下而用之亦左右之人積漸稱譽之力也陛下常患近歲以來大臣體輕連為言事者彈擊蓋由用非其人不叶物議而然也今昌朝身為大臣見事不能公論乃結交中貴因內降以起獄以此規圖進用竊聞臺諌方欲論列其過惡而忽有此命是以中外疑懼物論喧騰也今昌朝未來議論已如此則使其在位必不免言事者上煩聖聽若不爾則昌朝得遂其志傾害善人壞亂朝政必為國家生事臣愚欲望聖慈抑左右陰薦之言採搢紳公正之論早罷昌朝還其舊鎮則天下幸甚臣官為學士職號論思見聖心求治甚勞而一旦用人偶失而外庭物議如此既有見聞合思裨補取進止論臺諫官唐介等宜早牽復劄子歐公至言臣材識庸暗碌碌於衆人中蒙陛下不次拔擢置在樞府其於報效自宜如何而自居職以來已逾半歲凡事關大體必須衆議之協同其餘日逐進呈皆是有司之常務至於謀猷啓沃蔑爾無聞上辜聖恩下愧清議人雖未責臣豈自安所以日夜思惟願竭思慮茍有可採冀裨萬一臣近見諫官唐介臺官范師道等因言陳旭事得罪或與小郡或竄逺方陛下自臨御已來擢用諍臣開廣言路雖言者時有中否而聖慈每賜優容一旦臺諫聮翩被逐四出命下之日中外驚疑臣雖不知臺諌所言是非但見唐介范師道皆久在言職其人立朝各有本未前後補益甚多豈於此時頓然改節故為欺罔上昧聖聰在於人情不宜有此臣竊以謂自古人臣之進諌於其君者有難有易各因其時而已若剛暴猜忌之君不欲自聞其過而樂聞臣下之過人主好察多疑於上大臣側足畏罪於下於此之時諌人主者難而言大臣者易若寬仁恭儉之主動遵禮法自聞其失則從諌如流聞臣下之過則務為優容以保全之而為大臣者外秉國權內有左右之助言事者未及見聽而怨仇已結於其身故於此時諌人主者易言大臣者難此不可不察也自古人主之聽言也亦有難有易在知其術而已夫忠邪並進於前而公論與私言交入于耳此所以聽之難也若知其人之忠邪辨其言之公私則聽之易也凡言拙而直逆耳違意初聞若可惡者此忠臣之言也言婉而順希旨合意初聞若可喜者邪臣之言也至於言事之官各舉其職或當朝正色顯言于廷或連章列署共論其事言一出則萬口爭傳衆目共視雖欲為私其勢不可故凡明言于外不畏人知者皆公言也若非其言職又不敢顯言或密奏乞留中或面言乞出自聖斷不欲人知言有主名者蓋其言涉傾邪懼遭彈劾故凡隂有奏陳而畏人知者皆挾私之説也自古人主能以此術知臣下之情則聽言易也伏惟陛下仁聖寬慈躬履勤儉樂聞諫諍容納直言其於大臣尤所優禮常欲保全終始思與臣下愛惜名節尤慎重於進退故臣謂方今言事者規切人主則易欲言大臣則難臣自立朝耳目所記景祐中范仲淹言宰相吕夷簡貶知饒州皇祐中唐介言宰相文彥博貶春州别駕至和初吳中復吕景初馬遵言宰相梁適並罷職出外其後趙抃范師道言宰相劉沆亦罷職出外前年韓絳言冨弼貶知蔡州今又唐介等五人言陳旭得罪自范仲淹貶饒州後至今凡二十年間居臺諌者多矣未聞有規諌人主而得罪者臣故謂方今諌人主則易言大臣則難陛下若推此以察介等所言則可知其用心矣昨所罷黜臺諫五人惟呂誨入臺未久其他四人出處本末迹狀甚明可以厯數也唐介前因言文彥博逺竄廣西煙瘴之地賴陛下仁恕哀憐移置湖南得存性命范師道趙抃並因言忤劉沆罷臺職守外郡連延數年然後復今三人者又以言樞臣罷黜然則介不以前蹈必死之地為懼師道與抃不以中滯進用數年為戒遇事必言得罪不悔蓋所謂進退一節終始不變之士也至如王陶者本出孤寒只因韓綘薦舉始得臺官及綘為中丞陶不敢內顧私恩與之諍議綘終得罪夫牽顧私恩人之常情爾斷恩以義非知義之士不能也以此言之陶可謂徇公滅私之臣矣此四人者出處本末之迹如此可以知其為人也就使言雖不中亦其情必無他議者或謂言事之臣好相朋黨動搖大臣以作威勢臣竊以謂不然介與師道不與綘為黨乃與諸臺諫共論綘為非然則非相朋黨非欲動搖大臣可明矣固謂未可以此疑言事之臣也况介等比者雖為謫官幸蒙陛下寬恩各得為郡未至失所其可惜者斥逐諌臣非朝廷美事阻塞言路不為國家之利而介等盡忠守節未蒙憐察也欲望聖慈特賜召還介等置之朝廷以勸守節敢言之士則天下幸甚今取進止薦王安石吕公著劄子王荆公學行屬望固似不難而吕申公則歐公所仇而屢斥之者今舉其子可見公之公平正大矣臣伏見陛下仁聖聰明優容諌諍雖有狂直之士犯顔色而觸忌諱者未嘗不終始保全往往亟加擢用此自古明君賢主之所難也然而用言既難獻言者亦不為易論小事者既可鄙而不足為陳大計者又似迂而無速效欲微諷則未能感動將直陳則先忤貴權而旁有羣言奪於衆力所陳多未施設其人遽已改遷致陛下有聽言之勤而未見用言之效頗疑言事之職但為速進之階蓋緣臺諌之官資望已峻少加進擢便履清華而臣下有厭人言者因此亦得進説直云此輩務要官職所以多言使後來者其言益輕而人主無由取信辜陛下納諫之意違陛下賞諌之心臣以謂欲救其失惟宜擇沉默端正守節難進之臣置之諫署則既無干進之疑庶或其言可信伏見殿中丞王安石德行文學為衆所推守道安貧剛而不屈司封員外郎吕公著是夷簡之子器識深逺沉靜寡言富貴不染其心利害不移其守安石久更吏事兼有時才曾召試館職固辭不就公著性樂間退淡於世事然所謂夫人不言言必有中者也往年陛下上遵先帝之制增置臺諌官四員已而中廢復止兩員今諫官尚有虛位伏乞用此兩人補足四員之數必能規正朝廷之得失裨益陛下之聰明臣叨被恩榮未知報效茍有所見不敢不言取進止薦司馬光劄子司馬公之不伐歐公之推賢可謂兩得之矣臣伏見龍圖閣直學士司馬光德性淳正學術通明自列侍從久司諌諍讜言嘉話著在兩朝自仁宗至和服藥之後羣臣便以皇嗣為言五六年間言者雖多而未有定議最後光以諌官極論其事敷陳激切感動主聽仁宗豁然開悟遂決不疑由是先帝選自宗藩入為皇子曾未踰年仁宗奄棄萬國先帝入承大統蓋以人心先定故得天下帖然今以聖繼聖遂傳陛下由是言之光於國有功為不淺矣可謂社稷之臣也而其識慮深逺性尤慎密光既不自言故人亦無知者臣以忝在政府因得備聞其事臣而不言是謂蔽賢掩善詩云無言不酬無德不報光今雖在侍從日承眷待而其忠國大節隱而未彰臣既詳知不敢不奏乞奬用孫沔劄子老成典刑之見臣伏見諒祚猖狂漸違誓約僭叛之迹彰露已多年歲之間必為邊患國家禦備之計先在擇人而自慶厯罷兵以來至今二十餘年當時經用舊人零落無幾惟尚書户部侍郎孫沔尚在西事時沔守環慶一路其人磊落有智勇仁以未嘗出兵又不遇敵故未有臨陳破賊之功然其養練士卒招撫蕃夷恩信著於一方至今邊人思之雖世不乏材朝廷方務推擇若求曾經西事可用之人則臣謂無如沔者沔今年雖七十聞其心力不衰飛鷹走馬尚如平日况所用者取其智謀藉其威信前世老將強起成功者多沔雖中間曽以罪廢棄瑕使過正是用人之術臣今欲乞朝廷更加察訪如沔實未衰羸伏望聖慈特賜奬用庶於擇材難得之時可備一方之寄取進止止絶吕夷簡暗入文字劄子此即古人斜封之戒文凡五轉臣風聞吕夷簡近日頻有密奏仍聞自乞於御藥院暗入文字不知實有此事否但外人相傳上下疑懼臣謂夷簡身為大臣久在相位尚不能為陛下外平四夷內安百姓致得二國交構中國憂危兵民疲勞上下困乏賢愚失序賞罰不中凡百紀綱幾至大壞筋力康健之日尚且如此乖繆況已罷政府久病家居筋力已衰神識昏耗豈能更與國家圖事據夷簡當此病廢即合杜門自守不交人事縱有未忘報國之意凡事即合公言令外廷見當國政之臣共議可否豈可暗入文書眩惑天聽況夷簡患攤風手足不能舉動凡有奏聞必難自寫其子弟輩又不肖須防詐偽或恐漏泄於體尤為不便雖陛下至聖至明於夷簡姦謀邪説必不聽納但外人見夷簡密人文書恐非公論若誤國計為患不輕夷簡所人文字伏乞明賜止絶臣聞任賢勿二去邪勿疑見今中外羣臣各有職事茍有闕失自可任責不可更令無功已退之臣轉相惑亂取進止論狄青劄子言人之所難言見人之所不見只緣宋承五代之後歐公故不得不為過慮然亦回護狄公狄公亦所甘心臣聞人臣之能盡忠者不敢避難言之事人主之善馭下者常欲聞難言之言然後下無隱情上無壅聽姦宄不作禍亂不生自古固有伏藏之禍未發之機天下之人皆未知而有一人能獨言之人主又能聽而用之則銷患於未萌轉禍而為福者有矣若夫天下之人共知而獨人主之不知者此莫大之患也今臣之所言者乃天下之人皆知而惟陛下未知也今士大夫無貴賤相與語于親戚朋友下至庶民無愚智相與語于閭巷道路而獨不以告陛下也其故何哉蓋其事伏而未發言者難於指陳也臣竊見樞密使狄青出自行伍號為武勇自用兵陜右已著名聲及捕賊廣西又薄立勞效自其初掌機密進列大臣當時言事者已為不便今三四年間雖未見其顯過然而不幸有得軍情之名推其所因蓋由軍士本是小人面有黥文樂其同類見其進用自言我輩之內出得此人既以為榮遂相悅慕加又青之事藝實過於人比其輩流又粗有見識是以軍士心共服其材能國家從前難得將帥經略招討常用文臣或不知軍情或不間訓練自青為將領既能自以勇力服人又知訓練之方頗以恩信撫士以臣愚見如青所為尚未得古之名將一二但今之士卒不慣見如此等事便謂須是我同類中人乃能知我軍情而以恩信撫我青之恩信亦豈能遍及於人但小人易為扇誘所謂一犬吠形百犬吠聲遂皆翕然喜共稱説且武臣掌機密而得軍情不唯於國家不便亦於其身未必不為害然則青之流言軍士所喜亦其不得已而勢使之然也臣謂青不得已而為人所喜亦將不得已而為人所禍者矣為青計者宜自退避事權以止浮議而青本武人不知進退近日以來訛言益甚或言其身應圖讖或言其宅有火光道路傳説以為常談矣而惟陛下猶未聞也且唐之朱泚本非反者倉卒之際為軍士所迫爾大抵小人不能成事而能為患者多矣泚雖自取族滅然為德宗之患亦豈小哉夫小人陷於大惡未必皆其本心所為直由漸積以至蹉跌而時君不能制患於未萌爾故臣敢昧死而言人之所難言者惟願陛下早聞而省察之耳如臣愚見則青一常才未有顯過但為浮議所喧勢不能容爾若如外人衆論則謂青之用心有不可知者此臣之所不能決也但武臣掌機密而為軍士所喜自於事體不便不計青之用心如何也伏望聖慈深思逺慮戒前世禍亂之迹制於未萌密訪大臣早決宸斷罷青機務與一外藩以此觀青去就之際心迹如何徐察流言可以臨事制變且二府均勞逸而出入亦是常事若青之忠孝出處如一事權既去流議漸消則其誠節可明可以永保終始夫言未萌之患者常難於必信若俟患之已萌則又言無及矣臣官為學士職號論思聞外議喧沸而事繫安危臣言狂計愚不敢自默取進止論水洛城事宜乞保全劉滬等劄子何等熟慮何等忠悃臣近風聞狄青與劉滬爭水洛城事枷禁滬等奏來竊以邊將不和用兵大患况狄青劉滬皆是可惜之人事體須要兩全利害最難處置臣聞水洛城自曹瑋以來心知其利患於難得未暇經營今滬能得之則於滬之功不小於秦州之利極多昨韓琦等自西來聞有論奏非以水洛為不便但慮難得而難成今滬能得之又有成之之志正宜專委此事責其必成而狄青所見不同遂成釁隙其間利害臣請詳言國家近年邊兵屢敗常患大將無權今若更沮狄青釋放劉滬則不惟於狄青之意不足兼沿邉諸將皆挫其威此其不便一也臣聞劉滬經營水洛城之初奮身展效不少先以力戰取勝然後誘而服從乃是黨留諸族畏滬之威信今忽見滬先得罪帶枷入獄則新降生户豈不驚疑若使翻然復叛則今後邉臣以威信招誘諸族誰肯聽從不惟水洛城更無可成之期兼沿邊生户永無可招之理此其不便二也自用兵以來諸將為國立事者少此水洛城不惟自曹瑋以來未能得之亦聞韓琦近在秦州嘗欲經營而未暇今滬奮然力取其功垂就而中道獲罪遂無所成則今後邊將誰肯為國家立事此其不便三也臣又聞水洛之戍雖能救援秦州而須藉渭州應副今劉滬既與狄青異議縱使水洛築就他時萬一緩急狄青怒滬異已又欲遂其偏見稍不應副則水洛必須復失其不便四也緣此之故遂移青於别路則是因一小將移一部署此其不便五也此臣所謂利害甚多最難處置者也臣謂今宜遣一中使處分魚周詢等速令和解務要兩全必先密諭狄青曰滬城水洛本有所稟非是擅為役衆築城不比行師之際滬見利堅執意在成功不可以違節制加罪滬宜釋放朝廷不欲直放恐挫卿之威卿自釋之使感卿惠若他時出師臨陳有違進退之命者任卿自行軍法然後密諭滬曰汝違大將指揮自合有罪朝廷以汝於水洛展效望汝成功故諭青使赦汝責爾卒事以自贖俟水洛功就則又戒青不可因前曾異議堅執不修惟幸失之遂已偏見今後水洛緩急尤須極力應副萬一小有踈失則是汝挾情故陷之必有重刑如此則水洛之利可成蕃户之恩信不失邊將立事者不懈大將之威不挫茍不如此未見其可蓋罪滬既不可罷水洛城又不可沮狄青又不可事關利害伏望聖慮深思取進止論罷鄭戩四路都部署劄子擘畫中將領機宜臣伏覩勑除鄭戩知永興軍仍兼陜西都部署自聞此命外人議論皆以為非在臣思之實亦未便竊以兵之勝負全由處置如何臣見用兵以來纍次更改或四路都置部署或分而各領一方乍合乍離各有利害惟夏竦往年所任鄭戩今日之權失策最多請試條列臣聞古之善用將者先問能將幾何今而不復問戩能將幾何直以關中數十州之廣蕃漢十萬之兵沿邉二三千里之事盡以委之此其失者一也或曰戩雖名都部署而諸路自各有將又其大事不令專制而必稟朝廷假如邊將有大事先稟於戩又稟於朝廷朝廷議定下戩戩始下於沿邊只此一端自可敗事其失二也今大事戩既不專若小事又不由戩則部署一職止是虛名若小事一一問戩則四路去永興皆數百里其寨柵逺者千餘里使戩一一處分合宜尚有遲緩之失萬一耳目不及處置失宜則為害不細其失三也若大小事都不由戩而但使帶其權豈有數十州之廣數十萬之兵二三千里之邊事作一虛名使為無權之大將若知戩可用則推心用之若知不可用則善罷之豈可盡關中之大設為虛名而以不誠待人其失四也今都部署名統四路而諸將事無大小不稟可行則四路偏裨各見其將不由都帥則上下相效皆欲自專其失五也今都部署是大將反不得節制四路而遂路是都帥部將却得專制一方則委任之意大小乖殊軍法難行名體不順其失六也若知戩果不可大用但不敢直罷其職則是大臣顧人情避已怨如此作事何以弭息人言其失七也料朝廷忽有此命必因韓琦等近自西來有此擘畫琦等身在邉陲曾為將帥豈可如此失計臣今欲乞令兩府之臣明議四路不當置都部署利害其鄭戩既不可內居永興而遙制四路則乞落其虛名只令坐鎮長安撫民臨政以為關中之重其任所繫亦大而使四路各責其將則事體皆順處置合宜今取進止論張子奭恩賞太頻劄子慨切臣風聞知汝州范祥為相度陜西青白鹽勑差張子奭權知汝州子奭自選入二年內遷至員外郎朝廷之意雖曰賞勞而天下物議皆云僥幸蓋以子奭宣勞絶少止兩次而遷官恩賜已數重自古賞功不過一次賞之不已故難弭人言初自選人改京官曰賞勞未及二歲改祕書丞又曰賞勞賜以章服又曰賞勞祕書丞不久又轉官又曰賞勞合得太常博士超遷員外郎又曰賞勞後行祠部為名曹又曰賞勞作京官合作知縣而作簽判又曰賞勞一任未滿合更有一任知縣又超通判差遣又曰賞勞此所以外人之議不允也況范祥暫出勾當只合交割以次官員或轉運司自差人權今朝廷差人已是失體又於子奭為此僥幸今朝臣待闕在京者甚衆豈無一人堪權知州者朝廷每用一人必當使天下人服今每一差遣則物議沸騰纍日不息昔五代桑維翰為晉相一夕除節度使十五人為將而人皆服其精今中書差一權知州而不能免人譏議者蓋事無大小當與不當而已其張子奭伏乞追寢權差之命仍乞今後外處差出知州只委本路轉運使差官權至於賞罰之柄貴在至公今莫大之罪不過一刑而止豈有勞者終身行賞而不已亦乞今後有勞效之人量其大小一賞而止若其别著能效則拔擢自可不次人亦自然無言伏以朝廷用人惟患守例而不能不次選任但不涉於僥幸實有材藝之人誰敢有言子奭作使西鄙不謂無勞但恩典已優於賞已足可惜令天下指為僥幸之人而掩其前效况又上虧朝政不可不思取進止論江淮官吏劄子臣聞江淮官吏等各為王倫事奏案已到多時而尚未聞斷遣仍聞議者猶欲寬貸臣聞昨來江淮官吏或斂物獻送或望賊奔迎或獻納兵甲或同飲宴臣謂倫一叛卒偶肆猖狂而官吏敢如此者蓋知賊可畏而朝廷不足畏也今若更行寬貸則紀綱隳壞盜賊縱橫天下大亂從此始矣何以知之昨王倫事起江淮官吏未行遣之間京西官吏又已棄城而走望賊而迎若江淮官吏不重行遣則京西官吏亦須輕恕京西官吏見江淮官吏已如此則天下諸路亦指此兩路為法在處官吏皆迎賊棄城獻兵納物矣則天下何由不大亂也臣伏思祖宗艱難創造基圖陛下憂勤嗣守先業而一旦四夷外叛盜賊內攻其壞之者誰哉皆由前後迂繆之臣因循寬弛使朝威不振綱紀遂隳今已壞之至此而猶不革前非以寬濟寬何以救弊如朝仲約等情法至重俱合深行議者無由曲解或聞以謂自是朝廷素不為備不可全罪外官假如有殺父與兄者豈可只言自是朝廷素無教化而不罪殺親之人又如有人掠奪生人男女金帛不可只言自是朝廷素無禮讓而不罪劫人之賊迂儒不可用可笑如此李熙古豈獨是朝廷素有備之州傅永言豈獨是朝廷素練之兵蓋用命則破賊矣今朝廷素無禦備為大臣者又不責之守州縣者合有罪又寬之天下之事何人任責竊緣韓綱是大臣之家父子兄弟並在朝廷權要之臣皆是相識多方營救故先於江淮官吏寬之只要韓綱行遣不重今大臣不思國體但樹私恩惟陛下以天下安危為計出於聖斷以勵羣下則庶幾國威粗振賞罰有倫其朝仲約等乞重行朝典乞不寬恕取進止唐宋八大家文鈔卷三十一
