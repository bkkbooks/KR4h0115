body:
  text: 唐宋八大家文鈔卷一百四十七明茅坤撰潁濱文鈔三劄子乞分别邪正劄子文定分别之中猶以調停為說此所以元祐之政失之弱而蔡邢之黨復起矣臣竊觀元祐以來朝廷改更弊事屏逐羣枉上有忠厚之政下無聚斂之怨天下雖未大治而經今五年中外帖然莫以為非者惟姦邪失職居外日夜窺伺便利規求復進不免百端游說動搖貴近臣愚竊深憂之若陛下不察其實大臣惑其邪說遂使忠邪雜進於朝以示廣大無所不容之意則氷炭同處必至交爭薰蕕共器久當遺臭朝廷之患自此始矣昔聖人作易內陽外陰內君子外小人則謂之泰內陰外陽內小人外君子則謂之否蓋小人不可使在朝廷自古而然矣但當置之於外每加安存使無失其所不至憤恨無聊謀害君子則泰卦之本意也昔東晉桓溫之亂諸桓親黨布滿中外及溫死謝安代之為政以三桓分涖三州彼此無怨江左遂安故晉史稱安有經逺無競之美然臣竊謂謝安之於桓氏亦用之於外而已未嘗引之於內與之共政也向使安引桓氏而置諸朝人懷異心各欲自行其志則謝安將不能保其身而况安朝廷乎頃者一二大臣専務含養小人為自便之計既小人內有所主故蔡確邢恕之流敢出妄言以欺愚惑衆及確恕被罪有司懲前之失凡在外臣僚例䝉摧沮盧秉何正臣皆身為待制而明堂薦子止得選人蒲宗孟曾布所犯明有典法而降官褫職唯恐不甚明立痕迹以示異同為朝廷斂怨此二者皆過矣故臣以為小人雖決不可任以腹心至於牧守四方奔走庶事各隨所長無所偏廢寵祿恩賜常使彼此如一無迹可指此朝廷之至計也近者朝廷用鄧溫伯為翰林承㫖而臺諌雜然進言指為邪黨以謂小人必由此彚進臣嘗論溫伯之為人粗有文藝無它大惡但性本柔弱委曲從人方王圭蔡確用事則頤指如意及司馬光吕公著當國亦脂韋其間若以其左右附麗無所損益遇流便轉緩急不可保誠信不為過也若謂其懷挾姦詐能首為亂階則甚矣蓋臺諌之言溫伯則過至為朝廷逺慮則未為過也故臣願陛下謹守元祐之初政久而彌堅慎用左右之近臣無雜邪正至於在外臣子以恩意待之使嫌隙無自而生愛戴以忘其死則垂拱無為安意為善愈久而愈無患矣臣不勝區區博采公議而效之左右伏乞宣諭大臣共敦斯義勿謂不預改更之政輒懷異同之心如此而後朝廷安矣再論分别邪正劄子再上劄更覺議論詳悉臣今月二十二日延和殿進呈劄子論君子小人不可並處朝廷因復口陳其詳以瀆天聽竊觀聖意類不以臣言為非者然天威咫尺言詞迫遽有所不盡退伏思念若使邪正並進皆得與聞國事此治亂之幾而朝廷所以安危者也臣誤䝉聖恩典司邦憲臣而不言誰當救其失者謹復稽之古今考之聖賢之格言莫不謂親近君子斥逺小人則人主尊榮國家安樂疏外君子進任小人則人主憂辱國家危殆此理之必然而非一人之私言也故孔子論為邦則曰放鄭聲逺佞人子夏論舜之德則曰舉臯陶則不仁者逺論湯之德則曰舉伊尹則不仁者逺諸葛亮戒其君則曰親賢臣逺小人此前漢所以興隆也親小人逺賢臣此後漢所以傾頽也凡典册所載如此之類不可勝紀至於周易所論尤為詳密皆以君子在內小人在外為天地之常理小人在內君子在外為陰陽之逆節故一陽在下其卦為復二陽在下其卦為臨陽雖未盛而居中得地聖人知其有可進之道一陰在下其卦為姤二陰在下其卦為遁隂雖未壯而聖人知其有可畏之漸若夫居天地之正得陰陽之和者惟泰而已泰之為象三陽在內三陰在外君子既得其位可以有為小人奠居于外安而無怨故聖人名之曰泰泰之言安也言惟此可以久安也方泰之時若君子能保其位外安小人使無失其所天下之安未有艾也惟恐君子得位因勢陵暴小人使之在外而不安則勢將必至反覆故泰之九三則曰無平不陂無往不復竊惟聖人之戒深切詳盡所以誨人者至矣獨未聞以小人在外憂其不恱而引之於內以自遺患者也故臣前所上劄子亦以謂小人雖決不可任以腹心至於牧守四方奔走庶務各隨所長無所偏廢寵祿恩賜彼此如一無迹可指如此而已若遂引而置之於內是猶畏盜賊之欲得財而導之於寢室知虎豹之欲食肉而開之以坰牧天下無此理也且君子小人勢同氷炭同處必爭一爭之後小人必勝君子必敗何者小人貪利忍恥擊之難去君子潔身重義知道之不行必先引退故古語曰一薰一蕕十年尚猶有臭蓋謂此矣昔先皇帝以聰明聖智之資疾頽靡之俗將以綱紀四方追迹三代今觀其設意本非漢唐之君所能髣佛也而一時臣佐不能將順聖德造作諸法率皆民所不恱及二聖臨御因民所願取而更之上下欣慰當此之際先朝用事之臣皆布列於朝自知上逆天意下失民心倣徨踧踖若無所措朝廷雖不斥逐其勢亦自不能復留矣尚賴二聖慈仁不加譴責而宥之於外蓋已厚矣今者政令已孚事勢大定而議者惑於浮說乃欲招而納之與之共事欲以此調停其黨臣謂此人若返豈肯徒然而已哉必將戕害正人漸復舊事以快私忿人臣被禍蓋不足言而臣所惜者祖宗朝廷也蓋自熙寧以來小人執柄二十年矣建立黨與布滿中外一旦失勢晞覬者多是以創造語言動搖貴近脅之以禍誘之以利何所不至臣雖不聞其言而概可料矣聞者若又不加審察遽以為然豈不過甚矣哉臣聞管仲治齊奪伯氏駢邑三百飯蔬食沒齒無怨言諸葛亮治蜀廢廖立李嚴為民徙之邊逺久而不召亮死二人皆垂泣思亮夫駢立嚴三人者皆齊蜀之貴臣也管葛之所以能戮其貴臣而使之無怨者非有他也賞罰必公舉措必當國人皆知其所與之非私而所奪之非怨故雖仇讐莫不歸心耳今臣竊觀朝廷用捨施設之間其不合人心者尚不為少彼既中懷不恱則其不服固宜今乃直欲招而納之以平其隙臣未見其可也詩曰無競維人四方其訓之陛下誠以異同反覆為憂惟當久任才性忠良識慮明審之士但得四五人常在要地雖未及臯陶伊尹而不仁之人知自逺矣故臣願陛下斷自聖心不為流言所惑毋使小人一進後有噬臍之悔則天下幸甚天下幸甚臣既待罪執法若見用人之失理無不言言之不從理不徒止如此則異同之迹益復著明不若陛下早發英斷使彼此泯然無迹可見之為善也臣受恩深重輒敢先事獻言罪合萬死愚竊謂易之內君子而外小人內者進之之詞也外者退之之詞也恐未必如子由所云內即以之任於朝外即以之布於州郡也宋時上下並有調停之說故子由亦不敢不附此為言子由與章蔡相讐者猶為此言然則彼之私相黨者安得不橫為煽亂動搖之術乎三論分别邪正劄豫此一劄又専在反已一著似尤得體臣聞聖人之德莫如至誠至誠之功存於不息有能推至誠之心而加以不息之久則天地可動金石可移況於斯人誰則不服臣伏見太皇太后陛下皇帝陛下隨時㢮張改革弊事因民所欲屏去小人天下本無異心羣黨自作浮議近者德意一發衆心渙然正直有依人知所嚮惟二聖勿移此意則天下誰敢不然衛多君子而亂不生漢用汲黯而叛者寢茍存至議不息之志自是太平可久之功此實社稷之福天下之幸也然臣以謂昔所柄任其徒實蕃布列中外豈免窺伺若朝廷施設必當則此輩覬望自消昔田蚡為相所為貪鄙則竇嬰灌夫睥睨宫禁僥幸有功諸葛亮治蜀行法廉平則廖立李嚴雖流徙邊郡終身無怨此則保國寧人之要術自古聖賢之所共由者也臣竊見方今天下雖未大治而祖宗綱紀具在州郡民物粗安若朝廷大臣正已平心無生事邀功之意因弊修法為安民靖國之術則人心自定雖有異黨誰不歸心向者異同反覆之憂蓋亦不足慮矣但患朝廷舉事類不審詳曩者黃河北流正得水性而水官穿鑿欲導之使東移下就髙汨五行之理及陛下再遣官吏按視知不可為猶或固執不從經今纍嵗回河雖罷減水尚存遂使河朔生靈財力俱困今者西夏青唐外皆臣順朝廷招徠之厚惟恐失之而熙河將吏創築二堡以侵其膏腴議納醇忠以奪其節鉞功未可覬爭已先形朝廷雖知其非終不明白處置若遂養成邊隙關陜豈復安居如此二事則臣所謂宜正已平心無生事邀功之意者也昔嘉祐以前鄉差衙前民間常有破産之患熙寧以後出賣坊場以雇衙前民間不復知有衙前之苦及元祐之初務于復舊一例復差官收坊場之錢民出衙前之費四方驚顧衆議沸騰尋知不可旋又復雇雇法有所未盡但當隨事修完而去年之秋復行差法雖存雇法先許得差州縣官吏利在起動人户以差役為便差法一行即時差足雇法雖在誰復肯行臣頃奉使契丹道出河北官吏皆為臣言豈朝廷欲將賣坊場錢别作支費耶不然何故惜此錢而不用殫民力以供官此聲四馳為損非細又熙寧雇役之法三等人户並出役錢上户以家業髙强出錢無藝下户昔不充役亦遣出錢故此二等人户不免咨怨至於中等昔既巳自差役今又出錢不多雇法之行最為其便及元祐罷行雇法上下二等欣躍可知惟是中等則反為害臣且借畿內為北則其餘可知矣畿縣中等之家大率歲出役錢三貫若經十年為錢三十貫而已今差役既行諸縣于力最為輕役農民在官日使百錢最為輕費然一歲之用已為三十六貫二年役滿為費七十餘貫罷役而歸寬鄉得間三年狹鄉不及一歲以此較之則差役五年之費倍於雇役十年所供賦役所出多在中等如此安得民間不以今法為害而熙寧為利乎然朝廷之法官户等六色役錢只得支雇役人不及三年處州役而不及縣役寬剩役錢只得通融鄰路鄰州而不得通融鄰縣人户願出錢雇人充役者只得自雇而官不為雇如此之類條目不便者非一故天下皆思雇役而厭差役今五年矣如此二事則臣所謂宜因弊修法為安民靖國之術者也臣以聞見淺狹不能盡知當今得失然四事不去如臣等輩猶知其非而况於心懷異同志在反覆幸國之失有以藉口者乎臣恐如此四事彼已默識於心多造謗議待時而發以搖撼衆聽矣伏乞宣諭執政事有失當改之勿疑法或未完修之無倦茍民心既得則異議自消陛下端拱以享承平大臣逡巡以安富貴海內䝉福上下所同所有衙前差役二事臣方根究詳悉續具聞奏臣不勝區區冒昧聖聽伏俟誅戮再論熙河邊事劄子論當時邊事極痛快特以甫招撫後遽議易將似難從臣近以熙河帥臣范育與其將吏种誼种朴等妄興邊事東侵夏國西挑青唐二難並起釁故莫測乞行責降至今未蒙施行臣已别具論奏臣竊復思念熙河邊釁本由誼朴狂妄覬幸功賞今育雖已去而誼朴猶在新除帥臣葉康直又復人才凡下以臣度之必不免觀望朝廷為誼朴所使若不並行移降則熙河之患猝未可知加以朝廷議論亦自不一臣請詳陳本末而陛下察之昔先帝始開熙河本無蘭州初不為患及李憲違命創築此城因言若無蘭州熙河決不可守自取蘭州又已十餘年今日欲築質孤勝如以侵夏國良田遂言若無質孤勝如蘭州亦不可守展轉生事類皆浮言蓋以邊防無事將吏安閒若不妄說事端無以邀求爵賞此則邊人之常態而自古之通患也今若試加詰問理則自窮何者二寨廣狹幾何所屯兵甲多少夏人若以重兵掩襲其勢必難保全既克二城乘勝以擊蘭州則蘭州之危何異昔日今朝廷不究其實而輕用其言以隳大信夏國若因此不順外修朝貢以收賜豫之利內實作過以收鹵獲之功臣恐二寨所得地利殊未足以償此臣所謂質孤勝如決不可城者由此故也昔先帝綏御西蕃董氊老而無子趙醇忠其族子也先帝嘗遣苗履多持金幣以醇忠見之是時聖意蓋有在矣事既不遂而董氊昏病遂為阿里骨所殺阿里骨本董氊之家奴先亂其家次取其國董氊之臣如鬼章溫溪心等皆有不服之志此實一時之機㑹也是時朝廷若因機投隙遣將出兵擁納醇忠則不世之功庶幾可立而一時大臣不知出此遽以旄鉞寵綏篡奪之臣使得假中國爵命之重以役屬蕃部臣主之勢由此而堅然自是以來頗亦外修臣節未顯背畔之迹而育等欲於此時復舉前䇿蓋已疏矣昔曹公既克張魯劉曄言於公曰公既舉漢中蜀人望風破膽劉備得蜀日淺蜀人未附也誠因其傾而壓之蜀可傳檄而定若少緩之蜀人既定據嶮守要不可犯矣公不從居七日聞蜀中震動公以問曄曄曰今已小定未可擊也夫機㑹一失七日之間遂不可為今乃於數年之後追行前計亦足以見其暗於事機而不達兵勢矣臣聞种諤昔在先朝以輕脫詐誕多敗少成嘗為先帝所薄今誼朴為人與諤無異誼於頃歲偶以徑兵掩獲鬼章以此自負而西蕃懲於無備久作隄防亦無可乘之勢况育自到任屢陳此計咫尺蕃界誰則不知臣謂兵果出境必有不可知之憂矣兼聞近日擅招青唐蕃部數以千計納之則本朝無措未有住坐之處却之則於彼為畔必被屠戮之苦據此専擅罪名不輕臣不曉朝廷曲加保庇其意安在若不並行責降臣恐朝廷之憂未有艾也借使阿里骨因此怨叛結連夏人同病相恤更出盜邊羽書交馳勝負未決當此之時大臣相顧不敢任責而使聖君聖母憂勞於帷幄之中雖食主議者之肉復何益乎臣所謂阿里骨決不可取者由此故也凡此二事皆國家安危邊民性命所係禍機之發間不旋踵故臣願陛下蚤發英斷黜此三人外則使異域知此狂謀本非聖意易以招懷內則使邊臣知賞罰尚存不敢妄作此當今所宜速行者也然臣尚謂熙河遭此破壞彼此相疑却欲招納令就平帖非得良帥未易可也臣觀葉康直之為人深恐未足倚仗何者康直頃緣權貴所薦節制秦鳳秦鳳邊面至狹號為無事而康直于前年冬無故展修甘谷城致令夏國大兵壓境兵役已集康直恐懼不敢興功妄以地凍請于朝廷役既不成冦兵乃去既無將帥靖重之略而當熙河搖動之秋臣恐陛下西顧之憂未可弭也要須徙置它路更命熟事老將以領熙河仍特賜戒敕使知朝廷懷柔逺人不求小利之意如此而邊患庶幾小息矣取進止三論渠陽邊事劄子古今來以蠻夷攻蠻夷為最以附近土兵攻蠻夷次之若調他中國强兵則非計矣臣近再論唐義問處置邊事乖方致渠陽蠻冦賊殺將吏乞早黜義問以正邦憲更選練事老將付以疆場經今多日不蒙施行訪聞執政止以臨敵易將兵家所忌為說雖知義問處置顛錯至覆軍殺將而猶復隱忍不即遣代比雖遣衡規往視然規凡人未曾經練戎事何益於算徒引歲月坐視邊人肝腦塗地臣甚惑之謹按義問所為蓋全不曉事留在邊上一日即有一日之害昔趙任廉頗以趙括代之則敗秦任王齕以白起代之則勝蓋臨敵易將顧代者何人耳今執政乃以虛文藉口終欲庇之逺人何辜日被塗炭若非陛下哀矜四方亟命賢將往代則臣恐陷害生靈未有已也兼臣訪聞渠陽諸夷蟠踞山洞道路險絶中國之兵入踐其地雖跬步不得其便昔郭逵知邵州困於楊光僭李浩從章惇自沅州入過界即敗逵浩皆西北戰將然並有敗無成者地形不便也今聞朝廷已指揮諸道發兵數目不少然將非其人臣恐既不知戰又不知守老兵費財漸致腹心之患深可慮也今朝廷欲棄渠陽然其中屯戍兵民不下數千義無棄之敵人俾為魚肉要須略行定計使之畏憚肯出渠陽兵民然後為可臣訪聞湖南北士大夫皆言羣蠻難以力爭可以智伏欲遣間諜招誘必用土人欲行窺伺攻討必用土兵捨此而欲以中國强兵敵之雖多無益然此可使智者臨事制置難以遙度也臣前者嘗以衆人言謝麟屢經蠻事頗有勞效乞行委任朝廷置而不用蓋必有賢於麟者惟乞速遣以紓邊鄙之患至於義問決無可望幸陛下無疑也臣又聞渠陽諸夷與宜州羣蠻相接宜蠻部族衆多若與渠陽諸夷合謀作過勢益昌熾猝難翦滅亦乞指揮廣西預行招撫雖不得其用但勿與協力亦不為無益矣取進止論開孫村河劄子利害明悉臣為户部右曹兼領金倉二部任居天下財賦之半適當中外匱竭不繼之時日夜憂惶常慮敗事竊見左藏見緡一月出納之數大抵皆五十餘萬略無贏餘其他金帛諸物雖小有羡數亦不足賴臣之愚怯常恐天災流行水旱作沴西羌旅距邊鄙繹騷河議失當賦役橫起三事有一大計不支雖使桑羊劉晏復生計無從出矣而況於臣之駑下乎今者幸賴二聖慈仁恭儉天地垂貺諸道秋稼稍復成熟雖京西陜西災旱相接而一方之患未為深憂羌人困窮旋聞欵塞惟有黃河西流議復故道事之經歲役兵二萬人蓄聚梢椿等物三千餘萬方河朔災傷困弊之餘興必不可成之功吏民竊嘆勞苦已甚而莫大之役尚在來歲天啓聖意灼知民心特召河北轉運司官吏訪以得失近聞回河大議已寢不行臣平日過憂頓然釋去然尚聞議者固執開河分水之策雖權罷大役而兵工小役竟未肯休如此則河北來年之憂亦與今年何異今者小吳決口入地已深而孫村所開丈尺有限不獨不能回河亦必不能分水況黃河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理哉縱使兩河並行不免各立隄防其為費耗又倍今日矣臣聞自古聖人不能無過過而能改善莫大焉故君子之過如日月之食過也人皆見之更也人皆仰之朝廷舉動義當如此今議河失當知其害人中道而復本何所愧雖使天下知之亦足以明二聖憂民之深為之改過不吝今乃顧惜前議未肯曠然更張果於遂非難於遷善臣實為朝廷惜之然臣聞議者初建開河分水之策其說有三其一曰御河堙滅失饋運之利其二曰恩冀已北漲水為害公私損耗其三曰河徙無常萬一自北界入海邊防失備凡其所以熒惑聖聰沮難公議皆以三說藉口夫河決西流勢如建瓴引之復東勢如登屋雖使三說可信亦莫如之何矣況此三說皆未必然臣請得具言之昔大河在東御河自懷衛經北京漸歷邊郡饋運既便商賈通行今河既西流御河堙滅失此大利誰則不知天實使然人力何及然議者能復澶淵故道則御河有可復之理今河自小吳北行占壓御河故地雖使如議者之意自北京以南折而東行則御河堙滅已一二百里亦無由復見矣此御河之說不足聽一也河之所行利害相半夏潦漲溢浸敗秋田濵河數十里為之破稅此其害也漲水既去淤厚纍尺粟麥之利比之他田其收十倍寄居丘冡以避淫潦民習其事不甚告勞此其利也今河水在西勢亦如此逺為隄防不與之爭正得漢賈遜治河之意比之故道歲省兵夫稍芟其數甚廣而故道已退之地桑麻千里賦稅完復為利不資安用逆天地之性移西流之憂為東流之患哉此恩冀以北漲水為害之說不足聽二也河昔在東自河以西郡縣與敵接境無山河之限邊臣建為塘水以捍戎馬之衝今河既西行則西山一帶戎馬可行之地已無幾矣其為邊防之利不言可知然議者尚恐河復北徙則海口出敵界中造舟為梁便于南牧臣聞塞外諸河自北南注以入于海蓋地形北髙河無北徙之道而海口深浚勢無徙移臣雖非目見而習北方之事者為臣言之大略如此可以遣使按視圖畫而知此河入敵界邊防失備之說不足聽三也臣願以此三說質之議者則開河分水之說誠不足復為矣又臣訪聞今嵗四五月間河上役兵勞苦無告嘗有數百人持板築之械訪求都水使者意極不善賴防邏之卒擁拒而散盛夏苦役病死者相繼使者恐朝廷知之皆於垂死放歸本郡斃於道路者不知其數若今冬放凍來嵗春暖復調就役則意外之患復當如前臣不知朝廷何苦而不罷此役哉今建議之臣恥於不效而堅持之於上小臣急於利祿不顧可否隨而和之於下上下膠固以罔朝廷其間正言不避權要才一二人耳然事非本職亦不敢盡言臣以户部休戚計在此河若復緘默誰當言者惟斷自聖心盡罷其議則天下不勝幸甚取進止再論回河劄子子由所論回河已而一一皆驗臣頃聞朝廷議罷回河來年當用役兵開河分水臣以為天下財賦匱竭河朔災傷之後民力未復未堪此役輒奏言不便既而采察衆議聞河北轉運使謝卿材到闕倡言于朝曰黃河自小吳決口乘髙注下水勢奔快上流隄防無復決怒之患而下流湍駛行於地中日益深浚朝廷若以河事付臣臣請不役一夫不費一金十年之間保無河患大臣以其異已罷歸本任而使王孝先俞瑾張景先三人重畫回河之計三人利在回河雖言其便而亦知其難成故于議狀之末復言若將來河勢變移乞免修河官吏責罰都下洶洶傳笑以為口實蓋回河之非斷可知矣然近日復聞內批降付三省如云若河流不復故道終為河朔之患外廷疏逺不知此說信否然衆心憂懼深恐羣臣由此觀望不敢正言得失臣職在財賦憂責至深不敢畏避誅戮願畢陳其說方今回河之策中外講之熟矣雖大臣固執亦心知其非無以藉口矣獨有邊防一說事係安危可以竦動上下伸其曲說陛下深居九重羣言不得盡達是以遲遲不決耳昔真宗皇帝親征澶淵拒破契丹因其敗亡與結歡好自是以來河朔不見兵革幾百年矣陛下試思之此豈獨黃河之功哉昔石晉之敗黃河非不在東而祥符以來非獨河南無冦憂河北亦自無兵患由此觀之交接契丹顧德政何如耳未聞逆天地之性引趨下之河升積髙之地興莫大之役冀不可成之功以為設險之計者也昔李垂孫民等號知河事嘗建言乞導河西行復禹舊迹以為河水自西山北流東赴海口河北諸州盡在河南平日契丹之憂遂可無慮今者天祚中國不因人力河自西行正合昔人之策自今以往北岸決溢漸及敵境雖使異日河復北徙則敵地日蹙吾土日紓其為憂患正在契丹耳而大臣過計以為中國之懼遂欲罄竭民力導河東流其為契丹謀則多為朝廷慮則疏矣議者或謂河入敵境彼或造舟為梁長驅南牧非國之利臣聞契丹長技在鞍馬舟楫之利固非所能且跨河繫橋當先兩岸進築馬頭及伐木為船其功不細契丹物力寡弱勢必不能就使能之今兩界修築城栅比舊小增輒移文詰問必毁而後已豈有坐視大役而不能出力止之乎假設虜中遂成橋黃河上流盡在吾地若㳂河州郡多作戰艦養兵聚糧順流而下則長艘巨纜可以一炬而盡形格勢禁彼將自止矣臣竊怪元老大臣久更事任而力陳此說意其謀已出口重於改過而假此不測之憂以取必於朝廷耳不然豈肯於天下困弊河朔災傷之後興數十萬夫費數千萬物料而為萬無一成之功哉夫大役既興勢不中止預約功料有少無多官不獨辦必行科配官出其一民出數倍公私費耗必有不可勝言者矣茍民力窮竭事變之出不可復知饑餓相逼必為盜賊昔秦築長城以備胡城既成而民叛今欲回大河以設險臣恐河不可回而民勞變生其計又出秦下異日雖欲悔之不可得也陛下數年以來休養民力如恐傷之今河以安流契丹無變而强生瘡痏以擾之非計之得也故臣願陛下斷之於心罷此夫役留神察之自河決小吳於今九年不為不久矣然敵恭順與事祖宗無異陛下誠重違大臣姑復以三年觀之事久情見大臣之言與天下公議可以坐而察也臣不勝區區憂國之誠干犯斧鉞死無所避取進止唐宋八大家文鈔卷一百四十七
