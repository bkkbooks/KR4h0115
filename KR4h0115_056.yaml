body:
  text: 唐宋八大家文鈔卷五十三明茅坤撰廬陵文鈔二十五墓志銘贈太子太傅胡公墓志銘中多本經術之旨太子少師致仕贈太子太傅胡公諱宿字武平其先豫章人也後徙常州之晉陵世有隱德為晉陵著姓公舉進士中天聖二年乙科為真州揚子尉縣大水漂溺居民令不能救公曰拯溺吾職也即率公私舟活數千人嵗滿調廬州合肥主簿張丞相士遜稱其文行薦諸朝召試學士院為館閣挍勘與修北史改集賢挍理通判宣州三遷太常博士判吏部南曹賜緋衣銀魚出知湖州為政有惠愛築石塘百里捍水患大興學挍學者盛於東南自湖學始公丁母夫人憂去而州人思之名其塘曰胡公塘學者為公立生祠于學中至今祠之公居喪毁瘠過禮三年不居于內服除為三司鹽鐵判官轉尚書祠部員外郎判度支勾院知蘇州兩浙路轉運使召還修起居注以本官知制誥兼勾當三班院已而兼判吏部流內銓入內都知楊懷敏坐衛士夜盜入禁中驚乘輿斥出為和州都監懷敏用事久勢動中外未幾召復故職公封還辭頭不草制論曰衛士之變蹤迹連懷敏得不窮治誅死幸矣豈冝復在左右其命遂止久之拜公翰林侍讀學士遷翰林學士兼史館修撰判館事兼端明殿學士纍遷尚書左司郎中兼知通進銀臺司審刑院羣牧使提舉在京諸司庫務醴泉宫判尚書禮部遂判都省再知禮部貢舉奉使契丹館伴北朝人使亦皆再而敵人嚴憚之公為人清儉謹默內剛外和羣居笑語歡譁獨正容色溫溫不動聲氣與人言必思而後對故其蒞官臨事慎重不輒發發亦不可回止而其趣要歸於仁厚朝議在官年七十而不致仕者有司以時按籍舉行公以謂養廉耻厚風俗宜有漸而欲一切以吏議從事殆非所以優老勸功之意當少緩其法使人得自言而全其美節朝廷嘉其言是至今行之皇祐新樂成議者多異論有詔新樂用於常祀朝會而郊廟仍用舊樂公言書稱同律而今舊樂髙新樂下相去一律難並用而新樂未施於郊廟先用之朝會非先王薦上帝配祖考之意皆不可近制禮部四嵗一貢士議者患之請更為間嵗議已定公獨以為不然曰使士子廢業而奔走無寧嵗不如復用三嵗之制也衆皆以公言為非行之數年士子果以為不便而卒用三嵗之制仁宗久未有皇子羣臣多以皇嗣為言未省公以學士當作青辭禱嗣于山川即建言儲位久虛非所以居安而慮危願擇宗室之賢者立之以慰安天下之心語甚切至公學問該博兼通陰陽五行天人災異之説南京鴻慶宫災公以謂南京聖宋所以受命建號而大火主於商丘國家乘火德而王者也今不領於祠官而比年數災宜修火祀事下太常嵗以長吏奉祠商丘自公始慶厯六年夏河北河東京東同時地震而登萊尤甚公以嵗推之曰明年丁亥嵗之刑德皆在北宫陰生於子而極於亥然陰猶強而未即伏陽猶微而未即勝此所以震也是謂龍戰之會而其位在乾今西北二寇中國之陰也宜為之備不然必有內盜起於河朔明年王則以貝州叛公又以為登萊視京師為東北隅乃少陽之位也今二州並置金坑多聚民以鑿山谷陽氣損泄故陰乘而動縣官入金嵗幾何小利而大害可即禁止以寧地道皇祐五年正月會靈宫災是嵗冬至祀天南郊以三聖並配明年大旱公曰五行火禮也去嵗火而今又旱其應在禮此殆郊丘並配之失也即建言並配非古宜用迭配如初詔其後並州議建軍為節鎮公以星土考之曰昔髙辛氏之二子不相能也堯遷閼伯於商丘主火而商為宋星遷實沈於臺駘主水而參為晉星國家受命始於商丘王以火德又京師當宋之分野而并為晉地參商仇讐之星今欲崇晉非國之利也自宋興平僣偽并最後服太宗削之不使列於方鎮八十年矣謂宜如舊制公在翰林十年多所補益大抵不為茍止而妄隨故其言或用或不用或後辛如其言然天子察公之忠欲大用者久矣嘉祐六年八月拜公諫議大夫樞密副使公既慎靜而當大任尤顧惜大體而羣臣方建利害多更張庶事以革弊公獨厭之曰變法古今難之不務守祖宗成法而徒紛紛無益於治也又以謂契丹與中國通好六十餘年自古未有也善待夷狄者謹為備而巳今三邊武備多弛牧馬著虛名於籍可乘而戰者百無一二又謂滄州宜分為二路以禦敵此今急務也若其界上交侵小故乃城寨主吏之職朝廷宜守祖宗之約不宜爭小利而隳大信深戒邊臣生事以為功在位六年其論議類皆如此英宗即位拜給事中治平三年纍上表乞致仕不允久之拜尚書吏部侍郎觀文殿學士知杭州為政不略細故或謂大臣不宜自勞公曰此民事也吾不敢忽以是民尤愛之明年今上即位遷左丞五月公以疾告遂除太子少師致仕命未至而公以六月十一日薨于正寢享年七十有三即以其年十一月某日葬于常州晉陵縣萬安鄉之隆亭公之曾祖諱持纍贈太傳曾祖妣歐陽氏追封晉陵郡太夫人祖諱徽纍贈太師祖妣楊氏追封華陰郡太夫人余氏嘉興郡太夫人余氏丹陽郡太夫人龔氏武陵郡太夫人父諱霖纍贈太師兼中書令妣沈氏追封東陽郡太夫人貝氏南陽郡太夫人李氏金城郡太夫人公纍階光祿大夫勳上柱國開國安定爵公食邑二千八百户食實封四百户賜推誠保德翊戴功臣初娶吳氏追封蘭陵郡夫人再娶何氏封南康郡夫人子男五人長曰宗堯今為都官員外郎次曰遵路早卒次曰宗質國子博士次曰宗炎著作佐郎次曰宗厚祕書省正字早卒女四人皆適士族孫志修太常寺太祝行修守祕書省挍書郎簡修試祕書省挍書郎世修德修安修奕修慎修益修公自為進士知名于時楊文公億得其詩題于祕閣歎曰吾恨未識此人其舉進士也謝陽夏公絳薦公為第一公名以此益彰而謝公亦以此自負少嘗善一浮圖其人將死謂公曰我有祕術能化瓦石為黃金子其葬我我以此報乎公曰爾之後事吾敢不勉祕術非吾欲也浮圖歎曰子之志未可量也其篤行自勵至於貴顯常如布衣時有文集四十卷銘曰允矣胡公順外剛中惟初暨終一德之恭公之燕居其氣溫溫舉必可法思而後言公在朝廷正色侃侃蔚有嘉謀憂深慮逺不迎利趨不畏勢反有或不從後必如之久而愈信孰不公思侍從之親樞機之密名望三朝清職峻秩愷悌之仁宜國黃耉七十而止孰云多夀惟善在人刻銘不朽端明殿學士蔡公墓志銘直敘公諱襄字君謨興化軍仙遊人也天聖八年舉進士甲科為漳州軍事判官西京留守推官改著作佐郎館閣挍勘慶厯三年以祕書丞集賢挍理知諫院兼修起居注是時天下無事士大夫弛於久安一日元昊叛師久無功天子慨然厭兵思正百度以修太平既巳排羣議進退二三大臣又詔增置諫官四員使拾遺補闕所以遇之甚寵公以材名在選中遇事感激無所回避權幸畏斂不敢撓法干政而上得益與大臣圖議明年屢下詔書勸農桑興學挍革弊修廢而天下悚然知上之求治矣於此之時言事之臣無日不進見而公之補益為尤多四年以右正言直史館出知福州以便親遂為福建路轉運使復古五塘以溉田民以為利為公立生祠于塘側又奏減閩人五代時丁口稅之半丁父憂服除判三司鹽鐵勾院復修起居注今參知政事唐公介時為御史以直言忤旨貶春州别駕廷臣無敢言者公獨論其忠人皆危之而上悟意解唐公得改英州遂復召用皇祐四年遷起居舍人知制誥兼判流內銓御史吕景初吳中復馬遵坐論梁丞相適罷臺職除他官公封還辭頭不草制其後屢有除授非當者必皆封還之而上遇公益厚曰有子如此其母之賢可知命特賜冠帔以寵之至和元年遷龍圖閣直學士知開封府三年以樞密直學士知泉州徙知福州未幾復知泉州公為政精明而於閩尤知其風俗至則禮其士之賢者以勸學興善而變民之故除其甚害往時閩人多好學而專用賦以應科舉公得先生周希孟以經術傳授學者常至數百人公為親至學舍執經講問為諸生率延見處士陳烈尊以師禮而陳襄鄭穆方以德行著稱鄉里公皆折節下之閩俗重凶事其奉浮屠會賓客以盡力豐侈為孝否則深自愧恨為鄉里羞而姦民遊手無賴子幸而貪飲食利錢財來者無限極往往至數百千人至有親亡祕不舉哭必破産辦具而後敢發喪者有力者乘其急時賤買其田宅而貧者立劵舉債終身困不能償公曰弊有大於此邪即下令禁止至於巫覡主病蠱毒殺人之類皆痛斷絶之然後擇民之聰明者教以醫藥使治疾病其子弟有不率教令者條其事作五戒以教諭之久之閩人大便公既去閩人相率詣州請為公立德政碑吏以法不許謝即退而以公善政私刻于石曰俾我民不忘公之德嘉祐五年召拜翰林學士權三司使三司開封世稱省府為難治而易以毁譽居者不由以遷則由以敗而敗者十常四五公居之皆有能名其治京師談笑無留事尤喜破姦發隱吏不能欺至商財利則較天下盈虛出入量力以制用必使下完而上給下暨百司因習蠧弊切磨剗剔久之簿書纎悉紀綱條目皆可法七年季秋大享明堂後數月仁宗崩英宗即位數大賞賚及作永昭陵皆猝辦於縣官經費外公應煩愈間暇若有餘而人不知勞遂拜三司使居二嵗以母老求知杭州即拜端明殿學士以往三年徙南京留守未行丁母夫人憂明年八月某日以疾卒于家享年五十有六蔡氏之譜自晉從事中郎克以來世有顯聞其後中衰隱德不仕公年十八以農家子舉進士為開封第一名動京師後官于閩典方州領使一路二親尚皆無恙閩人瞻望咨嗟不榮公之貴而榮其父母母夫人尤有夀年九十餘飲食起居康強如少者嵗時為夀母子鬢髮皆皤然而命服金紫煌煌如也至今閩人之為子者必以夫人祝其親為父母者必以公教其子也公於朋友重信義聞其喪則不御酒肉為位以哭盡哀乃止嘗會飲會靈東園坐客有射矢誤傷人者客遽指為公矢京師喧然事既聞上以問公公即再拜愧謝終不自辨退亦未嘗以語人公為文章清遒粹美有文集若干卷工於書畫頗自惜不妄為人書故其殘章斷稿人悉珍藏而仁宗尤愛稱之御製元舅隴西王碑文詔公書之其後命學士撰溫成皇后碑文又敕公書則辭不肯書曰此待詔識也公纍官至禮部侍郎既卒翰林學士王圭等十餘人列言公賢其亡可惜天子新即位未及識公而聞其名久也為之惻然特贈吏部侍郎官其子旻為祕書省正字孫傳及弟之子均皆守將作監主簿而優以賻恤以旻尚幼命守吏助給其喪事曾祖諱顯皇不仕祖諱恭贈工部員外郎父諱琇贈刑部侍郎母夫人盧氏長安郡太君夫人葛氏永嘉郡君子男三人曰勻將作監主簿曰旬大理評事皆先公卒幼子旻也女三人一適著作佐郎謝仲規二尚幼以某年某月某日葬公于莆田縣某鄉將軍山銘曰誰謂閩逺而多竒産産非物寶惟士之賢嶷嶷蔡公其人傑然奮躬當朝讜言正色出入左右彌縫補益間歸于閩有政在人食不畏蠱喪不憂貧疾者有醫學者有師問誰使然孰不公思有髙其墳有拱其木凡閩之人過者必肅集賢院學士劉公墓志銘劉仲原以才而不盡其用而公之文多絫欷公諱敞字仲原父姓劉氏世為吉州臨江人自其皇祖以尚書郎有聲太宗時遂為名家其後多聞人至公而益顯公舉慶厯六年進士中甲科以大理評事通判蔡州丁外艱服除召試學士院遷太子中允直集賢院判登聞鼓院吏部南曹尚書考功於是夏英公既薨天子賜諡曰文正公曰此吾職也即上疏言諡者有司之事也且竦行不應法今百司各得守其職而陛下侵臣官疏凡三上天子嘉其守為更其諡曰文莊公曰姑可以止矣權判三司開拆司又權度支判官同修起居注至和元年九月召試遷右正言知制誥宦者石全彬以勞遷宫苑使領觀察使意不滿退而慍有言居三日正除觀察使公封還辭頭不草制其命遂止二年八月奉使契丹公素知彼山川道里北人道自古北口回曲千餘里至栁河公問曰自古松亭趨栁河甚直而近不數日可至中京何不道彼而道此蓋北人常故迂其路欲以國地險逺誇使者且謂莫習其山川不虞公之問也相與驚顧羞愧即吐其實曰誠如公言時順州山中有異獸如馬而食虎豹北人不識以問公曰此所謂駮也為言其形狀聲音皆是北人益歎服三年使還以親嫌求知揚州嵗餘遷起居舍人徙知鄆州兼京東西路安撫使居數月召還糾察在京刑獄修玉牒知嘉祐四年貢舉稱為得人是嵗天子卜以孟冬祫既廷告丞相用故事率文武官加上天子尊號公上書言尊號非古也陛下自寶元之郊止羣臣毋得以請逮今二十年無所加天下皆知甚盛德奈何一旦受虛名而損實美上曰我意亦謂當如此遂不允羣臣請而禮官前祫請祔郭皇后於廟自孝章以下四后在别廟者請母合食事下議議者紛然公之議曰春秋之義不薨于寢不稱夫人而郭氏以廢薨按景祐之詔許復其號而不許其諡與祔謂宜如詔書又曰禮於祫未毁廟之主皆合食而無帝后之限且祖宗以來用之傳曰祭從先祖宜如故於是皆如公言公既驟屈廷臣之議議者已多反目既而又論吕溱過輕而責重與臺諫異由是言事者亟攻之公知不容于時矣會永興闕守因而請行即拜翰林侍讀學士充永興軍路安撫使兼知永興軍府事長安多富人右族豪猾難治猶習故都時態公方發大姓范偉事獄未具而公召由是獄屢變連年吏不能決至其事聞制取以付御史臺乃決而卒如公所發也公為三州皆有善政在揚州奪發運使冒占雷塘田數百頃豫民民至今以為德其治鄆永興皆承旱歉所至必雨雪蝗輒飛去嵗用豐稔流亡來歸令行民信盜賊禁止至路不拾遺公於學博自六經百氏古今傳紀下至天文地理卜醫數術浮屠老莊之説無所不通其為文章尤敏贍嘗直紫微閣一日追封皇子公主九人公方將下直為之立馬却坐一揮九制數千言文辭典雅各得其體公知制誥七年當以次遷翰林學士者數也久而不遷及居永興嵗餘遂以疾聞八年八月召還判三班院太常寺公在朝廷遇事多所建明如古渭州可棄孟陽河不可開樞密使狄青宜罷以保全之之類皆其語在士大夫間者若其規切人主直言逆耳至於從容進見開導聰明賢否人物其事不聞于外廷者其補益尤多故雖不合於世而特被人主之知方嘉祐中嫉者衆而攻之急其雖危而得無害者仁宗深察其忠也及侍英宗講讀不專章句解詁而指事據經因以諷諫每見聽納故尤竒其材已而復得驚眩疾告滿百日求便郡上曰如劉某者豈易得也復賜以告上每宴見諸學士時時問公少間否賜以新橙五十勞其良苦疾少間復求外補上悵然許之出知衛州未行徙汝州治平三年召還以疾不能朝改集賢院學士判南京留司御史臺熙寧元年四月八日卒于官舍享年五十嗚呼以先帝之知公使其不病其所以用之者豈一翰林學士而止哉方公以論事忤於時也又有構為謗語以怒時相者及歸自雍丞相韓公方欲還公學士未及而公病遂止於此豈非其命也夫公纍官至給事中階朝散大夫勳上輕車都尉開國彭城爵公邑户二千一百實食者三百曾祖諱琠贈大理評事祖諱式尚書工部員外郎贈户部尚書考諱立之尚書主客郎中贈工部尚書公再娶倫氏皆侍御史程之女前夫人先公早卒後夫人以公貴纍封河南郡君子男四人長定國郊社掌座早卒次奉世大理寺丞次當時大理評事次安上太常寺太祝女三人長適大理評事韓宗直二尚幼公既卒天子推恩録其兩孫望旦一族子安世皆試將作監主簿公為人磊落明白推誠自信不為防慮至其屢見侵害皆置而不較亦不介于胸中居家不問有無喜賙宗族既卒家無餘財與其弟攸友愛尤篤有文集六十卷其為春秋之説曰傳曰權衡曰説例曰文權曰意林合四十一卷又有七經小傳五卷弟子紀五卷而七經小傳今盛行於學者二年十月辛酉其弟攽與其子奉世等葬公于祥符縣魏陵鄉祔于先墓以來請銘乃為之銘曰嗚呼惟仲原父學強而博識敏而明坦其無疑一以誠見利如畏義必爭觸機履險危不傾畜大不施奪其齡惟其文章粲日星雖欲有毁知莫能維古聖賢皆後亨有如不信考斯銘唐荆川曰首尾分應有力自班馬中來資政殿學士尚書户部侍郎簡肅薛公墓志銘明道二年尚書禮部侍郎參知政事河東公以疾告歸其政天子曰吾不可以數煩公乃詔優公不朝而使視事如故居嵗中數以告乃得還第又數以告然後拜公為資政殿學士户部侍郎判尚書都省罷其政事景祐元年八月庚申公薨于家年六十有八贈兵部尚書公諱奎字宿蓻姓薛氏薛氏之先出於黃帝之後任姓任姓之别為十族薛者奚仲之始封也其後奚仲去遷邳而仲虺留居薛春秋之際以國見經而其子孫後以為氏此其譜也隋唐之間薛姓居河東者為最盛公絳州正平人也曾王父贈太保諱某大王父贈太傅諱某王父殿中丞贈太師諱某三世皆不顯而以公貴初太宗皇帝伐并州太師以策干行在不見用罷公生十餘嵗已能屬文辭太師顧曰是必大吾門吾復何為乃不復事生業務施貸以賙鄉閭曰吾有子矣後何患後五十年公始佐今天子參政事為世名臣如其言公為人敦篤忠烈果敢明達初舉進士為州第一讓其里人王嚴而居其次於是鄉里皆稱之淳化三年再舉乃中授祕書省挍書郎隰州軍事推官始至取州獄已成書活寃者四人徙儀州推官士爭薦其能丁太夫人憂服除用薦者拜大理寺丞知興化軍莆田縣悉除故時王氏無名租莆田人至今以為德遷殿中丞知河南長水縣徙知興州州舊鑄鐵錢用功多人以為苦公乃募民有力者弛其山使自為利而收其鐵租以鑄悉罷役者人用不勞遷太常博士御史中丞向敏中薦公材中御史就拜監察御史召為殿中侍御史判三司都磨勘司賜緋衣銀魚出為陜西轉運副使坐舉人免官居數月通判陜府嵗餘召還臺安撫河北稱旨改尚書户部員外郎淮南轉運使江淮制置發運使開揚州河廢其三堰以便漕船嵗以八百萬石食京師其後罕及其多轉吏部員外郎丁太師憂去職不許居二嵗入為三司户部副使與三司使李士衡爭事省中士衡扳時權貴人為助公拜户部郎中直昭文館出知延州遷吏部郎中入為龍圖閣待制知開封府遷右諫議大夫御史中丞契丹使蕭從順來朝是時莊獻明肅太后垂簾聽政從順舉止多不遜以謂南使至契丹者皆見太后遂請見之朝議患之未有以決公獨以理折之從順乃止而嫉公者讒其漏禁中語由是拜集賢院學士出知并州改知秦州秦州宿重兵兵嘗慊食公為勤儉積蓄教民水種嵗中遷樞密直學士知益州而秦之餘粟積者三百萬征算之衍者三十萬核民舊隱田數百頃所得芻粟又十餘萬秦州之民與其蕃落數千人詣轉運使請留不果公在開封以嚴為治肅清京師京師之民至私以俚語目公且相戒曰是不可犯也囹圄為之數空而至今之人猶或目之及居蜀尤有善政民有得偽蜀時中書印者夜以錦囊挂之西門閽者以白蜀人隨之者萬計皆恟恟出異語且觀公所為公顧主吏藏之略不取視民乃止老媪告其子不孝者子訴貧不能養公取俸錢與之曰用此為生以養母子遂相慈孝里富人三女皆孤民或妄爭其産公析其資為三為嫁其女於是人皆以公為仁恩蜀人喜亂而易搖公既鎮以無事又能順其風俗從容宴樂及其臨事破姦發伏逆見隨決如逢蒙之射而方朔之占無一不中蜀人愛且畏之以比張尚書詠而不苛開封天子之畿益州蜀一都會皆世號尤難理者而公尤有名其猛寬之政前後異施可謂知其方矣入拜龍圖閣直學士權三司使遂拜參知政事公入謝上曰先帝嘗言卿可用吾今用卿矣公益感激自勵而素剛毅守節不茍合既與政尤挺立無所牽隨然遂欲繩天下無小大一入於規矩往往不可其意則歸卧于家歎息憂愧輒不食家人笑其何必若此公曰吾慚不及古人而懼後世譏我也公嘗使契丹與其君臣語而以論議服其坐中其後契丹使來必問公所在及聞巳用乃皆喜曰是得人矣邊吏得諜者言契丹欲棄約舉兵上亟召大臣議或欲選將增兵公曰契丹畏誓而貪利且無隙以開其端其必不動不宜失持重之勢而使其可窺已而卒無事他日上顧公曰果如公言於是益重之明道二年莊獻明肅太后欲以天子衮冕見太廟臣下依違不決公獨爭之曰太后必若王服見祖宗若何而拜乎太后不能奪為改他服太后崩上見羣臣泣曰太后疾不能言而猶數引其衣若有所屬何也公遽曰其在衮冕也然服之豈可見先帝乎上大悟卒以后服葬於是益以公為果可用也公先娶潘氏早卒後娶趙氏今封金城郡夫人子男一人直孺大理寺丞女五人長適故職方員外郎張竒其次適故開封府士曹參軍喬易從早亡次適太原王拱辰早亡次適廬陵歐陽修次又適王氏公既貴贈其曾祖而下三室曰太保太傅太師追封曾祖妣某氏某夫人祖妣某氏某夫人妣某氏某夫人公性孝慈雖在大位家人勤儉不知為驕奢諸子幼孤撫養不異平生所為文章四十卷直而有氣如其為人五年某月某甲子其孤直孺奉其柩自京師葬于絳州以某年某月某甲子即事先期狀公之功行上之太常太常議曰諡法一德不懈曰簡執心決斷曰肅今其狀應法乃諡曰簡肅銘曰薛夏之封以國為姓其後河東隋唐最盛公世載德實河東人必大其門太師之云公之從事以難為易參于大政不撓不牽屢決大議有言炳然公不為相告病還家賵賻之榮尚書是加公有敏德焯其行事公有令名有司之諡事告之史諡傳子孫又刻銘章納于墓門唐宋八大家文鈔卷五十三
