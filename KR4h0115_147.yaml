body:
  text: 唐宋八大家文鈔巻一百三十五明茅坤撰東坡文鈔十九策策略一以人主自斷為策略之始下四篇指其事而條之天下治亂皆有常勢是以天下雖亂而聖人以為無難者其應之有術也水旱盗賊人民流離是安之而已也亂臣割據四分五裂是伐之而巳也權臣専制擅作威福是誅之而巳也四夷交侵邊鄙不寧是攘之而巳也凡此數者其於害民蠧國為不少矣然其所以為害者有状是故其所以救之者有方也天下之患莫大於不知其然而然不知其然而然者是拱手而待亂也國家無大兵革幾百年矣天下有治平之名而無治平之實有可憂之勢而無可憂之形此其有未測者也方今天下非有水旱盗賊人民流離之禍而咨嗟怨憤常若不安其生非有亂臣割據四分五裂之憂而休養生息常若不足於用非有權臣專制擅作威福之弊而上下不交君臣不親非有四夷交侵邉鄙不寧之災而中國皇皇常有外憂此臣所以大惑也今夫醫之治病切脉觀色聼其聲音而知病之所由起曰此寒也此熱也或曰此寒熱之相搏也及其他無不可為者今且有人恍然而不樂問其所苦且不能自言則其受病有深而不可測者矣其言語飲食起居動作固無以異於常人此庸醫之所以為無足憂而扁鵲倉公之所以望而驚也其病之所由起者深則其所以治之者固非鹵莽因循茍且之所能去也而天下之士方且掇拾三代之遺文補葺漢唐之故事以為區區之論可以濟世不已踈乎方今之勢茍不能滌蕩振刷而卓然有所立未見其可也臣嘗觀西漢之衰其君皆非有暴鷙淫虐之行特以怠惰弛廢溺於宴安畏期月之勞而忘千載之患是以日趨於亡而不自知也夫君者天也仲尼贊昜稱天之徳曰天行健君子以自强不息由此觀之天之所以剛健而不屈者以其動而不息也惟其動而不息是以萬物雜然各得其職而不亂其光為日月其文為星辰其威為雷霆其澤為雨露皆生於動者也使天而不知動則其塊然者將腐壊而不能自持况能以御萬物哉茍天子一日赫然奮其剛明之威使天下明知人主欲有所立則智者願効其謀勇者樂致其死縱横顛倒無所施而不可茍人主不先自斷於中羣臣雖有伊吕稷契無如之何故臣特以人主自斷而欲有所立為先而後論所以為立之要云䇿略二設行人屬國之官専按越之范蠡吳之伍員上立見天下無事乆矣以天子之仁聖其欲有所立以為子孫萬世之計至切也特以為發而不中節則天下或受其病當宁而太息者幾年於此矣盖自近嵗始柄用二三大臣而天下皆洗心滌慮以聼朝廷之所為然而數年之間卒未有以大慰天下之望此其故何也二敵之大憂未去而天下之治終不可為也聞之師曰應敵不暇不可以自完自完不暇不可以有所立自古創業之君皆有敵國相持之憂命将出師兵交於外而中不失其所以為國者故其兵可敗而其國不可動其力可屈而其氣不可奪今天下一家二敵且未動也而吾君吾相終日皇皇焉應接之不暇亦竊為執事者不取也昔者大臣之議不為長乆之計而用最下之䇿是以嵗出金繒數十百萬以資强敵此其既往之咎不可追之悔也而議者方将深罪當時之失而不求後日之計亦無益矣臣雖不肖竊論當今之弊蓋古之為國者不患有所費而患費之無名不患費之無名而患事之不立今一歲而費千萬是千萬而已事之不立四海且不可保而奚千萬之足云哉今者二敵不折一矢不遺一鏃走一介之使馳數乗之傳所過騷然居人為之不寧大抵皆有非常之辭無厭之求難塞之請以觀吾之所答於是朝廷洶然大臣㑹議既而去未數月邊陲且復告至矣由此觀之二敵之使未絶則中國未知息肩之所而况能有所立哉臣故曰二敵之大憂未去則天下之治終不可為也中書者王政之所由出天子之所與宰相論道經邦而不知其他者也非至逸無以待天下之勞非至靜無以制天下之動是故古之聖人雖有大兵役大興作百官奔走各執其職而中書之務不至於紛紜今者曾不得嵗月之暇則夫禮樂刑政敎化之源所以使天下回心而嚮道者何時而議也千金之家乆而不治使販夫䜿子皆得執劵以誅其所負茍一朝發憤傾囷倒廩以償之然後更為之計則一簮之資亦足以富何遽至於皇皇哉臣嘗讀吳越世家觀勾踐困於㑹稽之上而行成於吳凡金玉女子所以為賂者不可勝計既反國而吳之百役無不從者使大夫女女於大夫士女女于士春秋貢獻不絶於吳府嘗竊怪其以蠻夷之國承敗亡之後救死扶傷之餘而賂遺費耗則不可勝計如此然卒以滅吳則為國之患果不在費也彼其内外不相擾是以能有所立使范蠡大夫種二人分國而制之范蠡曰四封之外種不如蠡使蠡主之凡四封之外所以待呉者種不知也四封之内蠡不如種使種主之凡四封之内所以彊國富民者蠡不知也二人者各専其能各致其力是以不勞而滅吳其所以賂遺於吳者甚厚而有節也是以財不匱其所以聼役於吳者甚勞而有時也是以本不揺然後勾踐得以安意肆志焉而吳國固在其指掌中矣今以天下之人而中書常有蠻夷之憂宜其内治有不辦者故臣以為治天下不若清中書之務中書之務清則天下之務不足辦也今夫天下之財舉歸之司農天下之獄舉歸之廷尉天下之兵舉歸之樞密而宰相特持其大綱聼其治要而責成焉耳夫此三者豈少於蠻夷哉誠以為不足以累中書也今之所以待二敵者失在於過重古者有行人之官掌四方賓客之政當周之盛時諸侯四朝蠻夷君長莫不來享故行人之官治其登降揖讓之節牲芻委積之數而巳至於周衰諸侯爭彊而行人之職為難且重春秋時秦聘於晉叔向命召行人子員子朱曰朱也當御叔向曰秦晉不和乆矣今日之事幸而集秦晉賴之不集三軍暴骨其後楚伍貟奔吳為吳行人以謀楚而卒以入郢西劉之興有典屬國故賈誼曰陛下試以臣為屬國請必繫單于之頸而制其命伏中行說而笞其背舉匈奴之衆惟上所令今若依倣行人屬國特建一官重任而厚責之使宰相於两制之中舉其可用者而勿奪其權使大司農以每嵗所以餽於二敵者限其常數而豫為之偹其餘者朝廷不與知也凡吾所以遣使於敵與吾所以館其使者皆得以自擇而其非常之辭無厭之求難塞之請亦得以自答使其議不及於朝廷而其閒暇則收羅天下之俊才治其戰攻守禦之䇿兼聼博採以周知敵國之虗實凡事之關於境外者皆以付之如此則天子與宰相特因其能否而定其黜陟其實不亦甚簡歟今自宰相以下百官汎汎焉莫任其責今舉一人而授之使日夜思所以待二敵宜無不濟者然後得以安居靜慮求天下之大計惟所欲為將無不可者為今日計只消於兵部中另立一協部尚書或侍郎専掌北敵之事用邉将理兵餉繕邊牆并探牒敵情儲養邊材皆其所掌嵗一春則廵邊夏四五月間則歸復于朝與兵戶二部相為筦𣙜計之善者也䇿略三任法不如任人而篇終専取諸葛之治蜀王猛之治秦盖為英廟之初當熈寧時似以水濟火矣覽東坡所自為辨䇿問劄子得之臣聞聖王之治天下使天下之事各當其處而不相亂天下之人各安其分而不相躐然後天子得優游無為而制其上今也不然强敵抗衡本非中國之大患而每以累朝廷是以徘徊擾攘卒不能有所立今委任而責成使西北不過為未誅之冦則中國固吾之中國而安有不可為哉於此之時臣知天下之不足治也請言當今之勢夫天下有二患有立法之弊有任人之失二者疑似而難明此天下之所以亂也當立法之弊也其君必曰吾用某也而天下不治是某不可用也又從而昜之不知法之弊而移咎於其人及其用人之失也又從而尤其法法之變未有己也如此則雖至於覆敗死亡相繼而不悟豈足怪哉昔者漢興因秦以為治刑法峻急禮義消亡天下蕩然恐後世無所執守故賈誼董仲舒咨嗟嘆息以正法更制為事後世見二子之論以為聖人治天下凡皆如此是以腐儒小生皆欲妄有所變改以惑世主臣竊以為當今之患雖法令有所未安而天下之所以不大治者失在於任人而非法制之罪也國家法令凡㡬變矣天下之不大治其咎果安在哉曩者大臣之議患天下之士其進不以道而取之不精也故為之法曰中年而舉取舊數之半而復明經之科患天下之吏無功而遷取髙位而不讓也故為之法曰當遷者有司以聞而自陳者為有罪此二者其名甚羙而其實非大有益也而議者欲以此等致天下之大治臣竊以為過矣夫法之於人猶五聲六律之於樂也法之不能無姦猶五聲六律之不能無淫樂也先王知其然故存其大略而付之於人茍不至於害人而不可彊去者皆不變也故曰失在任人而巳夫有人而不用與用而不行其言行其言而不盡其心其失一也古之興王二人而巳湯以伊尹武王以太公皆捐天下以與之而後伊吕得捐其一身以經營天下君不疑其臣功成而無後患是以知無不言言無不行其所欲用雖其親愛可也其所欲誅雖其讐隙可也使其心無所顧忌故能盡其才而責其成功及至後世之君始用區區之小數以繩天下之豪俊故雖有國士而莫為之用夫賢人君子之欲有所樹立以著不朽於後世者甚於人君顧恐功未及成而有所奪祗以速天下之亂耳鼂錯之事斷可見矣夫奮不顧一時之禍决然徒欲以身試人主之威者亦以其所挾者不甚大也斯固未足與有為而沉毅果敢之士又必有待而後發茍人主不先自去其不可測而示其可信則彼孰從而發哉慶厯中天子急於求治擢用元老天下日夜望其成功方其深思逺慮而未有所發也雖天子亦遲之至其一旦發憤條天下之利害百未及一二而舉朝喧譁以至於逐去曾不旋踵此天下之士所以相戒而不敢深言也居今之勢而欲納天下於至治非大有所矯拂於世俗不可以有成也何者天下獨患柔弱而不振怠惰而不肅茍且偷安而不知長乆之計臣以為宜如諸葛亮之治蜀王猛之治秦使天下悚然人人不敢飾非務盡其心凡此者皆庸人之所大惡而䜛言之所由興也是故先主拒關張之間而後孔明得以盡其才符堅斬樊世逐仇騰黜席寳而後王猛得以畢其功夫天下未嘗無二子之才也而人主思治又如此之勤相須甚急而相合甚難者獨患君不信其臣而臣不測其君而已矣惟天子一日慨然明告執政之臣所以欲為者使知人主之深知之也而内為之信然後敢有所發於外而不顧不然雖得賢人千萬一日百變法天下益不可治歲復一嵗而終無以大慰天下之望豈不亦甚可惜哉唐荆川曰無沮善篇嚴密此篇疎暢各自為體只因當時韓魏富鄭杜祁諸公紛紛外逐而不能乆於其朝故有此議䇿略四破庸俗之論有竒氣天子與執政之大臣既已相得而無疑可以盡其所懐直已而行道則夫當今之所宜先者莫如破庸人之論以開功名之門而後天下可為也夫治天下譬如治水方其奔衝潰决騰湧漂蕩而不可禁止也雖欲盡人力之所至以求殺其尺寸之勢而不可得及其既衰且退也駸駸乎若不足以終日故夫善治水者不惟有難殺之憂而又有昜衰之患導之有方决之有漸疏其故而納其新使不至於壅閼腐敗而無用嗟夫人知江河之有水患也而以為沼沚之可以無憂是烏知舟楫灌溉之利哉夫天下之未平英雄豪傑之士務以其所長角奔而争利惟恐天下一日無事也是以人人各盡其材雖不肖者亦自淬厲而不至於怠廢故其勇者相呑智者相賊使天下不安其生為天下者知夫大亂之本起於勇智之士爭利而無厭是故天下既平則削去其具抑逺天下剛健好名之士而奬用柔懦謹畏之人不過數十年天下靡然無復往時之無事也於是能者不自憤發而無以見其能不能者益以弛廢而無用當是之時人君欲有所為而左右前後皆無足使者是以綱紀日壊而不自知此其為患豈特英雄豪傑之士趦趄而已哉聖人則不然當其乆安於逸樂也則以術起之使天下之心翹翹然常喜於為善是故能安而不衰且夫人君之所恃以為天下者天下皆為而已不為夫使天下皆為而已不為者開其利害之端而辨其榮辱之等使之踊躍奔走皆為我役而不自知夫是以坐而收其功也如使天下皆欲不為而得則天子誰與共天下哉今者治平之日乆矣天下之患正在此也臣故曰破庸人之論開功名之門而後天下可為也今夫庸人之論有二其上之人務為寛深不測之量而下之士好言中庸之道此二者皆庸人相與議論舉先賢之言而獵取其近似者以自觧說其無能而已矣夫寛深不測之量古人所以臨大事而不亂有以鎮世俗之躁葢非以隔絶上下之情養尊而自安也譽之則勸非之則沮聞善則喜見惡則怒此三代聖人之所共也而後之君子必曰譽之不勸非之不沮聞善不喜見惡不怒斯以為不測之量不已過乎夫有勸有沮有喜有怒然後有間而可入有間而可入然後智者得為之謀才者得為之用後之君子務為無間夫天下誰能入之古之所謂中庸者盡萬物之理而不過故亦曰皇極夫極盡也後之所謂中庸者循循焉為衆人之所能為斯以為中庸矣此孔子孟子之謂鄉原也一鄉皆稱原人焉無所往而不為原人同乎流俗合乎汙世曰古之人何為踽踽凉凉生斯世也為斯世也善斯可矣謂其近於中庸而非故曰徳之賊也孔子孟子惡鄉原之賊夫徳也欲得狂者而見之狂者又不可得見欲得獧者而見之曰狂者進取獧者有所不為也今日之患惟不取於狂者獧者皆取於鄉原是以若此靡靡不立也孔子子思之所從受中庸者也孟子子思之所授以中庸者也然皆欲得狂者獧者而與之然則淬厲天下而作其怠惰莫如狂者獧者之賢也臣故曰破庸人之論開功名之門而後天下可為也唐荆川曰此篇前後各自為叚落起伏與决壅蔽篇同䇿略五行文如行雲如江流曲盡文家游衍之妙天子者以其一身寄之乎巍巍之上以其一心運之乎茫茫之中安而為㤗山危而為累卵其間不容毫釐是故古之聖人不恃其有可畏之資而恃其有可愛之實不恃其有不可㧞之勢而恃其有不忍叛之心何則其所居者天下之至危也天子恃公卿以有其天下公卿大夫士以至於民轉相屬也以有其富貴茍不得其心而欲覊之以區區之名控之以不足恃之勢者其平居無事猶有以相制一旦有急是皆行道之人掉臂而去尚安得而用之古之失天下者皆非一日之故其君臣之權去巳乆矣適㑹其變是以一散而不可復收方其未也天子甚尊大夫士甚賤奔走萬里無敢後先儼然南靣以臨其臣曰天何言哉百官俯首就位歛足而退兢兢惟恐有罪羣臣相率為茍安之計賢者既無所施其才而愚者亦有所容其不肖舉天下之事聼其自為而已及乎事出於非常變起於不測視天下莫與同其患雖欲分國以與人而且不及矣秦二世唐徳宗葢用此術以至於顛沛而不悟豈不悲哉天下者器也天子者有此器者也器乆不用而置諸箧笥則器與人不相習是以扞格而難操良工者使手習知其器而器亦習知其手手與器相信而不相疑夫是故所為而成也天下之患非經營禍亂之足憂而養安無事之可畏何者懼其一旦至於扞格而難操也昔之有天下者日夜淬厲其百官撫摩其人民為之朝聘㑹同燕享以交諸侯之歡嵗時月朔致民讀法飲酒蜡臘以遂萬民之情有大事自庶人以上皆得至於外朝以盡其詞猶以為未也而五載一廵守朝諸侯於方岳之下親見其耆老賢士大夫以周知天下之風俗凡此者非以為茍勞而已將以馴致服習天下之心使不至於扞格而難操也及至後世壊先王之法安於逸樂而惡聞其過是以養尊而自高務為深嚴使天下拱手以貌相承而心不服其腐儒老生又出而為之説曰天子不可以妄有言也史且書之後世且以為譏使其君臣相視而不相知如此則偶人而巳矣天下之心既巳去而倀倀焉抱其空器不知英雄豪傑巳議其後臣嘗觀西漢之初髙祖創業之際事變之興亦巳繁矣而高祖以項氏創殘之餘與信布之徒爭馳於中原此六七公者皆以絶人之姿據有土地甲兵之衆其勢足以為亂然天下終以不揺卒定於漢傳十數世矣而至於元成哀平四夷嚮風兵革不試而王莽一䜿子乃舉而移之不用寸兵尺鐡而天下屏息莫敢或争此其故何也創業之君出於布衣其大臣将相皆有握手之歡凡在朝廷者皆有嘗試擠掇以知其才之短長彼其視天下如一身茍有疾痛其手足不期而自救當此之時雖有近憂而無逺患及其子孫生於深宫之中而狃於富貴之勢尊卑濶絶而上下之情踈禮節繁多而君臣之義薄是故不為近憂而常為逺患及其一旦固已不可救矣聖人知其然是以去苛禮而務至誠黜虚名而求實效不愛髙位重禄以致山林之士而欲聞切直不隠之言者凡皆以通上下之情也昔我太祖太宗既有天下法令簡約不為崖㟁當時大臣将相皆得從容終日歡如平生下至士庶人亦得以自效故天下稱其言至今非有文采縁飾而開心見誠有以入人之深者此英主之竒術御天下之大權也方今治平之日乆矣臣愚以為宜日新盛徳以激昂天下乆安怠惰之氣故陳其五事以備採擇其一曰將相之臣天子所恃以為治者宜日夜召論天下之大計且以熟觀其為人其二曰太守刺史天子所寄以逺方之民者其罷歸皆當問其所以為政民情風俗之所安亦以揣知其才之所堪其三曰左右扈從侍讀侍講之人本以論説古今興衰之大要非以應故事備數而已經籍之外茍有以訪之無傷也其四曰吏民上書茍小有可觀者宜皆召問優游以養其敢言之氣其五曰天下之吏自一命以上雖其至賤無以自通於朝廷然人主之為豈有所不可哉察其善者卒然召見之使不知其所從來如此則逺方之賤吏亦務自激發為善不以位卑禄薄無由自通於上而不修飾使天下習知天子樂善親賢恤民之心孜孜不倦如此翕然皆有所感發知愛於君而不可與為不善亦將賢人衆多而姦吏衰少刑法之外有以大慰天下之心焉耳唐荆川曰此文論時弊處皆借古為諭亦一體也唐宋八大家文鈔巻一百三十五
