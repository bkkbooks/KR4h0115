body:
  text: 唐宋八大家文鈔柳州文鈔引昌黎韓退之崛起八代之衰又得栁栁州相為羽翼故此唱彼和譬之噴嘯山谷一呼一應可謂盛已昌黎之文得諸古六藝及孟軻揚雄者為多而栁州則間出乎國語及左氏春秋諸家矣其深醇渾雄或不如昌黎而其徑悍泬寥抑亦千年以來曠音也豫故讀許京兆蕭翰林諸書似與司馬子長答任少卿書相上下欲為掩卷纍欷者久之再覽鈷鉧潭諸記杳然神遊沅湘之上若將凌虛御風也已竒矣哉豫録書啓三十三首序傳十七首記二十八首論議辨十四首説贊雜著十八首碑銘墓碣及誄表狀祭文二十首釐為十二卷按栁州平淮雅與鐃歌及五七言詩什於諸家中尤擅所長豫校而録之者特文也故不及歸安鹿門茅坤題
  hash: sha256:4c33a595da80ae26a541bb639f5498189ed651e7f3a68d46129784ba7f3bb281
