body:
  text: 唐宋八大家文鈔卷一百四十五明茅坤撰潁濱文鈔一上書上神宗皇帝書凡讀先秦史漢往往言簡而意盡固古人所不可及處及讀子由之文往往如逰絲之從天而下嫋娜曲折氤氲蕩漾令人讀之情鬯神解而猶不止亦非今人所及處此書専言理財中多名言但冗吏一節未見的確臣官至疏賤朝廷之事非所得言然竊自惟雖其勢不當進言至於報國之義猶有可得言者昔仁宗親䇿直言之士臣以不識忌諱得罪於有司仁宗哀其狂愚力排羣議使臣得不遂棄於世臣之感激思有以報為日久矣今者陛下以聖德臨御天下將大有為以濟斯世而臣材力駑下無以自效竊聽之道路得其一二思致之左右茍懲創前事不復以聞則其思報之誠沒世而不能自達是以輒發其狂言而不知止臣聞善為國者必有先後之次自其所當先者為之則其後必舉自其所當後者為之則先後並廢書曰欲升髙必自下欲陟遐必自邇世未有不自下而能髙不自近而能逺者然世之人常鄙其下而厭其近務先從事於髙逺不知其不可得也詩曰無田甫田維莠驕驕無思逺人勞心忉忉以為田甫田而力不給則田茀而不治不若不田也思逺人而德不足則心勞而無獲不若不思也欲田甫田則必自其小者始小者之有餘而甫田可啓矣欲來逺人則必自其近者始近者之既服而逺人自至矣茍由其道其勢可以自得茍不由其道雖強求而不獲也臣愚不肖蓋嘗試妄論今世先後之宜而竊觀陛下設施之萬一以為所當先者失在於不為而所當後者失在於太早然臣非敢以為信然也特其所見有近於是者是以因其近似而為陛下深言之伏惟陛下即位以來躬親庶政聰明睿智博達宏辨文足以經治武足以制斷重之以勤勞加之以恭儉凡古之帝王曠世而不能有一焉者陛下一旦兼而有之矣夫以天縱之姿濟之以求治之心施之於事宜無為而不成無欲而不遂今也為國厯年於兹而治不加進天下之弊日益於前世天下之人未知所以適治之路災變橫生川原震裂江河湧沸人民流離災火繼作厯月移時而其變不止此臣所以日夜思念而不曉疑其先後之次有所未得者也夫今世之患莫急於無財而巳財者為國之命而萬事之本國之所以存亡事之所以成敗常必由之昔趙充國論備邊之計以為湟中穀斛八錢糴三百萬斛羌人不敢動矣諸葛亮用兵如神而以糧道不繼屢出無功由是觀之茍無其財雖有聖賢不能自致於跬步茍有其財雖庸人可以一日而千里陛下頃以西夏不臣赫然發憤建用兵之䇿招來橫山之民將奪其險阻破壞其國而後巳方是之時夏人殘虐失衆橫山之民厭苦思漢而又乘其薦飢茍加之以兵此非計之失者也然而沿邊無數月之糧關中無終嵗之儲而所興之役有莫大之費陛下方且泰然不以為憂以為萬舉而有萬全之功既而邊臣失律先事輕發亦既入踐其國係虜其民矣然而陛下得其地而不敢收獲其人而不敢臣雖有成功而不能繼也其終卒致於廢黜謀臣而講和好夫陛下謀之於期年之前而罷之於既發之後豈以為是失當而悔之哉誠無財以善其後爾且夫財之不足是為國之先務也至於鞭笞四夷臣服異類是極治之餘功而太平之粉飾也然今且先之此臣所以知其先後之次有所未得者也今者陛下懲前事之失出祕府之財徙內郡之租賦督轉漕之吏使備沿邊三嵗之畜臣以此疑陛下之有意乎財矣然猶以為未也何者祕府之財不可多取而內郡之民不可重困可以紓目前之患而未可以為長久之計此臣所以求效其區區而不能自巳也蓋善為國者不然知財之最急而萬事賴焉故常使財勝其事而事不勝財然後財不可盡而事無不濟財者車馬也事者其所載物也載物者常使馬輕其車車輕其物馬有餘力車有餘量然後可以涉塗泥而車不僨登坂險而馬不躓今也四方之財莫不盡取民力屈矣而上用不足平居惴惴僅能以自完而事變之生復不可料譬如弊車羸馬而引丘山之載幸而無虞猶恐不能勝不幸而有隂雨之變陵谷之險其患必有不可知者故臣深思極慮以為方今之計莫如豐財然臣所謂豐財者非求財而益之也去事之所以害財者而已矣夫使事之害財者未去雖求財而益之財愈不足使事之害財者盡去雖不求豐財然而求財之不豐亦不得也故臣謹為陛下言事之害財者三一曰冗吏二曰冗兵三曰冗費冗吏之説曰請原古之所以置吏之意有是民也而後有是官有是官也而後有是吏量民而置官量官而求吏其本凡以為民而巳是以古者即其官以取人郡縣之職缺而取之於民府寺之屬缺而取之於郡縣出以為守令入以為卿相出八相受中外相貫一人去之一人補之其勢不容有冗食之吏近世以來取人不由其官士之來者無窮而官有限極於是兼守判知之法生而官法始壞浸淫分散不復其舊是以吏多於上而士多於下上下相窒譬如決水於不流之澤前者未盡來者巳至填咽充滿一陷於其中而不能出故布衣之士多方以求官巳仕之吏多方以求進下慕其上後慕其前不愧詐偽不恥爭奪禮義消亡風俗敗壞勢之窮極遂至於此夫人情紓則樂易樂易則有所不為窘則悶亂悶亂則無所不至今使衆人相與皆出於隘足履相躡肩肘相逮傍徨而不得進又將禁其奔走而爭先者茍將禁之則莫如止來者而闢其隘今也驅市人而納之不勝其多也設險於中塗而艱難之是以法愈設而爭愈甚惟陛下以時救之下哀痛之書明告天下以吏多之故與之更立三法其一使進士諸科增年而後舉其額不增纍舉多者無推恩其説曰凡今之所以至於不可勝數者以其取之之多也古之人其擇吏也甚精人知吏之不可以妄求故不敢輕為士為士者皆其修潔之人也今世之取人誦文書習程課未有不可為吏者也其求之不難而得之甚樂是以羣起而趨之凡今農工商賈之家未有不捨其舊而為士者也為士者日多然而天下益以不治舉今世所謂居家不事生産仰不養父母俯不恤妻子浮遊四方侵擾州縣造作誹謗者農工商賈不與也祖宗之世士之多少其比於今不能一二也然其削平僭亂創制立法功業卓然見於後世之士不敢望其萬一也士之多不及於今世而功則過之無足怪者取之至少則人不敢輕為士其所取者皆州郡之選人也故為是法使人知上意之所向十年之後無實之士將不黜而自減且夫設科以待天下之士蓋將使其才者得之不才者不可得也吾則取之而彼則不能得猶曰雖不能得而纍舉多者必取無棄則是以官徇人也且纍舉之士類非少年矣耳目昏塞筋力疲倦而後得之數日而計之知其不能有所及也則其為政無所賴矣今有人畜牛羊而求牧既取其壯者又取其老者取其壯者曰吾取其力也取其老者曰吾憐其老也如憐其老而巳則曷為以纍牛羊哉茍誠以為有遺才焉則今所謂遺逸之書有以收之矣其二使官至於任子者任其子之為後者世世祿仕於朝襲簪紱而守祭祀可以無憾矣然而為是法也則必始於二府法行於賤而屈於貴天下將不服天下不服而求法之行不可得也蓋矯失以救患者必有所過而後濟臣非不知二府之不可以齒庶官也其三使百司各損其職掌而多其出職之嵗月其説曰百司臣不得而盡詳也請言其尤甚者莫如三司三司之吏世以為多而不可損何也國計重而簿書衆也臣以為不然主大計者必執簡以御繁以簡自處而以繁寄人以簡自處則心不可亂心不可亂則利至而必知害至而必察以繁寄人則事有所分事有所分則毫末不遺而情偽必見今則不然舉四海之大而一毫之用必會於三司故三司者案牘之委也案牘既積則吏不得不多案牘積而吏多則欺之者衆雖有大利害不能察也夫天下之財下自郡縣而至於轉運轉相鈎較足以為不失矣然世常以轉運使為不可獨信故必至於三司而後已夫茍轉運使之不可獨信而必三司之可任則三司未有不責成於吏者豈三司之吏則重於轉運使歟故臣以為天下之財其詳可分於轉運使而使三司嵗攬其綱目既使之得優遊以治財貨之源又可頗損其吏以絶亂法之弊茍三司猶可損也而百司可見矣然此三法者皆世之謂拂世戾俗召怨而速謗者也今且將行之臣非敢犯衆人之怒而行此危事也以為有可行之道焉何者自臺省六品諸司五品一郊而任一人自兩制以上一嵗而任一人此祖宗百年之法相承而不變者也而仁宗之世則損之三載而考績無罪者遷其官自唐以來亦未始有變者也而英宗之世則增之此二者夫豈便於世俗哉然而莫敢怨者以為吏多而欲損者天下之公議其不欲者天下之私計也以私計而怨公議其為怨也不直矣是以善為國者循理而不恤怨非不恤怨知其無能為也且今此三法者固未嘗行也然而天下亦不免於怨何者士之出身為吏者捐其生業棄其田里以盡力於王事而今也以吏多之故故積勞者久而不得遷去官者久而不得調又多為條約以沮格之減罷其舉官破壞其次第使之窮窘無聊求進而不遂此其為怨豈減於布衣之士哉均之二怨皆將不免然使新進之士日益多國力匱竭而不能支十年之後其患必有不可勝言者故臣願陛下親斷而力行之茍日增之吏漸於衰少則臣又將有以治其舊吏使諸道職司每嵗終任其所部郡守監郡各任其屬曰自今以前未有以私罪至某贓罪正入已至若干者二者皆自上鈞其輕重而裁之已而以他事發則與之同罪雖去官與赦不降也夫以私罪至某贓罪正入巳至若干其為惡也著矣而上不察則上之不明亦可知矣故雖與之同罪而不過今世之法任人者任其終身茍其有罪終身鈞坐之夫任人之終身任其未然之不可知者也任人之嵗終而無過任其已然之可知者也臣請得以較之任其未然之不可知雖聖人有所不能任其巳然之可知雖衆人能之今也任之以聖人之所不能既不敢辭矣而况任之以衆人之所能顧不可哉且按察之吏則亦不患其不知也患其知而未必皆按曰是無損於我而徒以為怨云爾今使其罪及之其勢將無所不問陛下誠能擇奉公疾惡之臣而使行之陛下厲精而察之去民之患如除腹心之疾則其以私罪至某贓罪正入已至若干者非復過誤適陷於深文者也茍遂放歸終身不齒使姦吏有所懲則冗吏之弊可去矣冗兵之説曰臣聞國朝創業之初四方割據中國地狹兵革至少其後蕩滅諸國拓地既廣兵亦隨衆雍熙之間天下之兵僅三十萬方此之時屯戍征討百役並作而兵力不屈未嘗有兵少之患也自咸平景德以來契丹內侵繼遷叛逆每有警急將帥不問得失輒請益兵於是召募日增而兵額之多遂倍前世其後寶元慶厯之間元昊竊發復使諸道點民為兵而沿邊所屯至七八十萬自是天下遂以百萬為額雖復近嵗無事而關中之兵至於二十八萬舉雍熙天下之衆適以備方今關中一隅之用兵多之甚於此見矣然臣聞方今宿邊之兵分𨽻堡障戰兵統於將帥者其實無幾每一見賊賊兵常多我兵常少衆寡不敵每戰輒敗往者將帥失利未有不以此自解者也夫祖宗之兵至少而常若有餘今世之兵至多而常患於不足此二者不可不察也兵法有之曰興師十萬出征千里百姓之費公家之奉日費千金內外騷動怠於道路者七十萬家而愛爵祿百金不能知敵之情者不仁之至也故三軍之事莫親於間賞莫重於間間者三軍之司命也臣竊惟祖宗用兵至於以少為多而今世用兵至於以多為少得失之原皆出於此何以言之臣聞太祖用李漢超馬仁瑀韓令坤賀惟忠何繼筠等五人使備契丹用郭進武守琪李謙溥李繼勳等四人使備河東用趙贊姚內斌董遵誨王彥升馮繼業等五人使備西羌皆厚之以關市之征饒之以金帛之賜其家屬之在京師者仰給於縣官貿易之在道路者不問其商稅故此十四人者皆富厚有餘其視棄財如棄糞土賙人之急如恐不及是以死力之士貪其金錢捐軀命冒患難深入敵國刺其隂計而效之至於餘食動靜無不畢見每有入寇輒先知之故其所備者寡而兵力不分敵之至者舉皆無得而有喪是以當此之時備邊之兵多者不過萬人少者五六千人以天下之大而三十萬兵足為之用今則不然一錢以上皆籍於三司有敢擅用謂之自盜而所謂公使錢多者不過數千緡百須在焉而監司又伺其出入而繩之以法至於用間則曰官給茶綵夫百餅之茶數束之綵其不足以易人之死也明矣是以今之為間者皆不足恃聽傳聞之言採疑似之事其行不過於出境而所問不過於熟戶得有藉口以欺其將帥則止矣非有能知敵之至情者也敵之至情既不可得而知故常多屯兵以備不意之患以百萬之衆而常患於不足由此故也陛下何不權其輕重而計其利害夫關市之征比於茶綵則多而三十萬人之奉比於百萬則約衆人知目前之害而不知嵗月之病平居不忍棄關市之征以與人至於百萬則恬而不知怪昔太祖起於布衣百戰以定天下軍旅之事其思之也詳其計之也熟矣故臣願陛下復修其成法擇任將帥而厚之以財使多養間諜之士以為耳目耳目既明雖有強敵而不敢輒近則雖雍熙之兵可以足用於今世陛下誠重難之臣請陳其可減之實何者今世之強兵莫如沿邊之土人而今世之惰兵莫如內郡之禁旅其名愈髙其廪愈厚其廪愈厚其材愈薄往者西邊用兵禁軍不堪其役死者不可勝計羌人每出聞多禁軍輒舉手相賀聞多土兵輒相戒不敢輕犯以實較之土兵一人其材力足以當禁軍三人禁軍一人其廪給足以贍土兵三人使禁軍萬人在邊其用不能當三千人而常耗三萬人之畜邊郡之儲比於內郡其價不啻數倍以此權之則土兵可益而禁軍可損雖三尺童子知其無疑也陛下誠聽臣之謀臣請使禁軍之在內郡者勿復以戍邊因其老死與亡而勿復補使足以為內郡之備而止去之以漸而行之以十年而冗兵之弊可去矣冗費之説曰世之冗費不可勝計也請言其大與臣之所知者而陛下以類推之臣聞事有所必至恩有所必窮事至而後謀則害於事恩窮而後遷則傷於恩昔者太祖太宗敦睦九族以先天下方此之時宗室之衆無幾也是以合族於京師久而不别世厯五聖而太平百年矣宗室之盛未有過於此時者也祿廪之費多於百官而子孫之衆宫室不能受無親疏之差無貴賤之等自生齒以上皆養於縣官長而爵之嫁娶喪葬無不仰給於上日引月長未有知其所止者此亦事之所必至而恩之所必窮者也然而未聞所以謀而遷之古者天子七廟三昭三穆與太祖而七以人子之愛其親推而上之至於其祖由祖而上至於百世宜無所不愛則宜無所不廟茍推其無窮之心則百世之祖皆廟而後為稱也聖人知其不可故為之制七廟之外非有功德則迭毁春秋之祭不與莫貴於天子莫尊於天子之祖而廟不加於七何者恩之所不能及也何獨至於宗室而不然臣聞三代之間公族有以親未絶而列於庶人者兩漢之法帝之子為王王之庶子猶有為俟者自侯以降則庶子無復爵土蓋有去而為民者有自為民而復仕於朝者至唐亦然故臣以為凡今宗室宜以親疏貴賤為差以次出之使得從仕比於異姓擇其可用而試之以漸凡其祿秩之數遷敘之等黜陟之制任子之令與異姓均臨之以按察持之以寮吏威之以刑禁以時察之使其不才者不至於害民其賢者有以自效而其不任為吏者則出之於近郡官為廬舍而廪給之使得占田治生與士庶比今聚而養之厚之以不訾之祿尊之以莫貴之爵使其賢者老死鬱鬱而無所施不賢者居處隘陋戚戚而無以為樂甚非計之得也昔唐武德之初封從昆弟子自勝衣以上皆爵郡王太宗即位疑其不便以問大臣封德彞曰爵命崇則力役多以天下為私奉非至公之法也於是疏屬王者降為公夫自王而為公非人情之所樂也而猶且行之今使之爵祿如故而獲治民雖有內外之異宜無有怨者然臣觀朝廷之議未嘗敢有及此何者以宗室之親而布之於四方懼其啓姦人之心而生意外之變也臣竊以為不然古之帝王好疑而多防雖父子兄弟不得尺寸之柄幽囚禁錮齒於匹夫者莫如秦魏然秦魏皆數世而亡其所以亡者劉氏項氏與司馬氏而非其宗室也故為國者茍失其道雖胡越之人皆得謀之茍無其釁雖宗室誰敢覬者惟陛下蕩然與之無疑使得以次居外如漢唐之故此亦去冗費之一端也臣聞漢唐以來重兵分於四方雖有未大之憂而饋運之勞不至於太甚祖宗受命懲其大患而略其細故斂重兵而聚之京師根本既強天下承命而服然而轉漕之費遂倍於古凡今東南之米每嵗遡汴而上以石計者至五六百萬山林之木盡於舟楫州郡之卒弊於道路月廪嵗給之奉不可勝計往返數千里飢寒困迫每每侵盜雜以他物米之至京師者皆非完物矣由此觀之今世之法直以其力致之而不計其患非法之良者也臣願更為之法舉今每嵗所運之數而四分之其二即用舊法官出船與兵而漕之凡皆如舊其一募六道之富人使以其船及人漕之而所過免其商稅能以若干至京師而無所欺盜敗失者以今三司軍大將之賞與之方今濵江之民以其船為官運者不求官直蓋取官之所入而不覆較者得其贏以自潤而富民之欲仕者往往求為軍大將以此推之宜有應募者其一官自置場而賈之京師京師之兵當得米而不願者計其直以錢償之夫物有常數取之於南則不足於北捨之於東則有餘於西此數之必然而不可逃者也今官欲買之其始不免於貴貴甚則東南之民傾而赴之赴之者衆則將反於賤致賤必以貴致貴必以賤此亦必然之數也故臣願為此二者與舊法皆立試其利害而較其可否必將有可用者然後舉而從之此又去冗費之一端也臣聞富國有道無所不恤者富之端也不足恤者貧之源也從其可恤而收之無所不收則其所存者廣矣從其無足恤而棄之無所不棄則其所亡者多矣然而世人之議者則不然以為天下之富而顧區區之用此有司之職而非帝王之事也此説之行於天下數百年於兹矣故天下之費其可巳者常多於舊臣不敢逺引前世請言近嵗之事自嘉祐以來聖人迭興而天下之吏京秩以上再遷其官天下郡守職司再補其親戚自治平京師之大水與去嵗河朔之大震百役並作國有至急之費而郊祀之賞不廢於百官自橫山用兵供億之未定與京西流民勞徠之未息官私乏困日不暇給而宗室之喪不俟嵗月而葬臣以此觀之知朝廷有無足恤之義臣誠知事之既往無可為者然茍自今從其可恤而救之則無益之費猶可漸減此又去冗費之一端也臣不勝拳拳私憂過計為是三冗之説以獻伏惟陛下思深謀逺聽斷詳盡於天下之事無所不矚臣之所陳何足言者然臣愚以為茍三冗未去要之十年之後天下將益衰耗難以復治陛下何不講求其原而定其方略擇任賢俊而授之以成法使皆久於其官而後責其成績方今天下之官泛泛乎皆有欲去不久之心侍從之臣逾年而不得代則皇皇而不樂今雖不能使之盡久然至於諸道之職司三司之官吏沿邊之將佐此皆與天子共成事者也天下之事將責成之而不久其任開其源者不見其流發其謀者不見其成功此事之所以不得成也陛下誠擇人而用之使與二府皆久於其官人知不得苟免而思長久之計君臣同心上下協力磨之以歲月如此而三冗之弊乃可去也然而為此猶有所患何者今世之士大夫惡同而好異疾成而喜敗事苟不出於已小有齟齬不合則羣起而排之借如今使按察之官任其屬吏嵗終而無過此其勢必將無所不按得罪者必將多於其舊然則天下之口紛然非之矣不幸而有一不當衆將羣指以罪法一不當不能動不幸而至於再三雖上之人亦將不免於惑衆人非之於下而朝廷疑之於上攻之者衆而持之者不堅則法從此敗矣蓋世有耕田而以其耜殺人者或者因以耕田為可廢夫殺人之可誅與耕田之不可廢此二事也安得以彼而害此哉故夫按人而不以其實者罪之可也而法之是非則不在此苟陛下誠以為可行必先能破天下之浮議使良法不廢於中道如此而後三冗之弊可去也三冗既去天下之財得以日生而無害百姓充足府庫盈溢陛下所為而無不成所欲而無不如意舉天下之衆惟所用之以攻則取以守則固雖有西北二邊不臣之國宥之則為漢文帝不宥則為唐太宗伸縮進退無不在我今陛下不事其本而先舉其未此臣所以大惑也臣不勝憤悶越次言事雷霆之譴無所逃避臣轍誠惶誠恐稽首頓首謹書唐宋八大家文鈔卷一百四十五
