body:
  text: 唐宋八大家文鈔卷一百五十九明茅坤撰潁濱文鈔十五策臣事策六厲羣臣此篇議論大略與世之論考課資格者相參聖人之治天下常使人有孜孜不己之意下自一介之民與凡百執事之人咸願竭其力以自附於上而上至公卿大夫雖其甚尊志得意滿無所求望而亦莫不勞苦其思慮日夜求進而不息至有一沐而三握一飯而三吐食不暇飽卧不暇暖汲汲於事常若有所未足者是以天下之事小大畢舉無所廢敗而上之人可以不勞力而萬事皆理昔者世之隆替臣嘗已略觀之矣當堯舜之時洚水橫流民不粒食事變繁多災害並興而堯舜之身至於垂拱而無為何者天下之人各為之用力而不辭也至於末世海內乂安四方無虞人生於其間其勢皆有怠荒之心各安其所而不願有所興作故天下漸以衰憊而不振詩曰周雖舊邦其命維新夫國之所以至於亡者惟其舊而無以新之歟天下舊而不復新則其事業有所斷而不復續當此之時而不知與之相期於長久不已之道而時作其怠惰之氣則天下之事幾乎息矣今夫道路之人使之趨十里而與之百錢則十里而止使之趨百里而與之千錢則百里而止何者所與期者止於十里與百里而其利亦止於此而巳今世之士何以異此出於布衣者其志不過一命之祿既命則忘其布衣之學仕於州縣者其志不過於改官之寵既改則喪其州縣之節自是以上因循遞遷十有餘年之間則其勢自至於郡守此不待有所修飾而至者其志極矣幸而其間有欲持自奮厲之心然後其意稍廣而不肯自棄於貪汙之黨外自漕刑內自臺諫館閣而至於兩制亦又極矣又幸而有求為宰相者則其志又益廣至於宰相而極矣蓋天子之所以使天下慕悅而樂為吾用者下自一命之臣而上至宰相其節級相次者有四而巳彼其一命者或無望於改官郡守者或無望於兩制兩制者或無望於宰相而為宰相者無所復望或各安於其所而誰肯為天子盡力者且夫世之士大夫如此其衆也仁人君子如此其不少也而臣何敢妄有以詆之哉蓋臣聞之方今之人其巳改官者其亷隅節幹之效常不若其在州縣之時而為兩制者其慷慨徑挺之操常不若其為漕刑臺諫之日雖其竒才偉人卓然特立不為利變者固不在此而世之為此者亦已衆矣夫以爵祿而勸天下爵祿已極則人之怠心生以術使天下則天下之人終身奔走而不知止昔者漢之官吏自縣令而為刺史自刺史而為郡守自郡守而為九卿自九卿而為三公自下而上至於人臣之極者亦有四而已然當此之時吏久於官而不知厭方今朝廷郡縣之職列級分等不可勝數從其下而為之三歲而一遷至於終身可以無倦矣而人亦各自知其分之所止其清髙顯榮者雖至老死而不可輒入是以在位者皆懈而不自奮何者彼能通其君臣之歡坦然其無髙下峻絶不可扳援之勢而吾則不然今天下之小臣因其朝見而勞其勤苦丁寧訪問以開導其心志且時擇其尤勤苦者有以賜豫之使知朝廷之不甚逺而容有冀於其間上之大吏時召而賜之間燕與之講論政事而勉之於功名相邀於後世不朽之際與夫子孫皆享其福之利時亦有以督責其荒怠弛廢之愆使之有所愧恥於天子之恩竟而不倦於事此豈非臣所謂奔走天下之術歟臣事策七督監司以當時御史為能盡法以督州郡之吏而監司以上不免優遊養望以待兩制而不能盡如為御史者抗法以褆職大略今亦近之聖人之於人不恃其必然而恃吾有以使之不恃其皆賢而恃吾有以驅之夫使天下之人皆有忠信正直之心則為天下安俟乎聖人惟其不然是以使之有方驅之有術不可一日而去也今夫天下之官莫不以為可任而後任之矣上自兩府之大臣而下至於九品之賤吏近自朝廷之中而逺至於千里之外上下相伺而左右相覺不為不密也然又內為之御史而外為之漕刑使督察天下之姦人而糾其不法如此則天下何恃其皆賢而期之以必然哉然尚有所未盡者蓋天下之事任人不若任勢而變吏不如變法法行而勢立則天下之吏雖其非賢而皆欲勉強以求成功故天子可以不勞而得忠良之臣今世之弊任弊法而用不便之勢勞苦於求賢而不知為法之弊是以天下幸而得賢則可以僥幸於治安不幸而無賢焉則遂靡靡而無振且御史漕刑天子之所恃以知百官之能否者也今不為之立法而望其皆賢故臣所謂有所未盡者謂此事也夫此二官雖其內外之不同而其與擊搏羣下權勢輕重本無以相逺也而自近歲以來為御史者莫不洗濯磨淬以自見其圭角慷慨論列不顧天下之怨是以朝廷之中上無容姦而下無宿詐正直之人莫不相慶以為庶幾可以大治然臣愚以謂方今內肅而外不振千里之外貪吏晝日取人之金而莫之或禁逺人咨嗟無所告訴莫不飲泣太息仰而呼天者深惟國家所以設漕刑之意正以天下有此等不平之故耳今海內幸無變而逺方之民戚然皆苦貪吏之禍則所謂漕刑者尚何以為然人之性不甚相逺豈其為御史則皆有嫉惡之心而至於漕刑則皆得鹵莽苟容之人蓋上之所以使之者未至也臣觀御史之職雖其屬官之中茍有能出身盡命排擊天下之姦邪則數年之間可以至於兩制而無難而其不能者退斥罷免不免為碌碌之吏是以御史皆務為訐直之行而漕刑之官雖端坐默默無所發摘其終亦不失為兩制而其抗直不撓者亦不過如此而徒取天下之怨是以皆好為寬仁以收敦厚之名豈國家知用之御史而不知用之漕刑哉臣欲使兩府大臣詳察天下漕刑之官唯其有所舉按不畏強禦者而後使得至於兩制而其不然者不免為常吏變法而任勢與之更新使天下之官吏各從其勢之所便而為之而其上之人得賢而任之則固巳大善如其不幸而無賢則亦不至於紛亂而不可治雖夫庸人亦可使之自力而為政如此則天下將內嚴而外明姦吏求以自伏而不得其處天下庶乎可以為治矣今日之弊愚尤怪夫為監司者往往頤指氣使於御史以茍且其奔走之令而不能如國家故設監司與御史互相督察以平其政而拊循其民此所以一御史習練而長厚而一道之吏民皆帖席矣一御史好為擊摶而一道之吏民皆騷驛而殘破矣愚故曰今能察各道監司之中以博大持政而與御史相持以平其反者歲擢一二人以為卿寺此亦足以按兩漢重二千石之權之意而為御史者不至於怙權作威也臣事策八破例大體與抑僥幸篇同子由此文有大將揮兵之勢縱橫闔闢無不如意第一等科場文字天下惟其有權者可以使人有利者可以得衆權者天下之所為去就也利者天下之所為奔走也能是非可否者之謂權能貧富貴賤者之謂利天子者收天下之權而自執之斂天下之利而親用之者也故天下之人上自公卿大夫之尊而下至於閭閻匹夫之賤府史胥徒僮僕奴妾以次相屬而相役至於疲弊勞苦老死而不去緩急可以使之相救危難可以使之相死蹈白刃赴深谷可使用命而不敢辭何者彼利於人者固役於人也千金之家持其贏餘以丐貸鄰里之貧民薄息緩取而可以豪橫於鄉黨刺客武士為之效死而莫之能制此權利之所致也臣聞天子者執天下之權而擅四海九州之利爵祿慶賞金玉錢幣此其富非特千金之利也豫奪可否刑戮誅滅此其勢非持千金之權也古之人君得天下之權利而專之是故所為而成所欲而就謀臣猛將為之盡力有死而無二社稷之臣可使死宗廟郡縣之臣可使死封疆文吏可使死其職武吏可使死其兵天下之人其存心積慮皆以為當然是以冦至而不懼難生而無變方其平居無事之際天子衣食而養之以待天下之事故有事而死亦其勢然也然當今天下之人食天子之祿被天子之爵衣青紫佩印綬從吏卒縱橫赫奕者常遍天下一旦有急皆莫肯死者此甚可怪也往年廣南之亂大吏據城擁兵賊至而莫敢擊逃遁奔竄伏於草莽之間以避兵革之禍至使蠻夷之人得以橫行於中原人民流離方數千里幾為丘墟而無一死戰之吏國家每歲收天下之士士之發於飢寒取官而去者動以數百為輩六年之間考足而無過則又為之改爵而增其祿秩幸而有超羣拔類之才則公卿大臣又得薦之於天子而特寵貴之翺翔朝廷之間不出十年可以安坐談笑而為兩制此其為法尚何所負於天下而士大夫終莫肯奮而為之用何也夫明哲之君以其法邀天下今天下之人反以其法邀之故邀在我則奔走者人也邀在人則奔走者我也今世之法夫豈不欲以邀人哉涖官六七考求舉者五六人凡此皆備具而無所過失然後為之改爵而增其祿秩夫此豈誠足以邀人哉為法而不足以邀人則人將反以吾法而相邀今之官吏考足而無過且有舉者則天子寧有以却之耶是不得不從而豫之矣如此則是天子之爵祿非天子之惠而天下之勢也士大夫以勢取爵祿是以舉皆不德其上凡今天子之權反而入於下而天子之利變而為輕取易得之物矣蓋臣聞天下有二弊有法亂之弊有法弊之弊法亂則使人紛紛而無所執法弊則使人牽制而不自得古之聖人法亂則以立法救之而法弊則受之以無法夫無法者非縱橫放肆之謂也上之人投棄規矩而使天下無所執以邀其君是之謂無法今夫官吏之法其亦無自舉者與考而巳使一二大臣得詳其才與不才舉者具而考足才者與之而不才者置之雖有考不足而舉者不具其可與者則亦與之也凡皆務與天下為所不可測使吏無所執吾法以邀我收天子之權利而歸之於上如此則議者將以為蕩然無法則大吏易以為姦臣聞人惟不為姦也而後任以為大吏茍天下之廣而無一二大臣可信者則國非其國矣且自唐季以來世之設法者始皆務以防其大臣蓋唐之盛時其所以試天下之士與調天下之選人者皆無一定之法而惟有司之為聽夫是以下不得邀其上而上有以役其下臣故曰惟有權者可以使人有利者可以得衆此不可不深察也通篇總只是感嘆宋天子失權利而不能必天下之士為之感奮而效死議論滚滚不窮譬如蜀江之出峽而一㵼千里激之為湍流之為川冒城郭溢州郡而不知其所止也臣事策九近任古者之仕不出百里之國今國家小吏往往萬里驅馳甚不是體可與曾子固送江任序同看聖人之為天下不務逆人之心人心之所向因而順之人心之所去因而廢之故天下樂從其所為惟其一人之所欲不可以施於天下不得已而後有所矯拂而不用蓋非以為天下之人皆不可以順適其意也昔生民之初生而有飢寒牝牡之患飲食男女之際天下之所同欲也而聖人不求絶其情又從而為之節文教之炮燔烹飪嫁娶生養之道使皆得其志是以天下安其法而不怨後世有小丈夫不達其意之本末而以為禮義之教皆聖人之所作為以制天下之非僻徒見天下邪放之民皆不便於禮義之法乃欲務矯天下之情置其所好而施其所惡此何其不思之甚也且雖聖人不能有所特設以驅天下蓋因天下之所安而遂成其法如此而已如使聖人而不與天下同心違衆矯世以自立其説則天下幾何其不叛而去也今之説者則不然以為天下之私欲必有害於國之公事而國之公事亦必有所拂於天下之私欲分而異之使天下公私之際譬如胡越之不可以相通不恤人情之所不安而獨求見其所以為至公而無私者蓋事之不通莫不由此之故今夫人之情非其所樂而強使為之則皆有怏怏不快之心是故所為而無成所任而不稱其職臣聞方今之制吏之生於南者必置於北生於東者必投於西嶺南吳越之人而必使冒苦寒踐霜雪以治燕趙之事秦隴蜀漢之士而必使涉江湖衝霧露以守揚越之地雖其上之人逼而行之無所不從而行者望其所之怨嘆咨嗟不能以自安吏卒送迎於道路逺者涉數千里財用殫竭困弊於外既至而好惡不相通風俗不相習耳目之所見飲食之所便皆不得其當譬如僑居於他鄉其心常屑屑而不舒數日求去而不肯慮長久之計民不喜其吏而吏不喜其俗二者相與齟齬而不合以不暇有所施設而吏之坐於其地者莫不自以為天下之所不若而今之法為吏者不得還處其鄉里雖數百里之外亦輒不可而又以京師之所在而定天下逺近之次凡京師之人所謂近者皆四方之所謂至逺而京師之所謂逺者或四方之所謂近也今欲以近優纍勞之吏而不知其有不樂者為此之故也且夫人生於鄉閭之中其親戚墳墓不過百里之間至於千里之內則譬如道路之人亦何所施其私而又風俗相安上下相信知其利害而詳其好惡近者安處其近而逺者樂得其逺二者各獲其所求而無有求去之心耳目開明而心不亂可以容有所立凡此數者蓋亦無損於國矣而特守此區區無益之公此豈王者之意哉且三代之時九州之中建國千有八百大者不過百里而小者數十里數十里之間民之為士者有之為大夫者有之凡所以治其國人者亦其國人也安得異國之人而後用哉臣愚以謂如此之類可一切革去以順天下之欲今使天下之吏皆同為姦則雖非其鄉里而亦不可有所優容茍以為可任則雖其父母之國豈必多置節目以防其弊而况處之數百千里之間哉近來儒官與雜流俱以本土之人注選茍州縣以及郡佐二亦皆如之則善矣臣事策十祿胥史行文如風行水上大人之道行之而可名名之而可言布之天下而無疑施之後世而無愧堂堂乎立於四海雖一介之士而無所不安此其所以為大人之道歟今夫天下之人天子誰不役其力者而天下皆不敢以為非此誠得其可役之名而役之是以天子安坐於上而士大夫為之奔走於下大者為之運籌畫策治百官以濟其大事而小者為之按米鹽視鞭箠以奉其小職文吏為之簿書會計詳其出內取豫之數而使天下不敢欺武吏為之擐金被革習其戰陳攻鬬之事而使天下不敢犯勞苦其筋力而罄竭其思慮甚者捐首領暴骨肉於原野而不知避何者食其祿也至於田野之民耕田而食或生而不至市井然及其有稅而可役趨走於縣吏之前恭謹有禮不教而自習而其尤難者至使之斬捕盜賊挽弓巡徼疲弊而不敢求免此豈非食其地之故歟故夫天下之人凡天子之所得而使令者皆可得而名也而臣切怪府史胥徒古者皆有祿以食其家而其不足者皆得計口而受田以補其不給夫是以能使之盡力於公事而不恤其私計蓋周之所謂官田者府史胥徒之田也而今世之法收市人而補以為吏無祿以養其身而無田以畜其妻子又有鞭撲戮辱之患而天下之人皆喜為之其所以責之者甚煩且難而其所以使之者無名而可言而其甚者又使之反入錢而後補雖得復役而其所免不足以償其終身之勞此獨何也天子以無名使之而天下之人亦肯以無名而為之此豈可不求其情哉夫天子舉四海而寄之其臣郡縣之官又舉而寄之其郡縣之小吏刑法之輕重財用之多少無所不在是以掌倉庫者得以為盜而治獄訟者得以為姦為姦之利上足以養父母而下足以畜妻子其所以無故而安為之者為此之故也是以雖無爵祿之勸而可得而使雖有刑戮恥辱之患而不肯捨而去而其上之人驅其無祿之身而遇之以有祿之法恬不為怪此乃公使之為姦以當其所當得之祿而遂以為可得而使也如此則尚何以示天下臣愚以為凡人之在官不可以無故而用其力或使以其稅而或使以其祿故夫府史胥吏不可以無祿使也然臣觀之方今天下苦財用之不給而用度有所不足其勢必無以及此而古者周官之法民之為訟者入束矢為獄者入鈞金視其不直者而納其所入蓋自秦漢以來其法始廢而不用今臣亦欲使天下之至於獄者皆有所入於官以自見其直而其不直者亦皆沒其所入以為胥吏之俸祿辨其等差而别其多少以時給之以足其衣食之用其所以取之於民者不苛而其所以為利者甚博蓋上之於民常患其好訟而不直以身試法而無所畏忌刑之而又使之有入於官此所以深懲其心而又其所得止以厚吏此有以見乎非貪民之財也而為吏者可以無俟為姦而有以自養名正而言順雖其為姦從而戮之則亦無愧乎吾心嗚呼古之所謂名正者猶此類也夫唐宋八大家文鈔卷一百五十九
