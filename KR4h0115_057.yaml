body:
  text: 唐宋八大家文鈔巻五十四明茅坤撰廬陵文鈔二十六墓誌銘翰林侍讀學士給事中梅公墓誌銘直敘逼太史公翰林侍讀學士給事中梅公既卒之明年其孤及其兄之子堯臣來請銘以塟曰吾叔父病且亟矣猶卧而使我誦子之文今其塟宜得子銘以藏公之名在人耳目五十餘年前卒一嵗予始拜公於許公雖衰且病其言談詞氣尚足動人嗟予不及見其壮也然嘗聞長老道公咸平景徳之初一遇真宗言天下事合意遂以人主為知已當時搢紳之士望之若不可及已而擯斥流離四十年間白首翰林卒老一州嗟夫士果能自為材邪惟世用不用爾故子記公終始至於咸平景徳之際尤為詳焉良以悲其志也公諱詢字昌言世家宣城年二十六進士及第試挍書郎利豐監判官遷将作監丞知杭州仁和縣又遷著作佐郎舉御史臺推勘官時亦未之竒也咸平三年與考進士於崇政殿真宗過殿廬中一見以為竒材召試中書直集賢院賜緋衣銀魚是時契丹數冦河北李繼遷急攻靈州天子新即位鋭於為治公乃上書請以朔方授潘羅支使自攻取是謂以蠻夷攻蠻夷真宗然其言問誰可使羅支者公自請行天子惜之不欲使蹈兵間公曰茍活靈州而罷西兵何惜一梅詢天子壮其言因遣使羅支未至而靈州沒于賊召還遷太常丞三司户部判官數訪時事於是屢言西北事時邊将皆守境不能出師公請大臣臨邊督戰募遊兵擊賊論曹瑋馬知節才可用又論傅潛楊瓊敗績當誅而田紹斌王榮等可責其效以贖過凡數十事其言甚壮天子益器其材數欲以知制誥宰相有言不可者乃已其後繼遷卒為潘羅支所困而朝廷以兩鎮授徳明徳明頓首謝罪河西平天子亦再幸澶淵盟契丹而河北之兵解天下無事矣公既見疎不用初坐斷田訟失實通判杭州徙知蘇州又徙兩浙轉運使還判三司開拆司遷太常博士用封禪恩遷祠部員外郎又坐事出知濠州以刑部員外郎為荆湖北路轉運使坐擅給驛馬與人奔喪而馬死奪一官通判襄州徙知鄂州又徙蘇州天禧元年復為刑部員外郎陜西轉運使靈州弃已久公與秦州曹瑋得胡蘆河路可出兵無沙行之阻而能徑趨靈州遂請瑋居環慶以圖出師會瑋入為宣徽使不克而止遷工部郎中坐朱能反貶懐州團練副使再貶池州天聖元年拜度支員外郎知廣徳軍徙知楚州遷兵部員外郎知夀州又知陜府六年復直集賢院又遷工部郎中改直昭文館知荆南府召為龍圖閣待制糾察在京刑獄判流内銓改龍圖閣直學士知幷州未行遷兵部郎中樞宻直學士以往就遷右諫議大夫入知通進銀臺司復判流内銓改翰林侍讀學士羣牧使遷給事中知審官院以疾出知許州康定二年六月某日卒於官公好學有文尤喜為詩為人嚴毅修潔而材辯敏明少能慷慨見竒真宗自初召試感激言事自以謂君臣之遇已而失職逾二十年始復直於集賢比登侍從而門生故吏曩時所考進士或至宰相居大官故其視時人常以先生長者自處論事尤多發憤其在許昌繼遷之孫復以河西叛朝廷出師西方而公已老不復言兵矣享年七十有八以終梅氏逺出梅伯世久而譜不明公之皇曾祖諱超皇祖諱逺皆不仕父諱邈贈刑部侍郎夫人劉氏彭城縣君子五人長曰鼎臣官至殿中丞次曰寳臣皆先公卒次曰得臣太子中舎次曰輔臣前将作監丞次曰清臣大理評事公之卒天子贈賻優恤加得臣殿中丞清臣衛尉寺丞明年八月某日𦵏公宣州之某縣某鄉某原銘曰士之所難有藴無時偉歟梅公人主之知勇無不敢惟義之為困于翼飛中垂以歛一失其塗進退而坎理不終窮既晩而通惟其夀考福祿之隆翰林侍讀學士右諫議大夫楊公墓誌銘竒而錯落慶厯八年春翰林侍讀學士右諫議大夫楊公年六十有九告老即以工部侍郎致仕歸於常州其行也天子召見宴勞賜以不拜公卿大夫咸出餞於東門瞻望咨嗟相與言曰楊公歸哉於公計為可榮於國家計為可惜其明年九月十三日公疾革出其兵論一篇示其子忱慥而授以言曰臣聞臣子雖死不敢忘其君父者天下之至恩大義也今臣偕不幸猶以垂閉之口言天下莫大之憂為陛下無窮之慮者其事有五以畢臣志死無所恨惟陛下用臣言不必哀臣死也言訖而卒不及其私忱慥以其語并其兵論以聞天子震悼頋有司問可以寵公者有司舉故事以對天子曰此何足以慰吾思乃詔特贈公兵部侍郎公少師事种放學問為文章長於議論好讀兵書知古兵法以謂士不兼文武不足任大事當四方無事時數上書言邊事後二十餘年元昊叛河西契丹舉衆違約三邊皆警天下弊於兵公於此時耗精疲神日夜思慮創作兵車陣圖刀楯之屬皆有法天子以步卒五百如公之法試於庭以為可用而世多非其刀楯脩嘗奉使河東得邊将王吉言元昊出兎毛川為吉所敗者用楊公楯也葢世未嘗用其術爾然公素剛少合而議者不一故不得盡用其言夏竦經略陜西請益置土兵公言竦據内地無破賊之謀而坐請益兵葢虞敗事則欲以兵少為解竦復論公不忠沮計公不能忍以語詆之其後三路農民壮者咸墨為兵公又言兵在精不在衆衆而不練則不整而易敗困國而難供時自将相大臣議者皆務多兵獨公之論能如此劉平兵敗元昊圍延州甚急而救兵不至公在河中乃偽為書馳告延州救兵十萬至矣因命旁郡縣具芻糧什器如其數以俟已而元昊亦解去後公守幷州即詔公為并代麟府路經略安撫招討等使兼兵馬都部署公執勑告其羣吏曰天子用我矣然任其事必圖其效欲責其效必盡其方乃列六事以請曰能用臣言則受命不然則已朝廷難之公論不已坐是徙知邢州公志之不就皆此類也公嘗為御史章獻太后兄子劉從徳為團練使以卒其門人親戚厮養用從徳拜官爵者數十人馬季良以劉氏婿為龍圖閣直學士公上書言漢吕太后王禄産欲彊其族而反以覆宗唐武三思楊國忠之禍不獨其身㡬亡其國太后大怒貶監舒州酒税居二嵗復召為御史言事愈切公祥符元年進士及第以上書言事真宗竒之召試不赴拜著作佐郎累官至工部侍郎為天章閣待制龍圖閣樞宻直學士遂侍講于翰林嘗為審刑院詳議官知淮陽江陰軍三司度支判官知御史雜事判吏部流内銓三司度支副使河北河東都轉運使知河中府陜并邢滄杭五州所至皆有能績為人廉潔剛直少屈而難犯其仁心愛物至其有所能容人多所不及也公字次公曾祖諱偉祖諱某父諱守慶初娶張氏又娶李氏又娶王氏太原郡君六孫景畧景亮景謨景道景直景彦公卒之明年秋其子忱以其喪歸于河南又明年二月十七日塟于洛陽縣宣武管平洛鄉之先塋公有文集十巻兵書十五卷讀其書可以見公之志考其始終之節可以知公之心嗚呼可謂忠矣脩為諫官時嘗與公爭議于朝者而且未嘗識公也及其塟也其子不以銘屬於他人而以屬修者豈以修言為可信也歟然則銘之其可不信銘曰逺矣楊氏有來其始赤泉侯功與漢俱起震官太尉四世以公於陵正直僕射于唐師復理卿振左拾遺文蔚獲嘉其後益衰避亂中州曾祖始南祖屈偽邦令于烏江又適南粤皇考是生晦顯有時發于皇明在考司馬始仕坊州遂家中部道徳之優司馬四子唯公克大非徒大之将又長之世有官族孰無繫譜或絶於微或亡其序不絶不亡由屢有人誰如楊世愈久而蕃次第弗迷昭穆綿聨公其歸此安千萬年翰林侍讀學士右諫議大夫贈工部侍郎張公墓誌銘通篇以晦為案翰林侍讀學士朝散大夫右諫議大夫上柱國清河縣伯張公諱錫字貺之其先京兆長安人也其祖山甫從唐僖宗入蜀留不返蜀遭王孟再亂絶於中國中國更五代天下為宋而蜀平張氏留蜀葢亦已五世矣始得去為漢陽人又二世而張氏遂以大顯公為人清方敏黙為善不倦而喜自晦斂若不欲人知其遇人怡怡若無所不可及視其發施於事者其義有可畏其守有不可奪其能有不可及既已則若未嘗有所為者少喜讀書至其疾革猶不釋手自經史子集百家之説無不記覽通達而絶口不道於人故晩始侍讀于中上嘗歎曰自吾得張錫日益有所聞以飛白為博學二字賜之曰錫老矣恨得之晩也公初舉進士中大中祥符元年甲科試秘書省挍書郎知南昌縣遷萍鄉令改著作佐郎又知安逺縣徙知新州興學挍以教新人新人有進士自公始再遷太常博士監染院詔選能吏治畿縣公以選知東明前為令者闔門重簾以壅隔廢治公至則闢門去簾告其人曰吾所治者三而已彊恃力富恃貲刑恃贖者吾所先也其人以謂公言簡必信法簡必嚴於是豪勢者屈而善弱者伸縣以大治工部侍郎李及薦公材堪御史上曰李及清慎人未嘗妄有所舉此可信也乃以為監察御史故相丁謂貶崖州至是議徙内地公疏言謂姦邪弄國罪當死無可憐且大臣竄逐本與天下棄之今復内還是違天下意由是止徙雷州玉清昭應宫災坐火事劾當死者百餘人公疏言天災可畏不可反以罪人而重天怒願益修徳以塞譴人乃獲免公於御史自監察歴殿中侍御史侍御史知雜事於尚書為員外郎郎中累官至諫議大夫於外為荆湖北路京東河北轉運使江淮兩浙荆湖發運制置使利䕫路安撫使知河中府滑州於三司為鹽鐵判官判勾院歴鹽鐵度支戶部副使又嘗權知諫院判三班審官院太常寺國子監於侍從為天章閣待制龍圖閣直學士翰林侍讀學士雖其自晦其所居人皆以為宜其在京東籍淄青齊濮濟鄆六州之人冒耕河壖地收租緡絹嵗二十八萬而六州之民爭訟遂息其後言利者請税天下橋渡以佐軍公建言津梁利人而反税之以為害卒爭罷之平居退讓未嘗肯為人先妖賊王則反貝州兵圍久不克而自河以北軍餉調發益急轉運使受命者以疾留不行公自滑州權河北轉運使命至即日馳城下軍須皆如其期其於取舎緩急常如此公居家有常法雖貴顯衣服飲食如少賤時事母至孝與族兄甚相友愛人以為同産平生所為文章有集十巻公以皇祐元年七月十日遇疾卒于京師享年六十有八上聞震悼以白金三百兩賜其家特贈工部侍郎曾祖諱惟序不仕祖諱文翼復州録事㕘軍贈太子中舎父諱龜從贈右諫議大夫母南陽郡太君鄧氏自皇祖中舎君家于漢陽遂塟之至公始塟汝州之襄城某鄉某原實五年閏七月十七日也公初娶程氏再娶孫氏封樂安郡君先公五十日而卒公子五人曰子駿子充子雲子諒子真子真子充皆早卒於公之終也子駿子雲皆為大理評事子諒大理寺丞有孫十人女三人長適虞部員外郎杜樞次早卒㓜適大理寺丞王縡銘曰自足乎其中不求乎其外斯惟公之善晦仁能勇於必為善有應而無逺故公晦其終顯難於自進以晩見嗟而夀胡不俾其遐嗚呼其奈何尚書刑部郎中充天章閣待制兼侍讀贈右諫議大夫孫公墓誌銘公諱甫字之翰許州陽翟人也初舉進士天聖五年得同學究出身為蔡州汝陽縣主簿八年再舉進士及第為華州觀察推官轉運使李紘薦其材遷大理寺丞知絳州翼城縣故丞相杜祁公與紘皆以清節自高尤難於取士聞公紘所薦也數招致之一見大喜已而祁公自御史中丞拜樞密直學士知永興軍辟公司錄凡事之繁猥者一以委之公歎曰待我以此可以去矣祁公為謝頋事非他吏不能者不敢煩公公乃從容為陳當世之務所以緩急先後施設之宜又多薦士之賢而在下者於是祁公自以為得益友嵗滿知彭州永昌縣監益州交子務再遷太常博士祁公為樞密副使薦於朝得秘閣挍理是時諸将兵討靈夏久無功天下騷動盜賊數入州縣殺吏卒吏多失職而民弊矣天子方鋭意更用二三大臣乃極選一時知名士增置諫員使補闕失公以右正言居諫院上好納諫諍未嘗罪言者而至言宫禁事他人猶須委曲間諷而公獨曰所謂后者正嫡也其餘皆偏婢爾貴賤有等用物不宜過僭自古寵女色初不制而後不能制者其禍不可悔上曰用物在有司吾恨不知爾公曰世謂諫臣耳目官所以達不知也若所謂前世女禍者載在書史陛下可自知也上深嘉納之保州兵變前有告者大臣不時發之公因力言樞密使副當得罪使乃杜祁公也邊将劉滬城水洛于渭州部署尹洙以滬違節度将誅之大臣稍主洙議公以謂水洛通秦渭於國家利滬不可罪由是罷洙而釋滬洙公平生所善者也公在諫院所言補益尤多是三者其一人所難言其二人所難處者其後言宰相以某事當去者上亟為罷之因以陳執中為㕘知政事公又言執中不可用由是上難之公遂求解職於是小人不便大臣執政而朋黨之論起二三公相繼去位公亦在論中而辨諍愈切不自疑由是罷諫職以右司諫知鄧州徙知安州歴江南兩浙轉運使再遷兵部員外郎改直史館知陜府又徙晉州河東轉運使公素羸性淡然寡所好欲恂恂似不能言而内勁果遇事精明議者謂公道徳文學宜在朝廷備頋問而錢榖刀筆非其職然公處之益辦至臨疑獄滯訟常立得其情大賊張海郭貎山攻刼商鄧新破南陽順陽公安輯有方常曰教民知戰古法也乃親閲縣弓手教之擊射坐作皆為精兵盜賊為息陜當東西衝吏苦厨傳而前為守者頋毁譽不能有所損至公痛裁節之過客畏其清初無所望而亦莫之毁也陜人賴以紓後遂以為法其為轉運使所至州縣視其職事修廢察其民樂否以此升黜官吏而不納毁譽遇下雖嚴而不害其在兩浙范文正公守杭州以大臣或便宜行事公曰范公貴臣也吾屈於此則不得伸於彼矣由是一切繩以法而常以監司自處范公遇公無倦色及退而不能無恨公遇范公不少下然退而未嘗不稱其賢也自河東召為度支副使勤其職不以為勞已而得疾嘉祐元年遷刑部郎中天章閣待制河北都轉運使不行疾少間乃留侍讀公博學强記尤喜言唐事能詳其君臣行事本末以推見當時治亂每為人説如其身履其間而聴者曉然如目見故學者以謂終嵗讀史不如一日聞公論也所著唐史記七十五卷論議宏贍書未及成以嘉祐二年正月戊戌卒于家享年六十公既卒詔取其書藏于秘府贈右諫議大夫又有文集七巻公喜接士務揚人善所得俸廪多所施與撫諸孤兒教育如己子曾祖諱恕博州堂邑主簿祖諱賁尚書庫部員外郎考諱從革不仕以公貴累贈都官郎中母曰長安縣太君李氏娶程氏夀昌縣君子三人長曰宜滑州節度推官次曰寔曰寘皆将作監主簿女三人一適将作監主簿程著餘皆早亡以五年七月丁酉塟公于陽翟縣舊學鄉塢頭村之北原銘曰惟學而知方以行其義惟簡而無欲以遂其剛力雖弱兮志則强積之厚兮發也光宜夀兮奄以藏有深其泉兮有崇其岡永安其固兮百世無傷諫議大夫楊公墓誌銘本世系以次絫欷悲慨之㫖府君杭州錢塘人其譜曰漢太尉震之後世出𢎞農其後微遠不能譜録府君之九代祖隱朝始復得次序曰隱朝生燕客燕客生堪而猶為𢎞農人堪生承休是謂皇高祖唐天祐元年為刑部員外郎副給事中鄭祁使吳越冊錢鏐為王楊行宻亂江淮道阻不克歸遂留杭州始分𢎞農之籍籍錢塘初承休之行也挈其子巖以俱巖仕吴越國位至丞相是謂皇曾祖生尚書職方員外郎諱郾是謂皇祖生贈禮部尚書諱蠙是謂皇考府君㓜失其父有志節不羣諸兒母元夫人獨愛之夫人之喪尚書也内外之姻未嘗有見其笑者府君生十嵗作雪賦一篇始為之笑及長尤好學日必誦讀數萬言或晝夜不息臨食至失七筯已而病其目元夫人奪藏其書府君盜之亡鄰家以讀大宋受命太宗皇帝即位之三年吴越忠懿王朝京師以其地納籍有司吴越國除隨其皇祖以族行寓宋州三舉進士端拱二年中乙科歴蔡州新昌縣令遷著作佐郎知徳州為政有治迹詔書褒之咸平三年交趾獻馴犀府君以秘書丞監在京商税院因奏犀賦真宗嘉之召試學士院遷太常博士賦一時文士爭相傳誦不及明年又上書自薦獻所為文二十餘萬言乃直集賢院知袁筠二州提㸃開封府界諸縣入為三司鹽鐵判官知越州提㸃淮南刑獄為宰相王文穆公不悦以事罷之卒坐考試國子監生貶監陳州𣙜酒逾年得知常州復入三司判磨勘司丁元夫人憂服除判户部勾院比自薦及是二十七年矣然少孤能自立力勤苦為文章履其身以儉約不妄自為進取其官業行已之方一皆自信於聖人之道不肯少頋時之人所為而時之人亦以有徳君子名之故其直集賢院者二十七年不遷官由太常博士纔至刑部郎中有出其後者往往至榮顯或有笑其違世自守以質朴諷使少改其為者府君歎曰吾不學乎世而學乎聖人由是以至此吾之所有不敢以薦於人而嘗自獻於天子矣今欲孰附以進邪其信道深篤不可屈曲如此天聖四年以久次遷集賢修撰出知應天府同糾察在京刑獄轉兵部郎中六年年六十五老矣始召以知制誥府君與潁川陳從易皆以好古有文行知名然二人者皆久不用遂以老既而一日並用之是時學者稍相習務媮窳為文章在位稍以為患皆以謂天子用耆老将有意矣而又下詔書勑學者禁浮華使近古道然後以謂用二人皆不無意矣而皆恨其晩也居二嵗拜右諫議大夫集賢院學士出知亳州於州封虢略縣男食邑三百户明道二年四月十日以疾卒於州之正寝年六十有九其病将卒猶不廢學有文三十巻曰大隠集又五巻曰西垣集嗚呼畜其學以老不克用獨見於文章然其文卒待一施於朝廷遂位榮顯既貴贈其皇考禮部尚書母太原郡太君其婦曰漳南縣君張氏後夫人南陽郡君亦張氏廕其男長曰洎明州觀察支使次曰濬江陰軍司理㕘軍次曰泳漸沆渢皆将作監主簿既終又廕二孫某官其餘慶之及者三世則夫守道者未必果不遇也噫楊氏嘗以族顯於漢為三公者四世漢之亂更魏涉晉戕賊於夷胡而漢之大人苗裔盡矣比數百嵗下而及唐然楊氏之後獨在太和開成之間曰汝士者與虞卿魯士漢公又以名顯於唐居靖恭坊楊氏者大以其族著唐之亂極於懿僖昭三宗下更五姓天下庬裂焚蕩翦薙而唐之名臣之後盡矣又㡬百年至于今然楊氏之後獨在及府君又大顯始震嘗有徳於漢而死以無辜君子悼震曰不幸然孰知夫世不昌且久歟而府君又畜其徳則孰知其後世又不然歟於其塟也是宜銘銘葢所以使後世之有考也府君卒後若干年以景祐二年某月某日塟杭州某縣某鄉漳南縣君先府君二十六年以亡及是合塟自有誌府君初名侃後避真宗皇帝舊名改曰大雅字子正銘曰楊氏之先自震有聞有盛有衰世惟厥人由漢迄今更難冒亂歴時千年而世三顯府君之顯不彰于初其久不渝卒克以敷𢎞農之分遂播南土嗚呼徳則承先而塟也塋于祖唐宋八大家文鈔巻五十四
