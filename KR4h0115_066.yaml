body:
  text: 唐宋八大家文鈔卷六十二明茅坤撰廬陵史鈔二本紀唐莊宗紀通篇克用與全忠兩相搆釁處及莊宗所繼其父行事慷慨大略歐公一一點綴生色並如畫莊宗光聖神閔孝皇帝其先本號朱邪蓋出於西突厥至其後世别自號曰沙陀而以朱邪為姓唐德宗時有朱邪盡忠者居於北庭之金滿州貞元中吐蕃贊普攻陷北庭徙盡忠於甘州而役屬之其後贊普為回鶻所敗盡忠與其子執宜東走贊普怒追之及于石門關盡忠戰死執宜獨走歸唐居之鹽州以𨽻河西節度使范希朝希朝徙鎮太原執宜從之居之定襄神武川之新城其部落萬騎皆驍勇善騎射號沙陀軍執宜死其子曰赤心懿宗咸通十年神䇿大將軍康承訓統十八將討龎勛於徐州以朱邪赤心為太原行營招討沙陀三部落軍使以從破勛功拜單于大都護振武軍節度使賜姓名曰李國昌以之屬籍沙陀素強而國昌恃功益橫恣懿宗患之十二年徙國昌雲州刺史大同軍防禦使國昌稱疾拒命國昌子克用尤善騎射能仰中雙鳬為雲州守捉使國昌已拒命克用乃殺大同軍防禦使段文楚據雲州自稱留後唐以太僕卿盧簡方為振武節度使會幽并兵討之簡方行至鳯州軍潰由是沙陀侵掠代北為邉患矣明年僖宗即位以謂前太原節度使李業遇沙陀有恩而業已死乃以其子鈞為靈武節度使宣慰沙陀六州三部落使以招輯之拜克用大同軍防禦使居久之國昌出擊黨項吐渾赫連鐸襲破振武克用聞之自雲州往迎國昌而雲州人亦閉關拒之國昌父子無所歸因掠蔚朔間得兵三千國昌入保蔚州克用還據新城僖宗乃拜鐸大同軍使以李鈞為代北招討使以討沙陀乾符五年沙陀破遮虜軍又破岢嵐軍而唐兵數敗沙陀由此益熾北據蔚朔南侵欣代嵐石至于太谷焉廣明元年招討使李琢會幽州李可舉雲州赫連鐸擊沙陀克用與可舉相距雄武軍其叔父友金以蔚朔州降于琢克用聞之遽還可舉追至藥兒嶺大敗之琢軍夾擊又敗之于蔚州沙陀大潰克用父子亡入韃靼克用少驍勇軍中號曰李鴉兒其一目眇及其貴也又號獨眼龍其威名蓋於代北其在韃靼久之鬱鬱不得志又常懼其圖巳因時時從其羣豪射獵或挂針于木或立馬鞭百步射之輒中羣豪皆服以為神黃巢巳陷京師中和元年代北起軍使陳景思發沙陀先所降者與吐渾安慶等萬人赴京師行至絳州沙陀軍亂大掠而還景思念沙陀非克用不可將乃以詔書召克用於韃靼承制以為代州刺史鴈門以北行營節度使率蕃漢萬人出石嶺關過太原求發軍錢節度使鄭從讜與之錢千緡米千石克用怒縱兵大掠而還二年十一月景思克用復以步騎萬七千赴京師三年正月至于河中進屯乾坑巢黨驚曰鴉兒軍至矣二月敗巢將黃鄴於石隄谷三月又敗趙璋尚讓於良田坡橫尸三十里是時諸鎮兵皆會長安大戰渭橋賊敗走入城克用乘勝追之自光泰門先入戰望春宫升陽殿巢敗南走出藍田關京師平克用功第一天子拜克用檢挍司空同中書門下平章事河東節度使以國昌為鴈門以北行營節度使十月國昌卒十一月遣其弟克修攻昭義孟方立取其澤潞二州方立走山東以邢洺磁三州自别為昭義軍黃巢南走至蔡州降秦宗權遂攻陳州四年克用以兵五萬救陳州出天井關假道河陽諸葛爽不許乃自河中渡河四月敗尚讓於太康又敗黃鄴於西華巢且戰且走至中牟臨河未渡而克用追及之賊衆驚潰比至封丘又敗之巢脫身走克用追之一日夜馳二百里至于寃朐不及而還過汴州休軍封禪寺朱全忠饗克用於上源驛夜酒罷克用醉卧伏兵發火起侍者郭景銖滅燭匿克用牀下以水醒面而告以難會天大雨滅火克用得從者薛鐵山賀回鶻等隨電光縋尉氏門出還軍中七月至于太原訟其事于京師請加兵於汴遣弟克修將兵萬人屯于河中以待僖宗和解之用破巢功封克用隴西郡王光啓元年河中王重榮與宦者田令孜有隙徙重榮兖州以定州王處存為河中節度使詔克用以兵護處存之鎮重榮使人紿克用曰天子詔重榮俟克用至與處存共誅之因偽為詔書示克用曰此朱全忠之謀也克用信之八上表請討全忠僖宗不許克用大怒重榮既不肯徙僖宗遣邠州朱玫鳯翔李昌符討之克用反以兵助重榮敗玫于沙苑遂犯京師縱火大掠天子出居于興元克用退屯河中朱玫亦反以兵追天子不及得襄王熅迫之稱帝屯于鳯翔僖宗念獨克用可以破玫而不能使也當破黃巢長安時天下兵馬都監楊復恭與克用善乃遣諫議大夫劉崇望以詔書召克用且道復恭意使進兵討玫等克用陽諾而不行明年孟方立死其弟遷立大順元年克用擊破孟遷取邢洺磁三州乃遣安金俊攻赫連鐸於雲州幽州李匡威救鐸戰於蔚州金俊大敗於是匡威鐸及朱全忠等皆請因其敗伐之昭宗以克用破黃巢功髙不可伐下其事臺省四品官議議者多言不可宰相張濬獨以謂沙陀前逼僖宗幸興元罪當誅可伐軍容使楊復恭克用所善也亦極諫以為不可昭宗然之詔諭全忠等全忠隂賂濬使持其議益堅昭宗不得已以濬為太原四面行營兵馬都統韓建為副使是時潞州將馮霸叛降于梁梁遣葛從周入潞州唐以京兆尹孫揆為昭義軍節度使克用遣李存孝執揆於長子又遣康君立取潞州十一月濬及克用戰于隂地濬軍三戰三敗濬建遁歸克用兵大掠晉絳至于河中赤地千里克用上表自訴其辭慢侮天子為之引咎優詔答之二年二月復拜克用河東節度使隴西郡王加檢挍太師兼中書令四月攻赫連鐸于雲州圍之百餘日鐸走吐渾八月大搜于太原出晉絳掠懷孟至于邢州遂攻王鎔于鎮州克用柵常山西以十餘騎渡滹沱覘敵遇大雨平地水深數尺鎮人襲之克用匿林中禱其馬曰吾世有太原者馬不嘶馬偶不嘶以免前軍李存孝取臨城進攻元氏李匡威救鎔克用還軍邢州景福元年王鎔攻邢州李存信李嗣勳等敗鎔于堯山二月會王處存攻鎔戰于新市為鎔所敗八月李匡威攻雲州以牽克用之兵克用潛入于雲州返出擊匡威匡威敗走十月李存孝以邢州叛二年存孝求援於王鎔克用出兵井陘擊鎔且以書招鎔而急攻其平山鎔懼遂與克用通和獻帛五十萬匹出兵助攻邢州乾寧元年二月執存孝殺之冬攻幽州李匡儔棄城走追至景城見殺以劉仁恭為留後二年河中王重盈卒其諸子珂珙爭立克用請立珂鳯翔李茂貞邠寧王行瑜華州韓建請立珙昭宗初兩難之乃以宰相崔胤為河中節度使既而許克用立珂茂貞等怒三鎮兵犯京師聞克用亦起兵乃皆罷去六月克用攻絳州斬刺史王瑶瑶珙弟助珙以爭者七月至于河中同州王行約奔于京師陽言曰沙陀十萬至矣謀奉天子幸邠州茂貞假子閻圭亦謀劫幸鳯翔京師大亂昭宗出居于石門克用軍留月餘不進昭宗遣延王戒丕丹王允兄事克用且告急八月克用進軍渭橋以為邠寧四面行營都統昭宗還京師十一月克用擊破邠州王行瑜走至慶州見殺克用還軍雲陽請擊茂貞昭宗慰勞克用使與茂貞解仇以紓難拜克用忠正平難功臣封晉王是時晉軍渭北遇雨六十日或勸克用入朝克用未決都押衙蓋寓曰天子還自石門寢未安席若晉兵渡渭人情豈復能安勤王而巳何必朝哉克用笑曰蓋寓猶不信我况天下乎乃收軍而還三年正月昭宗復以張濬為相克用曰此朱全忠之謀也乃上表曰若陛下朝以濬為相則臣將暮至闕庭京師大恐濬命遽止朱全忠之攻兖鄆也克用遣李存信假道魏州以救朱宣等存信屯于莘縣軍士侵掠魏境羅𢎞信伏兵攻之存信敗走洺州克用自將擊魏戰于洹水亡其子落落六月破魏成安洹水臨漳等十餘邑十月又敗魏人于白龍潭進攻觀音門全忠救至乃解四年劉仁恭叛晉克用以兵五萬擊仁恭戰于安塞克用大敗光化元年朱全忠遣葛從周攻下邢洺磁三州克用遣周德威出青山口遇從周于張公橋德威大敗冬潞州守將薛志勤卒李罕之據潞州叛附于朱全忠二年全忠遣氏叔琮攻破承天軍又破遼州至于榆次周德威敗之于洞渦秋李嗣昭復取澤潞三年嗣昭敗汴軍于沙河復取洺州朱全忠自將圍之嗣昭走至青山口遇汴伏兵嗣昭大敗秋嗣昭取懷州是歲汴人攻鎮定鎮定皆絶晉以附于朱全忠天復元年全忠封梁王梁攻下晉絳河中執王珂以歸晉失三與國乃下意為書幣聘梁以求和梁王以為晉弱可取乃曰晉雖請盟而書辭慢因大舉擊晉四月氏叔琮入天井張文敬入新口葛從周入土門王處直入飛狐侯言入隂地叔琮取澤潞其别將白奉國破承天軍遼州守將張鄂汾州守將李瑭皆迎梁軍降晉人大懼會天大雨霖梁兵多疾皆解去五月晉復取汾州誅李瑭六月周德威李嗣昭取慈隰二年進攻晉絳大敗于蒲縣梁軍乘勝破汾慈隰三州遂圍太原克用大懼謀出奔雲州又欲奔丐奴未決而梁軍大疫解去周德威復取汾慈隰三州四年梁遷唐都于洛陽改元曰天祐克用以謂劫天子以遷都者梁也天祐非唐號不可稱乃仍稱天復五年會契丹阿保機於雲中約為兄弟六年梁攻燕滄州燕王劉仁恭來乞師克用恨仁恭反覆欲不許其子存朂諌曰此吾復振之時也今天下之勢歸梁者十七八強如趙魏中山莫不聽命是自河以北無為梁患者其所憚者惟我與仁恭耳若燕晉合勢非梁之福也夫為天下者不顧小怨且彼常困我而我急其難可因以德而懷之是謂一舉而兩得此不可失之機也克用以為然乃為燕出兵攻破潞州梁圍乃解去以李嗣昭為潞州留後七年梁兵十萬攻潞州圍以夾城遣周德威救潞州軍于亂栁冬克用疾是嵗梁滅唐克用復稱天祐四年正月辛卯克用卒年五十三子存朂立葬克用於鴈門存朂克用長子也初克用破孟方立于邢州還軍上黨置酒三垂岡伶人奏百年歌至于衰老之際聲辭甚悲坐上皆悽愴時存朂在側方五嵗克用慨然捋鬚指而笑曰吾行老矣此竒兒也後二十年其能代我戰于此乎存朂年十一從克用破王行瑜遣獻捷于京師昭宗異其狀貌賜以鸂鶒巵翡翠盤而撫其背曰兒有竒表後當富貴無忘豫家及長善騎射膽勇過人稍習春秋通大義尤喜音聲歌舞俳優之戲天祐五年正月即王位于太原叔父克寧殺都虞候李存質幸臣史敬鎔告克寧謀叛二月執而戕之且以先王之喪叔父之難告周德威德威自亂栁還軍太原梁夾城兵聞晉有大喪德威軍且去因頗懈王謂諸將曰梁人幸我大喪謂我少而新立無能為也宜乘其怠擊之乃出兵趨上黨行至三垂岡歎曰此先王置酒處也會天大霧晝暝兵行霧中攻其夾城破之梁軍大敗凱旋告廟九月蜀王王建岐王李茂貞及楊崇本攻梁大安晉亦遣周德威攻其晉州敗梁軍于神山六年劉知俊叛梁來乞師王自將至隂地關遣周德威攻晉州敗梁軍于蒙坑七年冬梁遣王景仁攻趙趙王王鎔來乞師諸將皆疑鎔詐未可出兵王不聽乃救趙八年正月敗梁軍于柏鄉斬首二萬級獲其將挍三百人馬三千匹進攻邢州不下留兵圍之去攻魏别遣周德威徇梁夏津髙唐攻博州破東武朝城遂擊黎陽臨河淇門掠新鄉共城燕王劉守光聞晉攻梁深入乃大治兵聲言助晉王患之乃旋師七月會趙王王鎔于承天軍劉守光稱帝于燕九年正月遣周德威會鎮定以攻燕守光求救于梁梁軍攻趙屠棗強李存審擊走之八月朱友謙以河中叛于梁來降梁遣康懷英討友謙友謙復臣于梁而亦隂附于晉十年十月劉守光請降王如幽州守光背約不降攻破之十一年殺燕王劉守光于太原用其父仁恭于鴈門於是趙王王鎔北平王王處直奉册推王為尚書令始建行臺七月攻梁邢州戰于張公橋晉軍大敗十二年魏州軍亂賀德倫以魏博二州叛于梁來附王入魏州行至永濟誅其亂首張彥以其兵五百自衛號帳前銀槍軍六月王兼領魏博節度使取德州七月取澶州劉鄩軍于洹水王率百騎覘其營遇鄩伏兵圍之數重決圍而出亡七八騎八月梁復取澶州晉軍與鄩對壘于莘晉軍數挑戰鄩閉壁不出十三年正月王留李存審于莘聲言西歸鄩聞晉王且去即引兵擊魏攻城東王行至貝州返擊鄩大敗之追至于故元城又敗之鄩走黎陽三月攻梁衛州降其刺史米昭克磁州殺其刺史靳昭四月克洺州八月圍邢州降其節度使閻寶梁張筠棄相州戴思逺棄滄州而逃遂取二州而貝州人殺梁守將張源德以城降契丹寇蔚州執振武節度使李嗣本千四年契丹冦新州遂寇幽州李嗣源擊走之冬梁謝彥章軍于楊劉十二月攻楊劉王自負芻以堙塹遂破之十五年正月梁晉相拒于楊劉彥章決河水以隔晉軍六月渡水擊彥章破其四寨八月大閲于魏合盧龍橫海昭義安國及鎮定之兵十萬馬萬匹軍于麻家渡謝彥章軍于行臺十二月進軍臨濮梁軍追之戰于胡栁晉軍大敗周德威死之梁軍暮休于土山晉軍復擊大敗之遂軍德勝為夾寨十六年正月王兼領盧龍軍節度使梁王瓚攻德勝南城不克十月廣德勝北城十二月敗梁軍于河南十七年朱友謙襲同州梁遣劉鄩擊友謙李存審敗梁軍于同州十八年正月魏州僧傳真獻唐受命寶一趙將張文禮弒其君鎔文禮來請命二月以文禮為鎮州兵馬留後三月河中節度使朱友謙昭義軍節度使李嗣昭橫海軍節度使李存審義武軍節度使王處直安國軍節度使李嗣源鎮州兵馬留後張文禮領天平軍節度使閻寶大同軍節度使李存璋振武軍節度使李存進匡國軍節度使朱令德請王即皇帝位王三辭友謙等三請王曰豫當思之八月遣趙王王鎔故將符習及閻寶史建瑭等攻張文禮於鎮州建瑭取趙州張文禮卒其子處瑾閉城拒守九月建瑭戰死十月梁戴思逺攻德勝北城李嗣源敗之于戚城王處直叛附于契丹其子都幽處直以來附十二月契丹寇涿州遂寇定州十九年正月敗契丹于新城望都追奔至于幽州三月閻寶敗于鎮州以李嗣昭代之四月嗣昭戰死以李存進代之八月梁取衛州九月存進敗鎮人于東垣存進戰死十月李存審克鎮州王兼領成德軍節度使同光元年春三月李繼韜以潞州叛附于梁夏四月巳巳皇帝即位大赦改元國號唐嗚呼世久而失其傳者多矣豈獨史官之謬哉李氏之先蓋出於西突厥本號朱邪至其後世别自號曰沙陀而以朱邪為姓拔野古為始祖其自序云沙陀者北庭之磧也當唐太宗時破西突厥諸部分同羅僕骨之人於此磧置沙陀府而以其始祖拔野古為都督其傳子孫數世皆為沙陀都督故其後世因自號沙陀然豫考於傳記其説皆非也突厥無姓氏朱邪部族之號耳拔野古與朱邪同時人非其始祖而唐太宗時未嘗有沙陀府也唐太宗破西突厥分其諸部置十三州以同羅為龜林都督府僕骨為金微都督府拔野古為幽陵都督府未嘗有沙陀府也當是時西突厥有鐡勒薛延陀阿史那之類為最大其别部有同羅僕骨拔野古等以十數蓋其小者也又有處月處密諸部又其小者也朱邪者處月别部之號耳太宗二十二年巳降拔野古其明年阿史那賀魯叛至髙宗永徽二年處月朱邪孤注從賀魯戰于牢山為契苾何力所敗遂沒不見後百五六十年當憲宗時有朱邪盡忠及子執宜見於中國而自號沙陀以朱邪為姓矣蓋沙陀者大磧也在金莎山之陽蒲類海之東自處月以來居此磧號沙陀突厥而突厥無文字傳記朱邪又微不足録故其後世自失其傳至盡忠孫始賜姓李氏後大而外域之人遂以沙陀為貴種云唐明宗紀明宗聖德和武欽孝皇帝世本沙陀無姓氏父電為鴈門部將生子邈佶烈以騎射事太祖為人質厚寡言執事恭謹太祖養以為子賜名嗣源梁攻兖鄆朱宣朱瑾來乞師太祖遣李存信將兵三萬救之存信留莘縣不進使嗣源别以兵三千先擊梁兵梁兵解去存信留莘縣久之為羅宏信所襲存信敗走嗣源獨殿而還太祖以嗣源所將騎五百號橫衝都光化三年李嗣昭攻梁邢洺出青山遇葛從周兵嗣昭大敗走梁兵追之嗣源從間道後至謂嗣昭曰為公一戰乃解鞍礪鏃慿髙為陳左右指畫梁追兵望之莫測嗣源急呼曰吾取葛公士卒可無動乃馳騎犯之出入奮擊嗣昭繼進梁兵解去嗣源身中四矢太祖解衣賜藥以勞之由是李橫衝名重四方梁晉相拒于柏鄉梁龍驤軍以赤白馬為兩陳旗幟鎧仗皆如馬色晉兵望之皆懼莊宗舉鍾以飲嗣源曰卿望梁家赤白馬懼乎雖吾亦怯也嗣源笑曰有其表爾翌日歸吾廄也莊宗大喜曰卿當以氣吞之因舉鍾飲釂奮檛馳騎犯其白馬挾二禆將而還梁兵敗以功拜代州刺史莊宗攻劉守光嗣源及李嗣昭將兵三萬别出飛狐定山後取武媯儒三州莊宗已平魏州因徇下礠相拜相州刺史昭德軍節度使久之徙鎮安國契丹攻幽州莊宗遣嗣源與閻寶等擊走之同光元年徙鎮橫海是時梁唐相拒于河上李繼韜以潞州叛降梁莊宗有憂色召嗣源帳中謂曰繼韜以上黨降梁而梁方急攻澤州吾出不意攻其鄆州以斷梁右臂可乎嗣源對曰夾河之兵久矣茍非出竒則大計不決臣請獨當之乃以步騎五千涉濟至鄆州鄆人無備遂襲破之即拜天平軍節度使蕃漢馬步軍副總管梁軍攻破德勝南柵莊宗退保楊劉王彥章急攻鄆州莊宗悉軍救之嗣源為前鋒擊敗梁軍追至中都擒彥章及梁監軍張漢傑彥章雖敗而段凝悉將梁兵屯河上莊宗未知所嚮諸將多言乘勝以取青齊嗣源曰彥章之敗凝猶未知使其聞之遲疑定計亦須三日縱使料吾所嚮亟發救兵必渡黎陽數萬之衆舟楫非一日具也此去汴州不數百里前無險阻方陳而行信宿可至汴州已破段凝豈足顧哉而郭崇韜亦勸莊宗入汴莊宗以為然遣嗣源以千騎先至汴攻封丘門王瓚開門降莊宗後至見嗣源大喜手攬其衣以頭觸之曰天下與爾共之拜中書令二年莊宗祀天南郊賜以鐡劵五月破楊立于潞州六月徙鎮宣武兼蕃漢內外馬步軍總管冬契丹侵漁陽嗣源敗之于涿州三年徙鎮成德莊宗幸鄴請朝行在不許貞簡太后疾請入省又不許太后崩請赴山陵許之而契丹侵邉乃止十二月遂朝于洛陽天成元年郭崇韜朱友謙皆以讒死嗣源以名位髙亦見疑忌趙在禮反於魏大臣皆請遣嗣源討賊莊宗不許羣臣屢請莊宗不得已而遣之三月壬子嗣源至魏屯御河南在禮登樓謝罪甲寅軍變嗣源入于魏與在禮合夕出止魏縣丁已以其兵南遣石敬瑭將三百騎為先鋒嗣源行過巨鹿掠小坊馬二千匹以益軍壬申入汴州四月丁亥莊宗崩巳丑入洛陽甲午監國朝羣臣于興聖宫乙未中門使安重誨為樞密使殺元行欽及租庸使孔謙壬寅左驍衛大將軍孔循為樞密使丙午始奠于西宫皇帝即位于柩前易斬衰以衮冕壬子魏王繼岌薨甲寅大赦改元嗚呼自古治世少而亂世多三代之王有天下者皆數百年其可道者數君而已况於後世邪况於五代邪豫聞長老為豫言明宗雖出夷狄而為人純質寬仁愛人於五代之君有足稱也嘗夜焚香仰天而祝曰臣本蕃人豈足治天下世亂久矣願天早生聖人自初即位減罷宫人伶官廢內藏庫四方所上物悉歸之有司廣夀殿火災有司理之請加丹雘喟然嘆曰天以火戒我豈宜增以侈邪嵗嘗旱巳而雪暴坐庭中詔武德司宫中無得掃雪曰此天所以賜我也數問宰相馮道等民間疾苦聞道等言穀帛賤民無疾疫則欣然曰吾何以堪之當與公等作好事以報上天吏有犯贓輒置之死曰此民之蠧也以詔書褒亷吏孫嶽等以風示天下其愛人恤物蓋亦有意於治矣其即位時春秋已髙不邇聲色不樂遊畋在位十年於五代之君最為長世兵革粗息年屢豐登生民實賴以休息然夷狄性果仁而不明屢以非辜誅殺臣下至於從榮父子之間不能慮患為防而變起倉卒陷之以大惡帝亦由此飲恨而終當是時大理少卿康澄上疏言時事其言曰為國家者有不足懼者五深可畏者六三辰失行不足懼天象變見不足懼小人訛言不足懼山崩川竭不足懼水旱蟲蝗不足懼也賢士藏匿深可畏四民遷業深可畏上下相徇深可畏亷恥道消深可畏毁譽亂真深可畏直言不聞深可畏也識者皆多澄言切中時病若從榮之變任圜安重誨等之死可謂上下相徇而毁譽亂真之蔽矣然澄之言豈止一時之病凡為國者可不戒哉唐宋八大家文鈔卷六十二
