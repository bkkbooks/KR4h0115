body:
  text: 唐宋八大家文鈔巻七十七明茅坤撰廬陵史鈔十七論嗚呼五代禮樂文章吾無取焉其後世有必欲知之者不可以遺也作司天職方考司天考論司天掌日月星辰之象周天一嵗四時二十四氣七十二候行十日十二辰以為厯而謹察其變者以為占占者非常之兆也以驗吉凶以求天意以覺人事其術藏於有司厯者有常之數也以推寒暑以先天道以勉人事其法信於天下術有時而用法不可一日而差差之毫釐則亂天人之序乖百事之時蓋有國之所重也然自堯命羲和見於書中星閏餘略存其大法而三代中間千有餘嵗遺文曠廢六經無所述而孔子之徒亦未嘗道也至於後世其學一出於隂陽之家其事則重其學則末夫天人之際逺哉微矣而使一藝之士布算積分上求數千萬嵗之前必得甲子朔旦夜半冬至而日月五星皆㑹於子謂之上元以為厯始蓋自漢而後其説始詳見于世其源流所自止於如此是果堯舜三代之法歟皆不可得而考矣然自是以来厯家之術雖世多不同而未始不本于此五代之初因唐之故用崇𤣥歴至晉髙祖時司天監馬重績始更造新歴不復推古上元甲子冬至七曜之㑹而起唐天寳十四載乙未為上元用正月雨水為氣首初唐建中時術者曹士為始變古法以顯慶五年為上元雨水為嵗首號符天歴然世謂之小歴祇行於民間而重績乃用以為法遂施于朝廷賜號調元歴然行之五年輒差不可用而復用崇𤣥歴周廣順中國子博士王處訥私撰明𤣥歴于家民間又有萬分歴而蜀有永昌歴正象歴南唐有齊政歴五代之際歴家可考見者止於此而調元歴法既非古明𤣥又止藏其家萬分止行於民間其法皆不足紀而永昌正象齊政歴皆止用於其國今亦亡不復見世宗即位外伐僭叛内脩法度端明殿學士王朴通於歴數乃詔朴撰定嵗餘朴奏曰臣聞聖人之作也在乎知天之變者也人情之動則可以言知之天道之動則當以數知之數之為用也聖人以之觀天道焉嵗月日時由斯而成隂陽寒暑由斯而節四方之政由斯而行夫為國家者履端立極必體其元布政考績必因其嵗禮動樂舉必正其朔三農百工必順其時五刑九伐必順其氣庶務有為必從其日月是以聖人受命必治歴數故五紀有常度庶徴有常應正朔行之于天下也自唐之季凡歴數朝亂日失天垂將百載天之歴數汨陳而已陛下順考古道寅畏上天咨詢庶官振舉墜典臣雖非能者敢不奉詔乃包萬象以為法齊十政以立元測圭箭以候氣審朓朒以定朔明九道以步月校遲疾以推星考黄道之斜正辯天勢之昇降而交蝕詳焉夫立天之道曰隂與陽隂陽各有數合則化成矣陽之䇿三十六隂之䇿二十四奇偶相命兩陽三隂同得七十二何則隂陽之數合七十二者化成之數也化成則謂之五行之數五行之得朞數過之者謂之氣盈不及者謂之朔虚至於應變分用無所不通故以七十二為經法經者常用之法也百者數之節也隨法進退不失舊位故謂之通法以通法進經法得七千二百謂之統法自元入經先用此法統歴之諸法也以通法進統法得七十二萬氣朔之下收分必盡謂之全率以通法進全率得七千二百萬謂之大率而元紀生焉元者嵗月日時皆甲子日月五星合在子當盈縮先後之中所謂七政齊矣古者植圭於陽城以其近洛也蓋尚慊其中乃在洛之東偏開元十二年遣使天下候影南距林邑北距横野中得浚儀之岳臺應南北弦居地之中大周建國定都於汴樹圭置箭測岳臺晷漏以為中數晷漏正則日之所至氣之所應得之矣日月皆有盈縮日盈月縮則後中而朔月盈日縮則先中而朔自古朓朒之法率皆平行之數入歴既有前次而又衰稍不倫皇極舊術則迂迴而難用降及諸歴則疎逺而多失今以月離朓朒隨歴校定日躔朓朒臨用加減所得者入離定日也一日之中分為九限每限損益衰稍有倫朓朒之法可謂審矣赤道者天之紘帶也其勢圜而平紀宿度之常數焉黄道者日軌也其半在赤道内半在赤道外去極二十四度當與赤道近則其勢斜當與赤道逺則其勢直當斜則日行宜遲當直則日行宜速故二分前後加其度二至前後減其度九道者月軌也其半在黄道内半在黄道外去極逺六度出黄道謂之正交入黄道謂之中交若正交在秋分之宿中交在春分之宿則比黄道益斜若正交在春分之宿中交在秋分之宿則比黄道反直若正交中交在二至之宿則其勢差斜故挍去二至二分逺近以考斜正乃得加減之數自古雖有九道之説蓋亦知而未詳徒有祖述之文而無推步之用今以黄道一周分為八節一節之中分為九道盡七十二道而使日月無所隠其斜正之勢焉九道之法可謂明矣星之行也近日而疾逺日而遲去日極逺勢盡而留自古諸歴分段失實隆降無凖今日行分尚多次日便留自留而退惟用平行仍以入段行度為入歴之數皆非本理遂至乖戾今挍逐日行分積以為變段然後自疾而漸遲勢盡而留自留而行亦積㣲而後多别立諸段變歴以推變差俾諸段變差際㑹相合星之遲疾可得而知之矣自古相傳皆謂去交十五度以下則日月有蝕殊不知月月之相掩與闇虚之所射其理有異今以日月徑度之大小校去交之逺近以黄道之斜正天勢之昇降度仰視旁視之分數則交虧得其實矣臣考前世無食神首尾之文近自司天卜祝小術不能舉其大體遂為等接之法蓋從假用以求徑捷於是乎交有逆行之數後學者不能詳知因言歴有九曜以為注歴之常式今並削而去之謹以步日步月歩星步發歛為四篇合為歴經一巻歴十一巻草三巻顯徳三年七政細行歴一巻以為欽天歴昔在帝堯欽若昊天陛下考歴象日月星辰唐堯之道也天道𤣥逺非微臣之所盡知世宗嘉之詔司天監用之以明年正月朔旦為始昔孔子作春秋而天人備予述本紀書人而不書天予何敢異於聖人哉其文雖異其意一也自堯舜三代以来莫不稱天以舉事孔子刪詩書不去也蓋聖人不絶天於人亦不以天參人絶天於人則天道廢以天參人則人事惑故常存而不究也春秋雖書日蝕星變之類孔子未嘗道其所以然者故其弟子之徒莫得有所述於後世也然則天果與於人乎果不與於人乎曰天吾不知質諸聖人之言可也易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙此聖人極論天人之際最詳而明者也其於天地鬼神以不可知為言其可知者人而已夫日中則昃盛衰必復天吾不知吾見其虧益於物者矣草木之成者變而衰落之物之下者進而流行之地吾不知吾見其變流於物者矣人之貪滿者多禍其守約者多福鬼神吾不知吾見人之禍福者矣天地鬼神不可知其心則因其著於物者以測之故據其迹之可見者以為言曰虧益曰變流曰害福若人則可知者故直言其情曰好惡其知與不知異辭也參而㑹之與人無以異也其果與於人乎不與於人乎則所不知也以其不可知故常尊而逺之以其與人無所異也則修吾人事而已人事者天意也書曰天視自我民視天聽自我民聽未有人心悦於下而天意怒於上者未有人理逆於下而天道順於上者然則王者君天下子生民布徳行政以順人心是之謂奉天至於三辰五星常動而不息不能無盈縮差忒之變而占之有中有不中不可以為常者有司之事也本紀所述人君行事詳矣其興亡治亂可以見至於三辰五星逆順變見有司之所占者故以其官誌之以備司天之所考嗚呼聖人既沒而異端起自秦漢以来學者惑於災異矣天文五行之説不勝其繁也予之所述不得不異乎春秋也考者可以知焉職方考論太史公諸王表序為絶佳而歐公職方論似勝須千百隻眼始得之嗚呼自三代以上莫不分土而治也後世鑒古矯失始郡縣天下而自秦漢以来為國孰與三代長短及其亡也未始不分至或無地以自存焉蓋得其要則雖萬國而治失其所守則雖一天下不能以容豈非一本於道徳哉唐之盛時雖名天下為十道而其勢未分既其衰也置軍節度號為方鎮鎮之大者連州十餘小者猶兼三四故其兵驕則逐帥帥强則叛上土地為其世有干戈起而相侵天下之勢自兹而分然唐自中世多故矣其興衰救難常倚鎮兵扶持而侵凌亂亡亦終以此豈其利害之理然歟自僖昭以来日益割裂梁初天下别為十一南有吳浙荆湖閩漢西有岐蜀北有燕晉而朱氏所有七十入州以為梁莊宗初起并代取幽滄有州三十五其後又取梁魏博等十有六州合五十一州以滅梁岐王稱臣又得其州七同光破蜀已而復失惟得秦鳯階成四州而營平二州陷于契丹其増置之州一合一百二十三州以為唐石氏入立獻十有六州于契丹而得蜀金州又増置之州一合一百九州以為晉劉氏之初秦鳯階成復入于蜀隠帝時増置之州一合一百六州以為漢郭氏代漢十州入于劉旻世宗取秦鳯階成瀛漠及淮南十四州又増置之州五而廢者三合一百一十八州以為周宋興因之此中國之大略也其餘外屬者彊弱相并不常其得失至于周末閩已先亡而在者七國自江以下二十一州為南唐自劍以南及山南西道四十六州為蜀自湖南北十州為楚自浙東西十三州為吴越自嶺南北四十七州為南漢自太原以北十州為東漢而荆歸陜三州為南平合中國所有二百六十八州而軍不在焉唐之封疆逺矣前史備載而覊縻寄治虚名之州在其間五代亂世文字不完而時有廢省又或陷于夷狄不可考究其詳其可見者具之如譜唐宋八大家文鈔巻七十七
