body:
  text: 唐宋八大家文鈔卷一百五十六明茅坤撰潁濱文鈔十二論新論上此三篇原是一意其所言為國之地即子瞻所謂為國先定其規模之說而中篇指言吏偷兵冗財絀三者亦皆子瞻所建議處特其行文於舉子業中為利轍姑録而存之古之君子因天下之治以安其成功因天下之亂以濟其所不足不誣治以為亂不援亂以為治援亂以為治是愚其君也誣治以為亂是脅其君也愚君脅君是君子之所不忍而世俗之所僥幸也故莫若言天下之勢試請言當今之勢當今天下之事治而不至於安亂而不至於危紀綱粗立而不舉無急變而有緩病此天下之所共知而不可欺者也然而世之言事者為大則曰無亂為異則曰有變以為無亂則可以無所復為以為有變則其勢常至於更制是二者皆非今世之忠言至計也今世之弊患在欲治天下而不立為治之地夫有意於為治而無其地譬猶欲耕而無其田欲賈而無其財雖有鉏耰車馬精心彊力而無所施之故古之聖人將治天下常先為其所無有而補其所不足使天下凡可以無患而後徜徉翺翔惟其所欲為而無所不可此所謂為治之地也為治之地既立然後從其所有而施之植之以禾而生禾播之以菽而生菽藝之以松柏梧檟叢莽朴樕無不盛茂而如意是故施之以仁義動之以禮樂安而受之而為王齊之以刑法作之以信義安而受之而為霸督之以勤儉厲之以勇力安而受之而為彊國其下有其地而無以施之而猶得以安存最下者抱其所有悵悵然無地而施之撫左而右動鎮前而後起不得以安全而救患之不給故夫王霸之略富强之利是為治之具而非為治之地也有其地而無其具其弊不過於無功有其具而無其地吾不知其所以用之昔之君子惟其才之不同故其成功不齊然其能有立於世未始不先為其地也古者伏羲神農黃帝既有天下則建其父子立其君臣正其夫婦聯其兄弟殖之五種服牛乘馬作為宫室衣服器械以利天下天下之人生有以養死有以葬歡樂有以相愛哀戚有以相弔而後伏羲神農黃帝之道得行於其間凡今世之所謂長幼之節生養之道者是上古為治之地也至於堯舜三代之君皆因其所闕而時補之故堯命羲和厯日月以授民時舜命禹平水土以定民居命益驅鳥獸以安民生命棄播百穀以濟民饑三代之間治其井田溝洫步畝之法比閭族黨州鄉之制夫家卒乘車馬之數冠婚喪祭之節歲時交㑹之禮養生除害之術所以利安其人者凡皆已定而後施其聖人之德是故施之而無所齟齬舉今周官三百六十人之所治者皆其所以為治之地而聖人之德不與也故周之衰也其詩曰雖無老成人尚有典刑由此言之幽厲之際天下亂矣而文武之法猶在也文武之法猶在而天下不免於亂則幽厲之所以施之者不仁也施之者不仁而遺法尚在故天下雖亂而不至於遂亡及其甚也法度大壞欲為治者無容足之地泛泛乎如乘舟無楫而浮乎江湖幸而無振風之憂則悠然惟水之所漂東西南北非吾心也不幸而遇風則覆沒而不能止故三季之極乘之以暴君加之以虐政則天下塗地而莫之救然世之賢人起於亂亡之中將以治其國家亦必於此焉先之齊桓用管仲辨四民之業連五家之兵卒伍整於里軍旅整於郊相地而征山林川澤各致其時陵阜陸墐各均其宜邑鄉縣屬各立其正舉齊國之地如畫一之可數於是北伐山戎南伐楚九合諸侯存邢衛定魯之社稷西尊周室施義於天下天下稱伯晉文反國屬其百官賦職任功輕關易道通商寬農懋穡勸分省財足用利器明德舉善援能政平民阜財用不匱然後入定襄王救宋衛大敗荆人於城濮追齊桓之烈天下稱之曰二伯其後子産用之於鄭大夫種用之於越商鞅用之於秦諸葛孔明用之於蜀王猛用之於符堅而其國皆以富强是數人者雖其所施之不同而其所以為地者一也夫惟其所以為地者一故其國皆以安存惟其所施之不同故王霸之不齊長短之不一是二者不可不察也當今之世無惑乎天下之不躋於大治而亦不陷於大亂也祖宗之法具存而不舉百姓之患略備而未極賢人君子不知尤其地之不立而罪其所施之不當種之不生而不知其無容種之地也是亦大惑而已矣且夫其不躋於大治與不陷於大亂是在治亂之間也徘徊倣徨於治亂之間而不能自立雖授之以賢才無所為用不幸而加之以不肖天下遂敗而不可治故曰莫若先立其地其地立而天下定矣新論中治國而為其地非聖人而後然也古之君子莫不皆然而其不然者則僅存之國也人之治其家也其最上者為虞舜其次為曾閔而其次猶得為天下之良人其下者乃有不慈不孝置其不慈不孝蓋自其得為良人以上至於為舜其所以治其身上以事其父母下以化服其妻子者不同而其所以為生者子耕於田婦織於室養其雞豚殖其菜茹無失其時以養生送死雖舜與天下之良人均也舜而不然不得以為舜天下之人不然不得以為良人何者是亦治家之地焉耳而至於為國而豈獨無之昔者文王之治岐也耕者九一故周公因之建為步畝溝洫之制何者其所因者治世之成法也孔子之治魯也魯人獵較孔子亦獵較何者其所因者衰世之餘制也當戰國之彊諸侯無道然孟子亦以為有王者起今之諸侯不可盡誅惟教之不改而後誅之故漢之興也因秦之故而不害其為漢唐之興也因隋之故而不害其為唐由此觀之則夫享國之長短致化之薄厚其地能容之而不能使之也地不能使之長短薄厚然長不得地則無所效其長厚不得地則無所致其厚故夫有地而可以容有所為者舉而就之可也當今之世祖宗之法或具存而不舉或簡略而不備具存而不舉是有地而不耕也簡略而不備是地有所廢缺而不完也欲築室者先治其基基完以平而後加石木焉故其為室也堅今之治天下則不然蓋嘗論之自五代以來彊臣專國則天下震動而易亂自吾祖宗削而漸磨之則今世可以粗安凡今世之所恃以為安者惟無彊臣而已然恃其一之粗安也而盡忘其餘故嘗以為當今有三不立由三不立故百患並起而百善並廢何者天下之吏偷惰茍且不治其事事日巳敗而上不知是一不立也天下之兵驕脆無用召募日廣而臨事不獲其力是二不立也天下之財出之有限而用之無極為國百年而不能以富是三不立也基未平也加之以其所欲為是故興一事而百弊作動一役而天下困投足而遇陷穽側身而入河海平居猶懼有患而况求以馳騁於其上哉固不可矣今夫邊陲之患是中國之一病也吾欲拒之則有以為拒之之具和之則有以為和之之費以天下而待一國其為有餘力也固亦宜矣而何至使天下皆被其患今也天下幸而無他患難而唯西北之為畏然天下之力亦已困而不能支矣一歲之入不能供一歲之出是非特納賂之罪也三事不立之過也故三事立為治之地既成賂之則為漢文帝不賂則為唐太宗賂與不賂非吾為國治亂之所在也治亂之所在在乎其地之立與不立而已矣天下之事因循而維持之以至於漸不可舉猶曰是養之未至也乘舟中流釋其楫而聽水之所之旋於洄洑格於洲浦以為是固然也其為無具亦已甚矣以今之時天子仁恕士大夫好善天下之風俗不至於朋黨亂正誣罔君子也世之清議凛然在矣公卿之欲有為以濟斯世誰有言者而曰吾有所待是徒空言非事實也故為之說曰居之以彊力發之以果敢而成之以無私夫惟有私者不可以果敢果於一不果於二天下將以為言不果者不可以彊力力雖彊而輒為多疑之所敗天下之人惟能為是三者則足以排天下之堅彊而納之於柔懦擾天下之怨怒而投之於不敢惟不能為是三者則足以敗天下之賢才而卒之以不能有所建是故無私而果敢果敢而彊力以是三者治天下之三不立以立為治之地為治之地既立然後擇其所以施之天下將無所不可治新論下天下之未治也患三事之不立茍其既立則患其無以施之蓋君子為國正其綱紀治其法度皆可得而知也惟其所以施之則不可得而知周公之治周也修其井田封建百辟可得而知也其所以使天下歸周者不可得而知也孔子之治魯也墮其三都誅其亂政可得而知也其所以使羔豚不飾賈男女别於道者不可得而知也孟子之所以治邾者正其疆界五口之家桑麻雞豚必具可得而知也其所以使之至於王者不可得而知也孔子孟子之所汲汲以教人者在其不可得而知而其可得而知者不詳論也曰是有意於治者能之然而亦不可去也故其得為是國也必舉之以為先由是觀之治國之地聖人無之不得以施其聖然而聖人之道有所高逺而不可及者矣其於孔子之門所謂政事而冉有子路之所能者治國之地也子路曰千乘之國攝乎大國之間加之以師旅因之以饑饉由也為之可使有勇且知方也冉有曰方六七十如五六十求也為之可使足民如其禮樂以俟君子是亦自以為能為其地而未有以施之云爾然夫子許其能之而不以為大賢則夫子之道深矣逺矣夫子平居朝夕孜孜以教人者惟所以自修其身而其所以修其政事者未嘗言也蓋亦嘗言之矣曰謹權量審法度修廢官興滅國繼絶世舉逸民所重民食喪祭是九者凡所以為政而未足也故繼之曰寬則得衆信則人任焉敏則有功公則說是四者所以成之焉耳其意以為既成而後以其平居自修之身施之故記曰君子篤恭而天下平為有此具也君子修其身無所施之則不立治其政事無以施之則不化當三代之治也天下之事無不畢舉雖後世之君猶得守其法度以為無過惟無暴君則天下可安故伊尹之訓太甲曰從諫弗咈先民時若以為如是而可以為治已矣古之人言治天下若甚易然今之人以為大言而不信不知其有此地也悲夫世之君子孜孜以修其身恭儉忠信欲以施之天下終身而不見其成則以為古之人欺我也夫茍以為古之人欺我雖有為之者蓋勉强而為之也夫茍不欲而强為之則其心益不自信而道日疏夫以不信之心行日疏之道以治無以為地之國是以功不可成而患日至故莫若退而立其為治之地為治之地既立則身修而天下可化也燕趙論行文佳所議未當昔者三代之法使天下立學校而教民行鄉射飲酒之禮於歲之終田事既畢而㑹其鄉黨之耆老設其籩豆酒食之薦而天子之大夫親為之行禮蓋以為田野之民裸裎其股肱而勞苦其筋力長幼雜作以趨一時之利習於鄙野之俗而不知孝悌之節頑嚚無耻不可告語而易與為亂是以因其休息而教之以禮使之有所不忘於其心故三代之民雖耕田荷任之賤其所為者甚鄙而其中必有所守其心甚朴而亦不至於無知以犯非義何者其上之人不以為鄙而不足教而其民亦喜於為善也至於後世之衰天下之民愚者不知君臣父子之義而天下之風俗日已敗亂今夫輕揚而剽悍好利而多變者吳楚之俗也徑勇而沉靜椎鈍而少文者燕趙之俗也以輕揚剽悍之人而有好利多變之心無三代王者之化宜其起而為亂矣若夫北方燕趙之國其徑勇沉靜者可以義動而椎魯少文者可以信結也然而燕趙之間其民常至於自負其勇以為盜賊無以異於吳楚者何也其徑勇近於好亂而其椎魯近於無知上失其道而燕趙之良民不復見於當世而其暴戾之夫每每亂天子之治仲尼曰君子有勇而無義為亂小人有勇而無義為盜故古之聖人止亂以義止盜以義使天下之人皆知父子君臣之義而誰與為亂哉昔者唐室之衰燕趙之人八十年之間百戰以奉賊臣竭力致死不顧敗亡以抗天下之兵而以為忠臣義士之所當然當此之時燕趙之士唯無義也故舉其忠誠專一之心而用之天下之至逆以拒天下之至順而不知其非也孟子曰無常産而有常心者唯士為能若民則無常産因無常心放僻邪侈無不為已故夫燕趙之地常苦夫士大夫之寡也子由此論殆亦未嘗深知燕趙之俗耳豫嘗宦遊燕趙燕趙之士多忠信感慨自古其地多節俠死義者亦以此特存夫上之以詩書禮樂相為摩切者何如耳子由罪燕趙當唐中葉時擁叛將者八十餘年抑不知罪在將非在吏民也河澗魏博之間多眀經獨行而即如田野閭里間雖有鬬雞走馬踏踘弓矢之習而有賢守令以為之長且勝齊魯矣而况吳楚乎蜀論蘇氏父子蜀人也故論蜀多詳匹夫匹婦天下之所易也武夫任俠天下之所畏也天下之人知夫至剛之不可屈而不知夫至柔之不可犯也是以天下之亂常至於漸深而莫之能止蓋其所畏者愈驕而不可制而其所易者不得志而思以為亂也秦晉之勇蜀漢之怯怯者重犯禁而勇者輕為姦天下之所知也當戰國之時秦晉之兵彎弓而帶劒馳騁上下咄嗟叱咤蜀漢之士所不能當也然而天下既安秦晉之間豪民殺人以報仇讐椎埋發冢以快其意而終不敢為大變也蜀人畏吏奉法俯首聽命而其匹夫小人意有所不適輒起而為亂其故何也觀其平居無事盜入其室懼傷而不敢校此非有好亂難制之氣也然其弊常至於大亂而不可救則亦優柔不决之俗有以啓之耳今夫秦晉之民倜儻而無所顧負力而傲其吏吏有不善而不能以有容也呌號紛呶奔走告訴以爭毫釐曲直之際而其甚者至有懷刃以賊其長吏以極其忿怒之節如是而已矣故夫秦晉之俗有一朝不測之怒而無終身戚戚不報之怨也若夫蜀人辱之而不能競犯之而不能報循循而無言忍詬而不驟發也至於其心有所不可復忍然後聚而為羣盜散而為大亂以發其憤憾不泄之氣故雖秦晉之勇而其為亂也志近而禍淺蜀人之怯而其為變也怨深而禍大此其勇怯之勢必至於此而無足怪也是以天下之民惟無怨於其心怨而得償以快其怒則其為毒也猶可以少解惟其鬱鬱而無所泄則其為志也逺而其毒深故必有大亂以發其怒而後息古者君子之治天下强者有所不憚而弱者有所不侮蓋為是也書曰無虐惸獨而畏高明詩曰不侮鰥寡不畏强禦此言天下之匹夫匹婦其力不足以與敵而其智不足以與辨勝之不足以為武而徒使之怨以為亂故也嗟夫安得斯人者而與之論天下哉西戎論宋之西戎夏也今則不同西北之俗畏服大種而輕中國此强則臣彼彼强則臣此彼此皆弱而後中國可得而臣彼此皆强而後侵略之患不至於中國蓋一强而一弱中國之患也彼其弱者不敢獨戰是以爭附强國之餘威以趨利於中國而後無所懼强者并將弱國之兵蕩然南下而無復反顧之憂然後乃敢專力於中國而不去此二者以勢相從而不可間是以中國之士常不得解甲而息也昔者冒頓老上之盛惟西戎之無强國也故胸奴之人得以盡力而苦吾中國使西戎有武力戰勝之君則中國之禍將有所分而不專何者彼畏西戎之乘其後也故胸奴强則中國不得不厚西戎之君而西戎之君亦將自託於中國然而西戎非有强力自負之國則其勢亦將折而入於胸奴惟其國大而好勇其君之意欲區區自立於一隅而不畏胸奴之衆而後中國可得而用也然天下之人皆以為北方有强悍不屈之胸奴而又重之以西戎之大國則中國不勝其困此何其不思之甚也夫西北之人惟其愚陋而多怨是故可與共憂也惟其强狠而好勝是故可以激而壯也使之自相攻擊而不能相下則其勢必走於中國中國因而收之而其不服者乃可圖也然天下之議又將以為西北之俗不喜自相攻鬬而喜擊中國之衆此其勢固不可得而合也愚亦以為不然夫四夷之所以喜攻中國者為夫吾兵之不能苦戰而錦繡金玉之所交㑹也今使吾兵精而食足據險阻眀烽燧吏士練習而不敢懈彼雖有壯騎無所施設則其利不在於攻中國堅坐而相守不出十年彼外無所掠虜將不忍而熱中將反而求以相詬以為起兵之名彼兵交於胸奴而怨結於中國則何以自固故中國舉而收之必將得其歡心然天下之心常畏其强而莫或收之而使為北狄之用此何其不識戎狄之情也北邊論鼓中國之氣北邊之民其性驕蹇强悍便於射獵而習於馳騁生於斥鹵之地長於霜雪之野飲水食肉風雨饑渴之所不能困上下山坂筋力百倍輕死而樂戰故常以勇勝中國至於其所以擁護親戚休養生息畜牛馬長子孫安居佚樂而欲保其首領者蓋無以異於人人也而中國之士常憚其勇畏避而不敢犯北方之民亦以此恐喝中國而奪之利此當今之所謂大患也昔者漢武之世胸奴絶和親攻當路塞天下震恐其後二十年之間漢兵深入不憚死亡捐命絶幕之北以决勝負而胸奴孕重墮壞人畜疲弊不敢言戰何者勇士壯馬非中國之所無有而窮追逺逐雖丐奴之衆亦終有所不安也故夫敵國之盛非鄰國之所深憂也要在休兵養士而集其勇氣使之不懾而已方今天下之勢中國之民優游緩帶不識兵革之勞驕奢怠惰勇氣消耗而嵗幣之賂又以百萬為計轉輸天下甘言厚禮以滿其不足之意使天下之士耳熟所聞日習所見以為生民之命寄於其手故俯首柔服莫敢抗拒凡中國勇健豪壯之氣索然無復存者矣夫戰勝之民勇氣百倍敗兵之卒沒世不復蓋所以戰者氣也所以不戰者氣之畜也戰而後守者氣之餘也古之不戰者養其氣而不傷今之士不戰而氣已盡矣此天下之所大憂也昔者六國之際秦人出兵於山東小戰則殺將大戰則割地兵之所至天下震栗然諸侯猶帥其罷散之兵合從以擊秦砥礪戰士激發其氣長平之敗趙卒死者四十萬人亷頗收合餘燼北摧栗腹西抗秦兵振刷磨淬不自屈服故其民觀其上之所為日進而不挫皆自奮怒以爭死敵其後秦人圍邯鄲梁王使將軍新垣衍如趙欲遂帝秦而魯仲連慷慨發憤深以為不可蓋天下之士所為奮不顧身以抗强虎狼之秦者為非其君也而使諸侯從而帝之天下尚誰能出身以事非其君哉故魯仲連非徒惜夫帝秦之虛名而惜夫天下之勢有所不可也今尊奉纍世仇讎之人交歡納幣以為兄弟之國奉之如驕子不敢一觸其意此適足以壞天下義士之氣而長敵人豪橫之勢耳愚以為養兵而自重卓然特立不聽夷狄之妄求以為民望而全吾中國之氣如此數十年之間天下摧折之志復壯而北方之勇非吾之所當畏也西南夷論此篇議亦未的確但論班超一著甚是古者九夷八蠻無大君長紛紛籍籍不相統制惟胸奴之種常為大國以抗中夏然蠻夷之俗種姓分别千人為部百家為黨見利則聚輕合易散族類不一其心終莫相愛故其兵利於疾戰而不利於持久胸奴之人綿地千里控弦百萬侯王君長通為一家人畜富盛蔓延山谷之間其心常有所愛重而不忍去故其兵利於持久而不利於疾戰此二者其大小之勢各有所便宜乎中國之所以待之者各有道也今夫胸奴之人伏於隂山之下養兵休士久居而不戰此其志豈嘗須㬰忘中國也然其心以為戰而勝人猶不若不戰而屈人之兵戰而不勝民之死者未可知也故常大言虛喝而不進以謀弊中國蓋其所愛者愈大故其謀之愈深而發之愈緩以求其不失也若夫西戎南蠻西南夷之民悉其衆庶尚不能當胸奴之半而其酋長每每為亂不能自禁此誠無愛於其心而僥幸於一戰以用其烏合之衆而已故夫蠻夷之人擾邊求利其中非有大志者其類皆可以謀來也愚嘗觀於西南徼外以臨蠻夷之衆求其所以為變之始而遂至於攻城郭殺人民縱橫放肆而不可救者其積之莫不有漸也夫蠻夷之民寧絶而不與通今邊鄙之士利其貨財而納之於市使邊民凌侮欺謾而奪其利長吏又以為擾民而不之禁窮恚無聊莫可告訴故其勢必至於解仇結盟攻剽蹂踐殘之於鋒鏑之間而後其志得伸也嗟夫為吏如此亦見其不知本矣通關市戢吏民待之如中國之民彼尚誰所激怒而為此哉然事不患乎不知而患乎人之不能用昔班超處西域數十年西破龜兹北伏胸奴及將東歸或以為必有竒謀乃就問其計然其言止曰察見淵中魚不祥屯戍之士皆非忠臣孝子不可盡繩以法當是時莫不皆笑以為不足用然及西域之亂終亦以此故夫謀非必奇而後可用而在乎當否而已古者四夷皆置校尉而益州有蠻夷騎都尉以治其事使其彊者不能內侵而弱者不為中國之所侮蓋為是也子由之論西戎北邊大略並按宋情事本末而為之者北邊以騎射為業逐水草食肉酪而西羌則各塹山谷分部落而南夷則戀巢穴世俗土故其勇悍聚散不同而所以制御之者亦不同西戎南蠻撫勦兼施可以懷柔而北邊則惟戰守二策耳史官助賞罰舉業文字之佳者域中有三權曰天曰君曰史官聖人以此三權者制天下之是非而使之更相助夫惟天之權而後能壽夭禍福天下之人而使賢者無夭橫窮困之災不賢者無以享其富貴壽考之福然而季路原憲古所謂賢人者也伏於窮閻之下布衣饘粥之不給盜跖莊蹻橫行於天下食人之肝以為糧而老死於牖下不見兵革之禍如此則是天之權有時而有所不及也故人君用其賞罰之權於天道所不及之間以助天為治然而賞罰者又豈能盡天下之是非而賞罰之於一時猶懼其不能明著暴見於萬世之下故君舉而屬之於其臣而名之曰史官蓋史官之權與天與君之權均大抵三者更相助以無遺天下之是非故荀悅曰每於歲盡舉之尚書以助賞罰夫史官之興其來尚矣其最著者在周曰佚在魯曰克在齊曰南氏在晉曰董狐在楚曰倚相觀其為人以度其當時之所書必有以助賞罰者然而不獲見其筆墨之所存以不能盡其助治之意獨仲尼因魯之史官左丘明而得其載籍以作為春秋是非二百四十二年雖其名為經而其實史之尤大彰明者也故齊桓晉文有功於王室王賞之以侯伯之爵征伐四國之權而春秋又從而屢進之此所以助乎賞之當於其功也吳楚徐越之僭皆得罪於其君者也而春秋又從而加之以斥絶擯棄不齒之辭此所以助乎罰之當於其罪也若夫當時賞罰之所不能及則又為之明言其狀而使後世嗟嘆痛惜之不已嗚呼賢人君子之功烈與夫亂臣賊子罪惡之狀於此皆可以無憂其無聞焉是故古者聖人重史官當漢之時號曰太史令而其權在丞相之上郡國計吏上計於太史而後以其副上於丞相御史夫惟知其權之可以助賞罰也故從而尊顯之然則後之史官其可以忽哉劉愷丁鴻孰賢此子由同兄應試之文雖不及子瞻而議論正大自足成一家言仁宗謂為子孫得兩賢宰相誠哉知人天下之讓三有不若之讓有相援之讓有無故之讓讓之為名天下之大功大善也然而至於無故之讓則聖人深疾而排之以為此姦人之所以盜名於暗世者也昔者公族穆子之讓韓起范宣子之讓智伯宣子穆子中心誠有愧於彼二人者是不若之讓也舜之命禹也讓於臯陶其命益也讓於朱虎熊羆夫臯陶之不能當禹之任朱虎熊羆之不能辦益之事亦明矣然猶讓焉者是所謂相援之讓也夫使天下之人皆讓其所不及則賢材在位而不肖者不爭皆能以相推則賢者以類升而小人不能間此二者天下之大善也至於無故之讓則天下之大不善也東漢之衰丁鴻鄧彪劉愷此三人者當襲父爵而以讓其弟非有先君之命非有嫡庶之别而徒讓焉以自高於世俗世之君子從而譏之然此三人者之中猶有優劣焉劉鄧讓而不反以遂其非丁鴻讓而不終聽其友人鮑駿之言而卒就國此鴻之所以為賢於劉鄧也且夫聞天下之讓而欲竊取其名以自高其身以邀望天下之大利者劉愷之心也聞天下之讓而竊慕之而不知其不同以陷於不義者丁鴻之心也推其二心而定其罪則鴻在可恕而愷為可戮此真僞之辨也賢愚可以見矣故范曄曰太伯伯夷未始有其讓也故太伯稱至德伯夷稱賢人末世狥其名而昧其致則詭激之行興矣若夫鄧彪劉愷讓其弟以取義使弟受非服而已受其名不已過乎夫君子之立言非以茍顯其理將以啓天下之未悟者立行非以茍顯其身將以教天下之方動者言行之所開塞可無慎乎丁鴻之心存乎忠愛故能終悟而從義異乎二子之狥名者也嗚呼世之邪僻之人茍冒天下之美名以僥幸天下之大利自以為人莫吾察也而不知君子之論有以見之故為天下不可以不貴君子之論也唐宋八大家文鈔卷一百五十六
