body:
  text: 唐宋八大家文鈔卷三十三明茅坤撰廬陵文鈔五劄子論契丹求御容劄子老成練逹之言臣伏見契丹所遣泛使專為御容而來中外之議皆謂前嵗既已許之於理不可中止失於不早踐言致彼非時遣使及朝夕以來傳聞頗異或云大臣共議欲遂拒而不與若然則臣恐釁隙之端自此而始禍患之起未易遽言大凡為國謀事者必先明信義重曲直酌人情量事勢四者皆得然後可以不疑茍一有未然尚恐敗事况四者俱失豈可不思契丹與中國通盟久矣而嚮來宗真特於信好自表殷勤别有家書繼以畫像聖朝納其來意許以報之而乃遷延至今遂欲食言而中輟是則彼以推誠結我我以不信待之失信傷義甚非中國待強鄰之術而又其曲在我使彼易以為辭自南北通和以來信問往復之際每於報答常從優厚假借既久其心已驕况此畫像之來特表殷勤之意是則於平常之禮厚報以驕之殷勤之來則不報以沮之沮之彼必怒不報彼必恥懷恥畜怒何所不為此人之常情也許其父不許其子厚薄之際此亦人情之難處也臣竊見契丹來書初無寒溫候問之言直以踐言孤約為説其意在於必得若此時被沮勢必更來事既再三豈能堅執若待其失於遜順巳成釁隙然後與之則重為中國之辱又使外域謂中國難以恩意交惟可以勢力脅因之引惹别有它求則為後患何可涯哉今契丹雖弱而中國邊備未完廟謀未勝未可生事而欲執我曲彼直之議以起戎而結禍夫察彼事勢必不能中止量我事勢又未能必沮之臣故曰四者俱失也臣又聞敵使入境之日地震星殞變異非常先事深防猶恐不及失計招禍豈可自為臣願聖慈出於獨斷勿沮其善意無失我信言臣今欲乞回諭敵中告以如約直候今冬因遣常使時與之則於事體稍便伏乞速下兩府商議上繫國家利害臣不敢不言今取進止論澧州瑞木乞不宣示外廷劄子亦是持大體處臣近聞澧州進柿木成文有太平之道四字其知州馮載本是武人不識事體便為祥瑞以媚朝廷臣謂前世號稱太平者須是四海晏然萬物得所方今西羌叛逆未平之患在前北敵驕悖藏伏之禍在後一患未滅一患已萌加以西則瀘戎南則湖嶺凡與四夷連接無一處無事而又內則百姓困弊盜賊縱橫昨京西陜西出兵八九千人捕數百之盜不能一時剪滅只是僅能潰散然却於别處結集今張海雖死而達州軍賊已却百人又殺使臣其勢不小興州又奏八九十人州縣皇皇何以存濟以臣視之乃是四海騷然萬物失所實未見太平之象臣聞天道貴信示人不欺臣不敢逺引他事只以今年內事驗之昨夏秋之間太白經天纍月不滅金木相掩近在端門考於星占皆是天下大兵將起之象豈有才出大兵之象又出太平之道是一嵗之內前後頓殊豈非星象麗天異不虛出凡於戒懼常合修省而草木萬類變化無常不可信憑便生懈怠臣又思若使木文不偽實是天生則亦有深意蓋其文止曰太平之道者其意可推也夫自古帝王致太平皆自有道得其道則太平失其道則危亂臣視方今但見其失未見其得也願陛下憂勤萬務舉賢納善常如近日不生逸豫則二三嵗間漸期修理若以前賊張海等小衰便謂後賊不足憂以近京得雪便謂天下大豐熟見北敵未來便謂必無事見西賊通使便謂可罷兵指望太平漸生安逸則此瑞木乃誤事之妖木耳臣見今年曾進芝草者今又進瑞木竊慮四方相效爭造妖妄其所進瑞木伏乞更不宣示臣寮仍乞速詔天下州軍告以興兵纍年四海困弊方當責已憂勞之際凡有竒禽異獸草木之類並不得進獻所以彰示聖德感勵臣民取進止論河北守備事宜劄子先事制勝之言臣伏見朝廷方遣使與西賊議通和之約近日竊聞邊臣頻得北界文字來問西夏約和了與未了茍實如此事深可憂臣以謂天下之患不在西戎而在北敵縱使無此文字終須貽患朝廷契丹通好僅四十年無有纎芥之隙而輒萌姦計妄有請求竊以敵國貪婪性情叵測遇強則伏見弱便欺見我無謀動皆屈就謂我為弱知我可欺故添以金繒未滿其志更邀名分抑使必從無事而來尚猶如此若更因西事攬以為功别有過求將何塞請此天下之人無愚與智共為朝廷寒心者也今若果有文字來督通和之事則臣謂北敵狂計其迹已萌不和則詰我違言既和則論功責報不出年嵗恐須動作茍難曲就必至交兵至於選將練師既難卒辦禦戎制勝當在機先臣竊怪在朝之臣尚偷安靜自河以北絶無處置因循弛慢誰復挂心豈可待北使在廷冦兵壓境然後計無所出空務張皇而已哉今國家必謂兩意雖乖尚牽盟誓邊防處置未敢張皇以臣思之莫若精選材臣付與邊郡使其各圖禦備密務修完此最為得也况今邊防處置百事乖方惟有擇人最為首務今北邊要害州軍不過十有餘處於文武臣寮中選擇十餘人不為難得各以一州付之使其各得便宜如理家事完城壘訓兵戎習山川蓄糧食凡百自辦不煩朝廷經度以兹預備尚可支吾至如鎮定一路最為要害張存昔在延州以不了事罷去今乃委以鎮府王克基凡庸輕巧非將臣之材而在定州其餘州郡多匪其人臣欲乞陛下特詔兩府大臣取見在邊郡守臣可以禦敵捍城訓兵待戰者留之其餘中常之材不堪邊任者悉行換易若秋風漸徑敵釁有端陛下試思邊鄙之臣誰堪力戰朝廷之將誰可出師當臣初授諫職之時見朝廷進退大臣陛下鋭意求治必謂羣臣自此震懾百事自此修舉西北二事最為大者自當處置不待人言及就職以來已數十日而政令之出漸循舊弊惟言事之臣拾遺補闕者免強施行其一二至如講大利害正大紀綱外制四夷內紓百姓凡廟堂帷幄之謀未有一事施行於外者臣忝司諫諍豈敢不言伏望陛下不忘社稷之深恥無使西北之交侵駿發天威督勵臣下仍乞詢問兩府大臣西鄙和與不和能保契丹别無辭説否茍有所説能以廟謨竒算沮止之否茍無謀以止之則練兵選將備邊待冦賊至而後圖能不敗事否臣願陛下勿謂去嵗六符之來可以賄解今而有請則事難從矣勿謂纍年西賊為患習以為常若此事一動則天下搖矣臣所言者社稷之大計也願陛下留意而行之取進止論麟州事宜劄子的確之見臣昨奉聖旨至河東與明鎬商量麟州事緣臣未到間鎬已一面與施昌言等先有奏議尋再凖樞密院劄子備録鎬等所奏令臣更切同共從長相度臣遂親至河外相度利害與明鎬等再行商議乞那減兵馬人數可以粗減兵費已具連署奏聞此外臣别有短見合盡條陳其利害措置之説列為四議一曰辨衆説二曰較存廢三曰減寨卒四曰委土豪如此則經久之謀庶近禦邊之䇿謹具畫一如後一曰辨衆説者臣竊詳前後臣寮起請其説有四或欲廢為寨名或欲移近河次或欲抽兵馬以減省饋運或欲添城堡以招輯蕃漢然廢為寨而不能減兵則不若不廢茍能減兵而省費則何害為州其城壁堅完地形髙峻乃是天設之險可守而不可攻其至黃河與府州各才百餘里若徙之河次不過移得五七十里之近而棄易守難攻之天險以此而言移廢二説未見其可至如抽減兵馬誠是邊議之一端然兵冗不獨麟州大弊乃在五寨若只減麟州而不減五寨與不減同凡招輯蕃漢之民最為實邊之本然非朝廷一力可自為必須委付邊臣許其久任漸推恩信不限嵗年使得失不繫於朝廷之急而營緝如其家事之專方可收其逺效非二年一替之吏所能為也臣謂減兵添堡之説近之而未得其要二曰較存廢者今河外之兵除分休外尚及二萬大抵盡河東二十州軍以贍二州五寨為河外數百邊户而竭數百萬民財賊雖不來吾已自困使賊得不戰疲人之策而我有殘民斂怨之勞以此而思則似可廢然未知可存之利今二州五寨雖云空守無人之境然賊亦未敢據吾地是尚能斥賊於二三百里外若麟州一議移廢則五寨勢亦難存兀爾府州便為孤壘而自守不暇是賊可以入據我城堡耕牧我土田夾河對岸為其巢穴今賊在數百里外沿河尚費於防秋若使夾岸相望則泛舟踐冰終嵗常憂冦至沿河內郡盡為邊戍以此而慮則不可不存然須得存之之術三曰減寨卒者臣勘會慶厯三年一年用度麟州用糧七萬餘石草二十一萬餘束五寨用糧一十四萬餘石草四十萬餘束其費倍於麟州於一百二十五里之地列此五寨除分兵歇泊外尚有七千五百人别用二千五百人負糧又有并欣等十州軍百姓輸納外及商旅入中往來其冗長勞費不可勝言逐寨不過三五十騎巡綽伏路其餘坐無所為蓋初建五寨之時本不如此寨兵各有定數建寧置一千五百人其餘四寨各止三百至五百今之冗數並是後來增添臣謂今事宜稍緩不比建寨之初然且約舊數尚不至冗費臣請只於建寧留一千人置一都巡檢其鎮川中堠百勝三寨各留五百其餘寨兵所減者屯於清寨堡以一都巡檢領之緣此堡最在近東隔河便是保德軍屯兵可以就保德軍請糧則不煩輸運過河供饋若平日路人宿食諸寨五百之卒巡綽有餘或些小賊馬則建寧之兵可以禦捍若賊數稍多則清寨之兵不失應援蓋都不去百里之內非是減兵但那移就食而已如此則河外省費民力可紓四曰委土豪者今議麟州者存之則困河東棄之則失河外若欲兩全而不失莫若擇一土豪委之自守麟州堅險與兵二千其守足矣况所謂土豪者乃其材勇獨出一方威名既著敵所畏服又能諳敵情偽凡於戰守不至乖謀若委以一州則其黨自視州如家繫已休戚其戰自勇其守自堅又其既是土人與其風俗情接人賴其勇亦喜附之則蕃漢之民可使漸自招集是外能捍賊而戰守內可輯民以實邊省費減兵無所不便比於命吏而往凡事仰給於朝廷利害百倍也必用土豪非王吉不可吉見在建寧寨蕃漢依吉而耕於寨側者已三百家其材勇則素已知名况其官序自可知州一二年間視其後效茍能善守則可世任之使長為捍邊之守右臣所陳乃是大計伏望聖慈特賜裁擇若可以施行則紓民減費之事容臣續具條列取進止論湖南蠻賊可招不可殺劄子豫嘗按粵右大略南夷醜亂只須一勦殺元凶之後便行招撫故豫曰莫善於雕勦而莫不善于大征歐公意亦同此臣風聞楊畋近與蠻賊鬬敵殺得七八十人首級仍聞入彼巢穴奪其糧儲挫賊之鋒增我士氣畋之勇略固亦可嘉然朝廷謀慮事機宜思久逺竊恐上下之心急於平賊聞此小捷便形虛喜不能鎮靜外示輕脫其間二事尤合深思一曰不待成功便行厚賞二日謂其可殺更不肯招茍或如此則計之大失而事之深害也今湖南捕賊者殺一人頭賞錢十千官軍利賞見平人盡殺平人驚懼盡起為盜除鄧和尚李花腳等數十頭項外其餘隨大小成火者不可勝數今畋所擊只一洞所聚已二千餘人於二千人中殺七八十人是二十分之一其餘時暫鳥散必須復集臣見自古蠻蛋為害者不聞盡殺須是招降昨緣邵飾等失信於黃捉鬼遂恐更難招誘今若因畋小勝示以恩威正是天與招服之機不可失也若令畋自作意度招取大頭項者因此小勝傳布捷聲其餘諸處結集者分行招誘藉此聲勢必可盡降旬日之間湖南定矣若失此時漸向夏熱以我所病暑之兵當彼慣習水土之賊小有敗衄則彼勢復堅不惟為害湖南必慮自此貽朝廷憂患今於未了之間便行厚賞則諸處巡撿捕賊官等見畋獲賞爭殺平人而畋等自恃因戰得功堅執不招之議朝廷亦恃畋小勝更無招輯之心上下失謀必成大患其楊畋等伏乞且降敕書奬諭授與事宜俟彼招安便行厚賞今湖南賊數雖多然首惡與本賊絶少其餘盡是枉遭殺戮逼脅為盜之徒在於人情豈忍盡殺惟能全活人命多者則其功更大仍乞明説此意諭與楊畋其賞典乞少遲留庶合事體取進止論乞放還蕃官胡繼諤劄子深透人情國體之言臣竊見朝廷前嵗以延州蕃官胡繼諤因為邊臣所疑移入內地見任亳州都監以子守清悉領父之諸部風聞近為不服亳州水土死亡却家族身又疾病曾有奏陳乞移一京西地涼之處臣謂方今西鄙用兵之際朝廷宜廣推恩信撫御蕃夷既欲守清盡死於邊疆當厚遇繼諤保全其家族豈有既任其子又疑其父繼諤求遷內地其實異鄉雖曰居官乃是囚繫致其失所身病家亡况彼初心又無顯過在繼諤之身已有幽囚寃枉之嘆於守清之分又失駕馭豪傑之方萬一繼諤疾病死而不歸守清父子之心豈得無恨反視中國乃為世讎必與邊陲别生患害其餘部族亦必離心國家自用兵已來凡有計謀未聞勝算尤於招撫蕃夷之術常失恩威致使離叛者多皆願附賊在於繼諤處置特乖臣欲乞因其有請召至京師與雪前疑厚加禮遇放還本族示以推誠守清得父子復完必思盡節繼諤感國家之遇必有所施若朝廷猶以為疑即乞先以此意詔問守清計其必無棄父之理若彼自不欲其歸則他日可無後患取進止論乞與元昊約不攻唃厮囉劄子外蕃不和則中國自尊臣風聞魚周詢余靖孫抃等奉使北敵皆有事宜為北敵中詰問元昊通和之意將來必須因此别與朝廷生患又聞敵人已欲議移界至漸示相侵禍亂之萌其端可見臣自去年春始蒙聖恩擢在諫列便值朝廷與西賊初議和好臣當時首建不可通和之議前後具奏狀劄子十餘次論列皆言不和則害少和則害多利害甚詳懇切亦至然天下之士無一人助臣言朝廷之臣無一人採臣説今和議垂就禍胎已成而韓琦自西來方言和有不便之狀余靖自北至始知敵利急和之謀見事何遲雖悔無及當臣建議之際衆人方欲急和以臣一人誠難力奪衆議今韓琦余靖親見二虜事宜中外之人亦漸知通和為患臣之前説稍似可採但願大臣不執前議早肯回心則於後悔之中尚有可為之理昨來許賊之物數已太多然尚有禁青鹽還侵地等事非賊所利幸其因此自絶不遣人來朝廷深戒前非慎自持重因而罷議不落賊計則轉禍為福後策可為若賊志愈驕貪心未滿復遣人使更有須求則假此為名亦可拒絶今通和之事為中國之患大為二敵之利深萬一西賊貪利深而不惜侵地更無他求急來就和則此時取舍便繫安危陛下宜詔執議之臣定果決之計認賊肯和之意知我害彼利之謀尤須多方以事拒絶臣計西賊無故而請和者不止與北敵通謀共困中國兼欲作謀欵我併力以吞唃厮囉摩旃瞎旃之類諸族地大力盛然後東向以攻中國耳今若未有他計拒其來和則當賜以詔書言唃厮囉等皆受朝廷官爵父子為國蕃臣今若講和則不得攻此數族且攻此數族是賊本心所貪聞我此言必難聽約用此為説亦可解和臣所以區區惟願未和者蓋臣愚慮知不和患輕易為處置和後患大不可支吾臣前後奏章論列已備此乃天下安危大計聖心日夜所憂臣為言事之官見利害甚明若不極言罪當誅戮伏望省覽取進止論與西賊大斤茶劄子臣伏覩昨者西賊來議通和朝廷許物數目不少內茶一色元計五萬斤緣中國茶法大斤小斤不同當初擬議之時朝廷謀慮不審不曾明有指定斤數竊慮西賊通和之後須要大斤若五萬斤大斤是三十萬小斤之數如此則金帛二十萬茶三十萬乃是五十萬物真宗時契丹大舉至澶州只用三十萬物三十年後乘國家用兵之際兩國交爭方添及五十萬今元昊一隅之敵一口便與五十萬物臣請略言為國家大患一兩事不知為國計者何以處之三十萬斤之茶自南方水陸二三千里方至西界當今民力困乏陛下不恥屈志就和本為休民息力若嵗般輦不絶只此一物可使中國公私俱困此大患一也計元昊境土人民嵗得三十萬茶其用已足然則兩𣙜場捨茶之外須至别將好物博易賊中無用之物其大患二也契丹常與中國為敵國指元昊為小邦若見元昊得物之數與彼同則須更要增添何以應副不過云茶不比銀絹本是粗物則彼必須亦要十數萬大斤中國大貨利止於茶鹽而已今西賊一嵗三十萬斤北敵更要三二十萬中國豈得不困此其大患三也昨與西賊議和之初大臣急欲事就不顧國家利害惟恐許物不多及和議將成契丹語泄兩府方有悔和之色然許物已多不可追改今天幸有此一事尚可罷和臣乞陛下特召兩府大臣共議保得久逺供給四夷中國不困則雖大斤不惜若其為患如臣所説不至妄言即乞早議定計取進止言西邊事宜第二劄子覽歐公前所上兵事當時君臣合擊節而指揮者顧猶逡巡若此宋之政體特弱臣近曾上言諒祚為邊患朝廷宜早圖禦備及乞遣一重臣親與邊將議定攻守大計等事至今多日未蒙降出施行臣竊見慶厯中元昊作過時朝廷輕敵玩冦無素定之謀每遇邊奏急來則上下惶恐倉卒指揮既多不中事機所以落賊姦便敗軍殺將可為痛心今者諒祚以萬騎冦秦渭兩路焚燒數百里間掃蕩俱盡而兩路將帥不敢出一人一騎則國威固已挫矣諒祚負恩背德如此陛下未能發兵誅討但遣使者齎詔書賜之又拒而不納使者羞愧俯首懷詔而回則大國不勝其辱矣當陛下臨御之初遭此狂童威沮國辱此臣等之罪也臣謂陛下宜赫然發憤以邊事切責大臣至於山川形勢有利有不利士卒勇怯孰可用孰不可用何處宜攻何處宜守何兵宜屯某地何將可付某兵如此等事甚多皆陛下聖慮所宜及者臣謂陛下宜因間時御便殿召當職之臣使按圖指畫各陳所見陛下可以不下席而盡在目前然後制以神機睿略責將相以成功而陛下以萬機之繁既未及此兩府之臣如臣等日所進呈又皆常程公事亦未嘗聚首合謀講定大計外則四路邊臣自賊馬過後亦不聞别有擘畫臣恐上下因循又如慶厯之初矣近者韓琦曾將慶厯中議山界文字進呈此邊事百端中一端爾蓋琦亦患事未講求假此文字為題目以牽合衆人之論爾自進呈後尋送密院至今多日亦未曾擬議臣以非才陛下任之政府便是國之謀臣若其謀慮淺近所言狂妄自可黜去不疑臣亦昨因目疾懇求解職曲蒙聖恩未許其去既使在其位又棄其言而不問使臣尸祿厚顔何以自處所有臣前來所上奏狀欲望聖慈降付中書密院與韓琦山界文字一處商量若其言果不足取棄之未晚今取進止論西賊占延州侵地劄子臣竊聞元昊近於延州界上修築城壘強占侵地欲先得地然後議和故楊守素未來而占地之謀先發又聞邊將不肯力爭此事所繫利害甚大臣料賊意見朝廷纍年用兵有敗無勝一旦計無所出厚以金帛買和知我將相無人便欲輕視中國一面邀求賂遺一面侵占邊疆不惟驕賊之心難從實亦為國之害不細今若縱賊於侵地立起堡寨則延州四面更無捍蔽便為孤壘而賊盡據要害之地他時有事延州不可保守若失延州則關中遂為賊有以此而言則所侵之地不可不爭伏况西賊議和事連北敵今人無愚智皆知和為不便但患國家許物已多難為中悔若得别因他事猶可絶和何况此侵地是中國合爭之事豈可不爭臣謂今欲急和而不顧利害者不過邊臣外憚於禦賊而內欲邀議和之功以希進用耳故不肯擊逐羌人力爭侵地蓋小人無識只茍日前榮進之利不思國家久逺之害是國家屈就通和只與邊臣為一時進身之利而使社稷受無涯之患陛下為社稷計豈不深思大臣為社稷謀豈不極慮伏望聖慈遣一使往延州令龎籍力爭取昊賊先侵之地不令築城堡塞若緣此一事得絶和議則社稷之福也臣仍慮西賊來人尚有青鹽之説此事人人皆知不可許亦慮小人無識急於就和者尚陳鹽利以惑聖聰伏望聖慈不納浮議取進止豫按當時朝廷狃於用兵之困故亟亟乘元昊之偽為臣欵以要和而歐陽公之在諫垣獨以不欲急聽其和為説如論乞詔陜西將官一也論元昊來人請不賜御筵二也論元昊來人不可令朝臣管伴三也論元昊不可聽其稱吾祖四也論乞廷議通和元昊事狀五也論西賊議和利害狀六也論乞不遣張子奭使元昊七也論乞與元昊約不攻角厮囉八也論西賊議和請以五問詰大臣九也論與西賊茶不當用大斤十也論西賊占延地界十一也歐公豈不知西賊通和稍寬朝廷西顧之憂而獨拳拳以不與通和為計者蓋深見夫國體失之太弱北既狃於契丹而南復狃於西夏不務選將練兵以伸立國之威而惟務厚幣重賄以為茍安之計則天下之勢愈不可支此其所以數絮絮于請和之間而其執言往往以緣此一事得絶和議為名至於嘗請五路出師以伐為守之説歐公之言可謂忠謀逺覽之至者也惜也當時天子與執政皆不之聽甚且韓范輩亦以在兵間久矣故亦如健鳥之垂翅而思解機務以歸已而西夏敗亡之後宋卒為金遼所困其亦以此也夫唐宋八大家文鈔卷三十三
