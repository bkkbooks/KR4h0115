body:
  text: 唐宋八大家文鈔卷一百二十四明茅珅撰東坡文鈔八表啓啓表之類惟歐陽公情多婉曲王荆公思多巉刻而三蘇則往往禁思者少僅録數首以見其概云謝除龍圖閣學士表臣軾言伏䝉聖恩以臣纍章請郡特除臣龍圖閣學士知杭州者中禁寶儲上應奎璧之象先朝謨訓逺同河洛之符𨽻職其間省躬非據伏念臣學非有得愚至不移雖叨過實之名卒無適用之器少時妄意蓋嘗有志于事功晚歲積憂但欲歸安于田畝屬聖神之履運荷識拔之非常猶冀桑榆之收遽迫犬馬之疾力求閒散庶免顛擠豈謂皇帝陛下聖度包荒天慈委照察其才有所短不欲强置之禁嚴知其進不由人故特保全其終始遂加此職以賁其行臣敢不仰緣末光益勵素守往何之而不可中無愧之為安但未死亡必期報塞謝宣召入院表不如歐文忠公詔語春溫再命而僂使華天降一節以趨在故事以嘗聞豈平生之敢望省循非稱愧汗交深竊以視草之官自唐為盛雖職親事祕號為北門學士之榮而祿薄地寒至有京兆掾曹之請豈如聖代一振儒風非徒好爵之縻兼享太烹之養玉堂賜篆仰淳化之彌文寶帶重金佩元豐之新渥既厚其禮愈難其人而臣以空疏冗散之材衰病流離之後生還萬里坐閲三遷不緣左右之容躐處賢豪之上此蓋伏遇皇帝陛下生資文武天祚聖神雖亮隂不言尚隱髙宗之德而訪落求助已啓成王之心首擇輔臣次求法從知人材之難得采虛名而用臣敢不益勵初心力圖後效才不逮古雖慚內相之名志常在民庶免私人之誚杭州謝考罪表長公往往以疏直得罪故其言多危多懼職在承宣當遵三尺之約束事關利害輒從一切之便宜曲荷天慈不從吏議伏念臣早緣剛拙屢致憂虞用之朝廷則逆耳之奏形于言施之郡縣則疾惡之心見于政雖知難每以為戒而臨事不能自回茍非日月之明肝膽必照則臣豈惟獲罪于今日久已見傾于衆言恭惟皇帝陛下睿哲生知清明旁達委任羣下退託於不能愛養成材惟恐其有過知臣欲去一方之積弊須除二猾以示民特屈憲章以全器使臣敢不省循過咎祗服簡書眷此善良自不犯于漢法時有貸捨用益廣於堯仁謝復官提舉王局觀表一驚一喜七年逺謫不意自全萬里生還適有天幸驟從縲絏復齒縉紳伏念臣才不逮人性多忤物剛褊自用可謂小忠猖狂妄行乃蹈大難皆臣自取不敢怨尤㑹真人之勃興與萬物而更始而臣獨在幽逺最為冥頑逮茲起廢之初倍費生成之力終蒙記録不遂棄捐此蓋伏遇皇帝陛下正位龍飛對時虎變神武不殺孰非受命之符清淨無為坐獲銷兵之福聰明不作邪正自分使臣得同草木之微共沾雷雨之解臣敢不益堅素守深念往愆沒齒何求不厭飯蔬之陋蓋棺未巳猶懷結草之忠謝賜衣襖表齊官三服已寬卒歲之憂漢札十行更佩先春之暖恩均吏士聲動華夷伏以禮著始裘詩歌無褐邉陲更戍本為臣子之常朔易早寒特軫聖神之念惟德其物豈曰無衣恭惟皇帝陛下廣運聰明力行恭儉威風旁振方戰栗于天驕溫詔下融遂流澌于河凍既無功而坐食實有愧于解衣敢不推廣朝廷之仁益收凍餒申嚴祖宗之法少肅惰偷庶收汗馬之勞以解濡鵜之誚到昌化軍謝表並鬼門而東騖浮瘴海以南遷生無還期死有餘責伏念臣頃緣際㑹偶竊寵榮曾無毫髮之能而有丘山之罪宜三黜而未巳跨萬里以獨來恩重命輕咎深責淺此蓋伏遇皇帝陛下堯文炳煥湯德寬仁赫日月之照臨廓天地之覆育譬之蠕動稍賜矜憐俾就窮途以安餘命而臣孤老無託瘴癘交攻子孫痛哭于江邉已為死别魑魅逢迎于海上寧許生還念報德之何時悼此心之未巳俯伏流涕不知所云謝賜對衣金帶馬表服官奠篚響動佩章圉士效牽光生韀䇿伏以三錫之重莫隆于車馬五采之貴兼施于衣裳汝必有功服之無斁而臣衰年弱幹固難强于馳騁枯木朽株本不願于文繡寵加意外愧溢顔間此蓋伏遇皇帝陛下因能任官稱物平施操名器以勵士上有誠心正銜勒以馭人下無遺力臣敢不思稱其服益勵厥躬雖愧立朝乏能言之近用猶希辨道輸老智于暮年謝賜對衣金帶馬表二服章在笥賁及衰殘銜勒過庭喜先徒御伏以物生有待天施無窮草木何知冒慶雲之渥采魚蝦至陋借滄海之榮光雖若可觀終非其有妻孥相顧驚屢致于匪頒道路竊窺或反增于指目此蓋伏遇太皇太后陛下聰明齊聖陳錫載周含垢匿瑕而察于求賢卑宫菲食而侈于養士士豈輕于千里念匪其人言有重于兼金當思所報謝除兵部尚書賜對衣金帶馬表盛服在躬無復曳婁之歎名駒出廄遂忘奔走之勞施重丘山身輕毫末伏念臣少賤而鄙性椎少文衣敝縕袍未嘗有恥乘欵段馬自以為安豈意晚年屢膺此寵此蓋伏遇皇帝陛下紹隆景命總攬羣英無競維人勢已加於九鼎惟德其物恩有重于千金臣敢不上體眷懷勉思報稱贈繞朝之䇿愧不能謀振屈原之衣期於自潔謝兼侍讀表重地隆名不擇所付清資厚祿以養不才伏念臣以草木之微當天地之澤七典名郡再入翰林兩除尚書三忝侍讀雖當世之豪傑猶未易居矧如臣之孤危其何能副恭惟皇帝陛下聖神格物文武憲邦重離繼明何煩爝火之助大厦既構尚求一木之支而臣白首復來丹心已折望西清之帷幄久立倣徨聞長樂之鼓鐘恍如夢寐莫報丘山之施猶貪頃刻之榮謝賜對衣金帶馬表錫之上駟敢忘致逺之勞佩以良金無復忘腰之適執鞭請事顧影知慚恭惟皇帝陛下禹儉中修堯文外煥長轡以御卒皆四牡之良所寶惟賢豈徒三品之貴出捐車服收輯事功而臣衰不待年寵常過分枯羸之質匪伊垂之而帶有餘斂退之心非敢後也而馬不進徒堅晚節難報深恩謝賜對衣金帶馬表二出笥之珍以旌有德在坰之駟豈及無功而臣首尾四年叨塵三錫省躬內疚服寵汗流恭惟太皇太后陛下慈儉自居龍光四達德被海宇豈惟一襲之衣恩結華夷何止十圍之帶羣賢在馭六轡自調而臣頃以衰羸止求安便奉宣德意庶幾五袴之謡收斂壯心無復千里之志更期力報有愧空言杭州謝上表入奉禁嚴出膺方靣皆人臣之殊選在儒者以尤榮伏念臣受寵逾涯積憂成疾既思退就于安養又欲少逃于滿盈仰荷至仁曲從微願江山故國所至如歸父老遺民與臣相問知朝廷輟近侍為太守蓋聖主視天下如一家鞭撲未施爭訟幾絶臣之厚幸豈易名言此蓋伏遇太皇太后陛下天地之仁賢愚兼取日月之照邪正自分每包函其蠢迂欲保全其終始兄弟孤立嘗親奉于德音死生不移更誓堅于晚節謝南省主文與歐陽內翰啓蘇長公中榜後士論喧嚷一番故其謝啓如此右軾啓竊以天下之事難于改為自昔五代之餘文教衰落風俗靡靡日以塗地聖上慨然太息思有以澄其源疏其流明詔天下曉諭厥㫖于是招來雄俊魁偉敦厚朴直之士罷去浮巧輕媚叢錯繡采之文將以追兩漢之餘而漸復三代之故士大夫不深明天子之心用意過求深者或至于迂務竒者怪僻而不可讀餘風未殄新弊復作大者鏤之金石以傳久逺小者轉相模寫號稱古文紛紛肆行莫之或禁蓋唐之古文自韓愈始其後學韓而不至者為皇甫湜學皇甫湜而不至者為孫樵自樵以降無足觀矣伏惟內翰執事天之所付以收拾先王之遺文天下之所待以覺悟學者恭承王命親執文柄意其必得天下之竒士以塞明詔軾也逺方之鄙人家居碌碌無所稱道及來京師久不知名將治行西歸不意執事擢在第二惟其素所蓄積無以慰士大夫之心是以羣嘲而聚罵者動滿千百亦惟恃有執事之知與衆君子之議論故恬然不以動其心猶幸御試不為有司之所排使得搢笏跪起謝恩于門下聞之古人士無賢愚惟其所遇蓋樂毅去燕不復一戰而范蠡去越亦終不能有所為軾願長在下風與賓客之末使區區之心長有所發夫豈惟軾之幸亦執事將有取一二焉不宣謹啓謝應中制科啓此論宋時進士科及制科之兼舉為得其法臨軒䇿士方搜絶異之才隨問獻言誤占久虛之等忽從佐縣擢與評刑內自顧于無堪凛不知其所措恭惟制治之要惟有取人之難用法者畏有司之不公故捨其平生而論其一日通變者恐人材之未盡故詳于採聽而略于臨時茲二者之相形顧兩全而未有一之于考試而掩之于倉卒所以為無私也然而才行之迹無由而深知委之于察舉而要之于久長所以為無失也然而請屬之風或因而滋長此隋唐進士之所以為有弊魏晉中正之所以為多姦惟是賢良茂異之科兼用考試察舉之法每中年輒下明詔使兩制各舉所聞在家者能孝而恭在官者能亷而慎臨之以患難而能不變邀之以寵利而能不回既已得其行已之大方然後責其當世之要用學博者又須守約而後取文麗者或以用寡而見尤特于萬人之中求其百全之美凡與中書之召命已為天下之選人而又有不可測知之論以觀其默識之能無所不問之䇿以考其博通之實至於此而不去則其人之可知然猶使御史得以求其疵諌官得以考其素一陷清議輒為廢人是以始由察舉而無請謁公行之私終用考試而無倉卒不審之患蓋其取人也如此之密則夫不肖者安得而容軾才不逮人少而自信治經獨傳于家學為文不願于世知特以饑寒之憂出求斗千之祿不謂諸公之過聽使與羣豪而並游始不自量欲行其志遂竊俊良之舉不知才力之微論事迂濶而不能動人讀書疏略而無以應敵取之甚愧得之益慚此蓋伏遇某官以堯舜之道輔吾君以伊周之業為己任恐一夫不獲自盡以為廟堂之憂思天下所以太平必用芻蕘之說亟收末學以輔大猷然志卑處髙德薄寵厚厯觀前輩由此為致君之資敢以微軀自今為許國之始謝賈朝奉啓此必賈公過臨老蘇墓而長公陳謝者自蜀徂京幾四千里携孥去國蓋二十年側聞松楸已中梁柱過而下馬空瞻董相之陵酹以隻雞誰副橋公之約宦游歲晚坐念涕流未報不資之恩敢懷盍歸之意常恐樵牧不禁行有雍門之悲雨露既濡空引太行之望豈謂通判某官政先慈孝義篤友朋首隆學校之師儒次訪閭里之耆舊自嗟來暮不聞拔薤之規尚意神交特致生芻之奠父老感嘆桑梓光華深衣練冠莫克垂洟于墓道昔襦今袴尚能鼓舞于民謡仰佩之深力占難盡賀歐陽少師致仕啓內多名言伏審抗章得謝釋位言還天眷雖隆莫奪已行之志士流太息共髙難繼之風凡在庇庥共增慶慰伏以懷安天下之公患去就君子之所難世靡不知人更相笑而道不勝欲私于為身君臣之恩係縻之于前妻子之計推荷之于後至于山林之士猶有降志于垂老而况廟堂之舊欲使辭祿于當年有其言而無其心有其心而無其決愚智共蔽古今一塗是以用舍行藏仲尼獨許于顔子存亡進退周易不及于賢人自非智足以周知仁足以自愛道足以忘物之得喪志足以一氣之盛衰則孰能見幾禍福之先脫屣塵垢之外常恐茲世不見其人伏惟致政觀文少師全德難名巨材不器事業三朝之望文章百世之師功存社稷而人不知躬履艱難而節乃見縱使耄期篤老猶當就見質疑而乃力辭于未及之年退託以不能而止大勇若怯大智如愚至貴無軒冕而榮至仁不導引而夀較其所得孰與昔多軾受知最深聞道有自雖外為天下惜老成之去而私喜明哲得保身之全伏暑向闌台候何似伏冀為時自重少慰輿情賀韓丞相再入啓伏覩詔書登庸舊德傳聞四海歡喜一辭竊以君臣之聞古今異道任法而不任人則責輕而憂淺庸人之所安任人而不任法則責重而憂深賢者之所樂凡吾君所以推心忘已一切不問而聽其所為蓋其後必當責報收功三年有成而底于至治自非量足以容物智足以知人强足以濟艱難勇足以斷取舍則何以首膺民望力報主知恭惟史館相公忠誠在天德望冠世如乾之中正挺然而純粹精如坤之六二隤然而直方大更練三朝之用舍出入四方之險夷疲民係心有識引領必將發其蘊蓄以次施行始緩獄以裕民終措刑而隆禮軾登門最舊荷顧亦深喜忭之懷實倍倫等謝館職啓試言無取錫命過優進貽朋友之譏退有簡書之畏靦顔就列撫已若驚國家取士之門至多而制舉號為首冠育才之地非一而册府處其最髙觀其所以待之蓋亦可謂至矣知寶玉璵璠難得而易毁故篋櫝以養其全知梗楠豫章積歲而後成故封殖以待其長施等天地恩均父師恭惟先帝臨御以來四十二載所擢賢良方正之士十有五人其志莫不欲舉明主于三代之隆其言莫不欲措天下于泰山之固大則欲興禮樂以範來世小則欲操數術以馭四夷然而進有後先名有隱顯命有窮達時有重輕或已踐廟堂之崇或已登侍從之列或反流落于逺郡或尚滯留于小官或死生之乖暌已為陳迹或擯斤于罪戾僅齒平民雖曰功名富貴所由之途亦為毁譽得喪必爭之地名重則于實難副論髙則與世常疏故雖絶異之資猶有不任之懼軾之內顧豈不自知性任已以直前學師心而無法自始操筆知不適時㑹宗伯之選掄疾時文之靡弊擢居異等以風四方不知滿溢之憂復玷良能之舉負賢者所難之任爭四海欲得之求其為蠢愚可為危栗是以一參賓幕輒蹈危機已嘗名挂于深文不自意全于今日而況大明繼照百度惟新理財訓兵有鞭笞四方之志信賞必罰有追述祖宗之風凡用人厯試其能茍敗事必誅無赦此太平可待之日豈不肖兼容之時而乃度越賢豪曲收微賤縱不能力辭而就下亦當知非分以自慚此蓋伏遇某官志在斯民仁為已任欲辦大事務兼尺寸之長將求多聞故引涓埃之助致此忝冒有踰等倫欲報無緣將何望于頑鄙遇寵知懼庶不至于惰偷謝王內翰啓竊以取士之道古難其全欲求倜儻超拔之才則懼其放蕩而或至于無度欲求規矩尺寸之士則病其齷齪而不能有所為進士之科昔稱浮剽本朝更制漸復古風博觀䇿論以開天下豪俊之塗精取詩賦以折天下英雄之氣使齷齪者望而不敢進放蕩者退而有所裁此聖人所以網羅天下之逸民追復先王之舊迹元臣大老皆出此塗伏惟內翰執事天材俊麗神氣橫溢竒文髙論大或出于繩撿比聲協句小亦合于方圓蓋天下望為權衡故明主委之黜陟軾之不肖與在下風顧惟山野之見聞安識朝廷之忌諱軾亦恃有執事之賞鑒以為小節之何拘執事亦將收天下之遺才觀其大綱之所在驟置殊等實聞四方使知大國之選材非顧當時之所悅眇然陋器雖不能勝多士之喧言卓爾大賢自足以破萬人之浮議方將奔走厥職勵精乃心茍庶幾無朝夕之愆以辱知已亦萬一有毛髮之效少答至仁感懼之懷不知所措賀韓丞相啓伏審誕膺䇿命首冠輔臣四方聳觀萬口同慶天下幸甚天下幸甚自古在昔治少亂多夫天將欲措世于大安必有異人之間出使民莫不回心而向道類非俗吏之所能方陋漢唐將追堯舜洪惟上聖之后眷求一德之臣謂莫如公遂授以政付八音于師曠孰敢爭能捐六轡于王良坐將致逺引領以望惟日為年恭以昭文相公全德難名巨才不器亹亹申伯之望堂堂漢相之風出入三朝險夷一節蕞爾種羌之叛命慨然當寧以請行威聲所加羶穢自屏淮蔡既定而裴度相徐方不回而召虎歸縱復遺種龍荒遊魂沙海譬之癬疥豈足爬搔必將訓兵擇帥而授之規摹積穀堅城而磨以歲月破斧之惡四國實願周公之亟還折箠以鞭赤眉無煩鄧禹之久外天下是望豈惟一人即日邉徼苦寒台候何似伏冀為國善調寢興定州到任謝本路監司啓情曲可掬多病早衰屢有江湖之請誤恩過聽遂分疆場之憂才無取于折衝愧已深于卧鎮敢緣厚德尚許兼容伏惟某官名重縉紳望隆中外承宣帝澤民忘流殍之災肅振臺風吏若親臨之畏顧惟朽鈍得奉教條但交欣悚之懷莫罄瞻依之頌答陳提刑啓此以下竄南海時所作逺竄島夷偶未書于鬼録逃歸空谷固喜聞于足音況清廟瑚璉之資為明堂杞梓之用欲聞名而未敢豈流問之輒先恭惟提刑刑部才髙一時望重多士魯諸儒之德業緣飾政刑漢循良之風流本源經術暫屈雲霄之步來蘇嶺嶠之民憐遷客之無歸墜尺書而起廢助其羽翼借以齒牙但憂枯朽之餘難副吹噓之力既感且怍不知所云答彭賀州啓此必新命放歸時所作竄流海國脫身羇鬼之林灑掃真祠拜賜散人之號喜歸田之有漸悼報國之無期方自愧于心顔敢聞名于左右豈謂某官曲敦雅好深軫窮途賜以尺書借之餘論溫詞曲盡賢于十部之見臨陋質增華果已五漿之先餽但慚衰朽虛辱品題敬佩至言永以為好答王承議啓以編管而逢故知情誼婉然泮水受成繆膺桑梓之敬海邦畫諾又觀枳棘之栖多難百罹流年半世恍如昨夢復見故人伏惟知郡承議居以才稱進由德選淵源師友舊仰鄭公之髙歌詠風流近傳邵父之繼不忘疇昔曲賜拊存豈獨憐衰朽而借寵光蓋將敦風義以勵世俗感佩之至筆舌難周答王幼安宣德啓亦自淡宕俯仰十年忽焉如昨間關百罹何所不有頃者海外淡乎蓋將終焉偶然生還置之勿復道也方將求田問舍為三百指之養杜門面壁觀六十年之非豈獨江湖之相忘蓋已寂寞而喪我不謂某官講修舊好收録陳人粲然雲漢之章被此枯朽之質欲其洗濯宿負激昻晚節粗行平生之志少慰朋友之望此意厚矣我心悠哉如焦穀牙如伏櫪馬非吹噓之所及縱鞭䇿以何加藏之不忘永以為好登州謝兩府啓迂愚之守沒齒不移廢逐之餘歸田已幸豈謂承宣之寄忽為枯朽之榮眷此東州下臨北徼俗近齊魯之厚迹皆秦漢之陳賓出日于麗譙山川炳耀傳夕烽于海嶠鼓角清閒顧靜樂之難名笑妄庸之濫據此蓋伏遇某官股肱元聖師保萬民才全而德不形任重而道愈逺謂使功不如使過而觀過足以知仁特借齒牙曲成羽翼軾敢不服勤簿領祗畏簡書䇿蹇磨鉛少答非常之遇息黥補劓漸收無用之材過此以還未知所指唐宋八大家文鈔卷一百二十四
