body:
  text: 唐宋八大家文鈔巻一百四十二明茅坤撰東坡文鈔二十六碑宸奎閣碑㸔議論持大體處皇祐中有詔廬山僧懐璉住京師十方淨因禪院召對化成殿問佛法大意奏對稱㫖賜號大覺禪師是時北方之為佛者皆留於名相囿於因果以故士之聰眀超軼者皆鄙其言詆為蠻夷下俚之說璉獨指其妙與孔老合者其言文而真其行峻而通故一時士大夫喜從之㳺遇休沐日璉未盥潄而户外之屨滿矣仁宗皇帝以天縱之能不由師傳自然得道與璉問答親書頌詩以賜之凡十有七篇至和中上書乞歸老山中上曰山即如如體也將安歸乎不許治平中再乞堅甚英宗皇帝留之不可賜詔許自便璉既渡江少留於金山西湖遂歸老於四明阿育王山廣利寺四明之人相與出力建大閣藏所賜頌詩榜之曰宸奎時京師始建寳文閣詔取其副本蔵焉且命嵗度僧一人璉歸山二十有三年年八十有三臣出守杭州其徒使來告曰宸奎閣未有銘君逮事眧陵而與吾師逰最舊其可以辭臣謹按古之人君號知佛者必曰漢明梁武其徒葢嘗以藉口而繪其像于壁者漢明以察為明而梁武以弱為仁皆緣名失實去佛逺甚恭惟仁宗皇帝在位四十二年未嘗廣度僧尼崇侈寺廟干戈斧鑕未嘗有所私貸而升遐之日天下歸仁焉此所謂得佛心法者古今一人而已璉雖以出世法度人而持律嚴甚上嘗賜以龍腦鉢盂璉對使者焚之曰吾法以壊色衣以瓦鐵食此鉢非法使者歸奏上嘉歎久之銘曰巍巍仁皇體合自然神耀得道非有師傳維道人璉逍遥自在禪律並行不相留礙於穆頌詩我既其文惟佛與佛乃識其真咨爾東南山君海王時節來朝以謹其蔵上清儲祥宫碑應制之文非公之至者而其所見與議亦自有典刑臣以書命待罪北門記事之成職也然臣愚不知宫之所以廢興與凡材用之所從出敢昧死請乃命有司具其事以詔臣軾始太宗皇帝以聖文神武佐太祖定天下既即位盡以太祖所賜金帛作上清宫朝陽門之内旌興王之功且為五代兵革之餘遺民赤子請命上帝以至道元年正月宫成民不知勞天下頌之至慶厯三年十二月有司不戒于火一夕而燼自是為荆棘瓦礫之場凡三十七年元豐二年二月神宗皇帝始命道士王太初居宫之故地以法籙符水為民禳禬民趨歸之稍以其力修復祠宇詔用日者言以宫之所在為國家子孫地乃賜名上清儲祥宫且賜度牒與佛廟神祠之遺利為錢一千七百四十七萬又以官田十四頃給之刻玉如漢張道陵所用印及所被冠佩劒履以賜太初所以寵之者甚備宫未成者十八而太初卒太皇太后聞之喟然嘆曰民不可勞也兵不可役也大司徒錢不可發也而先帝之意不可以不成乃敕禁中供奉之物務從約損斥賣珠玉以巨萬計凡所謂以天下養者悉歸之儲祥積㑹所賜為錢一萬七千六百二十八萬而宫乃成内出白金六千三百餘兩以為香火𤓰華之用召道士劉應真嗣行太初之法命入内供奉官陳衍典領其事起四年之春訖六年之秋為三門兩廡中大殿三旁小殿九鐘經樓二石壇一建齋殿于東以待臨幸築道館于西以居其徒凡七百餘間雄麗靖深為天下偉觀而民不知有司不與焉嗚呼其可謂至徳也已矣臣謹按道家者流本出于黄帝老子其道以清淨無為為宗以虛明應物為用以慈儉不爭為行合於周易何思何慮論語仁者靜夀之說如是而已自秦漢以來始用方士言乃有飛僊變化之術黄庭大洞之法太上天真木公金母之號延康赤明龍漢開皇之紀天皇太一紫微北極之祀下至於丹藥竒技符籙小數皆歸於道家學者不能必其有無然臣嘗竊論之黄帝老子之道本也方士之言末也修其本而末自應故仁義不施則韶濩之樂不能以降天神忠信不立則射鄉之禮不能以致刑措漢興蓋公治黄老而曹參師其言以謂治道貴清淨而民自定以此為政天下歌之曰蕭何為法顜若畫一曹參代之守而勿失載其清靜民以寧壹其後文景之治大率依本黄老清心省事薄歛緩獄不言兵而天下富臣觀上與太皇太后所以治天下者可謂至矣檢身以律物故不怒而威捐利以予民故不藏而富屈已以消兵故不戰而勝虛心以觀世故不察而明雖黄帝老子其何以加此本既立矣則又惡衣菲食卑宫室陋器用斥其贏餘以成此宫上以終先帝未究之志下以為子孫無疆之福宫成之日民大和㑹鼔舞謳歌聲聞于天天地喜答神祗來格祝史無求福祿自至時萬時億永作神主故曰修其本而末自應豈不然哉臣既書其事皇帝若曰大哉太祖之功太宗之徳神宗之志而聖母成之汝作銘詩而朕書其首曰上清儲祥宫碑臣軾拜手稽首獻銘曰天之蒼蒼正色非耶其視下也亦若斯耶我作上清儲祥之宫無以來之其肯我從元祐之政媚于上下何修何營曰是四者民懐其仁吏服其亷鬼畏其正神予其謙帝既子民維子之視云何事帝而瘠其子允哲文母以公滅私作宫千柱人初不知於皇祖宗在帝左右風馬雲車從帝來狩閱視新宫察民之言佑我文母及其孝孫孝孫來饗左右耆耉無競惟人以燕我後多士為祥文母所培我膺受之篤其成材千石之鐘萬石之簴相以銘詩震于四海通篇以私錢為案以為民祈福為幟此等應制文不得不如此廣州資福寺羅漢閣碑長公作禪林悟景千年以來絶調衆生以愛故入生死由於愛境有逆有順而生喜怒造種種業展轉六趣至千萬劫本所從來唯有一愛更無餘病佛大醫王對病為藥唯有一捨更無餘藥常以此藥而治此病如水救火應手當滅云何衆生不滅此病是導師過非衆生咎何以故衆生所愛無過身體父母有疾割肉刺血初無難色若復鄰人從其求乞一爪一髮終不可得有二導師其一清淨不入諸相能知衆生生死之本能使衆生了然見知不生不死出輪迴處是處安樂堪永依怙無異父母支體可捨而况財物其一導師以有為心行有為法縱不求利即自求名譬如鄰人求乞爪髮終不可得而况肌肉以此觀之愛吝不捨是導師過設如有人無故取米投坑穽中見者皆恨若以此米施諸鳥雀見者皆喜鳥雀無知受我此施何異坑穽而人自然有喜有愠如使導師有心有為則此施者與棄何異以此觀之愛吝不捨非衆生咎四方之民皆由勤苦而得衣食所得毫末其苦無量獨此南越嶺海之民貿遷重寳坐獲富樂得之也易享之也愧是故其人以愧故捨海道幽險死生之間曽不容髪而况飄墮羅刹鬼國呼號神天佛菩薩僧以脫須㬰當此之時身非已有而况財物實同糞土是故其人以懼故捨愧懼二法助發善心是故越人輕施樂捨甲於四方東莞古邑資福禪寺有老比丘祖堂其名未嘗戒也而律自嚴未嘗求也而人自施人之施堂如物在衡損益銖黍了然覺知堂之受施如水涵影雖千萬過無一留者堂以是故創作五百大阿羅漢嚴淨寳閣涌地千柱浮空三成壯麗之極實冠南越東坡居士見聞隨喜而說偈言五百大士栖此城南珠大貝皆東傾衆心回春栢再榮鐵林東萊閣乃成寳骨未到先通靈赤蛇白璧珠夜明三十襲吉誰敢爭層簷飛空俯日星海波不揺颶無聲大風徐來韻流鈴一洗瘴霧氷雪清人無南北夀且寧潮州韓文公廟碑予覽此文不是昌黎本色前後議論多漫然然蘇長公生平氣格獨存故錄之匹夫而為百世師一言而為天下法是皆有以叅天地之化闗盛衰之運其生也有自來其逝也有所為矣故申吕自嶽降而傅說為列星古今所傳不可誣也孟子曰我善養吾浩然之氣是氣也寓於尋常之中而塞乎天地之間卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辯是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神而明則復為人此理之常無足怪者自東漢以來道喪文弊異端並起厯唐貞觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸於正盖三百年於此矣文起八代之衰而道濟天下之溺忠犯人主之怒而勇奪三軍之帥豈非參天地闗盛衰浩然而獨存者乎盖嘗論天人之辨以謂人無所不至惟天不容偽智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇甫鏄李逢吉之謗能信於南海之民廟食百世而不能使其身一日安於朝廷之上盖其所能者天也其所不能者人也始潮人未知學公命進士趙徳為之師自是潮之士皆篤於文行延及齊民至于今號稱易治信乎孔子之言君子學道則愛人而小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉而廟在刺史公堂之後民以出入為艱前守欲請諸朝作新廟不果元祐五年朝散郎王君滌來守是邦凡所以養士治民者一以公為師民既恱服則出令曰願新公廟者聽民讙趨之卜地於州城之南七里朞年而廟成或曰公去國萬里而謫於潮不能一嵗而歸沒而有知其不眷戀於潮審矣軾曰不然公之神在天下者如水之在地中無所往而不在也而潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水專在是豈理也哉元豐七年詔封公昌黎伯故榜曰昌黎伯韓文公之廟潮人請書其事于石因作詩以遺之使歌以祀公其詞曰公昔騎龍白雲鄉手抉雲漢分天章天孫為織雲錦裳飄然乗風來帝旁下與濁世掃粃糠西㳺咸池略扶桑草木依被昭回光追逐李杜參翺翔汗流籍湜走且僵滅沒倒景不可望作書詆佛譏君王要觀南海窺衡湘厯舜九疑弔英皇祝融先驅海若藏約束鮫鱷如驅羊鈞天無人帝悲傷謳吟下招遣巫陽犦牲雞卜羞我觴於粲荔丹與蕉黃公不少留我涕滂翩然被髮下大荒表忠觀碑通篇以疏為序事之文絶是史遷風㫖熙寧十年十月戊子資政殿大學士右諫議大夫知杭州軍州事臣抃言故呉越國王錢氏墳廟及其父祖妃夫人子孫之墳在錢塘者二十有六在臨安者十有一皆蕪廢不治父老過之有流涕者謹按故武肅王鏐始以鄉兵破走黃巢名聞江淮復以八都兵討劉漢宏并越州以奉董昌而自居於杭及昌以越叛則誅昌而并越盡有浙東西之地傳其子文穆王元瓘至其孫忠顯王仁佐遂破李景兵取福州而仁佐之弟忠懿王俶又大出兵攻景以迎周世宗之師其後卒以國入覲三世四王與五代相終始天下大亂豪傑蜂起方是時以數州之地盗名字者不可勝數既覆其族延及于無辜之民罔有孑遺而呉越地方千里帶甲十萬鑄山煮海象犀珠玉之富甲於天下然終不失臣節貢獻相望於道是以其民至於老死不識兵革四時嬉逰歌鼓之聲相聞至于今不廢其有德于斯民甚厚皇宋受命四方僣亂以次削平而蜀江南負其嶮逺兵至城下力屈勢窮然後束手而河東劉氏百戰守死以抗王師積骸為城釃血為池竭天下之力僅乃克之獨呉越不待告命封府庫籍郡縣請吏于朝視去其國如去傳舍其有功于朝廷甚大昔竇融以河西歸漢光武詔右扶風修理其父祖墳塋祠以太牢今錢氏功徳殆過於融而未及百年墳廟不治行道傷嗟甚非所以勸奨忠臣慰答民心之義也臣願以龍山廢佛祠曰妙因院者為觀使錢氏之孫為道士曰自然者居之凡墳廟之在錢塘者以付自然其在臨安者以付其縣之淨土寺僧曰道微嵗各度其徒一人使世掌之籍其地之所入以時修其祠字封殖其草木有不治者縣令丞察之甚者易其人庶幾永終不墜以稱朝廷待錢氏之意臣抃昧死以聞制曰可其妙因院改賜名曰表忠觀銘曰天目之山苕水出焉龍飛鳳舞萃于臨安篤生異人絶類離羣奮挺大呼從者如雲仰天誓江月星晦䝉强弩射潮江海為東殺宏誅昌奄有呉越金劵玉冊虎符龍節大城其居包絡山川左江右湖控引島蠻嵗時歸休以燕父老曄如神人玉帶裘馬四十一年寅畏小心厥篚相望大貝南金五朝昏亂罔堪託國三王相承以待有徳既獲所歸弗謀弗咨先王之志我維行之天胙忠孝世有爵邑允文允武子孫千億帝謂守臣治其祠墳毋俾樵牧愧其後昆龍山之陽巋焉新宫匪私于錢唯以勸忠非忠無君非孝無親凡百有位視此刻文司馬温公神道碑間按蘇氏兄弟議論文章自西漢以來當為天仙獨於敘事處不得太史公法門余故於兩公所為諸神道碑行狀等文不多錄此碑記乃公應制者較公所為司馬公狀似不能盡所欲言然行文特畧矣上即位之三年朝廷清眀百揆時敘民安其生風俗一變異時薄夫鄙人皆洗心易徳務為忠厚人人自重恥言人過中國無事四夷稽首請命惟西羌夏人叛服不常懐毒自疑數入為冦上命諸將按兵不戰示以形勢不數月生致大首領鬼章青宜結闕下夏人十數萬冦涇原至鎮戎城下五日無所得一夕遁去而西羌兀征聲延以其族萬人來降黃河始決曹村既築靈平復決小呉横流五年朔方騷然而今嵗之秋積雨彌月河不大溢及冬水入地益深有北流赴海復禹舊迹之勢凡上所欲不求而獲而其所惡不麾而去天下曉然知天意與上合庶幾復見至治之成家給人足刑措不用如咸平景徳間也或以問臣軾上與太皇太后安所施設而及此臣軾對曰在易大有上九自天祐之吉無不利孔子曰天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利今二聖躬信順以先天下而用司馬公以致天下士應是三徳矣且以臣觀之公仁人也天相之矣何以知其然也曰公以文章名於世而以忠義自結人主朝廷知之可也四方之人何自知之士大夫知之可也農商走卒何自知之中國知之可也九夷八蠻何自知之方其退居於洛眇然如顔子之在陋巷纍然如屈原之在陂澤其與民相㤀也久矣而名震天下如雷霆如河漢如家至而日見之聞其名者雖愚無知如婦人孺子勇悍難化如軍伍夷狄以至於姦邪小人雖惡其害已仇而疾之者莫不歛袵變色咨嗟太息或至於流涕也元豐之末臣自登州入朝過八州以至京師民知其與公善也所在數千人聚而號呼於馬首曰寄謝司馬丞相慎毋去朝廷厚自愛以活百姓如是者盖千餘里不絶至京師聞士大夫言公初入朝民擁其馬至不得行衞士見公擎跽流涕者不可勝數公懼而歸洛遼人夏人遣使入朝與吾使至外域者皆必問公起居而遼人勑其邊吏曰中國相司馬矣慎毋生事開邊隙其後公薨京師之民罷市而往弔粥衣以致奠巷哭以過車者盖以千萬數上命户部侍郎趙瞻内侍省押班馮宗道䕶其䘮歸葬贍等既還皆言民哭公哀甚如哭其私親四方來㑹𦵏者盖數萬人而嶺南封州父老相率致祭且作佛事以薦公者其詞尤哀炷薌於手頂以送公塟者凡百餘人而畫像以祠公者天下皆是也此豈人力也哉天相之也匹夫而能動天亦必有道矣非至誠一徳其孰能使之記曰惟天下之至誠為能盡其性能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則可以贊天地之化育矣書曰惟尹躬暨湯咸有一德克享天心又曰徳惟一動罔不吉徳二三動罔不凶或以千金與人而人不喜或以一言使人而人死之者誠與不誠故也稽天之潦不能終朝而一綫之溜可以達石者一與不一故也誠而一古之聖人不能加毫末於此矣而况公乎故臣論公之徳至於感人心動天地巍巍如此而蔽之以二言曰誠曰一公諱光字君實其先河内人晉安平獻王孚之後王之裔孫征東大將軍陽始塟今陜州夏縣洓水鄉子孫因家焉曽祖諱政以五代衰亂不仕贈太子太保祖諱炫舉進士試秘書省校書郎終於耀州富平縣令贈太子太傅考諱池寳元慶厯間名臣終於兵部郎中天章閣待制贈太師温國公曽祖妣薛氏祖妣皇甫氏妣聶氏皆封温國太夫人公始以進士甲科事仁宗皇帝至天章閣待制知諫院始發大議乞立宗子為後以安宗廟宰相韓琦等因其言遂定大計事英宗皇帝為諫議大夫龍圖閣直學士論陜西刺義勇為民患及内侍任守忠姦蠧乞斬以謝天下守忠竟以譴死又論濮安懿王當準先朝封贈期親尊屬故事天下韙之事神宗皇帝為翰林學士御史中丞西戎部將嵬名山欲以橫山之衆降公極論其不可納後必為邊患已而果然勸帝不受尊號遂為萬世法及王安石為相始行青苗助役農田水利謂之新法公首言其害以身爭之當時士大夫不附安石言新法不便者皆倚公為重帝以公為樞密副使公以言不行不受命乃以為端眀殿學士出知永興軍遂以留司御史臺及提舉崇福宫退居于洛十有五年及上即位太皇太后攝政起公為門下侍郎遷正議大夫遂遷左僕射公首更詔書以開言路分别邪正進退其甚者十餘人旋罷保甲保馬市易及諸道新行鹽鐵茶法最後遂罷助役青苗方議取士擇守令監司以養民期於富而教之凛凛乎嚮至治矣而公卧病以元祐元年九月丙辰朔薨于位享年六十八太皇太后聞之慟上亦感涕不已時方祀眀堂禮成不賀二聖皆臨其䘮哭之哀甚輟視朝贈太師温國公襚以一品禮服謚曰文正官其親屬十人公娶張氏禮部尚書存之女封清河郡君先公卒追封温國夫人子三人童唐皆早亡康今為秘書省校書郎孫二人植桓皆承奉郎以元祐二年正月辛酉塟于陜之夏縣涑水南原之晁村上以御篆表其墓道曰忠清粹徳之碑而其文以命臣軾臣葢嘗為公行狀而端眀殿學士范鎮取以志其墓矣故其詳不復再見而獨論其大槩議者徒見上與太皇太后進公之速用公之盡而不知神宗皇帝知公之深也自士庶人至于卿大夫相與為賓師朋友道足以相信而權不足以相休戚然猶同巳則親之異已則疎之未有聞過而喜受誨而不怒者也而况於君臣之間乎方熙寧中朝廷政事與公所言無一不相違者書數十上皆盡言不諱盖自敵以下所不能堪而先帝安受之非特不怒而已乃欲以為左右輔弼之臣至為敘其所著書讀之於邇英閣不深知公而能如是乎二聖之知公也知之於既同而先帝之知公也知之於方異故臣以先帝為難昔齊神武皇帝寢疾告其子世宗曰侯景專制河南十四年矣諸將皆莫能敵惟慕容紹宗可以制之我故不貴留以遺汝而唐太宗亦謂髙宗汝於李勣無恩我今責出之汝當授以僕射乃出勣為疊州都督夫齊神武唐太宗雖未足以比隆先帝而紹宗與勣亦非公之流然古之人君所以為其子孫長計逺慮者類皆如此寧其身不受知人之名而使其子孫專享得賢之利先帝知公如此而卒不盡用安知其意不出於此乎臣既書其事乃拜手稽首而作詩曰於皇上帝子惠我民孰堪顧天惟聖與仁聖子受命如堯之初神母詔之匪亟匪徐聖神無心孰左右之民自擇相我興授之其相維何太師温公公來自西一馬二童萬人環之如渇赴泉孰不見公莫如我先二聖㤀已惟公是式公亦無我惟民是度民曰樂哉既相司馬爾賈于途我耕于野士曰時哉既用君實我後子先時不可失公如麟鳳不鷙不搏羽毛畢朝雄狡率服為政一年疾病半之功則多矣百年之思知公于異識公于微匪公之思神考是懐天子萬年四夷來同薦于清廟神考之功神宗之知長公亦深而不及用觀長公於二聖之撤金蓮燭送歸翰院時所云則得之矣此長公所以於此獨感慨嗚咽而盡所云也唐荆川曰長江一瀉萬里而波瀾曲折自有妍姿真文人之豪也唐宋八大家文鈔卷一百四十二
