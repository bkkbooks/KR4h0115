body:
  text: 唐宋八大家文鈔卷五十明茅坤撰廬陵文鈔二十二碑銘忠武軍節度使同中書門下平章事武恭王公神道碑銘記王武恭公本末甚悉惟王氏之先為常山真定人後世葬河南密而密分入于管城遂為鄭州管城人其封國仍世于魯惟魯武康公事太宗皇帝秉節治戎出征入衛乃受遺詔輔真宗有勞有勤報恤追崇以有兹魯國是生魯武恭公公少以父任為西頭供奉官至道二年遣五將討李繼遷公從武康公出鐵門為先鋒殺獲甚衆軍至烏白池諸將失期不得進公告其父曰歸師過險爭必亂乃以兵前守隘號其軍曰亂行者斬由是士卒無敢先後雖武康公亦為之按轡追兵望其軍整不敢近武康公歎曰王氏有子矣後以御前忠佐為軍頭巡撿邢洺男子張洪霸聚盜二州間厯年吏不能捕公以氊車載勇士為婦人服盛飾誘之邯鄲道中賊黨爭前邀劫遂皆就擒由是知名公以將家子宿衛真宗為內殿直殿前左班都虞候捧日左廂都指揮使纍遷英州團練使今天子即位改博州團練使知廣信軍徙知冀州遷康州防禦使歷龍神衛捧日天武四廂都指揮使侍衛親軍步軍馬軍殿前都虞候步軍副都指揮使桂福二州觀察使是時章獻太后猶臨朝有詔補一軍吏公曰補吏軍政也敢挾詔書以干吾軍亟請罷之太后固欲與之公不奉詔乃止及太后上仙有司請衛士坐甲公以為故事無為太后喪坐甲又不奉詔于是天子知公可任大事明道二年拜撿挍太保僉署樞密院事遂為副使明年以奉國軍留後同知院事又明年領安德軍節度使又明年加撿挍太尉宣徽南院使公為將善撫士而識與不識皆喜為之稱譽其狀貌雄偉動人雖里兒巷婦外至夷狄皆知其名氏御史中丞孔道輔等因事以為言乃罷公樞密拜武寧軍節度使言者不已即以為右千牛衛上將軍知隨州士皆為之懼公舉止言色如平時惟不接賔客而巳久之徙知曺州而孔道輔卒客有謂公曰此害公者也公愀然曰孔公以職言事豈害我者可惜朝廷亡一直臣于是言者終身以為愧而士大夫服公為有量慶厯二年起公為保靖軍留後知青州未行而契丹聚兵幽涿遣使者有所求自河以北皆警乃拜公保靖軍節度使知澶州契丹使者過澶州見公喜曰聞公名久矣乃得見于此邪公為言已衰老中國多賢士大夫因指坐客歷陳其世家使者竦聽是嵗徙真定府定州等路都部署改宣徽南院使判成德軍未行徙判定州兼三路都部署公治其軍無撓其私亦不貸其過居頃之士皆可用契丹使人覘其軍或勸公執而戮之公曰吾軍整而和使覘者得吾實以歸是屈人兵以不戰也明日大閲于郊公執桴鼓誓師號令簡明進退坐作肅然無聲乃下令曰具糗糧聽鼓聲視吾旗所嚮契丹聞之震恐會復議和兵解徙知陳州道過京師天子遣中貴人問公欲見否公謝曰備邊無功幸得蒙恩徙內地不敢見明年徙河陽不行以宣徽使奉朝請已而出判相州六年拜同中書門下平章事判澶州明年徙鄭州封祁國公又明年乞骸骨不許以為會靈觀使巳而復判鄭州徙澶州除集慶軍節度使徙封冀國公皇祐三年遂以太子太師致仕大朝會許綴中書門下班居一嵗天子思之起為河陽三城節度使同中書門下平章事判鄭州六年以本官為樞密使徙封魯國公既而上以富公弼為宰相是嵗契丹使者來公與之射使者曰天子以公典樞密而用富公為相得人矣語聞上喜賜公御弓一矢五十公善射至老不衰嘗侍上射辭曰幸得備位大臣舉止為天下所視臣老矣恐不能勝弓矢上再三諭之乃手二矢再拜一發中之遂將釋復位上固勉之再發又中由是左右皆歡呼賜以襲衣金帶自寶元慶厯之間元昊叛河西兵出久無功士大夫爭進計策多所改作公笑曰奈何紛紛兵法不如是也使士知畏愛而怯者勇勇者不驕以吾可勝因敵而勝之爾豈多言哉其在樞密亦嘗自請臨邉不許凡大謀議必以咨之其在外則遣中貴人詔問其言多見施用公自致仕復起掌樞密凡三嵗以老求去位至六七上為之不得已以為景靈宫使徙忠武軍節度使又以為同羣牧制置使五日一朝給扶者以子若孫一人是嵗公年七十有八矣明年二月辛未以疾薨于家詔輟視朝二日發哀于苑中贈太尉中書令其遺言曰臣有俸祿足以具死事不敢復纍朝廷願無遣使者護喪無厚賻贈天子惻然哀其志以黃金百兩白金三千兩賜其家固辭不許以其年五月甲申葬于管城明年有詔史臣刻其墓碑臣愚以謂自國家西定河湟北通契丹罷兵不用幾四十年一日元昊叛幽燕亦犯約二邉騷動而老臣宿將無在者公于是時屹然為中國巨人名將雖未嘗躬矢石攻堅摧敵而恩信已足撫士卒名聲已足動四夷遂登朝廷典掌機密以老還仕復起于家保有富貴享終壽考雖古之將帥及于是者其幾何人至于出入勤勞之節與其進退綢繆君臣之恩意可以褒勸後世如古詩書所載皆應法可書謹按魯武恭公諱德用字元輔曾祖諱方追封蔣國公祖諱元追封邢國公皆贈中書令父諱超建雄軍節度使贈尚書令追封魯國公諡曰武康公娶宋氏武勝軍節度使延渥之女初為安定郡夫人追封榮國公夫人五男四女男曰咸熙東頭供奉官早卒次曰咸融西京左藏庫使果州團練使次曰咸庶內殿崇班早卒次曰咸英供備庫副使次曰咸康內殿承制銘曰魯始錫封以褒武康爰暨武恭乃克有邦桓桓武恭其容甚飭偉其名聲以動夷狄公治軍旅不寬不煩恩均令齊千萬一人公在朝廷出守入衛乃登大臣與國謀議公曰老矣乞臣之身帝曰休哉汝豫舊臣亟其強起秉我樞鈞禮不筋力老豫敢侮公來在庭拜母蹈舞若子與孫助其與俯凡百有位誰其敢儔惟時黃耉天子之優富貴之隆亦有能保孰享其終如公壽考公有世德載勳旗常刻銘有詔俾嗣其芳太尉文正王公神道碑銘詔撰元勳之文當如此盛世君臣之際如掌至和二年七月乙未樞密直學士右諫議大夫王素奏事殿中已而泣且言曰臣之先臣旦相真宗皇帝十有八年今臣素又得待罪侍從之臣惟是先臣之訓其遺業餘烈臣實無似不能顯大而墓碑至今無辭以刻惟陛下哀憐不忘先帝之臣以假寵于王氏而朂其子孫天子曰嗚呼惟汝父旦事我文考真宗叶德一心克終厥位有始有卒其可謂全德元老矣汝素以是刻于碑素拜稽首泣而出明日有詔史館修撰歐陽修曰王旦墓碑未立汝可以銘臣修謹按故推誠保順同德守正翊戴功臣開府儀同三司守太尉充玉清昭應宫使上柱國太原郡開國公贈太師尚書令兼中書令追封魏國公諡曰文正王公諱旦字子明大名莘人也皇曾祖諱言滑州黎陽令追封許國公皇祖諱徹左拾遺追封魯國公皇考諱祐尚書兵部侍郎追封晉國公皆纍贈太師尚書令兼中書令曾祖妣姚氏魯國夫人祖妣田氏秦國夫人妣任氏徐國夫人邉氏秦國夫人公之皇考以文章自顯漢周之際逮事太祖太宗為名臣嘗諭杜重威使無反漢拒盧多遜害趙普之謀以百口明符彥卿無罪故世多稱王氏有陰德公之皇考亦自植三槐于庭曰吾之後世必有為三公者此其所以志也公少好學有文太平興國五年進士及第為大理評事知平江縣監潭州銀場再遷著作佐郎與編文苑英華遷殿中丞通判鄭濠二州王禹稱薦其材任轉運使驛召至京師辭不受獻其所為文章得試直史館遷右正言知制誥知淳化三年禮部貢舉遷虞部貟外郎同判吏部流內銓知考課院右諫議大夫趙昌言參知政事公以壻避嫌求解職太宗嘉之改禮部郎中集賢殿修撰昌言罷復知制誥仍兼修撰判院事召賜金紫久之遷兵部郎中居職真宗即位拜中書舍人數日召為翰林學士知審官院通進銀臺封駮事公為人嚴重能任大事避逺權勢不可干以私由是真宗益知其賢錢若水名能知人常稱公曰真宰相器也若水為樞密副使罷召對苑中問誰可大用者若水言公可真宗曰吾固已知之矣咸平三年又知禮部貢舉居數日拜給事中知樞密院事明年以工部侍郎參知政事再遷刑部侍郎景德元年契丹犯邉真宗幸澶州雍王元份留守東京得暴疾命公馳自行在代元份留守二年遷尚書左丞三年拜工部尚書同中書門下平章事集賢殿大學士監修國史是時契丹初請盟趙德明亦納誓約願守河西故地二邉兵罷不用真宗遂欲以無事治天下公以謂宋興三世祖宗之法具在故其為相務行故事慎所改作進退能否賞罰必當真宗久而益信之所言無不聽雖他宰相大臣有所請必曰王某以為如何事無大小非公所言不決公在相位十餘年外無夷狄之虞兵革不用海內富實羣工百司各得其職故天下至今稱為賢宰相公于用人不以名譽必求其實茍賢且材矣必久其官衆以為宜某職然後遷其所薦引人未嘗知寇準為樞密使當罷使人私公求為使相公大驚曰將相之任豈可求耶且吾不受私請凖深恨之巳而制出除凖武勝軍節度使同中書門下平章事凖入見涕泣曰非陛下知臣何以至此真宗具道公所以薦凖者凖始愧歎以為不可及故參知政事李穆子行簡有賢行以將作監丞居于家真宗召見慰勞之遷太子中允初遣使者召不知其所止真宗命至中書問王某然後人知行簡公所薦也公自知制誥至為相薦士尤多其後公薨史官修真宗實録得內出奏章乃知朝廷之士多公所薦者公與人寡言笑其語雖簡而能以理屈人默然終日莫能窺其際及奏事上前羣臣異同公徐一言以定今上為皇太子太子諭德見公稱太子學書有法公曰諭德之職止于是耶趙德明言民飢求糧百萬斛大臣皆曰德明新納誓而敢違請以詔書責之真宗以問公公請敕有司具粟百萬于京師詔德明來取真宗大喜德明得詔書慚且拜曰朝廷有人大中祥符中夫下太蝗真宗使人于野得死蝗以示大臣明日他宰相有袖死蝗以進者曰蝗實死矣請示于朝率百官賀公獨以為不可後數日方奏事飛蝗蔽天真宗顧公曰使百官方賀而蝗如此豈不為天下笑邪宦官劉承規以忠謹得幸病且死求為節度使真宗以語公曰承規待此以瞑目公執以為不可曰他日將有求為樞密使者奈何至今內臣官不過留後公任事久人有謗公于上者公輒引咎未嘗自辨至人有過失雖人主盛怒可辨者辨之必得而後已榮王宫火延前殿有言非天災請置獄劾火事當坐死者百餘人公獨請見曰始失火時陛下以罪已詔天下而臣等皆上章待罪今反歸咎于人何以示信且火雖有迹寧知非天譴耶由是當坐者皆免日者上書言宫禁事坐誅籍其家得朝士所與往還占問吉凶之説真宗怒欲付御史問狀公曰此人之常情且語不及朝廷不足罪真宗怒不解公因自取常所占問之書進曰臣少賤時不免為此必以為罪願并臣付獄真宗曰此事已發何可免公曰臣為宰相執國法豈可自為之幸于不發而以罪人真宗意解公至中書悉焚所得書既而真宗悔復馳取之公曰臣已焚之矣由是獲免者衆公纍官至太保以病求罷入見滋福殿真宗曰朕方以大事託卿而卿病如此因命皇太子拜公公言皇太子盛德必任陛下事因薦可為大臣者十餘人其後不至宰相者李及凌策二人而已然亦皆為名臣公屢以疾請真宗不得巳拜公太尉兼侍中五日一朝視事遇軍國大事不以時入參決公益惶恐因臥不起以疾懇辭册拜太尉玉清昭應宫使自公病使者存問日常三四真宗手自和藥賜之疾亟遽幸其第賜以白金五千兩辭不受以天禧元年九月癸酉薨于家享年六十有一真宗臨哭輟視朝三日發哀于苑中其子弟門人故吏皆被恩澤即以其年十一月庚申葬公于開封府開封縣新里鄉大邉村公娶趙氏封榮國夫人後公五年卒子男三人長曰司封郎中雍次曰贊善大夫沖次曰素女四人長適太子太傅韓億次適兵部貟外郎直集賢院蘇耆次適右正言范令孫次適龍圖閣直學士兵部郎中吕公弼諸孫十四人公事寡嫂謹與其弟旭友悌尤篤任以家事一無所問而務以儉約率勵子弟使在富貴不知為驕侈兄子睦欲舉進士公曰吾常以大盛為懼其可與寒士爭進至其薨也子素猶未官遺表不求恩澤有文集二十卷乾興元年詔配享真宗廟庭臣修曰景德祥符之際盛矣觀公之所以相而先帝之所以用公者可謂至哉是以君明臣賢德顯名尊生而俱享其榮殁而長配于廟可謂有始有卒如明詔所褒昔者蒸民江漢推大臣下之事所以見任賢能使之功雖曰山甫穆公之詩實歌宣王之德也臣謹考國史實録至于縉紳故老之傳得公終始之節而録其可紀者輒為銘詩以彰先帝之明以稱聖恩褒顯王氏流澤子孫與宋無極之意銘曰烈烈魏公相我真宗真廟翼翼魏公配食公相真宗不言以躬時有大事事有大疑匪卜匪筮公為蓍龜公在相位終日如默問其夷狄包裹兵革問其卿士百工以職問其庶民耕織衣食相有賞罰功當罪明相有黜升惟否惟能執其權衡萬物之平孰不事君胡能必信孰不為相其誰有終公薨于位太尉之崇天子孝思來薦清廟侑我聖考惟時元老天子念公報公之隆春秋從享萬祀無窮作為歌詩以諗廟工鎮安軍節度使同中書門下平章事贈太師中書令程公神道碑銘惟文簡公既葬之二年其子嗣隆泣而言于朝曰先臣幸得備位將相官階品皆第一爵勳皆第二請得立碑如令于是天子曰噫惟爾父琳有勞于我國家余其可忘乃大書曰旌勞之碑遣中貴人即賜其家曰以此名爾碑又詔史臣修曰汝為之銘臣修與文簡公故往來知其人又嘗志其墓又嘗述其世德于冀公太師之碑得其世次官封功行最詳乃不敢辭惟公字天球姓程氏曾祖諱新贈太師曾祖妣吳國夫人齊氏祖諱贊明贈太師中書令祖妣秦國夫人吳氏考諱元白袁州宜春令贈太師中書令兼尚書令冀國公妣晉國夫人楚氏公舉大中祥符四年服勤詞學高第試祕書省挍書郎泰寧軍節度推官改著作佐郎知并州壽陽縣祕書丞監左藏庫天禧中詔選文學履行召試直集賢院今天子即位遷太常博士三司户部判官會修真宗實録而起居注闕命公追修大中祥符八年已後書成遂修起居注遷祠部貟外郎提舉諸司庫務以本官知制誥同判吏部流內銓契丹嘗遣使賀上即位命公迓之使者妄有所言公折以理遂屈服其後又遣使賀天聖五年乾元節天子思公前嘗折其使乃以公為館伴使使者果言契丹見中國使者坐殿上位次高而中國見契丹使者位下當遷議者以為小故可許雖天子亦將許之公爭以謂契丹所以與中國好者守先帝約也一切宜用故事若許其小將啓其大天子是之乃止嵗中遷右諫議大夫權御史中丞丞相張文節公少所稱許而最知公除中丞文節當執筆喜曰不辱吾筆矣明年拜樞密直學士知益州公性方重寡言笑凡所處畫常先慮謹備所以條目巨細甚悉至臨事簡嚴僚吏莫能窺其際嘗夜張燈會五門大集州民而城中火起吏如公教不以白而隨即救止終宴民去始稍知火監軍得告者言軍謀變懼而入白公笑曰豈有是哉監軍惶惑不敢去公曰軍中動靜吾自知之茍有謀者不能隱也已而卒無事其他多類此蜀妖人自名李氷神子署官屬吏卒以恐蜀人公捕斬之而謗者言公妄殺人蜀且亂天子遣人馳視之使者還言蜀人便公政方安樂而誅妖人所以止亂由是天子亦知公賢召為給事中知開封府前為府者苦其治劇或不滿嵗罷不然被謗譏或以事去獨公居數嵗久而治益精明盜訟稀少獄屢空詔書數下褒美遷工部侍郎龍圗閣學士守御史中丞久之天子思其治召為翰林學士復知開封府明年為三司使不悅茍利不貪近功時議者患民稅多目吏得為姦欲除其名而合為一公以謂合而沒其名一時之便後有興利之臣必復增之是重困民也議者莫能奪其于出入尤謹禁中時有所取未嘗肯豫宦官怒言陛下雖有欲物在程某何可得公曰臣所以為陛下惜爾天子以為然纍遷吏部侍郎景祐四年以本官參知政事公益自信不疑宰相有所欲私輒衆折之其語至今士大夫能道也初范仲淹以言事忤大臣貶饒州已而上悔悟欲復用之稍徙知潤州而惡仲淹者遂誣以事語入上怒亟命置之嶺南自仲淹貶而朋黨之論起朝士牽連出語及仲淹者皆指為黨人公獨為上開説上意解而後巳是時元昊叛河西朝廷多故公在政事補益尤多而小人僥幸皆不便遂以事中之坐貶為光祿卿知潁州已而徙知青州又徙大名府居一嵗中遷户部吏部二侍郎尚書左丞資政殿學士北京建遂以為留守宦者皇甫繼明方用事主治行宫務廣制度以市恩公為裁抑之與繼明章交上天子遣一御史往視之還直公天子為罷繼明獨委公以建都事公自知政事以論議不私見嫉被貶斥巳稍復見用遂與繼明爭曲直由是益不妄合于世雖不復大用而契丹方遣使數有所求兵誅元昊未克西北宿重兵公于是時天子常委以河北陜西之重留守北京凡四年遷工部尚書資政殿大學士河北安撫使慶厯六年拜武昌軍節度使陜西安撫使知永興軍府事明年加宣徽北院使鄜延路經略使馬步軍都部署判延州仍兼陜西安撫使皇祐元年加同中書門下平章事留守北京其于二方威惠信著尤知夷狄情偽山川險易行師制敵之要其在延州夏人數百驅畜産至界上請降言契丹兵至衙頭矣國且亂願自歸公曰契丹兵至元昊帳下當舉國取之豈容有來降者吾聞夏人方捕叛族此其是乎不然誘我也拒而不受已而夏人果以兵數萬臨界上公戒諸堡塞無得輒出兵夏人以為有備引去自此不復窺邉公于河北最久民愛之為立生祠明年改武勝軍節度使猶在北京又改鎮安軍節度使在鎮四年猶上書鎮安一郡爾不足以自效願復守邉書未報得疾以至和三年閠三月七日已丑薨于陳州之正寢享年六十有九天子輟視朝二日贈中書令諡曰文簡明年祫享太廟推恩加贈公太師尚書令公纍階至開府儀同三司勳上柱國廣平郡爵公封户七千四百而實封二千一百賜號推誠保德守正翊戴功臣娶陳氏封衛國夫人子男四人曰嗣隆太常博士嗣弼殿中丞嗣恭太常博士嗣先大理寺丞女五人皆適良族謹按程氏之先出自重黎至休父為周司馬國于程其後子孫遂以為氏自秦漢以來世有其人程氏必顯而各以其所居著姓後世因之至唐尤盛號稱中山程氏者皆祖魏安鄉侯昱公中山博野人也世有積德至公始大顯聞臣修以謂古者功德之臣進受國寵退而銘于器物非獨私其後世所以不忘君命示國有人而詩人又播其事聲于詠歌以揚無窮今去古逺為制不同而猶有幽堂之石隧道之碑得以紀德昭烈而又幸蒙天子書而名之其所以昭臨程氏恩厚寵榮出古逺甚而臣又得刻銘其下銘臣職也懼不能稱銘曰程以國氏世逺支分因居著姓各以其人公世中山在昔有聞克大自公厥聲以振乃秉國鈞乃授將鉞出入其勤險夷一節帝曰噫歟余有勞臣何以旌之有爛其文惟此勞臣實余同德憂國在心匪勞以力二方有事諸將無功俾我舊老不遑居中間息近藩庶休厥躬有請末報奄云其終殁而後巳兹可謂忠惟帝之褒其言甚簡銘以述之萬世丕顯太子太師致仕贈司空兼侍中文惠陳公神道碑銘頴川公既葬于新鄭其子尚書主客郎中述古等七人具公之行事及太常之狀祁伯之銘以來告曰唯陳氏世有顯人我先正文惠公歷事太宗真宗而相今天子其出處始終之大節可考不誣如此故敢請以墓隧之碑豫為考其世次得其所以基于初盛于中有于終而大施于其後者曰信哉陳氏載德晦顯以時其畜厚來逺故能發大而流長自公五世以上為博州人皇高祖翔當五代時為王建掌書記建欲帝蜀以逆順禍福譬之不聽棄官家于閬州之西水遂為西水人皇曾祖齊國公諱詡皇祖楚國公諱昭汶皇考秦國公諱省華皆開府儀同三司太師尚書令兼中書令自翔已下三世不顯于蜀至秦公始事聖朝為左諫議大夫其配曰燕國太夫人馮氏公其次子也諱堯佐字希元舉進士及第纍遷太常丞知開封府録事參軍用理獄有能績遷府推官以言事切直貶通判潮州自潮還獻詩數百篇而大臣亦薦其文學得直史館知壽廬二州提點府界諸縣公事丁秦公憂服除判三司都察院兩浙轉運使徙京西河東河北三路紏察在京刑獄天禧三年編次御試進士坐誤差其第貶監鄂州茶場未至丁燕國太夫人憂明年河決滑州天子念非公不可塞乃起公知滑州乾興元年作永定陵徙公京西轉運使以辦其事入為三司户部副使徙副度支拜知制誥兼史館修撰同知天聖二年貢舉知通進銀臺司遷龍圖閣直學士知河南府徙并州知審官院開封府拜翰林學士兼龍圗閣學士七年拜樞密副使其年八月參知政事居二嵗間凡三請罷明道二年罷知永興軍行過鄭州為狂人所誣御史中丞范諷辨公無罪徙知廬州又徙同州復徙永興又徙鄭州纍官至户部侍郎景祐四年四月召拜同中書門下平章事公為人剛毅篤實好古博學居官無大小所至必聞潮州惡溪鱷魚食人不可近公命捕得鳴鼓于市以文告而戮之鱷患屏息潮人歎曰昔韓文公諭鱷而聽今公戮鱷而懼所為雖異其能使異物醜類革化而利人一也吾潮間三百年而得二公幸矣在潮修孔子廟韓公祠率其州民之秀者就于學知壽州遭嵗大飢公自出米為糜以食餓者吏民以公故皆爭出米其活數萬人公曰吾豈以是為私惠耶蓋以令率人不若身先而使其從之樂也錢塘江隄以竹籠石而潮嚙之不數嵗輒壞而復理公歎曰隄以捍患而反病民乃議易以薪土而害公政者言于朝以為非便是時丁晉公參知政事主言者以黜公公爭不已乃徙公京西而籠石為隄數嵗功不就民力大困卒用公議隄乃成河東地寒而民貧奏除石炭稅減官冶鐵課嵗數十萬以便民曰轉運征利之官利有本末下有餘則上足吾豈為俗吏哉太行山當河東河北兩路之界公以謂晉自前世為險國常先叛而後服者恃此也其在河東鑿澤州路後徙河北鑿懷州路而太行之險通行者德公以為利曰吾豈為今日利哉河決壞滑州水力悍甚每歸下湍激并人以沒不見蹤迹者不可勝數公躬自暴露晝夜督促創為木龍以巨木駢齒浮水上下殺其暴隄乃成又為長隄以護其外滑人得復其居相戒曰不可使後人忘我陳公因號其隄為陳公隄開封府治京師公以謂治煩之術任威以擊強盡察以防姦譬于激水而欲其澄也故公為政一以誠信每嵗正月夜放燈則悉籍惡少年禁錮之公召少年諭曰尹以惡人待汝汝安得為善吾以善人待汝汝其為惡耶因盡縱之凡五夜無一人犯法者太常博士陳詁知祥符縣縣吏惡其明察欲中以事而詁公廉事不可得乃欲以苛動京師自録事以下空一縣皆逃去京師喧言詁政苛暴是時章獻明肅太后猶聽政怒詁欲加以罪公為樞密副使力爭之以謂罪詁則姦人得計而沮能吏詁猶是獲免公十典大州六為轉運使常以方嚴肅下使人知畏而重犯法至其過失則多保佑之故未嘗按黜一下吏公貶潮州其所言事蓋人臣所難言者平生奏疏猶多悉焚其稿其他文章有文集三十卷又有野廬編潮陽編愚丘集多慕韓愈為文與修真宗實録又修國史故事知制誥者常先試其文辭天子以公文學天下所知不復命試自國朝以來不試而知制誥者惟楊億及公二人而巳公居官不妄進取為太常丞者十三年不遷為起居郎者七年不遷自議錢塘隄為丁晉公所黜後晉公益用事專威福故人子弟以公久于外多勉以進取公曰惟久然後見吾守如是十五年今天子即位晉公事敗投海外公乃見召用公初作相以唐劉蕡所對策進曰天下治亂自朝廷始朝廷賞罰自近始凡蕡之所究言者皆當今之弊此臣所欲言而陛下之所宜行且臣等之職也天子嘉納之公在相位不久其年冬雷地震星象數變公言王隨位在臣上而病不任事程琳等位皆在下乃引漢故事以災異自責求罷章凡四上明年三月拜淮康軍節度使撿挍太傅同中書門下平章事判鄭州康定元年五月以太子太師致事詔大朝會立宰相班遂居于鄭其起居飲食康寧如少者後四年年八十有二以疾卒于家公居家以儉約為法雖已貴常使其子弟親執賤事曰孔子固多能鄙事作為善針以戒子孫臨卒口占數十言自志其墓公前娶曰杞國夫人宋氏後娶曰沂國夫人王氏子男十人長曰述古次曰比部員外郎求古主客貟外郎學古虞部貟外郎道古大理評事館閣挍勘博古殿中丞修古祕書省正字履古光祿寺丞遊古大理寺丞襲古太常寺太祝象古秦公三子長曰堯叟為樞密使同中書門下平章事季曰堯咨為武信軍節度使皆舉進士第一及三子已貴秦公尚無恙每賔客至其家公及伯季侍立左右坐客蹙蹜不安求去秦公笑曰此學子輩耳故天下皆以秦公教子為法而以陳氏世家為榮公之孫四十人曽孫二人合伯季之後若子若孫若曽孫六十有八人女若孫曾五十有四人而仕於朝者多以才稱于時嗚呼可謂盛矣銘曰陳氏高節在汚全潔閟德潛光有俟而發其發惟時自公啓之英英伯季踵武偕來相車崇崇武節之雄高幢巨轂四世六公惟世有封秦楚及齊尚書中書儀同太師祖考在前孫曾盈後公居于中伯季左右惟勤其始以享其終唯能其約以有其豐休庸顯問播美家邦有逺其貽有大其繼刻詩垂聲以質來裔唐宋八大家文鈔卷五十
