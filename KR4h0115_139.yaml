body:
  text: 唐宋八大家文鈔卷一百二十七明茅坤撰東坡文鈔十一論正統論上正統之説豫嘗略言之子瞻所挈名實輕重為議亦非是然而文特辨矣正統者何耶名耶實耶正統之説曰正者所以正天下之不正也統者所以合天下之不一也不幸有天子之實而無其位有天子之名而無其德是一人者立於天下天下何正何一而正統之論決矣正統之為言猶曰有天下云爾人之得此名而又得此實也夫何議天下固有無其實而得其名者聖人於此不得已焉而不以實傷名而名卒不能傷實故名輕而實重不以實傷名故天下不爭名輕而實重故天下趨於實天下有不肖而曰吾賢者矣未有賤而曰吾貴者也天下之爭自賢不肖始聖人憂焉不敢以亂貴賤故天下知賢之不能奪貴天下之貴者聖人莫不從而貴之恃有賢不肖存焉輕以與人貴而重以與人賢天下然後知貴之不如賢知賢之不能奪貴故不爭知貴之不如賢故趨於實使天下不爭而趨於實是亦足矣正統者名之所在焉而已名之所在而不能有益乎其人而後名輕名輕而後實重吾欲重天下之實於是乎名輕正統聽其自得者十曰堯舜夏商周秦漢晉隋唐序其可得者六以存教曰魏梁後唐晉漢周使夫堯舜三代之所以為賢於後世之君者皆不在乎正統故後世之君不以其道而得之者亦無以為堯舜三代之比於是乎實重正統論中正統之論起於歐陽子而霸統之説起於章子二子之論吾與歐陽子故不得不與章子辨以全歐陽子之説歐陽子之説全而吾之説又因以明章子之説曰進秦梁失而未善也進魏非也是章子未知夫名實之所在也夫所謂正統者猶曰有天下云爾正統者果名也又焉實之知視天下之所同君而加之又焉知其他章子以為魏不能一天下不當與之統夫魏雖不能一天下亦無有如魏之強者吳雖存非兩立之勢奈何不與之統章子之不絶五代也亦徒以為天下無有與之敵者而巳今也絶魏魏安得無辭哉正統者惡夫天下之無君而作也故天下雖不合於一而未至乎兩立者則君子不忍絶之於無君且夫德同而力均不臣焉可也今以天下不幸而不合於一德既無以相過而弱者又不肯臣乎強於是焉而不與之統亦見其重天下之不幸而助夫不臣者也章子曰鄉人且耻與盜者偶聖人豈得與篡君同名哉吾將曰是鄉人與是為盜者民則皆民也士則皆士也大夫則皆大夫也則亦與之皆坐乎茍其勢不得不與之皆坐則鄉人何耻耶聖人得天下篡君亦得天下顧其勢不得不與之同名聖人何耻耶吾將以聖人耻夫篡君而篡君又焉能耻聖人哉章子曰君子大居正而以不正人居之是正不正之相去未能相逺也且章子之所謂正者何也以一身之正為正耶以天下有君為正耶一身之正是天下之私正也天下有君是天下之公正也吾無取乎私正也天下無君篡君出而制天下湯武既沒吾安所取正哉故篡君者亦當時之正而已章子曰祖與孫雖百嵗而子五十則子不得為壽漢與晉雖得天下而魏不能一則魏不得為有統吾將曰其兄四十而死則其弟五十為壽弟為夀乎其兄魏為有統乎當時而已章子比之婦謂舅嬖妾為姑吾將曰舅則以為妻而婦獨奈何不以為姑乎以妾為妻者舅之過也婦謂之姑蓋非婦罪也舉天下而授之魏晉是亦漢魏之過而已矣與之統者獨何罪乎雖然歐陽子之論猶有異乎吾説者歐陽子之所與者吾之所與也歐陽子之所以與之者非吾所以與之也歐陽子重與之而吾輕與之且其言曰秦漢而下正統屢絶而得之者少以其得之者少故其為名甚尊而重也嗚呼吾不善夫少也幸而得之者少故有以尊重其名不幸而皆得歐陽子其敢有所不與耶且其重之則其施於篡君也誠若過然故章子以啓其説夫以文王而終身不得以魏晉梁而得之果其為重也則文王將有愧於魏晉梁焉必也使夫正統者不得為聖人之盛節則得之為無益得之為無益故雖舉而加之篡君而不為過使夫文王之所不得而魏晉梁之所得者皆吾之所輕者也然後魏晉梁無以愧文王而文王亦無所愧於魏晉梁焉正統論下始終得其正天下合於一是二者必以其道得之耶亦或不以其道得之耶病乎或者之不以其道得之也於是乎舉而歸之名歐陽子曰皆正統是以名言者也章子曰正統又曰霸統是以實言者也歐陽子以名言而純乎名章子以實言而不盡乎實章子之意以霸統重其實而不知實之輕自霸統始使天下之名皆不得過乎實者固章子意也天下之名果不過乎實也則吾以章子為過乎聖人聖人不得巳則不能以實傷名而章子則能之且吾豈不知居得其正之為正不如至公大義之為正也哉蓋亦有不得巳焉耳章子之説吾將求其備堯舜以德三代以德與功漢唐以功秦隋後唐晉漢周以力晉梁以弒以實言之則德與功不如德功不如德與功力不如功弒不如力是堯舜而下得統者凡更四不如而後至於晉梁而章子以為天下之實盡於其正統霸統之間矣歐陽子統乎名故不得實之所止章子雜乎實故雖晉梁弒君之罪天下所不容之惡而其實反不過乎霸彼其初得正統之虛名而不測其實罪之所至也章子則告之曰爾霸者也夫以弒君得天下而不失為霸則章子之説固便乎篡者也夫章子豈曰弒君者其實止乎霸也哉蓋已舉其實而著之名雖欲復加之罪而不可得也夫王者沒而霸者有功於天下吾以為在漢唐為宜必不得已而秦隋後唐晉漢周得之吾猶有􅀈焉奈何其舉而加之弒君之人乎嗚呼吾不惜乎名而惜乎實也霸之於王也猶兄之於父也聞天下之父嘗有曰堯者而曰必堯而後父少不若堯而降為兄則瞽鯀懼至僕妾焉天下將有降父而至於僕妾者無怪也從章子之説者其弊固至乎此也故曰莫若純乎名純乎名故晉梁之得天下其名曰正統而其弒君之實惟天下後世之所加而吾不為之齊量焉於是乎晉梁之惡不勝誅於天下實於此反不重乎章子日堯舜曰帝三代曰王夏曰氏商周曰人古之人輕重其君有是也以為其霸統之説夫執聖人之一端以藉其口夫何説而不可吾亦將曰孔子刪書而虞夏商周皆曰書湯武王伯禽秦穆公皆曰誓以為皆曰正統之説其誰曰不可聖人之於實也不傷其名而後從之帝亦天子也王亦天子也氏亦人也人亦氏也夫何名之傷若章子之所謂霸統傷乎名而喪乎實者也秦論一議確秦始皇帝十八年取韓二十二年取魏二十五年取趙取楚二十六年取燕取齊初并天下蘇子曰秦并天下非有道也特巧耳非幸也然吾以為巧於取齊而拙於取楚其不敗於楚者幸也嗚呼秦之巧亦創於智伯而已魏韓肘足接而智伯死秦知創智伯而諸侯終不知師魏韓秦並天下不亦宜乎齊湣王死法章立君王后佐之秦猶伐齊也法章死王建立六年而秦攻趙齊楚救之趙乏食請粟於齊而齊不子秦遂圍邯鄲幾亡趙趙雖未亡而齊之亡形成矣秦人知之故不加兵於齊者四十餘年夫以法章之才而秦伐之建之不才而秦不伐何也太史公曰君王后事秦謹故不被兵夫秦欲并天下耳豈以謹故置齊也哉吾故曰巧於取齊者所以大慰齊人之心而解三晉之交也齊秦不兩立秦未嘗須臾忘齊也而四十餘年不加兵者豈其情乎齊人不悟而與秦合故秦得以其間取三晉三晉亡齊蓋岌岌矣方是時猶有楚與燕也三國合猶足以拒秦秦大出兵伐楚伐燕而齊不救故二國亡而習亦虜不閲嵗如晉取虞虢也可不謂巧乎二國既滅齊乃發兵守西界不通秦使嗚呼亦晚矣秦初遣李信以二十萬人取楚不克乃使王翦以六十萬攻之蓋空國而戰也使齊有中主具臣知亡之無日而掃境以伐秦以久安之齊而入厭兵空虛之秦覆秦如反掌也吾故曰拙於取楚然則奈何曰古之取國者必有數如取齠齒也必以漸故齒脫而兒不知今秦易楚以為是齠齒也可拔遂抉其口一拔而取之兒必傷吾指必齧故秦之不亡者幸也非數也吳為三軍迭出以肄楚三年而入郢晉之平吳隋之平陳皆以是物也惟符堅不然使堅知出此以百倍之衆為迭出之計雖韓白不能支而況謝玄牢之之流乎吾以是知二秦之一律也始皇幸而堅不幸耳秦論二秦初並天下丞相綰等言燕齊荆地逺不置王無以鎮之請立諸子始皇下其議羣臣皆以為便廷尉斯曰周文武所封子弟同姓甚衆然後屬疏逺相攻擊如仇讐諸侯更相誅伐天子弗能禁止今海內賴陛下神靈一統皆為郡縣諸子功臣以公賦稅重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬬不休以有侯王賴宗廟之靈天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下為三十六郡郡置守尉監蘇子曰聖人不能為時亦不失時時非聖人之所能為也能不失時而巳三代之興諸侯無罪不可奪削因而君之雖欲罷侯置守可得乎此所謂不能為時者也周衰諸侯相并齊晉秦楚皆千餘里其勢足以建侯樹屏至於七國皆稱王行天子之事然終不封諸侯不立強家世卿者以魯三桓晉六卿齊田氏為戒也久矣世之畏諸侯之禍也非獨李斯始皇知之始皇既并天下分郡邑置守宰理固當然如冬裘夏葛時之所宜非人之私智獨見也所謂不失時者而學士大夫多非之漢髙帝欲立六國後張子房以為不可世未有非之者李斯之論與子房何異世特以成敗為是非耳髙帝聞子房之言吐哺罵酈生知諸侯之不可復明矣然卒王韓彭英盧豈獨髙帝子房亦與焉故栁宗元曰封建非聖人意也勢也昔之論封建者曹元首陸機劉頌及唐太宗時魏徴李百藥顔師古其後有劉秩杜佑栁宗元宗元之論出而諸子之論廢矣雖聖人復起不能易也故吾取其説而附益之曰凡有血氣必爭爭必以利利莫大於封建封建者爭之端而亂之始也自書契以來臣弒其君子弒其父父子兄弟相賊殺有不出於襲封而爭位者乎自三代聖人以禮樂教化天下至刑措不用然終不能巳篡弒之禍至漢以來君臣父子相賊虐者皆諸侯王子孫其餘卿大夫不世襲者蓋未嘗有也近世無復封建則此禍幾絶仁人君子忍復開之歟故吾以為李斯始皇之言栁宗元之論當為萬世法也大臣論上當與歐陽公朋黨論參看以義正君而無害於國可謂大臣矣天下不幸而無明君使小人執其權當此之時天下之忠臣義士莫不欲奮臂而擊之夫小人者必先得於其君而自固於天下是故法不可擊擊之而不勝身死其禍止於一身擊之而勝君臣不相安天下必亡是以春秋之法不待君命而誅其側之惡人謂之叛晉趙鞅入於晉陽以叛是也世之君子將有志於天下欲扶其衰而救其危者必先計其後而為可居之功其濟不濟則命也是故功成而天下安之今小人君不誅而吾誅之則是侵君之權而不可居之功也夫既已侵君之權而能北靣就人臣之位使君不吾疑者天下未嘗有也國之有小人猶人之有癭今人之癭必生於頸而附於咽是以不可去有賤丈夫者不勝其忿而決去之夫是以去疾而得死漢之亡唐之滅由此故也自桓靈之後至於獻帝天下之權歸於內豎賢人君子進不容於朝退不容於野天下之怒可謂極矣當此之時議者以為天下之患獨在宦官宦官去則天下無事然竇武何進之徒擊之不勝止於身死袁紹擊之而勝漢遂以亡唐之衰也其迹亦大類此自輔國元振之後天子之廢立聽於宦官當此之時士大夫之論亦惟宦官之為去然而李訓鄭注元載之徒擊之不勝止于身死至於崔昌遐擊之而勝唐亦以亡方其未去是纍然者癭而已矣及其既去則潰裂四出而繼之以死何者此侵君之權而不可居之功也且為人臣而不顧其君捐其身於一決以快天下之望亦已危矣故其成則為袁為崔敗則為何竇為訓注然則忠臣義士亦奚取於此哉夫竇武何進之亡天下悲之以為不幸然亦幸而不成使其成也二子者將何以居之故曰以義正君而無害於國可謂大臣矣大臣論下與前是一篇天下之權在於小人君子之欲擊之也不亡其身則亡其君然則是小人者終不可去乎聞之曰迫人者其智淺迫於人者其智深非才有不同所居之勢然也古之為兵者圍師勿遏窮寇勿追誠恐其知死而致力則雖有衆無所用之故曰同舟而遇風則胡越可使相救如左右手小人之心自知其負天下之怨而君子之莫吾赦也則將日夜為計以備一旦卒然不可測之患今君子又從而疾惡之是以其謀不得不深其交不得不合交合而謀深則其致毒也忿戾而不可解故凡天下之患起於小人而成於君子之速之也小人在內君子在外君子為客小人為主主未發而客先焉則小人之詞直而君子之勢近於不順直則可以欺衆而不順則難以令其下故昔之舉事者常以中道而衆散以至於敗則其理豈不甚明哉若夫智者則不然內以自固其君子之交而厚集其勢外以陽浮而不逆於小人之意以待其間寬之不吾疾狃之使不吾慮啖之以以利以昏其智順適其意以殺其怒然後待其發而乘其隙推其墜而挽其絶故其用力也約而無後患莫為之先故君不怒而勢不逼如此者功成而天下安之今夫小人急之則合寬之則散是從古以然也見利不能不爭見患不能不避無信不能不相詐無禮不能不相瀆是故其交易間其黨易破也而君子不務寬之以待其變而急之以合其交亦已過矣君子小人雜居而未決為君子之計者莫若深交而無為茍不能深交而無為則小人倒持其柄而乘吾隙昔漢髙之亡以天下屬平勃及髙后臨朝擅王諸呂廢黜劉氏平日縱酒無一言及用陸賈計以千金交歡絳侯卒以此誅諸呂定劉氏使此二人者而不相能則是將相相攻之不暇而何暇及於劉吕之存亡哉故其説曰將相和調則士豫附士豫附則天下雖有變而權不分嗚呼知此其足以為大臣矣夫思治論首尾二千五百言如一串念佛珠其深入人情處如川雲嶺月方今天下何病哉其始不立其卒不成惟其不成是以厭之而愈不立也凡人之情一舉而無功則疑再則倦三則去之矣今世之士所以相顧而莫肯為者非其無有忠義慷慨之志也又非其才術謀慮不若人也患在苦其難成而不復立不知其所以不成者罪在於不立也茍立而成矣今世有三患而終莫能去其所從起者則五六十年矣自宫室禱祠之役興錢幣茶鹽之法壞加之以師旅而天下常患無財五六十年之間下之所以遊談聚議而上之所以變政易令以求豐財者不可勝數矣而財終不可豐自澶淵之役北敵雖求和而終不得其要領其後重之以西羌之變而邊陲不寧二國益驕以戰則不勝以守則不固而天下常患無兵五六十年之間下之所以遊談聚議而上之所以變政易令以求強兵者不可勝數矣而兵終不可強自選舉之格嚴而吏拘於法不志於功名考功課吏之法壞而賢者無所勸不肖者無所懼而天下常患無吏五六十年之間下之所以遊談聚議而上之所以變政易令以求擇吏者不可勝數矣而吏終不可擇財之不可豐兵之不可強吏之不可擇是豈真不可耶故曰其始不立其卒不成惟其不成是以厭之而愈不立也夫所貴於立者以其規模先定也古之君子先定其規模而後從事故其應也有候而其成也有形衆人以為是汗漫不可知而君子以為理之必然如炊之無不熟種之無不生也是故其用力省而成功速昔者子太叔問政於子産子産曰政如農功日夜以思之思其始而圗其終朝夕而行之行無越思如農之有畔子産以為不思而行與凡行而出於思之外者如農之無畔也其始雖勤而終必棄之今夫富人之營宫室也必先料其資財之豐約以制宫室之大小既內決於心然後擇工之良者而用一人焉必告之曰吾將為屋若干度用材幾何役夫幾人幾日而成土石材葦吾於何取之其工之良者必告之曰某所有木某所有石用財役夫若干某日而成主人率以聽焉及期而成既成而不失當則規模之先定也今治天下則不然百官有司不知上之所欲為也而人各有心好大者欲王好權者欲霸而偷者欲休息文吏之所至則治刑獄而聚斂之臣則以貨財為急民不知其所適從也及其發一政則曰姑試行之而已其齊與否固未可知也前之政未見其利害而後之政復發矣凡今之所謂新政者聽其始之議論豈不甚美而可樂哉然而布出於天下而卒不知其所終何則其規模不先定也用舍係於好惡而廢興決於衆寡故萬全之利以小不便而廢者有之矣百世之患以小利而不顧者有之矣所用之人無常責而所發之政無成效此猶適千里不賫糧而假丐於塗人治病不知其所當用之藥而百藥皆試以僥幸於一物之中欲三患之去不可得也昔者太公治齊周公治魯至於數十世之後子孫之強弱風俗之好惡皆可得而逆知之何者其所施專一則其勢固有以使之也管仲相桓公自始為政而至於霸其所施設皆有方法及其成功皆知其所以然至今可覆也咎犯之在晉范蠡之在越文公句踐嘗欲用其民而二臣皆以為未可及其以為可用也則破楚滅吳如寄諸其鄰而取之此無他見之明而策之熟也夫今之世亦與明者熟策之而已士爭言曰如是而財可豐如是而兵可強如是而吏可擇吾從其可行者而規模之發之以勇守之以專逹之以強日夜以求合於其所規模之內而無務出於其所規模之外其人專其政一然而不成者未之有也財之不豐兵之不強吏之不擇此三者存亡之所從出而天下之大事也夫以天下之大事而有一人焉獨擅而兼言之則其所以治此三者之術其得失固不可知也雖不可知而此三者決不可不治者可知也是故不可以無術其術非難知而難聽非難聽而難行非難行而難收孔子曰好謀而成使好謀而不成不如無謀蓋世有好劍者聚天下之良金鑄之三年而成以為吾劍天下莫敵也劍成而狼戾缺折不可用何者是知鑄而不知收也今世之舉事者雖其甚小而欲成之者常不過數人欲壞之者常不可勝數可成之功常難形若不可成之狀常先見上之人方且眩瞀而不自信又何暇及於收哉古之人有犯其至艱而圗其至逺者彼獨何術也且非特聖人而已商君之變秦法也攖萬人之怒排舉國之説勢如此其逆也蘇秦之為從也合天下之異以為同聨六姓之踈以為親計如此其迂也淮隂侯請於髙帝求三萬人願以北舉燕趙東擊齊南絶楚之糧道而西會於滎陽耿弇亦言於世祖欲先定漁陽取涿郡還收富平而東下齊世祖以為落落難合此皆越人之都邑而謀人國功如此其踈也然而四子者行之若易然出於其口成於其手以為既已許吾君則親挈而還之今吾以自有之天下而行吾所得為之事其事又非有所拂逆於天下之意也非有所待於人而後具也如有財而自用之有子而自教之耳然而政出於天下有出而無成者五六十年於此矣是何也意者知出而不知收歟非不知收意者汗漫而無所收歟故為之説曰先定其規模而後從事先定者可以謀人不先定者自謀常不給而況於謀人乎且今之世俗則有所可患者士大夫所以信服於朝廷者不篤而皆好議論以務非其上使人眩於是非而不知其所從從之則事舉無可為者不從則其所行者常多故而易敗夫所以多故而易敗者人各持其私意以賊之議論勝於下而幸其無功者衆也富人之謀利也常獲世以為福非也彼富人者信於人素深而服於人素厚所為而莫或害之所欲而莫或非之事未成而衆已先成之矣夫事之行也有勢其成也有氣富人者乘其勢而襲其氣也欲事之易成則先治其所以信服天下者天下之事不可以力勝力不可勝則莫若從衆從衆者非從衆多之口而從其所不言而同然者是真從衆也衆多之口非果衆也特聞於吾耳而接於吾前未有非其私説者也於吾為衆於天下為寡彼衆之所不言而同然者衆多之口舉不樂也以衆多之口所不樂而棄衆之所不言而同然則樂者寡而不樂者衆矣古之人常以從衆得天下之心而世之君子常以從衆失之不知夫古之人其所從者非從其口而從其所同然也何以明之世之所謂逆衆斂怨而不可行者莫若減任子然不顧而行之者五六年矣而天下未嘗有一言何則彼其口之所不樂而心之所同然也從其所同然而行之若猶有言者則可以勿恤矣故為之説曰發之以勇守之以專達之以強茍知此三者非獨為吾國而已雖北取契丹可也唐宋八大家文鈔卷一百二十七
