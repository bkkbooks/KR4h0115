body:
  text: 唐宋八大家文鈔南豐文鈔引曾子固之才燄雖不如韓退之柳子厚歐陽永叔及蘇氏父子兄弟然其議論必本於六經而其鼓鑄翦裁必折衷之於古作者之㫖朱晦菴嘗稱其文似劉向向之文於西京最為爾雅此所謂可與知者言難與俗人道也近年晉江王道思毘陵唐應徳始亟稱之然學士間猶疑信者半而至於膾炙者罕矣予錄其疏劄狀六首書十五首序三十一首記傳二十八首論議雜著哀詞七首嗟乎曾之序記為最而誌銘稍不及然於文苑中當如漢所稱古之三老祭酒是已學者不可不知歸安鹿門茅坤題
  hash: sha256:66a72f20e02ca8109b50b68130f5ccbefbd2bba357d21bd89fba08400a0b6f49
