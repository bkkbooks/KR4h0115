body:
  text: 唐宋八大家文鈔卷七十六明茅坤撰廬陵史鈔十六雜傳傳曰禮義廉恥國之四維四維不張國乃滅亡善乎管生之能言也禮義治人之大法廉恥立身之大節蓋不廉則無所不取不恥則無所不為人而如此則禍亂敗亡亦無所不至况為大臣而無所不取無所不為則天下其有不亂國家其有不亡者乎豫讀馮道長樂老敘見其自述以為榮其可謂無廉恥者矣則天下可從而知也豫于五代得全節之士三死事之臣十有五而怪士之被服儒者以學古自名而享人之祿任人之國者多矣然使忠義之節獨出於武夫戰卒豈於儒者果無其人哉豈非髙節之士惡時之亂薄其世而不肯出歟抑君天下者不足顧而莫能致之歟孔子以謂十室之邑必有忠信豈虛言也哉豫嘗得五代時小説一篇載王凝妻李氏事以一婦人猶能如此則知世固嘗有其人而不得見也凝家青齊之間為虢州司户參軍以疾卒于官凝家素貧一子尚幼李氏攜其子負其遺骸以歸東過開封止旅舍旅舍主人見其婦人獨攜一子而疑之不許其宿李氏顧天已暮不肯去主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執耶不可以一手并汚吾身即引斧自斷其臂路人見者環聚而嗟之或為之彈指或為之泣下開封尹聞之白其事于朝官為賜藥封瘡厚恤李氏而笞其主人者嗚呼士不自愛其身而忍恥以偷生者聞李氏之風宜少知愧哉馮道傳覽道傳到底是一鄉願中之最深而滑者馮道字可道瀛州景城人也事劉守光為參軍守光敗去事宦者張承業承業監河東軍以為巡官以其文學薦之晉王為河東節度掌書記莊宗即位拜户部侍郎充翰林學士道為人能自刻苦為儉約當晉與梁夾河而軍道居軍中為一茅庵不設牀席卧一束芻而巳所得俸祿與僕厮同器飲食意恬如也諸將有掠得人之美女者以遺道道不能却置之别室訪其主而還之其解學士居父喪于景城遇嵗飢悉出所有以賙鄉里而退耕于野躬自負薪有荒其田不耕者與力不能耕者道夜往潛為之耕其人後來愧謝道殊不以為德服除復召為翰林學士行至汴州遇趙在禮作亂明宗自魏擁兵還犯京師孔循勸道少留以待道曰吾奉詔赴闕豈可自留乃疾趨至京師莊宗遇弒明宗即位雅知道所為問安重誨曰先帝時馮道何在重誨曰為學士也明宗曰吾素知之此真吾宰相也拜道端明殿學士遷兵部侍郎嵗餘拜中書侍郎同中書門下平章事天成長興之間嵗屢豐熟中國無事道嘗戒明宗曰臣為河東掌書記時奉使中山過井陘之險懼馬蹶失不敢怠於銜轡及至平地謂無足慮遽跌而傷凡蹈危者慮深而獲全居安者患生於所忽此人情之常也明宗問曰天下雖豐百姓濟否道曰穀貴餓農穀賤傷農因誦文士聶夷中田家詩其言近而易曉明宗顧左右録其詩常以自誦永運軍將於臨河縣得一玉杯有文曰傳國寶萬嵗杯明宗甚愛之以示道道曰此前世有形之寶爾王者固有無形之寶也明宗問之道曰仁義者帝王之寶也故曰大寶曰位何以守位曰仁明宗武君不曉其言道已去召侍臣講説其義嘉納之道相明宗十餘年明宗崩相愍帝潞王反於鳯翔愍帝出奔衛州道率百官迎潞王以入是為廢帝遂相之廢帝即位時愍帝猶在衛州後三日愍帝始遇弒崩已而廢帝出道為同州節度使踰年拜司空晉滅唐道又事晉晉高祖拜道大司空同中書門下平章事加司徒兼侍中封魯國公高祖崩道相出帝加太尉封燕國公罷為匡國軍節度使徙鎮威勝契丹滅晉道又事契丹朝耶律德光於京師德光責道事晉無狀道不能對又問曰何以來朝對曰無城無兵安敢不來德光誚之曰爾是何等老子對曰無才無德癡頑老子德光喜以道為太傅德光北歸從至常山漢髙祖立乃歸漢以太師奉朝請周滅漢道又事周周太祖拜道太師兼中書令道少能矯行以取稱於世及為大臣尤務持重以鎮物事四姓十君益以舊德自處然當世之士無賢愚皆仰道為元老而喜為之稱譽耶律德光嘗問道曰天下百姓如何救得道為俳語以對曰此時佛出救不得惟皇帝救得人皆以謂契丹不夷滅中國之人者賴道一言之善也周兵反犯京師隱帝已崩太祖謂漢大臣必行推戴及見道道殊無意太祖素拜道因不得已拜之道受之如平時太祖意少沮知漢未可代遂陽立湘隂公贇為漢嗣遣道迎贇于徐州未至太祖將兵北至澶州擁兵而反遂代漢議者謂道能沮太祖之謀而緩之終不以晉漢之亡責道也然道視喪君亡國亦未嘗以屑意當是時天下大亂戎夷交侵生民之命急于倒懸道方自號長樂老著書數百言陳已更事四姓及契丹所得階勳官爵以為榮自謂孝於家忠於國為子為弟為人臣為司長為夫為父有子有孫時開一卷時飲一杯食味别聲被色老安於當代老而自樂何樂如之蓋其自述如此道前事九君未嘗諫諍世宗初即位劉旻攻上黨世宗曰劉旻少我謂我新立而國有大喪必不能出兵以戰且善用兵者出其不意吾當自將擊之道乃切諫以為不可世宗曰吾見唐太宗平定天下敵無大小皆親征道曰陛下未可比唐太宗世宗曰劉旻烏合之衆若遇我師如山壓卵道曰陛下作得山定否世宗怒起去卒自將擊旻果敗旻于髙平世宗取淮南定三關威武之振自髙平始其擊旻也鄙道不以從行以為太祖山陵使葬畢而道卒年七十三諡曰文懿追封瀛王道既卒時人皆相稱嘆以謂與孔子同壽其喜為之稱譽蓋如此道有子吉李琪傳通篇點綴琪之無廉恥處頗似馮道傳李琪字台秀河西燉煌人也其兄珽唐末舉進士及第為監察御史丁內艱貧無以葬乞食而後葬珽飢卧廬中聞者哀憐之服除還拜御史荆南成汭辟掌書記吳兵圍杜洪梁太祖遣汭與馬殷等救洪汭以大舟載兵數萬珽為汭謀曰今一舟容甲士千人糗糧倍之緩急不可動若為敵人縻之則武陵武安必為公之後患不若以徑兵屯巴陵壁不與戰吳兵糧盡則圍解矣汭不聽果敗溺死趙匡凝鎮襄陽又辟掌書記太祖破匡凝得珽喜曰此真書記也太祖即位除考功員外郎知制誥珽度太祖不欲先用故吏固辭不拜出知曹州曹州素劇難理前刺史十餘輩皆坐事廢珽至以治聞遷兵部郎中崇政院直學士許州馮行襲病行襲有牙兵二千皆故蔡卒太祖懼為變行襲為人嚴酷從事魏峻切諫行襲怒誣以贓下獄欲誅之乃遣珽代行襲為留後珽至許州止傳舍慰其將吏行襲病甚欲使人代受詔珽曰東首加朝服禮也乃即卧內見行襲道太祖語行襲感泣解印以授珽珽乃理峻寃立出之還報太祖太祖喜曰珽果辦吾事會嵗飢盜劫汴宋間曹州尤甚太祖復遣珽治之珽至索賊得大挍張彥珂珽甥李郊等及牙兵百餘人悉誅之召拜左諫議大夫太祖幸河北至內黃顧珽曰何謂內黃珽曰河南有外黃下黃故此名內黃太祖曰外黃下黃何在珽曰秦有外黃都尉在今雍邱下黃為北齊所廢在今陳留太祖平生不愛儒者聞珽語大喜友圭立除右散騎常侍侍講袁象先討賊珽為亂兵所殺琪少舉進士博學宏辭纍遷殿中侍御史與其兄珽皆以文章知名唐亡事梁太祖為翰林學士梁兵征伐四方所下書詔皆琪所為下筆輒得太祖意末帝時為御史中丞尚書左丞拜同中書門下平章事與蕭頃同為宰相頃性畏慎周密琪倜儻負氣不拘小節二人多所異同而琪內結趙巖張漢傑等為助以故頃言多沮頃嘗掎托其過琪所私吏當得試官琪改試為守為頃所發末帝大怒欲竄逐之而巖等救解乃得罷為太子少保唐莊宗滅梁得琪欲以為相而梁之舊臣多嫉忌之乃以為太常卿遷吏部尚書同光三年秋天下大水京師之食尤甚莊宗以朱書御札詔百寮上封事琪上書數千言其説漫然無足取而莊宗獨稱重之遂以為國計使方欲以為相而莊宗崩明宗入洛陽羣臣勸進有司具儀用柩前即位故事霍彥威孔循等請改國號絶土德明宗武君不曉其説問曰何謂改號對曰莊宗受唐賜姓為宗屬繼昭宗以立而號國曰唐今唐天命已絶宜改號以自新明宗疑之下其事羣臣羣臣依違不決琪議曰殿下宗室之賢立功三世今興兵向闕以赴難為名而欲更易統號使先帝便為路人則煢然梓宫何所依往明宗以為然乃發喪成服而後即位以琪為御史中丞自唐末喪亂朝廷之禮壞天子未嘗視朝而入閣之制亦廢常參之官日至正衙者傳聞不坐即退獨大臣奏事日一見便殿而侍從內諸司日再朝而已明宗初即位乃詔羣臣五日一隨宰相入見內殿謂之起居琪以謂非唐故事請罷五日起居而復朔望入閣明宗曰五日起居吾思所以數見羣臣也不可罷而朔望入閣可復然唐故事天子日御殿見羣臣曰常參朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見羣臣曰入閣宣政前殿也謂之衙衙有仗紫宸便殿也謂之閣其不御前殿而御紫宸也乃自正衙喚仗由閣門而入百官俟朝于衙者因隨以入見故謂之入閣然衙朝也其禮尊閣晏見也其事殺自乾符已後因亂禮闕天子不能日見羣臣而見朔望故正衙當日廢仗而朔望入閣有仗其後習見遂以入閣為重至出御前殿猶謂之入閣其後亦廢至是而復然有司不能講正其事凡羣臣五日一入見中興殿便殿也此入閣之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閣琪皆不能正也琪又建言入閣有待制次對官論事而內殿起居一見而退欲有言者無由自陳非所以數見羣臣之意也明宗乃詔起居日有言事者許出行日陳又詔百官以次轉對是時樞密使安重誨専權用事重誨前騶過御史臺門殿直馬延誤衝之重誨即臺門斬延而後奏琪為中丞畏重誨不敢彈糾又懼諫官論列乃託宰相任圜先白重誨而後糾然猶依違不敢正言其事豆盧革等罷相任圜議欲以琪為相而孔循鄭珏沮之乃止遷尚書右僕射琪以狀申中書言開元禮僕射上事日中書門下率百官送上中書下太常禮院言無送上之文而琪已落新授復舉上儀皆不可明宗討王都已破定州自汴還洛琪當率百官至上東門而請至偃師奉迎其奏章言敗契丹之凶黨破真定之逆城坐誤以定州為真定罰俸一月霍彥威卒招琪撰神道碑文彥威故梁將而琪故梁相也敘彥威在梁事不曰偽為馮道所駮琪為人重然諾喜稱人善少以文章知名亦以此自負既貴乃刻牙版為金字曰前鄉貢進士李琪常置之坐側為人少持重不知進退故數為當時所沮以太子少傅致仕卒年六十劉嶽傳劉嶽字昭輔洛陽人也唐民部尚書政會之八代孫崇龜崇望其諸父也嶽名家子好學敏於文辭善談論舉進士事梁為左拾遺侍御史末帝時為翰林學士纍官至兵部侍郎梁亡貶均州司馬復用為太子詹事唐明宗時為吏部侍郎故事吏部文武官告身皆輸朱膠紙軸錢然後給其品髙者則賜之貧者不能輸錢往往但得敕牒而無告身五代之亂因以為常官卑者無復給告身中書但録其制辭編為敕甲嶽建言以為制辭或任其材能或褒其功行或申以訓戒而受官者既不給告身皆不知受命之所以然非王言所以告詔也請一切賜之由是百官皆賜告身自嶽始也宰相馮道世本田家狀貌質野朝士多笑其陋道旦入朝兵部侍郎任贊與嶽在其後道行數反顧贊問嶽道反顧何為嶽曰遺下兔園册爾兔園册者鄉校俚儒教田夫牧子之所誦也故嶽舉以誚道道聞之大怒徙嶽祕書監其後李愚為相遷嶽太常卿初鄭餘慶嘗採唐士庶吉凶書疏之式雜以當時家人之禮為書儀兩卷明宗見其有起復冥昏之制嘆曰儒者所以隆孝悌而敦風俗且無金革之事起復可乎婚吉禮也用於死者可乎乃詔嶽選文學通知古今之士共刪定之嶽與太常博士段顒田敏等增損其書而其事出鄙俚皆當時家人女子傳習所見往往轉失其本然猶時有禮之遺制其後亡失愈不可究其本末其婚禮親迎有女坐壻鞍合髻之説尤為不經公卿之家頗尊用之至其久也又益訛謬可笑其類甚多嶽卒于官年五十六贈吏部尚書子溫叟嗚呼甚矣人之好為禮也在上者不以禮示之使人不見其本而傳其習俗之失者尚拳拳而行之五代干戈之亂不暇于禮久矣明宗武君出于夷狄而不通文字乃能有意使民知禮而嶽等皆當時儒者卒無所發明但因其書增損而巳然其後世士庶吉凶皆取嶽書以為法而十又轉失其三四也可勝嘆哉和凝傳和凝傳不足觀特其好文本末頗與今之士大夫以文相侈者類豫故録之以自警云和凝字成績鄆州須昌人也其九世祖逢堯為唐監察御史其後世遂不復宦學凝父矩性嗜酒不拘小節然獨好禮文士每傾資以交之以故凝得與之遊而凝幼聰敏形神秀發舉進士梁義成軍節度使賀瓌辟為從事瓌與唐莊宗戰于胡栁瓌戰敗脫身走獨凝隨之反顧見凝揮之使去凝曰大丈夫當為知已死吾恨未得死所爾豈可去也已而一騎追瓌幾及凝叱之不止即引弓射殺之瓌由此得免瓌歸戒其諸子曰和生志義之士也後必富貴爾其謹事之因妻之以女天成中拜殿中侍御史纍遷主客員外郎知制誥翰林學士知貢舉是時進士多浮薄喜喧譁以動主司主司每放榜則圍之以棘閉省門絶人出入以為常凝徹棘開門而士皆肅然無譁所取皆一時之秀稱為得人晉初拜端明殿學士兼判度支為翰林學士承旨晉髙祖數召之問以時事凝條對皆稱旨天福五年拜中書侍郎同中書門下平章事髙祖將幸鄴而襄州安從進反迹巳見凝曰陛下幸鄴從進必因此時反則將奈何髙祖曰卿將何以待之凝曰先人者所以奪人也請為宣敕十餘通授之鄭王有急則命將擊之髙祖以為然是時鄭王為開封尹留不從幸乃授以宣敕髙祖至鄴從進果反鄭王即以宣敕命騎將李建崇焦繼勳等討之從進謂髙祖方幸鄴不意晉兵之速也行至花山遇建崇等兵以為神遂敗走出帝即位加右僕射嵗餘罷平章事遷左僕射漢髙祖時拜太子太傅封魯國公顯德二年卒年五十八贈侍中凝好飾車服為文章以多為富有集百餘卷常自鏤版以行于世識者多非之然性樂善好稱道後進之士唐故事知貢舉者所放進士以已及第時名次為重凝舉進士及第時第五後知貢舉選范質為第五後質位至宰相封魯國公官至太子太傅皆與凝同當時以為榮焉張允傳張允鎮州人也少事鎮州為張文禮參軍唐莊宗討張文禮允脫身降莊宗繫之獄文禮敗乃出之為魏州功曹趙在禮辟節度推官歷滄兖二鎮掌書記入為監察御史纍遷水部員外郎知制誥廢帝皇子重美為河南尹掌六軍以允剛介乃拜允給事中為六軍判官罷遷左散騎常侍晉髙祖即位屢赦天下允為駮赦論以獻曰管子曰凡赦者小利而大害久而不勝其禍無赦者小害而大利久而不勝其福又漢之吳漢疾篤帝問漢所欲言漢曰惟願陛下無赦爾蓋行赦不以為恩不行赦不以為無恩罰有罪故也自古皆以水旱則降德音而宥過開狴牢而出囚冀感天心以救其災者非也假有二人之訟者一有罪而一無罪若有罪者見捨則無罪者銜寃此乃致災之道非救災之術也至使小人遇天災則皆喜而相勸以為惡曰國將赦矣必捨我以救災如此則是教民為惡也夫天之為道福善而禍淫若捨惡人而變災為福則是天又喜人為惡也凡天之降災所以警戒人主節嗜欲務勤儉恤鰥寡正刑罰而已是時晉髙祖方好臣下有言覽之大悅允事漢為吏部侍郎隱帝誅戮大臣京師皆恐允常退朝不敢還家止于相國寺周太祖以兵入東師允匿于佛殿承塵墜而卒年六十五馬重績傳馬重績字洞微其先出於北狄而世事軍中重績少學數術明太一五紀八象三統大厯居于太原唐莊宗鎮太原每用兵征伐必以問之重績所言無不中拜大理司直明宗時廢不用晉髙祖以太原拒命廢帝遣兵圍之勢甚危急命重績筮之遇同人曰天火之象乾健而離明健者君之德也明者南面而嚮之所以治天下也同人者人所同也必有同我者焉易曰戰乎乾乾西北也又曰相見乎離離南方也其同我者自北而南乎乾西北也戰而勝其九月十月之交乎是嵗九月契丹助晉擊敗唐軍晉遂有天下拜重績太子右贊善大夫遷司天監明年張從賓反命重績筮之遇隨曰南瞻析木木不自續虛而動之動隨其覆嵗將秋矣無能為也七月而從賓敗髙祖大喜賜以良馬器幣天福三年重績上言歷象王者所以正一氣之元宣萬邦之命而古今所紀考審多差宣明氣朔正而星度不驗崇玄五星得而嵗差一日以宣明之氣朔合崇玄之五星二厯相參然後符合自前世諸歷皆起天正十一月為嵗首用太古甲子為上元積歲愈多差濶愈甚臣輒合二歷創為新法以唐天寶十四載乙未為上元雨水正月中氣為氣首詔下司天監趙仁錡張文皓等考核得失仁錡等言明年庚子正月朔用重績歷考之皆合無舛乃下詔頒行之號調元歷行之數嵗輒差遂不用重績又言漏刻之法以中星考晝夜為一百刻刻十分刻之二十為一時時以四刻十分為正此自古所用也今失其傳以午正為時始下侵未四刻十分而為午由是晝夜昏曉皆失其正請依古改正從之重績卒年六十四唐宋八大家文鈔卷七十六
