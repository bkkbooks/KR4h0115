body:
  text: 唐宋八大家文鈔潁濱文鈔引蘇文定公之文其鑱削之思或不如父雄傑之氣或不如兄然而沖和淡泊遒逸疏宕大者萬言小者千餘言譬之片帆截海澄波不揚而洲島之棼錯雲霞之蔽虧日星之閃爍魚龍之出沒並席之掌上而綽約不窮者已西漢以來别調也其君術臣事民政等篇尤為卓犖豫讀之録其上皇帝書及劄子狀十九首與他執政書十首諸論及厯代古史名論八十二首䇿二十五首序引傳七首記十二首説贊辭賦祭文雜著十一首釐為二十卷歸安鹿門茅坤題
  hash: sha256:da1574f4ce15db1703ddb56615db602adeee513931fa157236b04e1cf351cf63
