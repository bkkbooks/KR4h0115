body:
  text: 唐宋八大家文鈔卷三十八明茅坤撰廬陵文鈔十書上范司諫書勝韓公爭臣論前月中得進奏吏報云自陳州召至闕拜司諫即欲為一書以賀多事卒卒未能也司諫七品官爾於執事得之不為喜而獨區區欲一賀者誠以諫官者天下之得失一時之公議繫焉今世之官自九卿百執事外至一郡縣吏非無貴官大職可以行其道也然縣越其封郡逾其境雖賢守長不得行以其有守也吏部之官不得理兵部鴻臚之卿不得理光祿以其有司也若天下之失得生民之利害社稷之大計惟所見聞而不繫職司者獨宰相可行之諫官可言之爾故士學古懷道者仕於時不得為宰相必為諫官諫官雖卑與宰相等天子曰不可宰相曰可天子曰然宰相曰不然坐乎廟堂之上與天子相可否者宰相也天子曰是諫官曰非天子曰必行諫官曰必不可行立殿階之前與天子爭是非者諫官也宰相尊行其道諫官卑行其言言行道亦行也九卿百司郡縣之吏守一職者任一職之責宰相諫官繫天下之事亦任天下之責然宰相九卿而下失職者受責於有司諫官之失職也取譏於君子有司之法行乎一時君子之譏著之簡册而昭明垂之百世而不泯甚可懼也夫七品之官任天下之責懼百世之譏豈不重邪非材且賢者不能為也近執事始被召於陳州洛之士大夫相與語曰我識范君知其材也其來不為御史必為諫官及命下果然則又相與語曰我識范君知其賢也他日聞有立天子陛下直辭正色面爭庭論者非他人必范君也拜命以來翹首企足竚乎有聞而卒未也竊惑之豈洛之士大夫能料於前而不能料於後也將執事有待而為也昔韓退之作爭臣論以譏陽城不能極諫卒以諫顯人皆謂城之不諫蓋有待而然退之不識其意而妄譏修獨以謂不然當退之作論時城為諫議大夫已五年後又二年始庭論陸贄及沮裴延齡作相欲裂其麻才兩事爾當德宗時可謂多事矣授受失宜叛將强臣羅列天下又多猜忌進任小人於此之時豈無一事可言而須七年耶當時之事豈無急於沮延齡論陸贄兩事也謂宜朝拜官而夕奏疏也幸而城為諫官七年適遇延齡陸贄事一諫而罷以塞其責向使止五年六年而遂遷司業是終無一言而去也何所取哉今之居官者率三嵗而一遷或一二嵗甚者半嵗而遷也此又非一可以待乎七年也今天子躬親庶政化理清明雖為無事然自千里詔執事而拜是官者豈不欲聞正議而樂讜言乎然今未聞有所言說使天下知朝廷有正士而彰吾君有納諫之明也夫布衣韋帶之士窮居草茅坐誦書史常恨不見用及用也又曰彼非我職不敢言或曰我位猶卑不得言得言矣又曰我有待是終無一人言也可不惜哉伏惟執事思天子所以見用之意懼君子百世之譏一陳昌言以塞重望且解洛士大夫之惑則幸甚幸甚與髙司諫書歐公惡惡太過處使在今日恐不免國武子之禍也修頓首再拜白司諫足下某年十七時家隨州見天聖二年進士及第榜始識足下姓名是時豫年少未與人接又居逺方但聞今宋舍人兄弟與葉道卿鄭天休數人者以文學大有名號稱得人而足下厠其間獨無卓卓可道說者豫固疑足下不知何如人也其後更十一年豫再至京師足下已為御史裏行然猶未暇一識足下之面但時時於豫友尹師魯問足下之賢否而師魯說足下正直有學問君子人也豫猶疑之夫正直者不可屈曲有學問者必能辨是非以不可屈之節有能辨是非之明又為言事之官而俯仰默默無異衆人是果賢者耶此不得使豫之不疑也自足下為諫官來始得相識侃然正色論前世事歷歷可聽褒貶是非無一謬說噫持此辨以示人孰不愛之雖豫亦疑足下真君子也是豫自聞足下之名及相識凡十有四年而三疑之今者推其實迹而較之然後決知足下非君子也前日范希文貶官後與足下相見於安道家足下詆誚希文為人豫始聞之疑是戲言及見師魯亦說足下深非希文所為然後其疑遂決希文平生剛正好學通古今其立朝有本末天下所共知今又以言事觸宰相得罪足下既不能為辨其非辜又畏有識者之責已遂隨而詆之以為當黜是可怪也夫人之性剛果懦軟稟之於天不可勉强雖聖人亦不以不能責人之必能今足下家有老母身惜官位懼饑寒而顧利祿不敢一忤宰相以近刑禍此庸人之常情不過作一不才諌官爾雖朝廷君子亦將閔足下之不能而不責以必能也今乃不然反昻然自得了無愧畏便毁其賢以為當黜庶乎飾已不言之過夫力所不敢為乃愚者之不逮以智文其過此君子之賊也且希文果不賢邪自三四年來從大理寺丞至前行員外郎作待制日日備顧問今班行中無與比者是天子驟用不賢之人夫使天子待不賢以為賢是聰明有所未盡足下身為司諫乃耳目之官當其驟用時何不一為天子辨其不賢反默默無一語待其自敗然後隨而非之若果賢邪則今日天子與宰相以忤意逐賢人足下不得不言是則足下以希文為賢亦不免責以為不賢亦不免責大抵罪在默默爾昔漢殺蕭望之與王章計其當時之議必不肯明言殺賢者也必以石顯王鳯為忠臣望之與章為不賢而被罪也今足下視石顯王鳯果忠邪望之與章果不賢邪當時亦有諫臣必不肯自言畏禍而不諫亦必曰當誅而不足諫也今足下視之果當誅邪是直可欺當時之人而不可欺後世也今足下又欲欺今人而不懼後世之不可欺邪况今之人未可欺也伏以今皇帝即位已來進用諫臣容納言論如曹修古劉越雖殁猶被褒稱今希文與孔道輔皆自諫諍擢用足下幸生此時遇納諫之聖主如此猶不敢一言何也前日又聞御史臺榜朝堂戒百官不得越職言事是可言者惟諫臣爾若足下又遂不言是天下無得言者也足下在其位而不言便當去之無妨他人之堪其任者也昨日安道貶官師魯待罪足下猶能以面目見士大夫出入朝中稱諌官是足下不復知人間有羞恥事爾所可惜者聖朝有事諫官不言而使他人言之書在史册他日為朝廷羞者足下也春秋之法責賢者備今某區區猶望足下之能一言者不忍便絶足下而不以賢者責也若猶以謂希文不賢而當逐則豫今所言如此乃是朋邪之人爾願足下直攜此書於朝使正豫罪而誅之使天下皆釋然知希文之當逐亦諫臣之一效也前日足下在安道家召豫往論希文之事時坐有他客不能盡所懷故輒布區區伏惟幸察不宣論河北財産上時相書材略甚大惜所云别紙不得見耳某頓首啓仲春漸暄伏惟相公尊體動止萬福某不佞少以文章言語自任而頃備諫諍之臣得與朝廷論議當中外多事天子急於聽納之時不以為愚而屢加奬擢及得寵太過受恩太深則自視區區素所任者不足以報稱萬一故方欲勉强不能以圖自效而䝉相公不以為不才而擇天下諸路中最重之地以授之而責其所為當此之時自宜如何可以塞責及臨職以來逮將半嵗齷齪自守未知所措非敢怠也誠有說也至於山川險易城寨屯防邊陲守備等事是皆河朔之大者朝廷己委樞密富公經畫之矣而本司之事自不為少凡自河以北州軍縣寨一百八十有七城主客之民七十萬五千有七百戶官吏在職者一千二百餘員廂禁軍馬義勇民兵四十七萬七千人騎嵗支糧草錢帛二千四百四十五萬而非常之用不與焉其間事目之節利害之源非詳求而審察之不能得其要前張昷之等急於舉職公家之利知無不為其興利除害便於事者極多而時有失於不審更改過繁而涉於苛碎者故自繼職以來遵其所長戒其所短凡事關利害者慎之重之未敢輕議今半嵗矣官吏之能否公私之弊病粗已得其十七八而又取其事涉苛碎紛繁而下切患之有司自可改復不煩朝廷處分者先以次第行之乃暇及於其他然其事繫利害有司不敢自決必當上聞者其類甚多而久之未敢干朝聽者不惟自疑於不審誠慮朝廷鑒昷之等前失不能盡信其說而必從之今慎之久矣得之詳矣茍有所請實有望於見信而從之也凡河北大事富公經營之外其要不過五六其不可為者一其可為者四五耳雖皆有司之事然朝廷主張之則能行不主張之則亦不能為也自古邦國財産之利必出山澤故傳曰山海天地之藏也自兩漢以來摘山煮海之利必歸公上而今天下諸路山澤悉己𣙜之無遺利矣獨河北一方兵民所聚最為重地而東負大海西有髙山此財利之産天地之藏而主計之吏皆不得取焉祖宗時哀閔河北之民嵗為夷狄所困盡以海鹽之利乞與疲民此國家恩德在人己深而不可奪者也西山之長數百里其産金銀銅鐵丹砂之類無所不有至寶久伏於下而光氣苗礦往往溢發而出地官禁之不許取故捨此惟有平地耳河北之地四方不及千里而緣邊廣信安肅順安雄霸之間盡為塘水民不得耕者十八九澶衛德博濵棣通利大名之界東與南嵗嵗河災民不得耕者十五六今年大豐秋稅尚放一百萬石滄瀛深冀邢洺大名之界西與北鹹鹵大小鹽池民不得耕者十三四又有泊淀不毛監馬棚牧與夫貧乏之逃而荒棄者不可勝數大山大海之利既不可取而平地堪出財賦者又有限而不取其取者不過酒稅之入耳其入有數而用度無常也故雖僅桑之心計捨山澤與平地不能為之此所謂不可為者一也及其用有不足不過上干朝廷乞銀絹而配疲民號為變轉爾此近年之弊也然若能擇官吏以辦職事裁僥幸以減浮費謹良材精器械以助武備因貴賤通漕運而移有無如此之類茍能為之尚可使邊防粗足而京師省費用此冀禆萬一而皆有弊病理須更改事目委曲非書可殫敢具其大綱列于别紙伏望特加省覽察其利害或其所說不至大乖戾望少信而從之俾畢其所為若夫盡其所為而卒然無成焉則不待朝廷之責而自當劾去若其有以禆萬一則何幸如之伏惟聰明少賜裁擇不宣投時相書歐公以文為贄投時相與韓昌黎同而其自謙之中實以自譽殊不放倒自巳地步某不佞疲軟不能强筋骨與工人田夫坐市區服畎畝為力役之勞獨好取古書文字考尋前世以來聖賢君子之所為與古之車旗服器名色等數以求國家之治賢愚之任至其炳然而精者時亦穿蠧盜取飾為文辭以自欣喜然其為道閎深肆大非愚且迂能所究及用功益精力益不足其勞反甚於市區畎畝而其所得較之誠有不及焉豈勞力而役業者成功易勤心而為道者至之難歟欲悔其所難而反就其易則復慙聖人為山一簣止焉之言不敢叛棄故退失其小人之事進不及君子之文茫然其心罔識所嚮若棄車川游漫於中流不克攸濟回視陸者顧瞻徨徨然復思之人之有材能抱道德懷智慮而可自肆於世者雖聖與賢未嘗不無不幸焉禹之偏枯郤克之跛丘明之盲有不幸其身者矣抱關擊柝栖惶奔走孟子之戰國揚雄之新室有不幸其時者矣少焉而材學焉而不回賈誼之毁仲舒之禁錮雖有其時有不幸其偶者矣今以六尺可用之軀生太平有道之世無進身毁罪之懼是其身時偶三者皆幸於古人之所有者獨不至焉豈天之所豫不兩足歟亦勉之未臻歟伏惟明公履道懷正以相天下上以承天子社稷之大計下以理公卿百職之宜賢者任之以能不賢者任之以力由士大夫下至於工商賤技皆適其分而收其長如修之愚既不足任之能亦不堪任以力徒以常有志於學也今幸以文字試於有司因自顧其身時偶三者之幸也不能默然以自羞謹以所業雜文五軸贄閽人以俟進退之命焉上杜中丞書議論明切歸之正直而後先中彀率修前伏見舉南京留守推官石介為主簿近者聞介以上書論赦被罷而臺中因舉他吏代介者主簿於臺職最卑介一賤士也用不用當否未足害政然可惜者中丞之舉動也介為人剛果有氣節力學喜辨是非真好義之士也始執事舉其材議者咸曰知人之明今聞其罷皆謂赦乃天子已行之令非疏賤當有說以此罪介曰當罷修獨以為不然然不知介果指何事而言也傳者皆云介之所論謂朱梁劉漢不當求其後裔爾若止此一事則介不為過也然又不知執事以介為是為非也若隨以為非是大不可也且主簿於臺中非言事之官然大抵居臺中者必以正直剛明不畏避為稱職今介足未履臺門之閾而已因言事見罷真可謂正直剛明不畏避矣度介之才不止為主簿直可任御史也是執事有知人之明而介不負執事之知矣修嘗聞長老說趙中令相太祖皇帝也嘗為某事擇官中令列二臣姓名以進太祖不肯用它日又問復以進又不用它日又問復以進太祖大怒裂其奏擲殿階上中令色不動插笏帶間徐拾碎紙袖歸中書它日又問則補綴之復以進太祖大悟終用二臣彼之敢爾者蓋先審知其人之可用然後果而不可易也今執事之舉介也亦先審知其可舉邪是偶舉之邪若知而舉則不可遽止若偶舉之猶宜一請介之所言辨其是非而後已若介雖忤上而言是也當助以辨若其言非也猶宜曰所舉者為主簿爾非言事也待為主簿不任職則可罷請以此辭焉可也且中丞為天子司直之臣上雖好之其人不肖則當彈而去之上雖惡之其人賢則當舉而申之非謂隨時好惡而髙下者也今備位之臣百千邪者正者其糾舉一信於臺臣而執事始舉介曰能朝廷信而將用之及以為不能則亦曰不能是執事自信猶不果若遂言它事何敢望天子之取信於執事哉故曰主簿雖卑介雖賤士其可惜者中丞之舉動也况今斥介而它舉必亦擇賢而舉也夫賢者固好辨若舉而入臺又有言則又斥而它舉乎如此則必得愚暗懦默者而後止也伏惟執事如欲舉愚者則豈敢復云若將舉賢也願無易介而它取也今世之官兼御史者例不與臺事故敢布狂言竊獻門下伏惟幸察焉與刁景純學士書叙情修頓首啓近自罷乾德遂居南陽始見謝舍人知丈丈內翰凶訃聞問驚怛不能已已丈丈位望並隆然平生亦嘗坎軻數年以來方履亨塗任要劇其去大用尺寸間爾豈富與貴不可力為而天之賦豫多少有限邪凡天之賦豫人者又量何事而為之節也前既不可詰但痛惜感悼而已某自束髮為學初未有一人知者及首登門便被憐奬開端誘道勤勤不已至其粗若有成而後止雖其後遊於諸公而獲齒多士雖有知者皆莫之先也然亦自念不欲效世俗子一遭人之顧已不以至公相期反趨走門下脅肩諂笑甚者獻讒諛而備使令以卑眤自親名曰報德非惟自私直亦待所知以不厚是故懼此惟欲少勵名節庶不泯然無聞用以不負所知爾某之愚誠所守如此然雖胥公亦未必諒某此心也自前嵗得罪夷陵奔走萬里身日益窮迹日益疏不及再聞語言之音而遂為幽明之隔嗟夫世俗之態既不欲為愚誠所守又未克果惟有望門長號臨柩一奠亦又不及此之為恨何可道也徒能惜不永年與未大用遂與道路之人同歎爾知歸葬廣陵遂謀京居議者多云不便而聞理命若斯必有以也若須春水下汴某嵗盡春初當過京師尚可一拜見以盡區區身賤力微於此之時當有可致而無毫髮之助慚愧慚愧不宣與蔡君謨求書集古録序書風韻佳修啓嚮在河朔不能自間嘗集録前世金石之遺文自三代以來古文奇字莫不皆有中間雖罪戾擯斥水陸奔走顛危困踣兼之人事吉凶憂患悲愁無聊倉卒未嘗一日忘也蓋自慶厯乙酉逮嘉祐壬寅十有八年而得千卷顧其勤至矣然亦可謂富哉竊復自念好嗜與俗異馳乃獨區區收拾世人之所棄者惟恐不及是又可笑也因輒自叙其事庶以見其志焉然顧其文鄙意陋不足以示人既則自視前所集録雖浮屠老子詭妄之說常見貶絶於吾儒者往往取之而不忍遽廢者何哉豈非特以其字畫之工邪然則字書之法雖為學者之餘事亦有助於金石之傳也若浮屠老子之說當棄而獲存者乃直以字畫而傳是其幸而得所託爾豈特有助而已哉僕之文陋矣顧不能以自傳其或幸而得所託則未必不傳也由是言之為僕不朽之託者在君謨一揮毫之頃爾竊惟君子樂善欲成人之美者或聞斯說謂宜有不能却也故輒持其說以進而不疑伏惟幸察與陳員外書歐公之不欲自抗教人以禮也如此修本愚無似固不足以希執友之遊然而羣居平日幸得肩從齒序跪拜起居竊兄弟行寓書存勞謂宜有所欵曲以親之之意奈何一幅之紙前名後書且狀且牒如上公府退以尋度非謙即疏此乃世之浮道之交外陽相尊者之為非宜足下之所以賜修也古之書具惟有鉛刀竹木而削札為刺止於達名姓寓書於簡止於舒心意為問好惟官府吏曹凡公之事上而下者則曰符曰檄問訊列對下而上者則曰狀位等相以往來曰移曰牒非公之事長吏或自以意曉其下以戒以飭者則曰教下吏以私自達於其屬長而有所候問請謝者則曰箋記書啓故非有狀牒之儀施於非公之事相參如今所行者其原蓋出唐世大臣或貴且尊或有權於時縉紳湊其門以傅嚮者謂舊禮不足為重務稍增之然始於刺謁有參候起居因為之狀及五代始復以候問請謝加狀牒之儀如公之事然止施於官之尊貴及吏之長者其僞謬所從來既逺世不根古以為當然居今之世無不知此而莫以易者蓋常俗所為積習已牢而不得以更之也然士或同師友締交游以道誼相期者尚有手書勤勤之意猶為近古噫候問請謝非公之事有狀牒之儀以施於尊貴長吏猶曰非古之宜用況又用之於肩從齒序跪拜起居如兄弟者乎豈足下不以道義交游期我而惜手書之勤邪將待以牽俗積習者而姑用世禮以遇我之勤邪不然是為浮道以陽相尊也是以不勝拳拳之心謹布左右與黃挍書論文章書文雖短而所措言革弊一節非有深識不及此今之策士當熟思之修頓首啓䝉問及丘舍人所示雜文十篇竊嘗覽之驚歎不已其毁譽等數短篇尤為篤論然觀其用意在於䇿論此古人之所難工是以不能無小闕其救弊之說甚詳而革弊未之能至見其弊而識其所以革之者才識兼通然後其文博辨而深切中於時病而不為空言蓋見其弊必見其所以弊之因若賈生論秦之失而推古飬太子之禮此可謂知其本矣然近世應科目文辭求若此者蓋寡必欲其極致則宜少加意然後煥乎其不可禦矣文章繫乎治亂之說未易談况乎愚昧惡能當此愧畏愧畏修謹白與謝景山書有佳致昨送馬人還得所示書并古瓦硯歌一軸近著詩文又三軸不勝欣喜景山留滯州縣行年四十獨能異其少時雋逸之氣就於法度根蒂前古作為文章一下其筆遂髙於人乃知駔駿之馬奔星覆駕及節之鑾和以駕五輅而行於大道則非常馬之所及也古人久困不得其志則多躁憤佯狂失其常節接輿屈原之輩是也景山愈困愈刻意又能恬然習於聖人之道賢於古人逺矣某嘗自負平生不妄許人之交而所交必得天下之賢才今景山若此於吾之交有光所以某益得自負也幸甚幸甚與君謨往還書不如此何以發明然何必懼人之多見也若欲衒長而恥短則是有爭心於其中有爭心則意不在於謀道也荀卿曰有爭氣者不可與辨此之謂也然君謨既規景山之短不當以示人彼以示人景山不當責之而欲自蔽也願試思之與曾鞏論氏族書明辨修白貶所僻逺不與人通辱遣專人惠書甚勤豈勝愧也示及見託撰次碑文事修於人事多故不近文字久矣大懼不能稱述世德之萬一以滿足下之意然近世士大夫於氏族尤不明其遷徙世次多失其序至於始封得姓亦或不真如足下所示云曾元之曽孫樂為漢都鄉侯至四世孫據遭王莽亂始去都鄉而家豫章考於史記皆不合蓋曽元去漢近二百年自元至樂似非曽孫然亦當仕漢初則據遭莽世失侯而徙蓋又二百年疑亦非四世以諸侯年表推之雖大功德之侯亦未有終前漢而國不絶者亦無自髙祖之世至平帝時侯才四傳者宣帝時分宗室趙頃王之子景封為都鄉侯則據之去國亦不在莽世而都鄉已先别封宗室矣又樂據姓名皆不見於年表蓋世次久逺而難詳如此若曽氏出於鄫者蓋其支庶自别有為曽氏者爾非鄫子之後皆姓曽也蓋今所謂鄫氏者是也楊允恭據國史所書嘗以西京作坊使為江浙發運制置茶鹽使乃至道之間耳今云洛苑使者雖且從所述皆宜更加考正山州無文字尋究不能周悉幸察與郭秀才書以贄與文稱秀才而以禮與賦詩次已之所以答處議論甚曲而采僕昨以吏事至漢東秀才見僕於叔父家以啓事二篇偕門刺先進自賔階拜起旋辟甚有儀坐而語諾甚謹讀其辭溫密華富甚可愛視秀才待僕之意甚勤而禮也古人之相見必有歡欣交接之誠而不能達乃取羔鴈雉鶩之類致其意為贄而先既致其意又恥其無文則以虎豹之皮繢畫之布以飾之然後意達情接客既贄而主人必禮以答之為陳酒殽幣篚壺矢燕樂之具將其意又為賦詩以陳其情今秀才好學甚精博記書史務為文辭不以羔禽皮布為飾獨以言文其身而其贄既美其意既勤矣宜秀才責僕之答厚也僕既無主人之具以為禮獨為秀才賦詩女曰雞鳴之卒章曰知子之來之雜佩以贈之取其知客之來豫儲珩璜琚瑀之美以送客雖無此物猶言之以致其意厚也僕誠無此物可謂空言之爾秀才年且少貌厚色揚志鋭學敏因進其業修其辭暴練緝織之不已使其文采五色潤澤炳鬱若贄以見當世公卿大人非惟若僕空言以贈也必有分庭而禮加籩豆實幣篚延為上賓者惟勉之不已不宣唐荆川曰通篇情叙此小文字之極工者也唐宋八大家文鈔卷三十八
