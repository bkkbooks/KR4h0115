body:
  text: 唐宋八大家文鈔卷一百十五明茅坤撰老泉文鈔九衡論廣士韓子不幸而出於胥商之族一段議論與此略同古之取士取於盜賊取於夷狄古之人非以盜賊夷狄之士可為也以賢之所在而巳矣夫賢之所在貴而貴取焉賤而賤取焉是以盜賊下人夷狄異類雖奴𨽻之所恥而往往登之朝廷坐之郡國而不以為非而繩趨尺步華言華服者往往反擯棄不用何則天下之能繩趨而尺步華言而華服者衆也朝廷之政郡國之事非特如此而可治也彼雖不能繩趨尺步華言華服然而其才果可用於此則居此位可也古者天下之國大而多士大夫者不過曰齊與秦也而管夷吾相齊賢也而舉二盜焉穆公霸秦賢也而舉由余焉是其能果於是非而不牽於衆人之議也未聞有以用盜賊夷狄而鄙之者也今有人非盜賊非夷狄而猶有不獲用吾不知其何也夫古之用人無擇於勢布衣寒士而賢則用之公卿之子弟而賢則用之武夫健卒而賢則用之巫醫方技而賢則用之胥史賤吏而賢則用之今也布衣寒士持方尺之紙書聲病剽竊之文而至享萬鍾之祿卿大夫之子弟飽食於家一出而驅髙車駕大馬以為民上武夫健卒有灑掃之力奔走之舊久乃領藩郡執兵柄巫醫方技一言之中大臣且舉以為吏若此者皆非賢也皆非功也是今之所以進之之塗多於古也而胥史賤吏獨棄而不録使老死於敲搒趨走而賢與功者不獲一施吾甚惑也不知胥史之賢優而養之則儒生武士或所不若昔者漢有天下平津侯樂安侯輩皆號為儒宗而卒不能為漢立不世大功而其卓絶俊偉震耀四海者乃其賢人之出於吏胥中者耳夫趙廣漢河間之郡吏也尹翁歸河東之獄吏也張敞太守之卒史也王尊涿郡之書佐也是皆雄俊明博出之可以為將而內之可以為相者也而皆出於吏胥中者有以也夫吏胥之人少而習法律長而習獄訟老姦大豪畏憚懾伏吏之情狀變化出入無不諳究因而官之則豪民猾吏之弊表裏毫末畢見於外無所逃遁而又上之人擇之以才遇之以禮而其志復自知得自奮於公卿故終不肯自棄於惡以賈罪戾而敗其終身之利故當此時士君子皆優為之而其間自縱於大惡者大約亦不過幾人而其尤賢者乃至成功如是今之吏胥則不然始而入之不擇也終而遇之以犬彘也長吏一怒不問罪否袒而笞之喜而接之乃反與交手為市其人常曰長吏待我以犬彘我何望而不為犬彘哉是以平民不能自棄為犬彘之行不肯為吏矣況士君子而肯俯首為之乎然欲使之謹飭可用如兩漢亦不過擇之以才待之以禮恕其小過而棄絶其大惡之不可貰忍者然後察其賢有功而爵之祿之貴之勿棄之於冗流之門則彼有冀於功名自尊其身不敢丐奪而竒才絶智出矣夫人固有才智竒絶而不能為章句名數聲律之學者又有不幸而不為者苟一之以進士制䇿是使竒才絶智有時而窮也使吏胥之人得出為長吏是使一介之才無所逃也進士制策網之於上此又網之於下而曰天下有遺才者吾不信也申法古今分欵荆川謂體如鹽鐵中古今之異一段良是古之法簡今之法繁簡者不便於今而繁者不便於古非今之法不若古之法而今之時不若古之時也先王之作法也莫不欲服民之心服民之心必得其情情然耶而罪亦然則固入吾法矣而民之情又不皆如其罪之輕重大小是以先王忿其罪而哀其無辜故法舉其略而吏制其詳殺人者死傷人者刑則以著于法使民知天子之不欲我殺人傷人耳若其輕重出入求其情而服其心者則以屬吏任吏而不任法故其法簡今則不然吏姦矣不若古之良民偷矣不若古之淳吏姦則以喜怒制其輕重而出入之或至於誣執民偷則吏雖以情出入而彼得執其罪之大小以為辭故今之法纎悉委備不執于一左右前後四顧而不可逃是以輕重其罪出入其情皆可以求之法吏不奉法輒以舉劾任法而不任吏故其法繁古之法若方書論其大槩而增損劑量則以屬醫者使之視人之疾而參以己意今之法若鬻屨既為其大者又為其次者又為其小者以求合天下之足故其繁簡則殊而求民之情以服其心則一也然則今之法不劣於古矣而用法者尚不能無弊何則律令之所禁畫一明備雖婦人孺子皆知畏避而其間有習于犯禁而遂不改者舉天下皆知之而未嘗怪也先王欲杜天下之欺也為之度以一天下之長短為之量以齊天下之多寡為之權衡以信天下之輕重故度量權衡法必資之官資之官而後天下同今也庶民之家刻木比竹繩絲縋石以為之富商豪賈內以大出以小齊人適楚不知其孰為斗孰為斛持東家之尺而挍之西鄰則若十指然此舉天下皆知之而未嘗怪者一也先王惡竒貨之蕩民且哀夫微物之不能遂其生也故禁民採珠貝惡夫物之偽而假真且重費也故禁民糜金以為塗飾今也採珠貝之民溢於海濱糜金之工肩摩於列肆此又舉天下皆知之而未嘗怪者二也先王患賤之凌貴而下之僣上也故冠服器皿皆以爵列為等差長短大小莫不有制今也工商之家曵紈錦服珠玉一人之身循其首以至足而犯法者十九此又舉天下皆知之而未嘗怪者三也先王懼天下之利負縣官之勢以侵劫齊民也故使市之坐賈視時百物之貴賤而録之旬輒以上百以百聞千以千聞以待官吏之私儥十則損三三則損一以聞以備縣官之公糴今也吏之私儥而從縣官公糴之法民曰公家之取於民也固如是是吏與縣官斂怨於下此又舉天下皆知之而未嘗怪者四也先王不欲人之擅天下之利也故仕則不商商則有罰不仕而商商則有征是民之商不免征而吏之商又加以罰今也吏之商既幸而不罰又從而不征資之以縣官公糴之法負之以縣官之徒載之以縣官之舟關防不議津梁不呵然則為吏而商誠可樂也民將安所措手足此又舉天下皆知之而未嘗怪者五也若此之類不可悉數天下之人耳習目熟以為當然憲官法吏目擊其事亦恬而不問夫法者天子之法也法明禁之而人明犯之是不有天子之法也衰世之事也而議者皆以為今之弊不過吏胥骫法以為姦而吾以為吏胥之姦由此五者始今有盜白晝持梃入室而主人不之禁則踰垣穿穴之徒必且相告而肆行於其家其必先治此五者而後詰吏胥之姦可也議法贖金減罪兩端深中宋時優柔之過之弊而重贖一議則古今來有識名言古者以仁義行法律後世以法律行仁義三代之盛王其教化之本出於學校蔓延於天下而形見於禮樂下之民被其風化循循翼翼務為仁義以求避法律之所禁故其法律雖不用而其所禁亦不為不行於其間下而至於漢唐其教化不足以動民而一於法律故其民懼法律之及其身亦或相勉為仁義唐之初大臣房杜輩為刑統毫釐輕重明辨别白附以仁義無所阿曲不知周公之刑何以易此但不能先使民務為仁義使法律之所禁不用而自行如三代時然要其終亦能使民勉為仁義而其所以不若三代者則有由矣政之失非法之罪也是以宋有天下因而循之變其節目而存其大體比閭小吏奉之以公則老姦大猾束手請死不可漏略然而獄訟常病多盜賊常病衆者則亦有由矣法之公而吏之私也夫舉公法而寄之私吏猶且若此而況法律之間又不能無失其何以為治今夫天子之子弟卿大夫與其子弟皆天子之所優異者有罪而使與氓𨽻並笞而偕戮則大臣無恥而朝廷輕故有贖焉以全其肌膚而周其節操故贖金者朝廷之體也所以自尊也非與其有罪也夫刑者必痛之而後人畏焉罰者不能痛之必困之而後人懲焉今也大辟之誅輸一石之金而免貴人近戚之家一石之金不可勝數是雖使朝殺一人而輸一石之金暮殺一人而輸一石之金金不可盡身不可困況以其官而除其罪則一石之金又不皆輸焉是恣其殺人也且不笞不戮彼巳幸矣而贖之又輕是啓姦也夫罪固有疑今有或誣以殺人而不能自明者有誠殺人而官不能折以實者是皆不可以誠殺人之法坐由是有減罪之律當死而流使彼為不能自明者耶去死而得流刑巳酷矣使彼為誠殺人者耶流而不死刑巳寬矣是失實也故有啓姦之釁則上之人常幸而下之人雖死而常無告有失實之弊則無辜者多怨而僥幸者易以免今欲刑不加重赦不加多獨於法律之間變其一端而能使不啓姦不失實其莫若重贖然則重贖之説何如曰古者五刑之尤輕者止於墨而墨之罰百鍰逆而數之極於大辟而大辟之罰千鍰此穆王之罰也周公之時又有重於此然千鍰之重亦已當今三百七十斤有竒矣方今大辟之贖不能當其三分之一古者以之赦疑罪而不及公族今也貴人近戚皆贖而疑罪不與記曰公族有死罪致刑于甸人雖君命宥不聽今欲貴人近戚之刑舉從于此則非所以自尊之道故莫若使得與疑罪皆重贖且彼雖號為富強苟數犯法而數重困於贖金之間則不能不斂手畏法彼罪疑者雖或非其辜而法亦不至殘潰其肌體若其有罪則法雖不刑而彼固亦已困於贖金矣夫使有罪者不免於困而無辜者不至陷於笞戮一舉而兩利斯智者之為也兵制者泉欲以職分籍沒之田作養兵之費不知當時通天下皆有是田否其數亦可得幾何若今之時則此計又難行矣三代之時舉天下之民皆兵也兵民之分自秦漢始三代之時聞有諸侯抗天子之命矣未聞有卒伍呌呼衡行者也秦漢以來諸侯之患不減於三代而御卒伍者乃如畜虎豹圈檻一缺咆哮四出其故何也三代之兵耕而食蠶而衣故勞勞則善心生秦漢以來所謂兵者皆坐而衣食於縣官故驕驕則無所不為三代之兵皆齊民老幼相養疾病相救出相禮讓入相慈孝有憂相弔有喜相慶其風俗優柔而和易故其兵畏法而自重秦漢以來號齊民者比之三代則既已薄矣況其所謂兵者乃其齊民之中尤為凶悍桀黠者也故常慢法而自棄夫民耕而食蠶而衣雖不幸而不給猶不我咎也今謂之曰爾無耕爾無蠶為我兵吾衣食爾他日一不充其欲彼將曰嚮謂我毋耕毋蠶今而不我給也然則怨從是起矣夫以有善心之民畏法自重而不我咎欲其為亂不可得也既驕矣又慢法而自棄以怨其上欲其不為亂亦不可得也且夫天下之地不加于三代天下之民衣食乎其中者又不減於三代平居無事占軍籍畜妻子而仰給於斯民者則遍天下不知其數奈何民之不日剝月割以至於流亡而無告也其患始於廢井田開阡陌一壞而不可復收故雖有明君賢臣焦思極慮而求以救其弊卒不過開屯田置府兵使之無事則耕而食耳嗚呼屯田府兵其利既不足以及天下而後世之君又不能循而守之以至於廢陵夷及於五代燕帥劉守光又從而為之黥面涅手之制天下遂以為常法使之判然不得與齊民齒故其人益復自棄視齊民如越人矣太祖既受命懲唐季五代之亂聚衆兵京師而邉境亦不曰無備損節度之權而藩鎮亦不曰無威周與漢唐邦鎮之兵強秦之郡縣之兵弱兵強故末大不掉兵弱故天子孤暌周與漢唐則過而秦則不及得其中者惟吾宋也雖然置帥之方則遠過於前代而制兵之術吾猶有疑焉何者自漢及唐或開屯田或置府兵使之無事則耕而食而民猶且不勝其弊今屯田蓋無幾而府兵亦已廢欲民之豐阜勢不可也國家治平日久民之趨於農者日益衆而天下無萊田矣以此觀之謂斯民宜如生三代之盛時而乃戚戚嗟嗟無終歲之蓄者兵食奪之也三代井田雖三尺童子知其不可復雖然依倣古制漸而圖之則亦庶乎其可也方今天下之田在官者惟二職分也籍沒也職分之田募民耕之斂其租之半而歸之吏籍沒則鬻之否則募民耕之斂其租之半而歸諸公職分之田遍於天下自四京以降至於大藩鎮多至四十頃下及一縣亦能千畝籍沒之田不知其數今可勿復鬻然後量給其所募之民家三百畝以為率前之斂其半者今可取之三分而取一以歸諸吏與公使之家出一夫為兵其不欲者聽其歸田而他募謂之新軍毋黥其面母涅其手毋拘之營三時縱之一時集之授之器械教之戰法而擇其技之精者以為長在野督其耕在陳督其戰則其人皆良農也皆精兵也夫籍沒之田既不復鬻則歲益多田益多則新軍益衆而嚮所謂仰給於斯民者雖有廢疾死亡可勿復補如此數十年則天下之兵新軍居十九而皆力田不事他業則其人必純固朴厚無呌呼衡行之憂而斯民不復知有餽餉供億之勞矣或曰昔者斂其半今三分而取一其無乃薄於吏與公乎曰古者公卿大夫之有田也以為椂而其取之亦不過十一今吏既祿矣給之田則已甚矣況三分而取一則不既優矣乎民之田不幸而籍沒非官之所待以為富也三分而取一不猶愈於無乎且不如是則彼不勝為兵故也或曰古者十一而稅取之薄故民勝為兵今三分而取一可乎曰古者一家之中一人為正卒其餘為羡卒田與追胥竭作今家止一夫為兵況諸古則為逸故雖取之差重而無害此與周制稍甸縣都役少輕而稅十二無異也夫民家出一夫而得安坐以食數百畝之田征徭科斂不及其門然則彼亦優為之矣蘇明允蓋憤當時兵養於官或承五代銀槍之後多驁不可制欲括當時職分籍沒二田以倣古者井田出兵一乘以附寓兵於農之意而今天下既無職分籍沒之田不可為訓也田制限田之制良為復古之一端而惜乎其難行也古之稅重乎今之稅重乎周公之制園㕓二十而稅一近郊十一逺郊二十而三稍甸縣都皆無過十二漆林之征二十而五蓋周之盛時其尤重者至四分而取一其次者乃五而取一然後以次而輕始至於十一而又有輕者也今之稅雖不啻十一然而使縣官無急征無橫斂則亦未至乎四而取一與五而取一之為多也是今之稅與周之稅輕重之相去無幾也雖然當周之時天下之民歌舞以樂其上之盛德而吾之民反戚戚不樂常若擢筋剝膚以供億其上周之稅如此吾之稅亦如此而其民之哀樂何如此之相逺也其所以然者蓋有由矣周之時用井田井田廢田非耕者之所有而有田者不耕也耕者之田資於富民富民之家地大業廣阡陌連接募召浮客分耕其中鞭笞驅役視以奴僕安坐四顧指麾於其間而役屬之民夏為之耨秋為之穫無有一人違其節度以嬉而田之所入已得其半耕者得其半有田者一人而耕者十人是以田主日纍其半以至于富強耕者日食其半以至于窮餓而無告夫使耕者至于窮餓而不耕不穫者坐而食富強之利猶且不可而况富強之民輸租於縣官而不免於怨嘆嗟憤何則彼以其半而供縣官之稅不若周之民以其全力而供其上之稅也周之十一以其全力而供十一之稅也使以其半供十一之稅猶用十二之稅然也况今之稅又非特止於十一而已則宜乎其怨嘆嗟憤之不免也噫貧民耕而不免於飢富民坐而飽且嬉又不免於怨其弊皆起於廢井田井田復則貧民有田以耕穀食粟米不分於富民可以無飢富民不得多占田以錮貧民其勢不耕則無所得食以地之全力供縣官之稅又可以無怨是以天下之士爭言復井田既又有言者曰奪富民之田以與無田之民則富民不伏此必生亂如乘大亂之後土曠而人稀可以一舉而就髙祖之滅秦光武之承漢可為而不為以是為恨吾又以為不然今雖使富民皆奉其田而歸諸公乞為井田其勢亦不可得何則井田之制九夫為井井間有溝四井為邑四邑為丘四丘為甸甸方八里旁加一里為一成成間有洫其地百井而方十里四甸為縣四縣為都四都方八十里旁加十里為一同同間有澮其地萬井而方百里百里之間為澮者一為洫者百為溝者萬既為井田又必兼備溝洫溝洫之制夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路萬夫之地蓋三十二里有半而其間為川為路者一為澮為道者九為洫為塗者百為溝為畛者千為遂為徑者萬此二者非塞溪壑平澗谷夷丘陵破墳墓壞廬舍徙城郭易疆壠不可為也縱使能盡得平原廣野而遂規畫於其中亦當驅天下之人竭天下之糧窮數百年專力於此不治他事而後可以望天下之地盡為井田盡為溝洫已而又為民作屋廬於其中以安其居而後可吁亦巳迂矣井田成而民之死其骨巳朽矣古者井田之興其必始於唐虞之世乎非唐虞之世則周之世無以成井田唐虞啓之至於夏商稍稍葺治至周而大備周公承之因遂申定其制度疏整其疆略非一日而遽能如此也其所由來者漸矣夫井田雖不可為而其實便於今今誠有能為近井田者而用之則亦可以蘇民矣乎聞之董生曰井田雖難卒行宜少近古限民名田以贍不足名田之説蓋出於此而後世未有行者非以不便民也懼民不肯捐其田以入吾法而遂因此以為變也孔光何武曰吏民名田無過三十頃期盡三年而犯者沒入官夫三十頃之田周民三十夫之田也縱不能盡如此制一人而兼三十夫之田亦已過矣而期之三年是又迫蹙平民使自壞其業非人情難用吾欲少為之限而不奪其田嘗已過吾限者但使後之人不敢多占田以過吾限耳要之數世富者之子孫或不能保其地以復於貧而彼嘗已過吾限者散而入於他人矣或者子孫出而分之以無幾矣如此則富民所占者少而餘地多餘地多則貧民易取以為業不為人所役屬各食其地之全利利不分於人而樂輸於官夫端坐于朝廷下令于天下不驚民不動衆不用井田之制而獲井田之利雖周之井田何以逺過於此哉王遵岩曰此等皆是有用文字深透世故賈鼂之亞也唐宋八大家文鈔卷一百十五
