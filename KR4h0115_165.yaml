body:
  text: 唐宋八大家文鈔卷一百五十一明茅坤撰潁濱文鈔七論七代論獨挈宋武失著處亦千年隻眼英雄之士能因天下之隙而遂成天下之勢天下之勢未有可以必成者也而英雄之士常因其隙而入于其間堅忍而不變是以天下之勢遂成而不可解自晉以下者天下何其紛紛也強者不能以相并而弱者不能以相服其德不足以相君臣而其兵不足以相吞滅天下大亂離而為南北北又自離而為東西其君臣又自相篡取而為七代至於隋而後合而為一蓋其間百有餘年之中其賢君名臣纍纍而出者不為少矣然而南不能渡河以有北之民而北不能過江以侵南之地豈其百年之間南無間之足乘而北無隙之可入哉蓋亦其勢之有所不可者也七代之際天下常有變矣宋取之晉齊取之宋梁取之齊陳取之梁而周齊取之後魏此五釁者兵交而不解內亂而無救其間非小也而其四鄰拱手逺望而莫敢入蓋其取之者誠有以待之而不可以乘其倉卒也嗟夫北方之人其力不足以并南而南方之勢又固不可以爭衡於中國則七代之際天下將不可合耶嘗試論之姚泓宋武之際天下將合之際也姚興既死而秦地大亂武帝舉江南之兵長驅以攻秦兵不勞而關中定此天下之一時也及夫劉穆之死關中未安席不及暖兵不及息而奔走以防江南之亂留孺子孱將以抗四方強悍之敵則天下之勢已遂去矣且此惟不能因天下之勢而遂成之也則夫天下之勢亦隨去之而已矣且夫孫權曹操之事足以見矣曹操之不能過江以攻孫權力有所未足也而孫權終莫肯求逞於中國蓋其志將以僥幸乎北方大亂然後奮而乘其弊而非以為其地之足以抗衡於中原也嗟夫使武帝既入關因而居之以鎮撫其人民南漕江淮之資西引巴漢之粟而內因關中之盛厲兵秣馬以問四方之罪戻當此之時天下可以指麾而遂定矣而何江南之足以芥蒂夫吾心哉然而其事則不可不察也其心將有所取乎晉而恐夫人之反之於南是以其心憂懼顛倒而不見天下之勢孔子曰無欲速無見小利欲速則不逹見小利則大事不成故夫有可以取天下之勢而不顧以求移其君而遂失之者宋武之罪也議宋武人秦一著可謂確論所惜者宋武志在於九錫而不在於一天下大略曹操之不能力奬王室而卒貽曹丕以稱帝業病亦在此隋論論秦隋處亦似而其言以術留天下為名則卑矣漸開晚宋門户人之於物聽其自附而信其自去則人重而物輕人重而物輕則物之附人也堅物之所以去人分裂四出而不可禁者物重而人輕也古之聖人其取天下非其驅而來之也其守天下非其劫而留之也使天下自附不得巳而為之長吾不役天下之利而天下自至夫是以去就之權在君而不在民是之謂人重而物輕且夫吾之於人巳求而得之則不若使之求我而後從之已守而固之則不若使之不忍去我而後與之故夫智者或可與取天下矣而不可與守天下守天下則必有大度者也何者非有大度之人則常恐天下之去我而以術留天下以術留天下而天下始去之矣昔者三代之君享國長逺後世莫能及然而亡國之暴未有如秦隋之速二世而亡者也夫秦隋之亡其弊果安在哉自周失其政諸侯用事而秦獨得山西之地不過千里韓魏壓其衝楚脅其肩燕趙伺其北而齊掉其東秦人被甲持兵七世而不得解寸攘尺取至始皇然後合而為一秦見其取天下若此其難也而以為不急持之則後世且復割裂以為敵國是以銷名城殺豪傑鑄鋒鏑以絶天下之望其所以備慮而固守之者甚密如此然而海內愁苦無聊莫有不忍去之意是以陳勝項籍因民之不服長呼起兵而山澤皆應由此觀之豈非其重失天下而防之太過之弊歟今夫隋文之世其亦見天下之久不定而重失其定也蓋自東晉以來劉聰石勒慕容垂符堅姚興赫連之徒紛紛而起者不可勝數至於元氏并吞滅取略巳盡矣而南方未服元氏自分而為周齊周并齊而授之隋隋文取梁滅陳而後天下為一彼亦見天下之久不定也是以既得天下之衆而恐其失之享天下之樂不懼其不久立於萬民之上而常有猜防不安之心以為舉世之人皆有曩者英雄割據之懷制為嚴法峻令以杜天下之變謀臣舊將誅滅略盡而獨死於楊素之手以及於大故終於煬帝之際天下大亂塗地而莫之救由此觀之則夫隋之所以亡者無以異於秦也悲夫古之聖人修德以來天下天下之所為去就者莫不在我故其視失天下甚輕夫惟視失天下甚輕是故其心舒緩而其為政也寬寬者生於無憂而慘急者生於無聊耳昔嘗聞之周之興太王避狄於岐豳之人民扶老携幼而歸之岐山之下纍纍而不絶喪失其舊國而卒以大興及觀秦隋唯不忍失之而至於亡然後知聖人之為是寬緩不速之行者乃其所以深取天下者也唐論此等文古今有數荆川云深究利害是大文字天下之變常伏於其所偏重而不舉之處故內重則為內憂外重則為外患古者聚兵京師外無強臣天下之事皆制於內當此之時謂之內重內重之弊姦臣內擅而外無所忌匹夫橫行於四海而莫能禁其亂不起於左右之大臣則生於山林小民之英雄故夫天下之重不可使專在內也古者諸侯大國或數百里兵足以戰食足以守而其權足以生殺然後能使四夷盜賊之患不至於內天子之大臣有所畏忌而內患不作當此之時謂之外重外重之弊諸侯擁兵而內無以制由此觀之則天下之重固不可使在內而亦不可使在外也自周之衰齊晉秦楚綿地千里內不勝於其外以至於滅亡而不救秦人患其外之巳重而至於此也於是收天下之兵而聚之關中夷滅其城池殺戮其豪傑使天下之命皆制於天子然至於二世之時陳勝吳廣大呼起兵而郡縣之吏熟視而走無敢誰何趙髙擅權於內頥指如意雖李斯為相備五刑而死於道路其子李由守三川擁山河之固而不敢較也此二患者皆始於外之不足而無有以制之也至於漢興懲秦孤立之弊乃大封侯王而高帝之世反者九起其遺孽餘烈至於文景而為淮南濟北吳楚之亂於是武帝分裂諸侯以懲大國之禍而其後百年之間王莽遂得以奮其志於天下而劉氏之子孫無復齟齬魏晉之世乃益侵削諸侯四方微弱不復為亂而朝廷之權臣山林之匹夫常為天下之大患此數君者其所以制其內外輕重之際皆有以自取其亂而莫之或知也夫天下之重在內則為內憂在外則為外患而秦漢之間不求其勢之本末而更相懲戒以就一偏之利故其禍循環無窮而不可解也且夫天子之於天下非如婦人孺子之愛其所有也得天下而謹守之不忍以分於人此匹夫之所謂智也而不知其無成者未始不自不分始故夫聖人將有所大定於天下非外之有權臣則不足以鎮之也而後世之君乃欲去其爪牙翦其股肱而責其成功亦巳過矣夫天下之勢內無重則無以威外之強臣外無重則無以服內之大臣而絶姦民之心此二者其勢相持而後成而不可一輕者也昔唐太宗既平天下分四方之地盡以沿邊為節度府而范陽朔方之軍皆帶甲十萬上足以制邊陲之難下足以備匹夫之亂內足以禁大臣之變而將帥之臣常不至於叛者內有重兵之勢以預制之也貞觀之際天下之兵八百餘府而在關中者五百舉天下之衆而後能當關中之半然而朝廷之臣亦不至於乘間釁以邀大利者外有節度之權以破其心也故外之節度有周之諸侯外重之勢而易置從命得以擇其賢不肖之才是以人君無征伐之勞而天下無世臣暴虐之患內之府兵有秦之關中內重之勢而左右謹飭莫敢為不義之行是以上無逼奪之危下無誅絶之禍蓋周之諸侯內無府兵之威故陷於逆亂而不能以自止秦之關中外無節度之援故脅於大臣而不能以自立有周秦之利而無周秦之害形格勢禁內之不敢為變而外之不敢為亂未有如唐制之得者也而天下之士不究利害之本末猥以成敗之遺蹤而論計之得失徒見開元之後強兵悍將皆為天下之大患而遂以太宗之制為猖狂不審之計夫論天下論其勝敗之形以定其法制之得失則不若窮其所由勝敗之處蓋天寶之際府兵四出萃於范陽而德宗之世禁兵皆戌趙魏是以祿山朱泚得至於京師而莫之能禁一亂塗地終於昭宗而天下卒無寧歲內之強臣雖有輔國元振守澄士良之徒而卒不能制唐之命誅王涯殺賈餗自以為威震四方然劉從諫為之一言而震懾自斂不敢復肆其後崔昌遐倚朱溫之兵以誅宦官去天下之監軍而無一人敢與抗者由此觀之唐之衰其弊在於外重而外重之弊起於府兵之在外非所謂制之失而後世之不用也愚竊謂今之兵滿天下並不得籍之行伍以折衝禦侮而北自遼陽迄臨洮延袤五千餘里僅得戍守之兵以乘障遊徼於其塞耳然無唐之節度府帶甲十萬之勢以為外重故北兵得以蹂􅏳我疆場殺略我人民其於南粵一帶亦然至於京師所籍兵十餘萬僅足以供天子之工匠與中官勢人者之侵漁而已又無唐之內設府兵五百以為居重馭輕之威是所謂內外無以為重者也故四夷數侵歲以為常而中州卒有一夫跳梁往往衡越不能遽熄豈非兵政無以制中外之亂與五代論有近利者必有逺憂豈獨帝王之取天下昔者商周之興始於稷契而至湯武凡數百年之間而後得志於天下其成功甚難而享天下之利至緩也然桀紂既滅收天下朝諸侯自處於天子之尊而下無不服之志誅一匹夫而天下遂定蓋其用力亦甚易而無勞也至於秦漢之際其英雄豪傑之士逐天下之利唯恐不及而開天下之釁惟恐其後之也奮臂於大澤而天下之士雲合響應轉戰終日而辟地千里其取天下若此其無難也然天下巳定君臣之分既明分裂海內以王諸將將以傳之無窮百世而不變而數歲之間功臣大國反者如蝟毛而起是何其取之之易而守之之難也若夫五代干戈之際其事雖不足道然觀其帝王起於匹夫鞭笞海內戰勝攻取而自梁以來不及百年天下五擅逺者不過數十歲其智慮曾不足以及其後世此亦甚可怪也蓋嘗聞之梁之亡其父子兄弟自相屠滅虐用其民而天下叛周之亡適遭聖人之興而不能以自立此二者君子之所以不疑於其間也而後唐之莊宗明宗與晉漢之高祖皆以英武特異之姿據天下太半之地及其子孫材力智勇亦皆有以過人者然終以敗亂而不可解此其勢必有以自取之也蓋唐漢之亂始於功臣而晉之亂始於劉石皆以其易取天下之過也莊宗之亂晉高祖以兵趨夷門而後天下定於明宗後唐之亡胸奴破張逹之兵而後天下定於晉胸奴之禍周高祖發南征之議而後天下定於漢故唐滅於晉晉亂於胸奴而漢亡於周蓋功臣負其創業之勳而胸奴恃其驅除之勞以要天子聽之則不可以久安而誅之則足以召天下之亂戮一功臣天下遂並起而軋之矣故唐奪晉高祖之權而亡晉絶胸奴之和親而滅漢誅楊邠史肇而周人不服以及於禍彼其初無功臣無胸奴則不興而功臣胸奴卒起而滅之故古之聖人有可以取天下之資而不用有可以乘天下之勢而不顧撫循其民以待天下之自至此非以為茍仁而已矣誠以為天下之不可以易取也欲求天下而求之於易故凡事之可以就天下者無所不為也無所不為而就天下天下既安而不之改則非長久之計也改之而不顧此必有以忤天下之心者矣昔者晉獻公既沒公子重耳在翟里克殺奚齊卓子而召重耳重耳不敢入秦伯使公子縶往弔且告以晉國之亂將有所立於公子重耳再拜而辭亦不敢當也至於夷吾聞召而起以汾陽之田百萬命里克以負蔡之田七十萬命丕鄭而奉秦以河外列城五及其既入而背內外之賂殺里客丕鄭而發兵以絶秦兵敗身虜不復其國而後文公徐起而收之大臣援之於內而秦楚推之於外既反而霸於諸侯唯其不求入而人入之無賂於內外而其勢可以自入此所以反國而無後憂也其後劉季起於豐沛之間從天下武勇之士入關以誅暴秦降子嬰當此之時功冠諸侯其勢遂可以至於帝王此皆沛公之所自為而諸將不與也然至追項籍於固陵兵敗諸將不至乃捐數千里之地以與韓信彭越而此兩人卒負其功背叛而不可制故夫取天下不可以僥幸於一時之利僥幸於一時之利則必將有百歲不巳之患此所謂不及逺也雖然古帝王之起自匹夫而定天下也易及其身為天子能立綱陳紀深謀曲慮而垂萬世之業也難周公論其論周公處成王雖未當而其行文往往如空中遊絲起伏裊娜而不可羈伊尹既立太甲不明而放諸桐天下不以為不義武王既沒成王幼周公攝天子之位朝諸侯於明堂而召公不悅管叔蔡叔咸叛天下幾至於不可救二者其故何也太甲既立矣而不足以治天下則夫伊尹猶有以辭於後世也蓋周公之事其迹無以異於伊尹然天下之人舉皆疑而不信此無足怪也何者天下未知夫成王之不明而周公攝則是周公未有以服天下之心而疆攝焉以為之上也且夫伊尹之攝其事有不得巳而然耳太甲雖廢而伊尹未敢有所復立以召天下之亂故寧以已攝焉而待夫太甲之自悔是以天下無疑乎其心今夫周公之際其勢未至於不得巳也使成王拱手以居天下之上而周公為之佐以成王名號於天下而輔之以周公此所謂其勢之未至於不得巳者矣而周公不居則夫天下之謗是周公之所自取也然愚以為不然挾天子以令天下此諸葛孔明之事耳而周公豈不足以知之蓋夫人臣惟無執天子之權人臣而執天子之權則必有忠於其心而後可以自免於難何者人臣而用天子之事此天子之所忌也以一人之身上為天子之所忌而下為左右之大臣從而媒孽其短此古之忠臣所以盡心而不免於禍而世之姦雄之士所以動其無君之心而不顧者也使成王用事於天下而周公制其豫奪之柄則愚恐成王有所不平於其心而管蔡之徒乘其隙而間之以至於亂也使成王有天子之虛名而不得制天下之政則愚恐周公有所不忍於其中赧然其有不安之心也是以寧取而攝之使成王無與乎其間以破天下讒慝之謀而絶其爭權之心是以其後雖有管蔡之憂而天下不搖使其當時列於羣臣之間方其危疑擾攘而未決也則愚恐周公之禍非居東之所能免而管蔡得志於天下成王將遂不立也鳴呼其思之逺哉周公論二讀周禮者不可不知言周公之所以治周者莫詳於周禮然以吾觀之秦漢諸儒以意損益之者衆矣非周公之完書也何以言之周之西都今之關中也其東都今之洛陽也二都居北山之陽南山之隂其地東西長南北短短長相補不過千里古今一也而周禮王畿之大四方相距千里如畫棊局近郊逺郊甸地稍地小都大都相距皆百里千里之方地實無所容之故其畿內逺近諸法類皆空言耳此周禮之不可信者一也書稱武王克商而反商政列爵惟五分土惟三故孟子曰天子之制地方千里公侯方百里伯七十里子男五十里不能五十里不達於天子附於諸侯曰附庸子産亦云古之言封建者蓋若是而周禮諸羣公地方五百里諸侯四百里諸伯三百里諸子二百里諸男百里與古説異鄭氏知其不可而為之説曰商爵三等武王增以子男其地猶因商之故周公斥大九州始皆益之如周官之法於是千乘之賦自一成十里而出車一乘千乘而千成非公侯大國無以受之吾竊笑之武王封之周公大之其勢必有所并有所并必有所徙一公之封而子男之國為之徙者十有六封數大國天下盡擾此書生之論而有國者不為也傳有之曰方里而井十井為乘故十里之邑而百乘百里之國而千乘千里之國而萬乘古之道也不然百乘之家為方百里萬乘之國為方數圻矣古無是也語曰千乘之國攝乎大國之間千乘雖古之大國而於衰周為小然孔子猶曰安見方六七十如五六十而非邦也者然則雖衰周列國之強家猶有不及五十里者矣韓氏羊舌氏晉大夫也其家賦九縣長轂九百其餘四十縣遺守四千謂一縣而百乘則可謂一縣而百里則不可此周禮之不可信者二也王畿之內公邑為井田鄉遂為溝洫此二者一夫而受田百畝五口而一夫為役百畝而稅之十一舉無異也然而井田自一井而上至於一同而方百里其所以通水之利者溝洫澮三溝洫之制至於萬夫方三十二里有半其所以通水之利者遂溝洫澮川五利害同而法制異為地少而用力博此亦有國者之所不為也楚蒍掩馬司馬町原防井衍沃蓋平川下澤可以為井者井之原阜隄防之間狹不可行惟町之杜預以町為小頃町皆因地以制廣狹多少之異井田溝洫蓋亦然耳非公邑必為井田而鄉遂必為溝洫此周禮之不可信者三也三者既不可信則凡周禮之詭異逺於人情者皆不足信也古之聖人因事立法以便人者有矣未有立法以強人者也立法以強人此迂儒之所以亂天下也老子論上與下共為一篇只看子由行文如神龍乘雲於天之上風雨上下不可捉摸不可測識不可窮詰學者如能靜坐窗几間將此心默提出來與此二篇文字打作一片忽焉而飛於九天之上忽焉而逐於九淵之下且令自我胸中亦頓覺變幻飄蕩而不可羈制則文思之懸一日千里矣當其思起氣溢如急風驟兩噴山谷撼丘陵及其語竭氣盡如雨散雲收山青樹緑塵無一點嗟乎此則學者當自得之也善與人言者因其人之言而為之言則天下之辨者服矣與其里人言而曰吾父以為不然則誰肯信以為爾父之是是故不若與之論曲直雖楚人可以與秦人言之而無害故夫天下之所為多言以排夫異端而終以不明者惟不務辨其是非利害而以其父屈人也夫聖人之所為尊於天下為其知夫理之所在也而周公仲尼所以為信於天下以其子弟而知之也故非其子弟則天下有不知周公之為周公而仲尼之為仲尼者矣是故老𥅆莊周其為説不可以周孔辨也何者彼且以為周孔之不足信也夫聖人之于事譬如規矩之於方圓爾天下之人信規矩之于方圓而以規矩辨天下之不方不圓則不若求其至方極圓以隂合于規矩使彼以為規而不圓矩而不方則亦無害于吾説若此則其勢易以折天下之異論昔者天下之士其論老𥅆莊周與佛之道皆未嘗得其要也老𥅆之説曰去仁義絶禮樂而後天下安吾之説仁義禮樂天下之所恃以治者者佛之説曰棄父絶子不為夫婦放雞豚食菜茹而後萬物遂而吾之説曰父子夫婦食雞豚以遂萬物之性夫彼且以其説而吾亦以其説彼之不吾信如吾之不彼信也蓋天下之不從莫急於未信而強劫之故夫仁以安人而行之以義節之以禮而播之以樂守之以君臣而維之以父子兄弟食肉而飲酒此明於孔子者之所知也而欲以諭其所不知之人而曰孔子則然嗟夫難哉愚則不然曰天下之道惟其辨之而無窮攻之而無間辨之而有窮攻之而有間則是不足以為道果孔子而有窮也亦將捨而他之惟其無窮是以知其為道而無疑蓋天下有能平其心而觀焉而不牽夫仲尼老𥅆之名而後可與語此也老子論下天下之道惟其辨之而無窮攻之而無間辨之而有窮攻之而有間則是不足以為道昔者六國之際處士橫議以熒惑天下楊氏為我而墨氏兼愛凡天下之人有以君臣父子之親而不相顧者舉皆歸於楊氏而道塗之人皆可以為父子兄弟者舉皆歸於墨氏也夫天下之人不可以絶其天屬之親而合其無故之歡此其勢然也故老𥅆莊周知天下之不正也起而承之以為兼愛為我之不足以收天下是以不為為我不為兼愛而處乎兼愛為我之外此其意以為不兼愛則天下議其無親不為我則天下譏其為人故兩無所適處而泛泛焉浮遊於其間而曰我皆無所為以是足以自免而逃天下之是非矣天下之人惟其是所是非所非是以其説可得而考其終今以老莊無所是非而其終歸於無有此其思之亦巳詳矣楊氏之為我墨氏之兼愛此其為道莫不有所執也故為我者為兼愛之所詆而兼愛者為為我之所毁是二者其地皆不可居也然而得其間而固守之則可以杜天下之異端而絶其口蓋古之聖人惟其得而居之是以天下大服而其道遂傳於後世今老𥅆莊周不得由大道而見其隙竊入於其間而執其機是以其論縱橫堅固而不可破也且夫天下之事安可一説治也而彼二子者欲一之以兼愛斷之以為我故其説有時焉而遂窮夫惟聖人能處於其間而制其當然兼愛為我亦莫棄也而能用之以無失乎道處天下之紛紜而不失其當故曰伯夷叔齊不降其志不辱其身而柳下惠少連降志而辱身言中倫行中慮虞仲夷逸隱居放言身中清廢中權我則異於是無可無不可夫無可無不可此老𥅆莊周之所以為辨也而仲尼亦云則夫老𥅆莊周其思之不可以為不深矣蓋嘗聞之聖人之道處於可不可之際而遂從而實之是以其説萬變而不可窮老𥅆莊周從而虛之是以其説汗漫而不可詰今將以求夫仲尼老𥅆是非者惟能知夫虛實之可用與否而巳矣蓋天下固有物也有物而相遭則固亦有事矣是故聖人從其有而制其御有之道以治其有實之事則於天下夫亦何事之不可為至區區焉求其有以納之於無則其用力不巳甚勞矣哉夫老𥅆莊周則亦嘗自知其窮矣夫其窮者何也不若從其有而有之之為易也故曰嘗無欲以觀其妙而又曰常有欲以觀其徼既曰無之以為用又曰有之以為利而至於佛者則亦曰斷滅而又曰無斷無滅夫既曰無矣而又恐無之反以為窮既斷滅矣又恐斷滅之適以為纍則夫其情可以見矣仲尼有言曰君子之中庸也君子而時中小人之中庸也小人而無忌憚也夫老𥅆莊周其亦近於中庸而無忌憚者哉唐宋八大家文鈔卷一百五十一
