body:
  text: 唐宋八大家文鈔臨川文鈔引王荆公湛深之識幽渺之思大較並本之古六藝之旨而於其中别自為調鑱刻萬物鼓鑄羣情以成一家之言者也其尤最者上仁宗皇帝書與神宗本朝百年無事諸劄子可謂王佐之才此所以於仁廟之鎮靜博大猶未能入而至於熙寧元豐之間劫主上而固魚水之交譬則武丁之於傅説孔明之於昭烈不是過已惜也公之學問本之好古者多而其措注當時亦狃於泥古為患況以矯拂之行而兼之以獨見以執拗之資而恣之以私臆所以吕章邢蔡以下紛紛附會熒惑天子流毒四海新法既壞并其文學知而好之者半而厭而訾之者亦半矣以豫觀之荆公之雄不如韓逸不如歐飄宕疏爽不如蘇氏父子兄弟而匠心所注意在言外神在象先如入幽林邃谷而杳然洞天恐亦古來所罕者子每讀其碑志墓銘及他書所指次世之名臣碩卿賢人志士一言之豫一字之奪並從神解中點綴風刺翩翩乎凌風之翮矣於史漢外别為三昧也豫首録其上仁宗皇帝書一首次及劄子疏狀七首表啓三十六首與友人書三十五首序十二首記二十二首論原説解雜著二十五首碑狀墓志銘表及祭文七十三首釐為一十六卷歸安鹿門茅坤題
  hash: sha256:2a51d428f21143d59bcf13c22a63e57f7808b0d4e588e867463f36101ff1990e
