body:
  text: 唐宋八大家文鈔卷一百五十五明茅坤撰潁濱文鈔十一古史論子由作古史以補史記之遺始伏羲神農下至秦始皇凡若干卷豫覽其傳末所論次得失其言多確其文旨與太史公互相跌宕可誦者撮録二十五首齊三代之得天下其所以異於後世者惟不求而得之耳世之論伊尹太公多以隂謀竒計歸之其説乃與漢陳平魏賈詡無異夫陳平賈詡之事張子房荀文若之所不為也而謂伊尹太公為之乎太公蓋善用兵老而不衰與文王治岐而司馬兵法出焉要之皆仁人豈以詭詐為之而傾人以自立者哉管仲相桓公霸諸侯一正天下使人免左袵之禍孔子以仁許之然死不旋踵適庶爭立桓公不得葬幸而不亡以管仲之智而不免於此蓋物有以蔽之歟古者將治天下必先治家以為其道當自是往管仲為齊大夫塞門反玷身備三歸而桓公內嬖如夫人者六人其行甚穢管仲以為不害霸不禁也夫古之聖人為君臣父子夫婦之禮皆有本末不徒設也故以舊坊為無用而毁之者必有水患以舊禮為無益而去之者必有亂患古之君子身修而家治安而行之不知其難而亂自去今管仲偷取一時之欲而僥幸於長久難哉桓公季年將立世子管仲知其將有適庶之禍遂與桓公屬孝公於宋襄公夫使桓公妻妾適庶之分素明家事素定則太子一言立矣而他人何與哉蓋管仲智有餘而德不足於是窮矣魯其思深其議亦確魯自宣公殺其世子而自立公室遂卑三桓分有其民而竊咻之民知有大夫而不知有君襄公二十九年季武子取卞公還自楚不敢入歸而不敢問蓋魯君之失國也久矣至昭公不忍其逼未能收民而舉兵攻之遂以失國哀公孤弱甚於昭公又欲以越人攻之終亦出死於越嗟夫棄民五世而欲一朝收之宜其難哉昔齊晏子嘗告景公以田氏之禍公問所以救之者晏子曰唯禮可以已之在禮家施不及國而夫夫不收公利景公稱善而不能用齊卒以亡語稱哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗孔子聞之曰成事不説遂事不諌既往不咎豫嘗考之以為哀公將去三桓而不敢正言古者戮人於社其託於社者有意於誅也宰我知其意而亦以隱答焉其曰使民戰栗以誅告也孔子知其不可曰此先君之所為植根固矣不可以誅戮齊也蓋亦有意於禮乎不然何咎豫之深也孔子曰禮樂征伐自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣自隱至昭而逐於季氏凡十世自宣至定而制於陽虎凡五世虎不逾世而敗自是三桓微散沒不復見而魯公室雖微不絶遂與戰國相終始蓋以臣僭君不義而得民要以其力自斃君雖失衆而其實無罪久則民將哀之其勢固當然哉陳探本之論以是知儀秦之術無救於危亡而反促之也楚方北征諸夏而陳蔡許鄭適當其衝其為國也難矣吳季子札見鄭子産曰子為國慎之以禮不然鄭國將敗子産以區區之鄭立於晉楚之間敬而不懾卒免大國之患非禮何以當之若陳蔡許顛沛隕越之不暇卒先鄭以滅善哉鄭渾罕之論之也曰姬在列者蔡及曹滕其先亡乎逼而無禮鄭先衛亡逼而無法夫無禮則不能自立無以止大國之暴無法則不能字人民將不懷大國不豫不折必仆民不豫將以其力自斃此其所以為亡之先後也蔡叔在周公囚蔡叔上説世俗之説曰舜囚堯不得其死禹逐舜終於蒼梧之野周公將篡成王二叔譏之乃免於亂彼以小人之情度君子之心亦何所不至哉今夫聖人雖與世同處而其中浩然與天地同量彼其食粟衣帛蓋有不得已耳而况與人爭利哉諸葛孔明受託昭烈以相孺子雖使取而代之蜀人安焉然君臣之義沒身不替孔明尚然而况於聖人乎彼小人何以知之衛衛之大亂者再皆起於父子夫婦之際宣公靈公專欲以興禍固無足言者急子壽子爭相為死而莊公出公父子相攻出入二十餘年不以為恥賢愚之不同至此哉然急壽勇於義惜其不為吳太伯而蹈申生之禍以重父之過可以為亷矣未得為仁也昔者孔子之門人季路髙柴皆事出公孔子自陳反於衛子路問曰衛君待子而為政子將奚先孔子曰必也正名乎名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所茍而已矣嗚呼衛之名於是可謂不正矣靈公黜其子而子其孫出公不父其父而禰其祖人道絶矣孔子於是焉而欲正之何為而可靈公之死也衛人立公子郢郢不可則衛人立輒使輒而知禮必辭辭而不獲必逃輒逃而郢立則名正矣雖以拒蒯聵可也雖然孔子為政豈將廢輒而立郢耶其亦將教輒避位而納蒯聵耳蒯聵得罪於父生不養死不喪然於其入也春秋書曰晉趙鞅帥師納衛世子蒯聵于戚非世子而以世子名之以其子得立於衛成其為世子也若輒避位而納其父是世子為君也而名有不正乎名正而衛定矣晉晉文公辟驪姬之難處狄十有二年奚齊卓子相繼戮死秦晉之人歸心焉文公深信咎犯靖而待之若將終焉者至於惠公起而赴之如恐不及於是秦人責報於外而里丕要功於內不能相忍繼以敗滅內外絶望屬於文公然後文公徐起而收之無尺土之賂一金之費而晉人戴之遂霸諸侯彼其處利害之計誠審哉夏商之衰湯文王皆起於諸侯積德深厚天下歸之不得已而後應故雖取天下而無取天下之患其後皆數十世若晉文公德雖未足而待其自至則庶幾王者之事也是以主盟中夏幾二百年其功業與齊桓等而子孫過之逺甚夫豈非其積之有厚薄故耶晉悼公之復霸也與楚爭鄭三合諸侯之師未嘗一與楚戰卒以救楚而服鄭蓋古之善用兵者皆以不戰屈人之兵非不得已不戰方鄭之未服也中行偃樂黶皆欲以戰勝楚惟智罃知用兵之難勝負之不可必遷延稽故而楚人自敝不較而去不然二子將為先縠而罃將為林父如罃可謂知兵矣楚楚靈王因陳公子招之亂而滅陳追討蔡侯般之弒君而滅蔡假大義以濟私欲晉政已亂莫之能較沛然自以為得計矣不十年而有乾溪之禍秦惠王使張儀説楚懷王欺而賣之如劫嬰兒昭王又誘而執之咸陽加之以兵遂分楚之半此其惡甚於楚靈王然傳子孫纍世其禍乃應夫國於天地有與立矣一日有惡禍未即報也本弱者速斃根深者徐拔彼方以得為幸而不知天綱之不失也是故楚雖已滅而楚之父老知秦之禍曰楚雖三户亡秦必楚卒之滅秦者皆楚人也楚莊王討陳夏徵舒圍鄭及宋力皆足以取之棄而不有夫豈不欲畏天故也莊王既霸諸侯而楚遂以興天命之不僭如此而可誣也哉燕文本三折悉中規矩燕召公之後然國於蠻貊之間禮樂微矣春秋之際未嘗出與諸侯會盟至於戰國亦以耕戰自守安樂無事未嘗被兵文公二十八年蘇秦入燕始以縱橫之事説之自是兵交中國無復寧歲六世而亡吳自太伯至壽夢十七世不通諸侯自巫臣入吳教吳乘車戰射與晉楚力爭七世而亡燕吳雖南北絶逺而興亡之迹大略相似彼説客策士借人之國以自快於一時可矣而為國者因而徇之猖狂恣行以速滅亡何哉夫起於僻陋之中而奮於諸侯之上如商周先王以德服人則可不然皆禍也至太子丹不聽鞠武而用田光欲以一七首斃秦雖使荆軻能害秦王亦何救秦之滅燕而况不能哉此又蘇秦之所不取也燕僻北徼故其與中國相傾危者後耳非以蘇秦入而後被兵也越言東南利害之勢處雖未當而行文有法度變換處並古人入彀處吳以蠻夷爭盟上國凌蔑齊晉結怨楚越再世而亡何者地逺而民勞勢不順也越王勾踐既克夫差雖號伯王而實斂兵自守無大征伐分吳故土以畀楚宋魯遂以保國傳世彼親見其害知所以自監矣哉至王無疆無闔閭之知而有夫差之愚其殘國宜矣昔楚莊王克陳宋鄭力能取之而不有諸侯安之而楚遂以興靈王大城陳蔡不羮經營中夏貪而不止則身受其咎蓋東南之常勢於是可見矣自東晉以來至於陳皆國於吳越之墟成敗之迹無不然者雖桓溫劉裕善用兵或能一勝而民以罷弊訖於無成至殷浩庾亮蓋不足數也如謝安之賢猶勉強北征失策而死亦眩於其名而未安其實故耶嗟夫謀國如蔡謨吾有取焉晏平仲管晏兩評處是而姚宋一證更佳管子以桓公伯然其家淫侈不能身蹈禮義晏子之為人勇於義篤於禮管子蓋有愧焉然晏子事靈莊景公皆庸君功業不足道使晏子而得君如管仲之於桓公其所成就當與鄭子産比耳至於九合諸侯攘却戎狄未必能若管子也唐姚元崇宋璟皆中興賢相然元崇好權利事武后立於羣枉之中未嘗有一言犯之及事明皇帝時亦有所縱弛太廟棟毁巡遊東都以為無害至於宋璟介潔特立於武后世排斥權幸身危者數矣其於明皇帝亦未嘗有取容之言故世嘗以元崇比管仲璟比晏子或庶幾焉屈原文跌宕其所責屈原以柳下季者似也豫竊謂使原如札之逃而終身焉不入於吳之市亦可漢賈誼為長沙傅過汨羅為賦以弔屈原曰厯九州而相君何必懷此故都誼之言或一道也而非原志原楚同姓不忍棄其君而之四方而誼教之以孔子孟軻厯聘諸侯以求行道勢必不從矣柳下惠為士師三黜而不去曰直道而事人何枉而不三黜枉道而事人何必去父母之邦惜乎屈原亷直而不知道殉節以死然後為快此所以未合於聖人耳使原如柳下惠用之則行捨之則藏終身於楚優遊以卒歲庶幾乎其志也哉孟嘗君評四君處亦與太史公相跌宕戰國以詐力相侵伐二百餘年兵出未嘗有名秦昭王欺楚懷王而囚之要之以割地諸侯熟視無敢以一言問秦者惟田文免相於秦幾不得脫歸而怨之乃借楚為名與韓魏伐秦兵至函谷秦人震恐割地以與韓魏僅乃得免自山東難秦未有若此其壯者也夫兵直為壯曲為老有名之兵誰能禦之使田文能奮其威則是役也齊可以伯惜其聽蘇代之計臨函谷而無攻以求楚東國而出師之名索然以盡東國既不可得而懷王卒死於秦由此觀之秦惟不遇桓文是以橫行而莫之制耳豈有大義而屈於不義者哉平原君趙勝傾身下士以竊一時之聲可耳至於為國計慮勝不知也趙欲拒燕有亷頗趙奢不能用而割地與齊以借田單知單之賢而不知其不為趙用也及韓馮亭以上黨嫁禍於趙趙豹明其不可而勝貪取之長平之禍成於勝一言此皆貴公子不知務之禍也乃欲使之相危國拒強秦難矣哉魏公子魏公子始用侯嬴之計盜兵符殺晉鄙而奪其軍擊秦以全趙成桓文之功矣然兄弟自是相失十年不敢還魏幾無以安其身殆哉其後秦兵攻魏無忌無還魏之心毛薛惎之翻然而歸合諸侯破秦軍使宗廟復安兄弟如故然後得名因以立於世蓋無忌之名發於侯生而全於毛薛侯生之竒毛薛之正廢一不可而正之所全者多矣春申君黃歇相楚王患王無子而以己子盜為其後雖使聽朱英殺李園終擅楚國亦將不免大咎何以言之秦楚立國僅千歲矣無功於民而獲罪於天天以不韋歇隂亂其嗣而與之俱斃豈區區朱英所能為哉不然以黃歇之智而朱英之言獨無概於中乎蘇秦所議是而文亦跌宕秦疆而諸侯弱遊談之士為橫者易為功為從者難為力然而從成則諸侯利而秦病橫成則秦帝而諸侯虜要之二者皆出於權譎而從為愈歟蘇秦本説秦為橫不合而激於燕趙甘心於其所難為之術期年歃血於洹水之上可不謂能乎然口血未乾犀首一出而齊趙背盟從約皆破蓋諸侯異心譬如連雞不能俱棲勢固然矣而太史公以為約書入秦秦人為之閉函谷者十五年此説客之浮語而太史公信之過矣王翦翦提兵六十萬以擊楚非盡合戰之兵也楚方二千里中多關塞要害非多兵則無以分其戍守乖其所之兩壘相陳自古鮮有二十三十萬以上而能有功者王翦與始皇議滅楚非六十萬不行豫始疑其過及觀田單與趙奢論兵乃知老將之言不妄也趙以齊田單為相單語趙奢曰非吾不説將軍之兵法所不服者將軍之用衆也帝王之兵不過三萬而天下服矣今將軍必負十萬二十萬而後用之使民不得耕作糧食挽賃不可給也奢曰君非徒不達兵又不明時勢矣吳干之劒肉試則斷牛馬金試則截盤匜薄之柱上而擊之則絶為三質之石上而擊之則碎為百今以三萬之衆而應強國之兵是薄柱擊石之類也且夫劒之為用無脊之厚則鋒不入無髀之薄則刃不斷無鈎竿鐔蒙須之便操其刃而刺則未入而手斷今君無十萬二十萬之衆以為釣罕鐔蒙須之便焉能以三萬行於天下乎古者四海萬國城大不過三百丈人雖多無過三千家則以三萬拒之足矣今取古萬國分為戰國七兵能具數十萬食能支數歲千丈之城萬家之邑相望也君奈何以三萬衆攻之田單喟然嘆息曰單未至也由此觀之攻千里之城毁百年之業不乘大隙非大衆不可彼決機兩陳之間為一日成敗之計乃可以少擊衆耳刺客議論甚正周衰禮義不明而小人奮身以犯上相夸以為賢孔子疾之齊豹以衛司冦殺衛侯之兄縶蔡公孫翻以大夫弒其君申春秋皆以盜書而不名所謂求名而不得者也太史公傳刺客凡五人皆豹翻之類耳而其稱之不容口失春秋之意矣獨豫讓為舊君報趙襄子有古復讐之義如荆軻刺秦始皇雖始皇以強暴失天下心聞者快之要以盜賊乘人主不意法不可長也至漕沫之事豫以左氏考之魯莊公十年沫始以謀干莊公公用之敗齊於長勺自是魯未嘗敗十三年而會齊侯于柯安得所謂三戰三敗沫以匕首劫齊桓求侵地者哉始公羊高采異説載沫事於春秋其後戰國遊士多稱沫以為口實而實非也莊公之禦齊沫問所以戰以小惠小信不足恃惟忠為可以一戰沫蓋知義者也而肯以其身為刺客之用乎春秋宋楚盟于城下齊魯盟于夾谷皆以要盟不書書平及會而已使沫信以匕首劫桓公得非要盟乎而春秋書公會齊侯盟于柯足以知其非要盟也是以削去曹沫而録其四人然亦非所謂賢也虞卿遊説之士皆厯詆諸説以左右罔其利獨虞卿始終事趙專持從説其言前後可考無翻覆之病觀其赴魏齊之急捐相印棄萬户侯而不顧此固義俠之士非説客也哉然太史公記虞卿與趙謀事皆秦破長平後而卿為魏齊棄相印走大梁則前此矣意者魏齊死卿自梁還復相趙而太史公失不言之耳魯仲連戰國遊説之士非從即橫説行交合而寵祿附之故士不厭詭詐爭走於利魯仲連辨過秦儀氣凌髠衍而從橫之利不入於口因事放言切中機會排難解紛如決潰隄不終日而成功逃避爵賞脫屣而去戰國以來一人而已矣穰侯與後論並看子由所不滿范蔡處如掌秦誅商君逐穰侯君臣皆失之矣彼二子者知得而不知喪雖智能伯秦而不能免其身蓋無足言者而惠王以怨誅鞅至誣以叛逆昭王以逼遷冉至出老母逐弱弟而不顧甚矣其少恩也彼公子虔方欲報怨固不暇為國慮矣而范雎欲毁人以自成而至於是可畏也哉范雎蔡澤范雎相秦其所以利秦者少而害秦者多以魏冉之專忘其舊勳而逐之可也而并逐宣太后使昭王以子絶母不已甚乎宣太后之於秦非有鄭武薑莊襄后之惡也鄭武薑莊襄后猶不可絶而睢勇絶之獨不愧潁考叔茅焦乎及雎任秦事殺白起而用王稽鄭安平使民怨於內兵折於外曾不若魏冉之一二以豫觀之范睢蔡澤自為身謀取卿相可耳未見有益於秦也白起議起處是豫嘗讀太史公白起傳秦之再攻邯鄲也起與范雎有怨稱病不行以亡其軀慨然歎曰起以武夫無所屈信而困於遊談之士使起勉強一行兵未必敗而免於死矣及讀戰國策觀起自陳成敗之迹乃知邯鄲決不可再攻而起非特以怨不行蓋為之流涕也趙充國征西羌守便宜不肯奉詔出兵辛武賢雖兵出有功充國竟為漢宣明其非是武賢怨之至骨雖不能害充國而卒陷其子卭嗚呼循道而不阿自古而難之歟李斯斯恬並亦無辭始皇以詐力兼天下志得意滿諱聞過失李斯燔詩書誦功德以成其氣至其晚節不可告語君老太子在外履危亂之機而莫敢以一言合其父子之親者雖始皇之暴非斯養之不至此也及其事二世知趙高之姦復偷合取容使高勢已成天下已亂乃欲力諌不亦晚乎至於國破家滅非不幸也蒙恬蒙氏為秦吞滅諸侯其所殘暴多矣子孫以無罪戮死此天意也恬以長城之役竭民力斷地脈自知當死而毅以忠信事上自許無罪死而不厭夫偷合取容咎亞李斯此其所以不免者哉然始皇病於琅邪使毅還禱山川至於沙丘而崩使毅尚從則趙高李斯廢適之謀殆不能發嗚呼天之所廢人謀固無所復施耶唐宋八大家文鈔卷一百五十五
