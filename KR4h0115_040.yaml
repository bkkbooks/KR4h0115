body:
  text: 唐宋八大家文鈔卷三十七明茅坤撰廬陵文鈔九表啓歐陽公之文多遒逸可誦而於表啓間則往往以憂讒畏譏之餘發為嗚咽涕洟之詞怨而不誹悲而不傷尤覺有感動處謝知制誥表臣某言伏奉制命蒙恩特授臣右正言知制誥者伏以王者尊居萬民之上而誠意能與下通奄有四海之大而惠澤得以遍及者得非號令告詔發揮而巳哉然其為言也質而不文則不足以行逺而昭聖謨麗而不典則不足以示後而為世法居是職者古難其人乃以愚臣而當此選伏惟皇帝陛下茂仁聖之姿荷祖宗之業日慎一日曾未少懈而自羌夷負固邊鄙用師勤儉率先於聖躬焦勞常見於玉色雖有憂民之志而億姓未蘇雖有欲治之心而羣臣未副故每進一善則未嘗不欲勸天下之能每官一賢則未始不欲盡人材之用雖以爵祿而砥礪尚須訓誡之丁寧尤假能言以諭至意可稱是者不大艱歟伏念臣雖以儒術進身本無辭藝可取徒值嚮者時文之弊偶能獨守好古之勤志欲去於雕華文反成於朴鄙本懼不適當世之用敢期自結聖主之知陛下奬之特深用之太過此臣所以懇讓三四至於辭窮而天意不回寵命難止尚慮頑然之未諭更加使者以臨門恩出非常理難屢瀆及俯而受命伏讀訓辭則有必能復古之言然後益知所責之重夙夜惶惑未知所措又況文字之職厠于侍從之班在于周行是為超擢不徒揮翰以為效自當死節以報恩惟所使之期於盡瘁滁州謝上表歐公憂讒之言臣伏蒙聖恩授臣依前右正言知制誥知滁州軍州事已於今月二十二日赴任訖者謗讒始作大喧羣口而可驚誣罔終明幸賴聖君之在上列職尚叨於清近為邦仍竊於安間祗荷恩榮惟知感涕伏念臣生而孤苦少則賤貧同母之親惟存一妹喪厥夫而無託擕孤女以來歸張氏此時生才七嵗臣愧無蓍龜前知之識不能逆料其長大所為在人情難棄於路隅緣臣妹遂養於私室方今公私嫁娶皆行姑舅婚姻况晟於臣宗巳隔再從而張非已出因謂無嫌乃未及笄遽今出適然其既嫁五六年後相去數千里間不幸其人自為醜穢臣之耳日不能接思慮不能知而言者及臣誠為非意以至究窮於資産固已吹析於毫毛若以攻臣之人惡臣之甚茍罹纎過奚逭深文蓋荷聖明之主張得免羅織之寃枉然臣自蒙睿奬嘗列諫垣論議多及於貴權指目不勝於怨怒若臣身不黜則攻者不休茍令讒巧之愈多是速傾危於不保必欲為臣明辨莫若付於獄官必欲措臣少安莫若置之間處使其脫風波而逺去避陷穽之危機雖臣善自為謀所欲不過如此斯蓋皇帝陛下推天地之賜廓日月之明知臣幸逢主聖而敢危言憫臣不顧身微而當衆怨始終愛惜委曲保全臣雖木石之心頑實知君父之恩厚敢不虔遵明訓上體寬仁永堅不轉之心更勵匪躬之節揚州謝上表臣修言凖樞密院遞到誥勑一道伏蒙聖恩授臣起居舍人依前知制誥知揚州軍州事巳於今月二十二日赴任訖者貶所脫身遽叨臨於督府嵗成無狀乃敘進於官聫被渥以優撫心增懼伏念臣材非適用行輒違時徒知好古之勤自勵匪躬之節誤蒙奬拔驟玷寵榮小器易盈固已宜於顛覆盡言取禍仍多結於怨仇仰恃公朝臣雖自信在於物理豈有不危矧利口之中人譬含沙之射影謂時之衆嫉者易為力謂事之隂昧者易為誣上繄天聽之聰終辨獄辭之濫茍此寃之獲雪雖永棄以猶甘而况得善地以長人享及親之厚祿坐安優逸未久嵗時亟就易於方州仍陟遷於秩序有以見聖君之意未嘗忘言事之臣孤拙獲全忠善者皆當感勵姦讒不效傾邪者可使息心非惟愚臣獨以為幸此蓋伏遇皇帝陛下乾坤覆載日月照臨察人常務於究情行賞必思於有勸致兹恩典施及懦庸誓堅終始之心少答生成之造謝宣召入翰林表句句字字嗚咽纍欷使車入里君命在門閭巷驚傳豈識朝廷之故事搢紳竦歎以為儒者之至榮在臣之愚何以堪此竊以文章之任自古非輕待遇寵榮至有私人之目詢謀獻納因加內相之名恩既異於常倫人愈難於稱職伏念臣器非宏逺識匪該明學不通古今之宜材不識方圓之用久叨塵於侍從曾莫著於勞能而自出守外藩近遭家禍茍存餘喘復齒周行風波流落者十年天日再瞻於雙闕進對之際已蕭颯於霜毛慰勞有加賜憫憐於玉色形神若此志意可知身已分於早衰心敢萌於希進加以羇危之迹仇嫉交攻進退動繫於羣言論議多煩於睿聽雖覆載之造每賜保全而孤蹇偷安常思引去伏蒙皇帝陛下俯憐舊物曲軫宸慈因內署之闕員俾備官而承乏臣敢不勉尋舊學益勵前修感遺簪未棄之仁竭駑馬巳疲之力庶伸薄效少答鴻恩再辭侍讀學士表右臣凖中書劄子以臣辭免侍讀學士恩命奉聖旨不許辭讓者伏念臣猥以庸虛過蒙奬擢禁署為一時清選既已忝竊經筵况近例多兼何必辭讓蓋以臣身見兼八職侍讀已有十人為朝廷惜清職遂為冗員况講席不添人未至闕事所以敢陳瞽説乞免冒榮臣伏見國家近年以來恩濫官冗議者但知冗官之弊不思致弊之因蓋由凡所推恩便為成例在上者稍欲裁減則恐人心之不足在下者既皆習慣因謂所得為當然積少成多有加無損遂至不勝其弊莫知所以裁之中外之臣無有賢愚共知患此而臣為陛下學士職號論思豈有目覩時弊心知可患無所獻納而又自身蹈之今既已陳述若又不自踐言則貪榮冒寵不止尋常之責而虛辭飾讓又為矯偽之人此臣所以恐迫惶惑不自知止也伏望聖慈矜臣至懇察臣狂言許寢新恩俾安常分謹具狀奏聞伏候勑旨進新修唐書表為曾公亮作臣公亮言竊惟唐有天下幾三百年其君臣行事之始終所以治亂興衰之迹與其典章制度之美宜其粲然著在簡册而紀次無法詳略失中文采不明事實零落蓋百有五十年然後得以發揮幽昧補緝闕亡黜正偽謬克備一家之史以為萬代之傳成之至難理若有待臣某中謝伏惟尊號皇帝陛下有虞舜之智而好問躬大禹之聖而克勤天下平和民物安樂而猶垂心積精以求治要日與鴻生舊學講論六經考覽前古以謂商周以來為國長久惟漢與唐不幸接乎五代衰世之士氣力卑弱言淺意陋不足以起其文而使明君賢臣雋功偉烈與夫昏虐賊亂禍根罪首皆不足暴其善惡以動人耳目誠不可以垂勸戒示久逺甚可歎也乃因邇臣之有言適契上心之所閔於是刋修官翰林學士臣歐陽修端明殿學士臣宋祁與編修官知制誥臣范鎮臣王疇集賢校理臣宋敏求祕書丞臣呂夏卿著作佐郎臣劉羲叟等並膺儒學之選悉發祕府之藏俾之討論共加刪定凡十有七年成二百二十五卷其事則增於前其文則省於舊至於名篇著目有革有因立傳紀實或增或損義類凡例皆有據依纎悉綱條具載别録臣公亮典司事領徒費日月誠不足以成大典稱明詔無任慙懼戰汗屏營之至辭樞密副使表臣某言伏奉制命蒙恩特授臣依前禮部侍郎充樞密副使仍加食邑實封散官勳賜如故者成命始行驟驚於衆聽撫心增懼曾莫以自容竊以樞要之司朝廷慎選出納惟允實贊於萬幾禮遇均隆號稱於二府顧任人之得失常繫國之重輕茍非其材所損不一伏念臣器能甚薄風力不強少喜文辭殆浮華而少實晚勤古學終迂濶以自愚而自遭逢聖明擢在侍從間嘗論天下之事言出而衆怨已歸思欲報人主之知智短而萬分無補徒厝危躬於禍咎每煩聖造之保全既不適於時宜惟可置之間處故自叨還禁署逮此七年屢乞方州幾于十請瀝愚誠而懇至被明詔之丁寧雖大度并包猥荷優容之賜而羣賢在列敢懷希進之心伏遇皇帝陛下急於求人思以濟治因柄臣之並選憐舊物以不遺然而致逺之難力不勝者必速其覆量材不可能自知者猶得為明敢冀睿慈察其迫切俾回渙渥更選雋良如此則器不假人各適賢愚之分物皆知報何勝犬馬之心賀平貝州表盜孽竊興神祇共忿果憑睿算悉殄凶徒伏惟尊號皇帝陛下推仁育物浸澤在人常服儉以躬行惟足兵而在念至於多捐金幣講好戎夷務休戰爭蓋惜士卒德至深而莫報恩既厚則生驕敢肆妖狂自干斧鉞驅脅士衆閉守城闉既違天而逆人宜不攻而自破而况聖神運略將相協忠不遺一人咸即大戮悖慢者警而肅恪昏愚者知有誅夷銷沮姦萌震揚威令幸忝郡寄欣聞德音乞罷政事第三表臣聞士之行已所慎者始終之不渝臣之事君所難者進退而合理茍無大過善退其身昔之為臣全此者少臣頃侍先帝屢陳斯言今之懇誠蓋迫於此伏念臣識不足以通今古材不足以語經綸幸逢盛際之休明早自諸生而拔擢方其與儒學文章之選居言語侍從之流每蒙過奬於羣公常愧虛名之浮實暨晚叨於重任益可謂於得時何嘗敢傷一士之賢豈不樂得天下之譽而動皆臣忌毁必臣歸人之愛憎不應遽異臣之本末亦豈頓殊蓋以處非所宜用過其量惟是要權之地不勝指目之多周防所以履危而簡疏自任委曲所以從衆而拙直難移宜其舉足則蹈禍之機以身為斂怨之府復盤桓而不去遂謗議以交興讒説震驚輿情共憤皇明洞照聖斷不疑孤臣獲雪於至寃四海共欣於新政至於賴天地保全之力脫風波險陷之危使臣散髮林丘幅巾衡巷以此沒地猶為幸民况乎擁蓋垂襜其榮可喜撫民求瘼所寄非輕茍可效於勤勞亦寧分於內外伏惟皇帝陛下曲回天造俯察愚衷許解劇繁處之間僻物還其分庶獲遂於安全心匪無知豈敢忘於報效亳州乞致仕第二表寫情輸悃之言臣近貢封章乞還官政伏奉詔答未賜允俞退自省循奚勝隕越臣聞神功不宰而萬物得以曲成者惟各從其欲天鑒孔昭而一言可以感動者在能致其誠敢傾虔至之心再黷髙明之聽伏念臣本以一介之賤叨塵二府之聫知直道以事君每師心而自信然而既乏捐軀之效又無先覺之明用之已過其分而曾不自量毁者不堪其辱而莫知引去幸賴乾坤之再造得逃陷穽之危機仍許避於要權俾退安於晚節今乃苦於衰病莫自支持顧難冒於寵榮始欲收于骸骨敢期聖念過軫天慈謂雖迫於桑榆未忍棄於草莽竊以古今之制沿襲不同蓋由兩漢而來雖處三公之貴每上還於印綬多自駕於車轅朝去朝廷暮歸田里一辭髙爵遂列編民豈如至治之朝深篤愛賢之意每示隆恩之典以勸知止之人故雖有還政之名而仍享終身之䘵固已不類昔時之士無殊居位之榮然則在臣素心雖竊退休之志迹臣所乞尚虞僥幸之譏伏望皇帝陛下惻以深仁矜其至懇俾解方州之任遂歸環堵之居固將優遊垂盡之年􅉼泳太平之樂惟辛勤白首迄無一善之稱孤負明時莫報三朝之德此為慙恨何可勝陳蔡州乞致仕第二表睿訓丁寧曲加慰諭愚衷懇迫尚敢黷煩將再干於冕旒宜先伏於砧鑕伏念臣世惟寒陋少苦竒屯識不達於古今學僅知於章句名浮於實用之始見於無能器小易盈過則不勝於幾覆徒以早遘千齡之亨會誤蒙三聖之奬知寵榮既溢其涯憂患亦隨而至稟生素弱顧身未老而先衰大道甚夷嗟力不前而難強每念恩私之莫報兼之疾病以交攻爰於守亳之初遂決竄漳之計逮此三遷於歲律又更兩易於州符而犬馬已疲理無復壯田廬甚邇今也其時是敢更殫螻蟻之誠仰冀乾坤之造况今時不乏士物咸遂生鳬鴈去來固不為於多少鳶魚上下皆自適於飛潛茍遂乞於殘骸庶少償其夙志伏望皇帝陛下哀憐舊物隱惻至仁察其有素非偽之誠成其識分知止之節曲從其欲賜報曰俞俾其解組官庭還車故里披裘散髮逍遙垂盡之年鑿井耕田歌詠太平之樂其為榮幸曷可勝陳蔡州乞致仕第三表恩深煦嫗感極涕洟雖情有迫於危心不知自止而辭已窮於纍牘幾至無言惟以至誠期於必達自乞憐於君父不復訊於蓍龜伏念臣家世單平性姿中下少從宦學本免飢寒不自意於遭逢遂進階於華顯然而羣材方茂蒲柳未秋而早衰衆駿並馳駑駘中道而先乏而况荷難勝之任用竊逾分之寵榮風波憂畏而慮以深疾病侵凌而老亦至故自辭於機政即願謝於軒裳蒙上聖之至仁念三朝之舊物每曲煩於訓諭久未忍於棄捐竊惟臣之事君必本忠信言不顧行是為罔欺而臣口日誦於田閭身坐貪於祿利可畏至公之議何施有靦之顔每自省循莫遑啓處是敢罔避再三之煩黷猶希萬一之矜從伏望皇帝陛下特軫天慈俯回睿聽察前言之可復蓋屢請者有年哀下愚之不移俾卒成於素志徇其所欲乞以殘骸臣若得上還印綬於有司自駕柴車而即路晚節知無於大過沒身永荷於鴻私謝明堂覃恩轉官表天地號令風雷鼓行一氣所均萬物咸被遂容僥幸亦與褒升伏念臣材不逮人識非慮逺徒有事君之節未知報國之方冒寵貪榮巳踰其量見利臨得曾不知慙比者伏遇尊號皇帝陛下堯舜聰明禹湯勤儉修前王之曠典述先志以繼成昭致精禋躬臨路寢膺受上天之多福推與萬方而不私臣於此時限以官守講儀制禮不預議郎博士之流助祭陪祠不在諸侯方物之列既乏一言之獻又無執事之勞徒隨翟閽共享餘賜普天率土難異衆以獨辭蹐厚局髙但撫躬而無措謝復龍圖閣直學士表恩還舊職事雪前誣感極心驚涕隨言出臣伏見前世材賢之士身結主知勳德之臣功施王室然尚或一遭謗毁欲辨無由少忤要權其禍不測顧如臣者何足道哉臣材不逮於中人功無益於當世用之未見其效去之無足可思矧罔極之讒交興而並進易危之迹何恃而不顛而聖心不忘恩意特至辨罔欺於曖昧沮仇嫉於衆多雖暫居譴謫之中而屢被升遷之渥今又特蒙甄録牽復寵名以臣之愚豈比前人而獨異推其所幸蓋由聖主之親逢謂宜如何可以論報再念臣稟生孤拙本乏藝能徒因學古之勤粗識事君之節茍臨危效命尚當不顧以奮身况為善無傷何憚竭忠而報國誓期盡瘁少答髙明南京留守謝上表情曲守宫鑰之謹嚴敢忘夙夜布政條之纎悉上副憂勤寄任非堪兢營並集伏念臣賦材庸薄稟數竒屯毁譽交興兩嘗過實寵榮踰分動輒招尤念報效之未伸敢不竭忠而盡瘁因風波之可畏則思逺去以深藏逮此六年外更三守學偷安而杜口負素志以愧心朽質易衰已凋零於齒髮良時難得尚希慕於功名豈謂皇慈未捐舊物擢從支郡委以名都惟此别京舊當孔道簿領少勤於職事厨傳取悅於路人茍循俗吏之所為雖能免過非有古人之大節未足報君亳州謝上表二政非才雖獲奉身而退分符善地猶懷竊祿之慚祗荷寵靈惟知戰懼伏念臣章句腐儒之學豈足經邦斗筲小器之量寧堪大用而叨塵二府首尾八年荷三朝之誤知罄一心而盡瘁若乃樞機宜慎而見事輒言陷穽當前而橫身不避竊尋前載未有能全一昨怨出仇家搆為死禍造謗于下者初若含沙之射影但期陰以中人宣言于廷者遂肆鳴梟之惡音孰不聞而掩耳賴聖人之在上廓日月之至明悉究調誣遂投讒賊再念臣性實甚愚而疏於接物事多輕信者蓋以至誠如彼匪人失於泛愛平居握手惟期道義之交延譽當朝常丐齒牙之論而未乾薦禰之墨已彎射羿之弓知士其難世必以臣為戒常情共惡人將不食其餘而臣與遊既昧於擇賢在滿不思於將覆自貽禍釁幾至顛隮上煩睿聖之保全得完名節於終始洎懇辭於重任尤深惻於皇慈雖避寵辭隆僅能去位而清資顯秩愈更叨榮莫逃僥幸之譏實負心顔之靦斯蓋伏遇皇帝陛下乾坤大度堯舜至仁察臣自取於怨仇本由孤直憫臣力難於勉強蓋迫衰殘既獲免於非辜仍曲從於私欲遂同萬物俾無失所之嗟未盡餘生敢忘必報之效謝賜漢書表渾雄典則俯躬承命拭目生輝竊以右文興化乃致治之所先著録藏書須太平而大備惟漢室上繼三代之統而班史自成一家之書文或舛訛蓋其傳之已久詔加刋定俾後學之無疑一新方册之文增煥祕書之府而奏篇之始方經衡石之程賜本之榮惟及鈞樞之近敢期孤外特與恩頒此蓋伏遇皇帝陛下曲軫睿慈俯矜舊物謂其嘗與臣鄰之列不忍遽遺憐其自喜文字之間俾之娛老然臣兩目昏眊雖嗟執卷之已艱什襲珍藏但誓傳家而永寶謝擅止散青苗錢放罪表有罪必誅是為彛典原情以恕特出深仁聞命驚慚省躬涕泗伏念臣以一介之微賤荷三聖之奬知寵祿既豐初無報效筋骸巳憊尚此遲徊曲蒙大度之并容誤委一方之寄任職當撫俗責在分憂方兹旰昃之勞心豈敢因循而避事昨遇國家新建官司而主計大商財利以均通分命出使之車交馳於郡縣悉發舊藏之鏹取息於民氓而臣方久苦於昏衰初莫詳其利害既巳大喧於物議始知不便於人情亦嘗略陳衆弊之三兾補萬分之一屬再當於班給顧已逼於會期雖具奏陳乃先擅止據兹專輒合被譴呵豈謂伏蒙皇帝陛下深軫睿慈俯矜朴拙免從吏議特貸刑章夫何草木之微曲被乾坤之施臣敢不益思祗畏更勵操修戒小人之遂非希君子之改過兾圖薄效少答鴻私大略此公之才多婉麗故於四六往往摹寫情神點綴色澤至於遭讒罹患處更多嗚咽纍欷之思較之韓柳曾蘇諸公皆所不逮者也吾僅録其若干什以見其槩耳而他所遺逸者尚多也謝襄州燕龍圖肅惠詩啓詞雖四六之體而藴思轉調如峽之流泉如岫之吐雲絶無刀尺絶無斷續昨日伏蒙知府龍圖即席寵示五言詩一章者修聞古者賔主之間獻酬已接將見其志必有賦詩託於咏嘆之音以通歡欣之意然而工歌三夏使者再辭及于皇華然後拜貺是則施于貴賤各有所當修賤士也何足當之伏惟某官以侍從之臣當藩屏之任德爵之重與齒俱尊學通天人識洞今古綽有餘裕多為長言談笑樽俎之間舒卷風雲之際成於俄頃蓋其咳唾之餘得而祕藏已如金玉之寶豈伊孱陋敢辱褒稱形於短篇以為大賜伏讀三四且喜且慙譬夫四面之宫鏗鏘之奏愚者驟聽駭然震蕩及夫心平悸定然後知於至和在於頑蒙獲此開警然貺之厚者不敢報之以薄禮所尊者不敢敵之以平顧惟愚庸豈得賡繼但佩黃金之賜無忘長者之言謝石秀才啓某啓纍日前伏承惠然見過仍以嘉什一筒寵示者獵纓拜賜刮目披文紙弊墨渝不能捨手伏以某人英躔逸軌天驥上才好學屢空浸潤淵源之奧知言九變窺見天人之交久已擅一鄉之評早亦應萬家之令然而奏磬俚耳難矣賞音抱石荆山終為至寶而自慕幅巾於衡巷乘下澤於鄉閭晦丘園之養髙輕鴈纁而堅卧冥飛已逺笑弋者之何求齷齪坐談嗟律魁之獨棄而以錦帶居士白蓮社人效菩薩之坐家去塵自逺掃維摩之一室敢入者稀是宜邈為方外之遊隔此俗中之軌而乃過存庸妄曲借奬題因隱几之間居抽吮毫之餘思灑乃藻麗用飾愚矇為鼷鼠而抉機僅成輕發養鶢鶋而奏曲徒使眩悲矧夫峭格峻髙春華掞美暢來雲依月之句擅落花映草之評內惟棗鈍之姿奚稱衮褒之寵去天尺五已服於清標和者數人蔑聞於絶調未遑賡報徒用靦慙謝挍勘啓句句挍勘絶佳之作仰報恩榮實增震栗竊以挍讐之職是正為難委方册於程文折羣疑於獨見脫絢組之三寸簡編多前後之乖并盤庚之一篇文章有合離之異以仲尼之博學猶存郭公以示疑非元凱之勤經孰知門王而為閏况乃西崑册府備帝者之來臨蓬萊道山非人間之所見自匪識窮元本學漸淵源究百世之放紛總羣言而博達則何以效官天祿對青藜而屬書抱簡羽陵拂白蟫而辨蠧如修者器惟庸妄族本羈單雖出逢千載之期而生有百罹之苦入橋門而著録最後諸生聞月旦之坐評敢希一目徒以浸潤聲名之代優遊教育之仁過時之年已捍堅而難入少作可悔終雕刻以無功早濫吹以決科旋釋巾而補吏逮親而得斗祿雖慰於子心斂版以揖上官遂成於俗狀學久矣而將落思兀然而欲枯進無取當塗之資退己失故時之步嵗月其忽徒有志於分陰英俊並遊方問途而孤進內顧拙艱之若此敢懷榮遇以為心豈期天幸之來特被柄臣之薦敢辱知人之美蓋因連茹而升蒙曲造之并容俾考言而善擇顧蕪庸之末學已屢試於有司碩鼯之有五能盡於是矣鉛刀之堪一割其可再乎固無可喜之文過辱太優之等俾從賔席入預書林一進階而可榮何勝於睿渥三下拜而聞命深服於訓辭天闕乍趨迷目睛而眩轉藝臺深敞近星象以昭回恣窺金匱之書坐費太官之膳內循忝據有溢情涯此蓋伏遇昭文相公奬物均私樂材推美圓方有範大陶冶以埏鎔髙下不欺正權衡而輕重閔此庸懦曲以甄收誓堅頂踵之誠永荷丘山之賜謝進士及第啓楓宸蠖濩方贊趨而在庭雲幄靚深逮臚傳而唱第竊顧無庸之品仍躋異等之科祗服寵靈實增震悸竊以思皇之詠多士雅頌播於姬庭間出之有異人文章炳乎漢德選知言於九變東都下深詔之辭開孝秀之一門唐家有得賢之盛皆所以招徠時彥樂育人材講求精祲之原潤色帝王之美卓為往範垂照來今丕哉文物之華屬我神靈之運國家右賢興治若古敷猷休聲塞乎淵泉至德湧於烽火彌文上化疏璧水以環流儲精太寧坐蒿宫而講道爛乎舜日之晏晏煥乎堯章之巍巍而且優遊巖廊夢想豪俊下賢書而旁午諭上意之丁寧復詔策於亷科謹鄉能於嵗舉馳封一馬使者在道而相望翹首羣英天下嚮風而咸靡逮計車之偕上首方貢以前陳委密侍之巨賢先春闈而覆較氊筆署乎重棘奏可而後行錦几坐乎中楹親臨而明試森陳奏牘逮兩令之不勝精閲書衡幾百斤而未止自匪該明治具佩服儒規行實藹乎徽猷識宇包乎賢業寖明寖昌之畢講學際乎天人之交至纎至悉而不遺言達於國家之體則何以上當乙覽榮中甲科聫俊乂以服官陪英雄而入彀如某者風猷靡立操植素淪樹樗甚乎液樠膏棗嗟乎昏鈍戴枝冠而竦誚切愧命儒問天咫以不知終然懵學加以素鍾舛運生遘百罹自剪髮以交垂已不髦而茹歎逐耕夫而衣襏早去先疇署生版以占名轉隨僑籍流離末路佁擬後塵借譽羣公之遊本無題目接足諸生之後多見排根差盛際之親逢忍窮途而自竄陪貢廉於百郡每與計偕飲試墨之一升嘗從罷去退慙踸踔數此隻竒撫骨嗟乎淪鋪卷迹甘於藏密然而良裘學冶惜先芬而懼隳母髮垂星感親闈之思養未及衰於駒齒勉自奮於駑筋乘下澤以去鄉棄裂繻而為誓車騎乏甚都之雅風塵有化俗之勞上國連衡仰攀於俊軌橋門掎袂獲覘於邦光會泛駕之求才輒應書而充賦以孝亷而射策本無百六之能自衒鬻之上書蓋逾千數之衆逮漢庭之籍奏咸以名聞同矍圃之去賔僅有存者顧惟庸妄首玷甄升獲召於公車之庭給試乎上方之札致狂言之誤擇叨署第以開榮若若飛華交垂宛轉之綬諄諄其誨載聆郁穆之言浸雲澤以芬流沐天光之下燭竊慙鉛鈍嘗厠翰場屢以下中之才當乎第一之選宜不失於舊物期仰答於知人然其戰屢勝而後驕鼓至三而乃竭綆短褚小嗟逺用以奚勝弓撥矢鉤惜前功之皆廢誠以九閽坐狄百戟森庭就列瞻天駭威臨於咫尺爭觀落筆紛立若於堵墻恍訝鈞庭之夢遊驟覺幹魂之驚去僅成牽課靡中科程瀆睿覽之至精宜報聞於獨罷尚賴黈旒之過聽兼求箕斗之虛名謂簸揚之在前常先於羣彥以薦藉之良厚重違於大臣猥自下流參聮上列省逢辰之至幸實叨恩之有因此蓋某官闡繹帝猷雍容朝首粉澤光華之治表燭薦修之倫膺上心之柬求主斯文之盟會言皆有味務推轂以彌勤先為之容俾朽株之見用致兹孱瑣及此抽揚敢不慎服官針遵修士則鞭後䇿足更希逺致之塗鎔金鈞泥尚依陶者之力誓殫用拙之效少酬再造之恩過此以還未知所措唐宋八大家文鈔卷三十七
