body:
  text: 唐宋八大家文鈔廬陵史鈔引或問余於歐陽公復有史鈔何也歐陽公他文多本韓昌黎而其序次國家之大及謀臣戰將得失處余竊謂獨得太史公之遺其為唐書則天子詔史官與宋庠輩共為分局視草故僅得其志論十餘首而五代史則出於公之所自勒者故梁唐帝紀及諸名臣戰功處往往㸃次如畫風神粲然惜也五代兵戈之世文字崩缺公於其時特本野史與勢家巨室家乘所傳者而為之耳假令如太史公所本左傳國語戰國策楚漢春秋又如班掾所得劉向東觀漢書及西京雜記等書為之本揚榷古今詮次當闕
  hash: sha256:98ba9f684b7d22899829c7f98028900f190cea901c0799b995e66e10a3ceaa9a
