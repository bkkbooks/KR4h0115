body:
  text: 唐宋八大家文鈔卷五十二明茅坤撰廬陵文鈔二十四墓志銘太子太師致仕杜祁公墓志銘法度嚴整故太子太師致仕祁國公贈司徒兼侍中杜公諱衍字世昌越州山陰人也其先本出於堯之後歷三代常為諸侯後徙其封于杜而子孫散適他國者以杜為氏自杜赫為秦將軍後三世御史大夫周及其子建平侯延年仍顯于漢又九世當陽侯預顯于晉又十有四世岐國公佑顯于唐又九世而至于祁公其為家有法其吉凶祭祀齊戒日時幣祝從事一用其家書自唐滅士喪其舊禮而一切茍簡獨杜氏守其家法不遷于世俗蓋自春秋諸侯之子孫歷秦漢千有餘嵗得不絶其世譜而唐之盛時公卿家法存於今者惟杜氏公自曾髙以來以恭儉孝謹稱鄉里至公為人尤潔廉自刻其為大臣事其上以不欺為忠推於人以行巳取信故其動靜纎悉謹而有法至考其大節偉如也公享年八十官至尚書左丞方其六十有九嵗且盡即上書告老明年以太子少師致仕纍遷太子太保太傅太師封祁國公於其家天子祀明堂遣使者召公陪祠將有所問以疾不至而嵗時存問勞賜不絶公少舉進士髙第為揚州觀察推官知平遙縣通判晉州知乾州遷河東京西路提㸃刑獄知揚州河東陜西路轉運使入為三司户部副使拜天章閣待制知荆南府未行以為河北路都轉運使遂知天雄軍召為御史中丞判流內銓知審官院拜樞密直學士知永興軍徙知並州遷龍圖閣學士兼知永興軍權知開封府康定元年以刑部侍郎同知樞密院事即拜副使慶厯三年遷吏部侍郎樞密使明年以本官同中書門下平章事公治吏事如其為人其聽獄訟雖明敏而審核愈精故屢决疑獄人以為神其簿書出納推析毫髮終日無倦色至於條目必使吏不得為姦而巳及其施於民者則簡而易行始居平遙嘗以吏事適他州而縣民爭訟者皆不肯决以待公歸知乾州未滿嵗安撫使察其治行以公權知鳳翔府二邦之民爭於界上一曰此我公也汝奪之一曰今我公也汝何有焉夏人初叛命天下苦於兵而自陜以西尤甚吏緣侵漁調發督迫至民破産不能足往往自經投水以死於是時公在永興語其人曰吾不能免汝然可使汝不勞爾乃為之區處計較量物有無貴賤道里逺近寬其期會使以次輸送由是物不踴貴車牛芻秣宿食來往如平時而吏束手無所施民比他州費省十六七至於繕治城郭器械民皆不知開封治京師常撓於權要有干其法而能不為之屈者世皆以為難至公能使權要不敢有所干凡其為治以聽斷盜訟為能否爾獨公始有餘力省其民事如治他州而畿赤諸縣之民皆被其惠開封比比出能吏而兼於民政者惟公一人吏部審官主天下吏員而居職者類以不久遷去故吏得為姦公始視銓事一日選者三人爭某闕公以問吏吏受丙賕對曰當與甲乙不能爭遂授他闕居數日吏教丙訟甲負某事不當得公悟召乙問之乙謝曰業巳得他闕不願爭公不得已與丙而笑曰此非吏罪乃吾未知銓法爾因命諸曹各具格式科條以白問曰盡乎曰盡矣明日敕諸吏無得升堂使坐曹聽行文書而已由是吏不得與銓事興奪一出於公居月餘翕然聲動京師其在審官有以賄求官者吏謝不受曰我公有賢名不久見用去矣姑少待之慶厯之初上厭西兵之久出而民弊亟用今丞相富公樞密韓公及范文正公而三人者遂欲盡革衆事以修紀綱而小人權幸皆不悅獨公為相佐佑而公尤抑絶僥幸凡內降與恩澤者一切不與每積至十數則連封而面還之或詰責其人至慙恨涕泣而去上嘗謂諫官歐陽修曰外人知杜某封還內降邪吾居禁中有求恩澤者每以杜某不可告之而止者多於所封還也其助我多矣此外人及杜某皆不知也然公與三人者卒皆以此罷去公多知本朝故實善决大事初邊將議欲大舉以擊夏人雖韓公亦以為可舉公爭以為不可大臣至有欲以沮軍罪公者然兵後果不得出契丹與夏人爭銀甕族大戰黃河外而鴈門麟府皆警范文正公安撫河東欲以兵從公以為契丹必不來兵不可妄出范公怒至以語侵公公不為恨後契丹卒不來二公皆世俗指公與為朋黨者其議論之際蓋如此及三人者將罷去公獨以為不可遂亦罷以尚書左丞知兖州嵗餘乃致仕公自布衣至為相衣服飲食無所加雖妻子亦有常節家故饒財諸父分産公以所得悉與昆弟之貧者俸祿所入分給宗族賙人急難至其歸老無屋以居寓於南京驛舍者久之自少好學工書畫喜為詩讀書雖老不倦推奬後進今世知名士多出其門居家見賓客必問時事聞有善喜若已出至有所不可憂見於色或夜不能寐如任其責者凡公所以行之終身者有能履其一君子以為人之所難而公自謂不足以名後世遺戒子孫無得紀述嗚呼豈所謂任重道逺而為善惟日不足者歟曾祖太子少保諱某贈太師祖鴻臚卿諱叔詹追封吳國公父尚書度支員外郎諱遂良追封韓國公皆贈太師中書令兼尚書令娶相里氏晉國夫人子男曰詵大理評事欣太常博士訥將作監主簿詒祕書省正字三子早卒女長適集賢挍理蘇舜欽次適祕閣挍理李綖次適單州團練推官張遵道公以嘉祐二年二月五日卒于家其子欣以其年十月十八日葬公于應天府宋城縣之仁孝原銘曰翼翼祁公率履自躬一其初終惟德之恭公在于位士知貪廉退老于家四方之瞻豈惟士夫天子曰咨爾曲爾直繩之墨之正爾方圓有矩有規人莫之踰公無爾欺豫左豫右惟公是毗公雖告休受寵不巳宫臣國公即命于第奕奕明堂萬邦從事豈無臣工為于執事何以召之惟公舊德公不能來豫其往錫君子愷悌民之父母公雖百齡人以為少不俾黃耉喪豫元老寵祿之隆則有止期惟其不已既去而思銘昭于逺萬世之詒唐荆川曰此文之密豈班孟堅下哉鎮安軍節度使同中書門下平章事贈中書令諡文簡程公墓志銘叙事直而多大體嘉祐元年閏三月巳丑鎮安軍節度使撿挍太師同中書門下平章事使持節陳州諸軍事陳州刺史程公薨于位以聞詔輟視朝二日贈公中書令於是其孤嗣隆以狀上考功移于太常而博士起曰法宜諡乃諡曰文簡明年十月十八日葬公于河南伊闕之神陰鄉張留里其孤又以請于太史而史臣修曰禮宜銘乃考次公之世族官封爵號卒葬時日與其始終之大節合而志於墓焉且銘之曰惟程氏遠有世序自重黎以來其後居中山者出於魏安鄉侯昱之後公諱琳字天球中山博野人也曾祖贈太師諱新曾祖妣吳國夫人齊氐祖贈太師中書令諱贊明祖妣秦國夫人吳氏考袁州宜春令贈太師中書令兼尚書令冀國公諱元甸妣晉國夫人楚氏公以大中祥符四年舉服勤辭學髙第為泰寧軍節度掌書記改著作佐郎知夀陽縣祕書丞監左藏庫天僖中詔舉辭學履行召試直集賢院今天子即位遷太常博士三司户部判官是時契丹所遣使者數出不遜語生事而主者應對多失辭上患之已而契丹來賀即位乃選公為接伴使而契丹使者言太后當遣使通書公遽以禮折之乃巳史官修真宗實録而起居注闕命公修大中祥符八年以後起居注遂修起居注遷祠部員外郎提舉在京諸司庫務以本官知制誥同判吏部流內銓天聖五年館伴契丹賀乾元節使使者言中國使至契丹坐殿上位次髙而契丹使來坐次下當陛語甚切不已而上與大臣皆以為小故不足爭將許之公以謂許其小必啓其大力爭以為不可遂止河决滑州初議者言可塞役既作而後議者以為不可乃命公往視之公言可塞遂塞之嵗中遷右諫議大夫權御史中丞明年拜樞密直學士知益州蜀人輕而喜亂公常先制於無事至其臨時如不用意而略其細治其大且甚者不過一二而蜀人安之自寮吏皆不能窺其所為正月俗放燈吏民夜會聚遨嬉盛天下公先戒吏為火備有失火者使隨救之勿白以動衆既而大宴五門城中火吏救止卒宴民皆不知蓋其他設施多類此軍士見監軍告其軍有變監軍入白公笑遣之惶恐不敢去公曰軍中動靜吾自知之茍有謀者不待告也可使告者來監軍去而告者卒不敢來公亦不問遂止蜀州妖人有自號李氷神子者署官屬吏卒聚徒百餘人公命捕置之法而讒之朝者言公妄殺人蜀人恐且亂矣上遣中貴人馳視之使者入其境居人行旅爭道公善使者問殺妖人事其父老皆曰殺一人可使蜀數十年無事使者問其故對曰前亂蜀者非有智謀豪傑之才乃里閭無賴小人爾惟不制其始遂至於亂也使者視蜀既無事又得父老語還白於是上益以公為能遷給事中知開封府禁中大火延兩宫宦者治獄得縫人火斗巳誣伏而下府命公具獄公立辨其非禁中不得入乃命工圖火所經而後宫人多所居隘其烓竈近版壁嵗久燥而焚曰此豈一日火哉乃建言此殆天災也不宜以罪人上為緩其獄故卒得無死者公在府决事神速一嵗中獄常空者四五遷工部侍郎龍圖閣直學士守御史中丞是嵗以翰林侍讀學士復知開封府明年為三司使治財賦知本末出入有節雖一金不可妄取纍遷吏部侍郎景祐四年以本官參知政事司天言日食明年正旦請移閏月以避之公以謂天有所譴非移閏可免惟修德政而已乃止范仲淹以言事忤大臣貶饒州已而上悔悟欲復用之稍徙知潤州而惡仲淹者復誣以事語入上怒亟命置之嶺南自仲淹貶而朋黨之論起朝士牽連出語及仲淹皆指為黨人公獨為上開說明其誣枉上意解而後已公為人剛决明敏多識故事議論慨然及知政事益奮勵無所回避宰相有所欲私輒以語折之至今人往往能道其語而小人僥幸多不得志遂共以事中之坐貶光祿卿知潁州已而上思之徙知青州又徙大名府居一嵗間遷户部吏部二侍郎尚書左丞資政殿學士北京建興宦者皇甫繼明爭治行宫事章交上上遣一御史視其曲直御史直公遂罷繼明是時繼明方信用其勢傾動中外自朝廷大臣莫不屈意下之而公被中傷方起未復而獨與之爭雖小故不少假也故議者不以公所直為難而以能不為繼明屈為難也遷工部尚書資政殿大學士河北安撫使慶厯六年拜武昌軍節度使陜西安撫使知永興軍府事明年加宣徽北院使判延州夏人以兵三萬臨界上前三日公諜知其來戒諸堡寨按兵閉壁寇至以為有備引去訖公去不復窺邊趙元昊死子諒祚立方幼三大將共治其國言事者謂可除其諸將皆以為節度使使各有其所部以分弱其勢可遂無西患事下公公以謂幸人之喪非所以示大信撫夷狄而諒祚雖幼君臣和三將無異志雖欲有為必無功而反生事不如因而撫之上以為然皇祐元年加同中書門下平章事復判大名府兼北京留守自元昊反河西契丹亦犯約求地二邊兵興連嵗不解而公方入與謀議更守西北二方尤知夷狄虛實情僞山川要害所以行師制勝營陳出入之法於河北尤詳其奏議頗多雖不能盡用其指畫規為之際有可喜也再居大名前後十年威惠信於其人人為立生祠公自罷政事益不妄與人合亦卒不復用既徙鎮安居三嵗上書曰臣雖老尚能為國守邊未報而得疾享年六十有九公纍階開府儀同三司勳上柱國開國廣平郡爵公食户七干四百而實封二干一百賜號推誠保德守正翊戴功臣娶陳氏封衛國夫人子男四人曰嗣隆太常博士嗣弼殿中丞嗣恭太常博士嗣先大理寺丞女五人長適職方員外郎榮諲次適祕書丞韓縝次適都官員外郎朝仲約次適大理寺丞吳得次適將作監主簿王稱孫三人長曰伯孫次曰公孫皆太常寺太祝次曰昌孫守祕書郎有文集奏議六十卷公平生寡言笑慎於知人既已知之久而益篤喜飲酒引滿然人罕得其歡而與余尤相好也銘曰君子之守志於不奪不學而剛有摧必折毅毅程公其剛不屈公在政事有諤其言直雖不容志豈不完謂公不顯公位將相豈無謀謨胡不以訪老于輔藩白首猶壯公雖在外邦國之光奄其不存士夫曷望吉卜之從兆此新岡惟其休聲逾逺彌長唐荆川曰此與神道碑二文相比其書不書互見尚書户部侍郎參知政事贈右僕射文安王公墓志銘公姓王氏其先太原祁人其六世祖某為唐輝州刺史遭世亂因留家碭山碭山近宋其後又徙宋州之虞城今為應天虞城人也公諱堯臣字伯庸天聖五年舉進士第一為將作監丞通判湖州召試以著作佐郎直集賢院知光州嵗大饑羣盜發民倉廩吏法當死公曰此饑民求食爾荒政之所恤也乃請以減死論其後遂以著令至今用之丁父憂服除為三司度支判官再遷右司諫郭皇后廢居瑶華宫有疾上頗哀憐之方后廢時宦者閻文應有力及后疾文應又主監醫后且卒議者疑文應有姦謀公請付其事御史考按虛實以釋天下之疑事雖不行然自文應用事無敢指言者後文應卒以恣橫斥死后猶在殯有司以嵗正月用故事張燈公言郭氏幸得䝉厚恩復位號乃天子后也張燈可廢上遽為之罷景祐四年以本官知制誥賜服金紫同知通進銀臺司兼門下封駁提舉諸司庫務遷翰林學士知審官院元昊反西邊用兵以公為陜西體量安撫使公視四路山川險易還言某路宜益兵若干某路賊所不攻某路宜急為備至於諸將材能長短盡識之薦其可用者二十餘人後皆為名將是時邊兵新敗於好水任福等戰死今韓丞相坐主帥失律奪招討副使知秦州范文正公亦以移書元昊不先聞奪招討副使知耀州公因言此兩人天下之選也其忠義智勇名動夷狄不冝以小故置之且任福由違節度以致敗尤不可深責主將由是忤宰相意并其他議多格不行明年賊入涇原戰定川殺大將葛懷敏乃公指言為備處由是始以公言為可信而前所格議悉見施行因復遣公安撫涇原路公曰陛下復用韓琦范仲淹幸甚然將不中御兵法也願許以便冝從事上以為然因言諸路都部署可罷經略副使以重將權而偏將見招討使以軍禮置德順軍於籠竿城廢涇原等五州營田以其地募弓箭手其所更置尤多方公使還行至涇州而德勝寨兵迫其將姚貴閉城叛公止道左解裝為榜射城中以招貴且發近兵討之初吏白曰公奉使且還歸報天子爾貴叛非公事也公曰貴土豪也頗得士心然初非叛者今不乘其未定速招降後必生事為朝廷患貴果出降明年四月以學士權三司使自朝廷理元昊罪軍興而用益廣前為三司者皆厚賦暴斂甚者借內藏率富人出錢下至果菜皆加稅而用益不足公始受命則曰今國與民皆弊矣在陛下任臣者如何由是天子一聽公所為公乃推見材利出入盈縮曰此本也彼末也計其緩急先後而去其蠧弊之有根冗者斥其妄計小利之害大體者然後一為條目使就法度罷副使判官不可用者十五人更薦用材且賢者期年民不加賦而用足明年以其餘償內藏所借者數百萬又明年其餘而積於有司者數千萬而所在流庸稍復其業公曰臣之術止於是矣且臣母老願解煩劇天子多公功以為翰林學士承㫖兼端明殿學士羣牧使初宦者張永和方用事請收民房錢十之三以佐國事下三司永和陰遣人以利動公公執以為不可度支副使林濰附永和議不巳公奏罷濰乃止益利䕫三路轉運使皆請增民鹽井課嵗可為錢十餘萬公亦以為不可而權幸因緣多見裁抑京師數為飛語及上之左右往往讒其短者上一切不問而公為之亦自若也及公既罷上慰勞之公頓首謝曰非臣之能惟陛下信用臣爾丁母憂去職服除復為學士羣牧使再遷給事中皇祐三年以本官為樞密副使公持法守正遂以身任天下事凡宗室宦官醫師樂工嬖習之賤莫不關樞密而濫恩幸請隨其事可損損之可絶絶之至其大者則皆著為定令由是小人益怨構為飛書以害公公得書自請曰臣恐不能勝衆怨願得罷去上愈知公為忠為下令購為書者甚急公益感勵在位六年廢職修舉皆有條理樞密使狄青以軍功起行伍居大位而士卒多屬目往往造作言語以相扇動人情以為疑而青色頗自得公嘗以語衆折青為陳禍福言古將帥起微賤至富貴而不能保首領者可以為鑒戒青稍沮畏嘉祐元年三月拜户部侍郎參知政事三年遷吏部侍郎八月二十一日以疾薨于位享年五十有六公在政事論議有所不同必反復切剴至於是而後止不為獨見在上前所陳天下利害甚多至施行之亦未嘗自名其所設施與在樞密時特異豈政事者丞相府也其體自宜如是邪公為人純質雖貴顯不忘儉約與其弟純臣相友愛世稱孝悌者言王氏遇人一以誠意無所矯飾善知人多所稱薦士為時名臣者甚衆有文集五十卷將終口授其弟純臣遺奏以宗廟至重儲嗣未立為憂天子愍然臨其喪輟視朝一日贈左僕射太常諡曰文安曾祖諱化某官贈太傅妣戚氏封曹國太夫人祖諱礪某官父諱瀆某官皆贈太師中書令兼尚書令祖妣袁氏鄆國太夫人妣仇氏徐國太夫人娶丁氏安康郡夫人子男三人同老大理評事周老太常寺太祝早卒朋老大理評事二女長適挍書郎戚師道早卒次未嫁王氏自遷虞城由公曾祖而下或葬雙金或葬土山皆在虞城嘉祐四年八月十日改葬公之皇考于宋城縣平臺鄉石落原而以公從葬焉銘曰王為祁人遭亂不還六世之祖初留碭山其後再遷虞宋之間遂安其居葬不逺卜宋多名家王實大族族大而振自公顯聞公初奮躬以學以文逢國多事有勞有勤利歸于邦怨不避身帝識其忠謂堪豫弼俾副樞機出入惟密遂參政事實有謀謨誰中止之不俾相豫帝有褒章愍飾之贈長于百寮考德惟稱惟古載功在其廟器今亦有銘幽宫是閟唐荆川曰純雅之文資政殿大學士尚書左丞贈吏部尚書正肅吳公墓志銘嘉祐四年十一月丁未資政殿大學士金紫光祿大夫尚書左丞知河南府兼西京留守司上柱國渤海郡開國公食邑二千八百户食實封八百户贈吏部尚書諡曰正肅吳公葬于鄭州新鄭縣崇義鄉朝村之原吳氏世為建安人自髙曾以來皆葬建州之浦城至公始葬其皇考于新鄭公諱育字春卿為人明敏徑果强學博辨能自忖度不可守不發已發莫能屈奪天聖中與其弟京方俱舉進士試禮部為第一遂中甲科而京方皆及第當是時吳氏兄弟名聞天下公初以大理評事知臨安諸暨二縣遷本寺丞知襄城縣舉才識兼茂明於體用策入三等遷著作佐郎直集賢院通判蘇州同知太常禮院三司户部度支二判官知諫院修起居注知制誥判太常大理二寺吏部流內銓史館修撰纍遷起居舍人為翰林學士久之遷禮部郎中以學士知開封府公為政簡嚴所至民樂其不擾去雖久愈思之初秦悼王葬汝州界中其後子孫當從葬者與其嵗時上冡者不絶故宗室宦官常往來為州縣患公在襄城每裁折之宗室宦官怒或夜半叩縣門索牛駕車以動之公輒不應及旦徐告曰牛不可得也由是宗室宦官曰此不可為也凡過其縣者不敢以鷹犬犯民田至他境矣然後敢縱獵其治開封尤先豪猾曰吾何有以及斯人去其為害者而巳居數日發大姦吏一人流于嶺外一府股栗又得巨盜積贓萬九千緡獄具而輒再變衆疑以為寃天子為遣他吏按之卒伏法由是京師肅清方元昊叛河西契丹亦乘間隳盟朝廷多故公數言事獻計畫自元昊初遣使上書有不順語朝廷亟命將出師而羣臣爭言豎子即可誅滅獨公以謂元昊雖名藩臣而實夷狄其服叛荒忽不常宜示以不足責外置之且其巳僣名號誇其大勢必不能自削以取羞種落第可因之賜號若國主者且故事也彼得其欲宜不肯妄動然時方鋭意於必討故皆以公言為不然其後師久無功而元昊亦歸過自新天子為除其罪卒以為夏國主繇是議者始悔不用公言而虛弊中國公在開封數以職事辨爭或有不得則輒請引去天子惜之慶厯五年正月以為諫議大夫樞密副使三月拜參知政事與賈丞相爭事上前上之左右與殿中人皆恐色變公論辨不已既而曰臣所爭者職也顧力不能勝矣願罷臣職不敢爭上顧公直乃復以為樞密副使居嵗餘大旱賈丞相罷去御史中丞髙若訥用洪範言大臣廷爭為不肅故雨不時若因并罷公以給事中知許州又知蔡州州故多盜公按令為民立伍保而簡其法民便安之盜賊為息京師有告妖賊干人聚確山者上遣中貴人馳至蔡以名捕者十人使者欲得兵自往取之公曰使者欲藉兵立威欲得妖人以還報也使者曰欲得妖人爾公曰吾在此雖不敏然聚干人于境內安得不知使信有之今以兵往是趣其為亂也此不過鄉人相聚為佛事以利錢財爾一弓手召之可致也乃館使者日與之飲酒而密遣人召十人者皆至送京師告者果伏辜拜資政殿學士徙知河南府兼西京留守司又徙陜府遷禮部侍郎徙永興軍丁父憂去官起復懇請終喪服除加拜翰林侍讀學士且召之公辭以疾上惻然遣使者存問賜以名藥遂以知汝州居久之又辭以疾即以為集賢院學士判西京留守司御史臺疾少間復知陜府加拜資政殿大學士自公罷去上數為大臣言吳某剛正可用每召之輒以疾不至於是召還始侍講禁中判通進銀臺司尚書都省明年拜宣徽南院使鄜延路經略安撫使判延州龎丞相經略河東與夏人爭麟州界亟築柵於白草公以謂約不先定而亟城必生事遽以利害牒河東移書龎公且奏疏論之朝廷皆不報巳而夏人果犯邊殺驍將郭恩而龎丞相與其將挍十數人皆以此得罪麟府遂警既而公復以疾辭不任邊事且求解宣徽使乃復以為資政殿大學士尚書左丞知河中府遂徙河南公前在河南踰月而去河南人思之聞其復來皆歡呼逆于路惟恐後其卒也皆聚哭公享年五十有五以嘉祐三年四月十五日卒于位詔輟朝一日曾祖諱進忠贈太師妣陳氏吳國太夫人祖諱諒贈中書令妣葛氏越國太夫人父諱待問官至禮部侍郎贈太保妣李氏楚國太夫人娶王氏太原郡夫人子男十人安度安矩安素皆太常寺太祝安常太理評事安正安本安序皆祕書省正字安厚太常寺奉禮郎安憲安節未仕女三人長適集賢挍理韓宗彥次適著作佐郎龎元英皆早卒次適光祿寺丞任逸公在二府時太保公以列卿奉朝請父子在廷士大夫以為榮而公踧踖不安自言子班父前非所以示人以法顧不敢以人子私亂朝廷之制願得罷去不聽天子數推恩羣臣子弟公每先及宗族踈逺者至公之卒子孫未官者七人有文集五十卷尤長於論議銘曰顯允吳公有家于閩自我皇考卜兹新原厚壤深泉樂其寬閒今公其從公志之安公昔尚少始來京師挾其二季名發聲馳乃賜之策以承帝問語驚于廷有偉其論乃登侍從乃任大臣出入險夷周旋屈伸公所策事先其利害初有不從後無不悔公於臨政簡以便人人去而思愈久彌新帝曰廷臣汝剛而直來汝豫用斷余不惑公曰臣愚負薪之憂帝為咨嗟公其少休優以大邦寵其秩祿尚冀公來公卒不復史臣考德作銘幽宅唐宋八大家文鈔卷五十二
