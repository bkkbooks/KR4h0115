body:
  text: 唐宋八大家文鈔巻七十二明茅坤撰廬陵史鈔十二雜傳王鎔傳王鎔始末極亂而歐公錯綜序次如一線較之諸傳為第一王鎔其先回鶻阿布思之遺種曰沒諾干為鎮州王武俊騎將武俊録以為子遂冒姓王氏沒諾干子曰末坦活末坦活子曰昇昇子曰廷湊廷湊子曰元逵元逵子曰紹鼎紹懿紹鼎子曰景崇自昇以上三世常為鎮州騎將自景崇以上四世五人皆為成德軍節度使景崇官至守太尉封常山郡王唐中和二年卒子鎔立年十嵗是時晉新有太原李匡威據幽州王處存據中山赫連鐸據大同孟方立據邢臺四面豪傑並起而交爭鎔介於其間而承祖父百年之業士馬彊而畜積富為唐累世藩臣故鎔年雖少藉其世家以取重自四方諸鎮廢立承繼有請於唐者皆因鎔以聞自晉兵出山東已破孟遷取邢洺礠三州景福元年乃大舉擊趙下臨城鎔求救於李匡威匡威來救晉軍解去明年晉㑹王處存攻鎔堅固新市晉王與處存皆自將而鎔未嘗臨軍遣追風都團練使段亮翦寇都團練使馬珂等以兵屬匡威而已匡威戰礠河晉軍大敗明年春晉攻天長軍鎔出兵救之敗於叱日嶺晉軍遂出井陘鎔又求救於匡威晉軍解去初匡威恱其弟匡儔之婦美而淫之匡儔怒及其救鎔也誘其軍亂而自立匡威内慙不敢還乃以符印歸其弟而將奔於京師行至深州鎔德匡威救已使人邀之館於梅子園以父事之匡威客李正抱者少逰燕趙間毎徘徊常山愛之不能去正抱匡威皆失國無聊相與登城西髙閣顧覽山川泫然而泣乃與匡威謀刼鎔而代之因詐為忌日鎔去衛從晨詣館慰坐定甲士自幕後出持鎔兩袖鎔曰吾國賴公而存誠無以報厚德今日之事是所甘心因叩頭以位與匡威匡威素少鎔以謂無能為也因與鎔方轡詣府將代其位行過親事營軍士閉門大譟天雨震電暴風拔木屋瓦皆飛屠者墨君和望見鎔識之從缺垣中躍出挾鎔於馬負之而走亂軍擊殺匡威正抱燕人皆死匡儔雖憾其兄而陽以大義責鎔甚急鎔既失燕援而晉軍急攻平山刼鎔以盟鎔遂與晉和其後梁太祖下晉邢洺礠三州乃為書招鎔使絶晉而歸梁鎔依違不決晉將李嗣昭復取洺州梁太祖擊敗嗣昭嗣昭棄洺州走梁獲其輜重得鎔與嗣昭書多道梁事太祖怒因移兵常山顧謂葛從周曰得鎮州以與爾爾為我先鋒從周至臨城中流矢卧輿中梁軍大沮梁太祖自將傅城下焚其南闗鎔懼顧其屬曰事急矣奈何判官周式辯士也對曰此難與力爭而可以理奪也式與梁太祖有舊因請入梁軍太祖望見式罵曰吾常以書招鎔不來今吾至此而爾為說客晚矣且晉吾讐也而鎔附之吾知李嗣昭在城中可使先出乃以所得鎔與嗣昭書示式式進曰梁欲取一鎮州而止乎而欲成霸業於天下也且霸者責人以義而不私今天子在上諸侯守封睦鄰所以息爭且休民也昔曹公破袁紹得魏將吏與紹書悉焚之此英雄之事耳今梁知兵舉無名而假嗣昭以為辭且王氏五世六公撫有此土豈無死士而待嗣昭乎梁太祖大喜起牽式衣而撫之曰吾言戲耳因延式上坐議與鎔和鎔以子昭祚為質梁太祖以女妻之太祖即位封鎔趙王鎔祖母喪諸鎮皆弔梁使者見晉使在館還言趙王有二志是時魏博羅紹威卒梁因欲盡取河北開平四年冬遣供奉官杜廷隠監魏博將夏諲以兵三千襲深冀二州以王景仁為北面行營招討使鎔懼乞兵於晉晉人擊敗景仁於柏鄉梁遂失鎮定而莊宗由此益強北破幽燕南并魏博鎔常以兵從鎔德晉甚明年㑹莊宗於承天軍奉觴為夀莊宗以鎔父友尊禮之酒酣為鎔歌拔佩刀斷衣而盟許以女妻鎔子昭誨鎔為人仁而不武未嘗敢為兵先佗兵攻趙常藉鄰兵為救當是時諸鎮俱弊於戰爭而趙獨安樂王氏之無事都人士女褒衣博帶務夸侈為嬉逰鎔尤驕於富貴又好左道鍊丹藥求長生與道士王若訥留逰西山登王母祠使婦人維錦繡牽持而上每出逾月忘歸任其政於宦者宦者石希䝉與鎔同卧起天祐十八年冬鎔自西山宿鶻營莊將還府希䝉止之宦者李宏規諫曰今晉王身自暴露以親矢石而大王竭軍國之用為逰畋之資開城空宫逾月不返使一夫閉門不内從者大王欲何歸乎鎔懼促駕希䝉固止之宏規怒遣親事軍將蘇漢衡率兵擐甲露刃於帳前曰軍士勞矣願從王歸國宏規繼而進曰惑王者希䝉也請殺之以謝軍士鎔不答宏規呼甲士斬希䝉首擲於鎔前鎔懼遽歸使其子昭祚與大將張文禮族宏規漢衡收其偏將下獄窮究反狀親軍皆懼文禮誘以為亂夜半親軍十餘人踰垣而入鎔方與道士焚香受籙軍士斬鎔首袖之而出因縱火焚其宫室遂滅王氏之族鎔少子昭誨年十嵗其軍士有德鎔者藏之穴中亂定髠其髪被以僧衣遇湖南人李震與之震匿昭誨於茶籠中載之湖南依南嶽為浮圖易名崇隠明宗時昭誨已長思歸而鎔故將符習為宣武軍節度使震以歸習習表於朝昭誨自稱前成德軍中軍使以見拜考功郎中司農少卿周顯德中猶為少府監云張文禮者狡獪人也鎔惑愛之以為子號王德明鎔已死文禮自為留後莊宗初納之後知其通於梁也遣趙故將符習與閻寳擊之文禮家鬼夜哭野河水變為血游魚皆死文禮懼病疽卒子處瑾秘喪拒守擊敗習等以李嗣昭代之嗣昭中流矢卒以李存進代之存進輙復戰歿乃以符存審為招討使遂破之執文禮妻及子處瑾處球處琪等折足歸於晉趙人請而醢之磔文禮尸於市羅紹威傳雖不如前篇而㸃次魏州牙軍本末如畫羅紹威字端已其先長沙人祖讓北遷為魏州貴鄉人父宏信為牧馬監卒文德元年魏博牙軍亂遂殺其帥樂彦貞立其將趙文建為留後已而又殺之牙軍未知所立乃聚呼曰孰能為我帥者宏信從衆中出應曰我可為君等帥也宏信狀貌竒怪面色青黒軍中異之乃共立為留後唐昭宗即位拜宏信節度使梁太祖將攻晉乞糴於宏信宏信不與由是有隙梁兵攻魏取黎陽臨河淇門衛縣戰於内黃魏兵五戰五敗宏信懼請盟乃止是時梁方東攻兖鄆北敵晉晉遣李存信救朱宣假道於魏太祖間遣使語宏信曰晉人志在河朔兵還滅魏矣宏信以為然乃發兵擊存信於莘縣太祖遣葛從周助之梁兵擒晉王子落落送於魏宏信殺之乃與晉絶太祖猶疑宏信有二心乃以兄事宏信常為卑辭厚幣以聘魏魏使者至梁太祖北面拜而受幣謂使者曰六兄於我有倍年之長吾何敢慢之宏信大喜以為厚已以故太祖往來燕趙之間卒有河北者魏不為之患也宏信死紹威立紹威好學工書頗知屬文聚書數萬巻開館以延四方之士宏信在唐以其先長沙人故封長沙郡王紹威襲父爵長沙紹威新立幽州劉仁恭以兵十萬攻魏屠貝州紹威求救於梁大敗燕軍於内黃明年梁太祖遣葛從周㑹魏兵攻滄州取其德州遂敗燕兵於老鵶隄紹威以故德梁助已魏博自田承嗣始有牙軍牙軍嵗久益驕至紹威時已二百年父子世相婚姻以自固結前帥史憲誠何全皥韓君雄樂彦貞等皆由牙軍所立怒輒逐殺之紹威為人精悍明敏通習吏事為政有威嚴然其家世由牙軍所立天祐二年魏州城中地䧟紹威懼有變已而牙校李公佺作亂紹威誅之乃間遣使告梁乞兵欲盡誅牙軍梁太祖許之為遣李思安等攻滄州召兵於魏紹威因悉發魏兵以從獨牙軍在紹威子廷規娶梁女㑹梁女卒太祖隂遣客將馬嗣勲選良兵實輿中以長直軍千人雜輿夫入魏詐為助葬太祖以兵繼其後紹威夜以奴兵數百㑹嗣勲兵擊牙軍并其家屬盡殺之太祖自内黃馳至魏魏兵從攻滄州者行至歴亭聞之皆反分入澶博諸州魏境大亂數月太祖為悉平之牙軍死魏兵悉叛紹威勢益孤太祖乃欲奪其地紹威始大悔是嵗太祖復攻滄州宿兵長蘆紹威饋給梁兵自滄至魏五百里起亭堠供帳什物自具梁兵數十萬皆取足紹威以此重困昭宗東遷洛陽詔諸鎮繕理京師紹威營太廟成加拜守侍中進封鄴王太祖圍滄州未下劉守光㑹晉軍破梁潞州太祖自長蘆歸過魏疾作卧府中諸將莫得見紹威懼太祖終襲已乃乘間入見曰今四方稱兵為梁患者以唐在故也唐家天命已去不如早自取之太祖大喜乃急歸太祖即位將都洛陽紹威取魏良材為五鳳樓朝元前殿浮河而上立之京師太祖歎曰吾聞蕭何守闗中為漢起未央宫豈若紹威越千里而為此若神化然功過蕭何逺矣賜以寳帶名馬燕王劉守光囚其父仁恭與其弟守文有隙紹威馳書勸守光等降梁太祖聞之笑曰吾嘗攻燕不能下今紹威折簡乃勝用兵十萬太祖每有大事多遣使者問之紹威時亦馳簡入白使者相遇道中其事往往相合紹威自以魏久不用兵願伐木安陽淇門為船自河入洛嵗漕榖百萬石以供京師太祖益以紹威為盡忠遣將程厚盧凝督其役舟未成而紹威病乃表言魏故大鎮多外兵願得梁一有功重臣臨之請以骸骨就第太祖亟命其子周翰監府事語使者曰亟行語而主為我強飯如有不諱當世世貴爾子孫今使周翰監府事尚冀卿復愈耳紹威仕梁累拜太師兼中書令卒年三十四贈尚書令諡曰貞壯或問牙軍之為州帥禍者五世矣譬之附頸之瘤不去則病日盛去之則身與俱斃如何而可予答之曰覽藝祖平定中原之後杯酒釋兵權而與石守信王審琦等終無間言此可見英雄之芟亂靖難固當揣人情權事機而又必開誠布公斯能轉移其間故曰齒脱而兒不知紹威之請兵於梁世所謂醫者食烏喙與附子之術也可不戒哉王處直傳王處直於梁晉之間首尾衡決王處直字九明京兆萬年人也父宗善殖財貨富擬王侯為唐神䇿軍吏官至金吾大將軍領興元節度使子處存處直處存以父任為驍衛將軍定州已來制置内閑廄宫苑等使乾符六年即拜義武軍節度使黃巢䧟長安處存感憤流涕率鎮兵入闗討賊巢敗第功而收城擊賊李克用為第一勤王倡義處存為第一乾寧二年處存卒於鎮三軍以河朔故事推處存子郜為留後即拜節度使加檢校司空同中書門下平章事處直為後院中軍都知兵馬使光化三年梁兵攻定州郜遣處直率兵拒之戰於沙河為梁兵所敗敗兵返入城逐郜郜出奔晉亂兵推處直為留後梁兵圍之處直遣人告梁請絶晉而事梁出絹十萬匹犒軍乃與梁盟梁太祖表處直義武軍節度使累封太原王太祖即位封處直北平王其後梁兵攻王鎔鎔求救於晉處直亦遣人至晉願絶梁以自效晉王救鎔處直以兵五千從破梁軍於柏鄉其後晉北破燕南取魏博與梁戰河上十餘年處直未嘗不以兵從處直好巫而客有李應之者妖妄人也處直有疾應之以左道治之而愈處直益以為神使衣道士服以為行軍司馬軍政無大小咸取决焉初應之於陘邑闌得小兒劉雲郎養以為子而處直未有子乃以雲郎與處直而紿曰此子生而有異處直養以為子更名曰都甚愛之應之由此益橫乃籍館内丁壯别立新軍自將之治第博陵坊四面開門皆用左道處直將吏知其必為患而莫能諫也是時幽州李匡儔假道中山以如京師處直伏甲城外以備不虞匡儔已去甲士入城圍應之第執而殺之因詣處直請殺都處直不與明日第功行賞因隂疏甲士姓名自隊長以上藏於别籍其後因事誅之凡二十年無一人免者而處直終為都所殺都為人狡佞多謀處直以為節度副使張文禮弑王鎔莊宗發兵討文禮處直與左右謀曰鎮定之蔽也文禮雖有罪然鎮亡定不獨存乃遣人請莊宗毋發兵莊宗取所獲文禮與梁蠟書示處直曰文禮負我師不可止處直有孽子郁當郜之亡於晉也郁亦奔焉晉王以女妻之以為新州防禦使處直見莊宗必討文禮益自疑乃隂與郁交通使郁北招契丹入塞以牽晉兵且許召郁為嗣都聞之不恱而定人皆言契丹不可召恐自貽患處直不聴郁自奔晉常恐處直不容因此大喜以為乘其隙可取之乃以厚賂誘契丹安巴堅安巴堅舉國入寇定人皆不欲契丹之舉小吏和昭訓勸都舉事都因執處直囚之西宅自為留後凡王氏子孫及處直將校殺戮殆盡明年正月朔旦都拜處直於西宅處直奮起椹其胸而呼曰逆賊吾何負爾然左右無兵遂欲囓其都掣袖而走處直遂見殺初有黃蛇見於碑樓處直以為龍藏而祠之又有野鵲數百巢麥田中處直以為已德所致而定人皆知其不祥曰蛇穴山澤而處人室鵲巢鳥降而田居小人竊位而在上者失其所居之象也已而處直果被廢死莊宗已敗契丹於沙河追奔過定州與都相得懽甚以子繼岌娶都女以都為義武軍節度使同光二年莊宗幸鄴都來朝賜與鉅萬莊宗以繼岌故待都甚厚所請無不從及明宗立頗惡都為人而安重誨毎以法繩之都始有異志是時唐兵擊契丹數往來定州都供饋多闕益不自安和昭訓為都謀曰天子新立四方未附其勢易離可為自安之計已而朱守殷反於汴州都遂亦反遣人以蠟書招青徐岐潞梓五鎮約皆舉兵而五鎮不應明宗遣王晏球討之都復與王郁招契丹為援契丹遣托諾將萬騎救都都遣指揮使鄭季麟龍泉鎮將杜宏夀以二千人迎契丹為晏球所敗季麟宏夀被執晏球責曰吾嘗使人招汝何故不降宏夀對曰受恩中山兩世矣不敢有二心遂見殺宏夀臨刑神色自若晏球屯軍望都與都及契丹戰大敗之曲陽都及托諾得數騎遯去閉城不復出初莊宗軍中闌得一男子愛之使冒姓李名繼陶養於宫中以為子明宗即位安重誨出以乞叚徊徊亦惡而逐之都使人求得之至是紿其衆曰此莊宗太子也被以天子之服使巡城上以示晏球軍軍士識者曰此繼陶也共詬之都居城中兵少惟以契丹二千人守城呼托諾為餒王屈身事之諸將有欲出降者都伺察嚴宻殺戮無虚日以故堅守經年天成四年二月城破都與家屬皆自焚死王氏遂絶於中山而處存有子鄴鄴子廷胤與莊宗連外姻為人驍勇自為軍校能與士卒同辛苦明宗時歴貝忻宻澶隰州刺史范延光反於鄴晉髙祖以廷胤為楊光逺行營中軍使破延光有功拜彰德軍節度使初處直為都所囚㓜子威北走契丹契丹謂晉髙祖曰吾欲使威襲其先人爵土如何髙祖對曰中國之法自將校為刺史升團練防禦而至節度使請送威歸中國漸進之契丹怒曰爾自諸侯為天子豈有漸乎髙祖聞之遽徙廷胤鎭義武曰此亦王氏之後也後徙鎮海而卒劉守光傳多生色劉守光深州樂夀人也其父仁恭事幽州李可舉能穴地為道以攻城軍中號劉窟頭稍以功遷軍校仁恭為人有勇好大言可舉死子匡威惡其為人不欲使居軍中徙為瀛州景城縣令瀛州軍亂殺刺史仁恭募縣中得千人討平之匡威喜復以為將使戍蔚州戍兵過期不得代皆思歸出怨言匡威為其弟匡儔所逐仁恭聞亂乃擁戍兵攻幽州行至居庸闗戰敗奔於晉晉以為夀陽鎮將仁恭多智詐善事人事晉王愛將蓋寓尤謹毎對寓涕泣自言居燕無罪以讒見逐因道燕虚實陳可取之謀晉王益信而愛之乾寧元年晉擊破匡儔乃以仁恭為幽州留後留其親信燕留得等十餘人監其軍為之請命於唐拜檢校司空盧龍軍節度使其後晉攻羅宏信求兵於仁恭仁恭不與晉王以書微責誚之仁恭大怒執晉使者殺燕留得等以叛晉王自將討之戰於安塞晉王大敗光化元年遣其子守文襲滄州逐節度使盧彦威遂取滄景德三州為其子請命於唐昭宗遲之未即從仁恭怒語唐使者曰為我語天子旌節吾自有但要長安本色耳何屢求而不得邪昭宗卒以守文為橫海軍節度使仁恭父子率兩鎮兵十萬號稱三十萬以擊魏屠貝州羅紹威求救於梁梁遣李思安救魏大敗守文於内黃斬首五萬仁恭走梁軍追擊之自魏至長河橫尸數百里梁軍自是連嵗攻之破其瀛漠二州仁恭懼復附於晉天祐三年梁攻滄州仁恭調其境内凡男子年十五已上七十已下皆黥其面文曰定霸都得一十萬人兵糧自具屯於瓦橋梁軍壁長蘆深溝髙壘仁恭不能近滄州被圍百餘日城中食盡人自相食析骸而爨或丸墐土而食死者十六七仁恭求救於晉晉王為之攻潞州以牽梁圍晉破潞州梁軍乃解去然仁恭幸世多故而驕於富貴築宫大安山窮極奢侈選燕美女充其中又與道士鍊丹藥冀可不死令燕人用墐土為錢悉歛銅錢鑿山而藏之已而殺其工以滅口後人皆莫知其處仁恭有愛妾羅氏其子守光烝之仁恭怒笞守光逐之梁開平元年遣李思安攻仁恭仁恭在大安山守光自外將兵以入擊走思安乃自稱盧龍節度使遣李小喜元行欽以兵攻大安山執仁恭而幽之其兄守文聞父且囚即率兵討守光至於盧臺為守光所敗進戰玉田又敗乃乞兵於契丹明年守文將契丹吐渾兵四萬人戰於雞蘇守光兵敗守文陽為不忍出於陣而呼其衆曰毋殺吾弟守光將元行欽識守文躍馬而擒之又囚之於别室既而殺之守文將吏孫鶴吕兖等立守文子延祚以拒守光守光圍之百餘日城中食盡米斗直錢三萬人相殺而食或食墐土馬相食其鬃尾兖等率城中饑民食以麴號宰殺務日殺以餉軍久之延祚力窮遂降守光素庸愚由此益驕為鐵籠鐵刷人有過者坐之籠中外燎以火或刷剔其皮膚以死燕之士多逃禍於佗境守光身衣赭黃謂其將吏曰我衣此而南面可以帝天下乎孫鶴切諫以為不可梁攻趙趙王王鎔求救於守光孫鶴曰今趙無罪而梁伐之諸侯救趙之兵先至者霸臣恐燕軍未出而晉已先破梁矣此不可失之時也守光曰趙王嘗與我盟而背之今急乃來歸我且兩虎方鬬可待之吾當為卞莊子也遂不出兵晉王果救趙大敗梁軍於柏鄉進掠邢洺至於黎陽守光聞晉空國深入梁乃治兵戒嚴遣人以語動鎮定曰燕有精兵三十萬願率二鎮以從晉然誰當主此盟者晉人患之謀曰昔夫差爭黃池之㑹而越入吳項羽貪伐齊之利而漢敗楚今吾越千里以伐人而強燕在其後此腹心之患也乃為之班師守光益以為諸鎮畏其強乃諷諸鎮共推尊已於是晉王率天德宋瑶振武周德威昭義李嗣昭義武王處直成德王鎔等以墨制冊尊守光為尚書令尚父守光又遣人告於梁請授已河北兵馬都統以討鎮定河東梁遣閤門使王曈拜守光為北採訪使有司白守光尚父受冊用唐冊太尉禮儀守光問曰此儀注何不郊天改元有司曰此天子之禮也尚父雖尊乃人臣耳守光怒曰我為尚父誰當帝者乎且今天下四分五裂大者稱帝小者稱王我以二千里之燕獨不能帝一方乎乃械梁晉使者下獄置斧鑕於其庭令曰敢諫者死孫鶴進曰滄州之敗臣䝉王不殺之恩今日之事不敢不諫守光怒推之伏鑕令軍士割而啖之鶴呼曰不出百日大兵當至命窒其口而醢之守光遂以梁乾化元年八月自號大燕皇帝改元曰應天以王䡴齊渉為左右相晉遣太原少尹李承勲賀冊尚父至燕而守光己僣號有司迫承勲稱臣承勲不屈以列國交聘禮入見守光怒殺之明年晉遣周德威將三萬人㑹鎮定之兵以攻燕自祁溝闗入其檀涿武順諸州皆迎降守光被圍經年累戰常敗乃遣客將王遵化致書於德威曰予得罪於晉迷而不復今其病矣公善為我辭焉德威謂遵化曰大燕皇帝尚未郊天何至此邪予受命以討僣亂不知其他也守光益窘乃獻絹千匹銀千兩錦百段遣其將周遵業謂德威曰吾王以情告公富貴成敗人之常理録功宥過霸者之事也守光去嵗妄自尊崇本不能為朱温下耳豈意大國暴師經年幸少寛之德威不許守光登城呼德威曰公三晉賢士獨不急人之危乎遣人以所乘馬易德威馬而去因告曰俟晉王至則降晉王乃自臨軍守光登城見晉王晉王問將如何守光曰今日俎上肉耳惟王所為也守光有嬖者李小喜勸其毋降守光因請俟他日是日小喜叛降於晉軍明旦晉軍攻破其城執仁恭及其家族三百口守光與其妻李氏祝氏子繼珣繼方繼祚等南走滄州迷失道至燕樂界中數日不得食遣祝氏乞食於田家田家怪而詰之祝氏以實告乃被擒送幽州晉王方大饗軍客將引守光見晉王戲之曰主人何避客之遽邪守光叩頭請死命械守光并其父仁恭以從軍軍還過趙趙王王鎔㑹晉王置酒酒酣請曰願見仁恭父子晉王命破械出之引置下坐飲食自若皆無慚色晉王至太原仁恭父子曵以組練獻於太廟守光將死泣曰臣死無恨然教臣不降者李小喜也罪人不死臣將訴於地下晉王使召小喜小喜瞋目曰囚父弑兄烝其骨肉亦小喜教爾邪晉王怒命先斬小喜守光知不免呼曰王將復唐室以成霸業何不赦臣使自效其二婦從旁罵曰事已至此生復何為願先死乃俱死晉王命李存霸執仁恭至雁門刺其心血以祭先王墓然後斬之晉之為恩於燕者三擊破匡儔立為留後一也殺監軍燕留得等而敗晉王於安塞罪且不赦矣復因其滄州之困而晉且攻潞以牽梁因卒以解二也已而仁恭囚而守光之驕也晉且冊立為尚書令史矣而復械晉使者三也唐宋八大家文鈔巻七十二
