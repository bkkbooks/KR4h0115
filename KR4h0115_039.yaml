body:
  text: 唐宋八大家文鈔卷三十六明茅坤撰廬陵文鈔八狀論乞廷議元昊通和事狀歐公於西事獨持不和之議此狀借人言以感悟主上最婉而鬯右臣近有奏論今後軍國大事不須祕密請集百官廷議近聞元昊再遣使人將至闕下和之與否決在此行竊計廟謀合思成算臣謂此最大事也天下安危繫之今公卿士大夫愛君憂國者人人各為陛下深思極慮惟恐廟堂之失策遂落西夏之姦謀衆口紛紛各有論議一曰天下困矣不和則力不能支少屈就之可以紓患一曰羌夷險詐雖和而不敢罷兵則與不和無異是空包屈就之羞全無紓患之實一曰自屈志講和之後退而休息練兵訓卒以為後圖然此亦必不能者只以河朔之事可知蓋慮才和之後便忘發憤因循弛廢為患轉深一曰縱使元昊復臣西邊減費不弛武備不忘後圖然猶有大可憂者北戎將攬通和之事以為巳功過有邀求遂興兵革是暫息小患於關西復生大患於河北臣忝為耳目之官見國有大事旁採外論所聞如此異同然大抵皆謂就和則難不和則易不和則害少和則害多然臣又不知朝廷之意其議云何臣見漢唐故事大事必須廷議蓋以朝廷示廣大不欲自狹謀臣思公共不敢自强故舉事多臧衆心皆服伏思國家自兵興以來常祕大事初欲隱藏護惜不使人知及其處置乖違豈能掩蔽臣謂莫若採大公之議收衆善之謀待其都無所長自用廟謀未晚其元昊請和一事伏乞於使人未至之前集百官廷議臣只自朝夕以來諸處詢訪已聞衆說如此若使並集於廷各陳所見必有長策以裨萬一謹具狀論西賊議和請以五問詰大臣狀要之以五事右臣伏見張子奭奉使賊中近巳到闕風聞賊意雖肯稱臣而尚有數事邀求未審朝廷如何處置臣聞善料敵者必揣其情僞之實能知彼者乃可制勝負之謀今賊非難料難知但患為國計者昧於逺見落彼姦謀茍一時之暫安召無涯之後患自為削弱助賊姦謀此左傳所謂疾首痛心賈誼所以太息慟哭者也今議賊肯和之意不過兩端而已欺罔天下者必曰賊困窘而求和稍能曉事者皆知賊權詐而可懼若賊實困窘則正宜持重以裁之若知其詐謀則豈可厚以金繒助成姦計昨如定等回但聞許與之數不過十萬今子奭所許乃二十萬仍聞賊意未己更有過求先朝與契丹通和只用三十萬一旦劉六符輩來又添二十萬今昊賊一口許二十萬到他日更來又須一二十萬使四夷窺見中國廟謀勝算惟以金帛告人則邈川首領豈不動心一旦興兵又須三二十萬生民膏血有盡四夷禽獸無厭引之轉衆何有限極今已許之失既不可追分外過求尚可抑絶見今北敵往來尚在㳂邊市易豈可西蕃絶逺須要直至京師只用此詞自可拒止至如青鹽弛禁尤不可從於我雖所損非多在賊則為利甚博況鹽者民間急用既開其禁則公私往來姦細不分若使賊捐百萬之鹽以啖邊民則數年之後皆為盜用矣凡此三事皆難允許今若只為目下茍安之計則何必愛惜盡可曲從若為社稷久逺之謀則不止目前須思後患臣願陛下試發五問詢於議事之臣一問西賊不因敗衄忽肯通和之意或用計困之使就和乎或其與北敵連謀而僞和乎二問既和之後邊備果可徹而寬國用乎三問北使一來與二十萬西人一去又二十萬從今更索又更與之凡廟謀為國計者止有此策而巳乎四問既和之後能使北敵不邀功責報乎彼或一動能使天下無事乎五問元昊一議許二十萬他日保不更有邀求乎他日有求能不更添乎陛下赫然以此五事問之萬一能有說焉非臣所及若其無說則天下之憂從此始矣方今急和謬議既不可追許物巳多必不能減然臣竊料元昊不出三五年必須更别猖獗以邀增添而將相大臣只如今日之謀定須更與添物若今日一頓盡與則他時何以添之故臣願惜今日所求其如西賊雖和所利極鮮若和而復動其患無涯此臣前後非不切言今無及矣伏望陛下留意而思之且可不與彼若實欲就和雖不許此亦可若實無和意與之適有後虞謹具奏聞伏候勑㫖論西賊議和利害狀當時揣上下必聽其稱臣處和矣歐公特欲持重此事以籠西夏右臣伏自如定等到京以來竊聞朝議不許賊稱吾祖必欲令其稱臣然後許和此乃國家大計廟堂得策蓋由陛下至聖至明不茍目前之事能慮嚮去之憂斷自宸衷決定大議然數日來風聞頗有無識之人妄陳愚見不思逺患欲急就和臣雖知必不能上惑聖聰然亦慮萬一少生疑沮則必壞已成之計臣職在言責理合辨明伏自西賊請和以來衆議頗有異同多謂朝廷若許賊不稱臣則慮北戎别索中國名分此誠大患然臣猶謂縱使賊肯稱臣則北戎尚有邀功責報之患是臣與不臣皆有後害如不得巳則臣而通好猶勝不臣然於後患不免也此有識之士憂國之人所以不願急和者也今若不許通和不過懼賊來冦耳且數年西兵遭賊而敗非是賊能善戰蓋由我自繆謀今如遣范仲淹處置邊防稍不失所賊之勝負尚未可知以彼驕兵當吾整旅使我因而獲勝則善不可加但得兩不相傷亦已挫賊鋭氣縱仲淹不幸小敗亦所失不至如前後之繆謀是比於通和之後别有大患則所損猶少此善算之士見逺之人所以知不和害小而不懼未和也臣謂方今不羞屈志急欲就和者其人有五一曰不忠於陛下者欲急和二曰無識之人欲急和三曰姦邪之人欲急和四曰疲兵懦將欲急和五曰陜西之民欲急和自用兵以來居廟堂者勞於斡運在邊鄙者勞於戎事若有避此勤勞茍欲陛下屈節就和而自偷目下安逸他時後患任陛下獨當此臣所謂不忠之臣欲急和者也和而偷安利在目下和後大患伏而未發此臣所謂無識之人欲急和者也自兵興以來陛下憂勤庶政今小人但欲茍和之後寬陛下以太平無事而望聖心怠於庶政因欲進其邪佞惑亂聰明大抵古今人主憂勤小人所不願也此臣所謂姦邪之人欲急和也屢敗之軍不知得人則勝但謂賊來常敗此臣所謂懦將疲兵欲急和也此四者皆不足聽也惟西民困乏意必望和請因宣撫使告以朝廷非不欲和而賊未遜順之意然後深戒有司寬其力役可也其餘一切小人無識之論伏望聖慈絶而不聽使大議不沮而善算有成則社稷之福也謹具狀奏聞伏候敕㫖言西邊事宜第一狀此等兵疏當與趙充國度羌虜十二事相上下右臣伏見諒祚狂僣釁隙巳多不越嵗必為邊患臣本庸暗不達時機輒以外料敵情內量事勢鑒往年巳驗之失思今日可用之謀雖兵不先言俟見形而應變然坐而制勝亦大計之可圖謹具條陳庶裨萬一臣所謂外料敵情者諒祚世有夏州自彛興克睿以前止於一鎮五州而已太宗皇帝時繼捧繼遷始為邊患其後遂陷靈鹽盡有朔方之地蓋自淳化咸平用兵十五餘年既不能剪滅遂務招懷適㑹繼遷為潘羅支所殺其子德明乃議歸欵而我惟以恩信復其王封嵗時俸賜極於優厚德明既無南顧之憂而其子元昊亦壯遂併力西攻回紇拓地千餘里德明既死地大兵强元昊遂復背叛國家自寶元慶厯以後一方用兵天下騷動國虛民弊如此數年元昊知我有厭兵之患遂復議和而國家待之恩禮又異於前矣號為國主僅得其稱臣嵗豫之物百倍德明之時半於契丹之數今者諒祚雖曰狂童然而習見其家世所為蓋繼遷之叛而復王封元昊再叛而為國主今若又叛其志可知是其欲自比契丹抗衡中國以為鼎峙之勢爾此臣竊料敵情在於此也夫所謂內量事勢者蓋以慶厯用兵之時視方今禦邊之備較彼我之虛實强弱以見勝敗之形也自真宗景德二年盟北敵於澶淵明年始納西夏之欵遂務休兵至寶元初元昊復叛蓋三十餘年矣天下安於無事武備廢而不修廟堂無謀臣邊鄙無勇將將愚不識干戈兵驕不識戰陳器械朽腐城郭隳頽而元昊勇鷙桀黠之寇也其包畜姦謀欲窺中國者纍年矣而我方恬然不以為慮待其謀成兵具一旦反書來上然後茫然不知所措中外震駭舉動倉惶所以用兵之初有敗而無勝也既而朝廷用韓琦范仲淹等付以西事極力經營而勇夫鋭將亦因戰陳稍稍而出數年之間人謀漸得武備漸修似可支吾矣然而天下己困所以屈意忍恥復與之和此慶厯之事爾今則不然方今甲兵雖未精利不若往年之腐朽也城壘粗嘗完緝不若往年之隳頽也土兵蕃落增添訓練不若往年寡弱之驕軍也大小將校曾經戰陳者往往尚在不若往年魏昭炳夏隨之徒綺紈子弟也一二執政之臣皆當時宣力者其留心西事熟矣不若往時大臣茫然不知所措者也蓋往年以不知邊事之謀臣馭不識干戈之將用驕兵執朽器以當桀黠新興之寇此所以敗也方今謀臣武將城壁器械不類往年而諒祚狂童不及元昊逺甚往年忽而不思今又已先覺可以早為之備茍其不叛則已若其果叛未必不為中國利也臣謂可因此時雪前恥收後功但顧人謀如何爾若上憑陛下神威睿算係纍諒祚君臣獻於廟社此其上也其次逐狂寇於黃河之北以復朔方故地最下盡取山界奪其險而我守之以永絶邊患此臣竊量事勢謂或如此臣所謂鑒往年巳驗之失者其小失非一不可悉數臣請言其大者夫夷狄變詐兵交陳合彼佯敗以為誘我貪利而追之或不虞橫出而為其所邀或進陷死地而困于束手此前日兵敗之戒今明習兵戰者亦能知之此雖小事也亦不可忽所謂大計之繆者攻守之策皆失爾臣視慶厯禦邊之備東起麟府西盡秦隴地長一千餘里分為路者五而路分為州軍者又二十有四而州軍分為寨為堡為城者又幾二百皆須列兵而守之故吾兵雖衆不得不分所分既多不得不寡而賊之出也常舉其國衆合聚為一而來是吾兵雖多分而為寡彼衆雖寡聚之為多以彼之多擊吾之寡不得不敗也此城寨之法既不足自守矣而五路大將所謂戰兵者分在二十四州軍欲合而出則懼後空而無備欲各留守備而合其餘則數少不足以出攻此當時所以用兵纍年終不能一出者以此也夫進不能出攻退不能自守是謂攻守皆無策者往年巳驗之失也臣所謂今日可用之謀者在定出攻之計爾必用先起制人之術乃可以取勝也蓋列兵分地而守敵得時出而撓於其間使我處處為備常如敵至師老糧匱我勞彼逸昔周世宗以此策困李景於淮南昨元昊亦用此策以困我之西鄙夫兵分備寡兵家之大害也其害常在我以逸待勞兵家之大利也其利常在彼所以往年賊常得志也今誠能反其事而移我所害者豫敵奪敵所利者在我則我當先為出攻之計使彼疲於守禦則我亦得志矣凡出攻之兵勿為大舉我每一出彼必呼集而來拒彼集於東則别出其西我歸彼散則我復出而彼又集我以五路之兵畨休出入使其一國之衆聚散奔走無時暫停則無不困之寇矣此臣所謂方今可用之謀也蓋往年之失在守方今之利在攻昔至道中亦嘗五路出攻矣當時將相為謀不密蓋欲攻黠冦方强之國不先以謀困之而直為一戰必取之計大舉深入所以不能成功也夫用兵至難事也故謀既審矣則其發也必果故能動而有成功也若其山川之險易道里之迂直蕃漢兵馬之强弱騎軍步卒長兵短兵之所利與夫左右前後一出一入開闔變化有正有竒凡用兵之形勢有可先知者有不可先言者臣願陛下遣一重臣出而巡撫遍見諸將與熟圖之以先定大計凡山川道里蕃漢步騎出入之所宜可先知者悉圖上方略其餘不可先言付之將率使其見形應變因敵制勝至於諒祚之所為宜少屈意含容而曲就之既以驕其心亦少緩其事以待吾之為備而且嚴戒五路訓兵選將利器甲畜資糧常具軍行之計待其反書朝奏則王師暮出以駭其心而奪其氣使其支吾不暇則勝勢在我矣往年議者亦欲招輯橫山蕃部謀取山界之地然臣謂必欲招之亦須先藉勝捷之威使其知中國之彊則方肯來附也由是言之亦以出攻為利矣凡臣之所言者大略如此然臣足未嘗踐邊陲目未嘗識戰陳以一儒生偏見之言誠知未可必用直以方當陛下勞心西事廣詢衆議之時思竭愚慮備芻蕘之一說爾論契丹侵地界狀忠謀深識之言右臣伏見北敵近於界首添建城寨及拘囚定州巡兵湯則侵過銀坊冶谷地界等事竊聞朝廷至今未有分明嚴切指揮令邊臣以理爭辨竊料朝廷之意必謂爭之恐有引惹之虞此乃慮之過而計之失也夫敵性貪狼知足無時欺弱畏强難示以怯今杜之於早而力為拒絶猶恐不能若縱之不爭而誘其來侵乃是引惹況西山道路有三十餘處皆可行兵其險要所扼在於軍城銀坊等路為彼奪據而不爭則北寨王栁等口漸更來侵豈能爭矣是則西山險要盡為彼奪一日使敵以大兵渡易水由威虜之西平陸而來以竒兵自飛狐出西山諸口而下則我腹背受敵之患不知何以禦之此蓋兵法必爭之地也且與人為鄰敵而自棄險要任彼奪據而不爭雖使我弱彼强尚須勉强何況勢鈞力敵又違誓約而彼曲我直乎臣謂朝廷所以然者蓋由未察敵中强弱之形而不得其情僞之實也臣又見朝廷常有懼敵之色而無憂敵之心夫憂之與懼名近而意殊憂者深思極慮而不敢暫忘懼者臨事惶惑而莫知所措今邊防之事措置多失其機者懼敵之意過深也若能察其强弱之形得其情僞之實則今日之事誠不足懼而將來之患深有可憂奈何不憂其深可憂而反懼其不足懼且戎虜雖以戰射為國而耶律氏自幼承其父祖與中國通和之後未嘗躬戰陳遭勍敵謀臣舊將又皆老死今其臣下如貫寧者無三兩人寧才不及中人已是彼之傑者所以君臣計事動多不臧當初對梁適遣使河西使與中國通好及議和垂就不能小忍以邀中國厚利乃與元昊爭夾山小族遂至交兵而纍戰纍敗亡人失馬國內瘡痍誅斂山前漢人怨怒往時敵殺漢人者罰漢人殺敵者死近聞反此二法欲悅漢人漢人未能收其心而敵人亦已怒矣又聞今春以來渤海之類所在離叛攻劫近才稍定方且招輯敗亡修完器甲內恐國中之復叛外有西夏之為虞心自懷疑憂我乘虛而北襲故於界上勉强虛張囚我巡兵侵我地界蓋其實弱而示彊者用兵之詭計故臣謂茍能察其彊弱知其情僞則無不爭之理何必懼其不足懼哉自國家困於西鄙用兵常慮北戎合謀乘隙而動及見二寇相失而交攻議者皆云中國之福夫幸其相攻為我之福則不幸使其解仇而復合豈不為我禍乎臣謂北敵昨所以敗於元昊者亦其久不用兵驟戰而逢勍敵耳聞其自敗衄以來君臣恐懼日夜謀議通招丁口揀募甲兵處處開教閲之場家家括糧馬之數以其天姿驍徑之俗加以日夜訓練之勤則其彊難敵矣今彼國雖未有人然大抵為國者久無事則人難見因用兵則將自出使其交戰既頻而謀臣猛將爭能並出則是夾山一敗警其四十年因循之弊變驕心而為憤志化惰卒而為徑兵因屢戰而得驍將此乃北敵之福非中國之福也此臣所謂將來之患者也然二冦勢非久相攻者也一二年間不能相并則必復合使北敵驅新勵之彊兵無西人之後害而南向以窺河北則又將來之患大者也臣雖不知朝廷顧河北為如何但於本路之事以今年較去年則亦可見去年以前河北官吏無大小皆得舉材而擇能急於用人如不及者惟恐一事之失計故也自今春巳來差除漸循舊弊凡幹敏之吏熟於北方事者舉留奏乞百不一從不惟使材臣能吏不勸而殆亦足見朝廷不憂河北之事辦否也至如廢緣邊久任之制而徙劉貽孫以王世文當冀州李中吉當廣信王中庸當保州劉忠順當邢州如此數人於閒慢州軍尚憂敗政況於邊要之任乎臣愚以朝廷不以北事為憂則又怯懼如此既曰懼矣則於用人之際又若忽而不憂此臣之所未諭也臣聞敵人侵我冶谷雖立寨屋三十餘間然尚遲延未敢便貯兵甲更伺我意緊慢若不及早毁拆而少緩縱之使其以兵守之則尤難爭矣此旦夕之間不可失也至於湯則亦聞囚而未敢殺此亦不可不爭臣願陛下但以將來之患為憂不忘此事用人之際革去舊例而惟材是擇勿聽小人之繆謀勿於忠良而疑二使得上下畢力庶幾漸成禦備至於目今小事未銷過自怯懼夫事之利害激切而言則議者以為太過言不激切則聽者或未動心此自古以為難也況未形之事雖曰必然而敢冀盡信乎伏望陛下留意聽納不以人廢言則庶竭愚瞽少禆萬一謹具狀奏聞論劉三嘏事狀通逹之識而其文當與漢谷永諫不受伊莫演之降及揚雄諫不受單于朝書參看臣伏見契丹宣徽使劉三嘏挈其愛妾兒女等七口向化南歸見在廣信軍聽候朝㫖竊慮朝廷只依常式投來人等依例約回不納國家大患無如契丹自四五十年來智士謀臣晝思夜算未能為朝廷出一竒策坐而制之今天與吾時使其上下乖離而親貴臣忽來歸我此乃陛下威德所加祖宗社稷之福竊慮憂國之臣過有思慮以為納之别恐引惹臣請略陳納之却之二端利害伏望聖慈裁擇其可往年山遇捨元昊而歸朝邊臣為國家存信拒而遣之元昊甘心山遇盡誅其族由是河西之人皆怒朝廷不納而痛山遇以忠而赤族吾既自絶西人歸化之路堅其事賊之心然本欲存信以懷元昊而終至叛逆幾困天下是拒而不納未足存信而反與賊堅人心此已驗之效也其後朝廷悟其失計歸罪郭勸悔巳難追矣此事不逺可為鑒戒伏望陛下思之此不可拒而可納一也三嘏是契丹貴臣秉節鉞兼宣徽可謂至親且貴矣一旦君臣離心走而歸我是彼國中大醜之事必須掩諱不欲人聞必不敢明言求之於我此其可納二也況彼來投又無追者相繼既絶縱跡别無明驗雖欲索之於我難以為辭此其可納三也三嘏既彼之貴臣彼國之事無不與知今既南來則彼之動靜虛實我盡知之可使契丹日夕懼我攻取之不暇安敢求索於我自起兵端若使契丹疑三嘏果在中國則三四十年之間卒無南向之患此又納之大利其可納四也彼既窮來歸我若拒而遣之使其受山遇之禍則幽燕之間四五十年來心欲南向之人盡絶其歸路而堅其事狄之心思為三嘏報仇於中國又終不能固契丹之信此為誤計其失尤多且三嘏在中國則契丹必盡疑幽燕之人是其半國離心常恐向背凡契丹南冦常藉幽燕使其盡疑幽燕之人則可無南冦之患此又可納大利五也古語曰天與不取反受其咎此不可失之幾也其劉三嘏伏望速降密㫖與富弼令就近安存津遣赴闕惟乞決于睿斷不惑羣言取進止唐宋八大家文鈔卷三十六
