body:
  text: 唐宋八大家文鈔卷四十九明茅坤撰廬陵文鈔二十一記吉州學記典刑之文慶厯三年秋天子開天章閣召政事之臣八人問治天下其要有幾施于今者宜何先使坐而書以對八人者皆震恐失位俯伏頓首言此非愚臣所能及惟陛下所欲為則天下幸甚于是詔書屢下勸農桑責吏課舉賢才其明年三月遂詔天下皆立學置學官之貟然後海隅徼塞四方萬里之外莫不皆有學嗚呼盛矣學校王政之本也古者致治之盛衰視其學之興廢記曰國有學遂有序黨有庠家有孰此三代極盛之時大備之制也宋興蓋八十有四年而天下之學始克大立豈非盛美之事須其久而後至于大備歟是以詔下之日臣民喜幸而奔走就事者以後為羞其年十月吉州之學成州舊有夫子廟在城之西北今知州事李侯寬之至也謀與州人遷而大之以為學舍事方上請而詔已下學遂以成李侯治吉敏而有方其作學也吉之士率其私錢一百五十萬以助用人之力積二萬二千工而人不以為勞其良材堅甓之用凡二十二萬三千五百而人不以為多學有堂筵齊講有藏書之閣有賔客之位有游息之亭嚴嚴翼翼壯偉閎耀而人不以為侈既成而來學者常三百餘人豫世家于吉而濫官于朝進不能贊揚天子之盛美退不能與諸生揖讓乎其中然豫聞教學之法本于人性磨揉遷革使趨于善其勉于人者勤其入于人者漸善教者以不倦之意須遲久之功至于禮讓興行而風俗純美然後為學之成今州縣之吏不得久其職而躬親于教化也故李侯之績及于學之立而不及待其成惟後之人母廢慢天子之詔而殆以中止幸豫他日因得歸榮故鄉而謁于學門將見吉之士皆道德明秀而可為公卿問于其俗而婚喪飲食皆中禮節入于其里而長幼相孝慈于其家行于其郊而少者扶其羸老壯者代其負荷于道路然後樂學之道成而得時從先生耆老席于衆賔之後聽鄉樂之歌飲獻酬之酒以詩頌天子太平之功而周覽學舍思詠李侯之遺愛不亦美哉故于其始成也刻辭于石而立諸其廡以俟襄州穀城縣夫子廟記慨古禮之亡處多韻折釋奠釋菜祭之略者也古者士之見師以菜為摯故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠釋奠有樂無尸而釋菜無樂則其又略也故其禮亡焉而今釋奠幸存然亦無樂又不遍舉于四時獨春秋行事而已記曰釋奠必有合有國故則否謂凡有國各自祭其先聖先師若唐虞之䕫伯夷周之周公魯之孔子其國之無焉者則必合于鄰國而祭之自孔子沒後之學者莫不宗焉故天下皆尊以為先聖而後世無以易學校廢久矣學者莫知所師又取孔子門人之高弟曰顔回者而配焉以為先師隋唐之際天下州縣皆立學置學官生貟而釋奠之禮遂以著令其後州縣學廢而釋奠之禮吏以其著令故得不廢學廢矣無所從祭則皆廟而祭之荀卿子曰仲尼聖人之不得勢者也然使其得勢則為堯舜矣不幸無時而沒特以學者之故享弟子春秋之禮而後之人不推所謂釋奠者徒見官為立祀而州縣莫不祭之則以為夫子之尊由比為盛甚者乃謂生雖不得位而沒有所享以為夫子榮謂有德之報雖堯舜莫若何其謬論者歟祭之禮以迎尸酌鬯為盛釋奠薦饌直奠而已故曰祭之略者其事有樂舞授器之禮今又廢則于其略者又不備焉然古之所謂吉凶鄉射賔燕之禮民得而見焉者今皆廢失而州縣幸有社稷釋奠風雨雷師之祭民猶得以識先王之禮器焉其牲酒器幣之數升降俯仰之節吏又多不能習至其臨事舉多不中而色不莊使民無所瞻仰見者怠焉因以為古禮不足復用可勝歎哉大宋之興于今八十年天下無事方修禮樂崇儒術以文太平之功以謂王爵未足以尊夫子又加至聖之號以褒崇之講正其禮下于州縣而吏或不能諭上意凡有司簿書之所不責者謂之不急非師古好學者莫肯盡心焉榖城令狄君栗為其邑未逾時修文宣王廟易于縣之左大其正位為學舍于其旁藏九經書率其邑之子弟興于學然後考制度為爼豆籩篚樽爵簠簋凡若干以與其邑人行事榖城縣政久廢狄君居之朞月稱治又能遵國典修禮興學急其有司所不責者諰諰然惟恐不及可謂有志之士矣唐荆川曰此文前段辨釋奠釋菜為祭之略及其所以立廟之故後段言古禮之不行為可惜而狄君能復古禮為可稱也豐樂亭記太守之文修既治滁之明年夏始飲滁水而甘問諸滁人得于州南百步之近其上豐山聳然而特立下則幽谷窈然而深藏中有清泉滃然而仰出俯仰左右顧而樂之于是疏泉鑿石闢地以為亭而與滁人往遊其間滁于五代干戈之際用武之地也昔太祖皇帝嘗以周師破李景兵十五萬于清流山下生擒其將皇甫暉姚鳳于滁東門之外遂以平滁修嘗考其山川按其圖記升高以望清流之關欲求暉鳳就擒之所而故老皆無在者蓋天下之平久矣自唐失其政海內分裂豪傑並起而爭所在為敵國者何可勝數及宋受天命聖人出而四海一向之憑恃險阻剗削消磨百年之間漠然徒見山高而水清欲問其事而遺老盡矣今滁介于江淮之間舟車啇賈四方賔客之所不至民生不見外事而安于畎畝衣食以樂生送死而孰知上之功德休養生息涵煦百年之深也修之來此樂其地僻而事簡又愛其俗之安間既得斯泉于山谷之間乃日與滁人仰而望山俯而聽泉掇幽芳而䕃喬木風霜冰雪刻露清秀四時之景無不可愛又幸其民樂其嵗物之豐成而喜與豫遊也因為本其山川道其風俗之美使民知所以安此豐年之樂者幸生無事之時也夫宣上恩德以與民共樂刺史之事也遂書以名其亭焉醉翁亭記文中之畫昔人讀此文謂如遊幽泉邃石入一層才見一層路不窮興亦不窮讀已令人神骨翛然長往矣此是文章中洞天也環滁皆山也其西南諸峰林壑尤美望之蔚然而深秀者琅琊也山行六七里漸聞水聲潺潺而㵼出于兩峰之間者釀泉也峰回路轉有亭翼然臨于泉上者醉翁亭也作亭者誰山之僧曰智仙也名之者誰太守自謂也太守與客來飲于此飲少輒醉而年又最高故自號曰醉翁也醉翁之意不在酒在乎山水之間也山水之樂得之心而寓之酒也若夫日出而林霏開雲歸而巖穴瞑晦明變化者山間之朝暮也野芳發而幽香佳木秀而繁隂風霜高潔水落而石出者山間之四時也朝而往暮而歸四時之景不同而樂亦無窮也至于負者歌于塗行者休于樹前者呼後者應傴僂提携往來而不絶者滁人遊也臨溪而漁溪深而魚肥釀泉為酒泉香而酒洌山肴野蔌雜然而前陳者太守宴也宴酣之樂非絲非竹射者中奕者勝觥籌交錯起坐而喧譁者衆賔歡也蒼顔白髮頽然乎其間者太守醉也已而夕陽在山人影散亂太守歸而賔客從也樹林隂翳鳴聲上下遊人去而禽鳥樂也然而禽鳥知山林之樂而不知人之樂人知從太守遊而樂而不知太守之樂其樂也醉能同其樂醒能述以文者太守也太守謂誰廬陵歐陽修也畫舫齊記興逸豫至滑之三月即其署東偏之室治為燕私之居而名曰畫舫齊齊廣一室其深七室以户相通凡入豫室者如入乎舟中其溫室之奧則穴其上以為明其虛室之疏以達則欄檻其兩旁以為坐立之倚凡偃休于吾齊者又如偃休乎舟中山石崷崒佳花美木之植列于兩簷之外又似泛乎中流而左山右林之相映皆可愛者故因以舫名焉周易之象至于履險蹈難必曰涉川蓋舟之為物所以濟險難而非安居之用也今豫治齊于署以為燕安而反以舟名之豈不戾哉矧豫又嘗以罪謫走江湖間自汴絶淮浮于大江至于巴峽轉而以入于漢沔計其水行幾萬餘里其羇窮不幸而卒遭風波之恐往往呌號神明以脫須臾之命者數矣當其恐時顧視前後凡舟之人非為商賈則必仕宦因竊自歎以謂非冒利與不得已者孰肯至是哉賴天之惠全活其生今得除去宿負列官于朝以來是州飽廪食而安署居追思曩時山川所履舟楫之危蛟鼉之出沒波濤之洶欻宜其寢驚而夢愕而乃忘其險阻猶以舟名其齊豈真樂于舟居者邪然豫聞古之人有逃世逺去江湖之上終身而不肯反者其必有所樂也茍非冒利于險有罪而不得巳使順風恬波傲然枕席之上一日而千里則舟之行豈不樂哉顧豫誠有所未暇而舫者宴嬉之舟也姑以名豫齊奚曰不宜豫友蔡君謨善大書頗怪偉將乞其大字以題于楹懼其疑豫之所以名齊者故具以云又因以置于壁峽州至喜亭記極力摹寫蜀之險之不測以形出人情喜幸之至此文字布置斡旋之法蜀于五代為僣國以險為虞以富自足舟車之迹不通乎中國者五十有九年宋受天命一海內四方次第平太祖改元之三年始平蜀然後蜀之絲枲織文之富衣被于天下而貢輸商旅之往來者陸輦秦鳳水道岷江不絶于萬里之外岷江之來合蜀衆水出三峽為荆江傾折回直捍怒鬭激束之為湍觸之為旋順流之舟頃刻數百里不及顧視一失毫釐與崖石遇則糜潰漂沒不見蹤迹故凡蜀之可以充內府供京師而移用乎諸州者皆陸出而其羡餘不急之物乃下于江若棄之然其為險且不測如此夷陵為州當峽口江出峽始漫為平流故舟人至此者必瀝酒再拜相賀以為更生尚書虞部郎中朱公再治是州之三月作至喜亭于江津以為舟者之停留也且志夫天下之大險至此而始平夷以為行人之喜幸夷陵固為下州廪與俸皆薄而僻且逺雖有善政不足為名譽以資進取朱公能不以陋而安之其心又喜夫人之去憂患而就樂易詩所謂愷悌君子者矣自公之來嵗數大豐因民之餘然後有作惠于往來以館以勞動不違時而人有賴是皆宜書故凡公之佐吏因相與謀而屬筆于修焉夷陵縣至喜堂記以叙事行議論峽州治夷陵地濵大江雖有椒漆紙以通商賈而民俗險陋常自足無所仰于四方販夫所售不過鱐魚腐鮑民所嗜而已富商大賈皆無為而至地僻而貧故夷陵為下縣而峽為小州州居無郭郛通衢不能容車馬市無百貨之列而鮑魚之肆不可入雖邦君之過市必常下乘掩鼻以疾趨而民之列處竈廪匽井無異位一室之間上父子而下畜豕其覆皆用茅竹故嵗常火災而俗信鬼神其相傳曰作瓦屋者不利夷陵者楚之西境昔春秋書荆以狄之而詩人亦曰蠻荆豈其陋俗自古然歟景祐二年尚書駕部貟外郎朱公治是州始樹木增城􅔐甓南北之街作市門市區又教民為瓦屋别竈廪異人畜以變其俗既又命夷陵令劉光裔治其縣起勑書樓飾㕔事新吏舍三年夏縣功畢某有罪來是邦朱公于某有舊且哀其又以罪而來為至縣舍擇其㕔事之東以作斯堂度為疏潔高明而日居之以休其心堂成又與賔客偕至而落之夫罪戾之人宜棄惡地處窮險使其憔悴憂思而知自悔咎今乃賴朱公而得善地以偷宴安頑然使忘其有罪之憂是皆異其所以來之意然夷陵之僻陸走荆門襄陽至京師二十有八驛水道大江絶淮抵汴東水門五千五百有九十里故為吏者多不欲逺來而居者往往不得代至嵗滿或自罷去然不知夷陵風俗朴野少盜爭而今之日食有稻與魚又有橘柚茶筍四時之味江山美秀而邑居繕完無不可愛是非惟有罪者之可以忘其憂而凡為吏者莫不始來而不樂既至而後喜也作至喜堂記藏其壁夫令雖卑而有土與民宜志其風俗變化之善惡使後來者有考焉爾荆川曰前段言風不美而太守能變其俗後段言仕宦得善地前後不用照應是一格偃虹隄記摹寫甚析有自嶽陽至者以滕侯之書洞庭之圖來告曰願有所記豫發書按圖自嶽陽門西距金雞之右其外隱然隆高以長者曰偃虹隄問其作而名者曰吾滕侯之所為也問其所以作之利害曰洞庭天下之至險而嶽陽荆潭黔蜀四㑹之衝也昔舟之往來湖中者至無所寓則皆泊南津其有事于州者逺且勞而又常有風波之恐覆溺之虞今舟之至者皆泊隄下有事于州者近而且無患問其大小之制用人之力曰長一千尺高三十尺厚加二尺而殺其上得厚三分之二用民力萬有五千五百工而不踰時以成問其始作之謀曰州以事上轉運使轉運使擇其吏之能者行視可否凡三反復而又上于朝廷决之三司然後曰可而皆不能易吾侯之議也曰此君子之作也可以書矣蓋慮于民也深則謀其始也精故能用力少而為功多夫以百步之隄禦天下至險不測之虞惠其民而及于荆潭黔蜀凡往來湖中無逺邇之人皆䝉其利焉且嶽陽四㑹之衝舟之來而止者日凡有幾使隄土石幸久不朽則滕侯之惠利于人物可以數計哉夫事不患于不成而患于易壞蓋作者未始不欲其久存而繼者常至于殆廢自古賢智之士為其民捍患興利其遺迹往往而在使其繼者皆如始作之心則民到于今受其賜天下豈有遺利乎此滕侯之所以慮而欲有紀于後也滕侯志大材高名聞當世方朝廷用兵急人之時常顯用之而功未及就退守一州無所用心略施其餘以利及物夫慮孰謀審力不勞而功倍作事可以為後法一宜書不茍一時之譽思為利于無窮而告來者不以廢二宜書嶽之民人與湖中之往來者皆欲為滕侯紀三宜書以三宜書不可以不書乃為之書王彥章畫像記以叙事行議論其感概處多情太師王公諱彥章字子明鄆州壽張人也事梁為宣義軍節度使以身死國葬于鄭州之管城晉天福二年始贈太師公在梁以智勇聞梁晉之爭數百戰其為勇將多矣而晉人獨畏彥章自乾化後常與晉戰屢困莊宗于河上及梁末年小人趙巖等用事梁之大臣老將多以讒不見信皆怒而有怠心而梁亦盡失河北事勢已去諸將多懷顧望獨公奮然自必不少屈懈志雖不就卒死以忠公既死而梁亦亡矣悲夫五代終始才五十年而更十有三君五易國而八姓士之不幸而出乎其時能不汙其身得全其節者鮮矣公本武人不知書其語質平生嘗謂人曰豹死留皮人死留名蓋其義勇忠信出于天性而然豫於五代書竊有善善惡惡之志至于公傳未嘗不感憤歎息惜乎舊史殘略不能備公之事康定元年豫以節度判官來此求于滑人得公之孫睿所録家傳頗多于舊史其記德勝之戰尤詳又言敬翔怒末帝不肯用公欲自經于帝前公因用笏畫山川為御史彈而見廢又言公五子其二同公死節此皆舊史無之又云公在滑以讒自歸于京師而史云召之是時梁兵盡屬段凝京師羸兵不滿數千公得保鑾五百人之鄆州以力寡敗于中都而史云將五千以往者亦皆非也公之攻德勝也初受命于帝前期以三日破敵梁之將相聞者皆竊笑及破南城果三日是時莊宗在魏聞公復用料公必速攻自魏馳馬來救已不及矣莊宗之善料公之善出奇何其神哉今國家罷兵四十年一旦元昊反敗軍殺將連四五年而攻守之計至今未决豫嘗獨持用竒取勝之議而歎邊將屢失其機時人聞豫說者或笑以為狂或忽若不聞雖豫亦惑不能自信及讀公家傳至于德勝之捷乃知古之名將必出于竒然後能勝然非審于為計者不能出竒竒在速速在果此天下偉男子之所為非拘牽常算之士可到也每讀其傳未嘗不想見其人後二年豫復來通判州事嵗之正月過俗所謂鐵槍寺者又得公畫像而拜焉嵗久磨滅隱隱可見亟命工完理之而不敢有加焉懼失其真也公尤善用槍當時號王鐵槍公死巳百年至今俗猶以名其寺童兒牧豎皆知王鐵槍之為良將也一槍之勇同時豈無而公獨不朽者豈其忠義之節使然歟畫已百餘年矣完之復可百年然公之不泯者不繫乎畫之存不存也而豫尤區區如此者蓋其希慕之至焉耳讀其書尚想乎其人況得拜其像識其面目不忍見其壞也畫既完因書豫所得者于後而歸其人使藏之荆川曰此文凡五假一假是總叙其略二假是言其能全節三段是辨其事四假是言其善出竒策五段是寺中畫像之事而通篇以忠節善戰分作兩項然不見痕迹樊侯廟災記議歸于正分明是誚讓樊將軍之㫖鄭之盜有入樊侯廟刳神像之腹者既而大風雨雹近鄭之田麥苗皆死人咸駭曰侯怒而為之也豫謂樊侯本以屠狗立軍功佐沛公至成皇帝位為列侯邑食舞陽剖符傳封與漢長久禮所謂有功德於民則祀之者歟舞陽距鄭既不逺又漢楚常苦戰滎陽京索間亦侯平生提戈斬級所立功處故廟而食之宜矣方侯之參乘沛公事危鴻門振目一顧使羽失氣其勇力足有過人者故後世言雄武稱樊將軍宜其聰明正直有遺靈矣然當盜之倳創腹中獨不能保其心腹腎腸哉而反貽怒于無罪之民以騁其恣睢何哉豈生能萬人敵而死不能庇一躬耶豈其靈不神于禦盜而反神于平民以駭其耳目邪風霆雨雹天之所以震耀威罰有司者而侯又得以濫用之邪蓋聞隂陽之氣怒則薄而為風霆其不和之甚者凝結而為雹方今嵗且久旱伏隂不興壯陽剛燥疑有不和而凝結者豈其適㑹民之自災也邪不然則喑嗚叱吒使風馳霆擊則侯之威靈暴矣哉荆川曰文不過三百字而十餘轉摺愈出愈竒文之最妙者也明因大師塔記記明因塔以因無他戒行及有禪慧故特本其所言以感慨今古云明因大師道詮姓衛氏并州文水縣民家子生于太平興國辛已之嵗終于明道癸酉之正月壽五十有三年始為童子辭家人入洛陽妙覺禪院依真行大師惠璿學浮圗法咸平五年始去氏削髮入僧籍後二十四年賜紫衣遂主其衆又四年賜號明因兼領右街教門事凡為僧三十有一年卒之明年其徒以骨葬城南龍門山下始道詮未死時豫過其廬問其年幾何曰五十有二矣問其何許人也曰本太原農家也因與語曰詩唐風言晉本唐之俗其民被堯之德化且詩多以儉刺然其勤生以儉嗇朴厚而純固最得古之遺風今能言其土風乎其民俗何若信若詩之所謂乎詩去今餘千嵗矣猶若詩之時乎其亦隨世而遷變也曰樹麻而衣陶瓦而食築土而室甘辛苦薄滋味嵗耕日積有餘則窖而藏之率千百年不輒發其勤且儉誠有古之遺風至今而不變也又言為兒時聞長老語晉自春秋為盛國至唐基并以興世為北京及朱氏有中土後唐倚并為雄亦卒以王既而晉祖又以王漢又以王遭時之故相次出三天子劉崇父子又自為國故民熟兵鬬餉軍死戰勞苦幾百年不得息既而聖人出四方次第平一日兵臨城門係繼元以歸并民然後被政教棄兵專農休息勞苦為太平之幸人并平後二嵗我始生幼又依浮圖生不見干戈長不執耒耜衣不麻食不瓦室不土力不穡而休乃并人之又幸者也今老矣且病即死無恨豫愛其語朴而詳他日復過其廬莫見也訪之曰死矣為之惻然及其葬其徒有求豫志其始終者因并書其常語豫者志嵗月云爾唐宋八大家文鈔卷四十九
