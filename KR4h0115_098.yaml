body:
  text: 唐宋八大家文鈔卷九十二明茅坤撰臨川文鈔十二墓志銘給事中孔公墓志銘荆公第一首志銘須看他頓挫紆徐往往叙事中伏議論風神蕭颯處宋故朝請大夫給事中知鄆州軍州事兼管內河堤勸農同羣牧使上護軍魯郡開國侯食邑一千六百户實封二百户賜紫金魚袋孔公者尚書工部侍郎贈尚書吏部侍郎諱朂之子兖州曲阜縣令襲封文宣公贈兵部尚書諱仁玉之孫兖州泗水縣主簿諱光嗣之曽孫而孔子之四十五世孫也其仕當今天子天聖寶元之間以剛毅諒直名聞天下嘗知諫院矣上書請明肅太后歸政天子而廷奏樞密使曹利用上御藥羅崇勳罪狀當是時崇勳操權利與士大夫為市而利用悍强不遜內外憚之嘗為御史中丞矣皇后郭氏廢引諫官御史伏閣以爭又求見上皆不許而固爭之得罪然後已蓋公事君之大節如此此其所以名聞天下而士大夫多以公不終於大位為天下惜者也公諱道輔字厚濟初以進士釋褐補寧州軍事推官年少耳然斷獄議事已能使老吏憚驚遂遷大理寺丞知兖州仙源縣事又有能名其後嘗直史館待制龍圖閣判三司理缺憑由司登聞撿院吏部流內銓糾察在京刑獄知許徐兖鄆秦五州留守南京而兖鄆御史中丞皆再至所至官治數以爭職不阿或絀或遷而公持一節以終身蓋未嘗自絀也其在兖州也近臣有獻詩百篇者執政請除龍圖閣直學士上曰是詩雖多不如孔某一言乃以公為龍圖閣直學士於是人度公為上所思且不久於外矣未幾果復召以為中丞而宰相使人說公稍折節以待遷公乃告以不能於是又度公且不得久居中而公果出初開封府吏馮士元坐獄語連大臣數人故移其獄御史劾士元罪止於杖又多更赦公見上上固怪士元以小吏與大臣交私汙朝廷而所坐如此而執政又以謂公為大臣道地故出知鄆州公以寶元二年如鄆道得疾以十二月壬申卒于滑州之韋城驛享年五十四其後詔追郭皇后位號而近臣有為上言公明肅太后時事者上亦記公平生所為故特贈公尚書工部侍郎公夫人金城郡君尚氏尚書都官員外郎諱賓之女生二男子曰淘今為尚書屯田員外郎曰宗翰今為太常博士皆有行治世其家纍贈公金紫光祿大夫尚書兵部侍郎而以嘉祐七年十月壬寅葬公孔子墓之西南百步公廉於財樂賑施遇故人子恩厚尤篤而尤不好鬼神禨祥事在寧州道士治真武像有蛇穿其前數出近人人傳以為神州將欲視驗以聞故率其屬往拜之而蛇果出公即舉笏擊蛇殺之自州將以下皆大驚已而又皆大服公由此始知名然余觀公數處朝廷大議視禍福無所擇其智勇有過人者勝一蛇之妖何足道哉世多以此稱公者故余亦不得而略也銘曰展也孔公維志之求行有險夷不改其輈權彊所忌讒諂所讐考終厥位寵祿優優維皇好直是錫公休序行納銘為識諸幽此篇於敘事中一一㸃綴而風韻渙發若順江流而看兩岸之山古人所謂應接不暇太子太傅田公墓志銘此等志韓歐所不及田氏故京兆人後遷信都晉亂公皇祖太傅入于契丹景德初契丹冦澶州略得數百人以屬皇考太師太師哀憐之悉縱去因自脫歸中國天子以為廷臣積官至太子率府率以終為人沉悍篤實不茍為笑語生八男子多知名而公為長子公少卓犖有大志好讀書書未嘗去手無所不讀蓋亦無所不記其為文章得紙筆立成而閎博辨麗稱天下初舉進士賜同學究出身不就後數年遂中甲科補江寧府觀察推官以母英國太夫人喪罷去除喪補楚州圑練判官用舉者監轉般倉遷祕書省著作佐郎又對賢良方正策為第一遷太常丞通判江寧府數上書言事召還將以為諫官方是時趙元昊反夏英公范文正公經略陜西言臣等才力薄使事恐不能獨辦請得田某自佐以公為其判官直集賢院參都總管軍事自真宗弭兵至是且四十年諸老將盡死為吏者不知兵法師數陷敗士民震恐二公隨事鎮撫其為世所善多公計策大將有欲悉數路兵出擊賊者朝廷許之矣公極言其不可乃止又言所以治邊者十四事多聽用還為右正言判三司理缺憑由司權修起居注遂知制誥判國子監於是陜西用兵未已人大困以公副今宰相樞密副使韓公宣撫自宣撫歸判三班院而河北告兵食闕又以公往視而邢州兵士殺通判閉城為亂又以公為龍圖閣直學士知成德軍真定府定州安撫使往執殺之論功遷起居舍人又移秦鳯路都總管經略安撫使知秦州遭太師喪辭起復者久之上使中貴人手敇趣公公不得已則乞歸葬然後起既葬託邊事求見上曰陛下以孝治天下方邊鄙無事朝廷不為無人而區區犬馬之心尚不得自從臣即死知不瞑矣因泫然泣數行下上視其貌甚瘠又聞其言悲之乃聽終喪蓋帥臣得終喪自公始以樞密直學士為涇原路兵馬都總管經略安撫使知渭州遂自尚書禮部郎中遷右諫議大夫知成都府充蜀梓利䕫路兵馬鈐轄西南夷侵邊公嚴兵憚之而誘以恩信即皆稽顙蜀自王均李順再亂遂號為易動往者得便宜决事而多擅殺以為威至雖小罪猶并妻子遷出之蜀流離顛頓有以故死者公拊循教誨兒女子畜其人至有甚惡然後繩以法蜀人愛公以繼張忠定而謂公所斷治為未嘗有誤嵗大凶寬賦減徭發廩以救之而無餓者事聞賜書奬諭遷給事中以守御史中丞充理撿使召焉未至以為樞密直學士權三司使既而又以為龍圖閣學士翰林學士又遷尚書禮部侍郎正其使號自景德㑹計至公始復鈎考財賦盡知其出入於是入多景德矣嵗所出乃或多於入公以謂厚斂疾費如此不可以持久然欲有所掃除變更興起法度使百姓得完其蓄積而縣官亦以有餘在上與執政所為而主計者不能獨任也故為皇祐㑹計録上之論其故冀以寤上上固恃公欲以為大臣居頃之遂以為樞密副使又以撿挍太傅充樞密使公自常選數年遂任事於時及在樞密為之使又超其正天下皆以為宜顧尚有恨公得之晚者公行內修於諸弟尤篤為人寬厚長者與人語欵欵若恐不得當其意至其有所守人亦不能移也自江寧歸宰相私使人招之公謝不往及為諫官於小事近功有所不言獨常從容為上言為治大方而已范文正公等皆士大夫所望以為公卿而其位未副公得間輒為上言之故文正公等未幾皆見用當是時上數以天下事責大臣慨然欲有所為蓋其志多自公發公所設施事趣可功期成因能任善不必已出不為獨行異言以峙聲名故功利之在人者多而事迹可記者止於如此嘉祐三年十一月暴得疾不能興上聞悼駭勑中貴人太醫問視疾加損輒以聞公即辭謝求去位奏至十四五猶不許而公求之不已乃以為尚書右丞觀文殿學士翰林侍讀學士提舉景靈宫事而公求去位終不已於是遂以太子少傅致仕致仕凡五年疾遂篤以八年二月乙酉薨於第享年五十九號推誠保德功臣階特進勳上柱國爵開國京兆郡公食邑三千五百户實封八百户詔贈公太子太保而賻賜之甚厚公諱况字元均皇曾祖諱祐贈太保皇祖諱行周贈太傅皇考諱延昭贈太師妻富氏封永嘉郡夫人今宰相河南公之女弟也無男子以弟之子至安為主後女子一人尚幼田氏自太師始占其家開封而葬陽翟故今以公從太師葬陽翟之三封鄉西吳里於是公弟右贊善大夫洵來曰卜葬公利四月甲午請所以志其壙者蓋公自佐江寧以至守蜀在所輒興學數親臨之以進諸生某少也與公弟游而公所進以為可教者也知公為審銘曰田室於姜卒如龜祥後其孫子曠不世史於宋繼顯自公攸始奮其華蕤配實之美乃發帝業深宏卓煒乃興佐時宰飪調胹文馴武克內外隨施亦有厚仕孰無衆毁公獨使彼若榮豫已維昔皇考敢於活人傳祉在公不集其身公又多譽公宜難老胡此殆疾不終夀考掩詩於幽為告永久大理丞楊君墓志銘佳致蔚然君諱忱字明叔華隂楊氏子少卓犖以文章稱天下治春秋不守先儒傳注資他經以佐其說其說超厲卓越世儒莫能難也及為吏按姦發伏振擲利害大人之以聲名權勢驕士者常逆為君自絀蓋君有以過人如此然峙其能奮其氣不治防畛以取通於世故終於無所就以窮初君以父䕃守將作監主簿數舉進士不中數上書言事其言有衆人所不敢言者丁文簡公且死為君求職君辭焉復用大臣薦召君試學士院又久之不就積官至朝奉郎行大理寺丞通判河中府事飛騎尉而坐小法絀監蘄州酒稅未赴而以嘉祐七年四月辛已卒於河南享年三十九顧言曰焚吾所為書無留也以柩從先人葬八年四月辛卯從其父葬河南府洛陽縣平樂鄉張封村君曾祖諱津祖諱守慶坊州司馬贈尚書左丞父諱偕翰林侍讀學士以尚書工部侍郎致仕特贈尚書兵部侍郎娶丁氏清河縣君尚書右丞度之女子男兩人景略守太常寺太祝好書學能自立景彥早卒君有文集十卷又别為春秋正論十卷微言十卷通例二十卷銘曰芒乎其孰始以有厥美昧乎其孰止以終於此納銘幽宫以慰其子祕閣挍理丁君墓志銘感慨悽惋中文多諷朝奉郎尚書司封員外郎充祕閣挍理新差通判永州軍州兼管內勸農事上輕車都尉賜緋魚袋晉陵丁君卒臨川王某曰噫吾僚也方吾少時輔我以仁義者乃發哭弔其孤祭焉而許以銘越三月君壻以狀至乃敘銘赴其葬敘曰君諱寶臣字元珍少與其兄宗臣皆以文行稱鄉里號為二丁景祐中皆以進士起家君為峽州軍事判官與廬陵歐陽公游相好也又為淮南節度掌書記或誣富人以博州將貴人也猜而専吏莫敢議君獨力爭正其獄又為杭州觀察判官用舉者兼州學教授又用舉者遷太子中允知越州剡縣蓋其始至流大姓一人而縣遂治卒除弊興利甚衆人至今言之於是再遷為太常博士移知端州儂智髙反攻至其治所君出戰能有所捕斬然卒不勝乃與其州人皆去而避之坐免一官徙黃州㑹恩除太常丞監湖州酒又以大臣有解舉者遷博士就差知越州諸暨縣其治諸暨如剡越人滋以君為循吏也英宗即位以尚書屯田員外郎編挍祕閣書籍遂為挍理同知太常禮院君質直自守接上下以恕雖貧困未嘗言利於朋友故舊無所不盡故其不幸廢退則人莫不憐少進也則皆為之喜居無何御史論君嘗廢矣不當復用遂出通判永州世皆以咎言者謂為不宜夫驅未嘗教之卒臨不可守之城以戰虎狼百倍之賊議今之法則獨可守死爾論古之道則有不去以死有去之以生吏方操法以責士則君之流離窮困幾至老死尚以得罪於言者亦其理也君以治平三年待闕於常州於是再遷尚書司封員外郎以四年四月四日卒年五十八有文集四十卷明年二月二十九日葬于武進縣懷德北鄉郭莊之原君曾祖諱耀祖諱諒皆弗仕考諱柬之贈尚書工部侍郎夫人饒氏封晉陵縣君前死子男隅太廟齊郎除隮為進士其季恩兒尚幼女嫁祕書省著作佐郎集賢挍理同縣胡宗愈其季未嫁嫁胡氏者亦又死矣銘曰文於辭為達行於德為充道於古為可命於今為窮嗚呼已矣卜此新宫唐荆川曰中論避冦端州事比歐公為簡廣西轉運使蘇君墓志銘感慨中有法度慶厯五年河北都轉運使龍圖閣直學士信都歐陽修以言事切直為權貴人所怒因其孤甥女子有獄誣以姦利事天子使三司户部判官太常博士武功蘇君與中貴人雜治當是時權貴人連內外諸怨惡修者為惡言欲傾修鋭甚天下汹汹必修不能自脫蘇君卒白上曰修無罪言者誣之耳於是權貴人大怒誣君以不直絀使為殿中丞泰州監稅然天子遂寤言者不得意而修等皆無恙蘇君以此名聞天下嗟乎以忠為不忠而誅不當於有罪人主之大戒然古之陷此者相隨屬以有左右之讒而無如蘇君之救是以卒至於敗亡而不寤然則蘇君一動其功於天下豈小也哉蘇君既出逐權貴人更用事凡五年之間再赦而君六徙東西南北水陸奔走輒萬里其心恬然無有怨悔遇事强果未嘗少屈蓋孔子所謂剛者殆蘇君矣蘇君之仁與智又有足稱者嘗通判陜府當葛懷敏之敗邊告急樞密使使取道路戍還之卒再戍儀渭於是延州還者千人至陜聞再戍大怨即歡聚謀為變吏白閉城城中無一人敢出君徐以一騎出卒間諭慰止之而以便宜還使者戌卒喜曰微蘇君吾不得生陜人亦曰微蘇君吾其掠死矣有令刺陜西之民以為兵敢亡者死既而亡者得有司治之以死君輒縱去而言上曰令民以死者為事不集也事集矣而亡者猶不赦恐其衆相聚而為盜惟朝廷幸哀憐愚民使得自反天子以君言為然而三十州之亡者皆不死其後知坊州州稅賦之無歸者里正代為之輸嵗幣大家數十君悉鉤治使歸其主坊人不憂為里正自蘇君始也蘇君諱安世字夢得其先武功人後徙蜀蜀亡歸家於京師今為開封人也曾大考諱進之率府副率大考諱繼殿直考諱咸熙贈都官郎中君以進士起家三十二年其卒年五十九為廣西轉運使而官止於屯田員外郎者以君十五年不求磨勘也君娶南陽郭氏又娶清河張氏為清河縣君子四人台文永州推官祥文太廟齊郎炳文試將作監主簿彥文未仕女子五人適進士㑹稽江嵩單州魚臺縣尉江山趙揚三人尚幼君既卒之三年嘉祐二年十月庚午其子葬君揚州之江都東興寧鄉馬坊村而太常博士知常州軍州事臨川王某為銘曰皇有四極周綏以福使維蘇君奠我南服元元蘇君不圓其方不晦其明君子之剛其枉在人我得吾直誰懟誰愠祇天之役日月有丘其下冥冥昭君無窮安石之銘唐荆川曰此等志文獨荆公有之比部陳君墓志銘悽惋多大㫖陳晉公有子五人其一人今宰相是也公晉公之中子而今宰相弟晉公諱某事始卒在史官公諱某字某九嵗用晉公恩守祕書省挍書郎晉公薨恩改太常寺奉禮郎服除久之㑹封禪恩改大理評事監鳯翔府酒稅又㑹祀汾隂改衛尉寺丞歸以最升知邵武之邵武縣獻文章得試學士院宰相才之議與科名公固辭親在願得進官職也不願得科名從之通判秀州改大理寺丞歸又獻文章表乞治劇郡得淮陽軍改太子中舍今上即位恩加改殿中丞是嵗賜緋衣銀魚知臨江軍還得睦州薦者數人天子以公名屬審官又徙知遂州以齊國太夫人疾辭還改虞部員外郎上便宜數事得引對因自贊天子欲稍進用之而遭齊國太夫人之喪以去居無何睦州人王稷上書斥公赦前數事服除猶坐是監䖍州稅明道元年恩改比部員外郎通判建州改駕部用舉者徙知吉州坐法免起為比部監泗州糧料又坐法免起為虞部監饒州錢監復得比部歸羇居京師久之乃出監江隂軍酒稅道疾病上書自言先臣恕得幸先皇帝至大臣臣階先臣以得仕屢進所學蒙記識方壯少時頗汲汲欲自奮收一日之效以卒事陛下之分而孤行單立無黨友之助又薄命不幸數遭小人以見困蹶負先臣餘教辱陛下器使之恩今老矣念終無以報盛德除愧恥夙夜憂畏以故得病病且死無田園以歸無彊有力子弟以養唯男一人世昌去年為進士得嘉慶院解臣兄在中書奏不得試禮部今當為逺官去臣旁逺甚陛下憐之幸聽臣分司改世昌蘇常間一官以卒養臣天地之賜也臣誠窮即無自言誰當為臣言者乎書入未報竟卒於江寧得年若干時某年月也夫人某氏子男兩人世昌泉之晉江主簿次世長前死女兩人皆已嫁主簿將以某年月葬公某處葬有日使來乞銘初公為臨江軍先君為之佐其後二十五年某得主簿於淮南而兄事之仍世有好義不可以辭無銘也公名臣子少壯得美仕間以文藝自進意自以為且貴富世其家而遭平世槩以文法持臣下故其材不得有所肆而卒以齟齬窮其感激怨懟往往見於文辭主簿離其藁為二十卷讀之知其心之所存也而其求分司語尤悲因掇其大槩而存之噫其亦可悲也夫銘曰於此有木焉一本而中分其材均樹之時又均或斷而焚或剖以為犧尊誰令然耶其偶然耶吾又何嗟朝奉郎守國子博士知常州李公墓志銘特歸重於常州以虛語感慨公李氏諱餘慶字昌宗年四十四官止國子博士知常州以卒然公之威名氣略聞天下自其卒至今久矣天下尚多談公之為有過於人者余嘗過常州州之長老道公卒時就葬於橫山州人填道瞻送歎息為之出淚又為之畫像置之浮屠以祭之於是又知公之有惠愛於常人也已而與公之子處厚遊則得公之所為甚具蓋公之為政精明强果事至能立斷而得久姦宿惡輒取之不貸至其化服則撫循養息悉有其處所以威震逺近而蒙其德者亦思之無窮也當明肅太后時嘗欲用公矣公再上書論事其言甚直以故不果用而出常州嗚呼公之自任豈止於一州而已此有志者所以為之惜也始公以叔父任起家應天府法曹參軍遇事輒爭之留守者不能奪也卒薦公改太常寺太祝知湖州歸安縣其後通判秀州州近鹽公作華亭海鹽二監以業盜販之民嵗入緡錢八十萬又為石堤自平望至吳江五十里以除水患人至今賴之其所至處利害多如此然非公大志所欲以就名成功者故不悉著著其利於民尤大而能以久者云公平生慷慨好議當世事其所趣舍必欲如已意雖强有勢終不為撓嘗考前世治亂之迹與其君臣之間議論編為七十卷藏於家此蓋其大志所存也公之先為開封之陳留人五代祖為梁使閩因避地家於福之漣江曾大父周不仕大父郁贈尚書虞部員外郎考慕玢祕書省著作佐郎贈尚書工部員外郎夫人龔氏永安縣君男五人處常忠武軍節度推官與誼諴皆已卒處厚大理寺丞與處道皆進士既葬之二十三年至和元年余銘其墓曰公閩於家來自陳留維時方屯閉蓄函收其孰有源而久於幽自公之考乃施乃流其流至公孰敢泳游茫洋演迤小大畢浮曷蹇於行使止一州庶其渙發在後之修太常博士曾公墓志銘曾易占厯宦坎坷而荆公㸃次有生色公諱易占字不疑姓曽氏建昌南豐人其世出有公之考贈諫議大夫致堯之碑大夫當太宗真宗世為名臣公少以廕補太廟齊郎為撫州宜黃臨川二縣尉舉三司法中進士第改鎮東節度推官還改武勝節度掌書記崇州軍事判官皆不往用舉者監真州裝卸米倉遷太子中允太常丞博士知泰州之如臯信州之玉山二縣知信州錢仙芝者有所丐於玉山公不與即誣公吏治之得所以誣公者仙芝則請出御史當是時仙芝蓋有所挾故雖坐誣公抵罪而公亦卒失博士歸不仕者十二年復如京師至南京病遂卒娶周氏吳氏最後朱氏封崇安縣君子男六人曄鞏牟宰布肇女九人公以端拱己丑生卒時慶厯丁亥也後卒之二年而葬其墓在南豐之先塋始公以文章有名及試於事又愈以有名臨川之治能不以威而使惡人之豪帥其黨數百人皆不復為惡在越州其守之合者倚公以治其不合者有所不可公輕正之莊獻太后用道士言作乾明觀匠數百人作數嵗不成公語道士曰吾為汝成之為之捐其費大半役未幾而罷如臯嵗大饑固請於州而越海以糴所活數萬人明年稍已熟州欲收租賦如常公獨不肯聽嵗盡而泰之縣民有復亡者獨如臯為完既又作孔子廟諷縣人興于學玉山之政既除其大惡而至於橋梁廨驛無所不治蓋公之已試於事者能如此既仕不合即自放為文章十餘萬言而時議十卷尤行於世時議者懲已事憂來者不以一身之窮而遺天下之憂以為其志不見於事則欲發之於文其文不施於世則欲以傳於後後世有行吾言者而吾豈窮也哉蓋公之所為作之意也寶元中李元昊反契丹亦以兵近邊陽為欲棄約者天子獨憂之詔天下有能言者皆勿諱於是言者翕然論兵以進公獨以謂天下之安危顧吾自治不耳吾已自治夷狄無可憂者不自治憂將在於近而夷狄豈足道哉即上書言數事以為事不爾後當如此既而皆如其云公之遭誣人以為寃退而貧人為之憂也而公所為十餘萬言皆天下事古今之所以存亡治亂至其寃且困未嘗一以為言公沒而其家得其遺疏曰劉向有言讒邪之所以並進者由上多疑心用賢人而行善政如或譛之則賢人捨而善政還此可謂明白之論切於今者夫夷狄動於外百姓窮於下臣以謂尚未足憂也臣之所謂可憂者特在分諸臣之忠邪而已其大略如此而其詳有人之難言者蓋公既病而為之未及上而終云嗚呼其尤可以見公之志也夫諫者貴言人之難言而傳者則有所不得言讀其略不失其詳後世其有不明者乎公之事親心意幾微輒逆得之好學不怠而不以求聞於世所見士大夫之喪葬二人逆一人之柩以歸又字其孤又一人者宰相舅嘗為贊善大夫死三十年猶殯殯壞公為增修又與宰相書責使葬之此公之行也蓋公之試於事者小而不盡其材而行之所加又近唯其文可以見公之所存而名後世故公之故人子王某取其尤可以銘後世者而為銘曰夫辨邪正之實去萬事之例而歸宰相之責合兵為農以立天下之本設學校奬名節以材天下之士正名分定考課通財幣以成制度之法古之所以治者不皆出於此乎而時議之言如此讀其書以求其志嗚呼公之志何如也內翰沈公墓志銘雅公姓沈氏諱遘字文通世為杭州錢塘人曽祖諱某皇贈兵部尚書祖諱某皇贈吏部尚書父扶今為尚書金部員外郎公初以祖廕補郊社齊郎舉進士於廷中為第一大臣疑已仕者例不得為第一故以為第二除大理評事通判江寧府當是時公年二十人吏少公而公所為卓越已足以動人然世多未知公果可以有為也祀明堂恩遷祕書省著作佐郎嵗滿召歸除太常丞集賢挍理判登聞鼓院吏部南曹權三司度支判官又判都理缺憑由司於是挍理八年矣平居閉門雖執政非公事不輒見也故雖執政初亦莫知其為材居久之乃始以同修起居注召試知制誥及為制誥遂以文學稱天下金部君坐免歸求知越州又移知杭州鉏治姦蠧所禁無不改崇奬賢知得其歡心兩州人皆畫像祠之英宗即位召還句當三班院兼提舉兵吏司封官告院兼判集賢院廷見勞問甚悉居一月權發遣開封府事公初至開封指以相告曰此杭州沈公也及攝事人吏皆屏息既而以知審官院遂以龍圖閣直學士權知開封府公旦晝視事日中則廷無留人出謝諸客從容笑語客皆怪公獨有餘日而畿內翕然稱治人人如公坐視其左右於是名實暴耀振發賢臨一時自天子大臣皆論以為國之器而閭巷之士奔走談說歡呼鼓舞以不及為恐㑹母夫人疾病請東南一州視疾英宗曰學士豈可以去朝廷也明日除翰林學士知制誥充羣牧使兼權判吏部流內銓判尚書禮部公雖去開封然皆以為朝夕且大用矣而遭母夫人喪以去英宗聞公去尤悼惜時遣使者追賜黃金而以金部君知蘇州公居喪致哀寢食如禮以某年某月得疾杭州之墓次某日至蘇州而以某日卒年四十有三三男子六女中男恭嗣後公六日卒隆嗣廷嗣與六女皆尚幼夫人陸氏封安定郡君公官右諫議大夫散官朝散大夫勳輕車都尉爵長安縣開國伯食邑八百户有文集十卷公平居不常視書而文辭敏麗可喜强記精識長於議論世所謂老師宿學無所不讀通於世務者皆莫能屈也與人甚簡而察其能否賢不肖尤詳視遇之各盡其理為政號為嚴明而時有所縱舍於善良貧弱撫恤之尤至在杭州待使客多所濶略而州人之貧無以葬及女子失怙恃而無以嫁者以公使錢葬嫁之凡數百人於其卒知與不知皆為之歎惜某年某月某日葬公杭州某鄉某里銘曰沈公儀儀德義孔時升自東方其明孰夷視瞻歎譽無我敢疵正晝而隕嗚呼可悲序傳有史亦在銘詩唐宋八大家文鈔卷九十二
