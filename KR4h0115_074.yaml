body:
  text: 唐宋八大家文鈔巻七十明茅坤撰廬陵史鈔十一行傳歐陽公於五代史作一行傳語所謂風雨晦㝠雞鳴不已也而其言文其㫖逺予故録而出之嗚呼五代之亂極矣傳所謂天地閉賢人隠之時歟當此之時臣弑其君子弑其父而縉紳之士安其禄而立其朝充然無復亷恥之色者皆是也吾以謂自古忠臣義士多出於亂世而怪當時可道者何少也豈果無其人哉雖曰干戈興學校廢而禮義衰風俗隳壊至於如此然自古天下未嘗無人也吾意必有潔身自負之士嫉世逺去而不可見者自古材賢有韞於中而不見於外或窮居陋巷委身草莽雖顔子之行不遇仲尼而名不彰况世變多故而君子道消之時乎吾又以謂必有負材能修節義而沈淪于下泯沒而無聞者求之傳記而亂世崩離文字殘缺不可復得然僅得者四五人而已處乎山林而羣麋鹿雖不足以為中道然與其食人之禄俛首而包羞孰若無愧於心放身而自得吾得二人焉曰鄭遨張薦明勢利不屈其心去就不違其義吾得一人焉曰石昻茍利於君以忠獲罪何必自明有至死而不言者此古之義士也吾得一人焉曰程福贇五代之亂君不君臣不臣父不父子不子至於兄弟夫婦人倫之際無不大壊而天理㡬乎其滅矣於此之時能以孝悌自修於一鄉而風行於天下者猶或有之然其事迹不著而無可紀次獨其名氏或因見於書者吾亦不敢沒而其略可録者吾得一人焉曰李自倫作一行傳鄭遨字雲叟滑州白馬人也唐明宗祖廟諱遨故世行其字遨少好學敏於文辭唐昭宗時舉進士不中見天下已亂有拂衣逺去之意欲攜其妻子與俱隠其妻不從遨乃入少室山為道士其妻數以書勸遨還家輙投之於火後聞其妻子卒一慟而止遨與李振故善振後事梁貴顯欲以禄遨遨不顧後振得罪南竄遨徒步千里往視之由是聞者益髙其行其後遨聞華山有五粒松脂淪入地千嵗化為藥能去三尸因徙居華隂欲求之與道士李道殷羅隠之友善世目以為三髙士遨種田隠之賣藥以自給道殷有釣魚術釣而不餌又能化石為金遨嘗驗其信然而不之求也節度使劉遂凝數以寳貨遺之遨一不受唐明宗時以左拾遺晉髙祖時以諫議大夫召之皆不起即賜號為逍遥先生天福四年卒年七十四遨之節髙矣遭亂世不汚於滎利至棄妻子不顧而去豈非與世相絶而篤愛其身者歟然遨好飲酒奕棊時時為詩章落人間人間多冩以縑素相贈遺以為寳至或圖寫其形翫於屋壁其迹雖逺而其名逾彰與乎石門荷蓧之徒異矣與遨同時有張薦明燕人也少以儒學逰河朔後去為道士通老子莊周之說髙祖召見問道家可以治國乎對曰道也者妙萬物而為言得其極者尸居袵席之間可以治天地也髙祖大其言延入内殿講道德經拜以為師薦明聞宫中奏時鼓曰陛下聞鼓乎其聲一而已五音十二律鼓無一焉然和之者鼓也夫一萬事之本也能守一者可以治天下髙祖善之賜號通𤣥先生後不知其所終石昻青州臨淄人也家有書數千巻喜延四方之士士無逺近皆就昻學問食其門下者或累嵗昻未嘗有怠色而昻不求仕進節度使符習髙其行召以為臨淄令習入朝京師監軍楊彦朗知留後事昻以公事至府上謁賛者以彦朗諱石更其姓曰右昻趨於庭仰責彦朗曰内侍奈何以私害公昻姓石非右也彦朗大怒拂衣起去昻即趨出解官還於家語其子曰吾本不欲仕亂世果為刑人所辱子孫其以我為戒昻父亦好學平生不喜佛說父死昻於柩前誦尚書曰此吾先人之所欲聞也禁其家不可以佛事汚吾先人晉髙祖時詔天下求孝悌之士户部尚書王權宗正卿石光賛國子祭酒田敏兵部侍郎王延等相與詣東上閤門上昻行義可以應詔詔昻至京師召見便殿以為宗正丞遷少卿出帝即位晉政日壊昻數上疏極諫不聽乃稱疾東歸以夀終於家昻既去而晉室大亂程福贇者不知其世家為人沈厚寡言而有勇少為軍卒以戰功累遷洺州團練使晉出帝時為奉國右廂都指揮使開運中契丹入冦出帝北征奉國軍士乘間夜縱火焚營欲因以為亂福贇身自救火被傷火滅而亂者不得發福贇以為契丹且大至而天子在軍京師虚空不宜以小故動揺人聽因匿其事不以聞軍將李殷位次福贇下利其去而代之因誣福贇與亂者同謀不然何以不奏出帝下福贇獄人皆以為寃福贇終不自辯以見殺李自倫者深州人也天福四年正月尚書户部奏深州司功㕘軍李自倫六世同居奉敕准格按格孝義旌表必先加按驗孝者復其終身義門仍加旌表得本州審到鄉老程言等稱自倫髙祖訓訓生粲粲生則則生忠忠生自倫自倫生光厚六世同居不妄敕以所居飛鳬鄉為孝義鄉匡聖里為仁和里准式旌表門閭九月丙子户部復奏前登州義門王仲昭六世同居其旌表有聽事步欄前列屏樹烏頭正門閥閱一丈二尺烏頭二柱端冒以瓦桶築雙闕一丈在烏頭之南三丈七尺夾樹槐柳十有五步請如之敕曰此故事也今式無之其量地之宜髙其外門門安綽楔左右建臺髙一丈二尺廣狹方正稱焉圬以白而赤其四角使不孝不義者見之可以悛心而易行焉唐六臣傳甚哉白馬之禍悲夫可為流涕者矣然士之生死豈其一身之事哉初唐天祐三年梁王欲以嬖吏張廷範為太常卿唐宰相裴樞以謂太常卿唐常以清流為之廷範乃梁客將不可梁王由此大怒曰吾常謂裴樞純厚不陷浮薄今亦為此邪是嵗四月彗出西北掃文昌軒轅天市宰相柳璨希梁王㫖歸其譴於大臣於是左僕射裴樞獨孤損右僕射崔逺守太保致仕趙崇兵部侍郎王賛工部尚書王溥吏部尚書陸扆皆以無罪貶同日賜死於白馬驛凡縉紳之士與唐而不與梁者皆誣以朋黨坐貶死者數百人而朝廷為之一空明年三月唐哀帝遜位於梁遣中書侍郎同中書門下平章事張文蔚為冊禮使禮部尚書蘇循為副中書侍郎同中書門下平章事楊涉為押傳國寳使翰林學士中書舍人張䇿為副御史大夫薛貽矩為押金寳使尚書左丞趙光逢為副四月甲子文蔚等自上源驛奉冊寳乘輅車導以金吾仗衛太常鹵簿朝梁於金祥殿梁王衮冕南面臣文蔚臣循奉冊升殿進讀已臣渉臣䇿奉傳國璽臣貽矩臣光逢奉金寳以次升進讀己降率文武百官北面舞蹈再拜賀夫一太常卿與社稷孰為重使樞等不死尚惜一卿其肯以國與人乎雖樞等之力未必能存唐然必不亡唐而獨存也嗚呼唐之亡也賢人君子既與之共盡其餘在者皆庸懦不肖傾險獪猾趨利賣國之徒也不然安能䝉恥忍辱於梁庭如此哉作唐六臣傳張文蔚字右華河間人也初以文行知名舉進士及第唐昭宗時為翰林學士承㫖是時天子微弱制度已隳文蔚居翰林制詔四方獨守大體昭宗遷洛拜中書侍郎同中書門下平章事柳璨殺裴樞等七人蔓引朝士輒加誅殺縉紳相視以目皆不自保文蔚力講解之朝士多賴以全活梁太祖始立仍以文蔚為相梁初制度皆文蔚所裁定文蔚居家亦孝悌開平二年太祖北巡留文蔚西都以暴疾卒贈右僕射楊渉祖收唐懿宗時宰相父嚴官至兵部侍郎渉舉進士昭宗時為吏部尚書哀帝即位拜中書侍郎同中書門下平章事渉唐名家世守禮法而性特謹厚不幸遭唐之亂拜相之日與家人相對泣下顧其子凝式曰吾不能脫此網羅禍將至矣必累爾等唐亡事梁為門下侍郎同中書門下平章事在位三年俛首無所施為罷為左僕射知貢舉後數年卒子凝式有文辭善筆札歴事梁唐晉漢周常以心疾致仕居於洛陽官至太子太保張䇿字少逸河西燉煌人也父同為唐容管經略使策少聰悟好學通章句父同居洛陽敦化里浚井得古鼎銘曰魏黃初元年春二月匠吉干同以為竒策時年十三居同側啟曰漢建安二十五年曹公薨改元延康是嵗十月文帝受禪又改黃初是黃初元年無二月也銘何謬邪同大驚異之䇿少好浮圖之說乃落髪為僧居長安慈恩寺黃巢犯長安䇿乃返初服奉父母以避亂居田里十餘年召拜廣文館博士邠州王行瑜辟觀察支使晉王李克用攻行瑜䇿與婢肩輿其母東歸行積雪中行者憐之梁太祖兼四鎮辟鄭滑支使以母喪解職服除入唐為膳部員外郎華州韓建辟判官建徙許州以為掌書記建遣䇿聘于太祖太祖見而喜曰張夫子至矣遂留以為掌書記薦之於朝累拜中書舍人翰林學士太祖即位遷工部侍郎奉㫖開平二年拜刑部侍郎同中書門下平章事遷中書侍郎以風恙罷為刑部尚書致仕卒於洛陽趙光逢字延吉父隠唐左僕射光逢在唐以文行知名時人稱其方直温潤謂之玉界尺昭宗時為翰林學士承㫖御史中丞以世亂棄官居洛陽杜門絶人事者五六年栁璨為相與光逢有舊恩起光逢為吏部侍郎太常卿唐亡事梁為中書侍郎同中書門下平章事累遷左僕射以太子太保致仕末帝即位起為司空同中書門下平章事復以司徒致仕唐天成中即其家拜太保封齊國公卒贈太傅薛貽矩字熈用河東聞喜人也仕唐為兵部侍郎翰林學士承㫖昭宗自岐還長安大誅宦者貽矩嘗為中尉韓全誨等作畫像讃坐左遷貽矩乃自結於梁太祖太祖言之於朝拜吏部尚書遷御史大夫天祐三年太祖自長蘆還軍哀帝遣貽矩來勞貽矩以臣禮見太祖揖之升階貽矩曰殿下功德及人三靈改卜皇帝方行舜禹之事臣安敢違乃稱臣拜舞太祖側身以避之貽矩還遂趣哀帝遜位太祖即位拜貽矩中書侍郎同中書門下平章事累拜司空貽矩為梁相五年卒贈侍中蘇循不知何許人也為人巧佞阿諛無亷恥惟利是趨事唐為禮部尚書是時梁太祖已弑昭宗立哀帝唐之舊臣皆憤惋切齒或俛首畏禍或去不仕而循特傅㑹梁以希進用梁兵攻楊行宻大敗於渒河太祖躁忿急於禪代欲邀唐九鍚羣臣莫敢當其議獨循倡言梁王功德天命所歸宜即受禪明年梁太祖即位循為冊禮副使循有子楷乾寧中舉進士及第昭宗遣學士陸扆覆落之楷常慚恨及昭宗遇弑唐政出於梁楷為起居郎與柳璨張廷範等相結因謂廷範曰夫諡者所以易名而貴信也前有司諡先帝曰昭名實不稱公為太常卿予史官也不可以不言乃上疏駁議而廷範本梁客將嘗求太常卿不得者廷範亦以此怨唐因下楷疏廷範廷範議曰臣聞執事堅固之謂恭亂而不損之謂靈武而不遂之謂莊在國逢難之謂閔因事有功之謂襄請改諡昭宗皇帝曰恭靈莊閔皇帝廟號襄宗梁太祖已即位置酒𤣥德殿顧羣臣自陳德薄不足以當天命皆諸公推戴之力唐之舊臣楊涉張文蔚等皆慚懼俯伏不能對獨循與張禕薛貽矩盛稱梁王功德所以順天應人者循父子皆自以附㑹梁得所託旦夕引首希見進用敬翔尤惡之謂太祖曰梁室新造宜得端士以厚風俗循父子皆無行不可立於新朝於是父子皆勒歸田里乃依朱友謙於河中其後友謙叛梁降晉晉王將即位求唐故臣在者以備百官之闕友謙遣循至魏州是時梁未滅晉諸將相多不欲晉王即帝位晉王之意雖銳將相大臣未有贊成其議者循始至魏州望州廨聽事即拜謂之拜殿及入謁舞蹈呼萬嵗而稱臣晉王大恱明日又獻畫日筆三十管晉王益喜因以循為節度副使已而病卒莊宗即位贈左僕射楷同光中為尚書員外郎明宗即位大臣欲理其駁諡之罪以憂死當唐之亡也又有杜曉者字明逺祖審權父讓能皆為唐相昭宗時王行瑜李茂貞兵犯京師昭宗殺讓能於臨皋以自解曉以父死無罪居喪哀毁服除布衣幅巾自廢十餘年崔𦙍判鹽鐵辟巡官除畿縣尉直昭文館皆不起崔逺判户部又辟巡官或謂曉曰嵇康死子紹自廢不出仕山濤以物理責之乃仕吾子忍令杜氏嵗時鋪席祭其先人同匹庶乎曉乃為之起累遷膳部郎中翰林學士梁太祖即位遷工部侍郎奉㫖開平二年拜中書侍郎同中書門下平章事友珪立遷禮部尚書集賢殿大學士袁象先等討賊兵大掠曉為亂兵所殺贈右僕射嗚呼始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人哉予嘗至繁城讀魏受禪碑見漢之羣臣稱魏功德而大書深刻自列其姓名以夸耀於世又讀梁實録見文蔚等所為如此未嘗不為之流涕也夫以國予人而自夸耀乃遂相之此非小人孰能為也漢唐之末舉其朝皆小人也而其君子者何在哉當漢之亡也先以朋黨禁錮天下賢人君子而立其朝者皆小人也然後漢從而亡及唐之亡也又先以朋黨盡殺朝廷之士而其餘存者皆庸懦不肖傾險之人也然後唐從而亡夫欲空人之國而去其君子者必進朋黨之說欲孤人主之勢而蔽其耳目者必進朋黨之說欲奪國而與人者必進朋黨之說夫為君子者固常寡過小人欲加之罪則有可誣者有不可誣者不能遍及也至欲舉天下之善求其類而盡去之惟指以為朋黨耳故其親戚故舊謂之朋黨可也交㳺執友謂之朋黨可也宦學相同謂之朋黨可也門生故吏謂之朋黨可也是數者皆其類也皆善人也故曰欲空人之國而去其君子者惟以朋黨罪之則無免者矣夫善善之相樂以其類同此自然之理也故聞善者必相稱譽稱譽則謂之朋黨得善者必相薦引薦引則謂之朋黨使人聞善不敢稱則人主之耳不聞有善於下矣見善不敢薦則人主之目不得見善人矣善人日逺而小人日進則為人主者倀倀然誰與之圖治安之計哉故曰欲孤人主之勢而蔽其耳目者必用朋黨之說也一君子存羣小人雖衆必有所忌而有所不敢為惟空國而無君子然後小人得肆志於無所不為則漢魏唐梁之際是也故曰可奪國而予人者由其國無君子空國而無君子由以朋黨而去之也嗚呼朋黨之說人主可不察哉傳曰一言可以喪邦者其是之謂歟可不鑒哉可不戒哉義兒傳嗚呼世道衰人倫壊而親疎之理反其常干戈起於骨肉異類合為父子開平顯德五十年間天下五代而實八姓其三出於丐養蓋其大者取天下其次立功名位將相豈非因時之隙以利合而相資者邪唐自號沙陀起代北其所與俱皆一時雄傑􅕝武之士往往養以為兒號義兒軍至其有天下多用以成功業及其亡也亦由焉太祖養子多矣其可紀九人其一是為明宗其次曰嗣昭嗣本嗣恩存信存孝存進存璋存賢作義兒傳李嗣昭本姓韓氏汾州大谷縣民家子也太祖出獵至其家見其林中鬱鬱有氣甚異之召其父問焉父言家適生兒太祖因遺以金帛而取之命其弟克柔養以為子初名進通後更名嗣昭嗣昭為人短小而膽勇過人初喜嗜酒太祖嘗微戒之遂終身不飲太祖愛其謹厚常從用兵為内衙指揮使陜州王珙與其兄珂爭立於河中遣嗣昭助珂敗珙於猗氏獲其將三人梁軍救珙嗣昭又敗之于胡壁堡執其將一人光化元年澤州李罕之襲潞州以降梁梁遣丁㑹應罕之嗣昭與㑹戰含山執其將一人斬首三千級遂取澤州二年晉遣李君慶攻梁潞州君慶為梁所敗太祖酖殺君慶嗣昭攻克之三年出山東取梁洺州梁太祖自將攻之遣葛從周設伏於青山口嗣昭聞梁太祖自來棄城走前遇伏兵因大敗天復元年梁破河中執王珂取晉綘慈隰因大舉擊晉圍太原嗣昭日以精騎出擊梁兵㑹大雨梁軍解去晉汾州刺史李瑭叛降梁軍梁軍已去嗣昭復取汾州斬瑭遂出隂地取慈州降其刺史唐禮又取隰州降其刺史張瓌是嵗梁軍西犯京師圍鳯翔嗣昭乘間攻梁晉絳戰平陽執梁將一人進攻蒲縣梁朱友寧氏叔琮以兵十萬迎擊之嗣昭敗走友寧追之晉遣李存信率兵迎嗣昭存信又敗梁軍遂圍太原而慈隰汾州復入于梁太祖大恐謀走雲州李存信等勸太祖奔于契丹嗣昭力爭以為不可賴劉太妃亦言之乃止嗣昭晝夜出竒兵擊梁軍梁軍解去嗣昭復取汾慈隰是時鎮定皆已絶晉而附梁晉外失大國之援内亡諸州仍嵗之間孤城被圍者再於此時嗣昭力戰之功為多天祐三年與周德威攻梁潞州降丁㑹以嗣昭為昭義軍節度使梁遣李思安將兵十萬攻潞築夾城以圍之梁太祖嘗遣人招降嗣昭嗣昭斬其使者閉城拒守踰年莊宗始攻破夾城嗣昭完緝兵民撫養甚有恩意梁晉戰胡柳晉軍敗周德威戰死莊宗懼欲收兵還臨濮嗣昭曰梁軍已勝旦暮思歸吾若收軍使彼休息整而復出何以當之宜以精騎撓之因其勞乏可以勝也莊宗然之是時梁軍已登無石山莊宗遣嗣昭轉擊山北而自以銀槍軍趨而呼曰今日之戰得山者勝晉軍皆爭登山梁軍遽下陣於山西晉軍從上急擊大敗之於是晉城德勝矣周德威死嗣昭權知幽州居數月以李紹宏代之嗣昭將去幽州人皆號哭閉闗遮留之嗣昭夜遁乃得去十九年從莊宗擊契丹於望都莊宗為契丹圍之數十重嗣昭以三百騎决圍取莊宗以出是時晉遣閻寳攻張文禮於鎮州寳為鎮人所敗乃以嗣昭代之鎮兵出掠九門嗣昭以竒兵擊之鎮軍且盡餘三人匿破垣中嗣昭馳馬射之反為賊射中腦嗣昭顧箙中矢盡拔矢於腦射殺一人還營而卒存賢許州人也本姓王名賢少為軍卒善角觝太祖撃黃巢于陳州得之賜以姓名養為子後為義兒軍副兵馬使遷沁州刺史先時沁州當敵衝徙其南百餘里據險立柵而寓居至存賢為刺史曰徙城避敵豈勇者所為乃復城故州梁兵屢攻之存賢力自拒守卒不能近遷武州刺史山北團練使又遷慈州天祐十八年梁兵攻朱友謙於河中莊宗遣存賢援友謙是時友謙新叛梁歸晉而河中食少人心多貳諜者因謂存賢曰河中人欲殺子以歸梁宜亟去存賢曰死王事吾志也復何恨哉卒擊走梁兵莊宗即位拜右武衛上將軍莊宗亦好角觝嘗與王都較而屢勝頗以自矜因顧存賢曰爾能勝我與爾一鎮存賢摶而勝之同光二年春幽州符存審病甚莊宗置酒宫中歎曰吾創業故入零落殆盡其所存者惟存審耳今又病篤北方之事誰可代之因顧存賢曰無以易卿角觝之勝吾不食言即日以為盧龍軍節度使是嵗卒於幽州年六十五贈太傅唐宋八大家文鈔巻七十
