body:
  text: 唐宋八大家文鈔卷一百四十六明茅坤撰潁濱文鈔二上書劄子自齊州回論時事書忠悃之言類兩漢書疏臣自少讀書好言治亂方陛下求治之初上書言事陛下不廢狂狷召對便殿親聞德音九品賤官自此始得登對論事當此之時陛下好問之聲震動海內愚賤之人篤信寡慮以為天下之事可得徐陳遍舉指顧而定矣既而誤蒙恩澤受職條例抗論得失與有司不合得請外補於今七年而天下之治安終未可見臣竊疑之伏惟陛下天生聖德聰明睿智不學而具其於謀慮措置曾何足云自頃嵗以來每有更張民率不服蓋青苗行而農無餘財保甲行而農無餘力免役行而公私並困市易行而商賈皆病上則官吏勞苦患其難行下則衆庶愁嘆願其速改凡此四者豈陛下之聖明有所不知耶臣以為非也陛下之聖明無所不知何以言之二年以來陛下屢發英斷廢置大吏數其罪愆明示臣庶凡天下之所共疾惡者陛下無一不知由此觀之凡天下之所共怨苦者陛下何所不察今者皇天悔禍啓道聖意易置輔相中外踊躍思覩寬政而厯日彌月寂寞無聞衆心皇皇如久飢而不得食臣雖愚陋竊獨為陛下恨也陛下自即位以來求治之心常若不及意將以堯舜之隆平易漢唐之淺陋不幸左右不明陵遲以至於此天下之人孰不知之念也既知其不可用而去之又循其舊而不改將遂代之任咎此臣之所以為陛下恨也且今天下之安危智者不再計矣水旱連年死者將半遺民飢困盜賊滿野疆場未寧軍旅在外府庫空竭邊餉寡少事之可憂者何可勝數術之不效斷可見矣然陛下獨遲遲而不決意者已為之而巳廢之恐天下有以窺其深淺耶臣聞人主之德如天天之於物也熾然而旱赤地千里草木皆死可謂虐矣然至雷雨時作膏澤洋溢百谷奮起民復粒食鼓舞盛德而忘旱之虐何者度量廣大改過無疑也如使密雲不雨既雨而中止遲疑猶豫久而不忍則天之生物盡矣傳曰君子之過也如日月之食焉過也人皆見之更也人皆仰之今陛下誠先治其心使虛一而靜湛乎彼我得失莫能嬰也去惡如棄塵垢遷善如救飢渴與民一新罷此四事青苗之既散者要之以三嵗而不收息保甲之既團者存其舊籍而不任事復差役以罷免役之條通商賈以廢市易之令行之期年而觀之苟民不安居水旱復作盜賊復起財用復竭誠有一事以憂陛下臣請伏罔上之誅以謝左右陛下誠不信臣數年之後親受其弊矣古人有言曰一慙之不忍而終身慙乎惟陛下為社稷籌之臣謹列四事之害畫一以獻不勝愚忠憤悶之誠干犯天威伏俟鈇鉞臣轍誠惶誠恐昧死上書謹按青苗免役保甲市易四事得失最為易見上自中外臣寮下至田父野老無有一不知者但以朝廷所行言其是則有功言其非則有罪是以畏避鉗默不敢正言臣今謹采衆議人所共知灼然可見者畫一開坐如後一議者皆謂富民假貸貧民坐收倍稱之息是以富者日富貧者日貧今官散青苗取息二分收富人并兼之權而濟貧民緩急之求貸不異於民間而息不至於倍稱公私皆利莫便於此然公家之貸其實與私貸不同私家雖取利或多然人情相通别無條法今嵗不足而取償於來嵗米粟不給而繼之以芻藁雞豚狗彘皆可以還債也無嵗月之期無給納之費出八閭里不廢農作欲取即取願還即還非如公家動有違礙故雖或取息過倍而民恬不知今官貸青苗責以見錢催隨二稅鄰里相保結狀請錢一家不至九家坐待奔赴城市糜費百端一有逋竄均及同保貧富相逮要以皆斃而後巳朝廷雖多設法度以收其失而其實無益也一議者又謂平時差役破壞民家一夫為役舉家失業故使逐戶出錢官為雇人謂之免役出錢雖多而民免於破家之患以此為説行之不疑然不知三代之民以力事上不専以錢近世因其有無各聽其便有力而無財者使效其力有財而無力者皆得雇人人各致其所有是以不勞而具今也棄其自有之力而一取於錢民雖有餘力不得效也於是賣田宅伐桑柘鬻牛馬以供免役而天下始大病矣且夫錢者官之所為米粟布帛者民之所生也古者上出錢以權天下之貨下出米粟布帛以補上之闕上下交易故無不利今青苗免役皆責民出錢是以百物皆賤而惟錢最貴欲民之無貧不可得也至如京師百司郡縣刑法之吏無祿而役為日久矣周制庶人在官雖曰有祿而事簡吏少勢或易供非如今時員數穢多不可供億况三代兵出於民而今世之兵坐而仰給若又兼舉大費為力實難然議者以為給之以祿然後可責之以廉蓋朝廷選吏之精必不如擇官之慎祿吏之厚必不如祿官之多今慎擇多祿之官猶不免於貪而况於吏人乎且昔之為法也計贓得罪無祿者減等今用倉法則吏之得罪反重於官顛倒失宜尤為未可若朝廷誠患吏貪但使官得其人則吏之受賕自有分限若猶未也則雖重祿深法不能禁矣一議者又謂三代之盛兵出於農故團結伍保以寓軍令朝廷喜其近古亦謂可行然而三代之民受田於官官之所以養之者厚故出身為兵而無怨今民買田以耕而後得食官之所以養之者薄而欲責其為兵其勢不可得矣蓋自唐以來民以租庸調與官而免於為兵今租庸調變而為兩稅則兩稅之中兵費己具且又有甚者民之納錢免役也以為終身不復為役矣今也既已免役而於捕盜則用為耆長壯丁於催稅則用為户長里正於巡防則用為巡兵弓手一人而三役具焉民將何以堪之且其為巡兵弓手也一保甲之中丁壯既出老弱守舍盜賊乘間如入無人之境而其上番之期又不過旬日坐作進退未能知也代者既至相率而反往來道路勞弊何益至使盜賊縱橫官吏蒙責嘯聚羣黨攻剽州縣未必不由此也古之循吏使民賣劒買牛今也使之棄其農具而置兵器小民無知緣以為惡良民之畏事者一入而終身不得脫姦民之好權者一補而終身不得免其為患害有不可勝言者矣一議者常患百貨輕重制在富民少則貴賣以取贏多則賤買以要利利有所壅商賈難通於是置市易之官以平貴賤有司誠守此議不更别有所營則雖繁碎難行然亦未深害民今自置市易無物不買無利不籠命官遣人販賣南北放債取利公行不疑杜絶利源不與民共觀其指趣非復制其有無權其輕重而巳也徒使小民失業商旅不行空取専利之名實失商稅之利國體卑辱海內離心巍魏盛朝何苦於此况復小民好利類無逺見爭取官債以救目前欺謾父兄妄引抵當期限既迫逃竄無所父子離散行路咨嗟奈何為此陷穽誘而納之也至於姦民巨賈窺伺間隙取利則多或輸滯積不售之貨以易見錢或指殘破無用之屋以賖實貨巧智百出難以具言有司蒙蔽指以為利泉幣一散汗漫難收官之所藏徒文具而已竊聞朝廷近日將議窮究然而既弊之法施行未巳買賣百物猶且如故譬如含茹毒藥喉舌破敗胸腹脹滿知其非矣然且閉口不吐安生切脈廣求方書其於速愈之術疏矣右臣所陳畫一事件皆是耳目所接衆庶共知朝廷清明豈有不察若誠有意改易非復難行但朝出一紙詔書四弊夕去非如前代積弊或在列國或在四夷欲議改更恐其動搖海內故且維持含養苟且便安今事在朝廷出命則巳衆所係望勢難久留而私自顧戀遲遲不決以失天下之心臣竊不取也愚蠢之人志在憂國言詞激切干犯典刑區區寸誠甘俟誅戮謹具狀奏聞伏候勑旨陳州為張安道論時事書通篇指神宗悔心處感諷開悟得易之納約自牖之意而始末處有針線法度伏以中外臣庶各有職事越職而言國有常憲臣守土陳州非有言責而輒言之計其狂愚兹實有罪然臣伏念頃以老疾不任吏事陛下未忍廢棄親擇便地以遂安養將辭之日面承德音以為大臣之義皆當為國謀慮不宜以中外為嫌有所不盡古人有言雖乃身在外乃心罔不在王室伏惟聖德廣大無所不容而臣自到任以來于今一嵗心目昏眩有加無瘳故嘗乞丏餘生求還閭舍區區之誠久而未獲陛下視臣志氣之衰至此豈復有意别白是非而與世俗爭議也哉是以得失之間久而無所與今者竊有所懷上為陛下參之官吏下為陛下驗之百姓而安危之機實在於此自惟受恩纍聖邦之休戚身實同之志力雖衰於義不可默巳然臣之所欲言者非敢逺引前古逆探未然以惑陛下之聰明也凡皆陛下之所嘗試而臣愚之所與聞者耳臣伏見陛下即位之始計慮深逺凡有所建動合天心始議山陵深恤費用之廣推明先帝薄葬之命以詔有司四方聞之無不感泣其後一年之間誕布號令勸率宗族惇孝悌之行勉勵州郡先農桑之政復轉對以廣言路議徭役以寬民力盛德之事不可具記是時天下雖大變之後而無不翹然想聞德音以忘其憂兩宫歡欣九族親睦羣臣萬民蒙福而安紛紜之議不至於朝廷謗讟之聲不聞於閭里陛下優遊無為而天下已治矣為國如此豈不樂哉陛下自今視之當日之政其為可悔恨者凡有幾以臣視之非獨陛下無所悔恨雖天下之人亦未有以為失當者也何者政令簡易而人情之所安耳易曰易則易知簡則易從易知則有親易從則有功有親則可久有功則可大向使陛下推行此道終始不變則臣以為可久可大之功可得而致矣其後求治太切用意過當姦臣緣隙得進邪説始議開邊以中上旨於是延安有橫山之謀保安有招誘之計陛下饒之以金帛假之以干戈小人貪功慮害不逺輕發深入結怨西戎攘奪尺寸無用之土空竭內府纍世之積大者疲弊秦雍小者身死寇讐西鄙騷然不寧而陛下始一悔矣然而陛下天姿英果有漢武宏達之量雖復兵吏失律而立功之意未嘗少衰是以左右大臣測知此心復進財利之説陛下樂聞其利而未暇深究其害於是舉而從之置條例司而講求天下之遺利己酉之秋新政始出自是以來凡所變革不可悉數其最大者一出而為常平青苗再出而為揀兵併營三出而為出錢雇役四出而為保甲教閲四者並行於世官吏疑惑兵民憤怨諌爭者章交於朝誹謗者聲播於市陛下不勝其煩為之當寧太息日昃而不食矣然猶幸其成功力排衆人之議而固守之天下方共厭苦而不知其所止也而揀兵併營之策其害先見武夫凶悍為怨最深為患最急陛下知其不可於是多支月糧復收退卒以順適其意而陛下既再悔矣然軍中之口猶復洶洶不靖陛下雖推恩撫之而終不以為惠反謂陛下畏之耳不幸邊臣失算再生戎心帷幄之臣謀之不臧不務安之而務撓之臨遣執政付以強事多出金幣豫書誥勑以成其深入之計當此之時天下之心知其必敗矣而陛下與一二臣者方以為萬舉而萬全既而出兵無人之境築城不守之地困弊腹心以求無益之功使秦晉之民父子流離肝腦塗地戎人徼倦受屈已築之城隨即傾覆救援之兵相繼潰叛四方震動君臣宵旰而後下罪已之詔投竄元宰以謝二鄙而陛下既三悔矣夫此三者方其未悔也陛下亦以為是邪非邪陛下犯逆衆心力行而不顧其必以為是不以為非也然而其終卒至於此然則方今陛下之所是而未悔者無乃亦類此歟臣聞衆而不可欺者民也勇而不可犯者兵也險而不可侮者鄰國也今陛下既已欺民犯兵而侮鄰國矣夫犯兵侮鄰變速而禍小至於欺民則變遲而禍大變速而禍小者瓦解之憂也變遲而禍大者土崩之患也今瓦解之憂陛下既知悔矣土崩之患陛下未以為意此臣之所以寒心也易曰不逺復無祗悔元吉事之未敗也陛下不悟其非必俟其敗而後悔如向三者則陛下之復已逺而悔亦大矣且臣觀之方今陛下之所是而未悔者亦有三而己青苗助役保甲三者之弊臣不復言矣何者言事者論其不可非一人也百姓毁壞支體燻灼耳目嫁母分居賤賣田宅以自脫免非一家也陛下其亦知之矣徘徊而不改使民無所告訴加之以水旱繼之以飢饉積悍之民奮為羣盜侵淫蔓延滅而復起英雄乘間而作振臂一呼而千人之衆可得而聚也如此而勝廣之形成此所謂土崩之勢也臣恐陛下至此雖欲復悔而無所及矣故臣願陛下取即位之政與今日之事而試觀之天下擾擾不安孰與今日之甚羣臣交口爭辨孰與今日之衆陛下聽覽疲倦孰與今日之多悔恨自責孰與今日之切陛下誠以此較之則不待臣言之終而得失可以自決矣且夫即位之政陛下之本心也今日之事臣下之過計也陛下棄即位之本心而徇臣下之過計臣竊以為過也雖然臣竊聽之道路方今陛下則亦悔之矣悔之而不變非陛下之意也迫於建議之臣耳夫人臣進謀於其君茍事之不遂而變以從衆則人主有以測其深淺人主有以測其深淺則其用捨之命在於人主此人臣之所以不便也臣竊痛陛下為社稷之計欲改過以安天下而怙權固位之臣持之而不釋陛下聰明睿智廢置自我而獨為此鬱鬱也漢宣帝與趙充國擊胸奴魏相非之以為當與平昌矦樂昌矦平恩矦及有識者詳議乃可此三人者非賢於趙充國也然而與國同憂樂無僥幸功名之心與希望爵賞之意則過於充國逺甚充國猶不可聽而況不如充國者哉陛下將安民保國而與喜功伐好權利者謀之臣不知其可也臣不勝區區忘身憂國之誠是以勢疏而言切惟陛下察之代老臣建言一一典刑論用臺諌劄子若近年臺諌雖稱吏部都察院會同考選恐不免宋人並由執政指揮之弊臣聞書稱堯舜之德曰明四目達四聰蓋人君居髙宅深其勢易與臣下隔絶若不務廣耳目則不聞外事無以預知禍福之原臣不敢復論前代請陳本朝故事每當視朝上有丞弼朝夕奏事下有臺諌更迭進見內有兩省侍從諸司官長以事奏稟外有監司郡守走馬承受辭見入奏凡所以為上耳目者其衆如此然至於事有壅蔽猶或不免今自太皇太后陛下皇帝陛下垂簾以來每事重慎羣臣得對於前者惟有執政及臺諌官而已然天下之事其是非可否既決于執政陛下欲於執政之外特有所聞者又獨有臺諌數人而已臣觀今日臺官三員諌官二員其間非執政私人特出聖意所用者又不過一二人孔子有言今吾於人也聽其言而觀其行陛下試取此五人言行之實而諦觀之則其邪正向背槩可見也昔漢成之世王鳳用事羣臣莫敢盡言惟劉向王章力言其惡無所顧避皆為鳳所不喜言卒不用或繼以死而鳳推薦其門人如杜欽谷永之流使上封論事欽等所言皆掩蔽鳳短専攻帝失由此直言不聞漢以不競今陛下深處帷幄耳目至少惟有臺諌數人若又聽執政得自選擇不公選正人而用之臣恐天下安危大計無由得達于前而朝廷之勢殆矣惟陛下留神省察無忽臣言則社稷之福也取進止論衙前及諸役人不便劄子蘇氏兄弟所見俱如此臣近奏乞修完弊政以塞異同之議其一謂諸州衙前臣請先論今昔差雇衙前利害之實蓋定差鄉户人有家業欺詐逃亡之弊比之雇募浮浪其勢必少此則差衙前之利也然而每差鄉户必有避免紏決比至差定州縣曹吏乞取不資及被差使先入重難若使雇募慣熟之人費用一分則鄉差生疏之人非二三分不了由此破蕩家産嘉祐以前衙前之苦民極畏之此則差衙前之害也若雇募情願自非慣熟必不肯投州縣吏人知其熟事乞取自少及至勾當動知空便費亦有常雖經重難自無破産之患此則雇衙前之利也然浮浪之人家産單薄侵盜之弊必甚於鄉差熙寧以來多患于此此則雇衙前之弊也然則差衙前之弊害在私家而雇衙前之弊害在官府若差法必行則私家之害無法可救若雇法必用則官府之弊有法可止何者嘉祐以前長名衙前除差三大户外許免其餘色役今若許雇募衙前依昔日長名免役之法則上等人户誰不願投諸州衙前例得實户則所謂官府之害坐而自除臣竊謂雖三代聖人其法不能無弊是以易貢為助易助為徹要以因時施宜無害於民而已今差法行於祖宗雇法行於先帝取其便於民者而用之此三代變法之比也其二謂諸州縣役人臣前巳具論差雇役人利害以謂差役之利利在上等下等人户而雇役之利利在中等既利害相半則兼行差雇為利實多然則祖宗舊法與先帝近制要為皆有所去取唯當問人情之所便更不當以新舊彼我為意有所偏係也臣觀前後役法皆由臣􅒼意有所執或自前曾經議論欲遂成其説或見今觀望上下有所希合致令所立之法不得通濟右臣竊見元祐以來朝廷改更弊政如青苗市易保甲等事一皆剗削而天下卒無一人以為非者至於改募役為差役建議之始異論巳多逮今五年終云未便蓋事之當否衆口必公雖古聖人孰敢違衆故臣願朝廷採此衆志立成定法臣昔於元祐三年任户部侍郎竊見朝廷始議兼行差雇二法使天下以六色助役錢雇募州役是時特出朝旨不問有司斷然必行已而衆皆稱便何者非常之原凡人不曉或暗昧不矚至理或偏係不肯公言俟其同心事何由濟故臣今所言欲乞出自聖斷與大臣熟議如有可採依三年例斷而行之所貴天下之民速蒙利澤不然使中外雜議動經歲月大法無由得成而民被其害未有已也臣不勝區區不知言之煩瀆死罪死罪論冬溫無氷劄子此等劄子自兩漢書疏以下不可及十分任怨忠義鍧然臣伏見前年冬溫不雪聖心焦勞請禱備至而天意不順宿麥不蕃去冬此災復甚而加以無氷二年之間天氣如一若非政事過差上干隂陽理不至此謹案常燠之罰載於周書而無氷之災書于春秋聖人之言必不徒設臣謹推原經意而驗以時事惟陛下擇之蓋洪範庶徵哲則時燠豫則常燠謀則時寒急則常寒哲之為言明也豫之為言舒也故漢儒釋之曰上德不明暗昧蔽惑不能知善惡無功者受賞有罪者不殺百官廢禮失在舒緩盛夏日長暑以養物政既弛緩故其罰常燠周失之舒秦失之急故周亡無寒歲而秦滅無燠年今連年冬溫無氷可謂常燠矣刑政弛廢善惡不分可謂舒緩矣臣非敢妄詆時政以惑聖聽請為陛下具數其實然事在嵗月之前者臣不能盡言請言其近者凡有罪不誅者七無功受賞者四陸佃為禮部侍郎所部有訟而其兄子宇乃與訟者酒食交通獄既具而有司當宇無罪此有罪而不誅者一也石麟之為開封府推官與訴訟者私相往來傳達言語獄上而罷更為郎官此有罪而不誅者二也李偉建言乞回奪大河朝廷信之為起夫役費用不資今黃河北流如故漲水既退東流淤填遂成道路臣屢乞正偉欺罔誤國之罪不蒙采納任偉如故此有罪而不誅者三也開封府推官王詔故入徒罪雖該德音法當衝替而詔仍得守郡至今經營差遣遷延不去此有罪而不誅者四也知祥符張亞之為官户理索積年租課至勘決不當償債之人估賣欠人田産及欠人見被枷錮而田主毆擊至死身死之後監督其家不為少止本臺按發其罪而朝廷除亞之真州欲令以去官免罪此有罪而不誅者五也孫述知長垣縣決殺訴災無罪之人臺官以言然後罷任雖行推勘而縱其抵欺指望恩赦此有罪而不誅者六也秀州倚郭嘉興縣人訴災州縣昏虐不時受理臨以鞭朴使民相驚自相蹈藉死者四十餘人雖加按治而知州章衡反得美職擢守大郡此有罪而不誅者七也近日差除户部尚書以下十餘人其間人材粗允公議者不過二三人其它多老病之餘及執政所厚善耳臣與僚佐共議以為不可勝言是以置而不論獨取其尤不可者杜常王子韶二人論之然皆不蒙施行夫杜常在熙寧間諂事吕惠卿兄弟注解惠卿所撰手實文字分配五常比之經典及其所至謬妄取笑四方其在都司希合時忱任永夀等旨意施之政事前後屢為臺官所劾兼其人物凡猥學術荒謬而置之太常禮樂之地命下之日士人無不掩口竊笑此無功受賞者一也王子韶昔在三司條例司諂事王安石創立青苗助役之法臣時與之共事實所親見及吕公著為御史中丞舉為臺官公著以言新政罷去而子韶隱忍不言先帝覺其姦妄親批聖語指其罪狀自是以來士人不復比數但以善事權要子弟故前後多得美官今又擢之祕書指日循例當得侍從公議所惜實在於此此無功而受賞者二也張淳資才凡下從第二任知縣擢為開封司録曾未數月厭其繁劇求為寺監丞即得將作又不數月令權開封推官意欲因權即真迤邐遷上此無功而受賞者三也丁恂罷少府簿經年不得差遣一為韓維女壻即時擢為將作監丞此無功而受賞者四也其因緣親舊馳騖請謁特從常調與之堂除以至除目猥多待闕久逺孤寒失望中外嗟怨者尚不可勝數凡上件事皆刑政不修紀綱敗壞之實也大率近嵗所為類多如此譬如天時有春夏而無秋冬萬物雖得生育而不堅成天之應人頗以類至宜指揮大臣令巳行者即加改正未行者無踵前失勉強修飭以答天變臣伏見去年嵗在庚午世俗所傳本非善嵗徒以二聖至仁無私德及上下故此凶歲化為有年然事有過差猶不免常燠無氷之異由此觀之天地雖逺得失之應無一可欺若更能恐懼修省戒飭在位相勉為善則太平之功庶幾可致也臣備位執法實欲使陛下比隆堯舜無缺可指無災可救是以區區獻言不覺煩多死罪死罪取進止唐宋八大家文鈔卷一百四十六
