body:
  text: 唐宋八大家文鈔卷一百六十二明茅坤撰潁濱文鈔十八序引傳古今家誡序引老氏語多儉故能廣四字老子曰慈故能勇儉故能廣或曰慈則安能勇曰父母之於子也愛之深故其為之慮事也精以深愛而行精慮故其為之避害也速而就利也果此慈之所以能勇也非父母之賢於人勢有所必至矣轍少而讀書見父母之戒其子者諄諄乎惟恐其不盡也惻惻乎惟恐其不入也曰嗚呼此父母之心也哉師之於弟子也為之規矩以授之賢者引之不賢者不彊也君之於臣也為之號令以戒之能者豫之不能者不取也臣之於君也可則諌否則去子之於父也以幾諌不敢顯皆有禮存焉父母則不然子雖不肖豈有棄子者哉是以盡其有以告之無憾而後止詩曰泂酌彼行潦挹彼注茲可以餴饎豈弟君子民之父母夫雖行潦之陋而無所棄猶父母之無棄子也故父母之於子人倫之極也雖其不賢及其為子言也必忠且盡而況其賢者乎太常少卿長沙孫公景修少孤而教於母母賢能就其業既老而念母之心不忘為賢母録以致其意既又集古今家誡得四十九人以示轍曰古有為是書者而其文不完吾病焉是以為合衆父母之心以遺天下之人庶幾有益乎轍讀之而歎曰雖有悍子忿鬬於市莫之能止也聞父之聲則斂手而退市人之過之者亦莫不泣也慈孝之心人皆有之特患無以發之耳今是書也要將以發之歟雖廣之天下可也自周公以來至於今父戒四十五母戒四公又將益廣之未止也古史序其思深故其㫖逺古之帝王皆聖人也其道以無為為宗萬物莫能嬰之其於為善如水之必寒如火之必熱其於不為不善如騶虞之不殺如竊脂之不榖不學而成不勉而得其積之中者有餘故其推之以治天下者有不可得而知也孔氏之遺書曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉天地萬物猶將賴之以存而況於人乎自三代之衰聖人不作世不知本而馳騁於喜怒哀樂之餘故其發於事業日以鄙陋不足以希聖人之萬一雖春秋之際王澤未竭士生其間習於禮義而審於利病如管仲晏子子産叔向之流皆不足以知之至於孔子其知之者至矣而未嘗言孟子知其一二時以告人而天下亦莫能信也陵遲及於秦漢士益以功利為急言聖人者皆以其所知臆之儒者流於度數而智者溺於權利皆不知其非也太史公始易編年之法為本紀世家列傳記五帝三王以來後世莫能易之然其為人淺近而不學踈略而輕信漢景武之間尚書古文詩毛氏春秋左氏皆不列於學官世能讀之者少故其記堯舜三代之事皆不得聖人之意戰國之際諸子辨士各自著書或增損古事以自信一時之說遷一切信之甚者或採世俗相傳之語以易古文舊說及秦焚書戰國之史不傳於民間秦惡其議巳也焚之略盡幸而野史一二存者遷亦未暇詳也故其記戰國有數年不書一事者余竊悲之故因遷之舊上觀詩書下考春秋及秦漢雜録始伏羲神農訖秦始皇帝為七本紀十六世家三十七列傳謂之古史追録聖賢之遺意以明示來世至於得失成敗之際亦備論其故嗚呼由數千嵗之後言數千嵗之前其詳不可得矣幸其猶有存者而或又失之此古史之所為作也唐荆川曰前一段叙古史所載之意後一段敘作古史之由元祐㑹計録序此子由經國之文須細尋繹之臣聞漢祖入關蕭何收秦圖籍周知四方盈虛彊弱之實漢祖賴之以并天下丙吉為相胸奴嘗入雲中代郡吉使東曹考按邊瑣條其兵食之有無與將吏之才否逡巡進對指揮遂定由此觀之古之人所以運籌帷幄之中制勝千里之外者圖籍之功也蓋事之在官必見於書其始無不具者獨患多而易忘久而易滅數十歲之後人亡而書散其不可考者多矣唐李吉甫始簿録元和國計并包巨細無所不具國朝三司使丁謂等因之為景德皇祐治平熙寧四書網羅一時出內之計首尾八十餘年本末相授有司得以居今而知昔參酌同異因時施宜此前人作書之本意也臣以不佞待罪地官上承元豐之餘業親覩二聖之新政時事之變易財賦之登耗可得而言也謹按藝祖皇帝創業之始海內分裂租賦之入不能半今世然而宗室尚鮮諸王不過數人仕者寡少自朝廷郡縣皆不能備官士卒精練常以少克衆用此三者故能奮於不足之中而綽然常若有餘及其列國欵附琛貢相屬於道府庫充塞創景福內庫入畜金帛為殄寇之䇿太宗因之克平太原真宗繼之懷服契丹二患既弭天下安樂日登富庶故咸平景德之間號稱太平羣臣稱頌功德不知所以裁之者於是請封泰山祀汾隂禮亳社屬車所至費以巨萬而上清昭應崇禧景靈之宫相繼而起纍世之積糜耗多矣其後昭應之災臣下復以營繕為言大臣力爭章獻感悟沛然遂與天下休息仁宗仁聖清心省事以幸天下然而民物蕃庶未復其舊而夏賊竊發邊久無偹遂命益兵以應敵急征以養兵雖間出內藏之積以求紓民而四方騷然民不安其居矣其後西戎既平而已益之兵不復遂汰加以宗子蕃衍充牣宮邸官吏冗積貟溢於位財之不贍為日久矣英宗嗣位慨然有救弊之意羣臣竦觀幾見日新之政而大業未遂神考嗣世忿流弊之委積閔財力之傷耗覽政之初為富國彊兵之計有司奉承違失本㫖始為青苗助役以病農民繼為市易鹽鐵以困商賈利孔百出不専於三司於是經入竭於上民力屈於下繼以南征交趾西討拓跋用兵之費一日千金雖內帑别藏時有以助之而國亦憊矣今二聖臨御方恭默無為求民之疾苦而療之令之不便無不釋去民亦少休矣而西夏不賓水旱繼作凡國之用度大率多於前世當此之時而不思所以濟之豈不殆哉臣厯觀前世持盈守成艱於創業之君蓋盈之必溢而成之必毁物理之至有不可逃者盈成之間非有德者不安非有法者不久昔秦隋之盛非無法也內建百官外列郡縣至於漢唐因而行之卒不能改然皆二世而亡何者無德以為安也漢文帝恭儉寡欲専務以德化民民富而國治後世莫及然身沒之後七國作難幾於亂亡晉武帝削平吳蜀任賢使能容受直言有明主之風然而亡不旋踵子弟內叛羌戎外亂遂以失國此二帝者皆無法以為久也今二聖之治安而靜仁而恕德積於世秦隋之憂臣無所措心矣然而空匱之極法度不立雖無漢晉强臣敵國之患而數年之後國用曠竭臣恐未可安枕而卧也故臣願得終言之凡㑹計之實取元豐之八年而其為别有五一曰民賦二曰收支三曰課入四曰儲運五曰經費五者既具然後著之以見在列之以通表而天下之大計可以畫地而談也若夫內藏右曹之積與天下封樁之實非昔三司所領則不入㑹計將著之他書以偹觀覽焉臣謹序民賦序此等文並子由經濟處直寫胸臆而非以為文文之至者也古之民政有不可復者三焉自祖宗以來論事者嘗以為言而為政者嘗試其事矣然為之愈詳而民愈擾事之愈力而功愈難其故何哉古者隱兵於農無事則耕有事則戰安平之世無廪給之費征伐之際得勤力之士此儒者之所歎息而言也然而熙寧之初為保甲之令民始嫁母贅子斷壞支體以求免丁及其既成子弟挾縣官之勢以邀其父兄擅弓劒之技以暴其鄉黨至今河朔京東之盜皆保甲之餘也其後元豐之中為保馬之法使民計産養馬畜馬者衆馬不可得民至持金帛買馬於江淮小不中度輒斥不用郡縣嵗時閲視可否權在醫駔民不堪命民兵之害乃至於此此所謂不可復者一也周官泉府之制凡民之貸者以國服為之息貸而求息三代之政有不然者矣詩曰倬彼甫田嵗取十千我取其陳食我農人自古有年而孟子亦云春省耕而補不足秋省斂而助不給古蓋有是道矣而未必有常數亦未必有常息也至於熙寧青苗之法凡主客户得相保任而貸其息嵗取十二出入之際吏緣為姦請納之勞民費自倍凡自官而及私者率取二而得一自私而入公者率輸十而得五錢積於上布帛米粟賤不可售嵗暮寒苦吏卒在門民號無告二十年之間民無貧富家産盡耗此所謂不可復者二也古者治民必周知其夫家田畝六畜器械之數未有不知其數而能制其貧富者也未有不能制其貧富而能得其心者也故三代之君開井田畫溝洫謹步畝嚴版圖因口之衆寡以授田因田之厚薄以制賦經界既定仁政自成下及隋唐風流巳逺然其授民田有口分永業皆取之於官其斂民財有租庸調皆計之於口其後世亂法壞變為兩稅户無主客以見居為簿人無丁中以貧富為差田之在民其漸由此貿易之際不可復知貧者急於售田則田多而稅少富者利於避役則田少而稅多僥幸一興稅役皆弊故丁謂之紀景德田況之紀皇祐皆以均稅為言矣然嘉祐中薛向孫琳始議方田量步畝審肥瘠以定賦稅之人熙寧中呂惠卿復建手實抉私隱崇告訐以實貧富之等元豐中李琮追究逃絶均虛數虐編戶以補失陷之稅此三者皆為國斂怨所得不補所失事不旋踵而罷此所謂不可復者三也故臣愚以謂國者當務實而巳不求其名誠使民盡力耕田賦輸以養兵終身無復征戍之勞而朝廷招募勇力强狡之民教之戰陳以衛良民二者各得其利亦何所不可哉富民之家取有餘以貸不足雖有倍稱之息而子本之債官不為理償進之日布縷菽粟雞豚狗彘百物皆售州縣晏然處曲直之斷而民自相養蓋亦足矣至於田賦厚薄多寡之異雖小有不齊而安靜不撓民樂其業賦以時入所失無幾因其交易而責其欺隱繩之以法亦足以禁其太甚昔宇文融括諸道客戶州縣觀望虛張其數以實戶為客雖得戶八十餘萬嵗得錢數百萬而百姓困弊實名天寶之亂均稅之害何以異此凡此三者皆儒者平昔之所稱頌以為先王之遺法用之足以致太平者也然數十年以來屢失而屢敗足以為後世好名者之戒耳惟嘉祐以前百役在民衙前大者主倉庫躬饋運小者治燕饗職迎送破家之禍易於反掌至於州縣役人皆貪官暴吏之所誅求仰以為生者先帝深求其病鬻坊場以募衙前均役錢以雇諸役使民得闔門治生而吏不敢呵問有司奉行不得其當坊場求數倍之價役錢取寬剩之積而民始困躓不堪其生矣今二聖覽觀前事知其得失之實既盡去保甲青苗均稅至於役法舉差雇之中惟便民者取之郡縣奉承雖未即能盡而天下之民知天子之愛我矣故臣於民賦之篇備論其得失俾後有考焉唐荆川曰平正通達不求為竒而勢如長江大河是小蘇之所長也收支敘古者三年耕必有一年之蓄以三十年之通制國用則九年之蓄可跂而待也今者一嵗之入金以兩計者四千三百而其出之不盡者二千七百銀以兩計者五萬七千而其出之多者六萬錢以千計者四千八百四十八萬除米鹽錢後得此數而其出之多者一百八十二萬此言未破應在及泛支給賜得此數紬絹以匹計者一百五十一萬而其出之多者十七萬榖以石計者二千四百四十五萬而其出之不盡者七十四萬草以束計者七百九十九萬而其出之多者八百一十一萬然則一嵗之入不足以供夫一嵗之出矣故凡國之經費折長補短常患不足小有非常之用有司輒求之朝廷待內藏米鹽而後足臣身典大計以為是偷嵗月可也數嵗之後將有不勝其憂者矣是以輒嘗推原其故方今禁中奉養有度金玉錦繡不逾其舊宮室不修犬馬不玩有司循守法制謹視出入之節未嘗有失也而其弊安在天下久安物盛而用廣亦理之常也顧所以處之何如耳臣請厯舉其數宗室之衆皇祐節度使三人今為九人矣兩使留後一人今為八人矣觀察使一人今為十五人矣防禦使四人今為四十二人矣百官之富景德大夫三十九人景德為諸曹郎中今為二百三十人矣朝奉郎以上一百六十五人景德為員外郎今為六百九十五人矣承議郎一百二十七人景德中為博士今為三百六十九人矣奉議郎一百四十八人景德為三丞今為四百二十一人矣諸司使二十七人今為二百六十八人矣副使六十一人今為一千一百一十人矣供奉官一百九十三人今為一千三百二十二人矣侍禁三百一十六人今為二千一百一十七人矣三省之吏六十人今為一百七十二人矣其餘可以類推臣不敢遍舉也昔者郎止前行卿有定員今之大夫朝議皆無限法尚書侍郎厯改三曹而今之正議銀青合而為一官秩并增不知其義夫國之財賦非天不生非地不養非民不長取之有法收之有時止於是矣而宗室官吏之衆可以禮法節也祖宗之世士之始有常秩者俟闕則補否則循資而已不妄授也仁宗末年任子之法自宰相以下無不減損英宗之初三載考績增以四嵗神宗之始宗室袒免之外不復推恩袒免之內以試出仕此四事者使今世欲為之將以為逆人心違舊法不可言也而況於行之乎雖然祖宗行之不疑當世亦莫之非向者事勢既極不變則敗衆人之所共知也今朝廷履至極之勢獨持之而不敢議臣實疑之誠自今日而議之因其勢循其理微為之節文使見任者無損而來者有限今雖未見其利要之十年之後事有間矣賈誼言諸侯之變以謂失今不治必為痼疾今臣亦云茍能裁之天下之幸也子瞻和陶淵明詩集引文不著意而神理自鑄東坡先生謫居儋耳置家羅浮之下獨與幼子過負擔渡海葺茅竹而居之日啖蒣芋而華屋玉食之念不存於胸中平生無所嗜好以圖史為園囿文章為鼓吹至此亦皆罷去獨喜為詩精深華妙不見老人衰憊之氣是時轍亦遷海康書來告曰古之詩人有擬古之作矣未有追和古人者也追和古人則始於東坡吾於詩人無所甚好獨好淵明之詩淵明作詩不多然其詩質而實綺癯而實腴自曹劉鮑謝李杜諸人皆莫及也吾前後和其詩凡百有九篇至其得意自謂不甚愧淵明今將集而并録之以遺後之君子子為我志之然吾於淵眀豈特好其詩也哉如其為人實有感焉淵明臨終疏告儼等吾少而窮苦每以家貧東西逰走性剛才拙與物多忤自量為己必貽俗患黽俯辭世使汝等幼而饑寒淵明此語蓋實録也吾今真有此病而不蚤自知半生出仕以犯世患此所以深服淵明欲以晚節師範其萬一也嗟夫淵明不肯為五斗米一束帶見鄉里小兒而豫瞻出仕三十餘年為獄吏所折困終不能悛以陷於大難乃欲以桑榆之末景自託於淵明其誰肯信之雖然子瞻之仕其出處進退猶可考也後之君子其必有以處之矣孔子曰述而不作信而好古竊比於我老彭孟子曰曾子子思同道區區之迹蓋未足以論士也轍少而無師子瞻既冠而學成先君命轍師焉子瞻嘗稱轍詩有古人之風自以為不若也然自其斥居東坡其學日進沛然如川之方至其詩比杜子美李太白為有餘遂與淵明比轍雖馳驟從之常出其後其和淵明轍繼之者亦一二焉紹聖四年二月二十九日海康城南東齊引巢谷傳敘谷豪舉處有生色可愛巢谷字元修父中世眉山農家也少從士大夫讀書老為里校師谷幼傳父學雖朴而博舉進士京師見舉武藝者心好之谷素多力遂棄其舊學畜弓箭習騎射久之業成而不中第聞西邊多驍勇騎射擊刺為四方冠去逰秦鳯涇原間所至友其秀傑有韓存寶者尤與之善谷教之兵書二人相與為金石交熙寧中存寶為河州將有功號熙河名將朝廷稍竒之會瀘州蠻乞弟擾邊諸郡不能制乃命存寶出兵討之存寶不習蠻事邀谷至軍中問焉及存寶得罪將就逮自料必死謂公曰我涇原武夫死非所惜顧妻子不免寒餓橐中有銀數百兩非君莫可使遺之者谷許諾即變姓名懷銀步行往授其子人無知者存寶死谷逃避江淮間㑹赦乃出豫以鄉閭故幼而識之知其志節緩急可託者也豫之在朝谷浮沉里中未嘗一見紹聖初豫以罪謫居筠州自筠徙雷自雷徙循豫兄子瞻亦自惠再徙昌化士大夫皆諱與豫兄弟遊平生親友無復相聞者谷獨慨然自眉山誦言欲徒步訪吾兄弟聞者皆笑其狂元符二年春正月自梅州遺豫書曰我萬里步行見公不自意全今至梅矣不旬日必見死無恨矣豫驚喜曰此非今世人古之人也既見握手相泣巳而道平生逾月不厭時谷年七十有三矣瘦瘠多病非復昔日元修也將復見子瞻於海南豫愍其老且病止之曰君意則善然自此至儋數千里復當渡海非老人事也谷曰我自視未即死也公無止我留之不可閲其槖中無數千錢豫方乏困亦强資遣之船行至新㑹有蠻𨽻竊其槖裝以逃獲於新州谷從之至新遂病死豫聞哭之失聲恨其不用吾言然亦竒其不用吾言而行其志也昔趙襄子厄於晉陽智伯率韓魏決水圍之城不沒者三版縣釡而㸑易子而食羣臣皆懈惟髙恭不失人臣之禮及襄子用張孟談計三家之危解行賞羣臣以恭為先談曰晉陽之難惟恭無功曷為先之襄子曰晉陽之難羣臣皆懈惟恭不失人臣之禮吾是以先之谷於朋友之義實無愧髙恭者惜其不遇襄子而前遇存寶後遇豫兄弟豫方雜居南夷與之起居出入蓋將終焉雖知其賢尚何以發之聞谷有子蒙在涇原軍中故為作傳異日以授之谷始名榖及見之循州改今名云唐宋八大家文鈔卷一百六十二
