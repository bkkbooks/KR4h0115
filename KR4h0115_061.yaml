body:
  text: 唐宋八大家文鈔卷五十八明茅坤撰廬陵文鈔三十墓表石曼卿墓表以悲慨帶敘事歐陽公知得曼卿如印在心故描畫得會哭會笑曼卿諱延年姓石氏其上世為幽州人幽州入于契丹其祖自成始以其族間走南歸天子嘉其來將祿之不可乃家于宋州之宋城父諱補之官至太常博士幽燕俗徑武而曼卿少亦以氣自豪讀書不治章句獨慕古人奇節偉行非常之功視世俗屑屑無足動其意者自顧不合於時乃一混于酒然好劇飲大醉頽然自放由是益與時不合而人之從其遊者皆知愛曼卿落落可奇而不知其才之有以用也年四十八康定二年二月四日以太子中允祕閣挍理卒于京師曼卿少舉進士不第真宗推恩三舉進士皆補奉職曼卿初不肯就張文節公素奇之謂曰母老乃擇祿耶曼卿矍然起就之遷殿直久之改太常寺太祝知濟州金鄉縣歎曰此亦可以為政也縣有治聲通判乾寧軍丁母永安縣君李氏憂服除通判永靜軍皆有能名充館閣挍勘纍遷大理寺丞通判海州還為挍理莊獻明肅太后臨朝曼卿上書請還政天子其後太后崩范諷以言見幸引嘗言太后事者遽得顯官欲引曼卿曼卿固止之乃己自契丹通中國德明盡有河南而臣屬遂務休兵養息天下晏然內外弛武三十餘年曼卿上書言十事不報己而元昊反西方用兵始思其言召見稍用其説籍河北河東陜西之民得鄉兵數十萬曼卿奉使籍兵河東還稱旨賜緋衣銀魚天子方思盡其才而且病矣既而聞邊將有欲以鄉兵捍賊者笑曰此得吾粗也夫不教之兵勇怯相雜若怯者見敵而動則勇者亦率而潰矣今或不暇教不若募其敢行者則人人皆勝兵也其視世事蔑若不足為及聽其施設之方雖精思深慮不能過也狀貌偉然喜酒自豪若不可繩以法度退而質其平生趣舍大節無一悖於理者遇人無賢愚皆盡欣歡及可否天下是非善惡當其意者無幾人其為文章徑健稱其意氣有子濟滋天子聞其喪官其一子使祿其家既卒之三十七日葬于太清之先塋其友歐陽修表於其墓曰嗚呼曼卿寧自混以為高不少屈以合世可謂自重之士矣士之所負者愈大則其自顧也愈重自顧愈重則其合愈難然欲與共大事立奇功非得難合自重之士不可為也古之魁雄之人未始不負高世之志故寧或毁身汚迹卒困于無聞或老且死而幸一遇猶克少施于世若曼卿者非徒與世難合而不克所施亦其不幸不得至乎中壽其命也夫其可哀也夫尚書屯田員外郎李君墓表串情如匹練漢水東至乾德匯而南民居其衝水悍暴而岸善崩然其民尤富完其下南山之材治室屋聚居蓋數千家皆安然易漢而自若者以有石隄為可恃也景祐五年余始為其縣令既行漢上臨石隄問其長老皆曰吾李君之作也於是喟然而嘆求李君者得其孫厚厚舉進士好學能自言其世云李氏貝州清河人君舉進士中淳化三年乙科鎮州真定主簿齊化基為吏以強察自喜惡君亷直不為屈多求事可釀為罪者責君理之君辨愈明不可汚卒服其能反薦之遷威虜軍判官河北轉運使又薦為冀州軍事判官吏部籍凡四較考者外皆召還公考當召是時契丹侵邊冀州獨乞留君督軍餉課為最多遷大理寺丞乘傳治壁州疑獄既還轉運使又請通判冀州督旁七縣軍餉課尤多而民不勞遭嵗飢悉出庾粟以貸民且曰凶豐甚必復使豐而歸諸庾是化吾朽積而為新乃兩利也轉運使以為然因請君益貸貝魏滄棣諸州後嵗果豐飢民德君粟歸諸庾無後者蓋賴而活者數十萬家居三年轉運使上冀人言乞留許留一嵗就拜殿中丞嵗滿將去冀民夜私入其府塹其居若不可出君諭之乃得去通判河南未行契丹兵指邢洺天子擇吏之能者改君通判邢州其守趙守一當守邢以扞寇辭不任邢事天子曰李某佐汝可無患守一至邢悉以州事任君御史中丞王嗣宗辟推直官遂薦為御史以疾不拜求知光化軍作所謂石隄者孫何薦其材拜三司戶部判官改知建州皆以疾辭又求知漢陽軍居三嵗而漢陽之獄空者二嵗卒以疾解退居于漢旁大中祥符六年五月某日卒於家遂葬縣東遵教鄉之友于村子孫因留家焉君諱仲芳字秀之享年五十有三官至尚書屯田員外郎君為人敦敏而材以疾中止余聞古之有德於民者殁則鄉人祭於其社今民既不能祠君於漢之旁而其墓幸在其縣余令也又不表以示民嗚呼其何以章乃德俾其孫刻石于隧以永君之揚內殿崇班薛君墓表此篇公以先為志故不欲復為表於以婉其文如此公諱孰字宗道姓薛氏資政殿學士兵部尚書簡肅公之弟薛之世德終始有簡肅公之志與碑公官至內殿崇斑以某年某月某日卒官于蜀州其子仲儒以其喪歸葬于絳州之正平先葬而來乞銘以志豫幸嘗紀次簡肅公之德而又得銘公其銘曰公躬直清官以材稱惟賢是似不愧其兄既葬而仲孺又來請曰銘之藏誠以永吾先君于不朽然不若碣于隧以表見于世之昭昭也豫惟薛氏於綘為著姓簡肅公於公為兄弟而公之世德豫既見之銘而其子又欲碣以昭顯于世可謂孝矣然豫考古所謂賢人君子功臣烈士之所以銘見于後世者其言簡而著及後世衰言者自疑於不信始繁其文而猶患於不章又備其行事惟恐不為世之信也若薛氏之著于綘簡肅公之信于天下而子之銘公不愧于其兄則公之銘不待繁言而信也然其行事終始豫亦不敢略而志諸墓矣今之碣者無以加焉則取其可以簡而著者書之以慰其子之孝思而信于綘之人云連處士墓表表處士並從里人之感欷處著色自是一法長厚之行長厚之言連處士應山人也以一布衣終于家而應山之人至今思之其長老教其子弟所以孝友恭謹禮讓而溫仁必以處士為法曰為人如連公足矣其矜寡孤獨凶荒飢饉之人皆曰自連公亡使吾無所告依而生以為恨嗚呼處士居應山非有政令恩威以親其人而能使人如此其所謂行之以躬不言而信者歟處士諱舜賓字輔之其先閩人自其祖光裕嘗為應山令後為磁郢二州推官卒而反葬應山遂家焉處士少舉毛詩一不中而其父正以疾廢于家處士供養左右十餘年因不復仕進父卒家故多資悉散以賙鄉里而教其二子以學曰此吾資也嵗飢出穀萬斛以糶而市穀之價卒不能增及旁近縣之民皆賴之盜有竊其牛者官為捕之甚急盜窮以牛自歸處士為之愧謝曰煩爾送牛厚遺以遣之嘗以事之信陽遇盜於西關左右告以處士盜曰此長者不可犯也捨之而去處士有弟居雲夢往省之得疾而卒以其柩歸應山應山之人去縣數十里迎哭爭負其柩以還過縣市市人皆哭為之罷市三日曰當為連公行喪處士生四子曰庶庠庸膺其二子教以學者後皆舉進士及第今庶為壽春令庠為宜城令處士以天聖八年十二月某日卒慶厯二年某月日葬于安陸蔽山之陽自卒至今二十年應山之長老識處士者與其縣人嘗賴以為生者往往尚皆在其子弟後生聞處士之風者尚未逺使更三四世至于孫曾其所傳聞有時而失則懼應山之人不復能知處士之詳也乃表其墓以告于後云八年閏正月一日廬陵歐陽修述尚書屯田員外郎張君墓表通篇交情上相絫欷君諱谷字應之世為開封尉氏人曾祖節祖遇皆不仕父炳為鄭州原武縣主簿因留家焉今為原武人也君舉進士及第為河陽河南主簿蘇州觀察推官開封府士曹參軍遷著作佐郎知陽武縣通判眉州纍遷屯田員外郎復知陽武縣以疾致仕卒于家享年五十有九君為人剛介好學問事父母孝與朋友信其為吏潔亷所至有能稱其在河南時豫為西京留守推官與謝希深尹師魯同在一府其所與遊雖他掾屬賓客多材賢少壯馳騁於一時而君居其間年尚少獨苦羸病肺吐血者已十餘年幸其疾少間輒亦從諸君飲酒諸君愛而止之君曰我豈久生者耶雖他人視君亦若不能勝朝夕者其後同府之人皆解去而希深師魯與當時少壯馳騁者喪其十八九而君癯然唾血如故後二十年始以疾卒君雖病羸而力自為善居官為吏未嘗廢學問多為賢士大夫所知乃知夫康強者不可恃以久而羸弱者未必不能生雖其遲速長短相去幾何而強者不自勉或死而泯滅於無聞弱者能自力則必有稱于後世君其是已君嘗謂子曰吾旦暮人耳無所取于世也尚何區區於仕哉然吾常哀祿之及於親者薄若幸得不死而官登于朝冀竊國家褒贈之寵以榮其親然後歸病子原武之廬足矣乃益買田治室於原武以待君自河南蘇州纍為名公卿所薦乃遷著作為郎官贈其父太子中允母宋氏京兆縣太君於是遂致仕歸于原武營其德政鄉之張固村原將葬其親十以皇祐五年十一月某日用事前四日君亦卒遂以某日從葬于原上豫與君遊久記其昔所謂豫者且哀君之賢而不幸又嘉君之志信而有成於其葬也不及銘乃表於其墓君娶祝氏封華陽縣君有子曰損試將作監主簿至和二年三月七日歐陽修撰永春縣令歐君墓表以三人同里同志行特不同遇處相感慨君諱慶字貽孫姓歐氏其上世為韶州曲江人後徙均州之鄖鄉又徙襄州之穀城乾德二年分榖城之隂城鎮為乾德縣建光化軍歐氏遂為乾德人修嘗為其縣令問其故老鄉閭之賢者皆曰有三人焉其一人曰太傅贈太師中書令鄧文懿公其一人曰尚書屯田郎中戴國忠其一人曰歐君也三人者學問出處未嘗一日不同其忠信篤於朋友孝悌稱於宗族禮義達于鄉閭乾德之人初未識學者見此三人皆尊禮而愛親之既而皆以進士舉於鄉而君獨黜於有司後二十年始以同三禮出身為潭州湘潭主簿陳州司法參軍監考城酒稅遷彭州軍事推官知泉州永春縣事而鄧公已貴顯于朝君尚為州縣吏所至上官多鄧公故舊君絶口不復道前事至終其去不知君為鄧公友也君為吏亷貧宗族之孤幼者皆養于家居鄉里有訟者多就君決曲直得一言遂不復爭人至于今傳之嗟夫三人之為道無所不同至其窮達何其異也而三人者未嘗有動於其心也乾德之人稱三人者亦不以貴賤為異則其幸不幸豈足為三人者道哉然而達者昭顯于一時而窮者泯沒於無述則為善者何以勸而後世之來者何以考德於其先故表其墓以示其子孫君有子世英為鄧城縣令世績舉進士君以天聖七年卒享年六十有四葬乾德之西北廣節山之原河南府司録張君墓表通篇交情相感欷更比諸篇有生色文章中之國風也故大理寺丞河南府司録張君諱汝士字堯夫開封襄邑人也明道二年八月壬寅以疾卒于官享年三十有七卒之七日葬洛陽北邙山下其友人河南尹師魯志其墓而廬陵歐陽修為之銘以其葬之速也不能刻石乃得金谷古甎命太原王顧以丹為𨽻書納于壙中嘉祐二年某月某日其子吉甫山甫改葬君于伊闕之教忠鄉積慶里君之始葬北邙也吉甫才數嵗而山甫始生余及送者相與臨冗視窆且封哭而去今年春余主試天下貢士而山甫以進士試禮部乃來告以將改葬其先君因出銘以示余蓋君之卒距今二十有五年矣初天聖明道之間錢文僖公守河南公王家子特以文學仕至貴顯所至多招集文士而河南吏屬適皆當時賢材知名士故其幕府號為天下之盛君其一人也文僖公善待士未嘗責以吏職而河南又多名山水竹林茂樹奇花怪石其平臺清池上下荒墟草莽之間余得日從賢人長者賦詩飲酒以為樂而君為人靜默修潔常坐府治事省文書尤盡心於獄訟初以辟為其府推官既罷又辟司録河南人多賴之而守尹屢薦其材君亦工書喜為詩間則從余遊其語言簡而有意飲酒終日不亂雖醉未嘗頽墮與之居者莫不服其德故師魯志之曰飭身臨事余嘗愧堯夫堯夫不余愧也始君之葬皆以其地不善又葬速其禮不備君夫人崔氏有賢行能教其子而二子孝謹克自樹立卒能改葬君如吉卜君其可謂有後矣自君卒後文僖公得罪貶死漢東吏屬亦各引去今師魯死且十餘年王顧者死亦六七年矣其送君而臨冗者及與君同府而遊者十蓋八九死矣其幸而在者不老則病且衰如豫是也嗚呼盛衰生死之際未始不如是是豈足道哉惟為善者能有後而託於文字者可以無窮故於其改葬也書以遺其子碑碣於墓且以寫余之思焉吉甫今為大理寺丞知緱氏縣山甫始以進士賜出身云太常博士周君墓表變調以孝行一節立其總槩相為感慨始終有篤行君子曰周君者孝於其親友於其兄弟居父母喪與其兄某弟某居于倚廬不飲酒食肉者三年其言必戚其哭必哀除喪而癯然不能勝人事者蓋久而後復自孔子在魯而魯人不能行三年之喪其弟子疑以為問則非魯而他國可知也孔子歿而其後世又可知也今世之人知事其親者多矣或居喪而不哀者有矣生能事而死能哀或不知喪禮者有矣或知禮而以謂喪主於哀而已不必合於禮者有矣如周君者事生盡孝居喪盡哀而以禮者也禮之失久矣喪禮尤廢也今之居喪者惟仕宦婚嫁聽樂不為此特法令之所禁爾其衰麻之數哭泣之節居處之别飲食之變皆莫知夫有禮也在上位者不以身率其下在下者無所望於其上其遂廢矣乎故吾於周君有所取也君諱堯卿字子俞道州永明縣人也天聖二年舉進士纍官至太常博士厯連衡二州司理參軍桂州司録知高安寧化二縣通判饒州未行以慶厯五年六月朔日卒于朝集之舍享年五十有一皇祐五年某月日葬于道州永明縣之紫微岡曾祖諱某祖諱某父諱某贈某官母唐氏封某縣太君娶某氏封某縣君君學長於毛鄭詩左氏春秋家貧不事生産喜聚書居官祿雖薄常分俸以賙宗族朋友人有慢已者必厚為禮以愧之其為吏所居皆有能政有文集二十卷君有子七人曰諭鼎州司理參軍曰詵湖州歸安主簿曰謐曰諷曰諲曰説曰誼皆未仕嗚呼孝非一家之行也所以移於事君而忠仁於宗族而睦交於朋友而信始於一鄉推之四海表于金石示之後世而勸考君之所施者無不可以書也豈獨俾其子孫之不隕也哉右班殿直贈右羽林軍將軍唐君墓表撰次封君墓表此為最調嘉祐四年冬天子既受夾享之福推恩羣臣並進爵秩既又以及其親若在若亡無有中外逺邇於是天章閣待制尚書戶部員外郎唐君得贈其皇考驍衛府君為右羽林將軍府君諱拱字某其先晉原人後徙為錢塘人曾祖諱休復唐天復中舉明經為建威軍節度推官祖諱仁恭仕吳越王為唐山縣令纍贈諫議大夫父諱謂官至尚書職方郎中纍贈禮部尚書府君以父廕補太廟齋郎改三斑借職再遷右斑殿直監舒州孔城鎮澧州酒稅巡檢泰州鹽場漳州兵馬監押乾興元年七月某日以疾卒于官享年四十有六府君孝悌于其家信義於其朋友亷讓於其鄉里其居於官名公巨人皆以為材而未及用也享年不永君子哀之有子曰介字子方舉進士皇祐中嘗為御史以言事切直貶春州别駕當是時子方之風竦動天下已而天子感悟貶未至而復用之今列待從居諌官自子方為祕書丞始贈府君為太子右清道率府率其為尚書主客員外郎殿中侍御史裏行又贈府君為右監門衛將軍其為尚書工部員外郎直集賢院權開封府判官又贈府君為右屯衛將軍其遷戶部員外郎河東轉運使又贈府君為驍衛將軍蓋自登于朝以至榮顯遇天子有事于天地宗廟推恩必及焉府君初娶博陵崔氏贈仙遊縣太君後娶崔氏贈清河縣太君皆衛尉卿仁冀之女生一男介也五女長適太子中舍盧圭次適歐陽昊早卒次適橫州推官高定次適進士陸平仲次適著作佐郎陳起慶厯三年入月某日以府君及二夫人之喪合葬于江陵龍山之東原後十有七年廬陵歐陽修乃表於其墓曰嗚呼余於此見朝廷所以褒寵勸勵臣子之意豈不厚哉又以見士之為善者雖湮沒幽鬱其潛德隱行必有時而發而遲速顯晦在其子孫然則為人之子者其可不自勉哉蓋古之為子者祿不逮養則無以及其親矣今之為子者有克自立則尚有榮名之寵焉其所以教人之孝者篤于古也深矣子方進用于時其所以榮其親者未知其止也姑立表以待焉胡先生墓表胡安定生平所著見者師道一節故通篇摹寫盡在此先生諱瑗字翼之姓胡氏其上世為陵州人後為泰州如臯人先生為人師言行而身化之使誠明者達昏愚者勵而頑傲者革故其為法嚴而信為道久而遵師道廢久矣自景祐明道以來學者有師惟先生暨泰山孫明復石守道三人而先生之徒最盛其在湖州之學弟子去來常數百人各以其經轉相傳授其教學之法最備行之數年東南之士莫不以仁義禮樂為學慶厯四年天子開天章閣與大臣講天下事始慨然詔州縣皆立學於是建太學於京師而有司請下湖州取先生之法以為太學法至今為著令後十餘年先生始來居太學學者自逺而至太學不能容取旁官署以為學舍禮部貢舉嵗所得士先生弟子十常居四五其高第者知名當時或取甲科居顯仕其餘散在四方隨其人賢愚皆循循雅飭其言談舉止不問可知為先生弟子其學者相語稱先生不問可知為胡公也先生初以白衣見天子論樂拜祕書省挍書郎辟丹州軍事推官改密州觀察推官丁父憂去職服除為保寧軍節度推官遂居湖學召為諸王宫教授以疾免己而以太子中舍致仕遷殿內丞於家皇祐中驛召至京師議樂後以為大理評事兼太常寺主簿又以疾辭嵗餘為光祿寺丞國子監直講乃居太學遷大理寺丞賜緋衣銀魚嘉祐元年遷太子中允充天章閣侍講仍居太學已而病不能朝天子數遣使者存問又以太常博士致仕東歸之日太學之諸生與朝廷賢士大夫送之東門執弟子禮路人嗟歎以為榮以四年六月六日卒于杭州享年六十有七以明年十月五日葬于烏程何山之原其世次官邑與其行事莆陽蔡君謨具志于幽堂嗚呼先生之德在乎人不待表而見於後世然非此無以慰學者之思乃揭于其墓之原六年八月三日廬陵歐陽修述瀧岡阡表幼孤而欲表父之德也於其母之言故為得體嗚呼惟我皇考崇公卜吉于瀧岡之六十年其子修始克表於其阡非敢緩也蓋有待也修不幸生四嵗而孤太夫人守節自誓居貧自力於衣食以長以教俾至於成人太夫人告之曰汝父為吏亷而好施與喜賓客其俸祿雖薄常不使有餘曰毋以是為我纍故其亡也無一瓦之覆一壠之植以庇而為生吾何恃而能自守耶吾於汝父知其一二以有待於汝也自吾為汝家婦不及事吾姑然知汝父之能養也汝孤而幼吾不能知汝之必有立然知汝父之必將有後也吾之始歸也汝父免於母喪方逾年嵗時祭祀則必涕泣曰祭而豐不如養之薄也間御酒食則又涕泣曰昔常不足而今有餘其何及也吾始一二見之以為新免於喪適然耳既而其後常然至其終身未嘗不然吾雖不及事姑而以此知汝父之能養也汝父為吏嘗夜燭治官書屢廢而歎吾問之則曰此死獄也我求其生不得爾吾曰生可求乎曰求其生而不得則死者與我皆無恨也矧求而有得邪以其有得則知不求而死者有恨也夫常求其生猶失之死而世常求其死也回顧乳者抱汝而立于旁因指而歎曰術者謂我嵗行在戍將死使其言然吾不及見兒之立也後當以我語告之其平居教他子弟常用此語吾耳熟焉故能詳也其施於外事吾不能知其居於家無所矜飾而所為如此是真發於中者邪嗚呼其心厚於仁者邪此吾知汝父之必將有後也汝其勉之夫養不必豐要於孝利雖不得博於物要其心之厚於仁吾不能教汝此汝父之志也修泣而志之不敢忘先公少孤力學咸平三年進士及第為道州判官泗綿二州推官又為泰州判官享年五十有九葬沙溪之瀧岡太夫人姓鄭氏考諱德儀世為江南名族太夫人恭儉仁愛而有禮初封福昌縣太君進封樂安安康彭城三郡太君自其家少微時治其家以儉約其後常不使過之曰吾兒不能茍合於世儉薄所以居患難也其後修貶夷陵太夫人言笑自若曰汝家故貧賤也吾處之有素矣汝能安之吾亦安矣自先公之亡二十年修始得祿而養又十有二年列官于朝始得贈封其親又十年修為龍圖閣直學士尚書吏部郎中留守南京大夫人以疾終于官舍享年七十有二又八年修以非才入副樞密遂參政事又七年而罷自登二府天子推恩褒其三世蓋自嘉祐以來逢國大慶必加寵錫皇曾祖府君纍贈金紫光祿大夫太師中書令曾祖妣纍封楚國太夫人皇祖府君纍贈金紫光祿大夫太師中書令兼尚書令祖妣纍封吳國太夫人皇考崇公纍贈金紫光祿大夫太師中書令兼尚書令皇妣纍封越國太夫人今上初郊皇考賜爵為崇國公太夫人進號魏國於是小子修泣而言曰嗚呼為善無不報而遲速有時此理之常也惟我祖考積善成德宜享其隆雖不克有於其躬而賜爵受封顯榮褒大實有三朝之錫命是足以表見於後世而庇賴其子孫矣乃列其世譜具刻于碑既又載我皇考崇公之遺訓太夫人之所以教而有待於修者並揭于阡俾知夫小子修之德薄能鮮遭時竊位而幸全大節不辱其先者其來有自熙寧三年嵗次庚戌四月辛酉朔十有五日乙亥男推誠保德崇仁翊戴功臣觀文殿學士特進行兵部尚書知青州軍州事兼管內勸農使充京東東路安撫使上柱國樂安郡開國公食邑四干三百戶食實封一千二百戶修表集賢挍理丁君墓表獨解知端州一事甚可誦君諱寶臣字元珍姓丁氏常州晉陵人也景祐元年舉進士及第為峽州軍事判官淮南節度掌書記杭州觀察判官改太子中允知剡縣徙知端州遷太常丞博士坐海賊儂智高陷城失守奪一官徙置黃州久之復得太常丞監湖州酒稅又復博士知諸暨縣編挍祕閣書籍遂為挍理同知太常禮院君為人外和怡而內謹立望其容貌進趨知其君子人也居鄉里以文行稱少孤與其兄篤於友悌兄亡服喪三年曰吾不幸幼失其親兄吾父也慶厯中詔天下大興學挍東南多學者而湖杭尤盛君居杭學為教授以其素所學問而自修於鄉里者教其徒久而學者多所成就其後天子患館閣職廢特置編挍八員其選甚精乃自諸暨召居祕閣君治州縣聽決精明賦役有法民畏信而便安之其始治剡也如此後治諸暨剡鄰邑也其民聞其來歡曰此剡人愛而思之謂不可復得者也今吾民乃幸而得之而君亦以治剡者治之由是所至有聲及居閣下淡然不以勢利動其心未嘗走謁公卿與諸學士羣居恂恂人皆愛親之蓋其召自諸暨也以才行選及在館閣久而朝廷益知其賢英宗每論人物屢稱之國家自削除僣偽東南遂無事偃兵弛備者六十餘年矣而嶺外尤甚其山海荒濶列郡數十皆為下州朝廷命吏常以一縣視之故其守無城其戍無兵一日智高乘不備陷雍州殺將吏有衆萬餘人順流而下潯梧封康諸小州所過如破竹吏民皆望而散走獨君猶率羸卒百餘拒戰殺六七人既敗亦走初賊未至君語其下曰幸得兵數千人伏小湘峽扼至險以擊驕兵可必勝也乃請兵於廣州凡九請不報又嘗得賊覘者一人斬之賊既平議者謂君文學宜居臺閣備侍從以承顧問而眇然以一儒者守空城提百十飢羸之卒當萬人卒至之賊可謂不幸而天子亦以謂縣官不素設備而責守吏不以空手捍賊宜原其情故一切輕其法而君以嘗請兵不得又能拒戰殺賊則又輕之故他失守者皆奪兩官而君奪一官已而知其賢復召用後十餘年御史知雜蘇寀受命之明日建言請復治君前事奪其職而黜之天子知君賢不可以一眚廢而先帝已察其罪而輕之矣又數更大赦且罪無再坐然猶以御史新用故屈君使少避而不傷之也乃用其挍理嵗滿所當得者即以君通判永州方待闕於晉陵以治平四年四月某甲子暴中風眩一夕卒享年五十有八纍官至尚書司封員外郎階朝奉郎勳上輕車都尉曾祖諱某祖諱某皆不仕父諱某贈尚書工部侍郎母張氏仙遊縣太君君娶饒氏封晉陵縣君先卒子男四人曰隅曰除曰隮皆舉進士曰恩兒才一嵗女一人適著作佐郎集賢挍理胡宗愈君既卒天子憫然推恩録其子隅為太廟齋郎君之平生履憂患而遭困厄處之安焉木嘗見戚戚之色其於窮達壽夭知有命固無憾於其心然知君之賢哀其志而惜其命止於斯者不能無恨也於是相與論著君之大節伐石紀辭以表見於後世庶幾以慰其思焉丁元珍失守端州一節生平瑕指處歐陽公曲意摹畫以覆之唐宋八大家文鈔卷五十八
