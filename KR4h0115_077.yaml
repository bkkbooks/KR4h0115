body:
  text: 唐宋八大家文鈔卷七十三明茅坤撰廬陵史鈔十三雜傳李茂貞傳唐之所以困而及亡由茂貞為之祟什且六七歐公序次如畫李茂貞深州博野人也本姓宋名文通為博野軍卒戍鳳翔黃巢犯京師鄭畋以博野軍擊賊茂貞以功自隊長遷軍校光啓元年朱玫反僖宗出居興元玫遣王行瑜攻大散關茂貞與保鑾都將李鋌等敗行瑜於大唐峯明年玫遂敗死茂貞以功自扈蹕都頭拜武定軍節度使賜以姓名扈蹕東歸至鳳翔鳳翔節度使李昌符與天威都頭楊守立爭道以兵相攻昌符不勝走隴州僖宗遣茂貞追擊殺昌符以功拜鳯翔隴右節度使大順元年封隴西郡王二年樞密使楊復恭得罪奔於興元興元節度使楊守亮復恭之養子也納之茂貞乃上書言復恭父子罪皆當誅因自請為山南招討使昭宗以宦者故難之未許茂貞擅發兵攻破興元復恭父子見殺茂貞表其子繼密權知興元軍府事昭宗乃徙茂貞為山南西道節度使以宰相徐彥若鎮鳳翔茂貞不奉詔上表自論曰伹慮軍情忽變戎馬難羈徒令甸服生靈因兹受弊未審乘輿播越自此何之昭宗以茂貝表辭不遜不能忍以問宰相杜讓能讓能以謂茂貞地大兵強而唐力未可以致討鳳翔又近京師易以自危而難於後悔他日雖欲誅朝錯以謝諸侯恐不能也昭宗怒曰吾不能孱孱坐受凌弱乃責讓能治兵而以覃王嗣周為京西招討使令下京師市人皆知不可相與聚承天門遮宰相請無舉兵爭投瓦石擊宰相宰相下輿而走亡其堂印人情大恐昭宗意益堅覃王率扈駕軍五十四都戰于盩厔唐軍敗潰茂貞遂犯京師屯于三橋昭宗御安福門殺兩樞密以謝茂貞使罷兵茂貞與讓能素有隙因曰謀舉兵者非兩樞密乃讓能也陳兵臨皋驛請殺讓能讓能曰臣固先言之矣惟殺臣可以紓國難昭宗泣下沾襟貶讓能雷州司户參軍賜死茂貞乃罷兵明年河中節度使王重盈卒其諸子珂珙爭立晉王李克用請立珂茂貞與韓建王行瑜請立珙昭宗不許茂貞等怒率三鎮兵犯京師謀廢昭宗立吉王保未果而晉王亦舉兵茂貞懼乃殺宰相韋昭度李磎留其養子繼鵬以兵二千宿衛而去晉兵至河中繼鵬與行瑜弟行實等爭劫昭宗出奔京師大亂昭宗出居于石門茂貞以兵至鄠縣斬繼鵬自贖晉兵已破王行瑜還軍渭北請擊茂貞昭宗以謂晉逺而茂貞近因欲庇之以為德而冀緩急之可恃也且茂貞已殺其子而自贖矣乃詔罷歸晉軍克用歎曰唐不誅茂貞憂未已也昭宗自石門還益募安聖捧宸等軍萬餘人以諸王將之茂貞謂唐將討已亦治兵請覲京師大恐居人亡入山谷茂貞遂犯京師昭宗遣覃王拒之覃王至三橋軍潰昭宗出居於華州遣宰相孫偓以兵討茂貞韓建為茂貞請乃已久之加拜茂貞尚書令封岐王其後昭宗為宦者所廢既反正宰相崔胤欲借梁兵誅諸宦者隂與梁太祖謀之中尉韓全誨等亦倚茂貞之強以為外援茂貞遣其子繼筠以兵數千宿衛京師宦者恃岐兵益驕不可制天復元年胤召梁太祖以西梁軍至同州全誨等懼與繼筠劫昭宗幸鳯翔梁軍圍之逾年茂貞每戰輒敗閉壁不敢出城中薪食俱盡自冬涉春雨雪不止民凍餓死者日以千數米斗直錢七千至燒人屎煮尸而食父自食其子人有爭其肉者曰此吾子也汝安得而食之人肉斤直錢百狗肉斤直錢五百父甘食其子而人肉賤於狗天子於宫中設小磨遣宫人自屑豆麥以供御自後宫諸王十六宅凍餒而死者日三四城中人相與邀遮茂貞求路以為生茂貞窮急謀以天子與梁以為解昭宗謂茂貞曰朕與六宫皆一日食粥一日食不托安能不與梁和乎三年正月茂貞與梁約和斬韓全誨等二十餘人傳首梁軍梁圍解天子雖得出然梁遂劫東遷而唐亡茂貞非惟亡唐亦自困矣及梁太祖即位諸侯之強者皆相次稱帝獨茂貞不能但稱岐王開府置官屬以妻為皇后鳴梢羽扇視朝出入擬天子而已茂貞居岐以寬仁愛物民頗安之嘗以地狹賦薄下令𣙜油因禁城門無內松薪以其可為炬也有優者誚之曰臣請并禁月明茂貞笑而不怒初茂貞破楊守亮取興元而邠寧鄜坊皆附之有地二十州其被梁圍也興元入于蜀開平己後邠寧鄜坊入于梁秦鳯階成又入于蜀當梁末年所有七州而已莊宗已破梁茂貞稱岐王上箋以季父行自處及聞入洛乃上表稱臣遣其子從曮來朝莊宗以其耆老甚尊禮之改封秦王詔書不名同光二年以疾卒年六十九諡曰忠敬溫韜傳溫韜之發諸陵萬世所共憤咽而流涕者也溫韜京兆華原人也少為盜後事李茂貞為華原鎮將冒姓李名彥韜茂貞以華原縣為耀州以韜為刺史梁太祖圍茂貞於鳳翔韜以耀州降梁已而復叛歸茂貞茂貞又以美原縣為鼎州建義勝軍以韜為節度使末帝時韜復叛茂貞降梁改耀州為崇州鼎州為裕州義勝軍為靜勝軍即以韜為節度使復其姓溫更其名曰昭圖韜在鎮七年唐諸陵在其境內者悉發掘之取其所藏金寶而昭陵最固韜從埏道下見宫室制度閎麗不異人間中為正寢東西廂列石牀牀上石函中為鐵匣悉藏前世圖書鍾王筆迹紙墨如新韜悉取之遂傳人間惟乾陵風雨不可發其後朱友謙叛梁取同州晉王以兵援友謙而趨華原韜懼求徙他鎮遂徙忠武莊宗滅梁韜自許來朝因伶人景進納賂劉皇后皇后為言之莊宗待韜甚厚賜姓名曰李紹沖郭崇韜曰此劫陵賊爾罪不可赦莊宗曰已宥之矣不可失信遽遣還鎮明宗入洛與假凝俱收下獄已而赦之勒歸田里明年流于德州賜死嗚呼厚葬之弊自秦漢以來率多聰明英偉之主雖有髙談善説之士極陳其禍福有不能開其惑者矣豈非富貴之欲溺其所自私者篤而未然之禍難述於無形不足以動其心歟然而聞溫韜之事者可以少戒也五代之君往往不得其死何暇顧其後哉獨周太祖能鑒韜之禍其將終也為書以遺世宗使以瓦棺紙衣而斂將葬開棺示人既葬刻石以告後世毋作下宫毋置守陵妾其意丁寧切至然實録不書其葬之薄厚也又使葬其平生所服衮冕通天冠絳紗袍各二其一于京師其一于澶州又葬其劒甲各二其一于河中其一于大名者莫能原其旨也朱宣傳內朱瑾行事甚倔強狙狡可鄙而歐公語次風神可掬朱宣宋州下邑人也少從其父以販鹽為盜父抵法死宣乃去事青州節度使王敬武為軍校敬武以𨽻其將曹全晟中和二年敬武遣全晟入關與破黃巢還過鄆州鄆州節度使薛崇卒其將崔君預自稱留後全晟攻殺君預遂據鄆州宣以戰功為鄆州馬步軍都指揮使已而全晟死軍中推宣為留後唐僖宗即拜宣天平軍節度使梁太祖鎮宣武以兄事宣太祖新就鎮兵力尚少數為秦宗權所困太祖乞兵於宣宣與其弟瑾以兖鄆之兵救汴大破蔡兵走宗權是時太祖已襲取滑州稍欲并吞諸鎮宣瑾既還乃馳檄兖鄆言宣瑾多誘宣武軍卒亡以東乃發兵收亡卒因攻之遂為敵國苦戰曹濮間是時梁又東攻徐州西有蔡賊而北敵強晉宣瑾兄弟自相首尾然卒為梁所滅乾寧四年宣敗走中都為葛從周所執斬于汴橋下瑾宣從父弟也從宣居鄆州補軍校少倜儻有大志兖州節度使齊克讓愛其為人以女妻之瑾行親迎乃選壯士為輿夫伏兵器輿中夜至兖州兵發遂虜克讓自稱留後僖宗即拜瑾泰寧軍節度使瑾與宣已破秦宗權於汴州梁太祖責瑾誘宣武軍卒以歸遣朱珍攻瑾取曹州又攻濮州而太祖自攻鄆瑾兄弟往來相救凡十餘年大小數十戰與太祖屢相勝敗太祖得宣將賀瓌何懷寶及瑾兄瓊乃將瓊等至兖城下告瑾曰汝兄敗矣今瓊等已降不如早自歸瑾偽曰諾乃遣牙將胡規持書幣詣軍門請降太祖大喜至延夀門與瑾交語瑾曰願得瓊來送符印太祖信之遣客將劉捍送瓊往瑾伏壯士橋下單騎迎瓊揮手語捍曰請瓊獨來瓊前壯士擒之遂閉門責瓊先降斬之擲其首城外太祖度不可下乃留兵圍之而去瑾嬰城自守而宣亦敗於鄆州乃乞兵於晉晉遣李承嗣史儼等以騎兵五千救之太祖已破宣乃急趨兖瑾城中食盡與承嗣等掠食豐沛間梁兵奄至瑾將康懷英等以城降梁瑾等將麾下兵走沂州沂州刺史尹處賔不納又走海州梁兵急追之乃奔于淮南楊行密聞瑾來大喜解其玉帶贈之表瑾領武寧軍節度使以為行軍副使其後梁遣龎師古葛從周等攻淮南行密用瑾大破梁兵於清口斬師古行密纍表瑾東南諸道行營副都統領平盧軍節度使同中書門下平章事行密死渥及隆演相繼立皆年少徐溫與其子知訓専政畏瑾欲除之瑾乃謀殺知訓嘗以月旦遣愛妾候知訓家知訓強通之妾自歸訴瑾益不平屢勸隆演誅徐氏以去國患隆演不能為既而知訓以泗州建靜淮軍出瑾為節度使將行召之夜飲明日知訓過瑾謝延之升堂出其妻陶氏知訓方拜瑾以笏擊踣之伏兵自户突出殺之初瑾以二惡馬繫庭中知訓入而釋馬使相踶鳴故外人莫聞其變瑾擕其首馳示隆演曰今日為吳除患矣隆演曰此事非吾敢知遽起入內瑾忿然以首擊柱提劍而出府門已闔因踰垣折其足瑾顧路窮大呼曰吾為萬人去害而一身死之遂自刎潤州徐知誥聞亂以兵趨廣陵族瑾家瑾妻陶氏臨刑而泣其妾曰何為泣乎今行見公矣陶氏收淚欣然就戮聞者哀之瑾名重江淮人畏之其死也尸之廣陵北門路人私共瘞之是時民多病瘧皆取其墓上土以水服之云病輒愈更益新土漸成髙墳徐溫等惡之發其尸投於雷公塘後溫病夢瑾挽弓射之溫懼網其骨葬塘側立祠其上初瑾嘗病疽醫者視之色懼瑾曰但理之吾非以病死者於是果然卒年五十二趙犨傳趙犨其先青州人也世為陳州牙將犨幼與羣兒戲道中部分行伍指顧如將帥雖諸大兒皆聽其節度其父叔文見之驚曰大吾門者此兒也及壯善用弓劍為人勇果重氣義刺史聞其材召至麾下纍遷忠武軍馬步軍都虞候王仙芝寇河南陷汝州將犯東都犨引兵擊敗之仙芝乃南去已而黃巢起所在州縣往往陷賊陳州豪傑數百人相與請忠武軍求得犨為刺史以自保忠武軍表犨陳州刺史已而巢陷長安犨語將吏曰以吾計巢若不為長安市人所誅必驅其衆東走吾州適當其衝矣乃治城池為守備遷民六十里內者皆入城中選其子弟配以兵甲以其弟昶珝為將巢敗果東走先遣孟楷據項城昶擊破之執楷以歸巢從後至聞楷被執大怒既而秦宗權以蔡州附巢巢勢甚盛乃悉其衆圍犨置舂磨塞縻人之肉以為食陳人大恐犨語其下曰吾家三世陳將必能保此爾曹男子當於死中求生建功立業未必不因此時陳人皆踴躍巢柵城北三里為八仙營起宫闕置百官聚糧餉欲以久弊之其兵號二十萬陳州舊有弓弩數百皆廢壞後生弩工皆不識其器珝創意理之弓矢激五百步人馬皆洞以故巢不敢近圍凡三百日犨食將盡乃乞兵於梁梁太祖與李克用皆自將會陳擊敗巢將黃鄴于西華西華有積粟巢恃以為餉及鄴敗巢乃解圍去梁太祖入陳州犨兄弟迎謁馬首甚恭然犨隂識太祖必成大事乃降心屈迹為自托之計以梁援已恩為太祖立生祠朝夕拜謁以其子巖尚太祖女是謂長樂公主黃巢已去秦宗權復亂淮西陷旁二十餘州而陳去蔡最近犨兄弟力拒之卒不能下後巢宗權皆敗死唐昭宗即以陳州為忠武軍拜犨節度使犨已病乃以位與其弟昶後數月卒昶乘大寇新滅乃休兵課農事梁尤謹梁兵攻戰四方昶饋挽供億未嘗少懈昶卒珝代立珝頗知書乃求鄧艾故迹決翟王陂溉民田兄弟居陳二十餘年陳人大賴之梁太祖已降韓建取同華徙珝為同州留後入唐為右金吾衛上將軍嵗餘以疾免官歸陳卒于家陳人為之罷市犨次子巖梁末帝時為户部尚書租庸使與張漢傑漢倫等居中用事梁自太祖以暴虐殺戮為事而末帝為人特和柔恭謹然性庸愚以漢傑婦家而巖壻也故親信之梁之大臣老將皆切齒末帝獨不悟以至於亡初友圭弒太祖自立以末帝為東都留守巖如東都末帝與之飲酒從容以誠欵告之巖為末帝謀遣人召楊師厚兵起事巖還西都卒與袁象先以禁兵誅友圭取傳國寶以授末帝末帝立巖自以有功於梁又尚公主聞唐駙馬杜悰位至將相自奉甚豐恥其不及乃占天下良田大宅裒刻商旅其門如市租庸之物半入其私巖一飲食必費萬錢故時魏州牙兵驕數為亂羅紹威盡誅之太祖崩楊師厚逐羅氏據魏州復置牙兵二千人末帝患之師厚死巖與租庸判官邵贊議曰魏為唐患百有餘年自先帝時嘗切齒紹威以其前恭而後倨今先帝新棄天下師厚復為陛下憂所以然者以魏地大而兵多也陛下不以此時制之寧知後人不為師厚邪不若分相魏為兩鎮則無北顧之憂矣末帝以為然乃分相澶衛為昭德軍牙兵亂以魏博降晉梁由是盡失河北是時梁將劉鄩等與莊宗相拒澶魏之間兵數敗巖曰古之王者必郊祀天地陛下即位猶未郊天議者以為朝廷無異藩鎮如此何以威重天下今河北雖失天下幸安願陛下力行之敬翔以為不可曰今府庫虛竭箕斂供軍若行郊禋則必賞賚是取虛名而受實弊也末帝不聽乃備法駕幸西京而莊宗取楊劉或傳晉兵入東都矣或曰扼汜水矣或曰下鄆濮矣京師大風拔木末帝大懼從官相顧而泣末帝乃還東都遂不果郊鎮州張文禮殺王鎔使人告梁曰臣己北召契丹願梁以兵萬人出德棣州則晉兵憊矣敬翔以為然巖與漢傑皆以為不可乃止其後出王彥章用段凝皆巖力也莊宗兵將至汴末帝惶惑不知所為登建國樓以問羣臣羣臣或曰晉以孤軍逺來勢難持久雖使入汴不能守也宜幸洛陽保險以召天下兵徐圖之勝負未可知也末帝猶豫巖曰勢已如此一下此樓何人可保末帝卒死於樓上當巖用事時許州溫韜尤曲事巖巖因顧其左右曰吾常待韜厚今以急投之必不幸吾為利乃走投韜韜斬其首以獻莊宗已滅梁巖素所善段凝奏請誅巖家屬乃滅族之嗚呼禍福之理豈可一哉君子小人之禍福異也老子曰禍兮福所倚福兮禍所伏後世之談禍福者皆以其言為至論也夫為善而受福焉得禍為惡而受禍焉得福惟君子之罹非禍者未必不為福小人之求非福者未嘗不及禍此自然之理也始犨自以先見之明深結梁大祖及其子孫皆享其祿利自謂知所托矣安知其族卒與梁俱滅也犨之求福於梁蓋老氏之所謂福也非君子之所求也可不戒哉唐宋八大家文鈔卷七十三
