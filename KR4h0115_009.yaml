body:
  text: 唐宋八大家文鈔巻九明茅坤撰昌黎文鈔九原論議原道闢佛老是退之一生命脉故此文是退之集中命根其文源逺流洪最難鑒定兼之其筆下變化詭譎足以眩人若一下打破分明如時論中一冐一承六腹一尾博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎巳無待於外之謂徳仁與義為定名道與徳為虚位故道有君子小人而徳有凶有吉老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁子孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂徳徳其所徳非吾所謂徳也凡吾所謂道徳云者合仁與義言之也天下之公言也老子之所謂道徳云者去仁與義言之也一人之私言也周道衰孔子没火于秦黄老于漢佛於晉魏梁隋之間其言道徳仁義者不入於楊則入于墨不入於老則入于佛入于彼必出乎此入者主之出者奴之入者附之出者汙之噫後之人其欲聞仁義道德之説孰從而聴之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其説樂其誕而小也亦曰吾師亦嘗云爾不惟舉之於其口而又筆之於其書噫後之人雖欲聞仁義道徳之説其孰從而求之甚矣人之好怪也不求其端不訊其末惟怪之欲聞古之為民者四今之為民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盗也古之時人之害多矣有聖人者立然後教之以相生相養之道為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣饑然後為之食木處而顛土處而病也然後為之宫室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之𦵏埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其湮鬱為之政以率其怠勌為之刑以鋤其强梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之害至而為之備患生而為之防今其言曰聖人不死大盗不止剖斗折衡而民不争嗚呼其亦不思而巳矣如古之無聖人人之類滅久矣何也無羽毛鱗介以居寒熱也無爪牙以争食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器皿通貨財以事其上者也君不出令則失其所以為君臣不行君之令而致之民民不出粟米麻絲作器皿通貨財以事其上則誅今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清淨寂滅者嗚呼其亦幸而出于三代之後不見黜于禹湯文武周公孔子也其亦不幸而不出于三代之前不見正于禹湯文武周公孔子也帝之與王其號雖殊其所以為聖一也夏葛而冬裘渴飲而饑食其事雖殊其所以為智一也今其言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責饑之食者曰曷不為飲之之易也傳曰古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外天下國家滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之進於中國則中國之經曰夷狄之有君不如諸夏之亡詩曰戎狄是膺荆舒是懲今也舉夷狄之法而加之先王之教之上幾何其不胥而為夷也夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待于外之謂徳其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賔主昆弟夫婦其服麻絲其居宫室其食粟米果蔬魚肉其為道易明而其為教易行也是故以之為己則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神格廟焉而神鬼享曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與楊也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其説長然則如之何而可也曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡孤獨廢疾者有養也其亦庶乎其可也退之一生闢佛老在此篇然到底是説得老子而已一字不入佛氏域盖退之元不知佛氏之學故佛骨表亦只以福田上立説原性性之㫖孟氏没而周程始能言之昌黎原不見得特按三家之言而剖析之如此然於天命之原已隔一二層矣性也者與生俱生也情也者接於物而生也性之品有三而其所以為性者五情之品有三而其所以為情者七曰何也曰性之品有上中下三上焉者善焉而已矣中焉者可導而上下也下焉者惡焉而巳矣其所以為性者五曰仁曰禮曰信曰義曰智上焉者之於五也主於一而行於四中焉者之於五也一不少有焉則少反焉其於四也混下焉者之於五也反於一而悖於四性之於情視其品情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其中中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也情之於性視其品孟子之言性曰人之性善荀子之言性曰人之性惡楊子之言性曰人之性善惡混夫始善而進惡與始惡而進善與始也混而今也善惡皆舉其中而遺其上下者也得其一而失其二者也叔魚之生也其母視之知其必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為大戚知若敖氏之鬼不食也人之性果善乎后稷之生也其母無災其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽瞍之舜鯀之禹習非不惡也而卒為聖人之性善惡果混乎故曰三子之言性也舉其中而遺其上下者也得其一而失其二者也曰然則性之上下者其終不可移乎曰上之性就學而愈明下之性畏威而寡罪是故上者可教而下者可制也其品則孔子謂不移也曰今之言性者異於此何也曰今之言者雜佛老而言也雜佛老而言也者奚言而不異原毁此萹八大比秦漢来故無此調昌黎公創之然感慨古今之間因而摹寫人情曲鬯骨裏文之至者古之君子其責已也重以周其待人也輕以約重以周故不怠輕以約故人樂為善聞古之人有舜者其為人也仁義人也求其所以為舜者責於已曰彼人也予人也彼能是而我乃不能是早夜以思去其不如舜者就其如舜者聞古之人有周公者其為人也多才與藝人也求其所以為周公者責於已曰彼人也予人也彼能是而我乃不能是早夜以思去其不如周公者就其如周公者舜大聖人也後世無及焉周公大聖人也後世無及焉是人也乃曰不如舜不如周公吾之病也是不亦責於身者重以周乎其於人也曰彼人也能有是是足為良人矣能善是是足為藝人矣取其一不責其二即其新不究其舊恐恐然惟懼其人之不得為善之利一善易修也一藝易能也其於人也乃曰能有是是亦足矣曰能善是是亦足矣不亦待於人者輕以約乎今之君子則不然其責人也詳其待巳也㢘詳故人難於為善㢘故自取也少已未有善曰我善是是亦足矣巳未有能曰我能是是亦足矣外以欺於人内以欺於心未少有得而止矣不亦待其身者已㢘乎其於人也曰彼雖能是其人不足稱也彼雖善是其用不足稱也舉其一不計其十究其舊不圖其新恐恐然惟懼其人之有聞也是不亦責於人者巳詳乎夫是之謂不以衆人待其身而以聖人望於人吾未見其尊巳也雖然為是者有本有原怠與忌之謂也怠者不能修而忌者畏人修吾嘗試之矣嘗試語於衆曰某良士某良士其應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必怒於言懦者必怒於色矣又嘗語於衆曰某非良士某非良士其不應者必其人之與也不然則其所疎逺不與同其利者也不然則其畏也不若是强者必説於言懦者必説於色矣是故事修而謗興徳髙而毁来嗚呼士之處此世而望名譽之光道徳之行難已將有作於上者得吾説而存之其國家可幾而理歟原人昌黎不明性命之原故原人篇殊無見解姑録而存之形於上者謂之天形於下者謂之地命於其兩間者謂之人形於上日月星辰皆天也形於下草木山川皆地也命於其兩間夷狄禽獸皆人也曰然則吾謂禽獸人可乎曰非也指山而問焉曰山乎曰山可也山有草木禽獸皆舉之矣指山之一草而問焉曰山乎曰山則不可故天道亂而日月星辰不得其行地道亂而草木山川不得其平人道亂而夷狄禽獸不得其情天者日月星辰之主也地者草木山川之主也人者夷狄禽獸之主也主而暴之不得其為主之道矣是故聖人一視而同仁篤近而舉逺原鬼昌黎原鬼亦揣摩影響之言易曰精氣為物游魂為變是故知鬼神之情狀有嘯於梁從而燭之無見也斯鬼乎曰非也鬼無聲有立於堂從而視之無見也斯鬼乎曰非也鬼無形有觸吾躬從而執之無得也斯鬼乎曰非也鬼無聲與形安有氣曰鬼無聲也無形也無氣也果無鬼乎曰有形而無聲者物有之矣土石是也有聲而無形者物有之矣風霆是也有聲與形者物有之矣人獸是也無聲與形者物有之矣鬼神是也曰然則有怪而與民物接者何也曰是有二有鬼有物漠然無形與聲者鬼之常也民有忤於天有違於民有爽於物逆於倫而感於氣於是乎鬼有形於形有慿於聲以應之而下殃禍焉皆民之為之也其既也又反乎其常曰何謂物曰成於形與聲者土石風霆人獸是也反乎無聲與形者鬼神是也不能有形與聲不能無形與聲者物怪是也故其作而接於民也無恒故有動於民而為禍亦有動於民而為福亦有動於民而莫之為禍福適丁民之有是時也作原鬼省試顔子不貳過論韓公未必知顔子之學特以其省試之文也存之論曰登孔氏之門者衆矣三千之徒四科之目孰非由聖人之道為君子之儒者乎其於過行過言亦云鮮矣而夫子舉不貳過惟顔氏之子其何故哉請試論之夫聖人抱誠明之正性根中庸之至徳茍發諸中形諸外者不惟思慮莫匪規矩不善之心無自入焉可擇之行無自加焉故惟聖人無過所謂過者非謂發於行彰於言人皆謂之過而後為過也生於其心則為過矣故顔子之過此類也不貳者盖能止之於始萌絶之於未形不貳之於言行也中庸曰自誠明謂之性自明誠謂之教自誠明者不勉而中不思而得從容中道聖人也無過者也自明誠者擇善而固執之者也不勉則不中不思則不得不貳過者也故夫子之言曰囬之為人也擇乎中庸得一善則拳拳服膺而弗失之矣又曰顔氏之子其殆庶幾乎言猶未至也而孟子亦曰顔子具聖人之體而微者皆謂不能無生於其心而亦不暴之於外考之於聖人之道差為過耳顔子自惟其若是也於是居陋巷以致其誠飲一瓢以求其志不以富貴妨其道不以隠約易其心確乎不㧞浩然自守知髙堅之可尚忘鑚仰之為勞任重道逺竟莫之致是以夫子歎其不幸短命今也則亡謂其不能與已並立於至聖之域觀教化之大行也不然夫行發於身加於人言發乎邇見乎逺茍不慎也敗辱隨之而後思欲不貳過其於聖人之道不亦逺乎而夫子尚肯謂之其殆庶幾孟子尚復謂之具體而微者哉則顔子之不貳過盡在是矣謹論爭臣論截然四問四答而首尾闗鍵如一線或問諫議大夫陽城於愈可以為有道之士乎哉學廣而聞多不求聞於人也行古人之道居於晉之鄙晉之鄙人薰其徳而善良者幾千人大臣聞而薦之天子以為諫議大夫人皆以為華陽子不色喜居於位五年矣視其徳如在野彼豈以富貴移易其心哉愈應之曰是易所謂恒其徳貞而夫子凶者也惡得為有道之士乎哉在易蠱之上九云不事王侯髙尚其事蹇之六二則曰王臣蹇蹇匪躬之故夫不以所居之時不一而所蹈之徳不同也若蠱之上九居無用之地而致匪躬之節以蹇之六二在王臣之位而髙不事之心則冐進之患生曠官之刺興志不可則而尤不終無也今陽子在位不為不乆矣聞天下之得失不為不熟矣天子待之不為不加矣而未嘗一言及於政視政之得失若越人視秦人之肥瘠忽焉不加喜戚於其心問其官則曰諫議也問其禄則曰下大夫之秩也問其政則曰我不知也有道之士固如是乎哉且吾聞之有官守者不得其職則去有言責者不得其言則去今陽子以為得其言乎哉得其言而不言與不得其言而不去無一可者也陽子將為禄仕乎古之人有云仕不為貧而有時乎為貧謂䘵仕者也宜乎辭尊而居卑辭富而居貧若抱闗擊柝者可也盖孔子嘗為委吏矣嘗為乗田矣亦不敢曠其職必曰㑹計當而已矣必曰牛羊遂而已矣若陽子之秩禄不為卑且貧章章明矣而如此其可乎哉或曰否非若此也夫陽子惡訕上者惡為人臣招其君之過而以為名者故雖諫且議使人不得而知焉書曰爾有嘉謀嘉猷則入告爾后於内爾乃順之於外曰斯謀斯猷惟我后之徳夫陽子之用心亦若是者愈應之曰若陽子之用心若此滋所謂惑者矣入則諫其君出不使人知者大臣宰相者之事非陽子之所宜行也夫陽子本以布衣隠於蓬蒿之下主上嘉其行誼擢在此位官以諫為名誠宜有以奉其職使四方後代知朝廷有直言骨鯁之臣天子有不僭賞從諫如流之美庶巖穴之士聞而慕之束帶結髪願進於闕下而伸其辭説致吾君於堯舜熙鴻號於無窮也若書所謂則大臣宰相之事非陽子之所宜行也且陽子之心將使君人者惡聞其過乎是啓之也或曰陽子之不求聞而人聞之不求用而君用之不得巳而起守其道而不變何子過之深也愈曰自古聖人賢士皆非有求於聞用也閔其時之不平人之不乂得其道不敢獨善其身而必以兼濟天下也孜孜矻矻死而後已故禹過家門不入孔席不暇暖而墨突不得黔彼二聖一賢者豈不知自安逸之為樂哉誠畏天命而悲人窮也夫天授人以賢聖才能豈使自有餘而已誠欲以補其不足者也耳目之於身也耳司聞而目司見聴其是非視其險易然後身得安焉聖賢者時人之耳目也時人者聖賢之身也且陽子之不賢則將役於賢以奉其上矣若果賢則固畏天命而閔人窮也惡得以自暇逸乎哉或曰吾聞君子不欲加諸人而惡訐以為直者若吾子之論直則直矣無乃傷於德而費於辭乎好盡言以招人過國武子之所以見殺於齊也吾子其亦聞乎愈曰君子居其位則思死其官未得位則思修其辭以明其道我將以明道也非以為直而加人也且國武子不能得善人而好盡言於亂國是以見殺傳曰惟善人能受盡言謂其聞而能改之也子告我曰陽子可以為有道之士也今雖不能及己陽子將不得為善人乎哉省試學生代齋郎議齋郎職奉宗廟社稷之小事葢士之賤者也執豆籩駿奔走以役於其官之長不以德進不以言揚葢取其人力以備其事而已矣奉宗廟社稷之小事執豆籩駿奔走亦不可以不敬也於是選大夫士之子弟未爵命者以塞員填闕而教之行事其勤雖小其使之不可以不報也必書其歳歳既久矣於是乎命之以官而授之以事其亦微矣哉學生或以通經舉或以能文稱其微者至於習法律知字書皆有以贊於教化可以使令於上者也自非天資茂異曠日經久以所進業發聞於鄉閭稱道於朋友薦於州府而升之司業則不可得而齒乎國學矣然則奉宗廟社稷之小事任力之小者也贊於教化可以使令於上者德藝之大者也其亦不可移易明矣今議者謂學生之無所事謂齋郎之幸而進不本其意因謂可以代任其事而罷之葢亦不得其理矣今夫齋郎之所事者力也學生之所事者德與藝也以德藝舉之而以力役之是使君子而服小人之事且非國家崇儒勸學誘人為善之道也此一説不可者也抑又有大不可者焉宗廟社稷之事雖小不可以不専敬之至也古之道也今若以學生兼其事及其歳時日月然後授其宗彞罍洗其周旋必不合度其進退必不得宜其思慮必不固其容貎必不莊此無他其事不習而其志不専故也非近於不敬者歟又有大不可者其是之謂歟若知此不可將令學生恒掌其事而隳壊其本業則是學生之教加少學生之道益貶而齋郎之實猶在齋郎之名茍無也大凡制度之改政令之變利於其舊不什則不可為己又况不如其舊哉考之於古則非訓稽之於今則非利尋其名而求其實則失其宜故曰議罷齋郎而以學生薦享亦不得其理矣改葬服議經曰改葬緦春秋榖梁傳亦曰改葬之禮緦舉下緬也此皆謂子之於父母其他則皆無服何以識其必然經次五等之服小功之下然後著改葬之制更無輕重之差以此知惟記其最親者其他無服則不記也若主人當服斬衰其餘親各服其服則經亦言之不但惟云緦也傳稱舉下緬者緬猶逺也下謂服之最輕者也以其逺故其服輕也江煕曰禮天子諸侯易服而葬以為交於神明者不可以純凶况其緬者乎是故改葬之禮其服惟輕以此而言則亦明矣衛司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦既葬而除之不忍無服送至親也非父母無服無服則弔服而加麻此又其著者也文子又曰䘮服既除然後乃𦵏則其服何服子思曰三年之䘮未𦵏服不變除何有焉然則改𦵏與未𦵏者有異矣古者諸侯五月而𦵏大夫三月而𦵏士逾月無故未有過時而不𦵏者也過時而不𦵏謂之不能𦵏春秋譏之若有故而未𦵏雖出三年子之服不變此孝子之所以著其情先王之所以必其時之道也雖有其文未有著其人者以是知其至少也改𦵏者為山崩水涌毁其墓及𦵏而禮不備者若文王之𦵏王季以水齧其墓魯隠公之𦵏惠公以有宋師太子少𦵏故有闕之類是也喪事有進而無退有易以輕服無加以重服殯於堂則謂之殯瘞於野則謂之𦵏近代以来事與古異或游或仕在千里之外或子㓜妻稚而不能自還甚者拘以隂陽畏忌遂𦵏於其土及其返𦵏也逺者或至數十年近者亦出三年其吉服而從於事也久矣又安可取未𦵏不變服之例而反為之重服歟在喪當𦵏猶宜易以輕服况既逺而反純凶以𦵏乎若果重服是所謂未可除而除不當重而更重也或曰䘮與其易也寧戚雖重服不亦可乎曰不然易之與戚則易固不如戚矣雖然未若合禮之為懿也儉之與奢則儉固愈於奢矣雖然未若合禮之為懿也過猶不及其此類之謂乎或曰經稱改𦵏緦而不著其月數則似三月而後除也子思之對文子則曰既𦵏而除之今宜如何曰自啟至於既𦵏而三月則除之未三月則服以終三月也曰妻為夫何如曰如子無弔服而加麻則何如曰今之弔服猶古之弔服也愚竊以緦以三月服之常也而改𦵏之緦不必三月也何當云改𦵏而除覆墓後則不必更服矣禘祫議韓公平生為文竒竒怪怪獨於議典禮處文詞甚醇雅此議與改𦵏服議並可稱名儒之文當與漢劉歆韋𤣥成等議相參右今月十六日勅㫖宣令百僚議限五日内聞奏者將仕郎守國子監四門博士臣韓愈謹獻議曰伏以陛下追孝祖宗肅敬祀事凡在擬議不敢自專聿求厥中延訪羣下然而禮文繁漫所執各殊自建中之初迄至今嵗屢經禘祫未合適從臣生遭聖明涵泳恩澤雖賤不及議而志切效忠今輙先舉衆議之非然後申明其説一曰獻懿廟主宜永藏之夾室臣以為不可夫祫者合也毁廟之主皆當合食於太祖獻懿二祖即毁廟主也今雖藏於夾室至禘祫之時豈得不食於太廟乎名曰合祭而二祖不得祭焉不可謂之合矣二曰獻懿廟主宜毁之瘞之臣又以為不可謹按禮記天子立七廟一壇一墠其毁廟之主皆藏於祧廟雖百代不毁祫則陳於太廟而饗焉自魏晉以降始有毁瘞之議事非經㨿竟不可施行今國家徳厚流光創立九廟以周制推之獻懿二祖猶在壇墠之位况於毁瘞而不禘祫乎三曰獻懿廟主宜各遷於其陵所臣又以為不可二祖之祭於京師列於太廟也二百年矣今一朝遷之豈惟人聴疑惑抑恐二祖之靈眷顧依遲不即饗於下國也四曰獻懿廟主宜附於興聖廟而不禘祫臣又以為不可傳曰祭如在景皇帝雖太祖其於属乃獻懿之子孫也今欲正其子東向之位廢其父之大祭固不可為典矣五曰獻懿二祖宜别立廟於京師臣又以為不可夫禮有所降情有所殺是故去廟為祧去祧為壇去壇為墠去墠為鬼漸而之逺其祭益稀昔者魯立煬宫春秋非之以為不當取已毁之廟既藏之主而復築宫以祭今之所議與此正同又雖違禮立廟至於禘祫也合食則禘無其所廢祭則於義不通此五説者皆所不可故臣博采前聞求其折中以為殷祖𤣥王周祖后稷太祖之上皆自為帝又其代數巳逺不復祭之故太祖得正東向之位子孫從昭穆之列禮所稱者盖以紀一時之宜非傳於後代之法也傳曰子雖齊聖不先父食盖言子為父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東向之位景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈逺人情又常祭甚衆合祭甚寡則是太祖所屈之祭至少所伸之祭至多比於伸孫之尊廢祖之祭不亦順乎事異殷周禮從而變非所失禮也臣伏以制禮作樂者天子之職也陛下以臣議有可采粗合天心斷而行之是則為禮如以為猶或可疑乞召臣對面陳得失庶有發明謹議唐宋八大家文鈔巻九
