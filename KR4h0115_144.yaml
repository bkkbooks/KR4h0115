body:
  text: 唐宋八大家文鈔巻一百三十二明茅坤撰東坡文鈔十六論書論挈出一事作議論三四層跌入極有法度愚讀史記商君列傳觀其改法易令變更秦國之風俗誅秦民之議令者以數千人黥太子之師殺太子之傅而後法令大行葢未嘗不壯其勇而有決也曰嗟夫世俗之人不可以慮始而可樂成也使天下之人各陳其所知而守其所學以議天子之事則事將有格而不得成者然及觀三代之書至其將有以矯拂世俗之際則其所以告諭天下者常丁寧激切亹亹而不倦務使天下盡知其君之心而又從而折其不服之意使天下皆信以為如此而後從事其言迴曲宛轉譬如平人自相議論而詰其是非愚始讀而疑之以為近於濡滯迂逺而無決然其使天下樂從而無黽勉不得已之意其事既發而無紛紛異同之論此則王者之意也故常以為當堯舜之時其君臣相得之心歡然樂而無間相與吁俞嗟嘆唯諾於朝廷之中不啻若朋友之親雖其有所相是非論辨以求曲直之際當亦無足怪者及至湯武征伐之際周旋反覆自述其用兵之意以明曉天下此又其勢然也惟其天下既安君民之勢闊逺而不同天下有所欲為而其匹夫匹婦私有異論於天下以齟齬其上之畫䇿令之而莫肯聴當此之時刑驅而勢脅之天下夫誰敢不聽從而上之人優游而徐譬之使之信之而後從此非王者之心誰能處而待之而不倦歟葢盤庚之遷天下皆咨嗟而不悦盤庚為之稱其先王盛徳明聖而猶五遷以至于今今不承於古恐天之㫁棄汝命不救汝死既又恐其不從也則又曰汝罔暨余同心我先后將降爾罪暨乃祖先父亦將告我髙后曰作大戮于朕孫葢其所以開其不悟之心而諭之以其所以當然者如此其詳也若夫商君則不然以為要使汝獲其利而何䘏乎吾之所為故無所求於衆人之論而亦無以告諭天下然其事亦終于有成是以後世之論以為三代之治柔懦不決然此乃王霸之所以為異也夫三代之君惟不忍鄙其民而欺之故天下有故而其議及于百姓以觀其意之所嚮及其不可聴也則又反覆而諭之以窮極其説而服其不然之心是以其民親而愛之嗚呼此王霸之所為不同也哉長公有感於商君變法之驟故於商周之書所以告戒其民處反覆為論要之王道以得民為本故易曰先甲三日後甲三日又曰巳日乃孚而魯論亦曰君子信而後勞其民先王之使民原如此此篇紆徐曲折然亦稍開衰宋之門户矣禮論文特紆徐曲折可誦然言禮而於器之異宜何關於禮之大者昔者商周之際何其為禮之易也其在宗廟朝廷之中籩豆簠簋牛羊酒醴之薦交於堂上而天子諸侯大夫卿士周旋揖讓獻酬百拜樂作于下禮行于上雍容和穆終日而不亂夫古之人何其知禮而行之不勞也當此之時天下之人惟其習慣而無疑衣服器皿冠冕佩玉皆其所常用也是以其人入於其間耳目聰明而手足無所忤其身安於禮之曲折而其心不亂以能深思禮樂之意故其亷恥退讓之節睟然見於面而盎然發於其躬夫是以能使天下觀其行事而忘其暴戾鄙野之氣至於後世風俗變易更數千年以至于今天下之事巳大異矣然天下之人尚皆記録三代禮樂之名詳其節目而習其俯仰冠古之冠服古之服而御古之器皿傴僂拳曲勞苦於宗廟朝廷之中區區而莫得其紀交錯紛亂而不中節此無足怪也其所用者非其素所習也而彊使焉甚矣夫後世之好古也昔者上古之世葢嘗有巢居穴處汗樽抔飲燔黍捭豚簣桴土鼔而以為是足以養生送死而無以加之者矣及其後世聖人以為不足以大利于天下是故易之以宮室新之以籩豆鼎俎之器以濟天下之所不足而盡去太古之法惟其祭祀以交於鬼神乃始薦其血毛豚解而腥之體解而爓之以為是不忘本而非以為後世之禮不足用也是以退而體其犬豕牛羊實其簠簋籩豆鉶羮以極今世之美未聞其牽於上古之説選愞而不決也且方今之人佩玉服黻冕而垂旒拱手而不知所為而天下之人亦且見而笑之是何所復望於其有以感發天下之心哉且又有所大不安者宗廟之祭聖人所以追求先祖之神靈庶㡬得而享之以安䘏孝子之志者也是以思其平生起居飲食之際而設其器用薦其酒食皆從其生以冀其来而安之而後世宗廟之祭皆用三代之器則是先祖終莫得而安也葢三代之時席地而食是以其器用各因其所便而為之髙下大小之制今世之禮坐於牀而食於牀上是以其器不得不有所變雖正使三代之聖人生於今而用之亦將以為便安故夫三代之視上古猶今之視三代也三代之器不可復用矣而其制禮之意尚可依倣以為法也宗廟之祭薦之以血毛重之以體薦有以存古之遺風矣而其餘者可以易三代之器而用今世之所便以從鬼神之所安惟其春秋社稷釋奠釋菜凡所以享古之鬼神者則皆從其器葢周人之祭蜡與田祖也吹葦籥擊土鼔此亦各從其所安耳嗟夫天下之禮宏闊而難言自非聖人而何以處此故夫推之而不明講之而不詳則愚實有罪焉唯其近於正而易行庶㡬天下之安而從之是則有取焉耳春秋論文甚嫋娜而見似未透事有以拂乎吾心則吾言忿然而不平有以順適乎吾意則吾言優柔而不怒天下之人其喜怒哀樂之情可以一言而知也喜之言豈可以為怒之言耶此天下之人皆能辨之而至於聖人其言丁寧反覆布於方册者甚多而其喜怒好惡之所在者又甚明而易知也然天下之人常患求而莫得其意之所主此其故何也天下之人以為聖人之文章非復天下之言也而求之太過是以聖人之言更為深逺而不可曉且天下何不以巳推之也將以喜夫其人而加之以怒之之言則天下且以為病狂而聖人豈有以異乎人哉不知其好惡之情而不求其言之喜怒是所謂大惑也昔者仲尼删詩於衰周之末上自商周之盛王至於幽厲失道之際而下訖於陳靈自詩人以来至於仲尼之世葢巳數百餘年矣愚嘗怪大雅小雅之詩當幽厲之時而稱道文武成康之盛徳及其終篇又不見幽厲之暴虐此誰知其為幽厲之詩而非文武成康之詩者葢察其辭氣有幽憂不樂之意是以系之幽厲而無疑也若夫春秋二百四十二年之間天下之是非雜然而觸乎其心見惡而怒見善而喜則求其是非之際又可以求諸其言之喜怒之間矣今夫人之於事有喜而言之者有怒而言之者有怨而言之者喜而言之則其言和而無傷怒而言之則其言厲而不温怨而言之則其言深而不洩此其大凡也春秋之於仲孫湫之来曰齊仲孫来於季友之歸曰季子来歸此所謂喜之之言也於魯鄭之易田曰鄭伯以璧假許田於晉文之召王曰天王狩于河陽此所謂怒之之言也於叔牙之殺曰公子牙卒至慶父之奔曰公子慶父如齊此所謂怨之之言也夫喜之而和怒之而厲怨之而深此三者無以加矣至於公羊穀梁之傳則不然日月土地皆所以為訓也夫日月之不知土地之不詳何足以為喜而何足以為怒此喜怒之所不在也春秋書曰戎伐凡伯于楚丘而以為衛伐凡伯春秋書曰齊仲孫来而以為吳仲孫甚而至於變人之國此又喜怒之所不及也愚故曰春秋者亦人之言而巳而人之言亦觀其辭氣之所嚮而巳矣中庸論上此等文非子瞻之佳者以其是蘇家説理文字故録而存之甚矣道之難明也論其著者鄙滯而不通論其微者汗漫而不可考其弊始於昔之儒者求為聖人之道而無所得於是務為不可知之文庶㡬乎後世之以我為深知之也後之儒者見其難知而不知其空虚無有以為將有所深造乎道者而自恥其不能則從而和之曰然相欺以為髙相習以為深而聖人之道日以逺矣自子思作中庸儒者皆祖之以為性命之説嗟夫子思者豈亦斯人之徒歟葢嘗試論之夫中庸者孔氏之遺書而不完者也其要有三而巳矣三者是周公孔子之所從以為聖人而其虚詞蔓延是儒者之所以為文也是故去其虚詞而取其三其始論誠明之所入其次論聖人之道所從始推而至於其所終極而其卒乃始内之於中庸葢以為聖人之道畧見於此矣記曰自誠明謂之性自明誠謂之教誠則明矣明則誠矣夫誠者何也樂之之謂也樂之則自信故曰誠夫明者何也知之之謂也知之則達故曰明夫惟聖人知之者未至而樂之者先入先入者為主而待其餘則是樂之者為主也若夫賢人樂之者未至而知之者先入先入者為主而待其餘則是知之者為主也樂之者為主是故有所不知知之未嘗不行知之者為主是故雖無所不知而有所不能行子曰知之者不如好之者好之者不如樂之者知之者與樂之者是聖人賢人之辨也好之者是賢人之所由以求誠者也君子之為學慎乎其始何則其所先入者重也知之多而未能樂焉則是不如不知之愈也人之好惡莫如好色而惡臭則人之性也好善如好色惡惡如惡臭是聖人之誠也故曰自誠明謂之性孔子葢長而好學適周觀禮問於老耼師襄之徒而後明於禮樂五十而後讀易葢亦有晚而後知者然其所先得於聖人者是樂之而巳孔子厄於陳蔡之間問於子路子貢二子不悦而子貢又欲少貶焉是二子者非不知也其所以樂之者未至也且夫子路能死於衛而不能不愠於陳蔡是豈其知之罪耶故大弟子之所為從孔子游者非専以求聞其所未聞葢將以求樂其所有也明而不誠雖狹其所有倀倀乎不知所以安之茍不知所以安之則是可與居安而未可與居憂患也夫惟憂患之至而後誠明之辨乃可以見由此觀之君子安可以不誠哉中庸論中君子之欲誠也莫若以明夫聖人之道自本而觀之則皆出於人情不循其本而逆觀之於其末則以為聖人有所勉彊力行而非人情之所樂者夫如是則雖欲誠之其道無由故曰莫若以明使吾心曉然知其當然而求其樂今夫五常之教惟禮為若彊人者何則人情莫不好逸豫而惡勞苦今吾必也使之不敢箕踞而磬折百拜以為禮人情莫不樂富貴而羞貧賤今吾必也使之不敢自尊而卑讓退抑以為禮用器之為便而祭器之為貴褻衣之為便而衮冕之為貴哀欲其速巳而伸之三年樂欲其不巳而不得終日此禮之所以為彊人而觀之於其末者之過也盍亦反其本而思之今吾以為磬折不如立之安也而將惟安之求則立不如坐坐不如箕踞箕踞不如偃仆偃仆而不巳則將裸袒而不顧茍為裸袒而不顧則吾無乃亦將病之夫豈獨吾病之天下之匹夫匹婦莫不病之也茍為病之則是其勢將必至於磬折而百拜由此言之則是磬折而百拜者生於不欲裸袒之間而巳也夫豈惟磬折百拜將天下之所謂彊人者其皆必有所從生也辨其所從生而推之至於其所終極是之謂明故記曰君子之道費而隱夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人有所不能焉君子之道推其所從生而言之則其言約約則明推其逆而觀之故其言費費則隱君子欲其不隱是故起於夫婦之有餘而推之至於聖人之所不及舉天下之至易而通之於至難使天下之安其至難者與其至易無以異也孟子曰簞食豆羮得之則生不得則死嘑爾而與之行道之人弗受蹴爾而與之乞人不屑也萬鍾則不辨禮義而受之萬鍾於我何加焉向為身死而不受今為朋友妻妾之奉而為之此之謂失其本心且萬鍾之不受是王公大人之所難而以行道乞人之所不屑而較其輕重是何以異於匹夫匹婦之所能行通而至於聖人之所不及故凡為此説者皆以求安其至難而務欲誠之者也天下之人莫不欲誠而不得其説故凡此者誠之説也中庸論下夫君子雖能樂之而不知中庸則其道必窮記曰君子遵道而行半塗而廢吾弗能巳矣君子非其信道之不篤也非其力行之不至也得其偏而忘其中不得終日安行乎通塗夫雖欲不廢其可得耶記曰道之不行也我知之矣賢者過之不肖者不及也以為過者之難歟復之中者之難歟宜若過者之難也然天下有能過而未有能中則是復之中者之難也記曰天下國家可均也爵禄可辭也白刅可蹈也中庸不可能也既不可過又不可不及如斯而已乎曰未也孟子曰執中為近執中無權猶執一也書曰不協於極不罹於咎皇則受之又曰㑹其有極歸其有極而記曰君子之中庸也君子而時中皇極者有所不極而㑹於極時中者有所不中而歸於中吾見中庸之至於此而尤難也是以有小人之中庸焉有所不中而歸於中是道也君子之所以為時中而小人之所以為無忌憚記曰小人之中庸也小人而無忌憚也嗟夫道之難言也有小人焉因其近似而竊其名聖人憂思恐懼是故反覆而言之不厭何則是道也固小人之所竊以自便者也君子見危則能死勉而不死以求合於中庸見利則能辭勉而不辭以求合於中庸小人貪利而茍免而亦欲以中庸之名私自便也此孔子孟子之所為惡鄉愿也一鄉皆稱愿人焉無所往而不為愿人同乎流俗合乎汚世曰古之人行何為踽踽涼涼生斯世也善斯可矣以古之人為迂而以今世之所善為足以巳矣則是不亦近似於中庸耶故曰惡紫恐其亂朱也惡莠恐其亂苗也何則惡其似也信矣中庸之難言也君子之欲從事乎此無循其迹而求其味則㡬矣記曰人莫不飲食也鮮能知味也唐荆川曰數叚貫穿作一篇續歐陽子朋黨論長公此論真可以補歐陽子之不足元祐紹聖之間豈其説不用耶通篇轉摺處皆如游龍歐陽子曰小人欲空人之國必進朋黨之説嗚呼國之將亡此其徴歟禍莫大於權之移人而君莫危於國之有黨有黨則必爭爭則小人者必勝而權之所歸也君安得不危哉何以言之君子以道事君人主必敬之而疏小人唯予言而莫予違人主必狎之而親疎者易間而親者難暌也而君子者不得志則奉身而退樂道不仕小人者不得志則徼倖復用唯怨之報此其所以必勝也葢嘗論之君子如嘉禾也封植之甚難而去之甚易小人如惡草也不種而生去之復蕃世未有小人不除而治者也然去之為最難斥其一則援之者衆盡其類則衆之致怨也深小者復用而肆威大者得志而竊國善人為之掃地世主為之屏息譬之㫁虵不死刺虎不斃其傷人則愈多矣齊田氏魯季孫是巳齊魯之執事莫匪田季之黨也歴數君不忘其誅而卒之簡公弑昭哀失國小人之黨其不可除也如此而漢黨錮之獄唐白馬之禍忠義之士斥死無餘君子之黨其易盡也如此使世主知易盡者之可戒而不可除者之可懼則有瘳矣且夫君子者世無若是之多也小人者亦無若是之衆也凡才智之士鋭於功名而嗜於進取者隨所用耳孔子曰仁者安仁智者利仁未必皆君子也冉有從夫子則為門人之選從季氏則為聚歛之臣唐栁宗元劉禹錫使不陷叔文之黨其髙才絶學亦足以為唐名臣矣昔欒懷子得罪於晉其黨皆出奔樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏乃子之勇也嗚呼宣子早從王鮒之言豈獨獲二子之勇且安有曲沃之變哉愚以為治道去泰甚耳茍黜其首惡而貸其餘使才者不失富貴不才者無以致憾將為吾用之不暇又何怨之報乎人之所以為盜者衣食不足耳農夫市人焉保其不為盜而衣食既足盜豈有不能返農夫市人也哉故善除盜者開其衣食之門使復其業善除小人者誘以富貴之道使隳其黨以力取威勝者葢未嘗不反為所噬昔曹參之治齊曰慎無擾獄市獄市奸人之所容也如此亦庶㡬於善治矣奸固不可長而亦不可不容也若奸無所容君子豈乆安之道哉牛李之黨徧天下而李徳裕以一夫之力欲窮其類而致之必死此其所以不旋踵罹仇人之禍也奸臣復熾忠義益衰以力取威勝者果不可耶愚是以續歐陽子之説而為君子小人之戒續楚語論辨而正屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之君子曰不違而道唐栁宗元非之曰屈子以禮之末忍絶其父將死之言且禮有齋之日思其所樂思其所嗜子木去芰安得為道甚矣栁子之陋也子木楚卿之賢者也夫豈不知為人子之道事死如事生况於將死丁寧之言棄而不用人情之所忍乎是必有大不忍於此者而奪其情也夫死生之際聖人嚴之薨於路寢不死於婦人之手至於結冠纓啓手足之末不敢不勉其於死生之變亦重矣父子平日之言可以恩掩義至於死生至嚴之際豈客以私害公乎曽子有疾稱君子之所貴乎道者三孟僖子卒使其子學禮於仲尼管仲病勸桓公去三豎夫數君子之言或主社稷或勤於道徳或訓其子孫雖所趣不同然皆篤於大義不私其躬也如此今赫赫楚國若敖氏之賢聞於諸侯身為正卿死不在民而口腹是憂其為陋亦甚矣使子木行之國人誦之太史書之天下後世不知夫子之賢而唯陋是聞子木其忍為此乎故曰是必有大不忍者而奪其情也然禮之所謂思其所樂思其所嗜此言人子追思之道也曽晳嗜羊棗而曽子不忍食父沒而不能讀父之書母沒而不能執母之器皆人子之情自然也豈待父母之命耶今薦芰之事若出於子則可自其父命則為陋耳豈可以飲食之故而成父莫大之陋乎曽子寢疾曽元難於易簀曽子曰君子之愛人也以徳細人之愛人也以姑息若以栁子之言為然是曽元為孝子而童子顧禮之末易簀於病革之中為不仁之甚也中行偃死視不可含范宜子盟而撫之曰事吳敢不如事主猶視欒懷子曰主茍終所不嗣事於齊者有如河乃瞑嗚呼范宣子知事吳為忠於主而不知報齊以成夫子憂國之美其為忠則大矣古人以愛惡比之美疢藥石曰石猶生我疢之美者其毒滋多由是觀之栁子之愛屈到是疢之美子木之違父命為藥石也哉唐荆川曰此文逐叚關鎖似諱辨體唐宋八大家文鈔巻一百三十二
