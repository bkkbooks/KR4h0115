body:
  text: 唐宋八大家文鈔卷一百三十七明茅坤撰東坡文鈔二十一䇿省費用論節財處甚工而所舉郊之賞與夫宫觀使及都水監數者蓋冗員之一耳必有忌諱而未盡之説夫天下未嘗無財也昔周之興文王武王之國不過百里當其受命四方之君長交至於其廷軍旅四出以征伐不義之諸侯而未嘗患無財方此之時關市無征而山澤不禁取於民者不過什一而財有餘及其衰也內食千里之租外收千八百國之貢而不足於用由此觀之夫財豈有多少哉人君之於天下俯已以就人則昜為功仰人以援已則難為力是故廣取以給用不如節用以亷取之為昜也臣請得以小民之家而推之夫民方其窮困時所望不過十金之資計其衣食之費妻子之奉出入於十金之中寬然而有餘及其一旦稍稍蓄聚衣食既足則心意之欲日以漸廣所入益衆而所欲益以不給不知罪其用之不節而以為求之未至也是以富而愈貪求愈多而財愈不供此其為惑未可以知其所終也盍亦反其始而思之夫嚮者豈能寒而不衣飢而不食乎今天下汲汲乎以財之不足為病者何以異此國家創業之初四方割據中國之地至狹也然歲嵗出師以誅討僣亂之國南取荆楚西平巴蜀而東下并潞其費用之衆又百倍於今可知也然天下之士未嘗思其始而喘喘焉患今世之不足則亦甚惑矣夫為國有三計有萬世之計有一時之計有不終月之計古者三年耕必有一年之蓄以三十年之通計則可以九年無飢也嵗之所入足用而有餘是以九年之蓄常間而無用卒有水旱之變盜賊之憂則官可以自辦而民不知如此者天不能使之災地不能使之貧四夷盜賊不能使之困此萬世之計也而其不能者一嵗之入才足以為一嵗之出天下之産僅足以供天下之用其平居雖不至於虐取其民而有急則不免於厚賦故其國可靜而不可動可逸而不可勞此亦一時之計也至於最下而無謀者量出以為入用之不給則取之益多天下晏然無大患難而盡用衰世茍且之法不知有急則將何以加之此所謂不終月之計也今天下之利莫不盡取山陵林麓莫不有禁關有征市有租鹽鐡有𣙜酒有課茶有算則凡衰世茍且之法莫不盡用矣譬之於人其少壯之時豐健勇武然後可以望其無疾以至於夀考今未五六十而衰老之候具見而無遺若八九十者將何以待其後耶然天下之人方且窮思竭慮以廣求利之門且人而不思則以為費用不可復省使天下而無鹽鐡酒茗之稅將不為國乎臣有以知其不然也天下之費固有去之甚昜而無損存之甚難而無益者矣臣不能盡知請舉其所聞而其餘可以類求焉夫無益之費名重而實輕以不急之實而被之以莫大之名是以疑而不敢去三嵗而郊郊而赦赦而賞此縣官有不得巳者天下吏士數日而待賜此誠不可以卒去至於大吏所謂股肱耳目與縣官同其憂樂者此豈亦不得已而有所畏耶天子有七廟今又飾老佛之宫而為之祠固已過矣又使大臣以使領之嵗給以巨萬計此何為者也天下之吏為不少矣將患未得其人茍得其人則凡民之利莫不備舉而其患莫不盡去今河水為患不使濱河州郡之吏親視其災而責之以救災之術顧為都水監夫四方之水患豈其一人坐籌於京師而盡其利害天下有轉運使足矣今江淮之間又有發運祿賜之厚徒兵之衆其為費豈勝計哉蓋嘗聞之里有畜馬者患牧人欺之而盜其芻菽也又使一人焉為之廄長廄長立而馬益癯今為政不求其本而治其末自是而推之天下無益之費不為不多矣臣以為凡若此者日求而去之自毫釐以往莫不有益惟無輕其毫釐而積之則天下庶乎少息也蓄材用欲募天下之將材而歸之於治兵治兵固一説然其本尤在君相之一心與一氣夫今之所患兵弱而不振者豈士卒寡少而不足使歟器械鈍弊而不足用歟抑為城郭不足守歟廩食不足給歟此數者皆非也然所以弱而不振則是無材用也夫國之有材譬如山澤之有猛獸江河之有蛟龍伏乎其中而威乎其外悚然有所不可狎者至於鰍蚖之所蟠牂豚之所伏雖千仭之山百尋之溪而人昜之何則其見於外者不可欺也天下之大不可謂無人朝廷之尊百官之富不可謂無才然以區區之二冦舉數州之衆以臨中國抗天子之威犯天下之怒而其氣未嘗少衰其詞未嘗少挫則是其心無所畏也主憂則臣辱主辱則臣死今朝廷之士不能無憂而大臣恬然未有拒絶之議非不欲絶也而未有以待之則是朝廷無所恃也沿邊之民西顧而戰栗牧馬之士不敢彎弓而北嚮吏士未戰而先期於敗則是民輕其上也外之蠻夷無所畏內之朝廷無所恃而民又自輕其上此猶足以為有人乎天下未嘗無才患所以求才之道不至古之聖人以無益之名而致天下之實以可見之實而較天下之虛名三者相為用而不可廢是故其始也天下莫不紛然奔走從事於其間而要之以其終不肖者無以欺其上此無他先名而後實也不先其名而惟實之求則來者寡來者寡則不可以有所擇以一旦之急而用不擇之人則是不先名之過也天子之所嚮天下之所奔也今夫孫吳之書其讀之者未必能戰也多言之士喜論兵者未必能用也進之以武舉試之以騎射天下之竒士未必至也然將以求天下之實則非此三者不可以致以為未必然而棄之則是其必然者恐不可得而見也往者西師之興其先也惟不以虛名多致天下之才而擇之以待一旦之用故其兵興之際四顧惶惑而不知所措於是設武舉購方略收勇悍之士而開猖狂之言不愛髙爵重賞以求強兵之術當此之時天下囂然莫不自以為知兵也來者日多而其言益以無據至於臨事終不可用執事之臣亦遂厭之而知其無益故兵休之日舉從而廢之今之論者以為武舉方略之類適足以開僥幸之門而天下之實才終不可以求得此二者皆過也夫既已用天下之虛名而不較之以實至其弊也又舉而廢其名使天下之士不復以兵術進亦己過矣天下之實才不可以求之於言語又不可以較之於武力獨見之於戰耳戰不可得而試也是故見之於治兵子玉治兵於蒍終日而畢鞭七人貫三人耳蒍賈觀之以為剛而無禮知其必敗孫武始見試以婦人而猶足以取信於闔閭使知其可用故凡欲觀將帥之才否莫如治兵之不可欺也今夫新募之兵驕而難令勇悍而不知戰此真足以觀天下之才也武舉方略之類以來之新兵以試之觀其顔色和昜則足以見其氣約束堅明則足以見其威坐作進退各得其所則足以見其能凡此者皆不可強也故曰先之以無益之虛名而較之以可見之實庶乎可得而用也練軍實欲為擇兵而募而又限以年精悍之色博達之才三代之兵不待擇而精其故何也兵出於農有常數而無常人國有事要以一家而備一正卒如斯而已矣是故老者得以養疾病者得以為間民而役於官者莫不皆其壯子弟故其無事而田獵則未嘗發老弱之民兵行而饋糧則未嘗食無用之卒使之足輕險阻而手昜器械聰明足以察旗鼓之節強鋭足以犯死傷之地千乘之衆而人人足以自捍故殺人少而成功多費用省而兵卒強蓋春秋之時諸侯相并天下百戰其經傳所見謂之敗績者如城濮鄢陵之役皆不過犯其偏師而獵其遊卒斂兵而退未有僵尸百萬流血於江河如後世之戰者何也民各推其家之壯者以為兵則其勢不可得而多殺也及至後世兵民既分兵不得復而為民於是始有老弱之卒夫既已募民而為兵其妻子屋廬既已託於營伍之中而其姓名既已書於官府之籍行不得為商居不得為農而仰食於官至於衰老而無歸則其道誠不可以棄去是故無用之卒雖薄其資糧而皆廩之終身凡民之生自二十以上至於衰老不過四十餘年之間勇鋭強力之氣足以犯堅冒刃者不過二十餘年今廩之終身則是一卒凡二十年無用而食於官也自此而推之養兵十萬則是五萬人可去也屯兵十年則是五年為無益之費也民者天下之本而財者民之所以生也有兵而不可使戰是謂棄財不可使戰而驅之戰是謂棄民臣觀秦漢之後天下何其殘敗之多耶其弊皆起於分民而為兵兵不得休使老弱不堪之卒拱手而就戮故有以百萬之衆而見屠於數千之兵者其良將善用不過以為餌委之啖賊嗟夫三代之衰民之無罪而死者其不可勝數矣今天下募兵至多往者陜西之役舉籍平民以為兵加以明道寶元之間天下旱蝗以及近嵗青齊之飢與河朔之水災民急而為兵者日以益衆舉籍而按之近嵗以來募兵之多無如今日者然皆老弱不教不能當古之十五而衣食之費百倍於古此甚非所以長久而不變者也凡民之為兵者其類多非良民方其少壯之時博奕飲酒不安於家而後能捐其身至其少衰而氣沮蓋亦有悔而不可復者矣臣以為五十已上願復為民者宜聼自今以往民之願為兵者皆三十以下則收限以十年而除其籍民三十而為兵十年而復歸其精力思慮猶可以養生送死為終身之計使其應募之日心知其不出十年而為十年之計則除其籍而不怨以無用之兵終身坐食之費而為重募則應者必衆如此縣官長無老弱之兵而民之不任戰者不至於無罪而死彼皆知其不過十年而復為平民則自愛其身而重犯法不至於呌呼無賴以自棄於凶人今夫天下之患在於民不知兵故兵常驕悍而民常怯賊盜攻之而不能禦邊寇掠之而不能抗今使民得更代而為兵兵得復還而為民則天下之知兵者衆而盜賊邊寇將有所忌然猶有言者將以為十年而代故者已去而新者未教則緩急有所不濟夫所謂十年而代者豈其舉軍而並去之有始至者有既久者有將去者有當代者新故雜居而教之則緩急可以無憂矣此等文須看承上聨下字眼勸親睦三代之遺言深見而文亦爽夫民相與親睦者王道之始也昔三代之制畫為井田使其比閭族黨各相親愛有急相賙有喜相慶死喪相恤疾病相養是故其民安居無事則往來歡欣而獄訟不生有寇而戰則同心并力而緩急不離自秦漢以來法令峻急使民離其親愛欣歡之心而為鄰里告訐之俗富人子壯則出居貧人子壯則出贅一國之俗而家各有法一家之法而人各有心紛紛乎散亂而不相屬是以禮讓之風息而爭鬬之獄繁天下無事則務為欺詐相傾以自成天下有變則流徙渙散相棄以自存嗟夫秦漢以下天下何其多故而難治也此無他民不愛其身故輕犯法輕犯法則王政不行欲民之愛其身則莫若使其父子親兄弟和而妻子相好夫民仰以事父母旁以睦兄弟而俯以恤妻子則其所賴於生者重而不忍以其身輕犯法三代之政莫尚於此矣今欲教民和親則其道必始於宗族臣欲復古之小宗以收天下不相親屬之心古者有大宗有小宗故禮曰别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也古者諸侯之子弟異姓之卿大夫始有家者不敢禰其父而自使其嫡子後之則為大宗族人宗之雖百世而宗子死則為之服齊衰九月故曰宗其繼别子之所自出者百世不遷者也别子之庶子又不得禰别子而自使其嫡子為後則為小宗小宗五世之外則無服其繼禰者親兄弟為之服其繼祖者從兄弟為之服其繼曾祖者再從兄弟為之服其繼高祖者三從兄弟為之服其服大功九月而髙祖以外親盡則易宗故曰宗其繼髙祖者五世則遷者也小宗四有繼髙祖者有繼曾祖者有繼祖者有繼彌者與大宗為五此所謂五宗也古者立宗之道嫡子既為宗則其庶子之嫡子又各為其庶子之宗其法止於四而其實無窮自秦漢以來天下無世卿大宗之法不可以復立而其可以收合天下之親者有小宗之法存而莫之行此甚可惜也今夫天下所以不重族者有族而無宗也有族而無宗則族不可合族不可合則雖欲親之而無由也族人而不相親則忘其祖矣今世之公卿大臣賢人君子之後所以不能世其家如古之久逺者其族散而忘其祖也故莫若復小宗使族人相率而尊其宗子宗子死則為之加服犯之則以其服坐貧賤不敢輕而富貴不敢以加之冠昏必告喪必赴此非有所難行也今夫良民之家士大夫之族亦未必無孝悌相親之心而族無宗子莫為之糾率其勢不得相親是以世之人有親未盡而不相往來冠昏不相告死不相赴而無知之民遂至於父子異居而兄弟相訟然則王道何從而興乎嗚呼世人之患在於不務逺見古之聖人合族之法近於迂濶而行之期月則望其有益故夫小宗之法非行之難而在乎久而不怠也天下之民欲其忠厚和柔而昜治其必自小宗始矣均户口文甚踈鬯其欲使天下之宦遊者徙之荆襄唐鄧許洛陳蔡之間其説難行夫中國之地足以食中國之民有餘也而民常病於不足何哉地無變遷而民有聚散聚則爭於不足之中而散則棄於有餘之外是故天下常有遺利而民用不足昔者三代之制度地以居民民各以其夫家之衆寡而受田於官一夫而百畝民不可以多得尺寸之地而地亦不可以多得一介之民故其民均而地有餘當周之時四海之內地方千里者九而京師居其一有田百同而為九百萬夫之地山陵林麓川澤溝瀆城郭宫室塗巷三分去一為六百萬夫之地又以上中下田三等而通之以再昜為率則王畿之內足以食三百萬之衆以九州言之則是二千七百萬夫之地也而計之以下農夫一夫之地而食五人則是萬有三千五百萬人可以仰給於其中當成康刑措之後其民極盛之時九州之籍不過千三萬四千有餘夫地以十倍而民居其一故榖常有餘而地力不耗何者均之有術也自井田廢而天下之民轉徙無常惟其所樂則聚以成市側肩躡足以爭尋常挈妻負子以分升合雖有豐年而民無餘蓄一遇水旱則弱者轉於溝壑而強者聚為盜賊地非不足而民非加多也蓋亦不得均民之術而已夫民之不均其弊有二上之人賤農而貴末忽故而重新則民不均夫民之為農者莫不重遷其墳墓廬舍桑麻果蔬牛羊耒耜皆為子孫百年之計惟其百工技藝遊手浮食之民然後可以懷輕資而極其所往是故上之人賤農而貴末則農民舍其耒耜而遊於四方擇其所利而居之其弊一也凡人之情怠於久安而謹於新集水旱之後盜賊之餘則必省刑罰薄稅斂輕力役以懷逋逃之民而其久安而無變者則不肯無故而加恤是故上之人忽故而重新則其民稍稍引去聚於其所重之地以至於衆多而不能容其弊二也臣欲去其二弊而開其二利以均斯民昔者聖人之興作也必因人之情故昜為功必因時之勢故易為力今欲無故而遷徙安居之民分多而益寡則怨謗之門盜賊之端必起於此未享其利而先被其害臣愚以為民之情莫不懷土而重去惟士大夫出身而仕者狃於遷徙之樂而忘其鄉昔漢之制吏二千石皆徙諸陵為今之計可使天下之吏仕至某者皆徙荆襄唐鄧許汝陳蔡之間今士大夫無不樂居於此者故恐獨往而不能濟彼見其儕類等夷之人莫不在焉則其去唯恐後耳此其所謂因人之情夫天下不能嵗嵗而豐也則必有飢饉流亡之所民方其困急時父子且不能相顧又安知去鄉之為戚哉當此之時募其樂徙者而使所過廩之費不甚厚而民樂行此其所謂因時之勢然此二者皆授其田貸其耕耘之具而緩其租然後可以固其意夫如是天下之民其庶乎有息肩之漸也較賦役與今江南賦役之患不同今江以北户止開石數而不及田之畝數正如此自兩稅之興因地之廣狹瘠腴而制賦因賦之多少而制役其初蓋甚均也責之厚賦則其財足以供署之重役則其力足以堪何者其輕重厚薄一出於地而不可易也戶無常賦視地以為賦人無常役視賦以為役是故貧者鬻田則賦輕而富者加地則役重此所以度民力之所勝亦所以破兼并之門而基僥幸之源也及其後世嵗月既久則小民稍稍為姦度官吏耳目之所不及則雖有法禁公行而不忌今夫一户之賦官知其為賦之多少而不知其為地之幾何也如此則增損出入惟其意之所為官吏雖明法禁雖嚴而其勢無由以止絶且其為姦常起於貿易之際夫鬻田者必窮迫之人而所從鬻者必富厚有餘之家富者恃其有餘而邀之貧者迫於飢寒而欲其速售是故多取其地而少入其賦有田者方其窮困之中茍可以緩一時之急則不暇計其他日之利害故富者地日以益而賦不加多貧者地日以削而賦不加少又其姦民欲計免其賦役者割數畝之地加之以數倍之賦而收其少半之值或者亦貪其直之微而取焉是以數十年來天下之賦大抵淆亂有兼并之族而賦甚輕有貧弱之家而不免於重役以至於破敗流移而不知其所往其賦存而其人亡者天下皆是也夫天下不可以有僥幸也天下有一人焉僥幸而免則亦必有一人焉不幸而受其弊今天下僥幸者如此之衆則其不幸而受弊者從可知矣三代之賦以什一為輕今之法本不至於什一而取然天下嗷嗷然以賦斂為病者豈其嵗久而姦生偏重而不均以至於此歟雖然天下皆知其為患而不能去何者勢不可也今欲按行其地之廣狹瘠腴而更制其賦之多寡則姦吏因緣為賄賂之門其廣狹瘠腴亦將一切出於其意之喜怒而其患益深是故士大夫畏之而不敢議而臣以為此最昜見者顧弗之察耳夫昜田者必有契契必有所直之數其所直之數必得其廣狹瘠腴之實而官必據其所直之數而取其昜田之稅是故欲知其地之廣狹瘠腴可以其稅推也久逺者不可復知矣其數十年之間皆足以推較求之故府猶可得而見茍其稅多者則知其直多其直多者則知其田多且美也如此而其賦少其役輕則人亡而賦存者可以有均矣鬻田者皆以其直之多少而給其賦重為之禁而使不敢以不實之直而書之契則夫自今以往者貿易之際為姦者其少息矣要以知凡地之所直與凡賦之所宜多少而以稅參之如此則一持籌之吏坐於帳中足以周知四境之虛實不過數月而民得以少蘇不然十數年之後將不勝其弊重者日以輕輕者日以重而未知其所終也去姦民論利害處刺骨自昔天下之亂必生於治平之日休養生息而姦民得容於其間蓄而不發以待天下之釁至於時有所激勢有所乘則潰裂四出不終朝而毒流於天下聖人知其然是以嚴法禁督官吏以司察天下之姦民而去之夫大亂之本必起於小姦惟其小而不足畏是故其發也常至於亂天下今夫世人之所憂以為可畏者必曰豪俠大盜此不知變者之説也天下無小姦則豪俠大盜無以為資且其治平無事之時雖欲為大盜將安所容其身而其殘忍貪暴之心無所發泄則亦時出為盜賊聚為博奕群飲於市肆而呌號於郊野小者呼雞逐狗大者椎牛發冡無所不至捐父母棄妻孥而相與嬉逰凡此者舉非小盜也天下有釁鋤耰棘矜相率而剽奪者皆嚮之小盜也昔三代之聖王果斷而不疑誅除擊去無有遺類所以擁護良民而使安其居及至後世刑法日以深嚴而去姦之法乃不及於三代何者待其敗露自入於刑而後去也夫為惡而不入於刑者固已衆矣有終身為不義而其罪不可指名以附於法者有巧為規避持吏短長而不可詰者又有因緣幸會而免者如必待其自入於刑則其所去者蓋無幾耳昔周之制民有罪惡未麗於法而害於州里者桎梏而坐諸嘉石重罪役之期以次輕之其下罪三月役使州里任之然後宥而舍之其化之不從威之不格患苦其鄉之民而未入於五刑者謂之罷民凡罷民不使冠帶而加明刑任之以事而不齒於鄉黨由是觀之則周之盛時日夜整齊其人民而鋤去其不善譬如獵人終日馳驅踐蹂於草茅之中搜求伏兔而摶之不待其自投於網羅而後取也夫然故小惡不容於鄉大惡不容於國禮樂之所以昜化而法禁之所以昜行者由此之故也今天下久安天子以仁恕為心而士大夫一切以寬厚為稱上意而懦夫庸人又有僥幸務出罪人外以邀雪寃之賞而內以待隂德之報臣是以知天下頗有不誅之姦將為子孫憂宜明勑天下之吏使以嵗時紏察凶民而徙其尤無良者不必待其自入於刑而間則命使出按郡縣有子不孝有弟不悌好訟而數犯法者皆誅無赦誅一鄉之姦則一鄉之人恱誅一國之姦則一國之人悅要以誅寡而悅衆則雖堯舜亦如此而已矣天下有三患而蠻夷之憂不與焉有內大臣之變有外諸侯之叛有匹夫羣起之禍此三者其勢常相持內大臣有權則外諸侯不叛外諸侯強則匹夫羣起之禍不作今者內無權臣外無強諸侯而萬世之後其可憂者姦民也臣故曰去姦民以為安民之終云唐宋八大家文鈔卷一百三十七
