body:
  text: 唐宋八大家文鈔卷一百二十二明茅坤撰東坡文鈔六狀朝辭赴定州論事狀老成典刑之言臣聞天下治亂出于下情之通塞至治之極至于小民皆能自通大亂之極至於近臣不能自逹易曰天地交泰其詞曰上下交而其志同又曰天地不交否其詞曰上下不交而天下無邦夫無邦者亡國之謂也上下不交則雖有朝廷君臣而亡國之形已具矣可不畏哉臣不敢復引衰世昏主之事只如唐明皇中興刑措之君也而天寶之末小人在位下情不通則鮮于仲通以二十萬全軍陷沒於瀘南明皇不知馴致其事至安祿山反兵已過河而明皇猶以為忠臣此無他下情不通耳目壅蔽則其漸至于此也臣在經筵數論此事陛下為政九年除執政臺諫外未嘗與羣臣接然天下不以為非者以謂垂簾之際不得不爾也今者祥除之後聽政之初當以通下情除壅蔽為急務臣雖不肖䝉陛下擢為河北西路安撫使沿邊重地此為首冠臣當悉心論奏陛下亦當垂意聽納祖宗之法邊帥當上殿靣辭而陛下獨以本任闕官迎接人衆為詞降㫖拒臣不令上殿此何義也臣若伺候上殿不過更留十日本任闕官自有轉運使權攝無所闕事迎接人衆不過更支十日糧有何不可而使聽政之初將帥不得一面天顔而去有識之士皆謂陛下厭聞人言意輕邊事其兆見於此矣臣備位講讀日侍帷幄前後五年可謂親近方當戍邊不得一見而行况疏逺小臣欲求自通亦難矣易曰天行健君子以自强不息又曰帝出乎震相見乎離夫聖人作而萬物覩今陛下聽政之初不行乘乾出震見離之道廢祖宗臨遣將帥故事而襲行垂簾不得巳之政此朝廷有識所以驚疑而憂慮也臣不得上殿於臣之私别無利害而於聽政之始天下屬目之際所損聖德不小臣巳於今月二十七日出門非敢求登對然臣始者本俟上殿欲少效愚忠今來不敢以不得對之故便廢此言惟陛下察臣誠心少加採納古之聖人將有為也必先處晦而觀明處靜而觀動則萬物之情畢陳於前不過數年自然知利害之真識邪正之實然後應物而作故作無不成臣敢以小事譬之夫操舟者常患不見水道之曲折而水濵之立觀者常見之何則操舟者身寄於動而立觀者常靜故也奕碁者勝負之形雖國工有所不盡而袖手旁觀者常盡之何則奕者有意於爭而旁觀者無心故也若人主靜而無心天下其孰能欺之漢景帝即位之初首用鼂錯更易法令黜削諸侯遂成七國之變景帝往來兩宮間寒心者數月終身不敢復言兵武帝即位未幾遂欲用兵鞭撻四夷兵連禍結三十餘年然後下哀痛詔封宰相為富民侯臣以此知古者英睿之君勇於立事未有不悔者也景帝之悔速故變而復安武帝之悔遲故幾至於亂雖遲速安危小異然比之常靜無心終始不悔如孝文帝者不可同年而語矣今陛下聖智絶人春秋鼎盛臣願虛心循理一切未有所為默觀庶事之利害與羣臣之邪正以三年為期俟得利害之真邪正之實然後應物而作使既作之後天下無恨陛下亦無悔上下同享太平之利則雖盡南山之竹不足以紀聖功兼三宗之壽不足以報聖德由此觀之陛下之有為惟憂太早不患稍遲亦巳明矣臣又聞為政如用藥方今天下雖未大治實無大病古人云有病不治常得中醫雖未能盡除小疾然賢於誤服惡藥覬萬一之利而得不救之禍者逺矣臣恐急進好利之臣輒勸陛下輕有改變故輒進此說敢望陛下深信古語且守中醫安穩萬全之䇿勿為惡藥所誤實社稷宗廟之利天下幸甚臣不勝忘身憂國之心冒死進言謹録奏聞伏候敕㫖轉對條上三事狀並關經國之大者元祐三年五月一日翰林學士朝奉郎知制誥兼侍讀蘇軾狀奏准御史臺牒五月一日文德殿視朝臣次當轉對雖愚無知備位禁林懷有所見不敢不盡謹條上三事如左一謹按唐太宗著司門令式云其有無門籍人有急奏者皆令監門司與仗家引奏不許關礙臣以此知明主務廣視聽深防蔽塞雖無門籍人猶得非時引見祖宗之制自兩省兩制近臣六曹寺監長二有所欲言及典大藩鎮奉使一路出入辭見皆得奏事殿上其餘小臣布衣亦時特賜召問非獨以通下情知外事亦以考察羣臣能否情僞非苟而巳臣伏見陛下嗣位以來惟執政日得上殿外其餘獨許臺諫官及開封知府上殿不過十餘人天下之廣事物之變決非十餘人者所能盡若此十餘人者不幸而非其人民之利病不以實告則陛下便謂天下太平無事可言豈不殆哉其餘臣僚雖許上書言事而書入禁中如在天上不加反復詰問何以盡利害之實而况天下事有不可以書載者心之精微口不能盡而况書乎恭惟太皇太后以盛德在位每事抑損以謙遜不居為美雖然明目達聰以防壅塞此乃社稷大計豈可以謙遜之故而遂不與羣臣接哉方今天下多事饑饉盜賊四夷之變民勞官冗將驕卒惰財用匱乏之弊不可勝數而政出帷箔決之廟堂大臣尤宜開兼聽廣覽之路而避專斷壅塞之嫌非細故也伏望聖慈更與大臣啇議除臺諫開封知府巳許上殿外其餘臣僚舊制許請間奏事及出入辭見許上殿者皆復祖宗故事則天下幸甚一凡為天下國家當愛惜名器慎重刑罰若愛惜名器則斗升之祿足以鼓舞豪傑慎重刑罰則笞杖之法足以震讋頑狡若不愛惜慎重則雖日拜卿相而人不勸動行誅戮而人不懼此安危之機人主之操術也自祖宗以來用刑至慎習以成風故雖展年磨勘差替衝替之類皆足以懲警在位獨於名器爵祿則出之太易每一次科場放進士諸科及特奏名約八九百人一次郊禮奏補子弟約二三百人而軍職轉補雜色入流皇族外戚之薦不與自近世以來取人之多得官之易未有如本朝者也今吏部一官闕率常五七人守之爭奪紛紜亷耻道盡中材小官闕逺食貧到官之後侵漁求取靡所不為自本朝以來官冗之弊未有如今日者也伏見祖宗舊制過省舉人御試黜落不少既以慎重取人又以見名器威福專在人主至嘉祐末年始盡賜出身雖文理紕繆亦玷科舉而近歲流弊之極至於雜犯亦免黜落皆非祖宗本意又進士升甲本為南省第一人唱名近下方有特㫖皆是臨時出於聖斷今來南省第十人以上别試第一人國子開封解元武舉第一人經明行修舉人與凡該特奏名人正及第者皆著令升一甲紛然並進人不復以升甲為榮而法在有司恩不歸於人主甚無謂也特奏名人除近上十餘人文詞稍可觀外其餘皆詞學無取年迫桑榆進無所望退無所歸使之臨政其害民必矣欲望聖慈特詔大臣詳議今後進士諸科御試過落之法及特奏名出官格式務在精核以藝取人不行小惠以收虛譽其著令升甲指揮乞今後更不施行昔諸葛亮與法正論治道其略曰刑政不肅君臣之道漸以陵替寵之以位位極則賊順之以恩恩竭則慢吾今威之以法法行則知恩限之以爵爵加則知榮恩榮並濟上下有節為治之要也唐德宗䝉塵山南當時事勢可謂危急少行姑息亦理之常而㳂路進瓜果人欲與一試官陸贄力言以為不可今天下晏然朝廷清明何所畏避而行姑息之政故臣願陛下常以諸葛亮陸贄之言為法則天下幸甚一臣於前年十月內曾上言其略曰議者欲減任子以救官冗之弊此事行之則人情不悅不行則積弊不去要當求其分義務適厥中使國有去弊之實人無失職之嘆欲乞應奏䕃文官人每遇科場隨進士考試武官即隨武舉或試法人考試並三人中解一人仍年及二十五以上方得出官內巳曾舉進士得解者免試如三試不中年及三十五巳上亦許出官雖有三試留滯之艱而無終身絶望之嘆亦使人人務學不墜其家為益不小後來不䝉降出施行切慮當時聖意必謂改元之初不欲首行約損之政今者即位巳四年矣官冗之病有增而無損財用之乏有損而無增數年之後當有不勝其弊者若朝廷恬不為怪當使誰任其憂及今講求臣恐其巳晚矣伏乞撿㑹前奏早賜施行右謹録奏聞伏候敕㫖薦宗室令畤狀今使國家待宗室得如子瞻此議甚善臣聞之詩曰懷德維寧宗子維城宗室之有人邦家之光社稷之衛也周之盛時其卿士皆周召毛原非王之伯叔父則其子弟也逮至兩漢間平之德歆向之文天下以為口實而唐之宗室武略如道宗孝恭文章如白與賀者不可以一二數而以功名至宰相者有九人焉自建隆以來纍聖執謙不私其親幹國治民不及宗子雖有文武異才終身不試神宗皇帝實始慨然欲出其英髦與天下共之故增立教養選舉之法行之二十年出入中外漸就器使而未見有卓然顯聞稱先帝意者豈無其人蓋朝廷未有以大聳勸之耳臣伏見承議郎簽書潁州節度判官㕔公事令畤事親篤孝內行純備博學經史手不釋卷吏事通敏文采俊麗志節端亮議論英發體兼衆器無適不宜臣嘗見其所著述筆力雅健博貫子史蓋清廟之瑚璉明堂之杞梓也使其生於幽逺猶當擢用而况近託肺腑巳䝉試用者乎伏望聖慈特賜考察召致館閣養其髙才而遂其逺業以風動宗室勸示海內成先帝之意不以臣人微言輕而廢其請也若後不如所舉臣井伏朝典謹録奏聞伏候敕㫖奏馬徹不當屏出學狀近代往往有國子生及謁選人上書陳言輒與隔絶甚且法坐為民等項區處殊非古之明目達聰之意唐宋太學諸生數得論列朝政得失本朝正統時如祭酒李勉逮獄監生猶得為論救准太學條三學生凡有進獻文字及書啓贄有位並先經長二看詳可否違者出學右本部看詳諸色人茍有所見公私利害皆得進狀許直於所屬官司投下即無更令官吏看詳可否方得投進之文所以達聰明防壅蔽古今不易之道也本因國子監生員獨緣本監起請遂立上條曲生防禁至於投獻書啓文字求知公卿此正舉人常事今乃使本監長二先行看詳違者皆屏出學若論列朝政得失使其言當理固人主所欲聞也若不當理亦人主所當容也今乃先令有司看詳去取甚非子産不毁鄉挍魏相去副封之意也去年九月內太學內舍生馬徹進狀論禮部韻略有疏略未盡事件䝉朝廷送下本部謹按徹所論文指雅馴考驗經史皆有援據此乃內舍生員之優者教養之官所當愛惜而其所論亦當下有司詳議增損施行本部尋下本監勘當准回申巳於十二月內撿舉上條其馬徹巳屏出學以此顯見上條無益有害欲乞朝廷詳酌特與刪除不行仍乞依舊令馬徹充內舍生其所進狀乞行下有司看詳如有可采乞賜施行謹録奏聞伏候敕㫖論河北京東盜賊狀關係國家大利害文字臣伏見河北京東比年以來蝗旱相仍盜賊漸熾今又不雨自秋至冬方數千里麥不入土竊料明年春夏之際寇攘為患甚於今日是以輒陳狂瞽庶補萬一謹按山東自上世以來為腹心根本之地其與中原離合常係社稷安危昔秦并天下首收三晉則其餘强敵相繼滅亡漢髙祖殺陳餘走田橫則項氏不支光武亦自漁陽上谷發突騎席卷以并天下魏武帝破殺袁氏父子收冀州然後四方莫敢敵宋武帝以英雄絶人之資用武歷年而不能并中原者以不得河北也隋文帝以庸夫穿窬之智竊位數年而一海內者以得河北也故杜牧之論以為山東之地王者得之以為王霸者得之以為霸猾賊得之以為亂天下自唐天寶以後姦臣僣峙於山東更十一世竭天下之力終不能取以至於亡近世賀德倫挈魏博降後唐而梁亡周髙祖自鄴都入京師而漢亡由此觀之天下存亡之權在河北無疑也陛下即位以來北方之民流移相屬天災譴告亦甚於四方五六年間未有以塞大異者至於京東雖號無事亦當常使其民安逸富强緩急足以灌輸河北瓶竭則罍耻脣亡則齒寒而近年以來公私匱乏民不堪命今流離饑饉議者不過欲散賣常平之粟勸誘蓄積之家盜賊縱橫議者不過欲增開告賞之門申嚴緝捕之法皆未見其益也常平之粟纍經振發所存無幾矣而饑寒之民所在皆是人得升合官費丘山蓄積之家例皆困乏貧者未䝉其利富者先被其災昔季康子患盜問於孔子對曰茍子之不欲雖賞之不竊乃知上不盡利則民有以為生茍有以為生亦何苦而為盜其間凶殘之黨樂禍不悛則須敕法以峻刑誅一以警百今中民以下舉皆闕食冒法而為盜則死畏法而不盜則饑饑寒之與棄市均是死亡而賖死之與忍饑禍有遲速相率為盜正理之常雖日殺百人勢必不止茍非陛下至明至聖至仁至慈較得喪之孰多權禍福之孰重特於財利少有所捐衣食之門一開骨髓之恩皆遍然後信賞必罰以威克恩不以僥幸廢刑不以災傷撓法如此而人心不革盜賊不衰者未之有也謹條其事畫一如左一臣所領密州自今歲秋旱種麥不得直至十月十三日方得數寸雨雪而地冷難種雖種不生比常年十分中只種得二三竊聞河北京東例皆如此尋常撿放災傷依法須是撿行根苖以定所放分數今來二麥元不曾種即無根苗可撿官吏守法無緣直放若夏稅一例不放則人户必至逃移尋常逃移猶有逐熟去處今數千里無麥去將安往但恐良民舉為盜矣且天上無雨地下無麥有眼者共見有耳者共聞決非欺罔朝廷豈可坐觀不放欲乞河北京東逐路選差臣僚一員體量放稅更不撿視若未欲如此施行即乞將夏稅斛㪷取今日以前五年酌中一年實直令三等巳上人户取便納見錢或正色其四等以下且行倚閣緣今來麥田空間若春雨調勻却可以廣種秋稼候至秋熟並將秋色折納夏稅若是巳種苖麥委有災傷仍與依條撿放其闕麥去處官吏諸軍請受且支白米或支見錢所貴小民不致大假失所一河北京東自來官不𣙜鹽小民仰以為生近日臣僚上章輒欲禁𣙜賴朝廷體察不行其言兩路吏民無不相慶然臣勘㑹近年鹽稅日增元本兩路祖額三十三萬二千條貫至熙寧六年增至四十九萬九千餘貫七年亦至四十三萬五千餘貫顯見刑法日峻告捕日繁是致小民愈難興販朝廷本為此兩路根本之地而煮海之利天以養活小民是以不忍盡取其利濟惠鰥寡隂消盜賊舊時孤貧無業惟務販鹽所以五六年前盜賊稀少是時告捕之賞未嘗破省錢惟是犯人催納役人量出今鹽課浩大告許如麻貧民販鹽不過一兩貫錢本偷稅則賞重納稅則利輕欲為農夫又值凶歲若不為盜惟有忍饑所以五六年來課利日增盜賊日衆臣勘㑹密州鹽稅去年一年比祖額增二萬貫却支捉賊賞錢一萬一千餘貫其餘未獲賊人尚多以此較之利害得失斷可見矣欲乞特敕兩路應販鹽小客截自三百斤以下並與權免收稅仍官給印本空頭關子與竈戶及長引大客令上厯破使逐旋書填月日姓名斤兩與小客限十日更不行用如敢借名為人影帶分減鹽貨許諸人陳告重立賞罰候將來秋熟日仍舊并元降敕榜明言出自聖意令所在雕印散榜鄉村人非木石寧不感動一飲一食皆誦聖恩以至舊來貧賤之民近日饑寒之黨不待驅率一歸於鹽奔走爭先何暇為盜人情不逺必不肯捨安穩衣食之門而趍冒法危亡之地也議者必謂今用度不足若行此法則鹽稅大虧必致闕事臣以為不然凡小客本少力微不過行得三兩程若三兩程外須藉大啇興販決非三百斤以下小客所能行運無緣大假走失且平時大商所苦以鹽遲而無人買小民之病以僻逺而難得鹽今小啇不出稅錢則所在爭來分買大啇既不積滯則輪流販賣收稅必多而鄉村僻逺無不食鹽所賣亦廣損益相補必無大虧之理縱使虧失不過却只得祖額元錢當時官司有何闕用茍朝廷捐十萬貫錢買此兩路之人不為盜賊所獲多矣今使朝廷為此兩路饑饉特出一二十萬貫見錢散與人戶人得一貫只及二十萬人而一貫見錢亦未能濟其性命若特放三百斤以下鹽稅半年則兩路之民人人受賜貧民有衣食之路富民無盜賊之憂其利豈可勝言哉若使小民無以為生舉為盜賊則朝廷之憂恐非十萬貫錢所能了辦又况所支捉賊賞錢未必少於所失鹽課臣所謂較得喪之孰多權禍福之孰重者為此也一勘㑹諸處盜賊太半是按問減等災傷免死之人走還舊處挾恨報讐為害最甚盜賊自知不死既輕犯法而人戶亦憂其復來不敢告捕是致盜賊公行切詳按問自言皆是詞窮理屈勢必不免本無改過自新之意有何可愍獨使從輕同黨之中獨不免死其災傷敕雖不下與行不同而盜賊小民無不知者但不傷變主免死無疑且不傷變主情理未必輕於偶傷變主之人或多聚徒衆或廣置兵仗或摽異服飾或質劫變主或驅虜平人或賂遺貧民令作耳目或書寫道店恐動官私如此之類雖偶不傷人情理至重非止闕食之人茍營餱糧而巳欲乞今後盜賊贓證未明但巳經考掠方始承認者並不為按問減等其災傷地分委自長吏相度情理輕重內情理重者依法施行所貴凶民稍有畏忌而良民敢於捕告臣所謂衣食之門一開骨髓之恩皆遍然後信賞必罰以威克恩不以僥幸廢刑不以災傷撓法者為此也右謹具如前自古立法制刑皆以盜賊為急盜竊不巳必為强劫强劫不巳必至戰攻或為豪傑之資而致勝廣之漸而况京東之貧富係河北之休戚河北之治亂係天下之安危識者共知非臣私說願陛下深察此事至重所捐小利至輕斷自聖心決行此䇿臣聞天聖中蔡齊知密州是時東方饑饉齊乞放行鹽禁先帝從之一方之人不覺饑旱臣愚且賤雖不敢望於蔡齊而陛下聖明度越堯禹豈不能行此小事有愧先朝所以越職獻言不敢自外伏望聖慈察其區區之意赦其狂僣之誅臣無任悚懷待罪之至代李琮論京東盜賊狀與徐州所上書意同臣伏見自來河北京東常苦盜賊而京東尤甚不獨穿窬胠篋椎埋發塜之姦至有飛揚跋扈割據僣擬之志近者李逢徒黨青徐妖賊皆在京東凶愚之民殆巳成俗自昔大盜之發必有釁端今朝廷清明四方無虞而此等常有不軌之意者殆土地風氣習俗使然不可不察也漢髙帝沛人項羽宿遷人劉裕彭城人黃巢宛朐人朱全忠碭山人其餘歷代豪傑出於京東者不可勝數故凶愚之人常以此藉口而其材力心膽實亦過人加以近年改更貢舉條制掃除腐爛專取學術其秀民善士既以改業而其朴魯强捍難化之流抱其無用之書各懷不逞之意朝廷雖敕有司别立字號以收三路舉人而此等自以世傳朴學無由復踐場屋老死田里不入彀中私出怨言幸災伺隙臣每慮及此即為寒心揚雄有言御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵而班固亦論劇孟郭解之流皆有絶異之姿而惜其不入於道德茍放縱於末流是知人之善惡本無常性若御得其道則向之姦猾盡是忠良故許子將謂曹操曰子治朝之能臣亂世之姦雄使韓彭不遇漢髙亦與盜賊何異臣竊嘗為朝廷計以為窮其黨而去之不如因其材而用之何者其黨不可勝去而其材自有可用昔漢武嘗遣繡衣直指督捕盜賊所至以軍興從事斬二千石以下可謂急矣而盜賊不為少衰者其黨固不可盡也若朝廷因其材而用之則盜賊自消而豪傑之士可得而使請以唐事明之自天寶以後河北諸鎮相繼僣亂雖憲宗英武亦不能平觀其主帥皆卒伍庸材而能於六七十年間與朝廷相抗者徒以好亂樂禍之人背公死黨之士相與出力而輔之也至穆宗之初劉總入朝而河北始平總知河北之亂權在此輩於是盡籍軍中宿將名豪如朱克融之流薦於朝冀厚與爵位使北方之人羡慕向進革其亂心而宰相崔植杜元潁皆庸人無逺慮以為河北既平天下無事克融輩久留京師終不録用饑寒無告怨忿思亂㑹張洪靖赴鎮遂遣還幽州而克融等作亂復失河朔今陛下鑑唐室既往之咎當收京東河北豪傑之心臣伏見近日沂州百姓程棐告獲妖賊郭進等竊聞棐之弟嶽乃是李逢之黨配在桂州豪俠武健又過於棐京東州郡如棐嶽者不可勝數此等棄而不用即作賊收而用之即捉賊其理甚明臣願陛下精選青鄆兩帥京東京西職司及徐沂兖單濰密淄齊曹濮知州諭以此意使隂求部內豪猾之士或有武力或多權謀或通知術數而曉兵或家富於財而好施如此之類皆召而勸奬使以告捕自效籍其姓名以聞於朝所獲盜賊量輕重酬賞若獲真盜大姦隨即録用若只是尋常劫賊即纍其人數酬以一官使此輩歆艷其利以為進身之資但能拔擢數人則一路自然競勸貢舉之外别設此科則向之遺材皆為我用縱有姦雄嘯聚亦自無徒但每州搜羅得一二十人即耳目遍地盜賊無容足之處矣歷觀自古竒偉之士如周處戴淵之流皆出於羣盜改惡修善不害為賢而况以捉賊出身有何不可若朝廷隨材試用異日攘戎狄立功名未必不由此塗出也非陛下神聖英武不能決行此䇿臣雖非職事而受恩至深有所見聞不敢瘖默謹録奏聞伏候敕㫖唐宋八大家文鈔卷一百二十二
