body:
  text: 唐宋八大家文鈔卷二明茅坤撰昌黎文鈔二書上張僕射書申情之文故宜於圓暢反復九月一日愈再拜受牒之明日在使院中有小吏持院中故事節目十餘事來示愈其中不可者有自九月至明年二月之終皆晨入夜歸非有疾病事故輒不許出當時以初受命不敢言古人有言曰人各有能有不能若此者非愈之所能也抑而行之必發狂疾上無以承事于公忘其將所以報德者下無以自立喪失其所以為心夫如是則安得而不言凡執事之責於愈者非為其能晨入夜歸也必將有以取之茍有以取之雖不晨入而夜歸其所取者猶在也下之事上不一其事上之使下不一其事量力而任之度才而處之其所不能不强使為是故為下者不獲罪於上為上者不得怨於下矣孟子有云今之諸侯無大相過者以其皆好臣其所教而不好臣其所受教今之時與孟子之時又加遠矣皆好其聞命而奔走者不好其直己而行道者聞命而奔走者好利者也直己而行道者好義者也未有好利而愛其君者未有好義而忘其君者今之王公大人惟執事可以聞此言惟愈於執事也可以此言進愈䝉幸於執事其所從舊矣若寬假之使不失其性加待之使足以為名寅而入盡辰而退申而入終酉而退率以為常亦不廢事天下之人聞執事之於愈如是也必皆曰執事之好士也如此執事之待士以禮如此執事之使人不枉其性而能有容如此執事之欲成人之名如此執事之厚於故舊如比又將曰韓愈之識其所依歸也如此韓愈之不諂屈於富貴之人如此韓愈之賢能使其主待之以禮如此則死於執事之門無悔也若使隨行而入逐隊而趨言不敢盡其誠道有所屈於已天下之人聞執事之於愈如此皆曰執事之用韓愈哀其窮收之而巳耳韓愈之事執事不以道利之而巳耳茍如是雖日受千金之賜一嵗九遷其官感恩則有之矣將以稱於天下曰知已知已則未也伏惟哀其所不足矜其愚不録其罪察其辭而埀仁採納焉古之人有言曰道屈於不知已者而伸於知巳昌黎根氣自如此上張僕射第二書婉而宕其詞㫖與司馬相如諫獵書相參愈再拜以擊毬事諫執事者多矣諫者不休執事不止此非為其樂不可捨其諫不足聽故哉諫不足聽者辭不足感心也樂不可捨者患不能切身也今之言毬之害者必曰有危墮之憂有激射之虞小者傷面目大者殘形軀執事聞之若不聞者其意必曰進若習熟則無危墮之憂避能便捷則免激射之虞小何傷於面目大何纍於形軀者哉愈今所言皆不在此其指要非以他事外物牽引相比也特以擊毬之間之事明之耳馬之與人情性殊異至於筋骸之相束血氣之相持安佚則適勞頓則疲者同也乘之有道步驟折中少必無疾老必後衰及以之馳毬於場蕩搖其心腑振撓其骨筋氣不及出入走不及回旋遠者三四年近者一二年無全馬矣然則毬之害於人也决矣凡五藏之繫絡甚微坐立必懸埀於胸臆之間而以之顛頓馳騁嗚呼其危哉春秋傳曰夫有尤物足以移人茍非德義則必有禍雖豈弟君子神明所扶持然廣慮之深思之亦養夀命之一端也愈恐懼再拜上兵部李侍郎書中多自悲并以自譽愈少鄙鈍於時事都不通曉家貧不足以自活應舉覓官凡二十年矣薄命不幸動遭讒謗進寸退尺卒無所成性本好文學因困厄悲愁無所告語遂得究窮於經傳史記百家之說沉潜乎訓義反復乎句讀礱磨乎事業而奮發乎文章凡自唐虞巳來編簡所存大之為河海高之為山嶽明之為日月幽之為鬼神纎之為珠璣華實變之為雷霆風雨竒辭奧㫖靡不通達惟是鄙鈍不通曉於時事學成而道益窮年老而智益困私自憐悼悔其初心髮禿齒豁不見知已夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聽而識之者難遇也伏以閣下內仁而外義行高而德巨尚賢而與能哀窮而悼屈自江而西既化而行矣今者入守內職為朝廷大臣當天子新即位汲汲於理化之日出言舉事宜必施設既有聽之之明又有振之之力寧戚之歌鬷明之言不發於左右則後而失其時矣謹獻舊文一卷扶樹教道有所明白南行詩一卷舒憂娛悲雜以瓌怪之言時俗之好所以諷於口而聽於耳也如賜覽觀亦有可采干黷嚴尊伏增惶恐鄧州北寄上襄陽于相公書似譽而昌伏䝉示文武順聖樂辭天保樂詩讀蔡琰胡笳辭詩移族從并與京兆書自幕府至鄧之北境凡五百餘里自庚子至甲辰凡五日手披目視口詠其言心惟其義且恐且懼忽若有亡不知鞍馬之勤道塗之遠也夫澗谷之水深不過咫尺丘垤之山高不能踰尋丈人則狎而玩之及至臨泰山之懸崖窺巨海之驚瀾莫不戰掉悼栗眩惑而自失所觀變於前所守易於內亦其理宜也閣下負超卓之竒材蓄雄剛之俊德渾然天成無有畔岸而又貴窮乎公相威動乎區極天子之毗諸侯之師故其文章言語與事相侔憚赫若雷霆浩汗若河漢正聲諧韶濩徑氣沮金石豐而不餘一言約而不失一辭其事信其理切孔子之言曰有德者必有言信乎其有德且有言也揚子雲曰商書灝灝爾周書噩噩爾信乎其能灝灝而且噩噩也昔者齊君行而失道管子請釋老馬而隨之樊遲請學稼孔子使問之老農夫馬之智不賢於夷吾農之能不聖於尼父然且云爾者聖賢之能多農馬之知專故也今愈雖愚且賤其從事於文實專且久則其贊王公之能而稱大君子之美不為僭越也伏惟詳察上宰相書引經術似劉向所乏者西漢風韻正月二十七日前鄉貢進士韓愈謹伏光範門下再拜獻書相公閣下詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣其詩曰菁菁者莪在彼中阿既見君子樂且有儀說者曰菁菁者盛也莪微草也阿大陵也言君子之長育人材若大陵之長育微草能使之菁菁然盛也既見君子樂且有儀云者天下美之之辭也其三章曰既見君子錫我百朋說者曰百朋多之之辭也言君子既長育人材又當爵命之賜之厚祿以寵貴之云爾其卒章曰泛泛楊舟載沉載浮既見君子我心則休說者曰載載也沉浮者物也言君子之於人材無所不取若舟之於物浮沉皆載之云爾既見君子我心則休云者言若此則天下之心美之也君子之於人也既長育之又當爵命寵貴之而於其才無所遺焉孟子曰君子有三樂王天下不與存焉其一曰樂得天下之英才而教育之此皆聖人賢士之所極言至論古今之所宜法者也然則孰能長育天下之人材將非吾君與吾相乎孰能教育天下之英才將非吾君與吾相乎幸今天下無事小大之官各守其職錢穀甲兵之問不至於廟堂論道經邦之暇捨此宜無大者焉今有人生二十八年矣名不著於農工商賈之版其業則讀書著文歌頌堯舜之道雞鳴而起孜孜焉亦不為利其所讀皆聖人之書楊墨釋老之學無所入於其心其所著皆約六經之㫖而成文抑邪與正辨時俗之所惑居窮守約亦時有感激怨懟竒怪之辭以求知於天下亦不悖於教化妖淫諛佞譸張之說無所出於其中四舉於禮部乃一得三選於吏部卒無成九品之位其可望一畝之宫其可懷遑遑乎四海無所歸恤恤乎饑不得食寒不得衣濵於死而益固得其所者爭笑之忽將棄其舊而新是圖求老農老圃而為師悼本志之變化中夜涕泗交頤雖不足當詩人孟子之謂抑長育之使成材其亦可矣教育之使成才其亦可矣抑又聞古之君子相其君也一夫不獲其所若已推而內之溝中今有人生七年而學聖人之道以修其身積二十年不得已一朝而毁之是亦不獲其所矣伏念今有仁人在上位若不往告之而遂行是果於自棄而不以古之君子之道待吾相也其可乎寧往告焉若不得志則命也其亦行矣洪範曰凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福是皆與善之辭也抑又聞古之人有自進者而君子不逆之矣曰豫攸好德汝則錫之福之謂也抑又聞上之設官制祿必求其人而授之者非茍慕其才而富貴其身也蓋將用其能理不能用其明理不明者耳下之修己立誠必求其位而居之者非茍沒於利而榮於名也蓋將推已之所餘以濟其不足者耳然則上之於求人下之於求位交相求而一其致焉耳茍以是而為心則上之道不必難其下下之道不必難其上可舉而舉焉不必讓其自舉也可進而進焉不必廉於自進也抑又聞上之化下得其道則勸賞不必遍加乎天下而天下從焉因人之所欲為而遂推之之謂也今天下不由吏部而仕進者幾希矣主上感傷山林之士有逸遺者屢詔內外之臣旁求於四海而其至者蓋闕焉豈其無人乎哉亦見國家不以非常之道禮之而不來耳彼之處隱就閒者亦人耳其耳目鼻口之所欲其心之所樂其體之所安豈有異於人乎哉今所以惡衣食窮體膚麋鹿之與處猿狖之與居固自以其身不能與時從順俯仰故甘心自絶而不悔焉而方聞國家之仕進者必舉於州縣然後升於禮部吏部試之以繡繪雕琢之文考之以聲勢之逆順章句之短長中其程式者然後得從下士之列雖有化俗之方安邊之䇿不繇是而稍進萬不有一得焉彼惟恐入山之不深入林之不密其影響昧昧惟恐聞於人也今若聞有以書進宰相而求仕者而宰相不辱焉而薦之天子而爵命之而布其書於四方枯槁沉溺魁閎寬通之士必且洋洋焉動其心峩峩焉纓其冠于于焉而來矣此所謂勸賞不必遍加乎天下而天下從焉者也因人之所欲為而遂推之之謂者也伏惟覽詩書孟子之所指念育才錫福之所以考古之君子相其君之道而忘自進自舉之罪思設官制祿之故以誘致山林逸遺之士庶天下之行道者知所歸焉小子不敢自幸其嘗所著文輒采其可者若干首録在異卷冀辱賜觀焉干瀆尊嚴伏地待罪愈再拜後十九日復上書所見似悲蹙而文則宕逸可誦二月十六日前鄉貢進士韓愈謹再拜言相公閣下向上書及所著文後待命凡十有九日不得命恐懼不敢逃遁不知所為乃復敢自納於不測之誅以求畢其說而請命於左右愈聞之蹈水火者之求免於人也不惟其父兄子弟之慈愛然後呼而望之也將有介於其側者雖其所憎怨茍不至乎欲其死者則將大其聲疾呼而望其仁之也彼介於其側者聞其聲而見其事不惟其父兄子弟之慈愛然後往而全之也雖有所憎怨茍不至乎欲其死者則將狂奔盡氣濡手足焦毛髮救之而不辭也若是者何哉其勢誠急而其情誠可悲也愈之强學力行有年矣愚不惟道之險夷行且不息以蹈於窮餓之水火其既危且亟矣大其聲而疾呼矣閣下其亦聞而見之矣其將往而全之歟抑將安而不救歟有來言於閣下者曰有觀溺於水而爇於火者有可救之道而終莫之救也閣下且以為仁人乎哉不然若愈者亦君子之所宜動心者也或謂愈子言則然矣宰相則知子矣如時不可何愈竊謂之不知言者誠其材能不足當吾賢相之舉耳若所謂時者固在上位者之為耳非天之所為也前五六年時宰相薦聞尚有自布衣䝉抽擢者與今豈異時哉且今節度觀察使及防禦營田諸小使等尚得自舉判官無間於巳仕未仕者况在宰相吾君所尊敬者而曰不可乎古之進人者或取於盜或舉於管庫今布衣雖賤猶足以方於此情隘辭蹙不知所裁亦惟少埀憐焉後草九日復上書議論正大勝前篇當看虛字斡旋處三月十六日前鄉貢進士韓愈謹再拜言相公閣下愈聞周公之為輔相其急於見賢也方一食三吐其哺方一沐三握其髮當是時天下之賢才皆已舉用姦邪讒佞欺負之徒皆已除去四海皆已無虞九夷八蠻之在荒服之外者皆已賔貢天災時變昆蟲草木之妖皆已銷息天下之所謂禮樂刑政教化之具皆已修理風俗皆已敦厚動植之物風雨霜露之所霑被者皆已得宜休徴嘉瑞麟鳯龜龍之屬皆巳備至而周公以聖人之才慿叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而巳豈復有賢於時百執事者哉豈復有所計議能補於周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意不得於天下之心如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沐矣豈特吐哺握髮為勤而止哉惟其如是故于今頌成王之德而稱周公之功不衰今閣下為輔相亦近耳天下之賢才豈盡舉用姦邪讒佞欺負之徒豈盡除去四海豈盡無虞九夷八蠻之在荒服之外者豈盡賔貢天災時變昆蟲草木之妖豈盡銷息天下之所謂禮樂刑政教化之具豈盡修理風俗豈盡敦厚動植之物風雨霜露之所霑被者豈盡得宜休徴嘉瑞麟鳯龜龍之屬豈盡備至其所求進見之士雖不足以希望盛德至比於百執事豈盡出其下哉其所稱說豈盡無所補哉今雖不能如周公吐哺握髮亦宜引而進之察其所以而去就之不宜默默而巳也愈之待命四十餘日矣書再上而志不得通足三及門而閽人辭焉惟其昏愚不知逃遁故復有周公之說焉閣下其亦察之古之士三月不仕則相弔故出疆必載質然所以重於自進者以其於周不可則去之魯於魯不可則去之齊於齊不可則去之宋之鄭之秦之楚也今天下一君四海一國舍乎此則夷狄矣去父母之邦矣故士之行道者不得於朝則山林而已矣山林者士之所獨善自養而不憂天下者之所能安也如有憂天下之心則不能矣故愈每自進而不知愧焉書亟上足數及門而不知止焉寧獨如此而已惴惴焉惟不得出大賢之門下是懼亦惟少埀察焉瀆冒威尊惶恐無巳愈再拜唐宋八大家文鈔卷二
