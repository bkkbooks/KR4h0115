body:
  text: 唐宋八大家文鈔卷一百六十一明茅坤撰潁濱文鈔十七䇿民政䇿六役游民今既有丁錢而復欲收游民之庸調恐亦難行獨其敘事細密而文一一如畫三代之時無兵役之憂降及近世有養兵之困而無興役之患至於今而養兵興役之事皆不得其當而可為之深憂蓋古者兵出於農而役出於民有農則不憂無兵而有民則不憂無役五口之家常有一人之兵而二十嵗之男子嵗有三日之役故其兵强而費不增役起而人素具雖有大兵大役而不憂事之不集至於兵罷役休而無日夜不息之費其後周衰井田破壞陵夷至於末世天下無復天子之田皆民之所自有天下之民不食天子之田是故獨賦其稅而不任之以死傷戰鬬之患天子有養兵之憂而天下無攻守劬勞之民以為大憂故調其財以為養兵之用而天下之役凡其所以轉輸漕運營建興築之事又皆出於民當此之時民之所以供上之令者三曰租曰調曰庸租者地之所當出調者兵之所當費庸者嵗之所當役也故使之納粟於官以為田之租人入布帛以為兵之調嵗役其力不役則出其力之所直以為役之庸此三者農夫皆兼為之而游惰末作之民亦不免於庸調運重漕逺天子不知其費而一出於民民嵗役二旬而不役者當帛六十尺民亦不至於太苦故隋唐之間有養兵之困而無興役之患此其為法雖不若三代之兵不待天子之養然天下之役猶有可賴者皆民為之也及其後世又不能守乃始變法而為兩稅以至於今天下非有田者不可得而使而有田者之役亦不過奔走之用而不與天子之大事天下有大興築有大漕運則常患無以為使故廣募冗兵以供力役之急不知擊刺戰陳之法而坐食天子之俸由是國有武備之兵而又有力役之兵此二者其所以奉養之具皆出於農也而四海之游民無尺寸之庸調為農者常使隂出古者游民之所入而天子亦常兼任養兵興役之大患故夫兵役之弊當今之世可謂極矣臣愚以為天子平日無事而養兵不息此其事出於不得巳惟其干戈旗鼓之攻而後可使任其責至於力役之際挽車船築宫室造城郭此非有死亡陷敗之危天下之民誠所當任而不辭不至以纍兵革之人以重費天子之廪食然當今之所謂可役者不過曰農也而農已甚困蓋常使盡出天下之費矣而工商技巧之民與夫游閒無職之徒常遍天下優游終日而無所役屬蓋周官之法民之無職事者出夫家之征今可使盡為近世之法皆出庸調之賦庸以養力役之兵而調以助農夫養武備之士而力役之兵可因其老疾死亡遂勿復補而使游民之丁代任其役如期而止以除其庸之所當入而其不役者則亦收其庸不使一日而闕蓋聖人之於天下不唯重乎茍亷而無所求唯其能緩天下之所不給而節其太幸則雖有取而不害於為義今者雖能使游民無勞苦嗟嘆之聲而常使農夫獨任其困天下之人皆知為農之不便則相率而事於末末衆而農衰則天子之所獨任者愈少而不足於用故臣欲收游民之庸調使天下無僥幸苟免之人而且以紓農夫之困茍天下之游民自知不免於庸調之勞其勢不耕則無以供億其上此又可驅而歸之於南畝要之十嵗之後必將使農夫衆多而工商之類漸以衰息如此而後使天下舉皆從租庸調之制而去夫所謂兩稅者而兵役之憂可以稍緩矣唐荆川曰此篇之妙全在說國病與農病二者夾雜渾融民政䇿七公田貸民看他運勢如指掌鍊句如抽絲古者天下皆天子之人田畝之利衣食之用凡所以養生之具皆賴於天子權出於一而利不分於强族民有奉上之憂而無役屬附麗之困是以民德其上而舉天下皆可使奉天子之役使至於末世天子之地轉而歸於豪民而天下之游民饑寒朝夕之用恤天子不為而以遺天下之富賈夫天子者豈與小民爭此尺寸之利也哉而其勢則有所不可何者民之有田者非皆躬耕之也而無田者為之耕無田者非有以屬於天子也而有田者拘之天子無田以豫之而欲役其力也實難有田者授之以田視之以奴僕而可使無憾故夫今之農者非天子之農而富人之農也至於天下之游民販夫販婦工商技巧之族此雖無事乎田然日食其力而無以為朝夕之用則此亦將待人而生者也而天子不恤其闕乃使富民持其贏餘貸其所急以為之父母故雖游民天子亦不可得而使而富者獨擅其利日役其力而不償其力之所直由此觀之則夫天下之民舉皆非天子之人而天子徒以位使之非皆得其歡心也夫天下之人獨有其田者乃始有以附屬於天子此其為衆豈足以當其下之仰給之民哉此亦足以見天子之所屬者巳甚寡矣臣愚以為當今之勢宜收天下之田而歸之於上以業無田之農夫恤小民之所急而奪豪民假貸之利以收游手之用故因其所便而為之計以為莫如收公田而貸民急夫陳蔡荆楚之地地廣而人少土皆公田而患無以耕之而吳越巴蜀之間拳肩側足以爭尋常尺寸之地安土重遷戀戀而不能去此非官為之畫䇿因其凶荒饑饉之嵗乘其有願徙之心而遂徙之於不耕之公田則終不能以自去今欲待其巳去而收其田畝籍其室廬田為公田室為公室以授無田之民使天下雖富庶之邦亦常有天子之田而又因其籍沒積而勿復鬻募天下之丁男使分耕其中而無使富民端坐而欲收公田之遺利使天下之農夫稍可以免僕𨽻之辱而得上麗於天子而其新徙之民耕牛室屋飲食器皿之類有所不備又皆得以貸於國可以無失其所夫所謂貸者雖其為名近於商賈市井之事然其為意不可以不察也天下之民無田以為農而又無財以為工商禁而勿貸則其勢不免轉死於溝壑而使富民為貸則有相君臣之心用不仁之法而收大半之息其不然者亦不免於脫衣避屋以為質民受其困而上不享其利徒使富民執豫奪之權以豪役鄉里故其勢莫如官貸以賙民之急周官之法使民之貸者與其有司辨其貴賤而以國服為息今可使郡縣盡貸而任之以其土著之民以防其逋逃竄伏之姦而一夫之貸無過若干春貸以斂繒帛夏貸以收秋實薄收其息而優之使之償之無難而又時免其息之所當入以收其心使民得脫於奴𨽻之中而獲自屬於天子如此則天下之游民可得而使而富民之貸可以不禁而自息然臣以為收公田者其利逺非可以嵗月之間而待其成也要之數十百年則天下之農夫可使大半皆天子之農若夫所謂貸民急者則可以朝行而夕獲其利此最當今之急務也此文獨兩比區處處斡全精神耳而公田貸民二者俱不可行蓋收公田而奪民之業天下未有不亂而貸民者即荆公所引周禮以服國息之說也民政䇿八欲覽天下都邑沃饒之地於以擇使興利甚為有見而行文如輕風細浪柔婉可愛古者建都立邑相其丘陵原隰而利其水泉之道通其所無而導其所有使民日取而不盡安居於中而無慕於外利各安其土樂其業無來去遷徙之心膏腴之鄉民不加多而貧瘠之處民不加少天下之戶均平若一皆足以供其郡縣之役使而無所困乏蓋今天下所謂通都大邑十里之城萬户之郭其隂陽向背與其山林原隰之勢陂池泉水之利皆秦漢以來所謂創置摹畫使足以衣食其民而無乏絶者也臣嘗讀周詩公劉之一篇其言自戎遷豳之際登髙望逺以求其可居之地與其可用之物莫不詳悉而曲盡其詩曰篤公劉逝彼百泉瞻彼漙原乃陟南岡乃覯于京篤公劉既溥既長既景乃岡相其隂陽觀其流泉篤公劉于豳斯館涉渭為亂取礪取煆夫古之君子居於其邦其欲知民之所利與器用之所出蓋如此其詳也及觀史記貨殖列傳郡國之所有東方之桑麻魚鹽南方之竹木魚稻與西方之五榖畜牧北方之棗栗裘馬則凡一方之所有皆可以備養生送死之具導之有方而取之有法則其民豐樂饒足老死而無憾及行天下覽其山林藪澤之所生與其民之所有往往與古不類夫自大江以北漢水之側三代之時列國數十楚人都於荆州其在戰國最為强大外抗羣蠻內禦秦晉常以其兵橫於天下計其所都安肯用瘠鹵墝埆之地而當今自楚之北至於唐鄧汝潁陳蔡許洛之間平田萬里農夫逃散不生五榖荆棘布野而地至肥壤泉源陂澤之迹迤邐猶在其民不知水耕之利而長吏又不以為意一遇水旱民乏菜茹往者因其死喪流亡廢縣罷鎮者蓋往往是矣臣聞善為政者不用甲兵不斥疆界興利除害教民稼穡收斂倍稱而獲兼地之福今者舉千里之地廢之為墟以養禽獸而不甚顧惜此與私割地以豫人何異嘗聞之於野人自五代以來天下喪亂驅民為兵而唐鄧汝蔡之間故陂舊隄遂以堙廢而不治至今百有餘年其間猶未甚逺也蓋修敗補缺或亦旬月之故耳而獨患為吏者莫以為事若夫許州非有洪河大江之衝而每年盛夏衆水決溢無以救禦是以民常苦饑而不樂其俗夫許諸侯之故邦魏武之所都而唐節度之所治使嵗輒被水而五榖不熟則其當時軍旅之費宗廟朝廷之用將何以供之此豈非近世之弊因循不治以至此哉然此乃特臣之所見而天下之廣又安能備知蓋嘗以為方今之患生於太怯而成於牽俗太怯則見利而不敢為牽俗則自顧而愛其身夫是以天下之事舉皆不成而何獨在此臣欲破其牽俗之風而壯其太怯之氣意凡天下貧窶破散之郡縣使皆擇善事能幹之人而往為之長因其去也而天子親諭以此使得稍久於其任而察其人民多田野闢者書以為課何者此非難辦之事是以不待非常之才而後能濟惟其弛放怠惰是以至此今誠少嚴其事使為吏者知上之屬意於此十嵗之後臣以為此必為富壤之區而方今天下重征之處亦可漸减而取諸此矣汝蔡江漢之間蓋秦以來百戰之國世用鋒鏑大略當世之承平者什特二三而吏於其土者或不得其人與久其任而重其權是以田野不闢而多曠土遺利蘇氏父子往往注心於此民政䇿九制二寇絶世之才故其為文雄偉天下有二病好戰則財竭而民貧畏戰則多辱而無威欲民之無貧則無疾夫無威欲君之無辱則無望乎財之不竭此二患者天下未嘗兼有也古之人君各從其所安而處其偏是以不獲全享其利而亦未嘗兼受其病者昔胸奴之於漢可以見矣文景之世天下治安民至老死不知征役之勞府庫盈溢其賦於民者三十而取一可謂至盛矣然而丐奴傲慢侵侮至甚不遜輸金繒納錦繡天子之至辱也而文景不以為意以求全其民至於武帝不忍數世之忿盡天下之鋭而攻之闢地千里斬馘百萬胸奴之民死者大半洗除先帝之宿恥而夸大中國之氣得志滿意無以加矣而內自疲弊中民之家大扺皆破無復千金之戶此二者皆有所就其成功是以有所忍而不顧而智者之論巳謂非中國之長算矣今者中國之弊在於畏戰畏戰固多辱矣而民又不免於貧無所就其利而偏被其害重賦厚斂以為二邉之賂國辱而民困蓋今世之病已極矣賢人君子竭其智慮以求安其民而民常為邊陲之所擾天子欲使其澤下布四海而海內常為邊陲之所困此其弊蓋有原矣二邊之賂不絶是以天下之賦斂雖知其甚重而不可輕天下之賦斂甚重而不可輕是以天下之民雖知其甚困而不可得而安也故臣於民政之終而特備論其要云蓋方今天下之議莫不以為二邉之賂不可去也獨其勇者則曰寧戰而無賂戰未必敗而賂必至於乏困臣竊以為此古之漢武帝唐太宗堅忍而不顧者足以行之然亦有所犯天下之至危何者吾民之不戰久矣用不戰之民而待必戰之敵竊恐世俗之難之也夫古者霸王之臣因敗而成功轉禍而為福若反覆手之間耳柦公見脅於曹沫欲背其盟管仲因而信之以自結於諸侯柦公襲蔡本以誅少姫之罪管仲因而伐楚責包茅之不入而諸侯大服臣竊韙之方今二敵之賂雖有所不得已而然者然其勢偶有似夫戰國之際以謀相傾而隂相潰者是故臣欲因而成之以潛破二敵之國古語有之曰將欲取之必固與之昔者晉之取虞越之取吳冒頓之取東胡石勒之取王俊此四者皆其豫之之力也夫鄰國之患唯其相忌而相伺以不敢相易是以其慮詳密而難圖今夫中國之不競亦已久矣彼其相視以為無能為者非一日也然猶未肯釋然而無疑夫惟釋然而無疑而後其國可取今吾猶有所齟齬於其間彼以吾為猶有不服之心是以君臣相視而未敢懈蓋古之英雄能忍一朝之恥而全百世之利臣以為當今之計禮之當加恭待之當加厚使者之往無求以言勝之而其使之來者亦無求以言犯之凡皆務以無逆其心而隂墮其志使之深樂於吾之賄賂而意不在我而吾亦自治於內搜士揀馬擇其精鋭而損其數以外見至弱之形而內收至强之實作內政以寓軍令凡皆務以自損吾强大之勢而見吾衰弱之狀使之安然無所顧忌而益以怠傲不過數年彼日以無備而吾日以充實彼猶將以吾為不足與也而有無厭之求彼怠而吾奮彼驕而吾怒及此而與之戰此所謂敗中之勝而弱中之强者也嗟夫方今之事其勢亦有二而已矣能奮一朝之勞而盡力以攻之則其後可以大安而其始也不免有嵗月之勤能忍一朝之辱而自損以驕之則其後可以驟勝而其始也不免有嵗月之恥此二䇿者皆足以謀人之國敗人之兵而有勝矣而臣竊謂今世之所安者必其豫之而驕之者也嗟夫智能攻之則以洗天下之大慙不能攻之則驕之而圖其後未有不能攻之又不能驕之而拱手以望其成功者方今每嵗委百萬之資以豫人而不能使人無疑其有不服之心罄竭四海而其終不能以成事特幸其一時之安而欲得其間隙之際以治天下天下安可得而治哉唐荆川曰諸篇用故事化腐為新全在交互形容交互形容全在提綱一兩語有力此篇與坡公定軍制可見大略民政䇿十其議罷戍兵一節頗中今日邉塞之弊而所欲募邊郡之兵以備調征恐非實濟特其文甚佳禦戎有二道屯兵以待其來出兵以乘其虛方今二邊固嘗巳屯重兵矣而天下之議以為中國之兵無由而出而臣以為不然何者斂天下之財以奉夷狄彼求之無厭則吾之應之將有所不稱其意大抵不過數十年之間用兵之釁不發於彼之不悅則發於吾之不忍此亦其勢之不可逃者也方其無事之時中國既不得不畜兵於邊而及其有間又必將出兵而乘其弊此二者不可不素為之所也今每嵗發郡縣之兵以戍邊此其未戰之謀也而臣未知其所以為戰之術臣聞古者三代之制未有戍邊之役六國之際燕趙最被邊患而當其時西備秦東備齊南備楚內備韓魏千里之國而其四境莫不皆有所備則其所以備敵者安得戍卒而用之計亦不過其沿邊之民自為卒伍以制其侵略而巳戍邊之謀始於秦漢內無敵國之虞而郡縣之兵材官蹶張皆出於民之為役其法月為更卒已復為正一嵗屯戍以次相承而迭相更代邊鄙之民不可使常為兵是以不得不驅中原之民而納之塞下以捍寇敵故其戍邊之兵嵗初而來嵗終而去寒暑不相安險易不相習勇怯不相程志氣不相企上無顧於墳墓而下無愛於妻子平居憂愁無聊無樂土之心而緩急茍免無死戰之意不可求得其用古之謀臣鼂錯陸贄之徒蓋嘗以為言矣而况乎今世之兵皆天子之所廪食以終其身在秦則廪於秦在趙則廪於趙不可一日而闕非如漢之戍卒别有休罷更代之期也然猶守此區區既往之陳迹豈不惑哉且舉中原之士而屯之於邊雖無死傷戰鬬之患而其心常自以為出征行役苦寒暴露為國勞苦凡國家之所以美衣豐食以養我者止為此等事也故士卒百萬端坐而食不知行陳之勞不見鋒刃之危而皆巳自負以為有勞於國其勢不可有所復使此其弊在於使之不得其道耳今夫隂伺二敵之怠而出兵以逐利於塞外此誠今世之至計也而臣切恐緩急之際士卒皆已自負而不可用且夫人之情嘗巳用其力則其心自滿而不復求報其上士無求報之心則不可以與之犯大難而涉大勞惟其飽食而無所試優游無為以觀夫人之成功而不得自效者則其氣剛鋭而其心不倦古之善用兵者惟能及其心之未倦而用其鋭氣是以其兵無敵於天下臣愚以為方今之計內郡之兵當常在內而不以戍邊戍邊之兵當常戍邊而不待內郡之戍卒募內郡之兵其樂徙邊者而稍厚之不足則募民之樂為邊兵者以足之使二邊有一定不遷之兵而頗損內郡之衆計其內外之數相通如舊而止平居無事以此備邊而一旦欲有所攻奪掩襲則獨發內郡之卒使二者各思致其勇力以報其上鋭而用之墮而置之屯兵厯年而士無所怨其勞出兵千里而士無所憾其逺兵入則出者得以休息而無乘塞之苦兵出則守者閒暇而無行役之困交相為用如循環之無端而不可竭此其與今世之法竭天下以養兵守亦使此戰亦使此未戰而士卒皆怠者其亦少異矣今之山東河南北直𨽻亦嵗用民兵恐非計而其最無䇿者近年嵗提延綏之兵而戍薊州唐宋八大家文鈔卷一百六十一
