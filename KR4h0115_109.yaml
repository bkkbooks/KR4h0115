body:
  text: 唐宋八大家文鈔卷一百一明茅坤撰南豐文鈔五序禮閣新儀目録序按曾子固所論經術及典禮之大處往往非韓柳歐所及見者禮閣新儀三十篇韋公肅撰記開元以後至元和之變禮史館祕閣及臣書皆三十篇集賢院書二十篇以參相挍讐史館祕閣及臣書多復重其篇少者八集賢院書獨具然臣書有目録一篇以考其次序蓋此書本三十篇則集賢院書雖具然其篇次亦亂既正其脫謬因定著從目録而禮閣新儀三十篇復完夫禮者其本在於養人之性而其用在於言動視聽之間使人之言動視聽一於禮則安有放其邪心而窮於外物哉不放其邪心不窮於外物則禍亂可息而財用可充其立意微其為法遠矣故設其器制其物為其數立其文以待其有事者皆人之起居出入吉凶哀樂之具所謂其用在乎言動視聽之間者也然而古今之變不同而俗之便習亦異則法制度數其久而不能無弊者勢固然也故為禮者其始莫不宜於當世而其後多失而難遵亦其理然也失則必改制以求其當故羲農以來至於三代禮未嘗同也後世去三代蓋千有餘歲其所遭之變所習之便不同固巳逺矣而議者不原聖人制作之方乃為設其器制其物為其數立其文以待其有事而為其起居出入吉凶哀樂之具者當一一以追先王之迹然後禮可得而興也至其說之不可求其制之不可考或不宜於人不合於用則寧至於漠然而不敢為使人之言動視聽之間蕩然莫之為節至患夫為罪者之不止則繁於為法以禦之故法至於不勝其繁而犯者亦至於不勝其衆豈不惑哉蓋上世聖人有為耒耜者或不為宮室為舟車者或不為棺椁豈其智不足為哉以謂人之所未病者不必改也至於後聖有為宮室者不以土處為不可變也為棺椁者不以葛溝為不可易也豈好為相反哉以為人之所既病者不可因也又至於後聖則有設兩觀而更采椽之質攻文梓而易瓦棺之素豈不能從儉哉以謂人情之所好能為之節而不能變也由是觀之古今之變不同而俗之便習亦異則亦屢變其法以宜之何必一一以追先王之迹哉其要在於養民之性防民之欲者本末先後能合乎先王之意而已此制作之方也故元撙之尚而薄酒之用大羮之先而庶羞之飽一以為貴本一以為親用則知有聖人作而為後世之禮者必貴爼豆而今之器用不廢也先辨冕而今之衣服不禁也其推之皆然然後其所改易更革不至乎拂天下之勢駭天下之情而固已合乎先王之意矣是以羲農以來至於三代禮未嘗同而制作之如此者亦未嘗異也後世不知其如此而或至於不敢為或為之者特出於其勢之不可得巳故茍簡而不能備希濶而不常行又不過用之於上而未有加之於民者也故其禮本在於養人之性而其用在於言動視聽之間者歷千餘歲民未嘗得接於耳目况於服習而安之者乎至其陷於罪戾則繁於為法以禦之其亦不仁也哉此書所紀雖其事已淺然凡世之記禮者亦皆有所本而一時之得失具焉昔孔子於告朔愛其禮之存况於一代之典籍哉故其書不得不貴因為之定著以俟夫論禮者考而擇焉王遵岩曰此類文皆一一有法無一字苟觀文者不可忽此唐荆川曰此文一意翻作兩假說李白詩集後序不論著李白詩而獨詳白生平蹤跡此其變調也然其結胎在臥廬山永王璘迫致之上蓋如此李白夜郎之流潯陽之獄可釋然無愧矣李白詩集二十卷舊七百若干篇今九百若干篇者知制誥常山宋敏求次道之所廣也次道既以類廣白詩自為序而未考次其作之先後余得其書乃考其先後而次第之蓋白蜀郡人初隱岷山出居襄漢之間南游江淮至楚觀雲夢雲夢許氏者高宗時宰相圉師之家也以女妻白因留雲夢者三年去之齊魯居徂徠山竹溪入吳至長安明皇聞其名召見以為翰林供奉頃之不合去北抵趙魏燕晉西扺岐邠歷商於至洛陽游梁最久復之齊魯南浮淮泗再入吳轉徙金陵上秋浦潯陽天寶十四載安祿山反明年明皇在蜀永王璘節度東南白時臥廬山璘迫致之璘軍敗丹陽白奔亡至宿松坐繫潯陽獄宣撫大使崔渙與御史中丞宋若思驗治白以為罪薄宜貰而若思軍赴河南遂釋白囚使謀其軍事上書肅宗薦白材可用不報是時白年五十有七矣乾元元年終以汚璘事長流夜郎遂泛洞庭上峽江至巫山以赦得釋憩嶽陽江夏久之復如潯陽過金陵徘徊於歷陽宣城二郡其族人陽冰為當塗令白過之以病卒年六十有四是時寶應元年也其始終所更涉如此此白之詩書所自敘可考者也范傳正為白墓志稱白偶乘扁舟一日千里或遇勝景終年不移則見於白之自敘者蓋亦其略也舊史稱白山東人為翰林待詔又稱永王璘節度揚州白在宣城謁見遂辟為從事而新書又稱白流夜郎還潯陽坐事下獄宋若思釋之者皆不合白之自敘蓋史誤也白之詩連類引義雖中於法度者寡然其辭閎肆雋偉殆騷人所不及近世所未有也舊史稱白有逸才志氣宏逺飄然有超世之心余以為實録而新書不著其語故録之使覽者得詳焉范貫之奏議集序須覽公所序奏議之忠直而能本朝廷所以容忠直處才是法家尚書戶部郎中直龍圖閣范公貫之之奏議凡若干篇其子世京集為十卷而屬余序之蓋自至和以後十餘年間公嘗以言事任職自天子大臣至於羣下自掖庭至於四方幽隱一有得失善惡關於政理公無不極意反復為上力言或矯拂情欲或切劘計慮或辨别忠佞而處其進退章有一再或至於十餘上事有隂爭獨陳或悉引諫官御史合議肆言仁宗嘗虛心采納為之變命令更廢舉近或立從遠或越月逾時或至於其後卒皆聽用蓋當是時仁宗在位歲久熟於人事之情僞與羣臣之能否方以仁厚清靜休養元元至於是非豫奪則一歸之公議而不自用也其所引拔以言為職者如公皆一時之選而公與同時之士亦皆樂得其言不曲從苟止故天下之情因得畢聞於上而事之害理者常不果行至於竒邪恣睢有為之者亦輒敗悔故當此之時常委事七八大臣而朝政無大缺失羣臣奉法遵職海內乂安夫因人而不自用者天也仁宗之所以其仁如天至於享國四十餘年能承太平之業者繇是而巳後世得公之遺文而論其世見其上下之際相成如此必將低回感慕有不可及之嘆然後知其時之難得則公言之不沒豈獨見其志所以明先帝之盛德於無窮也公為人溫良慈恕其從政寬易愛人及在朝廷危言正色人有所不能及也凡同時與公有言責者後多至大官而公獨早卒公諱師道其世次州里歷官行事有今資政殿學士趙公忭為公之墓銘云王遵岩曰沉著頓挫光采自露且序人奏議發明直氣切諫而能形容聖朝之氣象治世之精華真大家數手假如蘇公序田錫奏議亦有此意然其文詞過於俊爽而氣輕味促强幾聖文集序范希文與歐陽永叔為深相知坐希文貶及希文經略西夏時辟永叔為掌書記而永叔不從其書曰吾當與公同其退不當同其進也何等卓􅀈幾聖之文今不可見然平生所自見者並屬魏公幕府則子固之所不滿而風刺之者巳見其概矣此其文之典刑處而王道思所批鐫云云非是幾聖諱至姓强氏錢塘人幾聖字也為三司戶部判官尚書祠部郎中既殁其子浚明集其遺文為二十卷囑豫序幾聖少貧能自謀學為進士材拔出其輩類出輒收其科其文詞大傳於時及為吏未嘗不以其間益讀書為文尤工於詩句出驚人世皆推其能然最為相國韓魏公所知魏公既罷政事鎮京兆及徙鎮相魏常引幾聖自助魏公喜為詩每合屬士大夫賔客與游多賦詩以自見其屬而和之者幾聖獨思致逸發若不可追躡魏公未嘗不嘆得之晚也其在幕府魏公每上奏天子以歲時慶賀候問及為書記通四方之好幾聖為屬槀草必聲比字屬曲當繩墨然氣質渾渾不見刻畫逺近多稱誦之及為他文若志銘序記策問學士大夫則簡古典則不少貶以就俗其所長兼人如此魏公數薦之朝廷以謂宜在館閣然未及用魏公既薨之明年幾聖亦以疾卒幾聖之遺文在魏公幕府者最為多故序亦反復見之覽者可推而考之也其行治官世巳著於志幾聖之葬者故此不著王遵岩曰此序雖不立意發論而頗有逸氣蓋少出於經而入於史氏之體故亦有縱步若王氏兄弟之序則繩趨窘武蹜蹜乎如有循矣信乎周道如砥非君子莫之能履也王子直文集序意見好至治之極教化既成道德同而風俗一言理者雖異人殊世未嘗不同其指何則理當故無二也是以詩書之文自唐虞以來至秦魯之際其相去千餘載其作者非一人至於其間嘗更衰亂然學者尚䝉餘澤雖其文數萬而其所發明更相表裏如一人之說不知時世之遠作者之衆也嗚呼上下之間漸磨陶冶至於如此豈非盛哉自三代教養之法廢先王之澤熄學者人人異見而諸子各自為家豈其固相反哉不當於理故不能一也由漢以來益遠於治故學者雖有魁竒拔出之材而其文能馳騁上下偉麗可喜者甚衆然是非取舍不當於聖人之意者亦巳多矣故其說未嘗一而聖人之道未嘗明也士之生於是時其言能當於理者亦可謂難矣由是觀之則文章之得失豈不繫於治亂哉長樂王向字子直少巳著文數萬言與其兄弟俱名聞天下可謂魁竒拔出之材而其文能馳騁上下偉麗可喜者也讀其書知其與漢以來名能文者俱列於作者之林未知其孰先孰後考其意不當於理亦少矣然子直晚自以為不足而悔其少作更欲窮探力取極聖人之指要盛行則欲發而見之事業窮居則欲推而托之於文章將與詩書之作者並而又未知孰先孰後也然不幸蚤世故雖有難得之材獨立之志而不得及其成就此吾徒與子直之兄回字深甫所以深恨於斯人也子直官世行治深父巳為之銘而書其數萬言者屬豫為敘豫觀子直之所自見者巳足暴於世矣故特為之序其志云王深父文集序深父之文不可得而見豫按王荆公所為墓銘與其相答書大略賢者也深甫吾友也姓王氏諱回當先王之迹熄六藝殘缺道術衰微天下學者無所折衷深甫於是奮然獨起因先王之遺文以求其意得之於心行之於巳其動止語默必考於法度而窮逹得喪不易其志也文集二十卷其辭反覆辨達有所開闡其卒蓋將歸於簡也其破去百家傳注推散缺不全之經以明聖人之道於千載之後所以振斯文於將墜回學者於既溺可謂道德之要言非世之别集而巳也後之潜心於聖人者將必由是而有得則其於世教豈小補之而巳哉嗚呼深甫其志方强其德方進而不幸死矣故其澤不加於天下而其言止於此然觀其所考者豈非孟子所謂名世者歟其文有片言半簡非大義所存皆附而不去者所以明深甫之於其細行皆可傳於世也深甫福州侯官縣人今家於潁嘗舉進士中其科為亳州衛真縣主簿未一歲弃去遂不復仕卒於治平二年之七月二十八日年四十有三天子嘗以某軍節度推官知陳州南頓縣事就其家命之而深甫既卒矣王平甫文集序以詩文相感慨王平甫既沒其家集其遺文為百卷屬豫序平甫自少巳傑然以才高見於世為文思若決河語出驚人一時爭傳誦之其學問尤敏而資之以不倦至晚愈篤博覽强記於書無所不通其明於是非得失之理為尤詳其文閎富典重其詩博而深矣自周衰先王之遺文既喪漢興文學猶為近古及其衰而陵夷盡矣至唐久之而能言之士始幾於漢及其衰而遂泯泯矣宋受命百有餘年天下文章復侔於漢唐之盛蓋自周衰至今千有餘歲斯文濵於泯滅能自拔起以追於古者此三世而巳各於其盛時士之能以特見於世者率常不過三數人其世之不數其人之難得如此平甫之文能特見於世者也世皆謂平甫之詩宜為樂歌薦之郊廟其文宜為典册施諸朝廷而不得用於世然推其實千歲之日不為不多焦心思於翰墨之間者不為不衆在富貴之位者未嘗一日而無其人彼皆湮沒而無傳或播其醜於後平甫乃躬難得之資負特見之能自立於不朽雖不得其志然其文之可貴人亦莫得而掩也則平甫之求於內亦奚憾乎古今作者或能文不必工於詩或長於詩不必有文平甫獨兼得之其於詩尤自喜其憂喜哀樂感激怨懟之情一於詩見之故詩尤多也平甫居家孝友為人質直簡易遇人豁然推心腹不為毫髮疑礙與人交於恩意尤篤也其死之日天下識與不識皆聞而哀之其州里世次歷官行事將有待於識平甫之葬者故不著於此云唐荆川曰文一滚說不立間架齊州雜詩序雖小言自中律齊故為文學之國然亦以朋比夸詐見於習俗今其地富饒而介於河岱之間故又多獄訟而豪猾羣黨亦往往喜相攻剽賊殺於時號難治余之疲駑來為是州除其姦强而振其弛壞去其疾苦而撫其善良未期囹圄多空而枹鼓幾熄歲又連熟州以無事故得與其士大夫及四方之賔客以其暇日時遊後園或長軒繞榭登覽之觀屬思千里或芙蕖芰荷湖波渺然從舟上下雖病不飲酒而間為小詩以娛情寫物亦拙者之適也通儒大人或與余有舊欲取而視之亦不能隱而青鄆二學士又從而和之士之喜文辭者亦繼為此作總之凡若干篇豈得以余文之陋而使夫宗工秀人雄放瑰絶可喜之辭不大傳于此邦也故刻之石而并序之使覽者得詳焉先大夫集後序子固闡揚先世所不得志處有大體而文章措注處極渾雄韓歐與蘇亦當俯首者公所為書號仙鳬羽翼者三十卷西陲要紀者十卷清邊前要五十卷廣中台志八十卷為臣要紀三卷四聲韻五卷總一百七十八卷皆刋行於世今類次詩賦書奏一百二十二篇又自為十卷藏於家方五代之際儒學既擯焉後生小子治術業於閭巷文多淺近是時公雖少所學巳皆知治亂得失興壞之理其為文閎深雋美而長於諷諭今類次樂府巳下是也宋既平天下公始出仕當此之時太祖太宗巳綱紀大法矣公於是勇言當世之得失其在朝廷疾當事者不忠故凡言天下之要必本天子憂憐百姓勞心萬事之意而推大臣從官執事之人觀望懷奸不稱天子屬任之心故治久未洽至其難言則人有所不敢言者雖屢不合而出而所言益切不以利害禍福動其意也始公尤見竒於太宗自光祿寺丞越州監酒稅召見以為直史館遂為兩浙轉運使未久而真宗即位益以材見知初試以知制誥及西兵起又以為自陜以西經略判官而公嘗切論大臣當時皆不悅故不果用然真宗終感其言故為泉州未盡一歲拜蘇州五日又為揚州將復召之也而公於是時又上書語斥大臣尤切故卒以齟齬終公之言其大者以自唐之衰民窮久矣海內既集天子方修法度而用事者尚多煩碎治財利之臣又益急公獨以謂宜遵簡易罷管𣙜以與民休息塞天下望祥符初四方爭言符應天子因之遂用事泰山祠汾隂而道家之說亦滋甚自京師至四方皆大治宮觀公益諍以謂天命不可專任宜絀姦臣修人事反覆至數百千言嗚呼公之盡忠天子之受盡言何必古人此非傳之所謂主聖臣直者乎何其盛也何其盛也公在兩浙奏罷苛稅二百三十餘條在京西又與三司爭論免民租釋逋負之在民者蓋公之所試如此所試者大其庶幾矣公所嘗言甚衆其在上前及書亡者蓋不得而集其或從或否而後常可思者與歷官行事廬陵歐陽修公巳銘公之碑特詳焉此故不論論其不盡載者公卒以齟齬終其功行或不得在史氏記籍令記之當時好公者少史其果可信歟後有君子欲推而考之讀公之碑與書及豫小子之序其意者具見其表裏其於虛實之論可核矣公卒乃贈諫議大夫姓曾氏諱某南豐人序其書者公之孫鞏也王遵岩曰先生之文如此篇之委曲感慨而氣不迫晦者亦不多有相國寺維摩院聽琴序參之歐陽公所贈楊置琴說序不如遠甚而其學問之㫖亦似有得者録之古者學士之於六藝射能弧矢之事矣又當善其揖讓之節御能車馬之事矣又當善其驅馳之節書非能肆筆而巳又當辨其體而皆通其意數非能布策而巳又當知其用而各盡其法而五禮之威儀至於三千六樂之節文可謂微且多矣噫何其煩且勞如是然古之學者必能此亦可謂難矣然習其射御於禮習其干戈於樂則少于學長于朝其於武僃固修矣其于家有孰于黨有庠于鄉有序于國有學于教有師于視聽言動有其容于衣冠飲食有其度几杖有銘盤盂有戒在輿有和鸞之聲行步有佩玉之音燕處有雅頌之樂而非其故琴瑟未嘗去於前也蓋其出入進退俯仰左右接於耳目動於四體達於其心者所以養之至如此其詳且密也雖然此尚為有待於外者爾若夫三才萬物之理性命之際力學以求之深思以索之使知其要識其微齊戒以守之以盡其才成其德至合於天地而後巳者又當得之於心夫豈非難哉噫古之學者其役之於內外以持其心養其性者至於如此此君子所以愛日而自强不息以求至乎極也然其習之有素間之有具如此則求其放心伐其邪氣而成文武之材就道德之實者可謂易矣孔子曰興於詩立於禮成於樂蓋樂者所以感人之心而使之化故曰成於樂昔舜命䕫典樂教胄子曰直而溫寬而栗剛而無虐簡而無傲則樂者非獨去邪又所以救其性之偏而納之中也故和鸞佩玉雅頌琴瑟之音非其故不去於前豈虛也哉今學士大夫之於持其身養其性凡有待於外者皆不能具得之於內者又皆略其事可謂簡且易矣然所以求其放心伐其邪氣而成文武之材就道德之實者豈不難哉此豫所以懼不至於君子而入於小人也夫有待於外者豫既力不足而於琴竊有志焉久矣然患其莫豫授也治平三年夏得洪君於京師始合同舍之士聽其琴於相國寺之維摩院洪君之於琴非特能其音又能其意者也豫將就學焉故道豫之所慕於古者庶乎其有以自發也同舍之士丁寶臣元珍鄭穆閎中孫覺莘老林希子中而豫曾鞏子固也洪君名規字方叔以文學吏事稱於世云類要序其書之所纂本微淺而公序之亦難為措注故其㫖不遠晏元獻公出東南起童子入祕閣讀書遂贊名命入為翰林學士真宗特寵待之每進見勞問及所以任屬之者羣臣莫能及皇太子就書學公以選入侍太子即皇帝位是為仁宗公遂管國樞要任政事位宰相其在朝廷五十餘年常以文學謀議為任所為賦頌銘碑制詔册命書奏議論之文傳天下尤長於詩天下皆吟誦之當真宗之世天下無事方輯福應推功德修封禪及后土山川老子諸祠以報禮上下左右前後之臣非工儒學妙於語言能討論古今潤色太平之業者不能稱其位公於是時為學者宗天下慕其聲名人見公應於外者之不窮而不知公之得於內者何也及得公所為類要上中下秩總七十四篇凡若干門皆公所手抄乃知公於六藝太史百家之言騷人墨客之文章至於地志族譜佛老方伎之衆說旁及九州之外蠻夷荒忽詭變奇跡之序録皆披尋紬繹而於三才萬物變化情僞是非興壞之理顯隱細巨之委曲莫不究盡公之得於內者在此也公之所以光顯於世者有以哉觀公之所自致者如此則知士不素學而處從官大臣之列備文儒道德之任其能不餒且病乎此公之書所以為可傳也公之子知止能守其家者也以書屬豫序豫與公仕不並時然皆臨川人故為之論次以為公書諸首唐宋八大家文抄卷一百一
