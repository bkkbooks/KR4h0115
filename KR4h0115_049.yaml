body:
  text: 唐宋八大家文鈔卷四十六明茅坤撰廬陵文鈔十八序章望之字序典實挍書郎章君嘗以其名望之來請字曰願有所教使得以勉焉而自朂者豫為之字曰表民而告之曰古之君子所以異乎衆人者言出而為民信事行而為世法其動作容貌皆可以表於民也故紘綖冕辨以為首容珮玉玦環以為行容衣裳黼黻以為身容手有手容足有足容揖讓登降獻酬俯仰莫不有容又見其寬柔溫厚剛嚴果毅之色以為仁義之容服其服載其車立乎朝廷而正君臣出入宗廟而臨大事儼然人望而皆畏之曰此吾民之所尊也非民之知尊君子而君子者能自修而尊者也然而行不充于內德不備於人雖盛其服文其容民不尊也名山大川一方之望也山川之嶽瀆天下之望也故君子之賢於一鄉者一鄉之望也賢於一國者一國之望也名烈著于天下者天下之望也功德被於後世者萬世之望也孝慈友悌達于一鄉古所謂鄉先生者一鄉之望也春秋之賢大夫若隋之季良鄭之子産者一國之望也位于中而姦臣賊子不敢竊發于外如漢之大將軍出入將相朝廷以為輕重天下繫其安危如唐之裴丞相者天下之望也其人已沒其事已久聞其名想其人若不可及者夔龍稷契是也其功可以及萬世其道可以師百王雖有賢聖莫敢過之者周孔是也此萬世之望而皆所以為民之表也傳曰其在賢者識其大者遠者章君儒其衣冠氣剛色仁好學而有志其潔然修乎其外而輝然充乎其內以發乎文辭則又辨博放肆而不流是數者皆可以自擇而勉焉者也是固能識夫遠大者矣雖豫何以朂焉第因其志廣其説以塞請張應之字序思入細傳曰名以制義謂乎名之必可言也世之士君子名而無所言言則不能稱述以見乎遠余友河南主簿張君名谷字仲容谷之為義窪而不盈動而能應湛然而深有似乎賢人君子之德其所謂名而可言者也然嘗竊謂仲容之字不足以表其所以名之之義大凡物以至虛而為用者有三其體殊焉有虛其形而能受者器之圓方是也然受則有量故多盈溢敗覆之過有虛其中而能鳴乎外者鐘鼓是也然鳴必假物故須簨簴考擊之設有虛其體而能應物者空谷是也然應必有待故常自然以至靜接物而無窮士之以是為其名則君之道從可知也宜易其字曰應之蓋容以言其虛之狀不若應以體乎容之德也君早以孝廉文藝考行於鄉里薦之於有司而又試其用於春官者之選深中隱厚學優道充其有以應乎物矣然今方為小官主簿書其所應者近而小誠未能有以發乎其聲也余知夫虛以待之則物之來者益廣響之應者益遠可涯也哉余與君同以進士登于科又同為吏于此羣居肩隨宴間相語得以字而相呼故於是不能讓而默也敢為序以易之鄭荀改名序亦自中法度三代之衰學廢而道不明然後諸子出自老子厭周之亂用其小見以為聖人之術止於此始非仁義而詆聖智諸子因之益得肆其異説至於戰國蕩而不反然後山淵齊秦堅白異同之論興聖人之學幾乎其息最後荀卿子獨用詩書之言貶異扶正著書以非諸子尤以勸學為急荀卿楚人嘗以學干諸侯不用退老蘭陵楚人尊之及戰國平三代詩書未盡出漢諸大儒賈生司馬遷之徒莫不盡用荀卿子蓋其為説最近於聖人而然也榮陽鄭昊少為詩賦舉進士已中第遂棄之曰此不足學也始從先生長者學問慨然有好古不及之意鄭君年尚少而性淳明輔以強力之志得其是者而師焉無不至也將更其名數以請豫使之自擇遂改曰荀於是又見其志之果也夫荀卿者未嘗親見聖人徒讀其書而得之然自子思孟子已下意皆輕之使其與遊夏並進於孔子之門吾不知其先後也世之學者茍如荀卿可謂學矣而又進焉則孰能禦哉余既嘉君善自擇而慕焉因為之字曰叔希且以朂其成焉送王陶序説經之文六經皆載聖人之道而易著聖人之用吉凶得失動靜進退易之事也其所以為之用者剛與柔也乾健坤順剛柔之大用也至於八卦之變六爻之錯剛與柔迭居其位而吉亨利無咎凶厲悔吝之象生焉蓋剛為陽為德為君子柔為陰為險為小人自乾之初九為姤而上至於剝其卦五皆陰剝陽之卦也小人之道長君子靜以退之時也自坤之初六為復而上至於夬其卦五皆剛決柔之卦也小人之道消君子動以進而用事之時也夫剛之為德君子之常用也庇民利物功莫大焉其為卦過泰之三而四為大壯五為夬壯者壯也夬者決也四陽雖盛而猶有二陰然陽衆而陰寡則可用壯以攻之故其卦為壯五陽而一陰陰不足為直可決之而已故其卦為夬然則君子之用其剛也審其力視其時知陰險小人之必可去然後以壯而決之夫勇者可犯也強者可詘也聖人於壯決之用必有戒焉故大壯之彖辭曰大壯利正其象辭曰君子非禮弗履夬之彖辭曰健而説決而和其象辭曰居德則忌以明夫剛之不可獨任也故復始而亨臨浸而長泰交而大壯以衆攻其寡夬乘其衰而決之夫君子之用其剛也有漸而不失其時又不獨任必以正以禮以説以和而濟之則功可成此君子動以進而用事之方也太原王陶字樂道好剛之士也嘗嫉世陰險而小人多居京師不妄與人遊力學好古以自信自守今其初仕於易得君子動以進之象故豫為剛説以贈之大壯之初九曰壯于趾征凶夬之初九亦曰壯于趾往不勝為咎以此見聖人之戒用剛也不獨於其彖象而又嘗深戒於其初嗚呼世之君子少而小人多君之力學好剛以蓄其志未始施之於事也今其往尤宜慎乎其初送徐無黨南歸序歐陽公極好為文晚年見得如此吾輩生平好著文章以自娛當為深省草木鳥獸之為物衆人之為人其為生雖異而為死則同一歸於腐壞澌盡泯滅而已而衆人之中有聖賢者固亦生且死於其間而獨異於草木鳥獸衆人者雖死而不朽逾遠而彌存也其所以為聖賢者修之於身施之於事見之於言是三者所以能不朽而存也修於身者無所不獲施於事者有得有不得焉其見於言者則又有能有不能也施於事矣不見於言可也自詩書史記所傳其人豈必皆能言之士哉修於身矣而不施於事不見於言亦可也孔子弟子有能政事者矣有能言語者矣若顏回者在陋巷曲肱飢臥而巳其羣居則默然終日如愚人然自當時羣弟子皆推尊之以為不敢望而及而後世更百千嵗亦未有能及之者其不朽而存者固不待施於事況於言乎豫讀班固藝文志唐四庫書目見其所列自三代秦漢以來著書之士多者至百餘篇少者猶三四十篇其人不可勝數而散亡磨滅百不一二存焉豫竊悲其人文章麗矣言語工矣無異草木榮華之飄風鳥獸好音之過耳也方其用心與力之勞亦何異衆人之汲汲營營而忽焉以死者雖有遲有速而卒與三者同歸於泯滅夫言之不可恃也蓋如此今之學者莫不慕古聖賢之不朽而勤一世以盡心於文字間者皆可悲也東陽徐生少從豫學為文章稍稍見稱於人既去而與羣士試於禮部得高第由是知名其文辭日進如水涌而山出豫欲摧其盛氣而勉其思也故於其歸告以是言然豫固亦喜為文辭者亦因以自警焉送楊置序此文當肩視昌黎而直上之豫嘗有幽憂之疾退而間居不能治也既而學琴於友人孫道滋受宮聲數引久而樂之不知疾之在其體也夫琴之為技小矣及其至也大者為宮細者為羽操絃驟作忽然變之急者悽然以促緩者舒然以和如崩崖裂石髙山出泉而風雨夜至也如怨夫寡婦之歎息雌雄雍雍之相鳴也其憂深思遠則舜與文王孔子之遺音也悲愁感憤則伯奇孤子屈原忠臣之所歎也喜怒哀樂動人必深而純古淡泊與夫堯舜三代之言語孔子之文章易之憂患詩之怨刺無以異其能聽之以耳應之以手取其和者道其湮鬱寫其憂思則感人之際亦有至者焉豫友楊君好學有文纍以進士舉不得志及從廕調為尉於劔浦區區在東南數千里外是其心固有不平者且少又多疾而南方少醫藥風俗飲食異宜以多疾之體有不平之心居異宜之俗其能鬱鬱以久乎然欲平其心以養其疾于琴亦將有得焉故豫作琴説以贈其行且邀道滋酌酒進琴以為别送祕書丞宋君歸太學序以宋祕書起宰相家世胄而以難易立論似有深淺陋巷之士甘藜藿而修仁義毁譽不干其守飢寒不纍其心此衆人以為難而君子以為易生于高門世襲軒冕而躬布衣韋帶之行其驕榮佚欲之樂生長于其間而不溺其習日見乎其外而不動乎其中此雖君子猶或難之學行足以立身而進不止材能足以高人而志愈下此雖聖人亦以為難也書曰不自滿假又曰汝惟不矜不伐以舜禹之明猶以是為相戒懼況其下者哉此誠可謂難也已廣平宋君宣獻公之子公以文章為當世宗師顯于朝廷登于輔弼清德著于一時令名垂於後世君少自立不以門地驕於人既長學問好古為文章天下賢士大夫皆稱慕其為人而君慊然常若不足于已者守官太學甘寂寞以自處日與寒士往來而從先生國子講論道德以求其益夫生而不溺其習此蓋出於天性其見焉而不動于中者由性之明學之而後至也進而不止高而愈下豫自其幼見其長行而不倦久而愈篤可知其將無所不至焉也孟子所謂孰能禦之者歟豫陋巷之士也遭時奮身竊位于朝守其貧賤之節其臨利害禍福之際常恐其奪也以豫行君子之所易者猶若是知君行聖賢之所難者為難能也嵗之三月來自京師拜其舅氏豫得延之南齋聽其論議而慕其為人雖與之終身久處而不厭也留之數日而去於其去也不能忘言遂為之序送梅聖俞歸河陽序有逸趣至寶潛乎山川之幽而能先羣物以貴於世者負其有異而已故珠潛於泥玉潛於璞不與夫蜃蛤珉石混而棄者其先膺美澤之氣輝然特見于外也士固有潛乎卑位而與夫庸庸之流俯仰上下然卒不混者其文章才貌之光氣亦有輝然而特見者矣然求珠者必之乎海求玉者必之乎藍田求賢士者必之乎通邑大都據其會就其名而擇其精焉爾洛陽天子之西都距京師不數驛搢紳仕宦雜然而處其亦珠玉之淵海歟豫方據是而擇之獨得於梅君聖俞其所謂輝然特見而精者邪聖俞志高而行潔氣秀而色和嶄然獨出於衆人中初為河南主簿以親嫌移佐河陽常喜與洛之士遊故因吏事而至於此余嘗與之徜徉於嵩洛之下每得絶崖倒壑深林古宇則必相與吟哦其間始而歡然以相得終則暢然覺乎薰蒸浸漬之為益也故久而不厭既而以吏事訖言歸余且惜其去又悲夫潛乎下邑混於庸庸然所謂能先羣物而貴於世者特其異而已則光氣之輝然者豈能掩之哉送廖倚歸衡山序類昌黎元氣之融結為山川山川之秀麗稱衡湘其蒸為雲霓其生為杞梓人居其間得之為俊傑秀才生於衡山之陽而秀麗之精英者得之尤多故其文則雲霓其材則杞梓始以鄉進士舉於有司不中遂遊公卿間所至無不虛館設席爭以禮下之今永興太原公雅識沈正器君尤深初其鎮秦州也請君與俱行遂趨函關以覽秦都則西方士君子得以承望乎風采矣凡居秦幾嵗而東將過京師以歸豫嘗以上計吏客都中識君於交逵辱之以友益當君之西也獲餞於國門及夫斯來又相見於洛道語故舊數日乃行夫山川固能産異物而不能畜之者誠有利其用者爾今君之行也豫疑夫不能久畜於衡山之阿也送曾鞏秀才序既重曾鞏文不放口許曾鞏正是名公送秀才文字法家廣文曾生來自南豐入太學與其諸生羣進於有司有司斂羣材操尺度概以一法考其不中者而棄之雖有魁壘拔出之材其一絫黍不中尺度則棄不敢取幸而得良有司不過反同衆人歎嗟愛惜若取捨非己事者諉曰有司有法奈不中何有司固不自任其責而天下之人亦不以責有司皆曰其不中法也不幸有司尺度一失手則往往失多而得少噫有司所操果良法邪何其久而不思革也況若曾生之業其大者固以魁壘其於小者亦可以中尺度而有司棄之可怪也然曾生不非同進不罪有司告豫以歸思廣其學而堅其守豫初駭其文又壯其志夫農不咎嵗而災播是勤其水旱則已使一有穫則豈不多邪曾生槖其文數十萬言來京師京師之人無求曾生者然曾生亦不以干也若豫者豈能求生而生辱以顧豫是京師之人既不求之而有司又失之而獨余得也於其行也遂見於文使知生者可以弔有司之失而賀余之獨得也送田畫秀才寧親萬州序風韻跌宕五代之初天下分為十三四及建隆之際或滅或微其在者猶七國而蜀與江南地最大以周世宗之雄三至淮上不能舉李氏而蜀亦恃險為阻秦隴山南皆被侵奪而荆人縮手歸峽不敢西窺以爭故地及太祖受天命用兵不過萬人舉兩國如一郡縣吏何其偉歟當此時文初之祖從諸將西平成都及南攻金陵功最多於時語名將者稱田氏田氏功書史官祿世于家至今而不絶及天下已定將率無所用其武士君子爭以文儒進故文初將家子反衣白衣從鄉進士舉於有司彼此一時亦各遭其勢而然也文初辭業通敏為人敦潔可喜嵗之仲春自荆南西拜其親於萬州維舟夷陵豫與之登高以遠望遂遊東山窺緑蘿溪坐盤石文初愛之留數日乃去夷陵者其地志云北有夷山以為名或曰巴峽之險至此地始平夷蓋今文初所見尚未為山川之勝者由此而上泝江湍入三峽險怪奇絶乃可愛也當王師伐蜀時兵出兩道一自鳳州以入一自歸州以取忠萬以西今之所經皆王師嚮所用武處覽其山川可以慨然而賦矣唐宋八大家文鈔卷四十六
