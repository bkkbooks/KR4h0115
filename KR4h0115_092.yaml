body:
  text: 唐宋八大家文鈔卷八十六明茅坤撰臨川文鈔六序周禮義序荆公所自喜在讀周禮而其相業所卒自誤處亦在周禮士弊於俗學久矣聖上閔焉以經術造之乃集儒臣訓釋厥旨將播之校學而臣某實董周官惟道之在政事其貴賤有位其後先有序其多寡有數其遲數有時制而用之存乎法推而行之存乎人其人足以任官其官足以行法莫盛乎成周之時其法可施於後世其文有見於載籍莫具乎周官之書蓋其因習以崇之賡續以終之至於後世無以復加則豈特文武周公之力哉猶四時之運隂陽積而成寒暑非一日也自周之衰以至于今歷歲千數百矣太平之遺迹掃蕩幾盡學者所見無復全經於是時也乃欲訓而發之臣誠不自揆然知其難也以訓而發之之為難則又以知夫立政造事追而復之之為難然竊觀聖上致法就功取成於心訓迪在位有馮有翼亹亹乎鄉六服承德之世矣以所觀乎今考所學乎古所謂見而知之者臣誠不自揆妄以為庶幾焉故遂昧冒自竭而忘其材之弗及也謹列其書為二十有二卷凡十餘萬言上之御府副在有司以待制詔頒焉謹序書義序按二序皆公應詔為之者其辭簡而其法度自典則熙寧二年臣某以尚書入侍遂與政而子雱實嗣講事有旨為之説以獻八年下其説太學班焉惟虞夏啇周之遺文更秦而幾亡遭漢而僅存賴學士大夫誦説以故不泯而世主莫或知其可用天縱皇帝大知實始操之以驗物考之以決事又命訓其義兼明天下後世而臣父子以區區所聞承乏與榮焉然言之淵懿而釋以淺陋命之重大而承以輕眇兹榮也祗所以為愧也歟謹序詩義序自是作家之文詩三百十一篇其義具存其辭亡者六篇而巳上既使臣雱訓其辭又命臣某等訓其義書成以賜太學布之天下又使臣某為之序謹拜手稽首言曰詩上通乎道德下止乎禮義放其言之文君子以興焉循其道之序聖人以成焉然以孔子之門人賜也商也有得於一言則孔子悅而進之蓋其説之難明如此則自周衰以迄于今泯泯紛紛豈不宜哉伏惟皇帝陛下內德純茂則神罔時恫外行恂達則四方以無侮日就月將學有緝熙于光明則頌之所形容蓋有不足道也微言奧義既自得之又命承學之臣訓釋厥遺樂與天下共之顧臣等所聞如爝火焉豈足以賡日月之餘光姑承明制代匱而巳傳曰美成在久故棫朴之作人以夀考為言蓋將有來者焉追琢其章纘聖志而成之也臣衰且老矣尚庶幾及見之謹序熙寧字説序所見逺而語亦莊文者竒偶剛柔雜比以相承如天地之文故謂之文字者始於一二而生生至於無窮如母之字子故謂之字其聲之抑揚開塞合散出入其形之衡從曲直邪正上下內外左右皆有義皆本於自然非人私智所能為也與夫伏羲八卦文王六十四異用而同制相待而成易先王以為不可忽而患天下後世失其法故三嵗一同同之者一道德也秦燒詩書殺學士而於是時始變古而為𨽻蓋天之喪斯文也不然則秦何力之能為余讀許慎説文而於書之意時有所悟因序録其説為二十卷以與門人所推經義附之惜乎先王之文缺巳久慎所記不具又多舛而以余之淺陋考之且有所不合雖然庸詎非天之將興斯文也而以余贊其始故其教學必自此始能知此者則於道德之意巳十九矣老杜詩後集序深沉之思簡徑之言豫考古之詩尤愛杜甫氏作者其辭所從出一莫知窮極而病未能學也世所傳巳多計尚有遺落思得其完而觀之然每一篇出自然人知非人之所能為而為之者惟其甫也輒能辨之豫之令鄞客有授豫古之詩世所不傳者二百餘篇觀之豫知非人之所能為而為之實甫者其文與意之著也然甫之詩其完見於今者自豫得之世之學者至乎甫而後為詩不能至要之不知詩焉爾嗚呼詩其難惟有甫哉自洗兵馬下序而次之以示知甫者且用自發焉靈谷詩序覽之如遊峭壁邃谷吾州之東南有靈谷者江南之名山也龍蛇之神虎豹翬翟之文章楩柟豫章竹箭之材皆自山出而神林鬼冢魑魅之穴與夫仙人釋子恢譎之觀咸附託焉至其淑靈和清之氣盤礴委積於天地之間萬物之所不能得者乃屬之於人而處士君實生其址君姓吳氏家於山址豪傑之望臨吾一州者蓋五六世而後處士君出焉其行孝悌忠信其能以文學知名於時惜乎其老矣不得與夫虎豹翬翟之文章楩柟豫章竹箭之材俱出而為用於天下顧藏其神竒而與龍蛇雜此土以處也然君浩然有以自養遨遊於山川之間嘯歌謳吟以寓其所好終身樂之不厭而有詩數百篇傳誦於閭里他日出靈谷三十二篇以屬其甥曰為我讀而序之惟君之所得蓋有伏而不見者豈特盡於此詩而巳雖然觀其鑱刻萬物而接之以藻繢非夫詩人之巧者亦孰能至於此石仲卿字序簡潔可誦子生而父名之以别於人云爾冠而字成人之道也奚而為成人之道也成人則貴其所以成人而不敢名之於是乎命以字之字之為有可貴焉孔子作春秋記人之行事或名之或字之皆因其行事之善惡而貴賤之二百四十二年之間字而不名者十二人而巳人有可貴而不失其所以貴乃爾其少也閩人石仲卿來請字豫以子正字之附其名之義而為之爾子正於進士中名知經往往脫傳注而得經所以云之意接之久未見其行巳有闕也庶幾不失其所以貴者歟送李著作之官髙郵序遒徑君之才搢紳多聞之初君視金陵酒政人皆惜君不試於劇而淪於卑冗君將優為之曰孔子嘗為乘田委吏矣會計當而巳矣牛羊蕃而巳矣既而又得調髙郵關吏人復惜君不試於劇而淪於卑冗君言如初色滋蔓喜於戲今之公卿大夫據徼乘機鑽隙抵巇僅不盈志則戚戚以悲吾乃皎然反之此蒙所以髙君也抑有猜焉古之柄國家者有戢景藏采恬處下列拔而致之朝使相謨謀今豈不若古邪奚遂君請而弗拔也送陳興之序亦婉先人為臨江軍判官實佐今駕部員外郎陳公其後二十五年公之子興之主泰之如臯簿某為判官淮南以事出如臯遇之相好也其後二年歸京師興之亦以進士得嘉慶院解復遇之相好加焉興之試禮部有日今宰相其世父也試前奏罷之以避嫌興之當逺官踰數月乃得泉之晉江主簿去陳公世大家仕官四十年連坐謫流落不得所欲其意不能毋望興之貴富世其家也興之亦誠博學能文辭有氣節吾意其為進士宜有得焉今失所欲又為所謂主簿者逺其親三千里不啻是其心獨能毋介然者邪夫大公之道行上之人子弟茍賢者任而進之無嫌也下之人固亦不以嫌之今興之去知者皆憐其才之可以進焉而不得無以慰其親也吾於興之又世故故又為之思所以慰其親豁其心之介然者不得其説而獨以悲大公之道不行焉送陳升之序今世所謂良大夫者有之矣皆曰是宜任大臣之事者作而任大臣之事則上下一失望何哉人之材有小大而志有逺近也彼其任者小而責之近則煦煦然仁而有餘於仁矣孑孑然義而有餘於義矣人見其仁義有餘也則曰是其任者小而責之近夫任將有大此者然上下俟之云爾然後作而任大臣之事作而任大臣之事宜有大此者焉然則煦煦然而巳矣孑孑然而巳矣故上下一失望豈惟失望哉後日誠有堪大臣之事其名實蒸然於上上必懲前日之所俟而逆疑焉暴於下下必懲前日之所俟而逆疑焉上下交疑誠有堪大臣之事者而莫之或任幸欲任則左右小人得引前日之所俟懲之矣噫聖人謂知人難君子惡名之溢於實為此則奈何亦精之而巳矣惡之則奈何亦充之而巳矣知難而不能精之惡之而不能充之其亦殆哉豫在揚州朝之人過焉者多堪大臣之事可信而望者陳升之而巳矣今去官於宿州豫不知復幾何時乃一見之也豫知升之作而任大臣之事固有時矣煦煦然仁而巳矣孑孑然義而巳矣非豫所以望於升之也送胡叔才序情婉而正叔才銅陵大宗世以資名子弟豪者馳騁漁弋為巳事謹者務多闢田以殖其家先時邑之豪子弟有命儒者耗其千金之産卒無就邑豪以為諺莫肻命儒者遇儒冠者皆指目逺去若將浼巳然雖胡氏亦然獨叔才之父母不然於叔才之幼捐重幣逆良先生教之既壯可以遊資而遣之無所靳居數年朋試於有司不合而歸邑人之訾者半竊笑者半其父母愈篤不悔復資而遣之叔才純孝人也悱然感父母所以教巳之篤追四方材賢學作文章思顯其身以及其親不數年遂能褎然為材進士復朋試於有司不幸復詘於不巳知不豫愚而從之遊嘗謂豫言父母之思而慙其邑人不能歸豫曰歸也夫祿與位庸者所待以為榮者也彼賢者道弸於中而襮之以藝雖無祿與位其榮者固在也子之親矯羣庸而置子於聖賢之途可謂不賢乎或訾或笑而終不悔不賢者能之乎今而舍道德而榮祿與位殆不其然然則子之所以榮親而釋慙者亦多矣昔之訾者竊笑者固庸者爾豈子所宜慙哉姑持豫言以歸為父母夀其亦喜無量於子何如因釋然寤治裝而歸豫即書其所以為父母夀者送之云送孫正之序兩相針規兩相知已之情可掬時然而然衆人也巳然而然君子也巳然而然非私巳也聖人之道在焉爾夫君子有窮苦顛跌不肻一失詘巳以從時者不以時勝道也故其得志於君則變時而之道若反手然彼其術素修而志素定也時乎楊墨巳不然者孟軻氏而巳時乎釋老巳不然者韓愈氏而巳如孟韓者可謂術素修而志素定也不以時勝道也惜也不得志於君使真儒之效不白於當世然其於衆人也卓矣嗚呼豫觀今之世圓冠峩如大裙襜如坐而堯言起而舜趨不以孟韓之心為心者果異衆人乎豫官於揚得友曰孫正之正之行古之道又善為古文豫知其能以孟韓之心為心而不巳者也夫越人之望燕為絶域也北轅而首之茍不已無不至孟韓之道去吾黨豈若越人之望燕哉以正之之不已而不至焉豫未之信也一日得志於吾君而真儒之效不白於當世豫亦未之信也正之之兄官於溫奉其親以行將從之先為言以處豫豫欲默安得而默也唐宋八大家文鈔卷八十六
