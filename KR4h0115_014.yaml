body:
  text: 唐宋八大家文鈔巻十四明茅坤撰昌黎文鈔十四墓誌銘唐故監察御史衛府君墓誌銘誌中無他述獨指採藥煮黄金一事文旨自澹宕雋永君諱某字某中書舍人御史中丞諱某之子贈太子洗馬諱某之孫家世習儒學詞章昆弟三人俱傳父祖業從進士舉君獨不與俗為事樂弛置自便父中丞薨既三年與其弟中行别曰若既克自敬勤及先人存趾美進士續聞成宗唯服任遂功為孝子在不怠我恨已不及假令今得不足自貰我聞南方多水銀丹砂雜他竒藥爊為黄金可餌以不死今於若丐我我即去遂踰嶺阨南出藥貴不可得以干容帥帥且曰若能從事於我可一日具許之得藥試如方不效曰方良是我治之未至耳留三年藥終不能為黄金而佐帥政成以功再遷監察御史帥遷于桂從之帥坐事免君攝其治歴三時夷人稱便新帥將奏功君捨去南海馬大夫使謂君曰幸尚可成兩濟其利君雖益厭然不能無萬一冀至南海未幾竟死年五十三子曰某元和十年十二月某日葬河南某縣某鄉某村祔先塋於時中行為尚書兵部郎號名人而與余善請銘銘曰嗟惟君篤所信要無有弊精神以棄餘賈於人脱外累自貴珍訊來世述墓文尚書左丞孔公墓誌銘語多跌宕孔子之後三十八世有孫曰戣字君嚴事唐為尚書左丞年七十三三上書去官天子以為禮部尚書禄之終身而不敢煩以政吏部侍郎韓愈常賢其能謂曰公尚壯上三留奚去之果曰吾敢要君吾年至一宜去吾為左丞不能進退郎官唯相之為二宜去愈又曰古之老於鄉者將自佚非自苦閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨來往也今異於是公誰與居且公雖貴而無留資何恃而歸曰吾負二宜去尚奚顧子言愈面歎曰公於是乎賢遠於人明日奏疏曰臣與孔戣同在南省數與相見戣為人守節清苦論議正平年纔七十筋力耳目未覺衰老憂國忘家用意至到如戣軰在朝不過三數人陛下不宜苟順其求不留自助也不報明年長慶四年正月己未公年七十四告薨於家贈兵部尚書公始以進士佐三府官至殿中侍御史元和元年以大理正徵累遷江州刺史諫議大夫事有害於正者無所不言加皇太子侍讀改給事中言京兆尹阿縱罪人詔奪京兆尹三月之俸權知尚書右丞明年拜右丞改華州刺史明州歲貢海蟲淡菜蛤蚶可食之屬自海抵京師道路水陸逓夫積功歲為四十三萬六千人奏疏罷之下邽令笞外按小兒繫御史獄公上疏理之詔釋下邽令而以華州刺史為大理卿十二年自國子祭酒拜御史大夫嶺南節度等使約以取足境内諸州負錢至二百萬悉放不收蕃舶之至泊歩有下碇之税始至有閲貨之燕犀珠磊落賄及僕𨽻公皆罷之絶海之商有死于吾地者官藏其貨滿三月無妻子之請者盡没有之公曰海道以年計往復何月之拘茍有騐者悉推與之無算遠近厚守宰俸而嚴其法嶺南以口為貨其荒阻處父子相縛為奴公一禁之有隨公吏得無名兒蓄不言官有訟者公召殺之山谷諸黄世自聚為豪觀吏厚薄緩急或叛或從容桂二管利其虜掠請合兵討之冀一有功有所指取當是時天子以武定淮西河南北用事者以破諸黄為類向意助之公屢言遠人急之則惜性命相屯聚為寇緩之則自相怨恨而散此禽獸耳但可自計利害不足與論是非天子入先言遂歛兵江西岳鄂湖南嶺南會容桂之吏以討之被霧露毒相枕籍死百無一還安南乘勢殺都䕶李象古桂將裴行立容將陽旻皆無功數月自死嶺南囂然祠部歲下廣州祭南海廟廟入海口為州者皆憚之不自奉事常稱疾命從事自代唯公歲常自行官吏刻石為詩美之十五年遷尚書吏部侍郎公之北歸不載南物奴婢之籍不増一人長慶元年改右散騎常侍二年而為尚書左丞曽祖諱務本滄州東光令祖諱如珪海州司户參軍贈尚書工部郎中皇考諱岑父祕書省著作佐郎贈尚書左僕射公夫人京兆韋氏父种大理評事有四子長曰温質四門博士遵儒遵憲温裕皆明經女子長嫁中書舍人平陽路隋其季者幼公之昆弟五人載戡戢戵公於次為第二公之薨戢自湖南入為少府監其年八月甲申戢與公子葬公于河南河隂廣武原先公僕射墓之左銘曰孔世卅八吾見其孫白而長身寡笑與言其尚類也莫與之倫德則多有請考于文集賢院校理石君墓誌銘簡而法君諱洪字濬川其先姓烏石蘭九代祖猛始從拓拔氏入夏居河南遂去烏與蘭獨姓石氏而官號大司空後七世至行褒官至昜州刺史於君為曽祖昜州生婺州金華令諱懐一卒葬洛陽北山金華生君之考諱平為太子家令葬金華墓東而尚書水部郎劉復為之銘君生七年喪其母九年而喪其父能力學行去黄州録事參軍則不仕而退處東都洛上十餘年行益修學益進交游益附聲號聞四海故相國鄭公餘慶留守東都上言洪可付史筆李建拜御史崔周禎為補闕皆舉以讓宣歙池之使與浙東使交牒署君從事河陽節度烏大夫重𦙍間以幣先走廬下故為河陽得佐河陽軍吏治民寛考功奏從事考君獨於天下為第一元和六年詔下河南徵拜京兆昭應尉校理集賢御書明年六月甲午疾卒年四十二娶彭城劉氏女故相國晏之兄孫生男二人八歲曰壬四歲曰申女子二人顧言曰葬死所七月甲申葬萬年白鹿原既病謂其游韓愈曰子以吾銘銘曰生之艱成之又艱若有以為而止於斯尚書庫部郎中鄭君墓誌銘雋才逸興君諱羣字𢎞之世為滎陽人其祖於元魏時有假封襄城公者子孫因稱以自别曾祖匡時晉州霍邑令祖千尋彭州九隴丞父廸鄂州唐年令娶河南獨孤氏女生二子君其季也以進士選吏部考功所試判為上等授正字自鄠縣尉拜監察御史佐鄂岳使裴均之為江陵以殿中侍御史佐其軍均之徵也遷虞部員外郎均鎮襄陽復以君為襄府左司馬刑部員外郎副其支度使事均卒李夷簡代之因以故職留君歲餘拜復州刺史遷祠部郎中會衢州無刺史方選人君願行宰相即以君應詔治衢五年復入為庫部郎中行及揚州遇疾居月餘以長慶元年八月二十四日卒春秋六十即以其年十一月二十二日從葬于鄭州廣武原先人之墓次君天性和樂居家事人與待交遊初持一心未嘗變節有所緩急曲直薄厚疎數也不為翕翕熱亦不為崖岸斬絶之行俸禄入門與其所過逢吹笙彈箏飲酒舞歌詼調醉呼連日夜不厭費盡不復顧問或分挈以去一無所愛惜不為後日毫髪計留也遇其空無時客至清坐相看或竟日不能設食客主各自引退亦不為辭謝與之遊者自少及老未嘗見其言色有若憂歎者豈列禦寇莊周等所謂近於道者邪其治官守身又極謹慎不挂於過差去官而人民思之身死而親故無所怨議哭之皆哀又可尚也初娶吏部侍郎京兆韋肇女生二女一男長女嫁京兆韋詞次嫁蘭陵蕭儹後娶河南少尹趙郡李則女生一女二男其餘男二人女四人皆幼嗣子退思韋氏生也銘曰再鳴以文進塗闢佐三府治藹厥蹟郎官郡守愈著白洞然渾樸絶瑕謫甲子一終反𤣥宅河南少尹裴君墓誌銘篇中特序世系及拜官爵卒年月日與葬處篇末次行事並虚景公諱復字茂紹河東人曽大父元簡大理正大父曠御史中丞京畿採訪使父虬以有氣畧敢諫諍為諌議大夫引正大疑有寵代宗朝屢辭官不肯拜卒贈工部尚書公舉賢良拜同官尉僕射南陽公開府徐州召公主書記三遷至侍御史入朝歴殿中侍御史累遷至刑部郎中疾病改河南少尹輿至官若干日卒實元和三年四月二十三日享年五十夫人博陵崔氏少府監頲之女男三人璟質皆既冠其季始六歲曰充郎卜葬得公卒之四月壬寅遂以其日葬東都芒山之隂杜翟村公幼有文年十四上時雨詩代宗以為能將召入為翰林學士尚書公請免曰願使卒學丁後母喪上使臨弔又詔尚書公曰父忠而子果孝吾加賜以厲天下終喪必且以為翰林其在徐州府能勤而有勞在朝以恭儉守其職居喪必有聞待諸弟友以善教館嫠妹畜孤甥能别而有恩歴十一官而無宅于都無田于野無遺資以為葬斯其可銘也已銘曰裴為顯姓入唐尤盛支分族離各為大家惟公之系德隆位細曰子曰孫厥聲世繼晉陽之色愉愉翼翼無外無私幼壯若一何壽之不遐而禄之不多謂必有後其又信然耶給事中清河張君墓誌銘有生色張君名徹字某以進士累官至范陽府監察御史長慶元年今牛宰相為御史中丞奏君名迹中御史選詔即以為御史其府惜不敢留遣之而密奏幽州將父子繼續不廷選且久今新收臣又始至孤怯須強佐乃濟發半道有詔以君還之仍遷殿中侍御史加賜朱衣銀魚至數日軍亂怨其府從事盡殺之而囚其帥且相約張御史長者毋侮辱轢蹙我事毋庸殺置之帥所居月餘聞有中貴人自京師至君謂其帥公無負此土人上使至可因請見自辯幸得脱免歸即推門求出守者以告其魁魁與其徒皆駭曰必張御史張御史忠義必為其帥告此餘人不如遷之别館即與衆出君君出門罵衆曰汝何敢反前日吳元濟斬東市昨日李師道斬於軍中同惡者父母妻子皆屠死肉餧狗䑕鴟鵶汝何敢反汝何敢反行且罵衆畏惡其言不忍聞且虞生變即擊君以死君抵死口不絶罵衆皆曰義士義士或收瘞之以俟事聞天子壯之贈給事中其友侯雲長佐鄆使請於其帥馬僕射為之選於軍中得故與君相知張恭李元實者使以幣請之范陽范陽人義而歸之以聞詔所在給船轝傳歸其家賜錢物以葬長慶四年四月某日其妻子以君之喪葬于某州某所君弟復亦進士佐汴宋得疾變易喪心驚惑不常君得閒即自視衣褥薄厚節時其飲食而匕筯進養之禁其家無敢高語出聲醫餌之藥其物多空青雄黄諸竒怪物劑錢至十數萬營治勤劇皆自君手不假之人家貧妻子常有饑色祖某某官父某某官妻韓氏禮部郎中某之孫汴州開封尉某之女於余為叔父孫女君常從余學選於諸生而嫁與之孝順祗修羣女效其所為男若干人曰某女子某銘曰嗚呼徹也世慕顧以行子掲掲也噎喑以為生子獨割也為彼不清作玉雪也仁義以為兵用不缺折也知死不失名得猛厲也自申于闇明莫之奪也我銘以貞之不肖者之呾也考功員外盧君墓銘篇中並虚景總只是以李棲筠辟從事為案愈之宗兄故起居舍人君以道德文學伏一世其友四人其一范陽盧君東美少未出仕皆在江淮間天下大夫士謂之四夔其義以為道可與古之夔臯者侔故云爾或曰夔嘗為相世謂相夔四人者雖處而未仕天下許以為相故云大厯初御史大夫李棲筠由工部侍郎為浙西觀察使當是時中國新去亂仕多避處江淮間嘗為顯官得名聲以老故自任者以千百數大夫莫之取獨晨衣朝服從騎吏入下里舍請盧君君時始任戴冠通詩書與其羣日講説周公孔子以相磨礱浸灌婆娑嬉游未有捨所為為人意既起從大夫天下未知君者惟竒大夫之取人也不常必得人其知君者謂君之從人也非其常守必得其從其後為太常博士監察御史河南府司録考功員外郎年若干而終在官舉其職夫人李姓隴西人君在配君子無違德君没訓子女得母道甚後君二十年年六十六而終將合葬其子暢命其孫立曰乃祖德烈靡不聞然其詳而信者宜莫若吾先人之友先人之友無在者起居丈有季曰愈能為古文業其家是必能道吾父事業汝其往請銘焉立于是奉其父命奔走來告愈謂立曰子來宜也行不可一二舉且吾之生也後不與而祖接不得詳也其大者莫若衆所與觀所與衆寡兹可以審其德矣乃祖未出而處也天下大夫士以為與古之夔臯者侔且可以為相其德不既大矣乎講説周公孔子樂其道不樂從事於俗得所從不擇外内奮而起其進退不既合於義乎銘如是可以示于今與後也與立拜手曰唯唯君祖子輿濮州濮陽令父同舒州望江令夫人之祖延宗鄆州司馬父進成鄜州洛交令男三人暢申易女三人皆嫁為士人妻墓在河南緱氏縣梁國之原其年月日元和二年二月十日云司法參軍李君墓誌銘公與李翺厚相知而次其祖墓簡徑如此貞元十七年九月丁卯隴西李翺合葬其皇祖考貝州司法參軍楚金皇祖妣清河崔氏夫人于汴州開封縣某里昌黎韓愈紀其世著其德行以識其葬其世曰由梁武昭王六世至司空司空之後二世為刺史清淵侯由侯至于貝州凡五世其德行曰事其兄如事其父其行不敢有出焉其夫人事其姒如事其姑其於家不敢有專焉其在貝州其刺史不悦於民將去官民相率讙譁手瓦石胥其出擊之刺史匿不敢出州縣吏由别駕已下不敢禁司法君奮曰是何敢爾屬小吏百餘人持兵仗以出立木而署之曰刺史出民有敢觀者殺之木下民聞皆驚相告散去後刺史至加擢任貝州由是大理其葬曰翺既遷貝州君之喪于貝州殯于開封遂遷夫人之喪于楚州八月辛亥至于開封壙于丁巳墳于九月辛酉窆于丁卯人謂李氏世家也侯之後五世仕不遂藴必發其起而大乎四十年而其兄之子衡始至户部侍郎君之子四人官又卑翺其孫也有道而甚文固于是乎在孔司勲墓誌銘司勲贈官也而誌首稱昭義節度盧從史有賢佐者以戡終始從史幕中也通篇只叙一事昭義節度盧從史有賢佐曰孔君諱戡字君勝從史為不法君隂爭不從則於㑹肆言以折之從史羞面頸發赤抑首伏氣不敢出一語以對立為君更令改章辭者前後累數十坐則與從史説古今君臣父子道順則受成福逆輒危辱誅死曰公當為彼不當為此從史常聳聽喘汗居五六歲益驕有悖語君爭無改悔色則悉引從事空一府往爭之從史雖羞退益甚君泣語其徒曰吾所為止於是不能以有加矣遂以疾辭去卧東都之城東酒食伎樂之燕不與當是時天下以為賢論士之宜在天子左右者皆曰孔君孔君云㑹宰相李公鎮揚州首奏起君君猶卧不應從史讀詔曰是故舍我而從人耶即誣奏君前在軍有某事上曰吾知之矣奏三上乃除君衛尉丞分司東都詔始下門下給事中吕元膺封還詔書上使謂吕君曰吾豈不知戡也行用之矣明年元和五年正月將浴臨汝之湯泉壬子至其縣食遂卒年五十七公卿大夫士相弔於朝處士相弔於家君卒之九十六日詔縛從史送闕下數以違命流于日南遂詔贈君尚書司勲員外郎盖用嘗欲以命君者信其志其年八月甲申從葬河南河隂之廣武原君於為義若嗜欲勇不顧前後於利與禄則畏避退處如怯夫然始舉進士第自金吾衛録事為大理評事佐昭義軍軍帥死從史自其軍諸將代為帥請君曰從史起此軍行伍中凡在幕府唯公無分寸私公茍留唯公之所欲為君不得已留一歲再奏自監察御史至殿中侍御史從史初聽用其言得不敗後不聽信其惡益聞君棄去遂敗祖某某官贈某官父某某官贈某官君始娶𢎞農楊氏女卒又娶其舅宋州刺史京兆韋屺女皆有婦道凡生一男四女皆幼前夫人從葬舅姑兆次卜人曰今兹歳未可以祔從卜人言不祔君母兄戣尚書兵部員外郎母弟戢殿中侍御史以文行稱朝廷將葬以韋夫人之弟前進士楚材之狀授愈曰請為銘銘曰允義孔君兹惟其藏更千萬年無敢壊傷按附誌前夫人所以不及祔葬舅姑兆次之故而不詳與司勲合葬處不可曉李元賔墓銘誌特謹書官爵及死葬月日而行誼則藴藉銘中李觀字元賔其先隴西人也始來自江之東年二十四舉進士三年登上第又舉博學宏辭得太子校書一年年二十九客死于京師既歛之三日友人博陵崔𢎞禮葬之于國東門之外七里鄉曰慶義原曰嵩原友人韓愈書石以誌之辭曰已虖元賔壽也者吾不知其所慕夭也者吾不知其所惡生而不淑誰謂其壽死而不朽誰謂之夭已虖元賔才高乎當世而行出乎古人已虖元賔竟何為哉竟何為哉唐荆川曰此亦變體李觀本文士而又為韓公之友不知發之何以如此其略也試大理評事王君墓誌銘澹宕多奇君諱適姓王氏好讀書懐竒負氣不肯隨人後舉選見功業有道路可指取有名節可以戾契致困於無資地不能自出乃以干諸公貴人借助聲勢諸公貴人既志得皆樂熟軟媚耳目者不喜聞生語一見輒戒門以絶上初即位以四科募天下士君笑曰此非吾時邪即提所作書緣道歌吟趨直言試既至對語驚人不中第益困久之聞金吾李將軍年少喜事可撼乃蹐門告曰天下竒男子王適願見將軍白事一見語合意往來門下盧從史既節度昭義軍張甚奴視法度士欲聞無顧忌大語有以君生平告者即遣客鉤致君曰狂子不足以共事立謝客李將軍由是待益厚奏為其衛胄曹參軍充引駕仗判官盡用其言將軍遷帥鳳翔君隨往改試大理評事攝監察御史觀察判官櫛垢爬痒民獲蘇醒居歲餘如有所不樂一旦載妻子入閿鄉南山不顧中書舍人王涯獨孤郁吏部郎中張惟素比部郎中韓愈日發書問訊顧不可強起不即薦明年九月疾病輿醫京師某月某日卒年四十四十一月某日即葬京城西南長安縣界中曾祖爽洪州武寜令祖微右衛騎曹參軍父嵩蘇州崑山丞妻上谷侯氏處士高女高固竒士自方阿衡太師世莫能用吾言再試吏再怒去發狂投江水初處士將嫁其女懲曰吾以齟齬窮一女憐之必嫁官人不以與凡子君曰吾求婦氏久矣惟此翁可人意且聞其女賢不可以失即謾謂媒嫗吾明經及第且選即官人侯翁女幸嫁若能令翁許我請進百金為嫗謝諾許白翁翁曰誠官人耶取文書來君計窮吐實嫗曰無苦翁大人不疑人欺我得一巻書粗若告身者我袖以往翁見未必取眎幸而聽我行其謀翁望見文書銜袖果信不疑曰足矣以女與王氏生三子一男二女男三歲夭死長女嫁亳州永城尉姚挺其季始十歲銘曰鼎也不可以柱車馬也不可使守閭佩玉長裾不利走趨祗繫其逢不繫巧愚不諧其湏有銜不祛鑚石埋辭以列幽墟唐宋八大家文鈔巻十四
