body:
  text: 唐宋八大家文鈔卷三十九明茅坤撰廬陵文鈔十一書與石推官第一書引譽後進亦規訓後進前嵗於洛陽得在鄆州時所寄書卒然不能即報遂以及今然其勤心未必若書之怠而獨不知公操察不察也修來京師己一嵗也宋州臨汴水公操之譽日與南方之舟至京師修少與時人相接尤寡而譽者無日不聞若幸使盡識舟上人則公操之美可勝道哉凡人之相親者居則握手共席道歡欣既别則問疾病起居以相為憂者常人之情爾若聞如足下之譽者何必問其他乎聞之欣然亦不減握手之樂也夫不以相見為歡樂不以疾病為憂問是豈無情者乎得非相期者在於道爾其或有過而不至於道者乃可為憂也近於京師頻得足下所為文讀之甚善其好古閔世之意皆公操自得於古人不待修之贊也然有自許太髙詆時太過其論若未深究其源者此事有本末不可卒然語須相見乃能盡然有一事今詳而說此計公操可朝聞而暮改者試先陳之君貺家有足下手作書一通及有二像記石本始見之駭然不可識徐而視定辨其㸃畫乃可漸通吁何怪之甚也既而持以問人曰是不能乎書者邪曰非不能也書之法當爾邪曰非也古有之乎曰無今有之乎亦曰無也然則何謂而若是曰特欲與世異而已修聞君子之於學是而已不聞為異也好學莫如揚雄亦曰如此然古之人或有稱獨行而髙世者考其行亦不過乎君子但與世之庸人不合爾行非異世蓋人不及而反棄之舉世斥以為異者歟及其過聖人猶欲就之於中庸况今書前不師乎古後不足以為來者法雖天下皆好之猶不可為况天下皆非之乃獨為之何也是果好異以取髙歟然嚮謂公操能使人譽者豈其履中道秉常德而然歟抑亦昻然自異以驚世人而得之歟古之教童子者立必正聽不傾常視之毋誑勤謹乎其始惟恐其見異而惑也今足下端然居乎學舍以教人為師而反率然以自異顧學者何所法哉不幸學者皆從而效之足下又果為獨異乎今不急止則懼他日有責後生之好怪者推其事罪以奉歸此修所以為憂而敢告也惟幸察之不宣與石推官第二書辨博前同年徐君行因得寓書論足下書之怪時僕有妹居襄城喪其夫匍匐將往視之故不能盡其所以云者而略陳焉足下雖不以僕為狂愚而絶之復之以書然果未能喻僕之意非足下之不喻由僕聽之不審而論之之略之過也僕見足下書久矣不即有云而今乃云者何邪始見之疑乎不能書又疑乎忽而不學夫書一藝爾人或不能與忽不學時不必論是以默默然及來京師見二像石本及聞說者云足下不欲同俗而力為之如前所陳者是誠可諍矣然後一進其說及得足下書自謂不能與前所聞者異然後知所聽之不審也然足下於僕之言亦似未審者足下謂世之善書者能鍾王虞栁不過一藝己之所學乃堯舜周孔之道不必善書又云因僕之言欲勉學之此皆非也夫所謂鍾王虞栁之書者非獨足下薄之僕固亦薄之矣世之有好學其書而悅之者與嗜飲茗閲畫圖無異但其性之一僻爾豈君子之所務乎然至於書則不可無法古之始有文字也務乎記事而因物取類為其象故周禮六藝有六書之學其㸃畫曲直皆有其說揚子曰斷木為棋梡革為鞠亦皆有法焉而况書乎今雖𨽻字己變於古而變古為𨽻者非聖人不足師法然其㸃畫曲直猶有凖則如毋母彳人之相近易之則亂而不可讀矣今足下以其直者為斜以其方者為圓而曰我第行堯舜周孔之道此甚不可也譬如設饌於案加帽於首正襟而坐然後食者此世人常爾若其納足於帽反衣而衣坐乎案上以飯實酒巵而食曰我行堯舜周孔之道者以此之於世可乎不可也則書雖末事而當從常法不可以為怪亦猶是矣然足下了不省僕之意凡僕之所陳者非論書之善不但患乎近怪自異以惑後生也若果不能又何必學僕豈區區勸足下以學書者乎足下又云我實有獨異於世者以疾釋老斥文章之雕刻者此又大不可也夫釋老惑者之所為雕刻文章薄者之所為足下安知世無明誠質厚君子之不為乎足下自以為異是待天下無君子之與已同也仲尼曰後生可畏安知來者之不如今也是則仲尼一言不敢遺天下之後生足下一言待天下以無君子此故所謂大不可也夫士之不為釋老與不雕刻文章者譬如為吏而不受貨財蓋道當爾不足恃以為賢也屬久苦小疾無意思不宣與張棐秀才第一書所見不甚深而自托攘臂以遊處婉而逸前日辱以詩賦雜文啓事為贄披讀三四不能輒休足下家籍河中為鄉進士精學勵行嘗已選於里升於府而試於有司矣誠可謂彼邦之秀者歟然士之居也遊必有友學必有師其鄉必有先生長者府縣必有賢守長佐吏彼能為足下稱才而述美者宜不少矣今乃越數百里犯風霜於大國望官府下首於閽謁者以通姓名趨走拜伏於人之階廡間何其勤勞乎豈由心負其所有而思以一發之邪將顧視其鄉之狹陋不足自廣而謂夫大國多賢士君子可以奮揚而光逺之邪則足下之來也其志豈近而求豈小邪得非磨光濯色計之熟卜之吉而後勇决以來邪今市之門旦而啓商者趨焉賈者坐焉持寶而欲價者之焉賫金而求寶者亦之焉閒民無資攘臂以遊者亦之焉洛陽天下之大市也來而欲價者有矣坐而為之輕重者有矣豫居其間其官位學行無動人也是非可否不足取信也其亦無資而攘臂以遊者也今足下之來試其價既就於可以輕重者矣而反以及豫夫以無資者當求價之責雖知貪於所得而不知有以為價也故辱賜以來且慙且喜既不能塞所求以報厚意姑道此以為謝與張秀才第二書折衷之於道處才是歐公實地位前日去後復取前所貺古今雜文十數篇反復讀之若大節賦樂古太古曲等篇言尤髙而志極大尋足下之意豈非閔世病俗究古明道欲援今以復之古而翦剔齊整凡今之分殽駮冗者歟然後益知足下之好學甚有志者也然而述三皇太古之道拾近取逺務髙言而鮮事實此少過也君子之於學也務為道為道必求知古知古明道而後履之以身施之於事而又見於文章而發之以信後世其道周公孔子孟軻之徒常履而行之者是也其文章則六經所載至今而取信者是也其道易知而可法其言易明而可行及誕者言之乃以混䝉虛無為道洪荒廣略為古其道難法其言難行孔子之言道曰道不逺人言中庸者曰率性之謂道又曰可離非道也春秋之為書也以成隱讓而不正之傳者曰春秋信道不信邪謂隱未能蹈道齊侯遷衛書城楚丘與其仁不與其專封傳者曰仁不勝道凡此所謂道者乃聖人之道也此履之於身施之於事而可得者也豈如誕者之言者耶堯舜禹之書皆曰若稽古傅說曰事不師古匪說攸聞仲尼曰吾好古敏以求之者凡此所謂古者其事乃君臣上下禮樂刑法之事又豈如誕者之言者耶此君子之所學也夫所謂捨近而取逺云者孔子昔生周之世去堯舜逺孰與今去堯舜逺也孔子删書斷自堯典而弗道其前其所謂學則曰祖述堯舜如孔子之聖且勤而弗道其前者豈不能耶蓋以其漸逺而難彰不可以信後世也今生於孔子之絶後而反欲求堯舜之已前世所謂務高言而鮮事實者也唐虞之道為百王首仲尼之歎曰蕩蕩乎謂髙深閎大而不可名也及夫二典述之炳然使後世尊崇仰望不可及其嚴若天然則書之言豈不髙耶然其事不過於親九族平百姓憂水患問臣下誰可任以女妻舜及祀山川見諸侯齊律度謹權衡使臣下誅放四罪而已孔子之後惟孟軻最知道然其言不過於教人樹桑麻畜雞豚以謂養生送死為王道之本夫二典之文豈不為文孟軻之言道豈不為道而其事乃世人之甚易知而近者蓋切於事實而己今學者不深本之乃樂誕者之言思混沌於古初以無形為至道者無有髙下逺近使賢者能之愚者可勉而至無過不及而一本乎大中故能亘萬世可行而不變也今以謂不足為而務高逺之為勝以廣誕者無用之說是非學者之所盡心也宜少下其髙而近其逺以及乎中則庶乎至矣凡僕之所論者皆陳言淺語如足下之多聞博學不宜為足下道之也然某之所以云者本欲損足下髙逺而俯就之則安敢務為奇言以自髙耶幸足下少思焉與荆南樂秀才書樂秀才所問問舉子業之文而歐陽公不屑論之人恐誤樂秀才所以問舉業之意故挈出順時兩字告之修頓首白秀才足下前者舟行往來屢辱見過又辱以所業一編先之啓事及門而贄田秀才西來辱書其後豫家奴自府還縣比又辱書僕有罪之人人所共棄而足下見禮如此何以當之當之未暇答宜遂絶而再辱書再而未答宜絶而又辱之何其勤之甚也如修者天下窮賤之人爾安能使足下之切切如是邪蓋足下力學好問急於自為謀而然也然䝉索僕所為文字者此似有所過聽也僕少從進士舉於有司學為詩賦以備程試凡三舉而得第與士君子相識者多故往往能道僕名字而又以游從相愛之私或過稱其文字故使足下聞僕虛名而欲見其所為者由此也僕少孤貧貪祿仕以養親不暇就師窮經以學聖人之遺業而涉獵書史姑隨世俗作所謂時文者皆穿蠧經傳移此儷彼以為浮薄惟恐不悅於時人非有卓然自立之言如古人者然有司過採屢以先多士及得第已來自以前所為不足以稱有司之舉而當長者之知始大改其為庶幾有立然言出而罪至學成而身辱為彼則獲譽為此則受禍此明效也夫時文雖曰浮巧然其為功亦不易也僕天資不好而彊為之故比時人之為者尤不工然已足以取祿仕而竊名譽者順時故也先輩少年志盛方欲取榮譽於世則莫若順時天聖中天子下詔書勑學者去浮華其後風俗大變今時之士大夫所為彬彬有兩漢之風矣先輩往學之非徒足以順時取譽而已如其至之是直齊肩於兩漢之士也若僕者其前所為既不足學其後所為慎不可學是以徘徊不敢出其所為者為此也在易之困曰有言不信謂夫人方困時其言不為人所信也今可謂困矣安足為足下所取信哉辱書既多且切不敢不答幸察答陜西安撫使范龍圖辭辟命書歐公本不欲為范公幕府書記故云與之同其退可也與之同其進不可也此是歐公自立處修頓首再拜啓急步至得七月十九日華州所發書伏審即日尊體動止萬福戎狄侵邊自古常事邊吏無狀至煩大賢伏惟執事忠義之節信於天下天下之士得一識面者退誇於人以為榮耀至於游談布衣之賤往往竊託門下之名矧今以大謀小以順取逆濟以明哲之才有必成功之勢則士之好功名者於此為時孰不願出所長少助萬一得託附以成其名哉况聞狂寇猖獗屢有斥指之詞加之輕侮購募之辱至於執戮將吏殺害邊民凡此數事在於修輩尤為憤恥每一思之中夜三起不幸修無所能徒以少喜文字過為世俗見許此豈足以當大君子之舉哉若夫參決軍謀經畫財利料敵制勝在於幕府茍不乏人則軍書奏記一末事耳有不待修而堪者矣由此始敢以親為辭况今世人所謂四六者非修所好少為進士時不免作之自及第遂棄不復作在西京佐三相幕府於職當作亦不為作此師魯所見今廢已久懼無好辭以辱嘉命此一端也伏見自至關西辟士甚衆古人所與成事者必有國士共之非惟在上者以知人為難士雖貧賤以身許人固亦未易欲其盡死必深相知知之不盡士不為用今奇怪豪傑之士往往䝉見收擇顧用之如何爾然尚慮山林草莽有挺特知義慷慨自重之士未得出於門下也宜少思焉若修者恨無他才以當長者之用非敢效庸人茍且樂安佚也幸察答祖擇之書中多名言吾覽之當刺心縮頸修啓秀才人至䝉示書一通并詩賦雜文兩册諭之曰一覽以為如何某既陋不足以辱好學者之問又其少賤而長窮其素所為未有足稱以取信於人亦嘗有人問者以不足問之愚而未嘗答人之問足下卒然及之是以愧懼不知所言雖然不逺數百里走使者以及門意厚禮勤何敢不報某聞古之學者必嚴其師師嚴然後道尊道尊然後篤敬篤敬然後能自守能自守然後果於用果於用然後不畏而不遷三代之衰學校廢至兩漢師道尚存故其學者各守其經以自用是以漢之政理文章與其當時之事後世莫及者其所從來深矣後世師法漸衰而今世無師則學者不尊嚴故自輕其道輕之則不能至不至則不能篤信信不篤則不知所守守不固則有所畏而物可移是故學者惟俯仰徇時以希祿利為急至於忘本趨末流而不返夫以不信不固之心守不至之學雖欲果於自用莫知其所以用之之道又况有祿利之誘刑禍之懼以遷之哉此足下所謂志古知道之士世所鮮而未有合者由此也足下所為文用意甚髙卓然有不顧世俗之心直欲自到於古人今世之人用心如足下者有幾是則鄉曲之中能為足下之師者謂誰交游之間能發足下之議論者謂誰學不師則守不一議論不博則無所發明而究其深足下之言髙趣逺甚善然所守未一而議論未精此其病也竊惟足下之交游能為足下稱才譽美者不少今皆捨之逺而見及乃知足下是欲求其不至此古君子之用心也是以言之不敢隱夫世無師矣學者當師經師經必先求其意意得則心定心定則道純道純則充於中者實中充實則發為文者輝光施於事者果毅三代兩漢之學不過此也足下患世未有合者而不棄其愚將某以為合故敢道此未知於足下之意合否答李大臨學士書佳致修再拜人至辱書甚慰永陽窮僻而多山林之景又嘗得賢士君子居焉修在滁之三年得博士杜君與處甚樂每登臨覽泉石之際惟恐其去也其後徙官廣陵忽忽不逾嵗而求潁在潁逾年差自適然滁之山林泉石與杜君共樂者未嘗輒一日忘於心也今足下在滁而事陳君與居足下知道之明者固能達於進退窮通之理能達於此而無纍於心然後山林泉石可以樂必與賢者共然後登臨之際有以樂也足下所得與修之得者同而有小異者修不足以知道獨其遭世憂患多齒髮衰因得閒處而為宜爾此為與足下異也不知足下之樂惟恐其去能與修同否况足下學至文髙宜有所施於當世不得若某之戀戀此其與某異也得陳君所寄二圖覽其景物之宛然復思二賢相與之樂恨不得追逐於其間因人還草率答徐無黨第一書與公春秋論參看修白人還惠書及始隱書論等并前所記獲麟論文辭馳騁之際豈常人筆力可到於辨論經㫖則不敢以為是蓋吾子自信甚鋭又嘗取信於某茍以為然誰能奉奪凡今治經者莫不患聖人之意不明而為諸儒以自出之說汩之也今於經外又自為說則是患沙渾水而投土益之也不若沙土盡去則水清而明矣魯隱公南面治其國臣其吏民者十餘年死而入廟立諡稱公則當時魯人孰謂息姑不為君也孔子修春秋凡與諸侯盟㑹行師命將一以公書之於其卒也書曰公薨則聖人何嘗異隱於他公也據經隱公立十一年而薨則左氏何從而知其攝公羊榖梁何從而見其有讓桓之迹吾子亦何從而云云也仲尼曰吾其為東周乎與吾子起於平王之說何相反之甚邪故某嘗告學者慎於述作誠以是也秋初許相訪此不子細略開其端吾子必能自思而得之不宣答宋咸書自是名儒之言修頓首白州人至䝉惠書及補注周易甚善世無孔子久矣六經之㫖失其傳其有不可得而正者自非孔子復出無以得其真也傳者之為學博矣而又苦心勞神於殘編朽簡之中以求千嵗失傳之繆茫乎前望已逺之聖人而不可見杳乎後顧無窮之來者欲為未悟決難解之惑是真所謂勞而少功者哉然而經非一世之書也其傳之繆非一日之失也其所以刋正補緝亦非一人之能也使學者各極其所見而明者擇焉十取其一百取其十雖未能復六經於無失而卓如日月之明然聚衆人之善以補緝之庶幾不至於大繆可以俟聖人之復生也然則學者之於經其可已乎足下於經勤矣凡其所失無所不欲正之其刋正補緝者衆則其所得亦已多矣修學不敏明而又無彊力以自濟恐終不能少出所見以補六經之萬一得足下所為故尤區區而不能忘也答吳充秀才書論為文本乎學道道勝者文不難而自至最是確論修頓首白先輩吳君足下前辱示書及文三篇發而讀之浩乎若千萬言之多及少定而視焉才數百言爾非夫辭豐意雄霈然有不可禦之勢何以至此然猶自患倀倀莫有開之使前者此好學之謙言也修材不足用於時仕不足榮於世其毁譽不足輕重氣力不足動人世之欲假譽以為重借力而後進者奚取於修焉先輩學精文雄其施於時又非待假譽而為重借力而後進者也然而惠然見臨若有所責得非急於謀道不擇其人而問焉者歟夫學者未始不為道而至者鮮焉非道之於人逺也學者有所溺焉爾蓋文之為言難工而可喜易悅而自足世之學者往往溺之一有工焉則曰吾學足矣甚者至棄百事不關於心曰吾文士也職於文而已此其所以至之鮮也昔孔子老而歸魯六經之作數年之頃爾然讀易者如無春秋讀書者如無詩何其用功少而至於至也聖人之文雖不可及然大抵道勝者文不難而自至也故孟子皇皇不暇著書荀卿蓋亦晚而有作若子雲仲淹方勉焉以模言語此道未足而彊言者也後之惑者徒見前世之文傳以為學者文而已故愈勤而愈不至此足下所謂終日不出於軒序不能縱橫髙下皆如意者道未足也若道之充焉雖行乎天地入於淵泉無不之也足下之文浩乎霈然可謂善矣而又志於為道猶自以為未廣若不止焉孟荀可至而不難也修學道而不至者然幸不甘於所悅而溺於所止因吾子之能不自止又以勵修之少進焉幸甚代人上王樞密求先集序書其機軸自昌黎送孟東野來而思尤婉而正某聞傳曰言之無文行而不逺君子之所學也言以載事而文以飾言事信言文乃能表見於後世詩書易春秋皆善載事而尤文者故其傳尤逺荀卿孟軻之徒亦善為言然其道有至有不至故其書或傳或不傳猶繫於時之好惡而興廢之其次楚有大夫者善文其謳歌以傳漢之盛時有賈誼董仲舒司馬相如揚雄能文其文辭以傳由此以來去聖益逺世益薄或衰下迄周隋其間亦時時有善文其言以傳者然皆紛雜滅裂不純信故百不傳一幸而一傳傳亦不顯不能若前數家之焯然暴見而大行也甚矣言之難行也事信矣須文文至矣又繫其所恃之大小以見其行逺不逺也書載堯舜詩載商周易載九聖春秋載文武之法荀孟二家載詩書易春秋者楚之辭載風雅漢之徒各載其時主聲名文物之盛以為辭後之學者蕩然無所載則其言之不純信其傳之不久逺勢使然也至唐之興若太宗之政開元之治憲宗之功其臣下又爭載之以文其詞或播樂歌或刻金石故其間巨人碩士閎言髙論流鑠前後者恃其所載之在文也故其言之所載者大且文則其傳也章言之所載者不文而又小則其傳也不章某不佞守先人之緒餘先人在太宗時以文辭為名進士以對䇿為賢良方正既而守道純正為賢待制逢時太平奮身揚名宜其言之所載文之所行大而可恃以傳也然未能甚行於世者豈其嗣續不肖不能繼守而泯沒之抑有由也夫文之行雖繫其所載猶有待焉詩書易春秋待仲尼之删正荀孟屈原無所待猶待其弟子而傳焉漢之徒亦得其史臣之書其始出也或待其時之有名者而後發其既殁也或待其後之紀次者而傳其為之紀次也非其門人故吏則其親戚朋友如夢得之序子厚李漢之序退之也伏惟閣下學老文巨為時雄人出入三朝其能望光輝接步武者惟先君為舊則亦先君之所待也豈小子之敢有請焉謹以家集若干卷數寫獻門下惟哀其誠而幸賜之唐荆川曰架空纍層之文代楊推官洎上吕相公求見書書似援上而義不失已存之某聞古者堯舜禹之為君也有臯䕫益稷之徒者為其臣而湯之王也亦有仲虺伊尹者周之始興也有周公召公其復興也有方叔邵虎申甫之徒下而至漢其初也功臣尤多而稱善相者曰蕭曹其後曰丙魏唐之始則曰房杜既而曰姚宋者是皆能以功德佐其君而卓然特以名出衆而見於世者夫詩書之所美莫大乎堯舜三代其後世之盛者莫盛乎漢與唐而其興也必有賢哲之臣出其際而能使其君之功業名譽赫然光顯於萬世而不泯故每一讀其書考其事量其功而想乎其人疑其瓌傑奇怪若神人然非如今世之人可得而識也夫其人已亡其事己久去數千百嵗之後徒得其書而一讀之猶灼然如在人耳目之際使人希慕稱述之不暇况得身出於其時親見其所為而一識其人則雖奔走俯伏從妾圉執鞭朴猶為幸歟某嘗誦於此而私自為恨者有日矣國家之興七十有五年矣禮樂文章可謂太平而傑然稱王公大人於世者往往而出凡士之得身出於斯時者宜為幸矣又何必忽近以慕逺違目而信耳且安知後之望今不若今之望昔者邪然其實有若不幸者某生也少賤而愚賤則不接乎朝廷之間愚故不能與於事則雖有王公大人者並出而欲一往識之乃無一事可因而進焉噫古之君子在上不幸而不得出其間今之君子在上幸而親見矣又以愚賤見隔而莫可望焉是真可閔歎也已然嘗獨念昔者有聞於先君大夫似有可以藉而為說以干進於左右者試一陳之先君之生也好學勤力以孤直不自進於時其晚也始登朝廷享榮祿使終不困其志而少伸者蓋實出於大君子之門則相公之於楊氏不為無恩矣某不肖莫能繼大先君之世而又茍欲藉之以有緒於閽人誠宜獲罪於下執事者矣然而不詢於長者不謀於蓍龜而決然用是以自進者蓋冀萬一得償其素所願焉雖及門而獲罪不猶愈於望古而自為恨者耶言狂計愚伏惟聰明幸賜察焉唐宋八大家文鈔卷三十九
