body:
  text: 唐宋八大家文鈔卷七明茅坤撰昌黎文鈔七序送孟東野序一鳴字成文乃獨倡機軸命世筆力也前此惟漢書叙蕭何追韓信用數十亡字太凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得巳者而後言其歌也有思其哭也有懷凡出乎口而為聲者其皆有弗平者乎樂也者鬱於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土草木八者物之善鳴者也維天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推敓其必有不得其平者乎其於人也亦然人聲之精者為言文辭之於言又其精也尤擇其善鳴者而假之鳴其在唐虞臯陶禹其善鳴者也而假以鳴䕫弗能以文辭鳴又自假於韶以鳴夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以其荒唐之辭鳴楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老𥅆申不害韓非眘到田駢鄒衍尸佼孫武張儀蘇秦之屬皆以其術鳴秦之興李斯鳴之漢之興司馬遷相如揚雄最其善鳴者也其下魏晉氏鳴者不及於古然亦未嘗絶也就其善者其聲清以浮其節數以急其辭淫以哀其志弛以肆其為言也亂雜而無章將天醜其德莫之顧耶何為乎不鳴其善鳴者也唐之有天下陳子昻蘇源明元結李白杜甫李觀皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其髙出魏晉不懈而及於古其他浸淫乎漢氏矣從吾遊者李翺張籍其尤也三子者之鳴信善矣抑不知天將和其聲而使鳴國家之盛耶抑將窮餓其身思愁其心腸而使自鳴其不幸耶三子者之命則懸乎天矣其在上也奚以喜其在下也奚以悲東野之役於江南也有若不釋然者故吾道其命於天者以解之唐荆川曰此篇文字錯綜立論乃爾竒則筆力固不可到也此篇將牽合入天成乃是筆力神巧與毛頴傳同而雄邁過之送董邵南序文僅百餘字而感慨古今若與燕趙豪俊之士相為叱咤嗚咽其間一涕一笑其味不窮昌黎序文當屬第一首燕趙古稱多慷慨悲歌之士董生舉進士連不得志於有司懷抱利器鬱鬱適兹土吾知其必有合也董生勉乎哉夫以子之不遇時茍慕義彊仁者皆愛惜焉矧燕趙之士出乎其性者哉然吾嘗聞風俗與化移易吾烏知其今不異於古所云耶聊以吾子之行卜之也董生勉乎哉吾因子有所感矣為我弔望諸君之墓而觀於其市復有昔時屠狗者乎為我謝曰明天子在上可以出而仕矣送王秀才序轉掉如弄蛇如興雲總不遇之感借酒上簸弄吾少時讀醉鄉記私怪隱居者無所纍於世而猶有是言豈誠㫖於味耶及讀阮籍陶潛詩乃知彼雖偃蹇不欲與世接然猶未能平其心或為事物是非相感發於是有託而逃焉者也若顔氏子操瓢與簞曾參歌聲若出金石彼得聖人而師之汲汲每若不可及其於外也固不暇尚何麴蘖之託而昏冥之逃耶吾又以為悲醉鄉之徒不遇也建中初天子嗣位有意貞觀開元之丕績在廷之臣爭言事當此時醉鄉之後世又以直廢吾既悲醉鄉之文辭而又嘉良臣之烈思識其子孫今子之來見我也無所挾吾猶將張之况文與行不失其世守渾然端且厚惜乎吾力不能振之而其言不見信于世也於其行姑與之飲酒送王秀才序通萹以孟子作主是退之立自已門户故其文有雄視一世氣吾常以為孔子之道大而能博門弟子不能遍觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以所能授弟子原逺而末益分蓋子夏之學其後有田子方子方之後流而為莊周故周之書喜稱子方之為人荀卿之書語聖人必曰孔子子弓子弓之事業不傳惟太史公書弟子傳有姓名字曰馯臂子弓子弓受易於商瞿孟軻師子思子思之學蓋出曽子自孔子沒羣弟子莫不有書獨孟軻氏之傳得其宗故吾少而樂觀焉太原王塤示豫所為文好舉孟子之所道者與之言信恱孟子而屢贊其文辭夫沿河而下茍不止雖有遲疾必至於海如不得其道也雖疾不止終莫幸而至焉故學者必慎其所道道於楊墨老莊佛之學而欲之聖人之道猶航斷港絶潢以望至於海也故求觀聖人之道必自孟子始今塤之所由既幾於知道如又得其船與楫知沿而不止嗚呼其可量也哉唐荆川曰此是立主意之文而緊要全在好舉孟子之所道者一句送齊皥下第序大鬯已嫉時之論而入齊生才數語只看他操縱如意處古之所謂公無私者其取舍進退無擇於親疏逺邇惟其宜可焉其下之視上也亦惟視其舉黜之當否不以親疏逺邇疑乎其上之人故上之人行志擇誼坦乎其無憂於下也下之人克已慎行確乎其無惑於上也是故為君不勞而為臣甚易見一善焉可得詳而舉也見一不善焉可得明而去也及道之衰上下交疑於是乎舉讐舉子之事載之傳中而稱美之而謂之忠見一善焉若親與邇不敢舉也見一不善焉若疏與逺不敢去也衆之所同好焉矯而黜之乃公也衆之所同惡焉激而舉之乃忠也於是乎有違心之行有拂志之言有內愧之名若然者俗所謂良有司也膚受之訴不行於君巧言之誣不起於人矣嗚呼今之君天下者不亦勞乎為有司者不亦難乎為人向道者不亦勤乎是故端居而念焉非君人者之過也則曰有司焉則非有司之過也則曰今舉天下人焉則非今舉天下人之過也蓋其漸有因其本有根生於私其親成於私其身以已之不直而謂人皆然其植之也固久其除之也實難非百年必世不可得而化也非知命不惑不可得而改也已矣乎其終能復古乎若髙陽齊生者其起豫者乎齊生之兄為時名相出藩于南朝之碩臣皆其舊交齊生舉進士有司用是連枉齊生齊生不以云乃曰我之末至也有司其枉我哉我將利吾器而俟其時耳抱負其業東歸其家吾觀於人有不得志則非其上者衆矣亦莫計其身之短長也若齊生者既至矣而曰我未也不以閔於有司其不亦鮮乎哉吾用是知齊生後日誠良有司也能復古者也公無私者也知命不惑者也送何堅序文旨甚漫於中咀嚼之亦有一假韻折何於韓同姓為近堅以進士舉於吾為同業其在太學也吾為博士堅為生生博士為同道其識堅也十年為故人同姓而近也同業也同道也故人也於其不得願而歸其可以無言邪堅道州人道之守陽公賢也道於湖南為屬州湖南楊公又賢也堅為民堅又賢也湖南得道為屬道得堅為民堅歸唱其州之父老子弟服陽公之令道亦唱其縣與其比州服楊公之令吾聞鳥有鳳者恆出於有道之國當漢時黃霸為頴川是鳥實集而鳴焉若史可信堅歸吾將賀其見鳳而聞其鳴也已唐荆川曰此萹在短文中尚為竒作送區冊序昌黎謫官時調信悽惋慨慷陽山天下之窮處也陸有丘陵之險虎豹之虞江流悍急橫波之石亷利侔劔㦸舟上下失勢破碎淪溺者往往有之縣郭無居民官無丞尉夾江荒茅篁竹之間小吏十餘家皆鳥言夷面始至言語不通畫地為字然後可告以出租賦奉期約是以賔客游從之士無所為而至愈待罪於斯且半嵗矣有區生者誓言相好自南海拿舟而來升自賔階儀觀甚偉坐與之語文義卓然莊周云逃空虛者聞人足音跫然而喜矣况如斯人者豈易得哉入吾室聞詩書仁義之說欣然喜若有志於其間也與之翳嘉林坐石磯投竿而漁陶然以樂若能遺外聲利而不厭乎貧賤也嵗之初吉歸拜其親酒壺既傾序以識别送李願歸盤谷序通篇全舉李願說話自說只數語此又别是一格而其造語形容處則又鑄六代之長技矣太行之陽有盤谷盤谷之間泉甘而土肥草木藂茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅幽而勢阻隱者之所盤旋友人李願居之願之言曰人之稱大丈夫者我知之矣利澤施于人名聲昭于時坐于廟朝進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑才畯滿前道古今而譽盛德入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而閒居妒寵而負恃爭妍而取憐大丈夫之遇知于天子用力於當世者之所為也吾非惡此而逃之自有命焉不可幸而致也窮居而野處升髙而望逺坐茂樹以終日濯清泉以自潔採於山美可茹釣於水鮮可食起居無時惟適之安與其有譽於前孰若無毁於其後與其有樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所為也我則行之伺候於公卿之門奔走於形勢之途足將進而趦趄口將言而囁嚅處穢汚而不羞觸刑辟而誅戮徼幸於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壯之與之酒而為之歌曰盤之中維子之宫盤之土可以稼盤之泉可濯可沿盤之阻誰爭子所窈而深廓其有容繚而曲如往而復嗟盤之樂兮樂且無殃虎豹逺跡兮蛟龍遁藏鬼神守護兮呵禁不祥飲且食兮夀而康無不足兮奚所望膏吾車兮秣吾馬從子于盤兮終吾生以徜徉送廖道士序文體如貫珠只此一篇開永叔門户五嶽於中州衡山最逺南方之山巍然髙而大者以百數獨衡為宗最逺而獨為宗其神必靈衡之南八九百里地益髙山益峻水清而益駛其最髙而橫絶南北者嶺郴之為州在嶺之上測其髙下得三之二焉中州清淑之氣於是焉窮氣之所窮盛而不過必蜿蟺扶輿磅礴鬱積衡山之神既靈而郴之為州又當中州清淑之氣蜿蟺扶輿磅礴而鬱積其水土之所生神氣之所感白金水銀丹砂石英鍾乳橘柚之包竹箭之美千尋之名材不能獨當也意必有魁竒忠信材德之民生其間而吾又未見也其無乃迷惑溺沒於佛老之學而不出耶廖師郴民而學於衡山氣専而容寂多藝而善遊豈吾所謂魁竒而迷溺者耶廖師善知人若不在其身必在其所與遊訪之而不吾告何也於其别申以問之送張道士序贈意在詩序言其故耳此文一體張道士嵩髙之隱者通古今學有文武長材寄迹老子法中為道士以養其親九年聞朝廷將治東方貢賦之不如法者三獻書不報長揖而去京師士大夫多為詩以贈而屬愈為序詩曰大匠無棄材尋尺各有施况當營都邑杞梓用不疑張侯嵩山來面有熊豹姿開口論利害劔鋒白差差恨無一尺捶為國笞羌夷詣闕三上書臣非黃冠師臣有膽與氣不忍死茅茨又不媚笑語不能伴兒嬉乃著道士服衆人莫臣知臣有平賊䇿狂童不難治其言簡且要陛下幸聽之天空日月髙下照理不遺或是章奏繁裁擇未及斯寧當不俟報歸袖風披披答我事不爾吾親屬吾思昨宵夢倚門手取連環持今日有書至又言歸何時霜天熟柿栗收拾不可遲嶺北梁可構寒魚下清伊既非公家用且復還其私從容進退間無一不合宜時有利不利雖賢欲奚為但當勵前操富貴非公誰送陳秀才彤序有藴藉沉著大意以彤之為人不待考其文而可見也讀書以為學纘言以為文非以誇多而鬬靡也蓋學所以為道文所以為理耳茍行事得其宜出言適其要雖不吾靣吾將信其富於文學也潁川陳彤始吾見之楊湖南門下頎然其長薰然其和吾目其貌耳其言因以得其為人及其久也果若不可及夫湖南之於人不輕以事接爭名者之於藝不可以虛屈吾見湖南之禮有加而同進之士交譽也又以信吾信之不失也如是而又問焉以質其學䇿焉以考其文則何不信之有故吾不徵於陳而陳亦不出於我此豈非古人所謂可為智者道難與俗人言者類耶凡吾從事於斯也久未見舉進士有如陳生而不如志者於其行姑以是贈之送浮屠文暢師序髙在命意故逈出諸家而闔闢頓挫不失尺寸人固有儒名而墨行者問其名則是挍其行則非可以與之遊乎如有墨名而儒行者問其名則非挍其行則是可以與之游乎揚子雲稱在門墻則揮之在夷狄則進之吾取以為法焉浮屠師文暢喜文章其周遊天下凡有行必請於搢紳先生以求咏歌其所志貞元十九年春將行東南栁君宗元為之請解其裝得所得叙詩纍百餘萹非至䔍好其何能致多如是耶惜其無以聖人之道告之者而徒舉浮屠之說贈焉夫文暢浮屠也如欲聞浮屠之說當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物事為之盛其心有慕焉拘其法而未能入故樂聞其說而請之如吾徒者宜當告之以二帝三王之道日月星辰之行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之說而瀆告之也民之初生固若禽獸夷狄然聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏是故道大乎仁義教莫正乎禮樂刑政施之於天下萬物得其宜措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於冊中國之人世守之今浮屠者孰為而孰傳之耶夫鳥俯而啄仰而四顧夫獸深居而簡出懼物之為已害也猶且不脫焉弱之肉彊之食今吾與文暢安居而暇食優游以生死與禽獸異者寧可不知其所自耶夫不知者非其人之罪也知而不為者惑也悅乎故不能即乎新者弱也知而不以告人者不仁也告而不以實者不信也豫既重栁請又嘉浮屠能喜文辭於是乎言唐荆川曰開闢圓轉真如走盤之珠此天地間有數文字通萹一直說下而前後照應在其中送髙間上人序其用意本莊子而其行文造語叙實處亦大類莊子茍可以寓其巧智使機應於心不挫於氣則神完而守固雖外物至不膠於心堯舜禹湯治天下養叔治射庖丁治牛師曠治音聲扁鵲治病僚之於丸秋之於奕伯倫之於酒樂之終身不厭奚暇外慕夫外慕徙業者皆不造其堂不嚌其胾者也往時張旭善草書不治他技喜怒窘窮憂悲愈佚怨恨思慕酣醉無聊不平有動於心必於草書焉發之觀於物見山水崖谷鳥獸蟲魚草木之花實日月列星風雨水火雷霆霹靂歌舞戰鬬天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世今間之於草書有旭之心哉不得其心而逐其迹未見其能旭也為旭有道利害必明無遺錙銖情炎於中利欲鬬進有得有喪勃然不釋然後一决於書而後旭可幾也今間師浮屠氏一死生解外膠是其為心必泊然無所起其於世必淡然無所嗜泊與淡相遭頽墮委靡潰敗不可收拾則其於書得無象之然乎然吾聞浮屠人善幻多技能間如通其術則吾不能知矣上巳日燕太學聽彈琴詩序風雅與衆樂之之謂樂樂而不失其正又樂之尤也四方無鬬爭金革之聲京師之人既庶且豐天子念致理之艱難樂居安之閒暇肇置三令節詔公卿羣有司至于其日率厥官屬飲酒以樂所以同其休宣其和感其心成其文者也三月初吉實惟其時司業武公於是總太學儒官三十有六人列燕于祭酒之堂樽俎既陳肴羞惟時盞斚序行獻酬有容歌風雅之古辭斤夷狄之新聲裦衣危冠與與如也有儒一生魁然其形抱琴而來厯階以升坐于樽俎之南鼓有虞氏之南風𢋫之以文王宣父之操優游夷愈廣厚髙明追三代之遺音想舞雩之詠歎及暮而退皆充然若有得也武公於是作歌詩以美之命屬官咸作之命四門博士昌黎韓愈序之荆潭唱和詩序雋永從事有示愈以荆潭酬唱詩者愈既受以卒業因仰而言曰夫和平之音淡薄而愁思之聲要妙歡愈之辭難工而窮苦之言易好也是故文章之作恆發於羈旅草野至若王公貴人氣滿志得非性能而好之則不暇以為今僕射裴公開鎮蠻荆統郡惟九常侍楊公領湖之南壤地二千里德刑之政並勤爵祿之報兩崇乃能存志乎詩書寓辭乎詠歌往復循環有唱斯和搜竒抉怪雕鏤文字與韋布里閭憔悴専一之士較其毫釐分寸鏗鏘發金石幽眇感鬼神信所謂材全而能巨者也兩府之從事與部屬之吏屬而和之茍在編者咸可觀也宜乎施諸樂章紀諸冊書從事曰子之言是也告於諸公書以為荆潭唱和詩序唐荆川曰此萹文與盛山詩序本叙事只略用數句議論引起韋侍講盛山十二詩序前半是經下半是緯而氣亦跌宕韋侯昔以考功副郎守盛山人謂韋侯美士考功顯曹盛山僻郡奪所宜處納之惡地以枉其材韋侯將怨且不釋矣或曰不然夫得利則躍躍以喜不利則戚戚以泣若不可生者豈韋侯謂哉韋侯讀六藝之文以探周公孔子之意又妙能為辭章可謂儒者夫儒者之於患難茍非其自取之其拒而不受於懷也若築河堤以障屋霤其容而消之也若水之於海氷之於夏日其玩而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲况一不快於考功盛山一出入息之間哉未幾果有以韋侯所為十二詩遺余者其意方且以入溪谷上巖石追逐雲月不足日為事讀而歌詠之令人欲棄百事往而與之游不知其出於巴東以屬胊䏰也于時應而和者凡十人及此年韋侯為中書舍人侍講六經禁中和者通州元司馬為宰相洋州許使君為京兆忠州白使君為中書舍人李使君為諫議大夫黔府嚴中丞為祕書監溫司馬為起居舍人皆集闕下於是盛山十二詩與其和者大行於時聮為大卷家有之焉慕而為者將日益多則分為别卷韋侯俾余題其首石鼎詩句詩序文極頓挫後之法家多有痕迹惟公不然紀事纂言如太史公元和七年十二月四日衡山道士軒轅彌明自衡下來舊與劉師服進士衡湘中相識將過太白知師服在京夜抵其居宿有挍書郎侯喜新有能詩聲夜與劉說詩彌明在其側貌極醜白鬚黑面長頸而髙結喉中又作楚語喜視之若無人彌明忽軒衣張眉指罏中石鼎謂喜曰子云能詩能與我賦此乎劉往見衡湘間人說云年九十餘矣解捕逐鬼物拘囚蛟螭虎豹不知其實能否也見其老頗貌敬之不知其有文也聞此說大喜即援筆題其首兩句次傳於喜喜踊躍即綴其下云云道士啞然笑曰子詩如是而巳乎即袖手竦肩倚北牆坐謂劉曰吾不解世俗書子為我書因髙吟曰龍頭縮菌蠢豕腹漲彭亨初不似經意詩㫖有似譏喜二子相顧慚駭欲以多窮之即又為而傳之喜喜思益苦務欲壓道士每營度欲出口吻聲鳴益悲操筆欲書將下復止竟亦不能竒也畢即傳道士道士髙踞大唱曰劉把筆吾詩云云其不用意而功益竒不可附說語皆侵劉侯喜益忌之劉與侯皆已賦十餘韻彌明應之如響皆頴脫含譏諷夜盡三更二子思竭不能續因起謝曰尊師非世人也某伏矣願為弟子不敢更論詩道士奮曰不然章不可以不成也又謂劉曰把筆來吾與汝就之即又唱出四十字為八句書訖使讀讀畢謂二子曰章不已就乎二子齊應曰就矣道士曰此皆不足與語此寧為文耶吾就子所能而作耳非吾之所學於師而能者也吾所能者子皆不足以聞也獨文乎哉吾語亦不當聞也吾閉口矣二子大懼皆起立牀下拜曰不敢他有問也願聞一言而巳先生稱吾不解人間書敢問解何書請聞此而已道士寂然若無聞也纍問不應二子不自得即退就座道士倚牆睡鼻息如雷鳴二子怛然失色不敢喘斯須曙鼓鼕鼕二子亦困遂坐睡及覺日巳上驚顧覔道士不見即問童奴奴曰天且明道士起出門若將便旋然奴怪久不返即出到門覔無有也二子驚惋自責若有失者間遂詣余言余不能識其何道士也嘗聞有隱君子彌明豈其人耶韓愈序石鼎聮句詩巧匠斫山骨刳中事煎烹師服直柄未當權塞口且吞聲喜龍頭縮菌蠢豕腹漲彭亨彌明外苞乾蘚文中有暗浪驚師服在冷足自安遭焚意彌貞喜謬當鼎鼐間妄使水火爭彌明大似烈士膽圓如戰馬纓師服上比香爐尖下與鏡面平喜秋瓜未落蒂凍芋彊抽萌彌明一塊元氣閉細泉幽竇傾師服不值輸寫處焉知懷抱清喜方當洪罏然益見小器盈彌明皖皖無刃迹團團類天成師服遙疑龜負圖出曝曉正晴喜旁有雙耳穿上為孤髻撑彌明或訝短尾銚又似無足鐺師服可惜寒食毬擲此傍路坑喜何當出灰灺無計離瓶罌彌明陋質荷斟酌狹中愧提擎師服豈能煮仙藥但未汙羊羮喜形模婦女笑度量兒童輕彌明徒示堅重性不過升合盛師服旁似廢轂仰側見折軸橫喜時於蚯蚓竅微作蒼蠅鳴彌明以茲翻溢愆實負任使誠師服常居顧盻地敢有漏泄情喜寧依暖熱弊不與寒凉并彌明區區徒自效瑣瑣不足呈喜廽旋但兀兀開闔惟鏗鏗師服全勝璉瑚貴空有口傳名豈比爼豆古不為手所撜磨礱去圭角浸潤著光精願君莫嘲誚此物方施行彌明朱子謂此文韓子自况詩亦含譏訕輕侮之意唐宋八大家文鈔卷七
