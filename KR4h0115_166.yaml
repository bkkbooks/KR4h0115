body:
  text: 唐宋八大家文鈔卷一百五十二明茅坤撰潁濱文鈔八歷代論子由之文其竒峭處不如父其雄偉處不如兄而其疏宕嫋娜處亦自有一片烟波似非諸家所及子嘗同荆川論之荆川絶愛其文然而間讀君術臣事民政及古史等書誠絶作也厯代論四十三首蓋子由於罷官潁上時其年已老其氣巳衰無復嚮所為飄颻馳驟若雲之出岫者馬之下坂者之態然而閲世既久於古今得失處參驗已熟雖無心於為文而其折衷於道處往往中肯綮切事情語所謂老人之言是已豫不能盡録録其見解所獨得者二十八篇管仲先君嘗言管仲九合諸侯一匡天下以桓公伯孔子稱其仁而不能止五公子之亂使桓公死不得葬曰管仲蓋有以致此也哉管仲身有三歸桓公內嬖如夫人者六人而不以為非此固適庶爭奪之禍所從起也然桓公之老也管仲與桓公為身後之計知諸子之必爭乃屬世子于宋襄公夫父子之間至使他人與焉智者蓋至此乎於乎三歸六嬖之害溺于淫欲而不能自克無已則人乎詩曰無兢維人四方其訓之四方且猶順之而况于家人乎傳曰管仲病且死桓公問誰可使相者管仲曰知臣莫若君公曰易牙何如對曰殺子以適君非人情不可公曰開方何如倍親以適君非人情難近公曰竪刁何如自宫以適親非人情難親管仲死桓公不用其言卒近三子二年而禍作夫世未嘗無小人也有君子以間之則小人不能奮其智語曰舜有天下選于衆舉臯陶不仁者逺矣湯有天下選于衆選伊尹不仁者逺矣豈必人人而誅之管仲知小人之不可用而無以禦之何益于事內既不能治身外復不能用人舉易世之憂而屬之宋襄公使禍既已成而後宋人以干戈正之於乎殆哉昔先君之論云爾漢高帝論此亦子由獨見其微處高帝之入秦一戰于武關兵不血刃而至咸陽此天也非人也秦之亡也諸侯並起爭先入關秦遣章邯出兵擊之秦雖無道而其兵方彊諸侯雖鋭而皆烏合之衆其不敵秦明矣然諸侯皆起於羣盜不習兵勢陵籍郡縣狃於亟勝不知秦之未可攻也於是章邯一出而殺周章破陳涉降魏咎斃田儋兵鋒所至如獵狐免皆不勞而定後乃與項梁遇苦戰再三然後破之梁雖死而秦之鋭鋒亦略盡矣然邯以為楚地諸將不足復慮乃渡河北擊趙邯既北而秦國內空至是秦始可擊而高帝乘之此正兵法所謂避實而擊虛者蓋天命非人謀也項梁之死也楚懷王遣宋義項羽救趙羽願與沛公西入關懷王諸老將皆曰項羽為人慓悍禍賊嘗攻襄城襄城無噍類所過無不殘滅且楚數進取前陳王項梁皆敗不如更遣長者扶義而西告喻秦父兄秦父兄苦其主久矣誠得長者往無侵暴宜可下卒不許項羽而遣沛公沛公方入關而項羽巳至河北與章邯相持邯雖欲還兵救秦勢不得矣懷王之遣沛公固當然非邯羽相持於河北沛公亦不能成功故曰此天命非人謀也或問章邯假令不過河北高帝能入秦乎子由以邯提兵擊盜則當時老將健卒巳虛關中似亦有見然覽觀秦紀本末蒙氏兄弟誅而將陷矣阿房之宫驪山之葬而百姓怨矣諸公子及李斯坐法死而骨肉大臣不附矣至於趙高之夷子嬰之立上下岌岌矣高帝之入秦譬之以石投卵也又何疑哉漢文帝論此等見解子由晚年還潁上歷世故多故能為論如此老子曰柔勝剛弱勝彊漢文帝以柔御天下剛彊者皆乘風而靡尉他稱號南越帝復其墳墓召貴其兄弟他去帝號俯伏稱臣胸奴桀敖陵駕中國帝屈體遣書厚以繒絮雖未能調伏然兵革之禍比武帝世十一二耳吳王濞包藏禍心稱病不朝帝賜之几杖濞無所發怒亂以不作使文帝尚在不出十年濞亦已老死則東南之亂無由起矣至景帝不能忍用鼂錯之計削諸侯地濞因之號召七國西向入關漢遣三十六將軍竭天下之力僅乃破之錯言諸侯彊大削之亦反不削亦反削之則反疾而禍小不削則反遲而禍大世皆以其言為信吾以為不然誠如文帝忍而不削濞必未反遷延數歲之後變故不一徐因其變而為之備所以制之者固多術矣猛虎在山日食牛羊人不能堪荷戈而往刺之幸則虎斃不幸則人死其為害亟矣鼂錯之計何以異此若能高其垣牆深其陷穽時伺而謹防之虎安能必為害此則文帝之所以備吳也嗚呼為天下慮患而使好名貪利小丈夫制之其不為鼂錯者鮮矣漢景帝論此亦子由見得景帝本末處漢之賢君皆曰文景文帝寬仁大度有高帝之風景帝忌刻少恩無人君之量其實非文帝比也帝之為太子也吳王濞世子來朝與帝博而爭道帝怒以博局提殺之濞之叛逆勢激於此張釋之文帝之名臣也以劾奏之恨斥死淮南鄧通文帝之幸臣也以吮癰之怨困迫至死鼂錯始與帝謀削諸侯帝違衆而用之及七國反袁盎一說譎而斬之東市曾不之恤周亞夫為大將折吳楚之鋭鋒不數月而平大難及其為相守正不阿惡其悻悻不屈遂以無罪殺之梁王武母弟也驕而從之幾致其死臨江王榮太子也以母失愛至使酷吏殺之其於君臣父子兄弟之際背理而傷道者一至於此原其所以能全身保國與文帝俱稱賢君者惟不改其恭儉故耳春秋之法弒君稱君君無道也稱臣臣之罪也然陳侯平國蔡侯般皆以無道弒而弒皆稱臣以為罪不及民故也如景帝之失道非一也而猶稱賢君豈非躬行恭儉罪不及民故耶此可以為不恭儉者戒也漢武帝論典刑之言天下利害不難知也士大夫心平而氣定高不為名所眩下不為利所怵者類能知之人主生於深宫其聞天下事至鮮矣知其一不逹其二見其利不覩其害而好名貪利之臣探其情而逢其惡則利害之實亂矣漢武帝即位三年年未二十閩越舉兵圍東甌東甌告急帝問太尉田蚡蚡曰越人相攻其常事耳又數反覆不足煩中國往救帝使嚴助難蚡曰特患力不能救德不能覆城能何故棄之小國以窮困來告急天子不救尚何所訴帝詘蚡議而使助持節發會稽兵救之自是征南越伐朝鮮討西南夷兵革之禍加於四夷矣後二年胸奴請和親大行王恢請擊之御史大夫韓安國請許其和帝從安國議矣明年馬邑豪聶一因恢言胸奴初和親親信邊可誘以利致之伏兵襲擊必破之道也帝使公卿議之安國恢往反議甚苦帝從恢議使聶一賣馬邑城以誘單于單于覺之而去兵出無功自是胸奴犯邊終武帝無寧歲天下幾至大亂此二者田蚡韓安國皆知其非而迫於利口不能自伸武帝志求功名不究利害之實而遽從之及其晚歲禍災並起外則黔首耗散內則骨肉相賊殺雖悔過自咎而事已不救矣然嚴助以交通淮南張湯論殺之王恢以不擊胸奴亦坐棄市二人皆罪不至死而不免大戮豈非首禍致罪天之所不赦故耶漢昭帝論觀欒城此等文字其識見甚近裏當勝於曾鞏周成王以管蔡之言疑周公及遭風雷之變發金縢之書而後釋然知其非也漢昭帝聞燕王之譖霍光懼不敢入帝召見光謂之曰燕王言將軍出都肄郎道上稱蹕又擅調益幕府挍尉二事屬耳燕王何自知之且將軍欲為非不待挍尉左右聞者皆伏其明光由是獲安而燕王與上官皆敗故議者以為昭帝之賢過於成王然成王享國四十餘年治致刑措及其將崩命召公畢公相康王臨死生之變其言琅然不亂昭帝享國十三年年甫及冠功未見於天下其不及成王者亦逺矣夭壽雖出於天然人事常參焉故吾以為成王之夀考周公之功也昭帝之短折霍光之過也昔晉平公有蠱疾醫和視之曰是謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不祐國之大臣榮其寵祿任其大節有災禍興而無改焉必受其咎以此譏趙孟趙孟受之不辭而霍光何逃焉成王之幼也周公為師召公為保左右前後皆賢臣也雖以中人之資而起居飲食日與之接逮其壯且老也志氣定矣其能安富貴易生死蓋無足怪者今昭帝所親信惟一霍光光雖忠信篤實而不學無術其所與共國事者惟一張安世所與斷幾事者惟一田延年士之通經術識義理者光不識也其後雖聞久隂不雨之言而貴夏侯勝感蒯瞶之事而賢雋不疑然終亦不任也使昭帝居深宫近嬖幸雖天資明斷而無以養之朝夕害之者衆矣而安能及逺乎人主不幸未嘗更事而履大位當得篤學深識之士日與之居示之以邪正曉之以是非觀之以治亂使之久而安之知類通逹强立而不反然後聽其自用而無害此大臣之職也不然小人先之悅之以聲色犬馬縱之以馳騁田獵侈之以宫室器服志氣巳亂然後入之以讒說變亂是非移易白黑紛然無所不至小足以害其身而大足以亂天下大臣雖欲有言不可及矣語曰君子學道則愛人小人學道則易使也人必知道而後知愛身知愛身而後知愛人知愛人而後知保天下故吾論三宗享國長久皆學道之力至漢昭帝惜其有過人之明而莫能導之以學故重論之以為此霍光之過也昭帝之享國日淺不知其禍由近女室否假如伊尹相湯以及其子而太丁外丙仲壬並不三四年死豈皆女室興而皆伊尹之罪歟特目為大臣有托孤寄國之責者不可不知此議漢光武論東漢之亡以宦官而冲質以後由女后稱制故其積禍養亂以至於此子由以之咎光武不任大臣所致似亦太過然其論亦正姑録而識之高帝舉天下後世之重屬之大臣大臣亦盡其心力以報之故吕氏之亂平勃得置力焉誅産祿立文帝若反覆手之易當是時大臣權任之盛風流相接至申屠嘉猶召辱鄧通議斬鼂錯而文景不以為忤則高帝之用人其重如此景武之後此風衰矣大臣用舍僅如僕𨽻武帝之老也將立少主知非大臣不可乃委任霍光霍光之權在諸臣右故能翊昭建宣天下莫敢異議至於宣帝雖明察有餘而性本忌刻非張安世之謹畏陳萬年之順從鮮有能容者惡楊惲蓋寬饒害趙廣漢韓延夀悍然無惻怛之心高才之士側足而履其朝陵遲至於元成朝無重臣養成王氏之禍故莽以斗筲之才濟之以欺罔而世無一人敢指其非者光武之興雖文武之略足以鼓舞一世而不知用人之長以濟其所不足幸而子孫皆賢權在人主故其害不見及和帝幼少竇后擅朝竇憲兄弟恣橫殺都鄉侯暢於朝事發請擊胸奴以自贖及其成功又欲立北單于以植恩固位袁安任隗皆以三公守義力爭而不能勝幸而憲以逆謀敗蓋光武不任大臣之積其弊乃見於此其後漢日以衰及其誅閻顯立順帝功出於宦官黜清河王殺李固事成於外戚大臣皆無所與及其未流梁冀之害重天下不能容復假宦官以去之宦官之害極天下不能堪至召外兵以除之外兵既入而東漢之祚盡矣蓋光武不任大臣之禍勢極於此夫人君不能皆賢君有不能而屬之大臣朝廷之正也事出於正則其成多其敗少歷觀古今大臣任事而禍至於不測者必有故也今畏忌大臣而使他人得乘其隙不在外戚必在宦官外戚宦官更相屠滅至以外兵繼之嗚呼殆哉晉武帝論論利害處却審立嫡以長不以賢立子以貴不以長古今之正義也然堯廢丹朱用舜而天下安帝乙廢微子立紂而啇以亡古之人蓋有不得已而行之者矣得巳而不已不得已而巳之二者皆亂也子非朱紂而廢天下之正義君子不忍也子如朱紂而守天下之正義君子不為也漢高帝始謂惠帝仁弱欲廢之而立如意既而知人心之在太子也則寢廢立之議而用平勃平勃皆賢而權任均故惠帝雖沒産祿雖橫而援立文帝漢室不病也武帝既老知燕王旦廣陵王胥之不可用也廢之而立少子任霍光金日磾上官桀桑宏羊以後事當是時昭帝之賢否未可知而四人枉直相半也幸而昭帝明哲霍光忠良桀羊雖欲為亂而不遂其後復廢昌邑立宣帝而朝廷晏然無患蓋人君不幸而立幼主當如二帝屬任賢臣乃免於亂此必然之勢也魏明帝疾篤而無子棄逺宗子而立齊王始欲輔以曹宇曹肇而幸臣劉放孫資不便宇肇之正勸帝易以司馬仲逹曹爽齊王既非天下之望而爽又以庸才與仲逹姦雄為對數年之間遂成篡弒之禍晉武帝親見此敗矣惠帝之不肖羣臣舉知之而牽制不忍忌齊王攸之賢而恃愍懷之小惠以為可以消未然之憂獨有一汝南王亮而不早用舉社稷之重而付之楊駿至於一敗塗地無足怪也帝之出齊王也王渾言於帝曰攸之於晉有姫旦之親若預聞朝政則腹心不二之臣也國家之事若用后妃外親則有吕氏王氏之虞付之同姓至親又有吳楚七國之慮事任輕重所在未有不為害者也惟當任正道求忠良不可事事曲設疑防慮方來之患也若以智猜物雖親見疑至於疏逺亦安能自保乎人懷危懼非為安之理此最國家之深患也渾之言天下之至言也帝不能用而用王佑之計使太子母弟秦王柬都督關中楚王瑋淮南王允並鎮守要害以強帝室然晉室之亂實成於八王吾嘗籌之如攸之親賢奪嫡之禍非其志也不幸至此天下所宗宗社之計猶有賴也如佑之計使子弟據兵以捍外患如梁孝王之禦吳楚尚可若變從中起而使人人握兵以救內難此與何進袁紹召丁原董卓以除宦官何異古人有言擇福莫若重擇禍莫若輕如武帝之擇禍福可謂不審矣漢高帝懲秦孤立而大封同姓以瓜分於外然其權則統於上故其禍亂之發得藉之以收磐石之功晉武帝懲魏之後而衆建八王然其權則散於下故其禍亂之發擁腫鞅掌卒之互相蹂籍而特以稔魚爛之釁晉宣帝論前以曹孟德形容司馬仲逹後以霍光孔明為案世之說者曰司馬仲逹之於魏則曹孟德之於漢也是不然二人智勇權略則同而所處則異漢自董卓之後內潰外叛獻帝奔走困踣之不暇帝王之勢盡矣獨其名在耳曹公假其名號以服天下擁而植之許昌建都邑征叛逆皆曹公也雖使終身奉獻帝率天下而朝之天下不歸漢而歸魏者十室而九矣曹公誠能安而俟之使天命自至雖文王三分天下有其二以事紂何以加之惜其為義不終使獻帝不安於上義士憤怨於下雖荀文若猶不得其死此則曹公之過矣如司馬仲逹則不然明帝之末曹氏之業固矣雖明帝以淫虐失衆曹爽以驕縱得罪而顛覆之形未見天下未叛魏也仲達因其隙而乘之拊其背而奪其成業事與曹公異矣漢武帝之老也託昭帝於霍光昭帝尚幼燕王蓋主有篡取之心上官桀桑𢎞羊助之此其禍急於曹爽霍光內斃燕蓋外誅桀羊擁護昭帝訖無驕君之色及昭帝早喪國空無主迎立昌邑昌邑不令又援立宣帝柄在其手者屢矣然退就臣位不以自疑中外悉其本心亦無一人有異議者以仲逹擬光孰為得之耶然光猶不足道蜀先主將亡召諸葛孔明而告之曰嗣子可輔輔之如其不才君可自取復語後主汝與亟相從事事之如父後主之暗弱孔明之賢智蜀人知之矣使孔明有異志一搖手而定矣然外平徼外蠻夷內廢李平廖立旁禦魏吳功成業定又付之蔣琬費褘奉一昏主三十餘年而無纎芥之隙此又霍光之所不能望也故人患不誠茍誠忠孝舜之於父母伊尹之於太甲終無間然者自仲逹之後人臣受六尺之寄因而取之者多矣皆以地勢迫切置而不取則身必危國必亂至自比騎虎不可復下此亦自欺而巳哉兩漢之衰王莽啓其端董卓幸其禍曹操踵其謀而司馬以後遂至於世相擅以狐媚託孤定亂之間至唐太宗而始絶甚矣小人之流禍也要之五代又踵之矣豫謂為義不終四字非所以論操也蓋文王之戴殷也終其身未嘗有一毛利天下之心而操特擁漢以劫天下之諸侯耳雖荀文若之死君子謂其以身文奸也唐宋八大家文鈔卷一百五十二
