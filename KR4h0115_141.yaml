body:
  text: 唐宋八大家文鈔卷一百二十九明茅坤撰東坡文鈔十三論伊尹論讀此而後可以身自信於天下而成不韙之功而行文斷續不羈辦天下之大事者有天下之大節者也立天下之大節者狹天下者也夫以天下之大而不足以動其心則天下之大節有不足立而大事有不足辦者矣今夫匹夫匹婦皆知潔亷忠信之為美也使其果潔亷而忠信則其智慮未始不如王公大人之能也唯其所爭者止於簞食豆羹而簞食豆羹足以動其心則宜其智慮之不出乎此也簞食豆羹非其道不取則一鄉之人莫敢以不正犯之矣一鄉之人莫敢以不正犯之而不能辦一鄉之事者未之有也推此而上其不取者愈大則其所辦者愈逺矣讓天下與讓簞食豆羹無以異也治天下與治一鄉亦無以異也然而不能者有所蔽也天下之富是簞食豆羹之積也天下之大是一鄉之推也非千金之子不能運千金之資販夫販婦得一金而不知其所措非智不若所居之卑也孟子曰伊尹耕于有莘之野非其道也非其義也雖祿之以天下弗受也夫天下不能動其心是故其才全以其全才而制天下是故臨大事而不亂古之君子必有髙世之行非茍求為異而已卿相之位千金之富有所不屑將以自廣其心使窮逹利害不能為之芥蒂以全其才而欲有所為耳後之君子蓋亦嘗有其志矣得失亂其中而榮辱奪其外是以役役至于老死而不暇亦足悲矣孔子敘書至于舜禹臯陶相讓之際蓋未嘗不太息也夫以朝廷之尊而行匹夫之讓孔子安取哉取其不汲汲於富貴有以大服天下之心焉耳夫太甲之廢天下未嘗有是而伊尹始行之天下不以為驚以臣放君天下不以為僭既放而復立太甲不以為專何則其素所不屑者足以取信于天下也彼其視天下眇然不足以動其心而豈忍以廢放其君求利也哉後之君子蹈常而習故惴惴焉懼不免於天下一為希闊之行則天下羣起而誚之不知求其素而以為古今之變時有所不可者亦已過矣夫荆川批斷續兩字是文家血脈三昧處非荆川不能道周公論辨論周公者多異説何也周公居禮之變而處聖人之不幸宜乎説者之異也凡周公之所為亦不得巳而已矣若得已而不已則周公安得而為之成王幼不能為政周公執其權以王命賞罰天下是周公不得已者如此而巳今儒者曰周公踐天子之位稱王而朝諸侯則是豈不可以已耶書曰周公位冢宰正百工羣叔流言又曰召公為保周公為師相成王為左右召公不説又曰周公曰王若曰則是周公未嘗踐天子之位而稱王也周公稱王則成王宜何稱將亦稱王耶將不稱耶不稱則是廢也稱王則是二王也而周公何以安之孔子曰必也正名乎儒者之患患在於名實之不正故亦有以文王為稱王者是以聖人為後世之僭君急於為王者耶天下雖亂有王者在而巳自王雖聖人不能以服天下昔髙帝擊滅項籍統一四海諸侯大臣相率而帝之然且辭以不德惟陳勝吳廣乃囂囂乎急於自王而謂文王亦為之耶武王伐商師渡孟津會於牧野其所以稱先君之命命於諸侯者蓋猶曰文考而已至於武成既以柴望告天百工奔走受命于周而後稱曰我文考文王克成厥勳由此觀之則是武王不敢一日妄尊其先君而況於文王之自王乎詩曰虞芮質厥成文王蹶厥生是亦追稱而已矣史記曰嫗乎采芑歸乎田成子夫田常之時安知其為成子而稱之故凡以文王周公為稱王者皆過也是資後世之篡君而為之藉也陳賈問於孟子曰周公使管蔡監商管蔡以商叛知而使之是不仁不知是不智孟子曰周公弟也管叔兄也周公之過不亦宜乎從孟子之説則是周公未免於有過也夫管蔡之叛非逆也是其智不足以深知周公而已矣周公之誅非疾之也其勢不得不誅也故管蔡非所謂大惡也兄弟之親而非有大惡則其道不得不封管蔡之封在武王之世也武王之世未知有周公成王之事茍無周公成王之事則管蔡何從而叛周公何從而誅之故曰周公居禮之變而處聖人之不幸也管仲論一子瞻悲亞夫以下八人不得其死故痛而發論鄭太子華言於齊桓公請去三族而以鄭為內臣公將許之管仲不可公曰諸侯有討於鄭未捷茍有釁從之不亦可乎管仲曰君若綏之以德加之以訓辭而率諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣公辭子華鄭伯乃受盟蘇子曰大哉管仲之相桓公也辭子華之請而不違曹洙之盟皆盛德之事也齊可以王矣恨其不學道不自誠意正心以刑其國使家有三歸之病而國有六嬖之禍故桓公不王而孔子小之然其豫之也亦至矣曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁曰仲尼之徒無道桓文之事者孟子蓋過矣吾讀春秋以下史而得七人焉皆盛德之事可以為萬世法又得八人焉皆反是可以為萬世戒故具論之太公之治齊也舉賢而尚功周公曰後世必有篡弒之臣天下誦之齊其知之矣田敬仲之始生也周史筮之其奔齊也齊懿氏卜之皆知其當有齊國也篡弒之疑蓋萃於敬仲矣然桓公管仲不以是廢之乃欲以為卿非盛德能如此乎故吾以謂楚成王知晉之必霸而不殺重耳漢髙祖知東南之必亂而不殺吳王濞晉武帝聞齊王攸之言而不殺劉元海符堅信王猛而不殺慕容垂唐明皇用張九齡而不殺安祿山皆盛德之事也而世之論者則以為此七人者皆失於不殺以啓亂吾以謂不然七人者皆自有以致敗亡非不殺之過也齊景公不繁刑重賦雖有田氏齊不可取楚成王不用子玉雖有晉文公兵不敗漢景帝不害吳太子不用鼂錯雖有吳王濞無自發晉武帝不立孝惠雖有劉元海不能亂符堅不貪江左雖有慕容垂不能叛明皇不用李林甫楊國忠雖有安祿山亦何能為秦之由余漢之金日磾唐之李光弼渾瑊之流皆蕃種也何負於中國哉而獨殺元海祿山乎且夫自今而言之則元海祿山死有餘罪自當時而言之則不免為殺無罪豈有天子殺無罪而不得罪於天者上失其道塗之人皆敵國也天下豪傑其可勝既乎漢景帝以鞅鞅而殺周亞夫曹操以名重而殺孔融晉武帝以臥龍而殺嵇康晉景帝亦以名重而殺夏侯玄宋明帝以族大而殺王彧齊後主以謡言而殺斛律光唐太宗以讖而殺李君羡武后亦以謡言而殺裴炎世皆以為非也此八人者當時之慮豈非憂國備亂與憂元海祿山者同乎久矣世之以成敗為是非也故夫嗜殺人者必以鄧侯不殺楚子為口實以鄧之微無故殺大國之君使楚人舉國而仇之其亡不愈速乎吾以謂為天下如養生愛國備亂如服藥養生者不過慎起居飲食節聲色而已節慎在未病之前而服藥在已病之後今吾憂寒疾而先服烏喙憂熱疾而先服甘遂則病未作而藥殺人矣彼八人者皆未病而服藥者也管仲論二蘇公以繁而曲為守以簡而直為決勝未盡兵之情嘗讀周官司馬法得軍旅什伍之數其後讀管夷吾書又得管子所以變周之制蓋王者之兵出於不得巳而非以求勝敵也故其為法要以不可敗而已至於桓文非決勝無以定霸故其法在必勝繁而曲者所以為不可敗也簡而直者所以為必勝也周之制萬二千五百人而為軍萬之有二千二千之有五百其數竒而不齊唯其竒而不齊是以知其繁且曲也今夫天度三百六十均之十二辰辰得三十者此其正也五日四分之一者此其竒也使天度而無竒則千載之日雖婦人孺子皆可以坐而計唯其竒而不齊是故巧厯有所不能盡也聖人知其然故為之章會統元以盡其數以極其變司馬法曰五人為伍五伍為兩萬二千五百人而為軍二百五十十取三焉而為竒其餘七以為正四竒四正而八陳生焉夫以萬二千五百人而均之八陳之中宜其有竒而不齊者是以多為之曲折以盡其數以極其變鉤聮蟠踞各有條理故三代之興治其兵農軍賦皆數十百年而後得志於天下自周之亡秦漢陳法不復三代其後諸葛孔明獨識其遺制以為可用以取天下然相持數嵗魏人不敢決戰而孔明亦卒無尺寸之功豈八陳者先王所以為不可敗而非以逐利爭勝者邪若夫管仲之制其兵可謂截然而易曉矣三分其國以為三軍五人為軌軌有長十軌為里里有司四里為連連有長十連為鄉鄉有鄉良人五鄉一帥萬人而為一軍公將其一髙子國子將其二三軍三萬人如貫繩如畫棊局疏暢洞逹雖有智者無所施其巧故其法令簡一而民有餘力以致其死昔者嘗讀左氏春秋以為丘明最好兵法蓋三代之制至於列國猶有存者以區區之鄭而魚麗鵝鸛之陳見於其書及至管仲相桓公南伐楚北伐孤竹九合諸侯威震天下而其軍壘陳法不少槩見者何哉蓋管仲欲以嵗月服天下故變古司馬法而為是簡略速勝之兵是以莫得而見其法也其後吳晉爭長於黃池王孫雄教夫差以三萬人壓晉壘而陳百人為行百行為陳陳皆徹行無有隱蔽援桴而鼓之勇怯盡應三軍皆譁晉師大駭卒以得志由此觀之不簡而直不可以決勝深惟後世不達繁簡之宜以取敗亡而三代什伍之數與管子所以治齊之兵者雖不可盡用而其近於繁而曲者以之固守近於簡而直者以之決戰則庶乎其不可敗而有所必勝矣范文子論論用兵之勝而敗之處反覆痛快長公蓋亦鑒於當時熙河之役故云鄢陵之役楚晨壓晉師而陳諸將請從之范文子獨不欲戰晉卒敗楚楚子傷目子反殞命蘇子曰料敵勢強弱而知師之勝負此將率之能也不求一時之功愛君以德而全其宗嗣此社稷之臣也鄢陵之役范文子獨不欲戰晉卒敗楚范文子疑若懦而無謀者矣然不及一年三郤誅厲公殺胥童死欒書中行偃幾不免於禍晉國大亂鄢陵之功實使之然也有非常之人然後有非常之功非常之功聖人所甚懼也明月之珠夜光之璧無因而至前匹夫猶或按劒而況非常之功乎故聖人必自反曰此天之所以厚於我乎抑天之禍豫也故雖有大功而不忘戒懼中常之主鋭於立事忽於天戒日尋干戈而殘民以逞天欲全之則必折其萌芽挫其鋒芒使知其所悔天欲亡之則必先之以美利誘之以得志使之有功以驕士玩於寇讐而悔其民人至於亡國殺身而不悟者天絶之也嗚呼小民之家一朝而獲千金非有大福必有大咎何則彼之所獲者終日勤勞不過數金耳所得者微故所用狹無故而得千金豈不驕其志喪其所守哉由是言之天下者得之艱難則失之不易得之既易則失之亦然漢髙皇帝之得天下親冒矢石與秦楚爭轉戰五年未嘗得志比定天下復有平城之圍故終其身不事逺略民亦不勞繼之文景不言兵唐太宗舉晉陽之師破竇建德虜王世充所過者下易於破竹然天下始定外攘四夷伐髙昌破突厥終其身師旅不解幾至於亂者以其親見取天下之易也故兵之勝敗足以為國之強弱而國之強弱足以為治亂之兆蓋有勝而亡有敗而興者矣會稽之棲而句踐以伯黃池之會而夫差以亡有以使之也夫虢公敗戎于桑田晉卜偃知其必亡曰是天奪之鑒而益其疾也晉果滅虢此范文子所以不得不諌諫而不納而又有功敢逃其死哉彼其不死則厲公逞志必先圖於范氏趙盾之事可見矣趙盾雖免於死而不免於惡名則范文子之智過于趙宣子逺矣范蠡論文如酷吏雖蠡亦何辭越既滅吳范蠡以為句踐為人長頸鳥喙可以共患難不可與共逸樂乃以其私徒屬浮海而行至齊以書遺大夫種曰蜚鳥盡良弓藏狡兔死走狗烹子可以去矣蘇子曰范蠡獨知相其君而巳以吾相蠡蠡亦鳥喙也夫好貨天下賤士也以蠡之賢豈聚斂積實者何至耕於海濵父子力作以營千金屢散而復積此何為者哉豈非才有餘而道不足故功成名遂身退而心終不能自放者乎使句踐有大度能始終用蠡蠡亦非清淨無為以老於越者也吾故曰蠡亦鳥喙也魯仲連既退秦軍平原君欲封連以千金為壽連笑曰所貴於天下士者為人排難解紛而無所取也即有取是商賈之事連不忍為也遂去終身不復見逃隱於海上曰吾與富貴而詘於人寧貧賤而輕世肆志焉使范蠡之去如仲連則去聖人不逺矣嗚呼春秋以來用捨進退未有如蠡之全者也而不足於此吾是以纍歎而深悲焉伍子胥論楚平王既殺伍奢伍尚而伍子胥亡入吳事吳王闔閭及楚平王卒子昭王立後子胥與孫武興兵及唐蔡伐楚來漢水而陳楚大敗於是吳王乘勝而前五戰遂至郢楚昭王出亡吳兵入郢子胥求昭王既不得乃掘平王墓出其尸鞭之三百以報父兄之讐蘇子曰子胥種蠡皆人傑而揚雄曲士也欲以區區之學瑕疵此三人者以三諫不去鞭尸藉館為子胥之罪以不強諌句踐而棲之會稽為種蠡之過雄聞古有三諌當去之説即欲以律天下士豈不陋哉三諌而去為人臣交淺者言也如宮之竒泄冶乃可耳至如子胥吳之宗臣與國存亡者也去將安往哉百諫不聽繼之以死可也孔子去魯未嘗一諫又安用三父受誅子復讐禮也生則斬首死則鞭尸發其至痛無所擇也是以昔之君子皆哀而恕之雄獨非人子乎至於藉館闔閭與羣臣之罪非子胥意也句踐困於會稽乃能用二子若先戰而強諌以死之則雄又當以子胥之罪罪之矣孫武論一行文好而未中孫武之病古之言兵者無出於孫子矣利害之相權竒正之相生戰守攻圍之法蓋以百數雖欲加之而不知所以加之矣然其所短者智有餘而未知其所以用智此豈非其所大闕歟夫兵無常形而逆為之形勝無常處而多為之地是以其説屢變而不同縱橫委曲期於避害而就利雜然舉之而聽用者之自擇也是故不難于用而難于擇擇之為難者何也鋭于西而忘于東見其利而不見其所窮得其一説而不知其又有一説也此豈非用智之難歟夫智本非所以教人以智而教人者是君子之急於有功也變詐汨其外而無守於其中則是五尺童子皆欲為之使人勇而不自知貪而不顧以陷于難則有之矣深山大澤有天地之寶無意於寶者得之操舟於河舟之逆順與水之曲折忘於水者見之是故惟天下之至亷為能貪惟天下之至靜為能勇惟天下之至信為能詐何者不役於利也夫不役於利則其見之也明見之也明則其發之也果古之善用兵者見其害而後見其利見其敗而後見其成其心間而無事是以若此明也不然兵未交而先志於得則將臨事而惑雖有大利尚安得而見之若夫聖人則不然居天下於貪而自居於亷故天下之貪者皆可得而用居天下於勇而自居於靜故天下之勇者皆可得而役居天下於詐而自居於信故天下之詐者皆可得而使天下之人欲有功於此而即以此自居則功不可得而成是故君子居晦以御明則明者畢見居陰以御陽則陽者畢赴夫然後孫子之智可得而用也易曰介于石不終日貞吉君子方其未發也介然如石之堅若將終身焉者及其發也不終日而作故曰不役于利則其見之也明見之也明則其發之也果今夫世俗之論則不然曰兵者詭道也非貪無以取非勇無以得非詐無以成亷靜而信者無用於兵者也嗟夫世俗之説行則天下紛紛乎如鳥獸之相搏嬰兒之相擊強者傷弱者廢而天下之亂何從而已乎孫武論二此篇是借題説自家議論夫武戰國之將也知為吳慮而已矣是故以將用之則可以君用之則不可今其書十三篇小至部曲營壘芻糧器械之間而大不過於攻城拔國用間之際蓋亦盡於此矣天子之兵天下之勢武未及也其書曰將能而君不御者勝為君而言者有此而巳竊以為天子之兵莫大於御將天下之勢莫大於使天下樂戰而不好戰夫天下之患不在於寇賊亦不在於敵國患在於將帥之不力而以寇賊敵國之勢內邀其君是故將帥多而敵國愈強兵加而寇賊愈堅敵國愈強而寇賊愈堅則將帥之權愈重將帥之權愈重則爵賞不得不加夫如此則是盜賊為君之患而將帥利之敵國為君之讐而將帥幸之舉百倍之勢而立毫芒之功以藉其口而邀利於其上如此而天下不亡者特有所待耳昔唐之亂始于明皇自肅宗復兩京而不能乘勝并力盡取河北之盜德宗收潞博幾定魏地而不能斬田悅於孤窮之中至於憲宗天下略平矣而其餘孽之存者終不能盡去夫唐之所以屢興而終莫之振者何也將帥之臣養寇以自封也故曰天子之兵莫大於御將御將之術開之以其所利而授之以其所忌如良醫之用藥鳥喙蝮蝎皆得自效於前而不敢肆其毒何者授之以其所畏也憲宗將討劉闢以為非髙崇文則莫可用而劉澭者崇文之所忌也故告之曰闢之不克將澭實汝代是以崇文決戰不旋踵擒劉闢此天子御將之法也夫使天下樂戰而不好戰者何也天下不樂戰則不可與從事於危好戰則不可與從事於安昔秦人之法使吏士自為戰戰勝而利歸於民所得於敵者即以有之使民之所以養生送死者非殺敵無由取也故其民以好戰並天下而亦以亡夫始皇雖巳墮名城殺豪傑銷鋒鏑而民之好戰之心囂然其未已也是故不可與休息而至於亡若夫王者之民要在於使之知愛其上而讐其敵使之知其上之所以驅之於戰者凡皆以為我也是以樂其戰而甘其死至於其戰也務勝敵而不務得財其賞也發公室而行之於廟使其利不在於殺人是故其民不志於好戰夫然後可以作之於安居之中而休之於爭奪之際可與安可與危而不可與亂此天下之勢也論孫武而發武之兵書之所不及蓋亦鑒宋之御將之無法而其士卒狃於弱而不能戰之故也唐宋八大家文鈔卷一百二十九
