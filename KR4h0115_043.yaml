body:
  text: 唐宋八大家文鈔卷四十明茅坤撰廬陵文鈔十二論正統論上傳曰君子大居正又曰王者大一統正者所以正天下之不正也統者所以合天下之不一也由不正與不一然後正統之論作堯舜之相傳三代之相代或以至公或以大義皆得天下之正合天下於一是以君子不論也其帝王之理得而始終之分明故也及後世之亂僭僞興而盜竊作由是有居其正而不能合天下於一者周平王之有吳徐是也有合天下於一而不得居其正者前世謂秦為閏是也由是正統之論興焉自漢而下至於西晉又推而下之為宋齊梁陳自唐而上至於後魏又推而上之則為夷狄其帝王之理舛而始終之際不明由是學者疑焉而是非又多不公自周之亡迄於顯德實千有二百一十六年之間或理或亂或取或傳或分或合其理不能一概大抵其可疑之際有三周秦之際也東晉後魏之際也五代之際也秦親得周而一天下其迹無異禹湯而論者黜之其可疑者一也以東晉承西晉則無終以隋承後魏則無始其可疑者二也五代之所以得國者雖異然同歸於賊亂也而前世議者獨以梁為僞其可疑者三也夫論者何為疑者設也堯舜三代之始終較然著乎萬世而不疑固不待論而明也後世之有天下者帝王之理或舛而始終之際不明則不可以不疑故曰由不正與不一然後正統之論作也然而論者衆矣其是非豫奪所持者各異使後世莫知夫所從者何哉蓋於其可疑之際又挾自私之心而溺於非聖之學也自西晉之滅而南為東晉宋齊梁陳北為後魏北齊後周隋私東晉者曰隋得陳然後天下一則推其統曰晉宋齊梁陳隋私後魏者曰統必有所受則推其統曰唐受之隋隋受之後周後周受之後魏至其甚相戾也則為南史者詆北曰虜為北史者詆南曰夷此自私之偏說也自古王者之興必有盛德以受天命或其功澤被於生民或纍世積漸而成王業豈偏名於一德哉至於湯武之起所以救弊拯民蓋有不得已者而曰五行之運有休王一以彼衰一以此勝此厯官術家之事而謂帝王之興必乘五運者繆妄之說也不知其出於何人蓋自孔子殁周益衰亂先王之道不明而人人異學肆其怪奇放蕩之說後之學者不能卓然奮力而誅絶之反從而附益其說以相結固故自秦推五勝以水德自名由漢以來有國者未始不由於此說此所謂溺於非聖之學也惟天下之至公大義可以袪人之疑而使人不得遂其私夫心無所私疑得其決則是非之異論息而正統明所謂非聖人之說者可置而勿論也正統論下凡為正統之論者皆欲相承而不絶至其斷而不屬則猥以假人而續之是以其論曲而不通也夫居天下之正合天下於一斯正統矣堯舜夏商周秦漢唐是也始雖不得其正卒能合天下於一夫一天下而居正則是天下之君矣斯謂之正統可矣晉隋是也天下大亂其上無君僭竊並興正統無屬當是之時奮然而起並爭乎天下有功者彊有德者王威澤皆被於生民號令皆加乎當世幸而以大并小以彊兼弱遂合天下於一則大且彊者謂之正統猶有說焉不幸而兩立不能相并考其迹則皆正較其義則均焉則正統者將安豫奪乎東晉後魏是也其或終始不得其正又不能合天下於一則可謂之正統乎魏及五代是也然則有不幸而丁其時則正統有時而絶也故正統之序上自堯舜歷夏商周秦漢而絶晉得之而又絶隋唐得之而又絶自堯舜以來三絶而復續惟有絶而有續然後是非公豫奪當而正統明然諸儒之論至於秦及東晉後魏五代之際其說多不同其惡秦而黜之以為閏者誰乎是漢人之私論溺於非聖曲學之說者也其說有三不過曰滅棄禮樂用法嚴苛與其興也不當五德之運而已五德之說可置而勿論其二者特始皇帝之事爾然未原秦之本末也昔者堯傳於舜舜傳於禹夏之衰也湯代之王商之衰也周代之王周之衰也秦代之王其興也或以德或以功大抵皆乘其弊而代之初夏世衰而桀為昏暴湯救其亂而起稍治諸侯而誅之其書曰湯征自葛是也其後卒以攻桀而滅夏及商世衰而紂為昏暴周之文武救其亂而起亦治諸侯而誅之其詩所謂崇密是也其後卒攻紂而滅商推秦之興其功德固有優劣而其迹豈有異乎秦之紀曰其先大業出於顓頊之苗裔至孫伯翳佐禹治水有功唐虞之間賜姓羸氏及非子為周養馬有功秦仲始為命大夫而襄公與立平王遂受岐豐之賜當是之時周衰固已久矣亂始於穆王而繼以厲幽之禍平王東遷遂同列國而齊晉大侯魯衛同姓擅相攻伐共起而弱周非獨秦之暴也秦於是時既平犬夷因取周所賜岐豐之地而繆公以來始東侵晉地至於河盡滅諸戎拓國千里其後關東諸侯彊僭者日益多周之國地日益蹙至無復天子之制特其號在爾秦昭襄王五十二年周之君臣稽首自歸於秦至其後世遂滅諸侯而一天下此其本末之迹也其德雖不足而其功力尚不優於魏晉乎始秦之興務以力勝至於始皇遂悖棄先王之典禮又自推水德益任法而少恩其制度文為皆非古而自是此其所以見黜也夫始皇之不德不過如桀紂桀紂不廢夏商之統則始皇未可廢秦也其私東晉之論者曰周遷而東天下遂不能一然仲尼作春秋區區於尊周而黜吳楚者豈非以其正統之所在乎晉遷而東與周無異而今黜之何哉曰是有說焉較其德與迹而然耳周之始興其來也逺當其盛也規方天下為大小之國衆建諸侯以維王室定其名分使傳子孫而守之以為萬世之計及厲王之亂周室無君者十四年而天下諸侯不敢僥幸而窺周於此然後見周德之深而文武周公之作真聖人之業也况平王之遷國地雖蹙然周德之在人者未厭而法制之臨人者未移平王以子繼父自西而東不出王畿之內則正統之在周也推其德與迹可以不疑夫晉之為晉與乎周之為周也異矣其德法之維天下者非有萬世之計聖人之業也直以其受魏之禪而合天下於一推較其迹可以曰正而統耳自惠帝之亂至於愍懷之間晉如線爾惟嗣君繼世推其迹曰正焉可也建興之亡晉於是而絶矣夫周之東也以周而東晉之南也豈復以晉而南乎自愍帝死賊庭琅邪起江表位非嗣君正非繼世徒以晉之臣子有不忘晉之心發於忠義而功不就可為傷已若因而遂竊正統之號其可得乎春秋之說君弒而賊不討則以為無臣子也使晉之臣子遭乎聖人適當春秋之誅况欲干天下之統哉若乃國己滅矣以宗室子自立於一方卒不能復天下於一則晉之琅邪與夫後漢之劉備五代漢之劉崇何異備與崇未嘗為正統則東晉可知焉耳其私後魏之論者曰魏之興也其來甚逺自昭成建國改元承天下衰弊得奮其力並爭乎中國七世至於孝文而去夷即華易姓建都遂定天下之亂然後修禮樂興制度而文之考其漸積之基其道德雖不及於三代而其為功何異王者之興今特以其不能并晉宋之一方以小不備而黜其大功不得承百王之統者何哉曰質諸聖人而不疑也今為魏說者不過曰功多而國彊耳此聖人有所不與也春秋之時齊桓晉文可謂有功矣吳楚之僭迭彊於諸侯矣聖人於春秋所尊者周也然則功與彊聖人有所不取也論者又曰秦起夷狄以能滅周而一天下遂進之魏亦夷狄以不能滅晉宋而見黜是則因其成敗而毁譽之豈至公之篤論乎曰是不然也各於其黨而已周秦之所以興者其說固已詳之矣當魏之興也劉淵以胸奴慕容以鮮卑苻生以氐弋仲以羌赫連秃髮石勒季龍之徒皆四夷之雄者也其力不足者弱有餘者彊其最彊者苻堅當堅之時自晉而外天下莫不為秦休兵革興學校庶幾刑政之方不幸未幾而敗亂其又彊者曰魏自江而北天下皆為魏矣幸而傳數世而後亂以是而言魏者才優於苻堅而已豈能干正統乎五代之得國者皆賊亂之君也而獨僞梁而黜之者因惡梁者之私論也唐自僖昭以來不能制命於四海而方鎮之兵作已而小者并於大弱者服於彊其尤彊者朱氏以梁李氏以晉共起而窺唐而梁先得之李氏因之借名討賊以與梁爭中國而卒得之其勢不得不以梁為僞也而繼其後者遂因之使梁獨被此名也夫梁固不得為正統而唐晉漢周何以得之今皆黜之而論者猶以漢為疑以為契丹滅晉天下無君而漢起太原徐驅而入汴與梁唐晉周其迹異矣而今乃一槩可乎曰較其心迹小異而大同爾且劉知逺晉之大臣也方晉有契丹之亂也竭其力以救難力所不勝而不能存晉出於無可奈何則可以少異乎四國矣漢獨不然自契丹與晉戰者三年矣漢獨髙拱而視之如齊人之視越人也卒幸其敗亡而取之及契丹之北也以中國委之許王從益而去從益之勢雖不能存晉然使忠於晉者得而奉之可以冀於有為也漢乃殺之而後入以是而較其心迹其異於四國者幾何矧皆未嘗合天下於一也其於正統絶之何疑統者猶絲之有緒也王者一四海其子孫之衰茍一日廟祀不絶則其統固在也周之衰也所當列國者千百之什一耳而仲尼作春秋猶書曰春王正月者周之統未嘗絶也東漢之亡也魏得其六吳得其三而蜀得其一耳朱文公作綱目必帝蜀而寇魏者以漢正統未絶也觀此則歐陽之以秦不當為閏以五代梁不得獨為僞固是而其以東晉為非統而直欲黜之者恐亦未當也於是歐陽公求其說而不得從而為之辭曰正統有時而絶愚特以為統之在天下未嘗絶也愚當暇日作正統圖特為辨以折千古不決之疑可也按正統論凡七公晚年刪為三今所録者蓋晚年所定也為君難論上用人之難語曰為君難者孰難哉蓋莫難於用人夫用人之術任之必專信之必篤然後能盡其材而可共成事及其失也任之欲專則不復謀於人而拒絶羣議是欲盡一人之用而先失衆人之心也信之欲篤則一切不疑而果於必行是不審事之可否不計功之成敗也夫違衆舉事又不審計而輕發其百舉百失而及於禍敗此理之宜然也然亦有幸而成功者人情成是而敗非則又從而贊之以其違衆為獨見之明以其拒諌為不惑羣論以其偏信而輕發為決於能斷使後世人君慕此三者以自期至其信用一失而及於禍敗則雖悔而不可及此甚可歎也前世為人君者力拒羣議專信一人而不能早悟以及於禍敗者多矣不可以遍舉請試舉其一二昔秦苻堅地大兵强有衆九十六萬號稱百萬蔑視東晉指為一隅謂可直以氣吞之耳然而舉國之人皆言晉不可伐更進互說者不可勝數其所陳天時人事堅隨以强辨折之忠言讜論皆沮屈而去如王猛苻融老成之言也不聽太子宏少子詵至親之言也不聽沙門道安堅平生所信重者也數為之言不聽惟聽信一將軍慕容垂者垂之言曰陛下內斷神謀足矣不煩廣訪朝臣以亂聖慮堅大喜曰與吾共定天下者惟卿爾於是決意不疑遂大舉南伐兵至夀春晉以數千人擊之大敗而歸比至洛陽九十六萬兵亡其八十六萬堅自此兵威沮喪不復能振遂至於亂亡近五代時後唐清泰帝患晉祖之鎮太原也地近契丹恃兵跋扈議欲徙之於鄆州舉朝之士皆諌以為未可帝意必欲徙之夜召常所與謀樞密直學士薛文遇問之以決可否文遇對曰臣聞作舍道邊三年不成此事斷在陛下何必更問羣臣帝大喜曰術者言我今年當得一賢佐助我中興卿其是乎即時命學士草制徙晉祖於鄆州明旦宣麻在廷之臣皆失色後六日而晉祖反書至清泰帝憂懼不知所為謂李嵩曰我適見薛文遇為之肉顫欲自抽刀刺之嵩對曰事己至此悔無及矣但君臣相顧涕泣而已由是言之能力拒羣議專信一人莫如二君之果也由之以致禍敗亂亡亦莫如二君之酷也方苻堅欲與慕容垂共定天下清泰帝以薛文遇為賢佐助我中興可謂臨亂之君各賢其臣者也或有詰豫曰然則用人者不可專信乎應之曰齊桓公之用管仲蜀先主之用諸葛亮可謂專而信矣不聞舉齊蜀之臣民非之也蓋其令出而舉國之臣民從事行而舉國之臣民便故桓公先主得以專任而不二也使令出而兩國之人不從事行而兩國之人不便則彼二君者其肯專任而信之以失衆心而斂國怨乎凡歐陽公之論最痛切然其行文不如三蘇嫋娜紆徐須參互之為入神解為君難論下聽言之難嗚呼用人之難難矣未若聽言之難也夫人之言非一端也巧辨縱橫而可喜忠言質朴而多訥此非聽言之難在聽者之明暗也諛言順意而易悅直言逆耳而觸怒此非聽言之難在聽者之賢愚也是皆未足為難也若聽其言則可用然用之有輒敗人之事者聽其言若不可用然非如其言不能以成功者此然後為聽言之難也請試舉其一二戰國時趙將有趙括者善言兵自謂天下莫能當其父奢趙之名將老於用兵者也每與括言亦不能屈然奢終不以括為能也歎曰趙若以括為將必敗趙事其後奢死趙遂以括為將其母自見趙王亦言括不可用趙王不聽使括將而攻秦括為秦軍射死趙兵大敗降秦者四十萬人坑於長平蓋當時未有如括善言兵亦未有如括大敗者也此聽其言可用用之輒敗人事者趙括是也秦始皇欲伐荆問其將李信用兵幾何信方年少而勇對曰不過二十萬足矣始皇大喜又以問老將王翦翦曰非六十萬不可始皇不悅曰將軍老矣何其怯也因以信為可用即與兵二十萬使伐荆王翦遂謝病退老於頻陽已而信大為荆人所敗亡七都尉而還始皇大慙自駕如頻陽謝翦因强起之翦曰必欲用臣非六十萬不可於是卒與六十萬而往遂以滅荆夫初聽其言若不可用然非如其言不能以成功者王翦是也且聽計於人者宜如何聽其言若可用用之宜矣輒敗事聽其言若不可用捨之宜矣然必如其說則成功此所以為難也豫又以謂秦趙二主非徒失於聽言亦由樂用新進忽棄老成此其所以敗也大抵新進之士喜勇鋭老成之人多持重此所以人主之好立功名者聽勇鋭之語則易合聞持重之言則難入也若趙括者則又有說焉豫略考史記所書是時趙方遣廉頗攻秦頗趙名將也秦人畏頗而知括虛言易與也因行反間於趙曰秦人所畏者趙括也若趙以為將則秦懼矣趙王不悟反間也遂用括為將以代頗藺相如力諌以為不可趙王不聽遂至於敗由是言之括虛談無實而不可用其父知之其母亦知之趙之諸臣藺相如等亦知之外至敵國亦知之獨其主不悟爾夫用人之失天下之人皆知其不可而獨其主不知者莫大之患也前世之禍亂敗亡由此者不可勝數也以上二篇並引傳記原文以為議論而於中略㸃綴數言自是一體若史遷之傳伯夷却又通篇以議論為叙事正與此互相發明唐宋八大家文鈔卷四十
