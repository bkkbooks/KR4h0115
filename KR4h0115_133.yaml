body:
  text: 唐宋八大家文鈔卷一百二十一明茅坤撰東坡文鈔五劄子論魏王在殯乞罷秋宴劄子議合經制臣謹按春秋左氏傳昭公九年晉荀盈如齊卒於戲陽殯于絳未葬晉平公飲酒樂膳宰屠蒯趨入酌以飲工曰汝為君耳將司聰也辰在子卯謂之疾日君徹燕樂學人舍業為疾故也君之卿佐是謂股肱股肱或虧何痛如之汝弗聞而樂是不聰也公説徹樂又按昭公十五年晉荀躒如周葬穆后既葬除喪周景王以賓燕叔向譏之謂之樂憂夫晉平公之於荀盈盖無服也周景王之于穆后盖期喪也無服者未葬而樂屠蒯譏之期喪者已葬而燕叔向譏之書之史册至今以為非仁宗皇帝以宰相富弼母在殯為罷春燕傳之天下至今以為宜今魏王之喪未及卒哭而禮部太常寺皆以謂天子絶期不妨燕樂臣竊非之若絶期可以燕樂則春秋何爲譏晉平公周景王乎魏王之親孰與卿佐逺比荀盈近比富弼之母輕重亦有間矣魏王之葬既以隂陽拘忌别擇年月則當凖禮以諸侯五月爲葬期自今年十一月以前皆爲未葬之月不當燕樂不可以權宜郊殯便同巳葬也臣竊意皇帝陛下篤於仁孝必罷秋燕不待臣言但至今未奉指揮縁上件教坊致語等文字凖令合於燕前一月進呈臣既未敢撰亦不敢稽延伏乞詳酌如以爲當罷只乞自皇帝陛下聖意施行更不降出臣文字臣忝備侍從叨陪講讀不欲使人以絲毫議及聖明故不敢不奏取進止乞免五榖力勝税錢劄子元祐七年十一月初七日龍圖閣學士左朝奉郎守兵部尚書兼侍讀蘇軾劄子奏臣聞榖太賤則傷農太貴則傷末是以法不税五榖使豐熟之鄉商賈爭糴以起太賤之價災傷之地舟車輻輳以壓太貴之直自先王以來未之有改也而近歳法令始有五榖力勝税錢使商賈不行農末皆病廢百王不刋之令典而行自古所無之弊法使百世之下書之青史曰收五榖力勝税錢自皇宋某年始臣竊爲聖世病之臣頃在黄州親見累歳榖熟農夫連車載米入市不了鹽茶之費而蓄積之家日夜禱祠願逢饑荒又在浙西親見累歳水災中民之家有錢無榖被服珠金餓死於市此皆官收五榖力勝税錢致啇賈不行之咎也臣聞以物與人物盡而止以法活人法行無窮今陛下每遇災傷捐金帛散倉廪自元祐以來盖所費數千萬貫石而餓殍流亡不爲少衰只如去年浙西水災陛下使江西湖北雇船運米以救蘇湖之民盖百餘萬石又計糴本水脚官錢不貲而客船被差雇者皆失業破産無所告訢與其官司費耗其實如此何似削去近日所立五榖力勝税錢一條只行天聖附令免税指揮則豐凶相濟農末皆利縱有水旱無大饑荒雖目下稍失課利而災傷之地不必盡煩陛下出捐錢榖如近歲之多也今元祐編敕雖云災傷地分雖有例亦免而榖所從來必自豐熟地分所過不免收税則啇賈亦自不行議者或欲立法如一路災傷則鄰路免税一州災傷則鄰州亦然雖比今之法小爲通踈而隔一路一州之外豐凶不能相救未爲良法須是盡削近日弊法專用天聖附令指揮乃爲通濟右臣竊謂若行臣言税錢亦必不至大叚失䧟何也五榖無税商賈必大通流不載見錢必有囬貨見錢囬貨自皆有税所得未必減於力勝而災傷之地有無相通易爲振救官司省費其利不可勝計今肆赦甚近若得於赦書帯下益見聖德收結民心實無窮之利取進止奏内中車子爭道亂行劄子得肅朝廷之體與東方朔所劾奏董偃同臣謹按漢成帝郊祠茸泉泰畤汾隂后土而趙昭儀常從在屬車間時揚雄待詔承明奏賦以諷其畧曰想西王母欣然而上壽兮屏玉女而却虙妃言婦女不當與齋祠之間也臣今備位夏官職在鹵簿准故事郊祀既成乗輿還齋宮改服通天冠絳紗袍教坊鈞容作樂還内然後后妃之屬中道迎謁巳非典禮而况方當祀事未畢而中宮掖庭得在勾陳豹尾之間乎竊見二聖崇奉大祀嚴恭寅畏度越古今四方來觀莫不悦服今車駕方宿齋太廟而内中車子不避仗衛爭道亂行臣愚竊恐於觀望有損不敢不奏乞挍正陸贄奏議進御劄子長公所最得意識見亦最得意條奏臣等猥以空踈備員講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所爲竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若巳經效於世間不必皆從於巳出伏見唐宰相陸贄才本王佐學爲帝師論深切於事情言不離於道德智如子房而文則過辯如賈誼而術不疎上以格君心之非下以通天下之志但其不幸仕不遇時德宗以苛刻爲能而贄諫以忠厚德宗以猜忌爲術而贄勸以推誠德宗好用兵而贄以消兵爲先德宗吝用財而贄以散財爲急至於用人聽言之法治邊馭將之方罪巳以收人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏肓使德宗盡用其言則貞觀可得而復臣每退自西閣即私相告以陛下聖明必善贄議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文爲之太息魏相條晁董之對則孝宣以致中興若陛下能自得師則莫若近取之贄夫六經三史諸子百家非無可觀皆足爲治但聖言幽逺末學支離譬如山海之崇深難以一二而推擇如贄之論開巻了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加挍正繕寫進呈願陛下置之坐隅如見贄面反覆熟讀如與贄言必能發聖性之髙明成治功於歲月臣等不勝區區之意取進止上圓丘合祭六議劄子辨晢臣伏見九月二十二日詔書節文俟郊禮畢集官詳議祠皇地祗事及郊祀之歳廟饗典禮聞奏者臣恭覩陛下近者至日親祀郊廟神祗饗答實䝉休應然則圓丘合祭允當天地之心不宜復有改更臣竊惟議者欲變祖宗之舊圓丘祀天而不祀地不過以謂冬至祀天於南郊陽時陽位也夏至祀地於北郊隂時隂位也以類求神則陽時陽位不可以求隂也是大不然冬至南郊既祀上帝則天地百神莫不從也古者秋分夕月於西郊亦可謂隂位矣至於從祀上帝則以冬至而祀月於南郊議者不以爲疑今皇地祗亦從上帝而合祭於圓丘獨以爲不可則過矣書曰肆類於上帝禋於六宗望于山川徧于羣神舜之受禪也自上帝六宗山川羣神莫不畢告而獨不告地祗豈有此理哉武王克商庚戍柴望柴祭上帝也望祭山川也一日之間自上帝而及山川必無南北郊之别也而獨畧地祗豈有此理哉臣以知古者祀上帝則并祀地祗矣何以明之詩之序曰昊天有成命郊祀天地也此乃合祭天地經之明文而説者乃以比之豐年秋冬報也曰秋冬各報而皆歌豐年則天地各祀而皆歌昊天有成命也是大不然豐年之詩曰豐年多黍多稌亦有髙廪萬億及秭爲酒爲醴烝畀祖妣以洽百禮降福孔皆歌於秋可也歌於冬亦可也昊天有成命之詩曰昊天有成命二后受之成王不敢康夙夜基命宥宻於緝熈單厥心肆其靖之終篇言天而不及地頌所以告神明也未有歌其所不祭祭其所不歌也今祭地於北郊歌天而不歌地豈有此理也臣以此知周之世祀上帝則地祗在焉歌天而不歌地所以尊上帝故其序曰郊祀天地也春秋書不郊猶三望左氏傳曰望郊之細也説者曰三望太山河海或曰淮海也又或曰分野之星及山川也魯諸侯也故郊之細及其分野山川而巳周有天下則郊之細獨不及五嶽四瀆乎嶽瀆猶得從祀而地祗獨不得合祭乎秦燔詩書經籍散亡學者各以意推類而巳王鄭賈服之流未必皆得其真臣以詩書春秋考之則天地合祭久矣議者乃謂合祭天地始於王莽以爲不足法臣竊謂禮當騐其是非不當以人廢光武皇帝親誅莽者也尚采用元始合祭故事謹按後漢書郊祀志建武二年初制郊兆於洛陽爲圓壇八陛中又爲重壇天地位其上皆南鄉西上此則漢世合祭天地之明騐也又按水經注伊水東北至洛陽縣圓丘東大魏郊天之所凖漢故事爲圓壇八陛中又爲重壇天地位其上此則魏世合祭天地之明騐也唐睿宗將有事於南郊賈曾議曰有虞氏禘黄帝而郊嚳夏后氏禘黄帝而郊鯀郊之與廟皆有禘禘於廟則祖宗合食於太祖禘於郊則地祗羣望皆合於圓丘以始祖配享盖有事祭非常祀也三輔故事祭於圓丘上帝后土位皆南面則漢嘗合祭矣時禇无量郭山惲等皆以曾言爲然明皇天寳元年二月敕曰凡所祠享必在躬親朕不親祭禮將有闕其皇地祗宜如南郊合祭是月二十日合祭天地於南郊自後有事於圓丘皆合祭此則唐世合祭天地之明騐也今議者欲冬至祀天夏至祀地盖以爲用周禮也臣請言周禮與今禮之别古者一歳祀天者三明堂饗帝者一四時迎氣者五祭地者二饗宗廟者四凡此十五者皆天子親祭也而又朝日夕月四望山川社稷五祀及羣小祀之類亦皆親祭此周禮也太祖皇帝受天眷命肇造宋室建隆初郊先饗宗廟並祀天地自真宗以來三歳一郊必先有事景靈徧饗太廟乃祀天地此國朝之禮也夫周之禮親祭如彼其多而歳行之不以爲難今之禮親祭如此其少而三歳一行不以爲易其故何也古者天子出入儀物不繁兵衛甚簡用財有節而宗廟在大門之内朝諸侯出爵賞必於太廟不止時祭而巳天子所治不過王畿千里唯以齊祭禮樂爲政事能守此則天下服矣是故歳歳行之率以爲常至於後世海内爲一四方萬里皆聽命於上機務之繁億萬倍於古日力有不能給自秦漢以來天子儀物日以滋多有加無損以至於今非復如古之簡易也今所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭太廟非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃以下至文武官皆得䕃補親屬非周禮也自宰相宗室以下至百官皆有賜賚非周禮也此皆不改而獨於地祗則曰周禮不當祭於圓丘此何義也議者必曰今之寒暑與古無異而宣王薄伐玁狁六月出師則夏至之日何爲不可祭乎臣將應之曰舜一歳而廵四岳五月方暑而南至衡山十一月方寒而北至常山亦今之寒暑也後世人主能行之乎周所以十二歳一廵者唯不能如舜也夫周巳不能行舜之禮而謂今可以行周之禮乎天之寒暑雖同而禮之繁簡則異是以有虞氏之禮夏商有所不能行夏商之禮周有所不能用時不同故也宣王以六月出師驅逐玁狁盖非得巳且吉甫爲將王不親行也今欲定一代之禮爲三歳常行之法豈可以六月出師爲比乎議者必又曰夏至不能行禮則遣官攝祭祀亦有故事此非臣之所知也周禮大宗伯若王不與則攝位鄭氏注曰王有故則代行其祭事賈公彦疏曰有故謂王有疾及哀惨皆是也然則攝事非安吉之禮也後世人主不能歳歳親祭故命有司行事其所從來久矣若親郊之歳遣官攝事是無故而用有故之禮也議者必又曰省去繁文末節則一歳可以再郊臣將應之曰古者以親郊爲常禮故無繁文今世以親郊爲大禮則繁文有不能省也若帷城幔屋盛夏則有風雨之虞陛下自宫入廟出郊冠通天乗大輅日中而舍百官衛兵暴露於道鎧甲具裝人馬喘汗皆非夏至所能堪也王者父事天母事地不可偏也事天則備事地則簡是於父母有隆殺也豈得以爲繁文末節而一切欲省去乎國家養兵異於前世自唐之時未有軍賞猶不能歳歳親祠天子出郊兵衛不可簡省大輅一動必有賞給今三年一郊傾竭帑藏猶恐不足郊賚之外豈可復加若一年再賞國力將何以給分而與之人情豈不失望議者必又曰三年一祀天又三年一祭地此又非臣之所知也三年一郊巳爲疏濶若獨祭地而不祭天是因事地而愈疏於事天自古未有六年一祀天者如此則典禮愈壊欲復古而背古益逺神祗必不顧饗非所以爲禮也議者必又曰當郊之歳以十月神州之祭易夏至方澤之祀則可以免方暑舉事之患此又非臣之所知也夫所以議此者爲欲舉從周禮也今以十月易夏至以神州代方澤不知此周禮之經耶抑變禮之權耶若變禮從權而可則合祭圓丘何獨不可十月親祭地十一月親祭天先天後地古無是禮而一歳再郊軍國勞費之患尚未免也議者必又曰當郊之歳以夏至祀地祗於方澤上不親郊而通爟火天子於禁中望祀此又非臣之所知也書之望秩周禮之四望春秋之三望皆謂山川在境内而不在四郊者故逺望而祭也今所在之處俛則見地而云望祭是爲京師不見地乎此六議者合祭可不之決也夫漢之郊禮尤與古戾唐亦不能如古本朝祖宗欽崇祭祀儒臣禮官講求損益非不知圓丘方澤皆親祭之爲是也盖以時不可行是故参酌古今上合典禮下合時宜較其所得巳多於漢唐矣天地宗廟之祭皆當歳徧今不能歳徧是故徧於三年當郊之歳又不能於一歳之中再舉大禮是故徧於三日此皆因時制宜雖聖人復起不能易也今並祀不失親祭而北郊則必不能親徃二者孰爲重乎若一年再郊而遣官攝事是長不親事地也三年間郊當行郊地之歳而暑雨不可親行遣官攝事則是天地皆不親祭也夫分祀天地決非今世之所能行議者不過欲於當郊之歳祀天地宗廟分而爲三耳分而爲三有三不可夏至之日不可以動大衆舉大禮一也軍賞不可復加二也自有國以來天地宗廟唯饗此祭累聖相承唯用此禮此乃神祗所歆祖宗所安不可輕動動之則有吉凶禍福不可不慮三也凡此三者臣熟計之無一可行之理伏請從舊爲便昔西漢之衰元帝納貢禹之言毁宗廟成帝用丞相衡之議改郊位皆有殃咎著於史䇿徃鍳甚明可爲寒心伏望陛下詳覧臣此章則知合祭天地乃是古今正禮本非權宜不獨初郊之歳所當施行實爲無窮不刋之典願陛下謹守太祖建隆神宗熈寧之禮無更改易郊祀廟饗以敉寧上下神祗仍乞下臣此章付有司集議如有異論即湏畫一解破臣所陳六議使皆屈伏上合周禮下不爲當今軍國之患不可固執更不論當今可與不可施行所貴嚴祀大典以時定取進止蘇氏諸劄中此劄爲最歴覧宋時廷議亦無有能及之者當與西漢韋元成劉歆等廟議相伯仲乞郡劄子覧此而不爲嗚咽流涕者非人情也臣近以左臂不仁兩目昏暗有失儀曠職之憂堅乞一郡伏䝉聖慈降詔不允遣使存問賜告養疾恩禮之重萬死莫酬以臣子大義言之病未及死皆當勉强雖有失儀曠職之罰亦不當辭然臣終未敢起就職事者實亦有故言之則觸忤權要得罪不輕不言則欺罔君父誅罰尤大故卒言之臣聞之易曰君子安其身而後動又曰君不宻則失臣臣不宻則失身以此知事君之義雖以報國爲先而報國之道當以安身爲本若上下相忌身自不安則危亡是憂國何由報恭惟陛下踐祚之始收臣於九死之餘半年之間擢臣爲兩制之首方將致命豈敢告勞特以臣拙於謀身鋭於報國致使臺諌列爲怨仇臣與故相司馬光雖賢愚不同而交契最厚光既大用臣亦驟遷在於人情豈肯異論但以光所建差役一事臣實以爲未便不免力爭而臺諌諸人皆希合光意以求進用及光既殁則又妄意陛下以爲主光之言結黨横身以排異議有言不便約共攻之曾不知光至誠爲民本不求人希合而陛下虚心無我亦豈有所主哉其後又因刑部侍郎范百禄與門下侍郎韓維爭議刑名欲守祖宗故事不敢以疑法殺人而諌官吕陶又論維專權用事臣本蜀人與此兩人實是知舊因此韓氏之黨一例疾臣指爲川黨御史趙挺之在元豐末通判德州而著作黄庭堅方監本州德安鎮挺之希合提舉官楊景棻意欲於本鎮行市易法而庭堅以謂鎮小民貧不堪誅求若行市易必致星散公文徃來士人傳笑其後挺之以大臣薦召試館職臣嘗對衆言挺之聚歛小人學行無取豈堪此選又挺之妻父郭槩爲西蜀提刑時本路提舉官韓玠違法虐民朝㫖委槩體量而槩附㑹隠庇臣弟轍爲諌官劾奏其事玠槩並行黜責以此挺之疾臣尤出死力臣二年之中四遭口語發策草麻皆謂之誹謗未出省榜先言其失士以至臣所薦士例加誣衊所言利害不許相見近日王覿言胡宗愈指臣爲黨孫覺言丁隲云是臣親家臣與此兩人有何干渉而於意外巧構曲成以積臣罪欲使臣撓椎於十夫之手而使陛下投杼於三至之言中外之人具曉此意謂臣若不早去必致傾危臣非不知聖主天縱聰明察臣無罪但以臺諫氣熖震動朝廷上自執政大臣次及侍從百官外至監司守令皆畏避其鋒奉行其意意所欲去勢無復全天下知之獨陛下深居法宫之中無由知耳臣竊觀三代以下號稱明主莫如漢宣帝唐太宗然宣帝殺盖寛饒太宗殺劉洎皆信用讒言死非其罪至今哀之宣帝初知盖寛饒忠直不畏强禦自候司馬擢爲太中太夫司𨽻挍尉不可謂不知之深矣而盖寛饒上書有云五帝官天下三王家天下而當時讒人乃謂寛饒欲求禪位宣帝不察致使寛饒自剄北闕下太宗信用劉洎言無不從嘗比之魏文貞公亦不可謂不知之深矣而太宗征遼患癰洎泣曰聖體不康甚可憂懼而當時讒人乃謂洎欲行伊霍之事太宗不察賜洎自盡二主非不明也二臣之受知非不深也恃明主之深知不避讒人積毁以至身首異處爲天下笑今臣自度受知於陛下不過如盖寛饒之於漢宣帝劉洎之於唐太宗也而讒臣者乃十倍於當時雖陛下明哲寛仁度越二主然臣亦豈敢恃此不去以卒蹈二臣之覆轍哉且二臣之死天下後世皆言二主信讒邪而害忠良以爲聖德之累使此二臣者識㡬畏漸先事求去豈不身名俱㤗臣主兩全哉臣縱不自愛獨不念一旦得罪之後使天下後世有以議吾君乎昔先帝召臣上殿訪問古今勅臣今後遇事即言其後臣屢論事未䝉施行乃復作爲詩文寓物託諷庶㡬流傳上達感悟聖意而李定舒亶何正臣三人因此言臣誹謗遂得罪然猶有近似者以諷諌爲誹謗也今臣草麻詞有云民亦勞止而趙挺之以爲誹謗先帝則是以白爲黒以西爲東殊無近似者臣以此知挺之嶮毒甚於李定舒亶何正臣而臣之被讒甚於盖寛饒劉洎也古人有言曰爲君難爲臣不易臣欲依違茍且雷同衆人則内愧本心上負明主若不改其操知無不言則怨仇交攻不死即廢伏望聖慈念爲臣之不易哀臣處此之至難始終保全措之不爭之地特賜指揮撿㑹前奏早賜施行臣無任感恩知罪祈天請命激切戰恐之至取進止辯試館職䇿問劄子一以下二劄蘇子瞻忠義明辯雖九死而不懼亦子瞻供狀臣竊聞諌官言臣近所撰試館職人䇿問有渉諷議先朝之語臣退伏思念其畧曰今朝廷欲師仁祖之忠厚而患百官有司不舉其職或至於媮欲法神考之勵精而恐監司守令不識其意流入於刻臣之所謂媮與刻者專指今之百官有司及監司守令不能奉行恐致此病於二帝何與焉至於前論周公大公後論文帝宣帝皆是爲文引證之常亦無此擬二帝之意况此䇿問第一第二首鄧温伯之詞末篇乃臣所撰三首皆臣親書進入䝉御筆㸃用第三首臣之愚意豈逃聖鍳若有毫髮諷議先朝則臣死有餘罪伏願少回天日之照使臣孤忠不爲衆口所鑠臣無任伏地待罪戰恐之至取進止辯試館職䇿問劄子二臣近以試館職䇿問爲臺諌所言臣初不敢深辯盖以自辯而求去是不欲去也今者竊聞明詔巳察其實而臣四上章四不允臣子之義身非巳有詞窮理盡不敢求去是以區區復一自言臣所撰䇿問首引周公太公之治齊魯後世皆不免衰亂者以明子孫不能奉行則雖大聖大賢之法不免於有弊也後引文帝宣帝仁厚而事不廢核實而政不苛者以明臣子若奉行得其理無觀望希合之心則雖文帝宣帝足以無弊也中間又言六聖相受爲治不同同歸於仁其所謂媮與刻者專謂今之百官有司及監司守令不識朝廷所以師法先帝之本意或至於此也文理甚明粲若黒白何嘗有毫髮疑似議及先朝非獨朝廷知臣無罪可放臣亦自知無罪可謝也然臣聞之古人曰人之至信者心目也相親者母子也不惑者聖賢也然至於竊斧而知心目之可亂於投杼而知母子之可疑於拾煤而知聖賢之可惑今言臣者不止三人交章累上不啻數十而聖斷確然深明其無罪則是過於心目之相信母子之相親聖賢之相知逺矣德音一出天下頌之史册書之自耳目所聞見明智特達洞照情偽未有如陛下者非獨㣲臣區區欲以一死上報凡天下之爲臣子者聞之莫不欲碎首糜軀效忠義於陛下也不然者亦非獨臣受曖昧之謗凡天下之爲臣子者聞之莫不以臣爲戒崇尚忌諱畏避形迹觀望雷同以求茍免豈朝廷之福哉臣自聞命以來一食三歎一夕九興身口相謀未知死所然臣所撰䇿問以實亦有罪若不盡言是欺陛下也臣聞聖人之治天下也寛猛相資君臣之間可否相濟若上之所可不問其是非下亦可之上之所否不問其曲直下亦否之則是晏子所謂以水濟水誰能食之孔子所謂惟予言而莫予違足以䘮邦者也臣昔於仁宗朝舉制科所進䇿論及所答聖問大抵皆勸仁宗勵精庶政督察百官果斷而力行也及事神宗䝉召對訪問退而上書數萬言大抵皆勸神宗忠恕仁厚含垢納汙屈巳以裕人也臣之區區不自量度常欲希慕古賢可否相濟盖如此也伏觀二聖臨御巳來聖政日新一出忠厚大率多行仁宗故事天下翕然衘戴恩德固無可議者然臣私憂過計常恐百官有司矯枉過直或至於媮而神宗勵精核實之政漸致惰壊深慮數年之後馭吏之法漸寛理財之政漸疎備邊之計漸弛則意外之憂有不可勝言者雖陛下廣開言路無所諱忌而臺諫所擊不過先朝之人所非不過先朝之法正是以水濟水臣竊憂之故輒用此意撰上件䇿問實以譏諷今之朝廷及宰相臺諫之流欲陛下覧之有以感動聖意庻幾兼行二帝忠厚勵精之政也臺諫若以此言臣朝廷若以此罪臣則斧鉞之誅其丼如薺今乃以爲譏諷先朝則亦疎而不近矣且非獨此䇿問而巳今者不避煩凟盡陳本末臣前歳自登州召還始見故相司馬光光即與臣論當今要務條其所欲行者臣即答言公所欲行者諸事皆上順天心下合人望無可疑者惟役法一事未可輕議何則差役免役各有利害免役之害掊歛民財十室九空錢聚於上而下有錢荒之患差役之害民常在官不得專力於農而貪吏猾胥得縁爲姦此二害輕重盖畧相等今以彼易此民未必樂光聞之愕然曰若如君言計將安出臣即答言法相因則事易成事有漸則民不驚昔三代之法兵農爲一至秦始分爲二及唐中葉盡變府兵爲長征之卒自爾以來民不知兵兵不知農農出榖帛以養兵兵出性命以衛農天下便之雖聖人復起不能易也今免役之法實大類此公欲驟罷免役而行差役正如罷長征而復民兵盖未易也先帝本意使民戸率出錢專力於農雖有貪吏猾胥無所施其虐坊場河渡官自出賣而以其錢雇募衙前民不知有倉庫綱運破家之禍此萬世之利也決不可變獨有二弊多取寛剰役錢以供他用實封爭買坊場河渡以長不實之價此乃王安石呂惠卿之隂謀非先帝本意也公若盡去二弊而不變其法則民悦而事易成今寛剰役錢名爲十分取三通計天下乃及十五而其實一錢無用公若盡去此五分又使民得從其便以布帛榖米折納役錢而官亦以爲雇直則錢荒之弊亦可盡去如此而天下便之則公又何求若其未也徐更議之亦未晚也光聞臣言大以爲不然臣又與光言熈寧中常行給田募役法其法以係官田及以寛剰役錢買民田以募役人大畧如邊郡弓箭手臣時知宻州推行其法先募弓手民甚便之此本先帝聖意所建推行未幾爲左右異議而罷今畧計天下寛剰錢斛約三千萬貫石兵興支用僅耗其半此本民力當復爲民用今内帑山積公若力言於上索還此錢復完三千萬貫石而推行先帝買田募役法於河北河東陜西三路數年之後三路役人可減大半優裕民力以待邊鄙緩急之用此萬世之利社稷之福也光尤以爲不可此二事臣自别有畫一利害文字甚詳今此不敢備言及去年二月六日勅下始行光言復差役法時臣弟轍爲諫官上疏具論乞將見在寛剰役錢雇募役人以一年爲期令中外詳議然後立法又言衙前一役可即用舊人仍一依舊數支月給重難錢以坊場河渡錢總計諸路通融支給皆不䝉施行及䝉差臣詳定役法臣因得伸弟轍前議先與本局官吏孫永傅堯俞之流論難反復次於西府及政事堂中與執政商議皆不見從遂上疏極言衙前可雇不可差先帝此法可守不可變之意因乞罷詳定役法當此之時臺諫相視皆無一言決其是非今者差役利害未易一二遽言而弓手不許雇人天下之所同患也朝廷知之巳變法許雇天下皆以爲便而臺諌猶累疏力爭由此觀之是其意專欲變熈寧之法不復挍量利害叅用所長也臣爲中書舍人刑部大理寺列上熈寧巳來不該赦降去官法凡數十條盡欲刪去臣與執政屢爭之以謂先帝於此盖有深意不可盡改因此得存留者甚多臣每行監司守令告詞皆以奉守先帝約束毋敢弛廢爲戒文案具在皆可復按由此觀之臣豈謗議先朝者哉所以一一屢陳者非獨以自明誠見士大夫好同惡異泯然成俗深恐陛下深居法宫之中不得盡聞天下利害之實也願因臣此言警䇿在位救其所偏損所有餘補所不足天下幸甚若以其狂妄不識忌諱雖賜誅戮死且不朽臣無任感恩思報激切戰恐之至取進止唐宋八大家文鈔巻一百二十一
