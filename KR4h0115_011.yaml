body:
  text: 唐宋八大家文鈔卷十一明茅坤撰昌黎文鈔十一碑處州孔子廟碑序孔子祀典之尊崇處入骨孔子廟碑漢以來當屬昌黎第一自天子至郡邑守長通得祀而遍天下者惟社稷與孔子為然而社祭土稷祭榖句龍與棄乃其佐享非其專主又其位所不屋而壇豈如孔子用王者事巍然當座以門人為配自天子而下北面跪祭進退誠敬禮如親弟子者句龍棄以功孔子以德固自有次第哉自古多有以功德得其位者不得常祀句龍棄孔子皆不得位而得常祀然其祀事皆不如孔子之盛所謂生人以來未有如孔子者其賢過於堯舜逺矣此其效歟郡邑皆有孔子廟或不能修事雖設博士弟子或役於有司名存實亡失其所業獨處州刺史鄴侯李繁至官能以為先既新作孔子廟又令工改為顔子至子夏十人像其餘六十子及後大儒公羊髙左丘明孟軻荀况伏生毛公韓生董生髙堂生揚雄鄭玄等數十人皆圖之壁選博士弟子必皆其人又為置講堂教之行禮肄習其中置本錢廩米令可繼處以守廟成躬率吏及博士弟子入學行釋菜禮耆老歎嗟其子弟皆興於學鄴侯尚文其於古記無不貫達故其為政知所先後可歌也已乃作詩曰惟此廟學鄴侯所作厥初庳下神不以宇生師所處亦窘寒暑乃新斯官神降其獻講讀有常不誡用勸揭揭元哲有師之尊羣聖嚴嚴大法以存像圓孔肖咸在斯堂以瞻以儀俾不或忘後之君子無廢成美琢詞碑石以贊攸始南海神廟碑以祀事作案摹寫神采煥然海於天地間為物最巨自三代聖王莫不祀事考於傳記而南海神次最貴在北東西三神河伯之上號為祝融天寶中天子以為古爵莫貴於公侯故海嶽之祝犧幣之數放而依之所以致崇極於大神今王亦爵也而禮海嶽尚循公侯之事虛王儀而不用非致崇極之意也由是册尊南海神為廣利王祝號祭式與次俱升因其故廟易而新之在今廣州治之東南海道入十里扶胥之口黃水之灣常以立夏氣至命廣州刺史行事祠下事訖驛聞而刺史常節虔五嶺諸軍仍觀察其郡邑於南方事無所不統地大以逺故常選用重人既貴而富且不習海事又當祀時海常多大風將往皆憂戚既進觀顧怖悸故常以疾為解而委事於其副其來已久故明宫齋廬上雨旁風無所蓋障牲酒瘠酸取具臨時水陸之品狼籍籩豆薦裸興俯不中儀式吏滋不供神不顧享盲風怪雨發作無節人蒙其害元和十二年始詔用前尚書右丞國子祭酒魯國孔公為廣州刺史兼御史大夫以殿南服公正直方嚴中心樂易祇慎所職治人以明事神以誠內外殫盡不為表襮至州之明年將夏祝册自京師至吏以時告公乃齋袚視册誓羣有司曰册有皇帝名乃上所自署其文曰嗣天子某謹遣官某敬祭其恭且嚴如是敢有不承明日吾將宿廟下以供晨事明日吏以風雨白不聽於是州府文武吏士凡百數交謁更諌皆揖而退公遂升舟風雨少弛棹夫奏功雲隂解駮日光穿漏波伏不興省牲之夕載暘載隂將事之夜天地開除月星明穊五鼓既作牽牛正中公乃盛服執笏以入即事文武賓屬俯首聽位各執其職牲肥酒香樽爵淨潔降登有數神其醉飽海之百靈祕怪慌惚畢出蜿蜿蛇蛇來享飲食闔廟旋艫祥颷送帆旗纛旄麾飛揚暗藹鐃鼓嘲轟髙管噭譟武夫奮棹工師唱和穹龜長魚踊躍後先乾端坤倪軒豁呈露祀之之嵗風災熄滅人厭魚蟹五榖胥熟明年祀歸又廣廟宫而大之治其庭壇改作東西兩序齋庖之房百用具修明年其時公又固往不懈益虔嵗仍大和耋艾歌詠始公之至盡除他名之稅罷衣食於官之可去者四方之使不以資交以身為帥燕享有時賞與以節公藏私畜上下與足於是免屬州負逋之緡錢草有四萬米三萬二千斛賦金之州耗金一嵗八百困不能償皆以丐之加西南守長之俸誅其尤無良不聽令者由是皆自重慎法人士之落南不能歸者與流徙之胄百草八族用其才良而廩其無告者其女子可嫁與之錢財令無失時刑德並流地方數千里不識盜賊山行海宿不擇處所事神治人其可謂備至耳矣咸願刻廟石以著厥美而繫以詩乃作詩曰南海隂墟祝融之宅即祀於旁帝命南伯吏惰不躬正自今公明用享錫右我家邦惟明天子惟慎厥使我公在官神人致喜海嶺之陬既足既濡胡不均𢎞俾執事樞公行勿遲公無遽歸匪我私公神人具依黃陵廟碑此文用爾雅説文體别是一調湘旁有廟曰黃陵自前古立以祠堯之二女舜二妃者庭有石碑斷裂分散在地其文剝缺考圖記言漢荆州牧劉表景升之立題曰湘夫人碑今驗其文乃晉太康九年又其額曰虞帝二妃之碑非景升立者秦博士對始皇帝云湘君者堯之二女舜妃者也劉向鄭玄亦皆以二妃為湘君而離騷九歌既有湘君又有湘夫人王逸之解以為湘君者自其水神而謂湘夫人乃二妃也從舜南征三苖不及道死沅湘之間山海經曰洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小水為其夫人因以二女為天帝之女以余考之璞與王逸俱失也堯之長女娥皇為舜正妃故曰君其二女女英自宜降曰夫人也故九歌辭謂皇娥為君謂女英帝子各以其盛者推言之也禮有小君君母明其正自得稱君也書曰舜陟方乃死傳謂舜升道南方以死或又曰舜死葬蒼梧二妃從之不及溺死沅湘之間今謂竹書紀年帝王之沒皆曰陟陟升也謂升天也書曰殷禮陟配天言以道終其德協天也書紀舜之沒云陟者與竹書周書同文也其下言方乃死者所以釋陟為死也地之勢東南下如言舜南巡而死宜言下方不得言陟方也以此謂舜死葬蒼梧於時二妃從之不及而溺者皆不可信二妃既曰以謀語舜脫舜之厄成舜之聖堯死而舜有天下為天子二妃之力宜常為神食民之祭今之渡湖江者莫敢不進禮廟下元和十四年春余以言事得罪為潮州刺史其地於漢南海之揭陽厲毒所聚懼不得脫死過廟而禱之其冬移袁州刺史明年九月拜國子祭酒使以私錢十萬抵嶽州願易廟之圯桷腐瓦於刺史王堪長慶元年刺史張愈自京師往與愈故善謂曰丐我一碑石載二妃廟事且令後世知有子名愈曰諾既至州報曰碑謹具遂篆其事俾刻之衢州徐偃王廟碑以客形主而立論竒髙造語怪偉當是昌黎大文字徐與秦俱出柏翳為嬴姓國於夏殷周世咸有大功秦處西偏專用武勝遭世衰無明天子遂虎吞諸國為雄諸國既皆入秦為臣屬秦無所取利上下相賊害卒僨其國而沈其宗徐處得地中文德為治及偃王誕當國益除去刑爭末事凡所以君國子民待四方一出於仁義當此之時周天子穆王無道意不在天下好道士説得八龍騎之西逰同王母宴於瑶池之上歌謳忘歸四方諸侯之爭辨者無所質正咸賔祭於徐贄玉帛死生之物於徐之庭者三十六國得朱弓赤矢之瑞穆王聞之恐遂稱受命命造父御長驅而歸與楚連謀伐徐徐不忍鬬其民北走彭城武源山下百姓隨而從之萬有餘家偃王死民號其山為徐山鑿石為室以祠偃王偃王雖走死失國民戴其嗣為君如初駒王章禹祖孫相望自秦至今名公巨人繼迹史書徐氏十望其九皆本於偃王而秦後迄兹無聞家天於柏翳之緒非偏有厚薄施仁與暴之報自然異也衢州故會稽太末也民多姓徐氏支縣龍丘有偃王遺廟或曰偃王之逃戰不之彭城之越城之隅棄玉几研於會稽之水或曰徐子章禹既執於吳徐之公族子弟散之徐揚二州間即其居立先王廟云開元初徐姓二人相屬為刺史帥其部之同姓改作廟屋載事於碑後九十年當元和九年而徐氏放復為刺史放字達夫前碑所謂今户部侍郎其大父也春行視農至於龍丘有事於廟思惟本原曰故制粗朴下窄不足以揭虔妥靈而又梁桷赤白陊剝不治圖像之威䵝昧就滅藩拔級夷庭木秃缺祈氓日慢祥慶弗下州之羣支不獲蔭庥余惟遺紹而尸其土不即不圖以有資聚罰其可辭乃命因故為新衆工齊事惟月若日工告訖功大祠於廟宗卿咸序應是嵗州無怪風劇雨民不夭厲榖果完實民皆曰耿耿祉哉其不可誣乃相與請辭京師歸而鑱之於石辭曰秦傑以顛徐由遜綿秦鬼久飢徐有廟存婉婉偃王惟道之耽以國易仁為笑于頑自初擅命其實幾姓厯短詈長有不償亡課其利害孰與王當姑蔑之墟太末之里誰思王恩立廟以祀王之聞孫世世多有惟臨兹邦廟土實守堅嶠之後達夫廓之王歿萬年如始袝時王孫多孝世奉王廟達夫之來先慎詔教盡惠廟民不主於神維是達夫知孝之元太末之里姑蔑之城廟事時修仁孝振聲宜寵其人以及後生嗟嗟維王雖謂誰亢王死於仁彼以暴喪文追作誄刻示茫茫按偃王事不見傳記昌黎特採世所傳小説撰次本末而其議論歸本處當以徐之公族子弟祠偃王於其土為是曹成王碑文有精爽但句字生割不免昌黎本色王姓李氏諱臯字子蘭諡曰成其先王明以太宗子國曹絶復封傳五王至成王成王嗣封在玄宗世蓋於時年十七八紹爵三年而河南北兵作天下震擾王奉母太妃逃禍民伍得間走蜀從天子天子念之自都水使者拜左領軍衛將軍轉二國子祕書王生十年而失先王哭泣哀悲弔客不忍聞喪除痛刮磨豪習委已於學稍長重知人情急世之要恥一不通侍太妃從天子於蜀既孝既忠持官持身內外斬斬由是朝廷滋欲試之於民上元元年除溫州長史行刺史事江東新刳於兵郡旱飢民交走死無弔王及州不解衣下令掊鎖擴門悉棄倉實與民活數十萬人奏報升秩少府與平袁賊仍徙祕書兼州别駕部告無事遷真于衡法成令修治出張施聲生勢長觀察使噎媢不能出氣誣以過犯御史助之貶潮州刺史楊炎起道州相德宗還王于衡以直前謾王之遭誣在理念太妃老將驚而戚出則囚服就辨入則擁笏垂魚坦坦施施即貶于潮以遷入賀及是然後跪謝告實初觀察使虐使將國良往戍界良以武岡叛戍衆萬人斂兵荆黔洪桂伐之二年尤張於是以王帥湖南將五萬士以討良為事王至則屏兵投良以書中其忌諱良羞畏乞降狐鼠進退王即假為使者從一騎踔五百里抵良壁鞭其門大呼我曹王來受良降良今安在良不得已錯愕迎拜盡降其軍太妃薨王棄部隨喪之河南葬及荆被詔責還會梁崇義反王遂不敢辭以還升秩散騎常侍明年李希烈反遷御史大夫授節帥江西以討希烈命至王出止外舍禁無以家事關我裒兵大選江州羣能著職王親教之搏力勾卒嬴越之法曹誅五畀艦步二萬人以與賊遌嘬鋒蔡山踣之剜蘄之黃梅大鞣長平鏺廣濟掀蘄春撇蘄水掇黃岡策漢陽行跐汊川還大膞蘄水界中披安三縣拔其州斬偽刺史標光之北山􅞌隨光化梏其州十抽一推救兵州東北屬鄉還開軍受降大小之戰三十有二取五州十九縣民老幼婦女不驚市賈不變田之果榖下無一迹加銀青光祿大夫工部尚書改户部再換節臨荆及襄真食三百王之在兵天子西巡於梁希烈北取汴鄭東略宋圍陳西取汝薄東都王坐南方北向落其角距賊死咋不能入寸尺亡將卒十萬盡輸其南州王始政於溫終政於襄恆平物估賤斂貴出民用有經一吏軌民使令家聼户視姦宄無所宿府中不聞急步疾呼治民用兵各有條次世傳為法任馬彞將慎將鍔將潛偕盡其力能薨贈右僕射元和初以子道古在朝更贈太子太師道古進士司門郎刺利隨唐睦徴為少宗正兼御史中丞以節督黔中朝京師改命觀察鄂嶽蘄沔安黃提其師以伐蔡且行泣曰先王討蔡實取沔蘄安黃寄惠未亡今余亦受命有事於蔡而四州適在吾封庶其有集先王薨于今二十五年吾昆弟在而墓碑不刻無文其實有待子無用辭乃序而詩之辭曰太支十三曹於弟季或亡或微曹始就事曹之祖王畏塞絶遷零王黎公不聞僅存子父易封三王守名延延百載以有成王成王之作一自其躬文被明章武薦畯功蘇枯弱強齦其姦猖以報于宗以昭于王王亦有子處王之所惟舊之視蹶蹶陛陛實取實似刻詩其碑為示無止昌黎每自喜陳言之去故曹成王碑當亦屬公得意之文而愚見則以務去陳言却行穿鑿生割亦昌黎病處特其識正而語確故學者不能訾清邊郡王楊燕竒碑條次戰功極鬯然不及太史公遒逸公諱燕字燕奇𢎞農華隂人也大父知古祁州司倉烈考文誨天寶中實為平盧衙前兵馬使位至特進撿校太子賔客封𢎞農郡開國伯世掌諸蕃互市恩信著明夷人慕之祿山之亂公年幾二十進言于其父曰大人守官宜不得去王室在難某其行矣其父為之請于戎帥遂率諸將挍之子弟各一人間道趨闕變服詭行日倍百里天子嘉之特拜左金吾衛大將軍員外置賜勳上柱國寶應二年春詔從僕射田公平劉展又從下河北大厯八年帥師納戎帥勉于滑州九年從朝于京師建中二年城汴州功勞居多三年從攻李希烈先登貞元二年從司徒劉公復汴州十二年與諸將執以城叛者歸之於京師事平授御史大夫食實封百戶賜繒綵有加十四年年六十一五月某日終於家自始命左金吾大將軍凡十五遷為御史大夫職為節度押衙右廂兵馬使兼馬軍先鋒兵馬使階為特進勳為上柱國爵為清邊郡王食虛邑自三百户至三千戶真食五百户終焉公結髮從軍四十餘年敵攻無堅城守必完臨危蹈難歔欷感發乘機應會捷出神怪不畏義死不榮幸生故其事君無疑行其事上無間言初僕射田公其母隔于冀州公獨請往迎之經營賊城出入死地卒致其母田公德之約為父子故公始姓田氏田公終而後復其族焉嗣子通王屬良禎以其年十月庚寅葬公於開封縣魯陵岡隴西郡夫人李氏祔焉夫人清夷郡太守佑之孫漁陽郡長史獻之女柔嘉淑明先公而殂有男四人女三人後夫人河南郡夫人雍氏某官之孫某官之女有男一人女二人咸有至性純行夫人同仁均養親族不知異焉君子於是知楊公之德又行於家也銘曰烈烈大夫逢時之虞感泣辭親從難於秦維兹爰始遂勤其事四十餘年或裨或專攻牢保危爵位已隮既明且慎終老無隳魯陵之岡蔡河在側蒸蒸孝子思顯勳績斫石於此式垂後嗣唐銀青光祿大夫守左散騎常侍致仕上柱國襄陽郡王平陽路公神道碑惟路氏逺有代序自隋尚書兵部侍郎諱衮四代而至冀公冀公諱嗣恭以小邑蕭關令發聞開元受賜更名書於太史治行靈州終功南邦享有丕祉紹開厥家官至兵部尚書封冀國公薨贈尚書右僕射司空公諱應字從衆冀公之嫡子用大臣子謹飭擢至侍御史著作郎選刺虔州割餘雩都作縣安逺以利人屬鑿敗灘石以平贛梗陶甓而城罷人屢築詔嗣冀封又加尚書屯田郎中進服色遂臨于溫築隄嶽城橫陽界中二邑得上田除水害拜尚書兵部郎中兼御史中丞淮南軍司馬改遷廬州又甓其城人不歲苫入為尚書職方郎中兼御史中丞佐鹽鐵使使江東有功用半嵗厯常州遷至宣歙池觀察使進封襄陽郡王至則出倉米下其估半以廩餓人蜀闢誅行軍千五百人於蜀李錡將反以聞置鄉兵萬二千李錡反命將期以卒救胡常坐牢江東心錡以無助敗縛作響山亭營軍于左右權丞相善之鑱其説響山石居宣五年以疾去位挍其倉得石者五十萬餘府得錢千者八十萬公之為州逢水旱喜賤出與人嵗熟以其得收常有贏利故在所人不病飢而官府畜積元和六年天子憫公疾不可煩以職即其處拜左散騎常侍以其祿居其嵗九月望薨于東都正平里第年六十七明年葬京兆萬年少陵原夫人滎陽鄭氏袝既其子臨漢縣男貫與其弟賞貞謀曰宜有刻也告於叔父御史大夫鄜坊丹延觀察使恕因其族弟進士羣以來請銘遂以其事銘曰冀公之封維艱就功襄陽繼大啓慶自躬于虔洎溫厥緒既作以及職方遂都邦伯朝夕人事下完上實師于其鄉鄰寇逼屈營軍響山牆屋修施褒功刻表丞相之辭受代而家敘疏及邇病不能廷食祿卒齒凡代大家維難其保既顯既願戒于終咎伊我襄陽克慎以有延畀後承莫不率守有墓于原維樹在經以告無期博士是銘平淮西碑通篇次第戰功摹倣史漢而其辭旨特自出機軸其最好處在得臣下頌美天子之體天以唐克肖其德聖子神孫繼繼承承於千萬年敬戒不怠全付所覆四海九州罔有內外悉主悉臣髙祖太宗既除既治髙宗中睿休養生息至於玄宗受報收功極熾而豐物衆地大孽牙其間肅宗代宗德祖順考以勤以容大慝適去稂莠不薅相臣將臣文恬武嬉習熟見聞以為當然睿聖文武皇帝既受羣臣朝乃考圖數貢曰嗚呼天既全付豫有家今傳次在豫豫不能事事其何以見于郊廟羣臣震懾奔走率職明年平夏又明年平蜀又明年平江東又明年平澤潞遂定易定致魏博貝衛澶相無不從志皇帝曰不可究武豫其少息九年蔡將死蔡人立其子元濟以請不許遂燒舞陽犯葉襄城以動東都放兵四劫皇帝厯問于朝一二臣外皆曰蔡帥之不廷授于今五十年傳三姓四將其樹本堅兵利卒頑不與他等因撫而有順且無事大官臆決唱聲萬口和附并為一談牢不可破皇帝曰惟天惟祖宗所以付任豫者庶其在此豫何敢不力况一二臣同不為無助曰光顔汝為陳許帥維是河東魏博郃陽三軍之在行者汝皆將之曰重胤汝故有河陽懷今益以汝維是朔方義成陜益鳳翔延慶七軍之在行者汝皆將之曰𢎞汝以卒萬二千屬而子公武往討之曰文通汝守壽維是宣武淮南宣歙浙西四軍之行于壽者汝皆將之曰道古汝其觀察鄂嶽曰訴汝帥唐鄧隨各以其兵進戰曰度汝長御史其往視師曰度惟汝豫同汝遂相豫以賞罰用命不用命曰𢎞汝以其節都統諸軍曰守謙汝出入左右汝惟近臣其往撫師曰度汝其往衣服飲食豫士無寒無飢以既厥事遂生蔡人賜汝節斧通天御帶衛卒三百凡茲廷臣汝擇自從惟其賢能無憚大吏庚申豫其臨門送汝曰御史豫閔士大夫戰甚苦自今以往非郊廟祠祀其無用樂顔胤武合攻其北大戰十六得柵城縣二十三降人卒四萬道古攻其東南八戰降萬三千再入申破其外城文通戰其東十餘遇降萬二千訴入其西得賊將輒釋不殺用其䇿戰比有功十二年八月丞相度至師都統𢎞責戰益急顔胤武合戰益用命元濟盡并其衆洄曲以備十月壬申訴用所得賊將自文城因天大雪疾馳百二十里用夜半到蔡破其門取元濟以獻盡得其屬人卒辛巳丞相度入蔡以皇帝命赦其人淮西平大饗賚功師還之日因以其食賜蔡人凡蔡卒三萬五千其不樂為兵願歸為農者十九悉縱之斬元濟京師册功𢎞加侍中訴為左僕射帥山南東道顔胤皆加司空公武以散騎常侍帥鄜坊丹延道古進大夫文通加散騎常侍丞相度朝京師道封晉國公進階金紫光祿大夫以舊官相而以其副總為工部尚書領蔡任既還奏羣臣請紀聖功被之金石皇帝以命臣愈臣愈再拜稽首而獻文曰唐承天命遂臣萬邦孰居近土襲盜以狂往在玄宗崇極而圯河北悍驕河南附起四聖不宥屢興師征有不能克益戍以兵夫耕不食婦織不裳輸之以車為卒賜糧外多失朝曠不嶽狩百𨽻怠官事亡其舊帝時繼位顧瞻咨嗟惟汝文武孰恤豫家既斬吳蜀旋取山東魏將首義六州降從淮蔡不順自以為強提兵呌歡欲事故常始命討之遂連姦鄰隂遣刺客來賊相臣方戰未利內驚京師羣公上言莫若惠來帝為不聞與神為謀乃相同德以訖天誅乃敕顔胤訴武古通咸統於𢎞各奏汝功三方分攻五萬其師大軍北乘厥數倍之常兵時曲軍士蠢蠢既剪陵雲蔡卒大窘勝之邵陵郾城來降自夏入秋復屯相望兵頓不勵告功不時帝哀征夫命相往釐士飽而歌馬騰於槽試之新城賊遇敗逃盡抽其有聚以防我西師躍入道無留者額額蔡城其疆千里既入而有莫不順俟帝有恩言相度來宣誅止其魁釋其下人蔡之卒夫投甲呼舞蔡之婦女迎門笑語蔡人告飢船粟往哺蔡人告寒賜以繒布始時蔡人禁不往來今相從戲里門夜開始時蔡人進戰退戮今旰而起左餐右粥為之擇人以收餘憊選吏賜牛教而不稅蔡人有言始迷不知今乃大覺羞前之為蔡人有言天子明聖不順族誅順保性命汝不吾信視此蔡方孰為不順往斧其吭凡叛有數聲勢相倚吾強不支汝弱奚恃其告而長而父而兄奔走偕來同我太平淮蔡為亂天子伐之既伐而飢天子活之始議伐蔡卿士莫隨既伐四年小大並疑不赦不疑由天子明凡此蔡功惟斷乃成既定淮蔡四夷畢來遂開明堂坐以治之唐宋八大家文鈔卷十一
