body:
  text: 唐宋八大家文鈔巻一百二明茅坤撰南豐文鈔六序送傳向老令瑞安序僅百餘言而搆思措辭種種入彀中有簡而文淡而不厭者向老傳氏山隂人與其兄元老讀書知道理其所為文辭可喜太夫人春秋高而其家故貧然向老昆弟尤自守不苟取而妄交太夫人亦忘其貧余得之山隂愛其自處之重而見其進而未止也特心與之向老用舉者令温之瑞安將奉其太夫人以往予謂向老學古其為令當知所先後然古之道葢無所用於今則向老之所守亦難合矣故為之言庶夫有知予為不妄者能以此而易彼也送丁琰序篇中所見逺而其行文轉調處似不免樸遬紆蹇之病故不英爽子固本色自在子固所為本色不足處亦在守令之於民近且重易知矣予嘗論今之守令有道而聞四方者不過數人此數人者非特任守令也過此數人有千里者相接而無一賢守有百里者相環而無一賢令至天子大臣嘗患其然則任奉法之吏嚴刺察之科以繩治之諸郡守縣令以罪不任職或黜或罷者相繼於外於是下詔書擇廷臣使各舉所知以任守令是天子大臣愛國與民而重守令之意可謂無不至矣而詔雖下舉者卒不聞惟令或以舊制舉不偕循歳月而授每舉者有姓名得而視之推考其材行能堪其舉者卒亦未見焉舉者既然矣則以余之所見聞隂計其人之孰可舉者卒亦未見焉猶恐余之愚且賤聞與見焉者少不足以知天下之材也則求夫賢而有名位聞與見之博者而從之問其人之孰可舉者卒亦未見焉豈天下之人固可誣而天固不生材於今哉使天子大臣患天下之弊則數更法以禦之法日以愈密而弊日以愈多豈今之去古也逺治天下卒無術哉葢古人之有庠有序有師友之游有有司之論而賞罰之始於鄉屬於天下為敎之詳至此也士也有聖人之道則皆得行其敎有可敎之質則皆可為材且良故古之賢也多賢之多則自公卿大夫至于牛羊倉廪賤官之選咸宜焉獨千里百里之長哉其為道豈不約且明其為致天下之材豈不多哉亦豈有勞於求而不得人密於法而不勝其弊若今之患哉今也庠序師友賞罰之法非古也士也有聖人之道欲推而敎於鄉於天下則無路焉人愚也則愚矣可敎而賢者卒誰敎之哉故今之賢也少賢之少則自公卿大夫至于牛羊倉廪賤官之選常不足其人焉獨守令哉是以其求之無不至其法日以愈宻而不足以為治者其原葢此之出也巳噫奚重而不更也姑蘇人丁君琰佐南城南城之政平予知其令令曰丁君之佐我又知其邑人邑人無不樂道之者予既患今之士而常慕古之人每觀良吏一傳則反覆愛之如丁君之信於其邑予於旁近邑之所未見故愛之特深今為令於淮隂上之人知其材而舉用之也於令也得人矣使丁君一推是心以往信於此有不信於彼哉求余文者多矣拒而莫之與也獨丁君之行也不求余文而余樂道其所常論者以送之以示重丁君且勉之且勉天下之凡為吏者也唐荆川曰南豐之文大抵入事以後與前半議論照應不甚謹嚴送周屯田序議論似屬典刑而文章烟波馳驟不足讀昌黎所送楊少尹致仕序天壤矣士大夫登朝廷年七十上書去其位天子官其一子而聴之亦可謂榮矣然而有若不釋然者余為之言曰古之士大夫倦而歸者安居几杖膳羞被服百物之珍好自若天子養以燕饗飲食鄉射之禮自比子弟袒韝􅀈􅛏以薦其物諮其辭說不於庠序則於朝廷時節之賜與縉紳之禮於其家者不以朝則以夕上之聴其休為不敢勤以事下之自老為無為而尊榮也今一日辭事返其廬徒御散矣賔客去矣百物之順其欲者不足人之羣嬉屬好之交不與約居而獨遊散弃乎山墟林莽僻巷窮閭之間如此其於長者薄也亦曷能使其不欿然於心邪雖然不及乎尊事可以委蛇其身而益閒不享乎珍好可以窒煩除薄而益安不去乎深山長谷豈不足以易其庠序之位不居其榮豈有患乎其辱哉然則古之所以殷勤奉老者皆世之任事者所自為於士之倦而歸者顧為煩且勞也今之置古事者顧有司為少耳士之老於其家者獨得其自肆也然則何為動其意邪余為之言者尚書屯田員外郎周君中復周君與先人俱天聖二年進士與余舊且好也既為之辨其不釋然者又欲其有以處而樂也讀余言者可無異周君而病今之失矣南豐曾鞏序送趙宏序余嘗按南越南越州郡吏特得威名者撫而制之無難者無巳則鵰其酋足矣今之請兵大征者皆非也荆民與蠻合為宼潭旁數州被其害天子宰相以潭重鎮守臣不勝任為改用人又不勝復改之守至上書乞益兵詔與撫兵三百殿直天水趙君希道實䕶以往希道雅與余接間過余道潭之事余曰潭山川甲兵如何食幾何賊衆寡强弱如何余不能知能知書耳書之載若潭事多矣或合數道之兵以數萬絶山谷而進其勢非不衆且健也然而卒殱焉者多矣或單車獨行然而以克者相踵焉顧其義信何如耳致吾義信雖單車獨行宼可以為無事龔遂張綱祝良之類是也義信不足以致之雖合數道之兵以數萬卒殱焉適重寇耳況致平耶楊旻裴行立之類是也則兵不能致平致平者在太守身也明矣前之守者果能此天子宰相烏用易之必易之為前之守者不能此也今往者復曰乞益兵何其與書之云者異耶子憂潭民之重困也寇之益張也往時潭吏與旁近郡靳力勝賊者暴骸者戮降者有之今之往者將特不為是而巳耶抑猶不免乎為是也天子宰相任之之意其然耶潭守近侍臣使撫覘潭者郎吏御史博士相望為我諗其賢者曰今之言古書往往曰迂然書之事乃巳試者也師巳試而施諸治與時人之自用孰為得失耶愚言倘可以平潭之患今雖細然大中咸通之間南方之憂嘗劇矣夫豈階於大哉為近臣郎吏御史博士者獨得而不思也希道固喜事者因其行遂次第其語以送之送江任序古來未有此調出子固所自為機軸均之為吏或中州之人用於荒邊側境山區海聚之間蠻夷異域之處或燕荆越蜀海外萬里之人用於中州以至四遐之鄉相易而往其山行水渉沙莽之馳往往則風霜氷雪瘴霧之毒之所侵加蛟龍虺蜴虎豹之羣之所抵觸衝波急洑隤崖落石之所覆壓其進也莫不羸糧舉藥選舟易馬力兵曹伍而後動戒朝奔夜變更寒暑而後至至則宮廬器械衣服飲食之具土風氣候之宜與夫人民風謡語言習尚之務其變難遵而其情難得也則多愁居惕處歎息而思歸及其乆也所習巳乆所蔽巳解則歳月有期可引而去矣故不得專一精思修治具以宣布天子及下之仁而為後世可守之法也或九州之人各用於其土不在西封在東境士不必勤舟車輿馬不必力而巳傳其邑都坐其堂奥道塗所次升降之倦衝冒之虞無有接於其形動於其慮至則耳目口鼻百體之所養如不出乎其家父兄六親故舊之人朝夕相見如不出乎其里山川之形土田市井風謡習俗辭說之變利害得失善惡之條貫非其童子之所聞則其少長之所遊覽非其自得則其鄉之先生老者之所告也所居巳安所有事之宜皆巳習熟如此能專慮致勤職事以宣上恩而修百姓之急其施為先後不待旁諮久察而與奪損益之幾巳斷於胸中矣豈累夫孤客逺寓之憂而以苟且決事哉臨川江君任為洪之豐城此兩縣者牛羊之牧相交樹木果蔬五榖之壟相入也所謂九州之人各用於其土者孰近於此既巳得其所處之樂而厭聞飫聴其人民之事而江君又有聰明敏給之材廉潔之行以行其政吾知其不去圖書詩論之適賔客之好而所為有餘矣葢縣之治則民自得於大山深谷之中而州以無為於上吾將見江西之幕府無南嚮而慮者矣於其行遂書以送之唐荆川曰此文作兩叚一叚言用于異鄉之難為治一叚言用于其土之易為治館閣送錢純老知婺州詩序文之典刑雍容雅頌熈寧三年三月尚書司封員外郎秘閣挍理錢君純老出為婺州三館秘閣同舍之士相與飲餞于城東佛舍之觀音院㑹者凡二十人純老亦重僚友之好而欲慰處者之思也乃為詩二十言以示坐者於是在席人各取其一言為韻賦詩以送之純老至州將刻之石而以書來曰為我序之葢朝廷常引天下儒學之士聚之館閣所以長養其材而待上之用有出使於外者則其僚必相告語擇都城之中廣宇豐堂游觀之勝約日皆會飲酒賦詩以敘去處之情而致綢繆之意歴世寢久以為故常其從容道義之樂葢他司所無而其賦詩之所稱引況諭莫不道去者之義祝其歸仕於王朝而欲其無久於外所以見士君子之風流習尚篤於相先非世俗之所能及又將待上之考信於此而以其彚進非空文而巳也純老以明經進士制策入等歴敎國子生入館閣為編挍書籍挍理撿討其文章學問有過人者宜在天子左右與訪問任獻納而顧請一州欲自試於川窮山阻僻絶之地其志節之高又非凡才所及此賦詩者所以推其賢惜其志殷勤反覆而不能巳余故為之序其大㫖以發明士大夫之公論而與同舍視之使知純老之非久於外也十月日序王遵岩曰治朝盛世文儒遭逢出入得意之氣象藹然篇中觀者不但可以想見其人而又可以知其時也贈黎安二生序子固作文之㫖與其所自任處並巳槩見可謂文之中尺度者也趙郡蘇軾余之同年友也自蜀以書至京師遺余稱蜀之士曰黎生安生者既而黎生攜其文數十萬言安生攜其文亦數千言辱以顧余讀其文誠閎壯雋偉善反覆馳騁窮盡事理而其材力之放縱若不可極者也二生固可謂魁奇特起之士而蘇君固可謂善知人者也頃之黎生補江陵府司法叅軍將行請余言以為贈余曰余之知生既得之於心矣迺將以言相求於外邪黎生曰生與安生之學於斯文里之人皆笑以為迂濶今求子之言葢將解惑於里人余聞之自顧而笑夫世之迂濶孰有甚於余乎知信乎古而不知合乎世知志乎道而不知同乎俗此余所以困於今而不自知也世之迂濶孰有甚於余乎今生之迂特以文不近俗迂之小者耳患為笑於里之人若余之迂大矣使生持吾言而歸且重得罪庸詎止於笑乎然則若余之於生將何言哉謂余之迂為善則其患若此謂為不善則有以合乎世必違乎古有以同乎俗必離乎道矣生其無急於解里人之惑則於是焉必能擇而取之遂書以贈二生并示蘇君以為何如也唐荆川曰議論謹密送蔡元振序才燄少宕特其所見亦有可取古之州從事皆自辟士士亦擇所從故賔主相得也如不得其志去之可也今之州從事皆命於朝非惟守不得擇士士亦不得擇所從賔主豈盡相得哉如不得其志未可以輒去也故守之治從事無為可也守之不治從事舉其政亦勢然也議者不原其勢以為州之政當一出於守從事舉其政則為立異為侵官噫從事可否其州事職也不惟其同守之同則舍巳之是而求與之同可乎不可也州為不治矣守不自任其責巳亦莫之任也可乎不可也則舉其政其孰為立異邪其孰為侵官邪議者未之思也雖然迹其所以然豈士之所喜然哉故曰亦勢然也今四方之從事惟其守之同者多矣幸而材從事眎其政之缺不過室於歎途於議而巳脫然莫以為巳事反是焉則激激亦奚以為也求能自任其責者少矣為從事乃爾為公卿大夫士於朝不爾者其幾邪臨川蔡君從事於汀始試其為政也汀誠為州治也蔡君可拱而坐也誠未治也人皆觀君也無激也無同也惟其義而巳矣蔡君之任也其異日官于朝一於是而巳矣亦蔡君之任也可不懋歟其行也來求吾文故序而送之唐荆川曰此文入題以後照應獨為謹密異于南豐諸文敘盗前半篇按圖次盜情本末如畫後半篇則又歸重於不忍刑之之意此子固之文所以動合典刑也而子固之讞獄詳悉處亦可具見矣盗三十人凡十五發繇孫僊而下盜吳慶船者殺人皆應斬盜朱縞船者贓重皆應絞凡應死者十有八人繇湯慶而下或贓輕或竊盜或嘗自言凡應徒者十有二人此有司之法也今圖之所見者其名氏稅等械器與其發之日月所盜之家所取之財至於人各别其凡若干發皆旁行以見之人各别其凡若干發者又别之以朱欲覽者之易曉也吳慶之船贓分為三與吳慶吳道之屬有親疎居有異同至於孫僊湯慶之族屬以及十二人之所以得不死者皆别見於圖之上下而獄之輕重詳矣其創作兵仗合衆以轉刼數百里之間至於賊殺良民此情狀之尤可嫉者也方五六月之時水之害甚矣田疇既以蕩溺矣屋廬既以漂流矣城郭之内糴官粟以賑民而猶有不得食者窮鄉僻壤大川長谷之間自中家以上日昃持錢無告糴之所況於躡所素困之人乎方且結草葦以自託於壞堤毁垾之上士有饑餓之迫無樂生之情其屢發而為盜亦情狀之可哀者也康誥曰殺越人于貨睯不畏死凡民罔不憝孟子以謂不待敎而誅者也是則殺人之盜不待敎而誅皆百王之所同而未有知其所始者也然而孔子曰天下有道盜其先變乎此謂養之既足導之既明則為盜者知恥而自新則非殺人之盜有待敎而誅此亦百王之所同而未有知其所始者也不待敎而誅者天下之所不得容也待敎而誅者俟之之道既盡矣然後可以責之備也苟為養之既有不足導之既有不明俟之之道既有不盡矣故凶年人食不足而有起為盜賊者天子嘗密下寛大之令許降其罪而此非有司之法也至殺人與贓重者亦不降有司之法存焉亦康誥之意也余當閱是獄故具列其本末情狀以覽觀焉以明余之於是盡心矣序越州鑑湖圖通篇點次鑑湖如天官家之次三垣五星二十八緯以及飛流疾伏無不擘畫如掌而又恐後之勢家或請為田而廢也於是又詳為辨覈叅駁曾公之文固雄而其經世之略亦概見矣鑑湖一曰南湖南並山北屬州城漕渠東西距江漢順帝永和五年會稽太守馬臻之所為也至今九百七十有五年矣其周三百五十有八里凡水之出於東南者皆委之州之東自城至于東江其北隄石楗二隂溝十有九通民田田之南屬漕渠北東西屬江者皆溉之州東六十里自東城至于東江其南隄隂溝十有四通民田田之北抵漕渠南並山西並隄東屬江者皆溉之州之西三十里曰柯山斗門通民田田之東並城南並隄北濵漕渠西屬江者皆溉之總之溉山隂會稽兩縣十四鄉之田九千頃非湖能溉田九千頃而巳葢田之至江者盡於九千頃也其東曰曹娥斗門曰槀口斗門水之循南隄而東者由之以入于東江其西曰廣陵斗門曰新逕斗門水之循北隄而西者由之以入于西江其北曰朱儲斗門去湖最遠葢因三江之上兩山之間疏為二門而以時視田中之水小溢則縱其一大溢則盡縱之使入于三江之口所謂湖高於田丈餘田又高海丈餘水少則泄湖溉田水多則泄田中水入海故無荒廢之田水旱之歳者也繇漢以來幾千載其利未嘗廢也宋興民始有盜湖為田者祥符之間二十七戸慶厯之間二戸為田四頃當是時三司轉運司猶下書切責州縣使復田為湖然自此吏益慢法而奸民浸起至於治平之間盜湖為田者凡八千餘戸為田七百餘頃而湖廢幾盡矣其僅存者東為漕渠自州至于東城六十里南通若耶溪自樵風涇至于桐隖十里皆水廣不能十餘丈每歳少雨田未病而湖葢巳先涸矣自此以來人爭為計說蔣堂則謂宜有罰以禁侵耕有賞以開告者杜杞則謂盜湖為田者利在縱湖水一雨則放聲以動州縣而斗門輒發故為之立石則水一在五雲橋水深八尺有五寸會稽主之一在跨湖橋水深四尺有五寸山隂主之而斗門之鑰使皆納于州水溢則遣官視則而謹其閉縱又以謂宜益理隄防斗門其敢田者㧞其苗責其力以復湖而重其罰猶以為未也又以謂宜加兩縣之長以提舉之名課其督察而為之殿賞吳奎則謂每歳農隙當僦人濬湖積其泥塗以為丘阜使縣主役而州與轉運使提㸃刑獄督攝賞罰之張次山則謂湖廢僅有存者難卒復宜益廣漕路及他便利處使可漕及注民田里置石柱以識之柱之内禁敢田者刁約則謂宜斥湖三之一與民為田而益隄使高一丈則湖可不開而其利自復范師道施元長則謂重侵耕之禁猶不能使民無犯而斥湖與民則侵者孰禦又以湖水較之高於城中之水或三尺有六寸或二尺有六寸而益隄壅水使高則水之敗城郭廬舍可必也張伯玉則謂日役五千人濬湖使至五尺當十五歳畢至三尺當九歳畢然恐工起之日浮議外揺役夫内潰則雖有智者猶不能必其成若日役五千人益隄使高八尺當一歳畢其竹木凡費九十二萬有三千計越之戸二十萬有六千賦之而復其租其勢易足如此則利可坐收而人不煩弊陳宗言趙誠復以水勢高下難之又以謂宜從吳奎之議以歳月復湖當是時都水善其言又以謂宜增賞罰之令其為說如此可謂博矣朝廷未嘗不聽用而著之於法故罰有自錢三百至於千又至於五萬刑有杖百至於徒二年其文可謂密矣然而田者不止而日愈多湖不加濬而日愈廢其故何哉法令不行而苟且之俗勝也昔謝靈運從宋文帝求會稽回踵湖為田太守孟顗不聴又求休崲湖為田顗乂不聴靈運至以語詆之則利於請湖為田越之風俗舊矣然南湖繇漢歴吳晉以來接于唐又接于錢鏐父子之有此州其利未嘗廢者彼或以區區之地當天下或以數州為鎮或以一國自王内有供養祿廪之須外有貢輸問饋之奉非得晏然而巳也故强水土之政以力本利農亦皆有數而錢鏐之法最詳至今尚多傳於人者則其利之不廢有以也近世則不然天下為一而安於承平之故在位者重舉事而樂因循而請湖為田者其言語氣力往往足以動人至於修水土之利則又費財動衆從古所難故鄭國之役以謂足以疲秦而西門豹之治鄴渠人亦以為煩苦其故如此則吾之吏孰肯任難當之怨來易至之責以待未然之功乎故說雖博而未嘗行法雖密而未嘗舉田者之所以日多湖之所以日廢繇是而巳故以為法令不行而苟且之俗勝者豈非然哉夫千歳之湖廢興利害較然易見然自慶厯以來三十餘年遭吏治之因循至於既廢而世猶莫寤其所以然況於事之隠微難得而考者繇苟簡之故而弛壞於冥冥之中又可知其所以然乎今謂湖不必復者曰湖田之入既饒矣此游談之士為利於侵耕者言之也夫湖未盡廢則湖下之田旱此方今之害而衆人之所覩也使湖盡廢則湖下之為田亦旱矣此將來之害而衆人所未覩者故曰此游談之士為利於侵耕者言之而非實知利害者也謂湖不必濬者曰益隄壅水而巳此好辯之士為樂聞苟簡者言之也夫以地勢較之壅水使高必敗城郭此議者之所巳言也以地勢較之濬湖使下然後不失其舊不失其舊然後不失其宜此議者之所未言也又山隂之石則為四尺有五寸會稽之石則幾倍之壅水使高則會稽得尺山隂得半地之隆不並則益隄未為有補也故曰此好辯之士為樂聞苟簡者言之而又非實知利害者也二者既不可用而欲禁侵耕開告者則有賞罰之法矣欲謹水之畜泄則有閉縱之法矣欲痛絶敢田者則㧞其苗責其力以復湖而重其罰又有法矣或欲任其責於州縣與運使提㸃刑獄或欲以每歳農隙濬湖或欲禁田石柱之内者又皆有法矣欲知濬湖之淺深用工若干為日幾何欲知增堤竹木之費幾何使之安出欲知濬湖之泥塗積之何所乂巳計之矣欲知工起之日或浮議外揺役夫内潰則不可以必其成又巳論之矣誠能收衆說而考其可否用其可者而以在我者潤澤之令言必行法必舉則何功之不可成何利之不可復哉鞏初蒙恩通判此州問湖之廢興於人求有能言利害之實者及到官然後問圖於兩縣問書於州與河渠司至於叅覈之而圖成熟究之而書具然後利害之實明故為論次庶夫計議者有考焉熈寧二年冬卧龍齋送李材叔知柳州序立意似淺然亦本人情而為之者錄之以為厭遊南粤者之勸談者謂南越偏且逺其風氣與中州異故官者皆不欲久居往往車船未行輒以屈指計歸日又咸小其官以為不足事其逆自為慮如此故其至皆傾揺解弛無憂且勤之心其習俗從古而爾不然何自越與中國通巳千餘年而名能撫循其民者不過數人邪故越與閩蜀始俱為夷閩蜀皆巳變而越獨尚陋豈其俗不可更與葢吏者莫致其治敎之意也意亦其民之不幸也巳彼不知繇京師而之越水陸之道皆安行非若閩溪峽江蜀棧之不測則均之吏於逺此非獨優歟其風氣吾所諳之與中州亦不甚異起居不違其節未嘗有疾苟違節雖中州寧能不生疾邪其物産之美果有荔子龍眼焦柑橄欖花有素馨山丹含笑之屬食有海之百物累歳之酒醋皆絶於天下人少鬬訟喜嬉樂吏者唯其無久居之心故謂之不可如其有久居之心奚不可邪古之人為一鄉一縣其徳義惠愛尚足以薰蒸漸澤今大者專州豈當小其官而不事邪令其得吾說而思之人咸有久居之心又不小其官為越人滌其陋俗而敺於治居閩蜀上無不幸之歎其事出千餘年之表則其美之巨細可知也然非其材之頴然邁於衆人者不能也官於南者多矣予知其材之頴然邁於衆人能行吾說者李材叔而巳材叔久與其兄公翊仕同年同用薦者為縣入秘書省為著作佐郎今材叔為柳州公翊為象州皆同時材又相若也則二州交相致其政其施之速勢之便可勝道也夫其越人之幸也夫其可賀也夫唐宋八大家文抄巻一百二
