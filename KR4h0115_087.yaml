body:
  text: 唐宋八大家文鈔巻八十一明茅坤撰臨川文鈔一上書上仁宗皇帝言事書荆公以王佐之學與王佐之才自任故其一生措注已盡於此書中所以結知主上亦全在此書中然其學本經術故所言非漢唐以來宰相所能見而其偏拗自用大較與商鞅所欲變法處相近故其功業亦遂大壊而反不如近世浮沉者之得學者須具千古隻眼看之此書幾萬餘言而其絲牽繩聨如提百萬之兵而鈎考部曲無一不貫臣愚不肖䝉恩備使一路今又䝉恩召還闕廷有所任屬而當以使事歸報陛下不自知其無以稱職而敢縁使事之所及冒言天下之事伏惟陛下詳思而擇其中幸甚臣竊觀陛下有恭儉之徳有聰明睿智之才夙興夜寐無一日之懈聲色狗馬觀遊玩好之事無纎介之蔽而仁民愛物之意孚於天下而又公選天下之所願以為輔相者屬之以事而不貳於讒邪傾巧之臣此雖二帝三王之用心不過如此而己宜其家給人足天下大治而效不至於此顧内則不能無以社稷為憂外則不能無懼於邉釁天下之財力日以困窮而風俗日以衰壞四方有志之士諰諰然常恐天下之乆不安此其故何也患在不知法度故也今朝廷法嚴令具無所不有而臣以謂無法度者何哉方今之法度多不合乎先王之政故也孟子曰有仁心仁聞而澤不加於百姓者為政不法於先王之道故也以孟子之說觀方今之失正在於此而已夫以今之世去先王之世逺所遭之變所遇之勢不一而欲一一修先王之政雖甚愚者猶知其難也然臣以謂今之失患在不法先王之政者以謂當法其意而己夫二帝三王相去葢千有餘載一治一亂其盛衰之時具矣其所遭之變所遇之勢亦各不同其施設之方亦皆殊而其為天下國家之意本末先後未嘗不同也臣故曰當法其意而已法其意則吾所改易更革不至乎傾駭天下之耳目囂天下之口而固已合乎先王之政矣雖然以方今之勢揆之陛下雖欲改易更革天下之事合於先王之意其勢必不能也陛下有恭儉之徳有聰明睿智之才有仁民愛物之意誠加之意則何為而不成何欲而不得然而臣顧以謂陛下雖欲改易更革天下之事合於先王之意其勢必不能者何也以方今天下之人才不足故也臣嘗試竊觀天下在位之人未有乏於此時者也夫人才乏於上則有沉廢伏匿在下而不為當時所知者矣臣又求之於閭巷草野之間而亦未見其多焉豈非陶冶而成之者非其道而然乎臣以謂方今在位之人才不足者以臣使事之所及則可知矣今以一路數千里之間能推行朝廷之法令知其所緩急而一切能使民以修其職事者甚少而不才茍簡貪鄙之人至不可勝數其能講先王之意以合當時之變者葢闔郡之間往往而絶也朝廷每一令下其意雖善在位者猶不能推行使膏澤加於民而吏輒縁之為姦以擾百姓臣故曰在位之人才不足而草野閭巷之間亦未見其多也夫人才不足則陛下雖欲改易更革天下之事以合先王之意大臣雖有能當陛下之意而欲領此者九州之大四海之逺孰能稱陛下之指以一一推行此而人人䝉其施者乎臣故曰其勢必未能也孟子曰徒法不能以自行非此之謂乎然則方今之急在於人才而己誠能使天下之才衆多然後在位之才可以擇其人而取足焉在位者得其才矣然後稍視時勢之可否而因人情之患苦變更天下之弊法以趨先王之意甚易也今之天下亦先王之天下先王之時人才嘗衆矣何至於今而獨不足乎故曰陶冶而成之者非其道故也商之時天下嘗大亂矣在位貪毒禍敗皆非其人及文王之起而天下之才嘗少矣當是時文王能陶冶天下之士而使之皆有士君子之才然後隨其才之所有而官使之詩曰豈弟君子遐不作人此之謂也及其成也微賤兔罝之人猶莫不好徳罝之詩是也又況於在位之人乎夫文王惟能如此故以征則服以守則治詩曰奉璋峨峨髦士攸宜又曰周王于邁六師及之言文王所用文武各得其才而無廢事也及至夷厲之亂天下之才又嘗少矣至宣王之起所與圖天下之事者仲山甫而巳故詩人歎之曰徳輶如毛維仲山甫舉之愛莫助之葢閔人士之少而山甫之無助也宣王能用仲山甫推其類以新美天下之士而後人才復衆於是内修政事外討不庭而復有文武之境土故詩人美之曰薄言采芑于彼新田于此菑畎言宣王能新美天下之士使之有可用之才如農夫新美其田而使之有可采之芑也由此觀之人之才未嘗不自人主陶冶而成之者也所謂陶冶而成之者何也亦教之養之取之任之有其道而己所謂教之之道何也古者天子諸侯自國至於鄉黨皆有學博置教導之官而嚴其選朝廷禮樂刑政之事皆在於學士所觀而習者皆先王之法言徳行治天下之意其材亦可以為天下國家之用茍不可以為天下國家之用則不教也茍可以為天下國家之用者則無不在於學此教之之道也所謂養之之道何也饒之以財約之以禮裁之以法也何謂饒之以財人之情不足於財則貪鄙茍得無所不至先王知其如此故其制祿自庶人之在官者其祿巳足以代其耕矣由此等而上之每有加焉使其足以養亷恥而離於貪鄙之行猶以為未也又推其祿以及其子孫謂之世祿使其生也既於父子兄弟妻子之養㛰姻朋友之接皆無憾矣其死也又於子孫無不足之憂焉何謂約之以禮人情足於財而無禮以節之則又放僻邪侈無所不至先王知其如此故為之制度㛰喪祭養燕享之事服食器用之物皆以命數為之節而齊之以律度量衡之法其命可以為之而財不足以具則弗具也其財可以具而命不得為之者不使有銖兩分寸之加焉何謂裁之以法先王於天下之士教之以道藝矣不帥教則待之以屏棄逺方終身不齒之法約之以禮矣不循禮則待之以流殺之法王制曰變衣服者其君流酒誥曰厥或誥曰羣飲汝勿佚盡執拘以歸于周予其殺夫羣飲變衣服小罪也流殺大刑也加小罪以大刑先王所以忍而不疑者以為不如是不足以一天下之俗而成吾治夫約之以禮裁之以法天下所以服從無抵冒者又非獨其禁嚴而治察之所能致也葢亦以吾至誠懇惻之心力行而為之倡凡在左右通貴之人皆順上之欲而服行之有一不帥者法之加必自此始夫上以至誠行之而貴者知避上之所惡矣則天下之不罰而止者衆矣故曰此養之之道也所謂取之之道者何也先王之取人也必於鄉黨必於庠序使衆人推其所謂賢能書之以告于上而察之誠賢能也然後隨其徳之大小才之高下而官使之所謂察之者非專用耳目之聰明而聽私於一人之口也欲審知其徳問以行欲審知其才問以言得其言行則試之以事所謂察之者試之以事是也雖堯之用舜亦不過如此而己又況其下乎若夫九州之大四海之逺萬官億醜之賤所須士大夫之才則衆矣有天下者又不可以一一自察之也又不可以偏屬於一人而使之於一日二日之間考試其行能而進退之也葢吾己能察其才行之大者以為大官矣因使之取其類以持乆試之而考其能者以告于上而後以爵命祿秩予之而巳此取之之道也所謂任之之道者何也人之才徳高下厚薄不同其所任有宜有不宜先王知其如此故知農者以為后稷知工者以為共工其徳厚而才高者以為之長徳薄而才下者以為之佐屬又以乆於其職則上狃習而知其事下服馴而安其教賢者則其功可以至於成不肖者則其罪可以至於著故乆其任而待之以考績之法夫如此故智能才力之士則得盡其智以赴功而不患其事之不終其功之不就也偷惰茍且之人雖欲取容於一時而顧僇辱在其後安敢不勉乎若夫無能之人固知辭避而去矣居職任事之日乆不勝任之罪不可以幸而免故也彼且不敢冒而知辭避矣尚何有比周纔諂争進之人乎取之既己詳使之既己當處之既已乆至其任之也又專焉而不一一以法束縛之而使之得行其意堯舜之所以理百官而熈衆工者以此而己書曰三載考績三考黜陟幽明此之謂也然堯舜之時其所黜者則聞之矣葢四凶是也其所陟者則臯陶稷契皆終身一官而不徙葢其所謂陟者特加之爵命祿賜而已耳此任之之道也夫教之養之取之任之之道如此而當時人君又能與其大臣悉其耳目心力至誠惻怛思念而行之此其人臣之所以無疑而於天下國家之事無所欲為而不得也方今州縣雖有學取牆壁具而已非有教導之官長育人才之事也唯太學有教導之官而亦未嘗嚴其選朝廷禮樂刑政之事未嘗在於學學者亦漠然自以禮樂刑政為有司之事而非己所當知也學者之所教講說章句而己講說章句固非古者教人之道也近嵗乃始教之以課試之文章夫課試之文章非博誦强學窮日之力則不能及其能工也大則不足以用天下國家小則不足以為天下國家之用故雖白首於庠序窮日之力以帥上之教及使之從政則茫然不知其方者皆是也葢今之教者非特不能成人之材而己又從而困苦毁壞之使不得成材者何也夫人之才成於專而毁於雜故先王之處民才處工於官府處農於畎畝處商賈於肆而處士於庠序使各專其業而不見異物懼異物之足以害其業也所謂士者又非特使之不得見異物而己一示之以先王之道而百家諸子之異說皆屏之而莫敢習者焉今士之所宜學者天下國家之用也今悉使置之不教而教之以課試之文章使其耗精疲神窮日之力以從事於此及其任之以官也則又悉使置之而責之以天下國家之事夫古之人以朝夕專其業於天下國家之事而猶才有能有不能今乃移其精神奪其日力以朝夕從事於無補之學及其任之以事然後卒然責之以為天下國家之用宜其才之足以有為者少矣臣故曰非特不能成人之才又從而困苦毁壞之使不得成才也又有甚害者先王之時士之所學者文武之道也士之才有可以為公卿大夫有可以為士其才之大小宜不宜則有矣至於武事則隨其才之大小未有不學者也故其大者居則為六官之卿出則為六軍之將也其次則比閭族黨之師亦皆卒伍師旅之帥也故邊疆宿衛皆得士大夫為之而小人不得奸其任今之學者以為文武異事吾知治文事而已至於邊疆宿衛之任則推而屬之於卒伍往往天下姦悍無賴之人茍其才行足自託於鄉里者亦未有肯去親戚而從召募者也邊疆宿衛此乃天下之重任而人主之所當慎重者也故古者教士以射御為急其他技能則視其人才之所宜而後教之其才之所不能則不强也至於射則為男子之事人之生有疾則已茍無疾未有去射而不學者也在庠序之間固當從事於射也有賓客之事則以射有祭祀之事則以射别士之行同能偶則以射於禮樂之事未嘗不寓以射而射亦未嘗不在於禮樂祭祀之間也易曰弧矢之利以威天下先王豈以射為可以習揖讓之儀而已乎固以為射者武事之尤大而威天下守國家之具也居則以是習禮樂出則以是從戰伐士既朝夕從事於此而能者衆則邊疆宿衛之任皆可以擇而取也夫士嘗學先王之道其行義嘗見推於鄉黨矣然後因其才而託之以邊疆宿衛之事此古之人君所以推干戈以屬之人而無内外之虞也今乃以夫天下之重任人主所當至慎之選推而屬之姦悍無賴才行不足自託於鄉里之人此方今所以諰諰然常抱邊疆之憂而虞宿衛之不足恃以為安也今孰不知邊疆宿衛之士不足恃以為安哉顧以為天下學士以執兵為恥而亦未有能騎射行陣之事者則非召募之卒伍孰能任其事者乎夫不嚴其教高其選則士之以執兵為恥而未嘗有能騎射行陣之事固其理也凡此皆教之非其道故也方今制祿大抵皆薄自非朝廷侍從之列食口稍衆未有不兼農商之利而能充其養者也其下州縣之吏一月所得多者錢八九千少者四五千以守選待除守闕通之葢六七年而後得三年之祿計一月所得乃實不能四五千少者乃實不能及三四千而已雖厮養之給亦窘於此矣而其養生喪死㛰姻葬送之事皆當於此夫出中人之上者雖窮而不失為君子出中人之下者雖泰而不失為小人唯中人不然窮則為小人泰則為君子計天下之士出中人之上下者千百而無十一窮而為小人泰而為君子者則天下皆是也先王以為衆不可以力勝也故制行不以已而以中人為制所以因其欲而利道之以為中人之所能守則其志可以行乎天下而推之後世以今之制禄而欲士之無毁廉恥葢中人之所不能也故今官大者往往交賂遺營貲産以負貪汙之毁官小者敗鬻乞丐無所不為夫士已嘗毁廉恥以負累於世矣則其偷惰取容之意起而矜奮自强之心息則職業安得而不弛治道何從而興乎又況委法受賂侵牟百姓者往往而是也此所謂不能饒之以財也㛰喪奉養服食器用之物皆無制度以為之節而天下以奢為榮以儉為恥茍其財之可以具則無所為而不得有司既不禁而人又以此為榮茍其財不足而不能自稱於流俗則其㛰喪之際往往得罪於族人親姻而人以為恥矣故富者貪而不知止貧者則强勉其不足以追之此士之所以重困而廉恥之心毁也凡此所謂不能約之以禮也方今陛下躬行儉約以率天下此左右通貴之臣所親見然而其閨門之内奢靡無節犯上之所惡以傷天下之教者有巳甚者矣未聞朝廷有所放絀以示天下昔周之人拘羣飲而被之以殺刑者以為酒之末流生害有至於死者衆矣故重禁其禍之所自生重禁禍之所自生故其施刑極省而人之抵於禍敗者少矣今朝廷之法所尤重者獨貪吏耳重禁貪吏而輕奢靡之法此所謂禁其末而弛其本然而世之識者以為方今官冗而縣官財用已不足以供之其亦蔽於理矣今之入官誠冗矣然而前世置員葢甚少而賦祿又如此之薄則財用之所不足葢亦有說矣吏祿豈足計哉臣於財利固未嘗學然竊觀前世治財之大略矣葢因天下之力以生天下之財取天下之財以供天下之費自古治世未嘗以不足為天下之公患也患在治財無其道耳今天下不見兵革之具而元元安土樂業各致已力以生天下之財然而公私常以困窮為患者殆以理財未得其道而有司不能度世之宜而通其變耳誠能理財以其道而通其變臣雖愚固知増吏祿不足以傷經費也方今法嚴令具所以羅天下之士可謂密矣然而亦嘗教之以道藝而有不帥教之刑以待之乎亦嘗約之以制度而有不循理之刑以待之乎亦嘗任之以職事而有不任事之刑以待之乎夫不先教之以道藝誠不可以誅其不帥教不先約之以制度誠不可以誅其不循理不先任之以職事誠不可以誅其不任事此三者先王之法所尤急也今皆不可得誅而薄物細故非害治之急者為之法禁月異而嵗不同為吏者至於不可勝記又況能一一避之而無犯者乎此法令所以玩而不行小人有幸而免者君子有不幸而及者焉此所謂不能裁之以刑也凡此皆治之非其道也方今取士强記博誦而畧通於文辭謂之茂才異等賢良方正茂才異等賢良方正者公卿之選也記不必强誦不必博畧通於文辭而又嘗學詩賦則謂之進士進士之高者亦公卿之選也夫此二科所得之技能不足以為公卿不待論而後可知而世之議者乃以為吾常以此取天下之士而才之可以為公卿者常出於此不必法古之取人而後得士也其亦蔽於理矣先王之時盡所以取人之道猶懼賢者之難進而不肖者之雜於其間也今悉廢先王所以取士之道而毆天下之才士悉使為賢良進士則士之才可以為公卿者固宜為賢良進士而賢良進士亦固宜有時而得才之可以為公卿者也然而不肖者茍能雕蟲篆刻之學以此進至乎公卿才之可以為公卿者困於無補之學而以此絀死於嵓野葢十八九矣夫古之人有天下者其所以慎擇者公卿而已公卿既得其人因使推其類以聚於朝廷則百司庶物無不得其人也今使不肖之人幸而至乎公卿因得推其類聚之朝廷此朝廷所以多不肖之人而雖有賢智往往困於無助不得行其意也且公卿之不肖既推其類以聚於朝廷朝廷之不肖又推其類以備四方之任使四方之任使者又各推其不肖以布於州郡則雖有同罪舉官之科豈足恃哉適足以為不肖者之資而已其次九經五經學究明法之科朝廷固已嘗患其無用於世而稍責之以大義矣然大義之所得未有以賢於故也今朝廷又開明經之選以進經術之士然明經之所取亦記誦而畧通於文辭者則得之矣彼通先王之意而可以施於天下國家之用者顧未必得與於此選也其次則恩澤子弟庠序不教之以道藝官司不考問其才能父兄不保任其行義而朝廷輙以官予之而任之以事武王數紂之罪則曰官人以世夫官人以世而不計其才行此乃紂之所以亂亡之道而治世之所無也又其次曰流外朝廷固己擠之於廉恥之外而限其進取之路矣顧屬之以州縣之事使之臨士民之上豈所謂以賢治不肖者乎以臣使事之所及一路數千里之間州縣之吏出於流外者往往而有可屬任以事者殆無二三而當防閑其姦者皆是也葢古者有賢不肖之分而無流品之别故孔子之聖而嘗為季氏吏葢雖為吏而亦不害其為公卿及後世有流品之别則凡在流外者其所成立固嘗自置於廉恥之外而無高人之意矣夫以近世風俗之流靡自雖士大夫之才勢足以進取而朝廷嘗奬之以禮義者晚節末路往往怵而為姦況又其素所成立無高人之意而朝廷固已擠之於廉恥之外限其進取者乎其臨人親職放僻邪侈固其理也至於邊疆宿衛之選則臣固己言其失矣凡此皆取之非其道也方今取之既不以其道至於任之又不問其徳之所宜而問其出身之後先不論其才之稱否而論其厯任之多少以文學進者且使之治財己使之治財矣又轉而使之典獄已使之典獄矣又轉而使之治禮是則一人之身而責之以百官之所能備宜其人才之難為也夫責人以其所難為則人之能為者少矣人之能為者少則相率而不為故使之典禮未嘗以不知禮為憂以今之典禮者未嘗學禮故也使之典獄未嘗以不知獄為恥以今之典獄者未嘗學獄故也天下之人亦已漸漬於失教被服於成俗見朝廷有所任使非其資序則相議而訕之至於任使之不當其才未嘗有非之者也且在位者數徙則不得乆於其官故上不能狃習而知其事下不肻服馴而安其教賢者則其功不可以及於成不肖者則其罪不可以至於著若夫迎新將故之勞緣絶簿書之弊固其害之小者不足悉數也設官大抵皆當乆於其任而至於所部者逺所任者重則尤宜乆於其官而後可以責其有為而方今尤不得乆於其官往往數日輙遷之矣取之既己不詳使之既巳不當處之既已不乆至於任之則又不專而又一一以法束縛之不得行其意臣故知當今在位多非其人稍假借之權而不一一以法束縛之則放恣而無不為雖然在位非其人而恃法以為治自古及今未有能治者也即使在位皆得其人矣而一一以法束縛之不使之得行其意亦自古及今未有能治者也夫取之既巳不詳使之既巳不當處之既已不乆任之又不專而又一一以法束縛之故雖賢者在位能者在職與不肖而無能者殆無以異夫如此故朝廷明知其賢能足以任事茍非其資序則不以任事而輙進之雖進之士猶不服也明知其無能而不肖茍非有罪為在事者所劾不敢以其不勝任而輙退之雖退之士猶不服也彼誠不肖無能然而士不服者何也以所謂賢能者任其事與不肖而無能者亦無以異故也臣前以謂不能任人以職事而無不任事之刑以待之者葢謂此也夫教之養之取之任之有一非其道則足以敗天下之人才又況兼此四者而有之則在位不才茍簡貪鄙之人至於不可勝數而草野閭巷之間亦少可任之才固不足怪詩曰國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼泉流無淪胥以敗此之謂也夫在位之人才不足矣而閭巷草野之間亦少可用之才則豈特行先王之政而不得也社稷之託封疆之守陛下其能乆以天幸為常而無一旦之憂乎葢漢之張角三十六萬同日而起所在郡國莫能發其謀唐之黃巢横行天下而所至將吏無敢與之抗者漢唐之所以亡禍自此始唐既亡矣陵夷以至五代而武夫用事賢者伏匿消沮而不見在位無復有知君臣之義上下之禮者也當是之時變置社稷葢甚於奕碁之易而元元肝腦塗地幸而不轉死於溝壑者無幾耳夫人才不足其患葢如此而方今公卿大夫莫肻為陛下長慮後顧為宗廟萬世計臣竊惑之昔晉武帝趣過目前而不為子孫長逺之謀當時在位亦皆偷合茍容而風俗蕩然棄禮義捐法制上下同失莫以為非有識固知其將必亂矣而其後果海内大擾中國僅有江左者二百餘年伏惟三廟祖宗神靈所以付屬陛下固將為萬世血食而大庇元元於無窮也臣願陛下鑒漢唐五代之所以亂亡懲晉武茍且因循之禍明詔大臣思所以陶成天下之才慮之以謀計之以數為之以漸期為合於當世之變而無負於先王之意則天下之人才不勝用矣人才不勝用則陛下何求而不得何欲而不成哉夫慮之以謀計之以數為之以漸則成天下之才甚易也臣始讀孟子見孟子言王政之易行心則以為誠然及見與慎子論齊魯之地以為先王之制國大抵不過百里者以為今有王者起則凡諸侯之地或千里或五百里皆將損之至於數十百里而後止於是疑孟子雖賢其仁智足以一天下亦安能毋刼之以兵革而使數百千里之强國一旦肻損其地之十八九比於先王之諸侯至其後觀漢武帝用主父偃之䇿令諸侯王地悉得推恩封其子弟而漢親臨定其號名輒别屬漢於是諸侯王之子弟各有分土而勢强地大者卒以分析弱小然後知慮之以謀計之以數為之以漸則大者固可使小强者固可使弱而不至乎傾駭變亂敗傷之釁孟子之言不為過又況今欲改易更革其勢非若孟子所為之難也臣故曰慮之以謀計之以數為之以漸則其為甚易也然先王之為天下不患人之不為而患人之不能不患人之不能而患巳之不勉何謂不患人之不為而患人之不能人之情所願得者善行美名尊爵厚利也而先王能操之以臨天下之士天下之士有能遵之以治者則悉以其所願得者以與之士不能則已矣茍能則孰肻舍其所願得而不自勉以為才故曰不患人之不為患人之不能何謂不患人之不能而患已之不勉先王之法所以待人者盡矣自非下愚不可移之才未有不能赴者也然而不謀之以至誠惻怛之心力行而先之未有能以至誠惻怛之心力行而應之者也故曰不患人之不能而患己之不勉陛下誠有意乎成天下之才則臣願陛下勉之而已臣又觀朝廷異時欲有所施為變革其始計利害未嘗熟也顧有一流俗僥倖之人不悅而非之則遂止而不敢夫法度立則人無獨䝉其幸者故先王之政雖足以利天下而當其承弊壞之後僥倖之時其剏法立制未嘗不艱難也以其剏法立制而天下僥倖之人亦順悅以趨之無有齟齬則先王之法至今存而不廢矣惟其剏法立制之艱難而僥倖之人不肻順悅而趨之故古之人欲有所為未嘗不先之以征誅而後得其意詩曰是伐是肆是絶是忽四方以無拂此言文王先征誅而後得意於天下也夫先王欲立法度以變衰壞之俗而成人之才雖有征誅之難猶忍而為之以為不若是不可以有為也及至孔子以匹夫遊諸侯所至則使其君臣捐所習逆所順强所劣憧憧如也卒困於排逐然孔子亦終不為之變以為不如是不可以有為此其所守葢與文王同意夫在上之聖人莫如文王在下之聖人莫如孔子而欲有所施為變革則其事葢如此矣今有天下之勢居先王之位剏立法制非有征誅之難也雖有僥倖之人不悅而非之固不勝天下順悅之人衆也然而一有流俗僥倖不悅之言則遂止而不敢為者惑也陛下誠有意乎成天下之才則臣又願斷之而已夫慮之以謀計之以數為之以漸而又勉之以成斷之以果然而猶不能成天下之才則以臣所聞葢未有也然臣之所稱流俗之所不講而今之議者以謂迂闊而熟爛者也竊觀近世士大夫所欲悉心力耳目以補助朝廷者有矣彼其意非一切利害則以為當世所能行者士大夫既以此希世而朝廷所取於天下之士亦不過如此至於大倫大法禮義之際先王之所力學而守者葢不及也一有及此則羣聚而笑之以為迂闊今朝廷悉心於一切之利害有司法令於刀筆之間非一日也然其效可觀矣則夫所謂迂闊而熟爛者惟陛下亦可以少留神而察之矣昔唐太宗貞觀之初人人異論如封徳彛之徒皆以為非雜用秦漢之政不足以為天下能思先王之事開太宗者魏文正公一人爾其所施設雖未能盡當先王之意抑其大畧可謂合矣故能以數年之間而天下幾致刑措中國安寧蠻夷順服自三王以來未有如此盛時也唐太宗之初天下之俗猶今之世也魏文正公之言固當時所謂迂闊而熟爛者也然其效如此賈誼曰今或言徳教之不如法令胡不引商周秦漢以觀之然則唐太宗之事亦足以觀矣臣幸以職事歸報陛下不自知其駑下無以稱職而敢及國家之大體者以臣䝉陛下任使而當歸報竊謂在位之人才不足而無以稱朝廷任使之意而朝廷所以任使天下之士者或非其理而士不得盡其才此亦臣使事之所及而陛下之所宜先聞者也釋此不言而毛舉利害之一二以汙陛下之聰明而終無補於世則非臣所以事陛下惓惓之義也伏惟陛下詳思而擇其中天下幸甚唐宋八大家文鈔巻八十一
