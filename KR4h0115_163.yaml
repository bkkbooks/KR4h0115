body:
  text: 唐宋八大家文鈔卷一百四十九明茅坤撰潁濱文鈔五書啓上樞密韓太尉書胸次博大太尉執事轍生好為文思之至深以為文者氣之所形然文不可以學而能氣可以養而致孟子曰我善養吾浩然之氣今觀其文章寬厚宏博充乎天地之間稱其氣之小大太史公行天下周覽四海名山大川與燕趙間豪俊交游故其文疏蕩頗有竒氣此二子者豈嘗執筆學為如此之文哉其氣充乎其中而溢乎其貌動乎其言而見乎其文而不自知也轍生十有九年矣其居家所與游者不過其鄰里鄉黨之人所見不過數百里之間無髙山大野可登覽以自廣百氏之書雖無所不讀然皆古人之陳迹不足以激發其志氣恐遂汨沒故决然捨去求天下竒聞壯觀以知天地之廣大過秦漢之故都恣觀終南嵩華之髙北顧黃河之奔流慨然想見古之豪傑至京師仰觀天子宫闕之壯與倉廪府庫城池苑囿之富且大也而後知天下之巨麗見翰林歐陽公聽其議論之宏辨觀其容貌之秀偉與其門人賢士大夫游而後知天下之文章聚乎此也太尉以才略冠天下天下之所恃以無憂四夷之所憚以不敢發入則周公召公出則方叔召虎而轍也未之見焉且夫人之學也不志其大雖多而何為轍之來也於山見終南嵩華之髙於水見黃河之大且深於人見歐陽公而猶以為未見太尉也故願得觀賢人之光耀聞一言以自壯然後可以盡天下之大觀而無憾矣轍年少未能通習吏事響之來非有取於斗升之祿偶然得之非其所樂然幸得賜歸待選使得優游數年之間將歸益治其文且學為政太尉茍以為可教而辱教之又幸矣上兩制諸公書覽其文如廣陵之濤砰礚洶悍而不可制然其骨理少切譬之揮斤成風特屬耀眼轍讀書至於諸子百家紛紜同異之辨後世工巧組繡鑽研離析之學蓋嘗喟然太息以為聖人之道譬如山海藪澤之奧人之入於其中者莫不皆得其所欲充足飽滿各自以為有餘而無慕乎其外今夫班輸共工旦而操斧斤以遊其叢林取其大者以為楹小者以為桷圓者以為輪挺者以為軸長者擾雲霓短者蔽牛馬大者擁丘陵小者伏榛莽芟夷蹶取皆自以為盡山林之竒怪矣而獵夫漁師結網聚餌左彊弓右毒矢陸死則斃象犀水伐則執蛟鱓熊羆虎豹之皮毛黿龜犀兕之骨革上盡飛鳥下及走獸昆蟲之類紛紛籍籍折翅捩足鱗鬛委頓縱橫滿前肉登鼎俎膏潤砧几皮革齒骨披裂四出被於器用求珠之工隋侯夜光間以纇玭磊落的皪充滿其家求金之工輝赫晃蕩鏗鏘交戛遍為天下冠冕佩帶飲食之飾此數者皆自以為能盡山海之珍然山海之藏終滿而莫見其盡昔者夫子及其生而從之遊者蓋三千餘人是三千人者莫不皆有得於其師是以從之周旋奔走逐於宋魯飢餓於陳蔡困厄而莫有去之者是誠有得乎爾也蓋顔淵見於夫子出而告人曰吾能知之子路子貢冉有出而告人亦曰吾知之下而至於邽巽孔忠公西輿公西針此數子者門人之下第者也竊窺於道德之光華而有聞於議論之末皆以自得于一世其後田子方段干木之徒講之不詳乃竊以為虛無淡泊之說而吳起禽滑釐之類又以猖狂於戰國蓋夫子之道分散四布後之人得其遺波餘澤者至於如此而楊朱墨翟莊周鄒衍田駢慎到韓非申不害之徒又不見夫子之大道皇皇惑亂譬如陷於大澤之陂荆榛棘茨蹊隧滅絶求以自致於通衢而不可得乃妄冒蒺藜蹈崖谷﨑嶇繚繞而不能自止何者彼亦自以為巳之得之也轍嘗怪古之聖人既巳知之矣而不遂以明告天下而著之六經六經之說皆微見其端而非所以破天下之疑惑使之一見而寤者是以世之君子紛紛至此而不可執也今夫易者聖人之所以盡天下剛柔喜怒之情勇敢畏懼之性而寓之八物因八物之相遇吉凶得失之際以教天下之趨利避害蓋亦如是而巳而世之說者王氏韓氏至以老子之虛無京房焦貢至以陰陽災異之數言詩者不言咏歌勤苦酒食燕樂之際極歡極戚而不違於道而言五際子午卯酉之事言書者不言其君臣之歡吁俞嗟嘆有以深感天下而論其魯誓秦誓之不當作也夫孔子豈不知後世之至此極與其意以為後之學者無所據依感發以自盡其才是以設為六經而使之求之蓋又欲其深思而得之也是以不為明著其說使天下各以其所長而求之故曰仁者見之謂之仁智者見之謂之智而子貢亦曰在人賢者識其大者不賢者識其小者夫使仁者效其仁智者效其智大者推明其大而不遺其小小者樂致其小以自附於大各因其才而盡其力以求其至微至密之地則天下將有終身於其說而無倦者矣至於後世不明其意患乎異說之多而學者之難明也於是舉聖人之微言而折之以一人之私意而傳疏之學橫放於天下由是學者愈怠而聖人之說益以不明今夫使天下之人因說者之異同得以縱觀博覽而辨其是非論其可否推其精粗而後至於微密之際則講之當益深守之當益固孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原故君子欲其自得之也昔者轍之始學也得一書伏而讀之不求其博而惟其書之知求之而莫得則反覆而思之至於終日而莫見而後退而求其傳何者懼其入於心之易而守之不堅也及既長乃觀百家之書縱橫顚倒可喜可愕無所不讀泛然無所適從蓋晚而讀孟子而後遍觀乎百家而不亂也而世之言者曰學者不可以讀天下之雜說不幸而見之則小道異術將乘間而入於其中雖揚雄尚然曰吾不觀非聖之書以為世之賢人所以自養其心者如人之弱子幼弟不當出而置之於紛華雜擾之地此何其不思之甚也古之所謂知道者邪詞入之而不能蕩詖詞犯之而不能詐爵祿不能使之驕貧賤不能使之辱如使深居自閉於閨闥之中几然頽然而曰知道知道云者此乃所謂腐儒者也古者伯夷隘柳下惠不恭隘與不恭是君子之所不為也而孔子曰伯夷叔齊不降其志不辱其身柳下惠少連降志而辱身言中倫行中慮虞仲夷逸隱居放言身中清廢中權而我則異於是無可無不可夫伯夷柳下惠是君子之所不為而不棄於孔子此孟子所謂孔子集大成者也至於孟子惡鄉原之敗俗而知於陵仲子之不可常也美禹稷之汲汲於天下而知顔氏之自樂之非固也知天下之諸侯其所取之為盜而知王者之不必盡誅也知賢者之不可召而知召之役之為義也故士之言學者皆曰孔孟何者以其知道而已今轍山林之匹夫其才術技藝無以大過於中人而何敢自附於孟子然其所以泛觀天下之異說三代以來興亡治亂之際而皎然其有以折之者蓋其學出於孟子而不可誣也今年春天子將求直言之士而轍適來調官京師舍人楊公不知其不肖取其鄙野之文五十篇而薦之俾與明詔之末伏惟執事方今之偉人而朝之名卿也其德業之所服聲華之所耀孰不欲一見以效薄技於左右夫其五十篇之文從中而下則執事亦既見之矣是以不敢復以為獻姑述其所以為學之道而執事試觀焉上劉長安書氣岸自别劉長安恐不得不斂袵自謝轍聞之物之所受於天者異則其自處必髙自處既髙則必躍然有所不合於世俗蓋猛虎處於深山向風長鳴則百獸震恐而不敢出松柏生於髙岡散柯布葉而草木為之不殖非吾則爾拒而爾則不吾抗也故夫才不同則無朋而勢遠絶則失衆才高者身之纍也勢異者衆之棄也昔者伯夷叔齊巳嘗試之矣與其鄉人立以其冠之不正也舍而去之夫以其冠之不正也舍之而去則天下無乃無可與共處者耶舉天下而無可與共處則是其勢豈可以久也茍其勢不可以久則吾無乃亦將病之與其病而後反也不若其素與之之為善也伯夷叔齊惟其往而不反是以為天下之棄人也以伯夷之不吾屑而棄伯夷者是固天下之罪矣而以吾之潔清而不屑天下是伯夷亦有過耳古語有之曰大辨若訥大巧若拙何者懼天下之以吾辨而以辨乘我以吾巧而以巧困我故以拙養巧以訥養辨此又非獨善保身也亦將以使天下之不吾忌而其道可長久也今夫天下之士轍巳略觀之矣於此有所不足則於彼有所長於此有所蔽則於彼有所見其勢然矣仄聞執事之風明俊雄辨天下無有敵者而高亮剛果士之進於前者莫不振栗而自失退而仰望才業之輝光莫不逡巡而自愧蓋天下之士巳大服矣而轍願執事有以少下之使天下樂進於前而無恐而轍亦得進見左右以聽議論之末幸甚幸甚上昭文富丞相書子由所托諷富公處全在任人與篇末萬全之過四字轍西蜀之人行年二十有二幸得天子一命之爵飢寒窮困之憂不至於心其身又無力役勞苦之患其所任職不過簿書米鹽之間而且未獲從事以得自盡方其閒居不勝思慮之多不忍自棄以為天子寬惠與天下無所忌諱而轍不於其强壯閒暇之時早有所發明以自致其志而復何事恭惟天子設制策之科將以待天下豪俊魁礨之人是以轍不自量而自與於此蓋天下之事上自三王以來以至於今世其所論述亦巳略備矣而猶有所不釋於心夫古之帝王豈必多才而自為之為之有要而居之有道是故以漢高皇帝之恢廓慢易而足以吞項氏之彊漢文皇帝之寬厚長者而足以服天下之姦詐何者任人而人為之用也是以不勞而功成至於武帝材力有餘聰明睿智過於髙文然而施之天下時有所折而不遂何者不委之人而自為用也由此觀之則夫天子之責亦在任人而己竊惟當今天下之人其所謂有才而可大用者非明公而誰推之公卿之間而最為有功列之士民之上而最為有德播之夷狄之域而最為有勇是三者亦非明公而誰而明公實為宰相則夫吾君之所以為君之事蓋巳畢矣古之聖人髙拱無為而望夫百世之後以為明主賢君者蓋亦如是而可也然而天下之未治則果誰耶不而求之郡縣之吏則曰非我能上而求之朝廷百官則曰非我責明公之立於此也其乂將何辭嗟夫蓋亦嘗有以秦越人之事說明公者歟昔者秦越人以醫聞天下天下之人皆以越人為命越人不在則有病而死者莫不自以為吾病之非真病而死之非真死也他日有病者焉遇越人而屬之曰吾捐身以豫子子自為子之才治之而無為我治之也越人曰嗟夫難哉夫子之病雖不至於死而難以愈急治之則傷子之四肢而緩治之則勞苦而不肯去吾非不能去也而畏是二者夫傷子之四肢而後可以除子之病則天下以我為不工而病之不去則天下以我為非醫此二者所以交戰於吾心而不釋也既而見其人其人曰夫子則知醫之醫而未知非醫之醫歟今夫非醫之醫者有所冒行而不顧是以能應變於無窮今子守法密微而用意於萬全者則是子猶知醫之醫而已天下之事急之則喪緩之則得而過緩則無及孔子曰道之難行也我知之矣知者過之不肖者不及也夫天下患於不知而又有知而過之者則是道之果難行也昔者世之賢人患夫世之愛其爵祿而不忍以其身嘗試於艱難也故其上之人奮不顧身以搏天下之公利而忘其私在下者亦不敢自愛叫號紛呶以攻訐其上之短是二者可謂賢於天下之士矣而猶未免為不知何者不知自安其身之為安天下之人自重其發之為重君子之勢而輕用之於尋常之事則是猶匹夫之亮耳伏自明公執政於今五年天下不聞慷慨激烈之名而日聞敦厚之聲意者明公其知之矣而猶有越人之病也轍讀三國志嘗見曹公與袁紹相持久而不決以問賈詡詡曰公明勝紹勇勝紹用人勝紹決機勝紹紹兵百倍於公公畫地而與之相守半年而紹不得戰則公之勝形巳可見矣而久不決意者顧萬全之過耳夫事有不同而其意相似今天下之所以仰首而望明公者豈亦此之故歟明公其略思其說當有以解天下之望者不宣上曾參政書轍聞之士不更變不可與圖逺新勝之家知得而不知喪知存而不知亡始若可喜而終不可久昔者轍讀書至秦誓而得之曰番番良士旅力既愆我尚有之仡仡勇夫射御不違我尚不欲夫昔之為此言者蓋亦巳知之矣孟明視西乞術白乙丙此三人者秦之豪俊有決之士而百里奚蹇叔子此秦之所謂老耄而不武者也穆公欲襲鄭孟明以為可而蹇叔以為不可則蹇叔之說無乃遠於事情而近於怯哉然而要其成敗得失之終而責其思慮之長短則蹇叔不可謂迂而孟明不可謂是也故曰如有一個臣斷斷猗無它技其心休休焉其如有容人之有技若巳有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉嗟夫穆公至此而後知蹇叔之非庸人歟今夫立於百官之上而宰天下之事者亦何以其他技為哉溫良博愛而能容天下之士斯可矣往者轍之東遊而明公適為京兆當此之時明公之聲上震於朝廷而下懾於閭里行道之人為之不敢妄視盜賊屏息而不作可謂才有餘矣然至於參決大政而日韜其光務為敦厚不欲以才蓋天下上承二公下拊百官周旋揖讓而士大夫莫不雍容和穆以相與也嗟夫明公何以及此哉轍西蜀之匹夫往年偶以進士得與一命之爵今將為吏崤黽之間閒居無事聞天子舉直言之士而世之君子以其山林朴野之人不知朝廷之忌諱其中無所隱蔽故以應詔而轍也復不自度量而言當世之事亦不敢為鹵莽不詳之說其言語文章雖無以過人而其所論說乃有矯拂切直之過竊獨悲古者深言之人遭時之不祥一有所觸而其言不復見録於世方今羣公在朝以君子長者自處而優容天下彥聖有技之士士之有言者可以安意肆志而無患然後知士之生於今者之為幸而轍亦幸者之一人也素所為文家貧不能盡致有厯代論十二篇上自三王而下至於五代治亂興衰之際可以概見於此觀其略可也答黃庭堅書雅致轍之不肖何足以求交於魯直然家兄子瞻與魯直往還甚久轍與魯直舅氏公擇相知不疏讀君之文誦其詩願一見者久矣性拙且懶終不能奉咫尺之書致殷勤於左右乃使魯直以書先之其為愧恨可量也自廢棄以來頺然自放頑鄙愈甚見者往往嗤笑而魯直猶有以取之觀魯直之書所以見愛者與轍之愛魯直無異也然則書之先後不君則我未足以為恨也比聞魯直吏事之餘獨居而蔬食陶然自得蓋古之君子不用於世必寄於物以自遣阮籍以酒嵇康以琴阮無酒嵇無琴則其食草木而友麋鹿有不安者矣獨顔氏子飲水啜菽居於陋巷無假於外而不改其樂此孔子所以嘆其不可及也今魯直目不求色口不求味此其中所有過人遠矣而猶以問人何也聞魯直喜與禪僧語蓋聊以是探其有無耶漸寒比日起居甚安惟以時自重賀文太師致仕啓文有典刑且多風致右某啓伏審得謝中朝歸老西洛位極師保望隆古今止足之風中外所嘆伏惟致政太師窮䕫臯之偉業兼方召之壯猷翼亮三朝始終一節百辟共傳於遺事四夷想聞於風聲民恃以安士思為用尚父雖老而膺揚未衰猛虎在山而藜藿不採况復坐而論道本無黃髮之嫌出以濟時何負赤松之約而能去如脫屣名重太山近世以來一人而巳方將翺翔嵩少之下泝回伊洛之間身寄白雲堂開緑野釋鼎鍾之重負收竹帛之餘光雖使圖之丹青奉以尸祝衆之所願誰復間然某卜以空疏誤辱知奬嘗欲借潤於河海庶幾自效於錙銖而蹇拙多艱漂流歷歲誓將歸掃墳墓絶意功名罪籍得除或成過洛之幸舊恩未棄尚許登門之遊一聽話言永畢微願猶能作為歌頌傳示無窮俯慰平生仰答恩遇瞻望台屏不勝區區謹奉啓陳賀賀歐陽少師致仕啓伏審纍章得謝故邑榮歸位冠東宫寵兼舊職高風所振清議愈隆伏惟致政觀文少師道德在人術學蓋世早遊侍從蔚為議論之宗晚入廟堂隱然衆庶之望屬三朝之終始更萬變之勤勞臨事而安莫測弛張之用釋位既久始知鎮靜之功仰成績之不刋信後來之難繼薦厯三鎮始終一心知無不言曾中外而易意老而彌壯信賢達之過人衆皆以力事君公獨以道自任仕以其力者力衰而後去進以其道者道高則難留故七十致仕在禮則然而六一自名此志久矣築室清潁琴書足以忘憂遺名四方圭組蓋巳外物誰與治國能就問以質疑惟是門人尚不拒其來學轍以官守不獲躬詣門屏謹奉啓陳賀除中書舍人謝執政啓某啓近䝉聖恩除前仲官仍改賜章服者謫宦江湖歲月巳久置身臺省志氣未安繼登翰墨之場勉出絲綸之語辭而不獲處之益驚凡物之生小大異稱惟人所處閒劇有宜狙猿無事於冠裳爰居不樂於鐘鼓操之則栗舍之則安是以造物者聽其自然而用人者貴於因任然後才得其適性無所傷某少而讀書中頗喜事既挾策以干世誠妄意於濟時奏牘之多既比狂於方朔流涕之切亦效直於賈生比困幽憂始聞大道汛若虛舟之獨往寂如死灰之不然久於索居遂以無用以謂良冶之砥石不能發無刃之金大匠之斧斤不能器不才之木自放而巳蓋將終焉豈意大明之繼升廣取諸賢以自助驥騄之乘而罷駑與焉楩柟之林而樗櫟在是橫䝉見録漫不自知此蓋伏遇某官道大難名才高不器深念格天之業本由得士之功致二老於幽遐罄九官之汲引下逮微陋或䝉甄收曾是放棄之餘輒參侍從之列朝衣肉食雖懷歸而末由濡足纓冠顧所居之當爾冀斯民之大定幸四國之無虞碌碌何功猶或一書於竹帛堂堂偉續尚能悉載於聲詩過此以還未知所措唐宋八大家文鈔卷一百四十九
