body:
  text: 唐宋八大家文鈔巻三十明茅坤撰廬陵文鈔二書䟽劄子論臺諌官言事未䝉聽允書劾去陳執中以好疑自用起眼目以下六七層委曲打出如川雲如嶺月其出不窮臣聞自古有天下者莫不欲為治君而常至於亂莫不欲為明主而常至於昬者其故何哉患於好疑而自用也夫疑心動於中則視聽惑於外視聽惑則忠邪不分而是非錯亂忠邪不分而是非錯亂則舉國之臣皆可疑旣盡疑其臣則必自用其所見夫以疑惑錯亂之意而自用則多失失則其國之忠臣必以理而爭之爭之不切則人主之意難囘爭之切則激其君之怒心而堅其自用之意然後君臣爭勝於是邪佞之臣得以因隙而入希㫖順意以是為非以非為是惟人主之所欲者從而助之夫為人主者方與其臣爭勝而得順意之人樂其助已而忘其邪佞也乃與之并力以拒忠臣夫為人主者拒忠臣而信邪佞天下無不亂人主無不昬也自古人主之用心非惡忠臣而喜邪佞也非惡治而好亂也非惡明而欲昬也以其好疑自用而與下爭勝也使為人主者豁然去其疑心而回其自用之意則邪佞逺而忠言入忠言入則聰明不惑而萬事得其宜使天下尊為明主萬世仰為治君豈不臣主俱榮而樂哉與其區區自執而與臣下爭勝用心益勞而事益惑者相去逺矣臣聞書載仲虺稱湯之徳曰改過不恡又戒湯曰自用則小成湯古之聖人也不能無過而能改過此其所以為聖也以湯之聰明其所為不至於繆戾矣然仲虺猶戒其自用則自古人主惟能改過而不敢自用然後得為治君明主也臣伏見宰臣陳執中自執政以來不叶人望累有過惡招致人言而執中遷延尚玷宰府陛下憂勤恭儉仁愛寛慈堯舜之用心也推陛下之用心天下宜至於治者久矣而紀綱日壞政令日乖國日益貧民日益困流民滿野濫官滿朝其亦何為而致此由陛下用相不得其人也近年宰相多以過失因言者罷去陛下不悟宰相非其人反疑言事者好逐宰相疑心一生視聽既惑遂成自用之意以謂宰相當由人主自去不可因言者而罷之故宰相雖有大惡顯過而屈意以容之彼雖惶恐自欲求去而屈意以留之雖天災水旱饑民流離死亡道路皆不暇顧而屈意以用之其故非他直欲沮言事者爾言事者何負於陛下哉使陛下上不顧天災下不恤人言以天下之事委一不學無識謟邪狠愎之執中而甘心焉言事者本欲益於陛下而反損聖徳者多矣然而言事者之用心本不圖至於此也由陛下好疑自用而自損也今陛下用執中之意益堅言事者攻之愈切陛下方思有以取勝於言事者而邪佞之臣得以因隙而入必有希合陛下之意者將曰執中宰相不可以小事逐不可使小臣動揺甚者則誣言事者欲逐執中而引用他人陛下方患言事者上忤聖聰樂聞斯言之順意不復察其邪佞而信之所以拒言事者益峻用執中益堅夫以萬乘之尊與三數言事小臣角必勝之力萬一聖意必不可囘而言事者亦當知難而止矣然天下之人與後世之議者謂陛下拒忠言庇愚相以陛下為何如主也前日御史論梁適罪惡陛下赫怒空臺而逐之而今日御史又復敢論宰相不避雷霆之威不畏權臣之禍此乃至忠之臣也能忘其身而愛陛下者也陛下嫉之惡之拒之絶之執中為相使天下水旱流亡公私困竭而又不學無識憎愛挾情除改差繆取笑中外家私穢惡流聞道路阿意順㫖專事逢君此乃謟上傲下愎戾之臣也陛下愛之重之不忍去之陛下睿智聰明羣臣善惡無不照見不應倒置如此直由言事者太切而激成陛下之疑惑爾執中不知廉耻復出視事此不足論陛下豈忍因執中上累聖徳而使忠臣直士巻舌於明時也臣願陛下廓然回心釋去疑慮察言事者之忠知執中之過惡悟用人之非法成湯改過之聖遵仲虺自用之戒盡以御史前後章䟽出付外廷議正執中之過惡罷其政事别用賢材以康時務以拯斯民以全聖徳則天下幸甚臣以身叨恩遇職在論思意切言狂罪當萬死論包拯除三司使上書包拯不能不汗顔心服臣聞治天下者在知用人之先後而巳用人之法各有所宜軍旅之士先材能朝廷之士先名節軍旅主成功惟恐其不趨賞而爭利其先材能而後名節者亦勢使之然也朝廷主教化風俗之薄厚治道之汙隆在乎用人而教化之於下也不能家至而諄諄諭之故常務尊名節之士以風動天下而聳勵其媮薄夫所謂名節之士者知廉耻修禮讓不利於茍得不牽於茍隨而惟義之所處白刃之威有所不避折枝之易有所不為而惟義之所守其立於朝廷進退舉止皆可以為天下法也其人至難得也至可重也故其為士者常貴名節以自重其身而君人者亦常全名節以養成善士伏見陛下近除前御史中丞包拯為三司使命下之日中外喧然以謂朝廷貪拯之材而不為拯惜名節然猶冀拯能執節守義堅讓以避嫌疑而為朝廷惜事體數日之間遽聞拯已受命是可惜也亦可嗟也拯性好剛天姿峭直然素少學問朝廷事體或有不思至如遂其人而代其位雖初無是心然見得不能思義此皆不足怪若乃嫌疑之迹常人皆知可避而拯豈獨不思哉昨聞拯在臺日常自至中書詬責宰相指陳前三司使張方平過失怒宰相不早罷之既而臺中寮屬相繼論列方平由此罷去而以宋祁代之又聞拯亦曾彈奏宋祁過失自其命出臺中寮屬又交章力言而祁亦因此而罷而拯遂代其任此所謂蹊田奪牛豈得無過而整冠納履當避可疑者也如拯材能資望雖别加進用人豈為嫌其不可為者惟三司使爾非惟自渉嫌疑其於朝廷所損不細臣請原其本末而言之國家自數十年來士君子務以恭謹靜慎為賢及其弊也循黙茍且頽惰寛弛習成風俗不以為非至於百職不修紀綱廢壞時方無事固未覺其害也一旦元昊犯邊兵出無功而財用空虛公私困弊盗賊並起天下騷然陛下奮然感悟思革其弊進用三數大臣鋭意於更張矣於此之時始増置諌官之員以寵用言事之臣俾之舉職由是修紀綱而繩廢壞遂欲分别賢不肖進退材不材而久弊之俗驟見而駭因共指言事者而非之或以謂好訐陰私或以為公相傾䧟或謂沽激名譽或謂自圖進取羣言百端幾惑上聽上頼陛下至聖至明察見諸臣本以忘身狥國非為已利讒間不入遂荷保全而中外之人久而亦漸為信自是以來二十年間臺諌之選屢得讜言之士中間斥去姦邪屏絶權倖拾遺救失不可勝數是則納諌之善從古所難自陛下臨御以來實為盛徳於朝廷補助之效不為無功今中外習安上下已信纎邪之人凡所舉動每畏言事之臣時政無巨細亦惟言事官是聽原其自始開發言路至於今日之成效豈易致哉可不惜哉夫言人之過似於徼訐逐人之位似於傾䧟而言事之臣得以自明者惟無所利於其間爾而天下之人所以為信者亦以其無所利焉今拯屏逐二臣自居其位使將來姦佞者得以為説而惑亂主聽今後言事者不為人信而無以自明是則聖明用諌之功一旦由拯而壞夫有所不取之謂亷有所不為之謂耻近臣舉動人所儀法使拯於此時有所不取而不為可以風天下以亷耻之節而拯取其所不宜取為其所不宜為豈惟自薄其身亦所以開誘他時言事之臣傾人以覬得相習而成風此之為患豈謂小哉然拯所恃者惟以本無心耳夫心者藏於中而人所不見迹者示於外而天下所瞻今拯欲自信其不見之心而外掩天下之迹是猶手探其物口云不欲雖欲自信人誰信之此臣所謂嫌疑之不可不避也况如拯者少有孝行聞於鄉里晚有直節著在朝廷但其學問不深思慮不熟而處之乖當其人亦可惜也伏望陛下别選材臣為三司使而處拯他職置之京師使拯得避嫌疑之迹以解天下之惑而全拯之名節不勝幸甚臣叨塵侍從職號論思昔嘗親見朝廷致諌之初甚難今又復見陛下用諌之效已著實不欲因拯而壊之者為朝廷惜也臣言狂計愚伏俟誅戮論選皇子䟽忠悃臣聞言天下之難言者不敢冀必然之聽知未必聽而不可不言者所以盡為忠之心况臣遭遇聖明容納諌諍言之未必不聽其可黙而不言臣伏見自去歳以來羣臣多言皇嗣之事臣亦嘗因災異竊有奏陳雖聖度包容不加誅戮而愚誠懇至天聽未囘臣實不勝愛君之心日夜區區未嘗忘此思欲再陳狂瞽而未知所以為言今者伏見兖國公主近已出降臣因竊思人之常道莫親於父子之親人之常情亦莫樂於父子之樂雖在聖哲異於凡倫其為天性於理則一陛下嚮雖未有皇嗣而尚有公主之愛上慰聖顔今既出降漸踈左右則陛下萬幾之暇處深宫之中誰可與語言誰可承顔色臣愚以謂宜因此時出自聖意於宗室之中選材賢可喜者録以為皇子使其出入左右問安侍膳亦足以慰悦聖情臣考於書史竊見自古帝王雖曰至尊未嘗獨處也其出而居外也不止百司公見奏事而已必有儒臣學士講論於閒宴又有左右侍從顧問語言其入而居内也不止宦官官妾在於左右而已其平居燕寢也則有太子問安侍膳於朝夕其優游宴樂也多與宗室子弟懽然相接如家人計其一日之中未嘗一時獨處也今陛下日御前後殿百司奏事者徃徃仰瞻天顔而退其甚幸者得承一二言之徳音君臣之情不通上下之意不接其餘在廷之臣儒學侍從之列未聞一人從容親近於左右入而居内則至於問安侍膳亦闕於朝夕是則陛下富有四海之廣躬享萬乗之尊居外則無一人可親居内則無一人得親此臣所以區區而欲言也伏况陛下荷祖宗之業承宗廟社稷之重皇子未降儲位久虛羣臣屢言大議未决臣前所奏陳以謂未必立為儲貳而且養為子既可以徐察其賢否亦可以待皇子之降生於今為之亦其時也臣言狂計愚伏俟斧鉞水災䟽言人所不敢言亦人所不能見如此奏䟽漢唐所少臣伏覩近降詔書以雨水為災許中外臣寮上封言事有以見陛下畏天愛人恐懼修省之意也竊以雨水為患自古有之然未有水入國門大臣犇走渰浸社稷破壞都城者此蓋天地之變也至於王城京邑浩如陂湖衝溺犇逃號呼晝夜人畜死者不知其數其幸而免者屋宇摧塌無以容身縛栰露居上雨下水纍纍老㓜狼籍於天街之中又聞城外墳冡亦被浸注棺椁浮出骸骨漂流此皆聞之可傷見之可憫生者既不安其室死者又不得其藏此亦近世水災未有若斯之甚者此外四方奏報無日不來或云閉塞城門或云衝破市邑或云河口决千百歩闊或云水頭高三四丈餘道路隔絶田苖蕩盡是則大川小水皆出為災逺方近畿無不被害此陛下所以驚懼莫大之變隱惻至仁之心廣為諮詢冀以消復竊以天人之際影響不差未有不召而自至之災亦未有已出而無應之變其變既大則其憂亦深臣愚謂非小小有為可以塞此大異也必當思宗廟社稷之重察安危禍福之機追已徃之闕失防未萌之患害如此等事不過一二而已自古人君必有儲副所以承宗社之重而不可闕者也陛下臨御三十餘年而儲嗣未立此久闕之典也近聞臣寮多以此事為言大臣亦嘗進議陛下聖意久而未决而庸臣愚士知小忠而不知大體者因以為異事遂生嫌疑之論此不思之甚也且自古帝王有子至二三十人者甚多材髙年長羅列於朝者亦衆然為其君父者莫不皆享無窮之安豈有所嫌而斥其子耶若陛下鄂王豫王皆在至今則儲宮之建久矣世之庸人偶見陛下久無皇子忽聞此議遂以云云爾且禮曰一有元良萬國以正蓋謂定天下之根本上承宗廟之重亦所以絶臣下之邪謀自古儲嗣所以安人主也若果如庸人嫌疑之論則是常無儲嗣則人主安有儲嗣則人主危此臣所謂不思之甚也臣又見自古帝王建立儲嗣既以承宗廟之重又以為國家美慶之事故每立太子則不敢專享其美必大赦天下凡為人父後者皆被恩澤所以與天下同其慶喜然則非惡事也漢文帝初即位之明年羣臣再三請立太子文帝再三謙讓而後從之當時羣臣不自疑而敢請漢文帝亦不疑其臣有二心者臣主之情通故也五代之主或出武人或出夷狄如後唐明宗尤惡人言太子事羣臣莫敢正言有何澤者嘗上書乞立太子明宗大怒謂其子從榮曰羣臣欲以汝為太子我將歸老於河東由是臣下更不敢言然而文帝立太子之後享國長久為漢太宗是則何害其為明主也後唐明宗儲嗣不早定而秦王從榮後以舉兵窺覬䧟于大禍後唐遂亂此前世之事也况聞臣寮所請但欲擇宗室為皇子爾未即以為儲貳也伏惟陛下仁聖聰明洞鑒今古必謂此事國家大計當重慎而不可輕發所以遲之耳非惡人言而不欲為也然朝廷大議中外已聞不宜久而不决昨自春首以來陛下服藥于内大臣早夜不敢歸家飲食醫藥侍于左右如人子之侍父自古君臣未有若此之親者也下至羣臣士庶婦女嬰孩晝夜禱祈填咽道路發於至誠不可禁止以此見臣民盡忠䝉陛下之徳厚愛陛下之意深故為陛下之慮逺也今之所請天下臣民所以為愛君計也陛下何疑而不從乎中外之臣旣喜陞下聖躬康復又欲見皇子出入宫中朝夕問安侍膳于左右然後文武羣臣奉表章為陛下賀辭人墨客稱述本支之盛為陛下歌之頌之豈不美哉伏願陛下出於聖斷擇宗室之賢者依古禮文且以為子未用立為儲副也旣可以徐察其賢否亦可以俟皇子之生臣又見樞宻使狄青出自行伍遂掌樞宻如初議者已為不可今三四年間外雖未見過失而不幸有得軍情之名且武臣掌國機宻而得軍情豈是國家之利臣前有封奏其説甚詳具述青未是竒材但於今世將率中稍可稱耳雖其心不為惡不幸為軍士所喜深恐因此䧟青以禍而為國家生事欲乞且罷青樞務任以一州旣以保全青亦為國家消未萌之患蓋縁軍中士卒及閭巷人民以至士大夫間未有不以此事為言者惟陛下未之知爾臣之前奏乞留中而出自聖斷若陛下猶以臣言為疑乞出臣前奏使執政大臣公議此二者當今之急務也凡所謂五行災異之學臣雖不深知然其大意可推而見也五行傳曰簡宗廟則水為災陛下嚴奉祭祀可謂至矣惟未立儲貳易曰主器莫若長子殆此之警戒乎至於水者陰也兵亦陰也武臣亦隂也此推類而易見者天之譴告茍不虛發惟陛下深思而早决庶幾可以消弭災患而轉為福應也臣伏覩詔書曰悉心以陳無有所諱故臣敢及之若其他時政之失必有羣臣應詔為陛下言者臣言狂計愚惟陛下裁擇論美人張氏恩寵宜加裁損劄子他人所不敢言亦所不能言臣近風聞禁中因皇女降生於左藏庫取綾羅八千疋染院工匠當此大雪苦寒之際敲氷取水染練供應頗甚艱辛臣伏思陛下恭儉勤勞愛民憂國以此勞人枉費之事必不肯為然外議相傳皆云見今染練未絶臣又見近日内降美人張氏親戚恩澤太頻臣忝為諌官每聞小有虧損聖徳之事須合力言難避天譴臣竊見自古帝王所寵嬪御若能謙儉柔善不求恩澤則可長保君恩或恣意驕奢多求恩澤則皆速致禍敗臣不敢逺引古事只以今宫禁近事言之陛下近年所寵尚氏楊氏余氏苖氏之類當其被寵之時驕奢自恣不早裁損及至滿盈今皆何在况聞張氏本良家子昨自脩媛退為美人中外皆聞以謂與楊尚等不同故能保寵最久今一旦宫中取索頓多恩澤日廣漸為奢侈之事以招外人之言臣不知陛下欲愛惜保全張氏或欲縱恣而敗之若欲保全則須常令謙儉不至驕盈臣料八千疋綾羅必非張氏一人獨用不過支散與衆人而已乃是枉費財物盡為衆人至於中外譏議則陛下自受以此而言廣散何益昨正月一日曹氏封縣君至初五日又封郡君四五日間兩度封拜又聞别有内降應是疏逺親戚盡求恩澤父母因子而貴可矣然名分亦不可太過其他踈逺皆可减罷臣謂張氏未入宫之前踈逺親戚各皆何在今日富貴何必廣為閑人自招謗議以累聖徳若陛下只為張氏計亦冝如此况此事不獨為張氏大凡後宫恩澤太多宫中用度奢侈皆是虧損聖徳之事繫於國體臣合力言伏望聖慈防微杜漸早為裁損取進止論議濮安懿王典禮劄子宋人並以歐公建議為非然其據經論辨處亦自精宻臣伏見朝廷議濮安懿王典禮兩制禮官請稱皇伯中書之議以謂事體至大理冝慎重必合典故方可施行而皇伯之稱考於經史皆無所據方欲下三省百官博訪羣議以求其當陛下屈意手詔中罷而衆論紛然至今不已臣以謂衆論雖多其説不過有三其一曰宜稱皇伯者是無稽之臆説也其二曰簡宗廟致水災者是厚誣天人之言也其三曰不當用漢宣哀為法以干亂統紀者是不廣本末之論也臣請為陛下條列而辨之謹按儀禮喪服記曰為人後者為其父母報報者齊衰期也謂之降服以明服可降父母之名不可改也又按開元開寳禮國朝五服年月喪服令皆云為人後者為其所生父齊衰不杖期蓋以恩莫重於所生故父母之名不可改義莫重於所繼故寜抑而降其服此聖人所制之禮著之六經以為萬世法者是中書之議所據依也若所謂稱皇伯者考於六經無之方今國朝見行典禮及律令皆無之自三代之後秦漢以來諸帝由藩邸入繼大統者亦皆無之可謂無稽之臆説矣夫儀禮者聖人六經之文開元禮者有唐三百年所用之禮開寳通禮者聖宋百年所用之禮五服年月及喪服令亦皆祖宗累朝所定方今天下共行之制今議者皆棄而不用直欲自用無稽之臆説此所以不可施行也其二曰簡宗廟致水災者臣伏以上天降災皆主人事故自古聖王逢災恐懼多求闕政而修之或自知過失而改悔之庶幾以塞天譴然皆須人事已著於下則天譴為形於上今者濮王之議本因兩制禮官違經棄禮用其無稽之臆説欲定皇伯之稱中書疑其未可施行乃考古今典禮雖有明據亦未敢自信而自專方更求下外廷博議而陛下遽詔中罷欲使有司徐求典禮是則臣下慎重如此人君謙畏如此君臣不敢輕議妄舉而天遽譴怒殺人害物此臣所謂厚誣天也議猶未决仍罷不議而便謂兩統二父以致天災者厚誣人也其三引漢宣哀之事者臣謹按漢書宣帝父曰悼皇考初稱親諡曰悼置奉邑寢園而已其後改親稱皇考而立廟京師皇考者親之異名爾皆子稱其父之名也漢儒初不以為非也自元帝以後貢禹韋𤣥成等始建毁廟之議數十年間毁立不一至哀帝時大司徒平晏等百四十七人奏議云親諡曰悼裁置奉邑皆應經義是不非宣帝稱史皇孫為親也所謂應經義者即儀禮云為人後者為其父母報是也惟其立廟京師亂漢祖宗昭穆故晏等以謂兩統二父非禮宜毁也定陶恭王初但號共皇立廟本國師丹亦無所議至其後立廟京師欲去定陶不繫以國有進干漢統之漸丹遂大非之故丹議云定陶恭皇諡號已前定議不得復改而但論立廟京師為不可爾然則稱親置園皆漢儒所許以為應經義者惟去其國號立廟京師則不可爾今言事者不究朝廷本議何事不尋漢臣所非者何事此臣故謂不原本末也中書之議本謂稱皇伯無稽而禮經有不改父名之義方議名號猶未定故尊崇之禮皆未及議而言事者便引漢去定陶國號立廟京師之事厚誣朝廷以為干亂大統何其過論也夫去國號而立廟京師以亂祖宗昭穆此誠可非之事若果為此議宜乎指臣等為姦邪之臣而人主有過舉之失矣其如陛下之意未嘗及此而中書亦初無此議而言事者不原本末過引漢世可非之事以為説而外庭之臣又不審知朝廷太議如何但見言事者云云遂以為欲加非禮干亂統紀信為然矣是以衆口一辭紛然不止而言事者欲必遂其皇伯無稽之説牽引天災恐廹人主而中書守經執禮之議反指以為姦邪之言朝廷以言事之臣禮當優客不欲與之爭辨而外庭羣論又不可家至而户曉是非之禮不辨上下之情不通此所以呶呶而不止也夫為人後者旣以所後為父矣而聖人又存其所生父名者非曲為之意也蓋自有天地以來未有無父而生之子也既有父而生則不可諱其所生矣夫無子者得以宗子為後是禮之所許也然安得無父而生之子以為後乎此聖人所以不諱無子者立人之子以為後亦不諱為人後者有父而生蓋不欺天不誣人也故為人後者承其宗之重任其子之事而不得復歸於本宗其所生父母亦不得徃與其事至於喪服降而抑之一切可以義斷惟其父母之名不易者理不可易也易之則欺天而誣人矣子為父母服謂之正服出為人後者為本生父母齊衰期謂之降服又為所後父斬衰三年謂之義服今若以本生父為皇伯則濮安懿王為從祖父反為小功而濮王夫人是本生嫡母也反為義服自宗懿以下本生兄弟於禮雖降猶為大功是禮之齊衰期今反為小功禮之正服今反為義服上於濮王父也反服小功於宗懿等兄弟也反服大功此自古所以不稱所生父為伯父叔父者稱之則禮制乖違人倫錯亂如此也伏惟陛下聰明睿聖理無不燭今衆人之議如彼中書之議如此必將從衆乎則衆議不見其可欲違衆乎則自古為國未有違衆而能舉事者願陛下霈然下詔明告中外以皇伯無稽决不可稱而今所欲定者正名號爾至於立廟京師干亂統紀之事皆非朝廷本議庶幾羣疑可釋若知如此而猶以謂必稱皇伯則雖孔孟復生不能復為之辨矣予按濮議所請稱親置園立廟濮王之子若孫世守其祀本出於天下萬世之公而非有悖於典禮者特當時臺諫吕誨范鎮等過激故為紛紛耳至於本朝興獻帝事大畧與此相同盖亦天理人情之不容已者張桂首議時予方以髫年侍先輩間先輩每語及輒為怒而裂眦及讀大禮或問爽然自失矣然吕范諸公始以議禮被譴已而復起張桂用事後而議禮諸臣錮且没齒矣予特為之累欷太息云論葬荆王後贈燕王一行事劄子本朝唯三原王公可及臣風聞已有聖㫖荆王葬事令三司與太常禮院及監葬官等同議减節浮費此足見陛下厚於皇叔之恩念民惜費之意一舉而兩得也然臣每見朝廷作事欲愛民節用而常枉費勞人蓋為議事之初不得其要或失於不精審者有四民間不科配一也州縣供應物有定數二也送葬之人在路禁其呼索三也州縣官吏不得過外供須以邀名譽四也茍絶此四者則無大患矣昨京西一路遭張海驚劫之後不可更有誅求臣今欲乞指揮三司應是合要之物並須官給不得民間科買仍乞先將一行儀仗人馬并送葬人等一人以上先定人數然後劄與京西令依數供頓則可無廣費自荆王以下諸喪非至親者不必令其盡徃仍乞限定人數及每人將帶隨行人數亦乞限定凡皇親及一行官吏除宿頓合供飲食外不得數外呼索州縣官吏亦不得於官供飲食外别以諸物獻送權要其受獻送并呼索並以入已贓論仍乞選御史裏行一人隨行糺察其數外帶人及州縣隨順呼索獻送物等官吏物出於已亦從違制若託以供應為名於民間賤買及率掠者皆以枉法贓論如此防禦方可杜絶浮費以稱陛下厚親節用之心論葬荆王劄子總只是恤財用上為本臣伏覩朝㫖雖差宋祁監䕶故荆王葬事然未見降下葬日及一行事件或聞以歳月不利末可葬或聞有司以財用不足乞且未葬夫陰陽拘忌之説陛下聰明睿聖必不信此巫卜之言而違禮典但慮議者堅執方今財用不足不可辦葬陛下聞有勞民枉費之説則不得不慮因以遲疑臣謂前後勑葬大臣浮費枉用之物至多豈是朝廷本意皆為主司措置之失致人因縁以為姦爾今若盡節浮費及絶其侵蠧而使用物不廣則將復以何辭而云不葬此不知所司曾將一行用度計定大數否内若干是浮費若干是實用若實用之物數猶至多而力不可辦則緩之可也若實用之物少只是舊例浮費多則可削去浮費而已今都不計度而但云無物可葬則不可也未見實用之數多少不量力能及否而曰必須遵禮而曰必須葬亦未可也如臣愚見酌此兩端葬則為便然須先乞令王堯臣宋祁等將一行合用之物列其名件内浮費不急者一一減去之若只留實用之物數必不多假如稍多更加節減雖至儉薄理亦無害如此則葬得及時物亦不費夫儉葬古人之美節侈葬古人之惡名今避儉葬不肯節費留喪而待有物之年以就侈葬則非臣所知也若曰儉葬亦未能辦則乃過言之甚也然外之輿議為國家論事體者皆云葬則為便今朝廷議者分而為二顧物力者則不顧典禮國體論典禮國體者則不思財用辦否各執偏見議久不決以惑陛下之聰明今便葬之害一不葬之害五便葬之害不過費物然力有可為不葬之害所失則大不肯薄葬而留之以待侈葬成王之惡名一也信巫卜之説而違典禮二也目下減節力所易為他時豐足禮或難待使皇叔之柩五七年間不得安宅而神靈無歸三也使四夷聞天子皇叔薨而無錢出葬遂輕中國而動心四也今天下物力雖乏然凡百用度不能節費處多獨於皇叔之身有所裁損傷陛下孝治之美五也此臣所謂葬則為便者也荆王於國屬最尊名位最重伏乞早令定議無使後時取進止唐宋八大家文鈔巻三十
