body:
  text: 唐宋八大家文鈔卷九十四明茅坤撰臨川文鈔十四墓志銘荆湖北路轉運判官尚書屯田郎中劉君墓志銘并序直序治平元年五月六日荆湖北路轉運判官尚書屯田郎中劉君年五十四以官卒三年卜十月某日葬真州揚子縣蜀岡而子洙以武寧章望之狀來求銘噫余故人也為序而銘焉序曰君諱牧字先之其先杭州臨安縣人君曽大父諱彥琛為吳越王將有功刺衢州葬西安於是劉氏又為西安人當太宗時嘗求諸有功於吳越者録其後而君大父諱仁祚辭以疾及君父諱知禮又不仕而鄉人稱為君子後以君故贈官至尚書職方郎中君少則明敏年十六求舉進士不中曰有司豈枉我哉乃多買書閉户治之及再舉遂為舉首起家饒州軍事推官與州將爭公事為所擠幾不免及後將范文正公至君大喜曰此吾師也遂以為師文正公亦數稱君勉以學君論議仁恕急人之窮於財物無所顧計凡以慕文正公故也弋陽富人為客所誣將抵死君得實以告文正公未甚信然以君故使吏雜治之居數日富人得不死文正公由此愈知君任以事嵗終將舉京官君以讓其同官有親而老者文正公為歎息許之曰吾不可以不成君之善及文正公安撫河東乃始舉君可治劇於是君為兖州觀察推官又學春秋於孫復與石介為友州旱蝗奏便宜十餘事其一事請通登萊鹽商至今以為賴改大理寺丞知大名府館陶縣中貴人隨契丹使往來多擾縣君視遇有理人吏以無所苦先是多盜君用其黨推逐有發輒得後遂無為盜者詔集強壯刺其手為義勇多惶怖不知所為欲走君諭以詔意為言利害皆就刺欣然曰劉君不吾欺也留守稱其能雖府事往往咨君計䇿用舉者通判廣信軍以親老不行通判建州當是時今河陽宰相富公以樞密副使使河北奏君掌機宜文字保州兵士為亂富公請君撫視君自長垣乘驛至其城下以三日會富公罷出君乃之建州方并屬縣諸里均其徭役人大喜而遭職方君喪以去通判青州又以母夫人喪罷又通判廬州朝廷弛茶𣙜以君使江西議均其稅蓋期年而後反客曰平生聞君敏而敢為今濡滯若此何故也君笑曰是固君之所能易也而我則不能且是役也朝廷豈以為他亦曰愛人而已今不深知其利害而茍簡以成之君雖以吾為敏而人必有不勝其弊者及奏事皆聽人果便之除廣南西路轉運判官於是修險厄募丁壯以減戍卒徙倉便輸考攝官功次絶其行賕居二年凡利害無所不興廢乃移荆湖北路至踰月卒家貧無以為喪自棺槨諸物皆荆南士人為具君娶江氏生五男二女男曰洙沂汶為進士洙以君故試將作監主簿餘尚幼初君為范富二公所知一時士大夫爭譽其才君亦慨然自以當得意已而迍邅流落抑沒於庸人之中幾老矣乃稍出為世用若將以有為也而既死此愛君者所為恨惜然士之赫赫為世所願者可覩矣以君始終得喪相除亦何負彼之有哉銘曰嗟乎劉君宜夀而顯何畜之久而施之淺雖或止之亦或使之惟其有命故止於斯尚書屯田員外郎仲君墓志銘看他韻折處君仲氏諱訥字朴翁廣濟軍定陶人曽祖諱環祖諱祚皆弗仕而至君父諱尹始仕至曹州觀察支使贈右贊善大夫君景祐元年進士起家莫州防禦推官年少初官然上下無敢易者時傳契丹且大擾邊朝廷使中貴人來問知州張崇俊未知所對公䇿契丹無他為具奏論之崇俊喜曰朝廷必知非吾能為此然亦當善我能聽用君也又權博州防禦判官以母夫人喪去去三年復權明州節度推官縣送海賊數十人獄具矣君獨疑而辨之數十人者皆得雪用舉者改大理寺丞知大名府清平卭州臨溪兩縣又通判解州於是三遷為尚書屯田員外郎而以皇祐五年十二月二十一日卒年五十五君厚重有大志不妄言笑喜讀書為古文章晚而尤好為詩詩尤稱於世所在有聲績然直道自信於權貴人不肯有所屈故好者少然亦多知其非常人也其在越蜀士多從之學當寶元康定間言者喜論兵其計不過攻守而已君獨推書所謂食哉唯時柔逺能邇惇德允元而難任人蠻夷率服為禦戎議二篇嗟呼此流俗所羞以為迂而弗言者也非明於先王之義則孰知夫中國安富尊強之為必出於此君知此矣則其自信不屈宜以有所負而然惜乎其未試也君初娶王氏尚書駕部郎中蘭之女又娶李氏尚書虞部員外郎宋卿之女三男子伯達為太常博士次伯適伯同為進士三女子嫁殿中丞任庾并州交城縣尉崔絳興元府户曹參軍任膺博士以熙寧元年十一月二十一日葬君於定陶之閔丘鄉而以余之聞君也來求銘銘曰於戲朴翁天偶人觭翔其德音而躓於時京東提點刑獄陸君墓志銘志止詳世系大略並於銘中點綴生平提點京東諸州軍刑獄公事兼本路勸農事朝奉郎尚書司封員外郎充集賢挍理上輕車都尉賜緋魚袋借紫陸君諱廣字彥博其先吳郡人也至君之高祖始遷福州之侯官以避唐末之亂曽祖諱景遷仕吳越為驍騎上將官撿挍太傅祖諱崇扆以威武軍觀察推官從其王歸京師官至殿中丞歷知瀘道潮貴四州以卒考諱中和不仕以君故贈官至尚書職方員外郎君以天聖二年進士起至皇祐四年某月以使走齊州某甲子卒於鄆之平隂君子長倩等以嘉祐四年某月某甲子葬君杭州之錢塘某所之原而書君繫世官職行能勞烈卒葬之地一時以來求志墓銘曰於惟陸氏吳郡其始福之侯官近自唐徙君曽大考太傅將軍實仕吳越為皇陪臣太傅有子始來皇朝丞于殿中歷將四州卒葬侯官實生處士贈官職方君實其子維君諱廣彥博其字文辭甲科四府從事起家邵武再選徐州遂監稅酒滿嵗陳留許昌之招寧海之從乃令烏程乃丞開封始佐著作去為尉氏詠歌仁明無有壯稚移卬大邑告母高年免蜀就養稅商于泉又移導江斗穀千錢君命振之以我公田盜屠民家尉以囚來囚言實盜君曰釋之尉方力爭衆亦莫寤後得真盜果如君慮離堆之江豪右擅焉君修堰渠始詘其專灌田為頃萬有七千鐫約示後後無凶年鄭文肅公來治杭劇君以通判往從其辟州人僦屋吏代之輸君為創法遂無逋租中書選君御史推直有言朝廷今以為勑冬狩于郊大講戎兵作針以獻逆戒荒萌召置集賢以為挍理當時名氏簡在天子出知婺州惡吏先鉏募能拯溺民以不漁婺之明年改命治泉泉人習君謡語歡然為橋南江濟者免覆置廩州學士懷我育有告衆叛當君燕時命捕立得坐人不知蘇飢息窮去害除弊使臣以聞守政尤異智高螫邊吏不時搏君書驛上焯有方略歸佐三司廷論南師帝曰可哉汝言豫施河京以東再執刑柄諏囚于齊至鄆而病棄世平隂壽五十三有子四人扶喪而南長倩惟伯仲惟長緒長恕惟叔季惟長愈倩掾秀州敏有辭章緒由君恩郊社齋郎又女六人皆出陳氏維陳淑慎善相君子四男有立女亦有歸受封長安即養無違爰以嘉祐六年正月歸君錢塘范村之穴惟君靜深不茍笑嘻隆親篤友遇物愛慈讀書慨然慕古奇偉顧謂諸子仕當如此官止外郎尚書司封又不得年以既厥庸有文藏家後世之詒於君所得可以此窺有幽斯竁掩石在下撰君初終以告來者節度推官陳君墓志銘入宋調然亦有一段風致人之所難得乎天者聰明辨智敏給之材既得之矣能學問修為以自稱而不弊於無窮之欲此亦天之所難得乎人者也天能以人之所難得者與人人欲以天之所難得者徇天而天不少假以年則其得有不暇乎修為其為有不至乎成就此孔子所以歎夫未見其止而惜之者也陳君諱之元字某年二十七為武昌軍節度推官以卒自其為兒童強記捷見能不勞而超其長者少長慨然慕古人所為而又能學其文章既以進士起家則喜曰無事於詩賦矣以吾日力盡之於所好其庶乎吾可以成材於是悉槖其家書之官而蚤夜讀以思思而不得則又從其朋友講解至於達而後已其材與志如此使天少假以年則其成就當如何哉然無幾何得疾病遂至於不起嗟乎此亦所謂未見其止而可惜者也君某州之某縣人曽祖曰某祖曰某考曰某以嘉祐某年某月某甲子其兄之方為之卜某州某縣某所之原以葬而臨川王某為銘曰浮揚清明升氣之鄉沈翳濁墨降形之宅其升逺矣其孰能追其降在此有銘昭之泰州海陵縣主簿許君墓志銘許君多竒氣而荆公之志亦如之君諱平字秉之姓許氏余嘗譜其世家所謂今泰州海陵縣主簿者也君既與兄元相友愛稱天下而自少卓犖不羇善辨説與其兄俱以智略為當世大人所器寶元時朝廷開方略之選以招天下異能之士而陜西大帥范文正公鄭文肅公爭以君所為書以薦於是得召試為太廟齋郎已而選泰州海陵縣主簿貴人多薦君有大材可試以事不宜棄之州縣君亦常慨然自許欲有所為然終不得一用其智能以卒噫其可哀也已士固有離世異俗獨行其意罵譏笑侮困辱而不悔彼皆無衆人之求而有所待於後世者也其齟齬固宜若夫智謀功名之士窺時俯仰以赴勢物之會而輒不遇者乃亦不可勝數辨足以移萬物而窮於用説之時謀足以奪三軍而辱於右武之國此又何説哉嗟乎彼有所待而不悔者其知之矣君年五十九以嘉祐某年某月某甲子葬真州之揚子縣甘露鄉某所之原夫人李氏子男瓌不仕璋真州司户參軍琦太廟齋郎琳進士女子五人已嫁二人進士周奉先泰州泰興縣令陶舜元銘曰有拔而起之莫擠而止之嗚呼許君而已於斯誰或使之葛興祖墓志銘本興祖所仕不得志處點次多情許州長社縣主簿葛君諱良嗣字興祖其先處州之麗水人而興祖之父徙居明州之鄞興祖葬其父潤州之丹徒故今又為丹徒人矣曽大父諱遇不仕大父諱旴贈尚書都官郎中父諱源以尚書度支郎中終仁宗時度支君三子當天聖景祐之間以文有聲赫然進士中先人嘗受其摰閲之終篇而屢歎葛氏之多子也既而三子者伯仲皆蚤死獨其季在即興祖興祖博知多能數舉進士角出其上而刻勵修潔篤於親友慨然欲有所為以效於世者也年四十餘始以進士出仕州縣餘十年而卒窮於無所遇以死嗟乎命不可控引而才之難恃以自見蓋久矣然興祖於仕未嘗茍聞人疾苦欲去之如在已其臨視雖細故人不以屬耳目者必皆致其心論者多怪之曰興祖且老矣弊於州縣而服勤如此余曰是乃吾所欲於興祖夫大仕之則奮小仕之則怠忽以不治非知德者也興祖聞之以余之言為然興祖娶胡氏又娶鄭氏其卒年五十三實治平二年三月辛巳其葬以胡氏祔在丹徒之長樂鄉顯揚村即其年十一月某甲子也興祖三男子蘩蘊皆有文學蘩許州臨潁縣主簿蘊鄧州穰縣主簿蘋尚幼也四女子皆未嫁云銘曰蹇於仕以為人尤不愸施以年孰主孰謀無大憾於德又將何求臨川吳子善墓志銘輾轉嗚咽臨川吳氏有子興宗字子善年二十喪母而其父以生事付之則先日出以作後日入以息日午矣家一人未飯其夫婦必尚空腹天寒矣家一人未纊其夫婦必尚單衣蓋如此者二十年而終三十年而已死凡嫁五妹辦數喪又以其筋力之餘及於鄉黨茍有故必我勞人佚先往後歸而尤篤於友愛見弟有過則顏色愈溫須飲酒歡極之間乃微示以意既而即泣下曰吾親屬我以汝吾所以不避艱險者保汝而已其弟終感悟悔改為善士以文學名於世此待其弟乃爾若於他人則絶口不涉其非然里中少年聞其謦咳之音往往逃匿若匿不及則俯首恐愧而嘗有所絓一至訟庭及著械同絓數十人為之皆哭掌獄者驚起白守守立免焉其見畏愛多此類某謂其父為諸舅甚知其所為故於其弟子經孝宗之求志以葬也為道而不辭子善嘗應進士舉後專於耕養遂不復應其死以治平四年八月九日而十二月十五日與其母黃氏共葬於靈源村父墓之域中父諱偃亦有行義用疾弗仕祖諱表微尚書屯田員外郎曽祖諱英殿中丞初妻姓王氏一男良弼皆前卒再娶楊氏生蕘適枉蕘始九嵗而四女幼者一嵗云胡君墓志銘荆公峭岸每如此王某之治鄞三月其故人胡舜元凶服立於門揖入問弔故以喪其父五月留而館意獨怪其來之早也居數月語吾弟曰吾釋父之殯跋山浮江從子之兄于海旁願有謁也久矣不敢以言吾親之生我學於四方不得所欲以養今已不幸卒也得子之兄志而銘之藏之墓中可以顯於今世以傳於後雖吾小人與榮焉無悔焉不知子之兄可不可吾弟以告豫嘆曰審如是可以為孝君子固成人之孝而吾與之又舊其何顧而辭即取吾所素知者為之志而銘之志曰君諱某池之銅陵人生於丁丑興國之年也卒於丁亥是為慶厯七年子七人某以十月葬君於谷垂山胡氏世大家闔門數百人君有子舜元獨招里先生教之為士其卒也族分而資衰舜元為善士銘曰壽七十一不為不多吾與之銘千古不磨王深父墓志銘通篇以虛景相感慨而多沈鬱之思吾友深父書足以致其言言足以遂其志志欲以聖人之道為己任蓋非至於命弗止也故不為小廉曲謹以投衆人耳目而取舍進退去就必度於仁義世皆稱其學問文章行治然真知其人者不多而多見謂迂闊不足趣時合變嗟乎是乃所以為深父也令深父而有以合乎彼則必無以同乎此矣嘗獨以謂天之生夫人也殆將以壽考成其才使有待而後顯以施澤於天下或者誘其言以明先王之道覺後世之民嗚呼孰以為道不任於天德不酬於人而今死矣甚哉聖人君子之難知也以孟軻之聖而弟子所願止於管仲晏嬰况餘人乎至於揚雄尤當世之所賤簡其為門人者一侯芭而已芭稱雄書以為勝周易易不可勝也芭尚不為知雄者而人皆曰古之人生無所遇合至其沒久而後世莫不知若軻雄者其沒皆過千嵗讀其書知其意者甚少則後世所謂知者未必真也夫此兩人以老而終幸能著書書具在然尚如此嗟乎深父其智雖能知軻其於為雄雖幾可以無悔然其志未就其書未具而既早死豈特無所遇於今又將無所傳於後天之生夫人也而命之如此蓋非余所能知也深父諱回本河南王氏其後自光州之固始遷福州之侯官為侯官人者三世曽祖諱某某官祖諱某某官考諱某尚書兵部員外郎兵部葬潁州之汝隂故今為汝隂人深父嘗以進士補亳州衛真縣主簿嵗餘自免去有勸之仕者輒辭以養母其卒以治平二年七月二十八日年四十三於是朝廷用薦者以為某軍節度推官知陳州南頓縣事書下而深父死矣夫人曽氏先若干日卒子男一人某女二人皆尚幼諸弟以某年某月某日葬深父某縣某鄉某里以曽氏祔銘曰嗚呼深父維德之仔肩以迪祖武厥艱荒遐力必踐取莫吾知庸亦莫吾侮神則尚反歸形此土王逢原墓志銘通篇無事迹獨以虛景相感慨嗚呼道之不明邪豈特教之不至也士亦有罪焉嗚呼道之不行邪豈特化之不至也士亦有罪焉蓋無常産而有常心者古之所謂士也士誠有常心以操聖人之説而力行之則道雖不明乎天下必明於已道雖不行於天下必行於妻子內有以明於已外有以行於妻子則其言行必不孤立於天下矣此孔子孟子伯夷栁下惠揚雄之徒所以有功於世也嗚呼以豫之昏弱不肖固亦士之有罪者而得友焉余友字逢原諱令姓王氏廣陵人也始豫愛其文章而得其所以言中豫愛其節行而得其所以行卒豫得其所以言浩浩乎其將沿而不窮也得其所以行超超乎其將追而不至也於是慨然歎以為可以任世之重而有功於天下者將在於此余將友之而不得也嗚呼今棄豫而死矣悲夫逢原左武衛大將軍諱奉諲之曽孫大理評事諱珙之孫而鄭州管城縣主簿諱世倫之子五嵗而孤二十八而卒卒之九十三日嘉祐四年丙申葬于常州武進縣南鄉薛村之原夫人吳氏亦有賢行於是方娠也未知其子之男女銘曰壽胡不多天實爾嗇曰天不相胡厚爾德厚也培之嗇也推之樂以不罷不怨以疑嗚呼天民將在于兹金溪吳君墓志銘嗚咽君和易罕言外如其中言未嘗極人過失至論前世善惡其國家存亡治亂成敗所繇甚可聽也嘗所讀書甚衆尤好古而學其辭其辭又能盡其議論年四十三四以進士試於有司而卒困於無所就其葬也以皇祐六年某月日撫州之金溪縣歸德鄉石廩之原在其舍南五里當是時君母夫人既老而子世隆世範皆尚幼三女子其一卒其二未嫁云嗚呼以君之有與夫世之貴富而名聞天下者計焉其獨歉彼耶然而不得祿以行其意以祭以養以遺其子孫以卒此其士友之所以悲也夫學者將以盡其性盡性而命可知也知命矣於君之不得意其又何悲耶銘曰蕃君名字彥弼氏吳其先自姬出以儒起家世冕黻獨成之難幽以折厥銘維甥訂君實馬漢臣墓志銘簡而深合淝人馬仲舒字漢臣其先茂陵人父臯為江東撥發置其家金陵漢臣因入學齒諸生為人喜酒色其相語以褻私侈為主父母不欲之又隆愛之不能逆其意以教也然漢臣亦踈金錢急人險艱不自顧計於衆中尤慕近豫豫亦識其可教以禮法開之果大寤遂自銼刻務以入禮法從豫學作進士既數月其辭章粲然充其科者也漢臣長豫四年豫兄弟視之漢臣視豫則師弟子如也嘗助豫叔父之喪若子姓然慶厯六年漢臣冠五年矣從豫入京師待進士舉六月病死死時豫亦病其叔父在京師因得棺斂歸金陵殯於某年某月乃葬于某處孔子曰秀而不實者有矣夫漢臣幾是矣噫志其墓云吳處士墓志銘序處士生平故皆虛語君吳氏諱某字某其先建安大姓曽大父諱某建州長史大父諱某館驛巡官撿挍尚書吏部員外郎皆江南李氏所置也方李氏時吏部府君之父子同時仕江南者以十數至君之考諱某始以汀州軍事推官歸選於朝主鄭之新鄭簿君少孤事母夫人至孝與其弟軻相愛春秋祭先人雖老矣視牲省器皆不以屬子孫俯仰齋栗如見其饗之者已祭未嘗不悲哀也讀書取大指通而已或勸之謀利曰吾貧久矣人以我為憂而我以是為樂不能改也有子三人甫申冉皆不使事生産曰士而貧多於工商而富也三人者皆以進士貢於鄉而申為太平州軍事推官君年七十八某年某月某日卒於太平之官舍甫等護其柩歸葬於江州某縣某鄉某原某年某月日也夫人前君卒别葬實南陽葉氏始君所居毁於水乃奉母夫人來客江州愛其山川而遂家之故其葬也以歸焉申之友南陽張頡論次君之事如此而申以告曰先人不幸力為善而不獲顯於天下今具葬宜得銘使後世有見焉嗟乎豫不及識君矣然豫之故人多能言君之教諸子盡其道故卒皆有立而申之文行尤以知名於世方今士大夫之列於朝者天子於其父母皆有以寵嘉之其官封之卑巨視其子所以勸天下之為父母而慰其子之心以君之善教而子之材宜及其身有高爵盛位之報焉其生也既不及其沒也孰知其不卒享也哉是故不宜無銘也銘曰士或為仁稱止一鄉至其後興厥聞乃光或業以勤而傳之圮維是不朽實君有子孔處士墓志銘通篇虛景却敘得有法先生諱旻字寧極睦州桐廬縣尉諱詢之曽孫贈國子博士諱延滔之孫尚書都官員外郎諱昭亮之子自都官而上至孔子四十五世先生嘗欲舉進士已而悔曰吾豈有不得已於此邪遂居于汝州之龍興山而上葬其親于汝汝人爭訟之不可平者不聽有司而聽先生之一言不羞犯有司之刑而以不得於先生為耻慶厯七年詔求天下行義之士而守臣以先生應詔於是朝廷賜之米帛又敕州縣除其雜賦嘉祐三年近臣多言先生有道德可用而執政度以為不肯屈除守祕書省校書郎致仕四年近臣又多以為言乃召以為國子監直講先生辭乃除守光祿寺丞致仕五年大臣有請先生為其屬縣者於是天子以知汝州龍興縣事先生又辭未聽而六月某日先生終于家年六十七大臣有為之請命者乃特贈太常丞至七年月日弟􅀈葬先生於堯山都官之兆而以夫人李氏祔李氏故大理評事昌符之女生一女嫁為士人妻而先物故先生事父母至孝居喪如禮遇人恂恂雖僕奴不忍以辭氣加焉衣食與田桑有餘輒以賙其鄉里貸而後不能償者未嘗問也未嘗疑人人亦以故不忍欺之而世之傳先生者多異學士大夫有知而能言者蓋先生孝弟忠信無求於世足以使其鄉人畏服之如此而先生未嘗為異也先生博學尤喜易未嘗著書獨大衍一篇傳於世考其行治非有得於內其孰能致此耶當漢之東徙高守節之士而亦以故成俗故當世處士之聞獨多於後世乃至於今知名為賢而處者蓋亦無有幾人豈世之所不尚遂湮沒而無聞抑士之趨操亦有待於世邪若先生固不為有待於世而卓然自見於時豈非所謂豪傑之士者哉其可銘也已銘曰有入而不出以身易物有往而不反以私其佚嗚呼先生好潔而無尤匪佚之為私維志之求建安章君墓志銘序跌宕之行故文亦趺宕君諱友直姓章氏少則卓越自放不羈不肯求選舉然有高節大度過人之材其族人郇公為宰相欲奏而官之非其好不就也自江淮之上嶺南之間以至京師無不遊將相大人豪傑之士以至閭巷庸人小子皆與之交際未嘗有所忤莫不得其歡心卒然以是非利害加之而莫能見其喜慍視其心若不知富貴貧賤之可以擇而取也頽然而已矣昔列禦寇莊周當文武末世哀天下之士沈於得喪陷于毁譽離性命之情而自託於人偽以爭須臾之欲故其所稱述多所謂天之君子若君者似之矣君讀書通大指尤善相人然諱其術不多為人道之知音樂書畫奕碁皆以知名於一時皇祐中近臣言君文章善篆有旨召試君辭焉於是太學篆石經又言君善篆與李斯陽氷相上下又召君君即往經成除試將作監主簿不就也嘉祐七年十一月甲子以疾卒于京師年五十七娶辛氏生二男存孺為進士五女子其長嫁常州晉陵縣主簿侍其璹早卒璹又娶其中女次適蘇州吳縣黃元二人未嫁君家建安者五世其先則豫章人也君曽祖考諱某佐江南李氏為建州軍事推官祖考諱某皇著作佐郎贈工部尚書考諱某京兆府節度判官君以某年某月某甲子葬潤州丹陽縣金山之東園銘曰弗績弗雕弗跂以為高俯以狎於野仰以遊於朝中則有實視銘其昭唐宋八大家文鈔卷九十四
