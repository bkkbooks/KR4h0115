body:
  text: 唐宋八大家文鈔卷一百二十八明茅坤撰東坡文鈔十二論武王論通篇將無作有轉輾不窮大畧從戰國辯口中來此是東坡議論文中滑稽也武王克殷以殷遺民封紂子武庚禄父使其弟管叔鮮蔡叔度相禄父治殷武王崩禄父與管蔡作亂成王命周公誅之而立微子於宋蘇子曰武王非聖人也昔者孔子葢罪湯武顧自以為殷之子孫而周人也故不敢然數致意焉曰大哉巍巍乎堯舜也禹吾無間然其不足於湯武也亦明矣曰武盡美矣未盡善也又曰三分天下有其二以服事殷周之德其可謂至德也已矣伯夷叔齊之於武王也葢謂之弑君至耻之不食其粟而孔子予之其罪武王也甚矣此孔氏之家法也世之君子茍自孔氏必守此法國之存亡民之死生將於是乎在其孰敢不嚴而孟軻始亂之曰吾聞武王誅獨夫紂未聞弑君也自是學者以湯武為聖人之正若當然者皆孔氏之罪人也使當時有良史如董狐者南巢之事必以叛書牧野之事必以弑書而湯武仁人也必將為法受惡周公作無逸曰殷王中宗及髙宗及祖甲及我周文王茲四人廸哲上不及湯下不及武王亦以是哉文王之時諸侯不求而自至是以受命稱王行天子之事周之王不王不計紂之存亡也使文王在必不伐紂紂不見伐而以考終或死於亂殷人立君以事周命為二王後以祀殷君臣之道豈不兩全也哉武王觀兵於孟津而歸紂若不改過則殷人改立君武王之待殷亦若是而已矣天下無主有聖人者出而天下歸之聖人所不得辭也而以兵取之而放之而殺之可乎漢末大亂豪傑並起茍文若聖人之徒也以為非曹操莫與定海内故起而佐之所以與操謀者皆王者之事文若豈敎操反者哉以仁義救天下天下旣平神器自至將不得已而受之不至不取也此文王之道文若之心也及操謀九錫則文若死之故吾嘗以文若為聖人之徒者以其才似張子房而道似伯夷也殺其父封其子其子非人也則可使其子而果人也則必死之楚人將殺令尹子南子南之子棄疾為王馭士王泣而告之旣而殺子南其徒曰行乎曰吾與殺吾父行將焉入然則臣王乎曰棄父事讐吾弗忍也遂縊而死武王親以黄鉞斬紂使武庚受封而不叛豈復人也哉故武庚之必叛不待智者而後知也武王之封武庚葢亦不得已焉耳殷有天下六百年賢聖之君六七作紂雖無道其故家遺俗未盡滅也三分天下有其二殷不伐周而周伐之誅其君夷其社稷諸侯必有不悦者故封武庚以慰之此豈武王之意哉故曰武王非聖人也子瞻之論武王雖非天下萬世之公而其援孔子之所與以見其所欲罪援書之所及以見其所不及又以春秋所書趙盾者以案武王亦成一家縱横之言獨其所稱荀文若一節似迂且僻矣文若佐操只是挾天子以令諸侯何得稱王者之事操之簒漢固其始事本謀何得直遲之以謀九錫平王論此文類韓諱辯非蘇氏本色分明是宋南渡一斷案太史公曰學者皆稱周伐紂居洛邑其實不然武王營之成王使召公卜居之居九鼎焉而周復都酆鎬至犬戎敗幽王周乃東徙于洛蘇子曰周之失計未有如東遷之謬也自平王至於亡非有大無道者也頿王之神聖諸侯服享然終以不振則東遷之過也昔武王克商遷九鼎于洛邑成王周公復增營之周公旣沒葢君陳畢公更居焉以重王室而已非有意于遷也周公欲葬成周而成王葬之畢此豈有意于遷哉今夫富民之家所以遺其子孫者田宅而巳不幸而有敗至於乞假以生可也然終不敢議田宅今平王舉文武成康之業而大弃之此一敗而鬻田宅者也夏商之王皆五六百年其先王之德無以過周而後王之敗亦不减幽厲然至于桀紂而後亡其未亡也天下宗之不如東周之名存而實亡也是何也則不鬻田宅之效也盤庚之遷也復殷之舊也古公遷于岐方是時周人如狄人也逐水草而居豈所難哉衛文公東徙渡河恃齊而存耳齊遷臨淄晉遷于絳于新田皆其盛時非有所畏也其餘避宼而遷都未有不亡雖不卽亡未有能復振者也春秋時楚大饑羣蠻叛之申息之北門不啓楚人謀徙于阪髙蒍賈曰不可我能徃㓂亦能徃於是乎以秦人巴人滅庸而楚始大蘇峻之亂晉幾亡矣宗廟宫室盡為灰燼温嶠欲遷都豫章三呉之豪欲遷㑹稽將從之矣獨王導不可曰金陵王者之都也王者不以豐儉移都若宏衛文大帛之冠何適而不可不然雖樂土為墟矣且北㓂方彊一旦示弱竄於蠻越望實皆喪矣乃不果遷而晉復安賢哉導也可謂能定大事矣嗟夫平王之初周雖不如楚之彊顧不愈於東晉之微乎使平王有一王導定不遷之計收豐鎬之遺民而修文武成康之政以形勢臨東諸侯齊晉雖彊未敢貳也而秦何自霸哉魏惠王畏秦遷于大梁楚昭王畏呉遷于鄀頃襄王畏秦遷于陳考烈王畏秦遷于夀春皆不復振有亡徴焉東漢之末董卓劫帝遷于長安漢遂以亡近世李景遷于豫章亦亡故曰周之失計未有如東遷之謬也予覽此文以遷之一字為案以無畏而遷者五以有畏而不果遷者二以畏而遷者六共十三國以錯証存亡處如一線矣始皇論一前罪秦始皇誤用趙髙人所共知者後罪秦始皇積威故足以制太子之死而不請人所不知者秦始皇帝時趙髙有罪蒙毅按之當死始皇赦而用之長子扶蘇好直諫上怒使北監蒙恬兵於上郡始皇東㳺㑹稽並海走琅邪少子胡亥李斯蒙毅趙髙從道病使蒙毅還禱山川未及還上崩李斯趙髙矯詔立胡亥殺扶蘓蒙恬蒙毅卒以亡秦蘓子曰始皇制天下輕重之勢使内外相形以禁姦備亂者可謂密矣蒙恬將三十萬人威振北方扶蘓監其軍而蒙毅侍帷幄為謀臣雖有大姦賊敢睥睨其間哉不幸道病禱祠山川尚有人也而遣蒙毅故髙斯得成其謀始皇之遣毅毅見始皇病太子未立而去左右皆不可以言智雖然天之亡人國其禍敗必出於智所不及聖人為天下不恃智以防亂恃吾無致亂之道耳始皇致亂之道在用趙髙夫閹尹之禍如毒藥猛獸未有不裂肝碎首者也自書契以來惟東漢吕疆後唐張承業二人號稱善良豈可望一二於千萬以徼必亡之禍哉然世主皆甘心而不悔如漢桓靈唐肅代猶不足深怪始皇漢宣皆英主亦湛於趙髙恭顯之禍彼自以為聰眀人傑也奴僕熏腐之餘何能為及其亡國亂朝乃與庸主不異吾故表而出之以戒後世人主如始皇漢宣者或曰李斯佐始皇定天下不可謂不智扶蘓親始皇子秦人戴之久矣陳勝假其名猶足以亂天下而蒙恬持重兵在外使二人不即受誅而復請之則斯髙無遺類矣以斯之智而不慮此何哉蘇子曰嗚呼秦之失道有自來矣豈獨始皇之罪自商鞅變法以殊死為輕典以叅夷為常法人臣狼顧脅息以得死為幸何暇復請方其法之行也求無不獲禁無不止鞅自以為軼堯舜而駕湯武矣及其出亡而無所舍然後知為法之弊夫豈獨鞅悔之秦亦悔之矣荆軻之變持兵者熟視始皇環柱而走莫之救者以秦法重故也李斯之立胡亥不復忌二人者知威令之素行而臣子不敢復請也二人之不敢請亦知始皇之鷙悍而不可回也豈料其偽也哉周公曰平易近民民必歸之孔子曰有一言而可以終身行之其恕矣乎夫以忠恕為心而以平易為政則上易知而下易逹雖有賣國之姦無所投其隙倉卒之變無自發焉然其令行禁止葢有不及商鞅者矣而聖人終不以彼易此商鞅立信於徙木立威於棄灰刑其親戚師傅積威信之極以及始皇秦人視其君如雷電鬼神不可測也古者公族有罪三宥然後制刑今至使人矯殺其太子而不忌太子亦不敢請則威信之過也故夫以法毒天下者未有不反中其身及其子孫者也漢武與始皇皆果於殺者也故其子如扶蘓之仁則寧死而不請如戾太子之悍則寧反而不訴知訴之而不察也戾太子豈欲反者哉計出於無聊也故為二君之子者有死與反而已李斯之智葢足以知扶蘇之必不反也吾又表而出之以戒後世人主之果於殺者予覽志林十三首按年譜子瞻由南海後所作公於時經厯世途已久故上下古今處所見尤别而此篇亦古今痛快卓􅀈之議始皇論二賈誼過秦在於失攻守之勢子瞻過秦在於破壞先王之法昔者生民之初不知所以養生之具擊搏挽裂與禽獸爭一日之命惴惴然朝不謀夕憂死之不給是故巧詐不生而民無知然聖人惡其無别而憂其無以生也是以作為器用耒耜弓矢舟車網罟之類莫不備至使民樂生便利役御萬物而適其情而民始有以極其口腹耳目之欲器利用便而巧詐生求得欲從而心志廣聖人又憂其桀猾變詐而難治也是故制禮以反其初禮者所以反本復始也聖人非不知箕踞而坐不揖而食便於人情而適於四體之安也將必使之習為迂闊難行之節寛衣博帶佩玉履舄所以囘翔容與而不可以馳驟上自朝廷而下至於民其所以視聽其耳目者莫不近於迂闊其衣以黼黻文章其食以籩豆簠簋其耕以井田其進取選舉以學挍其治民以諸侯嫁娶死喪莫不有法嚴之以鬼神而重之以四時所以使民自尊而不輕為姦故曰禮之近於人情者非其至也周公孔子所以區區於升降揖讓之間丁寜反覆而不敢失墜者世俗之所謂迂闊而不知夫聖人之權固在於此也自五帝三代相承而不敢破至秦有天下始皇帝以詐力而幷諸侯自以為智術之有餘而禹湯文武之不知出此也於是廢諸侯破井田凡所以治天下者一切出於便利而不耻於無禮決壊聖人之藩墻而以利器明示天下故自秦以來天下惟知所以求生避死之具而以禮者為無用贅疣之物何者其意以為生之無事乎禮也茍生之無事乎禮則凡可以得生者無所不為矣嗚呼此秦之禍所以至今而未息歟昔者始有書契以科斗為文而其後始有䂓矩摹畫之迹葢今所謂大小篆者至秦而更以𨽻其後日以變革貴於速成而從其易又創為紙以易簡策是以天下簿書符檄繁多委壓而吏不能究姦人有以措其手足如使今世而尚用古之篆書簡策則雖欲繁多其勢無由由此觀之則凡所以便利天下者是開詐偽之端也嗟夫秦旣不可及矣茍後之君子欲治天下而惟便利之求則是引民而日趍於詐也悲夫漢髙帝論議論正勝老泉有進説於君者因其君之資而為之説則用力寡矣人唯好善而求名是故仁義可以誘而進不義可以劫而退若漢髙帝起於草莾之中徒手奮呼而得天下彼知天下之利害與兵之勝負而已安知所謂仁義者哉觀其天資固亦有合於仁義者而不喜仁義之説此如小人終日為不義而至以不義説之則亦怫然而怒故當時之善説者未嘗敢言仁義與三代禮樂之教亦惟曰如此而為利如此而為害如此而可如此而不可然後髙帝擇其利與可者而從之葢亦未嘗遲疑天下旣平以愛故欲易太子大臣叔孫通周昌之徒力爭之不能得用留侯計僅得之嘗讀其書至此未嘗不太息以為髙帝最易曉者茍有以當其心彼無所不從盍亦告之以吕后太子從帝起於布衣以至於定天下天下望以為君雖不肖而大臣心欲之如百嵗後誰肯北靣事戚姬子乎所謂愛之者祗以禍之嗟夫無有以奚齊卓子之所以死為髙帝言者歟叔孫通之徒不足以知天下之大計獨有廢嫡立庻之説而欲持此以却之此固髙帝之所輕為也人固有所不平使如意為天子惠帝為臣絳灌之徒圜視而起如意安得而有之孰與其全安而不失為王之利也如意之為王而不免於死則亦髙帝之過矣不少抑逺之以泄吕后不平之氣而又厚封焉其為計不已踈乎或曰吕后強悍髙帝恐其為變故欲立趙王此又不然自高帝之時而言之計吕后之年當死於惠帝之手吕后雖悍亦不忍奪之其子以與姪惠帝旣死而吕后始有邪謀此出於無聊耳而髙帝安得逆知之且夫事君者不能使其心知其所以然以樂從吾説而欲以勢奪之亦已危矣如留侯之計髙帝顧戚姬悲歌而不忍特以其勢不得不從是以猶欲區區為趙王計使周昌相之此其心猶未悟以為一彊項之周昌足以抗吕氏而捍趙王不知周昌激其怒而速之死耳古之善原人情而深識天下之勢者無如高帝然至此而惑亦無有以告之者悲夫以髙帝之英雄而羣臣不能爭其如意之欲立以武帝之竒氣而廷臣不能明其太子之被讒威爽之過也老泉論髙帝與其能用平勃子瞻論髙帝病其易太子而不能保趙王如意皆非所以論帝王王天下之大端也髙帝起布衣以五年而定天下可謂雄矣特其大封同姓而病於踈誅戮功臣而病於猜寵嬖後宫而病於無制當其在位之時反者吹蝟毛而起而身沒未幾漢業幾殆而陵夷至於文景天下猶鞅掌而不安由其不能講求先王經制之法故也魏武帝論行文似從戰國策來寖滛之以自家本色故多嫋娜綽約處世之所謂智者知天下之利害而審乎計之得失如斯而已矣此其為智猶有所窮唯見天下之利而為之唯其害而不為則是有時而窮焉亦不能盡天下之利古之所謂大智者知天下利害得失之計而權之以人是故有所犯天下之至危而卒以成大功者此以其人權之輕敵者敗重敵者無成功何者天下未嘗有百全之利也舉事而待其百全則必有所格是故知吾之所以勝人而人不知其所以勝我者天下莫能敵之昔者晉荀息知虞公必不能用宫之竒齊鮑叔知魯君必不能用施伯薛公知黥布必不出於上策此三者皆危道也而直犯之彼不知用其所長又不知出吾之所忌是故不可以冒害而就利自三代之亡天下以詐力相并其道術政敎無以相過而能者得之當漢氏之衰豪傑並起而圗天下二袁董吕爭為彊暴而孫權劉備又以區區於一隅其用兵制勝固不足以敵曹氏然天下終於分裂訖魏之世而不能一葢嘗試論之魏武長於料事而不長於料人是故有所重發而喪其功有所輕為而至於敗劉備有葢世之才而無應卒之機方其新破劉璋蜀人未附一日而四五驚斬之不能禁釋此時不取而其後遂至於不敢加兵者終其身孫權勇而有謀此不可以聲勢恐喝取也魏武不用中原之長而與之爭於舟楫之間一日一夜行三百里以爭利犯此二敗以攻孫權是以喪師於赤壁以成呉之強且夫劉備可以急取而不可以緩圖方其危疑之間卷甲而趨之雖兵法之所忌可以得志孫權者可以計取而不可以勢破也而欲以荆州新附之卒乗勝而取之彼非不知其難特欲僥倖於權之不敢抗也此用之於新造之蜀乃可以逞故夫魏武重發於劉備而喪其功輕為於孫權而至於敗此不亦長於料事而不長於料人之過歟嗟夫事之利害計之得失天下之能者舉知之而不能權之以人則亦紛紛焉或勝或負爭為雄彊而未見其能一也古之起自匹夫行伍而取天下者葢必其身有定天下之畧而非沾沾以割據四方為謀者漢唐宋是也魏武帝雖稱奸雄其始也輒以傾漢室而代之為謀故其劫天子誅強國並創心割據而二袁吕布非其敵者為其所屏耳宗之雄如備藩之傑起如權其能為之下乎使魏武力奬王室以身下備與權則漢之桓靈之業未必不復振而魏武且為元勲也其去三分天下僅三世而亡相去豈特尺寸哉魯隱公論一子瞻得經所載攝主明與季康子一節故其論獨刺骨魯隱公元年不書即位攝也公子翬請殺桓公公曰為其少故也吾將授之矣使營莵裘吾將老焉翬懼反譖公於桓而使賊殺公歐陽子曰隱公非攝也使隱而果攝則春秋不書為公春秋書為公則隱公非攝無疑也蘓子曰非也春秋信史也隱攝而桓弑著於史也詳矣周公攝而克復子者也以周公薨故不稱王隱公攝而不克復子者也以魯公薨故稱公史有謚國有廟春秋獨得不稱公乎然則隱公之攝也禮歟曰禮也何自聞之曰聞之孔子曾子問曰君薨而世子未生如之何孔子曰卿大夫士從攝主北靣於西階南何謂攝主曰古者天子諸侯卿大夫之世子未生而死則其弟若兄弟之子以當立者為攝主子生而女也則攝主立男也則攝主退此之謂攝主古之人有為之者季康子是也季桓子且死命其臣正常曰南孺子之子男也則以告而立之女也則肥也可桓子卒康子即位旣塟康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與夫人而立之今生矣男也敢告康子請退康子之謂攝主古之道也孔子行之自秦漢以來不修是禮而以母后攝孔子曰唯女子與小人為難養也使與聞外事且不可曰牝雞之晨惟家之索而況可使攝位而臨天下乎女子為政而國安唯齊之君王后吾宋之曹髙向也葢亦千一矣自東漢馬鄧不能無譏而漢吕后魏胡武靈唐武氏之流葢不勝其亂王莽楊堅遂因以易姓由是觀之豈若攝主之庻幾乎使母后而可信則攝主亦可信也若均之不可信則攝主取之猶吾先君之子孫也不猶愈於異姓之取哉或曰君薨而百官總已以聽於冢宰三年安用攝主曰非此之謂也嗣天子長矣宅憂而未出令則以禮攝冡宰若太子未生生而弱未能君也則三伐之禮孔子之學決不以天下付異姓其付之攝主也夫豈非禮而周公行之歟故隱公亦攝主也鄭𤣥儒之陋者也其傳攝主也曰上卿代君聽政者也使子生而女則上卿豈繼世者乎蘓子曰攝主先王之令典孔子之法言也而世不知習見母后之攝也而以為當然也吾不可不論以待後世之君子唐荆川曰先作定論後説原由魯隱公論二竒文公子翬請殺桓公以求太宰隱公曰為其少故也吾將授之矣使營莵裘吾將老焉翬懼反譛公於桓公而弑之蘇子曰盜以兵擬人人必殺之夫豈獨其所擬塗之人皆捕擊之矣塗之人與盜非仇也以為不擊則盜且并殺已也隱公之智曾不若是塗之人也哀哉隱公惠公繼室之子也其為非嫡與桓均爾而長於桓隱公追先君之志而授國焉可不謂仁乎惜乎其不敏於智也使隱公誅翬而讓桓雖夷齊何以尚茲驪姬欲殺申生而難里克則施優來之二世欲殺扶蘇而難李斯則趙髙來之此二人之智若出一人而其受禍亦不少異里克不免於惠公之誅李斯不免於二世之虐皆無足哀者吾獨表而出之以為世戒君子之為仁義也非有計於利害然君子之所為義利常兼而小人反是李斯聼趙髙之謀非其本意獨畏蒙氏之奪其位故勉而聽髙使斯聞髙之言即召百官陳六師而斬之其德於扶蘓豈有旣乎何蒙氏之足憂釋此不為而具五刑於市非下愚而何嗚呼亂臣賊子猶蝮虵也其所螫草木猶足以殺人況其所噬齧者歟鄭小同為髙貴鄉公侍中嘗詣司馬師師有宻䟽未屏也如厠還問小同見吾䟽乎曰不見師曰寧我負卿無卿負我遂酖之王允之從王敦夜飲辭醉先寢敦與錢鳯謀逆允之已醒悉聞其言慮敦疑已遂大吐衣靣皆汙敦果照視之見允之臥吐中乃已哀哉小同殆哉岌岌乎允之也孔子曰危邦不入亂邦不居有以也夫吾讀史得魯隱公晉里克秦李斯鄭小同王允之五人感其所遇禍福如此故特書其事後之君子可以覽觀焉宋襄公論千古隻眼之論自正當魯僖公二十二年冬十有一月巳巳朔宋公及楚人戰于泓宋師敗績春秋書戰未有若此之嚴而盡也蘇子曰宋公天子之上公宋先代之後於周為客天子有事膰焉有喪拜焉非列國諸侯之所敢敵也而曰及楚人戰于泓楚蠻夷之國人微者之稱以天子之上公而當蠻夷之微者至於敗績宋公之罪葢可見矣而公羊傳以為文王之戰不過是學者疑焉故不可以不辨宋襄公非獨行仁義而不終者也以不仁之資盜仁者之名爾齊宣有牽牛而過堂下者曰牛何之曰將以釁鐘王曰舍之吾不忍其觳觫若無罪而就死地夫捨一牛於德未有所損益者而孟子予之以王所謂以不忍人之心行不忍人之政三代之所共也而宋襄公執鄫子用於次睢之社君子殺一牛之不忍而宋公戕一國君若犬豕然此而忍為之天下孰有不忍者耶泓之役身敗國衂乃欲以不重傷不禽二毛欺諸侯人能紾其兄之臂以取食而能忍饑於壺飱者天下知其不情也桓文之師存亡繼絶猶不齒於仲尼之門況用人於夷鬼以求霸而謂之王者之師可乎使鄫子有罪而討之雖聲之諸侯而戮於社天下不以為過若以喜怒興師則秦繆公獲晉侯且猶釋之而況敢用諸淫昏之鬼乎以愚觀之宋襄公王莾之流襄公以諸侯為可以名得王莾以天下為可以文取也其得喪小大不同其不能欺天下則同也其不鼓不成列不能損襄公之虐其抱孺子以泣不能葢王奔之簒使莾無成則宋襄公襄公得志亦一莾也古人有言圖王不成其弊猶足以霸襄公行王者之師猶足以當桓文之師一戰之餘救死扶傷不暇此獨妄庸耳齊桓晉文得管仲子犯以興襄公有一子魚不能用豈可同日而語哉自古失道之君如是者多矣死而論定未有如宋襄公之欺於後世者也唐宋八大家文鈔卷一百二十八
