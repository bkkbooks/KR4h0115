body:
  text: 唐宋八大家文鈔卷一百十九明茅坤撰東坡文鈔三上書再上皇帝書不出前書所言特於前所未盡者更曲鬯之耳臣聞之益戒於禹曰任賢勿貳去邪勿疑仲虺言湯之德曰用人惟已改過不吝秦穆喪師于崤悔痛自誓孔子録之自古聰明豪傑之主如漢高帝唐太宗皆以受諫如流改過不憚號為秦漢以來百王之冠孔子曰君子之過如日月食焉過也人皆見之更也人皆仰之聖賢舉動明白正直不當如是耶所用之人有邪有正所作之事有是有非是非邪正兩言而足正則用之邪則去之是則行之非則改之此理甚明猶饑之必食渇之必飲豈有别主義理曲加粉飾而能欺天下哉書曰與治同道罔不興與亂同事罔不亡陛下自去嵗以來所行新法皆不與治同道立條例司遣青苗使斂助役錢行均輸法四海騷動行路怨咨自宰相以下皆知其非而不敢爭臣愚惷不識忌諱廼者上疏論之詳矣而學識淺陋不足以感動聖明近者故相舊臣藩鎭侍從雜然爭言其不便以至臺諫二三人本其所與締交唱和表裏之人也然卒不免一言其非者豈非物議沸騰事勢廹切而不可止歟自非見利忘義居之不疑者孰肯終始膠固不自湔洗如呉師孟乞免提舉胡宗愈不願撿詳如逃垢穢惟恐不脱人情畏惡一至於此近者中外讙言陛下巳有悔悟意道路相慶如䝉大賚實望陛下於旬日之間渙發德音洗蕩乖僻追還使者而罷條例司今者側聽所為葢不過使監司體量抑配而已比之未悟所較㡬何此孟子所謂知兄臂之不可紾而姑勸以徐知鄰雞之不可攘而月取其一帝王改過豈如是哉臣又聞陛下以為此法且可試之三路臣以為此法譬之醫者之用毒藥以人之死生而試其未效之方三路之民豈非陛下赤子而可試以毒藥乎今日之政小用則小敗大用則大敗若力行而不已則亂亡隨之臣非敢過為危論以聳動陛下也自古存亡之所寄者四人而巳一曰民二曰軍三曰吏四曰士此四人者一失其心足以生變今陛下一舉而兼犯之青苗助役之法成則農不安均輸之令岀則商賈不行而民始憂矣併省諸軍迫逐老病至使戍兵之妻與士卒雜處其間貶殺軍分有同降配遷徙淮甸僅若流放年近五十人人懷憂而軍始怨矣内則不取謀於元臣侍從而專用新進小生外則不責成於守令監司而專用青苗使者多置閑局以擯老成而吏始解體矣陛下臨軒選士天下謂之龍飛牓而進士一人首削舊恩示不復用所削者一人而已然士莫不悵恨者皆以陛下有厭薄其徒之意也今用事者又欲漸消進士純取明經雖未有成法而小人招權自以為功更相扇揺以謂必行而士始失望矣今進士半天下自二十以上便不能誦記注義為明經之學若法令一更則士各懷廢棄之憂而人才短長終不在此昔秦禁挾書而諸生皆抱其業以歸勝廣相與岀力而亡秦者豈有他哉亦徒以失業而無歸也故臣願陛下勿復言此民憂而軍怨吏解體而士失望禍亂之原有大於此者乎今未見也一旦有急則致命之士必寡矣方是之時不知希合茍容之徒能為陛下收板蕩止土崩乎去年諸軍之始併也左右之人皆以士心樂併告陛下近者放停軍人李興告虎翼吏率錢行賂以求不併則士卒不樂可知矣夫諂諛之人茍務合意不憚欺罔者類皆如此故凡言百姓樂請青苗錢樂岀助役錢者皆不可信陛下以為青苗抑配果可禁乎不惟不可禁廼不當禁也何以言之若此錢放而不收則州縣官吏不免責罰若此錢果不抑配則願請之戸後必難收索前有抑配之禁後有失䧟之罰為陛下官吏不亦難乎故臣以為既行青苗使則不當禁抑配其勢然也人皆謂陛下聖明神武必能徙義修慝以致太平而今日之事乃有文過遂非之風此臣所以憤懣太息而不能已也昔賈充用事天下憂恐而庾純任愷戮力排之及充岀鎭秦涼忠臣義士莫不相慶屈指數日以望惟新之化而馮紞之徒更相告曰賈公遠放吾等失勢矣於是相與獻謀而充復留則晉氏之亂成於此矣自古惟小人為難去何則去一人而其黨破壞是以為之計謀遊說者衆也今天下賢者亦將以此觀陛下為進退之決或再失望則知㡬之士相率而逝矣豈皆如臣等輩偷安懷禄而不忍去哉猖狂不遜忤陛下多矣不敢復望寛恩俯伏引領以待誅殛上皇帝書學本經術而養生之訣無出此矣臣伏以今月初五日南至文武百僚入賀所以賀一陽來復也謹按易復卦雷在地中復先王以至日閉關商旅不行后不省方說易者曰乾六陽之氣也為十一月爲十二月爲正月爲二月爲三月爲四月而乾之陽極矣陽極則隂生隂生則夏至矣坤六隂之氣也爲五月爲六月爲七月爲八月爲九月爲十月而坤之隂極矣隂極則陽生陽生則冬至矣自太極分爲二儀二儀分爲四象四象分爲十二月十二月分爲三百六十五日五日爲一候分爲七十二候三候爲一氣分爲二十四氣上爲日月星辰下爲山川草木鳥獸蟲魚不出此隂陽之氣升降而巳惟人也全天地十干之氣十月而成形故能天能地能人一消一息一呼一吸晝夜與天地相通差舛毫忽則邪沴之氣干之矣故於冬至一陽之生也五隂在上五陽在伏而一陽初生於伏之下其氣至微其兆絪縕可以靜而不動可以嗇養而不可以發宣故乾之初九爻曰潛龍勿用孔子曰陽在下也言陽氣方潛於下未可以用也先王於是日閉關商旅不行后不省方關者門戸所由以關闢也商旅者動以利心也后者凡居人上者謂之羣后所以治事者也方者事也門戸不開則微陽閉而不出也利心不動則外物感而不應也方事不省則視聽收而不發也先王奉若天道如此之宻用之於國則安靜而不勞用之於身則冲和而不竭昔者伏羲神農黃帝堯舜皆得此道臣敢因至日以獻伏乞聖慈留神省覽實社稷無彊之福徐州上皇帝書此等文字識見筆力並入西漢臣以庸材備員冊府出守兩郡皆東方要地私竊以爲守法令治文書赴期會不足以報塞萬一輒伏思念東方之要務陛下之所宜知者得其一二草具以聞而陛下擇焉臣前仕宻州建言自古河北與中原離合常係社稷存亡而京東之地所以灌輸河北缾竭則罍耻脣亡則齒寒而其民喜為盗賊為患最甚因為陛下畫所以待盗賊之策及移守徐州覽觀山川之形勢察其風俗之所上而考之於載籍然後又知徐州為南北之襟要而京東諸郡安危所寄也昔項羽入關旣燒咸陽而東歸則都彭城夫以羽之雄畧捨咸陽而取彭城則彭城之險固形便足以得志於諸侯者可知矣臣觀其地三面被山獨其西平川數百里西走梁宋使楚人開關而延敵材官騶發突騎雲縱真若屋上建瓴水也地宜粟麥一熟而飽數嵗其城三面阻水樓堞之下以汴泗爲池獨其南可通車馬而戲馬臺在焉其高十仞廣袤百步若用武之世屯千人其上聚櫑木砲石凡戰守之具以與城相表裏而積三年糧於城中雖用十萬人不易取也其民皆長大膽力絶人喜爲剽掠小不適意則有飛揚跋扈之心非止爲盗而已漢高祖沛人也項羽宿遷人也劉裕彭城人也朱全忠碭山人也皆在今徐州數百里間耳其人以此自負凶桀之氣積以成俗魏太武以三十萬人攻彭城不能下而王智興以卒伍庸材恣睢於徐朝廷亦不能討豈非以其地形便利人卒勇悍故耶州之東北七十餘里卽利國監自古爲鐵官商賈所聚其民富樂凡三十六冶冶戸皆大家藏鏹巨萬常為盗賊所窺而兵衞寡弱有同兒戲臣中夜以思即爲寒心使劇賊致死者十餘人白晝入市則守者皆棄而走耳地既産精鐵而民皆善鍜散冶戸之財以嘯召無頼則烏合之衆數千人之仗可以一夕具也順流南下辰發巳至而徐有不守之憂矣不幸而賊有過人之才如呂布劉備之徒得徐而逞其志則京東之安危未可知也近者河北轉運司奏乞禁止利國監鐵不許入河北朝廷從之昔楚人亡弓不能忘楚孔子猶小之況天下一家東北二冶皆爲國興利而奪彼與此不巳隘乎自鐵不北行冶戸皆有失業之憂詣臣而訴者數矣臣欲因此以征冶戸爲利國監之捍屏今三十六冶冶各百餘人採鑛伐炭多飢寒亡命強力􅋧忍之民也臣欲使冶戸每冶各擇有材力而忠謹者保任十人籍其名於官授以卻刃刀槊教之擊刺每月兩衙集於知監之庭而閱試之藏其刃於官以待大盗不得役使犯者以違制論冶戸爲盗所擬久矣民皆知之使冶岀十人以自衞民所樂也而官又爲除近日之禁使鐵得北行則冶戸皆悅而聽命姦猾破膽而不敢謀矣徐城雖險固而樓櫓敝惡又城大而兵少緩急不可守今戰兵千人耳臣欲乞移南京新招騎射兩指揮於徐此故徐人也嘗屯於徐營壘材石既具矣而遷於南京異時轉運使分東西路畏餽餉之勞而移之西耳今兩路為一其去來無所損益而足以為徐之重城下數里頗産精石無窮而奉化廂軍見闕數百人臣願募石工以足之聽不差岀使此數百人者常採石以甃城數年之後舉為金湯之固要使利國監不可窺則徐無事徐無事則京東無虞矣沂州山谷重阻為逋逃淵藪盗賊每入徐州界中陛下若採臣言不以臣為不肖願復三年守徐且得兼領沂州兵甲廵撿公事必有以自効京東惡盗多岀逃軍逃軍為盗民則望風畏之何也技精而法重也技精則難敵法重則致死其勢然也自陛下置將官修軍政士皆精銳而不免於逃者臣嘗考其所由葢自近嵗以來部送罪人配軍者皆不使役人而使禁軍軍士當部送者受牒即行往返常不下十日道路之費非取息錢不能辦百姓畏法不敢貸貸亦不可復得惟所部將挍乃敢岀息錢與之歸而刻其糧賜以故上下相持軍政不修博奕飲酒無所不至窮苦無聊則逃去為盗臣自至徐卽取不係省錢百餘千别儲之當部送者量遠近裁取以三月刻納不取其息將吏有敢貸息錢者痛以法治之然後嚴軍政禁酒博比朞年士皆飽暖練熟技藝等第為諸郡之冠陛下遣勑使按閲所具見也臣願下其法諸郡推此行之則軍政修而逃者寡亦去盗之一端也臣聞之漢相王嘉曰孝文帝時二千石長吏安官樂職上下相望莫有茍且之意其後稍稍變易公卿以下轉相促急司隸部刺史發揚隂私吏或居官數月而退二千石益輕賤吏民慢易之知其易危小失意則起離畔之心前山陽亡徒蘇令從横吏士臨難莫肯仗節死義者以守相威權素奪故也國家有急取辦於二千石二千石尊重難危乃能使下以王嘉之言而考之於今郡守之威權可謂素奪矣上有監司伺其過失下有吏民持其長短未及按問而差替之命巳下矣欲督捕盗賊法外求一錢以使人且不可得盗賊凶人情重而法輕者守臣輒配流之則使所在法司覆按其狀劾以失入惴惴如此何以得吏士死力而破姦人之黨乎由此觀之盗賊所以滋熾者以陛下守臣權大輕故也臣願陛下稍重其權責以大綱闊畧其小過凡京東多盗之郡自青鄆以降如徐沂齊曹之類皆慎擇守臣聽法外處置強盗頗賜緡錢使得以布設耳目畜養爪牙然緡錢多賜則難常少又不足於用臣以爲每郡可嵗别給一二百千使以釀酒凡使人緝捕盗賊得以酒予之敢以為他用者坐贓論賞格之外嵗得酒數百斛亦足以使人矣此又治盗之一術也然此皆其小者其大者非臣之所當言欲黙而不發則又私自念遭値陛下英聖特達如此若有所不盡非忠臣之義故昧死復言之昔者以詩賦取士今陛下以經術用人名雖不同然皆以文詞進耳考其所得多呉楚閩蜀之人至於京東西河北河東陜西五路葢自古豪傑之塲其人沈鷙勇悍可任以事然欲使治聲律讀經義以與呉楚閩蜀之人爭得失於毫釐之間則彼有不仕而巳故其得人常少夫惟忠孝禮義之士雖不得志不失爲君子若德不足而才有餘者困於無門則無所不至矣故臣願陛下特爲五路之士别開仕進之門漢法郡縣秀民推擇為吏考行察亷以次遷補或至二千石入為公卿古者不專以文詞取人故得士為多黃霸起於卒史薛宣奮於書佐朱邑選於嗇夫邴吉岀於獄吏其餘名臣循吏由此而進者不可勝數唐自中葉以後方鎭皆選列挍以掌牙兵是時四方豪傑不能以科舉自達者皆爭爲之往往積功以取旄鉞雖老姦巨盗或岀其中而名卿賢將如高仙芝封常清李光弼來瑱李抱玉段秀實之流所得亦已多矣王者之用人如江河江河所趨百川赴焉蛟龍生之及其去而之他則魚鼈無所還其體而鯢鰍爲之制今世胥史牙挍皆奴僕庸人者無他以陛下不用也今將用胥史牙挍而胥史行文書治刑獄錢穀其勢不可廢鞭撻鞭撻一行則豪傑不出於其間故凡士之刑者不可用用者不可刑故臣願陛下採唐之舊使五路監司郡守共選土人以補牙職皆取人材心力有足過人而不能從事於科舉者禄之以今之庸錢而課之鎭稅場務督捕盗賊之類自公罪杖以下聽贖依將挍法使長吏得薦其才者第其功閥書其嵗月使得出仕比任子而不以流外限其所至朝廷察其尤異者擢用數人則豪傑英偉之士漸岀於此塗而姦猾之黨可得而籠取也其條目委曲臣未敢盡言惟陛下留神省察昔晉武平呉之後詔天下罷軍役州郡悉去武備惟山濤論其不可帝見之曰天下名言也而不能用及永寧之後盗賊蠭起郡國皆以無備不能制其言乃驗今臣於無事之時屢以盗賊為言其私憂過計亦巳甚矣陛下縱能容之必爲議者所笑使天下無事而臣獲笑可也不然事至而圖之則巳晩矣干冒天威罪在不赦代張方平諫用兵書予嘗謂自古論用兵惟漢淮南王安諫伐閩越書爲最而此書法度似又勝之此等文章與天地並傳者臣聞好兵猶好色也傷生之事非一而好色者必死賊民之事非一而好兵者必亡此理之必然者也夫惟聖人之兵皆岀於不得巳故其勝也享安全之福其不勝也必無意外之患後世用兵皆得巳而不巳故其勝也則變遲而禍大其不勝也則變速而禍小是以聖人不計勝負之功而深戒用兵之禍何者興師十萬日費千金内外騷動怠於道路者七十萬家内則府庫空虛外則百姓窮匱饑寒逼迫其後必有盗賊之憂死傷愁怨其終必致水旱之報上則將帥擁衆有䟦扈之心下則士衆久役有潰叛之志變故百岀皆由用兵至於興事首議之人㝠謫尤重葢以平民無故縁兵而死怨氣充積必有任其咎者是以聖人畏之重之非不得已不敢用也自古人主好動干戈由敗而亡者不可勝數臣今不敢復言請為陛下言其勝者秦始皇旣平六國復事呉越戍役之患被於四海雖拓地千里遠過三代而墳土未乾天下怨叛二世被害子嬰被擒滅亡之酷自古所未嘗有也漢武帝承文景富溢之餘首挑匈奴兵連不解遂使侵尋及於諸國嵗嵗調發所向成功建元之間兵禍始作是時蚩尤旗岀長與天等其春戾太子生自是師行三十餘年死者無數及巫蠱事起京師流血僵尸數萬太子父子皆敗班固以爲太子生長於兵與之終始帝雖悔悟自克而殁身之恨巳無及矣隋文帝既下江南繼事夷狄煬帝嗣位此心不衰皆能誅滅強國威鎭萬里然而民怨盗起亡不旋踵唐太宗神武無敵尤喜用兵既巳破滅突厥高昌吐谷渾等猶且未厭親駕遼東皆志在立功非不得巳而用其後武氏之難唐室陵遲不絶如綫葢用兵之禍物理難逃不然太宗仁聖寛厚克巳裕人㡬至刑措而一傳之後子孫塗炭此豈爲善之報也哉由此觀之漢唐用兵於寛仁之後故其勝而僅存秦隋用兵於殘暴之餘故其勝而遂滅臣每讀書至此未嘗不掩巻流涕傷其計之過也若使此四君者方其用兵之初隨即敗䘐愓然戒懼知用兵之難則禍敗之興當不至此不幸每舉輒勝故使狃於功利慮患不深臣故曰勝則變遲而禍大不勝則變速而禍小不可不察也昔仁宗皇帝覆育天下無意於兵將士惰偷兵革朽鈍元昊乘間竊發西鄙延安涇原麟府之間敗者三四所喪動以萬計而海内晏然兵休事已而民無怨言國無遺患何者天下臣庶知其無好兵之心天地鬼神諒其有不得巳之實故也今陛下天錫勇智意在富強即位以來繕甲治兵伺候鄰國羣臣百僚窺見此指多言用兵其始也弼臣埶國命者無憂深思遠之心樞臣當國論者無慮害持難之識在臺諫之職者無獻替納忠之議從微至著遂成厲階既而薛向為横山之謀韓絳效深入之計陳升之呂公弼等隂與之協力師徒喪敗財用耗屈較之寶元慶厯之敗不及十一然而天怒人怨邊兵背叛京師騷然陛下為之旰食者累月何者用兵之端陛下作之是以吏士無怨敵之意而不直陛下也尚賴祖宗積累之厚皇天保祐之深故使兵岀無功感悟聖意然淺見之士方且以敗為耻力欲求勝以稱上心於是王韶搆禍於熙河章惇造釁於横山㷱本發難於渝瀘然此等皆戕賊已降俘纍老弱困弊腹心而取空虚無用之地以爲武功使陛下受此虚名而忽於實禍勉強砥礪奮於功名故沈起劉彞復發於安南使十餘萬人暴露瘴毒死者十而五六道路之人斃於輸送貲糧器械不見敵而盡以為用兵之意必且少衰而李憲之師復岀於洮州矣今師徒克㨗銳氣方盛陛下喜於一勝必有輕視四夷陵侮敵國之意天意難測臣實畏之且夫戰勝之後陛下可得而知者凱旋㨗奏拜表稱賀赫然耳目之觀耳至于逺方之民肝腦塗於白刃筋骨絶於餽餉流離破産鬻賣男女薰眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之哭聲陛下必不得而聞也譬猶屠殺牛羊刳蠻魚鼈以為膳羞食者甚美死者甚苦使陛下見其號呼於挺刃之下宛轉於刀几之間雖八珍之美必將投箸而不忍食而況用人之命以爲耳目之觀乎且使陛下將卒精強府庫充實如秦漢隋唐之君旣勝之後禍亂方興尚不可救而况所在將吏罷軟凡庸較之古人萬萬不逮而數年以來公私窘乏内府累世之積掃地無餘州郡征稅之儲上供殆盡百官俸廩僅而能繼南郊賞給乆而未辦以此舉動雖有智者無以善其後矣且饑疫之後所在盗賊蠭起京東河北尤不可言若軍事一興横斂隨作民窮而無告其勢不為大盗無以自全邊事方深内患復起則勝廣之形將在於此此老臣所以終夜不寐臨食而嘆至於慟哭而不能自止也且臣聞之凡舉大事必順天心天之所向以之舉事必成天之所背以之舉事必敗葢天心向背之迹見於災祥豐歉之間今自近嵗日蝕星變地震山崩水旱癘疫連年不解民死將半天心之向背可以見矣而陛下方且斷然不顧興事不巳譬如人子得過於父母惟有恭順靜思引咎自責庶㡬可解今乃紛然詰責奴婢恣行箠楚以此事親未有見赦於父母者故臣願陛下遠覽前世興亡之迹深察天心向背之理絶意兵革之事保疆睦鄰安靜無爲固社稷長久之計上以安二宮朝夕之養下以濟四方億兆之命則臣雖老死溝壑瞑目於地下矣昔漢祖破滅羣雄遂有天下光武百戰百勝祀漢配天然至白登被圍則講和親之議西域請吏則岀謝絶之言此二帝者非不知兵也葢經變旣多則慮患深遠今陛下深居九重而輕議討伐老臣庸懦私竊以爲過矣然人臣納說於君因其既厭而止之則易爲力迎其方銳而折之則難爲功凡有血氣之倫皆有好勝之意方其氣之盛也雖布衣賤士有不可奪自非智識特達度量過人未有能勇於奮發之中舍巳從人惟義是聽者也今陛下盛氣於用武勢不可回臣非不知而獻言不巳者誠見陛下聖德寛大聽納不疑故不敢以衆人好勝之常心望於陛下且意陛下他日親見用兵之害必將哀痛悔恨而追究左右大臣未嘗一言臣亦將老且死見先帝於地下亦有以藉口矣惟陛下哀而察之代滕甫論西夏書老臣典刑之言臣素無學術老不讀書每欲披竭愚忠上補聖明萬一而肝肺枯涸卒無可言近者因病求醫偶悟一事推之有政似可施行惟陛下財幸臣近患積聚醫云據病當下一日而愈若不下半月而愈然中年以後一下一衰積衰之患終身之憂也臣私計之終不以一日之快而易終身之憂遂用其言以善藥磨治半月而愈初不傷氣體力益完因悟近日臣僚獻言欲用兵西方皆是醫人欲下一日而愈者也其勢亦未必不成然終非臣子深愛君父欲岀萬全之道也以陛下望明將賢士勇何往不克而臣尚以爲非萬全者俗言彭祖觀井自係大木之上以車輪覆井而後敢觀此言雖鄙而切於事陛下愛民憂國非特如彭祖之愛身而兵者㓙器動有存亡其䧟人可畏有甚於井故臣願陛下之用兵如彭祖之觀井然後爲得也臣竊觀自古善用兵者莫如曹操其破滅袁氏最有巧思請試爲陛下論之袁紹以十倍之衆大敗於官渡僅以身免而操歛兵不追者何也所以緩紹而亂其國也紹歸國益驕忠賢就戮嫡庶並爭不及八年而袁氏無遺種矣向使操急之紹旣未可以一舉蕩滅若懼而修政用田豐而立袁譚則成敗未可知也其後北征烏丸討袁尚袁熙尚熙走遼東或勸操遂平之操曰彼素畏尚等吾今急之則合緩之則自相圖其勢然也遂引兵還曰吾方使公孫康斬送其首巳而果然若操者可謂巧於滅國矣滅國大事也不可以速譬如小兒之毁齒以漸揺撼之則齒脫而兒不知若不以漸一抜而得齒則毁齒可以殺兒故臣願陛下之取西夏如曹操之取袁氏也方元昊強時謀臣猛將盡其智力十年而不敢近今者主弱臣強其國内亂陛下使偏師一岀斬名王虜僞公主築蘭㑹等州此真千載一時天以賊授陛下之秋也兵法有之同舟而遇風則胡越相救如左右手今秉常雖爲母族所簒以意度之其世家大族亦未肯俯首連臂爲此族用也今乃合而爲一堅壁清野以抗王師如左右手此同舟遇風之勢也法當緩之今天威已震臣願陛下選用大員宿將素爲賊所畏服者使兼帥五路聚重兵境上號稱百萬蒐乘補卒牛酒日至金鼓之聲聞於數百里間外爲必討之勢而實不岀境多岀金幣遣間使辯士離壞其黨與且下令曰尺土吾不愛一民吾不有也其有能以地與衆降者即以封之有敢攘其地掠其人者皆斬不岀一年必有權均力敵内自相疑者人情不遠各欲求全及王師之未岀爭爲先降以邀重賞陛下因而分裂之即用其酋豪命以爵秩棊布錯峙務使相仇如漢封呼韓邪通西域故事不過於要害處築一城屯數千人置一將以䕶諸郡可使數百年面内保境不煩城守餽運豈非萬全之至計哉臣願陛下斷之於中深慮而遠計之夫爲人臣計與爲人主計不同人臣非攘地效首虜無以爲功爲陛下計惟天下安社稷固耳陛下神聖冠古動容舉意皆是功德但能措泰山之安與天地等夀則竹帛不可勝紀而堯舜禹湯不足過也議者不知岀此爭欲急於功名履危犯難以勞聖慮臣竊不取古人有言省功不如省事省事不如清心劉洎諫唐太宗曰皇天以不言為貴聖人以不言爲德老子稱大辯若訥莊子言至道無文且多記則損心多語則損氣心氣内損形神外勞初雖不覺後必爲累須爲社稷自愛人臣愛君未有如洎之深切者也臣竊慕之雖謫守在外不當妄言然自念舊臣譬之老馬雖筋力已衰不堪致遠而經涉險阻粗識道路惟陛下哀愍其愚而憐其意不勝幸甚與代張方平諫用兵書同而此篇行文處不如張方平書然引曹操之不追袁紹所遺公孫康斬尚一節郤切秉常情事兵畧甚竒代滕甫辯謗乞郡書悲切臣聞人情不問賢愚莫不畏天而嚴父然而疾痛則呼父窮窘則號天葢情發於中言無所擇豈以號呼之故謂無嚴畏之心人臣之所患不止於疾痛而所憂有甚於窮窘若不號呼於君父更將趨赴於何人伏望聖慈少加憐察臣本無學術亦無材能惟有忠義之心生而自許昔季孫有言見有禮於其君者事之如孝子之飬父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也臣雖不肖允蹈斯言但信道直前謂人如巳既䝉深知於聖主肯復借交於衆人任其惷愚積成仇怨一自離去左右十有二年浸潤之言何所不有至謂臣隂黨反者故縱罪人若依斯言死未塞責切伏思宣帝漢之英主也以片言而誅楊惲太宗唐之興王也以單詞而殺劉洎自古忠臣烈士遭時得君而不免於禍者何可勝數而臣獨䝉皇帝陛下始終照察愛惜保全則陛下聖度巳過於宣帝太宗而臣之遭逢亦古人所未有日月在上更何憂虞但念世之憎臣者多而臣之賦命至薄積毁銷骨巧言鑠金市虎成於三人投杼起於屢至儻因疑似復致人言至時雖欲自明陛下亦難屢赦是以及今無事之日少陳危苦之詞晉王導乃王敦之弟也而不害其爲元臣崔造源休之甥也而不廢其爲宰相臣與反者義同路人獨於寛大之朝爲臣終身之累亦可悲矣凡今游宦之士稍與貴近之人有葭莩之親半面之舊則所至便䝉異待人亦不敢交攻況臣受知於陛下中興之初効力於衆人未遇之日而乃毁訾不忌踐踏無嚴臣何足言有辱天眷此臣所以涕泣而自傷者也今臣既安善地又忝清班非敢别有僥求更思録用但患難之後積憂傷心風波之間怖畏成疾敢望陛下憫餘生之無㡬究前日之異恩或乞移臣淮浙間一小郡稍近墳墓漸謀歸休異日復得以枯朽之餘仰瞻天日之表然後退伏田野自稱老臣追叙始終之遭逢以託鄉鄰之父老區區志願永畢於斯伏願陛下憐其志察其愚而赦其罪臣無任感恩知罪激切屏營之至予觀子瞻一生所横被讒搆處往往痛心矣故所代滕甫辯謗處亦種種刺骨嗚咽涕洟唐宋八大家文鈔卷一百十九
