  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0115_WYG_031-1a, image: WYG1383/WYG1383-0324a.png}
body:
  text: 唐宋八大家文鈔廬陵文鈔引西京以來獨稱太史公遷以其馳驟跌宕悲慨嗚咽而風神所注往往於㸃綴指次獨得妙解譬之覽仙姫於瀟湘洞庭之上可望而不可近者纍數百年而得韓昌黎然彼固别開門户也又三百年而得歐陽子豫覽其所序次當世將相學士大夫墓志碑表與五代史所為梁唐二紀及他名臣雜傳蓋與太史公略相上下者然歐陽子所與友人論文書絶不之及何也又如奏疏劄子當其善為開陳分别利害一切感悟主上於漢可方朝錯賈誼於唐可方魏徴陸贄宋仁廟嘗諭庭臣曰歐陽修何處得來殆亦由此序記書論雖多得之昌黎而其姿態橫生别為韵折令人讀之一唱三歎餘音不絶豫所以獨愛其文妄謂世之文人學士得太史公之逸者獨歐陽子一人而已而世之人或豫信或不豫信又或訾其間不免俗調處嗟乎抑誠有之太史公之傳仲尼弟子與循吏處抑豈能與刺客同工哉觀之日月猶有抱珥可知之矣豫讀唐書五代史别有鈔今録其文集行世者首上皇帝書疏六首次劄子并狀五十三首次表啓二十二首次書二十五首次論三十五首次序三十一首傳二首次記二十五首次神道碑銘墓志銘四十七首次墓表祭文行狀二十三首次頌賦他雜著一十首釐為三十三卷噫姪桂嘗以子酷愛歐陽公叙事當不讓太史公遷且前曰歐陽公撰五代史當時將相特並齷齪不足數况兵戈之後禮崩樂壞故其文章所表見止此假令同太史公抽石室之書傳次春秋戰國及先秦楚漢之際豈特是而已哉譬之一人焉入天子圖書琬琰之藏而陳周彛漢鼎犧樽雲罍以相博古一人焉特入富人者之室所可指次者陶埴菽食而已豫唯唯嗟乎世之欲覽歐陽子之全必合豫他所批注唐書五代史而讀之斯得之矣歸安鹿門茅坤題廬陵本傳歐陽修字永叔永豐人修四歲而孤母鄭氏有女節以荻畫地教修書字稍長從鄰里借書讀或手抄之抄未竟而成誦舉進士有聲補西京留守推官召試學士院遷鎮南軍節度掌書記館閣挍勘修為人質直閎廓見義敢為機穽在前直行不顧每放逐困疐輒數年及復振起終不改其操范仲淹貶知饒州諌官高若納獨不言修遺書責之坐謫峽州夷陵令稍遷至太子中允館閣挍勘修崇文總目改集賢挍理知太常禮院數論天下事以貧求補外得通判滑州仁宗增諫官員用天下名士召修知諫院未幾用修同修起居注閲月拜右正言知制誥初吕夷簡罷相夏竦為樞密使復奪之代以杜衍同時進用富弼韓琦范仲淹等石介作慶厯聖德詩言退姦不易進賢之難而終篇意在夏竦竦不悅因與其黨造為黨論目仲淹衍及修為黨人修乃上朋黨論又上疏言杜衍韓琦范仲淹富弼相繼罷去為黨論者尤惡修異已又善言其情狀至使內侍藍元震上疏賴仁宗終不之信修使河東其所建議尤多㑹保州兵叛出修為龍圖閣直學士河北都轉運使初修出河北仁宗面諭曰勿為久居計有事言來修對曰諌官乃得風聞今在外使事有指越職罪也仁宗曰有事但以聞勿以中外為詞為黨論者愈益惡之乃坐用張氏奩中物買田立歐氏氏劵左遷知制誥知滁州久之遷起居舍人知揚州徙潁州復龍圖閣直學士知應天府以母憂去既免喪入見仁宗惻然怪修髮白問在外幾年今年幾何恩意甚至命判流內銓小人恐修復用僞為修奏乞澄汰內侍書騰都下宦者切齒楊永德者隂以言中修出知同州外議不平論救者衆遂留判修唐書為翰林學士加史館修撰勾當三班院改侍讀學士知蔡州未行復為翰林學士判太常寺修在朝以奬進天下士為已任延譽尉薦極其力而後已於經術治其大㫖不為章句不求異於諸儒景祐中與尹洙皆為古學巳而有詔戒天下學者為文使近古學者盡為古文而修之文章遂為天下宗匠蜀人蘇洵嘗論修文章詞令雍容似李翺切近實當似陸贄而修之才亦似過此二人至修作唐書至五代史叙事不愧劉向班固也權知貢舉文士以新竒相尚文體大壞修深革其弊前以怪僻在高第者黜之幾盡務求平淡典要士人初怨怒罵譏中稍信服已而文格變而復正拜右諌議大夫判尚書禮部又判祕閣祕書省加兼侍讀辭不受同修玉牒兼龍圖閣學士權知開封府承包拯威儀之後一切循理不事風采或以為言修曰人材性各有短長實不能舍所長彊其所短以給事中罷同提舉諸司庫務改羣牧使唐書成拜禮部侍郎為樞密副使未幾參知政事預定策英宗初年親政事慈聖光獻太后垂簾修與二三大臣佐祐兩宫鎮撫四海執政聚議事有未可修未嘗不力爭臺諌官至政事堂論事往往面折其短英宗嘗面稱修曰性直不避衆怨自嘉祐以後朝廷務惜名器而進人之路稍狹修屢建言遂詔韓琦曾公亮趙槩及修各舉五人其後中選者多在清近朝廷亦稍收其用矣又因暇日盡以百司所行兵民官吏財用中書所當知者集為總目上有所問宰相以總目對修以奉祠假家居上遣內侍就中書閣取而閲之蔣之竒讒之修遂稱疾力解機務以觀文殿學士刑部尚書知亳州年六十矣乞致仕者六不從遷兵部尚書知青州除撿挍太保宣徽南院使判太原府三辭不受徙知蔡州以老病乞骸骨章數上乃為觀文殿學士太子少師致仕卒年六十有六贈太子太師諡文忠修議濮園事雖不叶羣議然結髮立朝讜直不回身任衆怨至於白首而謗訕不已卒以不汚年六十以論政不合固求去位可謂有君子之勇矣修博極羣書好學不倦集三代以來金石刻為二千卷挍正史氏百家訛謬之說為多所著易童子問三卷詩本義十四卷居士集五十卷內外制奏議四六集又四十卷子發奕棐辨
