body:
  text: 唐宋八大家文鈔卷六明茅坤撰昌黎文鈔六序送楊支使序楊憑為御史中丞奏辟儀之為觀察支使文有興致愈在京師時嘗聞當今藩翰之賓客惟宣州為多賢與之游者二人隴西李博清河崔羣羣與博之為人吾知之道不行於主人與之處者非其類雖有享之以季氏之富不一日留也以羣博論之凡在宣州之幕下者雖不盡與之游皆可信而得其為人矣愈未嘗至宣州而樂頌其主人之賢者以其取人信之也今中丞之在朝愈日侍言於門下其來而鎮兹土也有問湖南之賓客者愈曰知其客可以信其主者宣州也知其主可以信其客者湖南也去年冬奉詔為邑於陽山然後得謁湖南之賓客於幕下於是知前之信之也不失矣及儀之之來也聞其言而見其行則向之所謂羣與博者吾何先後焉儀之智足以造謀材足以立事忠足以勤上惠足以存下而又侈之以詩書六藝之學先聖賢之德音以成其文以輔其質宜乎從事於是府而流聲實於天朝也夫樂道人之善以勤其歸者乃吾之心也謂我為邑長於斯而媚夫人云者不知言者也工乎詩者歌以繫之送鄭尚書序豫獨按昌黎序事絶不類史遷亦不學史遷自勒一家矣嶺之南其州七十其二十二𨽻嶺南節度府其四十餘分四府府各置帥然獨嶺南節度為大府大府始至四府必使其佐啓問起居謝守地不得即賀以為禮歲時必遣賀問致水土物大府帥或道過其府府帥必戎服左握刀右屬弓矢帕首袴鞾迎郊及既至大府帥先入據館帥守屏若將趨入拜庭之為者大府與之為讓至一再乃敢改服以賓主見適位執爵皆興拜不許乃止䖍若小侯之事大國有大事咨而後行𨽻府之州離府逺者至三千里懸隔山海使必數月而後能至蠻夷悍輕易怨以變其南州皆岸大海多洲島帆風一日踔數千里漫瀾不見蹤跡控御失所依險阻結黨仇機毒矢以待將吏撞搪呼號以相和應蜂屯蟻雜不可爬梳好則人怒則獸故常薄其征入簡節而疏目時有所遺漏不究切之長養以兒子至紛不可治乃草剃而禽獮之盡根株痛斷乃止其海外雜國若耽浮羅流求毛人夷亶之州林邑扶南真臘于陀利之屬東南際天地以萬數或時候風潮朝貢蠻胡賈人舶交海中若嶺南帥得其人則一邊盡治不相冦盜賊殺無風魚之災水旱癘毒之患外國之貨日至珠香象犀玳瑁奇物溢於中國不可勝用故選帥常重於他鎮非有文武威風知大體可畏信者則不幸往往有事長慶三年四月以工部尚書鄭公為刑部尚書兼御史大夫往踐其任鄭公嘗以節鎮襄陽又帥滄景德棣歷河南尹華州刺史皆有功德可稱道入朝為金吾將軍散騎常侍工部侍郎尚書家屬百人無數畝之宅僦屋以居可謂貴而能貧為仁者不富之效也及是命朝廷莫不悅將行公卿大夫士茍能詩者咸相率為詩以美朝政以慰公南行之思韻必以來字者所以祝公成政而來歸疾也送許郢州序按唐書于公多刻退之文多托之以諷愈嘗以書自通於于公纍數百言其大要言先達之士得人而託之則道德彰而名聞流後進之士得人而託之則事業顯而爵位通下有矜乎能上有矜乎位雖恆相求而喜不相遇于公不以其言為不可復書曰足下之言是也于公身居方伯之尊蓄不世之材而能與卑鄙庸陋相應答如影響是非忠乎君而樂乎善以國家之務為巳任者乎愈雖不敢私其大恩抑不可不謂之知巳恆矜而誦之情已至而事不從小人之所不為也故於使君之行道刺史之事以為于公贈凡天下之事成於自同而敗於自異為刺史者恆私于其民不以實應乎府為觀察使者恆急於其賦不以情信乎州繇是刺史不安其官觀察使不得其政財巳竭而斂不休人巳窮而賦愈急其不去為盜也亦幸矣誠使刺史不私於其民觀察使不急於其賦刺史曰吾州之民天下之民也惠不可以獨厚觀察使亦曰某州之民天下之民也斂不可以獨急如是而政不均令不行者未之有也其前之言者于公既已信而行之矣今之言者其有不信乎縣之於州猶州之於府也有以事乎上有以臨乎下同則成異則敗者皆然也非使君之賢其誰能信之愈於使君非燕游一朝之好也故其贈行不以頌而以規唐荆川曰此文作二段後總收贈崔復州序此與送許郢州序同意而規諷于公處最含蓄有地數百里趨走之吏自長史司馬巳下數十人其祿足以仁其三族及其朋友故舊樂乎心則一境之人喜不樂乎心則一境之人懼丈夫官至刺史亦榮矣雖然幽逺之小民其足跡未嘗至城邑茍有不得其所能自直於鄉里之吏者鮮矣況能自辨於縣吏乎能自辨於縣吏者鮮矣況能自辨於刺史之庭乎由是刺史有所不聞小民有所不宣賦有常而民産無恆水旱癘疫之不期民之豐約懸於州縣令不以言連帥不以信民就窮而斂愈急吾見刺史之難為也崔君為復州其連帥則于公崔君之仁足以蘇復人于公之賢足以庸崔君有刺史之榮而無其難為者將在於此乎愈嘗辱于公之知而舊游於崔君慶復人之將䝉其休澤也於是乎言送幽州李端公序命意髙結體奇轉掣從天降元年今相國李公為吏部員外郎愈嘗與偕朝道語幽州司徒公之賢曰某前年被詔告禮幽州入其地迓勞之使里至每進益恭及郊司徒公紅帓首鞾袴握刀左右雜佩弓韔服矢插房俯立迎道左某禮辭曰公天子之宰禮不可如是及府又以其服即事某又曰公三公不可以將服承命卒不得辭上堂即客階坐必東向愈曰國家失太平於今六十年夫十日十二子相配數窮六十其將復平平必自幽州始亂之所出也今天子大聖司徒公勤於禮庶幾帥先河南北之將來覲奉職如開元時乎李公曰然今李公既朝夕左右必數數焉為上言元年之言殆合矣端公歲時來壽其親東都東都之大夫士莫不拜於門其為人佐甚忠意欲司徒公功名流千萬歲請以愈言為使歸之獻送殷員外序學班掾之文其嚴緊如程不識李光弼之治兵唐受天命為天子凡四方萬國不問海內外無小大咸臣順於朝時節貢水土百物大者特來小者附集元和睿聖文武皇帝既嗣位悉治方內就法度十二年詔曰四方萬國惟回鶻於唐最親奉職尤謹丞相其選宗室四品一人持節往賜君長告之朕意又選學有經法通知時事者一人與之為二由是殷侯侑自太常博士遷尚書虞部員外郎兼侍御史朱衣象笏承命以行朝之大夫莫不出餞酒半右庶子韓愈執盞言曰殷大夫今人適數百里出門惘惘有離別可憐之色持被入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無幾微出於言面豈不真知輕重大丈夫哉丞相以子應詔真誠知人士不通經果不足用於是相屬為詩以道其行云送楊少尹序以二疏美少尹而專於虛景簸弄故出沒變化不可捉摸昔疏廣受二子以年老一朝辭位而去于時公卿設供張祖道都門外車數百兩道傍觀者多歎息泣下共言其賢漢史既傳其事而後世工畫者又圖其迹至今照人耳目赫赫若前日事國子司業楊君巨源方以能詩訓後進一旦以年滿七十亦白丞相去歸其鄉世常說古今人不相及今楊與二疏其意豈異也豫忝在公卿後遇病不能出不知楊侯去時城門外送者幾人車幾兩馬幾匹道傍觀者亦有歎息知其為賢與否而太史氏又能張大其事為傳繼二疏蹤跡否不落莫否見今世無工畫者而畫與不畫固不論也然吾聞楊侯之去丞相有愛而惜之者白以為其都少尹不絶其祿又為歌詩以勸之京師之長於詩者亦屬而和之又不知當時二疏之去有是事否古今人同不同未可知也中世士大夫以官為家罷則無所於歸楊侯始冠舉於其鄉歌鹿鳴而來也今之歸指其樹曰某樹吾先人之所種也某水某丘吾童子時所釣遊也鄉人莫不加敬誡子孫以楊侯不去其鄉為法古之所謂鄉先生沒而可祭於社者其在斯人歟其在斯人歟唐荆川曰前後照應而錯綜變化不可言此等文字蘇曾王集內無之送湖南李正字序以交遊離合之情為文又一種風調貞元中愈從太傅隴西公平汴州李生之尊府以侍御史管汴之鹽鐵日為酒殺羊享賓客李生則尚與其弟學讀書習文辭以舉進士為業愈於太傅府年最少故得交李生父子間公薨軍亂軍司馬從事皆死侍御亦被讒為民日南其後五年愈又貶陽山令今愈以都官郎守東都省侍御自衡州刺史為親王長史亦留此掌其府事李生自湖南從事請告來覲於時太傅府之士惟愈與河南司録周君獨存其外則李氏父子相與為四人離十三年幸而集處得燕而舉一觴相屬此天也非人力也侍御與周君於今為先輩成德李生溫然為君子有詩八百篇傳詠於時惟愈也業不益進行不加修顧惟未死耳往拜侍御謁周君抵李生退未嘗不發愧也往時侍御有無盡費於朋友及今則又不忍其三族之寒饑聚而館之疏逺畢至祿不足以養李生雖欲不從事於外其勢不可得巳也重李生之還者皆為詩愈最故故又為序云送水陸運使韓侍御歸所治序覽此文與歐陽公食貨志相參看始得肯綮六年冬振武軍吏走驛馬詣闕告饑公卿廷議以轉運使不得其人宜選才幹之士往換之吾族子重華適當其任至則出贓罪吏九百餘人脫其桎梏給耒耜與牛使耕其旁便近地以償所負釋其粟之在吏者四十萬斛不徵吏得去罪死假種糧齒平人有以自效莫不涕泣感奮相率盡力以奉其令而又為之奔走經營相原隰之宜指授方法故連二歲大熟吏得盡償其所亡失四十萬斛者而私其贏餘得以蘇息軍不復饑君曰此未足為天子言請益募人為十五屯屯置百三十人而種百頃令各就髙為堡東起振武轉而西過雲州界極於中受降城出入河山之際六百餘里屯堡相望冦來不能為暴人得肆耕其中少可以罷漕挽之費朝廷從其議秋果倍收歲省度支錢千三百萬八年詔拜殿中侍御史錫服朱金銀緋其冬來朝奏曰得益開田四千頃則盡可以給塞下五城矣田五千頃法當用人七千臣令吏於無事時督習弓矢為戰守備因可以靖邊庶幾所謂兵農兼事務一而兩得者也大臣方持其議吾以為邊軍皆不知耕作開口望哺有司常僦人以車船自他郡往輸乘沙逆河遠者數千里人畜死蹄踵交道費不可勝計中國坐耗而邊吏恆苦食不繼今君所請田皆故秦漢時郡縣地其課績又巳驗白若從其言其利未可遽以一二數也今天子方舉羣䇿以收太平之功寧使士有不盡用之歎懷奇見而不得施設也君又何憂而中臺士大夫亦同言侍御韓君前領三縣紀綱三州奏課常為天下第一行其計於邊其功烈又赫赫如此使盡用其䇿西北邊故所沒地可指期而有也聞其歸皆相勉為詩以推大之而屬豫為序贈張童子序張本與昌黎同舉進士而其贈文特呼之為童子其以唐有童子科乎言莊而嚴其序事處錯雜而煞有條貫天下之以明二經舉於禮部者歲至三千人始自縣考試定其可舉者然後升於州若府其不能中科者不與是數焉州若府總其屬之所升又考試之如縣加察詳焉定其可舉者然後貢於天子而升之有司其不能中科者不與是數焉謂之鄉貢有司者總府州之所升而考試之加察詳焉第其可進者以名上於天子而藏之屬之吏部歲不及二百人謂之出身能在是選者厥惟艱哉二經章句僅數十萬言其傳注在外皆誦之又約知其大說繇是舉者或遠至十餘年然後與乎三千之數而升於禮部矣又或逺至十餘年然後與乎二百之數而進於吏部矣班白之老半焉昏塞不能及者皆不在是限有終身不得與者焉張童子生九年自州縣達禮部一舉而進立於二百之列又二年益通二經有司復上其事繇是拜衛兵曹之命人皆謂童子耳目明達神氣以靈余亦偉童子之獨出於等夷也童子請於其官之長隨父而寧母歲八月自京師道陜南至虢東及洛師北過大河之陽九月始來及鄭自朝之聞人以及五都之伯長羣吏皆厚其餼賂或作歌詩以嘉童子童子亦榮矣雖然愈將進童子於道使人謂童子求益者非欲速成者夫少之與長也異觀少之時人惟童子之異及其長也將責成人之禮焉成人之禮非盡於童子所能而巳也然則童子宜暫息乎其已學者而勤乎其未學者可也愈與童子俱陸公之門人也慕回路二子之相請贈與處也故有以贈童子唐荆川曰只是科舉常事而敘得何等頓挫送牛堪序此必牛堪不謝舉主故昌黎為文云云以明經舉者誦數十萬言又約通大義徴辭引類旁出入他經者又誦數十萬言其為業也勤矣登第於有司者去民畝而就吏祿由是進而纍為卿相者常常有之其為獲也亦大矣然吾未嘗聞有登第於有司而進謝於其門者豈有司之待之也抑以公不以情舉者之望於有司也亦將然乎其進而謝於其門也則為私乎抑無乃人事之未思或者不能舉其禮乎若牛堪者思慮足以及之材質足以行之而又不聞其往者其將有以哉違衆而求識立奇而取名非堪心之所存也由是而觀之若堪之用心其至於大官也不為幸矣堪太學生也余博士也博士師屬也於其登第而歸將榮於其鄉也能無說乎唐荆川曰此篇文字意格異常送竇從事序奇崛踰甄閩而南皆百越之地於天文其次星紀其星牽牛連山隔其隂巨海敵其陽是維島居卉服之民風氣之殊著自古昔唐之有天下號令之所加無異於逺近民俗既遷風氣亦隨霜雪時降癘疫不興瀕海之饒固加於初是以人之之南海者若東西州焉皇帝臨天下二十有二年詔工部侍郎趙植為廣州刺史盡牧南海之民署從事扶風竇平平以文辭進於其行也其族人殿中侍御史牟合東都交游之能文者二十有八人賦詩以贈之於是昌黎韓愈嘉趙南海之能得人壯從事之答於知我不憚行之遠也又樂貽周之愛其族叔父能合文辭以寵榮之作送竇從事少府平序送石處士序以議論行叙事當是韓之變調然豫獨不甚喜此文河陽軍節度御史大夫烏公為節度之三月求士於從事之賢者有薦石先生者公曰先生何如曰先生居嵩邙瀍榖之間冬一裘夏一葛食朝夕飯一盂蔬一盤人與之錢則辭請與出游未嘗以事辭勸之仕不應坐一室左右圖書與之語道理辨古今事當否論人髙下事後當成敗若河決下流而東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也大夫曰先生有以自老無求於人其肯為某來耶從事曰大夫文武忠孝求士為國不私於家方今寇聚於恆師環其疆農不耕收財粟殫亡吾所處地歸輸之塗治法征謀宜有所出先生仁且勇若以義請而彊委重焉其何說之辭於是撰書詞具馬幣卜日以授使者求先生之廬而請焉先生不告於妻子不謀於朋友冠帶出見客拜受書禮於門內宵則沐浴戒行李載書册問道所由告行於常所來往晨則畢至張上東門外酒三行且起有執爵而言者曰大夫真能以義取人先生真能以道自任決去就為先生別又酌而祝曰凡去就出處何常惟義之歸遂以為先生夀又酌而祝曰使大夫恆無變其初無務富其家而饑其師無甘受佞人而外敬正士無味於諂言惟先生是聽以能有成功保天子之寵命又祝曰使先生無圖利於大夫而私便其身圖先生起拜祝辭曰敢不敬蚤夜以求從祝規於是東都之人士咸知大夫與先生果能相與以有成也遂各為歌詩六韻遣愈為之序云送溫處士赴河陽軍序以烏公得士為文而溫生之賢自見伯樂一過冀北之野而馬羣遂空夫冀北馬多天下伯樂雖善知馬安能空其羣耶解之者曰吾所謂空非無馬也無良馬也伯樂知馬遇其良輒取之羣無留良焉茍無良雖謂無馬不為虛語矣東都固士大夫之冀北也恃才能深藏而不市者洛之北涯曰石生其南涯曰溫生大夫烏公以鈇鉞鎮河陽之三月以石生為才以禮為羅羅而致之幕下未數月也以溫生為才於是以石生為媒以禮為羅又羅而致之幕下東都雖信多才士朝取一人焉拔其尤暮取一人焉拔其尤自居守河南尹以及百司之執事與吾輩二縣之大夫政有所不通事有所可疑奚所咨而處焉士大夫之去位而巷處者誰與嬉遊小子後生於何考德而問業焉搢紳之東西行過是都者無所禮於其廬若是而稱曰大夫烏公一鎮河陽而東都處士之廬虛無人焉豈不可也夫南面而聽天下其所託重而恃力者惟相與將耳相為天子得人於朝廷將為天子得文武士於幕下求內外無治不可得也愈縻於兹不能自引去資二生以待老今皆為有力者奪之其何能無介然於懷耶生既至拜公於軍門其為吾以前所稱為天下賀以後所稱為吾致私怨於盡取也留守相公首為四韻詩歌其事愈因推其意而序之送陸歙州詩序貞元十八年二月十八日祠部員外郎陸君出刺歙州朝廷夙夜之賢都邑游居之良齎咨涕洟咸以為不當去歙大州也刺史尊官也由郎官而往者前後相望也當今賦出於天下江南居十九宣使之所察歙為富州宰臣之所薦聞天子之所選用其不輕而重也較然矣如是而齎咨涕洟以為不當去者陸君之道行乎朝廷則天下望其賜刺一州則專而不能咸先一州而後天下豈吾君與吾相之心哉於是昌黎韓愈道願留者之心而泄其思作詩曰我衣之華兮我佩之光陸君之去兮誰與翺翔斂此大惠兮施于一州今其去矣胡不為留我作此詩歌于逵道無疾其驅天子有詔送鄭十為校理序古人古直朴渾之文有如是者今人類不為也祕書御府也天子猶以為外且逺不得朝夕視始更聚書集賢殿別置校讐官曰學士曰校理常以寵丞相為大學士其他學士皆達官也校理則用天下之名能文學者茍在選不計其秩次惟所用之由是集賢之書盛積盡祕書所有不能處其半書日益多官日益重四年鄭生涵始以長安尉選為校理人皆曰是宰相子能恭儉守教訓好古義施於文辭者如是而在選公卿大夫家之子弟其勸耳矣愈為博士也始事相公於祭酒分教東都生也事相公於東太學今為郎於都官也又事相公於居守三為屬吏經時五年觀道德於前後聽教誨於左右可謂親薰而炙之矣其髙大逺密者不敢隱度論也其勤巳而務博施以已之有欲人之能不知古君子何如耳今生始進仕獲重語於天下而慊慊若不足真能守其家法矣其在門者可進賀也求告來寧朝夕侍側東都士大失不得見其面於其行日分司吏與留守之從事竊載酒肴席定鼎門外盛賓客以餞之既醉各為詩五韻且屬愈為序唐宋八大家文鈔卷六
