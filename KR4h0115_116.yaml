body:
  text: 老泉本傳蘇洵字明允眉山人年二十七始發憤為學舉進士及茂才異等皆不中悉焚常所為文閉户益讀書遂通六經百家之説下筆頃刻數千言至和嘉祐間與二子軾轍來京師翰林學士歐陽修上其所著文二十二篇既出士大夫爭傳之一時學者競效蘇氏為文章宰相韓琦奏于朝召試舍人院辭疾不至遂除祕書省挍書郎會太常修纂建隆以來禮書乃以為霸州文安縣主簿與陳州項城令姚闢同修禮書為太常因革禮一百卷書成方奏未報卒年五十八賜其家縑銀二百軾辭所賜求贈官特贈光祿寺丞有文集二十卷諡法三卷
