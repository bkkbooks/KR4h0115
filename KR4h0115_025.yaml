body:
  text: 唐宋八大家文鈔巻二十三明茅坤撰栁州文鈔七記予按子厚所謫永州栁州大較五嶺以南多名山削壁清泉怪石而子厚適以文章之雋傑客兹土者久之愚竊謂公與山川兩相遭非子厚之困且久不能以捜巖穴之竒非巖穴之怪且幽亦無以發子厚之文予間過粤中恣情山水間始信子厚非予欺而且恨永栁以外其他勝槩猶多與永栁相頡頏且有過之者而卒無傳焉抑可見天地内不特遺才而不得試當併有名山絶壑而不得自炫其竒於騷人墨客之文者可勝道哉游黄溪記北之晉西適豳東極吳南至楚越之交其間名山水而州者以百數永最善環永之治百里北至于浯溪西至于湘之源南至于瀧泉東至于黄溪東屯其間名山水而村者以百數黄溪最善黄溪拒州治七十里由東屯南行六百步至黄神祠祠之上兩山牆立如丹碧之華葉駢植與山升降其缺者為崖峭巖窟水之中皆小石平布黄神之上揭水八十步至初潭最竒麗殆不可狀其略若剖大甕側立千尺溪水積焉黛蓄膏渟來若白虹沈沈無聲有魚數百尾方來㑹石下南去又行百步至第二潭石皆巍然臨峻流若頦頷􅍘齶其下大石離立可坐飲食有鳥赤首烏翼大如鵠方東嚮立自是又南數里地皆一狀樹益壯石益痩水鳴皆鏘然又南一里至大㝠之川山舒水緩有土田始黄神為人時居其地傳者曰黄神王姓莽之世也莽既死神更號黄氏逃來擇其深峭者潜焉始莽嘗曰余黄虞之後也故號其女曰黄皇室主黄與王聲相邇而又有本其所以傳言者益驗神既居是民咸安焉以為有道死乃俎豆之為立祠後稍徙近乎民今祠在山隂溪水上元和八年五月十六日既歸為記以啟後之好游者始得西山宴游記公之探奇所嚮若神助自余為僇人居是州恒惴惴其隟也則施施而行漫漫而遊日與其徒上高山入深林窮迴溪幽泉怪石無遠不到到則披草而坐傾壺而醉醉則更相枕以臥意有所極夢亦同趣覺而起起而歸以為凡是州之山有異態者皆我有也而未始知西山之怪特今年九月二十八日因坐法華西亭望西山始指異之遂命僕過湘江緣染溪斫榛莽焚茅茷窮山之高而止攀援而登箕踞而遨則凡數州之土壤皆在袵席之下其高下之勢岈然洼然若垤若穴尺寸千里攅蹙累積莫得遯隱縈青繚白外與天際四望如一然後知是山之特出不與培塿為類悠悠乎與灝氣俱而莫得其涯洋洋乎與造物者游而不知其所窮引觴滿酌頽然就醉不知日之入蒼然暮色自遠而至至無所見而猶不欲歸心凝形釋與萬化㝠合然後知吾嚮之未始游游於是乎始故為之文以志鈷鉧潭記竒鈷鉧潭在西山西其始葢冉水自南奔注抵山石屈折東流其顚委勢峻盪擊益暴齧其涯故旁廣而中深畢至石乃止流沬成輪然後徐行其清而平者且十畝有樹環焉有泉懸焉其上有居者以子之亟游也一旦欵門來告曰不勝官租私劵之委積既芟山而更居願以潭上田貿財以緩禍予樂而如其言則崇其臺延其檻行其泉於高者墜之潭有聲潨然尤與中秋觀月為宜於以見天之高氣之逈孰使予樂居夷而忘故土者非兹潭也歟鈷鉧潭西小丘記公之好奇如貪夫之籠百貨而其文亦變幻百出得西山後八日尋山口西北道二百歩又得鈷鉧潭西二十五步當湍而浚者為魚梁梁之上有丘焉生竹樹其石之突怒偃蹇負土而出爭為竒狀者殆不可數其􅋂然相累而下者若牛馬之飲于溪其衝然角列而上者若熊羆之登于山丘之小不能一畝可以籠而有之問其主曰唐氏之棄地貨而不售問其價曰止四百余憐而售之李深源元克巳時同遊皆大喜出自意外即更取器用剷刈穢草伐去惡木烈火而焚之嘉木立美竹露竒石顯由其中以望則山之高雲之浮溪之流鳥獸魚之遨遊舉熙熙然迴巧獻伎以効兹丘之下枕席而卧則清泠之狀與目謀瀯瀯之聲與耳謀悠然而虚者與神謀淵然而靜者與心謀不匝旬而得異地者二雖古好事之士或未能至焉噫以兹丘之勝致之灃鎬鄠杜則貴游之士爭買者日増千金而愈不可得今棄是州也農夫漁父過而陋之賈四百連嵗不能售而我與深源克己獨喜得之是其果有遭乎書于石所以賀兹丘之遭也至小丘西山小石潭記從小丘西行百二十步隔篁竹聞水聲如鳴珮環心樂之伐竹取道下見小潭水尤清冽泉石以為底近岸巻石底以出為坘為嶼為嵁為巖青樹翠蔓䝉絡揺綴參差披拂潭中魚可百許頭皆若空游無所依日光下澈影布石上怡然不動倏爾遠逰往來翕忽似與逰者相樂潭西南而望斗折蛇行明滅可見其岸勢犬牙差互不可知其源坐潭上四面竹樹環合寂寥無人凄神寒骨悄愴幽邃以其境過清不可久居乃記之而去同游者吳武陵龔古余弟宗𤣥𨽻而從者崔氏二小生曰恕巳曰奉壹袁家渴記景竒興亦奇由冉溪西南水行十里山水之可取者五莫若鈷鉧潭由溪口而西陸行可取者八九莫若西山由朝陽巖東南水行至蕪江可取者三莫若袁家渴皆永中幽麗竒處也楚越之間方言謂水之支流者為渴音若衣褐之褐渴上與南館高嶂合下與百家瀬合其中重洲小溪澄潭淺渚間厠曲折平者深黑峻者沸白舟行若窮忽又無際有小山出水中山皆美石石上生青叢冬夏常蔚然其旁多巖洞其下多白礫其樹多楓柟石楠楩櫧樟柚草則蘭芷又有異卉類合歡而蔓生轇轕水石每風自四山而下振動大木掩苒衆草紛紅駭綠蓊葧香氣衝濤旋瀬退貯谿谷揺颺葳㽔與時推移其大都如此余無以窮其狀永之人未嘗逰焉余得之不敢專也出而傳於世其地世主袁氏故以名焉石渠記清冽自渴西南行不能百步得石渠民橋其上有泉幽幽然其鳴乍大乍細渠之廣或咫尺或倍尺其長可十許步其流抵大石伏出其下踰石而往有石泓昌蒲被之青鮮環周又折西行旁陷巖石下北墮小潭潭幅員減百尺清深多鯈魚又北曲行紆餘睨若無窮然卒入于渴其側皆詭石怪木竒卉美箭可列坐而庥焉風揺其顚韻動崖谷視之既靜其聽始遠予從州牧得之攬去翳朽決疏土石既崇而焚既釃而盈惜其未始有傳焉者故累記其所屬遺之其人書之其陽俾後好事者求之得以易元和七年正月八日蠲渠至大石十月十九日踰石得石泓小潭渠之美於是始窮也石澗記㸃綴如明珠翠羽石渠之事既窮上由橋西北下土山之隂民又橋焉其水之大倍石渠三之一巨石為底逹于兩涯若床若堂若陳筵席若限閫奥水平布其上流若織文響若操琴揭跣而往折竹掃陳葉排腐木可羅胡床十八九居之交絡之流觸激之音皆在床下翠羽之木龍鱗之石均䕃其上古之人其有樂乎此耶後之來者有能追余之踐履耶得意之日與石渠同由渴而來者先石渠後石澗由百家瀬上而來者先石澗後石渠澗之可窮者皆出石城村東南其間可樂者數焉其上深山幽林逾峭嶮道狹不可窮也小石城山記借石之瑰瑋以吐胸中之氣自西山道口徑北踰黄茅嶺而下有二道其一西出尋之無所得其一少北而東不過四十丈土斷而川分有積石横當其垠其上為睥睨梁欐之形其旁出堡塢有若門焉窺之正黑投以小石洞然有水聲其響之激越良久乃巳環之可上望甚遠無土壤而生嘉樹美箭益竒而堅其疏數偃仰類智者所施設也噫吾疑造物者之有無久矣及是愈以為誠有又怪其不為之於中州而列是夷狄更千百年不得一售其伎是固勞而無用神者儻不宜如是則其果無乎或曰以慰夫賢而辱於此者或曰其氣之靈不為偉人而獨為是物故楚之南少人而多石是二者余未信之栁州東亭記出州南譙門左行二十六歩有棄地在道南南值江西際垂楊傳置東曰東館其内草木猥奥有崖谷傾亞缺圯豕得以為囿虵得以為藪人莫能居至是始命披刜蠲疏樹以竹箭松檉桂檜栢杉易為堂亭峭為杠梁下上徊翔前出兩翼馮空拒江江化為湖衆山横環嶛闊瀴灣當邑居之劇而忘乎人間斯亦竒矣乃取館之北宇右闢之以為夕室取傳置之東宇左闢之以為朝室又北闢之以為隂室作屋于北牖下以為陽室作斯亭于中以為中室朝室以夕居之夕室以朝居之中室日中而居之隂室以違溫風焉陽室以違凄風焉若無寒暑也則朝夕復其號既成作石于中室書以告後之人庶勿壞元和十二年九月某日栁宗元記永州萬石亭記崔公既捜奇抉勝而子厚之文亦如此御史中丞清河男崔公來莅永州閒日登城北墉臨于荒野藂翳之隙見怪石特出度其下必有殊勝歩自西門以求其墟伐竹披奥欹仄以入綿谷跨谿皆大石林立渙若奔雲錯若置碁怒者虎鬬企者鳥厲抉其穴則鼻口相呀捜其根則蹄股交峙環行卒愕疑若搏噬於是刳闢朽壤剪焚榛薉決澮溝導伏流散為疎林洄為清池寥廓泓渟若造物者始判清濁効竒於兹地非人力也乃立游亭以宅厥中直亭之西石若掖分可以眺望其上青壁斗絶沉於淵源莫究其極自下而望則合乎攅巒與山無窮明日州邑耋老雜然而至曰吾儕生是州蓻是野睂尨齒鯢未嘗知此豈天墜地出設兹神物以彰我公之德歟既賀而請名公曰是石之數不可知也以其多而命之曰萬石亭耋老又言曰懿夫公之名亭也豈專狀物而已哉公嘗六為二千石既盈其數然而有道之士咸恨推公之嘉績未洽於人敢頌休聲祝公于明神漢之三公秩號萬石我公之德宜受兹錫漢有禮臣惟萬石君我公之化始于閨門道合于古祐之自天野夫獻辭公壽萬年宗元嘗以牋奏𨽻尚書敢專筆削以附零陵故事時元和十年正月五日記栁州山水近治可遊者記全是叙事不着一句議論感慨却澹宕風雅古之州治在薄水南山石間今徙在水北直平四十里南北東西皆水匯北有雙山夾道嶄然曰背石山有支川東流入于潯水潯水因是北而東盡大壁下其壁曰龍壁其下多秀石可硯南絶水有山無麓廣百尋高五丈下上若一曰甑山山之南皆大山多竒又南且西曰駕鶴山壯聳環立古州治負焉有泉在坎下常盈而不流南有山正方而崇類屏者曰屛山其西曰四姥山皆獨立不倚北流潯水瀬下又西曰仙奕之山山之西可上其上有穴穴有屏有室有宇其宇下有流石成形如肺肝如茄房或積于下如人如禽如器物甚衆東西九十尺南北少半東登入小穴常有四尺則廓然甚大無竅正黑燭之高僅見其宇皆流石怪狀由屏南室中入小穴倍常而上始黑巳而大明為上室由上室而上有穴北出之乃臨大野飛鳥皆視其背其始登者得石枰於上黑肌而赤脉十有八道可奕故以云其山多檉多櫧多篔簹之竹多槖吾其鳥多秭歸石魚之山全石無大草木山小而高其形如立魚在多秭歸西有穴類仙奕入其穴東出其西北靈泉在東趾下有麓環之泉大類轂雷鳴西奔二十尺有洄在石澗囚伏無所見多綠青之魚及石鯽多鯈雷山兩崖皆東西雷水出焉蓄崖中曰雷塘能出雲氣作雷雨變見有光禱用俎魚豆彘修形糈􅀈酒隂虔則應在立魚南其間多美山無名而深峨山在野中無麓峨水出焉東流入于潯水永州龍興寺東丘記曠奥二字為案亦奇游之適大率有二曠如也奥如也如斯而巳其地之凌阻峭出幽鬱寥廓悠長則於曠宜抵丘垤伏灌莽迫遽迴合則於奥宜因其曠雖增以崇臺延閣迴環日星臨瞰風雨不可病其敞也因其奥雖增以茂樹藂石穹若洞谷蓊若林麓不可病其邃也今所謂東丘者奥之宜者也其始龕之外棄地余得而合焉以屬於堂之北垂凡坳窪坻岸之狀無廢其故屏以密竹聨以曲梁桂檜松杉楩柟之植幾三百本嘉卉美石又經緯之俛入緑縟幽䕃薈蔚步武錯迕不知所出溫風不爍清氣自至水亭陿室曲有奥趣然而至焉者往往以邃為病噫龍興永之佳寺也登高殿可以望南極闢大門可以瞰湘流若是其矌也而於是小丘又將披而攘之則吾所謂游有二者無乃闕焉而喪其地之宜乎丘之幽幽可以處休丘之窅窅可以觀妙溽暑頓去兹丘之下太和不遷兹丘之巔奥乎兹丘孰從我游余無召公之德懼剪伐之及也故書以祈後君子永州龍興寺息壤記壤雖小而㸃次亦奇永州龍興寺東北陬有堂堂之地隆然負塼甓而起者廣四歩高一尺五寸始之為堂也夷之而又高凡持挿者盡死永州居楚越間其人鬼且禨由是寺之人皆神之人莫敢夷史記天宮書及漢志有地長之占而亡其説甘茂盟息壤蓋其地有是類也昔之異書有記洪水滔天鯀竊帝之息壤以堙洪水帝乃令祝融殺鯀于羽郊其言不經見今是土也夷之者不幸而死豈帝之所愛耶南方多疫勞者先死則彼持挿者其死於勞且疫也土烏能神余恐學者之至於斯徵是言而唯異書之信故記於堂上永州法華寺新作西亭記曠逺法華寺居永州地最高有僧曰覺照照居寺西廡下廡之外有大竹數萬又其外山形下絶然而薪蒸􅪬簜䝉雜擁蔽吾意伐而除之必將有見焉照謂余曰是其下有陂池芙蕖申以湘水之流衆山之㑹果去是其見逺矣遂命僕人持刀斧羣而翦焉叢莽下頽萬類皆出曠焉茫焉天為之益高地為之加闢丘陵山谷之峻江湖地澤之大咸若有增廣之者夫其地之竒必以遺乎後不可曠也余時謫為州司馬官外常員而心得無事乃取官之禄秩以為其亭其高且廣蓋方丈者一焉或異照之居於斯而不蚤為是也余謂昔之上人者不起宴坐足以觀於空色之實而游乎物之終始其照也逾寂其覺也逾有然則嚮之礙之者為果礙耶今之闢之者為果闢耶彼所謂覺而照者吾詎知其不由是道也豈若吾族之挈挈於通塞有無之方以自狹耶或曰然則宜書之乃書于石永州龍興寺修淨土院記以佛㫖為案中國之西數萬里有國曰身毒釋迦牟尼如來示現之地彼佛言曰西方過十萬億佛土有世界曰極樂佛號無量壽如來其國無有三惡八難衆寳以為師其人無有十纒九惱羣聖以為友有能誠心大願歸心是土者茍念力具足則往生彼國然後出三界之外其於佛道無退轉者其言無所欺也晋時廬山袁法師作念佛三昧詠大勸于時其後天台顗大師著釋淨土十疑論𢎞宣其敎周密微妙迷者咸賴焉葢其留異跡而去者甚衆永州龍興寺前刺史李承晊及僧法林置淨土堂于寺之東偏常奉斯事逮今餘二十年廉隅毁頓圖像崩墜㑹巽上人居其宇下始復理焉上人者修最上乘解第一義無體空折色之跡而造乎真源通假有借無之名而入於實相境與智合事與理并故雖往生之因亦相用不捨誓葺兹宇以開後學有信士圖為佛像法相甚具焉今刺史馮公作大門以表其位余遂周延四阿環以廊廡繢二大士之像繒蓋幢幡以成就之嗚呼有能求無生之生者知舟筏之存乎是遂以天台十疑論書于牆宇使觀者起信焉永州鐵爐歩志志歩特數言託諷言外者無限深情轉處妙江之滸凡舟可縻而上下者曰歩永州北郭有步曰鐵爐步余乘舟來居九年往來求其所以為鐵爐者無有問之人曰蓋嘗有鍜鐵者居其人去而爐毁者不知年矣獨有其號冒而存余曰嘻世固有事去名存而冒焉若是耶步之人曰子何獨怪是今世有負其姓而立於天下者曰吾門大他不我敵也問其位與徳曰久矣其先也然而彼猶曰我大世亦曰某氏大其冒於號有以異於兹步者乎向使有聞兹歩之號而不足釡錡錢鎛刀鈇者懷價而來能有得其欲乎則求位與徳於彼其不可得亦猶是也位存焉而徳無有猶不足以大其門然且樂為之下子胡不怪彼而獨怪於是大者桀冒禹紂冒湯幽厲冒文武以傲天下由不推知其本而姑大其故號以至於敗為世笑僇斯可以甚懼若求兹步之實而不得釡錡錢鏄刀鈇者則去而之他又何害乎子之驚於是末矣余以為古有太史觀民風采民言若是者則有得矣嘉其言可采書以為志唐宋八大家文鈔巻二十三
