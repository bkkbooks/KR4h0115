body:
  text: 唐宋八大家文鈔巻八十九明茅坤撰臨川文鈔九論周公論論確而辨亦儘圓轉甚哉荀卿之好妄也載周公之言曰吾所執贄而見者十人還贄而相見者三十人貌執者百有餘人欲言而請畢事千有餘人是誠周公之所為則何周公之小也夫聖人為政於天下也初若無為於天下而天下卒以無所不治者其法誠修也故三代之制立庠於黨立序於遂立學於國而盡其道以為養賢教士之法是士之賢雖未及用而固無不見尊養者矣此則周公待士之道也誠若荀卿之言則春申孟嘗之行亂世之事也豈足為周公乎且聖世之事各有其業講道習藝患日之不足豈暇逰公卿之門哉彼逰公卿之門求公卿之禮者皆戰國之奸民而毛遂侯嬴之徒也荀卿生於亂世不能考論先王之法著之天下而惑於亂世之俗遂以為聖世之事亦若是而已亦已過也且周公之所禮者大賢與則周公豈唯執贄見之而已固當薦之天子而共天位也如其不賢不足與共天位則周公如何其與之為禮也子産聴鄭國之政以其乘輿濟人於溱洧孟子曰惠而不知為政葢君子之為政立善法於天下則天下治立善法於一國則一國治如其不能立法而欲人人悦之則日亦不足矣使周公知為政則宜立學校之法於天下矣不知立學校而徒能勞身以待天下之士則不唯力有所不足而勢亦有所不得也或曰仰禄之士猶可驕正身之士不可驕也夫君子之不驕雖闇室不敢自慢豈為其人之仰禄而可以驕乎嗚呼所謂君子者貴其能不易乎世也荀卿生於亂世而遂以亂世之事量聖人後世之士尊荀卿以為大儒而繼孟子者吾不信矣伯夷論行文好所論伯夷處猶未是千年隻眼事有出於千世之前聖賢辯之甚詳而明然後世不深考之因以偏見獨識遂以為説既失其本而學士大夫共守之不為變者葢有之矣伯夷是已夫伯夷古之論有孔子孟子焉以孔孟之可信而又辯之反復不一是愈益可信也孔子曰不念舊惡求仁而得仁餓於首陽之下逸民也孟子曰伯夷非其君不事不立惡人之朝避紂居北海之濱目不視惡色不事不肖百世之師也故孔孟皆以伯夷遭紂之惡不念以怨不忍事之以求其仁餓而避不自降辱以待天下之清而號為聖人耳然則司馬遷以為武王伐紂伯夷叩馬而諫天下宗周而恥之義不食周粟而為采薇之歌韓子因之亦為之頌以為微二子亂臣賊子接迹於後世是大不然也夫商衰而紂以不仁殘天下天下孰不病紂而尤者伯夷也嘗與太公聞西伯善養老則往歸焉當是之時欲夷紂者二人之心豈有異邪及武王一奮太公相之遂出元元於塗炭之中伯夷乃不與何哉葢二老所謂天下之大老行年八十餘而春秋固已髙矣自海濱而趨文王之都計亦數千里之逺文王之興以至武王之世嵗亦不下十數豈伯夷欲歸西伯而志不遂乃死於北海邪抑來而死於道路邪抑其至文王之都而不足以及武王之世而死邪如是而言伯夷其亦理有不存者也且武王倡大義於天下太公相而成之而獨以為非豈伯夷乎天下之道二仁與不仁也紂之為君不仁也武王之為君仁也伯夷固不事不仁之紂以待仁而後出武王之仁焉又不事之則伯夷何處乎余故曰聖賢辯之甚明而後世偏見獨識者之失其本也嗚呼使伯夷之不死以及武王之時其烈豈獨太公哉三聖人論三聖人者各持其所見以自盡名天下而非以矯也而其行文自可觀孟子曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖之為名道之極徳之至也非禮勿動非禮勿言非禮勿視非禮勿聴此大賢者之事也賢者之事如此則可謂備矣而猶未足以鑚聖人之堅仰聖人之髙以聖人觀之猶太山之於岡陵河海之於陂澤然則聖人之事可知其大矣易曰與天地合其徳與日月合其明與鬼神合其吉凶此葢聖人之事也徳茍不足以合於天地明茍不足以合於日月吉凶茍不足以合於鬼神則非所謂聖人矣孟子論伯夷伊尹柳下惠皆曰聖人也而又曰伯夷隘栁下惠不恭隘與不恭君子不由也夫動言視聴茍有不合於禮者則不足以為大賢人而聖人之名非大賢人之所得擬也豈隘與不恭者所得僭哉蓋聞聖人之言行不茍而已将以為天下法也昔者伊尹制其行於天下曰何事非君何使非民治亦進亂亦進而後世之士多不能求伊尹之心者由是多進而寡退茍得而害義此其流風末俗之弊也聖人患其弊於是伯夷出而矯之制其行於天下曰治則進亂則退非其君不事非其民不使而後世之士多不能求伯夷之心者由是多退而寡進過㢘而復刻此其流風末世之弊也聖人又患其弊於是栁下惠出而矯之制其行於天下曰不羞汚君不辭小官遺佚而不怨阨窮而不憫而後世之士多不能求栁下惠之心者由是多汚而寡潔惡異而尚同此其流風末世之弊也此三人者因時之偏而救之非天下之中道也故久必弊至孔子之時三聖人之弊各極於天下矣故孔子集其行而制成法於天下曰可以速則速可以久則久可以仕則仕可以處則處然後聖人之道大具而無一偏之弊矣其所以大具而無弊者豈孔子一人之力哉四人者相為終始也故伯夷不清不足以救伊尹之弊栁下惠不和不足以救伯夷之弊聖人之所以能大過人者葢能以身救弊於天下耳如皆欲為孔子之行而忘天下之弊則惡在其為聖人哉是故使三人者當孔子之時則皆足以為孔子也然其所以為之清為之任為之和者時耳豈滯於此一端而已乎茍在於一端而已則不足以為賢人也豈孟子所謂聖人哉孟子之所謂隘與不恭君子不由者亦言其時爾且夏之道豈不美哉而殷人以為野殷之道豈不美哉而周人以為鬼所謂隘與不恭者何以異於是乎當孟子之時有教孟子枉尺直尋者有教孟子權以援天下者葢其俗有似於伊尹之弊時也是以孟子論是三人者必先伯夷亦所以矯天下之弊耳故曰聖人之言行豈茍而已将以為天下法也季子論確先王酌乎人情之中以制喪禮使哀有餘者俯而就之哀不足者企而及之哀不足者非聖人之所甚善也善之者善其能勉於禮而已延陵季子其長子死既封而號者三遂行孔子曰延陵季子之於禮其合矣乎夫長子之喪聖人為之三年之服蓋以謂父子之親而長子者為親之後人情之所至重也今季子三號遂行則於先王之禮為不及矣今論者曰當是之時季子聘於齊将君之命若夫季子之心則以謂不可以私義而緩君命有勢不得以兩全者則當忍哀以徇於尊者之事矣今将命而聘既聘而返遂少緩而盡哭之哀則於事君之義豈為不足而害於使事哉君臣父子之義勢足以兩全而不為之盡禮也則亦薄於骨肉之親而不用先王之禮爾其言曰骨肉歸復於土命也若魂氣則無所不之矣夫骨肉之復於土䰟氣之無不之是人情之所哀者矣君子無所不言命至於喪則有性焉獨不可以謂命也昔荘周喪其妻鼓盆而歌東門吳喪其子比於未有此棄人齊物之道吾儒之罪人也觀季子之說葢亦周吳之徒矣父子之親仁義之所由始而長子者繼祖考之重故喪之三年所以重祖考也今季子不為之盡禮則近於棄仁義薄祖考矣孔子曰喪事不敢不勉也又曰臨喪不哀吾何以觀之哉臨人之喪而不哀孔子猶以為不足觀也况禮之喪三年者乎然則此言宜非取之矣葢記其塟深不至於泉斂以時服既塟而封廣輪掩坎其髙可隠孔子之稱之葢稱其塟之合於禮爾獨稱塟之合於禮則哀之不足可知也衛有送塟者夫子觀之曰善哉此可以為法矣若此則夫子之所美也聖人之言辭隠而義顯豈徒然哉學者之所不可不思也子貢論辨博予讀史所載子貢事疑傳之者妄不然子貢安得為儒哉夫所謂儒者用於君則憂君之憂食於民則患民之患在下而不用則修身而已當堯之時天下之民患於洚水堯以為憂故禹於九年之間三過其門而不一省其子也囘之生天下之民患有甚於洚水天下之君憂有甚於堯然回以禹之賢而獨樂陋巷之間曾不以天下憂患介其意也夫二人者豈不同道哉所遇之時則異矣葢生於禹之時而由囘之行則是楊朱也生於囘之時而由禹之行則是墨翟也故曰賢者用於君則以君之憂為憂食於民則以民之患為患在下而不用於君則修其身而已何憂患之與哉夫所謂憂君之憂患民之患者亦以義也茍不義而能釋君之憂除民之患賢者亦不為矣史記曰齊伐魯孔子聞之曰魯墳墓之國國危如此二三子何為莫出子貢因行説齊以伐吳説吳以救魯復說越復説晉五國由是交兵或彊或破或亂或霸卒以存魯觀其言迹其事儀秦軫伐無以異也嗟乎孔子曰己所不欲勿施於人已以墳墓之國而欲全之則齊吳之人豈無是心哉奈何使之亂歟吾所以知傳者之妄一也於史考之當是時孔子子貢為匹夫非有卿相之位萬鍾之禄也何以憂患為哉然則異於顔囘之道矣吾所以知其傳者之妄二也墳墓之國雖君子之所重然豈有憂患而謀為不義哉借使有憂患為謀之義則豈可以變詐之説亡人之國而求自存哉吾所以知其傳者之妄三也子貢之行雖不能盡當於道然孔子之賢弟子也固不宜至於此矧曰孔子使之也太史公曰學者多稱七十子之徒譽者或過其實毁者或損其真子貢雖好辯詎至於此邪亦所謂毁損其真者哉莊周論上正當世之論荘子者不一而學儒者曰荘子之書務詆孔子以信其邪説要焚其書廢其徒而後可其曲直固不足論也學儒者之言如此而好荘子之道者曰荘子之徳不以萬物干其慮而能信其道者也彼非不知仁義也以為仁義小而不足行已彼非不知禮樂也以為禮樂薄而不足化天下故老子曰道失後徳徳失後仁仁失後義義失後禮是知莊子非不達於仁義禮樂之意也彼以為仁義禮樂者道之末也故薄之云爾夫儒者之言善也然未嘗求荘子之意也好荘子之言者固知讀荘子之書也然亦未嘗求荘子之意也昔先王之澤至荘子之時竭矣天下之俗譎詐大作質朴並散雖世之學士大夫未有知貴已賤物之道者也於是棄絶乎禮義之緒奪攘乎利害之際趍利而不以為辱殞身而不以為怨漸漬陷溺以至乎不可救已荘子病之思其説以矯天下之弊而歸之於正也其心過慮以為仁義禮樂皆不足以正之故同是非齊彼我一利害則以足乎心為得此其所以矯天下之弊者也既以其説矯弊矣又懼來世之遂實吾説而不見天地之純古人之大體也於是又傷其心於卒篇以自解故其篇曰詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分由此而觀之荘子豈不知聖人者哉又曰譬如耳目鼻口皆有所明不能相通猶百家衆技皆有所長時有所用用是以明聖人之道其全在彼而不在此而亦自列其書於宋鈃慎到墨翟老𣆀之徒俱為不該不徧一曲之士葢欲明吾之言有為而作非大道之全云爾然則荘子豈非有意於天下之弊而存聖人之道乎伯夷之清栁下惠之和皆有矯於天下者也荘子用其心亦二聖人之徒矣然而荘子之言不得不為邪說比者葢其矯之過矣夫矯枉者欲其直也矯之過則歸於枉矣荘子亦曰墨子之心則是也墨子之行則非也推荘子之心以求其行則獨何異於墨子哉後之讀荘子者善其為書之心非其為書之説則可謂善讀矣此亦荘子之所願於後世之讀其書者也今之讀者挾荘以謾吾儒曰荘子之道大哉非儒之所能及知也不知求其意而以異於儒者為貴悲夫荘周論下補前篇不足處學者詆周非堯舜孔子余觀其書特有所寓而言耳孟子曰説詩者不以文害辭不以辭害意以意逆志是為得之讀其文而不以意原之此為周者之所以詆也周曰上必無為而用天下下必有為而為天下用又自以為處昏上亂相之間故窮而無所見其材孰謂周之言皆不可措乎君臣父子之間而遭世遇主終不可使有為也及其引太廟犧以辭楚之聘使彼葢危言以懼衰世之常人耳夫以周之才豈迷出䖏之方而専畏犧者哉葢孔子所謂隠居放言者周殆其人也然周之説其於道既反之宜其得罪於聖人之徒也夫中人之所及者聖人詳説而謹行之説之不詳行之不謹則天下弊中人之所不及者聖人藏乎其心而言之略不略而詳則天下惑且夫諄諄而後喻譊譊而後服者豈所謂可以語上者哉惜乎周之能言而不通乎此也九卦論世之處困者什之八九其能㕘於九卦而不失者千之一萬之一吾所以録而存之處困之道君子之所難也非夫智足以窮理仁足以盡性内有以固其徳而外有以應其變者其孰能無患哉古之人有極天下之困而其心能不累其行能不移患至而不傷其身事起而不疑其變者葢有以䖏之也處之之道聖人嘗言之矣易曰履以和行謙以制禮復以自知恒以一徳損以逺害益以興利困以寡怨井以辯義巽以行權此其處之之道也夫君子之學至於是則備矣宜其通於天下也然而猶困焉者非吾行之過也時有利不利也葢古之所謂困者非謂夫其行自困者謂夫行足以通而困於命者耳葢於此九卦者智有所不能明仁有所不能守則其困也非所謂困而其處困也疎矣夫惟深於此九者而能果以行之者則其通也宜而其困也有以處之惟其學之之素也且君子之行大矣而待禮以和仁義為之内而和之以禮則行之成也而理之實存乎謙謙者禮之所自起禮者行之所自成也故君子不可以不知履欲知履不可以不知謙夫禮雖發乎其心而其文著乎外者也君子知禮而已則溺乎其文而失乎其實忘性命之本而莫能自復矣故禮之弊必復乎本而後可以無患故君子不可以不知復雖復乎其本而不能常其徳以自固則有時而失之矣故君子不可以不知恒雖能久其徳而天下事物之變相代乎吾之前如吾知恒而已則吾之行有時而不可通矣是必度其變而時有損益而後可故君子不可以不知損益夫學如此其至徳如此其備則宜乎其通也然而猶困焉者則向所謂困於命者也困於命則動而見病之時也則其事物之變尤衆而吾之所以處之者尤難矣然則其行尤貴於達事之宜而適時之變也故辯義行權然後能以窮通而井者所以辯義巽者所以行權也故君子之學至乎井巽而大備而後足以自通乎困之時孔子曰作易者其有憂患謂其言之足以自通乎困之時也嗚呼後世之人一困於時則憂思其心而失其故行然卒至於不能自存也是豈有他哉不知夫九者之義故也禮論借荀卿之説而辨之而行文亦儘圓轉嗚呼荀卿之不知禮也其言曰聖人化性而起偽吾是以知其不知禮也知禮者貴乎知禮之意而荀卿盛稱其法度節奏之美至於言化則以為偽也亦烏知禮之意哉故禮始於天而成於人知天而不知人則野知人而不知天則偽聖人惡其野而疾其偽以是禮興焉今荀卿以謂聖人之化性為起偽則是不知天之過也然彼亦有見而云爾凡為禮者必詘其放傲之心逆其嗜欲之性莫不欲逸而為尊者勞莫不欲得而為長者讓擎跽曲拳以見其恭夫民之於此豈皆有樂之之心哉患上之惡已而隨之以刑也故荀卿以為特刼之法度之威而為之於外爾此亦不思之過也夫斲木而為之器服馬而為之駕此非生而能者也故必削之以斧斤直之以繩墨圓之以規而方之以矩束聯膠漆之而後器適於用焉前之以銜勒之制後之以鞭策之威馳驟舒疾無得自放而一聴於人而後馬適於駕焉由是觀之莫不刼之於外而服之以力者也然聖人捨木而不為器捨馬而不為駕者固亦因其天資之材也今人生而有嚴父愛母之心聖人因其性之欲而為之制焉故其制雖有以强人而乃以順其性之欲也聖人茍不為之禮則天下葢将有慢其父而疾其母者矣此亦可謂失其性也得性者以為偽則失其性者乃可以為真乎此荀卿之所以為不思也夫狙猿之形非不若人也欲繩之以尊卑而節之以揖讓則彼有趨於深山大麓而走耳雖畏之以威而馴之以化其可服邪以謂天性無是而可以化之使偽耶則狙猿亦可使為禮矣故曰禮始於天而成於人天則無是而人欲為之者舉天下之物吾葢未之見也禮樂論中多名言行文處類荀卿氣之所稟命者心也視之能必見聴之能必聞行之能必至思之能必得是誠之所至也不聴而聰不視而明不思而得不行而至是性之所固有而神之所自生也盡心盡誠者之所至也故誠之所以能不測者性也賢者盡誠以立性者也聖人盡性以至誠者也神生於性性生於誠誠生於心心生於氣氣生於形形者有生之本故養生在於保形充形在於育氣養氣在於寜心寜心在於致誠養誠在於盡性不盡性不足以養生能盡性者至誠者也能至誠者寜心者也能寜心者養氣者也能養氣者保形者也能保形者養生者也不養生不足以盡性也生與性之相因循志之與氣相為表裏也生渾則蔽性性渾則蔽生猶志一則動氣氣一則動志也先王知其然是故體天下之性而為之禮和天下之性而為之樂禮者天下之中經樂者天下之中和禮樂者先王所以養人之神正人氣而歸正性也是故大禮之極簡而無文大樂之極易而希聲簡易者先王建禮樂之本意也世之所重聖人之所輕世之所樂聖人之所悲非聖人之情與世人相反聖人内求世人外求内求者樂得其性外求者樂得其欲欲易發而性難知此情性之所以正反也衣食所以養人之形氣禮樂所以養人之性也禮反其所自始樂反其所自生吾於禮樂見聖人所貴其生者至矣世俗之言曰養生非君子之事是未知先王建禮樂之意也養生以為仁保氣以為義去情却欲以盡天下之性修神致明以趨聖人之域聖人之言莫大顔淵之問非禮勿視非禮勿聴非禮勿言非禮勿動則仁之道亦不逺也耳非取人而後聰目非取人而後視口非取諸人而後言也身非取諸人而後動也其守至約其取至近有心有形者皆有之也然而顔子且猶病之何也葢人之道莫大於此非禮勿聴非謂掩耳而避之天下之物不足以干吾之聰也非禮勿視非謂掩目而避之天下之物不足以亂吾之明也非禮勿言非謂止口而無言也天下之物不足以易吾之辭也非禮勿動非謂止其躬而不動天下之物不足以干吾之氣也天下之物豈特形骸自為哉其所由來葢微矣不聴之時有先聰焉不視之時有先明焉不言之時有先言焉不動之時有先動焉聖人之門惟顔子可以當斯語矣是故非耳以為聰而不知所以聰者不足以盡天下之聴非目以為明而不知所以明者不足以盡天下之視聰明者耳目之所能為而所以聰明者非耳目之所能為也是故待鐘皷而後樂者非深於樂者也待玉帛而後恭者非深於禮者也蕢捊土鼓而樂之道備矣燔黍捭豚汚尊抔飲禮既備矣然大裘無文大輅無飾聖人獨以其事之所貴者何也所以明禮樂之本也故曰禮之近人情非其至者也曾子謂孟敬子君子之所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存觀此言也曾子而不知道也則可使曾子而為知道則道不違乎言貌辭氣之間何待於外哉是故古之人目撃而道已存不言而意已傳不賞而人自勸不罰而人自畏莫不由此也是故先王之道可以傳諸言効諸行者皆其法度刑政而非神明之用也易曰神而明之存乎其人默而存之不言而信存乎徳行去情却欲而神明生矣修神致明而物自成矣是故君子之道鮮矣齋明其心清明其徳則天地之間所有之物皆自至矣君子之守至約而其至也廣其取至近而其應也逺易曰擬之而後言議之而後動擬議以成其變化變化之應天人之極致也是以書言天人之道莫大於洪範洪範之言天人之道莫大於貌言視聴思大哉聖人獨見之理傳心之言乎儲精晦息而通神明君子之所不至者三不失色於人不失口於人不失足於人不失色者容貌精也不失口者語默精也不失足者行止精也君子之道也語其大則天地不足容也語其小則不見秋毫之末語其强則天下莫能敵也語其約則莫能致傳記聖人之遺言曰大禮與天地同節大樂與天地同和葢言性也大禮性之中大樂性之和中和之情通乎神明故聖人儲精九重儀鳯凰修五事而關隂陽是天地位而三光明四時行而萬物和詩曰鶴鳴於九臯聲聞於天故孟子曰我善養吾浩然之氣充塞乎天地之間楊子曰貌言視聴思性所有潛天而天潛地而地也嗚呼禮樂之意不傳久矣天下之言養生修性者歸於浮屠老子而已浮屠老子之説行而天下為禮樂者獨以順流俗而已夫使天下之人驅禮樂之文以順流俗為事欲成治其國家者此梁晉之君所以取敗之禍也然而世非知之也者何耶特禮樂之意大而難知老子之言近而易輕聖人之道得諸已從容人事之間而不離其類焉浮屠直空虚窮苦絶山林之間然後足以善其身而已由是觀之聖人之於釋老其逺近難易可知也是故賞與古人同而勤不同罰與古人同而威不同仁與古人同而愛不同智與古人同而識不同言與古人同而信不同同者道也不同者心也易曰茍非其人道不虚行昔宓子賤為單父宰而單父之人化焉今王公大人有堯舜伊尹之勢而無子賤一邑之功者得非學術素淺而道未明歟夫天下之人非不勇為聖人之道為聖人之道者時務速售諸人以為進取之階今夫進取之道譬諸鈎索物耳幸而多得其數則行為王公大人若不幸而少得其數則裂逢掖之衣為商賈矣由是觀之王公大人同商賈之得志者也此之謂學術淺而道不明由此觀之得志而居人之上復治聖人之道而不捨焉幾人矣内而好愛之容蠱其欲外有便嬖之諛驕其志向之所能者日已忘矣今之所好者日已至矣孔子曰有顔回者好學不遷怒不貳過又曰吾見其進未見其止也夫顔子之所學者非世人之所學不遷怒者求諸已不貳過者見不善之端而止之也世之人所謂退顔子之所謂進也人之所謂益顔子之所謂損也易曰損先難而後獲顔子之謂也耳損於聲目損於色口損於言身損於動非先難歟及其至也耳無不聞目無不見言無不信動無不服非後得歟是故君子之學始如愚人焉如童蒙焉及其至也天地不足大人物不足多鬼神不足為隠諸子之支離不足惑也是故天之髙也日月星辰隂陽之氣可端策而數也地至大也山川丘陵萬物之形人之常産可指籍而定也是故星厯之數天地之法人物之所皆前世致精好學聖人者之所建也後世之人守其成法而安能知其始焉傳曰百工之事皆聖人作此之謂也故古之人言道者莫先於天地言天地者莫先乎身言身者莫先乎性言性者莫先乎精精者天之所以髙地之所以厚聖人所以配之故御人莫不盡能而造父獨得之非車馬不同造父精之也射人莫不盡能而羿獨得之非弓矢之不同羿精之也今之人與古之人一也然而用之則二也造父用之以為御羿用之以為射盜蹠用之以為賊唐宋八大家文鈔巻八十九
