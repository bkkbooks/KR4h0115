body:
  text: 唐宋八大家文鈔卷八明茅坤撰昌黎文鈔八記傳新修滕王閣記通篇不及滕王閣中情事而止以生平感慨作波瀾婉而宕愈少時則聞江南多臨觀之美而滕王閣獨為第一有瑰偉絶特之稱及得三王所為序賦記等壯其文辭益欲往一觀而讀之以忘吾憂繫官于朝願莫之遂十四年以言事斥守揭陽便道取疾以至海上又不得過南昌而觀所謂滕王閣者其冬以天子進大號加恩區內移刺袁州袁於南昌為屬邑私喜幸自語以為當得躬詣大府受約束於下執事及其無事且還儻得一至其處竊寄目償所願焉至州之七月詔以中書舍人太原王公為御史中丞觀察江南西道洪江饒䖍吉信撫袁悉屬治所八州之人前所不便及所願欲而不得者公至之日皆罷行之大者驛聞小者立變春生秋殺陽開隂閉令修於庭户數日之間而人自得於湖山千里之外吾雖欲出意見論利害聽命於幕下而吾州乃無一事可假而行者又安得捨巳所事以勤館人則滕王閣又無因而至焉矣其嵗九月人吏浹和公與監軍使燕于此閣文武賔士皆與在席酒半合辭言曰此屋不修且壞前公為從事此邦適理新之公所為文實書在壁今三十年而公來為邦伯適及期月公又來燕于此公烏得無情哉公應曰諾於是棟楹梁桷板檻之腐黑撓折者蓋瓦級甎之破缺者赤白之漫漶不鮮者治之則已無侈前人無廢後觀工既訖功公以衆飲而以書命愈曰子其為我記之愈既以未得造觀為歎竊喜載名其上詞列三王之次有榮耀焉乃不辭而承公命其江山之好登望之樂雖老矣如獲從公遊尚能為公賦之藍田縣丞㕔壁記憤當世之丞不得盡其職故借壁記以㸃綴之而詞氣多淡宕竒詭丞之職所以二令於一邑無所不當問其下主簿尉主簿尉乃有分職丞位髙而逼例以嫌不可否事文書行吏抱成案詣丞卷其前鉗以左手右手摘紙尾鴈鶩行以進平立睨丞曰當署丞涉筆占位署惟謹目吏問可不可吏曰得則退不敢略省漫不知何事官雖尊力勢反出主簿尉下諺數慢必曰丞至以相訾謷丞之設豈端使然哉博陵崔斯立種學績文以蓄其有泓涵演迤日大以肆貞元初挾其能戰藝於京師再進再屈於人元和初以前大理評事言得失黜官再轉而為丞兹邑始至喟曰官無卑顧材不足塞職既噤不得施用又喟曰丞哉丞哉余不負丞而丞負余則盡枿去牙角一躡故跡破崖岸而為之丞㕔故有記壞漏汚不可讀斯立易桷與瓦墁治壁悉書前任人名氏庭有老槐四行南牆巨竹千梃儼立若相持水㶁㶁循除鳴斯立痛掃溉對樹二松日哦其間有問者輒對曰余方有公事子姑去考功郎中知制誥韓愈記唐荆川曰此但說斯立不得盡職更不說起記壁之意亦變體也燕喜亭記淋漓指畫之態是得記文正體而結局處特髙歐公文大略有得於此太原王𢎞中在連州與學佛人景常元慧游異日從二人者行于其居其後丘荒之間上髙而望得異處焉斬茅而嘉樹列發石而清泉激輦糞壤燔椔翳却立而視之出者突然成丘陷者呀然成谷窪者為池而缺者為洞若有鬼神異物隂來相之自是𢎞中與二人者晨往而夕忘歸焉乃立屋以避風雨寒暑既成愈請名之其丘曰俟德之丘蔽於古而顯於今有俟之道也其石谷曰謙受之谷瀑曰振鷺之瀑谷言德瀑言容也其土谷曰黃金之谷瀑曰秩秩之瀑谷言容瀑言德也洞曰寒居之洞志其入時也池曰君子之池虛以鍾其美盈以出其惡也泉之源曰天澤之源出髙而施下也合而名之以屋曰燕喜之亭取詩所謂魯侯燕喜者頌也於是州民之老聞而相與觀焉曰吾州之山水名天下然而無與燕喜者比經營於其側者相接也而莫直其地凡天作而地藏之以遺其人乎𢎞中自吏部郎貶秩而來次其道途所經自藍田入商洛涉淅湍臨漢水升峴首以望方城出荆門下岷江過洞庭上湘水行衡山之下繇郴踰嶺猿狖所家魚龍所宫極幽遐瑰詭之觀宜其於山水飫聞而厭見也今其意乃若不足傳曰智者樂水仁者樂山𢎞中之德與其所好可謂協矣智以謀之仁以居之吾知其去是而羽儀於天朝也不逺矣遂刻石以記河南府同官記烟波感慨甚曲折永貞元年愈自陽山移江陵法曹參軍獲事河東公公嘗與其從事言建中初天子始紀年更元命官司舉貞觀開元之烈羣臣惕栗奉職命材登良不敢私違當時自齒朝之士而上以及下百職事官闕一人將補必取其良然而河南同時於天下稱多獨得將相五人故於府之參軍則得我公於河南主簿則得故相國范陽盧公於汜水主簿則得故相國今太子賔客滎陽鄭公於陸渾主簿則得相國今吏部侍郎天水趙公於登封主簿則得故吏部尚書東都留守吳郡顧公盧公去河南為右補闕其後由尚書左丞至宰相鄭公去汜水為監察御史佐山南軍其後由工部侍郎至宰相罷而又為趙公去陸渾為右拾遺其後由給事中為宰相顧公去登封為監察御史其後由京兆尹至吏部尚書東都留守我公去府為長水尉其後由膳部郎中為荆南節度行軍司馬遂為節度使自工部尚書至吏部尚書三相國之勞在史冊顧吏部慎職小心于時有聲我公願潔而沈密開亮而卓偉行茂于宗事修于官嗣紹家烈不違其先作帥荆南厥聞休顯武志既揚文教亦熙登槐贊元其慶且至故好語故事者以為五公之始迹也同其後進而偕大也亦同其稱名臣也又同官職雖分而功德有巨細其有忠勞於國家也同有若將同其後而先同其初也有聞而問者於是焉書既五年始立石刻其語河南府參軍舍庭中於時河東公為左僕射宰相出藩大邦開府漢南鄭公以工部尚書留守東都趙公以吏部尚書鎮江陵漢南地連七州戎士十萬其官宰相也留守之官居禁省中嵗時出旌旗序留司文武百官於宫城門外而衙之江陵故楚都也戎士五萬三公同時千里相望可謂盛矣河東公名均姓裴氏畫記妙處在物數龎雜而詮次特悉於其記可以知其畫之絶世矣雜古今人物小畫共一卷騎而立者五人騎而被甲載兵立者十人一人騎執大旗前立騎而被甲載兵行且下牽者十人騎且負者二人騎執器者二人騎擁田犬者一人騎而牽者二人騎而驅者三人執羈靮立者二人騎而下倚馬臂隼而立者一人騎而驅涉者二人徒而驅牧者二人坐而指使者一人甲胄手弓矢鈇鉞植者七人甲胄執幟植者十人負者七人偃寢休者二人甲胄坐睡者一人方涉者一人坐而脫足者一人寒附火者一人雜執器物役者八人奉壺矢者一人舍而具食者十有一人挹且注者四人牛牽者二人驢驅者四人一人杖而負者婦人以孺子載而可見者六人載而上下者三人孺子戲者九人凡人之事三十有二為人大小百二十有三而莫有同者焉馬大者九匹於馬之中又有上者下者行者牽者涉者陸者翹者顧者鳴者寢者訛者立者人立者齕者飲者溲者陟者降者癢磨樹者噓者嗅者喜相戲者怒相踶齧者秣者騎者驟者走者載服物者載狐兔者凡馬之事二十有七為馬小大八十有三而莫有同者焉牛大小十一頭槖駝三頭驢如槖駝之數而加其一焉隼一犬羊狐兔麋鹿共三十旃車三兩雜兵器弓矢旌旗刀劔矛楯弓服矢房甲胄之屬瓶盂簦笠筐筥錡釡飲食服用之器壺矢博奕之具二百五十有一皆曲極其妙貞元甲戌年余在京師甚無事同居有獨孤生申叔者始得此畫而與豫彈碁余幸勝而獲焉意甚惜之以為非一工人之所能運蓋藂集衆工人之所長耳雖百金不願易也明年出京師至河陽與二三客論畫品格因出而觀之座有趙侍御者君子人也見之戚然若有感然少而進曰噫豫之手摸也亡之且二十年矣余少時常有志乎兹事得國本絶人事而摸得之遊閩中而喪焉居閒處獨時往來余懷也以其始為之勞而夙好之䔍也今雖遇之力不能為己且命工人存其大都焉余既甚愛之又感趙君之事因以贈之而記其人物之形狀與數而時觀之以自釋焉徐泗濠三州節度掌書記㕔石記雅致書記之任亦難矣元戎整齊三軍之士統理所部之氓以鎮守邦國贊天子施教化而又外與賔客四鄰交其朝覲聘問慰薦祭祀祈祝之文與所部之政三軍之號令升黜凡文辭之事皆出書記非閎辨通敏兼人之才莫宜居之然皆元戎自辟然後命于天子茍其帥之不文則其所辟或不當亦其理宜也南陽公自御史大夫豪夀廬三州觀察使授節移鎮徐州厯十一年而掌書記者三人其一人曰髙陽許孟容入仕于王朝今為尚書禮部郎中其一人曰京兆杜兼今為尚書禮部員外郎觀察判官其一人隴西李博自前鄉貢進士授祕書省挍書郎方為之南陽公文章稱天下其所辟實所謂閎辨通敏兼人之才者也後之人茍未知南陽公之文章吾請觀於三君子茍未知三君子之文章吾請觀於南陽公可知矣蔚乎其相章炳乎其相輝志同而氣合魚川泳而鳥雲飛也愈樂是賔主之相得也故請刻石以記之而陷置于壁中俾來者得以覽觀焉科斗書後記典實愈叔父當大厯世文辭獨行中朝天下之欲銘述其先人功行取信來世者咸歸韓氏於時李監陽氷獨能篆書而同姓叔父擇木善入分不問可知其人不如是者不稱三服故三家傳子弟往來貞元中愈事董丞相幕府於汴州識開封令服之者陽氷子授余以其家科斗孝經漢衛宏官書兩部合一卷愈寶蓄之而不暇學後來京師為四門博士識歸公歸公好古書能通之愈曰古書得其據依蓋可講因進其所有書屬歸氏元和來愈亟不獲讓嗣為銘文薦道功德思凡為文辭宜略識字因從歸公乞觀二部書得之留月餘張籍令進士賀拔恕寫以留愈蓋得其十四五而歸其書歸氏十一年六月四日右庶子韓愈記汴州東西水門記并序語莊貞元十四年正月戊子隴西公命作東西水門越三月辛巳朔水門成三日癸未大合樂設水嬉㑹監軍軍司馬賔佐僚屬將挍熊羆之士肅四方之賔客以落之士女和㑹闐郭溢郭既卒事其從事昌黎韓愈請紀成績其詞曰維汴州河水自中注厥初距河為城其不合者誕置聮鎖于河宵浮晝湛舟不潛通然其襟抱虧疏風氣宣泄邑居弗寧訛言屢騰厯載已來孰究孰思皇帝御天下十有八載此邦之人遭逢疾威嚚童噭呼劫衆阻兵凛凛栗栗若墜若覆時維隴西公受命作藩爰自洛京單車來臨遂拯其危遂去其疵弗肅弗厲薰為太和神應祥福五榖穰熱既庶而豐人力有餘監軍是咨司馬是謀乃作水門為邦之郛以固風氣以閈冦偷黃流渾渾飛閣渠渠因而飾之匪為觀遊天子之武維隴西公是布天子之文維隴西公是宣河之沄沄源于崑崙天子萬祀公多受祉乃伐山石刻之日月尚俾來者知作之所始鄆州溪堂詩記憲宗之十四年始定東平三分其地以華州刺史禮部尚書兼御史大夫扶風馬公為鄆曹濮節度觀察等使鎮其地既一年裦其軍號曰天平軍上即位之二年召公入且將用之以其人之安公也復歸之鎮上之三年公為政於鄆曹濮也適四年矣治成制定衆志大固惡絶於心仁形於色竱心一力以供國家之職于時沂密始分而殘其帥其後幽鎮魏不悅於政相扇繼變復歸於舊徐亦乘勢逐帥自置同於三方惟鄆也截然中居四鄰望之若防之制水恃以無恐然而皆曰鄆為冦巢且六十年將彊卒武曹濮於鄆州大而近軍所根柢皆驕以易怨而公承死亡之後掇拾之餘剝膚椎髓公私掃地赤立新舊不相保持萬目睽睽公於此時能安以治之其功為大若幽鎮魏徐之亂不扇而變此功反小何也公之始至衆未熟化以武則忿以憾以恩則橫而肆一以為赤子一以為龍蛇憊心罷精磨以嵗月然後致之難也及教之行衆皆戴公為親父母夫叛父母從仇讐非人之情故曰易於是天子以公為尚書右僕射封扶風縣開國伯以褒嘉之公亦樂衆之和知人之恱而侈上之賜也於是為堂於其居之西北隅號曰溪堂以饗士大夫通上下之志既饗其從事陳曾謂其衆言公之畜此邦其勤不亦至乎此邦之人纍公之化惟所令之不亦順乎上勤下順遂濟登兹不亦休乎昔者人謂斯何今者人謂斯何雖然斯堂之作意其有謂而喑無詩歌是不考引公德而接邦人於道也乃使來請其詩曰帝奠九壥有葉有年有荒不條河岱之間及我憲考一收正之視邦選侯以公來尸公來尸之人始未信公不飲食以訓以狥孰饑無食孰呻孰歎孰寃不問不得分願孰為邦蟊節根之螟羊狠狼貪以口覆城吹之喣之摩手拊之針之石之膊而磔之凡公四封既富以彊謂公吾父孰違公令可以師征不寧守邦公作溪堂播播流水淺有蒲蓮深有蒹葦公以賔燕其鼓駭駭公燕溪堂賔挍醉飽流有跳魚岸有集鳥既歌以舞其鼓考考公在溪堂公御琴瑟公暨賔贊稽經諏律施用不差人用不屈溪有薲苽有龜有魚公在中流右詩左書無我斁遺此邦是庥太學生何蕃傳此篇總在兩不遇上相感慨太學生何蕃入太學者草餘年矣嵗舉進士學成行尊自太學諸生推頌不敢與蕃齒相與言於助教博士助教博士以狀申於司業祭酒司業祭酒撰次蕃之羣行焯焯者數十餘事以之升於禮部而以聞於天子京師諸生以薦蕃名文說者不可選紀公卿大夫知蕃者比肩立莫為禮部為禮部者率蕃所不合者以是無成功蕃淮南人父母具全初入太學嵗率一歸父母止之其後間一二嵗乃一歸又止之不歸者五嵗矣蕃純孝人也閔親之老不自克一日揖諸生歸養於和州諸生不能止乃閉蕃空舍中於是太學六館之士百餘人又以蕃之義行言於司業陽先生城請諭留蕃於是太學闕祭酒㑹陽先生出道州不敢留歐陽詹生言曰蕃仁勇人也或者曰蕃居太學諸生不為非義葬死者之無歸哀其孤而字焉惠之大小必以力復斯其所謂仁歟蕃之力不任其體其貌不任其心吾不知其勇也歐陽詹生曰朱泚之亂太學諸生舉將從之來請起蕃蕃正色叱之六館之士不從亂茲非其勇歟惜乎蕃之居下其可以施於人者不流也譬之水其為澤不為川乎川者髙澤者卑髙者流卑者止是故蕃之仁義充諸心行諸太學積者多施者不遐也天將雨水氣上無擇於川澤澗溪之髙下然則澤之道其亦有施乎抑有待於彼者歟故凡貧賤之士必有待然後能有所立獨何蕃歟吾是以言之無亦使其無傳焉圬者王承福傳以議論行叙事然非韓文之佳者圬之為技賤且勞者也有業之其色若自得者聽其言約而盡問之王其姓承福其名世為京兆長安農夫天寶之亂發人為兵持弓矢十三年有官勳棄之來歸喪其土田手鏝衣食餘三十年舍于市之主人而歸其屋食之當焉視時屋食之貴賤而上下其圬之傭以償之有餘則以與道路之廢疾餓者焉又曰粟稼而生者也若布與帛必蠶績而後成者也其他所以養生之具皆待人力而後完也吾皆賴之然人不可遍為宜乎各致其能以相生也故君者理我所以生者也而百官者承君之化者也任有小大惟其所能若器皿焉食焉而怠其事必有天殃故吾不敢一日舍鏝以嬉夫鏝易能可力焉又誠有功取其直雖勞無愧吾心安焉夫力易强而有功也心難强而有智也用力者使於人用心者使人亦其宜也吾特擇其易為而無愧者取焉嘻吾操鏝以入富貴之家有年矣有一至者焉又往過之則為墟矣有再至三至者焉而往過之則為墟矣問之其鄰或曰噫刑戮也或曰身既死而其子孫不能有也或曰死而歸之官也吾以是觀之非所謂食焉怠其事而得天殃者邪非强心以智而不足不擇其才之稱否而冒之者邪非多行可愧知其不可而强為之者邪將富貴難守薄功而厚饗之者邪抑豐悴有時一去一來而不可常者邪吾之心憫焉是故擇其力之可能者行焉樂富貴而悲貧賤我豈異於人哉又曰功大者其所以自奉也博妻與子皆養於我者也吾能薄而功小不有之可也又吾所謂勞力者若立吾家而力不足則心又勞也一身而二任焉雖聖者不可能也愈始聞而惑之又從而思之蓋賢者也蓋所謂獨善其身者也然吾有譏焉謂其自為也過多其為人也過少其學楊朱之道者邪楊之道不肯拔我一毛而利天下而夫人以有家為勞心不肯一動其心以畜其妻子其肯勞其心以為人乎哉雖然其賢於世之患不得之而患失之者以濟其生之欲貪邪而亡道以喪其身者其亦逺矣又其言有可以警余者故余為之傳而自鑑焉毛穎傳設虛景摹寫工極古今其連翩跌宕刻畫司馬子長毛穎者中山人也其先明視佐禹治東方土養萬物有功因封於卯地死為十二神嘗曰吾子孫神明之後不可與物同當吐而生巳而果然眀視八世孫䨲世傳當殷時居中山得神仙之術能匿光使物竊姮娥騎蟾蜍入月其後代遂隱不仕云居東郭者曰㕙狡而善走與韓盧爭能盧不及盧怒與宋鵲謀而殺之醢其家秦始皇時䝉將軍恬南伐楚次中山將大獵以懼楚召左右庶長與軍尉以連山筮之得天與人文之兆筮者賀曰今日之獲不角不牙衣褐之徒缺口而長鬚八竅而跌居獨取其髦簡牘是資天下其同書秦其遂兼諸侯乎遂獵圍毛氏之族拔其豪載穎而歸獻俘于章臺宫聚其族而加束縛焉秦皇帝使恬賜之湯沐而封諸管城號曰管城子日見親寵任事穎為人强記而便敏自結繩之代以及秦事無不纂録隂陽卜筮占相醫方族氏山經地志字書圖畫九流百家天人之書及至浮圖老子外國之說皆所詳悉又通於當代之務官府簿書市井貨錢注記惟上所使自秦皇帝及太子扶蘇胡亥丞相斯中車府令髙下及國人無不愛重又善隨人意正直邪曲巧拙一隨其人雖見廢棄終默不泄惟不喜武士然見請亦時往纍拜中書令與上益狎上嘗呼為中書君上親决事以衡石自程雖宫人不得立左右獨穎與執燭者常侍上休方罷穎與絳人陳𤣥𢎞農陶泓及㑹稽褚先生友善相推致其出處必偕上召穎三人者不待詔輒俱往上未嘗怪焉後因進見上將有任使拂拭之因免冠謝上見其髮秃又所摹畫不能稱上意上嘻笑曰中書君老而秃不任吾用吾嘗謂君中書君今不中書耶對曰臣所謂盡心者因不復召歸封邑終于管城其子孫甚多散處中國夷狄皆冒管城惟居中山者能繼父祖業太史公曰毛氏有兩族其一姬姓文王之子封於毛所謂魯衛毛𥅆者也戰國時有毛公毛遂獨中山之族不知其本所出子孫最為蕃昌春秋之成見絶于孔子而非其罪及蒙將軍拔中山之豪始皇封諸管城世遂有名而姬姓之毛無聞穎始以俘見卒見任使秦之滅諸侯穎與有功賞不酬勞以老見疏秦真少恩哉王遵岩曰通篇將無作有所謂以文滑稽者贊論尤髙古直逼馬遷唐宋八大家文鈔卷八
