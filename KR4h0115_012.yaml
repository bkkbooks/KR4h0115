body:
  text: 唐宋八大家文鈔卷十二明茅坤撰昌黎文鈔十二碑銘烏氏廟碑銘序烏氏世系及戰功處錯綜而鬯元和五年天子曰盧從史始立議用師于恆乃隂與寇連夸謾凶驕出不遜言其執以來其四月中貴人承璀即誘而縛之其下皆甲以出操兵趨譁牙門都將烏公重胤當軍門叱曰天子有命從有賞敢違者斬於是士皆斂兵還營卒致從史京師壬辰詔用烏公為銀青光祿大夫河陽軍節度使兼御史大夫封張掖郡開國公居三年河陽稱治詔贈其父工部尚書且曰其以廟享即以其年營廟於京師崇化里軍佐竊議曰先公既位常伯而先夫人無加命號名差卑於配不宜語聞詔贈先夫人劉氏沛國太夫人八年八月廟成三室同宇祀自左領府君而下作主於第乙巳升于廟烏氏著於春秋譜於世本列於姓苑在莒者存在齊有餘枝鳴皆為大夫秦有獲為大官其後世之江南者家鄱陽處北者家張掖或入夷狄為君長唐初察為左武衛大將軍實張掖人其子曰令望為左領軍衛大將軍孫曰蒙為中郎將是生贈尚書諱承玼字某烏氏自莒齊秦大夫以來皆以材力顯及武德以來始以武功為名將家開元中尚書管平盧先鋒軍屬破奚契丹從戰捺祿走可突于渤海擾海上至馬都山吏民逃徙失業尚書領所部兵塞其道塹原纍石綿四百里深髙皆三丈寇不得進民還其居嵗罷運錢三千萬餘黑水室韋以騎五千來屬麾下邊威益張其後與耿仁智謀説史思明降思明復叛尚書與兄承恩謀殺之事發族夷尚書獨走免李光弼以聞詔拜冠軍將軍守右威衛將軍檢挍殿中監封昌化郡王石嶺軍使積粟厲兵出入耕戰以疾去職貞元十一年二月丁巳薨於華隂告平里年若干即葬于其地二子大夫為長季曰重元為某官銘曰烏氏在唐有家于初右武左領二祖紹居中郎少卑屬于尚書不償其勞乃相大夫授我戎節制有疆墟數備禮登以有宗廟作廟天都以致其孝右祖左孫爰饗其報云誰無子其有無孫克對無羞乃惟有人念昔平盧為艱為瘁大夫承之危不棄義四方其平士有怠息來覲來齋以饋黍稷袁氏先廟碑序袁氏世系千餘年若一線中多荆棘句字不可讀系之以韻似追雅頌袁公滋既成廟明嵗二月自荆南以旗節朝京師留六日得壬子春分率宗親子屬用少牢于三室既事退言曰嗚呼逺哉維世傳德襲訓集余乃今有濟今祭既不薦金石音聲使工歌詩載烈象容其奚以飭稚昧於長久唯敬繫羊豕幸有石如具著先人名迹因為詩繫之語下於義其可雖然余不敢必屬篤古而達於詞者遂以命愈愈謝非其人不獲命則謹條袁氏本所以出與其世系里居起周厯漢魏晉拓拔魏周隋入國家以來髙曾祖考所以劬躬燾後委祉于公公之所以逢將承應者有槩有詳而綴以詩其語曰周樹舜後陳陳公子有為大夫食國之地袁鄉者其子孫世守不失因自别為袁氏春秋世陳常壓於楚與中國相加尤疏袁氏猶班班見可譜常居陽夏陽夏至晉屬陳郡故號陳郡袁袁氏博士固申儒遏黃唱業於前至司徒安懷德於身袁氏遂大顯連世有人終漢連魏晉分仕南北始居華隂為拓拔魏鴻臚鴻臚諱恭生周梁州刺史新縣孝侯諱頴孝侯生隋左衛大將軍諱溫去官居華隂武德九年以大耋薨始葬華州左衛生南州刺史諱士政南州生當陽令諱倫於公為曾祖當陽生朝散大夫石州司馬諱知玄司馬生贈工部尚書咸寧令諱曄是為皇考袁氏舊族而當陽以通經為儒位止縣令石州用春秋持身治事為州司馬以終咸寧備學而貫以一文武隨用謀行功從出入有立不爵于朝比三世宜達而窒歸成後人數當于公公惟曾大父大父皇考比三世存不大夫食歿祭在子孫唯將相能致備物世彌逺禮則益不及在慎德行業治圖功載名以待上可無細大無敢不敬畏無早夜無敢不思成于家進于外以立于朝自侍御史厯工部員外郎祠部郎中諌議大夫尚書右丞華州刺史金吾大將軍由卑而巨莫不官稱遂為宰相以贊辨章仍持節將蜀滑襄荆略苞河山秩登祿富以有廟祀具如其志又垂顯刻以教無忘可謂大孝詩曰袁自陳分初尚蹇連越秦造漢博士發論司徒任德忍不錮人收功厥後五公重尊晉士于南來處華下鴻臚孝侯用適操捨南州勤治取最不懈當陽耽經唯義之畏石州烈烈學專春秋懿哉咸寧不名一休趨難避成與時泛浮是生孝子天子之宰出把將符羣州承楷數以立廟祿以備器由曾及考同堂異置柏版松楹其筵肆肆維袁之廟孝孫之為順勢即宜以諏以龜以平其巇屋牆持持孝孫來享來拜廟庭陟堂進室親登籩鉶肩臑胉骼其樽玄清降登受胙于慶爾成維曾維祖維考之施于汝孝嗣以報以祗凡我有今非本曷思刻詩牲繫維以告之魏博節度觀察使沂國公先廟碑銘按田𢎞正本傳世多臣順大節昌黎公特穩括其以六州還朝廷一事而頌美之詞特詳銘中甚得體元和八年十一月壬子上命丞相元衡丞相吉甫丞相絳召太史尚書比部郎中韓愈至政事堂傳詔曰田𢎞正始有廟京師朕惟𢎞正先祖父厥心靡不嚮帝室訖不得施乃以教付厥子惟𢎞正銜訓事嗣朝夕不怠以能迎天之休顯有丕功維父子繼忠孝豫維寵嘉之是以命汝愈銘欽哉惟時臣愈承命悸恐明日詣東上閣門拜疏辭謝不報退伏念昔者魯僖公能遵其祖伯禽之烈周天子實命其史臣克作為駉駜泮閟之詩使聲干其廟以假魯陵今天子嘉田侯服父訓不違用康靖我國家蓋寵銘之所以休寧田氏之祖考而臣適執筆𨽻太史奉明命其何以辭謹案魏博節度使銀青光祿大夫檢挍工部尚書兼魏州大都督府長史御史大夫沂國公田𢎞正北平盧龍人故為魏博諸將忠孝畏慎田季安卒其子幼弱用故事代父人吏不附迎𢎞正於其家使領軍事𢎞正籍其軍之衆與六州之人還之朝廷悉除河北故事比諸州故得用為帥已而復贈其父故滄洲刺史兵部尚書母夫人鄭氏梁國太夫人得立廟祭三代曽祖都水使者府君祭初室祖安東司馬贈襄州刺史府君祭二室兵部府君祭東室其銘曰唐繼古帝海外受制狎于大寧燕盜以驚羣黨相維河北失平號登元和大聖載營風揮日舒咸順指令嶪嶪魏土嬰兒戲兵吏戎愁毒莫保腰頸人曰田侯其德可倚呌譟奔趨乘門請起田侯攝事奉我天明束縛弓戈考挍度程提壃籍戶來復邦經帝欽良臣曰維錫豫嗟我六州始復古初告慶于宗以降命書旌節有韜豹尾神旗櫜兜戟纛以長魏師田侯稽首臣愚不肖逮茲有成祖考之教帝曰俞哉維汝忠孝豫思乃父追秩夏卿嫓德娠賢梁國是榮田侯作廟相方視址見于蓍龜祖考咸喜暨暨田侯兩有文武訖其外庸可作承輔咨汝田侯勿亟勿遲覲饗式時爾祖爾思栁州羅池廟碑豫覽昌黎碑栁州不書栁州德政之可載載其死而為神一節似狎而少莊羅池廟者故刺史栁侯廟也栁侯為州不鄙夷其民動以禮法三年民各自矜奮兹土雖逺京師吾等亦天氓今天幸惠仁侯若不化服我則非人於是老少相教語莫違侯令凡有所為於其鄉閭及於其家皆曰吾侯聞之得無不可於意否莫不忖度而後從事凡令之期民勸趨之無有後先必以其時於是民業有經公無負租流逋四歸樂生興事宅有新屋步有新船池園潔修豬牛鴨雞肥大蕃息子嚴父詔婦順夫指嫁娶葬送各有條法出相弟長入相慈孝先時民貧以男女相質久不得贖盡沒為𨽻我侯之至按國之故以傭除本悉奪歸之大修孔子廟城郭巷道皆治使端正樹以名木栁民既皆悅喜常與其部將魏忠謝寧歐陽翼飲酒驛亭謂曰吾棄於時而寄於此與若等好也明年吾將死死而為神後三年為廟祀我及期而死三年孟秋辛卯侯降于州之後堂歐陽翼等見而拜之其夕夢翼而告曰館我于羅池其月景辰廟成大祭過客李儀醉酒慢侮堂上得疾扶出廟門即死明年春魏忠歐陽翼使謝寧來京師請書其事于石余謂栁侯生能澤其民死能驚動福禍之以食其土可謂靈也已作迎享送神詩遺栁民俾歌以祀焉而并刻之栁侯河東人諱宗元字子厚賢而有文章嘗位於朝光顯矣已而擯不用其辭曰荔子丹兮蕉黃雜肴蔬兮進侯堂侯之船兮兩旗度中流兮風泊之待侯不來兮不知我悲侯乘駒兮入廟慰我民兮不嚬以笑鵝之山兮栁之水桂樹團團兮白石齒齒侯朝出遊兮暮來歸春與猿吟兮秋鶴與飛北方之人兮為侯是非千秋萬嵗兮侯無我違福我兮壽我驅厲鬼兮山之左下無苦濕兮髙無乾粳稌充羡兮蛇蛟結蟠我民報事兮無怠其始自今兮欽于世世唐故相權國公墓碑直敘中多句字生蹇處銘可誦上之元和六年其相曰權公諱德輿字載之其本出自殷帝武丁武丁之子降封於權權江漢間國也周衰入楚為權氏楚滅徙秦而居天水略陽苻秦之王中國其臣有安丘公翼者有大臣之言後六世至平涼公文誕為唐上庸太守荆州大都督長史焯有聲烈平涼曾孫諱倕贈尚書禮部郎中以藝學與蘇源明相善卒官羽林軍録事參軍於公為王父郎中生贈太子太保諱臯以忠孝致大名去官纍以官徴不起追諡貞孝是實生公公在相位三年其後以吏部尚書授節鎮山南年六十以薨贈尚書左僕射諡文公公生三嵗知變四聲四嵗能為詩七嵗而貞孝公卒來弔哭者見其顔色聲容皆相謂權氏世有其人及長好學孝敬祥順貞元八年以前江西府監察御史徴拜博士朝士以得人相慶改左補闕章奏不絶譏排姦幸與陽城為助轉起居舍人遂知制誥凡撰命詞九年以類集為五十卷天下稱其能十八年以中書舍人典貢士拜尚書禮部侍郎薦士於公者其言可信不以其人布衣不用即不可信雖大官勢人交言一不以綴意奏廣嵗所舉進士明經在得人不以員拘轉户兵三曹侍郎太子賓客復為兵部遷太常卿天下愈推為巨人長德時天子以為宰相宜參用道德人因拜禮部尚書同中書門下平章事公既謝辭不許其所設張舉措必本於寬大以幾教化多所助與維匡調娛不失其正中於和節不為聲章因善與賢不矜主已以吏部尚書留守東都東方諸帥有利病不能自請者公常與疏陳不以露布復拜太常轉刑部尚書考定新舊令式為三十編舉可長用其在山南河南勤于選付治以和簡人以寧便以疾求還十三年某月甲子道薨于洋之白草奏至天子痌傷為之不御朝郎官致贈錫官居野處上下弔哭皆曰善人死矣其年某月日葬河南北山在貞孝東五里公由陪屬升列年除嵗遷以至公宰人皆喜聞若已與有無忌嫉者于頔坐子殺人失位自囚親戚莫敢過門省顧朝莫敢言者公將留守東都為上言曰頔之罪既貰不竟宜因賜寬詔上曰然公為吾行諭之頔以不憂死前後考第進士及庭所䇿試士踵相躡為宰相達官與公相先後其餘布處臺閣外府凡百餘人自始學至疾未病未嘗一日去書不觀公既以能為文辭擅聲於朝多銘卿大夫功德然其為家不視簿書未嘗問有亡費不偫餘公娶清河崔氏女其父造嘗相德宗號為名臣既葬其子監察御史璩纍然服喪來有請乃作銘文曰權在商周世無不存滅楚徙秦贏劉之間甘泉始侯以及安丘詆訶浮屠皇極之扶貞孝之生鳳鳥不至爵位豈多半塗以稅壽考豈多四十而逝惟其不有以惠厥後是生相君為朝德首行世祖之文世師之流連六官出入屏毗無黨無讐舉世莫疵人所憚為公勇為之其所競馳公絶不窺孰克知之德將在斯刻詩墓碑以永厥垂唐荆川曰平敘多用虛説滎陽鄭公神道碑河東節度使贈尚書右僕射鄭公葬在滎陽索上元和八年六月庚子太史尚書比部郎中護軍韓愈刻其墓碑曰司馬氏遷江南有鄭豁者仕慕容垂國為其太子少保其孫簡當拓拔魏為滎陽太守後簡者號其族為南祖南祖之鄭入唐有為利之景谷令者曰嘉範於公為曾祖是生撫俗為泗之徐城令徐城生公之父曰洪卒官涼之户曹參軍公諱儋少依母家隴西李氏舉止異凡兒其舅吏部侍郎季卿謂其必能再立鄭氏稍長能自課學明左氏春秋以進士選為太原參軍事對直言䇿拜京兆髙陵尉考府之進士能第上下以實不姦樊僕射澤以襄陽兵戰淮西公以參謀留府能任後事户曹殯于涼涼地入西戎自景谷徐城三世皆未還滎陽葬公解官舉五喪為三墓葬索東徐城墓無表公能幼長哀感心求不置以得舊人指告其處其後為大理丞太常博士遷起居郎尚書司封吏部二郎中能官舉其名德宗晚節儲將於其軍以公為河東軍司馬能以無心處嫌間卒用有就貞元十六年將説死即詔授司馬節節度河東軍除其官為工部尚書太原尹兼御史大夫北都留守公之為司馬用寬廉平正得吏士心及升大帥持是道不變部將有因貴人求要職者公不用用老而有功無勢而逺者削四鄰之交賄省姱嬉之大燕挍講民事施罷不俟日用能以十月成政氓征就寬軍給以饒十七年疾廢朝夕八月庚戌薨享年六十一天子為之不能臨朝者三日贈尚書右僕射即以其年十月辛卯葬索上疾比薨醫問交道比葬弔贈賜使者相及凡河東軍之士與太原之氓吏及旁九郡百邑之鰥寡外夷狄之統於府者聞公之薨皆哭曰吾其如何公與賓客朋逰飲酒必極醉投壺博奕窮日夜若樂而不厭者平居簾閣據几終日不知有人别自號白雲翁名人魁士鮮不與善好樂後進及門接引皆有恩意始娶范陽盧氏女生仁本仁約仁載皆有文行二季舉進士皆早死仁本為後子獨存不樂舉選年三十餘始佐河陽軍後娶趙郡李氏生三女二夫人凡三男五女長女嫁遼東李繁繁亦名臣子有才學遺命二夫人各别為墓不合葬系曰士常患勢卑不能推功德及人常患貧無以奉所欲得若鄭公者勤一生以得其位而曾不得須臾有焉雖然觀其所既立其可知已嗚呼哀哉太原王公神道碑銘王氏皆王者之後在太原者為姬姓春秋時王子成父敗狄有功因賜氏厥後世居太原至東漢隱士烈博士徴不就居祁縣因號所居鄉為君子公其君子鄉人也魏晉涉隋世有名人國朝大王父玄暕厯御史屬三院止尚書郎生景肅守三郡終傅涼王生政襄鄧等州防禦使鄂州採訪使贈吏部尚書公尚書之第某子公諱仲舒字𢎞中少孤奉母夫人家江南讀書著文其譽藹鬱當時名公皆折官位輩行願為交貞元初射䇿拜左拾遺與陽城合遏裴延齡不得為相德宗初怏怏無奈久而嘉之其後入閣德宗顧列謂宰相曰第幾人必王某也果然月餘特改右補闕遷禮部考功吏部三員外郎在禮部奏議詳雅省中伏其能在考功吏部提約明故吏無以欺同列有恃恩自得者衆皆媚承公嫉其為人不直視由此貶連州司户移夔州司馬又移荆南因佐其節度事為參謀得五品服放迹在外積四年元和初收拾俊賢徴拜吏部員外郎未幾為職方郎中知制誥友人得罪斥逐後其家親知過門縮頸不敢視公獨省問為計度論議直其寃由是出為峽州刺史轉廬州未至丁母夫人憂服除又為婺州時疫旱甚人死亡且盡公至多方救活天遂雨疫定比數年里閭完復制使出巡人填道迎顯公德事具聞就加金紫轉蘇州變其屋居以絶火延隄松江路害絶阻滯秋夏賦調自為書與人以期吏無及門而集政成為天下守之最天子曰王某之文可思最宜為誥有古風豈可久以吏事役之復拜中書舍人既至京師儕流無在者視同列皆邈然少年益自悲而謂人曰豈可復治筆硯於其間哉上若未棄臣宜用所長在外久周知俗之利病俾治之當不自愧宰相以聞遂得觀察江南西道奏罷榷酤錢九千萬軍息之無已掌吏壞産猶不釋囚之公至脫械不問人遭水旱賦窘公曰我且減燕樂絶他用錢可足乎遂以代之罷軍之息錢禁浮屠誰誘壞其舍以葺公宇三年法大成錢餘於庫粟餘於廩人享于田廬謳謡於道途天子復思且徴以代虛吏部左丞位以待之長慶三年十一月十七日薨於洪州年六十二上哀慟輟朝贈左散騎常侍某日歸葬於某處某既以公之德刻而藏之墓矣子初又請以詩揭之詞曰生人之治本乎斯文有事其末而忘其源切近昧陋道由是堙有志其本而泥古陳當用而迂乖戾不伸較是二者其過也均有美王公志儒之本達士之經秩秩而積涵涵而停韡為華英不矜不盈孰播其馨孰發其明介然而居士友以傾敷文帝階擢列侍從以忠逺名有直有諷辨遏堅墾巨邪不用秀出班行乃動帝目帝省竭心恩顧日渥翔于郎署騫于禁密發帝之令簡古而蔚不比于權以直友寃敲撼挫揠竟遭斥奔久淹于外厯守大藩所至極思必悉利病萎枯以膏燠暍以醒坦之敞之必絶其徑浚之澄之使安其泳帝思其文復命掌誥公潛謂人此職宜少豈無凋郡庸以自效上藉其實俾統於洪逋滯攸除姦訛革風袪蔽於目釋負于躬方乎所部禁絶浮屠風雨順易粳稻盈疇人得其所乃恬乃謳化成有代思以息勞虛位而俟奄忽滔滔維德維績志于斯石日逺彌髙贈太尉許國公神道碑銘此篇大略類傳而中多險棘句韓姬姓以國氏其先有自潁川徙陽夏者其地於今為陳之太康太康之韓其稱蓋久然自公始大著公諱𢎞公之父曰海為人魁偉沈塞以武勇遊仕許汴之間寡言自可不與人交衆推以為巨人長者官至遊擊將軍贈太師娶鄉邑劉氏女生公是為齊國太夫人夫人之兄曰司徒玄佐有功建中貞元之間為宣武軍帥有汴宋亳潁四州之地兵士十萬人公少依舅氏讀書習騎射事親孝謹侃侃自將不縱為子弟華靡遨放事出入敬恭軍中皆目之嘗一扺京師就明經試退曰此不足發名成業復去從舅氏學將兵數百人悉識其材鄙怯勇指付必堪其事司徒歎奇之士卒屬心諸老將自以為不及司徒卒去為宋南城將比六七嵗汴軍連亂不定貞元十五年劉逸淮死軍中皆曰此軍司徒所樹必擇其骨肉為士卒所慕賴者付之今見在人莫如韓甥且其功最大而材又俊即柄授之而請命於天子天子以為然遂自大理評事拜工部尚書代逸淮為宣武軍節度使悉有其舅司徒之兵與地衆果大悅便之當此時陳許帥曲環死而吳少誠反自將圍許求援於逸淮啖之以陳歸汴使數輩在館公悉驅出斬之選卒三千人會諸軍擊少誠許下少誠失勢以走河南無事公曰自吾舅歿五亂於汴者吾苗媷而髮櫛之幾盡然不一揃刈不足令震駴命劉鍔以其卒三百人待命于門數之以數與於亂自以為功并斬之以徇血流波道自是訖公之朝京師草有一年莫敢有歡呶呌號于城郭者李師古作言起事屯兵于曹以嚇滑帥且告假道公使謂曰汝能越吾界而為盜邪有以相待無為空言滑帥告急公使謂曰吾在此公無恐或告曰翦棘夷道兵且至矣請備之公曰兵來不除道也不為應師古詐窮變索遷延旋軍少誠以牛皮鞋材遺師古師古以鹽資少誠潛過公界覺皆留輸之庫曰此於法不得以私相餽田𢎞正之開魏博李師道使來告曰我代與田氏約相保援今𢎞正非其族又首變兩河事亦公之所惡我將與成德合軍討之敢告公謂其使曰我不知利害知奉詔行事耳若兵北過河我即東兵以取曹師道懼不敢動𢎞正以濟誅吳元濟也命公都統諸軍曰無自行以遏北寇公請使子公武以兵萬三千人會討蔡下歸財與糧以濟諸軍卒擒蔡姦於是以公為侍中而以公武為鄜坊丹延節度使師道之誅公以兵東下進圍考城克之遂進迫曹曹寇乞降鄆部既平公曰吾無事於此其朝京師天子曰大臣不可以暑行其秋之待公曰君為仁臣為恭可矣遂行既至獻馬三千匹絹五十萬匹他錦紈綺纈又三萬金銀器千而汴之庫廄錢以貫數者尚餘百萬絹亦合百餘萬匹馬七千糧三百萬斛兵械多至不可數初公有汴承五亂之後掠賞之餘且斂且給恆無宿儲至是公私充塞至於露積不垣册拜司徒兼中書令進見上殿拜跪給扶贊元經體不治細微天子敬之元和十五年今天子即位公為冡宰又除河中節度使在鎮三年以疾乞歸復拜司徒中書令病不能朝以長慶二年十二月三日薨于永崇里第年五十八天子為之罷朝三日贈太尉賜布粟其葬物有司官給之京兆尹監護明年七月某日葬於萬年縣少陵原京城東南三十里楚國夫人翟氏祔子男二人長曰肅元某官次曰公武某官肅元早死公之將薨公武暴病先卒公哀傷之月餘遂薨無子以公武子孫紹宗為主後汴之南則蔡北則鄆二寇患公居間為已不利卑身佞辭求與公好薦女請昏使日月至既不可得則飛謀釣謗以間染我公先事候情壞其機牙姦不得發王誅以成最功定次孰與髙下公子公武與公一時俱授弓鉞處藩為將疆土相望公武以母憂去鎮公母弟充自金吾代將渭北公以司徒中書令治蒲于時弟充自鄭滑節度平宣武之亂以司空居汴自唐以來莫與為比公之為治嚴不為煩止除害本不多教條與人必信吏得其職賦入無所漏失人安樂之在所以富公與人有畛域不為戲狎人得一笑語重於金帛之賜其罪殺人不發聲色問法何如不自為輕重故無敢犯者其銘曰在貞元世汴兵五猘將得其人衆乃一愒其人為誰韓姓許公磔其梟狼養以雨風桑榖奮張厥壤大豐貞元元孫命正我宇公為臣宗處得地所河流兩壖盜連為羣雄唱雌和首尾一身公居其間為帝督姦察其嚬呻與其睨眴左顧失視右顧而跽蔡先鄆鉏三年而墟稿乾四呼終莫敢濡常山幽都孰陪孰扶天施不留其討不逋許公預焉其賚何如悠悠四方既廣既長無有外事朝廷之治許公來朝車馬干戈相乎將乎威儀之多將則是已相則三公釋師十萬歸居廟堂上之宅憂公讓太宰養安蒲坂萬邦絶等有弟有子提兵守藩一時三侯人莫敢扳生莫與榮歿莫與令刻文此碑以鴻厥慶唐故中散大夫少府監胡良公墓神道碑通篇述書少府監胡公者諱珦字潤博年七十九以官卒明年八月十四日葬京兆奉先夫人天水趙氏祔焉其子逞乃巡遇述遷造與公壻廣文博士吳郡張籍以公之族出行治厯官壽年為書使人自京師南走八千里至閩南兩越之界上請為公銘刻之墓碑於潮州刺史韓愈曰胡姓本出安定後徙清河於今為宗城屬貝州大父諱秀武后時以文材徴為麟臺正字父宰臣用進士卒官平陽冀氏令贈潭州大都督公早孤能自勸學立節槩非其身力不以衣食凡一試進士二即吏部選皆以文章占上第樂為儉勤自刻削不干人以矯時弊及為富平尉一府稱其斷決建中四年侍郎趙贊為度支使薦公為監察御史主餽給渭橋以東軍洗手奉職不以一錢假人賊平有司考别羣吏多坐貶死獨公以清苦能檢飭無漏失遷河南倉曹魏公賈耽以節鎮鄭滑以公佐觀察事檢校尚書工部員外郎以剛直齟齬不阿忤權貴除獻陵令居陵下七年市置田宅務種樹為業以自給教授子弟貞元十一年吏部大選以公考選人藝學以勞遷奉先令以治辦遷尚書膳部郎中改坊州刺史州經亂無孔子廟公至則命築宫造祭器率博士生講讀以時如法以祠人吏聚觀歎息遷舒州刺史州嵗大熟麥一莖數穗閭里歌舞之考功以聞遷尚書駕部郎中數以事犯尚書李巽巽時主鹽鐵事富驕恃勢以語丞相由是退公為鳳翔少尹巽死遷少大理改少詹事元和十二年朝廷以公年老能自祗力事職不懈可嘉拜少府監兼知內中尚明年以病卒公始以進士孤身旅長安致官九卿為大家七子皆有學守女嫁名人年幾八十堅悍不衰事可傳載可謂成德銘曰朅朅胡公既果以方挾藝射科每發如望人求於人我已為之自始訖終不降色辭因官立事隨有可載發迹餽軍遭讒府介去居陵下為吏為隱坊舒之政于兹有靳守官駕部名升已屈躋于少府甚宜秩物不配其有君子恥之少府古卿公優止之刻文碑石以顯公行維公後人無怠嗣慶唐宋八大家文鈔卷十二
