body:
  text: 唐宋八大家文鈔卷二十八明茅坤撰柳州文鈔十二墓版碣誄表狀祭文故叔父殿中侍御史府君墓版文敘事處整則敘情處悲弔栁氏之先自黃帝及周魯其著者無駭以字為展氏禽以食采為栁姓厥後昌大世家河東嗚呼公諱某字某曾王父朝請大夫徐州長史諱子夏遺貞白之操表儀宗門王父朝請大夫滄州清池令諱從裕垂博裕之道啓佑後胤皇考湖州德清令諱察躬𢎞孝悌之德振揚家聲惟公端莊無諂徽柔有裕峻而能容介而能羣其在閨門也動合大和皆由順正愷悌雍睦莫有間言故宗黨歌之其在公門也釋回措枉造次秉直事不失當舉無秕政故官府誦之用沖退徑盡之志以𢎞正友道信稱於外焉用柔和博愛之道以視遇孤弱仁著於內焉此公修己之大經也自進士登高第調授河南府文學秩滿渭北節度使論惟明辟為從事受太常寺協律郎元戎即世罷職家食無何朔方節度使張獻甫辟署參謀受大理評事賜緋魚袋改度支判官轉大理司直遷殿中侍御史加度支營田副使此公從政之大略也既佐從事實司中府匪頒有制會計明白嗚呼分閫委政繄公而成務朝右虛位待公而周事宗門期公而光大姻黨仰公而振耀貞元十二年嵗在丙子正月九日壬寅遇暴疾終於私館享年五十痛矣夫人吳郡陸氏洎仲弟綜季弟續冡姪某等抱孤即位牽率備禮祇奉裳帷歸於京師以某年二月二十八日庚寅安厝於萬年縣之少陵原禮也公有男一人始六年矣在髫知孝呱呱涕洟凡我宗戚撫視增慟嗚呼哀哉初公元兄以純深之行端直之德名聞於天下官至侍御史持斧登朝憲章肅清常以先公之神未克遷祔不正席不甘味及撰日定期而昊天不弔志奪禮廢公實敬承遺志行有日矣而閔凶薦及不克終事則我宗族之痛恨其有既乎惟公盡敬於孝養致毁於居憂表正宗姓觀示他族故宗人咸曰孝如方輿公修詞以藻德振文而導志以為理化之始莫尊乎堯作堯祠頌以為述德之道不忘於祖作始祖碑以為紀廣大之志敘正直之節不嫌於親作元兄侍御史府君墓志其餘諷咏比興皆合於古故宗人咸曰文如吳興守當官貞固確乎不拔持議端方直而不苛故宗人咸曰正如衛太史率性廉介懷貞抱潔嗣家風之清白紹遺訓於儒素故宗人咸曰清如魯士師兼備四德具體而微公之謂矣小子常以無兄弟移其睦於朋友少孤移其孝於叔父天將窮我而奪其志故罔極之痛仍集焉朴魯甚騃不能文字敢用書宗人之辭以致其直故質而俚輟哭紀事哀不能文故序而終焉國子司業陽城遺愛碣情文經緯四年五月皇帝以銀印赤紱即隱所起陽公為諫議大夫後七年廷諍懇至纍日不解帝尤嘉異遷為國子司業旌直優賢道光師儒又四年九月巳巳出拜道州刺史太學生魯郡季償廬江何蕃等百六十人投業奔走稽首闕下呌閽籲天願乞復舊朝廷重更其事如巳巳詔翼日會徒北嚮如初行至延喜門公使追奪其章遮道願罷遂不果獻生徒嗷嗷顧盻徘徊昔公之來仁風扇揚暴慠革靣柔軟有立聽聞喜言樂甚鐘鼓瞻仰德宇高逾嵩岱及公當職施政示人凖程良士勇善偽夫去飾惰者益勤誕者益恭沉酗腆酒斥逐郊遂違親三嵗罷退鄉黨令未及下乞歸就養者二十餘人禮順克彰孝悌以興則又講貫經籍俾逹奧義簡習孝秀俾極儒業冠屨裳衣由公而嚴進退揖讓由公而儀公征甚遐吾黨誰師遂相與咨度署吏布告諸儒願立貞珉侔高狀明乃訪於學古之士紀公名字垂憲於後公名城字亢宗家於北平隱於條山惟公端粹沖和高嶷懿醇道德仁明孝愛友悌薰襲里閈布聞天下守節貞固患難不能遷其心怡性坦厚榮位不足動其神為司諫義震於周行為司業愛加於生徒宜乎立石俾後是憲其辭曰惟兹陽公履道葆醇爰初隱聲覆簣基仁德充而形乃作諫臣抗志勵義直道是陳帝求師儒二我成均開朗蒙滯宣明德教太和濳布玄機密照羣生聞禮後學知孝進退作則動言是效匪公之軌人用奚蹈粗厲貪凌待公順之欺偽譎詐待公信之少年申申咸適其宜檟楚廢弛尊嚴而威公褒其良俾升於堂癯者既肥榮如衮衣公棄不用懲咎內訟既訟於內猶公之誨匪仁孰親匪德孰尊今公于征孰表儒門生徒上言稽首帝閽謂天蓋高曾莫我聞青襟涕濡填街盈衢逺送於南望慕踟蹰立石書德用揚懿則嗚呼斯文遺愛罔極亡友故祕書省校書郎獨孤君墓碣别調嗚呼有唐仁人獨孤君之墓祔於其父太子舍人諱助之墓之後自其祖贈太子少保諱問俗而上其墓皆在灞水之左今王父營陵於其側故再世在此嗚呼獨孤君之道和而純其用端而明內之為孝外之為仁默而智言而信其窮也不憂其樂也不淫讀書推孔子之道必求諸其中其為文深而厚尤慕古雅善賦頌其要咸歸於道昔孔子之世有顔回者能得於孔子後之仰其賢者譬之如日月而莫有議者焉嗚呼獨孤君之明且仁如遭孔子是有兩顔氏也今之世有知其然乎知之者其信於天下乎使夫人也夭而不嗣世之惑者猶曰尚有天道噫乎甚邪君諱申叔字子重年二十二舉進士又二年用博學宏詞為挍書郎又三年居父喪未練而沒蓋貞元十八年四月五日也是年七月十日而葬鄉曰某鄉原曰某原嗚呼君短命行道之日未久故其道信於其友而未信於天下今記其知君者於墓韓泰安平南陽人李行諶元固其弟行敏中明趙郡贊皇人柳宗元河東解人崔廣略清河人韓愈退之昌黎人王涯廣津太原人吕溫和叔東平人崔羣敦詩清河人劉禹錫夢得中山人李景儉致用隴西人嚴休復玄錫馮翊人韋詞致用京兆杜陵人子厚之志文所取者甚少蓋以子厚為御史及禮部員外時所作大都未免為唐以來四六綺麗之遺而謫永州司馬以後則文近於西漢矣故其所為遊山記與士大夫書并他雜著皆與韓昌黎相頡頏者也姪輩讀書當深思而識之故御史周君碣調不入史漢而氣韻亦徑有唐貞臣汝南周氏諱某字某以諫死葬於某貞元十一年栁宗元立碣於其墓左在天寶年有以諂諛至相位賢臣放退公為御史抗言以白其事得死於墀下史臣書之公死而佞者始畏公議於呼古之不得其死者多矣若公之死志匡王國氣震姦佞動獲其所斯蓋得其死者歟公之德之才洽於傳聞卒以不試而獨申其節猶能奮百代之上以為世軌第令生於定哀之間則孔子不曰未見剛者出於秦楚之後則漢祖不曰安得猛士而存不及興王之用沒不遭聖人之歎誠立志者之所悼也故為之銘銘曰忠為美道是履諫而死佞者止史之志石以紀為臣軌兮衡州刺史東平吕君誄魏晉以下誄並藻麗子厚自為機杼亦有可觀維唐元和六年八月日衡州刺史東平吕君卒爰用十月二十四日藁葬於江陵之野嗚呼君有智勇孝仁惟其能可用康天下惟其志可用經百世不克而死世亦無由知焉君由道州以陟為衡州君之卒二州之人哭者逾月湖南重社鄉飲酒是月上戊不酒去樂會哭於神所而歸余居永州在二州中間其哀聲交於北南舟船之下上必呱呱然蓋嘗聞於古而觀於今也君之志與能不施於生人知之者又不過十人世徒讀君之文章歌君之理行不知二者之於君其末也嗚呼君之文章宜傳於百世今其存者非君之極言也獨其詞耳君之理行宜及於天下今其聞者非君之盡力也獨其迹耳萬不試而一出焉猶為當世甚重若使幸得出其什二三則巍然為偉人與世無窮其可涯也君所居官為第三品宜得諡於太常余懼州吏之逸其辭也私為之誄以志其行其詞曰麟死魯郊其靈不施濯濯夫子故潔其儀冠仁服義干櫓書詩忠貞繼佩智勇承綦跨騰商周堯舜是師道不勝禍天固余欺鬼神齊怒妖孽咸疑何付之德而奪其時嗚呼哀哉命姓惟吕勤唐以力輔寧萬邦受胙爾國維師元聖周以降德世征五侯伊祖之則嗣濟厥武前書是式至於化光爰耀其特春秋之元儒者咸惑君逹其道卓焉孔直聖人有心由我而得敷施變化動無不克推理惟公舒文以翼宣於事業與古同極道不茍用資仕乃揚進於禮司奮藻含章決科聨中休問用張署讎百氏錯綜逾光超都諫列屢皂其囊帝殊爾能人服其智戎悔厥禍欵邊求侍盛選邦良難乎始使君登御史贊命承事風動海壖皇威以致來總征賦甲兹郎吏制用經邦時推重器諸臣之復周官匪易漢課箋奏鮮云能備君自他曹載出其技筆削自任羣儒革議正郎司刑邦憲為二糾逖伊肅諂諛具畏遷理於道民服休嘉恩疏若昵惕邇如遐實閉其閣而撫於家載其愈樂申以舞歌賦無吏迫威不刑加浩然順風從令無譁絲蠶外邑我繭盈車雜耕鄰邦我黍之華既字其畜亦藝其麻鼛鼓斯屏人喜其多始富中教興良廢邪考績既成王用興嗟陟於嶽濱言進其律號呼南竭謳謠北溢欺吏悍民先聲如失逋租匿役歸誠自出兼并既息罷羸乃逸惟昔舉善盜奔於鄰今我興仁化為齊人惟昔富人或賑之粟今我厚生不竭而足邦思其弼人戴惟父善胡召災仁胡罹咎俾民伊祜而君不夀矯矯貪陵乃康乃茂嗚呼哀哉廪不餘食藏無積帛內厚族姻外賙賓客恆是懸磬逮兹易簀僮無凶服葬非舊陌嗚呼哀哉君昔與余講德討儒時中之奧希聖為徒志存致君笑詠唐虞揭兹日月以耀羣愚疑生所怪怒起特殊齒舌嗷嗷雷動風驅良辰不偶卒與禍俱直道莫試嘉言罔敷佐王之器窮以郡符秩在三品宜諡王都諸生羣吏尚擁良圖故友咨懷纍行陳謨是旌是告永永不渝嗚呼哀哉唐故給事中皇太子侍讀陸文通先生墓表孔子作春秋千五百年以名為傳者五家今用其三焉秉觚牘焦思慮以為論注疏説者百千人矣攻訐狠怒以辭氣相擊排冒沒者其為書處則充棟宇出則汗牛馬或合而隱或乖而顯後之學者窮老盡氣左視右顧莫得而本則專其所學以訾其所異黨枯竹護朽骨以至於父子傷夷君臣詆悖者前世多有之甚矣聖人之難知也有吳郡人陸先生質以其師友天水啖助洎趙匡能知聖人之旨故春秋之言及是而光明使庸人小童皆可積學以入聖人之道傳聖人之教是其德豈不侈大矣哉先生字某既讀書得制作之本而獲其師友於是合古今散同異聯之以言纍之以文蓋講道者二十年書而志之者又十餘年其事大備為春秋集注十篇辨疑七篇微指二篇明章大中發露公器其道以聖人為主以堯舜為的苞羅旁魄膠轕下上而不出於正其法以文武為首以周公為翼揖讓升降好惡喜怒而不過乎物既成以授世之聰明之士使陳而明之故其書出焉而先生為巨儒用是為天子爭臣尚書郎國子博士給事中皇太子侍讀皆得其道刺二州守人知仁永貞年侍東宫言其所學為古君臣圖以獻而道達乎上是嵗嗣天子踐祚而理尊優師儒先生以疾聞臨問加禮某月日終於京師某月日葬於某郡某里嗚呼先生道之存也以書不及施於政道之行也以言不及覩其理門人世儒是以增慟將葬以先生為能文聖人之書通於後世遂相與諡曰文通先生後若干祀有學其書者過其墓哀其道之所由乃作石以表碣假太尉逸事狀鑱刻情事太尉始為涇州刺史時汾陽王以副元帥居蒲王子晞為尚書領行營節度使寓軍邠州縱士卒無賴邠人偷嗜暴惡者卒以貨竄名軍伍中則肆志吏不得問日羣行丐取於市不嗛輒奮擊折人手足椎釡鬲甕盎盈道上把臂徐去至撞殺孕婦人邠寧節度使白孝德以王故戚不敢言太尉自州以狀白府願計事至則曰天子以生人分公理公見人被暴害因恬然且大亂若何孝德曰願奉教太尉曰某為涇州甚適少事今不忍人無寇暴死以亂天子邊事公誠以都虞候命某者能為公已亂使公之人不得害孝德曰幸甚如太尉請既署一月晞軍士十七人入市取酒又以刃刺酒翁壞釀器酒留溝中太尉列卒取十七人皆斷頭注槊上植市門外晞一營大譟盡甲孝德震恐召太尉曰將奈何太尉曰無傷也請辭於軍孝德使數十人從太尉太尉盡辭去解佩刃選老躄者一人持馬至晞門下甲者出太尉笑且入曰殺一老卒何甲也吾戴吾頭來矣甲者愕因諭曰尚書固負若屬耶副元帥固負若屬耶奈何欲以亂敗郭氏為白尚書出聽我言晞出見太尉太尉曰副元帥勳塞天地當務為始終今尚書恣卒為暴暴且亂亂天子邊欲誰歸罪罪且及副元帥今邠人惡子弟以貨竄名軍籍中殺害人如是不止幾日不大亂大亂由尚書出人皆曰尚書倚副元帥不戢士然則郭氏功名其與存者幾何言未畢晞再拜曰公幸教晞以道恩甚大願奉軍以從顧叱左右曰皆解甲散還火伍中敢譁者死太尉曰吾未晡食請假設草具既食曰吾疾作願留宿門下命持馬者去旦日來遂臥軍中晞不解衣戒候卒擊柝衛太尉且俱至孝德所謝不能請改過邠州由是無禍先是太尉在涇州為營田官涇大將焦令諶取人田自占數十頃給與農曰且熟歸我半是嵗大旱野無草農以告諶諶曰我知入數而已不知旱也督責益急且飢死無以償即告太尉太尉判狀辭甚巽使人求諭諶諶盛怒召農者曰吾畏假某耶何敢言我取判鋪背上以大杖擊二十垂死輿來庭中太尉大泣曰乃我困汝即自取水洗去血裂裳衣瘡手注善藥旦夕自哺農者然後食取騎馬賣市榖代償使勿知淮西寓軍帥尹少榮剛直士也入見諶大罵曰汝誠人耶涇州野如赭人且飢死而必得榖又用大杖擊無罪者假公仁信大人也而汝不知敬今假公唯一馬賤賣市榖入汝汝又取不耻凡為人傲天災犯大人擊無罪者又取仁者榖使主人出無馬汝將何以視天地尚不愧奴𨽻耶諶雖暴抗然聞言則大愧流汗不能食曰吾終不可以見假公一夕自恨死及太尉自涇州以司農徵戒其族過岐朱泚幸致貨幣愼勿納及過泚固致大綾三百匹太尉壻韋晤堅拒不得命至都太尉怒曰果不用吾言晤謝曰處賤無以拒也太尉曰然終不可以在吾第以如司農治事堂棲之梁木上泚反太尉終吏以告泚泚取視其故封識具存今之稱太尉大節者出入以為武人一時奮不慮死以取名天下不知太尉之所立如是宗元嘗出入岐周邠斄間過真定北上馬嶺歷亭鄣堡戍竊好問老挍退卒能言其事太尉為人姁姁常低首拱手行步言氣卑弱未嘗以色待物人視之儒者也遇不可必達其志決非偶然者會州刺史崔公來言信行直備得太尉遺事覆校無疑或恐尚逸墜未集太史氏敢以狀私於執事祭吕衡州溫文維年月日友人守永州司馬員外置同正員柳宗元謹遣書吏同曹家人襄兒奉清酌庶羞之奠敬祭於吕八兄化光之靈嗚呼天乎君子何厲天實仇之生人何罪天實讎之聰明正直行為君子天則必速其死道德仁義志存生人天則必夭其身吾固知蒼蒼之無信莫莫之無神今於化光之殁怨逾深而毒逾甚故復呼天以云云天乎痛哉堯舜之道至大以簡仲尼之文至幽以默千載紛爭或失或得倬乎吾兄獨取其直貫於化始與道咸極推而下之法度不忒旁而肆之中和允塞道大藝備斯為全德而官止刺一州年不逾四十佐王之志沒而不立豈非修正直以召災好仁義以速咎者耶宗元幼雖好學晚未聞道洎乎獲友君子乃知適於中庸削去邪雜顯陳直正而為道不謬兄實使然嗚呼積乎中不必施於外裕乎古不必諧於今二事相勘從古至少至於化光最為大甚理行第一尚非所長文章過人略而不有夙志所蓄巍然可知貪愚皆貴險狠皆老則化光之夭厄反不榮歟所慟者志不得行功不得施蚩蚩之民不被化光之德庸庸之俗不知化光之心斯言一出內若焚裂海內甚廣知音幾人自友朋雕喪志業殆絶唯望化光伸其宏略震耀昌大興行於時使斯人徒知我所立今復往矣吾道息矣雖其存者志亦死矣臨江大哭萬事已矣窮天之英貫古之識一朝去此終復何適嗚呼化光今復何為乎止乎行乎昧乎明乎豈蕩而為太空與化無窮乎將結而為光耀以助臨照乎豈為雨為露以澤下土乎將為雷為霆以泄怨怒乎豈為鳳為麟為景星為卿雲以寓其神乎將為金為錫為圭為璧以栖其魄乎豈復為賢人以續其志乎將奮為明神以遂其義乎不然是昭昭者其得已乎其不得已乎抑有知乎其無知乎彼且有知其可使吾知之乎幽明茫然一慟腸絶嗚呼化光庶或聽之又祭崔簡神柩歸上都文讀之輒涕洟已嘻乎崔公之柩嘻乎崔公楚之南其土不可以室或坌而頽或確而崒隂流泄漏瀐沒渝溢碩鼠大蟻傍穿側出虧疏脆薄久乃自窒不如君之鄉式堅且密嘻乎崔公楚之南其鬼不可與友躁戾佻險睒眒欺茍脞賤暗􅘈輕嚚妄走不思已類好是羣醜不如君之鄉式和且偶日月甚良子姓甚勤具是舟舉寧君之神去爾夷方返爾故鄰奕奕其歸宜樂且欣君死而還我生而留逺矣殊世曷從之逰酹觴於座與涕俱流唐宋八大家文鈔卷二十八
