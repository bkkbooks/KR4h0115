body:
  text: 唐宋八大家文鈔卷六十九明茅坤撰廬陵史鈔九死節傳覽歐陽公所次死節傳王彦章裴約及劉仁瞻尤為嗚咽或欲泣下葢三人者天之間氣所生非五代兵戈晦冥之際所能沒者而歐陽公㸃綴情事當為千古絶調即如史記漢書恐多不逮語曰世亂識忠臣誠哉五代之際不可以為無人吾得全節之士三人焉作死節傳王彦章字子明鄆州夀昌人也少為軍卒事梁太祖為開封府押衙左親從指揮使行營先鋒馬軍使末帝即位遷濮州刺史又徙澶州刺史彦章為人驍勇有力能跣足履棘行百步持一鐵鎗騎而馳突奮疾如飛而他人莫能舉也軍中號王鐵鎗梁晉爭天下為勍敵獨彦章心常輕晉王謂人曰亞次鬬雞小兒耳何足懼哉梁分魏相六州為兩鎮懼魏軍不從遣彦章將五百騎入魏屯金波亭以虞變魏軍果亂夜攻彦章彦章南走魏人降晉晉軍攻破澶州虜彦章妻子歸之太原賜以第宅供給甚備間遣使者招彦章彦章斬其使者以自絶然晉人畏彦章之在梁也必欲招致之待其妻子愈厚自梁失魏博與晉夾河而軍彦章常為先鋒遷汝鄭二州防禦使匡國軍節度使北面行營副招討使又徙宣義軍節度使是時晉已盡有河北以鐵鎖㫁徳勝口築河南北為兩城號夾寨而梁末帝昬亂小人趙巖張漢傑等用事大臣宿將多被讒間彦章雖為招討副使而謀不見用龍徳三年夏晉取鄆州梁人大恐宰相敬翔顧事急以繩内靴中入見末帝泣曰先帝取天下不以臣為不肖所謀無不用今彊敵未滅陛下棄忽臣言臣身不用不如死乃引繩將自經末帝使人止之問所欲言翔曰事急矣非彦章不可末帝乃召彦章為招討使以段凝為副末帝問破敵之期彦章對曰三日左右皆失笑彦章受命而出馳兩日至滑州置酒大㑹隂遣人具舟於楊村命甲士六百皆持巨斧載冶者具韝炭乗流而下彦章㑹飲酒半佯起更衣引精兵數千沿河以趨徳勝舟兵舉鎖燒斷之因以巨斧斬浮橋而彦章引兵急擊南城浮橋斷南城遂破盖三日矣是時莊宗在魏以朱守殷守夾寨聞彦章為招討使驚曰彦章驍勇吾嘗避其鋒非守殷敵也然彦章兵少利於速戰必急攻我南城即馳騎救之行二十里而得夾寨報者曰彦章兵已至比至而南城破矣莊宗徹北城為栰下楊劉與彦章俱浮于河各行一岸每舟栰相及輒戰一日數十接彦章至楊劉攻之幾下晉人築壘博州東岸彦章引兵攻之不克還擊楊劉戰敗是時段凝已有異志與趙巖張漢傑交通彦章素剛憤梁日削而嫉巖等所為嘗謂人曰俟吾破賊還誅姦臣以謝天下巖等聞之懼與凝叶力傾之其破南城也彦章與凝各為㨗書以聞凝遣人告巖等匿彦章書而上已書末帝初疑其事已而使者至軍獨賜勞凝而不及彦章軍士皆失色及楊劉之敗也凝乃上書言彦章使酒輕敵而至於敗趙巖等從中日夜毁之乃罷彦章以凝為招討使彦章馳至京師入見以笏畫地自陳勝敗之迹巖等諷有司劾彦章不恭勒還第唐兵攻兖州末帝召彦章使守捉東路是時梁之勝兵皆屬段凝京師秪有保鑾五百騎皆新募之兵不可用乃以屬彦章而以張漢傑監之彦章至遞坊以兵少戰敗退保中都又敗與其牙兵百餘騎死戰唐將夏魯竒素與彦章善識其語音曰王鐵鎗也舉矟刺之彦章傷重馬踣被擒莊宗見之曰爾常以孺子待我今日服乎又曰爾善戰者何不守兖州而守中都中都無壁壘何以自固彦章對曰大事已去非人力可為莊宗惻然賜藥以封其創彦章武人不知書常為俚語謂人曰豹死留皮人死留名其於忠義盖天性也莊宗愛其驍勇欲全活之使人慰諭彦章彦章謝曰臣與陛下血戰十餘年今兵敗力窮不死何待且臣受梁恩非死不能報豈有朝事梁而暮事晉生何面目見天下之人乎莊宗又遣明宗往諭之彦章病創卧不能起仰顧明宗呼其小字曰汝非邈佶烈乎我豈苟活者遂見殺年六十一晉髙祖時追贈彦章太師與彦章同時有裴約者潞州之牙將也莊宗以李嗣昭為昭義軍節度使約以裨將守澤州嗣昭卒其子繼韜以澤潞叛降于梁約召其州人泣而諭曰吾事故使二十餘年見其分財饗士欲報梁仇不幸早世今郎君父喪未𦵏違背君親吾能死于此不能從以歸梁也衆皆感泣梁遣董璋率兵圍之約與州人拒守求救於莊宗是時莊宗方與梁人戰河上而已建大號聞繼韜叛降梁頗有憂色及聞約獨不叛喜曰吾於繼韜何薄於約何厚而約能分逆順耶顧符存審曰吾不惜澤州與梁一州易得約難得也爾識機便為我取約來存審以五千騎馳至遼州而梁兵已破澤州約見殺至周世宗時又有劉仁贍者焉仁贍字守惠彭城人也父金事楊行密為濠滁二州刺史以驍勇知名仁贍為將輕財重士法令嚴肅少略通兵書事南唐為左監門衛將軍黄袁二州刺史所至稱治李景使掌親軍以為武昌軍節度使周師征淮先遣李榖攻自壽春景遣將劉彦貞拒周兵以仁贍為清淮軍節度使鎮壽州李榖退守正陽浮橋彦貞見周兵之却意其怯急追之仁贍以為不可彦貞不聽仁贍獨按兵城守彦貞果敗於正陽世宗攻壽州圍之數重以方舟載礮自淝河中流擊其城又束巨竹數十萬竿上施版屋號為竹龍載甲士以攻之又決其水砦入于淝河攻之百端自正月至于四月不能下而嵗大暑霖雨彌旬周兵營寨水深數尺淮淝暴漲礮舟竹龍皆飃南岸為景兵所焚周兵多死世宗東趨濠梁以李重進為廬壽州都招討使景亦遣其元帥齊王景逹等列砦紫金山下為夾道以屬城中而重進與張永徳兩軍相疑不協仁贍屢請出戰景逹不許由是憤惋成疾明年正月世宗復至淮上盡破紫金山砦壊其夾道景兵大敗諸將往往見擒而景之守將廣陵馮延魯光州張紹舒州周祚泰州方訥泗州范再遇等或走或降皆不能守雖景君臣亦皆震攝奉表稱臣願割土地輸貢賦以効誠欵而仁贍獨堅守不可下世宗使景所遣使者孫晟等至城下示之仁贍子崇諌幸其父病謀與諸將出降仁贍立命斬之監軍使周廷構哭于中門救之不得於是士卒皆感泣願以死守三月仁贍病甚已不知人其副使孫羽詐為仁贍書以城降世宗命舁仁贍至帳前嘆嗟乆之賜以玉帶御馬復使入城養疾是日卒制曰劉仁贍盡忠所事抗節無虧前代名臣幾人可比予之南伐得爾為多乃拜仁贍檢挍太尉兼中書令天平軍節度使仁贍不能受命而卒年五十八世宗遣使弔祭喪事官給追封彭城郡王以其子崇讚為懐州刺史賜莊宅各一區李景聞仁贍卒亦贈太師壽州故治壽春世宗以其難克遂徙城下蔡而復其軍曰忠正軍曰吾以旌仁贍之節也嗚呼天下惡梁乆矣然士之不幸而生其時者不為之臣可也其食人之禄者必死人之事如彦章者可謂得其死哉仁贍既殺其子以自明矣豈有垂死而變節者乎今周世宗實録載仁贍降書盖其副使孫羽等所為也當世宗時王環為蜀守秦州攻之乆不下其後力屈而降世宗頗嗟其忠然止以為大將軍視世宗待二人之薄厚而考其制書乃知仁贍非降者也自古忠臣義士之難得也五代之亂三人者或出於軍卒或出於偽國之臣可勝嘆哉可勝嘆哉死事傳歐陽公所次死節傳三人外復録死事者十五人以十五人者不足以配三人之烈然不忍遺之也故别之曰死事然如張源徳姚洪張敬逹三人其所凛然不為不義屈歐公所自為㸃綴亦多竒氣予故并録之歐公小序深取王清史彦超然不如源徳等三人尤為慘咽嗚呼甚哉自開平訖于顯徳終始五十三年而天下五代士之不幸而生其時欲全其節而不二者固鮮矣於此之時責士以死與必去則天下為無士矣然其習俗遂以苟生不去為當然至於儒者以仁義忠信為學享人之禄任人之國者不顧其存亡皆恬然以茍生為得非徒不知愧而反以其得為榮者可勝數哉故吾於死事之臣有所取焉君子之於人也樂成其美而不求其備况死者人之所難乎吾於五代得全節之士三人而已其初無卓然之節而終以死人之事者得十有五人焉而戰歿者不得與也然吾取王清史彦超者其有㫖哉其有㫖哉作死事傳不能立傳者五人馬彦超附朱守殷傳宋令詢李遐張彦卿鄭昭業見於本紀而已張源徳者不知其世家或曰本晉人也少事晉無所稱從李罕之以潞州叛晉降梁罕之遣源徳見梁太祖太祖時源徳自金吾衛將軍為蔡州刺史梁貞明三年魏博節度使楊師厚卒末帝分魏相等六州為兩鎮懼魏軍不從乃遣劉鄩將兵萬人屯于魏以虞變魏軍果叛迫其節度使賀徳倫以魏博二州降晉當是時源徳為鄩守貝州晉王入魏諸將欲先擊貝州晉王曰貝城小而堅攻之難卒下且源徳雖恃劉鄩之兵然與滄州相首尾今徳州居其中而無備不如先取之則滄貝之勢分而易圖也乃先襲破徳州然後以兵五千攻源徳源徳堅守不下晉軍塹而圍之已而劉鄩大敗于故元城南走黎陽晉軍攻破洺州而衛州刺史來昭邢州節度使閻寳皆以城降晉磁州刺史靳昭相州張筠滄州戴思逺皆棄城走當此時晉已先下全燕而鎮定背附于晉自河以北山以東四面千里六鎮數十州之地皆歸晉獨貝一州圍之踰年不可下源徳守既堅而貝人聞晉已盡有河北城中食且盡乃勸源徳出降源徳不從遂見殺源徳已死貝人謀曰晉圍吾乆吾窮而後降懼皆不免也乃告于晉曰吾欲被甲執兵而降得赦而後釋之如何晉軍許諾貝人三千出降已釋甲晉兵四面圍而盡殺之夏魯竒字邦傑青州人也唐莊宗時賜姓名曰李紹竒其後莊宗賜姓名者皆復其故魯竒初事梁為宣武軍挍後奔于晉為衛䕶指揮使從周徳威攻劉守光於幽州守光將單廷珪元行欽以驍勇自負魯竒每與二將鬬輒不能解兩軍皆釋兵而觀之晉已下魏博梁將劉鄩軍于洹水莊宗以百騎覘敵遇鄩伏兵圍之數重幾不得脱魯竒力戰手殺百餘人身被二十餘創與莊宗决圍而出莊宗益竒之以為磁州刺史從戰中都擒王彦章莊宗壯之賜絹千匹拜鄭州防禦使遷河陽節度使為政有恵愛徙鎮忠武河陽之人遮留不得行父老詣京師乞留明宗遣中使往諭之魯竒乃得去唐師伐荆南以魯竒為招討副使無功而還徙鎮武信東川董璋反攻遂州魯竒閉城拒之旬日救兵不至城中食盡魯竒自刎死年四十九吳巒兵猶可戰而不戰魯竒食盡力窮而死故取舎異姚洪本梁之小挍也自董璋為梁將洪嘗事璋後事唐為指揮使長興中遣洪將千人戍閬州董璋反遣人以書招洪洪得璋書輒投厠中後璋兵攻破閬州執洪璋曰爾為健兒我遇汝厚奈何負我邪洪罵曰老賊爾昔為李七郎奴掃馬糞得一臠殘炙感恩不已今天子用爾為節度使何苦反邪吾能為國家死不能從人奴以生璋怒然鑊于前令壯士十人刲其肉而食洪至死大罵明宗聞之泣下録其二子而厚䘏其家王思同幽州人也其父敬柔娶劉仁恭女生思同思同事仁恭為銀胡䩮指揮使仁恭為其子守光所囚思同奔晉以為飛勝指揮使梁晉相距于莘遣思同築壘楊劉以功遷神武十軍都指揮使累遷鄭州防禦使思同為人敢勇善騎射好學頗喜為詩輕財重義多禮文士然未嘗有戰功明宗時以乆次為匡國軍節度使徙鎮雄武是時吐蕃數為寇而泰州無亭障思同列四十餘柵以禦之居五年來朝明宗問以邉事思同指畫山川陳其利害思同去明宗顧左右曰人言思同不管事能若是耶於是始知其材以為右武衛上將軍京兆尹西京留守石敬瑭討董璋思同為先鋒指揮使兵入劍門而後軍不繼思同與璋戰不勝而却敬瑭兵罷思同徙鎮山南西道已而復為京兆尹西京留守應順元年二月潞王從珂反鳯翔馳檄四鄰言姦臣幸先帝疾病賊殺秦王而立幼嗣侵弱宗室動揺藩方陳已所以興兵討亂之狀因遣伶奴安十十以五絃謁思同欲因其懽以通意是時諸鎮皆懐嚮背所得潞王書檄雖以上聞而不絶其使獨思同執十十及從珂所使推官郝詡等送京師愍帝嘉其忠即以思同為西面行營馬步軍都部署三月㑹諸鎮兵圍鳯翔破東西關城從珂兵弱而守甚堅外兵傷死者衆從珂登城呼外兵而泣曰吾從先帝二十年大小數百戰甲不解體金創滿身士卒固嘗從我矣今先帝新棄天下而朝廷信用姦人離間骨肉我實何罪而見伐乎因慟哭士卒聞者皆悲憐之興元張虔釗攻城西督戰甚急士卒苦之反兵攻虔釗䖍釗走羽林指揮使楊思權呼曰潞王吾主也乃引軍自西門入降從珂而思同未知猶督戰嚴衛指揮使尹暉麾其衆曰城西軍入城受賞矣何用戰耶士卒解甲棄仗聲聞數里遂皆入城降諸鎮之兵皆潰思同挺身走至長安西京副留守劉遂雍閉門不納乃走潼關從珂引兵東至昭應前鋒追執思同從珂責曰罪可逃乎思同曰非不知從王而得生恐終死不能見先帝於地下從珂媿其言乃殺之漢髙祖即位贈侍中思同東走將自歸于天子與元行欽走異故故其死張敬逹字志通代州人也小字生鐵少以騎射事唐莊宗為㕔直軍使明宗時為河東馬步軍都指揮使領欽州刺史累遷彰國大同軍節度使徙鎮武信晉昌清泰二年契丹數犯邉廢帝以河東節度使石敬瑭兼大同彰國振武威塞等軍蕃漢馬步軍都總管屯于忻州屯兵聚譟遮敬瑭呼萬嵗敬瑭斬三十餘人以止之廢帝疑敬瑭有異志乃以敬瑭為北面副總管以分其兵明年夏徙敬瑭鎮天平遂以敬達為大同彰國振武威塞等軍蕃漢馬步軍都部署敬瑭因此遂反即以敬逹為太原四面招討使六月兵圍太原敬逹為長城連柵雲梯飛礮以攻之所為城柵將成輒有大風雨水暴至以壊之敬瑭求救于契丹九月契丹耶律徳光自鴈門入旌旗相屬五十餘里徳光先遣人告敬瑭曰吾欲今日破敵可乎敬瑭報曰大兵逺來而賊勢方盛要在成功不必速也使者未復命而兵已交敬達陣於西山契丹以羸騎三千革鞭木鐙人馬皆不甲胄以趨唐軍唐軍爭馳之契丹兵走追至汾曲伏發斷唐軍為二其在北者皆死死者萬餘人敬達収軍柵晉安契丹圍之廢帝遣趙延壽范延光等救之延壽屯團柏谷延光屯遼州相去皆百餘里契丹兵圍敬達者自晉安寨南長百餘里闊五十里敬達軍中望之但見穹廬連屬如岡阜四面亘以毛索掛鈴為警縱犬往來敬達軍中有夜出者輒為契丹所得由是閉壁不敢復出延壽等皆有二心無救敬達意敬達猶有兵五萬人馬萬匹乆之食盡削木篩糞以飼其馬馬死者食之已而馬盡副招討使楊光逺勸敬達降晉敬達自以不忍背唐而救兵且至光逺促之不已敬達曰諸公何相迫耶何不殺我而降光逺即斬敬達降契丹耶律徳光聞敬達死哀其忠遣人収𦵏之本紀責其不誅光逺而諷其殺已以降賊故不書死而書如其志而傳録其死者終嘉其不降也然已雖不屈而諷人降賊故不得為死節王清字去瑕洺州曲周人也初事唐為寕衛指揮使後事晉為奉國都虞候安從進叛㐮州從髙行周攻之逾年不能下清謂行周曰從進閉孤城以自守其勢豈得乆耶因請先登遂攻破之開運二年冬從杜重威戰陽城清以力戰功為步軍之最加檢挍司徒是冬重威軍中渡橋南敵軍其北以相距而敵以精騎竝西山出晉軍後南擊欒城斷晉餉道清謂重威晉軍危矣今去鎮州五里而守死于此營孤食盡將若之何請以步兵二千為先鋒奪橋開路公率諸軍繼進以入鎮州可以守也重威許之遣與宋彦筠俱前清與敵戰敗之奪其橋是時重威已有貳志猶預不肯進彦筠亦退走清曰吾獨死於此矣因力戰而死年五十三漢髙祖立贈清太傅史彦超雲州人也為人勇悍驍㨗周太祖起魏時彦超為漢龍㨗都指揮使以兵從太祖入立遷虎㨗都指揮使戍于晉州劉旻攻晉州州無主帥知州王萬敢不能拒彦超以戍兵堅守月餘太祖遣王峻救之旻兵解去以功遷龍㨗右廂都指揮使領鄭州防禦使周漢戰髙平彦超為前鋒先登陷陣以功拜感徳軍節度使周兵圍漢太原契丹救漢出忻代世宗遣符彦卿拒之以彦超為先鋒戰忻口彦超勇憤俱發左右馳擊解而復合者數四遂歿於陣是時世宗敗漢髙平乗勝而進圍城之役諸將議不一故乆無成功世宗欲解去而未決聞彦超戰死遽班師倉卒之際亡失甚衆世宗既惜彦超而憤無成功憂忿不食者數日贈彦超太師優䘏其家焉孫晟初名鳯又名忌宻州人也好學有文辭尤長於詩少為道士居廬山簡寂宫常畫唐詩人賈島像置于屋壁晨夕事之簡寂宫道士惡晟以為妖以杖驅出之乃儒服北之趙魏謁唐莊宗于鎮州莊宗以晟為著作佐郎天成中朱守殷鎮汴州辟為判官守殷反伏誅晟乃棄其妻子亡命陳宋之間安重誨惡晟以謂教守殷反者晟也畫其像購之不可得遂族其家晟奔于呉是時李昪方簒楊氏多招四方之士得晟喜其文辭使為教令由是知名晟為人口吃遇人不能道寒暄已而坐定談辨鋒生聽者忘倦昪尤愛之引與計議多合意以為右僕射與馮延已竝為昪相晟輕延已為人常曰金椀玉盃而盛狗屎可乎晟事昪父子二十餘年官至司空家益富驕每食不設几案使衆妓各執一器環立而侍號肉臺盤時人多效之周世宗征淮李景懼始遣泗州牙將王知朗至徐州奉書以求和世宗不答又遣翰林學士鍾謨文理院學士李徳明奉表稱臣不答乃遣禮部尚書王崇質副晟奉表謨晟等皆言景願割壽濠泗楚光海六州之地嵗貢百萬以佐軍而世宗已取滁揚濠泗諸州欲盡取淮南乃止因留使者不遣而攻壽州益急謨等見世宗英武非景敵而師甚盛壽春且危乃曰願陛下寛臣五日之誅容臣還取景表盡獻江北諸州世宗許之遣供奉官安宏道押徳明崇質南還而謨與晟皆見留徳明等既還景悔不肯割地世宗亦以暑雨班師留李重進張永徳等分攻廬壽周兵所得揚泰諸州皆不能守景兵復振重進與永徳兩軍相疑有隙永徳上書言重進反世宗不聽景知二將之相疑也乃以蠟九書遺重進勸其反初晟之奉使也語崇質曰吾行必不免然吾終不負永陵一抔土也永陵者昪墓也及崇質還而晟與鍾謨俱至京師館于都亭驛待之甚厚每朝㑹入閣使班東省官後召見必飲以醇酒已而周兵數敗盡失所得諸州世宗憂之召晟問江南事晟不對世宗怒未有以發㑹重進以景蠟丸書來上多斥周過惡以為言由是發怒曰晟來使我言景畏吾神武願得北面稱臣保無二心安得此指斥之言乎亟召侍衛軍虞候韓通收晟下獄及其從者二百餘人皆殺之晟臨死世宗猶遣近臣問之晟終不對神色怡然正其衣冠南望而拜曰臣惟以死報國爾乃就刑晟既死鍾謨亦貶耀州司馬其後世宗怒解憐晟忠悔殺之召拜鍾謨衛尉少卿景已割江北遂遣謨還而景聞晟死亦贈魯國公唐宋八大家文鈔巻六十九
