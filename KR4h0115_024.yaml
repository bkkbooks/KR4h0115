body:
  text: 唐宋八大家文鈔卷二十二明茅坤撰柳州文鈔六記館驛使壁記中條貫龎雜而文所點次處若掌凡萬國之會四夷之來天下之道塗畢出於邦畿之內奉貢輸賦修職於王都者入于近關則皆重足錯轂以聽有司之命徵令賜豫布政于下國者出于甸服而後按行成列以就諸侯之館故館驛之制於千里之內尤重自萬年至于渭南其驛六其蔽曰華州其關曰潼關自華而北界于櫟陽其驛六其蔽曰同州其關曰蒲津自灞而南至于藍田其驛六其蔽曰商州其關曰武關自長安至于盩厔其驛十有一其蔽曰洋州其關曰華陽自武功西至于好畤其驛三其蔽曰鳳翔府其關曰隴關自渭而北至于華原其驛九其蔽曰方州自咸陽而西至于奉天其驛六其蔽曰邠州由四海之內總而合之以至于關由關之內束而會之以至于王都華人夷人往復而授館者旁午而至傳吏奉符而閲其數縣吏執牘而書其物告至告去之役不絶於道寓望迎勞之禮無曠於日而春秋朝陵之邑皆有傳館其飲飫餼饋咸出於豐給繕完築復必歸於整頓列其田租布其貨利權其入而用其積於是有出納竒贏之數勾會考挍之政大厯十四年始命御史為之使俾考其成以質于尚書季月之晦必合其簿書以視其等列而挍其信宿必稱其制有不當者反之於官尸其事者有勞焉則復于天子而優升之勞大者增其官其次者降其調之數又其次猶異其考績官有不職則以告而罪之故月受俸二萬于太府史五人承符者二人皆有食焉先是假廢官之印而用之貞元十九年南陽韓泰告于上始鑄使印而正其名然其嗣當斯職未嘗有記之者追而求之蓋數嵗而往則失之矣今余為之記遂以韓氏為首且曰修其職故首之也嶺南節度使饗軍堂記嶺南節度使所領者重鎮所建饗軍堂之制亦𢎞敞而文亦稱唐制嶺南為五府府部州以十數其大小之戎號令之用則聽于節度使焉其外大海多蠻夷由流求訶陵西抵大夏康居環水而國以百數則統于押蕃舶使內之幅員萬里以執秩拱玉稽時聽教命外之羈屬數萬里以譯言贄寶嵗帥貢職合二使之重以治于廣州故賔軍之事宜無與挍大且賓有牲牢饔餼嘉樂好禮以同遠合疏軍有犒饋宴饗勞旋勤歸以羣力一心於是治也閈閎階序不可與他邦類必厚棟大梁夷庭高門然後可以上充於揖讓下周於步武今御史大夫扶風公廉廣州且專二使增德以來逺人申威以修戎政大饗宴合樂從其豐盈先是為堂於治城西北陬其位公北向賔衆南向奏部伎于其西視泉池于其東隅奧庫反庭廡下陋日未及晡則赫炎當目汗眩更起而禮莫克終故凡大宴饗大賔旅則寓于外壘儀形不稱公于是始斥其制為堂南面橫八楹縱十楹嚮之宴位化為東序西又如之其外更衣之次膳食之宇列觀以遊目偶亭以展聲彌望極顧莫究其往泉池之舊增濬益植以暇以息如在林壑問工焉取則師輿是供問役焉取則蠻𨽻是徵問材焉取則隙宇是遷或益其闕伐山浮海農賈拱手張目視具乃十月甲子克成公命饗于新堂幢牙茸纛金節析羽旗旗旟旞咸飾于下鼓以鼖晉金以鐸鐃公與監軍使肅上賔延羣僚將校士吏咸次于位卉裳罽衣胡夷蛋蠻睢盱就列者千人以上鉶鼎體節燔炮胾炙羽鱗貍互之物沉泛醍盎之齊均飫于卒士興王之舞服夷之伎揳擊吹鼓之音飛騰幻怪之容寰觀于遠邇禮成樂遍以敘而賀且曰是邦臨護之大五人合之非是堂之制不可以備物非公之德不可以容衆曠于往初肇自今兹大和有人以觀遠方古之戎政其曷用加此華元名大夫也殺羊而御者不及霍去病良將軍也餘肉而士有飢色猶克稱能以垂到今矧兹具美其道不廢願訪于金石以永示後祀遂相與來告且乞辭某讓不獲乃刻于兹石云興州江運記點次陸水利害處如掌御史大夫嚴公牧于梁五年嗣天子用周漢進律增秩之典以親諸侯謂公有功德理行就加禮部尚書是年四月使中謁者來錫公命賔僚吏屬將挍卒士黧老童孺填溢公門舞躍歡呼願建碑紀德垂億萬祀公固不許而相與怨咨遑遑如不飲食於是西鄙之人密以刋山導江之事願刻巖石曰維梁之西其蔽曰某山其守曰興州興州之西為戎居嵗備亭障實以精卒以道之險隘兵困于食守用不固公患之曰吾嘗為興州凡其土人之故吾能知之自長舉北至於青泥山又西扺于成州過栗亭川踰寶井堡崖谷峻隘十里百折負重而上若蹈利刃盛秋水潦窮冬雨雪深泥積水相輔為害顛踣騰藉血流棧道糗糧芻藁填谷委山牛焉羣蓄相藉物故餫夫畢力守卒延頸嗷嗷之聲其可哀也若是者綿三百里而餘自長舉而西可以導江而下二百里而至昔之人莫得知也吾受命于君而育斯人其可巳乎乃出軍府之幣以備器用即山僦功由是轉巨石仆大木焚以炎火沃以食醯摧其堅剛化為灰燼畚鍤之下易甚朽壤乃闢乃墾乃宣乃理隨山之曲直以休人力順地之高下以殺湍悍厥功既成咸如其素於是決去壅土疏導江濤萬夫呼忭莫不如志雷騰雲奔百里一瞬既會既遠淡為安流蒸徒謳歌枕卧而至戍人無虞專力待寇惟我公之功疇可侔也而無以酬德致其大願又不可得命矧公之始來屬當惡嵗府庾甚虛器備甚殫飢饉昏札死徒充路賴公節用愛人克安而生老窮有養幼乳以遂不問不使咸得其志公命鼓鑄庫有利兵公命屯田師有餘糧選徒練旅有衆孔武平刑議獄有衆不黷增石為防膏我稻梁嵗無凶災家有積倉傳館是飾旅忘其歸杠梁以成人不履危若是者皆以戎隙帥士而為之不出四方之力而百役巳就且我西鄙之職官故不能具舉惟公和恆直方廉毅信讓敦尚儒學揖損貴位率忠與仁以厚其誠有可以安利于人者行之堅勇不俟終日其興功濟物宜如此其大也昔之為國者惟水事為重故有障大澤勤其官而受封國者矣西門遺利史起興歎白圭壑鄰孟子不與公能夷險休勞以惠萬代其功烈尤章章焉不可蓋也是用假辭謁工勒而存之用永憲于後祀全義縣復北門記此文亦自奇賢者之興而愚者之廢廢而復之為是習而循之為非恆人且猶知之不足乎列也然而復其事必由乎賢者推是類以從於政其事可少哉賢莫大於成功愚莫大於吝且誣桂之中嶺而邑者曰全義衛公城之南越以平盧遵為全義視其城塞北門鑿他雉以出問之其門人曰餘百年矣或曰巫言是不利於令故塞之或曰以賓旅之多有懼竭其餼饋者欲回其途故塞之遵曰是非吝且誣歟賢者之作思利乎人反是罪也余其復之詢于羣吏羣吏叶厥謀上于大府大府以俞邑人便焉歡舞里閭居者思止其家行者樂出其塗由是道以廢邪用賢棄愚推以革物宜民之蘇若是而不列殆非孔子徒也為之記云唐荆川曰小題自作議論永州新堂記將為穹谷嵁巖淵池於郊邑之中則必輦山石溝澗壑凌絶嶮阻疲極人力乃可以有為也然而求天作地生之狀咸無得焉逸其人因其地全其天昔之所難今於是乎在永州實惟九疑之麓其始度土者環山為城有石焉翳于奧草有泉焉伏于土塗蛇虺之所蟠狸鼠之所遊茂樹惡木嘉葩毒卉亂雜而爭植號為穢墟韋公之來既逾月理甚無事望其地且異之始命芟其蕪行其塗積之丘如蠲之瀏如既焚既釃竒勢迭出清濁辨質美惡異位視其植則清秀敷舒視其蓄則溶漾紆餘怪石森然周于四隅或列或跪或立或仆竅穴逶邃堆阜突怒乃作棟宇以為觀遊凡其物類無不合形輔勢效伎於堂廡之下外之連山高原林麓之崖間厠隱顯邇延野緑遠混天碧咸會於譙門之外已乃延客入觀繼以宴娛或贊且賀曰見公之作知公之志公之因土而得勝豈不欲因俗以成化公之擇惡而取美豈不欲除殘而佑仁公之蠲濁而流清豈不欲廢貪而立廉公之居高以望遠豈不欲家撫而戶曉夫然則是堂也豈獨草木土石水泉之適歟山原林麓之觀歟將使繼公之理者視其細知其大也宗元請志諸石措諸壁編以為二千石楷法零陵郡復乳穴記敘事奇而束處更奇石鍾乳餌之最良者也楚越之山多産焉于連于韶者獨名於世連之人告盡焉者五載矣以貢則買諸他部今刺史崔公至逾月穴人來以乳復告邦人悅是祥也雜然謡曰氓之熙熙崔公之來公化所徹土石蒙烈以為不信起視乳穴穴人笑之曰是惡知所謂祥耶嚮吾以刺史之貪戾嗜利徒吾役而不吾貨也吾是以病而紿焉今吾刺史令明而志潔光賴而後力欺誣屛息信順休洽吾以是誠告焉且夫乳穴必在深山窮林冰雪之所儲豺虎之所廬由而入者觸昏霧扞龍蛇束火以知其物縻繩以志其返其勤若是出又不得吾直吾用是安得不以盡告今而乃誠吾告故也何祥之為吾聞之曰謡者之祥也乃其所謂怪者也笑者之非祥也乃其所謂真祥者也君子之祥也以政不以怪誠乎物而信乎道人樂用命熙熙然以效其有斯其為政也而獨非祥也歟零陵三亭記撈籠勝槩却又别出一見解邑之有觀遊或者以為非政是大不然夫氣煩則慮亂視壅則志滯君子必有遊息之物高明之具使之清寧平夷恆若有餘然後理逹而事成零陵縣東有山麓泉出石中沮洳汚塗羣畜食焉牆藩以蔽之為縣者積數十人莫知發視河東薛存義以吏能聞荆楚間潭部舉之假湘源令會零陵政尨賦擾民訟于牧推能濟弊來蒞兹邑遁逃復還愁痛笑歌逋租匿役期月辨理宿蠧藏姧披露首服民既卒稅相與歡歸道塗迎賀里閭門不施胥吏之席耳不聞鼛鼓之召雞豚糗醑得及宗族州牧尚焉旁邑倣焉然而未嘗以劇自撓山水鳥魚之樂淡然自若也乃發牆藩驅羣畜決疏沮洳搜剔山麓萬石如林積坳為池爰有嘉木美卉垂水藂峯瓏􅌑蕭條清風自生翠煙自留不植而遂魚樂廣間鳥慕靜深别孕巢穴浮沉嘯萃不蓄而富伐木墜江流于邑門陶土以埴亦在署側人無勞力土得以利乃作三亭陟降晦明高者冠山顛下者俯清池更衣膳饔列置憊具賔以燕好旅以館舍高明遊息之道具於是邑由薛為首在昔裨諶謀野而獲宓子彈琴而理亂慮滯志無所容入則夫觀遊者果為政之具歟薛之志其果出於是歟及其弊也則以玩替政以荒去理使繼是者咸有薛之志則邑民之福其可既乎余愛其始而欲久其道乃撰其事以書于石薛拜手曰吾志也遂刻之道州毁鼻亭神記文甚明法讀王陽明記象廟又爽然自失矣鼻亭神象祠也不知何自始立因而勿除完而恆新相傳且千嵗元和九年河東薛公由刑部郎中刺道州除穢革邪敷和于下州之罷人去亂即治變呻為謠若痿而起若矇而瞭騰踴相視歡愛克順既底于理公乃考民風披地圖得是祠駭曰象之道以為子則傲以為弟則賊君有鼻而天子之吏實理以惡德而專世祀殆非化吾人之意哉命亟去之於是撤其屋墟其地沉其主於江公又懼楚俗之尚鬼而難諭也乃遍告于人曰吾聞鬼神不歆非類又曰淫祀無福凡天子命刺史于下非以專土疆督貨賄而巳也蓋將教孝悌去竒邪俾斯人敦忠睦友祗肅信讓以順于道吾之斥是祠也以明教也苟離于正雖千載之違吾得而更之况今兹乎苟有不善雖異代之鬼吾得而攘之况斯人乎州民既諭相與歌曰我有耉老公燠其肌我有病癃公起其羸髫童之嚚公實智之鰥孤孔艱公實遂之孰尊惡德遠矣自古孰羡淫昏俾我斯瞽千嵗之冥公闢其戶我子洎孫延世有慕宗元時謫永州邇公之邦聞其歌詩以為古道罕用賴公而存斥一祠而二教興焉明罰行于鬼神愷悌逹于蠻夷不惟禁淫祠黜非類而巳願為記以刻山石俾知教之首潭州東池戴氏堂記子厚本色𢎞農公刺潭三年因東泉為池環之九里丘陵林麓距其涯􅔰島洲渚交其中其岸之突而出者水縈之若玦焉池之勝於是為最公曰是非離世樂道者不宜有此卒授賔客之選者譙國戴氏曰簡為堂而居之堂成而勝益竒望之若連艫縻艦與波上下就之顚倒萬物遼廓眇忽樹之松柏杉櫧被之菱芡芙蕖鬱然而隂粲然而榮凡觀望浮遊之美專於戴氏矣戴氏嘗以文行纍為連率所賔禮貢之澤宫而志不願仕與人交取其退讓受諸侯之寵不以自大其離世歟好孔氏書旁及莊文莫不總統以至虛為極得受益之道其樂道歟賢者之舉也必以類當𢎞農公之選而專兹地之勝豈易而得哉地雖勝得人焉而居之則山若增而高水若闢而廣堂不待飾而巳奐矣戴氏以泉池為宅居以雲物為朋徒攄幽發粹日與之娛則行宜益高文宜益峻道宜益懋交相贊者也既碩其內又揚于時吾懼其離世之志不果矣君子謂𢎞農公刺潭得其政為東池得其勝授之得其人豈非動而時中者歟於戴氏堂也見公之德不可以不記唐荆川曰周匝曲折渾成此柳文之佳者桂州訾家洲亭記地之勝固奇峭文亦稱之大凡以觀遊名於代者不過視於一方其或傍逹左右則以為特異至若不騖遠不陵危環山洄江四出如一夸竒競秀咸不相讓遍行天下者唯是得之桂州多靈山發地峭堅林立四野署之左曰灕水水之中曰訾氏之洲凡嶠南之山川逹于海上於是畢出而古今莫能知元和十二年御史中丞裴公來蒞兹邦都督二十七州諸軍州事盜遁姦革德惠敷施期年政成而當天子平淮夷定河朔告于諸侯公既施慶于下乃合僚吏登兹以嬉觀望悠長悼前之遺於是厚貨居氓移于間壤伐惡木刜奧草前指後畫心舒目行忽焉若飄浮上騰以臨雲氣萬山面內重江束隘聨嵐含輝旋視具宜常所未覩倐然互見以為飛舞奔走與遊者偕來乃經工化材考極相方南為燕亭延宇垂阿步簷更衣周若一舍非有崇軒以臨千里左浮飛閣右列間館比舟為梁與波升降苞灕山含龍宫昔之所大蓄在亭內日出扶桑雲飛蒼梧海霞島霧來助遊物其隙則抗月檻於回溪出風榭於篁中晝極其美又益以夜列星下布皓氣回合邃然萬變若與安期羡門接於物外則凡名觀遊於天下者有不屈伏退讓以推高是亭者乎既成以燕歡極而賀咸曰昔之遺勝槩者必於深山窮谷人罕能至而好事者後得以為己功未有直治城挾闤闠車輿步騎朝過夕視訖千百年莫或異顧一旦得之遂出於他邦雖博物辨口莫能舉其上者然則人之心目其果有遼絶特殊而不可至者耶蓋非桂山之靈不足以瓌觀非是洲之曠不足以極視非公之鑒不能以獨得噫造物者之設是久矣而盡之於今余其可以無藉乎雍州馬退山茅亭記興致摹寫足稱山水冬十月作新亭于馬退山之陽因髙丘之阻以面勢無欂櫨節棁之華不斫椽不翦茨不列墻以白雲為藩籬碧山為屏風昭其儉也是山崒然起於莽蒼之中馳奔雲矗亘數十百里尾蟠荒陬首注大溪諸山來朝勢若星拱蒼翠詭狀綺綰繡錯蓋天鍾秀於是不限於遐裔也然以壤接荒服俗參夷徼周王之馬迹不至謝公之屐齒不及巖徑蕭條登探者以為嘆嵗在辛卯我仲兄以方牧之命試于是邦夫其德及故信孚信孚故人和人和故政多暇由是嘗徘徊此山以寄勝槩乃塈乃塗作我攸宇於是不崇朝而木工告成每風止雨收煙霞澄鮮輒角巾鹿裘率昆弟友生冠者五六人步山椒而登焉於是手揮絲桐目送還雲西山爽氣在我襟袖以極萬類攬不盈掌夫美不自美因人而彰蘭亭也不遭右軍則清湍修竹蕪沒於空山矣是亭也僻介閩嶺佳境罕到不書所作使盛迹鬱堙是貽林澗之愧故志之唐宋八大家文鈔卷二十二
