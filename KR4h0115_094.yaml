body:
  text: 唐宋八大家文鈔卷八十八明茅坤撰臨川文鈔八記揚州新園亭記簡而有法周而能解諸侯宫室臺榭講軍實容俎豆各有制度揚古今大都方伯所治處制度狹庳軍實不講俎豆無以容不以逼諸侯哉宋公至自丞相府化清事省喟然有意其圖之也今太常刁君實集其意㑹公去鎮鄆君即而考之占府乾隅夷茀而基因城而垣並垣而溝周六百步竹萬箇覆其上故髙亭在垣東南循而西三十軏作堂曰愛思道僚吏之不忘宋公也堂南北鄉袤八筵廣六筵直北為射埒列樹八百本以翼其旁賓至而享吏休而宴於是乎在又循而西十有二軏作亭曰𨽻武南北鄉袤四筵廣如之埒如堂列樹以鄉嵗時教士戰射坐作之法於是乎在始慶厯二年十二月某日凡若干日卒功云初宋公之政務不煩其民是役也力出於兵材資於官之饒地瞰於公宫之隙成公志也噫揚之物與監東南所規仰天子宰相所垂意而選繼乎宜有若宋公者丞乎宜有若刁君者金石可弊此無廢已芝閣記荆公本色之佳處祥符時封泰山以文天下之平四方以芝來告者萬數其大吏則天子賜書以寵嘉之小吏若民輒錫金帛方是時希世有力之大臣窮搜而逺采山農野老攀緣徂􅍻以上至不測之髙下至澗溪壑谷分崩裂絶幽窮隱伏人迹之所不通往往求焉而芝出於九州四海之間蓋幾於盡矣至今上即位謙讓不德自大臣不敢言封禪詔有司以祥瑞告者皆勿納於是神竒之産銷藏委翳於蒿藜榛莽之間而山農野老不復知其為瑞也則知因一時之好惡而能成天下之風俗况於行先王之治哉太丘陳君學文而好竒芝生於庭能識其為芝惜其可獻而莫售也故閣於其居之東偏掇取而藏之蓋其好竒如此噫芝一也或貴於天子或貴於士或辱於凡民夫豈不以時乎哉士之有道固不役志於貴賤而卒所以貴賤者何以異哉此豫之所以歎也君子齊記宋文之格不入西漢處正在此而宋人之所自以為得亦在此天子諸侯謂之君卿大夫謂之子古之為此名也所以命天下之有德故天下之有德通謂之君子有天子諸侯卿大夫之位而無其德可以謂之君子蓋稱其位也有天子諸侯卿大夫之德而無其位可以謂之君子蓋稱其德也位在外也遇而有之則人以其名豫之而以貌事之德在我也求而有之則人以其實豫之而心服之夫人服之以貌而不以心與之以名而不以實能以其位終身而無謫者蓋亦幸而已矣故古之人以名為羞以實為慊不務服人之貌而思有以服人之心非獨如此也以為求在外者不可以力得也故雖窮困屈辱樂之而弗去非以夫窮困屈辱為人之樂者在是也以夫困窮屈辱不足以概吾心為可樂也已河南裴君主簿於洛陽治齊於其官而命之曰君子裴君豈慕夫在外者而欲有之乎豈以為世之小人衆而躬行君子者獨我乎由前則失已由後則失人吾知裴君不為是也亦曰勉於德而已蓋所以榜於其前朝夕出入觀焉思古之人所以為君子而務及之也獨仁不足以為君子獨智不足以為君子仁足以盡性智足以窮理而又通乎命此古之人所以為君子也雖然古之人不云乎德輶如毛毛猶有倫未有欲之而不得也然則裴君之為君子也孰禦焉故余嘉其志而樂為道之石門亭記題雖小而議論却大石門亭在青田縣若干里令朱君為之石門者名山也古之人咸刻其觀遊之感槩留之山中其石相望君至而為亭悉取古今之刻立之亭中而以書與其甥之壻王某使記其作亭之意夫所以作亭之意其直好山乎其亦好觀遊眺望乎其亦於此問民之疾憂乎其亦燕閒以自休息於此乎其亦憐夫人之刻暴剝偃踣而無所庇障且泯滅乎夫人物之相好惡必以類廣大茂美萬物附焉以生而不自以為功者山也好山仁也去郊而適野升髙以逺望其中必有槩然者書不云乎豫耄遜于荒詩不云乎駕言出逰以寫我憂夫環顧其身無可憂而憂者必在天下憂天下亦仁也人之否也敢自逸至即深山長谷之民與之相對接而交言語以求其疾憂有其壅而不聞者乎求民之疾憂亦仁也政不有小大不以德則民不化服民化服然後可以無訟民不無訟令其能休息無事優遊以嬉乎古今之名者其石幸在其文信善則其人之名與石且傳而不朽成人之名而不奪其志亦仁也作亭之意其然乎其不然乎鄞縣經遊記縣令如此知非俗吏已慶厯七年十一月丁丑余自縣出屬民使浚渠川至萬靈鄉之左界宿慈福院戊寅升雞山觀碶工鑿石遂入育王山宿廣利寺雨不克東辛已下靈巖浮石湫之壑以望海而謀作斗門于海濱宿靈巖之旌教院癸未至蘆江臨决渠之口轉以入于瑞巖之開善院遂宿甲申逰天童山宿景德寺質明與其長老瑞新上石望玲瓏巖須猿吟者久之而還食寺之西堂遂行至東吳具舟以西質明泊舟堰下食大梅山之保福寺莊過五峰行十里許復具舟以西至小溪以夜中質明觀新渠及洪水灣還食普寧院日下昃如林村夜未中至資夀院質明戒桃源清道二鄉之民以其事凡東西十有四鄉鄉之民畢已受事而余遂歸云逰褒禪山記逸興滿眼而餘音不絶褒禪山亦謂之華山唐浮圖慧褒始舍於其址而卒葬之以故其後名之曰褒禪今所謂慧空禪院者褒之廬冡也距其院東五里所謂華山洞者以其乃華山之陽名之也距洞百餘步有碑仆道其文漫滅獨其為文猶可識曰花山今言華如華實之華者蓋音謬也其下平曠有泉側出而記遊者甚衆所謂前洞也由山以上五六里有穴窈然入之甚寒問其深則其好逰者不能窮也謂之後洞余與四人擁火以入入之愈深其進愈難而其見愈竒有怠而欲出者曰不出火且盡遂與之俱出蓋豫所至比好逰者尚不能十一然視其左右來而記之者已少蓋其又深則其至又加少矣方是時豫之力尚足以入火尚足以明也既其出則或咎其欲出者而豫亦悔其隨之而不得極夫逰之樂也於是豫有歎焉古人之觀於天地山川草木蟲魚鳥獸往往有得以其求思之深而無不在也夫夷以近則逰者衆險以逺則至者少而世之竒偉瑰怪非常之觀常在於險逺而人之所罕至焉故非有志者不能至也有志矣不隨以止也然力不足者亦不能至也有志與力而又不隨以怠至於幽暗昏惑而無物以相之亦不能至也然力足以至焉於人為可譏而在已為有悔盡吾志也而不能至者可以無悔矣其孰能譏之乎此余之所得也豫於仆碑又以悲夫古書之不存後世之謬其傳而莫能名者何可勝道也哉此所以學者不可以不深思而慎取之也四人者廬陵蕭君圭君玊長樂王回深父余弟安國平父安上純父至和元年七月某日臨川王某記撫州祥符觀三清殿記緊嚴臨川之州城橫溪上西出出城之上有宫巋然溪之沄沄流過其下東南之山皆在其門户窗牖之間者曰祥符觀觀之中有屋四注深五十五尺廣七十二尺陛之髙居深十八分之一楹二十有四門兩夾窗中象三旁象二十有六者曰三清殿用其師之說以動人而能有此者曰道士黎自新出其力以歸於道士之說而卒成此者曰里之人鄧佺佺之子表故常與豫逰豫之歸表語其父之事而乞豫文豫不能拒也夫用其師之說以動人者道士也豫力顧出道士下復何云哉揚州龍興講院記占地步豫少時客遊金陵浮屠慧禮者從豫遊豫既吏淮南而慧禮得龍興佛舍與其徒日講其師之說嘗出而過焉庫屋數十椽上破而旁穿側出而視後則榛棘出人不見垣端指以語豫曰吾將除此而宫之雖然其成也不以私吾後必求時之能行吾道者付之願記以示後之人使不得私焉當是時禮方丐食飲以卒日視其居枵然余特戲曰姑成之吾記無難者後四年來曰昔之所欲為凡百二十楹賴州人蔣氏之力既皆成盍有述焉噫何其能也蓋慧禮者豫知之其行謹潔學博而才敏而又卒之以不私宜成此不難也今夫衣冠而學者必曰自孔氏孔氏之道易行也非有苦身窘形離性禁欲若彼之難也而士之行可一鄉才足一官者常少而浮屠之寺廟被四海則彼其所謂材者寧獨禮耶以彼之材由此之道去至難而就甚易宜其能也嗚呼失之此而彼得焉其有以也夫真州長蘆寺經藏記識逺西域有人焉止而無所繫觀而無所逐唯其無所繫故有所繫者守之唯其無所逐故有所逐者從之從而守之者不可為量數則其言而應之議而辨之也亦不可為量數此其書之行乎中國所以至於五千四十八卷而尚未足以為多也真州長蘆寺釋智福者為髙屋建大軸兩輪而棲匭於輪間以藏五千四十八卷者其募錢至三千萬其土木丹漆珠璣萬金之閎壯靡麗言者不能稱也唯觀者知焉夫道之在天下莫非命而有廢興時也知出之有命興之有時則彼所以當天下貧窶之時能獨鼓舞得其財以有所建立每至於此蓋無足以疑智福有才略善治其徒衆從余求識其成於是乎書大中祥符觀新修九曜閣記某自揚州歸與叔父㑹京師叔父曰大中祥符觀所謂九曜者道士丁用平募民錢為堂庖廡已又為閣置九曜像其下從吾乞汝文記其年時汝為之臨川之城中東有大丘左溪水水南出而北并於江城之東以溪為隍吾廬當丘上北折而東百步為祥符觀觀岸溪水東南之山不奄乎人家者可望也某少時固嘗從長者游而樂之以為溪山之佳雖異州樂也況吾父母之州而又去吾廬為之近者耶雖其身去為吏獨其心不須臾去也今道士又新其居以壯觀游閣焉使游者得以窮登望之勝使可望者不唯東南而已豈不重可樂邪道士之所為幾吾之所樂而命吾文又叔父也即欲已得邪惜乎安得與州之君子者游焉以忘吾憂而慰吾思耶閣成之日某年月日也撫州招仙觀記小小結搆自有逺山景態招仙觀在安仁郭西四十里始作者與其嵗月豫不知也祥符中嘗廢廢四五十年而道士全自明以醫游其邑邑之疾病者賴以治而皆憂其去人相與言州出材力因廢基築宫而留之全與其從者一人為留而觀復興全識豫舅氏而因舅氏以乞豫書其復興之嵗月夫宫室器械衣服飲食凡所以生之具須人而後具而人不須吾以足惟浮屠道士為然而全之為道士人須之而不可以去也其所以養於人也視其黨可以無愧矣豫為之書其亦可以無愧焉慶厯七年七月復興之嵗月也廬山文殊像現瑞記亦奇番陽劉定嘗登廬山臨文殊金像所沒之谷睹光明雲瑞圖示臨川王某求記其事某曰有有以觀空空亦幻空空以觀有幻亦實幻實果有辨乎然則如子所睹可以記可以無記記無記果亦有辨乎雖然子既圖之矣余不可以無記也定以熙寧元年四月十日十年九月二十七日睹某以元豐元年十一月二十三日記荆公之文其長在簡古而多深沈之思讀孟嘗君傳與此等記尤可見漣水軍淳化院經藏記有斡旋處道之不一久矣人善其所見以為教於天下而傳之後世後世學者或徇乎身之所然或誘乎世之所趨或得乎心之所好於是聖人之大體分裂而為八九博聞該見有志之士補苴調胹冀以就完而力不足又無可為之地故終不得蓋有見於無思無為退藏於密寂然不動者中國之老莊西域之佛也既以此為教於天下而傳後世故為其徒者多寬平而不忮質靜而無求不忮似仁無求似義當士之夸漫盜奪有已而無物者多於世則超然髙蹈其為有似乎吾之仁義者豈非所謂賢於彼而可與言者邪若通之瑞新閩之懷璉皆今之為佛而超然吾所謂賢而與之逰者也此二人者既以其所學自脫於世之淫濁而又皆有聰明辨智之材故吾樂以其所得者間語焉與之遊忘日月之多也璉嘗謂余曰吾徒有善因者得屋於漣水之城中而得吾所謂經者五千四十八卷於京師歸市匭而藏諸屋將求能文者為之書其經藏者之嵗時而以子之愛我也故使其徒來屬能為我强記之乎善因者蓋嘗為屋於漣水之城中而因瑞新以求豫記其嵗時豫辭而不許者也於是問其藏經之日某年月日也夫以二人者與余逰而善因屬我之勤豈有他哉其不可以終辭乃為之書而并告之所以書之意使鑱諸石唐宋八大家文鈔卷八十八
