body:
  text: 唐宋八大家文鈔卷一百四十四明茅坤撰東坡文鈔二十八説賦祭文雜著稼説送張琥歸本於學有見曷嘗觀於富人之稼乎其田美而多其食足而有餘其田美而多則可以更休而地力得完其食足而有餘則種之常不後時而斂之常及其熟故富人之稼常美少秕而多實久藏而不腐今吾十口之家而共百畝之田寸寸而取之日夜以望之鋤耰銍艾相尋於其上者如魚鱗而地力竭矣種之常不及時而斂之常不待其熟此豈能復有美稼哉古之人其才非有以大過今之人也其平居所以自養而不敢輕用以待其成者閔閔焉如嬰兒之望長也弱者養之以至於剛虛者養之以至於充三十而後仕五十而後爵信於久屈之中而用於至足之後流於既溢之餘而發於持滿之末古之人所以大過人而今之君子所以不及也吾少也有志於學不幸而早得與吾子同年吾子之得亦不可謂不早也吾今雖欲自以為不足而衆且妄推之矣嗚呼吾子其去此而務學也哉博觀而約取厚積而薄發吾告子止於此矣子歸過京師而問焉有曰轍子由者吾弟也其亦以是語之剛説公晚年厯世故多故為言如此孔子曰剛毅木訥近仁又曰巧言令色鮮矣仁所好夫剛者非好其剛也好其仁也所惡夫佞者非惡其佞也惡其不仁也吾平生多難常以身試之凡免我於厄者皆平日可畏人也擠我於嶮者皆異時可喜人也吾是以知剛者之必仁佞者之必不仁也建中靖國之初吾自海南見故人問存沒追論平生所見剛者或不幸死矣若孫君介夫諱立節者真可謂剛者也始吾弟子由為條例司屬官以議不合引去王荆公謂君曰吾條例司當得開敏如子者君笑曰公過矣當求勝我者若我輩人則亦不肻為條例司矣公不答徑起入户君亦趨出君為鎮江軍書記吾時通守錢塘往來常潤間見君京口方新法之初監司皆新進少年馭吏如束濕不復以禮遇士大夫而獨敬憚君曰是抗丞相不宜為條例司者謝麟經制溪洞事宜州守王竒與蠻戰死君為桂州節度判官被旨鞫吏士有罪者麟因收大小使臣十二人付君并按且盡斬之君持不可麟以語侵君君曰獄當論情吏當守法逗撓不進諸將罪也既伏其辜矣餘人可盡戮乎若必欲以非法斬人則經制司自為之我何與焉麟奏君抗拒君亦奏麟侵獄事刑部定如君言十二人皆不死或以遷官吾以是益知剛者之必仁也不仁而能以一言活十二人於必死乎方孔子時可謂多君子而曰未見剛者以明其難得如此而世乃曰大剛則折士患不剛耳長養成就猶恐不足當憂其太剛而懼之以折耶折不折天也非剛之罪為此論者鄙夫患失者也君平生可紀者甚多獨書此二事遺其子協勴明剛者之必仁以信孔子之説前赤壁賦豫嘗謂東坡文章仙也讀此二賦令人有遺世之想壬戌之秋七月既望蘇子與客泛舟遊於赤壁之下清風徐來水波不興舉酒屬客誦明月之詩歌窈窕之章少焉月出於東方之上徘徊於斗牛之間白露橫江水光接天縱一葦之所如凌萬傾之茫然浩浩乎如馮虛御風而不知其所止飄飄乎如遺世獨立羽化而登仙於是飲酒樂甚扣舷而歌之歌曰桂棹兮蘭槳擊空明兮泝流光渺渺兮豫懷望美人兮天一方客有吹洞簫者倚歌而和之其聲嗚嗚然如怨如慕如泣如訴餘音嫋嫋不絶如縷舞幽壑之潛蛟泣孤舟之嫠婦蘇子愀然正襟危坐而問客曰何為其然也客曰月明星稀烏鵲南飛此非曹孟德之詩乎西望夏口東望武昌山川相繆鬱乎蒼蒼此非孟德之困於周郎者乎方其破荆州下江陵順流而東也舳艫千里旌旗蔽空釃酒臨江橫槊賦詩固一世之雄也而今安在哉况吾與子漁樵於江渚之上侣魚蝦而友麋鹿駕一葉之扁舟舉匏尊以相屬寄蜉蝣於天地渺滄海之一粟哀吾生之須臾羡長江之無窮挾飛仙以遨遊抱明月而長終知不可乎驟得託遺響於悲風蘇子曰客亦知夫水與月乎逝者如斯而未嘗往也盈虛者如彼而卒莫消長也蓋將自其變者而觀之則天地曽不能以一瞬自其不變者而觀之則物與我皆無盡也而又何羡乎且夫天地之間物各有主茍非吾之所有雖一毫而莫取惟江上之清風與山間之明月耳得之而為聲目遇之而成色取之無禁用之不竭是造物之無盡藏也而吾與子之所共適客喜而笑洗盞更酌殽核既盡杯盤狼籍相與枕籍乎舟中不知東方之既白後赤壁賦蕭瑟是嵗十月之望步自雪堂將歸于臨臯二客從豫過黃泥之坂霜露既降木葉盡脫人影在地仰見明月顧而樂之行歌相答已而歎曰有客無酒有酒無肴月白風清如此良夜何客曰今者薄暮舉網得魚巨口細鱗狀似松江之鱸顧安所得酒乎歸而謀諸婦婦曰我有斗酒藏之久矣以待子不時之需於是携酒與魚復遊於赤壁之下江流有聲斷岸千尺山髙月小水落石出曽日月之幾何而江山不可復識矣豫乃攝衣而上履巉巖披蒙茸踞虎豹登虬龍攀栖鶻之危巢俯馮夷之幽宫蓋二客不能從焉劃然長嘯草木震動山鳴谷應風起水湧豫亦悄然而悲肅然而恐凛乎其不可留也反而登舟放乎中流聽其所止而休焉時夜將半四顧寂寥適有孤鶴橫江東來翅如車輪玄裳縞衣戞然長鳴掠豫舟而西也須臾客去豫亦就睡夢一道士羽衣翩躚過臨臯之下揖豫而言曰赤壁之逰樂乎問其姓名俯而不答嗚呼噫嘻我知之矣疇昔之夜飛鳴而過我者非子也耶道士顧笑豫亦驚悟開户視之不見其處祭歐陽文忠公文歐陽文忠公知子瞻最深而子瞻為此文以祭之涕入九原矣嗚呼哀哉公之生於世六十有六年民有父母國有耆龜斯文有傳學者有師君子有所恃而不恐小人有所畏而不為譬如大川喬嶽不見其運動而功利之及於物者蓋不可以數計而周知今公之沒也赤子無所仰芘朝廷無所稽疑斯文化為異端而學者至於用夷君子以為無為為善而小人沛然自以為得時譬如深淵大澤龍亡而虎逝則變怪雜出舞鰌鱓而號狐狸昔其未用也天下以為病而其既用也則又以為遲及其釋位而去也莫不冀其復用至其請老而歸也莫不惆悵失望而猶庶幾於萬一者幸公之未衰孰謂公無復有意於斯世也奄一去而莫豫追豈厭世溷濁潔身而逝乎將民之無祿而天莫之遺昔我先君懷寶遁世非公則莫能致而不肖無狀因緣出入受教於門下者十有六年於兹聞公之喪義當匍匐往救而懷祿不去愧古人以忸怩緘詞千里以寓一哀而巳矣蓋上以為天下慟而下以哭其私嗚呼哀哉尚享祭魏國韓令公文韓公祭文當時第一天生元聖必作之配有神司之不約而會既生堯舜禹稷自至仁宗龍飛公舉進士妙齡秀發秉筆入侍公於是時仲舒賈誼方將登庸盜起西夏四方騷然帝用不赦授公鈇鉞往督西旅公於是時方叔召虎入贊兵政出殿大邦恩威並行春雨秋霜兵練民安四夷屈降公於是時臨淮汾陽帝在明堂欲行王政羣后奏功罔底于成召自北方付之樞衡公於是時蕭曹魏邴二帝山陵天下悸惱呼吸之間有雷有風有存有亡有兵有戎公於是時伊尹周公功成而退三鎮偃息天下嗷然曷日而復畢公在外心在王室房公且死征遼是恤嗚呼哀哉六月甲寅人之無祿喪我宗臣我有黎民誰與教之我有子孫誰與保之巍巍堂堂寧復有之公之云亡我無日矣慟哭流涕何嗟及矣昔我先子沒於東京公為二詩以祖其行文追典誥論極皇王公言一出孰敢改評施及不肖待以國士非我自知公實見謂父子昆弟並出公門公不責報我豈懷恩惟此涕泣實哀斯人有肉在俎有酒在樽公歸在天寧聞我言嗚呼哀哉問養生近有道者之言余問養生於吳子得二言焉曰和曰安何謂和曰子不見天地之為寒暑乎寒暑之極至於折膠流金而物不以為病其變者微也寒暑之變晝與日俱逝夜與月並馳俯仰之間屢變而人不知者微之至和之極也使此二極者相尋而狎至則人之死久矣何謂安曰吾嘗自牢山浮海達於淮遇大風焉舟中之人如附於桔橰而與之上下如蹈車輪而行反逆眩亂不可止而吾飲食起居如他日吾非有異術也惟莫與之爭而聽其所為故凡病我者舉非物也食中有蛆人之見者必嘔也其不見而食者未嘗嘔也請察其所從生論八珍者必咽言糞穢者必唾二者未嘗與我接也唾與咽何從生哉果生於物乎果生于我乎知其生于我也則雖與之接而不變安之至也安則物之感我者輕和則我之應物者順外輕內順而生理備矣吳子古之靜者也其觀於物也審矣是以私識其言而時省觀焉日喻公之以文點化人如佛家參禪妙解生而眇者不識日問之有目者或告之曰日之狀如銅槃扣槃而得其聲他日聞鐘以為日也或告之曰日之光如燭捫燭而得其形他日揣籥以為日也日之與鐘籥亦逺矣而眇者不知其異以其未嘗見而求之人也道之難見也甚於日而人之未達也無以異於眇達者告之雖有巧譬善導亦無以過於槃與燭也自槃而之鐘自燭而之籥轉而相之豈有既乎故世之言道者或即其所見而名之或莫之見而意之皆求道之過也然則道卒不可求歟蘇子曰道可致而不可求何謂致孫武曰善戰者致人不致於人孔子曰百工居肆以成其事君子學以致其道莫之求而自至斯以為致也歟南方多沒人日與水居也七嵗而能涉十嵗而能浮十五而能沒矣夫沒者豈茍然哉必將有得於水之道者日與水居則十五而得其道生不識水則雖壯見舟而畏之故北方之勇者問於沒人而求其所以沒以其言試之河未有不溺者也故凡不學而務求道皆北方之學沒者也昔者以聲律取士士雜學而不志於道今也以經術取士士知求道而不務學渤海吳君彥律有志於學者也方求舉於禮部作日喻以告之明正送于伋失官東歸世俗之患患在悲樂不以其正非不以其正其所取以為正者非也請借子以明其正子之失官有為子悲如子之自悲者乎有如子之父兄妻子之為子悲者乎子之所以悲者惑於得也父兄妻子之所以悲者惑於愛也惟不與於已者則不惑亦不悲夫惑則悲不惑則不悲人宜以惑者為正歟抑將以不惑者為正歟以不惑者為正則不悲者正也然子亦有所樂者曰吾之所以為吾者豈以是哉雖失是其所以為吾者猶存則吾猶可樂焉已而不樂又從而悲之則亦不忍夫天下之凡愛我者之悲而不釋夫天下之凡惡我者之喜也夫愛我而悲惡我而喜是知我之粗也樂其所以為吾者存是自知之深也人不以自知之深為正而以知我之粗者為正是得為正也歟故吾願為子言其正子將終身樂而不悲詩云優哉遊哉聊以卒嵗太息送秦少章竒偉之氣不可遏孔北海與曹公論盛孝章云孝章實丈夫之雄者也遊談之士依以成聲今之少年喜謗前輩或譏評孝章孝章要為有天下重名九牧之人所共稱歎吾讀至此未嘗不廢書太息也曰嗟乎英偉竒逸之士不容於世俗也久矣雖然自今觀之孔北海盛孝章猶在世而向之譏評者與草木同腐久矣昔吾舉進士試於禮部歐陽文忠公見吾文曰此我輩人也吾當避之方是時士以剽裂為文聚而見訕且訕公者所在成市曽未數年忽焉若潦水之歸壑無復見一人者此豈復待後世哉今吾衰老廢學自視缺然而天下之士不吾棄以為可以與於斯文者猶以文忠公之故也張文潛秦少遊此兩人者士之超逸絶塵者也非獨吾云爾二三子亦自以為莫及也士駭於所未聞不能無異同故紛紛之言常及吾與二子吾䇿之審矣士如良金美玉市有定價豈可以愛憎口舌貴賤之歟少遊之弟少章復從吾遊不及期年而論議日新若將施於用者欲歸省其親且不忍去嗚呼子行矣歸而求諸兄吾何加焉作太息一篇以餞其行使藏于家三年然後出之藥誦多曠達之旨從徙南海得之嵇中散作幽憤詩知不免矣而卒章乃曰采薇山阿散髮巖岫永嘯長吟頤性養夀者悼此志之不遂也司馬景王既殺中散而悔使悔於未殺之前中散得免於死者吾知其掃迹滅景於人間如脫兔之投林也采薇散髮豈其所難哉孫真人著大風惡疾論曰神仙傳有數十人皆因惡疾而得仙道何者割棄塵纍懷潁陽之風所以因禍而取福也吾始得罪遷嶺表不自意全既逾年無後命知不死矣然舊苦痔至是大作呻呼幾百日地無醫藥有亦不效道士教吾去滋味絶薰血以清淨勝之痔有蟲館於吾後滋味薰血既以自養亦以養蟲自今日以往旦夕食淡麵四兩猶復念食則以胡麻伏苓麨足之飲食之外不啖一物主人枯稿則客自棄去尚恐習性易流故取中散真人之言對病為藥使人誦之日三曰東坡居士汝忘逾年之憂百日之苦乎使汝不幸而有中散之禍伯牛之疾雖欲采薇散髮豈可得哉今食麻麥伏苓多矣居士則歌以答之曰事無事之事百事治兮味無味之味五味備兮伏苓麻麥有時而匱兮有則食無則已者與我無既兮嗚呼噫嘻館客不終以是為愧兮傳神得此解併可入文章矣傳神之難在目顧虎頭云傳形寫影都在阿睹中其次在顴頰吾嘗於燈下顧自見頰影使人就壁模之不作眉目見者皆大笑知其為吾也目與顴頰似餘無不似者眉與鼻口可以增減取似也傳神與相一道欲得其人之天法當於衆中隂察之今乃使人具衣冠坐注視一物彼方斂客自持豈復見其天乎凡人意思各有所在或在眉目或在鼻口虎頭云頰上加三毛覺精采殊勝則此人意思蓋在須頰間也優孟學孫叔敖抵掌談笑至使人謂死者復生此豈舉體皆似亦得其意思所在而已使畫者悟此理則人人可以為顧陸吾嘗見僧惟真畫曽魯公初不甚似一日往見公歸而喜甚日吾得之矣乃於眉後加三紋隱約可見作俯首仰視眉揚而頞蹙者遂大似南都程懷立衆稱其能於傳吾神大得其全懷立舉止如諸生蕭然有意於筆墨之外者也故以吾所聞助發云六一居士傳後本莊生齊物我見解而篇末類滑稽可愛蘇子曰居士可謂有道者也或曰居士非有道者也有道者無所挾而安居士之於五物捐世俗之所爭而拾其所棄者也烏得為有道乎蘇子曰不然挾五物而後安者惑也釋五物而後安者又惑也且物未始能纍人也軒裳圭組且不能為纍而况此五物乎物之所以能纍人者以吾有之也吾與物俱不得已而受形於天地之間其孰能有之而或者以為己有得之則喜喪之則悲今居士自謂六一是其身均與五物為一也不知其有物耶物有之也居士與物均為不能有其孰能置得喪於其間故曰居士可謂有道者也雖然自一觀五居士猶可見也與五為六居士不可見也居士殆將隱矣書黃子思詩集後公之詩不入詩家品題而其論詩處興味自遠豫嘗論書以謂鍾王之迹蕭散簡逺妙在筆畫之外至唐顔栁始集古今筆法而盡發之極書之變天下翕然以為宗師而鍾王之法益微至於詩亦然蘇李之天成曹劉之自得陶謝之超然蓋亦至矣而李太白杜子美以英瑋絶世之姿凌跨百代古今詩人盡廢然魏晉以來髙風絶塵亦少衰矣李杜之後詩人繼作雖間有逺韻而才不逮意獨韋應物栁宗元發纎穠於簡古寄至味於淡泊非餘子所及也唐末司空圖﨑嶇兵亂之間而詩文髙雅猶有承平之遺風其論詩曰梅止於酸鹽止於鹹飲食不可無鹽梅而其美常在鹹酸之外蓋自列其詩之有得於文字之表者二十四韻恨當時不識其妙豫三復其言而悲之閩人黃子思慶厯皇祐間號能文者子嘗聞前輩誦其詩每得佳句妙語反覆數四乃識其所謂信乎表聖之言美在鹹酸之外可以一唱而三歎也豫既與其子幾道其孫師是遊得窺其家集而子思篤行髙志為吏有異材見於墓志詳矣豫不復論獨評其詩如此唐宋八大家文鈔卷一百四十四
