body:
  text: 唐宋八大家文鈔卷二十五明茅坤撰柳州文鈔九說贊雜著天說類莊生之㫖韓愈謂柳子曰若知天之說乎吾為子言天之說今夫人有疾痛倦辱饑寒甚者因仰而呼天曰殘民者昌佑民者殃又仰而呼天曰何為使至此極戾也若是者舉不能知天夫果蓏飲食既壞蟲生之人之血氣敗逆壅底為癰瘍疣贅瘻痔蟲生之木朽而蝎中草腐而螢飛是豈不以壞而後出耶物壞蟲由之生元氣隂陽之壞人由之生蟲之生而物益壞食齧之攻穴之蟲之禍物也滋甚其有能去之者有功於物者也繁而息之者物之讐也人之壞元氣隂陽也亦滋甚墾原田伐山林鑿泉以井飲窽墓以送死而又穴為偃溲築為墻垣城郭臺榭觀遊疏為川瀆溝洫陂池燧木以燔革金以鎔陶甄琢磨悴然使天地萬物不得其情幸幸衝衝攻殘敗撓而未嘗息其為禍元氣隂陽也不甚於蟲之所為乎吾意有能殘斯人使日薄嵗削禍元氣隂陽者滋少是則有功於天地者也蕃而息之者天地之讐也今夫人舉不能知天故為是呼且怨也吾意天聞其呼且怨則有功者受賞必大矣其禍焉者受罰亦大矣子以吾言為何如栁子曰子誠有激而為是耶則信辨且美矣吾能終其說彼上而𤣥者世謂之天下而黃者世謂之地渾然而中處者世謂之元氣寒而暑者世謂之隂陽是雖大無異果蓏癰痔草木也假而有能去其攻穴者是物也其能有報乎蕃而息之者其能有怒乎天地大果蓏也元氣大癰痔也隂陽大草木也其烏能賞功而罰禍乎功者自功禍者自禍欲望其賞罰者大謬呼而怨欲望其哀且仁者愈大謬矣子而信子之仁義以遊其內生而死爾烏置存亡得喪於果蓏癰痔草木耶觀八駿圖說俊逸古之書有記周穆王馳八駿升崑崙之墟者後之好事者為之圖宋齊以下傳之觀其狀甚怪咸若騫若翔若龍鳳麒麟若螳螂然其書尤不經世多有然不足采世聞其駿也因以異形求之則其言聖人者亦類是矣故傳伏犧曰牛首女媧曰其形類蛇孔子如倛頭若是者甚衆孟子曰何以異於人哉堯舜與人同耳今夫馬者駕而乘之或一里而汗或十里而汗或千百里而不汗者視之毛物尾鬛四足而蹄齕草飲水一也推是而至於駿亦類也今夫人有不足為負販者有不足為吏者有不足為士大夫者有足為者視之圓首橫目食榖而飽肉絺而清裘而燠一也推進而至於聖亦類也然則伏犧氏女媧氏孔子氏是亦人而已矣驊騮白羲山子之類若果有之是亦馬而已矣又烏得為牛為蛇為倛頭為龍鳯麒麟螳螂然也哉然而世之慕駿者不求之馬而必是圖之似故終不能有得於駿也慕聖人者不求之人而必若牛若蛇若倛頭之問故終不能有得於聖人也誠使天下有是圖者舉而焚之則駿馬與聖人出矣捕蛇者說本孔子苛政猛於虎者之言而建此文永州之野産異蛇黑質而白章觸草木盡死以齧人無禦之者然得而臘之以為餌可以已大風攣踠瘻癘去死肌殺三蟲其始太醫以王命聚之嵗賦其二募有能捕之者當其租入永之人爭奔走焉有蔣氏者專其利三世矣問之則曰吾祖死於是吾父死於是今吾嗣為之十二年幾死者數矣言之貌若甚戚者余悲之且曰若毒之乎余將告於蒞事者更若役復若賦則何如蔣氏大戚汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不為斯役則久已病矣自吾氏三世居是鄉積於今六十嵗矣而鄉鄰之生日蹙殫其地之出竭其廬之入號呼而轉徙饑渴而頓踣觸風雨犯寒暑呼噓毒癘往往而死者相藉也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二三焉與吾居十二年者今其室十無四五焉非死則徙爾而吾以捕蛇獨存悍吏之來吾鄉呌囂乎東西隳突乎南北譁然而駭者雖雞狗不得寧焉吾恂恂而起視其缶而吾蛇尚存則弛然而卧謹食之時而獻焉退而甘食其土之有以盡吾齒蓋一嵗之犯死者二焉其餘則熙熙而樂豈若吾鄉鄰之旦旦有是哉今雖死乎此比吾鄉鄰之死則已後矣又安敢毒耶余聞而愈悲孔子曰苛政猛於虎也吾嘗疑乎是今以蔣氏觀之猶信嗚呼孰知賦斂之毒有甚是蛇者乎故為之說以俟夫觀人風者得焉鶻說柳子疾世之獲其利而復擠之死者故有是文亦可以刺世矣有鷙曰鶻者穴於長安薦福浮圖有年矣浮圖之人室宇於其下者伺之甚熟為余說之曰冬日之夕是鶻也必取鳥之盈握者完而致之以燠其爪掌左右而易之旦則執而上浮圖之跂焉縱之延其首以望極其所行往必背而去焉茍東矣則是日也不東逐南北亦然嗚呼孰謂爪吻毛翮之物而不為仁義器耶是固無號位爵祿之欲里閭親戚朋友之愛也出乎鷇卵而知攫食決裂之事爾不為其他凡食類之饑唯旦為甚今忍而釋之以有報也是不亦卓然有立者乎用其力而愛其死以忘其饑又遠而違之非仁義之道耶恆其道一其志不欺其心斯固世之所難得也余又疾夫今之說曰以喣喣而默徐徐而俯者善之徒以翹翹而厲炳炳而白者暴之徒今夫梟鵂晦於晝而神於夜鼠不穴寢廟循牆而走是不近於喣喣者耶今夫鶻其立躍然其動􅒂然其視的然其鳴革然是不近於翹翹者耶由是而觀其所為則今之說為未得也孰若鶻者吾願從之毛耶翮耶胡不我施寂寥泰清樂以忘饑說車贈楊誨之子厚之文多峻峭鑱巖而骨理特深楊誨之將行栁子起而送之門有車過焉指焉而告之曰若知是之所以任重而行於世乎材良而器攻圓其外而方其中然也材而不良則速壞工之為功也不攻則速敗中不方則不能以載外不圓則窒拒而滯方之所謂者箱也圓之所謂者輪也匪箱不居匪輪不塗吾子其務法焉者乎曰然曰是一車之說也非衆車之說也吾將告子乎衆車之說澤而杼山而侔上而輊下而軒且曵祥而曠左革而長轂以㦸巢焉而以望安以愛老輜以蔽內垂綏而以畋載十二旒而以廟以郊以陳於庭其類衆也然而其要存乎材良而器攻圓其外而方其中也是故任而安之者箱達而行之者輪恆中者軸挶而固者蚤長而撓進不罪乎馬退不罪乎人者轅却暑與雨者蓋敬而可伏者軾服而制者馬若牛然後衆車之用具今楊氏仁義之林也其産材良誨之學古道為古辭冲然而有光其為工也攻果能恢其量若箱周而通之若輪守大中以動乎外而不變乎內若軸攝之以剛健若蚤引馬而且御乎物若轅髙以逺乎汚若蓋下以成乎禮若軾險而安易而利動而法則庶乎車之全也詩之言曰駟牡騑騑六轡如琴孔氏語曰左為六官右為執法此其以達於大政也凡人之質不良莫能方且恆質良矣用不周莫能以圓遂孔子於鄉黨恂恂如也遇陽虎必曰諾而其在夾谷也視叱齊侯類蓄狗不震乎其內後之學孔子者不志於是則吾無望焉耳矣誨之吾戚也長而益良方其中矣吾固欲其任重而行於世懼圓其外者未至故說車以贈伊尹五就桀贊尹之五就桀處尹知之吾不能言之然而子厚揣摩亦綽有入思緻處伊尹五就桀或疑曰湯之仁聞且見矣桀之不仁聞且見矣夫胡去就之亟也柳子曰惡是吾所以見伊尹之大者也彼伊尹聖人也聖人出於天下不夏商其心心乎生民而已曰孰能由吾言由吾言者為堯舜而吾生人堯舜人矣退而思曰湯誠仁其功遲桀誠不仁朝吾從而暮及於天下可也於是就桀桀果不可得反而從湯既而又思曰尚可十一乎使斯人蚤被其澤也又往就桀桀不可而又從湯以至於百一千一萬一卒不可乃相湯伐桀俾湯為堯舜而人為堯舜之人是吾所以見伊尹之大者也仁至於湯矣四去之不仁至於桀矣五就之大人之欲速其功如此不然湯桀之辨一恆人盡之矣又奚以憧憧聖人之足觀乎吾觀聖人之急生人莫若伊尹伊尹之大莫若於五就桀作伊尹五就桀贊聖有伊尹思德於民往歸湯之仁曰仁則仁矣非久不親退思其速之道宜夏是因就焉不可復反亳殷猶不忍其遲亟往以觀庶狂作聖一日勝殘至千萬兾一卒無其端五往不疲其心乃安遂升自陑黜桀尊湯遺民以完大人無形與道為偶道之為大為人父母大矣伊尹惟聖之首既得其仁猶病其久恆人所疑我之所大嗚呼遠哉志以為誨讀韓愈所著毛穎傳後題子厚深服昌黎故其題如此亦其讓能之一端也自吾居夷不與中州人通書有來南者時言韓愈為毛穎傳不能舉其辭而獨大笑以為怪而吾久不克見楊子誨之來始持其書索而讀之若捕龍蛇摶虎豹急與之角而力不敢暇信韓子之怪於文也世之模擬竄竊取青嫓白肥皮厚肉柔斤脆骨而以為辭者之讀之也其大笑固宜且世人笑之也不以其俳乎而俳又非聖人之所棄若詩曰善戲謔兮不為虐兮太史公書有滑稽列傳皆取乎有益於世者也故學者終日討說答問呻吟習復應對進退掬溜播灑則罷憊而廢亂故有息焉游焉之說不學操縵不能安絃有所拘者有所縱也大羮𤣥酒體節之薦味之至者而又設以竒異小蟲水草櫨梨橘柚苦鹹酸辛雖蜇吻裂鼻縮舌澀齒而咸有篤好之者文王之昌蒲葅屈到之芰曾晳之羊棗然後盡天下之竒味以足於口獨文異乎韓子之為也亦將弛焉而不為虐歟息焉游焉而有所縱歟盡六藝之竒味以足其口歟而不若是則韓子之辭若壅大川焉其必決而放諸陸不可以不陳也且凡古今是非六藝百家大細穿穴用而不遺者毛穎之功也韓子窮古書好斯文嘉頴之能盡其意故奮而為之傳以發其鬱積而學者得之勵其有益於世歟是其言也固與異世者語而貪常嗜瑣者猶呫呫然動其喙亦勞甚矣乎晉問即漢魏以來七之遺也然所見不逺姑存之以見子厚詞賦之麗云吳子問於柳先生曰先生晉人也晉之故宜知之曰然然則吾願聞之可乎曰可晉之故封太行掎之首陽起之黃河迤之大陸靡之或巍而髙或呀而淵景霍汾澮以經其壖若化若遷鉤嬰蟬聯然後融為平川而侯之都居大夫之邑建焉其高壯則騰突撐拒聱岈鬱怒若熊羆之咆虎豹之嘷終古而不去攫秦搏齊當者失據燕狄惴怯若卵就壓振振業業覷關蹀户惕若僕妾其按衍則平盈旋緣紆徐夷延若飛䳒之翔舞洄水之容與以稼則碩以植則茂以牧則蕃以畜則庶而人用是富而邦以之阜其河則濬源崑崙入於天淵出乎無門行乎無垠自丐奴而南以介西鄙衝奔太華運肘東指混潰后土濆濁麋沸黿鼉詭怪于于汨汨騰倒䭿越委泊涯涘呀呷欱納摧雜失墜其所蕩激則連山參差廣野壞裂轟雷努風撼􅟀于􅡴崩石之所轉躍大水之所擢拔漰泙洞踏者彌數千里若萬夫之斬伐而其軸轤之所負橦檣之所御鱗川林壑隳雲遁雨瞬目而下者榛榛沄沄百舍一赴若是何如吳子曰先生之言豐厚險固誠晉之美矣然晉人之言表裏山河者備敗而已非以為榮觀顯大也吳起所謂在德不在險皆晉人之藉也願聞其他先生曰大鹵之金棠溪之工火化水淬器備以充為棘為矛為鎩為鈎為鏑為鏃為槊為鍭出太白徵蓐收召招搖伏蚩尤肅肅褷褷合衆靈而成之博者狹者曲者直者歧者徑者長者短者攢之如星奮之如霆運之如縈浩浩奕奕淋淋滌滌熒熒的的若雪山氷谷之積觀者膽掉目出寒液當空發耀英精互繞晃蕩洞射天氣盡白日規為小鑠雲破霄跕墜飛鳥弓人之弓函人之甲膠角百選犀兕七屬乃使跟超掖夾之倫服而持之南瞰諸華北讋羣夷技擊節制聞於天下是為善師延目而望之固以拳拘喘汗免胄肉袒進不敢降退不敢竄若是何如吳子曰夫兵之用由德則吉由暴則凶是又不可為美觀也先軫曰師直為壯曲為老况徒以堅甲利創之為上哉先生曰晉國多馬屈焉是産土塞氣徑崖坼谷裂草木短縮鳥獸墜匿而馬蕃焉師師兟兟溶溶紜紜轠轠轔轔或赤或黃或𤣥或蒼或醇或駹黭然而隂炳然而陽若旌旃旗幟之煌煌乍進乍止乍伏乍起乍奔乍躓若江漢之水疾風驅濤擊山蕩壑雲沸而不止羣飲源槁回食野赭浴川蹙浪噴震播灑漬漬焉若海神駕雪而來下觀其四散惝恍開合萬狀喜者鵲厲怒者人搏決然坌躍千里相角風騣霧鬛斸山抉壑耳搖層雲腹梢衆木寂寥逺游不久而復攫地跳梁堅骨蘭筋交頸互齧鬭目相馴聚溲更虛昻首張齗其小者則連牽繳繞仰乳俯齕蟻雜螽集啾啾潗潗旅走叢立其材之可者收斂攻教掉手飛縻指毛命物百步就羈牽以荀息御以王良超以范鞅軒以欒針以佃以戎獸獲敵摧若是何如吳子曰恃險與馬者子不聞乎故曰冀之北土馬之所生是不一姓請置此而新其說先生曰晉之北山有異材梓匠工師之為宫室求大木者天下皆歸焉仲冬既至寒氣凝成外凋內貞瀋液不行乃堅乃良萬工舉斧以入必求諸巖崖之欹傾澗壑之紆縈凌巑岏之杪顚潄泉源之淦瀯根絞怪石不土而植千尋百圍與石同色羅列而伐者頭抗河漢刃披虹霓聲振連巒柿填層溪丁丁登登硠硠稜稜若兵車之乘凌其響之所應則潰潰漰漰洶洶薨薨若騫若崩若螭龍之鬭風霆相騰其殊而下者札􅡴捎殺摧崒坱圠霞披電裂又似共工觸不周而天柱折鵾鸛鶖鶬號鳴飛翔貙犴虎兕奔觸讋栗伏無所入遁無所脫然後斷度收羅捎危顚芟繁柯乘水潦之波以入於河而流焉蕩突硉兀轉騰冒沒類秦神驅石以梁大海抵曲鱗蹙匯流雷解前者汨越後者迫隘乃下夫龍門之懸水摺拉頽踏捽首軒尾澒入重淵不知其幾百里也濤波之旋滔山觸天既渟既平彌望悠焉良久乃始昂屹涌溢挺拔而出林立峰崒穿雲蔽日渙然自撓復就行列渾渾而去以至其所唯良工之指顧叢臺阿房長樂未央建章昭陽之隆麗詭特皆是之自出若是何如吳子曰吾聞君子患無德不患無土患無土不患無人患無人不患無宫室患無宫室不患材之不已有先生之所陳四纍之下也且虒祁既成諸侯叛之先生曰河魚之大上迎濤波羅壅津涯千里雷馳重馬輕車遂以君命矢而縱觀焉大罟斷流修網亘山罩罶䍡罣織絍其間巨舟軒昻仡仡回環水師更呼聲裂商顔於是鼓噪㳫集而從之扼龍吭拔鯨鰭戮白黿逐毒螭叱馮夷立水湄搜攪流離掬縮推移梁㑹網蹙騰天彌圍掉躃擁踴以登夫歷山之垂如川之歸如山之摧如雲之披其有乘化㑹神振拔漣淪摛竒文出怪鱗騰飛濤而上逸生雷電於龍門者猶仰綸飛繳頓踏而取之莫不脫角裂翼呀嚇匍匐復就臠切莫保龍籍具糅五味布列雕俎風雲失勢沮散遠去若夫鯊鱨鮪鯉鰋鱧魴鱮之瑣屑蔑裂者夫固不足悉數漏脫紘目養之水府而三河之人則已填溢饜飫腥膏舄鹵聞膾炙之美則掩鼻蹙頞賤甚糞土而莫顧者也若是何如吳子曰一時之觀不足以夸後世口舌之味不足以利百姓姑欲聞其上者先生曰猗氏之鹽晉寶之大也人之賴之與榖同化若神造非人力之功也但至其所則見溝塍畦畹之交錯輪囷若稼若圃敞兮勻勻渙兮鱗鱗邐瀰紛屬不知其垠俄然決源釃流交灌互澍若枝若股委曲延布脉寫膏浸潗濕滑汨彌高掩庳漫壠冒塊決決沒沒遠近混㑹抵值堤防瀴瀛沛濊偃然成淵漭然成川觀之者徒見浩浩之水而莫知其以及神液隂漉甘鹵密起孕靈富媼不愛其美無聲無形熛結迅詭回眸一瞬積雪百里皛皛羃羃奮僨離析煆圭椎璧眩轉的皪乍似隕星及地明滅相射氷裂雹碎巃嵸增益大者印纍小者珠剖涌者如坻坳者如缶日晶熠煜螢駭電走亘步盈車方尺數斗於是裒斂合集舉而堆之皓皓乎懸圃之巍巍皎乎溔乎狂山太白之淋漓駭化變之神竒卒不可推也然後驢騾牛馬之運西出秦隴南過樊鄧北極燕代東逾周宋家獲作鹽之利人被六氣之用和鈞兵食以征以貢其賚天下也與海分功可謂有濟矣若是何如吳子曰魏絳之言曰近寶則公室乃貧豈謂是耶雖然此可以利民矣而未為民利也先生曰願聞民利吳子曰安其常而得所欲服其教而便於已百貨通行而不知所自來老幼親戚相保而無德之者不苦兵刑不疾賦力所謂民利民自利者是也先生曰文公之霸也援秦破楚囊括齊宋曹衛解裂魯鄭震恐定周於溫奉冊受錫夾輔糾逖以為侯伯齊盟踐土低昻玉帛天子恃焉以有諸侯諸侯恃焉以有其國百姓恃焉以有其妻子而食其力叛者力取附者仁撫推德義立信讓示必行明所嚮逹禁止一好尚春秋之事公侯大夫䇿文馬馳軒車出入環連貫於國都則有五筵之堂九几之室大小定位左右有秩禽牢餼饋交錯文質響有嘉樂宴有庭實登降好賦犧象畢出犒勞贈賄率禮無失六卿理兵大戎小戎鐘鼓丁寧以討不恭車埓萬乘卒半天下鼓之則震斾之則畏其號令之動若水之源若輪之旋莫不如志當此之時咸能歡娛以奉其上故其民至於今好義而任力此以民力自固假仁義而用天下其遺風尚有存者若是可以為民利也乎吳子曰近之矣然猶未也彼霸者之為心也引大利以自嚮而摟他人之力以自為固而民乃後焉非不知而化不令而一異乎吾嚮之陳者故曰近之矣猶未也先生曰三河古帝王之更都焉而平陽堯之所理也有茅茨采椽土型之度故其人至於今儉嗇有溫恭克讓之德故其人至於今善讓有師錫僉曰疇咨之道故其人至於今好謀而深有百獸率舞鳳凰來儀於變時雍之美故其人至於今和而不怒有昌言警戒之訓故其人至於今憂思而畏禍有無為不言垂衣裳之化故其人至於今恬以愈此堯之遺風也願以聞於子何如吳子離席而立拱而言曰美矣善矣其蔑有加矣此固吾之所欲聞也夫儉則財用足而不淫讓則遵分而進善其道不鬬謀則通於逺而周於事和則仁之質戒則義之實恬以愈則安而久於其道也至乎哉今主上方致太平動以堯為凖先生之言道之奧者若果有貢於上則吾知其易易焉也舉晉國之風以一諸天下如斯而巳矣敬再拜受賜唐宋八大家文鈔卷二十五
