body:
  text: 唐宋八大家文鈔卷二十七明茅坤撰柳州文鈔十一碑豫覽子厚之文其議論處多鑱畫其記山水處多幽邃夷曠至於墓志碑碣其為御史及禮部員外時所作多㳂六朝之遺豫不録録其貶永州司馬以後稍屬雋永者凡若干首以見其風概云然不如昌黎多矣柳州文宣王新修廟碑仲尼之道與王化逺邇惟栁州古為南夷椎髻卉裳攻劫鬬暴雖唐虞之仁不能柔秦漢之勇不能威至於有國始循法度置吏奉貢咸若采衛冠帶憲令進用文事學者道堯舜孔子如取諸左右執經書引仁義旋辟唯諾中州之士時或病焉然後知唐之德大以遐孔氏之道尊而明元和十年八月州之廟屋壞幾毁神位刺史栁宗元始至大懼不任以墜教基丁未奠薦法齊時事禮不克施乃合初亞終獻三官衣布洎於贏財取土木金石徵工僦功完舊益新十月乙丑王宫正室成乃安神棲乃正法庭祗㑹羣吏卜日之吉䖍告於王靈曰昔者夫子嘗欲居九夷其時門人猶有惑聖言今夫子代千有餘載其教始行至於是邦人去其陋而本於儒孝父忠君言及禮義又况巍然炳然臨而炙之乎惟夫子以神道設教我今罔敢知欽若兹教以寧其神追思告誨如在於前茍神之在曷敢不䖍居而無陋罔二昔言申陳嚴祀永永是尊麗牲有碑刻在廟門箕子碑總只是謝枋得所摘數言為妙解凡大人之道有三一曰正䝉難二曰法授聖三曰化及民殷有仁人曰箕子實具兹道以立於世故孔子述六經之㫖尤殷勤焉當紂之時大道悖亂天威之動不能戒聖人之言無所用進死以併命誠仁矣無益吾祀故不為委身以存祀誠仁矣與亡吾國故不忍具是二道有行之者矣是用保其明哲與之俯仰晦是謨範辱於囚奴昏而無邪隤而不息故在易曰箕子之明夷正䝉難也及天命既改生人以正乃出大法用為聖師周人得以序彛倫而立大典故在書曰以箕子歸作洪範法授聖也及封朝鮮推道訓俗惟德無陋惟人無逺用廣殷祀俾夷為華化及民也率是大道藂於厥躬天地變化我得其正其大人歟於呼當其周時未至殷祀未殄比干已死微子已去向使紂惡未稔而自斃武庚念亂以圖存國無其人誰與興理是固人事之或然者也然則先生隱忍而為此其有志於斯乎唐某年作廟汲郡嵗時致祀嘉先生獨列於易象作是頌云䝉難以正授聖以謨宗祀用繁夷民其蘇憲憲大人顯晦不渝聖人之仁道合隆汙明哲在躬不陋為奴冲讓居禮不盈稱孤高而無危卑不可踰非死非去有懷故都時詘而伸卒為世模易象是列文王為徒大明宣昭崇祀式孚古闕頌辭繼在後儒武岡銘并序諸銘中此篇似優元和七年四月黔巫東鄙蠻獠雜擾盜弄庫兵賊脅守帥南鈎牂牁外誘西原置魁立帥殺牲盟誓洞窟林麓嘯呼成羣皇帝下銅獸符發庸蜀荆漢南越東甌之師四面討問畏罪慿阻逃道不即誅時惟潭部戎帥御史中丞栁公綽練立將校提卒五百屯於武岡不震不騫如山如林告天子威命明白信順亂人大恐視公之師如百萬視公之令如風雷怨號呻吟喜有攸訴投刃頓伏願完父子卒為忠信奉職輸賦進比華人無敢不龔母弟生壻繼來於潭咸致天廷皇帝休嘉式新厥命凶渠同惡革靣向化如醉之醒如狂之寧公為藥石俾復其性詔書顯異進臨江漢益兵三倍為時碩臣殿於大邦文儒申申有此武功於是夷人始復聞公之去相與高蹈涕呼若寒去裘昔公不夸首級為已能力専務教誨俾邦斯平我老洎幼由公之仁小不為虺蜮大不為鯨鯢恩重事特不邇而遠莫可追已願銘武岡首以慰我思以昭我類以示我子孫彌億萬年俾我奉國如令之誠鄰之我懷如公之勤其辭曰黔山之巑巫水之磻魚駭而離獸犯而殘戶恐谷竄披攘仍亂王師來誅斯死以緩公明不疑公信不欺援師定命俾邦克正皇仁天施我反其性我塗四闔公示之門我愚抵死公示之恩既骨而完既亡而存奉公之訓貽我子孫我始蝥賊由公而仁我始寇讎由公而親山畋澤􅘋輸賦於都陶穴刋木室我姻族烹牲是祀公受介福揲蓍以占公宜百祿皇懋公功陟於大邦逺哉去我誰嗣其良有穴之丹有犀之顚匪曰余固公不可賂祝鄰之德恆遵公則朂余之世永謹邦制南夷作詩刻示來裔覃李子墓銘跌宕覃季子其人生愛書貧甚尤介特不茍受施讀經傳言其說數家推太史公班固書下到今橫堅鈎貫又且數十家通為書號覃子史纂又取鬻老管莊子思晏孟下到今其術自儒墨名法至於狗彘草木凡有益於世者為子纂又百有若干家篤於聞不以仕為事黜陟使取其書以氏名聞除太子挍書某年月日死永州祁陽縣某鄉將死歎曰寧有聞而窮乎將無聞而豐乎寧介而躓乎將溷而遂乎葬其鄉後若干年栁先生來永州戚其文不大於世求其墓以石銘銘曰困其獨豐其辱唐故中散大夫撿挍國子祭酒兼安南都護御史中丞充安南本管經略招討處置等使上柱國武城縣開國男食邑三百戶張公墓志銘并序漢光中興馬援雄絶域之志晉武一統陶璜布殊俗之恩理隨德成功與時竝今皇帝載新景命丕冒海隅時惟公祗復厥績交趾之理續於前人公諱某字某某郡人也曾祖彥師朝散大夫尚書駕部郎中祖瑾懷州武德縣令考清朝議郎試大理寺丞贈右贊善大夫咸有懿美積為餘慶公以忠肅循其中以文術昭於外推經㫖以飾吏事本法理以平人心始命蘄州蘄春主簿句㑹敏給厥聲顯揚仍以左領軍衛兵曹為安南經略巡官申固扞衛有聞彰徹轉金吾衛判官三歷御史績用𢎞大揚於天庭加檢挍尚書禮部員外郎換山南東道節度判官復轉郎中為安南副都護賜紫金魚袋充經略副使遷檢挍太子右庶子兼安南都護御史中丞充本管經略招討處置等使公自為吏習於海邦凡其比較勤勞利澤長久去之則夷獠稱亂復至而寇攘順化及受命専征得陳嘉謨誓拔禍本納於夷軌乃命一其貢奉平其斂施牧人盡區處之方制國備刑體之法道阻而通百貨地偏而具五人儲偫委積師旅無庚癸之呼繕完板幹控帶兼戊已之位文單環王怙力背義公於是陸聯長轂海合艨艟再舉而克殄其徒廓地數圻以歸於我理烏蠻酋帥負險蔑德公於是外申皇威旁逹明信一動而悉朝其長取州二十以被於華風易皮辨以冠帶化姦宄為誠敬皆用周禮率由漢儀公患浮海之役可濟可覆而無所恃乃刳連烏以闢坦途鬼工來并人力罕用沃日之大束成通溝摩霄之阻硩為髙岸而終古䝉利公患疆場之制一彼一此而不可常乃復銅柱為正制鼓鑄既施精堅是立固圉之下明若白黑易野之守險逾丘陵而萬世無虞竒琛良貨溢於玉府殊俗異類盈於藁街優詔纍旌其忠良太史嗣書其功烈就加國子祭酒封武城男食邑三百戶凡再䇿勳至上柱國三增秩至中散大夫某年月薨於位年若干天子震悼傷辭有加明年其孤某官與宗人號奉裳帷率其家老咨於叔父延唐令某卜宅於潭州某原葬用某月某日人謀皆從龜兆襲吉乃刻兹石著公之閥以志於丘竁以告於幽明銘曰周限荆衡秦開百粵交州之治炎劉是設德大來服道消自絶伏波南征漢威載烈宛陵北附晉政爰發我唐流澤光於有截皇帝中興武城授鉞肅肅武城惟夫之哲更歷毗贊顯揚彰徹既受休命秉兹峻節度其謀猷守以廉潔厚農薄征匪貉匪桀通商平貨有來胥悅踐山跨海堅其鶴列制器足兵潰兹蟻結鳥蠻屈服文單剪滅柔遠開疆㑹朝天闕銅柱乃復環山以硩海無遘忤寇罔踰越琛賮之獻周於窮髮帝嘉成德載旌茂閥增秩䇿勳土封斯裂位厄元侯年虧大耋邦人號呼夷裔悽咽卜葬長沙連岡啓穴書銘薦辭德音罔缺唐荆川曰備一格六朝體故襄陽丞趙君墓志事竒文亦竒古來絶調貞元十八年月日天水趙公矜年四十二客死於柳州官為欽葬於城北之野元和十三年孤來章始壯自襄州徒行求其葬不得徵書而名其人皆死無能知者來章日哭於野凡十九日惟人事之窮則庶於卜筮五月甲辰卜秦誗兆之曰金食其墨而火以貴其墓直丑在道之右南有貴臣冢土是守乙巳於野宜遇西人深目而髯其得實因七日發之乃覯其神明日求諸野有叟荷杖而東者問之曰是故趙丞兒耶吾為曹信是邇吾墓噫今則夷矣直社之北二百舉武吾為子蕝焉辛亥啓土有木焉發之緋衣緅衾凡自家之物皆在州之人皆為出涕誠來章之孝神付是叟以與龜偶不然其協焉如此哉六月某日就道月日葬於汝州龍城縣期城之原夫人河南源氏先沒而祔之矜之父曰漸南鄭尉祖曰倩之鄆州司馬曾祖曰𢎞安金紫光祿大夫國子祭酒始矜由明經為舞陽主簿蔡師反犯難來歸擢授襄城主簿賜緋魚袋後為襄陽丞其墓自曾祖以下皆族以位時宗元刺栁用相其事哀而旌之以銘銘曰誗也挈之信也蕝之有朱其紱神具列之懇懇來章神實恫汝錫之老叟告以兆語靈其鼓舞從而父祖孝斯有終宜福是與百越蓁蓁羈鬼相望有子而孝獨歸故鄉涕盈其銘旌爾勿忘柳州司馬孟公墓志銘氣岸鑱畫句亦淘洗孟氏之孤曰遵慶奉其父命書九篇為善狀一篇來告曰月日君薨月日將葬於某敢請刻辭嗚呼公自假左贊善大夫桓王司馬太常少卿為義成軍中軍兵馬使其帥魏國公耽為宰相命公左領軍衛將軍事德宗順宗今上立朝九年加朝議大夫居喪㑹用兵於趙起復居故官為左神䇿行營先鋒兵馬使知牙而趙兵罷不受祿去金革服喪終期命安州刺史仍加侍御史安州防遏兵馬使貶栁州司馬公嘗佐魏公平襄陽靖梁州立義成軍魏公𢎞大恢奇公能以任軍政是以又為衛將軍䖍恭潔廉動得禮節伐趙之役堅立堡壘誓死麾下法制明具權力無能移進不避患退不敗禮安州迫寇攘多戎事政出一切吏以文持之故貶明年用兵於蔡朝廷諸公洎外諸侯咸以公為請未及徵氣乘肺溢為水浮膚而卒年六十惟公志専於中貌嚴於外嘗立庭中毅然望之若圖形刻像聞國難輒不寢食謀度憤吒以故病不可治曾祖某官諱某祖某官諱某父某官諱某公之諱曰常謙子遵慶弟曰某銘曰魯仲孫氏其世為孟賁勇光武軻儒紹聖公傳師法以訓戎政執稽以庸咸致厥命濟濟於朝冕服以光墨非從利終役復喪忠孝孔明君子攸彰昔者雲中六級下吏公刺於安法亦可議黜伏南荒豪士歔欷聞難以激去食廢寐神乖氣離支膈莫遂廷臣進言侯伯拜章帝命將施俄仆於京代山丸丸植柏與松其名惟何忠孝孟公永州刺史崔君權厝志風神似可掬博陵崔君由進士入山南西道節度府始掌書記至府留後凡五徙職六增官至刑部員外郎出刺連永兩州未至永而連之人訴君御史按章具獄坐流歡州幼弟訟諸朝天子黜連帥罷御史小吏减死投之荒外而君不克復元和七年正月二十六日卒孤處道洎守訥奉君之喪踰海水不幸遇暴風二孤溺死七月某日柩至於永州八月甲子藁葬於社壝之北四百步崔氏世嗣文章君又益工博知古今事給數敏辨善謀畫南敗蜀虜西遏戎師其慮皆君之自出後餌五石病瘍且亂故不承於初今尚有五丈夫子夫人河東柳氏德碩行淑先崔君十年卒其葬在長安東南少陵北君以竄沒家又有海禍力不克祔三年將復故葬也徒志其一二大者云鯢為祖曄為父世文儒積彌厚簡其名子敬字年五十增以二葬湘澨非其地後三年辭當備故連州員外司馬凌君權厝志凌與子厚同以附和王伾叔文輩坐貶年月日尚書都官員外郎和州刺史連州司馬富春凌君諱凖卒於桂陽佛寺先是六月告於州刺史博陵崔君曰余嘗學黃帝書切脉視病今余肝伏以澀腎浮以代將不臘而死審矣凡余之學孔氏為忠孝禮信而事固大謬卒不能有立乎世者命也臣道無以明乎國子道無以成乎家下之得罪於人以謫徙醜地上之得罰於天以降被罪疾余無以禦也敢以鬼事為纍又告為老氏者某曰余生於辰今而寓乎戌辰戌衝也吾命與脉叶其死矣乎吾罪大懼不克歸柩於吾鄉是州之南有大岡不食吾甚樂焉子其以是葬吾及是咸如其言云孤夷仲求仲以其先人之善余也勤以志為請嗚呼君字宗一以孝悌聞於其鄉杭州刺史常召君以訓於下讀書為文章著漢後春秋二十餘萬言又著六經解圍又文集未就有謀略尚氣節賙人之急出貨力猶棄粃稗年二十以書干丞相丞相以聞試其文日萬言擢為崇文館挍書郎又以金吾兵曹為邠寧節度掌書記泚涇之亂以謀畫佐元戎常有大功纍加大理評事御史賜緋魚袋換節度判官轉殿中侍御史府喪罷職後遷侍御史為浙東廉使判官撫循罷人按驗汙吏吏人敬愛厥績以懋粹然而光聲聞於上召以為翰林學士德宗崩邇臣議祕三日乃下遺詔君獨抗危詞以語同列王伾畫其不可者十六七乃以旦日發喪六師萬姓安其分遂入為尚書郎仍以文章侍從由本官參度支調發出納姦利衰止以連纍出和州降連州居母喪不得歸而二弟繼死不食哭泣遂喪其明以沒蓋君之行事如此其報應如此夫人高氏在越孤四人南仲殷仲在夫人所未至執友河東栁宗元哀君有道而不明白於天下離愍逢尤夭其生且又同過故哭以為志其辭哀焉銘曰噫凌君生不淑學孔氏揚芬郁好謀謨富天祿讎禁書贊推轂觀靈龜獲貞卜徙東越翊明牧罷人蘇汙吏覆升侍從躬啓沃匡危疑興大福吏尚書徒𨽻肅佐經邦財用足道之躓身則辱烏江垂九疑麓仍禍凶遘兹酷能知命無怨毒罪不泯死猶僇何以葬南嶺曲魂有靈故鄉復封兹壤歸骨肉為之銘志陵谷大府李卿外婦馬淑志馬淑倡也按銘法此不當銘者而柳子銘之過矣然文特佳氏曰馬字曰淑生廣陵母曰劉客倡也淑之父曰總既孕而卒故淑為南康謳者李君為睦州詆狂寇見誣左官為循州録過而慕焉納為外婦偕竄南海上及移永州州之騷人多李之舊日載酒往焉聞其操鳴絃為新聲撫節而歌莫不感動其音美其容以忘其居之逺而名之辱方幸其若是也元和五年五月十九日積疾卒於湘水之東葬東岡之北垂年二十四銘曰容之丰兮藝之工隱憂以舒和樂雍佳冶雕殞逝安窮諧鼓瑟兮湘之滸嗣靈音兮永終古筝郭師墓志宕郭師名無名無字父爽雲中大將無名生善音能鼓十三絃其為事天姿獨得推七律三十五調切密邃靡布爪指運掌掔使木聲絲聲均其所自出屈折愈繹學者無能知自去乳不近葷肉以是慕浮圖道既失父母即棄去兄弟自秃緇入代清涼山又南來楚中然遇其故器不能無撫弄吳王宙刺復州或以告乃延入强之宙號知聲舞蹈以為神奇㑹宙貶賀州遂以來性愛酒不能已因縱髮為黃老術薛道州伯高抵宙以書必致之至與坐起伯髙褒邪人也嗜其音知善處輒自為擊節教閽管謹視出入餌仄柏不食榖三年變服遁逃九疑叢祠中披取之益善親遇終不屑卒乘暴水入小船下岣嶁山求道籙㑹歐陽師死不果受張誡副嶺南又强與偕誡死至是抵余時己得骨髓病日猶鼓音四五行居數日益篤既病自為歌死三日葬州北岡西志其詞曰雲州生柳州死年五十病骨髓天與之音今已矣丁酉之年秋既季月闕其團於是始心為浮圖形道士仁人我哀埋勿棄唐宋八大家文鈔卷二十七
