body:
  text: 唐宋八大家文鈔卷一百三明茅坤撰南豐文鈔七記筠州學記不如宜黃記所見之深而其行文亦屬作者之㫖周衰先王之迹熄至漢六藝出於秦火之餘士學於百家之後言道德者矜高逺而遺世用語政理者務卑近而非師古刑名兵家之術則狃於暴詐惟知經者為善矣又爭為章句訓詁之學以其私見妄臆穿鑿為說故先王之道不明而學者靡然溺於所習當是時能明先王之道者揚雄而巳而雄之書世未知好也然士之出於其時者皆勇於自立無苟簡之心其取與進退去就必度於禮義及其巳衰而搢紳之徒抗志於强暴之間至於廢錮殺戮而其操愈厲者相望於先後故雖有不軌之臣猶低徊沒世不敢遂其篡奪自此至於魏晉以來其風俗之弊人材之乏久矣以迄於今士乃有特起於千載之外明先王之道以寤後之學者世雖不能皆知其意而往往好之故習其說者論道德之㫖而知應務之非近議政理之體而知法古之非迂不亂於百家不蔽於傳疏其所知者若此此漢之士所不能及然能尊而守之者則未必衆也故樂易敦朴之俗微而詭欺薄惡之習勝其於貧富貴賤之地則養廉逺恥之意少而偷合苟得之行多此俗化之美所以未及於漢也夫所聞或淺而其義甚高與所知有餘而其守不足者其故何哉繇漢之士察舉於鄉閭故不得不篤於自修至於漸摩之久則果於義者非强而能也今之士選用於文章故不得不篤於所學至於循習之深則得於心者亦不自知其至也由是觀之則上所好下必有甚者焉豈非信歟令漢與今有教化開導之方有庠序養成之法則士於學行豈有彼此之偏先後之過乎夫大學之道將欲誠意正心修身以治其國家天下而必本於先致其知則知者固善之端而人之所難至也以今之士於人所難至者既幾矣則上之施化莫易於斯時顧所以導之如何爾筠為州在大江之西其地僻絶當慶厯之初詔天下立學而筠獨不能應詔州之士以為病至治平三年蓋二十有三年矣始告于知州事尚書都官郎中董君儀董君乃與通判州事國子博士鄭君蒨相州之東南得亢爽之地築宮於其上齊祭之室誦講之堂休息之廬至於庖湢庫廄各以序為經始於其春而落成於八月之望既而來學者常數十百人二君乃以書走京師請記於豫豫謂二君之於政可謂知所務矣使筠之士相與升降乎其中講先王之遺文以致其知其賢者超然自信而獨立其中材勉焉以待上之教化則是宮之作非獨使夫來者玩思於空言以干世取祿而巳故為之著豫之所聞者以為記而使歸刻焉宜黃縣學記子固記學所論學之制與其所以成就人材處非深於經術者不能韓歐三蘇所不及處古之人自家至於天子之國皆有學自幼至於長未嘗去於學之中學有詩書六藝弦歌洗爵俯仰之容升降之節以習其心體耳目手足之舉措又有祭祀鄉社養老之禮以習其恭讓進材論獄出兵授捷之法以習其從事師友以解其惑勸懲以勉其進戒其不率其所以為具如此而其大要則務使人人學其性不獨防其邪僻放肆也雖有剛柔緩急之異皆可以進之於中而無過不及使其識之明氣之充於其心則用之於進退語默之際而無不得其宜臨之以禍福死生之故而無足動其意者為天下之士而所以養其身之僃如此則又使知天地事物之變古今治亂之理至於損益廢置先後終始之要無所不知其在堂戶之上而四海九州之業萬世之策皆得及出而履天下之任列百官之中則隨所施為無不可者何則其素所學問然也蓋凡人之起居飲食動作之小事至於修身為國家天下之大體皆自學出而無斯須去於教也其動於視聽四支者必使其洽於內其謹於初者必使其要於終馴之以自然而待之以積久噫何其至也故其俗之成則刑罰措其材之成則三公百官得其士其為法之永則中材可以守其入人之深則雖更衰世而不亂為教之極至此鼓舞天下而人不知其從之豈用力也哉及三代衰聖人之制作盡壞千餘年之間學有存者亦非古法人之體性之舉動唯其所自肆而臨政治人之方固不素講士有聰明朴茂之質而無教養之漸則其材之不成固然蓋以不學未成之材而為天下之吏又承衰弊之後而治不教之民嗚呼仁政之所以不行盜賊刑罰之所以積其不以此也歟宋興幾百年矣慶厯三年天子圖當世之務而以學為先於是天下之學乃得立而方此之時撫州之宜黃猶不能有學士之學者皆相率而寓於州以羣聚講習其明年天下之學復廢士亦皆散去而春秋釋奠之事以著於令則常以廟祀孔氏廟廢不復理皇祐元年會令李君詳至始議立學而縣之士某某與其徒皆自以謂得發憤於此莫不相勵而趨為之故其材不賦而羡匠不發而多其成也積屋之區若干而門序正位講藝之堂栖士之舍皆足積器之數若干而祀飲寢食之用皆具其像孔氏而下從祭之士皆備其書經史百氏翰林子墨之文章無外求者其相基會作之本末總為日若干而巳何其周且速也當四方學廢之初有司之議固以謂學者人情之所不樂及觀此學之作在其廢學數年之後唯其令之一唱而四境之內響應而圖之如恐不及則夫言人之情不樂於學者其果然也歟宜黃之學者固多良士而李君之為令威行愛立訟清事舉其政又良也夫及良令之時而順其慕學發憤之俗作為宮室教肄之所以至圖書器用之須莫不皆有以養其良材之士雖古之去今遠矣然聖人之典籍皆在其言可考其法可求使其相與學而明之禮樂節文之詳固有所不得為者若夫正心修身為國家天下之大務則在其進之而巳使一人之行修移之於一家一家之行修移之於鄉鄰族黨則一縣之風俗成人材出矣教化之行道德之歸非逺人也可不勉歟縣之士來請曰願有記故記之十二月某日也灜州興造記刀尺不踰熙寧元年七月甲申河北地大震壞城郭屋室灜州為甚是日再震民訛言大水且至驚欲出走諫議大夫李公肅之為高陽關路都總管安撫使知灜州事使人分出慰曉訛言乃止是日大雨公私暴露食儲庫積無所覆冒公開示便宜使有攸處遂行倉庫經營蓋障雨止粟以石數之至一百三十萬兵器他物稱是無壞者初變作公命援兵警備訖于既息人無爭偷里巷安輯維北邊自通使契丹城壁樓櫓禦守之具寢弛不治習以為故公因災變之後以興壞起廢為巳任知民之不可重困也乃請於朝力取於旁路之羡卒費取於備河之餘材又以錢千萬市木於真定既集乃築新城方十五里高廣堅壯率加於舊其上為敵樓戰屋凡四千六百間先時州之正門弊在狹陋及是始斥而大之其餘凡圯壞之屋莫不繕理復其故常周而覽之聽斷有所燕休有次食有高廪貨有深藏賔屬士吏各有寧宇又以其餘力為南北甬道若干里人去汙淖即于夷塗自七月庚子始事至十月巳未落成其用人之力積若干萬若干千若干百工其竹􅓗木瓦之用積若干萬若干千若干百蓋遭變之初財匱民流此邦之人以謂役巨用艱不纍數稔城壘室屋未可以復也至於始作踰時功以告具蓋公經理勸督內盡其心外盡其力故能易壞為成如是之敏事聞有詔嘉奬昔鄭火災子産救災補敗得宜當理史實書之衛有狄人之難文公治其城市宮室合於時制詩人歌之今灜地震之所摧敗與鄭之火災衛之寇難無異公禦備構築不失其方亦猶古也故灜之士大夫皆欲刻石著公之功而豫之從父兄適與軍政在公幕府乃以書來屬豫記之豫不得辭故為之記尚俾來世知公之嘗勤於是邦也繁昌縣興造記亦有幅尺太宗二年取宣之三縣為太平州而繁昌在籍中繁昌者故南陵地唐昭宗始以為縣縣百四十餘年無城垣而濵大江常編竹為障以自固歲輒更之用材與力一取於民出入無門關賔至無舍館今治所雖有屋而痺逼破露至聽訟於廡下案牘簿書棲列無所往往散亂不可省而獄訟賦役失其平歷七代為令者不知幾人恬不知改革日入於壞故世指繁昌為陋縣而仕者不肯來行旅者不肯遊政事愈以疵市區愈以索寞為鄉老吏民者羞且憾之事之窮必變故今有能令出因民之所欲為悉破去竹障而垣其故基為門以通道往來而屋以取固即門之東北構亭瞰江以納四方之賔客既又自大其治所為重門步廊門之上為樓斂勑書置其中廊之兩旁為羣吏之舍視事之㕔便坐之齊寢廬庖湢各以序為㕔之東西隅凡案牘簿書室而藏之於是乎在自門至於寢廬總為屋凡若干區自計材至於用工總為日凡二千三百九十六日而落成焉夏希道太初此令之姓名字也慶厯七年十月二十三日此成之年月日也始繁昌為縣止三千戶九十年間四聖之德澤覆露生養今幾至萬家田利之入倍他壤有餘魚蝦竹􅓗柿栗之貨足以自資而無貧民其江山又天下之勝處可樂也今復得能令為樹立如此使得無歲費而有巨防賔至不惟得以休而耳目尚得以為之觀令居不惟得以安而民吏之出入仰望者益知尊且畏之獄訟賦役之書悉完則是非倚而可定也豫知縣之去陋名而仕者爭欲來行旅者爭欲遊昔之疵者日巳減去而索寞者日以富蕃稱其縣之名其必自此始夏令用薦者為是縣至二十七日而計材以至於落成不惟興利除弊可法也而其變因循就功效獨何其果且速歟昔孟子譏子産惠而不知為政於戲如夏令者庶幾所謂知政者歟於是過子産矣凡縣之得令為難幸而得能令而興事尤難幸而事興而得後人不廢壞之又難也今繁昌民既幸得其所難得而令又幸無不便巳者得卒興其所尤難皆可喜無憾也惟其欲後人不廢壞之未可必也故屬豫記其不特以著其成其亦有以警也洪州新建縣㕔壁記覽此文則知為縣者所甚難為後世之吏得行其志者少矣此仕之所以難也而縣為最甚何哉凡縣之政無小大令主簿皆獨任而民事委曲當有所操縱緩急不能一斷以法舉法而繩之則其罪固易求也凡有所為問可不可於州執一而違之則其勢固易撓也其罪易求其勢易撓故為之者有以得於州然後其濟可幾也不幸其一錙銖與之咈則大者求其罪小者撓其勢將不遺其力矣吏之不能自安豈足道哉縣有不與其擾者乎方是時也而天下之能忘其勢而好惡不妄者鮮矣能忘人之勢而强力不苟者亦鮮矣州負其强以取威縣憂其弱以求免其習巳久其俗巳成之後而守正循理以求其得於州其亦不可以必也則仕於此者欲行其志豈非難也哉君子者雖無所處而不安然其於自處也未嘗不擇仕而得擇其自處則縣之事有不敢任者豈可謂過也哉洪州新建自太平興國六年分南昌為縣至嘉祐三年凡若干年為令者凡三十有九人而祕書省著作佐郎黃巽公權來為其令抑豪縱惠下窮守正循理而得濟其志者也公權亦喜其職之行因考次凡為令者名氏將伐石以書而列置于壁間故豫為之載其行治而因著其為縣之難使來者得覽焉齊州二堂記辨證的確得太守體齊濵濼水而初無使客之館使客至則常發民調材木為舍以寓去則撤之既費且陋乃為徙官之廢屋為二堂於濼水之上以舍客因考其山川而名之蓋史記五帝紀謂舜耕厯山漁雷澤陶河濵作什器於壽丘就時於負夏鄭康成釋歷山在河東雷澤在濟隂負夏衛地皇甫謐釋壽丘在魯東門之北河濵濟隂定陶西南陶丘亭是也以豫考之耕稼陶漁皆舜之初宜同時則其地不宜相逺二家所釋雷澤河濵壽丘負夏皆在魯衛之間地相望則歷山不宜獨在河東也孟子又謂舜東夷之人則陶漁在濟隂作什器在魯東門就時在衛耕歷山在齊皆東方之地合於孟子按圖記皆謂禹貢所稱雷首山在河東媯水出焉而此山有九號歷山其一號也豫觀虞書及五帝紀蓋舜娶堯之二女乃居媯汭則耕歷山蓋不同時而地亦當異世之好事者乃因媯水出於雷首遷就附益謂歷山為雷首之别號不考其實矣由是言之則圖記皆謂齊之南山為歷山舜所耕處故其城名歷城為信然也今濼上之北堂其南則歷山也故名之曰歷山之堂按圖泰山之北與齊之東南諸谷之水西北匯于黑水之灣又西北匯于柏崖之灣而至于渴馬之崖蓋水之來也衆其北折而西也悍疾尤甚及至於崖下則泊然而止而自崖以北至于歷城之西蓋五十里而有泉湧出高或至數尺其旁之人名之曰趵突之泉齊人皆謂嘗有棄糠於黑水之灣者而見之於此蓋泉自渴馬之崖潛流地中而至此復出也趵突之泉冬溫泉旁之蔬甲經冬常榮故又謂之溫泉其注而北則謂之濼水達于清河以入于海舟之通于濟者皆於是乎出也齊多甘泉冠于天下其顯名者以十數而色味皆同以豫驗之蓋皆濼水之旁出者也濼水嘗見於春秋魯桓公十有八年公及齊侯會于濼杜預釋在歷城西北入濟水濟自王莽時不能被河南而濼水之所入者清河也預蓋失之今濼上之南堂其西南則濼水之所出也故名之曰濼源之堂夫理使客之館而辨其山川者皆太守之事也故為之識使此邦之人尚有考熙寧六年二月巳丑記廣德湖記本末纎悉得記事法才是有用文字不如鑑湖圖序更妙鄞縣張侯圖其縣之廣德湖而以書并古刻石之文遺豫曰願有紀蓋湖之大五十里而在鄞之西十二里其源出於四明山而引其北為漕渠泄其東北入江凡鄞之鄉十有四其東七鄉之田錢湖溉之其西七鄉之田水注之者則此湖也舟之通越者皆繇此湖而湖之産有鳬雁魚鱉茭蒲葭菼葵蓴蓮芡之饒其舊名曰鶯脰湖而今名大厯八年令儲仙舟之所更也貞元元年刺史任侗又治而大之大中元年民或上書請廢湖為田任事者左右之為出御史李後素驗視後素不為撓民以得罪而湖卒不廢刺史李敬方與後素皆賦詩刻石以見其事其說以謂當是時湖成三百年矣則湖之興其在梁齊之際歟宋興淳化二年民始與州縣彊吏盜湖為田久不能正至道二年知州事丘崇元躬按治之而湖始復轉運使言其事詔禁民敢田者至其後遂著之於一州敕咸平中賜官吏職田取湖之西山足之地百頃為之既而務益取湖以自廣天禧二年知州事李夷庚始正湖界起隄十有八里以限之湖之濵有地曰林村砂末曰高橋臘臺而其中有山曰白鶴曰望春自太平興國以來民冒取之夷庚又命禁絶而湖始復天聖景佑之間民復相率請湖為田州從事張大有案行止之而知州事李照又言其事報如至道詔書照以刻之石自此言請湖為田者始息而康定某年縣主簿曾公望又益治湖至張侯之為鄞則湖久不治而七鄉之農以旱告張侯為出營度民田湖旁者皆喜願致其力張侯計工賦材擇民之為人信服有知計者使督役而自主之一不以屬吏人以不擾而咸勤趍於是築環湖之隄凡九千一百三十四丈其廣一丈八尺而其高八尺廣倍於舊而高倍於舊三之二鄞人纍石陻水闕其間而扃以木視水之小大而閉縱之謂之碶於是又為之益舊總為碶九為埭二十隄之上植榆柳益舊總為三萬一百又因其餘材為二亭於隄上以休而與望春白鶴之山相直因以其山名之上為廟一以祠神之主此湖者一以祠吏之有功於此湖者以熙寧元年十一月始役而以明年二月卒事其用民之力八萬二千七百九十有二工而其材出於工之餘既成而田不病旱舟不病涸魚雁茭葦果蔬水産之良皆復其舊而其餘及於比縣旁州張侯於是可謂有勞矣是年豫通判越州事越之南湖久廢不治蓋出於吏之因循而至於不知所以為力豫方患之觀廣德之興以數百年危於廢者數矣繇屢有人故益以治蓋大厯之間溉田四百頃大中八百頃而今二千頃矣則人之存亡政之廢舉為民之幸不幸其豈細也歟故為之書尚俾來者知毋廢前人之功以永為此邦之利而又將與越之人圖其廢也張侯名峋字子堅以材聞去而為提舉兩浙路常平廣惠倉兼管勾農田差役水利事方且用於時云襄州宜城縣長渠記千年鄢水本末如掌而通篇措注一一有法荆及康狼楚之西山也水出二山之間東南而流春秋之世曰鄢水左丘明傳魯桓公十有三年楚屈瑕伐羅及鄢亂次以濟是也其後曰夷水水經所謂漢水又南過宜城縣東夷水注之是也又其後曰蠻水酈道元所謂夷水避桓溫父名改曰蠻水是也秦昭王三十八年使白起將攻楚去鄢百里立堨壅是水為渠以灌鄢鄢楚都也遂拔之秦既得鄢以為縣漢惠帝三年改曰宜城宋孝武帝永初元年築宜城之大堤為城今縣治是也而更謂鄢曰故城鄢入秦而白起所為渠因不廢引鄢水以灌田田皆為沃壤今長渠是也長渠至宋至和二年久隳不治而田數苦旱州飲者無所取令孫永曼叔率民田渠下者理渠之壞塞而去其淺隘遂完故堨使水還渠中自二月丙午始作至三月癸未而畢田之受渠水者皆復其舊曼叔又與民為約束時其蓄泄而止其侵爭民皆以為宜也蓋䣕水之出西山初棄於無用及白起資以禍楚而後世顧賴其利酈道元以謂溉田二千餘頃至今千有餘年而曼叔又舉衆力而復之使並渠之民足食而甘飲其餘粟散於四方蓋水出於西山諸谷者其源廣而流於東南者其勢下至今千有餘年而山川高下之形勢無改故曼叔得因其故迹興於既廢使水之源流與地之高下一有易於古則曼叔雖力亦莫能復也夫水莫大於四瀆而河蓋數徙失禹之故道至於濟水又王莽時而絶況於衆流之細其通塞豈得而常而後世欲行水溉田者往往務躡古人之遺跡不考夫山川形勢古今之同異用力多而成功少是亦其不思也歟初曼叔之復此渠白其事於知襄州事張環唐公公聽之不疑沮止者不用故曼叔能以有成則渠之復自夫二人者也方二人者之有為蓋將任其職非有求於世也及其後言渠竭者蜂出然其心蓋或有求故多詭而少實獨長渠之利較然而二人者之志愈明也熙寧六年余為襄州過京師曼叔時為開封訪余於東門為余道長渠之事而諉余以考其約束之廢舉余至而問焉民皆以為賢君之約束相與守之傳數十年如其初也豫為之定著令上司農八年曼叔去開封為汝隂始以書告之而是秋大旱獨長渠之田無害也夫宜知其山川與民之利害者皆為州者之任故豫不得不盡以告後之人而又使之知夫作之所以始也曼叔今為尚書兵部郎中龍圖閣直學士八月丁丑記王遵岩曰二堂及此記皆絶佳唐宋八大家文鈔卷一百三
