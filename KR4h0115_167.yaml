body:
  text: 唐宋八大家文鈔卷一百五十三明茅坤撰潁濱文鈔九歷代論宋武帝東漢之衰曹公始踐五伯之迹挾天子以令諸侯其志本欲盡掃羣雄而後取漢耳既滅二袁吕布劉表欲遂取江東而不克既破馬超韓遂欲并舉巴蜀而不果再屈於吳蜀而公亦老矣於是董昭進九錫之議幡然聽之而桓文之業至此盡矣然方是時公在河朔而漢都許昌雖使主盟諸夏而不廢舊君上可以為周文王下亦不失為柦文公不能忍而甘心王莽九錫之事此荀文若之所以為恨也至司馬仲達父子其勢蓋與公異矣擁兵天子之側固已不順既殺王凌害諸葛誕非人臣矣又降劉禪服曹氏之所不能服非貪其土地而利其人民也志亦在九鍚耳雖欲復為桓文尚可得乎宋武既誅桓氏收遺晉而封植之又克譙縱執慕容超逐盧循擒姚泓立四大功天下莫能抗然其志不在桓文而在九錫亦已卑矣方帝之克長安也中原震恐元魏雖姚氏之昏姻而不敢救羌氐雖關中之唇齒而不敢爭此其智力有餘足以有為之時也若能因其兵勢據秦隴之形勝引吳趙之饒富以經略中夏成曹公河朔之勢則王伯之功可冀顧所以用之何如耳然其兵未入秦而使傅亮南走建業發九錫之議劉穆之死南方無復可託雖已入秦而無留秦之意舉千里之地付一孺子而去赫連勃勃乘之兵將死者過半狼狽而反僅乃得脫以帝之明非不知諸將之不足以保秦而志有所在不暇它慮矣悲夫以目前之利而棄百世之功有曹公削平之業而俯從司馬父子攘竊之陋此君子之所追恨也孔子曰知及之仁不能守之雖得之必失之知及之仁能守之不莊以涖之則民不敬知及之仁能守之莊以涖之動之不以禮未善也古之為國必具此四者而後能成大功如武帝之用兵無敵於天下可以言智矣至其棄秦而歸以求九錫之淫名尚可以為仁乎惟其仁智不具故其功業止於是也宋文帝晉獻公殺其世子申生而立奚齊國人不順其大夫里克殺奚齊卓子而納惠公春秋皆以弒君書之矣惠公既立而殺里克以弒君之罪罪之春秋書曰晉殺其大夫里克稱人以殺殺有罪也稱國以殺殺無罪也里克弒君而以無罪書此春秋之微意也奚齊卓子之立以淫破義雖已為君而晉人不君也既已為君則君臣之名正故里克為弒君而國人之所不君則勢必不免里克因國人之所欲廢而廢之因國人之所欲立而立之則里克之罪與宋華督齊崔杼異矣雖使上有明天子下有賢方伯里克之罪猶可議也惠公以弒得立而歸罪於克以自悅於諸侯其義有不可矣然惠公殺克而背內外之賂國人惡之敵人怨之兵敗於秦身死而子滅至其謀臣吕甥郤稱冀芮皆以兵死蓋背理而傷義非獨人之所不豫而天亦不豫也宋武帝之亡也託國於徐羡之傅亮謝晦少帝失德三人議將廢之而其弟義真亦以輕動不任社稷乃先廢義真而後廢帝兄弟皆不得其死乃迎立文帝文帝既立三人疑懼羡之亮內秉朝政晦出據上流為自安之計自謂廢狂亂以安社稷不以賊遺君父無負於國矣然文帝藩國舊人王華孔寧子王曇首皆陵上好進之人也惡羡之亮據其徑路每以弒逆之禍激怒文帝帝遂決意誅之三人既死君臣自謂不世之功也是時寧子已死華與曇首皆受不次封賞文帝在位三十年其治江左稱首然元嘉三年始誅三人是歲皇子劭生劭既壯而為商臣之亂華寧子之子孫無聞於世而曇首之子僧綽以才能任事亦并死於劭於乎天之報人不逺如此不然晉惠公宋文帝禍發若合符契何哉謝晦將之荆州自疑不免以問蔡廓廓曰卿受先帝顧命任以社稷廢昏立明義無不可但殺人二昆而以北面挾震主之威據上流之重以古推今自免為難耳善夫蔡廓之言不學春秋而意與之合太史公有言為國者不可以不知春秋前有讒而不見後有賊而不知守經事而不知其宜遭變事而不知其權為人君父而不通春秋之義者必䝉首惡之名為人臣子而不通春秋之義者必蹈篡弒之誅其意皆以善為之而不知其義是以被之空言而不敢辭宋之君臣誠略通春秋則文帝必無惠公之禍徐傅謝三人必不受里克之誅悲夫梁武帝蘇氏兄弟晚年並以釋典之㫖自解脫故其言如此然而所本易之形而上以為釋老之原則又對癡人說夢矣易曰形而上者謂之道形而下者謂之器自五帝三王以形器治天下𨗳之以禮樂齊之以政刑道行於其間而民莫知也文武之後雖召公畢公之賢君子不以為知道者至春秋之際管仲晏子子産叔向之徒以仁義忠信成功於天下然其於道則已逺矣孔子出於周末收文武之遺而得堯舜之極其稱曰君子上達小人下達嘗自謂我下學而上達者於其門人惟顔子曽子庶幾以道許之一時賢者若老子之明道其所以尊之者至矣史稱孔子既見老子退謂弟子曰鳥吾知其能飛魚吾知其能遊獸吾知其能走走者可以為網遊者可以為綸飛者可以為繒至於龍吾不能知其乘雲氣而上天吾今日見老子其猶龍邪老子體道而不嬰於物孔子至以龍比之然卒不與共斯世也捨禮樂政刑而欲行道於世孔子固知其難哉東漢以來佛法始入中國其道與老子相出入皆易所謂形而上者而漢世士大夫不能明也魏晉以後略知之矣好之篤者則欲施之於世疾之深者則欲絶之於世二者皆非也老佛之道與吾道同而欲絶之老佛之教與吾教異而欲行之皆失之矣秦姚興區區一隅招延緇素譯經談妙至者凡數千人而姚氏之亡曽不旋踵梁武繼之江南佛事前世所未嘗見至舍身為奴𨽻郊廟之祭不薦毛血父子皆陷於侯景而國隨以亡議者觀秦梁之敗則以佛法為不足賴矣後魏太武深信崔浩浩不信佛法勸帝斥去僧徒毁經壞寺既滅佛法而浩亦以非罪赤族唐武宗欲求長生狥道士之私夷佛滅僧不期年而以弒崩議者觀魏唐之禍則以佛法為不可忤矣二者皆見其一偏耳老佛之道非一人之私說也自有天地而有是道矣古之君子以之治氣養心其髙不可嬰其潔不可溷天地神人皆將望而敬之聖人之所以不疾而速不行而至者一用此道也老子曰天得一以清地得一以寧神得一以靈榖得一以盈萬物得一以生侯王得一以為天下貞天無以清將恐裂地無以寧將恐發神無以靈將恐歇榖無以盈將恐竭萬物無以生將恐絶侯王無以為正而貴髙將恐蹶道之於物無所不在而尚可非乎雖然滅君臣廢父子而以行道於世其弊必有不可勝言者誠以形器治天下導之以禮樂齊之以政刑道行於其間而民不知萬物並育而不相害道並行而不相悖泯然不見其際而天下化不亦周孔之遺意也哉唐髙祖論唐髙祖起太原其謀發於太宗諸子不與也及克長安誅鋤羣盜天下為一其功亦出於太宗蓋天心之所付豫人心之所歸向其在太宗者審矣至立太子髙祖以長立建成建成當之不辭於是兄弟疑間卒至大亂夫建成不足言也其咎在髙祖其後武氏之亂廢中宗立睿宗以睿宗長子憲為太子矣及中宗之復睿宗父子皆以王就第韋氏之亂臨淄以兵入討睿宗踐祚而唐室復安又將以長立憲憲辭曰時平先長嫡國亂先有功不如此必且有難敢以死請睿宗從之而後臨淄之位定以太宗之賢而不免於爭奪𤣥宗之賢不逮太宗而晏然受命則憲之讓賢於人遠矣吾嘗論之高祖睿宗皆中主也其欲立長非專其私也以為立嫡以長古今之正義也謂之正義而不敢違胡不考之前世乎太王捨太伯仲雍而立季厯文王捨伯邑考而立武王而周以之興誠天命之所在而吾無心焉亂何自生雖然太伯奔吳以避王季亦畏亂故耳廢長而立少雖聖賢猶難之憲與𤣥宗兄弟相安終身無間言焉蓋古今一人而已唐太宗論罪太宗以不知道三字確論唐太宗之賢自西漢以來一人而已任賢使能將相莫非其人恭儉節用天下幾至刑措自三代以下未見其比也然傳子至孫遭武氏之亂子孫為戮不絶如線後世推原其故而不得以吾觀之惜夫其未聞大道也哉昔楚昭王有疾卜之曰河為祟大夫請祭諸郊王曰三代命祀祭不越望江漢淮漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂弗祭及將死有雲如衆赤烏夾日以飛三日王使問周史史曰其當王身乎若禜之可移於令尹司馬王曰除心腹之疾而置諸股肱何益不榖不有大過天其天諸有罪受罰又焉移之亦弗禜孔子聞之曰楚昭王知大道矣其不失國也宜哉吾觀太宗所為其不知道者衆矣其能免乎貞觀之間天下既平征伐四夷滅突厥夷髙昌殘吐谷渾兵出四克務勝而不知止最後親征髙麗大臣力爭不從僅而克之其賢於隋氏者幸一勝耳而帝安為之原其意亦欲夸當世髙後世耳太子承乾既立十餘年復寵魏王泰使兄弟相傾承乾既廢晉王嫡子也欲立泰而使異日傳位晉王疑不能決至引佩刀自制大臣救之而止父子之間以愛故輕豫奪至於如此帝嘗得祕䜟言唐後必中微有女武代王以問李淳風欲求而殺之淳風曰其兆既已成在宫中矣天之所命不可去也徒使疑似之戮淫及無辜且自今以往四十年其人已老老則仁雖受終易姓必不能絶李氏若殺之復生壯者多殺而逞則子孫無遺類矣帝用其言而止然猶以疑似殺李君羡夫天命之不可易惟修德或能已之而帝欲以殺人弭之難哉帝之老也將擇大臣以輔少主李績起於布衣忠力徑果有節俠之氣嘗事李密及單雄信密敗不忍以其地求利密死不廢舊君之禮雄信將戮以股肉啖之使與俱死帝以是為可用疾革謂髙宗爾於績無恩今以事出之我死即授以僕射髙宗從之及廢皇后立武昭儀召績與長孫無忌褚遂良計之績稱疾不至帝曰皇后無子罪莫大於絶嗣將廢之遂良等不可他日績見帝曰將立昭儀而顧命大臣皆以為不可今止矣績曰此陛下家事不須問外人由此廢立之議遂定績匹夫之俠也以死徇人不以為難至於禮義之重社稷所由安危績不知也而帝以為可以屬幼孤寄天下過矣且使績信賢託國於父竭忠力以報其子可矣何至父逐之子復之而後可哉挾數以待臣下於義既已薄矣凡此皆不知道之過也茍不知道則凡所施於世必有逆天理失人心而不自知者故楚昭王惟知大道雖失國而必復太宗惟不知道雖天下既安且治而幾至於絶滅孔子之所以觀國者如此唐荆川曰篇中整段抄故事而斷語全少蓋論之一體也𤣥宗憲宗論的確明切唐𤣥宗憲宗皆中興之主也𤣥宗繼中睿之亂政紊於內而外無藩鎮分裂之患約已任賢而貞觀之治可復也憲宗承代德之弊政僨於朝而畿甸之外皆為叛國將以求治則其勢尤難雖然二君皆善其始而不善其終所以失之者一道也齊桓公用管仲九合諸侯一匡天下為五伯首及管仲死用竪刁易牙身死不得葬五公子爭立伯業隨毁蓋中人可以上下此三君者皆中主耳方其起於憂患厄困之中知賢人之可任以排難則勉强而從之然非其所安也及其禍難既平國家無事則其心之所安者佚樂所悅者諛佞也故禍發皆不旋踵若合符節昔太宗既平天下始任房𤣥齡杜如晦魏徴終用長孫無忌岑文本褚遂良帝亦恭儉節用去冗官節浮費內無宫掖侈靡之奉旁無近幸賜子之失貞觀之治斯已過半矣侍書御史權萬紀嘗言宣饒部中鑿山冶銀歲可取數百萬緍以佐國用帝怒罵曰吾所用忠言嘉謨有益於民者耳汝為御史不能進賢退不肖而訹吾以利豈謂我漢桓靈耶斥去不用於是士莫敢以利言者故房杜諸人得效其忠力以致貞觀之盛及𤣥宗初用姚崇宋璟盧懷慎蘇頲後用張說源乾曜張九齡憲宗初用杜黃裳李吉甫裴垍裴度李絳後用韋貫之崔羣雖未足以方駕房杜然皆一時名臣也故開元元和之初其治庶幾於貞觀然𤣥宗方用宋璟而宇文融以括田幸遽至宰相後雖以公議罷去而思之不巳謂宰相曰公等暴融惡朕巳罪之矣然國用不足將奈何裴光庭等不能答融既死而言利者爭進韋堅楊慎矜王鉷日以益甚至楊國忠而聚斂極矣故天寶之亂海內分裂不可復合憲宗方平淮蔡裴度未及還朝而程异皇甫鎛皆以利進度三上書極論不可帝以天下略平亦欲崇臺池宫觀以自娛樂异鏄揣知其意數貢羡財以順所欲故度卒逐去而异鏄皆相不三年而禍發於宦官蓋𤣥宗在位歲久聚斂之害遍於天下故天下遂分憲宗之世其害未究故禍止於其身然方鎮之强宦官之橫遂與唐相終始可不哀哉嗚呼太宗之恭儉所忍無幾耳而福至於不可勝盡𤣥憲之淫佚所獲無幾耳而禍至於不可勝言而世主終莫之悟覆車相尋不絶於世蓋未之思歟五伯論五伯優劣亦見於此矣兵戒亦云無為戎首故易曰聖人不得已而毒天下也五伯桓文為盛然觀其用兵皆出於不得已桓公帥諸侯以伐楚次於陘而不進以待楚人之變楚使屈完如師桓公陳諸侯之師與之乘而觀之屈完見齊之盛懼而求盟諸侯之師成列而未試也桓公退舍召陵與之盟而去之夫豈不能一戰哉知戰之不必勝而戰勝之利不過服楚全師之功大於克敵故以不戰服楚而不吝也晉文公以諸侯遇楚于城濮楚人請戰文公思楚人之惠退而避之三舍軍吏皆諌咎犯曰我退而楚還我將何求若其不還君退臣犯曲在彼矣師退而楚不止遂以破楚而殺子玉使文公退而子玉止則文公之服楚亦與齊桓等無戰勝之功矣故桓文之兵非不得已不戰此其所以全師保國無敵於諸侯者也至宋襄公國小德薄而求諸侯凌虐邾鄫之君爭鄭以怒楚兵敗身死之不暇雖竊伯者之名而實非也其後秦穆公東平晉亂西伐諸戎楚莊王克陳入鄭得而不取皆有伯者之風矣然穆公聽祀子之計違蹇叔而用孟明千里襲鄭覆師於殽雖悔過自誓列於周書而不能東征諸夏以終成伯業莊王使申舟聘齊命無假道於宋舟知必死而王不聽宋人殺之王聞其死投袂而起以兵伐宋圍之九月與之盟而去之雖號能服宋然君子以為此不假道之師也齊靈公楚靈王之所為王亦為之而尚何以為伯乎嗚呼此二君者皆賢君也兵一不義而幾至於狼狽不能與桓文齒而況其下者哉隗囂論論亦有據智者為國知所去就大義既定雖有得失不為害也隗囂初據隴坻謙恭下土豪傑歸之刑政修舉兵甲富盛一時竊據之中有賢將之風矣然聖公乘王莽之敗擁衆入關君臣貪暴不改盜賊之舊敗亡之勢匹夫匹婦皆知之矣而囂舉大衆束手稱臣違方望之言陷諸父於死地僅以身免及光武自河北入洛政修民附賢士滿朝羣盜十去六七而囂懲既往之禍方擁兵自固為六國之計謀臣去之義士笑之而囂與王元王捷一二人以死守之始從聖公而不疑終背光武而不悔去就之計無一得者至於殺身亡國蓋不足怪也劉表專制荆州土廣民衆勢重於天下曹公與袁紹相拒於官渡二人皆求助於表表方晏然自守一無所與韓嵩說表曰兩雄相持天下之重在於將軍果欲有為起乘其弊可也如其不然則將擇所宜從豈可擁甲十萬坐觀成敗求援而不能救見賢而不肯歸此兩怨必集於將軍恐不得中立矣表猶豫不能用卒為曹公所并隗囂劉表雍容風議皆得長者之譽然其敗也皆以去就不明失之不如張魯之庸敗亡之餘知所歸往猶能保其後嗣兵法有之知彼知已百戰不殆知彼而不知已一勝一負不知彼不知已每戰輒殆夫惟知彼知已而後知所去就哉符堅論有深識而行文處非蘇氏本㫖符堅王猛君臣相得以成霸功雖齊桓管仲不能過也猛之將死也堅問以後事猛曰晉雖僻處吳越然正朔相承親仁善鄰國之寶也臣沒之後願勿以晉為圖鮮卑羌氐我之仇讐終為人患宜漸除之以寧社稷言終而死堅不能用卒大舉伐晉敗于淝上歸未及國而慕容垂叛之既反國而姚萇叛之地分身死終弊於二人之手故後世皆多猛之賢而咎堅之不明吾嘗論之堅雖有霸者之略而懷無厭之心以天下不一為深恥雖滅燕定蜀并秦涼下西域而其貪未已兵革歲克而不知懼也晉雖微弱謝安桓冲為之將相君臣相安民未忘晉而欲以力取之稽之天道論之人情雖內無垂萇之釁而堅之敗必不免矣然堅以夷狄之餘而有帝王之度其滅慕容姚也收二姓之子弟録其才能而官使之布滿中外凡其舊臣無不疑者若以世俗言之則以漸除之如猛之計得矣若以帝王之事言之則堅之意未必過也大雅之稱文王曰殷之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京厥作裸將常服黼哻文王用人其廣如此而堅何尤焉德雖不若文王而竊慕焉顧其所以處之如何耳文武既沒周公成王之際殷之遺孽猶與管蔡間周之隙曰豫復反鄙我周邦故周公克殷改封微子于宋而遷其頑民于洛邑保釐東郊作多士而撫寧之所以慮其變者至矣至若君陳畢公皆迭居成周而董帥之故康王之命畢公曰毖殷頑民遷于洛邑密邇王室式化厥訓既歷三紀世變風移四方無虞豫一人以寧然猶曰邦之安危惟兹殷士由此觀之文王之用殷人豈茍然而已哉今堅畜養豺虎于其腹心而貪心負勝不顧其後宜其斃于垂萇也哉使堅信猛之䇿南結鄰好戢兵保境與民休息雖有垂萇百人安能動之文王雖未可覬然亦非王猛之所及矣唐宋八大家文鈔卷一百五十三
